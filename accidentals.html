function sharedActualSymbolKey(key) {
  if (key === "flatInScore" || key === "flatKeySignature") return "flat";

function sharedSymbolConfig(key) {

function calibrationAnchorX(key, left = STAFF.left) {

const FINAL_PATTERNS = {

  "3/4": ["dottedMinim"],
  "4/4": ["semibreve"],
  "6/8": ["dottedMinim"],

const SCALES = {
  C: ["C", "D", "E", "F", "G", "A", "B"],
  F: ["F", "G", "A", "B", "C", "D", "E"],
  G: ["G", "A", "B", "C", "D", "E", "F"],
  Am: ["A", "B", "C", "D", "E", "F", "G"],
};

const CHORDS = {
  C: [["C", "E", "G"], ["F", "A", "C"], ["G", "B", "D"], ["C", "E", "G"]],
  F: [["F", "A", "C"], ["Bb", "D", "F"], ["C", "E", "G"], ["F", "A", "C"]],
  G: [["G", "B", "D"], ["C", "E", "G"], ["D", "F#", "A"], ["G", "B", "D"]],

const VALID_NOTE_NAMES = ["Ab", "A", "A#", "Bb", "B", "C", "C#", "Db", "D", "D#", "Eb", "E", "F", "F#", "Gb", "G", "G#"];

function randomItem(array) { return array[Math.floor(Math.random() * array.length)]; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function rhythmInfo(id) { return RHYTHMS[id] ?? RHYTHMS.crotchet; }

function enabledAccidentalValues(enabledAccidentals) { return enabledAccidentals.map(accidentalValue); }
function keysForAccidentals(enabledAccidentals) {
  return KEYS.filter((key) => {
    if (key.id === "F") return enabledAccidentals.includes("flat") || enabledAccidentals.includes("natural");
    if (key.id === "G" || key.id === "Am") return enabledAccidentals.includes("sharp") || enabledAccidentals.includes("natural");

function forbidAccidental(letter, value) { return (letter === "B" && value === 1) || (letter === "E" && value === 1) || (letter === "C" && value === -1) || (letter === "F" && value === -1); }
function hasEnharmonicConflict(bar, targetNote, value) {

function weighted(items) {

  const total = safeItems.reduce((sum, item) => sum + item.weight, 0);
  let roll = Math.random() * total;
  for (const item of safeItems) { roll -= item.weight; if (roll <= 0) return item.value; }

function beatStarts(pattern) {
  let cursor = 0;
  return pattern.map((rhythm) => { const start = cursor; cursor += rhythmInfo(rhythm).beats; return start; });

function effectiveAccidental(question, barIndex, noteIndex) {
  const active = { ...question.key.keyAcc };

    if (note.writtenAccidental !== null && note.writtenAccidental !== undefined) active[note.letter] = note.writtenAccidental;
    if (note.hiddenAccidental !== null && note.hiddenAccidental !== undefined) active[note.letter] = note.hiddenAccidental;

function accidentalForNoteName(name) {

function noteNameChoices(answer, enabledAccidentals) {

  const allowedNames = VALID_NOTE_NAMES.filter((name) => enabledAccidentals.includes(accidentalForNoteName(name)) || name === answer);
  const primary = [`${letter}b`, letter, `${letter}#`].filter((name) => allowedNames.includes(name));

function chooseMelodicIndex({ previousIndex, movement, key, pattern, beat, rhythm, barIndex, noteIndex, noteCount, timeSignature }) {

  const forceStep = rhythm === "quaver";

    const inChord = chord.includes(note.letter);

    const abs = Math.abs(distance);

function makeBars(timeSignature, key) {
  const bars = [];

  let movement = 0;
  let usedGSharp = false;
  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    const pattern = barIndex === BAR_COUNT - 1 ? FINAL_PATTERNS[timeSignature.id] : randomItem(PATTERNS[timeSignature.id]);
    const starts = beatStarts(pattern);
    const notes = pattern.map((rhythm, noteIndex) => {
      const index = chooseMelodicIndex({ previousIndex, movement, key, pattern, beat: starts[noteIndex], rhythm, barIndex, noteIndex, noteCount: pattern.length, timeSignature });

        usedGSharp = true;

function baseQuestion(type, enabledAccidentals = ACCIDENTALS.map((accidental) => accidental.id)) {

function qSharpFlat(base, enabledAccidentals) {

      const second = bar.notes[i + 1];

        <div className={`relative -top-[6px] ${mobileScoreHeight} flex items-center overflow-hidden transition-opacity duration-300 md:block md:h-[280px] md:flex-none ${questionVisible ? "opacity-100" : "opacity-0"}`}><Score question={question} selectedSymbol={selectedSymbol} placements={placements} hoverPlacement={hoverPlacement} feedback={feedback} wrong={wrong} missing={missing} onMove={handleMove} onLeave={() => setHoverPlacement(null)} onLock={handleLock} /></div>
        <div className="relative z-10 mx-0 mb-[10px] mt-auto min-h-0 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 h-auto px-4 py-3 shadow-md md:mx-3 md:mb-0 md:mt-[50px]"><div className="flex items-start justify-between gap-3 text-stone-900"><div className={hasPlayButton ? "pb-3" : "pb-1 sm:pb-3"}><p className="text-base font-semibold leading-none" dangerouslySetInnerHTML={{ __html: question.prompt }} /></div></div>{isChoice && <div className="mt-5 grid grid-cols-2 gap-2 sm:grid-cols-6">{question.choices.map((item) => <button key={item.id} type="button" disabled={Boolean(feedback)} onClick={() => { if (feedback) return; setChoice(item.id); scoreAnswer(item.id === question.answerId); }} className={`min-h-[56px] flex items-center justify-center rounded-xl border px-2 py-0 text-sm font-semibold ${feedback ? item.id === question.answerId ? "border-green-700 bg-green-600 text-white" : item.id === choice ? "border-red-700 bg-red-600 text-white" : "border-stone-300 bg-white text-stone-500" : choice === item.id ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`}>{item.arrow ? <span className="grid w-full grid-cols-[1fr_auto] items-center gap-3 px-1"><span className="text-center text-base font-semibold leading-tight tracking-tight">{item.text}</span><span className="text-3xl font-black leading-none">{item.arrow}</span></span> : <span className="text-base font-semibold tracking-tight">{item.text}</span>}</button>)}</div>}{isPlacement && <div className="mt-0 flex flex-wrap items-end justify-between gap-3 pb-[0px]">{hasPlayButton && <button type="button" onClick={playQuestion} disabled={playing} className={window.MLH.PlayButtonClass}><span className="text-base leading-none">▶</span><span>Play</span></button>}<div className="flex flex-nowrap gap-2">{ACCIDENTALS.filter((accidental) => enabledAccidentals.includes(accidental.id)).map((accidental) => <SymbolButton key={accidental.id} accidental={accidental} selected={selectedSymbol === accidental.id} disabled={Boolean(feedback)} correct={Boolean(feedback && !feedback.correct && question.answerId === accidental.id)} wrong={Boolean(feedback && !feedback.correct && selectedSymbol === accidental.id && question.answerId !== accidental.id)} onClick={() => { setSelectedSymbol(accidental.id); setWarning(""); }} />)}</div><div className={hasPlayButton ? window.MLH.ActionButtonGroupClass : "ml-auto grid grid-cols-2 gap-2"}><button type="button" disabled={Boolean(feedback) || placements.length === 0} onClick={() => { setPlacements([]); setHoverPlacement(null); setWarning(""); }} className={window.MLH.ClearButtonClass}>Clear</button><window.MLH.ConfirmButton disabled={!canConfirm || Boolean(feedback)} onClick={confirmPlacement} className={hasPlayButton ? window.MLH.AudioConfirmButtonClass : ""}>Confirm</window.MLH.ConfirmButton></div></div>}</div>
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
<script src="./footer.js?v=1.3"></script>
</body>
