function barCountForSignature(timeSignature) {
  return ["9/8", "12/8"].includes(timeSignature?.id) ? 4 : BAR_COUNT;
}
function barsPerSystemForQuestion(question) {
  if (question?.questionType === "time-change") return BARS_PER_SYSTEM;
  return ["9/8", "12/8"].includes(question?.timeSignature?.id) ? 2 : BARS_PER_SYSTEM;
}

const NOTES = [

  { name: "B4", letter: "B", step: 4 }, { name: "C5", letter: "C", step: 5 }, { name: "D5", letter: "D", step: 6 },
  { name: "E5", letter: "E", step: 7 }, { name: "F5", letter: "F", step: 8 }, { name: "G5", letter: "G", step: 9 },
  { name: "A5", letter: "A", step: 10 },
];

const KEYS = {
  C: { id: "C", label: "C major", tonic: "C", signature: [], scale: ["C", "D", "E", "F", "G", "A", "B"] },
  G: { id: "G", label: "G major", tonic: "G", signature: [{ type: "sharp", step: 8 }], scale: ["G", "A", "B", "C", "D", "E", "F"] },

  Bb: { id: "Bb", label: "B flat major", tonic: "B", signature: [{ type: "flat", step: 4 }, { type: "flat", step: 7 }], scale: ["B", "C", "D", "E", "F", "G", "A"] },

const RHYTHM_OPTIONS = [

const LEVELS = {

  N5: {

    timeSignatureIds: ["2/4", "3/4", "4/4", "6/8", "9/8", "12/8"],

  AH: {

    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve", "quaver", "semiquaver", "dotted-crotchet", "dotted-quaver", "rests", "syncopation", "time-changes"],
    timeSignatureIds: ["2/4", "3/4", "4/4", "5/4", "6/8", "9/8", "12/8"],
    keyIds: ["C", "G", "F", "Am", "D", "Bb", "Em", "Dm"],

};

const SIMPLE_PATTERNS_BY_LENGTH = {
  2: [
    ["minim"], ["crotchet", "crotchet"], ["quaver", "quaver", "crotchet"],
    ["crotchet", "quaver", "quaver"], ["quaver", "quaver", "quaver", "quaver"],
    ["dotted-crotchet", "quaver"], ["quaver", "dotted-crotchet"],
    ["semiquaver-group-4", "crotchet"], ["quaver-2semiquavers", "crotchet"],
    ["2semiquavers-quaver", "crotchet"], ["dotted-quaver-semiquaver", "crotchet"],
  ],
  3: [
    ["dotted-minim"], ["minim", "crotchet"], ["crotchet", "minim"],
    ["crotchet", "crotchet", "crotchet"], ["quaver", "quaver", "crotchet", "crotchet"],
    ["crotchet", "quaver", "quaver", "crotchet"], ["crotchet", "crotchet", "quaver", "quaver"],
    ["quaver", "quaver", "quaver", "quaver", "crotchet"], ["crotchet", "quaver", "quaver", "quaver", "quaver"],
    ["semiquaver-group-4", "crotchet", "crotchet"], ["crotchet", "quaver-2semiquavers", "crotchet"],

  ],
  4: [
    ["minim", "minim"], ["minim", "crotchet", "crotchet"], ["crotchet", "crotchet", "minim"],
    ["crotchet", "crotchet", "crotchet", "crotchet"], ["quaver", "quaver", "crotchet", "crotchet", "crotchet"],
    ["crotchet", "quaver", "quaver", "crotchet", "crotchet"], ["crotchet", "crotchet", "quaver", "quaver", "crotchet"],
    ["crotchet", "crotchet", "crotchet", "quaver", "quaver"], ["quaver", "quaver", "quaver", "quaver", "minim"],
    ["minim", "quaver", "quaver", "quaver", "quaver"], ["quaver", "quaver", "quaver", "quaver", "quaver", "quaver", "quaver", "quaver"],
    ["semiquaver-group-4", "crotchet", "crotchet", "crotchet"], ["crotchet", "quaver-2semiquavers", "crotchet", "crotchet"],
    ["crotchet", "crotchet", "2semiquavers-quaver", "crotchet"], ["crotchet", "crotchet", "crotchet", "dotted-quaver-semiquaver"],

  5: [

    ["crotchet", "minim", "minim"], ["crotchet", "crotchet", "crotchet", "crotchet", "crotchet"],
    ["dotted-crotchet", "quaver", "minim", "crotchet"], ["crotchet", "dotted-crotchet", "quaver", "minim"],
    ["quaver", "quaver", "crotchet", "crotchet", "minim"], ["semiquaver-group-4", "crotchet", "crotchet", "minim"],
    ["syncopated-crotchets", "minim", "crotchet"], ["minim", "syncopated-crotchets", "crotchet"],
  ],
};

const RHYTHM_INFO = {
  semibreve: { beats: 4, spacing: 8, open: true, stem: false, dots: 0 },
  "dotted-minim": { beats: 3, spacing: 6, open: true, stem: true, dots: 1 },
  minim: { beats: 2, spacing: 4, open: true, stem: true, dots: 0 },
  "dotted-crotchet": { beats: 1.5, spacing: 3, open: false, stem: true, dots: 1 },
  crotchet: { beats: 1, spacing: 2.2, open: false, stem: true, dots: 0 },
  quaver: { beats: 0.5, spacing: 1.15, open: false, stem: true, dots: 0, flag: true, beams: 1 },
  "dotted-quaver": { beats: 0.75, spacing: 1.5, open: false, stem: true, dots: 1, flag: true, beams: 1 },
  semiquaver: { beats: 0.25, spacing: 0.72, open: false, stem: true, dots: 0, flag: true, beams: 2 },
  "quaver-rest": { beats: 0.5, spacing: 1.15, rest: true },
  "crotchet-rest": { beats: 1, spacing: 2.2, rest: true },
  "dotted-crotchet-rest": { beats: 1.5, spacing: 3, rest: true },
};

function randomIndex(length) { return Math.floor(Math.random() * length); }
function randomItem(items) { return items[randomIndex(items.length)]; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function rhythmInfo(rhythm) { return RHYTHM_INFO[rhythm] ?? RHYTHM_INFO.crotchet; }
function noteByIndex(index) { return NOTES[clamp(index, 0, NOTES.length - 1)]; }
function yForStep(step, systemTop) { return systemTop + LINE_GAP * 4 - step * (LINE_GAP / 2); }
function stemGoesDown(step) { return step > 4; }

function initialLevelFromUrl() {
  const requested = new URLSearchParams(window.location.search).get("level") || "N3";
  return LEVELS[requested] ? requested : "N3";
}

function levelEnabledMap(levelKey) {
  const level = LEVELS[levelKey] || LEVELS.N3;
  const enabled = {};
  level.rhythmIds.forEach((id) => { enabled[id] = true; });
  level.timeSignatureIds.forEach((id) => { enabled[`time-${id}`] = true; });
  level.keyIds.forEach((id) => { enabled[`key-${id}`] = true; });
  return enabled;
}

function enabledMapMatchesLevel(levelKey, enabledRhythms) {
  const official = levelEnabledMap(levelKey);
  const keys = new Set([...Object.keys(official), ...Object.keys(enabledRhythms)]);
  return [...keys].every(key => Boolean(enabledRhythms[key]) === Boolean(official[key]));
}

function taskMatchesLevel(levelKey, enabledRhythms, restsEnabled) {
  const officialRests = LEVELS[levelKey].rhythmIds.includes("rests");
  return enabledMapMatchesLevel(levelKey, enabledRhythms) && restsEnabled === officialRests;
}

function sharedProfileFromUrl() {
  const encoded = new URLSearchParams(window.location.search).get("profile");
  if (!encoded) return null;
  try {
    const profile = JSON.parse(atob(encoded));
    if (profile.version !== 1 || !LEVELS[profile.level] || !profile.enabledRhythms) return null;
    const enabledRhythms = { ...levelEnabledMap(profile.level) };
    Object.keys(enabledRhythms).forEach((key) => { if (typeof profile.enabledRhythms[key] === "boolean") enabledRhythms[key] = profile.enabledRhythms[key]; });
    return { level: profile.level, enabledRhythms, restsEnabled: Boolean(profile.restsEnabled), showRhythmGuide: Boolean(profile.showRhythmGuide) };
  } catch { return null; }
}

function encodedSharedProfile(level, enabledRhythms, restsEnabled, showRhythmGuide) {
  return btoa(JSON.stringify({ version: 1, level, enabledRhythms, restsEnabled, showRhythmGuide }));
}

function activeKeyIds(enabledRhythms, level) {
  return level.keyIds.filter((id) => enabledRhythms[`key-${id}`]);
}

function randomKey(level, enabledRhythms) {
  const ids = activeKeyIds(enabledRhythms, level);
  return KEYS[randomItem(ids.length ? ids : level.keyIds)] || KEYS.C;
}

function applyKeyAccidental(note, key) {
  if (key?.id === "Am" && note.letter === "G") return { ...note, writtenAccidental: 1, impliedAccidental: 1 };
  return { ...note, writtenAccidental: null, impliedAccidental: null };
}

function normaliseAminorAccidentals(bars, key) {
  if (key?.id !== "Am") return;
  bars.forEach((bar) => {
    let hasShownGSharp = false;
    bar.notes.forEach((note) => {
      if (rhythmInfo(note.rhythm).rest || note.pitch?.letter !== "G") return;
      note.pitch = {
        ...note.pitch,
        impliedAccidental: 1,
        writtenAccidental: hasShownGSharp ? null : 1,
      };
      hasShownGSharp = true;
    });
  });
}

function tonicNoteForKey(key, referenceStep = null) {
  const tonicNotes = NOTES.filter((note) => note.letter === key.tonic);
  const source = tonicNotes.length ? tonicNotes : [NOTES[0]];
  const chosen = referenceStep === null || referenceStep === undefined
    ? source[Math.floor((source.length - 1) / 2)]
    : source.reduce((best, note) => Math.abs(note.step - referenceStep) < Math.abs(best.step - referenceStep) ? note : best, source[0]);
  return applyKeyAccidental(chosen, key);
}

function forceTonicEndpoints(bars, key) {
  const soundingNotes = bars.flatMap((bar) => bar.notes).filter((note) => !rhythmInfo(note.rhythm).rest);
  if (!soundingNotes.length) return;
  const secondStep = soundingNotes[1]?.pitch?.step;
  const penultimateStep = soundingNotes[soundingNotes.length - 2]?.pitch?.step;
  soundingNotes[0].pitch = tonicNoteForKey(key, secondStep);
  soundingNotes[soundingNotes.length - 1].pitch = tonicNoteForKey(key, penultimateStep);
}

function removeLargeLeaps(bars, key) {
  const soundingNotes = bars.flatMap((bar) => bar.notes).filter((note) => !rhythmInfo(note.rhythm).rest);
  for (let index = 1; index < soundingNotes.length; index += 1) {
    const previous = soundingNotes[index - 1].pitch;
    const current = soundingNotes[index].pitch;
    if (Math.abs(current.step - previous.step) <= 7) continue;
    const sameLetterNotes = NOTES.filter((note) => note.letter === current.letter);
    const replacement = sameLetterNotes.reduce((best, note) => Math.abs(note.step - previous.step) < Math.abs(best.step - previous.step) ? note : best, sameLetterNotes[0] || current);
    soundingNotes[index].pitch = applyKeyAccidental(replacement, key);
  }
}

function fastRhythmMovesByStep(rhythm) {
  return ["quaver", "dotted-quaver", "semiquaver"].includes(rhythm);
}

function noteByStep(step) {
  return NOTES.find((note) => note.step === step) || null;
}

function stepPitchNear(referenceStep, targetStep, key) {
  const direction = targetStep >= referenceStep ? 1 : -1;
  const preferred = noteByStep(referenceStep + direction);
  const fallback = noteByStep(referenceStep - direction);
  return applyKeyAccidental(preferred || fallback || noteByIndex(Math.floor(NOTES.length / 2)), key);
}

function enforceFastRhythmStepwiseMotion(bars, key) {
  const soundingNotes = bars.flatMap((bar) => bar.notes).filter((note) => !rhythmInfo(note.rhythm).rest);
  for (let index = 1; index < soundingNotes.length; index += 1) {
    const previous = soundingNotes[index - 1];
    const current = soundingNotes[index];
    if (!fastRhythmMovesByStep(previous.rhythm) && !fastRhythmMovesByStep(current.rhythm)) continue;
    if (Math.abs(current.pitch.step - previous.pitch.step) <= 1) continue;
    if (index === soundingNotes.length - 1 && index > 1) {
      previous.pitch = stepPitchNear(current.pitch.step, previous.pitch.step, key);
    } else {
      current.pitch = stepPitchNear(previous.pitch.step, current.pitch.step, key);
    }
  }
}

function expandRhythmToken(token) {
  if (token === "syncopated-crotchets") return ["quaver", "crotchet", "quaver"];
  if (token === "quaver-group-3") return ["quaver", "quaver", "quaver"];
  if (token === "semiquaver-group-4") return ["semiquaver", "semiquaver", "semiquaver", "semiquaver"];
  if (token === "quaver-2semiquavers") return ["quaver", "semiquaver", "semiquaver"];
  if (token === "2semiquavers-quaver") return ["semiquaver", "semiquaver", "quaver"];
  if (token === "dotted-quaver-semiquaver") return ["dotted-quaver", "semiquaver"];
  if (token === "crotchet-quaver") return ["crotchet", "quaver"];
  if (token === "quaver-crotchet") return ["quaver", "crotchet"];
  return [token];
}

function rhythmAllowed(rhythm, enabledRhythms, restsEnabled) {
  if (rhythmInfo(rhythm).rest) {
    if (!restsEnabled || !enabledRhythms.rests) return false;
    if (rhythm === "dotted-crotchet-rest") return !!enabledRhythms["dotted-crotchet"];
    if (rhythm === "crotchet-rest") return !!enabledRhythms.crotchet;
    if (rhythm === "quaver-rest") return !!enabledRhythms.quaver;
    return true;
  }
  if (rhythm === "dotted-quaver") return !!enabledRhythms["dotted-quaver"];
  return !!enabledRhythms[rhythm];
}

function tokenAllowed(token, enabledRhythms, restsEnabled) {
  if (token === "syncopated-crotchets") return !!enabledRhythms.syncopation && !!enabledRhythms.quaver && !!enabledRhythms.crotchet;
  return expandRhythmToken(token).every((rhythm) => rhythmAllowed(rhythm, enabledRhythms, restsEnabled));
}

function patternAllowed(pattern, enabledRhythms, restsEnabled) {
  return pattern.every((token) => tokenAllowed(token, enabledRhythms, restsEnabled));
}

function patternUsesSemiquavers(pattern) {
  return pattern.some((token) => expandRhythmToken(token).some((rhythm) => rhythm === "semiquaver"));
}

function signatureAllowsSemiquavers(signature) {
  return !["9/8", "12/8"].includes(signature?.id);
}

function patternAllowedForSignature(pattern, signature, enabledRhythms, restsEnabled) {
  if (!signatureAllowsSemiquavers(signature) && patternUsesSemiquavers(pattern)) return false;
  return patternAllowed(pattern, enabledRhythms, restsEnabled);
}

function levelAllowsFourSemiquaverGroups(activeLevel) {
  return !["H", "AH"].includes(activeLevel);
}

const COMPOUND_GROUP_PATTERNS = [["dotted-crotchet"], ["quaver-group-3"], ["crotchet-quaver"], ["quaver-crotchet"]];

function signatureCanBeGenerated(signature, enabledRhythms, restsEnabled) {
  if (!enabledRhythms[`time-${signature.id}`]) return false;
  if (signature.type === "simple") {
    return (SIMPLE_PATTERNS_BY_LENGTH[signature.beatsPerBar] || []).some((pattern) => patternAllowedForSignature(pattern, signature, enabledRhythms, restsEnabled));
  }
  return COMPOUND_GROUP_PATTERNS.some((pattern) => patternAllowedForSignature(pattern, signature, enabledRhythms, restsEnabled));
}

function hasGeneratableTimeSignature(level, enabledRhythms, restsEnabled) {
  const selectedSignatures = TIME_SIGNATURES.filter((signature) => level.timeSignatureIds.includes(signature.id) && enabledRhythms[`time-${signature.id}`]);
  return selectedSignatures.length > 0 && selectedSignatures.every((signature) => signatureCanBeGenerated(signature, enabledRhythms, restsEnabled));
}

function nearestMelodicIndex(previousIndex, stepwiseNoRepeat = false) {
  if (!stepwiseNoRepeat) return clamp(previousIndex + randomItem([-2, -1, 0, 0, 1, 2]), 0, NOTES.length - 1);
  if (previousIndex <= 0) return 1;
  if (previousIndex >= NOTES.length - 1) return NOTES.length - 2;
  return previousIndex + randomItem([-1, 1]);
}

function makeCompoundRhythms(timeSignature, barIndex, restsEnabled = true, enabledRhythms = levelEnabledMap("H"), totalBars = BAR_COUNT) {
  if (barIndex === totalBars - 1 && timeSignature.id === "6/8" && patternAllowedForSignature(["dotted-minim"], timeSignature, enabledRhythms, restsEnabled) && Math.random() < 0.45) return ["dotted-minim"];
  const basePatterns = COMPOUND_GROUP_PATTERNS.filter((pattern) => patternAllowedForSignature(pattern, timeSignature, enabledRhythms, restsEnabled));
  const basePattern = basePatterns.length ? randomItem(basePatterns)[0] : "dotted-crotchet";
  const groups = Array.from({ length: timeSignature.compoundGroups }, () => basePattern);
  if (restsEnabled && patternAllowedForSignature(["dotted-crotchet-rest"], timeSignature, enabledRhythms, restsEnabled) && Math.random() < 0.22) groups[randomIndex(groups.length)] = "dotted-crotchet-rest";
  if (patternAllowedForSignature(["quaver-group-3"], timeSignature, enabledRhythms, restsEnabled) && Math.random() < 0.5) {
    const available = groups.map((group, index) => ({ group, index })).filter((item) => item.group === "dotted-crotchet");
    if (available.length) groups[randomItem(available).index] = "quaver-group-3";
  }
  if ((patternAllowedForSignature(["crotchet-quaver"], timeSignature, enabledRhythms, restsEnabled) || patternAllowedForSignature(["quaver-crotchet"], timeSignature, enabledRhythms, restsEnabled)) && Math.random() < 0.4) {
    const available = groups.map((group, index) => ({ group, index })).filter((item) => item.group === "dotted-crotchet");
    if (available.length) {
      const options = ["crotchet-quaver", "quaver-crotchet"].filter((token) => patternAllowedForSignature([token], timeSignature, enabledRhythms, restsEnabled));
      if (options.length) groups[randomItem(available).index] = randomItem(options);
    }
  }
  return groups;
}

function applyRareSimpleRests(pattern, restsEnabled = true) {
  if (!restsEnabled) return pattern;
  if (Math.random() > 0.35 || pattern.some((rhythm) => rhythm.includes("semiquaver"))) return pattern;
  const result = [...pattern];
  const crotchetIndexes = result.map((rhythm, index) => rhythm === "crotchet" ? index : -1).filter((index) => index >= 0);
  if (crotchetIndexes.length && Math.random() < 0.6) {
    result[randomItem(crotchetIndexes)] = "crotchet-rest";
    return result;
  }
  for (let index = 0; index <= result.length - 2; index += 1) {
    if (result[index] === "quaver" && result[index + 1] === "quaver") {
      result[index + randomIndex(2)] = "quaver-rest";
      return result;
    }
  }
  return result;
}

function makeSimpleRhythms(timeSignature, barIndex, restsEnabled = true, enabledRhythms = levelEnabledMap("N3"), totalBars = BAR_COUNT, activeLevel = "N3") {
  const patterns = (SIMPLE_PATTERNS_BY_LENGTH[timeSignature.beatsPerBar] ?? [["crotchet"]])
    .filter((pattern) => patternAllowedForSignature(pattern, timeSignature, enabledRhythms, restsEnabled))
    .filter((pattern) => levelAllowsFourSemiquaverGroups(activeLevel) || !pattern.includes("semiquaver-group-4"));
  const safePatterns = patterns.length ? patterns : [["crotchet"]];
  const semiquaverPatterns = patterns.filter((pattern) => pattern.some((rhythm) => rhythm.includes("semiquaver")));
  const regularPatterns = safePatterns.filter((pattern) => !pattern.some((rhythm) => rhythm.includes("semiquaver")));
  const pool = semiquaverPatterns.length && Math.random() < 0.16 ? semiquaverPatterns : regularPatterns;
  const finalPool = timeSignature.beatsPerBar === 4 && barIndex === totalBars - 1 && patternAllowedForSignature(["semibreve"], timeSignature, enabledRhythms, restsEnabled) ? [["semibreve"], ...pool] : pool;
  const chosen = randomItem(finalPool.length ? finalPool : safePatterns);
  return applyRareSimpleRests(chosen, restsEnabled);
}

function makeBarRhythms(timeSignature, barIndex, restsEnabled = true, enabledRhythms = levelEnabledMap("N3"), totalBars = BAR_COUNT, activeLevel = "N3") {
  return timeSignature.type === "compound" ? makeCompoundRhythms(timeSignature, barIndex, restsEnabled, enabledRhythms, totalBars) : makeSimpleRhythms(timeSignature, barIndex, restsEnabled, enabledRhythms, totalBars, activeLevel);
}

function makeBar(timeSignature, previousIndex, barIndex, restsEnabled = true, enabledRhythms = levelEnabledMap("N3"), key = KEYS.C, totalBars = BAR_COUNT, activeLevel = "N3") {
  const rhythms = makeBarRhythms(timeSignature, barIndex, restsEnabled, enabledRhythms, totalBars, activeLevel);
  const notes = [];
  let noteIndex = previousIndex;
  let beamGroupCounter = 0;

  function addNote(rhythm, beamGroupId = undefined, stepwise = false) {
    if (rhythmInfo(rhythm).rest) {
      notes.push({ rhythm, pitch: noteByIndex(noteIndex), beamGroupId: null });
      return;
    }
    noteIndex = nearestMelodicIndex(noteIndex, stepwise);
    let pitch = noteByIndex(noteIndex);
    if (key?.scale?.length) {
      let attempts = 0;
      while (!key.scale.includes(pitch.letter) && attempts < 8) {
        noteIndex = nearestMelodicIndex(noteIndex, stepwise);
        pitch = noteByIndex(noteIndex);
        attempts += 1;
      }
    }
    notes.push({ rhythm, pitch: applyKeyAccidental(pitch, key), beamGroupId });
  }

  function addBeamedGroup(rhythmList) {
    const beamGroupId = `beam-${beamGroupCounter}`;
    beamGroupCounter += 1;
    rhythmList.forEach((rhythm) => addNote(rhythm, beamGroupId, ["quaver", "semiquaver", "dotted-quaver"].includes(rhythm)));
  }

  rhythms.forEach((rhythm) => {
    if (rhythm === "syncopated-crotchets") { addNote("quaver", null, true); addNote("crotchet"); addNote("quaver", null, true); return; }
    if (rhythm === "quaver-group-3") return addBeamedGroup(["quaver", "quaver", "quaver"]);
    if (rhythm === "semiquaver-group-4") return addBeamedGroup(["semiquaver", "semiquaver", "semiquaver", "semiquaver"]);
    if (rhythm === "quaver-2semiquavers") return addBeamedGroup(["quaver", "semiquaver", "semiquaver"]);
    if (rhythm === "2semiquavers-quaver") return addBeamedGroup(["semiquaver", "semiquaver", "quaver"]);
    if (rhythm === "dotted-quaver-semiquaver") return addBeamedGroup(["dotted-quaver", "semiquaver"]);
    if (rhythm === "crotchet-quaver") { addNote("crotchet"); addNote("quaver", null, true); return; }
    if (rhythm === "quaver-crotchet") { addNote("quaver", null, true); addNote("crotchet"); return; }
    addNote(rhythm, undefined, rhythm === "quaver");
  });

  return { notes, nextIndex: noteIndex };
}

function availableTimeSignatures(level, enabledRhythms, restsEnabled = false) {
  return TIME_SIGNATURES.filter((signature) => level.timeSignatureIds.includes(signature.id) && signatureCanBeGenerated(signature, enabledRhythms, restsEnabled));
}

function finishQuestion({ activeLevel, key, timeSignature, bars, questionType = "identify", givenTimeSignature = null, prompt = "Identify the time signature." }) {
  forceTonicEndpoints(bars, key);
  removeLargeLeaps(bars, key);
  enforceFastRhythmStepwiseMotion(bars, key);
  normaliseAminorAccidentals(bars, key);
  return { id: Math.random().toString(36).slice(2), activeLevel, questionType, key, timeSignature, givenTimeSignature, prompt, bars };
}

function makeTimeChangeQuestion(activeLevel, enabledRhythms, restsEnabled, level, key) {
  const signatures = availableTimeSignatures(level, enabledRhythms, restsEnabled);
  const safeSignatures = signatures.length ? signatures : TIME_SIGNATURES.filter((signature) => level.timeSignatureIds.includes(signature.id));
  if (safeSignatures.length < 2) return null;
  const givenTimeSignature = randomItem(safeSignatures);
  const answerPool = safeSignatures.filter((signature) => signature.id !== givenTimeSignature.id);
  const timeSignature = randomItem(answerPool);
  const bars = [];
  let previousIndex = randomIndex(NOTES.length);
  for (let index = 0; index < BAR_COUNT; index += 1) {
    const barTimeSignature = index < BARS_PER_SYSTEM ? givenTimeSignature : timeSignature;
    const bar = makeBar(barTimeSignature, previousIndex, index, restsEnabled, enabledRhythms, key, BAR_COUNT, activeLevel);
    bars.push(bar);
    previousIndex = bar.nextIndex;
  }
  return finishQuestion({
    activeLevel,
    key,
    timeSignature,
    givenTimeSignature,
    bars,
    questionType: "time-change",
    prompt: "Identify the time change by inserting the time signature in bar 5.",
  });
}

function makeQuestion(activeLevel = "N3", enabledRhythms = levelEnabledMap("N3"), restsEnabled = false) {
  const level = LEVELS[activeLevel] || LEVELS.N3;
  const key = randomKey(level, enabledRhythms);
  if (activeLevel === "AH" && enabledRhythms["time-changes"] && Math.random() < 0.3) {
    const timeChangeQuestion = makeTimeChangeQuestion(activeLevel, enabledRhythms, restsEnabled, level, key);
    if (timeChangeQuestion) return timeChangeQuestion;
  }
  const availableSignatures = availableTimeSignatures(level, enabledRhythms, restsEnabled);
  const fallbackEnabled = levelEnabledMap(activeLevel);
  const fallbackRestsEnabled = level.rhythmIds.includes("rests");
  const fallbackSignatures = TIME_SIGNATURES.filter((signature) => level.timeSignatureIds.includes(signature.id) && signatureCanBeGenerated(signature, fallbackEnabled, fallbackRestsEnabled));
  const useFallbackSettings = availableSignatures.length === 0;
  const questionEnabledRhythms = useFallbackSettings ? fallbackEnabled : enabledRhythms;
  const questionRestsEnabled = useFallbackSettings ? fallbackRestsEnabled : restsEnabled;
  const timeSignature = randomItem(useFallbackSettings ? fallbackSignatures : availableSignatures);
  const barCount = barCountForSignature(timeSignature);
  const bars = [];
  let previousIndex = randomIndex(NOTES.length);
  for (let index = 0; index < barCount; index += 1) {
    const bar = makeBar(timeSignature, previousIndex, index, questionRestsEnabled, questionEnabledRhythms, key, barCount, activeLevel);
    bars.push(bar);
    previousIndex = bar.nextIndex;
  }
  return finishQuestion({ activeLevel, key, timeSignature, bars });
}

const playFeedbackSound = (...args) => window.MLH?.playFeedbackSound?.(...args);
const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS || {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG || { drawing: {}, symbols: {} };

const TIME_SIGNATURE_SYMBOLS = {
  "2/4": { top: ["timeSig2"], bottom: ["timeSig4"], key: "timeSig24" },
  "3/4": { top: ["timeSig3"], bottom: ["timeSig4"], key: "timeSig34" },
  "4/4": { top: ["timeSig4"], bottom: ["timeSig4"], key: "timeSig44" },
  "5/4": { top: ["timeSig5"], bottom: ["timeSig4"], key: "timeSig54" },
  "6/8": { top: ["timeSig6"], bottom: ["timeSig8"], key: "timeSig68" },
  "9/8": { top: ["timeSig9"], bottom: ["timeSig8"], key: "timeSig98" },
  "12/8": { top: ["timeSig1", "timeSig2"], bottom: ["timeSig8"], key: "timeSig128" },
};

function sharedActualSymbolKey(key) {
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  if (key === "sharpKeySignature" || key === "sharpInScore") return "sharp";
  if (key === "flatKeySignature" || key === "flatInScore") return "flat";
  return key;
}

function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols || {};
  return symbols[key] || symbols[sharedActualSymbolKey(key)] || {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}

function sharedSymbolForKey(key) {
  return SHARED_SYMBOLS[sharedActualSymbolKey(key)] || "";
}

function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", opacity = 1, lineGap = LINE_GAP, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
  return (
    <text
      className="music-symbol"
      x={adjustedX}
      y={adjustedY}
      fill={colour}
      opacity={opacity}
      fontSize={fontSize}
      textAnchor="middle"
      transform={`translate(${adjustedX} ${adjustedY}) scale(${settings.widthScale || 1} ${settings.heightScale || 1}) translate(${-adjustedX} ${-adjustedY})`}
      pointerEvents="none"
    >
      {glyph}
    </text>
  );
}

function StaffLines({ systemTop }) {
  return <g>{[0, 1, 2, 3, 4].map((index) => <line key={index} x1={STAFF_LEFT} x2={STAFF_RIGHT} y1={systemTop + index * LINE_GAP} y2={systemTop + index * LINE_GAP} stroke="currentColor" strokeWidth="1.2" />)}</g>;
}

function TrebleClef({ systemTop }) {
  return <CalibratedSymbol symbolKey="gClef" x={CLEF_X + LINE_GAP * 2.3} y={yForStep(2, systemTop)} />;
}

function KeySignature({ keySignature, systemTop }) {
  return (
    <g>
      {(keySignature?.signature || []).map((item, index) => (
        <CalibratedSymbol
          key={`${item.type}-${index}`}
          symbolKey={item.type === "sharp" ? "sharpKeySignature" : "flatKeySignature"}
          x={KEY_SIGNATURE_X + index * KEY_SIGNATURE_SPACING}
          y={yForStep(item.step, systemTop)}
        />
      ))}
    </g>
  );
}

function TimeSignatureGlyph({ signature, x, systemTop, colour = "currentColor" }) {
  const definition = TIME_SIGNATURE_SYMBOLS[signature.id] || { top: [`timeSig${signature.top}`], bottom: [`timeSig${signature.bottom}`], key: `timeSig${signature.top}${signature.bottom}` };
  const settings = sharedSymbolConfig(definition.key);
  const anchorY = yForStep(5.3, systemTop);
  const adjustedX = x + LINE_GAP * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = anchorY + LINE_GAP * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = LINE_GAP * Number(settings.fontSizeScale || 3.5);
  const topText = definition.top.map((key) => sharedSymbolForKey(key)).join("");
  const bottomText = definition.bottom.map((key) => sharedSymbolForKey(key)).join("");
  return (
    <g transform={`translate(${adjustedX} ${adjustedY}) scale(${settings.widthScale || 1} ${settings.heightScale || 1}) translate(${-adjustedX} ${-adjustedY})`} fill={colour} pointerEvents="none">
      <text className="music-symbol" x={adjustedX} y={adjustedY - fontSize * 0.14} fontSize={fontSize} textAnchor="middle">{topText}</text>
      <text className="music-symbol" x={adjustedX} y={adjustedY + fontSize * 0.43} fontSize={fontSize} textAnchor="middle">{bottomText}</text>
    </g>
  );
}

function TimeSignaturePlaceholder({ signature, x, systemTop }) {
  const definition = TIME_SIGNATURE_SYMBOLS[signature.id] || { key: `timeSig${signature.top}${signature.bottom}` };
  const settings = sharedSymbolConfig(definition.key);
  const adjustedX = x + LINE_GAP * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  return (
    <rect
      x={adjustedX - 20}
      y={systemTop - 6}
      width="40"
      height={LINE_GAP * 4 + 17}
      rx="7"
      ry="7"
      fill="none"
      stroke="#78716c"
      strokeWidth="1.6"
    />
  );
}

function Accidental({ value, x, y, colour = "currentColor" }) {
  if (!value) return null;
  return <CalibratedSymbol symbolKey={value > 0 ? "sharpInScore" : "flatInScore"} x={x} y={y} colour={colour} />;
}

function LedgerLines({ x, step, systemTop, colour = "currentColor" }) {
  const lines = [];
  for (let ledgerStep = -2; ledgerStep >= step; ledgerStep -= 2) lines.push(yForStep(ledgerStep, systemTop));
  for (let ledgerStep = 10; ledgerStep <= step; ledgerStep += 2) lines.push(yForStep(ledgerStep, systemTop));
  const settings = sharedSymbolConfig("ledgerLines");
  const xOffset = LINE_GAP * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const yOffset = LINE_GAP * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const halfWidth = (LINE_GAP * Number(SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4) * Number(settings.widthScale || 1)) / 2;
  const thickness = Math.max(1, LINE_GAP * Number(SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11) * Number(settings.heightScale || 1));
  return <g>{lines.map((lineY) => <line key={lineY} x1={x - halfWidth + xOffset} x2={x + halfWidth + xOffset} y1={lineY + yOffset} y2={lineY + yOffset} stroke={colour} strokeWidth={thickness} />)}</g>;
}

function Rest({ rhythm, x, systemTop, colour = "currentColor" }) {
  const middleY = yForStep(4, systemTop);
  const restKey = rhythm === "dotted-crotchet-rest" || rhythm === "crotchet-rest" ? "quarterRest" : "eighthRest";
  return (
    <g>
      <CalibratedSymbol symbolKey={restKey} x={x} y={middleY} colour={colour} />
      {rhythm === "dotted-crotchet-rest" && <CalibratedSymbol symbolKey="augmentationDotSpace" x={x + LINE_GAP * 1.1} y={middleY - LINE_GAP * 0.4} colour={colour} />}
    </g>
  );
}

function getStemData(item, x, systemTop, stemDownOverride = null) {
  const step = item.pitch.step;
  const y = yForStep(step, systemTop);
  const stemDown = stemDownOverride ?? stemGoesDown(step);
  const stemX = stemDown ? x - NOTE_RX + 0 : x + NOTE_RX + 0;
  const stemEndY = stemDown ? y + STEM_LENGTH : y - STEM_LENGTH;
  return { step, y, stemDown, stemX, stemEndY };
}

function noteSymbolKey(rhythm, stemDown, beamed = false) {
  if (rhythm === "semibreve") return "wholeNote";
  if (rhythm === "minim" || rhythm === "dotted-minim") return stemDown ? "halfNoteStemDown" : "halfNoteStemUp";
  if (beamed) return stemDown ? "noteheadBlackStemDown" : "noteheadBlackStemUp";
  if (rhythm === "quaver" || rhythm === "dotted-quaver") return stemDown ? "eighthNoteStemDown" : "eighthNoteStemUp";
  if (rhythm === "semiquaver") return stemDown ? "sixteenthNoteStemDown" : "sixteenthNoteStemUp";
  return stemDown ? "quarterNoteStemDown" : "quarterNoteStemUp";
}

function Note({ item, x, systemTop, colour = "currentColor", stemDownOverride = null, forcedStemEndY = null, showFlag = true }) {
  const info = rhythmInfo(item.rhythm);
  if (info.rest) return <Rest rhythm={item.rhythm} x={x} systemTop={systemTop} colour={colour} />;
  const stem = getStemData(item, x, systemTop, stemDownOverride);
  const stemEndY = forcedStemEndY ?? stem.stemEndY;
  const beamed = showFlag === false;
  const dotKey = Math.abs(stem.step % 2) === 1 ? "augmentationDotSpace" : "augmentationDotLine";
  const dotY = Math.abs(stem.step % 2) === 1 ? stem.y : stem.y - LINE_GAP * 0.25;
  const stemThickness = Math.max(1, LINE_GAP * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12));
  return (
    <g>
      <LedgerLines x={x} step={stem.step} systemTop={systemTop} colour={colour} />
      <Accidental value={item.pitch.writtenAccidental} x={x - LINE_GAP * 2} y={stem.y} colour={colour} />
      <CalibratedSymbol symbolKey={noteSymbolKey(item.rhythm, stem.stemDown, beamed)} x={x} y={stem.y} colour={colour} />
      {beamed && info.stem && <line x1={stem.stemX} x2={stem.stemX} y1={stem.y} y2={stemEndY} stroke={colour} strokeWidth={stemThickness} />}
      {info.dots === 1 && <CalibratedSymbol symbolKey={dotKey} x={x + LINE_GAP * 1.3} y={dotY} colour={colour} />}
    </g>
  );
}

function getBarNotePositions(notes, startX, endX) {
  const totalUnits = notes.reduce((total, note) => total + rhythmInfo(note.rhythm).spacing, 0);
  const unitWidth = Math.max(1, endX - startX) / Math.max(1, totalUnits);
  let cursor = startX + unitWidth * 0.35;
  return notes.map((note) => {
    const x = cursor;
    cursor += rhythmInfo(note.rhythm).spacing * unitWidth;
    return x;
  });
}

function getBeamLineYAtX(x, start, end) {
  if (!start || !end || start.x === end.x) return start?.y ?? end?.y ?? 0;
  const progress = (x - start.x) / (end.x - start.x);
  return start.y + progress * (end.y - start.y);
}

function getBeamData(items, positions, systemTop) {
  const middleLineStep = 4;
  const averageStep = items.reduce((sum, item) => sum + item.pitch.step, 0) / items.length;
  let stemDown;
  if (averageStep > middleLineStep) stemDown = true;
  else if (averageStep < middleLineStep) stemDown = false;
  else stemDown = items[0].pitch.step > middleLineStep;

  const anchorStep = stemDown ? Math.max(...items.map((item) => item.pitch.step)) : Math.min(...items.map((item) => item.pitch.step));
  const anchorIndex = items.findIndex((item) => item.pitch.step === anchorStep);
  const startStem = getStemData(items[0], positions[0], systemTop, stemDown);
  const endStem = getStemData(items[items.length - 1], positions[positions.length - 1], systemTop, stemDown);
  const anchorStem = getStemData(items[anchorIndex], positions[anchorIndex], systemTop, stemDown);
  const rawSlope = (items[items.length - 1].pitch.step - items[0].pitch.step) * -2;
  const totalSlope = clamp(rawSlope, -8, 8);
  const totalX = Math.max(1, endStem.stemX - startStem.stemX);
  const slopePerX = totalSlope / totalX;

  return {
    stemDown,
    start: { x: startStem.stemX, y: anchorStem.stemEndY - slopePerX * (anchorStem.stemX - startStem.stemX) },
    end: { x: endStem.stemX, y: anchorStem.stemEndY + slopePerX * (endStem.stemX - anchorStem.stemX) },
  };
}

function isBeamableRhythm(rhythm) { return ["quaver", "semiquaver", "dotted-quaver"].includes(rhythm); }

function getQuaverGroups(notes) {
  const groups = [];
  let index = 0;
  while (index < notes.length) {
    const note = notes[index];
    if (!isBeamableRhythm(note.rhythm) || note.beamGroupId === null) { index += 1; continue; }
    const runStart = index;
    const beamGroupId = note.beamGroupId;
    if (beamGroupId === undefined) while (index < notes.length && isBeamableRhythm(notes[index].rhythm) && notes[index].beamGroupId === undefined) index += 1;
    else while (index < notes.length && isBeamableRhythm(notes[index].rhythm) && notes[index].beamGroupId === beamGroupId) index += 1;
    const runEnd = index - 1;
    if (beamGroupId !== undefined) { if (runEnd > runStart) groups.push({ start: runStart, end: runEnd }); continue; }
    let groupStart = runStart;
    while (groupStart <= runEnd) {
      const remaining = runEnd - groupStart + 1;
      const groupSize = remaining >= 4 ? 4 : remaining === 3 ? 2 : remaining;
      const groupEnd = groupStart + groupSize - 1;
      if (groupEnd > groupStart) groups.push({ start: groupStart, end: groupEnd });
      groupStart = groupEnd + 1;
    }
  }
  return groups;
}

function groupForNote(groups, noteIndex) {
  return groups.find((group) => noteIndex >= group.start && noteIndex <= group.end) ?? null;
}

function Beam({ start, end, groupNotes, groupPositions, stemDown }) {
  const secondaryOffset = stemDown ? -7 : 7;
  const secondarySegments = [];
  let segmentStart = null;
  groupNotes.forEach((note, index) => {
    const isSemiquaver = rhythmInfo(note.rhythm).beams === 2;
    const nextNote = groupNotes[index + 1];
    const nextIsSemiquaver = Boolean(nextNote && rhythmInfo(nextNote.rhythm).beams === 2);
    if (isSemiquaver && segmentStart === null) segmentStart = index;
    if (segmentStart !== null && (!nextIsSemiquaver || index === groupNotes.length - 1)) {
      secondarySegments.push({ startIndex: segmentStart, endIndex: index, isHook: index === segmentStart });
      segmentStart = null;
    }
  });

  function stemXFor(index) {
    const x = groupPositions[index];
    return stemDown ? x - NOTE_RX + 1 : x + NOTE_RX - 1;
  }

  return (
    <g>
      <line x1={start.x - 0.5} y1={start.y} x2={end.x + 0.5} y2={end.y} stroke="currentColor" strokeWidth="4" strokeLinecap="butt" />
      {secondarySegments.map((segment, index) => {
        const hookLength = 14;
        const hookGoesLeft = segment.startIndex > 0;
        const x1 = stemXFor(segment.startIndex) + (!stemDown ? 1 : 0);
        const y1 = getBeamLineYAtX(x1, start, end) + secondaryOffset;
        const x2 = segment.isHook ? x1 + (hookGoesLeft ? -hookLength : hookLength) : stemXFor(segment.endIndex) + (!stemDown ? 1 : 0);
        const y2 = segment.isHook ? y1 : getBeamLineYAtX(x2, start, end) + secondaryOffset;
        return <line key={index} x1={x1 - 0.5} y1={y1} x2={x2} y2={y2} stroke="currentColor" strokeWidth="4" strokeLinecap="butt" />;
      })}
    </g>
  );
}

function Bar({ bar, barIndex, systemTop, startX, endX, isFinalBar }) {
  const isFirstBarInSystem = barIndex === 0 || barIndex === 4;
  const firstNoteOffset = isFirstBarInSystem ? 2 : 7;
  const positions = getBarNotePositions(bar.notes, startX + firstNoteOffset + 5, endX - 6);
  const quaverGroups = getQuaverGroups(bar.notes);

  return (
    <g>
      {bar.notes.map((note, index) => {
        const group = groupForNote(quaverGroups, index);
        if (!group) return <Note key={index} item={note} x={positions[index]} systemTop={systemTop} />;
        const groupNotes = bar.notes.slice(group.start, group.end + 1);
        const groupPositions = positions.slice(group.start, group.end + 1);
        const beamData = getBeamData(groupNotes, groupPositions, systemTop);
        const stem = getStemData(note, positions[index], systemTop, beamData.stemDown);
        const forcedStemEndY = getBeamLineYAtX(stem.stemX, beamData.start, beamData.end);
        return <Note key={index} item={note} x={positions[index]} systemTop={systemTop} stemDownOverride={beamData.stemDown} forcedStemEndY={forcedStemEndY} showFlag={false} />;
      })}
      {quaverGroups.map((group, index) => {
        const groupNotes = bar.notes.slice(group.start, group.end + 1);
        const groupPositions = positions.slice(group.start, group.end + 1);
        const beamData = getBeamData(groupNotes, groupPositions, systemTop);
        return <Beam key={index} start={beamData.start} end={beamData.end} groupNotes={groupNotes} groupPositions={groupPositions} stemDown={beamData.stemDown} />;
      })}
      {isFinalBar ? (
        <g>
          <line x1={endX - 5} x2={endX - 5} y1={systemTop} y2={systemTop + LINE_GAP * 4} stroke="currentColor" strokeWidth="1.4" />
          <line x1={endX} x2={endX} y1={systemTop - 0.75} y2={systemTop + LINE_GAP * 4 + 0.75} stroke="currentColor" strokeWidth="4" />
        </g>
      ) : <line x1={endX} x2={endX} y1={systemTop} y2={systemTop + LINE_GAP * 4} stroke="currentColor" strokeWidth="1.4" />}
    </g>
  );
}

function Score({ question, feedback }) {
  const showCorrectSignature = Boolean(feedback);
  const timeSignatureX = question.activeLevel === "AH" ? TIME_SIG_X + 8 : TIME_SIG_X;
  const isTimeChangeQuestion = question.questionType === "time-change";
  const barsPerSystem = barsPerSystemForQuestion(question);
  const systemCount = Math.ceil(question.bars.length / barsPerSystem);
  return (
    <svg viewBox={`0 0 ${VIEWBOX_WIDTH} ${VIEWBOX_HEIGHT}`} className="h-auto w-full select-none overflow-visible" aria-label="Time signature exercise">
      <rect x="0" y="0" width={VIEWBOX_WIDTH} height={VIEWBOX_HEIGHT} fill="white" />
      {SYSTEM_TOPS.slice(0, systemCount).map((systemTop, systemIndex) => {
        const systemStartX = systemIndex === 0 || isTimeChangeQuestion ? FIRST_SYSTEM_MUSIC_START_X : OTHER_SYSTEM_MUSIC_START_X;
        const barWidth = (STAFF_RIGHT - systemStartX) / barsPerSystem;
        const barsOnSystem = Math.min(barsPerSystem, question.bars.length - systemIndex * barsPerSystem);
        return (
          <g key={systemIndex}>
            <StaffLines systemTop={systemTop} />
            <TrebleClef systemTop={systemTop} />
            <KeySignature keySignature={question.key} systemTop={systemTop} />
            {isTimeChangeQuestion && systemIndex === 0 && <TimeSignatureGlyph signature={question.givenTimeSignature} x={timeSignatureX} systemTop={systemTop} colour="#000" />}
            {isTimeChangeQuestion && systemIndex === 1 && <TimeSignaturePlaceholder signature={question.timeSignature} x={timeSignatureX} systemTop={systemTop} />}
            {isTimeChangeQuestion && systemIndex === 1 && showCorrectSignature && <TimeSignatureGlyph signature={question.timeSignature} x={timeSignatureX} systemTop={systemTop} colour="#000" />}
            {!isTimeChangeQuestion && systemIndex === 0 && showCorrectSignature && <TimeSignatureGlyph signature={question.timeSignature} x={timeSignatureX} systemTop={systemTop} colour="#000" />}
            {Array.from({ length: barsOnSystem }, (_, localBarIndex) => {
              const globalBarIndex = systemIndex * barsPerSystem + localBarIndex;
              const startX = systemStartX + localBarIndex * barWidth;
              const endX = systemStartX + (localBarIndex + 1) * barWidth;
              return (
                <g key={globalBarIndex}>
                  {isTimeChangeQuestion && (
                    <>
                      <rect x={startX - 8} y={systemTop - 46} width={48} height={34} fill="white" />
                      <text x={startX + 4} y={systemTop - 18} fontSize="13" fontWeight="500">{globalBarIndex + 1}</text>
                    </>
                  )}
                  <Bar bar={question.bars[globalBarIndex]} barIndex={globalBarIndex} systemTop={systemTop} startX={startX} endX={endX} isFinalBar={globalBarIndex === question.bars.length - 1} />
                </g>
              );
            })}
          </g>
        );
      })}
    </svg>
  );
}

function MenuRows({ activeLevel, enabledRhythms, setEnabledRhythms, restsEnabled, setRestsEnabled, showRhythmGuide, setShowRhythmGuide, newQuestion }) {
  const level = LEVELS[activeLevel] || LEVELS.N3;
  function toggleEnabled(id) {
    setEnabledRhythms((current) => {
      const next = { ...current, [id]: !current[id] };
      if (!hasGeneratableTimeSignature(level, next, restsEnabled)) return current;
      window.setTimeout(() => newQuestion(next, restsEnabled), 0);
      return next;
    });
  }
  function toggleRests() {
    setEnabledRhythms((current) => {
      const nextRestState = !restsEnabled;
      const next = { ...current, rests: nextRestState };
      if (!hasGeneratableTimeSignature(level, next, nextRestState)) return current;
      setRestsEnabled(nextRestState);
      window.setTimeout(() => newQuestion(next, nextRestState), 0);
      return next;
    });
  }
  return <>
    <window.MLH.MenuSubheading>Help</window.MLH.MenuSubheading>
    <window.MLH.MenuToggleRow glyph={<img src="guide.svg" alt="" aria-hidden="true" className="relative -top-px h-9 w-9 object-contain" />} label="Show Rhythm Guide" checked={showRhythmGuide} onChange={() => setShowRhythmGuide((value) => !value)} />

    <div className="grid grid-cols-2 gap-2">
      <div className="space-y-2">

            glyph={<TimeSignatureMenuGlyph signatures={[signatureId]} />}

        {level.timeSignatureIds.filter((signatureId) => TIME_SIGNATURES.find((signature) => signature.id === signatureId)?.type === "compound").map((signatureId) => (
          <IconOnlyToggleButton
            key={signatureId}
            glyph={<TimeSignatureMenuGlyph signatures={[signatureId]} />}
            label={signatureId}
            checked={enabledRhythms[`time-${signatureId}`]}
            onChange={() => toggleEnabled(`time-${signatureId}`)}
            glyphShiftY={3}
          />
        ))}
      </div>
    </div>
    <window.MLH.MenuSubheading>Rhythms</window.MLH.MenuSubheading>
    <div className="grid grid-cols-2 gap-2">
      {RHYTHM_OPTIONS.filter((rhythm) => level.rhythmIds.includes(rhythm.id) && !["rests", "syncopation", "time-changes"].includes(rhythm.id)).map((rhythm) => (
        <IconOnlyToggleButton
          key={rhythm.id}
          glyph={<MenuRhythmGlyph rhythm={rhythm.id} />}
          label={rhythm.label}

        />

      <window.MLH.MenuSubheading>Options</window.MLH.MenuSubheading>

const useClickOutside = window.MLH.useClickOutside;

function App() {
  useInjectedStyles();
  const initialProfile = useMemo(() => sharedProfileFromUrl(), []);
  const initialLevel = initialProfile?.level || initialLevelFromUrl();
  const initialEnabledRhythms = initialProfile?.enabledRhythms || levelEnabledMap(initialLevel);
  const initialRestsEnabled = initialProfile?.restsEnabled ?? LEVELS[initialLevel].rhythmIds.includes("rests");
  const [activeLevel, setActiveLevel] = useState(initialLevel);
  const [enabledRhythms, setEnabledRhythms] = useState(() => initialEnabledRhythms);
  const [restsEnabled, setRestsEnabled] = useState(initialRestsEnabled);
  const [question, setQuestion] = useState(() => makeQuestion(initialLevel, initialEnabledRhythms, initialRestsEnabled));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [levelOpen, setLevelOpen] = useState(false);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [showRhythmGuide, setShowRhythmGuide] = useState(initialProfile?.showRhythmGuide || false);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);
  const levelRef = useRef(null);
  const customiseRef = useRef(null);
  const feedbackTimersRef = useRef([]);
  const levelTaskStatusRef = useRef(null);

  useClickOutside([levelRef, customiseRef], [() => levelOpen && setLevelOpen(false), () => customiseOpen && setCustomiseOpen(false)]);

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const medalEligible = taskMatchesLevel(activeLevel, enabledRhythms, restsEnabled);
  const profileMatchesLevel = medalEligible && !showRhythmGuide;
  const displayedLevel = profileMatchesLevel ? activeLevel : "Custom";
  const displayedLevelLabel = profileMatchesLevel ? LEVELS[activeLevel].label : "Custom";
  const profileLabel = profileMatchesLevel ? LEVELS[activeLevel].label : "Custom";
  const baseProfileUrl = `https://mrtennant-music.github.io/musicliteracy/timesig.html?level=${encodeURIComponent(activeLevel)}`;
  const profileShareUrl = profileMatchesLevel ? baseProfileUrl : `${baseProfileUrl}&profile=${encodeURIComponent(encodedSharedProfile(activeLevel, enabledRhythms, restsEnabled, showRhythmGuide))}`;

  useEffect(() => {
    if (levelTaskStatusRef.current === null) {
      levelTaskStatusRef.current = medalEligible;
      return;
    }
    if (levelTaskStatusRef.current === medalEligible) return;
    levelTaskStatusRef.current = medalEligible;
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
  }, [medalEligible]);

  function clearFeedbackTimers() {
    feedbackTimersRef.current.forEach((timerId) => window.clearTimeout(timerId));
    feedbackTimersRef.current = [];
  }

  function scheduleFeedbackTimer(callback, delay) {
    const timerId = window.setTimeout(() => {
      feedbackTimersRef.current = feedbackTimersRef.current.filter((id) => id !== timerId);
      callback();
    }, delay);
    feedbackTimersRef.current.push(timerId);
  }

  function resetTask(nextQuestion = question) {
    setQuestion(nextQuestion);
    setSelectedAnswer(null);
    setFeedback(null);
    setFeedbackFading(false);
  }

  function newQuestion(nextEnabledRhythms = enabledRhythms, nextRestsEnabled = restsEnabled, nextLevel = activeLevel) {
    clearFeedbackTimers();
    setQuestionVisible(false);
    window.setTimeout(() => {
      resetTask(makeQuestion(nextLevel, nextEnabledRhythms, nextRestsEnabled));
      setQuestionVisible(true);
    }, 260);
  }

  function applyLevel(levelKey) {
    const nextEnabled = levelEnabledMap(levelKey);
    const nextRests = LEVELS[levelKey].rhythmIds.includes("rests");
    setActiveLevel(levelKey);
    setEnabledRhythms(nextEnabled);
    setRestsEnabled(nextRests);
    setShowRhythmGuide(false);
    setLevelOpen(false);
    setCustomiseOpen(false);
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion(nextEnabled, nextRests, levelKey);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion();
  }

  function fadeToNextQuestion() {
    if (!feedback || feedbackFading) return;
    clearFeedbackTimers();
    setFeedbackFading(true);
    scheduleFeedbackTimer(() => newQuestion(), 280);
  }

  function scoreAnswer(isCorrect) {
    const nextStreak = isCorrect ? streak + 1 : 0;
    playFeedbackSound(isCorrect);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });

    if (medalEligible && isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }

    if (isCorrect) {
      setFeedbackFading(false);
      scheduleFeedbackTimer(() => setFeedbackFading(true), 1700);
      scheduleFeedbackTimer(() => newQuestion(), 2000);
    }
  }

  function selectAnswer(answerId) {
    if (feedback) return;
    setSelectedAnswer(answerId);
    scoreAnswer(answerId === question.timeSignature.id);
  }

  return (
    <div className={window.MLH.shell.pageShellClass}>
      <window.MLH.AppHeader icon={ASSET.appIcon} title="Time Signatures" subtitle="Identify time signatures." profileTitle="Time Signatures" profileLabel={profileLabel} profileShareUrl={profileShareUrl}>
        <window.MLH.ScoreStreakPanel assets={ASSET} correct={correct} attempted={attempted} accuracy={accuracy} streak={streak} bestStreak={bestStreak} resetScore={resetScore} confettiKey={confettiKey} medalEligible={medalEligible} />
      </window.MLH.AppHeader>

      <div className={window.MLH.shell.pageContentClass}>
        <main className={`${window.MLH.shell.mainShellClass} flex flex-col pb-5 md:pb-6`} onPointerDown={() => { if (feedback) fadeToNextQuestion(); }}>
          <window.MLH.AppToolbar
            left={
              <div className="flex items-center gap-2">
                <div className="hub-menu-anchor relative" ref={levelRef}>
                  <window.MLH.LevelButton
                    icon={<img src={ASSET.levels} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />}
                    activeLevel={displayedLevel}
                    activeLabel={displayedLevelLabel}
                    isCustom={!profileMatchesLevel}
                    onClick={() => { setCustomiseOpen(false); setLevelOpen((value) => !value); }}
                    dataMenuTrigger={true}
                  />
                  {levelOpen && <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}>
                    <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                  </window.MLH.MenuPanel>}
                </div>
                <div className="hub-menu-anchor relative" ref={customiseRef}>
                  <window.MLH.CustomiseButton
                    icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />}
                    onClick={() => { setLevelOpen(false); setCustomiseOpen((value) => !value); }}
                    dataMenuTrigger={true}
                  />
                  {customiseOpen && <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}>
                    <MenuRows activeLevel={activeLevel} enabledRhythms={enabledRhythms} setEnabledRhythms={setEnabledRhythms} restsEnabled={restsEnabled} setRestsEnabled={setRestsEnabled} showRhythmGuide={showRhythmGuide} setShowRhythmGuide={setShowRhythmGuide} newQuestion={newQuestion} />
                  </window.MLH.MenuPanel>}
                </div>
              </div>
            }
            feedback={<FeedbackBanner feedback={feedback} fading={feedbackFading} />}
            right={<window.MLH.SkipButton resetStreak={() => setStreak(0)} onClick={() => newQuestion()} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />} />}
          />

          {showRhythmGuide && (
            <div className="relative z-[15]">
              <RhythmGuide />
            </div>
          )}

          <div className={`relative top-[12px] flex min-h-[300px] items-center overflow-hidden rounded-xl transition-opacity duration-300 md:min-h-[360px] ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <Score question={question} feedback={feedback} />
          </div>

          <div className="relative z-10 mt-auto min-h-[142px] -translate-y-[35px] -mb-[35px] overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:-mt-[50px] md:mx-3">
            <div className="space-y-3 text-stone-900">
              <p className="text-base font-semibold leading-tight">
                {question.questionType === "time-change" ? (
                  <>Identify the <strong>time change</strong> by inserting the time signature in <strong>bar 5</strong>.</>
                ) : (
                  question.prompt || "Identify the time signature."
                )}
              </p>
            </div>
            <div className="mt-3 flex flex-wrap items-center justify-between gap-3 pb-[0px]">
              <AnswerOptions activeLevel={activeLevel} selectedAnswer={selectedAnswer} disabled={Boolean(feedback)} onSelect={selectAnswer} feedback={feedback} correctAnswer={question.timeSignature.id} />
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

const rootElement = document.getElementById("root");
if (ReactDOM.createRoot) {
  ReactDOM.createRoot(rootElement).render(<App />);
} else {
  ReactDOM.render(<App />, rootElement);
}
  </script>
<script src="./footer.js?v=20260629"></script>
</body>
</html>
