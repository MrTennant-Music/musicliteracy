const rgbaFromHex = (hex, alpha) => {
  const clean = hex.replace("#", "");
  const r = parseInt(clean.slice(0, 2), 16);
  const g = parseInt(clean.slice(2, 4), 16);
  const b = parseInt(clean.slice(4, 6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
};

};

const KEY_LIBRARY = {
  "c-major": { id: "c-major", label: "C major", signature: [] },
  "a-minor": { id: "a-minor", label: "A minor", signature: [] },
  "g-major": { id: "g-major", label: "G major", signature: [{ type: "sharp", step: 8 }] },
  "f-major": { id: "f-major", label: "F major", signature: [{ type: "flat", step: 4 }] },
  "d-major": { id: "d-major", label: "D major", signature: [{ type: "sharp", step: 8 }, { type: "sharp", step: 5 }] },
  "bb-major": { id: "bb-major", label: "B flat major", signature: [{ type: "flat", step: 4 }, { type: "flat", step: 7 }] },
  "e-minor": { id: "e-minor", label: "E minor", signature: [{ type: "sharp", step: 8 }] },
  "d-minor": { id: "d-minor", label: "D minor", signature: [{ type: "flat", step: 4 }] },
};

  C4: -2,
  D4: -1,
  E4: 0,
  F4: 1,
  G4: 2,
  A4: 3,
  B4: 4,
  C5: 5,
  D5: 6,
  E5: 7,
  F5: 8,
  G5: 9,
  A5: 10,
};

const KEY_POOLS = {
  "c-major": ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "a-minor": ["G4", "G#4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "G#5", "A5"],
  "g-major": ["G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  "f-major": ["F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "d-major": ["D4", "E4", "F5", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  "bb-major": ["D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "e-minor": ["D4", "E4", "F5", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  "d-minor": ["D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
};

const TONIC_START = {
  "c-major": "C4",
  "a-minor": "A4",
  "g-major": "G4",
  "f-major": "F4",
  "d-major": "D4",
  "bb-major": "B4",
  "e-minor": "E4",
  "d-minor": "D4",
};

const RHYTHMS = {
  semibreve: { id: "semibreve", spacing: 3.2 },
  minim: { id: "minim", spacing: 2.2 },
  "dotted-crotchet": { id: "dotted-crotchet", spacing: 1.8 },
  crotchet: { id: "crotchet", spacing: 1.3 },
  quaver: { id: "quaver", spacing: 1 },
};

const STANDARD_BAR_PATTERNS = [
  ["minim", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "minim"],
  ["minim", "minim"],
  ["crotchet", "crotchet", "crotchet", "crotchet"],
  ["dotted-crotchet", "quaver", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
  ["quaver", "quaver", "quaver", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "quaver", "quaver", "crotchet"],
  ["minim", "quaver", "quaver", "quaver", "quaver"],
];

const FINAL_BAR_PATTERNS = [...STANDARD_BAR_PATTERNS, ["semibreve"]];

const SCORE_TILE_CLASS = "relative h-[58px] rounded-xl border border-stone-200 shadow-sm outline-none transition hover:-translate-y-0.5 hover:scale-[1.01] hover:brightness-105 hover:shadow-lg active:scale-[0.98] sm:h-[64px]";
const SCORE_TILE_ACTIVE_CLASS = "-translate-y-0.5 scale-[1.01] brightness-105 shadow-lg";
const TOOLBAR_BUTTON_CLASS = "flex h-10 w-[58px] items-center justify-center rounded-xl border border-stone-300 bg-white text-sm font-semibold text-stone-800 sm:h-11 sm:w-auto sm:px-2.5";
const MENU_PANEL_CLASS = "absolute top-full z-50 mt-2 inline-block w-[calc(100vw-48px)] max-w-[360px] rounded-2xl border border-stone-200 bg-white p-3 shadow-lg sm:w-fit sm:max-w-none";
const MENU_TITLE_CLASS = "relative -top-[4px] mb-1.5 flex h-[28px] items-center justify-center whitespace-nowrap px-8";
const POPOVER_ANIMATION_IN = "medalPopupIn .28s cubic-bezier(.22,1.25,.32,1)";

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function randomIndex(length) {
  return Math.floor(Math.random() * length);
}

function noteBase(note) {
  return typeof note === "string" ? note.replace("#", "") : "C5";
}

function noteStep(note) {
  return NOTE_STEPS[noteBase(note)] ?? NOTE_STEPS.C5;
}

function yForStep(step) {
  return STAFF.top + STAFF.gap * 4 - step * (STAFF.gap / 2);
}

function rhythmSpacing(id) {
  return RHYTHMS[id]?.spacing ?? RHYTHMS.crotchet.spacing;
}

function stemDown(step) {
  return step > 4;
}

function accidentalAsset(type) {
  if (type === "sharp") return ASSET.sharp;
  if (type === "flat") return ASSET.flat;
  return null;
}

function accidentalX(type, index = 0) {
  const spacing = type === "flat" ? 30 : 32;
  return (type === "flat" ? STAFF.keyX - 5 : STAFF.keyX) + index * spacing;
}

function accidentalY(type, step) {
  return type === "sharp" ? yForStep(step) - 27 : yForStep(step) - 35;
}

function accidentalDimensions(type) {
  return type === "sharp"
    ? { width: 28, height: 54 }
    : { width: 28, height: 49 };
}

function expectedBuildAccidentals(keyId) {
  return KEY_LIBRARY[keyId]?.signature || [];
}

function keySignatureMatches(placed, expected) {
  if (placed.length !== expected.length) return false;
  return expected.every((item, index) => placed[index]?.type === item.type && placed[index]?.step === item.step);
}

function readSiteTheme() {
  return localStorage.getItem(SITE_THEME_KEY) || "light";
}

function readSiteAccessibility() {
  try {
    const value = JSON.parse(localStorage.getItem(SITE_ACCESSIBILITY_KEY) || "{}");
    return value && typeof value === "object" ? value : {};
  } catch {
    return {};
  }
}

function nearestPoolIndex(pool, previousNote) {
  const base = noteBase(previousNote);
  const exact = pool.findIndex((note) => noteBase(note) === base);
  return exact >= 0 ? exact : Math.floor(pool.length / 2);
}

function chooseNextNote(pool, previousNote) {
  const current = nearestPoolIndex(pool, previousNote);
  let move = randomItem([-3, -2, -1, 1, 2, 3]);
  if (Math.random() < 0.08) move = Math.random() < 0.5 ? -7 : 7;
  return pool[clamp(current + move, 0, pool.length - 1)] ?? previousNote ?? pool[0];
}

function chooseBeamedQuaverNote(pool, previousNote) {
  const current = nearestPoolIndex(pool, previousNote);
  const moves = [];
  if (current > 0) moves.push(-1);
  if (current < pool.length - 1) moves.push(1);
  return moves.length ? pool[current + randomItem(moves)] : pool[current];
}

function makeBarRhythms(barIndex) {
  return randomItem(barIndex === BAR_COUNT - 1 ? FINAL_BAR_PATTERNS : STANDARD_BAR_PATTERNS);
}

function keysForLevel(levelKey) {
  return (LEVELS[levelKey]?.keyIds || LEVELS.N5.keyIds).map((id) => KEY_LIBRARY[id]);
}

function chooseQuestionKey(type, levelKey = "N5") {
  const keys = keysForLevel(levelKey);
  if (type !== "build-key") return randomItem(keys);
  const noAccidentalKeys = keys.filter((key) => key.signature.length === 0);
  const accidentalKeys = keys.filter((key) => key.signature.length > 0);
  if (!noAccidentalKeys.length) return randomItem(accidentalKeys);
  return Math.random() < 0.1 ? randomItem(noAccidentalKeys) : randomItem(accidentalKeys);
}

function createQuestion(options = { identify: true, build: true, level: "N5" }) {
  const allowIdentify = options.identify !== false;
  const allowBuild = options.build !== false;
  const type = allowIdentify && allowBuild
    ? Math.random() < BUILD_KEY_CHANCE ? "build-key" : "identify-key"
    : allowBuild
      ? "build-key"
      : "identify-key";
  const key = chooseQuestionKey(type, options.level);
  const pool = KEY_POOLS[key.id];
  const bars = [];
  let previous = TONIC_START[key.id];
  let hasGSharp = false;

  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    const pattern = makeBarRhythms(barIndex);
    const bar = [];

    for (let noteIndex = 0; noteIndex < pattern.length; noteIndex += 1) {
      let pitch;
      if (barIndex === 0 && noteIndex === 0) {
        pitch = TONIC_START[key.id];
      } else {
        const stepwiseQuaver = pattern[noteIndex] === "quaver" && pattern[noteIndex - 1] === "quaver";
        pitch = stepwiseQuaver ? chooseBeamedQuaverNote(pool, previous) : chooseNextNote(pool, previous);
      }

      if (!pitch) pitch = previous || TONIC_START[key.id] || "C5";
      if (key.id === "a-minor" && pitch.includes("G#")) hasGSharp = true;
      bar.push({ pitch, rhythm: pattern[noteIndex] });
      previous = pitch;
    }

    bars.push(bar);
  }

  if (key.id === "a-minor" && !hasGSharp) {
    const barIndex = randomItem([1, 2]);
    const noteIndex = randomIndex(bars[barIndex].length);
    bars[barIndex][noteIndex] = {
      ...bars[barIndex][noteIndex],
      pitch: Math.random() < 0.5 ? "G#4" : "G#5",
    };
  }

  return { id: Math.random().toString(36).slice(2), type, key, bars };
}

function getBarPositions(bar, startX, endX) {
  const items = bar.map((item) => ({ rhythmUnits: rhythmSpacing(item.rhythm) }));
  const totalUnits = items.reduce((sum, item) => sum + item.rhythmUnits, 0);
  const unit = Math.max(1, endX - startX) / Math.max(totalUnits, 1);
  let cursor = startX;

  return items.map((item) => {
    const x = cursor;
    cursor += item.rhythmUnits * unit;
    return x;
  });
}

function getStem(x, y, step, forcedDown = null, forcedEndY = null) {
  const down = forcedDown ?? stemDown(step);
  const stemX = down ? x - NOTE.rx : x + NOTE.rx;
  const stemEndY = forcedEndY ?? (down ? y + NOTE.stemLength : y - NOTE.stemLength);
  return { down, stemX, stemEndY };
}

function isQuaver(note) {
  return note?.rhythm === "quaver";
}

function getQuaverGroups(bar) {
  const groups = [];
  let index = 0;
  while (index < bar.length) {
    if (!isQuaver(bar[index])) {
      index += 1;
      continue;
    }
    const start = index;
    while (index + 1 < bar.length && isQuaver(bar[index + 1])) index += 1;
    if (index > start) groups.push({ start, end: index });
    index += 1;
  }
  return groups;
}

function findGroup(groups, noteIndex) {
  return groups.find((group) => noteIndex >= group.start && noteIndex <= group.end) ?? null;
}

function getBeamDown(bar, group) {
  let up = 0;
  let down = 0;
  for (let index = group.start; index <= group.end; index += 1) {
    stemDown(noteStep(bar[index].pitch)) ? (down += 1) : (up += 1);
  }
  return down > up;
}

function getBeamEnds(bar, group, positions, down) {
  const startStep = noteStep(bar[group.start].pitch);
  const endStep = noteStep(bar[group.end].pitch);
  const startY = yForStep(startStep);
  const endY = yForStep(endStep);
  const startStem = getStem(positions[group.start], startY, startStep, down);
  const endStem = getStem(positions[group.end], endY, endStep, down);
  return {
    start: { x: startStem.stemX, y: startStem.stemEndY },
    end: { x: endStem.stemX, y: endStem.stemEndY },
  };
}

function beamYAtX(x, beam) {
  const ratio = (x - beam.start.x) / (beam.end.x - beam.start.x || 1);
  return beam.start.y + ratio * (beam.end.y - beam.start.y);
}

function playFeedbackSound(correct, celebration = false, medal = null) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;

  const context = new AudioContextClass();
  const master = context.createGain();
  const now = context.currentTime + 0.01;
  context.resume?.();
  master.gain.value = 0.18;
  master.connect(context.destination);

  function tone(freq, start, duration, type = "triangle", volume = 0.12) {
    const osc = context.createOscillator();
    const gain = context.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(master);
    osc.start(start);
    osc.stop(start + duration + 0.05);
  }

  function trumpet(freq, start, duration, volume = 0.1) {
    tone(freq, start, duration, "sawtooth", volume);
    tone(freq * 1.002, start, duration * 0.96, "square", volume * 0.32);
    tone(freq * 2, start, duration * 0.75, "triangle", volume * 0.16);
  }

  function medalPhrase(root, chord, start, beats = 4) {
    const beat = 0.6;
    const triplet = 0.13;
    const finalDuration = beats === 2 ? 0.72 : 1.95;
    chord.forEach((freq) => trumpet(freq, start, beats * beat, 0.045));
    trumpet(root, start, triplet, 0.11);
    trumpet(root, start + triplet, triplet, 0.11);
    trumpet(root, start + triplet * 2, triplet, 0.11);
    trumpet(root, start + 0.42, finalDuration, 0.13);
  }

  if (!correct) {
    tone(180, now, 0.55, "sawtooth", 0.075);
  } else if (celebration) {
    if (medal === "bronze") medalPhrase(659.25, [329.63, 415.3, 493.88], now);
    if (medal === "silver") medalPhrase(739.99, [369.99, 466.16, 554.37], now);
    if (medal === "gold") medalPhrase(830.61, [415.3, 523.25, 622.25], now);
    if (medal === "platinum") {
      medalPhrase(739.99, [369.99, 466.16, 554.37], now, 2);
      medalPhrase(830.61, [415.3, 523.25, 622.25], now + 0.82, 2);
      medalPhrase(932.33, [466.16, 587.33, 698.46], now + 1.64, 4);
    }
  } else {
    tone(740, now, 0.16, "triangle", 0.08);
    tone(988, now + 0.12, 0.34, "triangle", 0.1);
  }

  window.setTimeout(() => {
    try {
      context.close();
    } catch {}
  }, medal === "platinum" ? 9000 : celebration ? 3500 : 900);
}

function LedgerLines({ x, step }) {
  const lines = [];
  if (step <= -2) lines.push(yForStep(-2));
  if (step >= 10) lines.push(yForStep(10));

  return (
    <g pointerEvents="none">
      {lines.map((y) => (
        <line key={y} x1={x - 21} x2={x + 21} y1={y} y2={y} stroke="currentColor" strokeWidth="1.4" />
      ))}
    </g>
  );
}

function Staff() {
  return (
    <g>
      {[0, 1, 2, 3, 4].map((line) => (
        <line key={line} x1={STAFF.left} x2={STAFF.right} y1={STAFF.top + line * STAFF.gap} y2={STAFF.top + line * STAFF.gap} stroke="currentColor" strokeWidth="1.5" />
      ))}
      {[1, 2].map((bar) => {
        const x = STAFF.musicStartX + ((STAFF.right - STAFF.musicStartX) / BAR_COUNT) * bar - (bar === 1 ? 27 : 22);
        return <line key={bar} x1={x} x2={x} y1={STAFF.top} y2={STAFF.top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.5" />;
      })}
      <line x1={STAFF.right} x2={STAFF.right} y1={STAFF.top} y2={STAFF.top + STAFF.gap * 4} stroke="currentColor" strokeWidth="2.2" />
      <image href={ASSET.trebleClef} x={STAFF.clefX - 29} y={STAFF.top - 47} width="104" height="184" preserveAspectRatio="xMidYMid meet" pointerEvents="none" />
      <image href={ASSET.time44} x={STAFF.timeX - 43.5} y={STAFF.top - 14.3} width="76.56" height="116.16" preserveAspectRatio="xMidYMid meet" pointerEvents="none" />
    </g>
  );
}

function KeySignature({ signature }) {
  if (!signature?.length) return null;
  return (
    <g pointerEvents="none">
      {signature.map((item, index) => {
        const size = accidentalDimensions(item.type);
        return (
          <image
            key={`${item.type}-${item.step}-${index}`}
            href={accidentalAsset(item.type)}
            x={accidentalX(item.type, index)}
            y={accidentalY(item.type, item.step)}
            width={size.width}
            height={size.height}
            preserveAspectRatio="xMidYMid meet"
            pointerEvents="none"
          />
        );
      })}
    </g>

}

function BuildKeySignatureLayer({ question, selectedAccidental, placedAccidentals, hoverStep, setHoverStep, onPlaceAccidental, feedback }) {
  const [draggingAccidental, setDraggingAccidental] = useState(null);
  const activeAsset = accidentalAsset(selectedAccidental);
  const expected = expectedBuildAccidentals(question.key.id);
  const showingFeedback = Boolean(feedback);
  const shouldShowExpected = showingFeedback && expected.length > 0 && !feedback.correct;
  const nextIndex = placedAccidentals.length;

  function pointerToSvg(event) {
    const svg = event.currentTarget.ownerSVGElement ?? event.currentTarget;
    const rect = svg.getBoundingClientRect();
    return {
      x: ((event.clientX - rect.left) / rect.width) * SVG.width,
      y: ((event.clientY - rect.top) / rect.height) * SVG.height,
    };
  }

  function accidentalFromPointer(event) {
    if (!selectedAccidental || showingFeedback) return null;
    const pointer = pointerToSvg(event);
    const touchOffset = event.pointerType === "touch" ? 44 : 0;
    const effectiveY = pointer.y - touchOffset;
    const rawStep = Math.round((STAFF.top + STAFF.gap * 4 - effectiveY) / (STAFF.gap / 2));
    return { type: selectedAccidental, step: clamp(rawStep, -2, 10) };
  }

  function handlePointerMove(event) {
    if (showingFeedback) return;
    if (draggingAccidental) {
      event.preventDefault();
      const next = accidentalFromPointer(event);
      if (next) {
        setDraggingAccidental(next);
        setHoverStep(next.step);
      }
      return;
    }
    const next = accidentalFromPointer(event);
    setHoverStep(next ? next.step : null);
  }

  function handlePointerDown(event) {
    if (showingFeedback || !selectedAccidental) return;
    const next = accidentalFromPointer(event);
    if (!next) return;
    event.preventDefault();
    event.currentTarget.setPointerCapture?.(event.pointerId);
    setDraggingAccidental(next);
    setHoverStep(next.step);
  }

  function handlePointerUp(event) {
    if (showingFeedback || !draggingAccidental) return;
    event.preventDefault();
    event.currentTarget.releasePointerCapture?.(event.pointerId);
    const finalAccidental = accidentalFromPointer(event) ?? draggingAccidental;
    onPlaceAccidental(finalAccidental.step);
    setDraggingAccidental(null);
    setHoverStep(null);
  }

  function cancelPointer() {
    setDraggingAccidental(null);
    setHoverStep(null);
  }

  return (
    <g>
      {activeAsset && hoverStep !== null && !showingFeedback && !draggingAccidental && (
        <image
          href={activeAsset}
          x={accidentalX(selectedAccidental, nextIndex)}
          y={accidentalY(selectedAccidental, hoverStep)}
          {...accidentalDimensions(selectedAccidental)}
          opacity="0.45"
          pointerEvents="none"
        />
      )}

      {draggingAccidental && activeAsset && (
        <image
          href={activeAsset}
          x={accidentalX(draggingAccidental.type, nextIndex)}
          y={accidentalY(draggingAccidental.type, draggingAccidental.step)}
          {...accidentalDimensions(draggingAccidental.type)}
          opacity="0.82"
          pointerEvents="none"
        />
      )}

      {placedAccidentals.map((item, index) => (
        <image
          key={`${item.type}-${item.step}-${index}`}
          href={accidentalAsset(item.type)}
          x={accidentalX(item.type, index)}
          y={accidentalY(item.type, item.step)}
          {...accidentalDimensions(item.type)}
          opacity={showingFeedback && !feedback.correct ? 0.35 : 1}
          pointerEvents="none"
        />
      ))}

      {shouldShowExpected && (
        <g>
          {expected.map((item, index) => (
            <image
              key={`expected-${item.type}-${item.step}-${index}`}
              href={accidentalAsset(item.type)}
              x={accidentalX(item.type, index)}
              y={accidentalY(item.type, item.step)}
              {...accidentalDimensions(item.type)}
              opacity="1"
              pointerEvents="none"
            />
          ))}
        </g>
      )}

      <rect
        x={STAFF.keyX - 58}
        y={STAFF.top - 34}
        width="126"
        height={STAFF.gap * 4 + 68}
        fill="transparent"
        pointerEvents="all"
        className="touch-none"
        style={{ touchAction: "none", WebkitUserSelect: "none", userSelect: "none", overscrollBehavior: "contain", cursor: selectedAccidental && !showingFeedback ? "pointer" : "default" }}
        onPointerMove={handlePointerMove}
        onPointerLeave={() => {
          if (!draggingAccidental) setHoverStep(null);
        }}
        onPointerDown={handlePointerDown}
        onPointerUp={handlePointerUp}
        onPointerCancel={cancelPointer}
      />
    </g>
  );
}

function RhythmNote({ x, y, step, rhythm, pitch, accidental = false, showFlag = true, forcedDown = null, forcedStemEndY = null }) {
  const stem = getStem(x, y, step, forcedDown, forcedStemEndY);
  const isBeamedQuaver = rhythm === "quaver" && !showFlag;
  const asset = rhythm === "semibreve"
    ? ASSET.semibreve
    : isBeamedQuaver
    ? null
    : rhythm === "minim"
    ? ASSET.minim
    : rhythm === "dotted-crotchet"
      ? ASSET.dottedCrotchet
      : rhythm === "quaver"
        ? stem.down ? ASSET.quaverDown : ASSET.quaver
        : ASSET.crotchet;
  const size = rhythm === "semibreve"
    ? { width: 38.5, height: 28, xOffset: -19, yOffset: -14, downShift: 0 }
    : rhythm === "quaver" && showFlag
    ? stem.down
      ? { width: 50, height: 86, xOffset: -29, yOffset: -15, downShift: 0 }
      : { width: 50, height: 86, xOffset: -20, yOffset: -71, downShift: 0 }
    : rhythm === "dotted-crotchet"
      ? { width: 60.5, height: 79.2, xOffset: -20.9, yOffset: -68.2, downShift: 57.2 }
      : { width: 42.35, height: 79.2, xOffset: -20.9, yOffset: -68.2, downShift: 57.2 };

  return (
    <g pointerEvents="none">
      {accidental && (
        <image href={ASSET.sharp} x={pitch && pitch.includes("G#") ? x - 38 : x - 36} y={y - 27} width="28" height="54" preserveAspectRatio="xMidYMid meet" pointerEvents="none" />
      )}
      {isBeamedQuaver ? (
        <>
          <ellipse cx={x} cy={y} rx={NOTE.rx} ry={NOTE.ry} transform={`rotate(-18 ${x} ${y})`} fill="currentColor" stroke="currentColor" strokeWidth="2" />
          <line x1={stem.stemX} x2={stem.stemX} y1={y} y2={stem.stemEndY} stroke="currentColor" strokeWidth="1.8" />
        </>
      ) : (
        <image
          href={asset}
          x={x + size.xOffset}
          y={y + size.yOffset}
          width={size.width}
          height={size.height}
          preserveAspectRatio="xMidYMid meet"
          pointerEvents="none"
          style={{
            transformBox: "fill-box",
            transformOrigin: "center",
            transform: stem.down && rhythm !== "quaver" ? `translateY(${size.downShift}px) rotate(180deg)` : "none",
          }}
        />
      )}
    </g>
  );
}

function Passage({ bars }) {
  const barWidth = (STAFF.right - STAFF.musicStartX) / BAR_COUNT;

  return (
    <g>
      {bars.map((bar, barIndex) => {
        const startX = STAFF.musicStartX + barIndex * barWidth + (barIndex === 0 ? 2 : 15);
        const endX = STAFF.musicStartX + (barIndex + 1) * barWidth - 5;
        const positions = getBarPositions(bar, startX, endX);
        const groups = getQuaverGroups(bar);
        let accidentalShown = false;

        return (
          <g key={barIndex}>
            {bar.map((note, noteIndex) => {
              const x = positions[noteIndex];
              const step = noteStep(note.pitch);
              const y = yForStep(step);
              const group = findGroup(groups, noteIndex);
              const beamed = Boolean(group);
              const beamDown = group ? getBeamDown(bar, group) : null;
              let beam = null;
              let forcedStemEndY = null;

              if (group) {
                beam = getBeamEnds(bar, group, positions, beamDown);
                const stem = getStem(x, y, step, beamDown);
                forcedStemEndY = beamYAtX(stem.stemX, beam);
              }

              const showAccidental = note.pitch && note.pitch.includes("#") && !accidentalShown;
              if (note.pitch && note.pitch.includes("#")) accidentalShown = true;

              return (
                <g key={`${barIndex}-${noteIndex}`}>
                  <LedgerLines x={x} step={step} />
                  <RhythmNote x={x} y={y} step={step} rhythm={note.rhythm} pitch={note.pitch} accidental={showAccidental} showFlag={!beamed} forcedDown={beamDown} forcedStemEndY={forcedStemEndY} />
                  {beam && group?.start === noteIndex && <line x1={beam.start.x - 1} x2={beam.end.x + 1} y1={beam.start.y} y2={beam.end.y} stroke="currentColor" strokeWidth="7.2" />}
                </g>
              );
            })}
          </g>
        );
      })}
    </g>
  );
}

function MusicScore({ question, selectedAccidental, placedAccidentals, hoverStep, setHoverStep, onPlaceAccidental, feedback, mobileOnlyActiveClef }) {
  const viewBox = mobileOnlyActiveClef ? MOBILE_SVG_VIEWBOX : { x: 0, y: 0, width: SVG.width, height: SVG.height };
  return (
    <svg viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`} className="h-auto w-full select-none overflow-hidden sm:overflow-visible">
      <rect width={SVG.width} height={360} fill="white" />

      {question.type === "build-key" ? (
        <BuildKeySignatureLayer question={question} selectedAccidental={selectedAccidental} placedAccidentals={placedAccidentals} hoverStep={hoverStep} setHoverStep={setHoverStep} onPlaceAccidental={onPlaceAccidental} feedback={feedback} />
      ) : (
        <KeySignature signature={question.key.signature} />
      )}
      <Passage bars={question.bars} />
    </svg>
  );
}

function getStreakMedal(streak) {
  if (streak >= 30) return { tier: "diamond", icon: ASSET.diamond, bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
  if (streak >= 20) return { tier: "gold", icon: ASSET.gold, bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
  if (streak >= 15) return { tier: "silver", icon: ASSET.silver, bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
  if (streak >= 10) return { tier: "bronze", icon: ASSET.bronze, bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
  return null;
}

function useClickAway(ref, handler) {
  useEffect(() => {
    const onPointerDown = (event) => {
      if (!ref.current?.contains(event.target)) handler?.();
    };
    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, [ref, handler]);
}

function useSitePreferences() {
  const [darkMode, setDarkMode] = useState(readSiteTheme() === "dark");
  const [accessibility, setAccessibility] = useState(readSiteAccessibility);

  useEffect(() => {
    const sync = () => {
      setDarkMode(readSiteTheme() === "dark");
      setAccessibility(readSiteAccessibility());
    };
    sync();
    window.addEventListener("storage", sync);
    window.addEventListener("mlh-theme-change", sync);
    window.addEventListener("mlh-accessibility-change", sync);
    return () => {
      window.removeEventListener("storage", sync);
      window.removeEventListener("mlh-theme-change", sync);
      window.removeEventListener("mlh-accessibility-change", sync);
    };
  }, []);

  return { darkMode, accessibility };
}

function handleButtonKeyDown(event, onActivate) {

  event.preventDefault();

          <div className="absolute bottom-0 -left-[2px] right-0 rounded-b-xl transition-all duration-700" style={{ height: `${scoreFill}%`, background: scoreColour }} />

          <div className="mt-[3px] text-[20px] font-black leading-none tracking-tight text-black sm:text-[22px]">{correct}/{attempted}</div>
          <div className="mt-[3px] text-[11px] font-medium leading-none text-stone-500 sm:text-[12px]">Accuracy: {accuracy}%</div>
        </div>
        {popover === "score" && (
          <button
            type="button"
            onClick={(event) => { event.stopPropagation(); resetScore(); setPopover(null); }}
            className="fixed-popover-button score-reset-button absolute left-1/2 top-full z-50 mt-2 flex min-w-[112px] w-full items-center justify-center rounded-xl border border-[#dc2626] bg-[#dc2626] px-3 py-2 text-sm font-semibold text-white shadow-[0_14px_34px_rgba(0,0,0,0.28)] sm:w-auto"
            style={{ animation: POPOVER_ANIMATION_IN }}
          >
            Reset

        )}

      <section
        role="button"
        tabIndex="0"
        onPointerDown={(event) => event.stopPropagation()}
        onClick={() => togglePopover("streak")}
        onKeyDown={(event) => handleButtonKeyDown(event, () => togglePopover("streak"))}
        className={`${SCORE_TILE_CLASS} overflow-visible ${medal?.bg || "bg-stone-50"} ${popover === "streak" ? SCORE_TILE_ACTIVE_CLASS : ""}`}
      >
        {confettiKey > 0 && (
          <div key={confettiKey} className="pointer-events-none absolute inset-0 z-20 overflow-visible">
            {Array.from({ length: 18 }).map((_, index) => (
              <span
                key={index}
                className="absolute block h-1.5 w-1 rounded-sm"
                style={{
                  left: `${8 + ((index * 19) % 84)}%`,
                  top: "-8px",
                  backgroundColor: ["#facc15", "#38bdf8", "#fb7185", "#4ade80", "#a78bfa"][index % 5],
                  animation: `confettiDrop ${0.85 + (index % 5) * 0.12}s ease-out forwards`,
                  animationDelay: `${(index % 6) * 0.035}s`,
                }}
              />
            ))}
          </div>
        )}

        <div className="relative z-10 flex h-full flex-col items-center justify-center pt-[1px] text-center">
          <div className="text-[12px] font-bold uppercase leading-none tracking-[0.08em] text-black sm:text-[11px]">Streak</div>
          <div className={`mt-[3px] text-[20px] font-black leading-none tracking-tight sm:text-[22px] ${medal?.text || "text-black"}`}>{streak}</div>
          <div className="mt-[3px] text-[11px] font-medium leading-none text-stone-500 sm:text-[12px]">Highest: {bestStreak}</div>
        </div>

        {(popover === "streak" || autoShowMedals) && (
          <div
            className="fixed-popover-button absolute left-1/2 top-full z-50 mt-2 rounded-xl border border-stone-200 bg-white px-2.5 py-3 text-[12px] leading-none text-stone-700 shadow-lg sm:text-[13px]"
            style={{ animation: autoShowMedals ? `${POPOVER_ANIMATION_IN}, medalPopupOut .24s ease-in 1.76s forwards` : POPOVER_ANIMATION_IN }}
          >
            <div className="flex items-end justify-center gap-3">
              {thresholds.map((item) => (
                <div key={item.tier} className={`flex flex-col items-center justify-end ${item.active ? "medal-threshold-active" : ""}`}>
                  <img src={item.icon} alt="" aria-hidden="true" className="h-[22.8px] w-[22.8px] object-contain" />
                  <span className={`mt-1 text-[11px] font-semibold leading-none ${item.className}`}>{item.value}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </section>
    </div>
  );
}

      className="mb-2.5 flex min-h-[44px] w-full whitespace-nowrap items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-[14px] py-[10px] disabled:opacity-50"
    >
      <span className="flex min-w-[174px] items-center gap-2 text-sm font-semibold text-stone-800">
        <span className="flex h-[22px] w-[28px] shrink-0 items-center justify-center text-lg leading-none">{glyph}</span>
        <span>{label}</span>
      </span>
      <span className={`flex h-6 w-11 shrink-0 items-center rounded-full p-1 transition ${enabled ? "bg-black" : "bg-stone-400"}`}>
        <span className={`h-4 w-4 rounded-full bg-white transition ${enabled ? "translate-x-5" : "translate-x-0"}`} />
      </span>
    </button>
  );
}

function MenuRows({ enableKeyNaming, setEnableKeyNaming, enableKeyBuilding, setEnableKeyBuilding }) {
  return (
    <>
      <ToggleRow
        glyph={<img src={ASSET.trebleClef} alt="" aria-hidden="true" className="h-[29.9px] w-[25.3px] object-contain" />}
        label="Identify"
        enabled={enableKeyNaming}
        disabled={enableKeyNaming && !enableKeyBuilding}
        onToggle={() => setEnableKeyNaming((value) => !value)}
      />
      <ToggleRow
        glyph={<span className="flex items-center justify-center gap-[1px]"><img src={ASSET.sharp} alt="" aria-hidden="true" className="h-[21px] w-[12px] object-contain" /><img src={ASSET.flat} alt="" aria-hidden="true" className="h-[21px] w-[12px] object-contain" /></span>}
        label="Create"
        enabled={enableKeyBuilding}
        disabled={enableKeyBuilding && !enableKeyNaming}
        onToggle={() => setEnableKeyBuilding((value) => !value)}
      />
    </>
  );
}

function LevelMenu({ activeLevel, applyLevel }) {
  return (
    <div className="flex w-full min-w-0 flex-col gap-2">
      {Object.entries(LEVELS).map(([key, level]) => {
        const active = activeLevel === key;
        return (
          <button
            key={key}
            type="button"
            onClick={() => applyLevel(key)}
            className={`w-full rounded-xl border px-3 py-2 text-left transition ${active ? "border-stone-400 bg-stone-100" : "border-stone-200 bg-stone-50 hover:bg-stone-100"}`}
          >
            <div className="flex min-w-0 items-center justify-between gap-3 text-stone-900">
              <div className="flex min-h-[36px] min-w-[42px] items-center justify-center">
                <span className="flex h-[46px] w-[46px] shrink-0 items-center justify-center rounded-2xl border border-stone-200 bg-white text-[1.22rem] font-black leading-none tracking-tight text-stone-800 shadow-sm scale-[1.08]">
                  {key}
                </span>
              </div>
              <div className="flex min-w-0 flex-1 flex-col justify-center pr-2">
                <div className="truncate pb-[1px] text-[13px] font-black leading-[1.2]">{level.label}</div>
                <div className="mt-[2px] truncate pb-[2px] text-[11px] leading-[1.25] text-stone-600">{level.description}</div>
              </div>
              {active && <img src={ASSET.tick} alt="" aria-hidden="true" className="h-[22px] w-[22px] shrink-0 object-contain" />}
            </div>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  useInjectedStyles();
  const { darkMode, accessibility } = useSitePreferences();

  const initialLevel = useMemo(() => {
    const requested = new URLSearchParams(window.location.search).get("level");
    return LEVELS[requested] ? requested : "N5";
  }, []);

  const [activeLevel, setActiveLevel] = useState(initialLevel);
  const [question, setQuestion] = useState(() => createQuestion({ level: initialLevel }));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [menuOpen, setMenuOpen] = useState(false);
  const [menuMode, setMenuMode] = useState("levels");
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [selectedAccidental, setSelectedAccidental] = useState(null);
  const [placedAccidentals, setPlacedAccidentals] = useState([]);
  const [hoverStep, setHoverStep] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);
  const [autoShowMedals, setAutoShowMedals] = useState(false);
  const [enableKeyNaming, setEnableKeyNaming] = useState(true);
  const [enableKeyBuilding, setEnableKeyBuilding] = useState(true);
  const [mobileOnlyActiveClef, setMobileOnlyActiveClef] = useState(window.innerWidth < 640);

  const menuRef = useRef(null);
  const nextTimer = useRef(null);
  const fadeTimerRef = useRef(null);

  useClickAway(menuRef, () => setMenuOpen(false));

  useEffect(() => () => {
    window.clearTimeout(nextTimer.current);
    window.clearTimeout(fadeTimerRef.current);
  }, []);

  useEffect(() => {
    const onResize = () => setMobileOnlyActiveClef(window.innerWidth < 640);
    onResize();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const locked = Boolean(feedback);
  const isBuildKeyQuestion = question.type === "build-key";
  const expectedAccidentals = expectedBuildAccidentals(question.key.id);
  const streakMedal = getStreakMedal(streak);
  const showNoAccidentalAnswer = isBuildKeyQuestion && feedback && !feedback.correct && expectedAccidentals.length === 0;
  const appClasses = [
    darkMode ? "app-dark bg-stone-950 text-stone-100" : "bg-stone-50 text-black",
    accessibility.largeText ? "app-large-text" : "",
    accessibility.reduceMotion ? "app-reduce-motion" : "",
    accessibility.highContrast ? "app-high-contrast" : "",
  ].filter(Boolean).join(" ");
  const instruction = isBuildKeyQuestion ? (
    <span>Create the key signature of <strong><KeyName label={question.key.label} /></strong>.</span>
  ) : (
    <span>Name the <strong>key</strong> of this excerpt.</span>
  );

  function clearNextTimer() {
    if (nextTimer.current) {
      window.clearTimeout(nextTimer.current);
      nextTimer.current = null;
    }
    window.clearTimeout(fadeTimerRef.current);
  }

  function newQuestion(nextLevel = activeLevel, skipped = false) {
    clearNextTimer();
    if (skipped) setStreak(0);
    setQuestionVisible(false);
    window.setTimeout(() => {
      setQuestion(createQuestion({ identify: enableKeyNaming, build: enableKeyBuilding, level: nextLevel }));
      setSelectedAnswer(null);
      setSelectedAccidental(null);
      setPlacedAccidentals([]);
      setHoverStep(null);
      setFeedback(null);
      setFeedbackFading(false);
      setQuestionVisible(true);
    }, 220);
  }

  function applyLevel(levelKey) {
    setActiveLevel(levelKey);
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    setMenuOpen(false);
    newQuestion(levelKey);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion();
  }

  function fadeToNextQuestion() {
    if (!feedback || feedback.correct || feedbackFading) return;
    setFeedbackFading(true);
    window.setTimeout(() => newQuestion(), 280);
  }

  function updateScore(isCorrect) {
    const nextStreak = isCorrect ? streak + 1 : 0;
    playFeedbackSound(isCorrect);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });

    if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      setAutoShowMedals(true);
      window.setTimeout(() => setAutoShowMedals(false), 2000);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }

    if (isCorrect) {
      setFeedbackFading(false);
      fadeTimerRef.current = window.setTimeout(() => setFeedbackFading(true), 1700);
      nextTimer.current = window.setTimeout(() => newQuestion(), 2000);
    }
  }

  function answerQuestion(keyId) {
    if (locked) return;
    setSelectedAnswer(keyId);
    updateScore(keyId === question.key.id);
  }

  function placeBuildAccidental(step) {
    if (locked || !selectedAccidental) return;
    setPlacedAccidentals((current) => {
      if (current.length >= Math.max(expectedAccidentals.length, 1)) return current;
      return [...current, { type: selectedAccidental, step }];
    });
  }

  function clearBuildAccidental() {
    if (locked) return;
    setPlacedAccidentals([]);
  }

  function submitBuildAnswer() {
    if (locked) return;
    const isCorrect = keySignatureMatches(placedAccidentals, expectedAccidentals);
    updateScore(isCorrect);
  }

  function answerButtonClass(keyId) {
    const base = "rounded-xl border px-4 py-3 text-[1.05rem] font-bold transition";
    if (!feedback) return `${base} ${selectedAnswer === keyId ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`;
    if (keyId === question.key.id) return `${base} border-green-600 bg-green-600 text-white`;
    if (keyId === selectedAnswer && keyId !== question.key.id) return `${base} border-red-600 bg-red-600 text-white`;
    return `${base} border-stone-200 bg-stone-100 text-stone-400`;
  }

  return (
    <div className={`overflow-x-hidden pb-10 md:pb-12 ${appClasses}`}>
      <header className="fixed left-0 right-0 top-0 z-[1000] w-full overflow-visible border-b border-stone-200 bg-white/95 py-2 shadow-sm backdrop-blur sm:py-3">
        <div className="mx-auto flex w-full max-w-6xl flex-col gap-3 overflow-visible px-3 sm:px-4 md:flex-row md:items-center md:justify-between md:px-8">
          <div className="flex items-center gap-3 sm:gap-4">
            <AppIcon />
            <div className="flex h-14 flex-col justify-center">
              <h1 className="relative top-[1px] text-[clamp(1.55rem,6vw,2.2rem)] font-semibold leading-none tracking-tight md:text-3xl">Key Signatures</h1>
              <p className="mt-0 whitespace-nowrap text-[clamp(0.7rem,2.7vw,1rem)] leading-[1.05] text-stone-600 sm:max-w-2xl sm:text-[clamp(0.72rem,1.2vw,1rem)] xl:whitespace-nowrap">Identify key signatures.</p>
            </div>
          </div>

          <div className="relative z-50 flex flex-wrap items-center gap-2 overflow-visible md:ml-auto md:justify-end">
            <ScoreStreakPanel
              correct={correct}
              attempted={attempted}
              accuracy={accuracy}
              streak={streak}
              bestStreak={bestStreak}
              medal={streakMedal}
              confettiKey={confettiKey}
              resetScore={resetScore}
              autoShowMedals={autoShowMedals}
            />
          </div>
        </div>
      </header>

      <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
        <main
          className="relative z-0 min-h-[520px] overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-0 pt-[10px] shadow-sm sm:min-h-[390px] sm:px-4 md:h-auto md:min-h-0 md:overflow-visible md:px-6 md:pb-6 md:pt-[14px]"
          onPointerDown={() => {
            if (feedback && !feedback.correct) fadeToNextQuestion();
          }}
        >
          <div className="relative z-50 mb-2.5 grid grid-cols-[auto_1fr_auto] items-center gap-2 overflow-visible">
            <div className="relative flex items-center gap-2 overflow-visible" ref={menuRef}>
              <div className="relative overflow-visible">
                <button
                  type="button"
                  onClick={() => { setMenuMode("levels"); setMenuOpen((open) => !(open && menuMode === "levels")); }}
                  className={`${TOOLBAR_BUTTON_CLASS} gap-1`}
                >
                  <img src={ASSET.level} alt="" aria-hidden="true" className="h-[26px] w-[28px] object-contain scale-[1.06]" />
                  <span className="relative -left-[5px] sm:hidden">{activeLevel}</span>
                  <span className="relative -left-[3px] hidden sm:inline">{LEVELS[activeLevel].label}</span>
                </button>

                {menuOpen && menuMode === "levels" && (
                  <div className={`${MENU_PANEL_CLASS} left-0`}>
                    <div className={MENU_TITLE_CLASS}>
                      <div className="text-center text-base font-semibold text-stone-800">Level</div>
                    </div>
                    <LevelMenu activeLevel={activeLevel} applyLevel={applyLevel} />
                  </div>
                )}
              </div>

              <div className="relative overflow-visible">
                <button
                  type="button"
                  onClick={() => {
                    if (menuOpen && menuMode === "customise") setMenuOpen(false);
                    else { setMenuMode("customise"); setMenuOpen(true); }
                  }}
                  className={`${TOOLBAR_BUTTON_CLASS} gap-2`}
                >
                  <img src={ASSET.customise} alt="" aria-hidden="true" className="h-[20.7px] w-[20.7px] object-contain" />
                  <span className="hidden sm:inline">Customise</span>
                </button>

                {menuOpen && menuMode === "customise" && (
                  <div className={`${MENU_PANEL_CLASS} -left-[66px] sm:left-0`}>
                    <div className={MENU_TITLE_CLASS}>
                      <div className="text-center text-base font-semibold text-stone-800">Customise</div>
                    </div>
                    <MenuRows
                      enableKeyNaming={enableKeyNaming}
                      setEnableKeyNaming={setEnableKeyNaming}
                      enableKeyBuilding={enableKeyBuilding}
                      setEnableKeyBuilding={setEnableKeyBuilding}
                    />
                  </div>
                )}
              </div>
            </div>

            <div className="flex h-10 items-center justify-center">
              {feedback && <FeedbackBanner feedback={feedback} fading={feedbackFading} />}
            </div>

            <button
              type="button"
              onClick={() => newQuestion(activeLevel, true)}
              className={`${TOOLBAR_BUTTON_CLASS} shrink-0`}
            >
              <div className="flex w-full items-center justify-center sm:relative sm:left-[4px] sm:w-auto sm:gap-1">
                <span className="hidden sm:inline">Skip</span>
                <img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />
              </div>
            </button>
          </div>

          <div className={`mx-auto flex w-full items-center justify-center transition-opacity duration-300 sm:relative sm:top-[0px] ${mobileOnlyActiveClef ? "relative -top-[4px]" : "relative top-[24px]"} ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <MusicScore
              question={question}
              selectedAccidental={selectedAccidental}
              placedAccidentals={placedAccidentals}
              hoverStep={hoverStep}
              setHoverStep={setHoverStep}
              onPlaceAccidental={placeBuildAccidental}
              feedback={feedback}
              mobileOnlyActiveClef={mobileOnlyActiveClef}
            />
          </div>

          <div className="relative z-10 mt-[-8px] overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md sm:mt-[-63px] sm:p-4 md:mx-3 md:-mt-[81px]">
            <div className="space-y-2 text-stone-900">
              <p className="text-base font-semibold leading-tight">{instruction}</p>
              {showNoAccidentalAnswer && <p className="text-sm font-bold text-[#16a34a]">Correct answer: no sharps or flats.</p>}
            </div>

            {isBuildKeyQuestion ? (
              <div className="mt-4 flex flex-wrap items-end gap-2">
                <div className="flex items-end gap-2">
                  <button type="button" disabled={locked} onClick={() => setSelectedAccidental("sharp")} className={`relative flex h-[56px] w-[56px] shrink-0 items-center justify-center overflow-hidden rounded-xl border transition ${selectedAccidental === "sharp" ? "border-stone-950 bg-stone-950" : "border-stone-300 bg-white hover:bg-stone-100"}`}>
                    <img src={ASSET.sharp} alt="" aria-hidden="true" className={`h-[36px] w-[19px] object-contain ${selectedAccidental === "sharp" ? "brightness-0 invert" : ""}`} />
                  </button>
                  <button type="button" disabled={locked} onClick={() => setSelectedAccidental("flat")} className={`relative flex h-[56px] w-[56px] shrink-0 items-center justify-center overflow-hidden rounded-xl border transition ${selectedAccidental === "flat" ? "border-stone-950 bg-stone-950" : "border-stone-300 bg-white hover:bg-stone-100"}`}>
                    <img src={ASSET.flat} alt="" aria-hidden="true" className={`h-[36px] w-[19px] object-contain ${selectedAccidental === "flat" ? "brightness-0 invert" : ""}`} />
                  </button>
                </div>

                <div className="ml-auto flex items-end gap-2 pt-0">
                  <button type="button" disabled={locked || placedAccidentals.length === 0} onClick={clearBuildAccidental} className="rounded-xl border border-stone-300 bg-white px-5 py-3 text-sm font-bold transition hover:bg-stone-100">Clear</button>
                  <button type="button" disabled={locked} onClick={submitBuildAnswer} className="rounded-xl border border-black bg-black px-5 py-3 text-sm font-bold text-white transition hover:bg-stone-800">Confirm</button>
                </div>
              </div>
            ) : (
              <div className="mt-4 grid grid-cols-2 gap-2 md:grid-cols-4">
                {keysForLevel(activeLevel).map((key) => (
                  <button key={key.id} type="button" disabled={locked} onClick={() => answerQuestion(key.id)} className={answerButtonClass(key.id)}>{key.label}</button>
                ))}
              </div>
            )}
          </div>
        </main>
      </div>
    </div>
  );
}


ReactDOM.render(<App />, document.getElementById("root"));
  </script>
  <script src="https://mrtennant-music.github.io/musicliteracy/footer.js"></script>
</body>
</html>
