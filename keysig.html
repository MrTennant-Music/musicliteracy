<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Key Signatures</title>
  <link rel="icon" type="image/svg+xml" href="https://mrtennant-music.github.io/musicliteracy/key-signatures-icon.svg" />
  <link rel="apple-touch-icon" href="https://mrtennant-music.github.io/musicliteracy/key-signatures-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

</head>
<body class="overflow-x-hidden bg-stone-50">

  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const ASSET = {
  appIcon: "https://mrtennant-music.github.io/musicliteracy/key-signatures-icon.svg",
  level: "https://mrtennant-music.github.io/musicliteracy/levels.svg",
  customise: "https://mrtennant-music.github.io/musicliteracy/customise.svg",
  next: "https://mrtennant-music.github.io/musicliteracy/next.svg",
  tick: "https://mrtennant-music.github.io/musicliteracy/tick.svg",
  bronze: "https://mrtennant-music.github.io/musicliteracy/bronze.svg",
  silver: "https://mrtennant-music.github.io/musicliteracy/silver.svg",
  gold: "https://mrtennant-music.github.io/musicliteracy/gold.svg",
  diamond: "https://mrtennant-music.github.io/musicliteracy/diamond.svg",
  trebleClef: "https://mrtennant-music.github.io/musicliteracy/trebleclef.svg?v=1.1",
  sharp: "https://mrtennant-music.github.io/musicliteracy/sharp.svg?v=1.1",
  flat: "https://mrtennant-music.github.io/musicliteracy/flat.svg?v=1.1",
  time44: "https://mrtennant-music.github.io/musicliteracy/44.svg?v=1.1",
};

const SVG = { width: 1280, height: 560 };
const STAFF = { left: 80, right: 1200, top: 182, gap: 22, clefX: 105, keyX: 180, timeX: 255, musicStartX: 320 };
const NOTE = { rx: 13.33, stemLength: 67, head: 86.184, dot: 82.524, flag: 57.6 };
const MOBILE_VIEWBOX = { x: 36, y: 116, width: 1188, height: 210 };
const MOBILE_BUILD_VIEWBOX = { x: 24, y: 86, width: 300, height: 248 };
const BAR_COUNT = 3;

const MUSIC = {
  whole: "\uE0A2",
  half: "\uE0A3",
  black: "\uE0A4",
  flagUp: "\uE240",
  flagDown: "\uE241",
  dot: "\uE1E7",
};

const LEVELS = {
  N5: {
    label: "National 5",
    description: "Scales and key signatures — C major, G major, F major, A minor.",
    keyIds: ["c-major", "a-minor", "g-major", "f-major"],
  },
  AH: {
    label: "Advanced Higher",
    description: "Scales and key signatures — D major, B flat major, E minor and D minor.",
    keyIds: ["c-major", "a-minor", "g-major", "f-major", "d-major", "bb-major", "e-minor", "d-minor"],
  },
};

const KEYS = {
  "c-major": { id: "c-major", label: "C major", signature: [] },
  "a-minor": { id: "a-minor", label: "A minor", signature: [] },
  "g-major": { id: "g-major", label: "G major", signature: [{ type: "sharp", step: 8 }] },
  "f-major": { id: "f-major", label: "F major", signature: [{ type: "flat", step: 4 }] },
  "d-major": { id: "d-major", label: "D major", signature: [{ type: "sharp", step: 8 }, { type: "sharp", step: 5 }] },
  "bb-major": { id: "bb-major", label: "B flat major", signature: [{ type: "flat", step: 4 }, { type: "flat", step: 7 }] },
  "e-minor": { id: "e-minor", label: "E minor", signature: [{ type: "sharp", step: 8 }] },
  "d-minor": { id: "d-minor", label: "D minor", signature: [{ type: "flat", step: 4 }] },
};

const BUTTON_ORDER = ["c-major", "a-minor", "f-major", "d-minor", "g-major", "e-minor", "d-major", "bb-major"];
const NOTE_STEPS = { C4: -2, D4: -1, E4: 0, F4: 1, G4: 2, A4: 3, B4: 4, C5: 5, D5: 6, E5: 7, F5: 8, G5: 9, A5: 10 };
const POOLS = {
  "c-major": ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "a-minor": ["G4", "G#4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "G#5", "A5"],
  "g-major": ["G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  "f-major": ["F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "d-major": ["D4", "E4", "F5", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  "bb-major": ["D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "e-minor": ["D#4", "E4", "F5", "G4", "A4", "B4", "C5", "D#5", "E5", "F5", "G5", "A5"],
  "d-minor": ["C#4", "D4", "E4", "F4", "G4", "A4", "B4", "C#5", "D5", "E5", "F5", "G5"],
};
const TONIC = { "c-major": "C4", "a-minor": "A4", "g-major": "G4", "f-major": "F4", "d-major": "D4", "bb-major": "B4", "e-minor": "E4", "d-minor": "D4" };
const REQUIRED = { "a-minor": ["G#4", "G#5"], "e-minor": ["D#4", "D#5"], "d-minor": ["C#4", "C#5"] };
const RHYTHM_UNITS = { semibreve: 3.2, minim: 2.2, "dotted-crotchet": 1.8, crotchet: 1.3, quaver: 1 };
const BAR_PATTERNS = [
  ["minim", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "minim"],
  ["minim", "minim"],
  ["crotchet", "crotchet", "crotchet", "crotchet"],
  ["dotted-crotchet", "quaver", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
  ["quaver", "quaver", "quaver", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "quaver", "quaver", "crotchet"],
  ["minim", "quaver", "quaver", "quaver", "quaver"],
];

const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
const randomItem = (items) => items[Math.floor(Math.random() * items.length)];
const noteBase = (note) => String(note || "C5").replace("#", "");
const noteStep = (note) => NOTE_STEPS[noteBase(note)] ?? NOTE_STEPS.C5;
const yForStep = (step) => STAFF.top + STAFF.gap * 4 - step * (STAFF.gap / 2);
const stemDown = (step) => step > 4;
const keyList = (level) => (LEVELS[level]?.keyIds || LEVELS.N5.keyIds).map((id) => KEYS[id]);
const identifyButtons = (level) => BUTTON_ORDER.filter((id) => (LEVELS[level]?.keyIds || LEVELS.N5.keyIds).includes(id)).map((id) => KEYS[id]);

function accidentalAsset(type) {
  return type === "sharp" ? ASSET.sharp : type === "flat" ? ASSET.flat : null;
}

function accidentalX(type, index = 0) {
  const spacing = type === "flat" ? 30 : 32;
  return (type === "flat" ? STAFF.keyX - 10 : STAFF.keyX - 13) + index * spacing + (index === 1 ? -7 : 0);
}

function accidentalY(type, step) {
  return yForStep(step) + (type === "sharp" ? -27 : -35);
}

function accidentalSize(type) {
  return type === "sharp" ? { width: 28, height: 54 } : { width: 28, height: 49 };
}

function Accidental({ item, index, opacity = 1, style = null }) {
  return (
    <image
      href={accidentalAsset(item.type)}
      x={accidentalX(item.type, index)}
      y={accidentalY(item.type, item.step)}
      {...accidentalSize(item.type)}
      opacity={opacity}
      style={style || undefined}
      preserveAspectRatio="xMidYMid meet"
      pointerEvents="none"
    />
  );
}

function playSound(correct, celebration = false) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;
  const context = new AudioContextClass();
  const master = context.createGain();
  const now = context.currentTime + 0.01;
  master.gain.value = 0.18;
  master.connect(context.destination);
  context.resume?.();

  const tone = (freq, start, duration, type = "triangle", volume = 0.1) => {
    const osc = context.createOscillator();
    const gain = context.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(master);
    osc.start(start);
    osc.stop(start + duration + 0.05);
  };

  if (!correct) tone(180, now, 0.55, "sawtooth", 0.075);
  else {
    tone(740, now, 0.16);
    tone(988, now + 0.12, celebration ? 0.72 : 0.34, "triangle", 0.12);
  }
  window.setTimeout(() => context.close?.(), 1000);
}

function normaliseAnswer(value) {
  return value.toLowerCase().replace(/♭/g, " flat ").replace(/#/g, " sharp ").replace(/\bb\s*flat\b/g, "b flat").replace(/\s+/g, " ").trim();
}

function answerMatches(raw, label) {
  const answer = normaliseAnswer(raw);
  const target = normaliseAnswer(label);
  if (!answer) return false;
  if (answer === target) return true;
  if (target === "b flat major") return answer === "bb" || answer === "b flat";
  if (target.endsWith(" major")) {
    const tonic = target.replace(/ major$/, "");
    const compact = tonic.replace(/\s+/g, "");
    return answer === tonic || answer === compact || answer === `${compact}maj` || answer === `${tonic} maj`;
  }
  if (target.endsWith(" minor")) {
    const tonic = target.replace(/ minor$/, "");
    const compact = tonic.replace(/\s+/g, "");
    return answer === `${compact}m` || answer === `${tonic} m` || answer === `${compact}min` || answer === `${tonic} min` || answer === `${tonic} minor`;
  }
  return false;
}

function autoCap(value) {
  return value
    .replace(/(^|\s)([a-g])(?=\s|$)/g, (_, prefix, letter) => `${prefix}${letter.toUpperCase()}`)
    .replace(/(^|\s)([ade])m(?=\s|$)/gi, (_, prefix, letter) => `${prefix}${letter.toUpperCase()}m`);
}

function chooseNextPitch(pool, previous, maxStep = 7) {
  const previousStep = noteStep(previous);
  const candidates = pool.filter((note) => Math.abs(noteStep(note) - previousStep) <= maxStep);
  const usable = candidates.length ? candidates : pool;
  const index = usable.findIndex((note) => noteBase(note) === noteBase(previous));
  const start = index >= 0 ? index : Math.floor(usable.length / 2);
  const move = Math.random() < 0.08 ? randomItem([-7, 7]) : randomItem([-3, -2, -1, 1, 2, 3]);
  return usable[clamp(start + move, 0, usable.length - 1)] || usable[0];
}

function chooseQuaverPitch(pool, previous) {
  const previousStep = noteStep(previous);
  const options = pool.filter((note) => note !== previous && Math.abs(noteStep(note) - previousStep) <= 2);
  return options.length ? randomItem(options) : chooseNextPitch(pool, previous, 2);
}

function makeQuestion({ level, identify = true, build = true }) {
  const type = identify && build ? (Math.random() < 0.5 ? "build-key" : "identify-key") : build ? "build-key" : "identify-key";
  const keys = keyList(level);
  const accidentalKeys = keys.filter((key) => key.signature.length);
  const plainKeys = keys.filter((key) => !key.signature.length);
  const key = type === "build-key" && accidentalKeys.length
    ? (plainKeys.length && Math.random() < 0.1 ? randomItem(plainKeys) : randomItem(accidentalKeys))
    : randomItem(keys);
  const pool = POOLS[key.id];
  const bars = [];
  let previous = TONIC[key.id];

  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    const patterns = barIndex === BAR_COUNT - 1 ? [...BAR_PATTERNS, ["semibreve"]] : BAR_PATTERNS;
    const pattern = randomItem(patterns);
    const bar = pattern.map((rhythm, noteIndex) => {
      const pitch = barIndex === 0 && noteIndex === 0
        ? TONIC[key.id]
        : rhythm === "quaver" && pattern[noteIndex - 1] === "quaver"
          ? chooseQuaverPitch(pool, previous)
          : chooseNextPitch(pool, previous);
      previous = pitch;
      return { rhythm, pitch };
    });
    bars.push(bar);
  }

  if (REQUIRED[key.id] && !bars.some((bar) => bar.some((note) => REQUIRED[key.id].includes(note.pitch)))) {
    const barIndex = key.id === "a-minor" ? randomItem([1, 2]) : Math.floor(Math.random() * bars.length);
    const noteIndex = Math.floor(Math.random() * bars[barIndex].length);
    bars[barIndex][noteIndex] = { ...bars[barIndex][noteIndex], pitch: randomItem(REQUIRED[key.id]) };
  }

  return {
    id: Math.random().toString(36).slice(2),
    type,
    key,
    bars,
    identifyMode: type === "identify-key" && Math.random() < 0.35 ? "typed" : "buttons",
    maxBuildAccidentals: level === "AH" ? 2 : Math.max(key.signature.length, 1),
  };
}

function useClickAway(ref, handler) {
  useEffect(() => {
    const onPointerDown = (event) => {
      if (!ref.current?.contains(event.target)) handler();
    };
    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, [ref, handler]);
}

function useMobileFlag() {
  const [mobile, setMobile] = useState(window.innerWidth < 640);
  useEffect(() => {
    const update = () => setMobile(window.innerWidth < 640);
    update();
    window.addEventListener("resize", update);
    return () => window.removeEventListener("resize", update);
  }, []);
  return mobile;
}

function useLandscapeLock() {
  useEffect(() => {
    const update = () => {
      const locked = window.matchMedia("(max-width: 767px) and (orientation: landscape)").matches;
      let overlay = document.querySelector(".phone-landscape-lock");
      if (locked && !overlay) {
        overlay = document.createElement("div");
        overlay.className = "phone-landscape-lock";
        overlay.innerHTML = `<img src="https://mrtennant-music.github.io/musicliteracy/portrait.svg" alt="Portrait orientation" class="phone-landscape-lock-icon" />`;
        document.body.appendChild(overlay);
      }
      if (!locked && overlay) overlay.remove();
    };
    update();
    window.addEventListener("resize", update);
    window.addEventListener("orientationchange", update);
    return () => {
      window.removeEventListener("resize", update);
      window.removeEventListener("orientationchange", update);
      document.querySelector(".phone-landscape-lock")?.remove();
    };
  }, []);
}

function useKeyboardReset() {
  const scrollY = useRef(0);
  const bodyTop = useRef("");
  return {
    onFocus(event) {
      if (window.innerWidth >= 640) return;
      scrollY.current = window.scrollY;
      bodyTop.current = document.body.style.top || "";
      document.body.style.position = "fixed";
      document.body.style.width = "100%";
      document.body.style.top = `-${scrollY.current}px`;
      event?.currentTarget?.focus?.({ preventScroll: true });
    },
    onBlur() {
      if (window.innerWidth >= 640) return;
      const nextY = scrollY.current;
      document.body.style.position = "";
      document.body.style.width = "";
      document.body.style.top = bodyTop.current;
      window.scrollTo({ top: nextY, behavior: "auto" });
    },
  };
}

function useSession(initialLevel) {
  const [level, setLevel] = useState(initialLevel);
  const [question, setQuestion] = useState(() => makeQuestion({ level: initialLevel }));
  const [visible, setVisible] = useState(true);
  const [modes, setModes] = useState({ identify: true, build: true });
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [typed, setTyped] = useState("");
  const [selectedAccidental, setSelectedAccidental] = useState(null);
  const [placed, setPlaced] = useState([]);
  const [hover, setHover] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [score, setScore] = useState({ correct: 0, attempted: 0, streak: 0, best: 0 });
  const [confetti, setConfetti] = useState(0);
  const nextTimer = useRef(null);
  const fadeTimer = useRef(null);

  const locked = Boolean(feedback);
  const expected = question.key.signature;

  const resetQuestionState = () => {
    setSelectedAnswer(null);
    setTyped("");
    setSelectedAccidental(null);
    setPlaced([]);
    setHover(null);
    setFeedback(null);
    setFeedbackFading(false);
  };

  const clearTimers = () => {
    window.clearTimeout(nextTimer.current);
    window.clearTimeout(fadeTimer.current);
  };

  const nextQuestion = (nextLevel = level, nextModes = modes, skipped = false) => {
    clearTimers();
    if (skipped) setScore((value) => ({ ...value, streak: 0 }));
    setVisible(false);
    window.setTimeout(() => {
      setQuestion(makeQuestion({ level: nextLevel, ...nextModes }));
      resetQuestionState();
      setVisible(true);
    }, 220);
  };

  const updateScore = (correct) => {
    playSound(correct);
    setScore((value) => {
      const streak = correct ? value.streak + 1 : 0;
      if (correct && [10, 15, 20, 30].includes(streak)) setConfetti((count) => count + 1);
      return {
        correct: value.correct + (correct ? 1 : 0),
        attempted: value.attempted + 1,
        streak,
        best: Math.max(value.best, streak),
      };
    });
    setFeedback({ correct });
    if (correct) {
      setFeedbackFading(false);
      fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
      nextTimer.current = window.setTimeout(() => nextQuestion(), 2000);
    }
  };

  useEffect(() => () => clearTimers(), []);

  return {
    level,
    question,
    visible,
    modes,
    selectedAnswer,
    typed,
    selectedAccidental,
    placed,
    hover,
    feedback,
    feedbackFading,
    score,
    confetti,
    locked,
    expected,
    setTyped,
    setSelectedAccidental,
    setHover,
    nextQuestion,
    skip() {
      nextQuestion(level, modes, true);
    },
    resetScore() {
      setScore({ correct: 0, attempted: 0, streak: 0, best: 0 });
      setConfetti(0);
      nextQuestion();
    },
    changeLevel(nextLevel) {
      setLevel(nextLevel);
      setScore({ correct: 0, attempted: 0, streak: 0, best: 0 });
      setConfetti(0);
      nextQuestion(nextLevel, modes);
    },
    toggleIdentify() {
      if (modes.identify && !modes.build) return;
      const nextModes = { ...modes, identify: !modes.identify };
      setModes(nextModes);
      nextQuestion(level, nextModes);
    },
    toggleBuild() {
      if (modes.build && !modes.identify) return;
      const nextModes = { ...modes, build: !modes.build };
      setModes(nextModes);
      nextQuestion(level, nextModes);
    },
    answer(keyId) {
      if (locked) return;
      setSelectedAnswer(keyId);
      updateScore(keyId === question.key.id);
    },
    submitTyped() {
      if (locked || !typed.trim()) return;
      setSelectedAnswer(question.key.id);
      updateScore(answerMatches(typed, question.key.label));
    },
    placeAccidental(item) {
      if (locked || !selectedAccidental) return;
      setPlaced((current) => {
        const max = question.maxBuildAccidentals || Math.max(expected.length, 1);
        const next = [...current];
        const index = clamp(item.index ?? next.length, 0, max - 1);
        if (next[index]?.type === item.type && next[index]?.step === item.step) {
          next.splice(index, 1);
          return next;
        }
        next[index] = { type: item.type, step: item.step };
        return next.filter(Boolean).slice(0, max);
      });
    },
    clearPlaced() {
      if (!locked) setPlaced([]);
    },
    submitBuild() {
      if (locked) return;
      const correct = placed.length === expected.length && expected.every((item, index) => placed[index]?.type === item.type && placed[index]?.step === item.step);
      updateScore(correct);
    },
    fadeWrong() {
      if (!feedback || feedback.correct || feedbackFading) return;
      setFeedbackFading(true);
      window.setTimeout(() => nextQuestion(), 280);
    },
  };
}

function Glyph({ x, y, glyph, size, rotate = 0 }) {
  return <text className="music-symbol" x={x} y={y} fontSize={size} textAnchor="middle" fill="currentColor" transform={rotate ? `rotate(${rotate} ${x} ${y})` : undefined}>{glyph}</text>;
}

function Staff({ buildFocus }) {
  const fadeX = buildFocus ? STAFF.keyX + 108 : STAFF.right;
  return (
    <g>
      <defs>
        <linearGradient id="staffFadeV2" x1={STAFF.left} y1="0" x2={fadeX} y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stopColor="#000" stopOpacity="1" />
          <stop offset="94%" stopColor="#000" stopOpacity="1" />
          <stop offset="100%" stopColor="#000" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0, 1, 2, 3, 4].map((line) => (
        <line key={line} x1={STAFF.left} x2={fadeX} y1={STAFF.top + line * STAFF.gap} y2={STAFF.top + line * STAFF.gap} stroke="url(#staffFadeV2)" strokeWidth="1.5" />
      ))}
      {!buildFocus && [1, 2].map((bar) => {
        const x = STAFF.musicStartX + ((STAFF.right - STAFF.musicStartX) / BAR_COUNT) * bar - (bar === 1 ? 27 : 22);
        return <line key={bar} x1={x} x2={x} y1={STAFF.top} y2={STAFF.top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.5" />;
      })}
      <image href={ASSET.trebleClef} x={STAFF.clefX - 29} y={STAFF.top - 46} width="104" height="184" preserveAspectRatio="xMidYMid meet" pointerEvents="none" />
      {!buildFocus && <image href={ASSET.time44} x={STAFF.timeX - 47.41} y={STAFF.top - 17.25} width="84.41" height="128.07" preserveAspectRatio="xMidYMid meet" pointerEvents="none" />}
    </g>
  );
}

function KeySignature({ signature }) {
  return <g pointerEvents="none">{signature.map((item, index) => <Accidental key={`${item.type}-${index}`} item={item} index={index} />)}</g>;
}

function getStem(x, y, step, forcedDown = null, forcedEndY = null) {
  const down = forcedDown ?? stemDown(step);
  return {
    down,
    stemX: (down ? x - NOTE.rx : x + NOTE.rx) + (down ? 2 : -2),
    startY: y + (down ? 7 : -7),
    endY: (forcedEndY ?? (down ? y + NOTE.stemLength : y - NOTE.stemLength)) + (down ? 3 : -3),
  };
}

function Note({ note, x, beamedDown = null, forcedEndY = null, showFlag = true, accidental = false }) {
  const step = noteStep(note.pitch);
  const y = yForStep(step);
  const stem = getStem(x, y, step, beamedDown, forcedEndY);
  const dotted = note.rhythm === "dotted-crotchet";

  return (
    <g pointerEvents="none">
      {(step <= -2 || step >= 10) && <line x1={x - 21} x2={x + 21} y1={yForStep(step <= -2 ? -2 : 10)} y2={yForStep(step <= -2 ? -2 : 10)} stroke="currentColor" strokeWidth="1.4" />}
      {accidental && <image href={ASSET.sharp} x={note.pitch.includes("G#") ? x - 44 : x - 42} y={y - 27} width="28" height="54" preserveAspectRatio="xMidYMid meet" pointerEvents="none" />}
      {note.rhythm === "semibreve" ? (
        <Glyph x={x} y={y} glyph={MUSIC.whole} size={NOTE.head} rotate={-3} />
      ) : (
        <>
          <Glyph x={x} y={y} glyph={note.rhythm === "minim" ? MUSIC.half : MUSIC.black} size={NOTE.head} rotate={-3} />
          <line x1={stem.stemX} x2={stem.stemX} y1={stem.startY} y2={stem.endY} stroke="currentColor" strokeWidth="1.8" />
          {note.rhythm === "quaver" && showFlag && <Glyph x={stem.stemX + (stem.down ? 8 : 7)} y={stem.endY + 1} glyph={stem.down ? MUSIC.flagDown : MUSIC.flagUp} size={NOTE.flag} />}
          {dotted && <Glyph x={x + 24} y={y - 2 + (stem.down ? (step % 2 === 0 ? -10 : 0) : (step % 2 === 0 ? -6 : 0))} glyph={MUSIC.dot} size={NOTE.dot} />}
        </>
      )}
    </g>
  );
}

function quaverGroups(bar) {
  const groups = [];
  let index = 0;
  while (index < bar.length) {
    if (bar[index].rhythm !== "quaver") {
      index += 1;
      continue;
    }
    const start = index;
    while (bar[index + 1]?.rhythm === "quaver") index += 1;
    if (index > start) groups.push({ start, end: index });
    index += 1;
  }
  return groups;
}

function barPositions(bar, startX, endX) {
  const total = bar.reduce((sum, note) => sum + RHYTHM_UNITS[note.rhythm], 0);
  const unit = (endX - startX) / total;
  let x = startX;
  return bar.map((note) => {
    const current = x;
    x += RHYTHM_UNITS[note.rhythm] * unit;
    return current;
  });
}

function Passage({ bars }) {
  const barWidth = (STAFF.right - STAFF.musicStartX) / BAR_COUNT;
  return (
    <g>
      {bars.map((bar, barIndex) => {
        const positions = barPositions(bar, STAFF.musicStartX + barIndex * barWidth + (barIndex === 0 ? 2 : 15), STAFF.musicStartX + (barIndex + 1) * barWidth - 5);
        const groups = quaverGroups(bar);
        const altered = new Set();
        const states = bar.map((note, noteIndex) => {
          const letter = note.pitch.includes("#") ? noteBase(note.pitch)[0] : null;
          const showAccidental = Boolean(letter) && !altered.has(letter);
          if (letter) altered.add(letter);
          const exemptShift = note.rhythm === "quaver" && bar[noteIndex - 1]?.rhythm === "dotted-crotchet";
          return { showAccidental, x: positions[noteIndex] + (showAccidental && !exemptShift ? 12 : 0) };
        });

        return (
          <g key={barIndex}>
            {bar.map((note, noteIndex) => {
              const group = groups.find((item) => noteIndex >= item.start && noteIndex <= item.end);
              const down = group ? groupHasDownStems(bar, group) : null;
              const beam = group ? beamForGroup(bar, group, states.map((state) => state.x), down) : null;
              const x = states[noteIndex].x;
              const step = noteStep(note.pitch);
              const y = yForStep(step);
              const stem = beam ? getStem(x, y, step, down) : null;
              const forcedEndY = beam ? beam.start.y + ((stem.stemX - beam.start.x) / (beam.end.x - beam.start.x || 1)) * (beam.end.y - beam.start.y) : null;
              return (
                <g key={`${barIndex}-${noteIndex}`}>
                  <Note note={note} x={x} accidental={states[noteIndex].showAccidental} beamedDown={down} forcedEndY={forcedEndY} showFlag={!group} />
                  {beam && group.start === noteIndex && (
                    <line x1={beam.start.x + (down ? -0.5 : -1.5)} x2={beam.end.x + (down ? 1.5 : 0.5)} y1={beam.start.y + (down ? 3 : -3)} y2={beam.end.y + (down ? 3 : -3)} stroke="currentColor" strokeWidth="7.2" />
                  )}
                </g>
              );
            })}
          </g>
        );
      })}
    </g>
  );
}

function groupHasDownStems(bar, group) {
  let down = 0;
  let up = 0;
  for (let index = group.start; index <= group.end; index += 1) stemDown(noteStep(bar[index].pitch)) ? down++ : up++;
  return down > up;
}

function beamForGroup(bar, group, positions, down) {
  const startStep = noteStep(bar[group.start].pitch);
  const endStep = noteStep(bar[group.end].pitch);
  const start = getStem(positions[group.start], yForStep(startStep), startStep, down);
  const end = getStem(positions[group.end], yForStep(endStep), endStep, down);
  return { start: { x: start.stemX, y: start.endY }, end: { x: end.stemX, y: end.endY } };
}

function BuildLayer({ question, selectedAccidental, placed, setHover, hover, onPlace, feedback, mobileBuild }) {
  const [drag, setDrag] = useState(null);
  const max = question.maxBuildAccidentals || 1;
  const expected = question.key.signature;
  const showingFeedback = Boolean(feedback);

  function pointerToSvg(event) {
    const svg = event.currentTarget.ownerSVGElement;
    const rect = svg.getBoundingClientRect();
    const viewBox = svg.viewBox.baseVal;
    return {
      x: viewBox.x + ((event.clientX - rect.left) / rect.width) * viewBox.width,
      y: viewBox.y + ((event.clientY - rect.top) / rect.height) * viewBox.height,
    };
  }

  function accidentalFromPointer(event) {
    if (!selectedAccidental || showingFeedback) return null;
    const pointer = pointerToSvg(event);
    const rawStep = Math.round((STAFF.top + STAFF.gap * 4 - (pointer.y - (mobileBuild && event.pointerType === "touch" ? 44 : 0))) / (STAFF.gap / 2));
    const centers = Array.from({ length: max }, (_, index) => accidentalX(selectedAccidental, index) + accidentalSize(selectedAccidental).width / 2);
    let index = centers.reduce((best, center, current) => Math.abs(center - pointer.x) < Math.abs(centers[best] - pointer.x) ? current : best, 0);
    if (index > 0 && !placed[0]) index = 0;
    return { type: selectedAccidental, step: clamp(rawStep, -2, 10), index };
  }

  const move = (event) => {
    if (showingFeedback) return;
    const next = accidentalFromPointer(event);
    setHover(next);
    if (drag && next) setDrag(next);
  };
  const down = (event) => {
    const next = accidentalFromPointer(event);
    if (!next) return;
    event.preventDefault();
    event.currentTarget.setPointerCapture?.(event.pointerId);
    setDrag(next);
    setHover(next);
  };
  const up = (event) => {
    if (!drag) return;
    event.preventDefault();
    const next = accidentalFromPointer(event) || drag;
    onPlace(next);
    setDrag(null);
    setHover(null);
  };

  const preview = drag || hover;
  const feedbackStyle = (correct) => ({ filter: correct ? "brightness(0) saturate(100%) invert(38%) sepia(75%) saturate(1043%) hue-rotate(89deg) brightness(92%) contrast(90%)" : "brightness(0) saturate(100%) invert(19%) sepia(83%) saturate(3207%) hue-rotate(347deg) brightness(88%) contrast(93%)" });

  return (
    <g>
      {preview && !showingFeedback && <Accidental item={preview} index={preview.index} opacity={drag ? 0.82 : 0.45} />}
      {placed.map((item, index) => <Accidental key={`${item.type}-${item.step}-${index}`} item={item} index={index} opacity={showingFeedback && !feedback.correct ? 0.4 : 1} style={showingFeedback ? feedbackStyle(feedback.correct) : null} />)}
      {showingFeedback && !feedback.correct && expected.map((item, index) => <Accidental key={`expected-${index}`} item={item} index={index} style={feedbackStyle(true)} />)}
      <rect x={STAFF.keyX - 58} y={STAFF.top - 34} width="158" height={STAFF.gap * 4 + 68} fill="transparent" pointerEvents="all" style={{ touchAction: "none", cursor: selectedAccidental && !showingFeedback ? "pointer" : "default" }} onPointerMove={move} onPointerLeave={() => !drag && setHover(null)} onPointerDown={down} onPointerUp={up} onPointerCancel={() => { setDrag(null); setHover(null); }} />
    </g>
  );
}

function Score({ question, session, mobile }) {
  const mobileBuild = mobile && question.type === "build-key";
  const viewBox = mobileBuild ? MOBILE_BUILD_VIEWBOX : mobile ? MOBILE_VIEWBOX : { x: 0, y: 0, width: SVG.width, height: SVG.height };
  return (
    <svg viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`} className="h-auto w-full select-none overflow-hidden sm:overflow-visible">
      <rect width={SVG.width} height={360} fill="white" />
      <Staff buildFocus={mobileBuild} />
      {question.type === "build-key" ? (
        <BuildLayer question={question} selectedAccidental={session.selectedAccidental} placed={session.placed} hover={session.hover} setHover={session.setHover} onPlace={session.placeAccidental} feedback={session.feedback} mobileBuild={mobileBuild} />
      ) : (
        <KeySignature signature={question.key.signature} />
      )}
      {!mobileBuild && <Passage bars={question.bars} />}
    </svg>
  );
}

function KeyName({ label, muted = false, inverted = false }) {
  if (label !== "B flat major") return <>{label}</>;
  return (
    <span className="inline-flex items-baseline gap-[2px]">
      <span>B</span>
      <img src={ASSET.flat} alt="flat" className={`relative -left-[2px] top-[1px] inline-block h-[1.05em] w-[0.56em] object-contain ${inverted ? "brightness-0 invert" : ""} ${muted ? "opacity-40 grayscale" : ""}`} />
      <span>major</span>
    </span>
  );
}

function Feedback({ feedback, fading }) {
  if (!feedback) return null;
  return (
    <div className="relative flex w-full items-center justify-center text-center">
      <div className={`flex h-10 min-w-[58px] max-w-[calc(100vw-96px)] items-center justify-center rounded-xl border px-3 text-[18px] font-black text-white translate-y-[60px] sm:translate-y-0 ${feedback.correct ? "border-[#16a34a] bg-[#16a34a]" : "border-[#dc2626] bg-[#dc2626]"}`} style={{ animation: fading ? "feedbackOut .28s ease-out forwards" : "feedbackIn .45s ease-out forwards" }}>
        {feedback.correct ? "Correct" : "Incorrect"}
      </div>
    </div>
  );
}

function ScorePanel({ session }) {
  const [popover, setPopover] = useState(null);
  const ref = useRef(null);
  useClickAway(ref, () => setPopover(null));
  const accuracy = session.score.attempted ? Math.round((session.score.correct / session.score.attempted) * 100) : 0;
  const scoreFill = clamp(accuracy, 0, 100);
  const scoreColour = scoreFill < 50 ? "rgba(220,38,38,.38)" : scoreFill < 70 ? "rgba(255,120,0,.42)" : "rgba(22,163,74,.38)";
  const medal = session.score.streak >= 30 ? ASSET.diamond : session.score.streak >= 20 ? ASSET.gold : session.score.streak >= 15 ? ASSET.silver : session.score.streak >= 10 ? ASSET.bronze : null;
  const tile = "relative h-[58px] rounded-xl border border-stone-200 bg-stone-50 shadow-sm outline-none transition active:scale-[0.98] sm:h-[64px]";
  const thresholds = [
    { value: 10, icon: ASSET.bronze, className: "text-amber-700" },
    { value: 15, icon: ASSET.silver, className: "text-slate-500" },
    { value: 20, icon: ASSET.gold, className: "text-yellow-500" },
    { value: 30, icon: ASSET.diamond, className: "text-cyan-500" },
  ];
  return (
    <div ref={ref} className="grid w-full grid-cols-2 gap-2 md:w-auto md:grid-cols-[112px_98px] lg:grid-cols-[124px_108px]">
      <button type="button" className={tile} onClick={() => setPopover(popover === "score" ? null : "score")}>
        <div className="absolute inset-0 overflow-hidden rounded-xl">
          <div className="absolute bottom-0 -left-[2px] right-0 rounded-b-xl transition-all duration-700" style={{ height: `${scoreFill}%`, background: scoreColour }} />
        </div>
        <div className="relative z-10 flex h-full flex-col items-center justify-center pt-[1px] text-center">
          <div className="text-[12px] font-bold uppercase leading-none tracking-[0.08em]">Score</div>

          <div className="mt-[3px] text-[11px] font-medium leading-none text-stone-500">Accuracy: {accuracy}%</div>
        </div>
        {popover === "score" && <button type="button" onClick={(event) => { event.stopPropagation(); session.resetScore(); setPopover(null); }} className="absolute left-0 right-0 top-full z-50 mt-2 rounded-xl border border-[#dc2626] bg-[#dc2626] px-3 py-2 text-sm font-semibold text-white shadow-lg">Reset</button>}
      </button>
      <button type="button" className={tile} onClick={() => setPopover(popover === "streak" ? null : "streak")}>
        {session.confetti > 0 && <div key={session.confetti} className="pointer-events-none absolute inset-0 z-20 overflow-visible">{Array.from({ length: 18 }).map((_, index) => <span key={index} className="absolute block h-1.5 w-1 rounded-sm" style={{ left: `${8 + ((index * 19) % 84)}%`, top: "-8px", backgroundColor: ["#facc15", "#38bdf8", "#fb7185", "#4ade80"][index % 4], animation: `confettiDrop ${0.85 + (index % 5) * 0.12}s ease-out forwards` }} />)}</div>}
        <div className="text-[12px] font-bold uppercase tracking-[0.08em]">Streak</div>
        <div className="text-[20px] font-black leading-none">{session.score.streak}</div>
        <div className="text-[11px] font-medium text-stone-500">Highest: {session.score.best}</div>
        {(popover === "streak" || medal) && (
          <div className="absolute left-1/2 top-full z-50 mt-2 -translate-x-1/2 rounded-xl border border-stone-200 bg-white px-2.5 py-3 text-[12px] leading-none text-stone-700 shadow-lg sm:text-[13px]">
            <div className="flex items-end justify-center gap-3">
              {thresholds.map((item) => (
                <div key={item.value} className="flex flex-col items-center justify-end">
                  <img src={item.icon} alt="" className="h-[23px] w-[23px] object-contain" />
                  <span className={`mt-1 text-[11px] font-semibold leading-none ${item.className}`}>{item.value}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </button>
    </div>
  );
}

function ToggleRow({ glyph, label, enabled, disabled, onToggle }) {

  return (
    <div className="overflow-x-hidden bg-stone-50 pb-10 text-black md:pb-12">
      <header className="fixed left-0 right-0 top-0 z-[1000] w-full border-b border-stone-200 bg-white/95 py-2 shadow-sm backdrop-blur sm:py-3">

            <div className="flex h-14 w-14 items-center justify-center overflow-hidden rounded-2xl border border-stone-200 bg-stone-50 shadow-sm"><img src={ASSET.appIcon} alt="" className="h-full w-full object-contain" /></div>
            <div className="flex h-14 flex-col justify-center">

            </div>
          </div>
          <ScorePanel session={session} />
        </div>
      </header>

      <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
        <main className="relative flex min-h-[520px] flex-col overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-3 pt-[10px] shadow-sm sm:min-h-[390px] sm:px-4 sm:pb-0 md:px-6 md:pb-6 md:pt-[14px]" onPointerDown={() => {
          if (session.feedback && session.feedback.correct) {
            skipCorrectFeedback();
            return;
          }
          if (session.feedback && !session.feedback.correct) session.fadeWrong();
        }}>
          <div
            className="relative z-50 mb-2.5 grid w-full grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2"
            ref={menuRef}
            onPointerDownCapture={(event) => {
              if (!menu) return;
              const target = event.target;
              if (target.closest?.("[data-menu-trigger]") || target.closest?.("[data-menu-panel]")) return;
              setMenu(null);
            }}
          >
            <div className="relative flex items-center gap-2">
              <div className="relative">
                <button data-menu-trigger type="button" onClick={() => setMenu(menu === "level" ? null : "level")} className="flex h-10 w-[58px] items-center justify-center gap-1 rounded-xl border border-stone-300 bg-white text-sm font-semibold sm:h-11 sm:w-auto sm:px-2.5"><img src={ASSET.level} alt="" className="h-[26px] w-[28px]" /><span className="relative -left-[5px] sm:hidden">{session.level}</span><span className="hidden sm:inline">{LEVELS[session.level].label}</span></button>
                {menu === "level" && (
                  <div data-menu-panel className="absolute left-0 top-full z-50 mt-2 w-[calc(100vw-48px)] max-w-[360px] rounded-2xl border border-stone-200 bg-white p-3 shadow-lg sm:w-[360px]">
                    <div className="relative -top-[4px] mb-1.5 flex h-[28px] items-center justify-center whitespace-nowrap px-8 text-center text-base font-semibold text-stone-800">Level</div>
                    <LevelMenu activeLevel={session.level} onSelect={(key) => { setMenu(null); session.changeLevel(key); }} />
                  </div>
                )}
              </div>
              <div className="relative">
                <button data-menu-trigger type="button" onClick={() => setMenu(menu === "customise" ? null : "customise")} className="flex h-10 w-[58px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white text-sm font-semibold sm:h-11 sm:w-auto sm:px-2.5"><img src={ASSET.customise} alt="" className="h-[21px] w-[21px]" /><span className="hidden sm:inline">Customise</span></button>
                {menu === "customise" && <div data-menu-panel className="absolute -left-[66px] top-full z-50 mt-2 w-[calc(100vw-48px)] max-w-[360px] rounded-2xl border border-stone-200 bg-white p-3 shadow-lg sm:left-0">
                  <div className="mb-2 text-center font-semibold">Customise</div>
                  <ToggleRow glyph={<img src={ASSET.trebleClef} alt="" className="h-[30px]" />} label="Identify" enabled={session.modes.identify} disabled={session.modes.identify && !session.modes.build} onToggle={session.toggleIdentify} />
                  <ToggleRow glyph={<span className="flex"><img src={ASSET.sharp} alt="" className="h-[21px]" /><img src={ASSET.flat} alt="" className="relative left-[2px] h-[21px]" /></span>} label="Create" enabled={session.modes.build} disabled={session.modes.build && !session.modes.identify} onToggle={session.toggleBuild} />
                </div>}
              </div>
            </div>
            <div className="flex h-10 min-w-[112px] items-center justify-center sm:min-w-[140px]">
              <Feedback feedback={session.feedback} fading={session.feedbackFading} />
            </div>
            <div className="flex items-center justify-end gap-2 pr-0 justify-self-end sm:pr-0 md:pr-0">
              <button type="button" onClick={session.skip} className="flex h-10 w-[58px] shrink-0 items-center justify-center rounded-xl border border-stone-300 bg-white text-sm font-semibold text-stone-800 sm:h-11 sm:w-auto sm:px-2.5">
                <span className="flex w-full items-center justify-center sm:relative sm:left-[4px] sm:w-auto sm:gap-1">
                  <span className="hidden sm:inline">Skip</span>
                  <img src={ASSET.next} alt="" className="h-[27.8px] w-[27.8px] object-contain" />
                </span>
              </button>
            </div>
          </div>

          {mobileBuild && (
            <p className="relative z-50 top-[25px] mb-1 text-center text-[0.74rem] font-light leading-tight tracking-normal text-stone-500/60 sm:hidden">
              Press and hold to drag accidental into place
            </p>
          )}

          <div className={`mx-auto flex w-full flex-1 items-center justify-center transition-opacity duration-300 sm:flex-none ${mobile ? "relative -top-[4px]" : "relative top-[24px]"} ${session.visible ? "opacity-100" : "opacity-0"}`}>
            <Score question={session.question} session={session} mobile={mobile} />
          </div>

          <div className="relative z-10 mt-auto overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md sm:mt-[-63px] sm:p-4 md:mx-3 md:-mt-[81px]">
            <p className="text-base font-semibold leading-tight">{instruction}</p>
            {showNoAccidentals && <p className="text-sm font-bold text-[#16a34a]">Correct answer: no sharps or flats.</p>}

            {isBuild ? (
              <div className="mt-4 flex flex-wrap items-end gap-2">
                <button type="button" disabled={session.locked} onClick={() => session.setSelectedAccidental("sharp")} className={`flex h-[56px] w-[56px] items-center justify-center rounded-xl border ${session.selectedAccidental === "sharp" ? "border-stone-950 bg-stone-950" : "border-stone-300 bg-white"}`}><img src={ASSET.sharp} alt="" className={`h-[36px] ${session.selectedAccidental === "sharp" ? "brightness-0 invert" : ""}`} /></button>
                <button type="button" disabled={session.locked} onClick={() => session.setSelectedAccidental("flat")} className={`flex h-[56px] w-[56px] items-center justify-center rounded-xl border ${session.selectedAccidental === "flat" ? "border-stone-950 bg-stone-950" : "border-stone-300 bg-white"}`}><img src={ASSET.flat} alt="" className={`h-[36px] ${session.selectedAccidental === "flat" ? "brightness-0 invert" : ""}`} /></button>
                <div className="ml-auto flex gap-2">
                  <button type="button" disabled={session.locked || session.placed.length === 0} onClick={session.clearPlaced} className="rounded-xl border border-stone-300 bg-white px-5 py-3 text-sm font-bold">Clear</button>
                  <button type="button" disabled={session.locked} onClick={session.submitBuild} className="rounded-xl border border-black bg-black px-5 py-3 text-sm font-bold text-white">Confirm</button>
                </div>
              </div>
            ) : session.question.identifyMode === "typed" ? (
              <div className="mt-4 flex flex-col gap-2 sm:flex-row sm:items-center">
                <div className="flex min-w-0 w-full flex-col gap-2 sm:w-1/2 sm:flex-row sm:items-center">
                  <input type="text" value={session.typed} disabled={session.locked} onFocus={keyboard.onFocus} onBlur={keyboard.onBlur} onChange={(event) => session.setTyped(autoCap(event.target.value))} onKeyDown={(event) => { if (event.key === "Enter") session.submitTyped(); }} className={`min-w-0 w-full rounded-xl border border-stone-300 bg-white px-4 py-3 text-[1.05rem] font-normal outline-none ${session.feedback ? session.feedback.correct ? "text-green-600" : "text-red-600" : "text-stone-900"}`} placeholder="Type your answer" />
                  {session.feedback && !session.feedback.correct && <div className="text-[1.05rem] font-semibold text-green-600 sm:ml-3"><KeyName label={session.question.key.label} /></div>}
                </div>
                <button type="button" disabled={session.locked || !session.typed.trim()} onClick={session.submitTyped} className="rounded-xl border border-black bg-black px-5 py-3 text-[1.05rem] font-bold text-white disabled:opacity-50 sm:ml-auto">Confirm</button>
              </div>
            ) : (
              <div className="mt-4 grid grid-cols-2 gap-2 md:grid-cols-4">
                {identifyButtons(session.level).map((key) => <button key={key.id} type="button" disabled={session.locked} onClick={() => session.answer(key.id)} className={answerClass(key.id)}><KeyName label={key.label} muted={Boolean(session.feedback && key.id !== session.question.key.id && key.id !== session.selectedAnswer)} inverted={Boolean(session.feedback && (key.id === session.question.key.id || key.id === session.selectedAnswer))} /></button>)}
              </div>
            )}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
  </script>
  <script src="https://mrtennant-music.github.io/musicliteracy/footer.js"></script>
</body>
</html>
