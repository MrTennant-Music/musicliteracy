  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const ASSET = {
  appIcon: "https://mrtennant-music.github.io/musicliteracy/key-signatures-icon.svg",
  level: "https://mrtennant-music.github.io/musicliteracy/levels.svg",
  customise: "https://mrtennant-music.github.io/musicliteracy/customise.svg",
  next: "https://mrtennant-music.github.io/musicliteracy/next.svg",
  tick: "https://mrtennant-music.github.io/musicliteracy/tick.svg",
  bronze: "https://mrtennant-music.github.io/musicliteracy/bronze.svg",
  silver: "https://mrtennant-music.github.io/musicliteracy/silver.svg",
  gold: "https://mrtennant-music.github.io/musicliteracy/gold.svg",
  diamond: "https://mrtennant-music.github.io/musicliteracy/diamond.svg",
};

const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS ?? {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG ?? { symbols: {}, drawing: {} };
const SVG = { width: 980, height: 360 };
const STAFF = { left: 72, right: 848, top: 90, gap: 10 };
const CALIBRATION_PREVIEW_GAP = 10;
const BAR_COUNT = 4;

const TIME_SIGNATURE_SYMBOLS = {
  "4/4": { top: ["timeSig4"], bottom: ["timeSig4"], key: "timeSig44" },
};
const CALIBRATION_ANCHORS = {
  gClef: { xScale: 6.4, step: 2 },
  timeSig44: { xScale: 12.4, step: 5.3 },
};
const CALIBRATION_LAYOUT_OFFSETS = {
  keySignature: 54,
  timeSignature: 82,
  musicStart: 118,
};

const LEVELS = {
  N5: {
    label: "National 5",
    description: "Scales and key signatures — C major, G major, F major, A minor",
    keyIds: ["c-major", "a-minor", "g-major", "f-major"],
  },
  AH: {
    label: "Advanced Higher",
    description: "Scales and key signatures — D major, B flat major, E minor and D minor",
    keyIds: ["c-major", "a-minor", "g-major", "f-major", "d-major", "bb-major", "e-minor", "d-minor"],
  },
};

const KEYS = {
  "c-major": { id: "c-major", label: "C major", signature: [] },
  "a-minor": { id: "a-minor", label: "A minor", signature: [] },
  "g-major": { id: "g-major", label: "G major", signature: [{ type: "sharp", step: 8 }] },
  "f-major": { id: "f-major", label: "F major", signature: [{ type: "flat", step: 4 }] },
  "d-major": { id: "d-major", label: "D major", signature: [{ type: "sharp", step: 8 }, { type: "sharp", step: 5 }] },
  "bb-major": { id: "bb-major", label: "B flat major", signature: [{ type: "flat", step: 4 }, { type: "flat", step: 7 }] },
  "e-minor": { id: "e-minor", label: "E minor", signature: [{ type: "sharp", step: 8 }] },
  "d-minor": { id: "d-minor", label: "D minor", signature: [{ type: "flat", step: 4 }] },
};

const BUTTON_ORDER = ["c-major", "a-minor", "f-major", "d-minor", "g-major", "e-minor", "d-major", "bb-major"];
const NOTE_STEPS = { C4: -2, D4: -1, E4: 0, F4: 1, G4: 2, A4: 3, B4: 4, C5: 5, D5: 6, E5: 7, F5: 8, G5: 9, A5: 10 };
const POOLS = {
  "c-major": ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "a-minor": ["G4", "G#4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "G#5", "A5"],
  "g-major": ["G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  "f-major": ["F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "d-major": ["D4", "E4", "F5", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  "bb-major": ["D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5"],
  "e-minor": ["D#4", "E4", "F5", "G4", "A4", "B4", "C5", "D#5", "E5", "F5", "G5", "A5"],
  "d-minor": ["C#4", "D4", "E4", "F4", "G4", "A4", "B4", "C#5", "D5", "E5", "F5", "G5"],
};
const TONIC = { "c-major": "C4", "a-minor": "A4", "g-major": "G4", "f-major": "F4", "d-major": "D4", "bb-major": "B4", "e-minor": "E4", "d-minor": "D4" };
const REQUIRED = { "a-minor": ["G#4", "G#5"], "e-minor": ["D#4", "D#5"], "d-minor": ["C#4", "C#5"] };
const RHYTHM_UNITS = { semibreve: 3.2, minim: 2.2, "dotted-crotchet": 1.8, crotchet: 1.3, quaver: 1 };
const BAR_PATTERNS = [
  ["minim", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "minim"],
  ["minim", "minim"],
  ["crotchet", "crotchet", "crotchet", "crotchet"],
  ["dotted-crotchet", "quaver", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
  ["quaver", "quaver", "quaver", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "quaver", "quaver", "crotchet"],
  ["minim", "quaver", "quaver", "quaver", "quaver"],
];

const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
const randomItem = (items) => items[Math.floor(Math.random() * items.length)];
const noteBase = (note) => String(note || "C5").replace("#", "");
const noteStep = (note) => NOTE_STEPS[noteBase(note)] ?? NOTE_STEPS.C5;
const yForStep = (step) => STAFF.top + STAFF.gap * 4 - step * (STAFF.gap / 2);
const stemDown = (step) => step > 4;
const keyList = (level) => (LEVELS[level]?.keyIds || LEVELS.N5.keyIds).map((id) => KEYS[id]);
const identifyButtons = (level) => BUTTON_ORDER.filter((id) => (LEVELS[level]?.keyIds || LEVELS.N5.keyIds).includes(id)).map((id) => KEYS[id]);

function sharedActualSymbolKey(key) {
  if (key === "flatInScore" || key === "flatKeySignature") return "flat";
  if (key === "naturalInScore") return "natural";
  if (key === "sharpInScore" || key === "sharpKeySignature") return "sharp";
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  return key;
}

function sharedSettingsKey(key) {
  if (key === "flatKeySignature" || key === "sharpKeySignature") {
    return SHARED_CONFIG.symbols?.keySignatureAccidentals ? "keySignatureAccidentals" : key;
  }
  if (key === "flatInScore" || key === "naturalInScore" || key === "sharpInScore") {
    return SHARED_CONFIG.symbols?.scoreAccidentals ? "scoreAccidentals" : key;
  }
  return key;
}

function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols ?? {};
  const settingsKey = sharedSettingsKey(key);
  return symbols[settingsKey] ?? symbols[sharedActualSymbolKey(settingsKey)] ?? {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}

function sharedSymbolForKey(key) {
  return SHARED_SYMBOLS[sharedActualSymbolKey(key)] ?? "";
}

function accidentalSymbolKey(type, context = "score") {
  if (context === "keySignature") return type === "sharp" ? "sharpKeySignature" : "flatKeySignature";
  if (type === "sharp") return "sharpInScore";
  if (type === "flat") return "flatInScore";
  return "naturalInScore";
}

function noteSymbolKey(rhythm, down, beamed = false) {
  if (rhythm === "semibreve") return "wholeNote";
  if (beamed && rhythm === "quaver") return down ? "noteheadBlackStemDown" : "noteheadBlackStemUp";
  if (rhythm === "minim") return down ? "halfNoteStemDown" : "halfNoteStemUp";
  if (rhythm === "quaver") return down ? "eighthNoteStemDown" : "eighthNoteStemUp";
  return down ? "quarterNoteStemDown" : "quarterNoteStemUp";
}

function calibrationAnchorX(key, left = STAFF.left) {
  const anchor = CALIBRATION_ANCHORS[key];
  return anchor ? left + anchor.xScale * STAFF.gap : left;
}

function calibrationAnchorY(key) {
  const anchor = CALIBRATION_ANCHORS[key];
  return anchor ? yForStep(anchor.step) : yForStep(4);
}

function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", opacity = 1, lineGap = STAFF.gap, filter = null, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
  const widthScale = Number(settings.widthScale || 1);
  const heightScale = Number(settings.heightScale || 1);
  return (
    <text
      className="music-symbol"
      x={adjustedX}
      y={adjustedY}
      fill={colour}
      opacity={opacity}
      fontSize={fontSize}
      textAnchor="middle"
      style={filter ? { filter } : undefined}
      transform={`translate(${adjustedX} ${adjustedY}) scale(${widthScale} ${heightScale}) translate(${-adjustedX} ${-adjustedY})`}
      pointerEvents="none"
    >
      {glyph}
    </text>
  );
}

function CalibratedTimeSignature({ signature = "4/4", x, y, lineGap = STAFF.gap }) {
  const parts = TIME_SIGNATURE_SYMBOLS[signature] ?? TIME_SIGNATURE_SYMBOLS["4/4"];
  const key = parts.key || "timeSignature";
  const settings = sharedSymbolConfig(key);
  const topGlyph = parts.top.map((part) => sharedSymbolForKey(part)).join("");
  const bottomGlyph = parts.bottom.map((part) => sharedSymbolForKey(part)).join("");
  if (!topGlyph || !bottomGlyph) return null;
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
  const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const widthScale = Number(settings.widthScale || 1);
  const heightScale = Number(settings.heightScale || 1);
  return (
    <g transform={`translate(${adjustedX} ${adjustedY}) scale(${widthScale} ${heightScale}) translate(${-adjustedX} ${-adjustedY})`} pointerEvents="none">
      <text className="music-symbol" x={adjustedX} y={adjustedY - fontSize * 0.14} fontSize={fontSize} textAnchor="middle">{topGlyph}</text>
      <text className="music-symbol" x={adjustedX} y={adjustedY + fontSize * 0.43} fontSize={fontSize} textAnchor="middle">{bottomGlyph}</text>
    </g>
  );
}

function calibrationOffset(value) {
  return STAFF.gap * (value / CALIBRATION_PREVIEW_GAP);
}

function calibrationLayoutX(name) {
  return STAFF.left + calibrationOffset(CALIBRATION_LAYOUT_OFFSETS[name] || 0);
}

function passageMusicStart() {
  return calibrationLayoutX("musicStart");
}

function passageBarWidth() {
  return (STAFF.right - passageMusicStart()) / BAR_COUNT;
}

function passageBarStart(index) {
  return passageMusicStart() + passageBarWidth() * index;
}

function passageBarEnd(index) {
  return passageBarStart(index + 1);
}

function accidentalX(type, index = 0) {
  return calibrationLayoutX("keySignature") + index * STAFF.gap;
}

function scoreAccidentalBaseX(x) {
  return x - STAFF.gap * 2.1;
}

function Accidental({ item, index, opacity = 1, style = null, context = "keySignature" }) {
  return <CalibratedSymbol symbolKey={accidentalSymbolKey(item.type, context)} x={accidentalX(item.type, index)} y={yForStep(item.step)} opacity={opacity} filter={style?.filter || null} />;
}

const getStreakMedal = (streak) => window.MLH?.getStreakMedal?.(streak);

function playSound(correct, celebration = false, medal = null) {
  window.MLH?.playFeedbackSound?.(correct, celebration, medal);
}

function normaliseAnswer(value) {
  return value.toLowerCase().replace(/♭/g, " flat ").replace(/#/g, " sharp ").replace(/\bb\s*flat\b/g, "b flat").replace(/\s+/g, " ").trim();
}

function answerMatches(raw, label) {
  const answer = normaliseAnswer(raw);
  const target = normaliseAnswer(label);
  if (!answer) return false;
  if (answer === target) return true;
  if (target === "b flat major") return answer === "bb" || answer === "b flat";
  if (target.endsWith(" major")) {
    const tonic = target.replace(/ major$/, "");
    const compact = tonic.replace(/\s+/g, "");
    return answer === tonic || answer === compact || answer === `${compact}maj` || answer === `${tonic} maj`;
  }
  if (target.endsWith(" minor")) {
    const tonic = target.replace(/ minor$/, "");
    const compact = tonic.replace(/\s+/g, "");
    return answer === `${compact}m` || answer === `${tonic} m` || answer === `${compact}min` || answer === `${tonic} min` || answer === `${tonic} minor`;
  }
  return false;
}

function autoCap(value) {
  return value
    .replace(/(^|\s)([a-g])(?=\s|$)/g, (_, prefix, letter) => `${prefix}${letter.toUpperCase()}`)
    .replace(/(^|\s)([ade])m(?=\s|$)/gi, (_, prefix, letter) => `${prefix}${letter.toUpperCase()}m`);
}

function chooseNextPitch(pool, previous, maxStep = 7) {
  const previousStep = noteStep(previous);
  const candidates = pool.filter((note) => Math.abs(noteStep(note) - previousStep) <= maxStep);
  const usable = candidates.length ? candidates : pool;
  const index = usable.findIndex((note) => noteBase(note) === noteBase(previous));
  const start = index >= 0 ? index : Math.floor(usable.length / 2);
  const move = Math.random() < 0.08 ? randomItem([-7, 7]) : randomItem([-3, -2, -1, 1, 2, 3]);
  return usable[clamp(start + move, 0, usable.length - 1)] || usable[0];
}

function chooseQuaverPitch(pool, previous) {
  const previousStep = noteStep(previous);
  const options = pool.filter((note) => note !== previous && Math.abs(noteStep(note) - previousStep) <= 2);
  return options.length ? randomItem(options) : chooseNextPitch(pool, previous, 2);
}

function makeQuestion({ level, identify = true, build = true }) {
  const type = identify && build ? (Math.random() < 0.5 ? "build-key" : "identify-key") : build ? "build-key" : "identify-key";
  const keys = keyList(level);
  const accidentalKeys = keys.filter((key) => key.signature.length);
  const plainKeys = keys.filter((key) => !key.signature.length);
  const key = type === "build-key" && accidentalKeys.length
    ? (plainKeys.length && Math.random() < 0.1 ? randomItem(plainKeys) : randomItem(accidentalKeys))
    : randomItem(keys);
  const pool = POOLS[key.id];
  const bars = [];
  let previous = TONIC[key.id];

  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    const patterns = barIndex === BAR_COUNT - 1 ? [...BAR_PATTERNS, ["semibreve"]] : BAR_PATTERNS;
    const pattern = randomItem(patterns);
    const bar = pattern.map((rhythm, noteIndex) => {
      const pitch = barIndex === 0 && noteIndex === 0
        ? TONIC[key.id]
        : rhythm === "quaver" && pattern[noteIndex - 1] === "quaver"
          ? chooseQuaverPitch(pool, previous)
          : chooseNextPitch(pool, previous);
      previous = pitch;
      return { rhythm, pitch };
    });
    bars.push(bar);
  }

  if (REQUIRED[key.id] && !bars.some((bar) => bar.some((note) => REQUIRED[key.id].includes(note.pitch)))) {
    const barIndex = key.id === "a-minor" ? randomItem([1, 2]) : Math.floor(Math.random() * bars.length);
    const noteIndex = Math.floor(Math.random() * bars[barIndex].length);
    bars[barIndex][noteIndex] = { ...bars[barIndex][noteIndex], pitch: randomItem(REQUIRED[key.id]) };
  }

  return {
    id: Math.random().toString(36).slice(2),
    type,
    key,
    bars,
    identifyMode: type === "identify-key" && Math.random() < 0.35 ? "typed" : "buttons",
    maxBuildAccidentals: level === "AH" ? 2 : Math.max(key.signature.length, 1),
  };
}

const useClickAway = window.MLH.useClickAway;

function useMobileFlag() {
  const [mobile, setMobile] = useState(window.innerWidth < 640);
  useEffect(() => {
    const update = () => setMobile(window.innerWidth < 640);
    update();
    window.addEventListener("resize", update);
    return () => window.removeEventListener("resize", update);
  }, []);
  return mobile;
}

function useTouchDevice() {
  const isTouch = () => window.MLH?.isTouchDevice?.() ?? (window.matchMedia("(hover: none) and (pointer: coarse)").matches || window.matchMedia("(pointer: coarse)").matches || navigator.maxTouchPoints > 0 || "ontouchstart" in window);
  const [touchDevice, setTouchDevice] = useState(isTouch);
  useEffect(() => {
    const mediaHover = window.matchMedia("(hover: none) and (pointer: coarse)");
    const mediaPointer = window.matchMedia("(pointer: coarse)");
    const update = () => setTouchDevice(isTouch());
    update();
    mediaHover.addEventListener?.("change", update);
    mediaPointer.addEventListener?.("change", update);
    window.addEventListener("resize", update);
    window.addEventListener("orientationchange", update);
    return () => {
      mediaHover.removeEventListener?.("change", update);
      mediaPointer.removeEventListener?.("change", update);
      window.removeEventListener("resize", update);
      window.removeEventListener("orientationchange", update);
    };
  }, []);
  return touchDevice;
}

function useLandscapeLock() {
  useEffect(() => {
    return window.MLH?.installPhoneLandscapeLock?.();
  }, []);
}

function useSession(initialLevel) {
  const [level, setLevel] = useState(initialLevel);
  const [question, setQuestion] = useState(() => makeQuestion({ level: initialLevel }));
  const [visible, setVisible] = useState(true);
  const [modes, setModes] = useState({ identify: true, build: true });
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [typed, setTyped] = useState("");
  const [selectedAccidental, setSelectedAccidental] = useState(null);
  const [placed, setPlaced] = useState([]);
  const [hover, setHover] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [score, setScore] = useState({ correct: 0, attempted: 0, streak: 0, best: 0 });
  const [confetti, setConfetti] = useState(0);
  const [autoShowMedals, setAutoShowMedals] = useState(false);
  const nextTimer = useRef(null);
  const fadeTimer = useRef(null);

  const locked = Boolean(feedback);
  const expected = question.key.signature;

  const resetQuestionState = () => {
    setSelectedAnswer(null);
    setTyped("");
    setSelectedAccidental(null);
    setPlaced([]);
    setHover(null);
    setFeedback(null);
    setFeedbackFading(false);
  };

  const clearTimers = () => {
    window.clearTimeout(nextTimer.current);
    window.clearTimeout(fadeTimer.current);
  };

  const nextQuestion = (nextLevel = level, nextModes = modes, skipped = false) => {
    clearTimers();
    if (skipped) setScore((value) => ({ ...value, streak: 0 }));
    setVisible(false);
    window.setTimeout(() => {
      setQuestion(makeQuestion({ level: nextLevel, ...nextModes }));
      resetQuestionState();
      setVisible(true);
    }, 220);
  };

  const updateScore = (correct) => {
    playSound(correct);
    setScore((value) => {
      const streak = correct ? value.streak + 1 : 0;
      if (correct && [10, 15, 20, 30].includes(streak)) {
        const nextMedal = getStreakMedal(streak);
        setConfetti((count) => count + 1);
        setAutoShowMedals(true);
        window.setTimeout(() => setAutoShowMedals(false), 2000);
        window.setTimeout(() => playSound(true, true, nextMedal.sound), 180);
      }
      return {
        correct: value.correct + (correct ? 1 : 0),
        attempted: value.attempted + 1,
        streak,
        best: Math.max(value.best, streak),
      };
    });
    setFeedback({ correct });
    if (correct) {
      setFeedbackFading(false);
      fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
      nextTimer.current = window.setTimeout(() => nextQuestion(), 2000);
    }
  };

  useEffect(() => () => clearTimers(), []);

  return {
    level,
    question,
    visible,
    modes,
    selectedAnswer,
    typed,
    selectedAccidental,
    placed,
    hover,
    feedback,
    feedbackFading,
    score,
    confetti,
    autoShowMedals,
    locked,
    expected,
    setTyped,
    setSelectedAccidental,
    setHover,
    nextQuestion,
    skip() {
      nextQuestion(level, modes, true);
    },
    resetScore() {
      setScore({ correct: 0, attempted: 0, streak: 0, best: 0 });
      setConfetti(0);
      setAutoShowMedals(false);
      nextQuestion();
    },
    changeLevel(nextLevel) {
      setLevel(nextLevel);
      setScore({ correct: 0, attempted: 0, streak: 0, best: 0 });
      setConfetti(0);
      setAutoShowMedals(false);
      nextQuestion(nextLevel, modes);
    },
    toggleIdentify() {
      if (modes.identify && !modes.build) return;
      const nextModes = { ...modes, identify: !modes.identify };
      setModes(nextModes);
      nextQuestion(level, nextModes);
    },
    toggleBuild() {
      if (modes.build && !modes.identify) return;
      const nextModes = { ...modes, build: !modes.build };
      setModes(nextModes);
      nextQuestion(level, nextModes);
    },
    answer(keyId) {
      if (locked) return;
      setSelectedAnswer(keyId);
      updateScore(keyId === question.key.id);
    },
    submitTyped() {
      if (locked || !typed.trim()) return;
      setSelectedAnswer(question.key.id);
      updateScore(answerMatches(typed, question.key.label));
    },
    placeAccidental(item) {
      if (locked || !selectedAccidental) return;
      setPlaced((current) => {
        const max = question.maxBuildAccidentals || Math.max(expected.length, 1);
        const next = [...current];
        const index = clamp(item.index ?? next.length, 0, max - 1);
        if (next[index]?.type === item.type && next[index]?.step === item.step) {
          next.splice(index, 1);
          return next;
        }
        next[index] = { type: item.type, step: item.step };
        return next.filter(Boolean).slice(0, max);
      });
    },
    clearPlaced() {
      if (!locked) setPlaced([]);
    },
    submitBuild() {
      if (locked) return;
      const correct = placed.length === expected.length && expected.every((item, index) => placed[index]?.type === item.type && placed[index]?.step === item.step);
      updateScore(correct);
    },
    fadeWrong() {
      if (!feedback || feedback.correct || feedbackFading) return;
      setFeedbackFading(true);
      window.setTimeout(() => nextQuestion(), 280);
    },
  };
}

function Staff({ buildFocus }) {
  const fadeX = buildFocus ? calibrationLayoutX("keySignature") + STAFF.gap * 4.5 : STAFF.right;
  return (
    <g>
      <defs>
        <linearGradient id="staffFadeV2" x1={STAFF.left} y1="0" x2={fadeX} y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stopColor="#000" stopOpacity="1" />
          <stop offset="94%" stopColor="#000" stopOpacity="1" />
          <stop offset="100%" stopColor="#000" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0, 1, 2, 3, 4].map((line) => (
        <line key={line} x1={STAFF.left} x2={fadeX} y1={STAFF.top + line * STAFF.gap} y2={STAFF.top + line * STAFF.gap} stroke="url(#staffFadeV2)" strokeWidth="1.5" />
      ))}
      {!buildFocus && Array.from({ length: BAR_COUNT - 1 }, (_, index) => {
        const x = passageBarEnd(index);
        return <line key={index} x1={x} x2={x} y1={STAFF.top} y2={STAFF.top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.5" />;
      })}
      <CalibratedSymbol symbolKey="gClef" x={calibrationAnchorX("gClef")} y={calibrationAnchorY("gClef")} />
      {!buildFocus && <CalibratedTimeSignature signature="4/4" x={calibrationLayoutX("timeSignature")} y={calibrationAnchorY("timeSig44")} />}
    </g>
  );
}

function KeySignature({ signature }) {
  return <g pointerEvents="none">{signature.map((item, index) => <Accidental key={`${item.type}-${index}`} item={item} index={index} />)}</g>;
}

function getStem(x, y, step, forcedDown = null, forcedEndY = null) {
  const down = forcedDown ?? stemDown(step);
  const stemLength = calibrationOffset(31);
  const stemXOffset = calibrationOffset(6);
  const stemStartOffset = calibrationOffset(0.5);
  return {
    down,
    stemX: x + (down ? -stemXOffset : stemXOffset),
    startY: y + (down ? stemStartOffset : -stemStartOffset),
    endY: forcedEndY ?? (down ? y + stemLength : y - stemLength),
  };
}

function LedgerLines({ x, step, colour = "currentColor" }) {
  if (step > -2 && step < 10) return null;
  const settings = sharedSymbolConfig("ledgerLines");
  const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const halfWidth = (STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4) * Number(settings.widthScale || 1)) / 2;
  const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11) * Number(settings.heightScale || 1));
  const lines = [];
  if (step <= -2) {
    for (let ledgerStep = -2; ledgerStep >= step; ledgerStep -= 2) lines.push(ledgerStep);
  } else {
    for (let ledgerStep = 10; ledgerStep <= step; ledgerStep += 2) lines.push(ledgerStep);
  }
  return (
    <g pointerEvents="none">
      {lines.map((ledgerStep) => {
        const y = yForStep(ledgerStep) + yOffset;
        return <line key={ledgerStep} x1={x - halfWidth + xOffset} x2={x + halfWidth + xOffset} y1={y} y2={y} stroke={colour} strokeWidth={thickness} strokeLinecap="butt" />;
      })}
    </g>
  );
}

function Dot({ x, y, step }) {
  const dotKey = step % 2 === 0 ? "augmentationDotLine" : "augmentationDotSpace";
  const dotY = step % 2 === 0 ? y - STAFF.gap * 0.25 : y;
  return <CalibratedSymbol symbolKey={dotKey} x={x + calibrationOffset(13)} y={dotY} />;
}

function Note({ note, x, beamedDown = null, forcedEndY = null, showFlag = true, accidental = false }) {
  const step = noteStep(note.pitch);
  const y = yForStep(step);
  const down = beamedDown ?? stemDown(step);
  const beamed = note.rhythm === "quaver" && !showFlag;
  const stem = beamed ? getStem(x, y, step, down, forcedEndY) : null;
  const dotted = note.rhythm === "dotted-crotchet";
  const noteKey = noteSymbolKey(note.rhythm, down, beamed);

  return (
    <g pointerEvents="none">
      <LedgerLines x={x} step={step} />
      {accidental && <CalibratedSymbol symbolKey="sharpInScore" x={scoreAccidentalBaseX(x)} y={y} />}
      <CalibratedSymbol symbolKey={noteKey} x={x} y={y} />
      {stem && forcedEndY !== null && <line x1={stem.stemX} x2={stem.stemX} y1={stem.startY} y2={forcedEndY} stroke="currentColor" strokeWidth={Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12))} />}
      {dotted && <Dot x={x} y={y} step={step} />}
    </g>
  );
}

function quaverGroups(bar) {
  const groups = [];
  let index = 0;
  while (index < bar.length) {
    if (bar[index].rhythm !== "quaver") {
      index += 1;
      continue;
    }
    const start = index;
    while (bar[index + 1]?.rhythm === "quaver") index += 1;
    if (index > start) groups.push({ start, end: index });
    index += 1;
  }
  return groups;
}

function barPositions(bar, startX, endX, barIndex = 0) {
  const total = bar.reduce((sum, note) => sum + RHYTHM_UNITS[note.rhythm], 0);
  const startPad = calibrationOffset(barIndex === 0 ? 4 : 15);
  const endPad = calibrationOffset(barIndex === BAR_COUNT - 1 ? 24 : 4);
  const availableStart = startX + startPad;
  const availableEnd = endX - endPad;
  const unit = (availableEnd - availableStart) / total;
  let x = availableStart + unit * 0.38;
  return bar.map((note) => {
    const current = x;
    x += RHYTHM_UNITS[note.rhythm] * unit;
    return current;
  });
}

function Passage({ bars }) {
  return (
    <g>
      {bars.map((bar, barIndex) => {
        const positions = barPositions(bar, passageBarStart(barIndex), passageBarEnd(barIndex), barIndex);
        const groups = quaverGroups(bar);
        const altered = new Set();
        const states = bar.map((note, noteIndex) => {
          const letter = note.pitch.includes("#") ? noteBase(note.pitch)[0] : null;
          const showAccidental = Boolean(letter) && !altered.has(letter);
          if (letter) altered.add(letter);
          return { showAccidental, x: positions[noteIndex] };
        });

        return (
          <g key={barIndex}>
            {bar.map((note, noteIndex) => {
              const group = groups.find((item) => noteIndex >= item.start && noteIndex <= item.end);
              const down = group ? groupHasDownStems(bar, group) : null;
              const beam = group ? beamForGroup(bar, group, states.map((state) => state.x), down) : null;
              const x = states[noteIndex].x;
              const step = noteStep(note.pitch);
              const y = yForStep(step);
              const stem = beam ? getStem(x, y, step, down) : null;
              const forcedEndY = beam ? beamYAtX(stem.stemX, beam) : null;
              return (
                <g key={`${barIndex}-${noteIndex}`}>
                  <Note note={note} x={x} accidental={states[noteIndex].showAccidental} beamedDown={down} forcedEndY={forcedEndY} showFlag={!group} />
                  {beam && group.start === noteIndex && <BeamShape beam={beam} />}
                </g>
              );
            })}
          </g>
        );
      })}
    </g>
  );
}

function groupHasDownStems(bar, group) {
  let down = 0;
  let up = 0;
  for (let index = group.start; index <= group.end; index += 1) stemDown(noteStep(bar[index].pitch)) ? down++ : up++;
  return down > up;
}

function beamForGroup(bar, group, positions, down) {
  const settings = sharedSymbolConfig("quaverBeam");
  const xOffset = calibrationOffset(Number(settings.xOffsetScale || 0) * CALIBRATION_PREVIEW_GAP);
  const yOffset = calibrationOffset(Number(settings.yOffsetScale || 0) * CALIBRATION_PREVIEW_GAP);
  const stemLength = calibrationOffset(31) * Number(settings.heightScale || 1);
  const beamWidthAdjust = calibrationOffset(6) * (Number(settings.widthScale || 1) - 1);
  const stemXOffset = calibrationOffset(6);
  const startStep = noteStep(bar[group.start].pitch);
  const endStep = noteStep(bar[group.end].pitch);
  const startStemX = positions[group.start] + xOffset + (down ? -stemXOffset : stemXOffset);
  const endStemX = positions[group.end] + xOffset + (down ? -stemXOffset : stemXOffset);
  return {
    start: {
      x: startStemX - beamWidthAdjust,
      y: yForStep(startStep) + yOffset + (down ? stemLength : -stemLength),
    },
    end: {
      x: endStemX + beamWidthAdjust,
      y: yForStep(endStep) + yOffset + (down ? stemLength : -stemLength),
    },
  };
}

function beamYAtX(x, beam) {
  const progress = (x - beam.start.x) / (beam.end.x - beam.start.x || 1);
  return beam.start.y + progress * (beam.end.y - beam.start.y);
}

function beamPolygonPoints(x1, y1, x2, y2, thickness) {
  const halfThickness = thickness / 2;
  return [`${x1},${y1 - halfThickness}`, `${x2},${y2 - halfThickness}`, `${x2},${y2 + halfThickness}`, `${x1},${y1 + halfThickness}`].join(" ");
}

function BeamShape({ beam, colour = "currentColor" }) {
  const settings = sharedSymbolConfig("quaverBeam");
  const thickness = Math.max(1, calibrationOffset(4) * Number(settings.fontSizeScale || 1));
  return <polygon points={beamPolygonPoints(beam.start.x, beam.start.y, beam.end.x, beam.end.y, thickness)} fill={colour} />;
}

function BuildLayer({ question, selectedAccidental, placed, setHover, hover, onPlace, feedback, mobileBuild }) {
  const [drag, setDrag] = useState(null);
  const max = question.maxBuildAccidentals || 1;
  const expected = question.key.signature;
  const showingFeedback = Boolean(feedback);

  function pointerToSvg(event) {
    const svg = event.currentTarget.ownerSVGElement;
    const rect = svg.getBoundingClientRect();
    const viewBox = svg.viewBox.baseVal;
    return {
      x: viewBox.x + ((event.clientX - rect.left) / rect.width) * viewBox.width,
      y: viewBox.y + ((event.clientY - rect.top) / rect.height) * viewBox.height,
    };
  }

  function accidentalFromPointer(event) {
    if (!selectedAccidental || showingFeedback) return null;
    const pointer = pointerToSvg(event);
    const rawStep = Math.round((STAFF.top + STAFF.gap * 4 - (pointer.y - (mobileBuild && event.pointerType === "touch" ? 44 : 0))) / (STAFF.gap / 2));
    const centers = Array.from({ length: max }, (_, index) => accidentalX(selectedAccidental, index));
    let index = centers.reduce((best, center, current) => Math.abs(center - pointer.x) < Math.abs(centers[best] - pointer.x) ? current : best, 0);
    if (index > 0 && !placed[0]) index = 0;
    return { type: selectedAccidental, step: clamp(rawStep, -2, 10), index };
  }

  const move = (event) => {
    if (showingFeedback) return;
    const next = accidentalFromPointer(event);
    setHover(next);
    if (drag && next) setDrag(next);
  };
  const down = (event) => {
    const next = accidentalFromPointer(event);
    if (!next) return;
    event.preventDefault();
    event.currentTarget.setPointerCapture?.(event.pointerId);
    setDrag(next);
    setHover(next);
  };
  const up = (event) => {
    if (!drag) return;
    event.preventDefault();
    const next = accidentalFromPointer(event) || drag;
    onPlace(next);
    setDrag(null);
    setHover(null);
  };

  const preview = drag || hover;
  const feedbackStyle = (correct) => ({ filter: correct ? "brightness(0) saturate(100%) invert(38%) sepia(75%) saturate(1043%) hue-rotate(89deg) brightness(92%) contrast(90%)" : "brightness(0) saturate(100%) invert(19%) sepia(83%) saturate(3207%) hue-rotate(347deg) brightness(88%) contrast(93%)" });

  return (
    <g>
      {preview && !showingFeedback && <Accidental item={preview} index={preview.index} opacity={drag ? 0.82 : 0.45} />}
      {placed.map((item, index) => <Accidental key={`${item.type}-${item.step}-${index}`} item={item} index={index} opacity={showingFeedback && !feedback.correct ? 0.4 : 1} style={showingFeedback ? feedbackStyle(feedback.correct) : null} />)}
      {showingFeedback && !feedback.correct && expected.map((item, index) => <Accidental key={`expected-${index}`} item={item} index={index} style={feedbackStyle(true)} />)}
      <rect x={calibrationLayoutX("keySignature") - 58} y={STAFF.top - 34} width="158" height={STAFF.gap * 4 + 68} fill="transparent" pointerEvents="all" style={{ touchAction: "none", cursor: selectedAccidental && !showingFeedback ? "pointer" : "default" }} onPointerMove={move} onPointerLeave={() => !drag && setHover(null)} onPointerDown={down} onPointerUp={up} onPointerCancel={() => { setDrag(null); setHover(null); }} />
    </g>
  );
}

function Score({ question, session, mobile }) {
  const mobileBuild = mobile && question.type === "build-key";
  const viewBox = mobileBuild ? MOBILE_BUILD_VIEWBOX : mobile ? MOBILE_VIEWBOX : { x: 0, y: 0, width: SVG.width, height: SVG.height };
  return (
    <svg viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`} className={`h-auto select-none overflow-hidden sm:overflow-visible ${mobileBuild ? "mx-auto block w-full max-w-[340px] translate-y-[-10px]" : "w-full"}`}>
      <rect width={SVG.width} height={360} fill="white" />
      <Staff buildFocus={mobileBuild} />
      {question.type === "build-key" ? (
        <BuildLayer question={question} selectedAccidental={session.selectedAccidental} placed={session.placed} hover={session.hover} setHover={session.setHover} onPlace={session.placeAccidental} feedback={session.feedback} mobileBuild={mobileBuild} />
      ) : (
        <KeySignature signature={question.key.signature} />
      )}
      {!mobileBuild && <Passage bars={question.bars} />}
    </svg>
  );
}

function KeyName({ label, muted = false, inverted = false }) {
  if (label !== "B flat major") return <span className="whitespace-nowrap">{label}</span>;
  return (
    <span className="inline-flex items-baseline gap-[2px] whitespace-nowrap">
      <span>B</span>
      <span className={`music-symbol relative -left-[2px] top-[2px] inline-block text-[1.15em] leading-none ${inverted ? "text-white" : ""} ${muted ? "opacity-40" : ""}`}>{sharedSymbolForKey("flat")}</span>
      <span>major</span>
    </span>
  );
}

function Feedback({ feedback, fading }) {
  return <window.MLH.FeedbackBadge feedback={feedback} fading={fading} />;
}

function ScorePanel({ session }) {

    <window.MLH.ScoreStreakPanel

function ToggleRow({ glyph, label, enabled, disabled, onToggle }) {

          >

const LevelMenu = window.MLH?.LevelMenu || LocalLevelMenu;

function BravuraGlyph({ symbolKey, className = "" }) {
  return <span className={`music-symbol inline-block leading-none ${className}`}>{sharedSymbolForKey(symbolKey)}</span>;
}

function App() {
  useStyles();
  useLandscapeLock();
  const requestedLevel = useMemo(() => new URLSearchParams(window.location.search).get("level"), []);
  const session = useSession(LEVELS[requestedLevel] ? requestedLevel : "N5");
  const mobile = useMobileFlag();
  const touchDevice = useTouchDevice();
  const keyboard = window.MLH.useKeyboardReset();
  const menuRef = useRef(null);
  const [menu, setMenu] = useState(null);
  window.MLH.useClickAway(menuRef, () => setMenu(null));

  const isBuild = session.question.type === "build-key";
  const mobileBuild = mobile && isBuild;
  const showNoAccidentals = isBuild && session.feedback && !session.feedback.correct && session.expected.length === 0;
  const skipCorrectFeedback = () => {
    if (!session.feedback || !session.feedback.correct || session.feedbackFading) return;
    session.nextQuestion();
  };
  const instruction = isBuild
    ? <span>Create the key signature of <strong><KeyName label={session.question.key.label} /></strong>.</span>
    : <span>Name the <strong>key</strong> of this excerpt.</span>;

  const answerClass = (keyId) => {
    const base = "rounded-xl border px-4 py-3 text-[1.05rem] font-bold transition disabled:opacity-100";
    if (!session.feedback) return `${base} ${session.selectedAnswer === keyId ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`;
    if (keyId === session.question.key.id) return `${base} border-green-600 bg-green-600 text-white`;
    if (keyId === session.selectedAnswer) return `${base} border-red-600 bg-red-600 text-white`;
    return `${base} border-stone-200 bg-stone-100 text-stone-400`;
  };

  return (
    <div className="overflow-x-hidden bg-stone-50 pb-10 text-black md:pb-12">
      <window.MLH.AppHeader icon={ASSET.appIcon} title="Key Signatures" subtitle="Identify key signatures.">
        <ScorePanel session={session} />
      </window.MLH.AppHeader>

      <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
        <main className="relative flex min-h-[520px] flex-col overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-3 pt-[10px] shadow-sm sm:min-h-[390px] sm:px-4 sm:pb-0 md:px-6 md:pb-6 md:pt-[14px]" onPointerDown={() => {
          if (session.feedback && session.feedback.correct) {
            skipCorrectFeedback();
            return;
          }
          if (session.feedback && !session.feedback.correct) session.fadeWrong();
        }}>
          <div
            className="relative z-[90] mb-2.5 grid w-full grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2"
            ref={menuRef}
            onPointerDownCapture={(event) => {
              if (!menu) return;
              const target = event.target;
              if (target.closest?.("[data-menu-trigger]") || target.closest?.("[data-menu-panel]")) return;
              setMenu(null);
            }}
          >
            <div className="relative flex items-center gap-2">
              <div className="relative">
                <window.MLH.LevelButton
                  dataMenuTrigger
                  icon={<img src={ASSET.level} alt="" className="h-[26px] w-[28px]" />}
                  activeLabel={LEVELS[session.level].label}
                  activeLevel={session.level}
                  onClick={() => setMenu(menu === "level" ? null : "level")}
                />
                {menu === "level" && (
                  <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel>
                    <LevelMenu activeLevel={session.level} onSelect={(key) => { setMenu(null); session.changeLevel(key); }} levels={LEVELS} />
                  </window.MLH.MenuPanel>
                )}
              </div>
              <div className="relative">
                <window.MLH.CustomiseButton
                  dataMenuTrigger
                  icon={<img src={ASSET.customise} alt="" className="h-[21px] w-[21px]" />}
                  onClick={() => setMenu(menu === "customise" ? null : "customise")}
                />
                {menu === "customise" && <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel>
                  <ToggleRow glyph={<BravuraGlyph symbolKey="gClef" className="relative top-[5px] text-[18px]" />} label="Identify" enabled={session.modes.identify} disabled={session.modes.identify && !session.modes.build} onToggle={session.toggleIdentify} />
                  <ToggleRow glyph={<span className="relative -left-[3px] flex items-center gap-[2px]"><BravuraGlyph symbolKey="sharp" className="text-[24px]" /><BravuraGlyph symbolKey="flat" className="relative left-[4px] text-[24px]" /></span>} label="Create" enabled={session.modes.build} disabled={session.modes.build && !session.modes.identify} onToggle={session.toggleBuild} />
                </window.MLH.MenuPanel>}
              </div>
            </div>
            <div className="flex h-10 min-w-[112px] items-center justify-center sm:min-w-[140px]">
              <Feedback feedback={session.feedback} fading={session.feedbackFading} />
            </div>
            <div className="flex items-center justify-end gap-2 pr-0 justify-self-end sm:pr-0 md:pr-0">
              <window.MLH.SkipButton onClick={session.skip} icon={<img src={ASSET.next} alt="" className="h-[27.8px] w-[27.8px] object-contain" />} />
            </div>
          </div>

          {isBuild && touchDevice && !menu && (
            <p className="relative z-20 mb-2 text-center text-[0.74rem] font-light leading-tight tracking-normal text-stone-600" style={{ opacity: 0.45 }}>
              Press and hold to drag accidental into place.
            </p>
          )}

          <div className={`mx-auto flex w-full flex-1 items-center justify-center transition-opacity duration-300 sm:flex-none ${mobile ? "relative -top-[4px]" : "relative top-[24px]"} ${session.visible ? "opacity-100" : "opacity-0"}`}>
            <Score question={session.question} session={session} mobile={mobile} />
          </div>

          <div className="relative z-10 mt-auto overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md sm:mt-[-63px] sm:p-4 md:mx-3 md:-mt-[81px]">
            <p className="text-base font-semibold leading-tight">{instruction}</p>
            {showNoAccidentals && <p className="text-sm font-bold text-[#16a34a]">Correct answer: no sharps or flats.</p>}

            {isBuild ? (
              <div className="mt-4 flex flex-wrap items-end gap-2">
                <button type="button" disabled={session.locked} onClick={() => session.setSelectedAccidental("sharp")} className={`flex h-[56px] w-[56px] items-center justify-center rounded-xl border ${session.selectedAccidental === "sharp" ? "border-stone-950 bg-stone-950" : "border-stone-300 bg-white"}`}><BravuraGlyph symbolKey="sharp" className={`text-[42px] ${session.selectedAccidental === "sharp" ? "text-white" : "text-black"}`} /></button>
                <button type="button" disabled={session.locked} onClick={() => session.setSelectedAccidental("flat")} className={`flex h-[56px] w-[56px] items-center justify-center rounded-xl border ${session.selectedAccidental === "flat" ? "border-stone-950 bg-stone-950" : "border-stone-300 bg-white"}`}><BravuraGlyph symbolKey="flat" className={`relative top-[5px] text-[42px] ${session.selectedAccidental === "flat" ? "text-white" : "text-black"}`} /></button>
                <div className="ml-auto flex gap-2">
                  <button type="button" disabled={session.locked || session.placed.length === 0} onClick={session.clearPlaced} className="rounded-xl border border-stone-300 bg-white px-5 py-3 text-sm font-bold">Clear</button>
                  <button type="button" disabled={session.locked} onClick={session.submitBuild} className="rounded-xl border border-black bg-black px-5 py-3 text-sm font-bold text-white">Confirm</button>
                </div>
              </div>
            ) : session.question.identifyMode === "typed" ? (
              <div className="mt-4 flex flex-col gap-2 sm:flex-row sm:items-center">
                <div className="flex min-w-0 w-full flex-col gap-2 sm:w-1/2 sm:flex-row sm:items-center">
                  <input type="text" value={session.typed} disabled={session.locked} onFocus={keyboard.onFocus} onBlur={keyboard.onBlur} onChange={(event) => session.setTyped(autoCap(event.target.value))} onKeyDown={(event) => { if (event.key === "Enter") session.submitTyped(); }} className={`min-w-0 w-full rounded-xl border border-stone-300 bg-white px-4 py-3 text-[1.05rem] font-normal outline-none ${session.feedback ? session.feedback.correct ? "text-green-600" : "text-red-600" : "text-stone-900"}`} placeholder="Type your answer" />
                  {session.feedback && !session.feedback.correct && <div className="shrink-0 whitespace-nowrap text-[1.05rem] font-semibold text-green-600 sm:ml-3"><KeyName label={session.question.key.label} /></div>}
                </div>
                <button type="button" disabled={session.locked || !session.typed.trim()} onClick={session.submitTyped} className="rounded-xl border border-black bg-black px-5 py-3 text-[1.05rem] font-bold text-white disabled:opacity-50 sm:ml-auto">Confirm</button>
              </div>
            ) : (
              <div className="mt-4 grid grid-cols-2 gap-2 md:grid-cols-4">
                {identifyButtons(session.level).map((key) => <button key={key.id} type="button" disabled={session.locked} onClick={() => session.answer(key.id)} className={answerClass(key.id)}><KeyName label={key.label} muted={Boolean(session.feedback && key.id !== session.question.key.id && key.id !== session.selectedAnswer)} inverted={Boolean(session.feedback && (key.id === session.question.key.id || key.id === session.selectedAnswer))} /></button>)}
              </div>
            )}
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
  </script>
  <script src="./footer.js?v=1.3"></script>
</body>
</html>
