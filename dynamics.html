function App() {

          <div className="hub-menu-anchor relative" ref={customiseRef}>
            <window.MLH.CustomiseButton
              icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />}
              onClick={() => { setLevelOpen(false); setCustomiseOpen(v => !v); }}
              dataMenuTrigger={true}
            />
            {customiseOpen && <window.MLH.MenuPanel title="Customise" position="chords-customise-panel -left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}>
              <MenuRows activeLevel={activeLevel} enabledTypes={enabledTypes} setEnabledTypes={setEnabledTypes} enabledDynamics={enabledDynamics} setEnabledDynamics={setEnabledDynamics} newQuestion={newQuestion} followPlayback={followPlayback} setFollowPlayback={setFollowPlayback} tempo={tempo} setTempo={setTempo} metronomeEnabled={metronomeEnabled} setMetronomeEnabled={setMetronomeEnabled} stopAudio={stopAudio}/>
            </window.MLH.MenuPanel>}
          </div>
        </>}
        feedback={<FeedbackBanner feedback={feedback} fading={feedbackFading}/>}
        right={<window.MLH.SkipButton onClick={skipQuestion} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />} />}
      />
      <div className={`relative top-[22px] mb-[44px] transition-opacity duration-300 md:-top-[18px] md:mb-0 ${questionVisible ? "opacity-100" : "opacity-0"}`}><Score question={question} selectedSymbolId={selectedSymbolId} placements={placements} hoverPlacement={hoverPlacement} feedback={feedback} wrong={wrong} missing={missing} activeNoteId={followPlayback ? activeNoteId : null} onPointerMove={handlePointerMove} onPointerLeave={() => setHoverPlacement(null)} onLockPlacement={handleLockPlacement} isMobile={isMobileScore}/></div>
            <div className={`relative z-10 mt-8 min-h-[126px] overflow-visible rounded-xl border border-stone-200 bg-stone-50 px-4 pt-2 shadow-md md:-mt-[170px] md:mx-3 md:pb-2 ${isPlacement ? "pb-[78px]" : "pb-4"}`}>
        <div className="pr-0 text-stone-900 md:pr-[140px]"><p className="text-base font-semibold leading-tight" dangerouslySetInnerHTML={{ __html: question.prompt }} />{promptMessage && <p className={`mt-2 text-sm ${isStretchPrompt ? "font-normal italic text-stone-950" : "font-bold text-red-600"}`}>{promptMessage}</p>}</div>
        {isChoice && <ChoiceAnswers choices={question.choices} selectedChoice={selectedChoice} setSelectedChoice={setSelectedChoice} feedback={feedback} answerId={question.answerId} onChoose={chooseChoice}/>} 
        {isText && <div className="mt-4 flex flex-col gap-3 md:absolute md:bottom-5 md:left-4 md:right-4 md:mt-0 md:flex-row md:flex-wrap md:items-center md:justify-between"><input value={typedAnswer} readOnly={Boolean(feedback)} onChange={e => { setTypedAnswer(e.target.value); setPromptMessage(""); }} onKeyDown={e => { if (e.key === "Enter") confirmAnswer(); }} placeholder="Type your answer" className={window.MLH.typedAnswerClass(feedback, "min-w-[240px] text-sm font-medium md:w-1/2")} />{feedback && !feedback.correct && <span className="text-sm font-bold text-green-700 md:mr-auto">{dyn(question.answerId).description}</span>}<window.MLH.ConfirmButton disabled={Boolean(feedback)} onClick={confirmAnswer} className="md:ml-auto">Confirm</window.MLH.ConfirmButton></div>}
        {isPlacement && <><div className="mt-4 overflow-visible pb-[2px] pr-0"><DynamicAnswers filteredDynamics={filteredDynamics} selectedSymbolId={selectedSymbolId} setSelectedSymbolId={(id) => { setSelectedSymbolId(id); setPromptMessage(""); }} feedback={feedback} answerId={question.answerId} compact={question.type === "apply-score"}/></div></>}
        <div className={question.type === "audio" ? "absolute bottom-4 left-4 right-4 flex flex-col items-stretch gap-2 md:flex-row md:items-center md:justify-between" : "absolute bottom-4 left-4 right-4 flex items-center gap-2 md:left-auto"}>{isPlacement && question.type === "audio" && <button onClick={playExcerpt} disabled={Boolean(feedback)} className={`${window.MLH.PlayButtonClass} ${Boolean(feedback) ? "border-stone-300 bg-stone-200 text-stone-500" : ""}`}><span className="text-lg leading-none">{playing ? "■" : "▶"}</span><span>{playing ? "Stop" : "Play"}</span></button>}{isPlacement && question.type === "audio" ? <div className={window.MLH.ActionButtonGroupClass}><button disabled={Boolean(feedback) || placements.length === 0} onClick={clearPlacements} className={window.MLH.ClearButtonClass}>Clear</button><window.MLH.ConfirmButton disabled={Boolean(feedback) || placements.length === 0} onClick={confirmAnswer} className={window.MLH.AudioConfirmButtonClass}>Confirm</window.MLH.ConfirmButton></div> : <>{isPlacement && <button disabled={Boolean(feedback) || placements.length === 0} onClick={clearPlacements} className={window.MLH.ClearButtonClass}>Clear</button>}{isPlacement && <window.MLH.ConfirmButton disabled={Boolean(feedback) || placements.length === 0} onClick={confirmAnswer}>Confirm</window.MLH.ConfirmButton>}</>}</div>
      </div>
    </main>
    </div>
  </div>;
}

const root = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
else ReactDOM.render(<App />, root);
</script>
<script src="./footer.js?v=1.3"></script>
</body>
</html>
