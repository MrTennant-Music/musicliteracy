  const isText = question.type === "definition";
  const answerText = isText ? `Correct answer: ${dyn(question.answerId).description}` : "";
  const filteredDynamics = DYNAMICS.filter(d => enabledDynamics.includes(d.id) && (question.type !== "audio" || (question.audioQuestionKind === "find-f-location" ? d.id === "f" : question.audioQuestionKind === "find-p-location" ? d.id === "p" : question.audioQuestionKind === "gradual-location" ? ["crescendo", "diminuendo"].includes(d.id) : question.audioQuestionKind === "sfz-location" ? d.id === "sfz" : AUDIO_BUTTON_IDS.includes(d.id))));

  function stopAudio(fade = false) {
    clearTimeout(endTimerRef.current);
    endTimerRef.current = null;
    highlightTimersRef.current.forEach(id => clearTimeout(id));
    highlightTimersRef.current = [];
    const ctx = audioRef.current;
    if (!ctx) { setPlaying(false); setActiveNoteId(null); return; }
    if (fade && masterRef.current) {
      const now = ctx.currentTime;
      try { masterRef.current.gain.cancelScheduledValues(now); masterRef.current.gain.setValueAtTime(Math.max(masterRef.current.gain.value, 0.0001), now); masterRef.current.gain.exponentialRampToValueAtTime(0.0001, now + 0.18); } catch {}
      setTimeout(() => { try { ctx.close(); } catch {} }, 220);
    } else { try { ctx.close(); } catch {} }
    audioRef.current = null;
    setPlaying(false);
    setActiveNoteId(null);
  }
  function resetTask(q) {
    stopAudio();
    setQuestion(q);
    setSelectedSymbolId(null);
    setPlacements([]);
    setHoverPlacement(null);
    setPendingSpanStart(null);
    setPromptMessage("");
    setTypedAnswer("");
    setSelectedChoice(null);
    setFeedback(null);
    setFeedbackFading(false);
    setWrong([]);
    setMissing([]);
  }
  function newQuestion(types = enabledTypes, dynamics = enabledDynamics) {
    setQuestionVisible(false);
    setTimeout(() => { resetTask(makeQuestion(types, dynamics)); setQuestionVisible(true); }, 260);
  }
  function resetScore() { setCorrect(0); setAttempted(0); setStreak(0); setBest(0); newQuestion(); }
  function fadeToNext() { if (!feedback || feedback.correct || feedbackFading) return; setFeedbackFading(true); setTimeout(() => newQuestion(), 280); }
  function score(ok) {
    const ns = ok ? streak + 1 : 0;
    const medalBefore = getStreakMedal(streak);
    const medalAfter = getStreakMedal(ns);
    playFeedbackSound(ok);
    if (ok && medalAfter && (!medalBefore || medalBefore.sound !== medalAfter.sound)) {
      setTimeout(() => playFeedbackSound(true, true, medalAfter.sound), 420);
    }
    setAttempted(v => v + 1);
    setCorrect(v => v + (ok ? 1 : 0));
    setStreak(ns);
    setBest(v => Math.max(v, ns));
    setFeedback({ correct: ok });
    if (ok) { setTimeout(() => setFeedbackFading(true), 1700); setTimeout(() => newQuestion(), 2000); }
  }
  function pointerToSvg(event) { const rect = event.currentTarget.getBoundingClientRect(); return { x: ((event.clientX - rect.left) / rect.width) * W, y: ((event.clientY - rect.top) / rect.height) * H }; }
  function handlePointerMove(event) {
    if (!selectedSymbolId || feedback || !isPlacement) { setHoverPlacement(null); return; }
    const snapped = snap(pointerToSvg(event), selectedSymbolId, question);
    const isWedge = selectedSymbolId === "crescendo" || selectedSymbolId === "diminuendo";
    if (pendingSpanStart && isWedge) {
      const maxEnd = pendingSpanStart.systemIndex === 0 ? 3 : 7;
      setHoverPlacement({ ...pendingSpanStart, endBarIndex: clamp(snapped.barIndex, pendingSpanStart.barIndex, Math.min(pendingSpanStart.barIndex + 1, maxEnd)) });
      return;
    }
    setHoverPlacement(snapped);
  }
  function handleLockPlacement(event) {
    if (!selectedSymbolId || feedback || !hoverPlacement || !isPlacement) return;
    event.preventDefault();
    const isWedge = selectedSymbolId === "crescendo" || selectedSymbolId === "diminuendo";
    if (isWedge && question.type === "apply-score" && !pendingSpanStart) {
      const geo = barGeo(hoverPlacement.barIndex);
      setPendingSpanStart({ ...hoverPlacement, systemIndex: geo.systemIndex, endBarIndex: hoverPlacement.barIndex });
      setPromptMessage("Now click the next bar to stretch the marking across both bars.");
      return;
    }
    const placement = pendingSpanStart && isWedge ? { ...pendingSpanStart, endBarIndex: hoverPlacement.endBarIndex ?? hoverPlacement.barIndex } : hoverPlacement;
    setPlacements([{ ...placement, localId: Math.random().toString(36).slice(2) }]);
    setPendingSpanStart(null);
    setPromptMessage("");
  }
  function clearPlacements() { if (feedback) return; setPlacements([]); setHoverPlacement(null); setPendingSpanStart(null); setPromptMessage(""); }
  function confirmAnswer() {
    if (feedback) return;
    stopAudio(true);
    if (isText) {
      if (!typedAnswer.trim()) { setPromptMessage("Type an answer before pressing Confirm."); return; }
      const answer = dyn(question.answerId);
      const acceptable = [...answer.aliases, answer.description, answer.name].map(cleanText);
      score(acceptable.includes(cleanText(typedAnswer)));
      return;
    }
    if (!placements.length) { setPromptMessage("Place at least one dynamic on the score before pressing Confirm."); return; }
    const miss = missingRequired(question, placements);
    const wrongs = wrongPlacements(question, placements);
    setMissing(miss);
    setWrong(wrongs);
    score(placementsMatch(question, placements) && wrongs.length === 0 && miss.length === 0);
  }
  function chooseChoice(id) { if (feedback) return; score(id === question.answerId); }
  function gainForNote(barIndex, noteIndex, noteCount) {
    const plan = question.audioPlan || { kind: "static", dynamicId: question.answerId };
    if (plan.kind === "sfz") return barIndex === plan.accentBar && noteIndex === plan.accentNoteIndex ? dyn("sfz").gain : dyn(plan.baseDynamic || "mf").gain;
    if (plan.kind === "sudden-change") return dyn(barIndex >= plan.changeBar ? plan.targetDynamic : plan.startDynamic).gain;
    if (plan.kind === "crescendo" || plan.kind === "diminuendo") {
      const startGain = dyn(plan.startDynamic).gain;
      const endGain = dyn(plan.endDynamic).gain;
      if (barIndex < plan.changeBar) return startGain;
      const raw = (barIndex - plan.changeBar) / Math.max(1, BAR_COUNT - 1 - plan.changeBar) + (noteCount <= 1 ? 0 : noteIndex / Math.max(1, noteCount - 1)) / BAR_COUNT;
      const progress = clamp(Math.pow(raw, plan.kind === "crescendo" ? 0.55 : 0.7), 0, 1);
      return startGain + (endGain - startGain) * progress;
    }
    return dyn(plan.dynamicId || question.answerId).gain || 0.19;
  }
  function playExcerpt() {
    if (playing) return stopAudio(true);
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { setPromptMessage("Audio playback is not supported in this browser."); return; }
    stopAudio();
    const ctx = new AC();
    audioRef.current = ctx;
    setPlaying(true);
    const master = ctx.createGain();
    master.gain.value = 1;
    master.connect(ctx.destination);
    masterRef.current = master;
    const tempoBpm = tempo === "adagio" ? 66 : tempo === "allegro" ? 120 : 88;
    const beatSeconds = 60 / tempoBpm;
    let t = ctx.currentTime + 0.08;
    question.performedOrder.forEach(barIndex => {
      if (metronomeEnabled) {
        for (let beat = 0; beat < question.timeSignature.beats; beat += 1) {
          const clickTime = t + beat * beatSeconds;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = "square";
          osc.frequency.setValueAtTime(beat === 0 ? 1400 : 1000, clickTime);
          gain.gain.setValueAtTime(0.0001, clickTime);
          gain.gain.exponentialRampToValueAtTime(0.09, clickTime + 0.002);
          gain.gain.exponentialRampToValueAtTime(0.0001, clickTime + 0.06);
          osc.connect(gain); gain.connect(master); osc.start(clickTime); osc.stop(clickTime + 0.07);
        }
      }
      const bar = question.bars[barIndex];
      const chordStart = t;
      const chordDur = barDuration(bar, beatSeconds);
      const chordGain = gainForNote(barIndex, 0, bar.notes.length) * 0.16;
      chordFrequencies(bar.chord).forEach(f => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        o.type = "sine";
        o.frequency.setValueAtTime(f, chordStart);
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(700, chordStart);
        g.gain.setValueAtTime(0.0001, chordStart);
        g.gain.exponentialRampToValueAtTime(Math.max(0.002, chordGain), chordStart + 0.03);
        g.gain.exponentialRampToValueAtTime(0.0001, chordStart + chordDur);
        o.connect(filter); filter.connect(g); g.connect(master); o.start(chordStart); o.stop(chordStart + chordDur);
      });
      bar.notes.forEach((note, noteIndex) => {
        const dur = rhythm(note.rhythm).beats * beatSeconds;
        const startMs = Math.max(0, (t - ctx.currentTime) * 1000);
        highlightTimersRef.current.push(setTimeout(() => setActiveNoteId(note.id), startMs));
        highlightTimersRef.current.push(setTimeout(() => setActiveNoteId(null), startMs + dur * 1000));
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        const targetGain = gainForNote(barIndex, noteIndex, bar.notes.length);
        const isSfzHit = question.audioPlan?.kind === "sfz" && barIndex === question.audioPlan.accentBar && noteIndex === question.audioPlan.accentNoteIndex;
        o.type = "triangle";
        o.frequency.setValueAtTime(freqForStep(note.step), t);
        g.gain.setValueAtTime(0.0001, t);
        if (isSfzHit) {
          g.gain.exponentialRampToValueAtTime(targetGain, t + 0.008);
          g.gain.exponentialRampToValueAtTime(0.14, t + Math.min(0.22, dur * 0.45));
        } else {
          g.gain.exponentialRampToValueAtTime(Math.max(0.002, targetGain), t + 0.015);
          g.gain.exponentialRampToValueAtTime(Math.max(0.001, targetGain * 0.45), t + dur * 0.86);
        }
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); g.connect(master); o.start(t); o.stop(t + dur);
        t += dur;
      });
    });
    endTimerRef.current = setTimeout(() => { setPlaying(false); setActiveNoteId(null); highlightTimersRef.current = []; audioRef.current = null; try { ctx.close(); } catch {} }, Math.max(0, (t - ctx.currentTime) * 1000) + 120);
  }

  return <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2"><div className="mx-auto max-w-6xl">
    <header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm"><div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between"><div className="flex items-center gap-4"><AppIcon/><div><h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Dynamics</h1><p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Interpret and apply dynamics in the music.</p></div></div><div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end"><StatCard label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${acc}%`} progress={acc}/><div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${medal ? medal.bg : "bg-stone-50"}`}><StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${best}`} medal={medal}/><div className="relative z-0 flex min-h-[52px] min-w-[30px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700"><div>💎 <span className="text-cyan-500">30</span></div><div className="mt-1">🥇 <span className="text-yellow-500">20</span></div><div className="mt-1">🥈 <span className="text-slate-500">15</span></div><div className="mt-1">🥉 <span className="text-amber-700">10</span></div></div></div></div></div></header>
    <main className="relative -mt-[10px] overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-8 pt-[10px] shadow-sm md:h-auto md:overflow-visible md:px-6 md:pb-10 md:pt-[14px]" onPointerDown={() => { if (feedback && !feedback.correct) fadeToNext(); }}>
      <div className="relative z-20 mb-2.5 flex flex-wrap items-center justify-between gap-3">
        <div className="flex items-center gap-2"><div className="relative" ref={customiseRef}><button onClick={() => setCustomiseOpen(v => !v)} className="flex h-11 min-w-[30px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">⚙️ <span>Customise</span></button>{customiseOpen && <div className="absolute left-0 z-[100] mt-2 max-h-[72vh] w-[min(430px,calc(100vw-2rem))] overflow-y-auto rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><h2 className="mb-3 text-center text-base font-semibold">Customise</h2><MenuRows enabledTypes={enabledTypes} setEnabledTypes={setEnabledTypes} enabledDynamics={enabledDynamics} setEnabledDynamics={setEnabledDynamics} resetScore={resetScore} newQuestion={newQuestion} followPlayback={followPlayback} setFollowPlayback={setFollowPlayback} tempo={tempo} setTempo={setTempo} metronomeEnabled={metronomeEnabled} setMetronomeEnabled={setMetronomeEnabled}/></div>}</div></div>
        <button onClick={() => newQuestion()} className="flex h-11 min-w-[30px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800"><span>Skip Question</span><span className="text-lg leading-none">→</span></button>
        <div className="pointer-events-none absolute inset-x-0 top-1/2 z-30 flex -translate-y-1/2 justify-center overflow-visible"><FeedbackBanner feedback={feedback} fading={feedbackFading} answerText={answerText}/></div>
      </div>
      <div className={`relative -top-[18px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}><Score question={question} selectedSymbolId={selectedSymbolId} placements={placements} hoverPlacement={hoverPlacement} feedback={feedback} wrong={wrong} missing={missing} activeNoteId={followPlayback ? activeNoteId : null} onPointerMove={handlePointerMove} onPointerLeave={() => setHoverPlacement(null)} onLockPlacement={handleLockPlacement}/></div>
      <div className="relative z-10 mt-3 min-h-[126px] overflow-visible rounded-xl border border-stone-200 bg-stone-50 px-4 py-2 shadow-md md:-mt-[190px] md:mx-3">
        <div className="pr-[140px] text-stone-900"><p className="text-base font-semibold leading-tight" dangerouslySetInnerHTML={{ __html: question.prompt }} />{promptMessage && <p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}</div>
        {question.type === "audio" && <button onClick={playExcerpt} disabled={Boolean(feedback)} className={`absolute right-4 top-3 flex h-11 w-[120px] shrink-0 items-center justify-center gap-2 rounded-xl border px-4 text-sm font-semibold ${Boolean(feedback) ? "border-stone-300 bg-stone-200 text-stone-500" : "border-stone-950 bg-stone-950 text-white"}`}><span className="text-lg leading-none">{playing ? "■" : "▶"}</span><span>{playing ? "Stop" : "Play"}</span></button>}
        {isChoice && <ChoiceAnswers choices={question.choices} selectedChoice={selectedChoice} setSelectedChoice={setSelectedChoice} feedback={feedback} answerId={question.answerId} onChoose={chooseChoice}/>} 
        {isText && <div className="mt-4"><input value={typedAnswer} disabled={Boolean(feedback)} onChange={e => { setTypedAnswer(e.target.value); setPromptMessage(""); }} onKeyDown={e => { if (e.key === "Enter") confirmAnswer(); }} placeholder="Type your answer" className="w-full max-w-md rounded-xl border border-stone-300 bg-white px-4 py-3 text-sm font-medium outline-none focus:border-stone-950" /></div>}
        {isPlacement && <><div className="mt-4 flex flex-nowrap items-center justify-start gap-3 overflow-visible pb-[2px] pr-0"><DynamicAnswers filteredDynamics={filteredDynamics} selectedSymbolId={selectedSymbolId} setSelectedSymbolId={(id) => { setSelectedSymbolId(id); setPromptMessage(""); }} feedback={feedback} answerId={question.answerId} compact={question.type === "apply-score"}/></div></>}
        <div className="absolute bottom-4 right-4 flex items-center gap-2">{isPlacement && <button disabled={Boolean(feedback) || placements.length === 0} onClick={clearPlacements} className={`flex h-11 items-center justify-center rounded-xl border px-4 text-sm font-semibold ${Boolean(feedback) || placements.length === 0 ? "border-stone-300 bg-stone-200 text-stone-500" : "border-stone-300 bg-white text-black "}`}>Clear</button>}{!isChoice && <button disabled={Boolean(feedback) || (isPlacement && placements.length === 0)} onClick={confirmAnswer} className={`flex h-11 items-center justify-center rounded-xl border px-4 text-sm font-semibold ${Boolean(feedback) || (isPlacement && placements.length === 0) ? "border-stone-300 bg-stone-200 text-stone-500" : "border-green-700 bg-green-600 text-white hover:bg-green-700"}`}>Confirm</button>}</div>
      </div>
    </main>
  </div></div>;
}

const root = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
else ReactDOM.render(<App />, root);
</script>
<script src="./footer.js?v=1.3"></script>
</body>
