        strongBeat: isStrongBeat(beatPositions[noteIndex], timeSignature),

        forceStepwise: rhythm === "quaver", barIndex, noteIndex, noteCount: pattern.length,

function pickEnabled(enabledDynamics, fallbackIds) {

}
function makeMultipleChoiceOptions(answerId, enabledDynamics) {

    });
    audioStopTimerRef.current = window.setTimeout(() => {
      setIsAudioPlaying(false); setActivePlaybackNoteId(null); audioContextRef.current = null;
    }, Math.max(0, (currentTime - audioContext.currentTime) * 1000) + 100);
  }

  const filteredDynamics = DYNAMICS.filter((dynamic) => enabledDynamics.includes(dynamic.id) && (question.questionType !== "audio" || (question.audioQuestionKind === "find-f-location" ? dynamic.id === "f" : question.audioQuestionKind === "find-p-location" ? dynamic.id === "p" : question.audioQuestionKind === "gradual-location" ? ["crescendo", "diminuendo"].includes(dynamic.id) : question.audioQuestionKind === "sfz-location" ? dynamic.id === "sfz" : AUDIO_BUTTON_IDS.includes(dynamic.id))));

  return <div className="min-h-screen bg-stone-50 p-4 text-stone-950 md:p-8">
    <div className="mx-auto max-w-6xl">
      <header className="mb-5 rounded-2xl border border-stone-200 bg-white p-5 shadow-sm">
        <div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
          <div><h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Dynamics</h1><p className="mt-2 text-stone-700">Learn to interpret dynamics in music.</p></div>
          <div className="grid min-w-[280px] grid-cols-3 gap-2"><StatCard label="Score" value={`${correct}/${attempted}`} /><StatCard label="Accuracy" value={`${accuracy}%`} /><StatCard label="Streak" value={streak} footer={`Best streak: ${bestStreak}`} /></div>
        </div>
      </header>
      <main className="overflow-visible rounded-2xl border border-stone-200 bg-white p-4 shadow-sm md:p-6">
        <div className="mb-4 flex items-start justify-between gap-3">
          <div className="relative" ref={customiseRef}>
            <button type="button" onClick={() => setCustomiseOpen((value) => !value)} className="rounded-xl border border-stone-300 bg-white px-4 py-2 text-sm font-semibold text-stone-800 hover:bg-stone-100">⚙️ Customise</button>
            {customiseOpen && <section className="absolute left-0 z-20 mt-2 max-h-[72vh] w-[390px] overflow-y-auto rounded-2xl border border-stone-200 bg-white p-4 shadow-lg">
              <h2 className="mb-3 text-base font-semibold">Customise</h2>
              <h3 className="mb-2 text-sm font-bold text-stone-700">Dynamics</h3>
              <div className="mb-4 space-y-2">{DYNAMICS.map((dynamic) => <button key={dynamic.id} type="button" onClick={() => toggleDynamic(dynamic.id)} className="flex w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-3 py-2 hover:bg-stone-100"><span className="flex items-center gap-3"><span className="flex h-12 w-16 items-center justify-center overflow-hidden rounded-lg border border-stone-200 bg-white"><SymbolButtonGlyph id={dynamic.id} /></span><span className="text-sm font-semibold">{dynamic.name}</span></span><span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${enabledDynamics.includes(dynamic.id) ? "bg-green-600" : "bg-stone-300"}`}><span className={`h-4 w-4 rounded-full bg-white transition ${enabledDynamics.includes(dynamic.id) ? "translate-x-5" : "translate-x-0"}`} /></span></button>)}</div>
              <h3 className="mb-2 text-sm font-bold text-stone-700">Question types</h3>
              <div className="space-y-2">{QUESTION_TYPES.map((type) => <button key={type.id} type="button" onClick={() => toggleQuestionType(type.id)} className="flex w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-3 py-2 hover:bg-stone-100"><span className="text-sm font-semibold">{type.label}</span><span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${enabledQuestionTypes.includes(type.id) ? "bg-green-600" : "bg-stone-300"}`}><span className={`h-4 w-4 rounded-full bg-white transition ${enabledQuestionTypes.includes(type.id) ? "translate-x-5" : "translate-x-0"}`} /></span></button>)}</div>
            </section>}
          </div>
          <div className="flex justify-end gap-2"><button type="button" onClick={() => setHelpOpen((value) => !value)} title="Help" aria-label="Help" className="flex h-9 w-9 items-center justify-center rounded-full border border-stone-300 bg-white text-lg font-bold text-stone-700 hover:bg-stone-100">?</button><button type="button" onClick={resetScore} className="rounded-xl bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">Reset score</button></div>
        </div>
        {helpOpen && <HelpPanel />}
        <div className="relative overflow-visible rounded-xl border border-stone-200 bg-white pb-1"><Score question={question} selectedSymbolId={selectedSymbolId} placements={placements} hoverPlacement={hoverPlacement} feedback={feedback} wrong={wrong} missing={missing} activePlaybackNoteId={activePlaybackNoteId} helpOpen={helpOpen} onPointerMove={handlePointerMove} onPointerLeave={() => setHoverPlacement(null)} onLockPlacement={handleLockPlacement} /></div>
        <section className="mt-4 rounded-xl border border-stone-200 bg-stone-50 p-4">
          <div className="mb-4 flex items-start justify-between gap-3"><div><p className="text-base font-semibold" dangerouslySetInnerHTML={{ __html: question.prompt }} />{prompt && <p className="mt-1 text-sm font-medium text-red-700">{prompt}</p>}</div>{question.questionType === "audio" && <button type="button" onClick={playQuestionAudio} disabled={isAudioPlaying} className="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-stone-950 text-white hover:bg-stone-800 disabled:cursor-not-allowed disabled:opacity-50"><span className="ml-0.5 text-lg leading-none">▶</span></button>}</div>
          {isChoiceQuestion && <div className="grid gap-2 sm:grid-cols-2 lg:grid-cols-4">{question.choices.map((choice) => <button key={choice.id} type="button" disabled={Boolean(feedback)} onClick={() => { if (feedback) return; setSelectedChoice(choice.id); applyResult(choice.id === question.answerId); }} className={`min-h-[52px] rounded-xl border px-4 py-3 text-sm font-semibold ${feedback ? choice.id === question.answerId ? "border-green-700 bg-green-600 text-white" : choice.id === selectedChoice ? "border-red-700 bg-red-600 text-white" : "border-stone-300 bg-white text-stone-500" : selectedChoice === choice.id ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`}>{choice.text}</button>)}</div>}
          {isTextQuestion && <input value={typedAnswer} disabled={Boolean(feedback)} onChange={(event) => { setTypedAnswer(event.target.value); setPrompt(""); }} onKeyDown={(event) => { if (event.key === "Enter") confirmAnswer(); }} placeholder="Type your answer..." className="w-full max-w-md rounded-xl border border-stone-300 bg-white px-4 py-3 text-sm font-medium outline-none focus:border-stone-950" />}
          {isPlacementQuestion && <><div className="grid gap-2 sm:grid-cols-3 lg:grid-cols-9">{filteredDynamics.map((dynamic) => { const correctDynamic = question.answerId === dynamic.id; const selectedWrong = feedback && !feedback.correct && selectedSymbolId === dynamic.id && !correctDynamic; return <button key={dynamic.id} type="button" disabled={Boolean(feedback)} onClick={() => { setSelectedSymbolId(dynamic.id); setPrompt(""); }} className={`flex flex-col items-center justify-center rounded-xl border px-3 py-2 text-sm font-semibold ${feedback ? correctDynamic ? "border-green-700 bg-green-600 text-white" : selectedWrong ? "border-red-700 bg-red-600 text-white" : "border-stone-300 bg-white opacity-50" : selectedSymbolId === dynamic.id ? "border-stone-950 bg-stone-950 text-white" : "border-stone-300 bg-white hover:bg-stone-100"}`}><SymbolButtonGlyph id={dynamic.id} /></button>; })}</div><p className="mt-3 text-sm text-stone-700">Choose a dynamic, hover over the score to preview it, then click to lock it in place.</p></>}
        </section>
        <div className="mt-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between"><Feedback feedback={feedback} question={question} answerId={question.answerId} /><div className="flex w-full justify-end gap-2">{isPlacementQuestion && <button type="button" disabled={Boolean(feedback)} onClick={clearPlacements} className="rounded-xl bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 disabled:opacity-60">Clear</button>}{!isChoiceQuestion && <button type="button" onClick={confirmAnswer} disabled={Boolean(feedback)} className="rounded-xl bg-green-600 px-5 py-2 text-sm font-bold text-white hover:bg-green-700 disabled:opacity-60">Confirm</button>}</div></div>
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
