<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notation Calibration</title>
  <link rel="stylesheet" href="./notation-calibration.css" />
  <script src="./bravura-symbols.js"></script>
  <script src="./shared-notation-config.js"></script>
  <script src="./notation-calibration.js" defer></script>
</head>
<body>
  <header>
    <div class="wrap topbar">
      <div>
        <h1>Notation Calibration</h1>
        <p class="subtitle">Admin template for sizing and positioning Bravura notation against a stave.</p>
      </div>
      <div class="actions">
        <button id="resetButton" type="button">Reset selected symbol</button>
        <button id="exportButton" type="button" class="primary">Copy/export current config</button>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="panel stage-panel" aria-label="Notation preview">
      <svg id="notationStage" class="notation-svg" viewBox="0 0 1200 900" role="img" aria-label="Notation calibration preview"></svg>
    </section>

    <aside class="panel controls-panel" aria-label="Calibration controls">
      <div class="controls-grid">
        <section class="control-group">
          <h2>Symbol</h2>
          <label>
            Symbol category
            <select id="categorySelect"></select>
          </label>
          <label>
            Symbol to edit
            <select id="symbolSelect"></select>
          </label>
          <label>
            Size
            <div class="range-row">
              <input id="fontSizeScale" type="range" min="0.4" max="7" step="0.05" />
              <output id="fontSizeScaleValue"></output>
            </div>
          </label>
          <label>
            Width
            <div class="range-row">
              <input id="widthScale" type="range" min="0.4" max="2" step="0.02" />
              <output id="widthScaleValue"></output>
            </div>
          </label>
          <label>
            Height
            <div class="range-row">
              <input id="heightScale" type="range" min="0.4" max="2" step="0.02" />
              <output id="heightScaleValue"></output>
            </div>
          </label>
          <label>
            X position
            <div class="range-row">
              <input id="xOffsetScale" type="range" min="-4" max="4" step="0.05" />
              <output id="xOffsetScaleValue"></output>
            </div>
          </label>
          <label>
            Y position
            <div class="range-row">
              <input id="yOffsetScale" type="range" min="-4" max="4" step="0.05" />
              <output id="yOffsetScaleValue"></output>
            </div>
          </label>
        </section>
        <section class="control-group">
          <h2>Export</h2>
          <textarea id="exportText" readonly spellcheck="false"></textarea>
        </section>

        <section class="control-group">
          <h2>Import</h2>
          <textarea id="importText" spellcheck="false" placeholder="Paste a previous SHARED_NOTATION_CONFIG object here"></textarea>
          <button id="importButton" type="button">Import pasted config</button>
        </section>
      </div>
    </aside>
  </main>
</body>
</html>
