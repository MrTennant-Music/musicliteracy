<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notation Calibration</title>
  <link rel="stylesheet" href="./notation-calibration.css" />
  <script src="./bravura-symbols.js"></script>
  <script src="./shared-notation-config.js"></script>
  <script src="./notation-calibration.js" defer></script>
</head>
<body>
  <main class="wrap">
    <div class="work-area">
      <section class="panel stage-panel" aria-label="Notation Calibration Preview">
        <div class="preview-header">
          <h1>Notation Calibration</h1>
          <button id="shufflePreviewButton" type="button">Shuffle</button>
        </div>
        <div class="notation-scroll">
          <svg id="notationStage" class="higher-preview-svg" viewBox="0 0 920 640" role="img" aria-label="Notation Calibration Preview"></svg>
        </div>
      </section>
    </div>

    <aside class="panel controls-panel" aria-label="Calibration Controls">
      <div class="controls-grid">
        <section class="control-group">
          <h2>View</h2>
          <label>
            Zoom
            <div class="range-row">
              <input id="zoom" type="range" min="50" max="400" step="10" value="100" />
              <output id="zoomValue"></output>
            </div>
          </label>
          <label class="inline">
            <input id="showGuides" type="checkbox" />
            Show Guide Lines
          </label>
        </section>

        <section class="control-group">
          <h2>Generated Symbols</h2>
          <div id="generatedSymbolChecks" class="checkbox-list"></div>
        </section>

        <section class="control-group">
          <h2>Symbol</h2>
          <select id="symbolSelect" aria-label="Symbol To Edit"></select>
          <label>
            Size
            <div class="range-row">
              <input id="fontSizeScale" type="range" min="0.4" max="7" step="0.05" />
              <output id="fontSizeScaleValue"></output>
            </div>
          </label>
          <label>
            Width
            <div class="range-row">
              <input id="widthScale" type="range" min="0.4" max="2" step="0.02" />
              <output id="widthScaleValue"></output>
            </div>
          </label>
          <label>
            Height
            <div class="range-row">
              <input id="heightScale" type="range" min="0.4" max="2" step="0.02" />
              <output id="heightScaleValue"></output>
            </div>
          </label>
          <label>
            Horizontal
            <div class="range-row">
              <input id="xOffsetScale" type="range" min="-4" max="4" step="0.05" />
              <output id="xOffsetScaleValue"></output>
            </div>
          </label>
          <label>
            Vertical
            <div class="range-row">
              <input id="yOffsetScale" type="range" min="-10" max="10" step="0.05" />
              <output id="yOffsetScaleValue"></output>
            </div>
          </label>
          <button id="resetButton" type="button" class="primary">Reset</button>
        </section>
        <section class="control-group">
          <h2>Export</h2>
          <textarea id="exportText" class="export-storage" readonly spellcheck="false" aria-hidden="true"></textarea>
          <button id="exportButton" type="button" class="primary">Export</button>
        </section>

        <section class="control-group">
          <h2>Import</h2>
          <input id="importText" type="text" spellcheck="false" placeholder="Paste Exported Config Here" />
          <button id="importButton" type="button" class="primary">Import</button>
        </section>
      </div>
    </aside>
  </main>
</body>
</html>
