<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notation Calibration</title>
  <link rel="stylesheet" href="./notation-calibration.css" />
  <script src="./bravura-symbols.js"></script>
  <script src="./shared-notation-config.js"></script>
  <script src="./notation-calibration.js" defer></script>
</head>
<body>
  <main class="wrap">
    <div class="work-area">
      <section class="panel stage-panel" aria-label="Notation Calibration Preview">
        <div class="notation-scroll">
          <svg id="notationStage" class="higher-preview-svg" viewBox="0 0 920 640" role="img" aria-label="Notation Calibration Preview"></svg>
        </div>
      </section>

      <section class="panel symbol-panel" aria-label="Symbol Adjustment">
        <header class="symbol-panel-header">
          <h2>Adjust Symbol</h2>
          <select id="symbolSelect" aria-label="Symbol To Edit"></select>
        </header>
        <div class="symbol-controls-grid">
          <label>
            Size
            <div class="range-row">
              <input id="fontSizeScale" type="range" min="0.4" max="7" step="0.05" />
              <output id="fontSizeScaleValue"></output>
            </div>
          </label>
          <label>
            Width
            <div class="range-row">
              <input id="widthScale" type="range" min="0.4" max="2" step="0.02" />
              <output id="widthScaleValue"></output>
            </div>
          </label>
          <label>
            Height
            <div class="range-row">
              <input id="heightScale" type="range" min="0.4" max="2" step="0.02" />
              <output id="heightScaleValue"></output>
            </div>
          </label>
          <label>
            Horizontal Position
            <div class="range-row">
              <input id="xOffsetScale" type="range" min="-4" max="4" step="0.05" />
              <output id="xOffsetScaleValue"></output>
            </div>
          </label>
          <label>
            Vertical Position
            <div class="range-row">
              <input id="yOffsetScale" type="range" min="-10" max="10" step="0.05" />
              <output id="yOffsetScaleValue"></output>
            </div>
          </label>
          <div class="symbol-action-row">
            <button id="resetButton" type="button" class="danger">Reset</button>
            <textarea id="exportText" class="export-storage" readonly spellcheck="false" aria-hidden="true"></textarea>
            <button id="exportButton" type="button" class="primary copy-config-button">Copy</button>
          </div>
        </div>
        <p id="copyConfirmation" class="copy-confirmation" aria-live="polite"></p>
      </section>

    </div>

    <aside class="controls-panel" aria-label="Calibration Controls">
      <div class="controls-grid">
        <section class="panel control-card">
          <h2>View</h2>
          <label>
            Zoom
            <div class="range-row">
              <input id="zoom" type="range" min="100" max="400" step="10" value="100" />
              <output id="zoomValue"></output>
            </div>
          </label>
          <label class="inline">
            <input id="showGuides" type="checkbox" />
            Show Guide Lines
          </label>
          <label class="inline">
            <input id="showBarNumbers" type="checkbox" checked />
            Show Bar Numbers
          </label>
          <label class="inline">
            <input id="showTimeSignatures" type="checkbox" checked />
            Show Time Signatures
          </label>
          <label class="inline">
            <input id="showKeySignatures" type="checkbox" checked />
            Show Key Signatures
          </label>
          <label>
            Bars
            <select id="barCount">
              <option value="1">1</option>
              <option value="4">4</option>
              <option value="8" selected>8</option>
            </select>
          </label>
        </section>

        <section class="panel control-card generated-symbols-card">
          <header class="card-header">
            <h2>Generated Symbols</h2>
            <div class="card-actions">
              <label class="master-toggle">
                <input id="enableAllGeneratedSymbols" type="checkbox" />
                All
              </label>
              <button id="shufflePreviewButton" type="button">Shuffle</button>
            </div>
          </header>
          <div id="generatedSymbolChecks" class="checkbox-list"></div>
        </section>
      </div>
    </aside>
  </main>
</body>
</html>
