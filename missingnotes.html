        const noteIndex = lockedIndex ?? positions.reduce((best, x, index) => Math.abs(pointer.x - x) < Math.abs(pointer.x - positions[best]) ? index : best, 0);
        const targetNote = targetBar.notes[noteIndex];
        if (!targetNote) return null;
        const touchOffset = event.pointerType === "touch" ? 42 : 0;
        const effectiveY = pointer.y - touchOffset;
        if (lockedIndex === null && (Math.abs(pointer.x - positions[noteIndex]) > 48 || pointer.y < top - 28 || pointer.y > top + 92)) return null;
        const step = clamp(Math.round((top + STAFF.gap * 4 - effectiveY) / (STAFF.gap / 2)), NOTE_POOL[0].step, NOTE_POOL.at(-1).step);
        const base = NOTE_POOL.find((note) => note.step === step) ?? NOTE_POOL[0];
        const writtenAccidental = melodicAccidentalForLetter(question.key, base.letter);
        return { ...base, id: `user-${noteIndex}`, rhythm: targetNote.rhythm, beats: targetNote.beats, barIndex: targetBar.barIndex, noteIndex, writtenAccidental };
      }

      function handleMove(event) {
        if (feedback) return;
        if (draggingNote) {
          event.preventDefault();
          const nextNote = noteFromPointer(event, draggingNote.noteIndex);
          if (nextNote) {
            setDraggingNote(nextNote);
            setHoverNote(nextNote);
          }
          return;
        }
        setHoverNote(noteFromPointer(event));
      }

      function handlePointerDown(event) {
        if (feedback) return;
        const nextNote = noteFromPointer(event);
        if (!nextNote) return;
        event.preventDefault();
        event.currentTarget.setPointerCapture?.(event.pointerId);
        setDraggingNote(nextNote);
        setHoverNote(nextNote);
      }

      function handlePointerUp(event) {
        if (feedback || !draggingNote) return;
        event.preventDefault();
        event.currentTarget.releasePointerCapture?.(event.pointerId);
        setUserNotes((current) => ({ ...current, [draggingNote.noteIndex]: draggingNote }));
        setHoverNote(null);
        setDraggingNote(null);
      }

      return (
        <svg viewBox={`0 0 ${SVG.width} ${scoreHeight}`} className="h-auto w-full select-none overflow-visible">
          <rect width={SVG.width} height={scoreHeight} fill="white" />
          <g transform={scoreOffsetY ? `translate(0 ${scoreOffsetY})` : undefined}>
          {systems.map((top, systemIndex) => <Staff key={systemIndex} top={top} systemIndex={systemIndex} question={question} />)}
          {question.bars.map((bar) => {
            const top = systemTop(bar.barIndex);
            const start = barStart(bar.barIndex);
            const end = start + barWidth(bar.barIndex);
            const positions = barPositions(bar);
            const isTarget = bar.barIndex === question.targetBar;
            const targetUserNotes = bar.notes.map((_, index) => userNotes[index] ?? null);
            return (
              <g key={bar.barIndex}>
                <text x={(bar.barIndex === 0 || bar.barIndex === 4) ? start - 15 : start + 5} y={top - 17} fontSize="12" fontWeight="700">{bar.barIndex + 1}</text>
                {isTarget && <rect ref={targetInputRef} x={start} y={top - 62} width={end - start} height="122" fill="transparent" pointerEvents="all" className="touch-none" style={{ touchAction: "none", WebkitUserSelect: "none", userSelect: "none", overscrollBehavior: "contain" }} onPointerMove={handleMove} onPointerLeave={() => { if (!draggingNote) setHoverNote(null); }} onPointerDown={handlePointerDown} onPointerUp={handlePointerUp} onPointerCancel={() => { setDraggingNote(null); setHoverNote(null); }} />}
                {isTarget && <RhythmGuide bar={bar} positions={positions} top={top} activeNoteId={activeNoteId} timeSignature={question.timeSignature} clef={question.clef} />}
                {isTarget
                  ? <BarNotes bar={bar} notes={targetUserNotes} positions={positions} top={top} hidden feedback={feedback} timeSignature={question.timeSignature} clef={question.clef} />
                  : <BarNotes bar={bar} notes={bar.notes} positions={positions} top={top} activeNoteId={activeNoteId} timeSignature={question.timeSignature} clef={question.clef} />}
                {isTarget && hoverNote && !feedback && (
                  <>
                    {draggingNote && <Note note={{ ...hoverNote, id: `ghost-${hoverNote.id}` }} x={positions[hoverNote.noteIndex]} top={top} colour="#666" faint clef={question.clef} />}
                    <Note note={hoverNote} x={positions[hoverNote.noteIndex]} top={top} colour="#444" faint={!draggingNote} scale={draggingNote ? 1.6 : 1} clef={question.clef} />
                  </>
                )}
                {feedback && isTarget && <CorrectionLayer bar={bar} userNotes={userNotes} positions={positions} top={top} timeSignature={question.timeSignature} clef={question.clef} />}
                {bar.barIndex === question.bars.length - 1 ? (
                  <g>
                    <line x1={end - 5} x2={end - 5} y1={top - 0.5} y2={top + STAFF.gap * 4 + 0.5} stroke="currentColor" strokeWidth="1.4" />
                    <line x1={end} x2={end} y1={top - 0.5} y2={top + STAFF.gap * 4 + 0.5} stroke="currentColor" strokeWidth="4" />
                  </g>
                ) : (
                  <line x1={end} x2={end} y1={top} y2={top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.35" />
                )}
              </g>
            );
          })}
          </g>
        </svg>
      );
    }

    function useStyles() {
      useEffect(() => {
        if (document.getElementById("missing-notes-shared-style")) return;
        const style = document.createElement("style");
        style.id = "missing-notes-shared-style";
        style.textContent = `

          .music-symbol { font-family: "Bravura", serif; font-weight: 400; dominant-baseline: alphabetic; text-rendering: geometricPrecision; }

          @media (hover: hover) and (pointer: fine) {

        `;

      }, []);

    function MenuSvgGlyph({ src, alt = "" }) {

    }

    function TempoDropdownRow({ tempo, setTempo, stopAudio }) {
      const selectedTempo = TEMPOS.find((speed) => speed.id === tempo) || TEMPOS[1];
      const cycleTempo = () => {
        const order = ["medium", "fast", "slow"];
        const currentIndex = order.indexOf(selectedTempo.id);
        setTempo(order[(currentIndex + 1) % order.length]);
        stopAudio();
      };
      return (
        <div className="hub-toggle-row relative min-h-[44px] overflow-visible">
          <span className="hub-toggle-label min-w-[145px]">

          </span>
          <button
            type="button"
            onClick={cycleTempo}
            className="flex h-7 w-[86px] items-center justify-center rounded-xl border border-stone-300 bg-white px-2.5 text-sm font-bold text-stone-950 shadow-sm"
          >
            <span>{selectedTempo.label}</span>

    function CustomiseMenu({ tempo, setTempo, metronomeOn, setMetronomeOn, followPlayback, setFollowPlayback, stopAudio }) {
      return (
        <div className="flex w-full min-w-0 flex-col sm:inline-flex sm:w-max sm:min-w-[310px]">

          <window.MLH.MenuToggleRow glyph={<MenuSvgGlyph src={ASSET.metronome} alt="" />} label="Metronome" checked={metronomeOn} onChange={() => { setMetronomeOn((value) => !value); stopAudio(); }} />
          <window.MLH.MenuToggleRow glyph={<MenuSvgGlyph src={ASSET.eye} alt="" />} label="Follow Playback" checked={followPlayback} onChange={() => setFollowPlayback((value) => !value)} />

    function Feedback({ feedback, fading }) {
      return <window.MLH.FeedbackBadge feedback={feedback} fading={fading} />;
    }

    function playSound(correct, celebration = false, medal = null) {
      window.MLH?.playFeedbackSound?.(correct, celebration, medal);
    }

    function missingNotesMedalSoundForStreak(streak) {
      if (streak === 10) return "platinum";
      if (streak === 6) return "gold";
      if (streak === 4) return "silver";
      if (streak === 2) return "bronze";
      return null;
    }

    function App() {
      useStyles();
      const initialLevel = useMemo(() => {
        const requested = new URLSearchParams(window.location.search).get("level");
        return LEVELS[requested] ? requested : "N5";
      }, []);
      const [activeLevel, setActiveLevel] = useState(initialLevel);
      const [tempo, setTempo] = useState("medium");
      const [metronomeOn, setMetronomeOn] = useState(false);
      const [followPlayback, setFollowPlayback] = useState(false);
      const [question, setQuestion] = useState(() => makeQuestion(initialLevel));
      const [userNotes, setUserNotes] = useState({});
      const [hoverNote, setHoverNote] = useState(null);
      const [feedback, setFeedback] = useState(null);
      const [feedbackFading, setFeedbackFading] = useState(false);
      const [visible, setVisible] = useState(true);
      const [score, setScore] = useState({ correct: 0, attempted: 0, streak: 0, best: 0 });
      const [confetti, setConfetti] = useState(0);
      const [menu, setMenu] = useState(null);
      const [prompt, setPrompt] = useState("");
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackElapsed, setPlaybackElapsed] = useState(0);
      const [activeNoteId, setActiveNoteId] = useState(null);
      const audioRef = useRef(null);
      const timersRef = useRef([]);
      const nextTimer = useRef(null);
      const fadeTimer = useRef(null);
      const menuRef = useRef(null);
      window.MLH.useClickAway(menuRef, () => setMenu(null));

      const selectedTempoId = activeLevel === "AH" ? "slow" : tempo;
      const selectedTempo = TEMPOS.find((item) => item.id === selectedTempoId) ?? TEMPOS[0];
      const beatSeconds = 60 / selectedTempo.bpm;
      const barSeconds = beatSeconds * question.timeSignature.beats;
      const totalDuration = question.bars.length * barSeconds;
      const accuracy = score.attempted === 0 ? 0 : Math.round((score.correct / score.attempted) * 100);

      function clearTimers() {
        timersRef.current.forEach((timer) => window.clearTimeout(timer));
        timersRef.current = [];
        window.clearTimeout(nextTimer.current);
        window.clearTimeout(fadeTimer.current);
      }

      function clearFeedbackTimers() {
        window.clearTimeout(nextTimer.current);
        window.clearTimeout(fadeTimer.current);
      }

      function stopAudio(resetElapsed = true) {
        clearTimers();
        if (audioRef.current) {
          try { audioRef.current.close(); } catch {}
        }
        audioRef.current = null;
        setIsPlaying(false);
        if (resetElapsed) setPlaybackElapsed(0);
        setActiveNoteId(null);
      }

      function newQuestion(level = activeLevel) {
        stopAudio();
        setVisible(false);
        window.setTimeout(() => {
          setQuestion(makeQuestion(level));
          setUserNotes({});
          setHoverNote(null);
          setFeedback(null);
          setFeedbackFading(false);
          setPrompt("");
          setVisible(true);
        }, 220);
      }

      function advanceAfterFeedback() {
        if (!feedback) return;
        clearFeedbackTimers();
        setFeedbackFading(true);
        nextTimer.current = window.setTimeout(() => newQuestion(), 180);
      }

      function applyLevel(level) {
        setMenu(null);
        if (level === activeLevel) return;
        setActiveLevel(level);
        setScore({ correct: 0, attempted: 0, streak: 0, best: 0 });
        setConfetti(0);
        const url = new URL(window.location.href);
        url.searchParams.set("level", level);
        window.history.replaceState(null, "", url.toString());
        newQuestion(level);
      }

      function resetScore() {
        setScore({ correct: 0, attempted: 0, streak: 0, best: 0 });
        setConfetti(0);
        newQuestion();
      }

      function clearUserNotes() {
        if (feedback) return;
        if (question.questionType === "identifyMelody") {
          setQuestion((current) => ({ ...current, selectedOptionIndex: null }));
          setPrompt("");
          return;
        }
        setUserNotes({});
      }

      function confirmAnswer() {
        if (feedback) return;
        if (question.questionType === "identifyMelody") {
          if (question.selectedOptionIndex === null) {
            setPrompt("Select one melody first.");
            return;
          }
          stopAudio();
          const correct = question.selectedOptionIndex === question.answerIndex;
          setScore((current) => {
            const streak = correct ? current.streak + 1 : 0;
            if (correct && [2, 4, 6, 10].includes(streak)) {
              const medalSound = missingNotesMedalSoundForStreak(streak);
              setConfetti((value) => value + 1);
              window.setTimeout(() => playSound(true, true, medalSound), 180);
            }
            return {
              correct: current.correct + (correct ? 1 : 0),
              attempted: current.attempted + 1,
              streak,
              best: Math.max(current.best, streak),
            };
          });
          playSound(correct);
          setFeedback({ correct });
          setFeedbackFading(false);
          setPrompt("");
          if (correct) {
            fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
            nextTimer.current = window.setTimeout(() => newQuestion(), 2050);
          }
          return;
        }
        const target = question.bars[question.targetBar];
        if (target.notes.some((_, index) => !userNotes[index])) {
          return;
        }
        stopAudio();
        const correct = target.notes.every((note, index) => userNotes[index]?.step === note.step);
        setScore((current) => {
          const streak = correct ? current.streak + 1 : 0;
          if (correct && [2, 4, 6, 10].includes(streak)) {
            const medalSound = missingNotesMedalSoundForStreak(streak);
            setConfetti((value) => value + 1);
            window.setTimeout(() => playSound(true, true, medalSound), 180);
          }
          return {
            correct: current.correct + (correct ? 1 : 0),
            attempted: current.attempted + 1,
            streak,
            best: Math.max(current.best, streak),
          };
        });
        playSound(correct);
        setFeedback({ correct });
        setFeedbackFading(false);
        setPrompt("");
        if (correct) {
          fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
          nextTimer.current = window.setTimeout(() => newQuestion(), 2050);
        }
      }

      function selectMelodyOption(index) {
        if (feedback) return;
        setQuestion((current) => current.questionType === "identifyMelody" ? { ...current, selectedOptionIndex: index } : current);
        setPrompt("");
      }

      function oscillator(ctx, gainNode, frequency, start, duration, volume = 0.035, type = "sine", release = 0.08) {
        window.MLH?.playPianoFrequency?.(ctx, gainNode, frequency, start, duration, volume);
      }

      function playMetronome(ctx, gainNode, start, accented) {
        window.MLH?.playMetronomeClick?.(ctx, gainNode, start, accented);
      }

      function playAccompaniment(ctx, gainNode, question, bar, barStart, offset, startTime) {
        if (barStart + barSeconds <= offset) return;
        const chordLetters = question.key.chords[bar.chordSymbol] ?? [];
        if (!chordLetters.length) return;

        if (bar.barIndex === question.bars.length - 1 && question.questionType === "identifyMelody" && question.bars.length === 2) {
          const finalNote = [...bar.notes].reverse().find((note) => !note.rest);
          if (!finalNote) return;
          const chordStart = barStart + finalNote.beat * beatSeconds;
          const chordDuration = Math.max(0.04, Math.min(finalNote.beats * beatSeconds * 0.72, beatSeconds * 0.72));
          if (chordStart + chordDuration <= offset) return;
          const audibleStart = Math.max(chordStart, offset);
          const audibleDuration = Math.max(0.04, chordStart + chordDuration - audibleStart);
          chordLetters.forEach((letter, index) => {
            const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
            oscillator(ctx, gainNode, midiToFrequency(chordMidi), startTime + audibleStart, audibleDuration, 0.026, "triangle", 0.08);
            if (index === 0) oscillator(ctx, gainNode, midiToFrequency(chordMidi - 12), startTime + audibleStart, audibleDuration, 0.02, "sine", 0.08);
          });
          return;
        }

        if (bar.barIndex === question.bars.length - 1) {
          const chordStart = Math.max(barStart, offset);
          const chordDuration = Math.max(0.04, barStart + barSeconds * 0.96 - chordStart);
          chordLetters.forEach((letter, index) => {
            const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
            oscillator(ctx, gainNode, midiToFrequency(chordMidi), startTime + chordStart, chordDuration, 0.026, "triangle", 0.08);
            if (index === 0) oscillator(ctx, gainNode, midiToFrequency(chordMidi - 12), startTime + chordStart, chordDuration, 0.02, "sine", 0.08);
          });
          return;
        }

        const bassMidi = pitchForChordLetter(question, bar, chordLetters[0], 2) - 12;
        const bassStart = Math.max(barStart, offset);
        const bassDuration = Math.max(0.04, barStart + beatSeconds * 0.88 - bassStart);
        oscillator(ctx, gainNode, midiToFrequency(bassMidi), startTime + bassStart, bassDuration, 0.024, "sine", 0.06);

        if (question.timeSignature.id === "4/4") {
          const events = [
            { beat: 1, type: "chord" },
            { beat: 2, type: "bass5" },
            { beat: 3, type: "chord" },
          ];
          events.forEach((event) => {
            const pulseStart = barStart + event.beat * beatSeconds;
            const pulseDuration = beatSeconds * 0.42;
            if (pulseStart + pulseDuration <= offset) return;
            const audibleStart = Math.max(pulseStart, offset);
            const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
            if (event.type === "bass5") {
              const fifthMidi = pitchForChordLetter(question, bar, chordLetters[1] ?? chordLetters[0], 2) - 12;
              oscillator(ctx, gainNode, midiToFrequency(fifthMidi), startTime + audibleStart, audibleDuration, 0.024, "sine", 0.06);
              return;
            }
            chordLetters.forEach((letter, index) => {
              const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
              oscillator(ctx, gainNode, midiToFrequency(chordMidi), startTime + audibleStart, audibleDuration, 0.018, "triangle", 0.05);
            });
          });
          return;
        }

        const pulseBeats = question.timeSignature.id === "6/8"
          ? [1.5]
          : Array.from({ length: Math.max(0, question.timeSignature.beats - 1) }, (_, beat) => beat + 1);
        pulseBeats.forEach((beat) => {
          const pulseStart = barStart + beat * beatSeconds;
          const pulseDuration = beatSeconds * (question.timeSignature.id === "6/8" ? 0.72 : 0.42);
          if (pulseStart + pulseDuration <= offset) return;
          const audibleStart = Math.max(pulseStart, offset);
          const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
          chordLetters.forEach((letter, index) => {
            const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
            oscillator(ctx, gainNode, midiToFrequency(chordMidi), startTime + audibleStart, audibleDuration, 0.018, "triangle", 0.05);
          });
        });
      }

      function playMelodyNote(ctx, gainNode, frequency, start, duration) {
        oscillator(ctx, gainNode, frequency, start, duration, 0.078);
      }

      function playQuestionAudio(startAt = 0, restart = false) {
        if (isPlaying && !restart) {
          stopAudio();
          return;
        }
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          setPrompt("Audio playback is not supported in this browser.");
          return;
        }
        const offset = clamp(Number(startAt) || 0, 0, totalDuration);
        stopAudio(false);
        if (offset >= totalDuration) {
          setPlaybackElapsed(totalDuration);
          return;
        }
        const ctx = new AudioContextClass();
        const master = ctx.createGain();
        master.gain.setValueAtTime(1.25, ctx.currentTime);
        master.connect(ctx.destination);
        audioRef.current = ctx;
        const startTime = ctx.currentTime + 0.12 - offset;
        setIsPlaying(true);
        setPrompt("");
        setPlaybackElapsed(offset);

        question.bars.forEach((bar) => {
          const barStart = bar.barIndex * barSeconds;
          if (metronomeOn) {
            for (let beat = 0; beat < question.timeSignature.beats; beat += 1) {
              const beatStart = barStart + beat * beatSeconds;
              if (beatStart >= offset) playMetronome(ctx, master, startTime + beatStart, beat === 0);
            }
          }
          playAccompaniment(ctx, master, question, bar, barStart, offset, startTime);
          bar.notes.forEach((note, noteIndex) => {
            if (note.rest || note.tiedFromPrevious) return;
            const noteStart = barStart + note.beat * beatSeconds;
            const nextTiedNote = note.tieToNext && !bar.notes[noteIndex + 1]?.rest ? bar.notes[noteIndex + 1] : null;
            const duration = (note.beats + (nextTiedNote?.beats ?? 0)) * beatSeconds * 0.96;
            if (noteStart + duration <= offset) return;
            const audibleStart = Math.max(noteStart, offset);
            const audibleDuration = Math.max(0.04, noteStart + duration - audibleStart);
            playMelodyNote(ctx, master, midiToFrequency(effectiveMidiForNote(question, bar, note)), startTime + audibleStart, audibleDuration);
            const highlightTimer = window.setTimeout(() => {
              if (followPlayback) setActiveNoteId(note.id);
            }, Math.max(0, (startTime + audibleStart - ctx.currentTime) * 1000));
            const clearTimer = window.setTimeout(() => setActiveNoteId(null), Math.max(0, (startTime + audibleStart - ctx.currentTime + audibleDuration) * 1000));
            timersRef.current.push(highlightTimer, clearTimer);
          });
        });

        const tick = window.setInterval(() => {
          if (!audioRef.current) return;
          const elapsed = Math.min(totalDuration, Math.max(0, ctx.currentTime - startTime));
          setPlaybackElapsed(elapsed);
        }, 100);
        const stopTimer = window.setTimeout(() => {
          window.clearInterval(tick);
          stopAudio();
        }, Math.max(0, (totalDuration - offset) * 1000) + 260);
        timersRef.current.push(tick, stopTimer);
      }

      useEffect(() => () => stopAudio(), []);

      const isIdentifyMelody = question.questionType === "identifyMelody";
      const targetBar = isIdentifyMelody ? null : question.bars[question.targetBar];
      const allRequiredNotesPlaced = isIdentifyMelody
        ? question.selectedOptionIndex !== null
        : Boolean(targetBar?.notes?.length) && targetBar.notes.every((_, index) => Boolean(userNotes[index]));
      const clearDisabled = Boolean(feedback) || (isIdentifyMelody ? question.selectedOptionIndex === null : !Object.keys(userNotes).length);

      return (
        <div className="overflow-x-hidden bg-stone-50 pb-10 text-black md:pb-12">
          <window.MLH.AppHeader icon={ASSET.appIcon} title="Melodic Dictation" subtitle="Identify and complete melodic patterns.">
            <window.MLH.ScoreStreakPanel assets={ASSET} correct={score.correct} attempted={score.attempted} accuracy={accuracy} streak={score.streak} bestStreak={score.best} resetScore={resetScore} confettiKey={confetti} medalEligible={true} medalThresholdValues={[2, 4, 6, 10]} />
          </window.MLH.AppHeader>

          <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
            <main
              className="relative flex min-h-[560px] flex-col overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-3 pt-[10px] shadow-sm sm:px-4 md:px-6 md:pb-6 md:pt-[14px]"
              onPointerDown={(event) => {
                if (!feedback) return;
                const button = event.target.closest("button");
                if (button && !button.closest("[data-feedback-continue]")) return;
                if (event.target.closest("[data-menu-trigger],[data-menu-panel]")) return;
                advanceAfterFeedback();
              }}
            >
              <div className="relative z-[90] mb-2.5 grid w-full grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2">
                <div className="relative flex items-center gap-2" ref={menuRef}>
                  <div className="hub-menu-anchor relative">
                    <window.MLH.LevelButton
                      icon={<img src={ASSET.level} alt="" aria-hidden="true" className="h-[26px] w-[28px] object-contain" />}
                      activeLevel={activeLevel}
                      activeLabel={LEVELS[activeLevel].label}
                      onClick={() => setMenu(menu === "level" ? null : "level")}
                      dataMenuTrigger
                    />
                    {menu === "level" && (
                      <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel>
                        <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                      </window.MLH.MenuPanel>
                    )}
                  </div>
                  <div className="hub-menu-anchor relative">
                    <window.MLH.CustomiseButton
                      icon={<img src={ASSET.customise} alt="" className="h-[21px] w-[21px]" />}
                      onClick={() => setMenu(menu === "customise" ? null : "customise")}
                      dataMenuTrigger
                    />
                  {menu === "customise" && (
                    <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel>
                      <CustomiseMenu
                        tempo={tempo}
                        setTempo={setTempo}
                        metronomeOn={metronomeOn}
                        setMetronomeOn={setMetronomeOn}
                        followPlayback={followPlayback}
                        setFollowPlayback={setFollowPlayback}
                        stopAudio={stopAudio}
                      />
                    </window.MLH.MenuPanel>
                  )}
                  </div>
                </div>
                <div className="flex h-10 min-w-[112px] items-center justify-center sm:min-w-[140px]">
                  <Feedback feedback={feedback} fading={feedbackFading} />
                </div>
                <div className="flex justify-end">
                  <window.MLH.SkipButton resetStreak={() => setScore((current) => ({ ...current, streak: 0 }))} onClick={() => newQuestion()} icon={<img src={ASSET.next} alt="" className="h-[27.8px] w-[27.8px] object-contain" />} />
                </div>
              </div>

              <div className={`mx-auto flex w-full flex-1 items-center justify-center transition-opacity duration-300 ${visible ? "opacity-100" : "opacity-0"}`}>
                <Score question={question} userNotes={userNotes} setUserNotes={setUserNotes} feedback={feedback} activeNoteId={activeNoteId} hoverNote={hoverNote} setHoverNote={setHoverNote} onSelectOption={selectMelodyOption} />
              </div>

              <section className={`relative z-10 rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md md:mx-3 ${isIdentifyMelody ? "mt-4" : "mt-auto md:-mt-[42px]"}`}>
                <p className="text-base font-semibold leading-tight">
                  {isIdentifyMelody
                    ? question.prompt
                    : question.useShortPrompt
                      ? <>Listen to the music and insert the missing notes in <strong>bar {question.targetBar + 1}</strong>.</>
                      : <>Listen to the music and insert the missing notes in <strong>bar {question.targetBar + 1}</strong>. The rhythm is given above the stave.</>}
                </p>
                {prompt && <p className="mt-2 text-sm font-medium text-red-700">{prompt}</p>}
                <div className={window.MLH.PlayClearConfirmRowClass}>
                  <button type="button" onClick={playQuestionAudio} className={window.MLH.PlayButtonClass}>
                    <span className="text-lg leading-none">{isPlaying ? "■" : "▶"}</span>
                    <span>{isPlaying ? "Stop" : "Play"}</span>
                  </button>
                  <div className={window.MLH.ActionButtonGroupClass}>
                    <button type="button" disabled={clearDisabled} onClick={clearUserNotes} className={window.MLH.ClearButtonClass}>
                      Clear
                    </button>
                    <window.MLH.ConfirmButton disabled={Boolean(feedback) || !allRequiredNotesPlaced} onClick={confirmAnswer} className={window.MLH.AudioConfirmButtonClass}>
                      Confirm
                    </window.MLH.ConfirmButton>
                  </div>
                </div>
              </section>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script src="./footer.js?v=1.3"></script>
</body>
</html>
