  function stopAudioPlayback(fadeOut = false) { playbackRunRef.current += 1; if (audioFadeTimerRef.current) { window.clearTimeout(audioFadeTimerRef.current); audioFadeTimerRef.current = null; } if (fadeOut && audioContextRef.current && masterGainRef.current) { try { const ctx = audioContextRef.current; const gain = masterGainRef.current.gain; gain.cancelScheduledValues(ctx.currentTime); gain.setValueAtTime(gain.value || 1, ctx.currentTime); gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.45); audioFadeTimerRef.current = window.setTimeout(() => { audioFadeTimerRef.current = null; stopAudioPlayback(false); }, 480); setIsAudioPlaying(false); setFocusedPlaybackActive(false); setActiveNoteId(null); return; } catch {} } if (playbackFrameRef.current) window.cancelAnimationFrame(playbackFrameRef.current); if (audioStopTimerRef.current) window.clearTimeout(audioStopTimerRef.current); highlightTimersRef.current.forEach((timer) => window.clearTimeout(timer)); highlightTimersRef.current = []; if (audioContextRef.current) { try { audioContextRef.current.suspend(); if (audioContextRef.current.state !== "closed") audioContextRef.current.close(); } catch {} } playbackFrameRef.current = null; audioStopTimerRef.current = null; audioContextRef.current = null; masterGainRef.current = null; setPlaybackElapsed(0); setPlaybackTotal(0); setIsAudioPlaying(false); setFocusedPlaybackActive(false); setActiveNoteId(null); }

39.99,880],[659.25,830.61,987.77]][Math.floor(Math.random()*3)]; chords.forEach((freq,index)=>{tone(freq,now+index*0.045,0.42,"triangle",index===2?0.085:0.07); tone(freq*2,now+index*0.045,0.24,"sine",0.025);}); } } else { tone(196,now,0.32,"sawtooth",0.06); tone(185,now+0.04,0.38,"triangle",0.05); tone(174,now+0.08,0.45,"sine",0.04); } window.setTimeout(()=>{try{context.close();}catch{}}, medal==="platinum"?9000:celebration?3500:900); }
  function playDrumHit(audioContext,start,accented=false){const bufferSize=Math.floor(audioContext.sampleRate*0.03); const buffer=audioContext.createBuffer(1,bufferSize,audioContext.sampleRate); const data=buffer.getChannelData(0); for(let i=0;i<bufferSize;i+=1)data[i]=(Math.random()*2-1)*0.32*(1-i/bufferSize); const noise=audioContext.createBufferSource(); const filter=audioContext.createBiquadFilter(); const gain=audioContext.createGain(); noise.buffer=buffer; filter.type="highpass"; filter.frequency.value=accented?1800:1200; gain.gain.setValueAtTime(0.0001,start); gain.gain.exponentialRampToValueAtTime(accented?0.065:0.045,start+0.002); gain.gain.exponentialRampToValueAtTime(0.0001,start+0.03); noise.connect(filter); filter.connect(gain); gain.connect(audioContext.destination); noise.start(start); noise.stop(start+0.03);}
  function playQuestionAudio(startOffsetSeconds=0, forcePlay=false){ if(isAudioPlaying && !forcePlay){stopAudioPlayback(false); return;} const AudioContextClass=window.AudioContext||window.webkitAudioContext; if(!AudioContextClass){setPrompt("Audio playback is not supported in this browser."); return;} stopAudioPlayback(); const runId=playbackRunRef.current+1; playbackRunRef.current=runId; const audioContext=new AudioContextClass(); const masterGain=audioContext.createGain(); masterGain.gain.setValueAtTime(1,audioContext.currentTime); masterGain.connect(audioContext.destination); audioContextRef.current=audioContext; masterGainRef.current=masterGain; setIsAudioPlaying(true); setPrompt(""); const focused=listenCount>0&&startOffsetSeconds===0; const playbackBars=focused?focusedBars:question.bars; const timelineStartBar=playbackBars[0]?.barIndex??0; const activeDuration=playbackBars.length*barSeconds; const startOffset=clamp(startOffsetSeconds||0,0,Math.max(0,activeDuration-0.05)); const audioStartTime=audioContext.currentTime+0.12; setFocusedPlaybackActive(focused); setPlaybackTotal(activeDuration); setPlaybackElapsed(startOffset); playbackBars.forEach((bar)=>{const barStart=(bar.barIndex-timelineStartBar)*barSeconds; const barEnd=barStart+barSeconds; if(barEnd<=startOffset)return; if(metronomeOn) for(let beat=0;beat<question.timeSignature.beats;beat+=1){const beatStart=barStart+beat*beatSeconds; if(beatStart>=startOffset) playDrumHit(audioContext,audioStartTime+beatStart-startOffset,beat===0);} bar.notes.forEach((note,index)=>{const noteStart=barStart+bar.notes.slice(0,index).reduce((sum,item)=>sum+item.beats*beatSeconds,0); const noteEnd=noteStart+note.beats*beatSeconds; if(noteEnd<=startOffset)return; const scheduledStart=audioStartTime+Math.max(noteStart,startOffset)-startOffset; const duration=(noteEnd-Math.max(noteStart,startOffset))*0.98; const startMs=Math.max(0,(scheduledStart-audioContext.currentTime)*1000); highlightTimersRef.current.push(window.setTimeout(   return <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2"><div className="mx-auto max-w-6xl"><header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm"><div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between"><div className="flex items-center gap-4"><AppIcon/><div><h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Insert Missing Notes</h1><p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Complete melodies using repetition, sequence, stepwise movement and small leaps.</p></div></div><div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end"><StatCard variant="score" label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${accuracy}%`} progress={accuracy}/><div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${streakMedal(streak)?.bg??"bg-stone-50"}`}><StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${bestStreak}`} medal={streakMedal(streak)} confettiKey={confettiKey}/><div className="relative z-0 flex min-h-[52px] min-w-[64px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700"><div className="flex items-center gap-1"><span>💎</span><span className="text-cyan-500">10</span></div><div className="mt-1">🥇 <span className="text-yellow-500">6</span></div><div className="mt-1">🥈 <span className="text-slate-500">4</span></div><div className="mt-1">🥉 <span className="text-amber-700">2</span></div></div></div></div></div></header><main className="relative -mt-[10px] min-h-[560px] overflow-visible rounded-2xl border border-stone-200 bg-white pt-[10px] px-4 pb-4 shadow-sm md:min-h-0 md:h-auto md:overflow-visible md:pt-[14px] md:px-6 md:pb-6" onPointerDown={()=>{if(feed function MenuRows({ difficulty,setDifficulty,fourBarMode,setFourBarMode,newQuestion,tempo,setTempo,stopAudioPlayback,metronomeOn,setMetronomeOn,highlightPlayback,setHighlightPlayback,resetScore }) { const row="mb-2.5 flex min-h-[52px] w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-[14px] py-[10px]"; return <><div className={row}><span className="flex items-center gap-2 text-sm font-semibold"><MenuIcon type="difficulty"/><span>Difficulty</span></span><div className="flex gap-2">{[{id:"repetition",label:"Repetition"},{id:"sequence",label:"Sequence"},{id:"full",label:"Any"}].map((option)=><button key={option.id} type="button" onClick={()=>{setDifficulty(option.id);newQuestion(fourBarMode,option.id);}} className={`rounded-lg border px-2.5 py-[8px] text-xs font-semibold ${difficulty===option.id?"border-stone-950 bg-stone-950 text-white":"border-stone-300 bg-white hover-bg-stone-100"}`}>{option.label}</button>)}</div></div><div className={row}><span className="flex items-center gap-2 text-sm font-semibold"><MenuIcon type="bars"/><span>Number of Bars</span></span><div className="flex gap-2"><button type="button" onClick={()=>{setFourBarMode(true);newQuestion(true,difficulty);}} className={`min-w-[56px] rounded-lg border px-3 py-[8px] text-xs font-semibold ${fourBarMode?"border-stone-950 bg-stone-950 text-white":"border-stone-300 bg-white hover-bg-stone-100"}`}>4</button><button type="button" onClick={()=>{setFourBarMode(false);newQuestion(false,difficulty);}} className={`min-w-[56px] rounded-lg border px-3 py-[8px] text-xs font-semibold ${!fourBarMode?"border-stone-950 bg-stone-950 text-white":"border-stone-300 bg-white hover-bg-stone-100"}`}>8</button></div></div><div className={row}><h3 className="flex items-center gap-2 text-sm font-bold text-stone-700"><MenuIcon type="tempo"/><span>Tempo</span></h3><div className="flex gap-2">{TEMPOS.map((speed)=><button key={speed.id} type="button" onClick={()=>{setTempo(speed.id);stopAudio
