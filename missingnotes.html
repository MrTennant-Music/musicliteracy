<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melody Completion</title>
  <link rel="icon" type="image/svg+xml" href="https://mrtennant-music.github.io/musicliteracy/insert-missing-notes-icon.svg" />
  <link rel="apple-touch-icon" href="https://mrtennant-music.github.io/musicliteracy/insert-missing-notes-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./hub-ui.css?v=1.5" />
  <script src="./hub-mobile.js?v=1.3"></script>
  <script src="./hub-audio.js?v=1.4"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="./hub-shell.js?v=1.3"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
  <script src="./hub-menu.js?v=2.1"></script>
  <script src="./bravura-symbols.js"></script>
  <script src="./shared-notation-config.js"></script>
</head>
<body class="overflow-x-hidden bg-stone-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const ASSET = {
      appIcon: "https://mrtennant-music.github.io/musicliteracy/insert-missing-notes-icon.svg",
      level: "https://mrtennant-music.github.io/musicliteracy/levels.svg",
      customise: "https://mrtennant-music.github.io/musicliteracy/customise.svg",
      next: "https://mrtennant-music.github.io/musicliteracy/next.svg",
      bronze: "https://mrtennant-music.github.io/musicliteracy/bronze.svg",
      silver: "https://mrtennant-music.github.io/musicliteracy/silver.svg",
      gold: "https://mrtennant-music.github.io/musicliteracy/gold.svg",
      diamond: "https://mrtennant-music.github.io/musicliteracy/diamond.svg",
      eye: "./eye.svg",
      metronome: "./metronome.svg",
      tempo: "./tempo.svg",
    };

    const LEVELS = {
      N3: { label: "National 3", description: "Repetition" },
      N4: { label: "National 4", description: "Sequences" },
      N5: { label: "National 5", description: "Repetition • Sequences" },
      H: { label: "Higher", description: "Repetition • Sequences • Melodic Variation" },
    };

    const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS ?? {};
    const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG ?? { symbols: {}, drawing: {} };

    const SVG = { width: 920, height: 340 };
    const STAFF = { left: 58, right: 862, topA: 82, topB: 218, gap: 11 };
    const BAR_COUNT = 8;
    const BARS_PER_SYSTEM = 4;
    const KEY_SIGNATURE_SPACING = 14;
    const COLOUR = { green: "#16a34a", red: "#dc2626", blue: "#2563eb", guide: "#525252" };
    const TEMPOS = [
      { id: "slow", label: "Adagio", bpm: 58 },
      { id: "medium", label: "Andante", bpm: 76 },
      { id: "fast", label: "Allegro", bpm: 96 },
    ];
    const TIME_SIGNATURES = [
      { id: "2/4", top: 2, bottom: 4, beats: 2 },
      { id: "3/4", top: 3, bottom: 4, beats: 3 },
      { id: "4/4", top: 4, bottom: 4, beats: 4 },
      { id: "6/8", top: 6, bottom: 8, beats: 3 },
    ];
    const RHYTHMS = {
      quaver: { beats: 0.5, spacing: 0.95, label: "quaver" },
      crotchet: { beats: 1, spacing: 1.35, label: "crotchet" },
      dottedCrotchet: { beats: 1.5, spacing: 1.75, label: "dotted crotchet" },
      minim: { beats: 2, spacing: 2.15, label: "minim" },
      dottedMinim: { beats: 3, spacing: 2.75, label: "dotted minim" },
      semibreve: { beats: 4, spacing: 3.4, label: "semibreve" },
    };
    const BAR_PATTERNS = {
      "2/4": [
        ["crotchet", "crotchet"],
        ["minim"],
        ["dottedCrotchet", "quaver"],
        ["quaver", "quaver", "crotchet"],
        ["crotchet", "quaver", "quaver"],
      ],
      "3/4": [
        ["crotchet", "crotchet", "crotchet"],
        ["minim", "crotchet"],
        ["crotchet", "minim"],
        ["dottedMinim"],
        ["dottedCrotchet", "quaver", "crotchet"],
        ["crotchet", "dottedCrotchet", "quaver"],
        ["quaver", "quaver", "crotchet", "crotchet"],
        ["crotchet", "quaver", "quaver", "crotchet"],
      ],
      "4/4": [
        ["crotchet", "crotchet", "crotchet", "crotchet"],
        ["minim", "crotchet", "crotchet"],
        ["crotchet", "crotchet", "minim"],
        ["dottedMinim", "crotchet"],
        ["crotchet", "dottedMinim"],
        ["dottedCrotchet", "quaver", "minim"],
        ["minim", "dottedCrotchet", "quaver"],
        ["quaver", "quaver", "crotchet", "crotchet", "crotchet"],
        ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
        ["crotchet", "crotchet", "quaver", "quaver", "crotchet"],
        ["minim", "minim"],
      ],
      "6/8": [
        ["dottedMinim"],
        ["dottedCrotchet", "dottedCrotchet"],
        ["dottedCrotchet", "quaver", "crotchet"],
        ["crotchet", "quaver", "crotchet", "quaver"],
      ],
    };
    const NOTE_POOL = [
      { letter: "C", octave: 4, step: -2, midi: 60 },
      { letter: "D", octave: 4, step: -1, midi: 62 },
      { letter: "E", octave: 4, step: 0, midi: 64 },
      { letter: "F", octave: 4, step: 1, midi: 65 },
      { letter: "G", octave: 4, step: 2, midi: 67 },
      { letter: "A", octave: 4, step: 3, midi: 69 },
      { letter: "B", octave: 4, step: 4, midi: 71 },
      { letter: "C", octave: 5, step: 5, midi: 72 },
      { letter: "D", octave: 5, step: 6, midi: 74 },
      { letter: "E", octave: 5, step: 7, midi: 76 },
      { letter: "F", octave: 5, step: 8, midi: 77 },
      { letter: "G", octave: 5, step: 9, midi: 79 },
      { letter: "A", octave: 5, step: 10, midi: 81 },
    ];
    const KEYS = [
      { id: "C", tonic: "C", signature: [], chords: { I: ["C", "E", "G"], IV: ["F", "A", "C"], V: ["G", "B", "D"], VI: ["A", "C", "E"] } },
      { id: "F", tonic: "F", signature: [{ type: "flat", step: 4 }], chords: { I: ["F", "A", "C"], IV: ["B", "D", "F"], V: ["C", "E", "G"], VI: ["D", "F", "A"] } },
      { id: "G", tonic: "G", signature: [{ type: "sharp", step: 8 }], chords: { I: ["G", "B", "D"], IV: ["C", "E", "G"], V: ["D", "F", "A"], VI: ["E", "G", "B"] } },
      { id: "Am", tonic: "A", signature: [], chords: { I: ["A", "C", "E"], IV: ["D", "F", "A"], V: ["E", "G", "B"], VI: ["F", "A", "C"] }, raised: { V: { G: 1 } } },
    ];

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const randomItem = (items) => items[Math.floor(Math.random() * items.length)];
    const rhythmInfo = (rhythm) => RHYTHMS[rhythm] ?? RHYTHMS.crotchet;
    const timeSignaturesForLevel = (level) => TIME_SIGNATURES.filter((signature) => signature.id !== "6/8" || level === "H");
    const barPatternsForSignature = (signature) => BAR_PATTERNS[signature.id] ?? BAR_PATTERNS["4/4"];
    const noteBaseIndex = (note) => NOTE_POOL.findIndex((item) => item.letter === note?.letter && item.octave === note?.octave);
    const yForStep = (step, top) => top + STAFF.gap * 4 - step * (STAFF.gap / 2);
    const stemDown = (step) => step > 4;
    const midiToFrequency = (midi) => 440 * Math.pow(2, (midi - 69) / 12);
    const noteByLetter = (letter, preferredIndex = 6) => {
      const options = NOTE_POOL.map((note, index) => ({ ...note, index })).filter((note) => note.letter === letter);
      return options.reduce((best, item) => Math.abs(item.index - preferredIndex) < Math.abs(best.index - preferredIndex) ? item : best, options[0]);
    };
    const keyAccidentalForLetter = (key, letter) => {
      if (key?.id === "F" && letter === "B") return -1;
      if (key?.id === "G" && letter === "F") return 1;
      return 0;
    };
    const chordAccidentalForLetter = (key, chordSymbol, letter) => key?.raised?.[chordSymbol]?.[letter] ?? null;
    const melodicAccidentalForLetter = (key, letter) => key?.id === "Am" && letter === "G" ? 1 : null;
    const effectiveMidiForNote = (question, bar, note) => note.midi + keyAccidentalForLetter(question.key, note.letter) + (note.writtenAccidental ?? 0);
    const pitchForChordLetter = (question, bar, letter, preferredIndex = 4) => {
      const base = noteByLetter(letter, preferredIndex);
      const raised = chordAccidentalForLetter(question.key, bar.chordSymbol, letter);
      return base.midi + keyAccidentalForLetter(question.key, letter) + (raised ?? 0);
    };
    const cloneNotesForBar = (notes, barIndex) => notes.map((note, noteIndex) => ({
      ...note,
      id: `${barIndex}-${noteIndex}`,
      barIndex,
      noteIndex,
      beat: note.beat,
    }));
    const transposeNotesForBar = (notes, barIndex, offset) => cloneNotesForBar(notes, barIndex).map((note) => ({
      ...note,
      ...NOTE_POOL[clamp(noteBaseIndex(note) + offset, 0, NOTE_POOL.length - 1)],
      writtenAccidental: null,
    }));
    const finalRhythmForSignature = (signature) => ({
      "2/4": "minim",
      "3/4": "dottedMinim",
      "4/4": "semibreve",
      "6/8": "dottedMinim",
    }[signature.id] ?? "semibreve");

    function makeNote(base, rhythm, barIndex, noteIndex, beat, key, chordSymbol) {
      const melodicAccidental = melodicAccidentalForLetter(key, base.letter);
      const chordAccidental = chordAccidentalForLetter(key, chordSymbol, base.letter);
      return {
        ...base,
        id: `${barIndex}-${noteIndex}`,
        rhythm,
        beats: rhythmInfo(rhythm).beats,
        beat,
        barIndex,
        noteIndex,
        writtenAccidental: melodicAccidental ?? chordAccidental,
      };
    }

    function sharedActualSymbolKey(key) {
      if (key === "flatInScore" || key === "flatKeySignature") return "flat";
      if (key === "naturalInScore") return "natural";
      if (key === "sharpInScore" || key === "sharpKeySignature") return "sharp";
      if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
      if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
      return key;
    }

    function sharedSettingsKey(key) {
      if (key === "flatKeySignature" || key === "sharpKeySignature") return SHARED_CONFIG.symbols?.keySignatureAccidentals ? "keySignatureAccidentals" : key;
      if (key === "flatInScore" || key === "naturalInScore" || key === "sharpInScore") return SHARED_CONFIG.symbols?.scoreAccidentals ? "scoreAccidentals" : key;
      return key;
    }

    function sharedSymbolConfig(key) {
      const symbols = SHARED_CONFIG.symbols ?? {};
      const settingsKey = sharedSettingsKey(key);
      return symbols[settingsKey] ?? symbols[sharedActualSymbolKey(settingsKey)] ?? {
        fontSizeScale: 3.4,
        xOffsetScale: 0,
        yOffsetScale: 0,
        widthScale: 1,
        heightScale: 1,
        opticalXOffset: 0,
        opticalYOffset: 0,
      };
    }

    function sharedSymbolForKey(key) {
      return SHARED_SYMBOLS[sharedActualSymbolKey(key)] ?? "";
    }

    function calibrationAnchorX(symbolKey, left = STAFF.left) {
      if (symbolKey?.startsWith("timeSig")) return left + 12 * STAFF.gap;
      return left;
    }

    function calibrationAnchorY(symbolKey, top = STAFF.topA) {
      if (symbolKey?.startsWith("timeSig")) return yForStep(5.3, top);
      return yForStep(4, top);
    }

    function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", opacity = 1, lineGap = STAFF.gap, settingOverrides = {} }) {
      const glyph = sharedSymbolForKey(symbolKey);
      if (!glyph) return null;
      const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
      const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
      const adjustedY = y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
      const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
      const widthScale = Number(settings.widthScale || 1);
      const heightScale = Number(settings.heightScale || 1);
      return (
        <text className="music-symbol" x={adjustedX} y={adjustedY} fill={colour} opacity={opacity} fontSize={fontSize} textAnchor="middle" transform={`translate(${adjustedX} ${adjustedY}) scale(${widthScale} ${heightScale}) translate(${-adjustedX} ${-adjustedY})`} pointerEvents="none">
          {glyph}
        </text>
      );
    }

    function noteSymbolKey(rhythm, down, beamed = false) {
      if (rhythm === "semibreve") return "wholeNote";
      if (rhythm === "minim" || rhythm === "dottedMinim") return down ? "halfNoteStemDown" : "halfNoteStemUp";
      if (rhythm === "quaver" && beamed) return down ? "noteheadBlackStemDown" : "noteheadBlackStemUp";
      if (rhythm === "quaver") return down ? "eighthNoteStemDown" : "eighthNoteStemUp";
      return down ? "quarterNoteStemDown" : "quarterNoteStemUp";
    }

    function levelMode(level) {
      if (level === "N3") return "repetition";
      if (level === "N4") return "sequence";
      if (level === "H") return randomItem(["repetition", "sequence", "repetition", "sequence", "free"]);
      return randomItem(["repetition", "sequence"]);
    }

    function maxStepForLevel(level, mode) {
      if (level === "H") return 4;
      if (level === "N3" || level === "N4" || level === "N5") return 1;
      return 2;
    }

    function noteAllowedForLevel(level, note) {
      return level !== "N3" || (note.step >= 0 && note.step <= 8);
    }

    function barCountForLevel(level) {
      return 4;
    }

    function tonicStartNoteForLevel(level, key) {
      if (level === "N3" || level === "N4") return randomItem(NOTE_POOL.filter((note) => note.letter === "C" && (note.octave === 4 || note.octave === 5)));
      return noteByLetter(key.tonic, 6);
    }

    function hasSamePitchPattern(first, second) {
      if (!first?.notes || !second?.notes || first.notes.length !== second.notes.length) return false;
      return first.notes.every((note, index) => note.step === second.notes[index]?.step);
    }

    function hasSequencePitchPattern(first, second) {
      if (!first?.notes || !second?.notes || first.notes.length !== second.notes.length) return false;
      const offset = second.notes[0].step - first.notes[0].step;
      if (offset === 0) return false;
      return first.notes.every((note, index) => second.notes[index]?.step - note.step === offset);
    }

    function canTransposeBarByStep(bar, offset, level) {
      if (!bar?.notes?.length) return false;
      return bar.notes.every((note) => {
        const target = NOTE_POOL[noteBaseIndex(note) + offset];
        return target && noteAllowedForLevel(level, target);
      });
    }

    function targetHasSourcePattern(bars, targetBar, matcher) {
      const target = bars[targetBar];
      return bars.some((bar) => bar.barIndex !== targetBar && matcher(bar, target));
    }

    function targetHasAnySourcePattern(bars, targetBar) {
      return targetHasSourcePattern(bars, targetBar, hasSamePitchPattern)
        || targetHasSourcePattern(bars, targetBar, hasSequencePitchPattern);
    }

    function avoidExactRepetition(bar) {
      const notes = cloneNotesForBar(bar.notes, bar.barIndex);
      const first = notes[0];
      const firstIndex = noteBaseIndex(first);
      const replacement = NOTE_POOL[firstIndex + 2] || NOTE_POOL[firstIndex - 2] || first;
      notes[0] = { ...first, ...replacement };
      return { ...bar, notes };
    }

    function chooseNextNote({ key, chordLetters, previous, currentIndex, strongBeat, rhythm, maxLeap, level, forceDirection = 0, preferLeap = false }) {
      const previousIndex = noteBaseIndex(previous) >= 0 ? noteBaseIndex(previous) : currentIndex;
      const previousMidi = previous?.midi ?? NOTE_POOL[previousIndex]?.midi ?? 72;
      const candidates = [];

      NOTE_POOL.forEach((candidate, candidateIndex) => {
        const distance = candidateIndex - previousIndex;
        const absDistance = Math.abs(distance);
        const isChordTone = chordLetters.includes(candidate.letter);
        const pitchDistance = Math.abs((candidate.midi + keyAccidentalForLetter(key, candidate.letter)) - previousMidi);

        if (!noteAllowedForLevel(level, candidate)) return;
        if (pitchDistance > 12) return;
        if (absDistance > maxLeap) return;
        if (strongBeat && !isChordTone) return;
        if (forceDirection > 0 && distance < 0) return;
        if (forceDirection < 0 && distance > 0) return;
        if (rhythm === "quaver" && absDistance > 2) return;

        let weight = isChordTone ? 8 : 2;
        if (strongBeat) weight *= 2.8;
        if (absDistance === 0) weight *= 0.6;
        if (absDistance === 1) weight *= 5;
        if (absDistance === 2) weight *= level === "H" ? 0.75 : 3;
        if (absDistance >= 3) weight *= level === "H" ? 0.25 : (preferLeap ? 4 : 0.7);
        if (candidateIndex < 1 || candidateIndex > NOTE_POOL.length - 2) weight *= 0.35;
        if (key.id === "Am" && candidate.letter === "G") weight *= 0.8;
        candidates.push({ candidate, weight });
      });

      if (!candidates.length) {
        const fallback = NOTE_POOL
          .map((note, index) => ({ ...note, index }))
          .filter((note) => {
            const distance = note.index - previousIndex;
            const absDistance = Math.abs(distance);
            if (!noteAllowedForLevel(level, note)) return false;
            if (absDistance > maxLeap) return false;
            if (forceDirection > 0 && distance < 0) return false;
            if (forceDirection < 0 && distance > 0) return false;
            if (rhythm === "quaver" && absDistance > 1) return false;
            return true;
          });
        return randomItem(fallback.length ? fallback : [previous]);
      }
      let roll = Math.random() * candidates.reduce((sum, item) => sum + item.weight, 0);
      for (const item of candidates) {
        roll -= item.weight;
        if (roll <= 0) return item.candidate;
      }
      return candidates.at(-1).candidate;
    }

    function buildNotesFromPattern({ key, chordSymbol, pattern, barIndex, previousIndex, level, mode }) {
      const chordLetters = key.chords[chordSymbol] ?? key.chords.I;
      let currentIndex = previousIndex;
      let previous = NOTE_POOL[currentIndex] ?? noteByLetter(key.tonic, 6);
      let beat = 0;
      const notes = [];
      const direction = level === "N3" || level === "N4" ? randomItem([-1, 1]) : 0;
      const maxLeap = maxStepForLevel(level, mode);

      pattern.forEach((rhythm, noteIndex) => {
        const strongBeat = beat === 0 || beat === 2 || (beat === 1.5 && rhythmInfo(rhythm).beats >= 1);
        const preferLeap = false;
        let base = chooseNextNote({
          key,
          chordLetters,
          previous,
          currentIndex,
          strongBeat,
          rhythm,
          maxLeap,
          level,
          forceDirection: direction,
          preferLeap,
        });
        if (barIndex === 0 && noteIndex === 0) base = tonicStartNoteForLevel(level, key);
        const note = makeNote(base, rhythm, barIndex, noteIndex, beat, key, chordSymbol);
        notes.push(note);
        currentIndex = noteBaseIndex(base) >= 0 ? noteBaseIndex(base) : currentIndex;
        previous = base;
        beat += rhythmInfo(rhythm).beats;
      });

      return { notes, lastIndex: currentIndex };
    }

    function buildFinalBar({ key, chordSymbol, barIndex, timeSignature, previousIndex, totalBars, level }) {
      const rhythm = finalRhythmForSignature(timeSignature);
      const previous = NOTE_POOL[previousIndex] ?? noteByLetter(key.tonic, 6);
      const tonicOptions = level === "N3" || level === "N4"
        ? NOTE_POOL.filter((note) => note.letter === "C" && (note.octave === 4 || note.octave === 5))
        : NOTE_POOL.filter((note) => note.letter === key.tonic && noteAllowedForLevel(level, note));
      const base = tonicOptions.reduce((best, note) => Math.abs(note.midi - previous.midi) < Math.abs(best.midi - previous.midi) ? note : best, tonicOptions[0] ?? noteByLetter(key.tonic, previousIndex));
      return {
        barIndex,
        chordSymbol,
        notes: [makeNote(base, rhythm, barIndex, 0, 0, key, chordSymbol)],
        totalBars,
        pattern: [rhythm],
      };
    }

    function applyMelodicAccidentals(notes, key) {
      return notes.map((note) => {
        const accidental = melodicAccidentalForLetter(key, note.letter);
        return accidental === null ? note : { ...note, writtenAccidental: accidental };
      });
    }

    function targetOnlyMovesByStep(bars, targetBar) {
      const target = bars[targetBar];
      if (!target?.notes?.length) return false;
      for (let index = 1; index < target.notes.length; index += 1) {
        if (Math.abs(target.notes[index].step - target.notes[index - 1].step) > 1) return false;
      }
      return true;
    }

    function targetMovesWithinInterval(bars, targetBar, maximumInterval) {
      const target = bars[targetBar];
      if (!target?.notes?.length) return false;
      for (let index = 1; index < target.notes.length; index += 1) {
        if (Math.abs(target.notes[index].step - target.notes[index - 1].step) > maximumInterval) return false;
      }
      return true;
    }

    function melodyHasOctaveLeap(bars) {
      const notes = bars.flatMap((bar) => bar.notes ?? []);
      return notes.some((note, index) => index > 0 && Math.abs(note.step - notes[index - 1].step) >= 7);
    }

    function hasEnoughPitchVariety(bars, minimum = 3) {
      const pitches = new Set(bars.flatMap((bar) => bar.notes ?? []).map((note) => `${note.letter}${note.octave}`));
      return pitches.size >= minimum;
    }

    function melodyNotes(bars) {
      return bars.flatMap((bar) => bar.notes ?? []);
    }

    function dominantLetterForKey(key) {
      return key?.chords?.V?.[0] ?? "G";
    }

    function levelMaximumInterval(level) {
      if (level === "N3") return 2;
      if (level === "H") return 4;
      if (level === "N4" || level === "N5") return 3;
      return 3;
    }

    function levelMaximumRange(level) {
      if (level === "N3" || level === "N4") return 5;
      if (level === "N5" || level === "H") return 7;
      return 7;
    }

    function longestRepeatedPitchRun(notes) {
      let longest = 1;
      let current = 1;
      for (let index = 1; index < notes.length; index += 1) {
        if (notes[index].step === notes[index - 1].step) {
          current += 1;
          longest = Math.max(longest, current);
        } else {
          current = 1;
        }
      }
      return longest;
    }

    function hasAwkwardBarlineLeap(bars, level) {
      const maximum = levelMaximumInterval(level);
      return bars.some((bar, index) => {
        const nextBar = bars[index + 1];
        if (!bar?.notes?.length || !nextBar?.notes?.length) return false;
        return Math.abs(nextBar.notes[0].step - bar.notes.at(-1).step) > maximum;
      });
    }

    function hasBalancedContour(notes) {
      let rises = 0;
      let falls = 0;
      for (let index = 1; index < notes.length; index += 1) {
        const interval = notes[index].step - notes[index - 1].step;
        if (interval > 0) rises += 1;
        if (interval < 0) falls += 1;
      }
      return rises > 0 && falls > 0;
    }

    function leapsRecoverByStep(notes, level) {
      const recoveryLimit = 1;
      const leapThreshold = level === "H" ? 3 : 2;
      for (let index = 1; index < notes.length - 1; index += 1) {
        const leap = notes[index].step - notes[index - 1].step;
        if (Math.abs(leap) < leapThreshold) continue;
        const recovery = notes[index + 1].step - notes[index].step;
        if (recovery === 0) continue;
        if (Math.sign(recovery) === Math.sign(leap) || Math.abs(recovery) > recoveryLimit) return false;
      }
      return true;
    }

    function melodyPassesQualityRules(question) {
      const notes = melodyNotes(question.bars);
      if (notes.length < 2) return false;
      const intervals = notes.slice(1).map((note, index) => Math.abs(note.step - notes[index].step));
      const range = Math.max(...notes.map((note) => note.step)) - Math.min(...notes.map((note) => note.step));
      const first = notes[0];
      const last = notes.at(-1);
      const tonic = question.key.tonic;
      const maximumRepeatedRun = question.level === "N3" ? 3 : 2;

      if (first.letter !== tonic) return false;
      if (last.letter !== tonic) return false;
      if (range > levelMaximumRange(question.level)) return false;
      if (Math.max(...intervals) > levelMaximumInterval(question.level)) return false;
      if (hasAwkwardBarlineLeap(question.bars, question.level)) return false;
      if (!hasBalancedContour(notes)) return false;
      if (!leapsRecoverByStep(notes, question.level)) return false;
      if (longestRepeatedPitchRun(notes) > maximumRepeatedRun) return false;
      return true;
    }

    function makeChordProgression() {
      const bar2 = randomItem(["I", "IV", "V", "VI"]);
      const bar3 = randomItem(["IV", "V"]);
      return ["I", bar2, bar3, "I"];
    }

    function allowedChordsForBar(barIndex) {
      if (barIndex === 0 || barIndex === 3) return ["I"];
      if (barIndex === 1) return ["I", "IV", "V", "VI"];
      return ["IV", "V"];
    }

    function chordFitScore(key, bar, chordSymbol) {
      const chordLetters = key.chords[chordSymbol] ?? [];
      return (bar.notes ?? []).reduce((score, note) => {
        const isChordTone = chordLetters.includes(note.letter);
        const weight = note.beat === 0 || note.beat === 2 ? 3 : 1;
        return score + (isChordTone ? weight : -weight);
      }, 0);
    }

    function fitChordsToMelody(key, bars) {
      return bars.map((bar) => {
        const allowed = allowedChordsForBar(bar.barIndex);
        const bestChord = allowed.reduce((best, chordSymbol) => (
          chordFitScore(key, bar, chordSymbol) > chordFitScore(key, bar, best) ? chordSymbol : best
        ), allowed[0]);
        return { ...bar, chordSymbol: bestChord };
      });
    }

    function sequenceSourceCandidates(bars, targetBar, level) {
      if (level !== "N4") return bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length);
      return bars.filter((bar) => bar.barIndex === targetBar - 1 && bar.notes?.length);
    }

    function makeQuestion(level = "N5", attempt = 0) {
      const activeBarCount = barCountForLevel(level);
      const timeSignature = randomItem(timeSignaturesForLevel(level));
      const majorKeys = KEYS.filter((key) => key.id !== "Am");
      const key = level === "N3" || level === "N4"
        ? KEYS.find((item) => item.id === "C")
        : Math.random() < 0.82 ? randomItem(majorKeys) : KEYS.find((item) => item.id === "Am");
      const progression = makeChordProgression();

      const targetBar = level === "N4" || level === "N5" || level === "H"
        ? randomItem([1, 2])
        : randomItem(Array.from({ length: activeBarCount }, (_, index) => index));
      const bars = [];
      let previousIndex = noteBaseIndex(tonicStartNoteForLevel(level, key));
      const mode = levelMode(level);

      for (let barIndex = 0; barIndex < activeBarCount; barIndex += 1) {
        const chordSymbol = progression[barIndex];
        let bar;
        if (barIndex === activeBarCount - 1) {
          bar = buildFinalBar({ key, chordSymbol, barIndex, timeSignature, previousIndex, totalBars: activeBarCount, level });
          previousIndex = noteBaseIndex(bar.notes[0]);
        } else {
          const availablePatterns = barPatternsForSignature(timeSignature);
          const pattern = randomItem(availablePatterns);
          const built = buildNotesFromPattern({ key, chordSymbol, pattern, barIndex, previousIndex, level, mode });
          previousIndex = built.lastIndex;
          bar = { barIndex, chordSymbol, notes: built.notes, totalBars: activeBarCount, pattern };
        }
        bars.push(bar);
      }

      if (bars[targetBar]?.notes?.length) {
        if (mode === "repetition") {
          let repetitionCandidates = bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length);
          const repetitionSource = randomItem(repetitionCandidates.length ? repetitionCandidates : bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length));
          bars[targetBar] = { ...bars[targetBar], notes: cloneNotesForBar(repetitionSource.notes, targetBar) };
        } else if (mode === "sequence") {
          let possibleSources = sequenceSourceCandidates(bars, targetBar, level);
          const sequenceOptions = possibleSources.flatMap((source) => [-1, 1]
            .filter((offset) => canTransposeBarByStep(source, offset, level))
            .map((offset) => ({ source, offset })));
          const selectedSequence = randomItem(sequenceOptions);
          if (selectedSequence) {
            bars[targetBar] = { ...bars[targetBar], notes: transposeNotesForBar(selectedSequence.source.notes, targetBar, selectedSequence.offset) };
          }
        }
        bars[targetBar] = { ...bars[targetBar], notes: applyMelodicAccidentals(bars[targetBar].notes, key), pattern: bars[targetBar].notes.map((note) => note.rhythm) };
      }

      const fittedBars = fitChordsToMelody(key, bars);

      const question = {
        id: Math.random().toString(36).slice(2),
        key,
        timeSignature,
        bars: fittedBars,
        targetBar,
        level,
        mode,
        barCount: activeBarCount,
      };

      const targetMaximumInterval = level === "H" && mode === "free" ? 1 : maxStepForLevel(level, mode);

      if ((level === "N3" || level === "N4" || level === "N5" || level === "H") && !targetMovesWithinInterval(bars, targetBar, targetMaximumInterval) && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      if ((level === "N3" || level === "N4") && !hasEnoughPitchVariety(bars) && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      if ((level === "N5" || level === "H") && (bars[targetBar]?.notes?.length ?? 0) < 3 && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      if (level === "N3" && melodyHasOctaveLeap(bars) && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      if (level === "N4" && !targetHasSourcePattern(bars, targetBar, mode === "repetition" ? hasSamePitchPattern : hasSequencePitchPattern) && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      if (level === "N5" && !targetHasSourcePattern(bars, targetBar, mode === "repetition" ? hasSamePitchPattern : hasSequencePitchPattern) && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      if (level === "H" && mode !== "free" && !targetHasSourcePattern(bars, targetBar, mode === "repetition" ? hasSamePitchPattern : hasSequencePitchPattern) && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      if (level === "H" && mode === "free" && targetHasAnySourcePattern(bars, targetBar) && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      if (!melodyPassesQualityRules(question) && attempt < 160) {
        return makeQuestion(level, attempt + 1);
      }

      return question;
    }

    function barStart(barIndex) {
      const topSystem = barIndex < 4;
      const musicStart = topSystem ? STAFF.left + 122 : STAFF.left + 74;
      const width = (STAFF.right - musicStart) / BARS_PER_SYSTEM;
      return musicStart + (barIndex % BARS_PER_SYSTEM) * width;
    }

    function barWidth(barIndex) {
      const musicStart = barIndex < 4 ? STAFF.left + 122 : STAFF.left + 74;
      return (STAFF.right - musicStart) / BARS_PER_SYSTEM;
    }

    function systemTop(barIndex) {
      return barIndex < 4 ? STAFF.topA : STAFF.topB;
    }

    function barPositions(bar) {
      const start = barStart(bar.barIndex);
      const end = start + barWidth(bar.barIndex);
      const scoreStart = start + (bar.barIndex === 0 ? 4 : 15);
      const scoreEnd = bar.barIndex === (bar.totalBars ?? BAR_COUNT) - 1 ? end - 24 : end - 4;
      const units = bar.notes.reduce((sum, note) => sum + rhythmInfo(note.rhythm).spacing, 0);
      const unit = Math.max(1, scoreEnd - scoreStart) / Math.max(1, units);
      let cursor = scoreStart + unit * 0.38;
      return bar.notes.map((note) => {
        const x = cursor;
        cursor += rhythmInfo(note.rhythm).spacing * unit;
        return x;
      });
    }

    function getQuaverGroups(notes, timeSignature = null) {
      const groups = [];
      let index = 0;
      while (index < notes.length) {
        if (notes[index]?.rhythm !== "quaver") {
          index += 1;
          continue;
        }
        const start = index;
        while (notes[index + 1]?.rhythm === "quaver") {
          if (timeSignature?.id === "6/8") {
            const currentGroup = Math.floor((notes[index].beat + 0.001) / 1.5);
            const nextGroup = Math.floor((notes[index + 1].beat + 0.001) / 1.5);
            if (currentGroup !== nextGroup) break;
          }
          index += 1;
        }
        if (index > start) groups.push({ start, end: index });
        index += 1;
      }
      return groups;
    }

    function groupContaining(groups, index) {
      return groups.find((group) => index >= group.start && index <= group.end) ?? null;
    }

    function getStem(x, y, step, down, forcedEndY = null) {
      const stemLength = STAFF.gap * 3.1;
      const stemXOffset = STAFF.gap * 0.6;
      return {
        down,
        stemX: x + (down ? -stemXOffset : stemXOffset),
        startY: y + (down ? 0.5 : -0.5),
        endY: forcedEndY ?? (down ? y + stemLength : y - stemLength),
      };
    }

    function groupHasDownStems(notes) {
      let down = 0;
      let up = 0;
      notes.forEach((note) => stemDown(note.step) ? down += 1 : up += 1);
      return down > up;
    }

    function getBeam(notes, positions, top, forcedDown = null) {
      const down = forcedDown ?? groupHasDownStems(notes);
      const settings = sharedSymbolConfig("quaverBeam");
      const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0);
      const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0);
      const stemLength = STAFF.gap * 3.1 * Number(settings.heightScale || 1);
      const beamWidthAdjust = STAFF.gap * 0.6 * (Number(settings.widthScale || 1) - 1);
      const firstY = yForStep(notes[0].step, top);
      const lastY = yForStep(notes.at(-1).step, top);
      const firstStem = getStem(positions[0] + xOffset, firstY + yOffset, notes[0].step, down, down ? firstY + yOffset + stemLength : firstY + yOffset - stemLength);
      const lastStem = getStem(positions.at(-1) + xOffset, lastY + yOffset, notes.at(-1).step, down, down ? lastY + yOffset + stemLength : lastY + yOffset - stemLength);
      return {
        down,
        start: { x: firstStem.stemX, y: firstStem.endY },
        end: { x: lastStem.stemX, y: lastStem.endY },
      };
    }

    function beamYAtX(x, beam) {
      const progress = (x - beam.start.x) / (beam.end.x - beam.start.x || 1);
      return beam.start.y + progress * (beam.end.y - beam.start.y);
    }

    function beamPolygonPoints(x1, y1, x2, y2, thickness) {
      const halfThickness = thickness / 2;
      return [`${x1},${y1 - halfThickness}`, `${x2},${y2 - halfThickness}`, `${x2},${y2 + halfThickness}`, `${x1},${y1 + halfThickness}`].join(" ");
    }

    function BeamShape({ beam, colour = "currentColor", opacity = 1 }) {
      const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.beamThicknessScale || 0.42));
      return <polygon points={beamPolygonPoints(beam.start.x - 0.5, beam.start.y, beam.end.x + 0.5, beam.end.y, thickness)} fill={colour} opacity={opacity} />;
    }

    function LedgerLines({ x, step, top, colour = "currentColor", opacity = 1 }) {
      const ledgerSteps = [];
      for (let ledgerStep = -2; ledgerStep >= step; ledgerStep -= 2) ledgerSteps.push(ledgerStep);
      for (let ledgerStep = 10; ledgerStep <= step; ledgerStep += 2) ledgerSteps.push(ledgerStep);
      const settings = sharedSymbolConfig("ledgerLines");
      const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
      const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
      const halfWidth = (STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4) * Number(settings.widthScale || 1)) / 2;
      const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11) * Number(settings.heightScale || 1));
      return <g>{ledgerSteps.map((ledgerStep) => <line key={ledgerStep} x1={x - halfWidth + xOffset} x2={x + halfWidth + xOffset} y1={yForStep(ledgerStep, top) + yOffset} y2={yForStep(ledgerStep, top) + yOffset} stroke={colour} strokeWidth={thickness} strokeLinecap="butt" opacity={opacity} />)}</g>;
    }

    function Accidental({ value, x, y, colour = "currentColor" }) {
      if (!value) return null;
      return <CalibratedSymbol symbolKey={value === 1 ? "sharpInScore" : "flatInScore"} x={x} y={y} colour={colour} />;
    }

    function Note({ note, x, top, colour = "currentColor", opacity = 1, active = false, faint = false, showFlag = true, forcedDown = null, forcedEndY = null, scale = 1 }) {
      if (!note) return null;
      const y = yForStep(note.step, top);
      const down = forcedDown ?? stemDown(note.step);
      const beamed = note.rhythm === "quaver" && !showFlag;
      const stem = getStem(x, y, note.step, down, forcedEndY);
      const dotKey = note.step % 2 === 0 ? "augmentationDotLine" : "augmentationDotSpace";
      const dotY = note.step % 2 === 0 ? y - STAFF.gap * 0.25 : y;
      const noteColour = active ? COLOUR.blue : colour;
      const stemThickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12));
      return (
        <g pointerEvents="none" opacity={faint ? 0.32 : opacity} transform={scale !== 1 ? `translate(${x} ${y}) scale(${scale}) translate(${-x} ${-y})` : undefined}>
          <LedgerLines x={x} step={note.step} top={top} colour={noteColour} />
          <Accidental value={note.writtenAccidental} x={x - STAFF.gap * 2.45} y={y} colour={noteColour} />
          <CalibratedSymbol symbolKey={noteSymbolKey(note.rhythm, down, beamed)} x={x} y={y} colour={noteColour} />
          {(note.rhythm === "dottedMinim" || note.rhythm === "dottedCrotchet") && <CalibratedSymbol symbolKey={dotKey} x={x + STAFF.gap * 1.3} y={dotY} colour={noteColour} />}
          {beamed && <line x1={stem.stemX} x2={stem.stemX} y1={stem.startY} y2={stem.endY} stroke={noteColour} strokeWidth={stemThickness} />}
        </g>
      );
    }

    function Staff({ top, systemIndex, question }) {
      const finalBar = Math.min(systemIndex * BARS_PER_SYSTEM + BARS_PER_SYSTEM - 1, question.bars.length - 1);
      const staffEnd = barStart(finalBar) + barWidth(finalBar);
      return (
        <g>
          {[0, 1, 2, 3, 4].map((line) => <line key={line} x1={STAFF.left} x2={staffEnd} y1={top + line * STAFF.gap} y2={top + line * STAFF.gap} stroke="currentColor" strokeWidth="1.25" />)}
          <CalibratedSymbol symbolKey="gClef" x={STAFF.left + 32} y={yForStep(2, top)} />
          {systemIndex === 0 && <KeySignature keySignature={question.key} top={top} />}
          {systemIndex === 0 && <TimeSignature signature={question.timeSignature} top={top} />}
        </g>
      );
    }

    function KeySignature({ keySignature, top }) {
      return <g>{keySignature.signature.map((item, index) => <CalibratedSymbol key={`${item.type}-${index}`} symbolKey={item.type === "sharp" ? "sharpKeySignature" : "flatKeySignature"} x={STAFF.left + 54 + index * KEY_SIGNATURE_SPACING} y={yForStep(item.step, top)} />)}</g>;
    }

    function TimeSignature({ signature, top }) {
      const key = `timeSig${signature.top}${signature.bottom}`;
      const settings = sharedSymbolConfig(key);
      const topGlyph = sharedSymbolForKey(`timeSig${signature.top}`);
      const bottomGlyph = sharedSymbolForKey(`timeSig${signature.bottom}`);
      const x = calibrationAnchorX(key) + STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
      const y = calibrationAnchorY(key, top) + STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
      const fontSize = STAFF.gap * Number(settings.fontSizeScale || 3.4);
      return <g pointerEvents="none"><text className="music-symbol" x={x} y={y - fontSize * 0.14} fontSize={fontSize} textAnchor="middle">{topGlyph}</text><text className="music-symbol" x={x} y={y + fontSize * 0.43} fontSize={fontSize} textAnchor="middle">{bottomGlyph}</text></g>;
    }

    function BarNotes({ bar, notes, positions, top, colour = "currentColor", feedback = null, hidden = false, activeNoteId = null, forceStemUp = false, timeSignature = null }) {
      const groups = getQuaverGroups(hidden ? bar.notes : notes, timeSignature);
      const shownAccidentals = new Set();
      return (
        <g>
          {notes.map((note, index) => {
            if (!note) return null;
            const accidentalKey = `${note.letter}:${note.writtenAccidental}`;
            const showAccidental = Boolean(note.writtenAccidental) && !shownAccidentals.has(accidentalKey);
            if (note.writtenAccidental) shownAccidentals.add(accidentalKey);
            const displayNote = showAccidental ? note : { ...note, writtenAccidental: null };
            const group = groupContaining(groups, index);
            const groupNotes = group ? notes.slice(group.start, group.end + 1) : [];
            const groupPositions = group ? positions.slice(group.start, group.end + 1) : [];
            const beam = group && groupNotes.every(Boolean) ? getBeam(groupNotes, groupPositions, top, forceStemUp ? false : null) : null;
            const noteStemDown = forceStemUp ? false : beam?.down ?? null;
            const stem = beam ? getStem(positions[index], yForStep(note.step, top), note.step, beam.down) : null;
            const forcedEndY = beam && stem ? beamYAtX(stem.stemX, beam) : null;
            const expected = bar.notes[index];
            const resultColour = feedback && hidden ? (note.step === expected?.step ? COLOUR.green : COLOUR.red) : colour;
            return <Note key={note.id ?? `${bar.barIndex}-${index}`} note={displayNote} x={positions[index]} top={top} colour={resultColour} active={activeNoteId === note.id} showFlag={!beam} forcedDown={noteStemDown} forcedEndY={forcedEndY} opacity={feedback && hidden && note.step !== expected?.step ? 0.58 : 1} />;
          })}
          {groups.map((group, index) => {
            const groupNotes = notes.slice(group.start, group.end + 1);
            if (!groupNotes.every(Boolean)) return null;
            const beam = getBeam(groupNotes, positions.slice(group.start, group.end + 1), top, forceStemUp ? false : null);
            const groupCorrect = groupNotes.every((note, noteIndex) => note?.step === bar.notes[group.start + noteIndex]?.step);
            const beamColour = feedback && hidden ? (groupCorrect ? COLOUR.green : COLOUR.red) : colour;
            return <BeamShape key={`beam-${bar.barIndex}-${index}`} beam={beam} colour={beamColour} />;
          })}
        </g>
      );
    }

    function RhythmGuide({ bar, positions, top, activeNoteId, timeSignature }) {
      const guideTop = top - 48;
      const guideNotes = bar.notes.map((note) => ({ ...note, step: 5, writtenAccidental: null }));
      return <g opacity="0.72"><BarNotes bar={{ ...bar, notes: guideNotes }} notes={guideNotes} positions={positions} top={guideTop} colour={COLOUR.guide} activeNoteId={activeNoteId} forceStemUp timeSignature={timeSignature} /></g>;
    }

    function CorrectionLayer({ bar, userNotes, positions, top, timeSignature }) {
      const correctionNotes = bar.notes.map((note, index) => userNotes[index]?.step === note.step ? null : { ...note, id: `correct-${index}` });
      const shiftedPositions = positions.map((x) => x + 20);
      return <BarNotes bar={bar} notes={correctionNotes} positions={shiftedPositions} top={top} colour={COLOUR.green} timeSignature={timeSignature} />;
    }

    function Score({ question, userNotes, setUserNotes, feedback, activeNoteId, hoverNote, setHoverNote }) {
      const [draggingNote, setDraggingNote] = useState(null);
      const targetInputRef = useRef(null);
      const isOneSystem = question.bars.length <= BARS_PER_SYSTEM;
      const systems = isOneSystem ? [STAFF.topA] : [STAFF.topA, STAFF.topB];
      const scoreHeight = isOneSystem ? 154 : SVG.height;
      const scoreOffsetY = isOneSystem ? -30 : 0;

      useEffect(() => {
        const element = targetInputRef.current;
        if (!element) return;
        const blockScroll = (event) => {
          event.preventDefault();
          event.stopPropagation();
        };
        element.addEventListener("touchstart", blockScroll, { passive: false });
        element.addEventListener("touchmove", blockScroll, { passive: false });
        return () => {
          element.removeEventListener("touchstart", blockScroll);
          element.removeEventListener("touchmove", blockScroll);
        };
      }, [question.id, question.targetBar]);

      function pointerToSvg(event) {
        const matrix = event.currentTarget.getScreenCTM?.();
        if (matrix) {
          const point = event.currentTarget.ownerSVGElement.createSVGPoint();
          point.x = event.clientX;
          point.y = event.clientY;
          const local = point.matrixTransform(matrix.inverse());
          return { x: local.x, y: local.y };
        }
        const svg = event.currentTarget.ownerSVGElement ?? event.currentTarget;
        const rect = svg.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * SVG.width,
          y: ((event.clientY - rect.top) / rect.height) * SVG.height,
        };
      }

      function noteFromPointer(event, lockedIndex = null) {
        const targetBar = question.bars[question.targetBar];
        if (!targetBar) return null;
        const pointer = pointerToSvg(event);
        const top = systemTop(targetBar.barIndex);
        const positions = barPositions(targetBar);
        const noteIndex = lockedIndex ?? positions.reduce((best, x, index) => Math.abs(pointer.x - x) < Math.abs(pointer.x - positions[best]) ? index : best, 0);
        const targetNote = targetBar.notes[noteIndex];
        if (!targetNote) return null;
        const touchOffset = event.pointerType === "touch" ? 42 : 0;
        const effectiveY = pointer.y - touchOffset;
        if (lockedIndex === null && (Math.abs(pointer.x - positions[noteIndex]) > 48 || pointer.y < top - 28 || pointer.y > top + 92)) return null;
        const step = clamp(Math.round((top + STAFF.gap * 4 - effectiveY) / (STAFF.gap / 2)), NOTE_POOL[0].step, NOTE_POOL.at(-1).step);
        const base = NOTE_POOL.find((note) => note.step === step) ?? NOTE_POOL[0];
        const writtenAccidental = melodicAccidentalForLetter(question.key, base.letter);
        return { ...base, id: `user-${noteIndex}`, rhythm: targetNote.rhythm, beats: targetNote.beats, barIndex: targetBar.barIndex, noteIndex, writtenAccidental };
      }

      function handleMove(event) {
        if (feedback) return;
        if (draggingNote) {
          event.preventDefault();
          const nextNote = noteFromPointer(event, draggingNote.noteIndex);
          if (nextNote) {
            setDraggingNote(nextNote);
            setHoverNote(nextNote);
          }
          return;
        }
        setHoverNote(noteFromPointer(event));
      }

      function handlePointerDown(event) {
        if (feedback) return;
        const nextNote = noteFromPointer(event);
        if (!nextNote) return;
        event.preventDefault();
        event.currentTarget.setPointerCapture?.(event.pointerId);
        setDraggingNote(nextNote);
        setHoverNote(nextNote);
      }

      function handlePointerUp(event) {
        if (feedback || !draggingNote) return;
        event.preventDefault();
        event.currentTarget.releasePointerCapture?.(event.pointerId);
        setUserNotes((current) => ({ ...current, [draggingNote.noteIndex]: draggingNote }));
        setHoverNote(null);
        setDraggingNote(null);
      }

      return (
        <svg viewBox={`0 0 ${SVG.width} ${scoreHeight}`} className="h-auto w-full select-none overflow-visible">
          <rect width={SVG.width} height={scoreHeight} fill="white" />
          <g transform={scoreOffsetY ? `translate(0 ${scoreOffsetY})` : undefined}>
          {systems.map((top, systemIndex) => <Staff key={systemIndex} top={top} systemIndex={systemIndex} question={question} />)}
          {question.bars.map((bar) => {
            const top = systemTop(bar.barIndex);
            const start = barStart(bar.barIndex);
            const end = start + barWidth(bar.barIndex);
            const positions = barPositions(bar);
            const isTarget = bar.barIndex === question.targetBar;
            const targetUserNotes = bar.notes.map((_, index) => userNotes[index] ?? null);
            return (
              <g key={bar.barIndex}>
                <text x={(bar.barIndex === 0 || bar.barIndex === 4) ? start - 15 : start + 5} y={top - 17} fontSize="12" fontWeight="700">{bar.barIndex + 1}</text>
                {isTarget && <rect ref={targetInputRef} x={start} y={top - 62} width={end - start} height="122" fill="transparent" pointerEvents="all" className="touch-none" style={{ touchAction: "none", WebkitUserSelect: "none", userSelect: "none", overscrollBehavior: "contain" }} onPointerMove={handleMove} onPointerLeave={() => { if (!draggingNote) setHoverNote(null); }} onPointerDown={handlePointerDown} onPointerUp={handlePointerUp} onPointerCancel={() => { setDraggingNote(null); setHoverNote(null); }} />}
                {isTarget && <RhythmGuide bar={bar} positions={positions} top={top} activeNoteId={activeNoteId} timeSignature={question.timeSignature} />}
                {isTarget
                  ? <BarNotes bar={bar} notes={targetUserNotes} positions={positions} top={top} hidden feedback={feedback} timeSignature={question.timeSignature} />
                  : <BarNotes bar={bar} notes={bar.notes} positions={positions} top={top} activeNoteId={activeNoteId} timeSignature={question.timeSignature} />}
                {isTarget && hoverNote && !feedback && (
                  <>
                    {draggingNote && <Note note={{ ...hoverNote, id: `ghost-${hoverNote.id}` }} x={positions[hoverNote.noteIndex]} top={top} colour="#666" faint />}
                    <Note note={hoverNote} x={positions[hoverNote.noteIndex]} top={top} colour="#444" faint={!draggingNote} scale={draggingNote ? 1.6 : 1} />
                  </>
                )}
                {feedback && isTarget && <CorrectionLayer bar={bar} userNotes={userNotes} positions={positions} top={top} timeSignature={question.timeSignature} />}
                {bar.barIndex === question.bars.length - 1 ? (
                  <g>
                    <line x1={end - 5} x2={end - 5} y1={top - 0.5} y2={top + STAFF.gap * 4 + 0.5} stroke="currentColor" strokeWidth="1.4" />
                    <line x1={end} x2={end} y1={top - 0.5} y2={top + STAFF.gap * 4 + 0.5} stroke="currentColor" strokeWidth="4" />
                  </g>
                ) : (
                  <line x1={end} x2={end} y1={top} y2={top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.35" />
                )}
              </g>
            );
          })}
          </g>
        </svg>
      );
    }

    function App() {
      useStyles();
      const initialLevel = useMemo(() => {
        const requested = new URLSearchParams(window.location.search).get("level");
        return LEVELS[requested] ? requested : "N5";
      }, []);
      const [activeLevel, setActiveLevel] = useState(initialLevel);
      const [tempo, setTempo] = useState("medium");
      const [metronomeOn, setMetronomeOn] = useState(false);
      const [followPlayback, setFollowPlayback] = useState(false);
      const [question, setQuestion] = useState(() => makeQuestion(initialLevel));
      const [userNotes, setUserNotes] = useState({});
      const [hoverNote, setHoverNote] = useState(null);
      const [feedback, setFeedback] = useState(null);
      const [feedbackFading, setFeedbackFading] = useState(false);
      const [visible, setVisible] = useState(true);
      const [score, setScore] = useState({ correct: 0, attempted: 0, streak: 0, best: 0 });
      const [confetti, setConfetti] = useState(0);
      const [autoShowMedals, setAutoShowMedals] = useState(false);
      const [menu, setMenu] = useState(null);
      const [prompt, setPrompt] = useState("");
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackElapsed, setPlaybackElapsed] = useState(0);
      const [activeNoteId, setActiveNoteId] = useState(null);
      const audioRef = useRef(null);
      const timersRef = useRef([]);
      const playbackBarRef = useRef(null);
      const scrubWasPlayingRef = useRef(false);
      const nextTimer = useRef(null);
      const fadeTimer = useRef(null);
      const menuRef = useRef(null);
      window.MLH.useClickAway(menuRef, () => setMenu(null));

      const selectedTempo = TEMPOS.find((item) => item.id === tempo) ?? TEMPOS[0];
      const beatSeconds = 60 / selectedTempo.bpm;
      const barSeconds = beatSeconds * question.timeSignature.beats;
      const totalDuration = question.bars.length * barSeconds;
      const accuracy = score.attempted === 0 ? 0 : Math.round((score.correct / score.attempted) * 100);

      function clearTimers() {
        timersRef.current.forEach((timer) => window.clearTimeout(timer));
        timersRef.current = [];
        window.clearTimeout(nextTimer.current);
        window.clearTimeout(fadeTimer.current);
      }

      function clearFeedbackTimers() {
        window.clearTimeout(nextTimer.current);
        window.clearTimeout(fadeTimer.current);
      }

      function stopAudio(resetElapsed = true) {
        clearTimers();
        if (audioRef.current) {
          try { audioRef.current.close(); } catch {}
        }
        audioRef.current = null;
        setIsPlaying(false);
        if (resetElapsed) setPlaybackElapsed(0);
        setActiveNoteId(null);
      }

      function newQuestion(level = activeLevel) {
        stopAudio();
        setVisible(false);
        window.setTimeout(() => {
          setQuestion(makeQuestion(level));
          setUserNotes({});
          setHoverNote(null);
          setFeedback(null);
          setFeedbackFading(false);
          setPrompt("");
          setVisible(true);
        }, 220);
      }

      function advanceAfterFeedback() {
        if (!feedback) return;
        clearFeedbackTimers();
        setFeedbackFading(true);
        nextTimer.current = window.setTimeout(() => newQuestion(), 180);
      }

      function applyLevel(level) {
        setMenu(null);
        if (level === activeLevel) return;
        setActiveLevel(level);
        setScore({ correct: 0, attempted: 0, streak: 0, best: 0 });
        setConfetti(0);
        setAutoShowMedals(false);
        const url = new URL(window.location.href);
        url.searchParams.set("level", level);
        window.history.replaceState(null, "", url.toString());
        newQuestion(level);
      }

      function resetScore() {
        setScore({ correct: 0, attempted: 0, streak: 0, best: 0 });
        setConfetti(0);
        setAutoShowMedals(false);
        newQuestion();
      }

      function undoLastNote() {
        if (feedback) return;
        const indexes = Object.keys(userNotes).map(Number);
        if (!indexes.length) return;
        const last = Math.max(...indexes);
        setUserNotes((current) => {
          const next = { ...current };
          delete next[last];
          return next;
        });
      }

      function confirmAnswer() {
        if (feedback) return;
        const target = question.bars[question.targetBar];
        if (target.notes.some((_, index) => !userNotes[index])) {
          return;
        }
        stopAudio();
        const correct = target.notes.every((note, index) => userNotes[index]?.step === note.step);
        setScore((current) => {
          const streak = correct ? current.streak + 1 : 0;
          if (correct && [2, 4, 6, 10].includes(streak)) {
            const medal = missingNotesStreakMedal(streak);
            setConfetti((value) => value + 1);
            setAutoShowMedals(true);
            window.setTimeout(() => setAutoShowMedals(false), 2000);
            window.setTimeout(() => playSound(true, true, medal?.sound), 180);
          }
          return {
            correct: current.correct + (correct ? 1 : 0),
            attempted: current.attempted + 1,
            streak,
            best: Math.max(current.best, streak),
          };
        });
        playSound(correct);
        setFeedback({ correct });
        setFeedbackFading(false);
        setPrompt("");
        if (correct) {
          fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
          nextTimer.current = window.setTimeout(() => newQuestion(), 2050);
        }
      }

      function oscillator(ctx, gainNode, frequency, start, duration, volume = 0.035, type = "sine", release = 0.08) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(volume, start + 0.03);
        gain.gain.setValueAtTime(volume * 0.92, start + Math.max(0.04, duration));
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + release);
        osc.connect(gain);
        gain.connect(gainNode);
        osc.start(start);
        osc.stop(start + duration + release + 0.02);
      }

      function playMetronome(ctx, gainNode, start, accented) {
        oscillator(ctx, gainNode, accented ? 1100 : 760, start, 0.04, accented ? 0.045 : 0.03, "square");
      }

      function playAccompaniment(ctx, gainNode, question, bar, barStart, offset, startTime) {
        if (barStart + barSeconds <= offset) return;
        const chordLetters = question.key.chords[bar.chordSymbol] ?? [];
        if (!chordLetters.length) return;

        if (bar.barIndex === question.bars.length - 1) {
          const chordStart = Math.max(barStart, offset);
          const chordDuration = Math.max(0.04, barStart + barSeconds * 0.96 - chordStart);
          chordLetters.forEach((letter, index) => {
            const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
            oscillator(ctx, gainNode, midiToFrequency(chordMidi), startTime + chordStart, chordDuration, 0.026, "triangle", 0.08);
            if (index === 0) oscillator(ctx, gainNode, midiToFrequency(chordMidi - 12), startTime + chordStart, chordDuration, 0.02, "sine", 0.08);
          });
          return;
        }

        const bassMidi = pitchForChordLetter(question, bar, chordLetters[0], 2) - 12;
        const bassStart = Math.max(barStart, offset);
        const bassDuration = Math.max(0.04, barStart + beatSeconds * 0.88 - bassStart);
        oscillator(ctx, gainNode, midiToFrequency(bassMidi), startTime + bassStart, bassDuration, 0.024, "sine", 0.06);

        if (question.timeSignature.id === "4/4") {
          const events = [
            { beat: 1, type: "chord" },
            { beat: 2, type: "bass5" },
            { beat: 3, type: "chord" },
          ];
          events.forEach((event) => {
            const pulseStart = barStart + event.beat * beatSeconds;
            const pulseDuration = beatSeconds * 0.42;
            if (pulseStart + pulseDuration <= offset) return;
            const audibleStart = Math.max(pulseStart, offset);
            const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
            if (event.type === "bass5") {
              const fifthMidi = pitchForChordLetter(question, bar, chordLetters[1] ?? chordLetters[0], 2) - 12;
              oscillator(ctx, gainNode, midiToFrequency(fifthMidi), startTime + audibleStart, audibleDuration, 0.024, "sine", 0.06);
              return;
            }
            chordLetters.forEach((letter, index) => {
              const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
              oscillator(ctx, gainNode, midiToFrequency(chordMidi), startTime + audibleStart, audibleDuration, 0.018, "triangle", 0.05);
            });
          });
          return;
        }

        const pulseBeats = question.timeSignature.id === "6/8"
          ? [1.5]
          : Array.from({ length: Math.max(0, question.timeSignature.beats - 1) }, (_, beat) => beat + 1);
        pulseBeats.forEach((beat) => {
          const pulseStart = barStart + beat * beatSeconds;
          const pulseDuration = beatSeconds * (question.timeSignature.id === "6/8" ? 0.72 : 0.42);
          if (pulseStart + pulseDuration <= offset) return;
          const audibleStart = Math.max(pulseStart, offset);
          const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
          chordLetters.forEach((letter, index) => {
            const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
            oscillator(ctx, gainNode, midiToFrequency(chordMidi), startTime + audibleStart, audibleDuration, 0.018, "triangle", 0.05);
          });
        });
      }

      function playMelodyNote(ctx, gainNode, frequency, start, duration) {
        oscillator(ctx, gainNode, frequency, start, duration, 0.078, "triangle", 0.1);
        oscillator(ctx, gainNode, frequency * 2, start, duration * 0.94, 0.012, "sine", 0.08);
      }

      function playQuestionAudio(startAt = 0, restart = false) {
        if (isPlaying && !restart) {
          stopAudio();
          return;
        }
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          setPrompt("Audio playback is not supported in this browser.");
          return;
        }
        const offset = clamp(Number(startAt) || 0, 0, totalDuration);
        stopAudio(false);
        if (offset >= totalDuration) {
          setPlaybackElapsed(totalDuration);
          return;
        }
        const ctx = new AudioContextClass();
        const master = ctx.createGain();
        master.gain.setValueAtTime(1.25, ctx.currentTime);
        master.connect(ctx.destination);
        audioRef.current = ctx;
        const startTime = ctx.currentTime + 0.12 - offset;
        setIsPlaying(true);
        setPrompt("");
        setPlaybackElapsed(offset);

        question.bars.forEach((bar) => {
          const barStart = bar.barIndex * barSeconds;
          if (metronomeOn) {
            for (let beat = 0; beat < question.timeSignature.beats; beat += 1) {
              const beatStart = barStart + beat * beatSeconds;
              if (beatStart >= offset) playMetronome(ctx, master, startTime + beatStart, beat === 0);
            }
          }
          playAccompaniment(ctx, master, question, bar, barStart, offset, startTime);
          bar.notes.forEach((note) => {
            const noteStart = barStart + note.beat * beatSeconds;
            const duration = note.beats * beatSeconds * 0.96;
            if (noteStart + duration <= offset) return;
            const audibleStart = Math.max(noteStart, offset);
            const audibleDuration = Math.max(0.04, noteStart + duration - audibleStart);
            playMelodyNote(ctx, master, midiToFrequency(effectiveMidiForNote(question, bar, note)), startTime + audibleStart, audibleDuration);
            const highlightTimer = window.setTimeout(() => {
              if (followPlayback) setActiveNoteId(note.id);
            }, Math.max(0, (startTime + audibleStart - ctx.currentTime) * 1000));
            const clearTimer = window.setTimeout(() => setActiveNoteId(null), Math.max(0, (startTime + audibleStart - ctx.currentTime + audibleDuration) * 1000));
            timersRef.current.push(highlightTimer, clearTimer);
          });
        });

        const tick = window.setInterval(() => {
          if (!audioRef.current) return;
          const elapsed = Math.min(totalDuration, Math.max(0, ctx.currentTime - startTime));
          setPlaybackElapsed(elapsed);
        }, 100);
        const stopTimer = window.setTimeout(() => {
          window.clearInterval(tick);
          stopAudio();
        }, Math.max(0, (totalDuration - offset) * 1000) + 260);
        timersRef.current.push(tick, stopTimer);
      }

      function secondsFromScrubEvent(event) {
        const rect = playbackBarRef.current?.getBoundingClientRect();
        if (!rect || totalDuration <= 0) return 0;
        return clamp(((event.clientX - rect.left) / rect.width) * totalDuration, 0, totalDuration);
      }

      function beginScrub(event) {
        event.preventDefault();
        event.stopPropagation();
        const seconds = secondsFromScrubEvent(event);
        scrubWasPlayingRef.current = isPlaying;
        if (isPlaying) stopAudio(false);
        setPlaybackElapsed(seconds);
        event.currentTarget.setPointerCapture?.(event.pointerId);
      }

      function moveScrub(event) {
        if (!event.currentTarget.hasPointerCapture?.(event.pointerId)) return;
        event.preventDefault();
        setPlaybackElapsed(secondsFromScrubEvent(event));
      }

      function endScrub(event) {
        if (!event.currentTarget.hasPointerCapture?.(event.pointerId)) return;
        event.preventDefault();
        const seconds = secondsFromScrubEvent(event);
        setPlaybackElapsed(seconds);
        event.currentTarget.releasePointerCapture?.(event.pointerId);
        if (scrubWasPlayingRef.current) playQuestionAudio(seconds, true);
        scrubWasPlayingRef.current = false;
      }

      useEffect(() => () => stopAudio(), []);

      const progress = totalDuration > 0 ? clamp((playbackElapsed / totalDuration) * 100, 0, 100) : 0;
      const targetBar = question.bars[question.targetBar];
      const allRequiredNotesPlaced = Boolean(targetBar?.notes?.length) && targetBar.notes.every((_, index) => Boolean(userNotes[index]));

      return (
        <div className="overflow-x-hidden bg-stone-50 pb-10 text-black md:pb-12">
          <window.MLH.AppHeader icon={ASSET.appIcon} title="Melody Completion" subtitle="Identify and complete melodic patterns.">
            <MissingNotesScoreStreakPanel
              correct={score.correct}
              attempted={score.attempted}
              accuracy={accuracy}
              streak={score.streak}
              bestStreak={score.best}
              resetScore={resetScore}
              confettiKey={confetti}
              autoShowMedals={autoShowMedals}
            />
          </window.MLH.AppHeader>

          <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
            <main
              className="relative flex min-h-[560px] flex-col overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-3 pt-[10px] shadow-sm sm:px-4 md:px-6 md:pb-6 md:pt-[14px]"
              onPointerDown={(event) => {
                if (!feedback) return;
                if (event.target.closest("button,[data-menu-trigger],[data-menu-panel]")) return;
                advanceAfterFeedback();
              }}
            >
              <div className="relative z-[90] mb-2.5 grid w-full grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2">
                <div className="relative flex items-center gap-2" ref={menuRef}>
                  <div className="hub-menu-anchor relative">
                    <window.MLH.LevelButton
                      icon={<img src={ASSET.level} alt="" aria-hidden="true" className="h-[26px] w-[28px] object-contain" />}
                      activeLevel={activeLevel}
                      activeLabel={LEVELS[activeLevel].label}
                      onClick={() => setMenu(menu === "level" ? null : "level")}
                      dataMenuTrigger
                    />
                    {menu === "level" && (
                      <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel>
                        <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                      </window.MLH.MenuPanel>
                    )}
                  </div>
                  <div className="hub-menu-anchor relative">
                    <window.MLH.CustomiseButton
                      icon={<img src={ASSET.customise} alt="" className="h-[21px] w-[21px]" />}
                      onClick={() => setMenu(menu === "customise" ? null : "customise")}
                      dataMenuTrigger
                    />
                  {menu === "customise" && (
                    <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel>
                      <CustomiseMenu
                        tempo={tempo}
                        setTempo={setTempo}
                        metronomeOn={metronomeOn}
                        setMetronomeOn={setMetronomeOn}
                        followPlayback={followPlayback}
                        setFollowPlayback={setFollowPlayback}
                        stopAudio={stopAudio}
                      />
                    </window.MLH.MenuPanel>
                  )}
                  </div>
                </div>
                <div className="flex h-10 min-w-[112px] items-center justify-center sm:min-w-[140px]">
                  <Feedback feedback={feedback} fading={feedbackFading} />
                </div>
                <div className="flex justify-end">
                  <window.MLH.SkipButton onClick={() => newQuestion()} icon={<img src={ASSET.next} alt="" className="h-[27.8px] w-[27.8px] object-contain" />} />
                </div>
              </div>

              <div className={`mx-auto flex w-full flex-1 items-center justify-center transition-opacity duration-300 ${visible ? "opacity-100" : "opacity-0"}`}>
                <Score question={question} userNotes={userNotes} setUserNotes={setUserNotes} feedback={feedback} activeNoteId={activeNoteId} hoverNote={hoverNote} setHoverNote={setHoverNote} />
              </div>

              <section className="relative z-10 mt-auto rounded-xl border border-stone-200 bg-stone-50 p-4 shadow-md md:mx-3 md:-mt-[42px]">
                <p className="text-base font-semibold leading-tight">
                  Listen to the music and insert the missing notes in <strong>bar {question.targetBar + 1}</strong>. The rhythm is given above the stave.
                </p>
                {prompt && <p className="mt-2 text-sm font-medium text-red-700">{prompt}</p>}
                <div className="mt-5 flex flex-col gap-3 lg:flex-row lg:items-center lg:justify-between">
                  <div className="flex min-w-0 flex-1 items-center gap-2">
                    <button type="button" onClick={playQuestionAudio} className="hidden h-11 w-[112px] shrink-0 items-center justify-center gap-2 rounded-xl bg-stone-950 px-[18px] py-[10px] text-sm font-bold text-white lg:flex">
                      <span className="text-lg leading-none">{isPlaying ? "■" : "▶"}</span>
                      <span>{isPlaying ? "Stop" : "Play"}</span>
                    </button>
                    <div className="flex h-11 min-w-0 flex-1 items-center gap-2 rounded-xl border border-stone-200 bg-white px-3">
                      <div
                        ref={playbackBarRef}
                        role="slider"
                        tabIndex="0"
                        aria-label="Playback position"
                        aria-valuemin="0"
                        aria-valuemax={Math.round(totalDuration)}
                        aria-valuenow={Math.round(playbackElapsed)}
                        className="relative h-[18px] flex-1 cursor-pointer touch-none rounded-full"
                        onPointerDown={beginScrub}
                        onPointerMove={moveScrub}
                        onPointerUp={endScrub}
                        onPointerCancel={endScrub}
                        onKeyDown={(event) => {
                          if (event.key !== "ArrowLeft" && event.key !== "ArrowRight") return;
                          event.preventDefault();
                          const change = event.key === "ArrowRight" ? 1 : -1;
                          const nextPosition = clamp(playbackElapsed + change, 0, totalDuration);
                          if (isPlaying) {
                            playQuestionAudio(nextPosition, true);
                          } else {
                            setPlaybackElapsed(nextPosition);
                          }
                        }}
                      >
                        <div className="absolute left-0 right-0 top-1/2 h-[8.8px] -translate-y-1/2 rounded-full bg-stone-200" />
                        <div className="absolute top-1/2 h-2 -translate-y-1/2 rounded-full bg-stone-900" style={{ left: "2px", width: `max(0px, calc(${progress}% - 2px))` }} />
                        <div className="absolute top-1/2 h-[18px] w-[18px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-stone-950 shadow-sm transition-transform active:scale-110" style={{ left: `calc(${progress}% + 2px)` }} />
                      </div>
                      <div className="w-[72px] text-right text-xs font-semibold tabular-nums text-stone-600">{formatTime(playbackElapsed)} / {formatTime(totalDuration)}</div>
                    </div>
                  </div>
                  <div className="grid grid-cols-3 gap-2 lg:flex lg:shrink-0 lg:justify-end">
                    <button type="button" onClick={playQuestionAudio} className="flex h-11 min-w-0 items-center justify-center gap-2 rounded-xl bg-stone-950 px-3 py-[10px] text-sm font-bold text-white lg:hidden">
                      <span className="text-lg leading-none">{isPlaying ? "■" : "▶"}</span>
                      <span>{isPlaying ? "Stop" : "Play"}</span>
                    </button>
                    <button type="button" disabled={Boolean(feedback) || !Object.keys(userNotes).length} onClick={undoLastNote} className="flex h-11 min-w-0 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-3 text-sm font-bold text-stone-800 lg:min-w-[92px]">
                      <span className="-translate-y-[1px] text-xl leading-none">↺</span>
                      <span>Undo</span>
                    </button>
                    <button type="button" disabled={Boolean(feedback) || !allRequiredNotesPlaced} onClick={confirmAnswer} className="h-11 min-w-0 rounded-xl bg-stone-950 px-3 py-[10px] text-sm font-bold text-white disabled:bg-stone-400 disabled:text-white disabled:opacity-70 lg:px-[22px]">
                      Confirm
                    </button>
                  </div>
                </div>
              </section>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script src="./footer.js?v=1.3"></script>
</body>
</html>
