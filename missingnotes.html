function App(){let timerRef=useRef(null),customiseRef=useRef(null),audioRef=useRef(null),stopRef=useRef(null),hiRef=useRef([]);let[tempo,setTempo]=useState('slow'),[met,setMet]=useState(false),[four,setFour]=useState(false),[question,setQuestion]=useState(()=>makeQuestion('mixed',false)),[userNotes,setUserNotes]=useState({}),[hoverNote,setHoverNote]=useState(null),[feedback,setFeedback]=useState(null),[custom,setCustom]=useState(false),[help,setHelp]=useState(false),[playing,setPlaying]=useState(false),[listen,setListen]=useState(0),[focus,setFocus]=useState(false),[active,setActive]=useState(null),[prompt,setPrompt]=useState(''),[correct,setCorrect]=useState(0),[attempted,setAttempted]=useState(0),[streak,setStreak]=useState(0),[best,setBest]=useState(0);let acc=attempted===0?0:Math.round(correct/attempted*100);useEffect(()=>{let close=e=>{if(!custom)return;if(customiseRef.current?.contains(e.target))return;setCustom(false)};document.addEventListener('pointerdown',close);return()=>document.removeEventListener('pointerdown',close)},[custom]);useEffect(()=>()=>stopAudio(),[]);function stopAudio(){if(stopRef.current)clearTimeout(stopRef.current);hiRef.current.forEach(t=>clearTimeout(t));hiRef.current=[];if(audioRef.current){try{if(audioRef.current.state!=='closed')audioRef.current.close()}catch{}}audioRef.current=null;setPlaying(false);setFocus(false);setActive(null)}function newQuestion(nextFour=four){if(timerRef.current)clearTimeout(timerRef.current);stopAudio();setQuestion(makeQuestion('mixed',nextFour));setUserNotes({});setHoverNote(null);setFeedback(null);setPrompt('');setListen(0)}function resetScore(){setCorrect(0);setAttempted(0);setStreak(0);setBest(0);newQuestion(four)}function confirm(){if(feedback)return;let target=question.bars[question.targetBar],missing=target.notes.some((_,i)=>!userNotes[i]);if(missing){setPrompt('Complete the full bar before pressing Confirm.');return}stopAudio();let ok=target.notes.every((n,i)=>userNotes[i]?.step===n.step),ns=ok?streak+1:0;setAttempted(v=>v+1);setCorrect(v=>v+(ok?1:0));setStreak(ns);setBest(v=>Math.max(v,ns));setFeedback({correct:ok});timerRef.current=setTimeout(()=>newQuestion(four),ok?2500:5000)}function osc(ctx,{frequency,start,duration,volume=.16,type='triangle'}){if(!Number.isFinite(frequency)||duration<=0)return;let o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.frequency.setValueAtTime(frequency,start);g.gain.setValueAtTime(.0001,start);g.gain.exponentialRampToValueAtTime(volume,start+.035);g.gain.exponentialRampToValueAtTime(Math.max(.0002,volume*.55),start+Math.max(.05,duration*.86));g.gain.exponentialRampToValueAtTime(.0001,start+duration+.04);o.connect(g);g.connect(ctx.destination);o.start(start);o.stop(start+duration+.08)}function drum(ctx,start,accent=false){let n=Math.floor(ctx.sampleRate*.03),buf=ctx.createBuffer(1,n,ctx.sampleRate),d=buf.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*.32*(1-i/n);let src=ctx.createBufferSource();src.buffer=buf;let f=ctx.createBiquadFilter();f.type='highpass';f.frequency.value=accent?1800:1200;let g=ctx.createGain();g.gain.setValueAtTime(.0001,start);g.gain.exponentialRampToValueAtTime(accent?.065:.045,start+.002);g.gain.exponentialRampToValueAtTime(.0001,start+.03);src.connect(f);f.connect(g);g.connect(ctx.destination);src.start(start);src.stop(start+.03)}function play(){if(playing){stopAudio();return}let C=window.AudioContext||window.webkitAudioContext;if(!C){setPrompt('Audio playback is not supported in this browser.');return}stopAudio();let ctx=new C();audioRef.current=ctx;setPlaying(true);setPrompt('');let bpm=(TEMPOS.find(t=>t.id===tempo)||TEMPOS[0]).bpm,beat=60/bpm,barSec=beat*question.timeSignature.beats,now=ctx.currentTime+.08,isFocus=listen>0;setFocus(isFocus);let bars=isFocus?question.bars.filter(b=>Math.abs(b.barIndex-question.targetBar)<=1):question.bars;bars.forEach(bar=>{let start=now;if(met)for(let b=0;b<question.timeSignature.beats;b++)drum(ctx,start+b*beat,b===0);bar.notes.forEach((note,i)=>{let ns=start+bar.notes.slice(0,i).reduce((s,it)=>s+it.beats*beat,0),dur=note.beats*beat*.98,ms=Math.max(0,(ns-ctx.currentTime)*1000);hiRef.current.push(setTimeout(()=>setActive(note.id),ms));hiRef.current.push(setTimeout(()=>setActive(null),ms+dur*1000));let p=effPitch(question,bar,i);osc(ctx,{frequency:midiFreq(p+12),start:ns,duration:dur*.82,volume:.0212,type:'sine'});osc(ctx,{frequency:midiFreq(p+24),start:ns,duration:dur*.5,volume:.008,type:'sine'});});bar.chord.notes.forEach((l,i)=>{let f=midiFreq(pitchChord(question.key,bar.chord,l,3+i));if(bar.barIndex===question.bars.length-1)osc(ctx,{frequency:f,start,duration:barSec*.95,volume:.0294,type:'triangle'});else for(let b=0;b<question.timeSignature.beats;b++)osc(ctx,{frequency:f,start:start+b*beat,duration:beat*.9,volume:b===0?.0273:.0218,type:'triangle'});osc(ctx,{frequency:f*.5,start,duration:barSec*.95,volume:.018,type:'sine'});});now+=barSec});stopRef.current=setTimeout(()=>{setPlaying(false);setFocus(false);setActive(null);audioRef.current=null},Math.max(0,(now-ctx.currentTime)*1000)+150);setListen(c=>c+1)}return <div className="min-h-screen bg-stone-50 p-4 text-stone-950 md:p-8"><div className="mx-auto max-w-6xl"><header className="mb-5 rounded-2xl border border-stone-200 bg-white p-5 shadow-sm"><div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between"><div><h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Insert the Missing Notes</h1><p className="mt-2 max-w-2xl text-stone-700">Completing melodies using repetition, sequence, stepwise movement and small leaps.</p></div><div className="grid min-w-[280px] grid-cols-3 gap-2"><StatCard label="Score" value={`${correct}/${attempted}`}/><StatCard label="Accuracy" value={`${acc}%`}/><StatCard label="Streak" value={streak} footer={`Best streak: ${best}`}/></div></div></header><main className="overflow-visible rounded-2xl border border-stone-200 bg-white p-4 shadow-sm md:p-6"><div className="mb-4 flex items-start justify-between gap-3"><div className="relative" ref={customiseRef}><button type="button" onClick={()=>setCustom(v=>!v)} className="rounded-xl border border-stone-300 bg-white px-4 py-2 text-sm font-semibold text-stone-800 hover:bg-stone-100">⚙️ Customise</button>{custom&&<section className="absolute left-0 z-20 mt-2 w-[460px] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><h2 className="mb-3 text-base font-semibold">Customise</h2><h3 className="mb-2 text-sm font-bold text-stone-700">Tempo</h3><div className="mb-4 grid grid-cols-3 gap-2">{TEMPOS.map(s=><button key={s.id} onClick={()=>{setTempo(s.id);stopAudio()}} className={`rounded-xl border px-3 py-3 text-sm font-bold ${tempo===s.id?'border-stone-950 bg-stone-950 text-white':'border-stone-300 bg-white hover:bg-stone-100'}`}>{s.label}</button>)}</div><button onClick={()=>{setMet(v=>!v);stopAudio()}} className="mb-2 flex w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-3 py-1.5 hover:bg-stone-100"><span className="text-sm font-semibold">Metronome</span><span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${met?'bg-green-600':'bg-stone-300'}`}><span className={`h-4 w-4 rounded-full bg-white transition ${met?'translate-x-5':'translate-x-0'}`}/></span></button><button onClick={()=>{let n=!four;setFour(n);setTimeout(()=>newQuestion(n),0)}} className="flex w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-3 py-1.5 hover:bg-stone-100"><span className="text-sm font-semibold">Four Bar Mode</span><span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${four?'bg-green-600':'bg-stone-300'}`}><span className={`h-4 w-4 rounded-full bg-white transition ${four?'translate-x-5':'translate-x-0'}`}/></span></button></section>}</div><div className="flex justify-end gap-2"><button onClick={()=>setHelp(v=>!v)} className="flex h-9 w-9 items-center justify-center rounded-full border border-stone-300 bg-white text-lg font-bold text-stone-700 hover:bg-stone-100">?</button><button onClick={resetScore} className="rounded-xl bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700">Reset score</button></div></div>{help&&<HelpPanel/>}<div className="relative overflow-visible rounded-xl border border-stone-200 bg-white"><Score question={question} userNotes={userNotes} setUserNotes={setUserNotes} feedback={feedback} activeNoteId={focus?active:undefined} hoverNote={hoverNote} setHoverNote={setHoverNote}/></div><section className="mt-4 rounded-xl border border-stone-200 bg-stone-50 p-4"><div className="mb-3 relative pr-14"><div className="space-y-3 text-stone-900"><p className="text-base font-semibold leading-tight">Listen to the music and insert the missing notes in <strong>bar {question.targetBar+1}</strong>. The rhythm is given.</p><p className="text-sm text-stone-700">Hover over the stave to preview a note. Click once to place it. Complete the full bar before confirming.</p>{prompt&&<p className="text-sm font-medium text-red-700">{prompt}</p>}</div><button onClick={play} className="absolute right-2 top-2 flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-stone-950 text-white hover:bg-stone-800"><span className="text-lg leading-none">{playing?'■':'▶'}</span></button></div></section><div className="mt-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between"><Feedback feedback={feedback}/><div className="flex w-full justify-end gap-2"><button disabled={!!feedback} onClick={()=>{if(!feedback){setUserNotes({});setPrompt('')}}} className="rounded-xl bg-red-600 px-4 py-2 text-sm font-medium text-white hover:bg-red-700 disabled:opacity-60">Clear</button><button disabled={!!feedback} onClick={confirm} className="rounded-xl bg-green-600 px-5 py-2 text-sm font-bold text-white hover:bg-green-700 disabled:opacity-60">Confirm</button></div></div></main></div></div>}
