<body>

    (() => {
      const root = document.getElementById("root");
      let ready = false;
      window.addEventListener("millionaire-ready", () => { ready = true; });
      window.setTimeout(() => {
        if (ready || root.childElementCount) return;
        root.innerHTML = '<section class="millionaire-load-error" role="alert"><img src="./millionaire-icon.svg" alt=""><h1>The game could not load</h1><p>Reload the page to try again.</p><button type="button" onclick="window.location.reload()">Reload</button></section>';
      }, 8000);
    })();
  </script>
