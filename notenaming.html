    const NOTE_DATA = [
      { pitch: "A3", answer: "A", clef: "treble", step: -4 },
      { pitch: "B3", answer: "B", clef: "treble", step: -3 },
      { pitch: "C4", answer: "C", clef: "treble", step: -2 },

      { pitch: "E4", answer: "E", clef: "treble", step: 0 },
      { pitch: "F4", answer: "F", clef: "treble", step: 1 },
      { pitch: "G4", answer: "G", clef: "treble", step: 2 },
      { pitch: "A4", answer: "A", clef: "treble", step: 3 },
      { pitch: "B4", answer: "B", clef: "treble", step: 4 },
      { pitch: "C5", answer: "C", clef: "treble", step: 5 },

      { pitch: "C2", answer: "C", clef: "bass", step: -4 },
      { pitch: "D2", answer: "D", clef: "bass", step: -3 },
      { pitch: "E2", answer: "E", clef: "bass", step: -2 },
      { pitch: "F2", answer: "F", clef: "bass", step: -1 },
      { pitch: "G2", answer: "G", clef: "bass", step: 0 },
      { pitch: "A2", answer: "A", clef: "bass", step: 1 },
      { pitch: "B2", answer: "B", clef: "bass", step: 2 },
      { pitch: "C3", answer: "C", clef: "bass", step: 3 },

    const BLOCKED_WITHOUT_LEDGER = new Set(["C2", "D2", "E2", "F2", "B3", "C4", "D4", "G5", "A5", "B5", "C6"]);
    const ADVANCED_ONLY = new Set(["A3-treble", "B3-treble", "B5-treble", "C6-treble", "C2-bass", "D2-bass", "D4-bass", "E4-bass"]);

    const NOTE_LABELS = {
      treble: {
        top: STAFF.trebleTop,
        lines: [[0, "E"], [2, "G"], [4, "B"], [6, "D"], [8, "F"]],
        spaces: [[1, "F"], [3, "A"], [5, "C"], [7, "E"]],
      },
      bass: {
        top: STAFF.bassTop,
        lines: [[0, "G"], [2, "B"], [4, "D"], [6, "F"], [8, "A"]],
        spaces: [[1, "A"], [3, "C"], [5, "E"], [7, "G"]],
      },
    };

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const randomItem = (items) => items[Math.floor(Math.random() * items.length)];
    const yForStep = (top, step) => top + STAFF.gap * 4 - step * (STAFF.gap / 2);
    const stemDown = (step) => step > 4;

    function readSiteTheme() {
      return localStorage.getItem(SITE_THEME_KEY) || "light";
    }

    function readSiteAccessibility() {
      try {
        const value = JSON.parse(localStorage.getItem(SITE_ACCESSIBILITY_KEY) || "{}");
        return value && typeof value === "object" ? value : {};
      } catch {
        return {};
      }
    }

    function settingsMatchLevel(settings, levelKey) {
      return Object.entries(LEVELS[levelKey].settings).every(([key, value]) => Boolean(settings[key]) === Boolean(value));
    }

    function levelForSettings(settings) {
      return Object.keys(LEVELS).find((key) => settingsMatchLevel(settings, key)) || "Custom";
    }

    function possibleQuestions(settings) {
      return NOTE_DATA.filter((note) => {
        if (note.clef === "treble" && !settings.treble) return false;
        if (note.clef === "bass" && !settings.bass) return false;
        if (!settings.ledger && BLOCKED_WITHOUT_LEDGER.has(note.pitch)) return false;
        if (!settings.advancedRange && ADVANCED_ONLY.has(`${note.pitch}-${note.clef}`)) return false;
        return true;
      });
    }

    function accidentalChoice(letter, enabled) {
      if (!enabled) return { answer: letter, accidental: null };
      const choices = [{ answer: letter, accidental: null }];
      if (SHARPS[letter]) choices.push({ answer: SHARPS[letter], accidental: "sharp" });
      if (FLATS[letter]) choices.push({ answer: FLATS[letter], accidental: "flat" });
      return randomItem(choices);
    }

    function buildQuestion(settings, previousId = null) {
      const pool = possibleQuestions(settings);
      if (!pool.length) return null;

      let base = randomItem(pool);
      let attempts = 0;
      while (pool.length > 1 && previousId === `${base.pitch}-${base.clef}` && attempts < 25) {
        base = randomItem(pool);
        attempts += 1;
      }

      const accidental = accidentalChoice(base.answer, settings.accidentals);
      return {
        id: Math.random().toString(36).slice(2),
        baseId: `${base.pitch}-${base.clef}`,
        pitch: base.pitch,
        clef: base.clef,
        step: base.step,
        answer: accidental.answer,
        accidental: accidental.accidental,
      };
    }

    function playFeedbackSound(correct, celebration = false, medal = null) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      const context = new AudioContextClass();
      const master = context.createGain();
      const now = context.currentTime + 0.01;
      master.gain.value = 0.18;
      master.connect(context.destination);
      context.resume?.();

      function tone(freq, start, duration, type = "triangle", volume = 0.12) {
        const osc = context.createOscillator();
        const gain = context.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
        osc.connect(gain);
        gain.connect(master);
        osc.start(start);
        osc.stop(start + duration + 0.05);
      }

      function trumpet(freq, start, duration, volume = 0.1) {
        tone(freq, start, duration, "sawtooth", volume);
        tone(freq * 1.002, start, duration * 0.96, "square", volume * 0.32);
        tone(freq * 2, start, duration * 0.75, "triangle", volume * 0.16);
      }

      function medalPhrase(root, chord, start, beats = 4) {
        const beat = 0.6;
        const triplet = 0.13;
        const finalDuration = beats === 2 ? 0.72 : 1.95;
        chord.forEach((freq) => trumpet(freq, start, beats * beat, 0.045));
        trumpet(root, start, triplet, 0.11);
        trumpet(root, start + triplet, triplet, 0.11);
        trumpet(root, start + triplet * 2, triplet, 0.11);
        trumpet(root, start + 0.42, finalDuration, 0.13);
      }

      if (!correct) {
        tone(180, now, 0.55, "sawtooth", 0.075);
      } else if (celebration) {
        if (medal === "bronze") medalPhrase(659.25, [329.63, 415.3, 493.88], now);
        if (medal === "silver") medalPhrase(739.99, [369.99, 466.16, 554.37], now);
        if (medal === "gold") medalPhrase(830.61, [415.3, 523.25, 622.25], now);
        if (medal === "platinum") {
          medalPhrase(739.99, [369.99, 466.16, 554.37], now, 2);
          medalPhrase(830.61, [415.3, 523.25, 622.25], now + 0.82, 2);
          medalPhrase(932.33, [466.16, 587.33, 698.46], now + 1.64, 4);
        }
      } else {
        tone(740, now, 0.16, "triangle", 0.08);
        tone(988, now + 0.12, 0.34, "triangle", 0.1);
      }

      window.setTimeout(() => {
        try { context.close(); } catch {}
      }, medal === "platinum" ? 9000 : celebration ? 3500 : 900);
    }

    function getStreakMedal(streak) {
      if (streak >= 30) return { tier: "diamond", icon: ASSET.diamond, bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
      if (streak >= 20) return { tier: "gold", icon: ASSET.gold, bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
      if (streak >= 15) return { tier: "silver", icon: ASSET.silver, bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
      if (streak >= 10) return { tier: "bronze", icon: ASSET.bronze, bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
      return null;
    }

    function useSitePreferences() {
      const [darkMode, setDarkMode] = useState(readSiteTheme() === "dark");
      const [accessibility, setAccessibility] = useState(readSiteAccessibility);

      useEffect(() => {
        const sync = () => {
          setDarkMode(readSiteTheme() === "dark");
          setAccessibility(readSiteAccessibility());
        };
        sync();
        window.addEventListener("storage", sync);
        window.addEventListener("mlh-theme-change", sync);
        window.addEventListener("mlh-accessibility-change", sync);
        return () => {
          window.removeEventListener("storage", sync);
          window.removeEventListener("mlh-theme-change", sync);
          window.removeEventListener("mlh-accessibility-change", sync);
        };
      }, []);

      return { darkMode, accessibility };
    }

    function useClickAway(ref, handler) {
      useEffect(() => {
        const onPointerDown = (event) => {
          if (!ref.current?.contains(event.target)) handler?.();
        };
        document.addEventListener("pointerdown", onPointerDown, true);
        return () => document.removeEventListener("pointerdown", onPointerDown, true);
      }, [ref, handler]);
    }

    function ScoreStreakPanel({ correct, attempted, accuracy, streak, bestStreak, medal, confettiKey, resetScore, autoShowMedals }) {
      const [popover, setPopover] = useState(null);
      const ref = useRef(null);
      useClickAway(ref, () => setPopover(null));

      const scoreFill = clamp(accuracy, 0, 100);
      const scoreColour = scoreFill < 50 ? "rgba(220,38,38,.38)" : scoreFill < 70 ? "rgba(255,120,0,.42)" : "rgba(22,163,74,.38)";
      const thresholds = [
        { tier: "bronze", value: 10, icon: ASSET.bronze, className: "text-amber-700", active: streak >= 10 && streak < 15 },
        { tier: "silver", value: 15, icon: ASSET.silver, className: "text-slate-500", active: streak >= 15 && streak < 20 },
        { tier: "gold", value: 20, icon: ASSET.gold, className: "text-yellow-500", active: streak >= 20 && streak < 30 },
        { tier: "diamond", value: 30, icon: ASSET.diamond, className: "text-cyan-500", active: streak >= 30 },
      ];

      return (
        <div ref={ref} className="grid w-full grid-cols-2 gap-2 md:w-auto md:grid-cols-[112px_98px] lg:grid-cols-[124px_108px]">
          <section
            role="button"
            tabIndex="0"
            onPointerDown={(event) => event.stopPropagation()}
            onClick={() => setPopover((value) => value === "score" ? null : "score")}
            className={`relative h-[58px] rounded-xl border border-stone-200 bg-stone-50 shadow-sm outline-none transition hover:-translate-y-0.5 hover:scale-[1.01] hover:brightness-105 hover:shadow-lg active:scale-[0.98] sm:h-[64px] ${popover === "score" ? "-translate-y-0.5 scale-[1.01] brightness-105 shadow-lg" : ""}`}
          >
            <div className="absolute inset-0 overflow-hidden rounded-xl">
              <div className="absolute bottom-0 -left-[2px] right-0 rounded-b-xl transition-all duration-700" style={{ height: `${scoreFill}%`, background: scoreColour }} />
            </div>
            <div className="relative z-10 flex h-full flex-col items-center justify-center pt-[1px] text-center">
              <div className="text-[12px] font-bold uppercase leading-none tracking-[0.08em] text-black sm:text-[11px]">Score</div>
              <div className="mt-[3px] text-[20px] font-black leading-none tracking-tight text-black sm:text-[22px]">{correct}/{attempted}</div>
              <div className="mt-[3px] text-[11px] font-medium leading-none text-stone-500 sm:text-[12px]">Accuracy: {accuracy}%</div>
            </div>
            {popover === "score" && (
              <button
                type="button"
                onClick={(event) => { event.stopPropagation(); resetScore(); setPopover(null); }}
                className="fixed-popover-button absolute left-1/2 top-full z-50 mt-2 flex min-w-[112px] items-center justify-center rounded-xl border border-red-600 bg-red-600 px-3 py-2 text-sm font-semibold text-white shadow-lg"
                style={{ animation: "medalPopupIn.28s cubic-bezier(.22,1.25,.32,1)" }}
              >
                Reset
              </button>
            )}
          </section>

          <section
            role="button"
            tabIndex="0"
            onPointerDown={(event) => event.stopPropagation()}
            onClick={() => setPopover((value) => value === "streak" ? null : "streak")}
            className={`relative h-[58px] overflow-visible rounded-xl border border-stone-200 shadow-sm outline-none transition hover:-translate-y-0.5 hover:scale-[1.01] hover:brightness-105 hover:shadow-lg active:scale-[0.98] sm:h-[64px] ${medal?.bg || "bg-stone-50"} ${popover === "streak" ? "-translate-y-0.5 scale-[1.01] brightness-105 shadow-lg" : ""}`}
          >
            {confettiKey > 0 && (
              <div key={confettiKey} className="pointer-events-none absolute inset-0 z-20 overflow-visible">
                {Array.from({ length: 18 }).map((_, index) => (
                  <span
                    key={index}
                    className="absolute block h-1.5 w-1 rounded-sm"
                    style={{
                      left: `${8 + ((index * 19) % 84)}%`,
                      top: "-8px",
                      backgroundColor: ["#facc15", "#38bdf8", "#fb7185", "#4ade80", "#a78bfa"][index % 5],
                      animation: `confettiDrop ${0.85 + (index % 5) * 0.12}s ease-out forwards`,
                      animationDelay: `${(index % 6) * 0.035}s`,
                    }}
                  />
                ))}
              </div>
            )}

            <div className="relative z-10 flex h-full flex-col items-center justify-center pt-[1px] text-center">
              <div className="text-[10px] font-bold uppercase leading-none tracking-[0.08em] text-black sm:text-[11px]">Streak</div>
              <div className={`mt-[3px] text-[20px] font-black leading-none tracking-tight sm:text-[22px] ${medal?.text || "text-black"}`}>{streak}</div>
              <div className="mt-[3px] text-[11px] font-medium leading-none text-stone-500 sm:text-[12px]">Highest: {bestStreak}</div>
            </div>

            {(popover === "streak" || autoShowMedals) && (
              <div
                className="absolute left-1/2 top-full z-50 mt-2 -translate-x-1/2 rounded-xl border border-stone-200 bg-white px-2.5 py-3 text-[12px] leading-none text-stone-700 shadow-lg sm:text-[13px]"
                style={{ animation: autoShowMedals ? "medalPopupIn.28s cubic-bezier(.22,1.25,.32,1), medalPopupOut.24s ease-in 1.76s forwards" : "medalPopupIn.28s cubic-bezier(.22,1.25,.32,1)" }}
              >
                <div className="flex items-end justify-center gap-3">
                  {thresholds.map((item) => (
                    <div key={item.tier} className={`flex flex-col items-center justify-end ${item.active ? "medal-threshold-active" : ""}`}>
                      <img src={item.icon} alt="" aria-hidden="true" className="h-[22.8px] w-[22.8px] object-contain" />
                      <span className={`mt-1 text-[11px] font-semibold leading-none ${item.className}`}>{item.value}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </section>
        </div>
      );
    }

    function Staff({ clef, top, visible }) {
      if (!visible) return null;
      const isTreble = clef === "treble";
      return (
        <g>
          {[0, 1, 2, 3, 4].map((line) => (
            <line key={line} x1={STAFF.left} x2={STAFF.right} y1={top + line * STAFF.gap} y2={top + line * STAFF.gap} stroke="url(#staffLineFade)" strokeWidth="1.5" />
          ))}
          <image
            href={isTreble ? ASSET.trebleClef : ASSET.bassClef}
            x={STAFF.left + 12}
            y={top + (isTreble ? -37 : -2)}
            width={isTreble ? 86 : 65.5}
            height={isTreble ? 155 : 70}
            preserveAspectRatio="xMidYMid meet"
            pointerEvents="none"
          />
        </g>
      );
    }

    function LedgerLines({ note, colour, enabled }) {
      if (!note || !enabled) return null;
      const top = note.clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
      const lines = [];
      if (note.step <= -2) lines.push(-2);
      if (note.step <= -4) lines.push(-4);
      if (note.step >= 10) lines.push(10);
      if (note.step >= 12) lines.push(12);

      return (
        <g pointerEvents="none">
          {lines.map((step) => {
            const y = yForStep(top, step);
            return <line key={step} x1={NOTE.x - 24} x2={NOTE.x + 24} y1={y} y2={y} stroke={colour} strokeWidth="1.5" />;
          })}
        </g>
      );
    }

    function Accidental({ note, colour }) {
      if (!note?.accidental) return null;
      const top = note.clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
      const y = yForStep(top, note.step);
      const isSharp = note.accidental === "sharp";
      const ledgerOffset = y < 95 || y > 285 ? -6 : 0;
      const isLedgerLineNote = note.step <= -2 || note.step >= 10;
      const flatLedgerLineOffset = !isSharp && isLedgerLineNote ? -3 : 0;
      const sharpLedgerLineOffset = isSharp && isLedgerLineNote ? -3 : 0;
      const filter = colour === COLOUR.green ? SVG_FILTER.green : colour === COLOUR.red ? SVG_FILTER.red : SVG_FILTER.black;

      return (
        <image
          href={isSharp ? ASSET.sharp : ASSET.flat}
          x={isSharp ? NOTE.x - 41 + ledgerOffset + sharpLedgerLineOffset : NOTE.x - 38 + ledgerOffset + flatLedgerLineOffset}
          y={isSharp ? y - 27 : y - 35}
          width="28"
          height={isSharp ? 54 : 49}
          preserveAspectRatio="xMidYMid meet"
          pointerEvents="none"
          filter={filter || undefined}
        />
      );
    }

    function Crotchet({ note, colour, ledgerEnabled }) {
      if (!note) return null;
      const top = note.clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
      const y = yForStep(top, note.step);
      const down = stemDown(note.step);
      const filter = colour === COLOUR.green ? SVG_FILTER.green : colour === COLOUR.red ? SVG_FILTER.red : SVG_FILTER.black;

      return (
        <g pointerEvents="none">
          <LedgerLines note={note} colour={colour} enabled={ledgerEnabled} />
          <Accidental note={note} colour={colour} />
          <image
            href={ASSET.crotchet}
            x={NOTE.x - 19}
            y={y - 62}
            width="38.5"
            height="72"
            preserveAspectRatio="xMidYMid meet"
            filter={filter || undefined}
            style={{
              transformBox: "fill-box",
              transformOrigin: "center",
              transform: down ? "translateY(52px) rotate(180deg)" : "none",
            }}
          />
        </g>
      );
    }

    function HelpLabels({ visible, settings }) {
      if (!visible) return null;
      const items = [];
      if (settings.treble) items.push(["treble", NOTE_LABELS.treble]);
      if (settings.bass) items.push(["bass", NOTE_LABELS.bass]);

      return (
        <g fontSize="14" fontFamily="system-ui, sans-serif" fontWeight="700" dominantBaseline="middle" pointerEvents="none" fill="black" textAnchor="middle">
          {items.flatMap(([clef, data]) => [...data.lines.map(([step, letter]) => <text key={`${clef}-line-${step}`} x={STAFF.left - 11} y={yForStep(data.top, step) + 5}>{letter}</text>),...data.spaces.map(([step, letter]) => <text key={`${clef}-space-${step}`} x={STAFF.left + 7} y={yForStep(data.top, step) + 5}>{letter}</text>),
          ])}
        </g>
      );
    }

    function ScoreArea({ question, settings, showNoteNames, feedback, activeLevel, mobileOnlyActiveClef }) {
      const colour = feedback?.correct === true ? COLOUR.green : feedback?.correct === false ? COLOUR.red : "currentColor";
      const ahTrebleFocus = activeLevel === "AH" && question?.clef === "treble" && ["A3", "B3"].includes(question.pitch);
      const ahBassFocus = activeLevel === "AH" && question?.clef === "bass" && ["D4", "E4"].includes(question.pitch);
      const displaySettings = mobileOnlyActiveClef
        ? {...settings, treble: question?.clef === "treble", bass: question?.clef === "bass" }
        : {...settings,
            treble: ahTrebleFocus ? true : ahBassFocus ? false : settings.treble,
            bass: ahBassFocus ? true : ahTrebleFocus ? false : settings.bass,
          };
      const visibleSystems = Number(displaySettings.treble) + Number(displaySettings.bass);
      const centreOffset = !mobileOnlyActiveClef && visibleSystems === 1
        ? displaySettings.treble ? (STAFF.bassTop - STAFF.trebleTop) / 2 : -(STAFF.bassTop - STAFF.trebleTop) / 2
        : 0;

      return (
        <svg viewBox={`0 0 ${SVG.width} ${SVG.height}`} className="h-auto w-full select-none overflow-hidden sm:overflow-visible">
          <defs>
            <linearGradient id="staffLineFade" x1="247" y1="0" x2="689" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stopColor="currentColor" stopOpacity="1" />
              <stop offset="84%" stopColor="currentColor" stopOpacity="1" />
              <stop offset="100%" stopColor="currentColor" stopOpacity="0" />
            </linearGradient>
            <filter id="noteGreenFilter" colorInterpolationFilters="sRGB">
              <feColorMatrix type="matrix" values="0 0 0 0 0.086 0 0 0 0 0.639 0 0 0 0 0.290 0 0 0 1 0" />
            </filter>
            <filter id="noteRedFilter" colorInterpolationFilters="sRGB">
              <feColorMatrix type="matrix" values="0 0 0 0 0.863 0 0 0 0 0.149 0 0 0 0 0.149 0 0 0 1 0" />
            </filter>
          </defs>
          <rect width={SVG.width} height={SVG.height} fill="white" />
          <g
            className={`mobile-music-scale ${mobileOnlyActiveClef && question?.clef === "bass" ? "mobile-bass-focus" : ""}`}
            transform={`translate(0 ${centreOffset - 24})`}
          >
            <Staff clef="treble" top={STAFF.trebleTop} visible={displaySettings.treble} />
            <Staff clef="bass" top={STAFF.bassTop} visible={displaySettings.bass} />
            <HelpLabels visible={showNoteNames} settings={displaySettings} />
            <Crotchet note={question} colour={colour} ledgerEnabled={settings.ledger} />
          </g>
        </svg>
      );
    }

    function FeedbackBanner({ feedback, fading }) {
      if (!feedback) return null;
      return (
        <div className="relative flex w-full items-center justify-center text-center">
          <div
            className={`flex h-10 min-w-[58px] max-w-[calc(100vw-96px)] flex-col items-center justify-center rounded-xl border  px-3 py-0 text-[10px] font-semibold backdrop-blur-md translate-y-[60px] sm:min-h-[44px] sm:w-auto sm:translate-y-0 sm:px-2.5 sm:py-1 sm:text-xl sm:font-bold ${feedback.correct ? "border-green-600 bg-green-600 text-white" : "border-red-600 bg-red-600 text-white"}`}
            style={{ animation: fading ? "feedbackFadeOut.28s ease-out forwards" : feedback.correct ? "correctFade.55s ease-out forwards" : "incorrectDropShake.55s ease-out forwards" }}
          >
            <span className="leading-none text-[18px] font-black sm:text-xl">{feedback.correct ? "Correct" : "Incorrect"}</span>
          </div>
        </div>
      );
    }

    function ToggleRow({ label, icon, checked, onChange }) {
      return (
        <button type="button" onClick={onChange} className="mb-2.5 flex min-h-[44px] w-full whitespace-nowrap items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-[14px] py-[10px]">
          <span className="flex min-w-[145px] items-center gap-2 text-sm font-semibold">
            <span className="flex h-[22px] w-[28px] items-center justify-center text-lg leading-none">{icon}</span>
            <span>{label}</span>
          </span>
          <span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${checked ? "bg-green-600" : "bg-stone-400"}`}>
            <span className={`h-4 w-4 rounded-full bg-white transition ${checked ? "translate-x-5" : "translate-x-0"}`} />
          </span>
        </button>
      );
    }

    function LedgerIcon() {
      return (
        <svg width="28" height="22" viewBox="0 0 38 24" aria-hidden="true">
          <line x1="5" x2="33" y1="12" y2="12" stroke="currentColor" strokeWidth="1.6" />
          <ellipse cx="19" cy="12" rx="7" ry="5" transform="rotate(-18 19 12)" fill="currentColor" />
        </svg>
      );
    }

    function CustomiseMenu({ settings, setSettings, showNoteNames, setShowNoteNames, onSettingsChanged }) {
      function toggle(key) {
        setSettings((current) => {
          const next = {...current, [key]: !current[key] };

          if (!next.treble && !next.bass) {
            next[key === "treble" ? "bass" : "treble"] = true;
          }

          onSettingsChanged(next);
          return next;
        });
      }

      return (
        <div className="flex w-full min-w-0 flex-col sm:inline-flex sm:w-max sm:min-w-[260px]">
          <ToggleRow
            label="Treble Clef"
            icon={<img src={ASSET.trebleClef} alt="" aria-hidden="true" className="h-[29.9px] w-[25.3px] object-contain" />}
            checked={settings.treble}
            onChange={() => toggle("treble")}
          />

          <ToggleRow
            label="Bass Clef"
            icon={<img src={ASSET.bassClef} alt="" aria-hidden="true" className="h-[22.1px] w-[18.7px] object-contain" />}
            checked={settings.bass}
            onChange={() => toggle("bass")}
          />

          <ToggleRow
            label="Ledger Lines"
            icon={<LedgerIcon />}
            checked={settings.ledger}
            onChange={() => toggle("ledger")}
          />

          <ToggleRow
            label="Accidentals"
            icon={
              <span className="flex items-center justify-center gap-[1px]">
                <img src={ASSET.sharp} alt="" aria-hidden="true" className="h-[21px] w-[12px] object-contain" />
                <img src={ASSET.flat} alt="" aria-hidden="true" className="h-[21px] w-[12px] object-contain" />
              </span>
            }
            checked={settings.accidentals}
            onChange={() => toggle("accidentals")}
          />

          <ToggleRow
            label="Show Note Names"
            icon={<span className="relative -left-[4px] text-[12px] font-black tracking-tight">ABC</span>}
            checked={showNoteNames}
            onChange={() => setShowNoteNames((value) => !value)}
          />
        </div>
      );
    }

    function LevelMenu({ activeLevel, applyLevel }) {
      return (
        <div className="flex w-full min-w-0 flex-col gap-2">
          {Object.entries(LEVELS).map(([key, level]) => {
            const active = activeLevel === key;
            return (
              <button
                key={key}
                type="button"
                onClick={() => applyLevel(key)}
                className={`w-full rounded-xl border px-3 py-2 text-left transition ${active ? "border-stone-400 bg-stone-100" : "border-stone-200 bg-stone-50 hover:bg-stone-100"}`}
              >
                <div className="flex min-w-0 items-center justify-between gap-3 text-stone-900">
                  <div className="flex min-h-[36px] min-w-[42px] items-center justify-center">
                    <span className="flex h-[46px] w-[46px] shrink-0 items-center justify-center rounded-2xl border border-stone-200 bg-white text-[1.22rem] font-black leading-none tracking-tight text-stone-800 shadow-sm scale-[1.08]">
                      {key}
                    </span>
                  </div>
                  <div className="flex min-w-0 flex-1 flex-col justify-center pr-2">
                    <div className="truncate pb-[1px] text-[13px] font-black leading-[1.2]">{level.label}</div>
                    <div className="mt-[2px] truncate pb-[2px] text-[11px] leading-[1.25] text-stone-600">{level.description}</div>
                  </div>
                  {active && <img src={ASSET.tick} alt="" aria-hidden="true" className="h-[22px] w-[22px] shrink-0 object-contain" />}
                </div>
              </button>
            );
          })}
        </div>
      );
    }

    function AnswerButton({ value, question, selectedAnswer, feedback, onChoose }) {
      const correctAnswer = feedback && value === question?.answer;
      const wrongSelected = feedback && value === selectedAnswer && value !== question?.answer;
      const accidental = value.includes("#") || value.includes("b");
      const defaultClass = accidental ? "border-stone-800 bg-stone-900 text-white hover:bg-black" : "border-stone-300 bg-white text-black hover:bg-stone-100";
      const stateClass = correctAnswer ? "border-green-600 bg-green-600 text-white" : wrongSelected ? "border-red-600 bg-red-600 text-white" : defaultClass;

      return (
        <button type="button" disabled={Boolean(feedback)} onClick={() => onChoose(value)} className={`flex min-h-[48px] items-center justify-center rounded-xl border px-1 text-[1rem] font-bold sm:min-h-[46px] sm:px-3 sm:text-[1.05rem] ${stateClass}`}>
          {value.includes("#") ? (
            <span className="flex items-center justify-center gap-[1px]"><span>{value.replace("#", "")}</span><img src={ASSET.sharp} alt="" aria-hidden="true" className="h-[15px] w-[8px] object-contain brightness-0 invert" /></span>
          ) : value.includes("b") ? (
            <span className="flex items-center justify-center gap-[1px]"><span>{value.replace("b", "")}</span><img src={ASSET.flat} alt="" aria-hidden="true" className="h-[15px] w-[8px] object-contain brightness-0 invert" /></span>
          ) : value}
        </button>
      );
    }

    function AnswerGrid({ accidentals, question, selectedAnswer, feedback, onChoose }) {
      const placeholder = (key) => <div key={key} className="min-h-[48px] rounded-xl border border-transparent sm:min-h-[46px]" />;
      return (
        <div className="grid gap-2">
          {accidentals && (
            <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
              {LETTERS.map((letter) => SHARPS[letter] ? <AnswerButton key={SHARPS[letter]} value={SHARPS[letter]} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} /> : placeholder(`sharp-${letter}`))}
            </div>
          )}
          <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
            {LETTERS.map((letter) => <AnswerButton key={letter} value={letter} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} />)}
          </div>
          {accidentals && (
            <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
              {LETTERS.map((letter) => FLATS[letter] ? <AnswerButton key={FLATS[letter]} value={FLATS[letter]} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} /> : placeholder(`flat-${letter}`))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const { darkMode, accessibility } = useSitePreferences();
      const menuRef = useRef(null);
      const timerRef = useRef(null);
      const fadeTimerRef = useRef(null);

      const initialLevel = useMemo(() => {
        const requested = new URLSearchParams(window.location.search).get("level");
        return LEVELS[requested] ? requested : "N3";
      }, []);

      const initialSettings = useMemo(() => ({...LEVELS[initialLevel].settings }), [initialLevel]);
      const [activeLevel, setActiveLevel] = useState(initialLevel);
      const [settings, setSettings] = useState(initialSettings);
      const [question, setQuestion] = useState(() => buildQuestion(initialSettings));
      const [questionVisible, setQuestionVisible] = useState(true);
      const [menuOpen, setMenuOpen] = useState(false);
      const [menuMode, setMenuMode] = useState("levels");
      const [showNoteNames, setShowNoteNames] = useState(false);
      const [feedback, setFeedback] = useState(null);
      const [feedbackFading, setFeedbackFading] = useState(false);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [correct, setCorrect] = useState(0);
      const [attempted, setAttempted] = useState(0);
      const [streak, setStreak] = useState(0);
      const [bestStreak, setBestStreak] = useState(0);
      const [confettiKey, setConfettiKey] = useState(0);
      const [autoShowMedals, setAutoShowMedals] = useState(false);
      const [mobileOnlyActiveClef, setMobileOnlyActiveClef] = useState(window.innerWidth < 640);

      useClickAway(menuRef, () => setMenuOpen(false));

      const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
      const medal = getStreakMedal(streak);
      const appClasses = [
        darkMode ? "app-dark bg-stone-950 text-stone-100" : "bg-stone-50 text-black",
        accessibility.largeText ? "app-large-text" : "",
        accessibility.reduceMotion ? "app-reduce-motion" : "",
        accessibility.highContrast ? "app-high-contrast" : "",
      ].filter(Boolean).join(" ");

      const clearTimers = useCallback(() => {
        window.clearTimeout(timerRef.current);
        window.clearTimeout(fadeTimerRef.current);
      }, []);

      const resetScoreOnly = useCallback(() => {
        setCorrect(0);
        setAttempted(0);
        setStreak(0);
        setConfettiKey(0);
      }, []);

      const resetAllProgress = useCallback(() => {
        resetScoreOnly();
        setBestStreak(0);
      }, [resetScoreOnly]);

      const makeNewQuestion = useCallback((nextSettings = settings, skipped = false) => {
        clearTimers();
        if (skipped) setStreak(0);
        setQuestionVisible(false);
        window.setTimeout(() => {
          setQuestion((current) => buildQuestion(nextSettings, current?.baseId));
          setSelectedAnswer(null);
          setFeedback(null);
          setFeedbackFading(false);
          setQuestionVisible(true);
        }, 260);
      }, [clearTimers, settings]);

      const applyLevel = useCallback((levelKey) => {
        const nextSettings = {...LEVELS[levelKey].settings };
        setActiveLevel(levelKey);
        setSettings(nextSettings);
        resetAllProgress();
        makeNewQuestion(nextSettings);
        setMenuOpen(false);
      }, [makeNewQuestion, resetAllProgress]);

      const handleSettingsChanged = useCallback((nextSettings) => {
        setActiveLevel(levelForSettings(nextSettings));
        resetAllProgress();
        makeNewQuestion(nextSettings);
      }, [makeNewQuestion, resetAllProgress]);

      const resetScore = useCallback(() => {
        resetScoreOnly();
        makeNewQuestion(settings);
      }, [makeNewQuestion, resetScoreOnly, settings]);

      const fadeIncorrectToNextQuestion = useCallback(() => {
        if (!feedback || feedback.correct || feedbackFading) return;
        setFeedbackFading(true);
        fadeTimerRef.current = window.setTimeout(() => makeNewQuestion(settings), 280);
      }, [feedback, feedbackFading, makeNewQuestion, settings]);

      const scoreAnswer = useCallback((answer) => {
        if (!question || feedback) return;

        clearTimers();
        const isCorrect = answer === question.answer;
        const nextStreak = isCorrect ? streak + 1 : 0;

        setSelectedAnswer(answer);
        setAttempted((value) => value + 1);
        setCorrect((value) => value + (isCorrect ? 1 : 0));
        setStreak(nextStreak);
        setBestStreak((value) => Math.max(value, nextStreak));
        setFeedback({ correct: isCorrect });
        playFeedbackSound(isCorrect);

        if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
          const nextMedal = getStreakMedal(nextStreak);
          setConfettiKey((value) => value + 1);
          setAutoShowMedals(true);
          window.setTimeout(() => setAutoShowMedals(false), 2000);
          window.setTimeout(() => playFeedbackSound(true, true, nextMedal.sound), 180);
        }

        if (isCorrect) {
          fadeTimerRef.current = window.setTimeout(() => setFeedbackFading(true), 1700);
          timerRef.current = window.setTimeout(() => makeNewQuestion(settings), 2000);
        }
      }, [clearTimers, feedback, makeNewQuestion, question, settings, streak]);

      useEffect(() => {
        const onResize = () => setMobileOnlyActiveClef(window.innerWidth < 640);
        onResize();
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);

      useEffect(() => () => clearTimers(), [clearTimers]);

      return (
        <div className={`overflow-x-hidden pb-10 md:pb-12 ${appClasses}`}>
          <AppStyles />

          <header className="fixed left-0 right-0 top-0 z-[1000] w-full overflow-visible border-b border-stone-200 bg-white/95 py-2 shadow-sm backdrop-blur sm:py-3">
            <div className="mx-auto flex w-full max-w-6xl flex-col gap-3 overflow-visible px-3 sm:px-4 md:flex-row md:items-center md:justify-between md:px-8">
              <div className="flex items-center gap-3 sm:gap-4">
                <AppIcon />
                <div className="flex h-14 flex-col justify-center">
                  <h1 className="relative top-[1px] text-[clamp(1.55rem,6vw,2.2rem)] font-semibold leading-none tracking-tight md:text-3xl">Note Identification</h1>
                  <p className="mt-0 whitespace-nowrap text-[clamp(0.7rem,2.7vw,1rem)] leading-[1.05] text-stone-600 sm:max-w-2xl sm:text-[clamp(0.72rem,1.2vw,1rem)] xl:whitespace-nowrap">Identify note names in the treble and bass clef.</p>
                </div>
              </div>

              <div className="relative z-50 flex flex-wrap items-center gap-2 overflow-visible md:ml-auto md:justify-end">
                <ScoreStreakPanel
                  correct={correct}
                  attempted={attempted}
                  accuracy={accuracy}
                  streak={streak}
                  bestStreak={bestStreak}
                  medal={medal}
                  confettiKey={confettiKey}
                  resetScore={resetScore}
                  autoShowMedals={autoShowMedals}
                />
              </div>
            </div>
          </header>

          <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
            <main
              className="relative z-0 min-h-[560px] overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-4 pt-[10px] shadow-sm sm:min-h-[390px] sm:px-4 md:h-auto md:min-h-0 md:overflow-visible md:px-6 md:pb-6 md:pt-[14px]"
              onPointerDown={() => { if (feedback && !feedback.correct) fadeIncorrectToNextQuestion(); }}
            >
              <div className="relative z-50 mb-2.5 flex items-center justify-between gap-2 overflow-visible">
                <div className="relative flex flex-1 items-center gap-2 overflow-visible sm:flex-none" ref={menuRef}>
                  <div className="relative overflow-visible">
                    <button
                      type="button"
                      onClick={() => { setMenuMode("levels"); setMenuOpen((open) => !(open && menuMode === "levels")); }}
                      className="flex h-10 w-[58px] items-center justify-center gap-1 rounded-xl border border-stone-300 bg-white text-sm font-semibold text-stone-800 sm:h-11 sm:w-auto sm:px-2.5"
                    >
                      <img src={ASSET.level} alt="" aria-hidden="true" className="h-[26px] w-[28px] object-contain scale-[1.06]" />
                      <span className="relative -left-[5px] sm:hidden">{activeLevel}</span>
                      <span className="relative -left-[3px] hidden sm:inline">{LEVELS[activeLevel]?.label || activeLevel}</span>
                    </button>

                    {menuOpen && menuMode === "levels" && (
                      <div className="absolute left-0 top-full z-50 mt-2 inline-block w-[calc(100vw-48px)] max-w-[360px] rounded-2xl border border-stone-200 bg-white p-3 shadow-lg sm:w-fit sm:max-w-none">
                        <div className="relative -top-[4px] mb-1.5 flex h-[28px] items-center justify-center whitespace-nowrap px-8">
                          <div className="text-center text-base font-semibold text-stone-800">Level</div>
                        </div>
                        <LevelMenu activeLevel={activeLevel} applyLevel={applyLevel} />
                      </div>
                    )}
                  </div>

                  <div className="relative overflow-visible">
                    <button
                      type="button"
                      onClick={() => {
                        if (menuOpen && menuMode === "customise") setMenuOpen(false);
                        else { setMenuMode("customise"); setMenuOpen(true); }
                      }}
                      className="flex h-10 w-[58px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white text-sm font-semibold text-stone-800 sm:h-11 sm:w-auto sm:px-2.5"
                    >
                      <img src={ASSET.customise} alt="" aria-hidden="true" className="h-[20.7px] w-[20.7px] object-contain" />
                      <span className="hidden sm:inline">Customise</span>
                    </button>

                    {menuOpen && menuMode === "customise" && (
                      <div className="absolute -left-[66px] top-full z-50 mt-2 inline-block w-[calc(100vw-48px)] max-w-[360px] rounded-2xl border border-stone-200 bg-white p-3 shadow-lg sm:left-0 sm:w-fit sm:max-w-none">
                        <div className="relative -top-[4px] mb-1.5 flex h-[28px] items-center justify-center whitespace-nowrap px-8">
                          <div className="text-center text-base font-semibold text-stone-800">Customise</div>
                        </div>
                        <CustomiseMenu
                          settings={settings}
                          setSettings={setSettings}
                          showNoteNames={showNoteNames}
                          setShowNoteNames={setShowNoteNames}
                          onSettingsChanged={handleSettingsChanged}
                        />
                      </div>
                    )}
                  </div>

                  {feedback && (
                    <div className="flex h-10 flex-1 items-center justify-center sm:hidden">
                      <FeedbackBanner feedback={feedback} fading={feedbackFading} />
                    </div>
                  )}
                </div>

                <button
                  type="button"
                  onClick={() => makeNewQuestion(settings, true)}
                  className="flex h-10 w-[58px] shrink-0 items-center justify-center rounded-xl border border-stone-300 bg-white text-sm font-semibold text-stone-800 sm:h-11 sm:w-auto sm:px-2.5"
                >
                  <div className="flex w-full items-center justify-center sm:relative sm:left-[4px] sm:w-auto sm:gap-1">
                    <span className="hidden sm:inline">Skip</span>
                    <img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />
                  </div>
                </button>
              </div>

              {feedback && (
                <div className="pointer-events-none absolute left-1/2 top-[36px] -translate-y-1/2 z-[80] hidden -translate-x-1/2 sm:block">
                  <FeedbackBanner feedback={feedback} fading={feedbackFading} />
                </div>
              )}

              <div className={`relative top-[56px] mx-auto flex w-full items-center justify-center transition-opacity duration-300 sm:top-[15px] ${questionVisible ? "opacity-100" : "opacity-0"}`} style={{ minHeight: "calc(100% - 210px)" }}>
                <ScoreArea
                  question={question}
                  settings={settings}
                  showNoteNames={showNoteNames}
                  feedback={feedback}
                  activeLevel={activeLevel}
                  mobileOnlyActiveClef={mobileOnlyActiveClef}
                />
              </div>

              <div className="absolute bottom-[24px] left-3 right-3 z-10 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md sm:relative sm:bottom-auto sm:left-auto sm:right-auto sm:mt-[-48px] sm:p-4 md:mx-3 md:-mt-[66px]">
                <div className="space-y-2 text-stone-900">
                  <p className="text-base font-semibold leading-tight">Identify the <strong>note</strong>.</p>
                  {!question && <p className="text-sm font-medium text-red-700">No available notes. Enable at least one clef.</p>}
                </div>

                <div className="mt-4">
                  <AnswerGrid
                    accidentals={settings.accidentals}
                    question={question}
                    selectedAnswer={selectedAnswer}
                    feedback={feedback}
                    onChoose={scoreAnswer}
                  />
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>

  <script src="https://mrtennant-music.github.io/musicliteracy/footer.js"></script>
</body>
</html>
