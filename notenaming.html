    const randomItem = (items) => items[Math.floor(Math.random() * items.length)];

    function readSiteTheme() {
      return localStorage.getItem(SITE_THEME_KEY) || "light";

    function readSiteAccessibility() {
      try {
        const value = JSON.parse(localStorage.getItem(SITE_ACCESSIBILITY_KEY) || "{}");
        return value && typeof value === "object" ? value : {};
      } catch {
        return {};
      }

    function settingsMatchLevel(settings, levelKey) {
      return Object.entries(LEVELS[levelKey].settings).every(([key, value]) => Boolean(settings[key]) === Boolean(value));
    }

    function levelForSettings(settings) {
      return Object.keys(LEVELS).find((key) => settingsMatchLevel(settings, key)) || "Custom";
    }

    function handleButtonKeyDown(event, onActivate) {
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      onActivate();
    }

    function possibleQuestions(settings) {
      return NOTE_DATA.filter((note) => {
        if (note.clef === "treble" && !settings.treble) return false;
        if (note.clef === "bass" && !settings.bass) return false;
        if (!settings.ledger && BLOCKED_WITHOUT_LEDGER.has(note.pitch)) return false;
        if (!settings.advancedRange && ADVANCED_ONLY.has(`${note.pitch}-${note.clef}`)) return false;
        return true;
      });
    }

    function accidentalChoice(letter, enabled) {
      if (!enabled) return { answer: letter, accidental: null };
      const choices = [{ answer: letter, accidental: null }];
      if (SHARPS[letter]) choices.push({ answer: SHARPS[letter], accidental: "sharp" });
      if (FLATS[letter]) choices.push({ answer: FLATS[letter], accidental: "flat" });
      return randomItem(choices);
    }

    function buildQuestion(settings, previousId = null) {
      const pool = possibleQuestions(settings);
      if (!pool.length) return null;

      let base = randomItem(pool);
      let attempts = 0;
      while (pool.length > 1 && previousId === `${base.pitch}-${base.clef}` && attempts < 25) {
        base = randomItem(pool);
        attempts += 1;
      }

      const accidental = accidentalChoice(base.answer, settings.accidentals);
      return {
        id: Math.random().toString(36).slice(2),
        baseId: `${base.pitch}-${base.clef}`,
        pitch: base.pitch,
        clef: base.clef,
        step: base.step,
        answer: accidental.answer,
        accidental: accidental.accidental,
      };
    }

    function playFeedbackSound(correct, celebration = false, medal = null) {

    function getStreakMedal(streak) {
      if (streak >= 30) return { tier: "diamond", icon: ASSET.diamond, bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
      if (streak >= 20) return { tier: "gold", icon: ASSET.gold, bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
      if (streak >= 15) return { tier: "silver", icon: ASSET.silver, bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
      if (streak >= 10) return { tier: "bronze", icon: ASSET.bronze, bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
      return null;
    }

    function useSitePreferences() {
      const [darkMode, setDarkMode] = useState(readSiteTheme() === "dark");
      const [accessibility, setAccessibility] = useState(readSiteAccessibility);

      useEffect(() => {
        const sync = () => {
          setDarkMode(readSiteTheme() === "dark");
          setAccessibility(readSiteAccessibility());
        };
        sync();
        window.addEventListener("storage", sync);
        window.addEventListener("mlh-theme-change", sync);
        window.addEventListener("mlh-accessibility-change", sync);
        return () => {
          window.removeEventListener("storage", sync);
          window.removeEventListener("mlh-theme-change", sync);
          window.removeEventListener("mlh-accessibility-change", sync);
        };
      }, []);

      return { darkMode, accessibility };
    }

    function useClickAway(ref, handler) {
      useEffect(() => {
        const onPointerDown = (event) => {
          if (!ref.current?.contains(event.target)) handler?.();
        };
        document.addEventListener("pointerdown", onPointerDown, true);
        return () => document.removeEventListener("pointerdown", onPointerDown, true);
      }, [ref, handler]);
    }

    function Staff({ clef, top, visible }) {
      if (!visible) return null;
      const isTreble = clef === "treble";
      return (
        <g>
          {[0, 1, 2, 3, 4].map((line) => (
            <line key={line} x1={STAFF.left} x2={STAFF.right} y1={top + line * STAFF.gap} y2={top + line * STAFF.gap} stroke="url(#staffLineFade)" strokeWidth="1.5" />
          ))}
          <image
            href={isTreble ? ASSET.trebleClef : ASSET.bassClef}
            x={STAFF.left + 12}
            y={top + (isTreble ? -37 : -2)}
            width={isTreble ? 86 : 65.5}
            height={isTreble ? 155 : 70}
            preserveAspectRatio="xMidYMid meet"
            pointerEvents="none"
          />
        </g>
      );
    }

    function LedgerLines({ note, colour, enabled }) {
      if (!note || !enabled) return null;
      const top = note.clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
      const lines = [];
      if (note.step <= -2) lines.push(-2);
      if (note.step <= -4) lines.push(-4);
      if (note.step >= 10) lines.push(10);
      if (note.step >= 12) lines.push(12);

      return (
        <g pointerEvents="none">
          {lines.map((step) => {
            const y = yForStep(top, step);
            return <line key={step} x1={NOTE.x - 24} x2={NOTE.x + 24} y1={y} y2={y} stroke={colour} strokeWidth="1.5" />;
          })}
        </g>
      );
    }

    function Accidental({ note, colour }) {
      if (!note?.accidental) return null;
      const top = note.clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
      const y = yForStep(top, note.step);
      const isSharp = note.accidental === "sharp";
      const ledgerOffset = y < 95 || y > 285 ? -6 : 0;
      const isLedgerLineNote = note.step <= -2 || note.step >= 10;
      const flatLedgerLineOffset = !isSharp && isLedgerLineNote ? -3 : 0;
      const sharpLedgerLineOffset = isSharp && isLedgerLineNote ? -3 : 0;
      const filter = colour === COLOUR.green ? SVG_FILTER.green : colour === COLOUR.red ? SVG_FILTER.red : SVG_FILTER.black;

      return (
        <image
          href={isSharp ? ASSET.sharp : ASSET.flat}
          x={isSharp ? NOTE.x - 41 + ledgerOffset + sharpLedgerLineOffset : NOTE.x - 38 + ledgerOffset + flatLedgerLineOffset}
          y={isSharp ? y - 27 : y - 35}
          width="28"
          height={isSharp ? 54 : 49}
          preserveAspectRatio="xMidYMid meet"
          pointerEvents="none"
          filter={filter || undefined}
        />
      );
    }

    function Crotchet({ note, colour, ledgerEnabled }) {
      if (!note) return null;
      const top = note.clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
      const y = yForStep(top, note.step);
      const down = stemDown(note.step);
      const filter = colour === COLOUR.green ? SVG_FILTER.green : colour === COLOUR.red ? SVG_FILTER.red : SVG_FILTER.black;

      return (
        <g pointerEvents="none">
          <LedgerLines note={note} colour={colour} enabled={ledgerEnabled} />
          <Accidental note={note} colour={colour} />
          <image
            href={ASSET.crotchet}
            x={NOTE.x - 19}
            y={y - 62}
            width="38.5"
            height="72"
            preserveAspectRatio="xMidYMid meet"
            filter={filter || undefined}
            style={{
              transformBox: "fill-box",
              transformOrigin: "center",
              transform: down ? "translateY(52px) rotate(180deg)" : "none",
            }}
          />
        </g>
      );
    }

    function HelpLabels({ visible, settings }) {
      if (!visible) return null;
      const items = [];
      if (settings.treble) items.push(["treble", NOTE_LABELS.treble]);
      if (settings.bass) items.push(["bass", NOTE_LABELS.bass]);

      return (
        <g fontSize="14" fontFamily="system-ui, sans-serif" fontWeight="700" dominantBaseline="middle" pointerEvents="none" fill="black" textAnchor="middle">
          {items.flatMap(([clef, data]) => [...data.lines.map(([step, letter]) => <text key={`${clef}-line-${step}`} x={STAFF.left - 11} y={yForStep(data.top, step) + 5}>{letter}</text>),...data.spaces.map(([step, letter]) => <text key={`${clef}-space-${step}`} x={STAFF.left + 7} y={yForStep(data.top, step) + 5}>{letter}</text>),
          ])}
        </g>
      );
    }

    function ScoreArea({ question, settings, showNoteNames, feedback, activeLevel, mobileOnlyActiveClef }) {
      const colour = feedback?.correct === true ? COLOUR.green : feedback?.correct === false ? COLOUR.red : "currentColor";
      const ahTrebleFocus = activeLevel === "AH" && question?.clef === "treble" && ["A3", "B3"].includes(question.pitch);
      const ahBassFocus = activeLevel === "AH" && question?.clef === "bass" && ["D4", "E4"].includes(question.pitch);
      const topRoom = question?.step >= 8 ? 22 : question?.step >= 6 ? 14 : 0;
      const displaySettings = mobileOnlyActiveClef
        ? {...settings, treble: question?.clef === "treble", bass: question?.clef === "bass" }
        : {...settings,
            treble: ahTrebleFocus ? true : ahBassFocus ? false : settings.treble,
            bass: ahBassFocus ? true : ahTrebleFocus ? false : settings.bass,
          };
      const visibleSystems = Number(displaySettings.treble) + Number(displaySettings.bass);
      const centreOffset = !mobileOnlyActiveClef && visibleSystems === 1
        ? displaySettings.treble ? (STAFF.bassTop - STAFF.trebleTop) / 2 : -(STAFF.bassTop - STAFF.trebleTop) / 2
        : 0;
      const viewBox = mobileOnlyActiveClef
        ? MOBILE_SVG_VIEWBOX[question?.clef === "bass" ? "bass" : "treble"]
        : { x: 0, y: 0, width: SVG.width, height: SVG.height };

      return (
        <svg viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`} className="h-auto w-full select-none overflow-hidden sm:overflow-visible">
          <defs>
            <linearGradient id="staffLineFade" x1="247" y1="0" x2="689" y2="0" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stopColor="currentColor" stopOpacity="1" />
              <stop offset="84%" stopColor="currentColor" stopOpacity="1" />
              <stop offset="100%" stopColor="currentColor" stopOpacity="0" />
            </linearGradient>
            <filter id="noteGreenFilter" colorInterpolationFilters="sRGB">
              <feColorMatrix type="matrix" values="0 0 0 0 0.086 0 0 0 0 0.639 0 0 0 0 0.290 0 0 0 1 0" />
            </filter>
            <filter id="noteRedFilter" colorInterpolationFilters="sRGB">
              <feColorMatrix type="matrix" values="0 0 0 0 0.863 0 0 0 0 0.149 0 0 0 0 0.149 0 0 0 1 0" />
            </filter>
          </defs>
          <rect width={SVG.width} height={SVG.height} fill="white" />
          <g
            transform={`translate(0 ${mobileOnlyActiveClef ? topRoom : centreOffset - 24 + topRoom})`}
          >
            <Staff clef="treble" top={STAFF.trebleTop} visible={displaySettings.treble} />
            <Staff clef="bass" top={STAFF.bassTop} visible={displaySettings.bass} />
            <HelpLabels visible={showNoteNames} settings={displaySettings} />
            <Crotchet note={question} colour={colour} ledgerEnabled={settings.ledger} />
          </g>
        </svg>
      );
    }

    function FeedbackBanner({ feedback, fading }) {
      return <window.MLH.FeedbackBadge feedback={feedback} fading={fading} animationPrefix="note" />;
    }

    function ToggleRow({ label, icon, checked, onChange }) {
      return <window.MLH.MenuToggleRow glyph={icon} label={label} checked={checked} onChange={onChange} />;
    }

    function LedgerIcon() {
      return (
        <svg width="28" height="22" viewBox="0 0 38 24" aria-hidden="true">
          <line x1="5" x2="33" y1="12" y2="12" stroke="currentColor" strokeWidth="1.6" />
          <ellipse cx="19" cy="12" rx="7" ry="5" transform="rotate(-18 19 12)" fill="currentColor" />
        </svg>
      );
    }

    function CustomiseMenu({ settings, setSettings, showNoteNames, setShowNoteNames, onSettingsChanged }) {
      function toggle(key) {
        setSettings((current) => {
          const next = { ...current, [key]: !current[key] };

          if (!next.treble && !next.bass) {
            next[key === "treble" ? "bass" : "treble"] = true;
          }

          onSettingsChanged(next);
          return next;
        });
      }

      return (
        <div className="flex w-full min-w-0 flex-col sm:inline-flex sm:w-max sm:min-w-[260px]">
          <ToggleRow
            label="Treble Clef"
            icon={<img src={ASSET.trebleClef} alt="" aria-hidden="true" className="h-[29.9px] w-[25.3px] object-contain" />}
            checked={settings.treble}
            onChange={() => toggle("treble")}
          />

          <ToggleRow
            label="Bass Clef"
            icon={<img src={ASSET.bassClef} alt="" aria-hidden="true" className="h-[22.1px] w-[18.7px] object-contain" />}
            checked={settings.bass}
            onChange={() => toggle("bass")}
          />

          <ToggleRow
            label="Ledger Lines"
            icon={<LedgerIcon />}
            checked={settings.ledger}
            onChange={() => toggle("ledger")}
          />

          <ToggleRow
            label="Accidentals"
            icon={
              <span className="flex items-center justify-center gap-[1px]">
                <img src={ASSET.sharp} alt="" aria-hidden="true" className="h-[21px] w-[12px] object-contain" />
                <img src={ASSET.flat} alt="" aria-hidden="true" className="h-[21px] w-[12px] object-contain" />
              </span>
            }
            checked={settings.accidentals}
            onChange={() => toggle("accidentals")}
          />

          <ToggleRow
            label="Show Note Names"
            icon={<span className="text-[12px] font-black tracking-tight">ABC</span>}
            checked={showNoteNames}
            onChange={() => setShowNoteNames((value) => !value)}
          />
        </div>
      );
    }

    function LocalLevelMenu({ activeLevel, onSelect, levels }) {
      return (
        <div className="flex w-full min-w-0 flex-col gap-2">
          {Object.entries(levels).map(([key, level]) => {
            const active = activeLevel === key;
            return (
              <button
                key={key}
                type="button"
                onClick={() => onSelect(key)}
                className={`w-full rounded-xl border px-3 py-2 text-left transition sm:px-4 ${active ? "border-stone-400 bg-stone-100" : "border-stone-200 bg-stone-50 hover:bg-stone-100"}`}
              >
                <div className="flex min-w-0 items-center justify-between gap-3 text-stone-900 sm:items-start">
                  <div className="flex min-h-[36px] min-w-[42px] items-center justify-center">
                    <span className="flex h-[46px] w-[46px] shrink-0 scale-[1.08] items-center justify-center rounded-2xl border border-stone-200 bg-white text-[1.22rem] font-black leading-none tracking-tight text-stone-800 shadow-sm">
                      {key}
                    </span>
                  </div>
                  <div className="flex min-w-0 flex-1 flex-col justify-center pr-2">
                    <div className="pb-[1px] text-[13px] font-black leading-[1.2] sm:whitespace-normal">{level.label}</div>
                    <div className="mt-[2px] pb-[2px] text-[11px] leading-[1.25] text-stone-600 sm:whitespace-normal">{level.description}</div>
                  </div>
                  {active && <img src={ASSET.tick} alt="" aria-hidden="true" className="h-[22px] w-[22px] shrink-0 object-contain" />}
                </div>
              </button>
            );
          })}
        </div>
      );
    }

    const LevelMenu = window.MLH?.LevelMenu || LocalLevelMenu;

    function AnswerButton({ value, question, selectedAnswer, feedback, onChoose }) {
      const correctAnswer = feedback && value === question?.answer;
      const wrongSelected = feedback && value === selectedAnswer && value !== question?.answer;
      const accidental = value.includes("#") || value.includes("b");
      const defaultClass = accidental ? "border-stone-800 bg-stone-900 text-white" : "border-stone-300 bg-white text-black";
      const stateClass = correctAnswer ? "border-[#16a34a] bg-[#16a34a] text-white" : wrongSelected ? "border-[#dc2626] bg-[#dc2626] text-white" : defaultClass;

      return (
        <button
          type="button"
          key={`${question?.id || "no-question"}-${value}`}
          disabled={Boolean(feedback)}
          onPointerUp={(event) => event.currentTarget.blur()}
          onTouchEnd={(event) => event.currentTarget.blur()}
          onMouseUp={(event) => event.currentTarget.blur()}
          onClick={(event) => {
            event.currentTarget.blur();
            onChoose(value);
          }} className={`flex min-h-[48px] items-center justify-center rounded-xl border px-1 text-[1rem] font-bold sm:min-h-[46px] sm:px-3 sm:text-[1.05rem] ${stateClass}`}>
          {value.includes("#") ? (
            <span className="flex items-center justify-center gap-[1px]"><span>{value.replace("#", "")}</span><img src={ASSET.sharp} alt="" aria-hidden="true" className="h-[15px] w-[8px] object-contain brightness-0 invert" /></span>
          ) : value.includes("b") ? (
            <span className="flex items-center justify-center gap-[1px]"><span>{value.replace("b", "")}</span><img src={ASSET.flat} alt="" aria-hidden="true" className="h-[15px] w-[8px] object-contain brightness-0 invert" /></span>
          ) : value}
        </button>
      );
    }

    function AnswerGrid({ accidentals, question, selectedAnswer, feedback, onChoose }) {
      const placeholder = (key) => <div key={key} className="min-h-[48px] rounded-xl border border-transparent sm:min-h-[46px]" />;
      return (
        <div className="grid gap-2">
          {accidentals && (
            <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
              {LETTERS.map((letter) => SHARPS[letter] ? <AnswerButton key={SHARPS[letter]} value={SHARPS[letter]} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} /> : placeholder(`sharp-${letter}`))}
            </div>
          )}
          <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
            {LETTERS.map((letter) => <AnswerButton key={letter} value={letter} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} />)}
          </div>
          {accidentals && (
            <div className="grid grid-cols-7 gap-1.5 sm:gap-2">
              {LETTERS.map((letter) => FLATS[letter] ? <AnswerButton key={FLATS[letter]} value={FLATS[letter]} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} /> : placeholder(`flat-${letter}`))}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const { darkMode, accessibility } = useSitePreferences();
      const menuRef = useRef(null);
      const mainRef = useRef(null);
      const questionPanelRef = useRef(null);
      const timerRef = useRef(null);
      const fadeTimerRef = useRef(null);

      const initialLevel = useMemo(() => {
        const requested = new URLSearchParams(window.location.search).get("level");
        return LEVELS[requested] ? requested : "N3";
      }, []);

      const initialSettings = useMemo(() => ({...LEVELS[initialLevel].settings }), [initialLevel]);
      const [activeLevel, setActiveLevel] = useState(initialLevel);
      const [settings, setSettings] = useState(initialSettings);
      const [question, setQuestion] = useState(() => buildQuestion(initialSettings));
      const [questionVisible, setQuestionVisible] = useState(true);
      const [menuOpen, setMenuOpen] = useState(false);
      const [menuMode, setMenuMode] = useState("levels");
      const [showNoteNames, setShowNoteNames] = useState(false);
      const [feedback, setFeedback] = useState(null);
      const [feedbackFading, setFeedbackFading] = useState(false);
      const [selectedAnswer, setSelectedAnswer] = useState(null);
      const [correct, setCorrect] = useState(0);
      const [attempted, setAttempted] = useState(0);
      const [streak, setStreak] = useState(0);
      const [bestStreak, setBestStreak] = useState(0);
      const [confettiKey, setConfettiKey] = useState(0);
      const [autoShowMedals, setAutoShowMedals] = useState(false);
      const [mobileOnlyActiveClef, setMobileOnlyActiveClef] = useState(window.innerWidth < 640);
      const [questionPanelHeight, setQuestionPanelHeight] = useState(0);

      window.MLH.useClickAway(menuRef, () => setMenuOpen(false));

      const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
      const medal = getStreakMedal(streak);
      const appClasses = [
        darkMode ? "app-dark bg-stone-950 text-stone-100" : "bg-stone-50 text-black",
        accessibility.largeText ? "app-large-text" : "",
        accessibility.reduceMotion ? "app-reduce-motion" : "",
        accessibility.highContrast ? "app-high-contrast" : "",
      ].filter(Boolean).join(" ");

      const clearTimers = useCallback(() => {
        window.clearTimeout(timerRef.current);
        window.clearTimeout(fadeTimerRef.current);
      }, []);

      const resetScoreOnly = useCallback(() => {
        setCorrect(0);
        setAttempted(0);
        setStreak(0);
        setConfettiKey(0);
      }, []);

      const resetAllProgress = useCallback(() => {
        resetScoreOnly();
        setBestStreak(0);
      }, [resetScoreOnly]);

      const makeNewQuestion = useCallback((nextSettings = settings, skipped = false) => {
        clearTimers();
        if (skipped) setStreak(0);
        setQuestionVisible(false);
        window.setTimeout(() => {
          if (document.activeElement instanceof HTMLElement) {
            document.activeElement.blur();
          }
          setQuestion((current) => buildQuestion(nextSettings, current?.baseId));
          setSelectedAnswer(null);
          setFeedback(null);
          setFeedbackFading(false);
          setQuestionVisible(true);
        }, 260);
      }, [clearTimers, settings]);

      const applyLevel = useCallback((levelKey) => {
        const nextSettings = {...LEVELS[levelKey].settings };
        setActiveLevel(levelKey);
        setSettings(nextSettings);
        resetAllProgress();
        makeNewQuestion(nextSettings);
        setMenuOpen(false);
      }, [makeNewQuestion, resetAllProgress]);

      const handleSettingsChanged = useCallback((nextSettings) => {
        setActiveLevel(levelForSettings(nextSettings));
        resetAllProgress();
        makeNewQuestion(nextSettings);
      }, [makeNewQuestion, resetAllProgress]);

      const resetScore = useCallback(() => {
        resetScoreOnly();
        makeNewQuestion(settings);
      }, [makeNewQuestion, resetScoreOnly, settings]);

      const fadeIncorrectToNextQuestion = useCallback(() => {
        if (!feedback || feedback.correct || feedbackFading) return;
        setFeedbackFading(true);
        fadeTimerRef.current = window.setTimeout(() => makeNewQuestion(settings), 280);
      }, [feedback, feedbackFading, makeNewQuestion, settings]);

      const skipCorrectFeedback = useCallback(() => {
        if (!feedback || !feedback.correct || feedbackFading) return;
        clearTimers();
        makeNewQuestion(settings);
      }, [clearTimers, feedback, feedbackFading, makeNewQuestion, settings]);

      const scoreAnswer = useCallback((answer) => {
        if (!question || feedback) return;

        clearTimers();
        const isCorrect = answer === question.answer;
        const nextStreak = isCorrect ? streak + 1 : 0;

        setSelectedAnswer(answer);
        setAttempted((value) => value + 1);
        setCorrect((value) => value + (isCorrect ? 1 : 0));
        setStreak(nextStreak);
        setBestStreak((value) => Math.max(value, nextStreak));
        setFeedback({ correct: isCorrect });
        playFeedbackSound(isCorrect);

        if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
          const nextMedal = getStreakMedal(nextStreak);
          setConfettiKey((value) => value + 1);
          setAutoShowMedals(true);
          window.setTimeout(() => setAutoShowMedals(false), 2000);
          window.setTimeout(() => playFeedbackSound(true, true, nextMedal.sound), 180);
        }

        if (isCorrect) {
          fadeTimerRef.current = window.setTimeout(() => setFeedbackFading(true), 1700);
          timerRef.current = window.setTimeout(() => makeNewQuestion(settings), 2000);
        }
      }, [clearTimers, feedback, makeNewQuestion, question, settings, streak]);

      useEffect(() => {
        return window.MLH?.installPhoneLandscapeLock?.();
      }, []);

      useEffect(() => {
        const onResize = () => setMobileOnlyActiveClef(window.innerWidth < 640);
        onResize();
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);

      useEffect(() => {
        let frameId = null;

        const updateQuestionPanelHeight = () => {
          frameId = window.requestAnimationFrame(() => {
            const nextHeight = questionPanelRef.current?.offsetHeight || 0;
            setQuestionPanelHeight((currentHeight) => currentHeight === nextHeight ? currentHeight : nextHeight);
          });
        };

        updateQuestionPanelHeight();
        window.addEventListener("resize", updateQuestionPanelHeight);

        return () => {
          if (frameId) window.cancelAnimationFrame(frameId);
          window.removeEventListener("resize", updateQuestionPanelHeight);
        };
      }, [settings.accidentals, question, mobileOnlyActiveClef]);

      useEffect(() => () => clearTimers(), [clearTimers]);

      return (
        <div className={`overflow-x-hidden pb-10 md:pb-12 ${appClasses}`}>
          <AppStyles />

          <window.MLH.AppHeader icon={ASSET.appIcon} title="Note Identification" subtitle="Identify note names in the treble and bass clef.">
            <ScoreStreakPanel
              correct={correct}
              attempted={attempted}
              accuracy={accuracy}
              streak={streak}
              bestStreak={bestStreak}
              medal={medal}
              confettiKey={confettiKey}
              resetScore={resetScore}
              autoShowMedals={autoShowMedals}
            />
          </window.MLH.AppHeader>

          <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
            <main
              ref={mainRef}
              className="relative z-0 min-h-[520px] overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-0 pt-[10px] shadow-sm sm:min-h-[390px] sm:px-4 md:h-auto md:min-h-0 md:overflow-visible md:px-6 md:pb-6 md:pt-[14px]"
              onPointerDown={() => {
                if (feedback && feedback.correct) {
                  skipCorrectFeedback();
                  return;
                }
                if (feedback && !feedback.correct) fadeIncorrectToNextQuestion();
              }}
            >
              <div className="relative z-50 mb-2.5 grid grid-cols-[auto_1fr_auto] items-center gap-2 overflow-visible">
                <div className="relative flex items-center gap-2 overflow-visible" ref={menuRef}>
                  <div className="relative overflow-visible">
                    <window.MLH.LevelButton
                      icon={<img src={ASSET.level} alt="" aria-hidden="true" className={`h-[26px] w-[28px] object-contain scale-[1.06] ${activeLevel === "Custom" ? "translate-x-0" : ""}`} />}
                      activeLabel={LEVELS[activeLevel]?.label || activeLevel}
                      activeLevel={activeLevel}
                      isCustom={activeLevel === "Custom"}
                      onClick={() => { setMenuMode("levels"); setMenuOpen((open) => !(open && menuMode === "levels")); }}
                    />

                    {menuOpen && menuMode === "levels" && (
                      <window.MLH.MenuPanel title="Level" position="left-0">
                        <LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                      </window.MLH.MenuPanel>
                    )}
                  </div>

                  <div className="relative overflow-visible">
                    <window.MLH.CustomiseButton
                      icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[20.7px] w-[20.7px] object-contain" />}
                      onClick={() => {
                        if (menuOpen && menuMode === "customise") setMenuOpen(false);
                        else { setMenuMode("customise"); setMenuOpen(true); }
                      }}
                    />

                    {menuOpen && menuMode === "customise" && (
                      <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise">
                        <CustomiseMenu
                          settings={settings}
                          setSettings={setSettings}
                          showNoteNames={showNoteNames}
                          setShowNoteNames={setShowNoteNames}
                          onSettingsChanged={handleSettingsChanged}
                        />
                      </window.MLH.MenuPanel>
                    )}
                  </div>
                </div>

                <div className="flex h-10 items-center justify-center">
                  {feedback && <FeedbackBanner feedback={feedback} fading={feedbackFading} />}
                </div>

                <window.MLH.SkipButton
                  onClick={() => makeNewQuestion(settings, true)}
                  icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />}
                />
              </div>
              <div
                className={`mx-auto flex w-full items-center justify-center transition-opacity duration-300 sm:relative sm:top-[0px] ${mobileOnlyActiveClef ? "absolute left-0 right-0" : "relative top-[56px]"} ${questionVisible ? "opacity-100" : "opacity-0"}`}
                style={mobileOnlyActiveClef ? { top: "54px", bottom: `${questionPanelHeight + 12}px` } : { minHeight: "calc(100% - 210px)" }}
              >
                <ScoreArea
                  question={question}
                  settings={settings}
                  showNoteNames={showNoteNames}
                  feedback={feedback}
                  activeLevel={activeLevel}
                  mobileOnlyActiveClef={mobileOnlyActiveClef}
                />
              </div>

              <div ref={questionPanelRef} className="absolute bottom-[12px] left-3 right-3 z-10 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md sm:relative sm:bottom-auto sm:left-auto sm:right-auto sm:mt-[-63px] sm:p-4 md:mx-3 md:-mt-[81px]">
                <div className="space-y-2 text-stone-900">
                  <p className="text-base font-semibold leading-tight">Identify the <strong>note</strong>.</p>
                  {!question && <p className="text-sm font-medium text-[#dc2626]">No available notes. Enable at least one clef.</p>}
                </div>

                <div className="mt-4">
                  <AnswerGrid
                    accidentals={settings.accidentals}
                    question={question}
                    selectedAnswer={selectedAnswer}
                    feedback={feedback}
                    onChoose={scoreAnswer}
                  />
                </div>
              </div>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>

  <script src="./footer.js"></script>
</body>
</html>
