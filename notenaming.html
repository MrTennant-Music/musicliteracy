<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Note Identification Golden App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const SVG = { width: 920, height: 420 };

const STAFF = {
  left: 222,
  right: 714,
  trebleTop: 72,
  bassTop: 229,
  gap: 21,
};

const NOTE = {
  x: 490,
  rx: 13.55,
  ry: 9.69,
  stemLength: 69,
};

const COLOUR = {
  green: "#16a34a",
  red: "#dc2626",
  preview: "#444444",
  black: "#000000",
  blue: "#1d4ed8",
};

const GLYPH = {
  trebleClef: String.fromCodePoint(0x1d11e),
  bassClef: String.fromCodePoint(0x1d122),
};

const LETTERS = ["A", "B", "C", "D", "E", "F", "G"];

const SHARPS = {
  A: "A#",
  B: null,
  C: "C#",
  D: "D#",
  E: null,
  F: "F#",
  G: "G#",
};

const FLATS = {
  A: "Ab",
  B: "Bb",
  C: null,
  D: "Db",
  E: "Eb",
  F: null,
  G: "Gb",
};

const LEDGER_BLOCKED = {
  E2: true,
  F2: true,
  B3: true,
  C4: true,
  D4: true,
  G5: true,
  A5: true,
};

const NOTE_DATA = [
  { pitch: "E2", answer: "E", clef: "bass", step: -2 },
  { pitch: "F2", answer: "F", clef: "bass", step: -1 },
  { pitch: "G2", answer: "G", clef: "bass", step: 0 },
  { pitch: "A2", answer: "A", clef: "bass", step: 1 },
  { pitch: "B2", answer: "B", clef: "bass", step: 2 },
  { pitch: "C3", answer: "C", clef: "bass", step: 3 },
  { pitch: "D3", answer: "D", clef: "bass", step: 4 },
  { pitch: "E3", answer: "E", clef: "bass", step: 5 },
  { pitch: "F3", answer: "F", clef: "bass", step: 6 },
  { pitch: "G3", answer: "G", clef: "bass", step: 7 },
  { pitch: "A3", answer: "A", clef: "bass", step: 8 },
  { pitch: "B3", answer: "B", clef: "bass", step: 9 },
  { pitch: "C4", answer: "C", clef: "bass", step: 10 },
  { pitch: "C4", answer: "C", clef: "treble", step: -2 },
  { pitch: "D4", answer: "D", clef: "treble", step: -1 },
  { pitch: "E4", answer: "E", clef: "treble", step: 0 },
  { pitch: "F4", answer: "F", clef: "treble", step: 1 },
  { pitch: "G4", answer: "G", clef: "treble", step: 2 },
  { pitch: "A4", answer: "A", clef: "treble", step: 3 },
  { pitch: "B4", answer: "B", clef: "treble", step: 4 },
  { pitch: "C5", answer: "C", clef: "treble", step: 5 },
  { pitch: "D5", answer: "D", clef: "treble", step: 6 },
  { pitch: "E5", answer: "E", clef: "treble", step: 7 },
  { pitch: "F5", answer: "F", clef: "treble", step: 8 },
  { pitch: "G5", answer: "G", clef: "treble", step: 9 },
  { pitch: "A5", answer: "A", clef: "treble", step: 10 },
];

const NOTE_NAME_LABELS = {
  treble: {
    top: STAFF.trebleTop,
    lines: [
      { step: 0, letter: "E" },
      { step: 2, letter: "G" },
      { step: 4, letter: "B" },
      { step: 6, letter: "D" },
      { step: 8, letter: "F" },
    ],
    spaces: [
      { step: 1, letter: "F" },
      { step: 3, letter: "A" },
      { step: 5, letter: "C" },
      { step: 7, letter: "E" },
    ],
  },
  bass: {
    top: STAFF.bassTop,
    lines: [
      { step: 0, letter: "G" },
      { step: 2, letter: "B" },
      { step: 4, letter: "D" },
      { step: 6, letter: "F" },
      { step: 8, letter: "A" },
    ],
    spaces: [
      { step: 1, letter: "A" },
      { step: 3, letter: "C" },
      { step: 5, letter: "E" },
      { step: 7, letter: "G" },
    ],
  },
};

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function yForStep(top, step) {
  return top + STAFF.gap * 4 - step * (STAFF.gap / 2);
}

function stemDown(step) {
  return step > 4;
}

function getStem(x, y, step) {
  const down = stemDown(step);
  const stemX = down ? x - NOTE.rx + 0.5 : x + NOTE.rx - 0.5;
  const stemEndY = down ? y + NOTE.stemLength : y - NOTE.stemLength;
  return { down, stemX, stemEndY };
}

function accidentalForLetter(letter, accidentalsEnabled) {
  if (!accidentalsEnabled) return { answer: letter, accidental: null };
  const options = [{ answer: letter, accidental: null }];
  if (SHARPS[letter]) options.push({ answer: SHARPS[letter], accidental: "♯" });
  if (FLATS[letter]) options.push({ answer: FLATS[letter], accidental: "♭" });
  return randomItem(options);
}

function possibleQuestions(settings) {
  return NOTE_DATA.filter((note) => {
    const clefEnabled = (settings.treble && note.clef === "treble") || (settings.bass && note.clef === "bass");
    if (!clefEnabled) return false;
    if (settings.ledger) return true;
    return !LEDGER_BLOCKED[note.pitch];
  });
}

function createQuestion(settings, previousPitch = null) {
  const pool = possibleQuestions(settings);
  if (!pool.length) return null;

  let chosen = randomItem(pool);
  let guard = 0;
  while (pool.length > 1 && previousPitch && chosen.pitch === previousPitch && guard < 25) {
    chosen = randomItem(pool);
    guard += 1;
  }

  const accidental = accidentalForLetter(chosen.answer, settings.accidentals);
  return {
    id: Math.random().toString(36).slice(2),
    pitch: chosen.pitch,
    answer: accidental.answer,
    clef: chosen.clef,
    step: chosen.step,
    accidental: accidental.accidental,
  };
}

function playFeedbackSound(correct, celebration = false, medal = null) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;

  const context = new AudioContextClass();
  const master = context.createGain();
  const now = context.currentTime + 0.01;
  context.resume?.();
  master.gain.value = 0.18;
  master.connect(context.destination);

  function tone(freq, start, duration, type = "triangle", volume = 0.12) {
    const osc = context.createOscillator();
    const gain = context.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(master);
    osc.start(start);
    osc.stop(start + duration + 0.05);
  }

  function trumpet(freq, start, duration, volume = 0.1) {
    tone(freq, start, duration, "sawtooth", volume);
    tone(freq * 1.002, start, duration * 0.96, "square", volume * 0.32);
    tone(freq * 2, start, duration * 0.75, "triangle", volume * 0.16);
  }

  function medalPhrase(root, chord, start, beats = 4) {
    const beat = 0.6;
    const triplet = 0.13;
    const finalDuration = beats === 2 ? 0.72 : 1.95;
    chord.forEach((freq) => trumpet(freq, start, beats * beat, 0.045));
    trumpet(root, start, triplet, 0.11);
    trumpet(root, start + triplet, triplet, 0.11);
    trumpet(root, start + triplet * 2, triplet, 0.11);
    trumpet(root, start + 0.42, finalDuration, 0.13);
  }

  if (!correct) {
    tone(196, now, 0.32, "sawtooth", 0.06);
    tone(185, now + 0.04, 0.38, "triangle", 0.05);
    tone(174, now + 0.08, 0.45, "sine", 0.04);
  } else if (celebration) {
    if (medal === "bronze") medalPhrase(659.25, [329.63, 415.3, 493.88], now);
    if (medal === "silver") medalPhrase(739.99, [369.99, 466.16, 554.37], now);
    if (medal === "gold") medalPhrase(830.61, [415.3, 523.25, 622.25], now);
    if (medal === "platinum") {
      medalPhrase(739.99, [369.99, 466.16, 554.37], now, 2);
      medalPhrase(830.61, [415.3, 523.25, 622.25], now + 0.82, 2);
      medalPhrase(932.33, [466.16, 587.33, 698.46], now + 1.64, 4);
    }
  } else {
    randomItem([[523.25, 659.25, 783.99], [587.33, 739.99, 880], [659.25, 830.61, 987.77]]).forEach((freq, index) => {
      tone(freq, now + index * 0.045, 0.42, "triangle", index === 2 ? 0.085 : 0.07);
      tone(freq * 2, now + index * 0.045, 0.24, "sine", 0.025);
    });
  }

  window.setTimeout(() => {
    try {
      context.close();
    } catch {}
  }, medal === "platinum" ? 9000 : celebration ? 3500 : 900);
}

function LedgerLines({ x, step, clef, colour = "currentColor", enabled = true }) {
  if (!enabled) return null;
  const top = clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
  const lines = [];
  if (step <= -2) lines.push(yForStep(top, -2));
  if (step >= 10) lines.push(yForStep(top, 10));

  return (
    <g pointerEvents="none">
      {lines.map((y) => (
        <line key={y} x1={x - 27} x2={x + 27} y1={y} y2={y} stroke={colour} strokeWidth="1.5" />
      ))}
    </g>
  );
}

function Accidental({ accidental, x, y, colour = "currentColor" }) {
  if (!accidental) return null;
  const isSharp = accidental === "♯";
  return (
    <text
      x={isSharp ? x - 46 : x - 56}
      y={isSharp ? y + 16 : y + 13}
      fontSize="47"
      fontFamily="serif"
      fontWeight="900"
      fill={colour}
      stroke={colour}
      strokeWidth="0.6"
      pointerEvents="none"
    >
      {accidental}
    </text>
  );
}

function CrotchetNote({ note, colour = "currentColor", ledgerEnabled = true }) {
  if (!note) return null;
  const top = note.clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
  const x = NOTE.x;
  const y = yForStep(top, note.step);
  const stem = getStem(x, y, note.step);

  return (
    <g pointerEvents="none">
      <LedgerLines x={x} step={note.step} clef={note.clef} colour={colour} enabled={ledgerEnabled} />
      <Accidental accidental={note.accidental} x={x} y={y} colour={colour} />
      <ellipse cx={x} cy={y} rx={NOTE.rx} ry={NOTE.ry} transform={`rotate(-18 ${x} ${y})`} fill={colour} stroke={colour} strokeWidth="2.2" />
      <line x1={stem.stemX} x2={stem.stemX} y1={y} y2={stem.stemEndY} stroke={colour} strokeWidth="2" />
    </g>
  );
}

function Staff({ top, clef, visible }) {
  if (!visible) return null;
  const isTreble = clef === "treble";

  return (
    <g>
      {[0, 1, 2, 3, 4].map((line) => (
        <line key={line} x1={STAFF.left} x2={STAFF.right} y1={top + line * STAFF.gap} y2={top + line * STAFF.gap} stroke="currentColor" strokeWidth="1.5" />
      ))}
      <line x1={STAFF.right} x2={STAFF.right} y1={top} y2={top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.5" />
      <text
        x={STAFF.left + (isTreble ? 18 : 8)}
        y={top + (isTreble ? 58 : 48)}
        fontSize={isTreble ? 189 : 119}
        fontFamily="serif"
        dominantBaseline="middle"
      >
        {isTreble ? GLYPH.trebleClef : GLYPH.bassClef}
      </text>
    </g>
  );
}

function HelpLabels({ visible, settings }) {
  if (!visible) return null;
  const lineLabelX = STAFF.left - 11;
  const spaceLabelX = STAFF.left + 7;
  const entries = [];
  if (settings.treble) entries.push(["treble", NOTE_NAME_LABELS.treble]);
  if (settings.bass) entries.push(["bass", NOTE_NAME_LABELS.bass]);

  return (
    <g fontSize="14" fontFamily="system-ui, sans-serif" fontWeight="700" dominantBaseline="middle" pointerEvents="none" fill="black" textAnchor="middle">
      {entries.flatMap(([clef, data]) => [
        ...data.lines.map((note) => (
          <text key={`${clef}-line-${note.step}`} x={lineLabelX} y={yForStep(data.top, note.step) + 5}>
            {note.letter}
          </text>
        )),
        ...data.spaces.map((note) => (
          <text key={`${clef}-space-${note.step}`} x={spaceLabelX} y={yForStep(data.top, note.step) + 5}>
            {note.letter}
          </text>
        )),
      ])}
    </g>
  );
}

function ScoreArea({ question, settings, showHelp, feedback }) {
  const colour = feedback?.correct === true ? COLOUR.green : feedback?.correct === false ? COLOUR.red : "currentColor";

  return (
    <svg viewBox={`0 0 ${SVG.width} ${SVG.height}`} className="h-auto w-full select-none overflow-visible">
      <rect width={SVG.width} height={SVG.height} fill="white" />
      <Staff top={STAFF.trebleTop} clef="treble" visible={settings.treble} />
      <Staff top={STAFF.bassTop} clef="bass" visible={settings.bass} />
      <HelpLabels visible={showHelp} settings={settings} />
      <CrotchetNote note={question} colour={colour} ledgerEnabled={settings.ledger} />
    </svg>
  );
}

function getStreakMedal(streak) {
  if (streak >= 30) return { emoji: "💎", bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
  if (streak >= 20) return { emoji: "🥇", bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
  if (streak >= 15) return { emoji: "🥈", bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
  if (streak >= 10) return { emoji: "🥉", bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
  return null;
}

function StatCard({ label, value, footer, progress = null, medal = null, variant = "default", confettiKey = 0 }) {
  const safeProgress = progress == null ? null : clamp(progress, 0, 100);
  const fillHeight = safeProgress == null || safeProgress <= 0 ? 0 : safeProgress;
  const fillColour = safeProgress == null
    ? "transparent"
    : safeProgress < 50
      ? "rgba(220, 38, 38, 0.38)"
      : safeProgress < 70
        ? "rgba(255, 120, 0, 0.42)"
        : "rgba(22, 163, 74, 0.38)";
  const isStreak = variant === "streak";

  return (
    <div className={isStreak ? "relative overflow-visible bg-transparent p-3" : `relative overflow-hidden rounded-xl border border-stone-200 p-3 shadow-sm ${medal ? medal.bg : "bg-stone-50"}`}>
      {isStreak && confettiKey > 0 && (
        <div key={confettiKey} className="pointer-events-none absolute inset-0 z-20 overflow-visible">
          {Array.from({ length: 18 }).map((_, index) => (
            <span
              key={index}
              className="absolute block h-1.5 w-1 rounded-sm"
              style={{
                left: `${8 + ((index * 19) % 84)}%`,
                top: "-8px",
                backgroundColor: ["#facc15", "#38bdf8", "#fb7185", "#4ade80", "#a78bfa"][index % 5],
                animation: `confettiDrop ${0.85 + (index % 5) * 0.12}s ease-out forwards`,
                animationDelay: `${(index % 6) * 0.035}s`,
              }}
            />
          ))}
        </div>
      )}

      {safeProgress !== null && (
        <div className="absolute bottom-0 left-0 right-0 transition-all duration-700" style={{ height: `${fillHeight}%`, background: fillColour }} />
      )}

      <div className="relative z-10 text-center">
        <div className="text-xs uppercase tracking-wide text-stone-500">{label}</div>
        <div className={`text-xl font-semibold leading-tight ${isStreak && medal ? medal.text : ""}`}>{value}</div>
        {footer && <div className="mt-1 text-[13px] leading-none text-stone-500">{footer}</div>}
      </div>

      {isStreak && (
        <div className="pointer-events-none absolute -right-[12px] top-[12px] z-[999] select-none text-3xl leading-none" style={medal?.emoji ? { animation: "medalShine 1.4s ease-in-out infinite" } : { opacity: 0.16, filter: "grayscale(1) brightness(0.7)" }}>
          {medal?.emoji ?? "🥉"}
        </div>
      )}
    </div>
  );
}

function FeedbackBanner({ feedback, fading = false }) {
  if (!feedback) return null;

  return (
    <div className="relative flex w-full items-center justify-center text-center">
      <div className={`flex w-[300px] flex-col items-center justify-center whitespace-nowrap text-xl font-bold ${feedback.correct ? "text-green-600" : "text-red-600"}`} style={{ animation: fading ? "feedbackFadeOut .28s ease-out forwards" : feedback.correct ? "correctFade .55s ease-out forwards" : "incorrectDropShake .55s ease-out forwards" }}>
        <span className="translate-y-[4px]">{feedback.correct ? "Correct" : "Incorrect"}</span>
        {!feedback.correct && (
          <span className="mt-2 inline-flex -translate-x-[2px] items-center gap-0 text-sm font-semibold text-black">
            <TapIcon />
            <span>Click or tap anywhere to continue</span>
          </span>
        )}
      </div>
    </div>
  );
}

function TapIcon() {
  return (
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none" aria-hidden="true" className="shrink-0 translate-x-[6px]">
      <path d="M16 15.5v-8.2a1.7 1.7 0 0 1 3.4 0v8.2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
      <path d="M19.4 15.5v-3.2a1.55 1.55 0 0 1 3.1 0v5.4c0 4.2-2.7 7.3-6.9 7.3h-1.1c-2.1 0-3.2-.9-4.4-2.5l-2.5-3.4a1.55 1.55 0 0 1 2.4-1.95l1.8 1.85V15.5a1.7 1.7 0 0 1 3.4 0v2.2" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      <circle cx="17.7" cy="8" r="4.9" stroke="currentColor" strokeWidth="1.6" opacity="0.45" />
    </svg>
  );
}

function ToggleRow({ label, icon, checked, onChange }) {
  return (
    <button type="button" onClick={onChange} className="mb-2.5 flex min-h-[52px] w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-[14px] py-[10px]">
      <span className="flex min-w-[145px] items-center gap-2 text-sm font-semibold">
        <span className="flex h-[22px] w-[28px] items-center justify-center text-lg leading-none">{icon}</span>
        <span>{label}</span>
      </span>
      <span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${checked ? "bg-green-600" : "bg-stone-400"}`}>
        <span className={`h-4 w-4 rounded-full bg-white transition ${checked ? "translate-x-5" : "translate-x-0"}`} />
      </span>
    </button>
  );
}

function LedgerIcon() {
  return (
    <svg width="28" height="22" viewBox="0 0 38 24" aria-hidden="true">
      <line x1="5" x2="33" y1="12" y2="12" stroke="currentColor" strokeWidth="1.6" />
      <ellipse cx="19" cy="12" rx="7" ry="5" transform="rotate(-18 19 12)" fill="currentColor" />
    </svg>
  );
}

function MenuRows({ settings, setSettings, resetScore, makeNewQuestion, showHelp, setShowHelp }) {
  function updateSetting(key) {
    setSettings((current) => {
      const next = { ...current, [key]: !current[key] };
      if (!next.treble && !next.bass) {
        if (key === "treble") next.bass = true;
        else next.treble = true;
      }
      window.setTimeout(() => makeNewQuestion(next), 0);
      return next;
    });
  }

  return (
    <>
      <ToggleRow label="Accidentals" icon={<span className="relative left-px font-serif font-black">♯♭</span>} checked={settings.accidentals} onChange={() => updateSetting("accidentals")} />
      <ToggleRow label="Ledger Lines" icon={<LedgerIcon />} checked={settings.ledger} onChange={() => updateSetting("ledger")} />
      <ToggleRow label="Treble Clef" icon={<span className="font-serif text-3xl leading-none">𝄞</span>} checked={settings.treble} onChange={() => updateSetting("treble")} />
      <ToggleRow label="Bass Clef" icon={<span className="font-serif text-2xl leading-none">𝄢</span>} checked={settings.bass} onChange={() => updateSetting("bass")} />
      <ToggleRow label="Show Note Names" icon={<span className="text-[10px] font-black tracking-tight">abc</span>} checked={showHelp} onChange={() => setShowHelp((value) => !value)} />
      <button type="button" onClick={resetScore} className="mt-2.5 w-full rounded-xl border border-red-500 bg-white px-[18px] py-[10px] text-sm font-semibold text-red-600 hover:bg-red-50">↺ Reset score</button>
    </>
  );
}

function HelpPanel() {
  const [page, setPage] = useState(0);
  const pages = [
    ["Instructions", "Look at the note on the stave and choose its correct note name from the answer buttons below."],
    ["Accidentals", "When accidentals are switched on, the answer may include a sharp or flat. B sharp, E sharp, C flat, and F flat are not generated."],
    ["Ledger Lines", "Switch ledger lines on to include notes above and below the stave. Switch them off for a smaller note range."],
    ["Clefs", "Use the Customise menu to practise treble clef, bass clef, or both clefs together."],

  ];

  const [title, body] = pages[page];

  return (
    <div>
      <h2 className="mb-3 text-center text-base font-semibold">Help</h2>
      <div className="min-h-[120px] rounded-xl border border-stone-200 bg-stone-50 p-4">
        <h3 className="text-sm font-bold text-stone-800">{title}</h3>
        <p className="mt-2 text-sm leading-relaxed text-stone-700">{body}</p>
      </div>
      <div className="mt-3 flex items-center justify-between">
        <button type="button" onClick={() => setPage((value) => Math.max(0, value - 1))} disabled={page === 0} className="flex h-9 w-[46px] items-center justify-center rounded-xl border border-stone-300 bg-white text-lg font-bold text-stone-800 disabled:opacity-35">←</button>
        <div className="text-sm font-semibold text-stone-600">{page + 1} / {pages.length}</div>
        <button type="button" onClick={() => setPage((value) => Math.min(pages.length - 1, value + 1))} disabled={page === pages.length - 1} className="flex h-9 w-[46px] items-center justify-center rounded-xl border border-stone-300 bg-white text-lg font-bold text-stone-800 disabled:opacity-35">→</button>
      </div>
    </div>
  );
}

function AppIcon() {
  return (
    <div className="flex h-14 w-14 items-center justify-center overflow-hidden rounded-2xl border border-stone-200 bg-stone-50">
      <svg width="56" height="56" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        {[18, 22, 26, 30, 34].map((y) => (
          <line key={y} x1="4" x2="52" y1={y} y2={y} stroke="black" strokeWidth="1" opacity="0.75" />
        ))}
        <text x="18" y="31" fontSize="60" fontFamily="serif" fill="black" textAnchor="middle" dominantBaseline="middle">{GLYPH.trebleClef}</text>
        <text x="39" y="31" fontSize="40" fontFamily="serif" fill="black" textAnchor="middle" dominantBaseline="middle">{GLYPH.bassClef}</text>
      </svg>
    </div>
  );
}

function AnswerButton({ value, question, selectedAnswer, feedback, onChoose }) {
  const isCorrectAnswer = feedback && value === question?.answer;
  const isWrongSelected = feedback && value === selectedAnswer && value !== question?.answer;
  const className = isCorrectAnswer
    ? "border-green-600 bg-green-600 text-white"
    : isWrongSelected
      ? "border-red-600 bg-red-600 text-white"
      : "border-stone-300 bg-white text-stone-950 hover:bg-stone-100";

  return (
    <button
      type="button"
      disabled={Boolean(feedback)}
      onClick={() => onChoose(value)}
      className={`flex min-h-[46px] items-center justify-center rounded-xl border px-3 text-[1.05rem] font-bold ${className}`}
    >
      {value}
    </button>
  );
}

function AnswerPlaceholder() {
  return <div className="min-h-[46px] rounded-xl border border-transparent" />;
}

function AnswerGrid({ settings, question, selectedAnswer, feedback, onChoose }) {
  return (
    <div className="grid gap-2">
      {settings.accidentals && (
        <div className="grid grid-cols-7 gap-2">
          {LETTERS.map((letter) => SHARPS[letter]
            ? <AnswerButton key={SHARPS[letter]} value={SHARPS[letter]} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} />
            : <AnswerPlaceholder key={`sharp-placeholder-${letter}`} />)}
        </div>
      )}

      <div className="grid grid-cols-7 gap-2">
        {LETTERS.map((letter) => <AnswerButton key={letter} value={letter} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} />)}
      </div>

      {settings.accidentals && (
        <div className="grid grid-cols-7 gap-2">
          {LETTERS.map((letter) => FLATS[letter]
            ? <AnswerButton key={FLATS[letter]} value={FLATS[letter]} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={onChoose} />
            : <AnswerPlaceholder key={`flat-placeholder-${letter}`} />)}
        </div>
      )}
    </div>
  );
}

function useInjectedStyles() {
  useEffect(() => {
    if (document.getElementById("note-identification-golden-style")) return;
    const style = document.createElement("style");
    style.id = "note-identification-golden-style";
    style.innerHTML = `
      button { -webkit-tap-highlight-color: transparent; user-select: none; transition: transform 0.08s ease, filter 0.08s ease, background-color 0.12s ease, box-shadow 0.12s ease; cursor: pointer; }
      button:hover { transform: translateY(-1px) scale(1.01); filter: brightness(1.08); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
      button:active { transform: scale(0.96); filter: brightness(0.92); }
      button:disabled { cursor: not-allowed; opacity: 0.82; }
      button:focus-visible { outline: 2px solid rgba(22,163,74,0.35); outline-offset: 2px; }
      @keyframes medalShine { 0%,100% { transform: scale(1) rotate(-4deg); filter: drop-shadow(0 0 0 rgba(250,204,21,0)); } 50% { transform: scale(1.16) rotate(4deg); filter: drop-shadow(0 0 10px rgba(250,204,21,.9)); } }
      @keyframes confettiDrop { 0% { transform: translateY(-12px) rotate(0deg); opacity: 0; } 12% { opacity: 1; } 100% { transform: translateY(72px) rotate(260deg); opacity: 0; } }
      @keyframes incorrectDropShake { 0% { transform: translateY(-28px); opacity: 0; } 55% { transform: translateY(0); opacity: 1; } 68% { transform: translateX(-5px); } 78% { transform: translateX(5px); } 88% { transform: translateX(-3px); } 100% { transform: translateX(0); opacity: 1; } }
      @keyframes correctFade { 0% { transform: translateY(-18px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes feedbackFadeOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-10px); } }
    `;
    document.head.appendChild(style);
  }, []);
}

function useClickOutside(refs, handlers) {
  useEffect(() => {
    function onPointerDown(event) {
      refs.forEach((ref, index) => {
        if (!ref.current?.contains(event.target)) handlers[index]?.();
      });
    }
    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, [refs, handlers]);
}

function App() {
  useInjectedStyles();

  const [settings, setSettings] = useState({ accidentals: false, ledger: true, treble: true, bass: true });
  const [question, setQuestion] = useState(() => createQuestion({ accidentals: false, ledger: true, treble: true, bass: true }));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [showHelp, setShowHelp] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);

  const timerRef = useRef(null);
  const customiseRef = useRef(null);
  const helpRef = useRef(null);

  useClickOutside(
    [customiseRef, helpRef],
    [
      () => customiseOpen && setCustomiseOpen(false),
      () => helpOpen && setHelpOpen(false),
    ],
  );

  useEffect(() => {
    return () => window.clearTimeout(timerRef.current);
  }, []);

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const streakMedal = getStreakMedal(streak);

  function makeNewQuestion(nextSettings = settings) {
    window.clearTimeout(timerRef.current);
    setQuestionVisible(false);
    window.setTimeout(() => {
      setQuestion((current) => createQuestion(nextSettings, current?.pitch));
      setSelectedAnswer(null);
      setFeedback(null);
      setFeedbackFading(false);
      setQuestionVisible(true);
    }, 260);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    makeNewQuestion(settings);
  }

  function fadeToNextQuestion() {
    if (!feedback || feedback.correct || feedbackFading) return;
    setFeedbackFading(true);
    window.setTimeout(() => makeNewQuestion(settings), 280);
  }

  function scoreAnswer(answer) {
    if (!question || feedback) return;
    const isCorrect = answer === question.answer;
    const nextStreak = isCorrect ? streak + 1 : 0;

    window.clearTimeout(timerRef.current);
    setSelectedAnswer(answer);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });
    playFeedbackSound(isCorrect);

    if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }

    if (isCorrect) {
      timerRef.current = window.setTimeout(() => setFeedbackFading(true), 1700);
      timerRef.current = window.setTimeout(() => makeNewQuestion(settings), 2000);
    }
  }

  const instruction = settings.accidentals
    ? <>Identify the note shown. Choose the correct letter name, including the sharp or flat if shown.</>
    : <>Identify the note shown by choosing the correct note name.</>;

  return (
    <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2">
      <div className="mx-auto max-w-6xl">
        <header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm">
          <div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div className="flex items-center gap-4">
              <AppIcon />
              <div>
                <h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Note Identification</h1>
                <p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Identify note names in the treble and bass clef.</p>
              </div>
            </div>

            <div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end">
              <StatCard variant="score" label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${accuracy}%`} progress={accuracy} />
              <div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${streakMedal?.bg ?? "bg-stone-50"}`}>
                <StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${bestStreak}`} medal={streakMedal} confettiKey={confettiKey} />
                <div className="relative z-0 flex min-h-[52px] min-w-[64px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700">
                  <div className="flex items-center gap-1"><span>💎</span><span className="text-cyan-500">30</span></div>
                  <div className="mt-1">🥇 <span className="text-yellow-500">20</span></div>
                  <div className="mt-1">🥈 <span className="text-slate-500">15</span></div>
                  <div className="mt-1">🥉 <span className="text-amber-700">10</span></div>
                </div>
              </div>
            </div>
          </div>
        </header>

        <main
          className="relative -mt-[10px] min-h-[560px] overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-4 pt-[10px] shadow-sm md:h-auto md:min-h-0 md:overflow-visible md:px-6 md:pb-6 md:pt-[14px]"
          onPointerDown={() => {
            if (feedback && !feedback.correct) fadeToNextQuestion();
          }}
        >
          <div className="relative z-20 mb-2.5 flex flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-2">
              <div className="relative" ref={customiseRef}>
                <button type="button" onClick={() => setCustomiseOpen((value) => !value)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">⚙️ <span>Customise</span></button>
                {customiseOpen && (
                  <div className="absolute left-0 z-20 mt-2 w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg">
                    <h2 className="mb-3 text-center text-base font-semibold">Customise</h2>
                    <MenuRows settings={settings} setSettings={setSettings} resetScore={resetScore} makeNewQuestion={makeNewQuestion} showHelp={showHelp} setShowHelp={setShowHelp} />
                  </div>
                )}
              </div>

              <div className="relative" ref={helpRef}>
                <button type="button" onClick={() => setHelpOpen((value) => !value)} className="flex h-11 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">💡 <span>Help</span></button>
                {helpOpen && (
                  <div className="absolute left-0 top-12 z-20 w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg">
                    <HelpPanel />
                  </div>
                )}
              </div>
            </div>

            <button type="button" onClick={() => makeNewQuestion(settings)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800"><span>Skip Question</span><span className="text-lg leading-none">→</span></button>
            <div className="pointer-events-none absolute inset-x-0 top-1/2 z-30 flex -translate-y-1/2 justify-center overflow-visible"><FeedbackBanner feedback={feedback} fading={feedbackFading} /></div>
          </div>

          <div className={`relative -top-[55px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <ScoreArea question={question} settings={settings} showHelp={showHelp} feedback={feedback} />
          </div>

          <div className="relative z-10 mt-3 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-4 shadow-md md:-mt-[123px] md:mx-3">
            <div className="space-y-2 text-stone-900">
              <p className="text-base font-semibold leading-tight">{instruction}</p>
              {!question && <p className="text-sm font-medium text-red-700">No available notes. Enable at least one clef.</p>}
            </div>

            <div className="mt-4">
              <AnswerGrid settings={settings} question={question} selectedAnswer={selectedAnswer} feedback={feedback} onChoose={scoreAnswer} />
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
