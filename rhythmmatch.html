<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm Identification</title>
  <link rel="icon" type="image/svg+xml" href="https://mrtennant-music.github.io/musicliteracy/rhythm-groups-icon.svg" />
  <link rel="apple-touch-icon" href="https://mrtennant-music.github.io/musicliteracy/rhythm-groups-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./hub-ui.css?v=1.6" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="./bravura-symbols.js?v=20260629"></script>
  <script src="./shared-notation-config.js?v=20260629"></script>
  <script src="./hub-mobile.js?v=20260629"></script>
  <script src="./hub-audio.js?v=20260712-metronome-samples"></script>
  <script src="./hub-shell.js?v=20260712-profile-sharing"></script>
  <script src="./hub-menu.js?v=20260712-profile-sharing"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
  <style>
    @font-face {
      font-family: "Bravura";
      src: url("./Bravura.otf") format("opentype");
      font-display: block;
    }

    .music-symbol {
      font-family: "Bravura", serif;
      font-weight: 400;
      dominant-baseline: alphabetic;
      text-rendering: geometricPrecision;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;
const SHARED_CONFIG = typeof SHARED_NOTATION_CONFIG !== "undefined" ? SHARED_NOTATION_CONFIG : {};
const SHARED_SYMBOLS = typeof BRAVURA_SYMBOLS !== "undefined" ? BRAVURA_SYMBOLS : {};

const RHYTHMS = {
  semibreve: { label: "Semibreve", beats: "4", open: true, stem: false, dots: 0, rest: "semibreve-rest" },
  "dotted-minim": { label: "Dotted Minim", displayLabel: "Dotted\nMinim", beats: "3", open: true, stem: true, dots: 1, rest: "dotted-minim-rest" },
  minim: { label: "Minim", beats: "2", open: true, stem: true, dots: 0, rest: "minim-rest" },
  "dotted-crotchet": { label: "Dotted Crotchet", beats: "1.5", open: false, stem: true, dots: 1, rest: "dotted-crotchet-rest" },
  crotchet: { label: "Crotchet", beats: "1", open: false, stem: true, dots: 0, rest: "crotchet-rest" },
  "dotted-quaver": { label: "Dotted Quaver", beats: "0.75", open: false, stem: true, dots: 1, flag: true, beams: 1, rest: "dotted-quaver-rest" },
  quaver: { label: "Quaver", beats: "0.5", open: false, stem: true, dots: 0, flag: true, beams: 1, rest: "quaver-rest" },
  semiquaver: { label: "Semiquaver", beats: "0.25", open: false, stem: true, dots: 0, flag: true, beams: 2, rest: "semiquaver-rest" },
};

const RHYTHM_ORDER = ["semibreve", "dotted-minim", "minim", "dotted-crotchet", "crotchet", "dotted-quaver", "quaver", "semiquaver"];
const LEVELS = {
  N3: {
    label: "National 3",
    shortLabel: "N3",
    description: "Crotchet • Minim • Dotted minim • Semibreve",
    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve"],
    menuRhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve", "quaver"],
    includeRests: false,
  },
  N4: {
    label: "National 4",
    shortLabel: "N4",
    description: "Quaver • Semiquaver",
    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve", "quaver", "semiquaver"],
    includeRests: false,
  },
  N5: {
    label: "National 5",
    shortLabel: "N5",
    description: "Dotted crotchet • Dotted quaver",
    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve", "quaver", "semiquaver", "dotted-crotchet", "dotted-quaver"],
    includeRests: false,
  },
  H: {
    label: "Higher",
    shortLabel: "H",
    description: "Rests",
    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve", "quaver", "semiquaver", "dotted-crotchet", "dotted-quaver"],
    includeRests: true,
  },
};
const CARD_TYPES = ["name", "beats", "note", "rest"];
const CARD_TYPE_OPTIONS = [
  { id: "name", label: "Name", glyph: "ABC" },
  { id: "beats", label: "Duration", glyph: "123" },
  { id: "note", label: "Symbol", glyph: "crotchet" },
  { id: "rest", label: "Rest", glyph: "𝄽" },
];

function defaultCardTypesForLevel(levelKey) {
  const level = LEVELS[levelKey];
  return level?.includeRests ? [...CARD_TYPES] : ["name", "beats", "note"];
}

function sameOptions(left, right) {
  return left.length === right.length && left.every((item) => right.includes(item));
}

function matchingLevelForOptions(enabledRhythms, enabledCardTypes) {
  return Object.keys(LEVELS).find((levelKey) => (
    sameOptions(enabledRhythms, LEVELS[levelKey].rhythmIds)
    && sameOptions(enabledCardTypes, defaultCardTypesForLevel(levelKey))
  )) || "custom";
}

function menuRhythmsForLevel(activeLevel, enabledRhythms) {
  if (activeLevel !== "custom") return LEVELS[activeLevel]?.menuRhythmIds || LEVELS[activeLevel]?.rhythmIds || RHYTHM_ORDER;
  const matchingMenuLevel = Object.keys(LEVELS).find((levelKey) => {
    const choices = LEVELS[levelKey].menuRhythmIds || LEVELS[levelKey].rhythmIds;
    return enabledRhythms.every((rhythmId) => choices.includes(rhythmId));
  });
  return matchingMenuLevel ? LEVELS[matchingMenuLevel].menuRhythmIds || LEVELS[matchingMenuLevel].rhythmIds : enabledRhythms;
}

const ASSET = {
  appIcon: "rhythm-groups-icon.svg",
  levels: "levels.svg",
  customise: "customise.svg",
  restart: "restart.svg",
  next: "next.svg",
  bronze: "bronze.svg",
  silver: "silver.svg",
  gold: "gold.svg",
  diamond: "diamond.svg",
};

const LINE_GAP = 10;
const NOTE_RX = 7;

function shuffle(items) {
  const result = [...items];
  for (let i = result.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

function secondsToTime(totalSeconds) {
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  return `${minutes}:${String(seconds).padStart(2, "0")}`;
}

function medalLimits(activeRhythmCount, activeCardTypeCount = 4, levelKey = "") {
  if (levelKey === "N3") {
    return {
      diamond: 3,
      gold: 5,
      silver: 10,
      bronze: 15,
    };
  }

  if (levelKey === "N4") {
    return {
      diamond: 10,
      gold: 15,
      silver: 20,
      bronze: 25,
    };
  }

  if (levelKey === "N5") {
    return {
      diamond: 25,
      gold: 30,
      silver: 35,
      bronze: 40,
    };
  }

  if (levelKey === "H") {
    return {
      diamond: 45,
      gold: 50,
      silver: 55,
      bronze: 60,
    };
  }

  const removedCount = (7 - activeRhythmCount) + (4 - activeCardTypeCount);
  return {
    diamond: 30,
    gold: Math.max(0, 45 - removedCount * 10),
    silver: Math.max(0, 75 - removedCount * 10),
    bronze: Math.max(0, 105 - removedCount * 10),
  };
}

function medalForTime(seconds, activeRhythmCount, activeCardTypeCount = 4, levelKey = "") {
  const limits = medalLimits(activeRhythmCount, activeCardTypeCount, levelKey);
  if (seconds <= limits.diamond) return { emoji: "💎", icon: ASSET.diamond, bg: "bg-cyan-400/25", text: "text-cyan-500", label: "Diamond" };
  if (seconds <= limits.gold) return { emoji: "🥇", icon: ASSET.gold, bg: "bg-yellow-400/25", text: "text-yellow-500", label: "Gold" };
  if (seconds <= limits.silver) return { emoji: "🥈", icon: ASSET.silver, bg: "bg-slate-300/30", text: "text-slate-500", label: "Silver" };
  if (seconds <= limits.bronze) return { emoji: "🥉", icon: ASSET.bronze, bg: "bg-amber-700/20", text: "text-amber-700", label: "Bronze" };
  return null;
}

function medalRank(medal) {
  return { Bronze: 1, Silver: 2, Gold: 3, Diamond: 4 }[medal?.label] || 0;
}

function makeCards(enabledRhythms = [], enabledCardTypes = CARD_TYPES) {
  if (!Array.isArray(enabledRhythms) || !Array.isArray(enabledCardTypes)) return [];

  return enabledRhythms.flatMap((rhythmId) => {
    const rhythm = RHYTHMS[rhythmId];
    if (!rhythm) return [];

    const allCards = [
      { id: `${rhythmId}:name`, rhythmId, cardType: "name", type: "text", text: rhythm.displayLabel || rhythm.label },
      { id: `${rhythmId}:beats`, rhythmId, cardType: "beats", type: "text", text: rhythm.beats },
      { id: `${rhythmId}:note`, rhythmId, cardType: "note", type: "note", rhythmId },
      { id: `${rhythmId}:rest`, rhythmId, cardType: "rest", type: "rest", restType: rhythm.rest },
    ];

    return allCards.filter((card) => enabledCardTypes.includes(card.cardType));
  });
}

function groupSlotKeys(groupIndex, enabledCardTypes = CARD_TYPES) {
  return enabledCardTypes.map((_, cardIndex) => `group-${groupIndex}:slot-${cardIndex}`);
}

function getGroupCards(groupIndex, slots, cardsById, enabledCardTypes = CARD_TYPES) {
  return groupSlotKeys(groupIndex, enabledCardTypes).map((slotKey) => cardsById[slots[slotKey]]).filter(Boolean);
}

function isGroupComplete(groupIndex, slots, cardsById, enabledCardTypes = CARD_TYPES) {
  const cards = getGroupCards(groupIndex, slots, cardsById, enabledCardTypes);
  if (cards.length !== enabledCardTypes.length) return false;

  const rhythmId = cards[0]?.rhythmId;
  const sameRhythm = cards.every((card) => card.rhythmId === rhythmId);
  const typeSet = new Set(cards.map((card) => card.cardType));
  return sameRhythm && typeSet.size === enabledCardTypes.length && enabledCardTypes.every((cardType) => typeSet.has(cardType));
}

function makeGroups(enabledRhythms, enabledCardTypes, cards) {
  const cardsById = Object.fromEntries(cards.map((card) => [card.id, card]));
  const slots = {};
  const pageSize = 4;

  for (let startIndex = 0; startIndex < enabledRhythms.length; startIndex += pageSize) {
    const pageRhythms = enabledRhythms.slice(startIndex, startIndex + pageSize);
    const slotKeys = pageRhythms.flatMap((_, pageGroupIndex) => {
      const groupIndex = startIndex + pageGroupIndex;
      return enabledCardTypes.map((_, cardIndex) => `group-${groupIndex}:slot-${cardIndex}`);
    });
    const cardIds = cards.filter((card) => pageRhythms.includes(card.rhythmId)).map((card) => card.id);

    let pageSlots = null;
    for (let attempt = 0; attempt < 200; attempt += 1) {
      const shuffledCardIds = shuffle(cardIds);
      const attemptedSlots = Object.fromEntries(slotKeys.map((slotKey, index) => [slotKey, shuffledCardIds[index]]));
      const hasCompleteGroup = pageRhythms.some((_, pageGroupIndex) => isGroupComplete(startIndex + pageGroupIndex, attemptedSlots, cardsById, enabledCardTypes));
      if (!hasCompleteGroup) {
        pageSlots = attemptedSlots;
        break;
      }
    }

    if (pageSlots) {
      Object.assign(slots, pageSlots);
    } else {
      const fallbackCardIds = shuffle(cardIds);
      Object.assign(slots, Object.fromEntries(slotKeys.map((slotKey, index) => [slotKey, fallbackCardIds[index]])));
    }
  }

  return slots;
}

function slotToGroupIndex(slotKey) {
  return Number(slotKey.split(":")[0].replace("group-", ""));
}

function sharedActualSymbolKey(key) {
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  return key;
}

function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols || {};
  return symbols[key] || symbols[sharedActualSymbolKey(key)] || {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}

function sharedSymbolForKey(key) {
  return SHARED_SYMBOLS[sharedActualSymbolKey(key)] || "";
}

function calibratedPoint(symbolKey, x, y, lineGap = LINE_GAP, settingOverrides = {}) {
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  return {
    x: x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0),
    y: y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0),
    settings,
  };
}

function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", lineGap = LINE_GAP, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const { x: adjustedX, y: adjustedY, settings } = calibratedPoint(symbolKey, x, y, lineGap, settingOverrides);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);

  return (
    <text
      className="music-symbol"
      x={adjustedX}
      y={adjustedY}
      fill={colour}
      fontSize={fontSize}
      textAnchor="middle"
      transform={`translate(${adjustedX} ${adjustedY}) scale(${settings.widthScale || 1} ${settings.heightScale || 1}) translate(${-adjustedX} ${-adjustedY})`}
      pointerEvents="none"
    >
      {glyph}
    </text>
  );
}

function noteSymbolKey(rhythmId) {
  if (rhythmId === "semibreve") return "wholeNote";
  if (rhythmId === "minim" || rhythmId === "dotted-minim") return "halfNoteStemUp";
  if (rhythmId === "quaver" || rhythmId === "dotted-quaver") return "eighthNoteStemUp";
  if (rhythmId === "semiquaver") return "sixteenthNoteStemUp";
  return "quarterNoteStemUp";
}

function restSymbolKey(restType) {
  if (restType === "semibreve-rest") return "wholeRest";
  if (restType === "minim-rest" || restType === "dotted-minim-rest") return "halfRest";
  if (restType === "quaver-rest" || restType === "dotted-quaver-rest") return "eighthRest";
  if (restType === "semiquaver-rest") return "sixteenthRest";
  return "quarterRest";
}

function symbolY(systemTop) {
  return systemTop + LINE_GAP * 2;
}

function Note({ rhythmId, x = 45, systemTop = 18, colour = "currentColor" }) {
  const rhythm = RHYTHMS[rhythmId];
  if (!rhythm) return null;
  const y = symbolY(systemTop);
  const dotX = x + LINE_GAP * 1.3 + (rhythmId === "dotted-quaver" ? 7 : 0);
  return (
    <g>
      <CalibratedSymbol symbolKey={noteSymbolKey(rhythmId)} x={x} y={y} colour={colour} />
      {rhythm.dots ? <CalibratedSymbol symbolKey="augmentationDotLine" x={dotX} y={y - LINE_GAP * 0.25} colour={colour} /> : null}
    </g>
  );
}

function Rest({ restType, x = 45, systemTop = 18, colour = "currentColor" }) {
  const y = symbolY(systemTop) - (restType === "crotchet-rest" || restType === "dotted-crotchet-rest" ? 5 : 0);
  const specialRestGlyph = restType === "semibreve-rest" ? "\uE4F4" : restType === "minim-rest" || restType === "dotted-minim-rest" ? "\uE4F5" : "";
  return (
    <g>
      {specialRestGlyph ? (
        <text className="music-symbol" x={x} y={y} fill={colour} fontSize={LINE_GAP * 3.4} textAnchor="middle" dominantBaseline="middle" pointerEvents="none">{specialRestGlyph}</text>
      ) : (
        <CalibratedSymbol symbolKey={restSymbolKey(restType)} x={x} y={y} colour={colour} />
      )}
      {restType.startsWith("dotted-") ? <CalibratedSymbol symbolKey="augmentationDotSpace" x={x + LINE_GAP * 1.1} y={y - LINE_GAP * 0.35} colour={colour} /> : null}
    </g>
  );
}

function CardFace({ card }) {
  if (!card) return null;

  if (card.type === "note") {
    return (
      <svg draggable={false} viewBox="0 0 90 84" className="pointer-events-none h-[76px] w-[96px] translate-y-[12px] overflow-visible">
        <Note rhythmId={card.rhythmId} />
      </svg>
    );
  }

  if (card.type === "rest") {
    return (
      <svg draggable={false} viewBox="0 0 90 84" className="pointer-events-none h-[76px] w-[96px] translate-y-[4px] overflow-visible">
        <Rest restType={card.restType} />
      </svg>
    );
  }

  const isNumber = !Number.isNaN(Number(card.text));
  return <span draggable={false} className={`pointer-events-none whitespace-pre-line text-center font-semibold leading-tight text-black ${isNumber ? "text-xl" : "text-sm"}`}>{card.text}</span>;
}

function HeaderTimePanel({ elapsed, bestTime, bestMedal, onResetTime, activeRhythmCount, activeCardTypeCount, activeLevel, confettiKey = 0, medalDisabled = false }) {
  const [popover, setPopover] = useState(null);
  const ref = useRef(null);
  const limits = medalLimits(activeRhythmCount, activeCardTypeCount, activeLevel);
  useEffect(() => {
    const onPointerDown = (event) => {
      if (ref.current && !ref.current.contains(event.target)) setPopover(null);
    };
    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, []);

  useEffect(() => {
    if (!medalDisabled && confettiKey > 0) setPopover("best");
  }, [confettiKey, medalDisabled]);

  const tile = window.MLH.shell.scoreTileClass;
  const active = window.MLH.shell.scoreTileActiveClass;
  const medalStyle = medalDisabled
    ? { backgroundColor: "#f5f5f4" }
    : bestMedal
    ? { backgroundColor: bestMedal.bg?.includes("cyan") ? "rgba(34, 211, 238, .25)" : bestMedal.bg?.includes("yellow") ? "rgba(250, 204, 21, .25)" : bestMedal.bg?.includes("slate") ? "rgba(203, 213, 225, .3)" : "rgba(180, 83, 9, .2)" }
    : { backgroundColor: "#fafaf9" };
  const thresholds = [
    { icon: ASSET.bronze, label: "Bronze", value: limits.bronze, className: "text-amber-700", active: bestMedal?.label === "Bronze" },
    { icon: ASSET.silver, label: "Silver", value: limits.silver, className: "text-slate-500", active: bestMedal?.label === "Silver" },
    { icon: ASSET.gold, label: "Gold", value: limits.gold, className: "text-yellow-500", active: bestMedal?.label === "Gold" },
    { icon: ASSET.diamond, label: "Diamond", value: limits.diamond, className: "text-cyan-500", active: bestMedal?.label === "Diamond" },
  ];

  return (
    <div ref={ref} className="grid w-full grid-cols-2 gap-2 md:w-auto md:grid-cols-[112px_112px] lg:grid-cols-[124px_124px]">
      <section
        role="button"
        tabIndex="0"
        onPointerDown={(event) => event.stopPropagation()}
        onClick={() => setPopover((value) => value === "time" ? null : "time")}
        className={`${tile} ${popover === "time" ? active : ""}`}
      >
        <div className="relative z-10 flex h-full flex-col items-center justify-start pt-[7px] text-center sm:pt-[8px]">
          <div className="text-[12px] font-bold uppercase leading-none tracking-[0.08em] text-black sm:text-[11px]">Time</div>
          <div className="mt-[6px] text-[20px] font-black leading-none tracking-tight text-black sm:mt-[7px] sm:text-[22px]">{secondsToTime(elapsed)}</div>
        </div>
        {popover === "time" && (
          <button
            type="button"
            onClick={(event) => {
              event.stopPropagation();
              onResetTime();
              setPopover(null);
            }}
            className="fixed-popover-button score-reset-button absolute left-1/2 top-full z-[120] mt-2 flex w-full min-w-0 -translate-x-1/2 items-center justify-center rounded-xl border border-[#dc2626] bg-[#dc2626] px-3 py-2 text-sm font-semibold text-white shadow-[0_14px_34px_rgba(0,0,0,0.28)]"
            style={{ animation: "medalPopupIn .28s cubic-bezier(.22,1.25,.32,1)" }}
          >
            Reset
          </button>
        )}
      </section>
      <section
        role="button"
        tabIndex="0"
        onPointerDown={(event) => event.stopPropagation()}
        onClick={() => {
          if (!medalDisabled) setPopover((value) => value === "best" ? null : "best");
        }}
        className={`${tile} overflow-visible ${!medalDisabled && popover === "best" ? active : ""} ${medalDisabled ? "cursor-default opacity-45 grayscale" : ""}`}
        style={medalStyle}
      >
        <div className="pointer-events-none absolute inset-0 overflow-hidden rounded-xl">
          <div className="absolute inset-0 rounded-xl transition-colors duration-700" style={medalStyle} />
        </div>
        {!medalDisabled && confettiKey > 0 && (
          <div key={confettiKey} className="pointer-events-none absolute inset-0 z-20 overflow-visible">
            {Array.from({ length: 18 }).map((_, index) => (
              <span
                key={index}
                className="absolute block h-1.5 w-1 rounded-sm"
                style={{
                  left: `${8 + ((index * 19) % 84)}%`,
                  top: "-8px",
                  backgroundColor: ["#facc15", "#38bdf8", "#fb7185", "#4ade80", "#a78bfa"][index % 5],
                  animation: `confettiDrop ${0.85 + (index % 5) * 0.12}s ease-out forwards`,
                  animationDelay: `${(index % 6) * 0.035}s`,
                }}
              />
            ))}
          </div>
        )}
        <div className="relative z-10 flex h-full flex-col items-center justify-start pt-[7px] text-center sm:pt-[8px]">
          <div className="text-[11px] font-bold uppercase leading-none tracking-[0.08em] text-black sm:text-[10px]">Best Time</div>
          <div className={`mt-[6px] text-[20px] font-black leading-none tracking-tight sm:mt-[7px] sm:text-[22px] ${medalDisabled ? "text-stone-500" : bestMedal ? bestMedal.text : "text-black"}`}>{medalDisabled || bestTime == null ? "–" : secondsToTime(bestTime)}</div>
        </div>
        {!medalDisabled && popover === "best" && (
          <div
            className="fixed-popover-button absolute left-1/2 top-full z-[120] mt-2 flex w-full min-w-0 -translate-x-1/2 items-center justify-center rounded-xl border border-stone-200 bg-white px-2 py-3 text-[12px] leading-none text-stone-700 shadow-lg sm:text-[13px]"
            style={{ animation: "medalPopupIn .28s cubic-bezier(.22,1.25,.32,1)" }}
          >
            <div className="flex w-full items-end justify-center gap-3 sm:gap-1.5">
              {thresholds.map((item) => (
                <div key={item.label} className={`flex min-w-[34px] flex-col items-center justify-end sm:min-w-0 ${item.active ? "medal-threshold-active" : ""}`}>
                  <img src={item.icon} alt="" aria-hidden="true" className="h-[20px] w-[20px] object-contain" />
                  <span className={`mt-1 text-[10px] font-semibold leading-none ${item.className}`}>{secondsToTime(item.value)}</span>
                </div>
              ))}
            </div>
          </div>
        )}
      </section>
    </div>
  );
}

function RhythmToggleGlyph({ rhythmId }) {
  return (
    <span className="flex h-full w-[46px] items-center justify-center overflow-visible">
      <svg viewBox="0 0 90 84" className="block h-[48px] w-[62px] translate-y-[4px] overflow-visible">
        <Note rhythmId={rhythmId} />
      </svg>
    </span>
  );
}

function CardTypeGlyph({ cardType }) {
  if (cardType === "note") {
    return (
      <span className="-ml-[1px] flex h-9 w-[44px] items-center justify-center overflow-visible">
        <svg viewBox="0 0 90 84" className="block h-[50px] w-[56px] overflow-visible">
          <Note rhythmId="crotchet" systemTop={27} />
        </svg>
      </span>
    );
  }

  if (cardType === "rest") {
    return (
      <span className="-ml-[1px] flex h-9 w-[44px] items-center justify-center overflow-visible">
        <svg viewBox="0 0 90 84" className="block h-[50px] w-[56px] overflow-visible">
          <Rest restType="crotchet-rest" x={45} systemTop={23} />
        </svg>
      </span>
    );
  }

  const option = CARD_TYPE_OPTIONS.find((item) => item.id === cardType);
  return <span className="flex h-9 w-[38px] items-center justify-center text-[12px] font-bold leading-none text-stone-900">{option?.glyph ?? "?"}</span>;
}

function GlyphToggleButton({ label, active, disabled = false, onClick, glyph, showLabel = false, compact = false, labelShiftX = 0, glyphShiftY = 0 }) {
  const padding = showLabel ? "7px 46px 7px 6px" : compact ? "7px 32px 7px 2px" : "7px 48px 7px 6px";
  const glyphWidth = showLabel ? "w-[34px]" : compact ? "w-[26px]" : "w-[42px]";
  const trackScale = compact ? 0.72 : 0.84;
  const trackRight = compact ? "4px" : "8px";
  return (
    <button
      type="button"
      disabled={disabled}
      onClick={onClick}
      className={`hub-toggle-row ${showLabel ? "card-option-toggle" : ""}`}
      style={{ marginBottom: 0, minHeight: "48px", padding, overflow: "visible", position: "relative", justifyContent: "flex-start" }}
      aria-label={`Toggle ${label}`}
      title={label}
    >
      <span className={`flex h-full ${glyphWidth} items-center justify-center overflow-visible`} style={{ transform: `translate(4px, ${glyphShiftY}px)` }}>
        {glyph}
      </span>
      {showLabel && <span className="ml-1 min-w-0 flex-1 truncate text-left text-sm font-semibold leading-none text-stone-900" style={labelShiftX ? { transform: `translateX(${-labelShiftX}px)` } : null}>{label}</span>}
      <span className={`hub-toggle-track shrink-0 ${active ? "is-on" : ""}`} style={{ position: "absolute", right: trackRight, top: "50%", transform: `translateY(-50%) scale(${trackScale})`, transformOrigin: "center" }}>
        <span className="hub-toggle-thumb" />
      </span>
    </button>
  );
}

function MenuRows({ enabledRhythms, enabledCardTypes, activeLevel, onToggleRhythm, onToggleCardType }) {
  const visibleRhythms = menuRhythmsForLevel(activeLevel, enabledRhythms);
  return (
    <div style={{ width: "min(360px, calc(100vw - 4.5rem))" }}>
      <window.MLH.MenuSubheading>Card Options</window.MLH.MenuSubheading>
      <div className="grid grid-cols-2 gap-2">
        {CARD_TYPE_OPTIONS.map((option) => {
          const active = enabledCardTypes.includes(option.id);
          const disabled = active && enabledCardTypes.length <= 2;
          return (
            <GlyphToggleButton
              key={option.id}
              label={option.label}
              active={active}
              disabled={disabled}
              onClick={() => onToggleCardType(option.id)}
              glyph={<CardTypeGlyph cardType={option.id} />}
              showLabel
              labelShiftX={option.id === "beats" || option.id === "rest" ? 8 : option.id === "name" || option.id === "note" ? 5 : 0}
              glyphShiftY={option.id === "name" || option.id === "beats" ? 0 : 2}
            />
          );
        })}
      </div>

      <window.MLH.MenuSubheading>Rhythms</window.MLH.MenuSubheading>
      <div className="grid grid-cols-4 gap-2">
        {visibleRhythms.map((rhythmId) => {
          const active = enabledRhythms.includes(rhythmId);
          const disabled = active && enabledRhythms.length <= 4;
          return (
            <GlyphToggleButton
              key={rhythmId}
              label={RHYTHMS[rhythmId].label}
              active={active}
              disabled={disabled}
              onClick={() => onToggleRhythm(rhythmId)}
              glyph={<RhythmToggleGlyph rhythmId={rhythmId} />}
              compact
              glyphShiftY={2}
            />
          );
        })}
      </div>
    </div>
  );
}


function FeedbackBanner({ feedback, warning }) {
  if (warning) return <div className="text-center text-lg font-bold text-amber-700">{warning}</div>;
  return null;
}

function useGlobalStyles() {
  useEffect(() => {
    if (document.getElementById("rhythm-groups-clean-styles")) return;
    const style = document.createElement("style");
    style.id = "rhythm-groups-clean-styles";
    style.textContent = `
      button, [data-drag-card] { -webkit-tap-highlight-color: transparent; user-select: none; }
      [data-drag-card] { touch-action: none; }
      button { transition: transform .08s ease, filter .08s ease, background-color .12s ease, box-shadow .12s ease; }
      button:hover { transform: translateY(-1px) scale(1.01); filter: brightness(1.06); box-shadow: 0 6px 18px rgba(0,0,0,.08); }
      button:active { transform: scale(.96); }
      .rhythm-board-grid { grid-template-columns: repeat(var(--group-count), minmax(116px, 1fr)); min-width: 920px; }
      @keyframes medalShine { 0%, 100% { transform: translateY(3px) scale(1) rotate(-4deg); } 50% { transform: translateY(3px) scale(1.16) rotate(4deg); filter: drop-shadow(0 0 10px rgba(250,204,21,.9)); } }
      @keyframes swapPop { 0% { transform: scale(.96); } 55% { transform: scale(1.06); } 100% { transform: scale(1); } }
      @keyframes groupComplete { 0% { transform: scale(.985); filter: brightness(1); } 50% { transform: scale(1.025); filter: brightness(1.08); } 100% { transform: scale(1); filter: brightness(1); } }
      @media (max-width: 767px) {
        .card-option-toggle {
          padding-left: 14px !important;
        }
        .card-option-toggle > span:first-child {
          display: none;
        }
        .card-option-toggle > span:nth-child(2) {
          margin-left: 0;
          transform: none !important;
          text-align: left;
        }
        .rhythm-board-scroll.is-mobile-group-page { overflow-x: visible; }
        .rhythm-board-grid.is-mobile-group-page {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          min-width: 0;
        }
      }
    `;
    document.head.appendChild(style);
  }, []);
}

const playFeedbackSound = (...args) => window.MLH?.playFeedbackSound?.(...args);

function playGroupCompleteSound() {
  playFeedbackSound(true);
}

function isPhoneView() {
  return window.matchMedia?.("(max-width: 767px)")?.matches;
}

function usePhoneView() {
  const [phoneView, setPhoneView] = useState(() => isPhoneView());

  useEffect(() => {
    const mediaQuery = window.matchMedia?.("(max-width: 767px)");
    if (!mediaQuery) return undefined;
    const updatePhoneView = () => setPhoneView(mediaQuery.matches);
    updatePhoneView();
    mediaQuery.addEventListener?.("change", updatePhoneView);
    return () => mediaQuery.removeEventListener?.("change", updatePhoneView);
  }, []);

  return phoneView;
}

function RhythmGroupsLandscapeApp() {
  useGlobalStyles();
  const phoneView = usePhoneView();

  const requestedLevel = new URLSearchParams(window.location.search).get("level");
  const initialLevel = LEVELS[requestedLevel] ? requestedLevel : "N3";
  const initialCardTypes = LEVELS[initialLevel].includeRests ? [...CARD_TYPES] : ["name", "beats", "note"];
  const [activeLevel, setActiveLevel] = useState(initialLevel);
  const [enabledRhythms, setEnabledRhythms] = useState(() => [...LEVELS[initialLevel].rhythmIds]);
  const [enabledCardTypes, setEnabledCardTypes] = useState(() => [...initialCardTypes]);
  const initialCards = makeCards(LEVELS[initialLevel].rhythmIds, initialCardTypes);
  const [cards, setCards] = useState(() => Array.isArray(initialCards) ? initialCards : []);
  const cardsById = useMemo(() => Object.fromEntries((Array.isArray(cards) ? cards : []).map((card) => [card.id, card])), [cards]);
  const [slots, setSlots] = useState(() => makeGroups(LEVELS[initialLevel].rhythmIds, initialCardTypes, initialCards));
  const [dragState, setDragState] = useState(null);
  const [hoverSlotKey, setHoverSlotKey] = useState(null);
  const [selectedSlotKey, setSelectedSlotKey] = useState(null);
  const [mobileGroupPage, setMobileGroupPage] = useState(0);
  const [recentlySwapped, setRecentlySwapped] = useState([]);
  const [started, setStarted] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [bestTime, setBestTime] = useState(null);
  const [confettiKey, setConfettiKey] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [warning, setWarning] = useState("");
  const [levelOpen, setLevelOpen] = useState(false);
  const [customiseOpen, setCustomiseOpen] = useState(false);

  const dragStateRef = useRef(null);
  const warningTimerRef = useRef(null);
  const levelRef = useRef(null);
  const customiseRef = useRef(null);
  const completedRef = useRef(false);
  const previousLockedCountRef = useRef(0);
  const highestCelebratedMedalRankRef = useRef(0);

  const groupCount = enabledRhythms.length;
  const lockedGroups = useMemo(() => new Set(Array.from({ length: groupCount }, (_, index) => index).filter((groupIndex) => isGroupComplete(groupIndex, slots, cardsById, enabledCardTypes))), [groupCount, slots, cardsById, enabledCardTypes]);
  const success = lockedGroups.size === groupCount;
  const customLevelActive = activeLevel === "custom";
  const mobilePageSize = 4;
  const mobilePageCount = Math.max(1, Math.ceil(groupCount / mobilePageSize));
  const visibleGroupIndexes = useMemo(() => {
    const allGroupIndexes = Array.from({ length: groupCount }, (_, index) => index);
    return phoneView ? allGroupIndexes.slice(mobileGroupPage * mobilePageSize, mobileGroupPage * mobilePageSize + mobilePageSize) : allGroupIndexes;
  }, [groupCount, phoneView, mobileGroupPage]);
  const useMobileGroupGrid = phoneView;
  const useCompactHigherCards = phoneView && activeLevel === "H";
  const bestMedal = customLevelActive || bestTime == null ? null : medalForTime(bestTime, enabledRhythms.length, enabledCardTypes.length, activeLevel);
  useEffect(() => {
    if (!started || success) return undefined;
    const timer = window.setInterval(() => setElapsed((value) => value + 1), 1000);
    return () => window.clearInterval(timer);
  }, [started, success]);

  useEffect(() => {
    if (started && lockedGroups.size > previousLockedCountRef.current) {
      playGroupCompleteSound();
      navigator.vibrate?.(12);
    }
    previousLockedCountRef.current = lockedGroups.size;
  }, [lockedGroups, started]);

  useEffect(() => {
    if (!phoneView || success) return;
    const maxPage = Math.max(0, mobilePageCount - 1);
    if (mobileGroupPage > maxPage) {
      setMobileGroupPage(maxPage);
      return;
    }

    const pageComplete = visibleGroupIndexes.length > 0 && visibleGroupIndexes.every((groupIndex) => lockedGroups.has(groupIndex));
    if (pageComplete && mobileGroupPage < maxPage) {
      window.setTimeout(() => {
        setMobileGroupPage((page) => Math.min(page + 1, maxPage));
        setSelectedSlotKey(null);
      }, 360);
    }
  }, [phoneView, success, mobilePageCount, mobileGroupPage, visibleGroupIndexes, lockedGroups]);

  useEffect(() => {
    if (!success || completedRef.current) return;
    completedRef.current = true;
    setFeedback({ correct: true });
    if (!customLevelActive) setBestTime((currentBest) => (currentBest == null ? elapsed : Math.min(currentBest, elapsed)));
    const earnedMedal = customLevelActive ? null : medalForTime(elapsed, enabledRhythms.length, enabledCardTypes.length, activeLevel);
    const earnedMedalRank = medalRank(earnedMedal);
    const shouldCelebrateMedal = earnedMedalRank > highestCelebratedMedalRankRef.current;
    if (shouldCelebrateMedal) {
      highestCelebratedMedalRankRef.current = earnedMedalRank;
      setConfettiKey((value) => value + 1);
    }
    if (shouldCelebrateMedal && earnedMedal?.emoji === "💎") playFeedbackSound(true, true, "platinum");
    else if (shouldCelebrateMedal && earnedMedal?.emoji === "🥇") playFeedbackSound(true, true, "gold");
    else if (shouldCelebrateMedal && earnedMedal?.emoji === "🥈") playFeedbackSound(true, true, "silver");
    else if (shouldCelebrateMedal && earnedMedal?.emoji === "🥉") playFeedbackSound(true, true, "bronze");
    else playFeedbackSound(true);
  }, [success, elapsed, enabledRhythms.length, enabledCardTypes.length, customLevelActive, activeLevel]);

  useEffect(() => {
    const closeMenus = (event) => {
      if (event.target.closest?.("[data-menu-panel]") || event.target.closest?.("[data-menu-trigger]")) return;
      if (levelRef.current && !levelRef.current.contains(event.target)) setLevelOpen(false);
      if (customiseRef.current && !customiseRef.current.contains(event.target)) setCustomiseOpen(false);
    };
    document.addEventListener("click", closeMenus);
    return () => document.removeEventListener("click", closeMenus);
  }, []);

  function showWarning(message) {
    setWarning(message);
    if (warningTimerRef.current) clearTimeout(warningTimerRef.current);
    warningTimerRef.current = setTimeout(() => setWarning(""), 1800);
  }

  function beginIfNeeded() {
    if (!started) setStarted(true);
  }

  function rebuild(nextEnabledRhythms, nextEnabledCardTypes = enabledCardTypes) {
    const nextCards = makeCards(nextEnabledRhythms, nextEnabledCardTypes);
    setEnabledRhythms(nextEnabledRhythms);
    setEnabledCardTypes(nextEnabledCardTypes);
    setCards(nextCards);
    setSlots(makeGroups(nextEnabledRhythms, nextEnabledCardTypes, nextCards));
    setDragState(null);
    setHoverSlotKey(null);
    setSelectedSlotKey(null);
    setMobileGroupPage(0);
    setRecentlySwapped([]);
    dragStateRef.current = null;
    setStarted(false);
    setElapsed(0);
    setFeedback(null);
    setWarning("");
    completedRef.current = false;
    previousLockedCountRef.current = 0;
  }

  function restartGame() {
    rebuild(enabledRhythms, enabledCardTypes);
  }

  function resetTime() {
    setBestTime(null);
    setConfettiKey(0);
    highestCelebratedMedalRankRef.current = 0;
    restartGame();
  }

  function applyLevel(levelKey) {
    const level = LEVELS[levelKey] || LEVELS.N3;
    const safeCardTypes = defaultCardTypesForLevel(levelKey);
    setActiveLevel(levelKey);
    setBestTime(null);
    setConfettiKey(0);
    highestCelebratedMedalRankRef.current = 0;
    setLevelOpen(false);
    setCustomiseOpen(false);
    rebuild(level.rhythmIds, safeCardTypes);
  }

  function toggleRhythm(rhythmId) {
    const active = enabledRhythms.includes(rhythmId);
    if (active && enabledRhythms.length <= 4) return;
    const nextEnabledRhythms = active ? enabledRhythms.filter((id) => id !== rhythmId) : RHYTHM_ORDER.filter((id) => [...enabledRhythms, rhythmId].includes(id));
    setActiveLevel(matchingLevelForOptions(nextEnabledRhythms, enabledCardTypes));
    rebuild(nextEnabledRhythms, enabledCardTypes);
  }

  function toggleCardType(cardType) {
    const active = enabledCardTypes.includes(cardType);
    if (active && enabledCardTypes.length <= 2) return;
    const nextEnabledCardTypes = active ? enabledCardTypes.filter((id) => id !== cardType) : CARD_TYPES.filter((id) => [...enabledCardTypes, cardType].includes(id));
    setActiveLevel(matchingLevelForOptions(enabledRhythms, nextEnabledCardTypes));
    rebuild(enabledRhythms, nextEnabledCardTypes);
  }

  function canMoveSlot(slotKey) {
    const groupIndex = slotToGroupIndex(slotKey);
    return !lockedGroups.has(groupIndex) && !success;
  }

  function swapSlots(sourceSlotKey, targetSlotKey) {
    if (!sourceSlotKey || !targetSlotKey || sourceSlotKey === targetSlotKey) return;
    if (!canMoveSlot(sourceSlotKey) || !canMoveSlot(targetSlotKey)) return;
    beginIfNeeded();
    setFeedback(null);
    setSelectedSlotKey(null);
    setRecentlySwapped([sourceSlotKey, targetSlotKey]);
    navigator.vibrate?.(10);
    window.setTimeout(() => setRecentlySwapped([]), 260);
    setSlots((currentSlots) => {
      const nextSlots = { ...currentSlots };
      const sourceCard = nextSlots[sourceSlotKey];
      nextSlots[sourceSlotKey] = nextSlots[targetSlotKey];
      nextSlots[targetSlotKey] = sourceCard;
      return nextSlots;
    });
  }

  function selectSlotOnPhone(event, slotKey, cardId) {
    if (!cardId || !canMoveSlot(slotKey)) return;
    event.preventDefault();
    event.stopPropagation();
    navigator.vibrate?.(8);
    if (!selectedSlotKey) {
      setSelectedSlotKey(slotKey);
      return;
    }
    if (selectedSlotKey === slotKey) {
      setSelectedSlotKey(null);
      return;
    }
    if (!canMoveSlot(selectedSlotKey)) {
      setSelectedSlotKey(slotKey);
      return;
    }
    swapSlots(selectedSlotKey, slotKey);
  }

  function startPointerDrag(event, slotKey, cardId) {
    if (isPhoneView()) {
      selectSlotOnPhone(event, slotKey, cardId);
      return;
    }
    if (!cardId || !canMoveSlot(slotKey)) return;
    event.preventDefault();
    event.stopPropagation();
    const nextDragState = { sourceSlotKey: slotKey, cardId, x: event.clientX, y: event.clientY };
    navigator.vibrate?.(8);
    dragStateRef.current = nextDragState;
    setDragState(nextDragState);
    event.currentTarget.setPointerCapture?.(event.pointerId);
  }

  function movePointerDrag(event) {
    if (isPhoneView()) return;
    if (!dragStateRef.current) return;
    const nextDragState = { ...dragStateRef.current, x: event.clientX, y: event.clientY };
    dragStateRef.current = nextDragState;
    setDragState(nextDragState);
    const targetElement = document.elementFromPoint(event.clientX, event.clientY);
    const targetSlotKey = targetElement?.closest?.("[data-slot-key]")?.getAttribute("data-slot-key");
    setHoverSlotKey(targetSlotKey && targetSlotKey !== nextDragState.sourceSlotKey ? targetSlotKey : null);
  }

  function endPointerDrag(event) {
    if (isPhoneView()) return;
    const currentDrag = dragStateRef.current;
    if (!currentDrag) return;
    const targetElement = document.elementFromPoint(event.clientX, event.clientY);
    const targetSlotKey = targetElement?.closest?.("[data-slot-key]")?.getAttribute("data-slot-key");
    if (targetSlotKey) swapSlots(currentDrag.sourceSlotKey, targetSlotKey);
    dragStateRef.current = null;
    setDragState(null);
    setHoverSlotKey(null);
  }

  function cancelPointerDrag() {
    dragStateRef.current = null;
    setDragState(null);
    setHoverSlotKey(null);
    setSelectedSlotKey(null);
  }

  return (
    <div className={window.MLH.shell.pageShellClass}>
      <window.MLH.AppHeader icon={ASSET.appIcon} title="Rhythm Identification" subtitle="Identify and group matching rhythms.">
        <HeaderTimePanel elapsed={elapsed} bestTime={bestTime} bestMedal={bestMedal} onResetTime={resetTime} activeRhythmCount={enabledRhythms.length} activeCardTypeCount={enabledCardTypes.length} activeLevel={activeLevel} confettiKey={confettiKey} medalDisabled={customLevelActive} />
      </window.MLH.AppHeader>

      <div className={window.MLH.shell.pageContentClass}>
        <main className={`${window.MLH.shell.mainShellClass} flex flex-col pb-5 md:pb-6`}>
          <window.MLH.AppToolbar
            left={
              <div className="flex items-center gap-2">
                <div className="hub-menu-anchor relative" ref={levelRef}>
                  <window.MLH.LevelButton
                    icon={<img src={ASSET.levels} alt="" aria-hidden="true" className="h-[26.6px] w-[26.6px] object-contain" />}
                    activeLevel={activeLevel === "custom" ? "Custom" : LEVELS[activeLevel].shortLabel}
                    activeLabel={activeLevel === "custom" ? "Custom" : LEVELS[activeLevel].label}
                    isCustom={activeLevel === "custom"}
                    onClick={() => {
                      setCustomiseOpen(false);
                      setLevelOpen((value) => !value);
                    }}
                    dataMenuTrigger={true}
                  />
                  {levelOpen && (
                    <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}>
                      <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                    </window.MLH.MenuPanel>
                  )}
                </div>
                <div className="hub-menu-anchor relative" ref={customiseRef}>
                <window.MLH.CustomiseButton
                  icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26.6px] w-[26.6px] object-contain" />}
                  onClick={() => {
                    setLevelOpen(false);
                    setCustomiseOpen((value) => !value);
                  }}
                  dataMenuTrigger={true}
                />
                {customiseOpen ? (
                  <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}>
                    <MenuRows enabledRhythms={enabledRhythms} enabledCardTypes={enabledCardTypes} activeLevel={activeLevel} onToggleRhythm={toggleRhythm} onToggleCardType={toggleCardType} />
                  </window.MLH.MenuPanel>
                ) : null}
                </div>
              </div>
            }
            feedback={<FeedbackBanner feedback={feedback} warning={warning} />}
            right={
              <button type="button" onClick={restartGame} className={`${window.MLH.ToolbarButtonClass} w-auto shrink-0 gap-1 px-4`}>
                <span>Restart</span>
                <img src={ASSET.restart} alt="" aria-hidden="true" className="h-[26.6px] w-[26.6px] object-contain" />
              </button>
            }
          />

          <div className={`rhythm-board-scroll mt-4 overflow-x-auto px-2 py-3 ${useMobileGroupGrid ? "is-mobile-group-page" : ""}`}>
            <div className={`rhythm-board-grid grid gap-3 ${useMobileGroupGrid ? "is-mobile-group-page" : ""}`} style={{ "--group-count": groupCount }}>
              {visibleGroupIndexes.map((groupIndex) => {
                const locked = lockedGroups.has(groupIndex);
                return (
                  <div key={groupIndex} className={`flex flex-col gap-2 rounded-2xl border-2 p-2 shadow-sm transition-all duration-300 ease-out ${locked ? "animate-[groupComplete_.32s_ease-out] border-green-500 bg-green-50 opacity-65" : "border-stone-200 bg-stone-50"}`}>
                    {groupSlotKeys(groupIndex, enabledCardTypes).map((slotKey) => {
                      const card = cardsById[slots[slotKey]];
                      const isDragging = dragState?.sourceSlotKey === slotKey;
                      const isHoverTarget = hoverSlotKey === slotKey;
                      const isTapSelected = selectedSlotKey === slotKey;
                      const didJustSwap = recentlySwapped.includes(slotKey);
                      return (
                        <div
                          key={slotKey}
                          data-slot-key={slotKey}
                          onPointerDown={(event) => startPointerDrag(event, slotKey, slots[slotKey])}
                          onPointerMove={movePointerDrag}
                          onPointerUp={endPointerDrag}
                          onPointerCancel={cancelPointerDrag}
                          className={`flex ${useCompactHigherCards ? "h-[54px]" : "h-[70px]"} touch-none items-center justify-center rounded-xl border-2 bg-white p-1 shadow-sm transition-all duration-200 ease-out ${locked ? "cursor-default border-green-500 bg-green-50" : "cursor-grab border-stone-300 active:cursor-grabbing"} ${isHoverTarget || isTapSelected ? "scale-[1.035] border-black bg-stone-100 shadow-lg ring-2 ring-black/20" : ""} ${didJustSwap ? "animate-[swapPop_.24s_ease-out]" : ""}`}
                        >
                          <div className={`flex h-full w-full items-center justify-center transition-opacity duration-150 ${isDragging ? "opacity-55" : ""}`}>
                            <CardFace card={card} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        </main>
      </div>

      {dragState ? (
        <div
          className="pointer-events-none fixed z-[9999] flex h-[70px] w-[116px] rotate-[1.5deg] scale-[1.06] items-center justify-center rounded-xl border-2 border-black bg-white p-1 text-center shadow-2xl ring-2 ring-black/20 transition-transform duration-75"
          style={{ left: dragState.x - 58, top: dragState.y - 35 }}
        >
          <CardFace card={cardsById[dragState.cardId]} />
        </div>
      ) : null}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RhythmGroupsLandscapeApp />);

  </script>
