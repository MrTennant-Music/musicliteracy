<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Barlines</title>
  <link rel="icon" type="image/svg+xml" href="https://mrtennant-music.github.io/musicliteracy/barlines-icon.svg" />
  <link rel="apple-touch-icon" href="https://mrtennant-music.github.io/musicliteracy/barlines-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const VIEWBOX_WIDTH = 920;
const VIEWBOX_HEIGHT = 280;
const STAFF_LEFT = 24;
const STAFF_RIGHT = 896;
const SYSTEM_TOPS_ONE_LINE = [82];
const SYSTEM_TOPS_TWO_LINES = [42, 182];
const LINE_GAP = 10;
const NOTE_RX = 6.3;
const NOTE_RY = 4.6;
const STEM_LENGTH = 32;
const TOTAL_BARS = 4;
const TREBLE_CLEF = String.fromCodePoint(0x1d11e);

const COLOUR = { green: "#16a34a", red: "#dc2626", black: "#000000" };

const NOTES = [
  { name: "C4", step: -2 }, { name: "D4", step: -1 }, { name: "E4", step: 0 },
  { name: "F4", step: 1 }, { name: "G4", step: 2 }, { name: "A4", step: 3 },
  { name: "B4", step: 4 }, { name: "C5", step: 5 }, { name: "D5", step: 6 },
  { name: "E5", step: 7 }, { name: "F5", step: 8 }, { name: "G5", step: 9 },
  { name: "A5", step: 10 },
];

const TIME_SIGNATURES = [
  { id: "2/4", top: "2", bottom: "4", unitsPerBar: 8, type: "simple", weight: 1 },
  { id: "3/4", top: "3", bottom: "4", unitsPerBar: 12, type: "simple", weight: 1 },
  { id: "4/4", top: "4", bottom: "4", unitsPerBar: 16, type: "simple", weight: 1 },
  { id: "6/8", top: "6", bottom: "8", unitsPerBar: 12, type: "compound", compoundGroups: 2, weight: 1 },
  { id: "9/8", top: "9", bottom: "8", unitsPerBar: 18, type: "compound", compoundGroups: 3, weight: 0.75 },
  { id: "12/8", top: "12", bottom: "8", unitsPerBar: 24, type: "compound", compoundGroups: 4, weight: 0.4 },
];

const RHYTHM_INFO = {
  semibreve: { units: 16, beats: 4, spacing: 8, open: true, stem: false, dots: 0 },
  "dotted-minim": { units: 12, beats: 3, spacing: 6, open: true, stem: true, dots: 1 },
  minim: { units: 8, beats: 2, spacing: 4, open: true, stem: true, dots: 0 },
  "dotted-crotchet": { units: 6, beats: 1.5, spacing: 3, open: false, stem: true, dots: 1 },
  crotchet: { units: 4, beats: 1, spacing: 2.2, open: false, stem: true, dots: 0 },
  quaver: { units: 2, beats: 0.5, spacing: 1.15, open: false, stem: true, dots: 0, flag: true, beams: 1 },
  "dotted-quaver": { units: 3, beats: 0.75, spacing: 1.5, open: false, stem: true, dots: 1, flag: true, beams: 1 },
  semiquaver: { units: 1, beats: 0.25, spacing: 0.72, open: false, stem: true, dots: 0, flag: true, beams: 2 },
  "semibreve-rest": { units: 999, beats: 4, spacing: 8, rest: true },
  "minim-rest": { units: 8, beats: 2, spacing: 4, rest: true },
  "dotted-crotchet-rest": { units: 6, beats: 1.5, spacing: 3, rest: true },
  "crotchet-rest": { units: 4, beats: 1, spacing: 2.2, rest: true },
  "quaver-rest": { units: 2, beats: 0.5, spacing: 1.15, rest: true },
};

const RHYTHM_OPTIONS = [
  { id: "semibreve", label: "Semibreve" },
  { id: "dotted-minim", label: "Dotted Minim" },
  { id: "minim", label: "Minim" },
  { id: "dotted-crotchet", label: "Dotted Crotchet" },
  { id: "crotchet", label: "Crotchet" },
  { id: "quaver", label: "Quaver" },
  { id: "semiquaver", label: "Semiquaver" },
];

const DEFAULT_ENABLED_RHYTHMS = RHYTHM_OPTIONS.reduce((result, item) => {
  result[item.id] = true;
  return result;
}, {});

const SIMPLE_FULL_BAR_PATTERNS = {
  "2/4": [
    ["minim"], ["crotchet", "crotchet"], ["quaver-group-2", "crotchet"], ["crotchet", "quaver-group-2"],
    ["quaver-group-2", "quaver-group-2"], ["semiquaver-group-4", "semiquaver-group-4"], ["semiquaver-group-4", "crotchet"], ["crotchet", "semiquaver-group-4"],
    ["quaver-2semiquavers", "crotchet"], ["2semiquavers-quaver", "crotchet"], ["dotted-quaver-semiquaver", "crotchet"],
    ["dotted-crotchet", "quaver"], ["quaver", "dotted-crotchet"], ["crotchet-rest", "crotchet"],
    ["crotchet", "crotchet-rest"], ["quaver-rest", "quaver", "crotchet"],
  ],
  "3/4": [
    ["dotted-minim"], ["minim", "crotchet"], ["crotchet", "minim"], ["crotchet", "crotchet", "crotchet"],
    ["quaver-group-2", "crotchet", "crotchet"], ["crotchet", "quaver-group-2", "crotchet"], ["crotchet", "crotchet", "quaver-group-2"],
    ["semiquaver-group-4", "semiquaver-group-4", "semiquaver-group-4"], ["semiquaver-group-4", "crotchet", "crotchet"], ["crotchet", "semiquaver-group-4", "crotchet"],
    ["dotted-crotchet", "quaver", "crotchet"], ["crotchet", "dotted-crotchet", "quaver"],
    ["crotchet-rest", "crotchet", "crotchet"], ["crotchet", "crotchet-rest", "crotchet"], ["crotchet", "crotchet", "crotchet-rest"],
  ],
  "4/4": [
    ["semibreve"], ["minim", "minim"], ["minim", "crotchet", "crotchet"], ["crotchet", "crotchet", "minim"],
    ["crotchet", "crotchet", "crotchet", "crotchet"], ["quaver-group-2", "crotchet", "crotchet", "crotchet"],
    ["crotchet", "quaver-group-2", "crotchet", "crotchet"], ["crotchet", "crotchet", "quaver-group-2", "crotchet"],
    ["quaver-group-2", "quaver-group-2", "minim"], ["semiquaver-group-4", "semiquaver-group-4", "semiquaver-group-4", "semiquaver-group-4"], ["semiquaver-group-4", "crotchet", "crotchet", "crotchet"],
    ["crotchet", "quaver-2semiquavers", "crotchet", "crotchet"], ["crotchet", "crotchet", "2semiquavers-quaver", "crotchet"],
    ["dotted-crotchet", "quaver", "minim"], ["minim", "dotted-crotchet", "quaver"], ["semibreve-rest"],
    ["minim-rest", "minim"], ["crotchet", "crotchet-rest", "minim"],
  ],
};

const COMPOUND_BEAT_PATTERNS = [
  { pattern: ["dotted-crotchet"], weight: 4 },
  { pattern: ["crotchet", "quaver"], weight: 4 },
  { pattern: ["quaver", "crotchet"], weight: 4 },
  { pattern: ["quaver-group-3"], weight: 1 },
  { pattern: ["dotted-crotchet-rest"], weight: 1 },
];

function randomIndex(length) { return Math.floor(Math.random() * length); }
function randomItem(items) { return items[randomIndex(items.length)]; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function rhythmInfo(rhythm) { return RHYTHM_INFO[rhythm] || RHYTHM_INFO.crotchet; }
function noteByIndex(index) { return NOTES[clamp(index, 0, NOTES.length - 1)]; }
function yForStep(step, systemTop) { return systemTop + LINE_GAP * 4 - step * (LINE_GAP / 2); }
function stemGoesDown(step) { return step > 4; }
function weightedItem(items) {
  const pool = [];
  items.forEach((item) => {
    for (let i = 0; i < item.weight; i += 1) pool.push(item.pattern);
  });
  return randomItem(pool);
}

function signatureCanBeGenerated(signature, enabledRhythms, restsEnabled) {
  if (signature.type === "simple") {
    const patterns = SIMPLE_FULL_BAR_PATTERNS[signature.id] || [];
    return patterns.some((pattern) => patternAllowed(pattern, enabledRhythms, restsEnabled));
  }
  return COMPOUND_BEAT_PATTERNS.some((item) => patternAllowed(item.pattern, enabledRhythms, restsEnabled));
}

function weightedSignatureChoice(enabledTimeTypes, enabledRhythms, restsEnabled) {
  const available = TIME_SIGNATURES.filter((signature) => enabledTimeTypes[signature.type] && signatureCanBeGenerated(signature, enabledRhythms, restsEnabled));
  const source = available.length ? available : TIME_SIGNATURES.filter((signature) => signatureCanBeGenerated(signature, enabledRhythms, restsEnabled));
  const safeSource = source.length ? source : TIME_SIGNATURES.filter((signature) => enabledTimeTypes[signature.type]);
  const pool = [];
  safeSource.forEach((signature) => {
    const copies = Math.max(1, Math.round((signature.weight || 1) * 10));
    for (let i = 0; i < copies; i += 1) pool.push(signature);
  });
  return randomItem(pool);
}

function nearestMelodicIndex(previousIndex, stepwise) {
  if (!stepwise) return clamp(previousIndex + randomItem([-2, -1, 0, 0, 1, 2]), 0, NOTES.length - 1);
  if (previousIndex <= 0) return 1;
  if (previousIndex >= NOTES.length - 1) return NOTES.length - 2;
  return previousIndex + randomItem([-1, 1]);
}

function expandRhythmToken(token) {
  if (token === "quaver-group-2") return ["quaver", "quaver"];
  if (token === "quaver-group-3") return ["quaver", "quaver", "quaver"];
  if (token === "semiquaver-group-4") return ["semiquaver", "semiquaver", "semiquaver", "semiquaver"];
  if (token === "quaver-2semiquavers") return ["quaver", "semiquaver", "semiquaver"];
  if (token === "2semiquavers-quaver") return ["semiquaver", "semiquaver", "quaver"];
  if (token === "dotted-quaver-semiquaver") return ["dotted-quaver", "semiquaver"];
  return [token];
}

function shouldExplicitlyBeam(token) {
  return ["quaver-group-2", "quaver-group-3", "semiquaver-group-4", "quaver-2semiquavers", "2semiquavers-quaver", "dotted-quaver-semiquaver"].includes(token);
}

function rhythmAllowed(rhythm, enabledRhythms, restsEnabled) {
  if (!restsEnabled && rhythmInfo(rhythm).rest) return false;
  if (rhythm === "semibreve-rest") return !!enabledRhythms.semibreve;
  if (rhythm === "minim-rest") return !!enabledRhythms.minim;
  if (rhythm === "dotted-crotchet-rest") return !!enabledRhythms["dotted-crotchet"];
  if (rhythm === "crotchet-rest") return !!enabledRhythms.crotchet;
  if (rhythm === "quaver-rest") return !!enabledRhythms.quaver;
  if (rhythm === "dotted-quaver") return !!enabledRhythms.quaver;
  return !!enabledRhythms[rhythm];
}

function tokenAllowed(token, enabledRhythms, restsEnabled) {
  return expandRhythmToken(token).every((rhythm) => rhythmAllowed(rhythm, enabledRhythms, restsEnabled));
}

function patternAllowed(pattern, enabledRhythms, restsEnabled) {
  return pattern.every((token) => tokenAllowed(token, enabledRhythms, restsEnabled));
}

function chooseSimplePattern(timeSignature, enabledRhythms, restsEnabled) {
  const allPatterns = SIMPLE_FULL_BAR_PATTERNS[timeSignature.id] || SIMPLE_FULL_BAR_PATTERNS["4/4"];
  const filtered = allPatterns.filter((pattern) => patternAllowed(pattern, enabledRhythms, restsEnabled));
  return filtered.length ? randomItem(filtered) : null;
}

function buildCompoundBar(timeSignature, enabledRhythms, restsEnabled) {
  const allowed = COMPOUND_BEAT_PATTERNS.filter((item) => patternAllowed(item.pattern, enabledRhythms, restsEnabled));
  if (!allowed.length) return null;
  const groups = [];
  for (let i = 0; i < timeSignature.compoundGroups; i += 1) groups.push(weightedItem(allowed));
  return groups.flat();
}

function addItemsFromRhythms(rhythms, previousIndex, options) {
  const items = [];
  let noteIndex = previousIndex;
  let beamGroupCounter = 0;
  rhythms.forEach((token) => {
    const expanded = expandRhythmToken(token);
    const beamed = shouldExplicitlyBeam(token) && expanded.length > 1;
    const beamGroupId = beamed ? `beam-${beamGroupCounter++}` : undefined;
    expanded.forEach((rhythm) => {
      const info = rhythmInfo(rhythm);
      if (info.rest) {
        items.push({ rhythm, isRest: true, beamGroupId: null, boundaryAfter: true });
        return;
      }
      const stepwise = ["quaver", "semiquaver", "dotted-quaver"].includes(rhythm);
      noteIndex = nearestMelodicIndex(noteIndex, stepwise);
      items.push({ rhythm, pitch: noteByIndex(noteIndex), beamGroupId: options.disableAutoBeam && !beamed ? null : beamGroupId, boundaryAfter: false });
    });
  });
  for (let i = 0; i < items.length; i += 1) {
    const current = items[i];
    const next = items[i + 1];
    if (!current.beamGroupId || !next || current.beamGroupId !== next.beamGroupId) current.boundaryAfter = true;
  }
  return { items, nextIndex: noteIndex };
}

function buildQuestion(enabledTimeTypes, enabledRhythms, restsEnabled) {
  const timeSignature = weightedSignatureChoice(enabledTimeTypes, enabledRhythms, restsEnabled);
  const systemCount = timeSignature.id === "9/8" || timeSignature.id === "12/8" ? 2 : 1;
  const barsPerSystem = systemCount === 2 ? 2 : 4;
  const systemTops = systemCount === 2 ? SYSTEM_TOPS_TWO_LINES : SYSTEM_TOPS_ONE_LINE;
  const items = [];
  const correctBoundaries = [];
  let previousIndex = randomIndex(NOTES.length);
  let runningUnits = 0;
  for (let barIndex = 0; barIndex < TOTAL_BARS; barIndex += 1) {
    const pattern = timeSignature.type === "compound" ? buildCompoundBar(timeSignature, enabledRhythms, restsEnabled) : chooseSimplePattern(timeSignature, enabledRhythms, restsEnabled);
    if (!pattern) return buildQuestion(enabledTimeTypes, DEFAULT_ENABLED_RHYTHMS, restsEnabled);
    const built = addItemsFromRhythms(pattern, previousIndex, { disableAutoBeam: timeSignature.type === "compound" });
    previousIndex = built.nextIndex;
    built.items.forEach((item) => {
      runningUnits += item.rhythm === "semibreve-rest" ? timeSignature.unitsPerBar : rhythmInfo(item.rhythm).units;
      const safeBeamGroupId = item.beamGroupId ? `bar-${barIndex}-${item.beamGroupId}` : item.beamGroupId;
      items.push({ ...item, beamGroupId: safeBeamGroupId, id: `item-${items.length}`, cumulativeUnits: runningUnits });
    });
    if (barIndex < TOTAL_BARS - 1) correctBoundaries.push(runningUnits);
  }
  return { id: Math.random().toString(36).slice(2), timeSignature, items, correctBoundaries, systemCount, barsPerSystem, systemTops };
}

function getItemSystemIndex(question, item) {
  const barIndex = Math.min(TOTAL_BARS - 1, Math.floor((item.cumulativeUnits - 0.001) / question.timeSignature.unitsPerBar));
  return Math.floor(barIndex / question.barsPerSystem);
}

function systemMusicBounds(systemIndex) {
  const startX = systemIndex === 0 ? STAFF_LEFT + 86 : STAFF_LEFT + 70;
  return { startX, endX: STAFF_RIGHT - 10 };
}

function calculateLayout(question) {
  const systemItems = question.systemTops.map((_, systemIndex) => question.items.filter((item) => getItemSystemIndex(question, item) === systemIndex));
  const itemPositions = {};
  const boundaryPositions = [];
  systemItems.forEach((items, systemIndex) => {
    const { startX, endX } = systemMusicBounds(systemIndex);
    const totalSpacing = items.reduce((sum, item) => sum + rhythmInfo(item.rhythm).spacing, 0);
    const unitWidth = Math.max(1, endX - startX) / Math.max(1, totalSpacing);
    let cursor = startX + unitWidth * 0.4;
    items.forEach((item, localIndex) => {
      const x = cursor;
      itemPositions[item.id] = { x, systemIndex, localIndex };
      cursor += rhythmInfo(item.rhythm).spacing * unitWidth;
      if (item.boundaryAfter) {
        const boundaryX = x + rhythmInfo(item.rhythm).spacing * unitWidth * 0.55;
        if (item.cumulativeUnits < question.timeSignature.unitsPerBar * TOTAL_BARS) boundaryPositions.push({ id: `boundary-${item.cumulativeUnits}`, units: item.cumulativeUnits, x: boundaryX, systemIndex });
      }
    });
  });
  return { itemPositions, boundaryPositions };
}

function playFeedbackSound(correct, celebration, medal) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;
  const context = new AudioContextClass();
  const master = context.createGain();
  const now = context.currentTime + 0.01;
  context.resume && context.resume();
  master.gain.value = 0.18;
  master.connect(context.destination);

  function tone(freq, start, duration, type, volume) {
    const osc = context.createOscillator();
    const gain = context.createGain();
    osc.type = type || "triangle";
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume || 0.12, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(master);
    osc.start(start);
    osc.stop(start + duration + 0.05);
  }

  function trumpet(freq, start, duration, volume) {
    tone(freq, start, duration, "sawtooth", volume || 0.1);
    tone(freq * 1.002, start, duration * 0.96, "square", (volume || 0.1) * 0.32);
    tone(freq * 2, start, duration * 0.75, "triangle", (volume || 0.1) * 0.16);
  }

  function medalPhrase(root, chord, start, beats) {
    const beat = 0.6;
    const triplet = 0.13;
    const finalDuration = beats === 2 ? 0.72 : 1.95;
    chord.forEach((freq) => trumpet(freq, start, beats * beat, 0.045));
    trumpet(root, start, triplet, 0.11);
    trumpet(root, start + triplet, triplet, 0.11);
    trumpet(root, start + triplet * 2, triplet, 0.11);
    trumpet(root, start + 0.42, finalDuration, 0.13);
  }

  if (!correct) {
    tone(196, now, 0.32, "sawtooth", 0.06);
    tone(185, now + 0.04, 0.38, "triangle", 0.05);
    tone(174, now + 0.08, 0.45, "sine", 0.04);
  } else if (celebration) {
    if (medal === "bronze") medalPhrase(659.25, [329.63, 415.3, 493.88], now, 4);
    if (medal === "silver") medalPhrase(739.99, [369.99, 466.16, 554.37], now, 4);
    if (medal === "gold") medalPhrase(830.61, [415.3, 523.25, 622.25], now, 4);
    if (medal === "platinum") {
      medalPhrase(739.99, [369.99, 466.16, 554.37], now, 2);
      medalPhrase(830.61, [415.3, 523.25, 622.25], now + 0.82, 2);
      medalPhrase(932.33, [466.16, 587.33, 698.46], now + 1.64, 4);
    }
  } else {
    randomItem([[523.25, 659.25, 783.99], [587.33, 739.99, 880], [659.25, 830.61, 987.77]]).forEach((freq, index) => {
      tone(freq, now + index * 0.045, 0.42, "triangle", index === 2 ? 0.085 : 0.07);
      tone(freq * 2, now + index * 0.045, 0.24, "sine", 0.025);
    });
  }
  window.setTimeout(() => { try { context.close(); } catch (error) {} }, medal === "platinum" ? 9000 : celebration ? 3500 : 900);
}

function StaffLines({ systemTop }) {
  return <g>{[0, 1, 2, 3, 4].map((line) => <line key={line} x1={STAFF_LEFT} x2={STAFF_RIGHT} y1={systemTop + line * LINE_GAP} y2={systemTop + line * LINE_GAP} stroke="currentColor" strokeWidth="1.2" />)}</g>;
}

function TrebleClef({ systemTop }) {
  return <text x={STAFF_LEFT + 8} y={systemTop + 28} fontSize="88" fontFamily="serif" dominantBaseline="middle">{TREBLE_CLEF}</text>;
}

function TimeSignatureGlyph({ signature, x, y, colour, fontSize }) {
  const size = fontSize || 30;
  return <g fontFamily="serif" fontWeight="900" fontSize={size} textAnchor="middle" fill={colour || "currentColor"}><text x={x} y={y}>{signature.top}</text><text x={x} y={y + size * 0.62 + 2}>{signature.bottom}</text></g>;
}

function LedgerLines({ x, step, systemTop, colour }) {
  const lines = [];
  if (step <= -2) lines.push(yForStep(-2, systemTop));
  if (step >= 10) lines.push(yForStep(10, systemTop));
  return <g>{lines.map((y) => <line key={y} x1={x - 12} x2={x + 12} y1={y} y2={y} stroke={colour || "currentColor"} strokeWidth="1.2" />)}</g>;
}

function Rest({ rhythm, x, systemTop, colour }) {
  const ink = colour || "currentColor";
  const middleY = systemTop + LINE_GAP * 2;
  if (rhythm === "semibreve-rest") return <g><line x1={x - 9} x2={x + 9} y1={systemTop + LINE_GAP} y2={systemTop + LINE_GAP} stroke={ink} strokeWidth="1.2" /><rect x={x - 7} y={systemTop + LINE_GAP} width="14" height="5" fill={ink} /></g>;
  if (rhythm === "minim-rest") return <g><line x1={x - 9} x2={x + 9} y1={systemTop + LINE_GAP * 2} y2={systemTop + LINE_GAP * 2} stroke={ink} strokeWidth="1.2" /><rect x={x - 7} y={systemTop + LINE_GAP * 2 - 5} width="14" height="5" fill={ink} /></g>;
  if (rhythm === "dotted-crotchet-rest" || rhythm === "crotchet-rest") {
    const d = `M ${x} ${middleY - 14} L ${x + 4} ${middleY - 9} L ${x - 2} ${middleY - 3} L ${x + 4} ${middleY + 3} L ${x - 2} ${middleY + 11}`;
    return <g><path d={d} fill="none" stroke={ink} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />{rhythm === "dotted-crotchet-rest" && <circle cx={x + 10} cy={middleY - 4} r="2" fill={ink} />}</g>;
  }
  const topY = middleY - 6;
  const bottomY = middleY + 10;
  return <g stroke={ink} strokeWidth="1.8" strokeLinecap="round" fill="none"><line x1={x - 3} y1={topY} x2={x + 2} y2={topY} /><line x1={x + 2} y1={topY} x2={x - 1} y2={bottomY} /><circle cx={x - 4} cy={topY - 1} r="1.8" fill={ink} stroke="none" /></g>;
}

function Flag({ stemX, stemEndY, stemDown, colour, beams }) {
  const ink = colour || "currentColor";
  const primaryPath = stemDown ? `M ${stemX} ${stemEndY} C ${stemX + 12} ${stemEndY - 5}, ${stemX + 12} ${stemEndY - 14}, ${stemX + 3} ${stemEndY - 18}` : `M ${stemX} ${stemEndY} C ${stemX + 12} ${stemEndY + 5}, ${stemX + 12} ${stemEndY + 14}, ${stemX + 3} ${stemEndY + 18}`;
  const secondaryPath = stemDown ? `M ${stemX - 1} ${stemEndY + 18} C ${stemX + 9} ${stemEndY + 13}, ${stemX + 9} ${stemEndY + 5}, ${stemX + 2} ${stemEndY + 1}` : `M ${stemX + 2} ${stemEndY + 4} C ${stemX + 12} ${stemEndY + 9}, ${stemX + 12} ${stemEndY + 17}, ${stemX + 5} ${stemEndY + 21}`;
  return <g><path d={primaryPath} fill="none" stroke={ink} strokeWidth="1.7" strokeLinecap="round" />{beams === 2 && <path d={secondaryPath} fill="none" stroke={ink} strokeWidth="1.7" strokeLinecap="round" />}</g>;
}

function getStemData(item, x, systemTop, stemDownOverride) {
  const step = item.pitch.step;
  const y = yForStep(step, systemTop);
  const stemDown = stemDownOverride === null || stemDownOverride === undefined ? stemGoesDown(step) : stemDownOverride;
  const stemX = stemDown ? x - NOTE_RX : x + NOTE_RX;
  const stemEndY = stemDown ? y + STEM_LENGTH : y - STEM_LENGTH;
  return { step, y, stemDown, stemX, stemEndY };
}

function Note({ item, x, systemTop, stemDownOverride, forcedStemEndY, showFlag, colour }) {
  const info = rhythmInfo(item.rhythm);
  const ink = colour || "currentColor";
  if (info.rest) return <Rest rhythm={item.rhythm} x={x} systemTop={systemTop} colour={ink} />;
  const stem = getStemData(item, x, systemTop, stemDownOverride);
  const stemEndY = forcedStemEndY === null || forcedStemEndY === undefined ? stem.stemEndY : (stem.stemDown ? forcedStemEndY + 2 : forcedStemEndY - 2);
  const dotY = Math.abs(stem.step % 2) === 1 ? stem.y : stem.y - 5;
  return <g><LedgerLines x={x} step={stem.step} systemTop={systemTop} colour={ink} /><ellipse cx={x} cy={stem.y} rx={NOTE_RX} ry={NOTE_RY} transform={`rotate(-18 ${x} ${stem.y})`} fill={info.open ? "transparent" : ink} stroke={ink} strokeWidth="1.7" />{info.stem && <line x1={stem.stemX} x2={stem.stemX} y1={stem.y} y2={stemEndY} stroke={ink} strokeWidth="1.5" />}{info.dots === 1 && <circle cx={x + 12} cy={dotY} r="2.1" fill={ink} />}{info.flag && showFlag !== false && <Flag stemX={stem.stemX} stemEndY={stemEndY} stemDown={stem.stemDown} colour={ink} beams={info.beams || 1} />}</g>;
}

function getBeamLineYAtX(x, start, end) {
  if (!start || !end || start.x === end.x) return start ? start.y : end ? end.y : 0;
  return start.y + ((x - start.x) / (end.x - start.x)) * (end.y - start.y);
}

function getBeamData(items, positions, systemTop) {
  const averageStep = items.reduce((sum, item) => sum + item.pitch.step, 0) / items.length;
  const stemDown = averageStep > 4;
  const anchorStep = stemDown ? Math.max(...items.map((item) => item.pitch.step)) : Math.min(...items.map((item) => item.pitch.step));
  const anchorIndex = items.findIndex((item) => item.pitch.step === anchorStep);
  const startStem = getStemData(items[0], positions[0], systemTop, stemDown);
  const endStem = getStemData(items[items.length - 1], positions[positions.length - 1], systemTop, stemDown);
  const anchorStem = getStemData(items[anchorIndex], positions[anchorIndex], systemTop, stemDown);
  const slope = clamp((items[items.length - 1].pitch.step - items[0].pitch.step) * -2, -8, 8);
  const slopePerX = slope / Math.max(1, endStem.stemX - startStem.stemX);
  return { stemDown, start: { x: startStem.stemX, y: anchorStem.stemEndY - slopePerX * (anchorStem.stemX - startStem.stemX) }, end: { x: endStem.stemX, y: anchorStem.stemEndY + slopePerX * (endStem.stemX - anchorStem.stemX) } };
}

function isBeamable(item) {
  return item && !item.isRest && ["quaver", "semiquaver", "dotted-quaver"].includes(item.rhythm) && item.beamGroupId !== null && item.beamGroupId !== undefined;
}

function getBeamGroups(items) {
  const groups = [];
  let index = 0;
  while (index < items.length) {
    const item = items[index];
    if (!isBeamable(item)) { index += 1; continue; }
    const start = index;
    const id = item.beamGroupId;
    while (index < items.length && items[index].beamGroupId === id && isBeamable(items[index])) index += 1;
    const end = index - 1;
    if (end > start) groups.push({ start, end });
  }
  return groups;
}

function Beam({ start, end, groupItems, groupPositions, stemDown }) {
  const secondaryOffset = stemDown ? -7 : 7;
  const secondarySegments = [];
  let segmentStart = null;
  groupItems.forEach((item, index) => {
    const isSemi = rhythmInfo(item.rhythm).beams === 2;
    const next = groupItems[index + 1];
    const nextIsSemi = !!(next && rhythmInfo(next.rhythm).beams === 2);
    if (isSemi && segmentStart === null) segmentStart = index;
    if (segmentStart !== null && (!nextIsSemi || index === groupItems.length - 1)) {
      secondarySegments.push({ startIndex: segmentStart, endIndex: index, isHook: index === segmentStart });
      segmentStart = null;
    }
  });
  function stemXFor(index) {
    const x = groupPositions[index];
    return stemDown ? x - NOTE_RX + 1 : x + NOTE_RX - 1;
  }
  return <g><line x1={start.x} y1={start.y} x2={end.x} y2={end.y} stroke="currentColor" strokeWidth="4" strokeLinecap="butt" />{secondarySegments.map((segment, index) => { const x1 = stemXFor(segment.startIndex); const y1 = getBeamLineYAtX(x1, start, end) + secondaryOffset; const x2 = segment.isHook ? x1 + (segment.startIndex > 0 ? -14 : 14) : stemXFor(segment.endIndex); const y2 = segment.isHook ? y1 : getBeamLineYAtX(x2, start, end) + secondaryOffset; return <line key={index} x1={x1} y1={y1} x2={x2} y2={y2} stroke="currentColor" strokeWidth="4" strokeLinecap="butt" />; })}</g>;
}

function Barline({ x, systemTop, colour, opacity, dashed }) {
  return <line x1={x} x2={x} y1={systemTop} y2={systemTop + LINE_GAP * 4} stroke={colour || "currentColor"} strokeWidth="2" opacity={opacity === undefined ? 1 : opacity} strokeDasharray={dashed ? "4 4" : undefined} />;
}

function FinalBarline({ x, systemTop }) {
  return <g><line x1={x - 5} x2={x - 5} y1={systemTop} y2={systemTop + LINE_GAP * 4} stroke="currentColor" strokeWidth="1.4" /><line x1={x} x2={x} y1={systemTop - 0.75} y2={systemTop + LINE_GAP * 4 + 0.75} stroke="currentColor" strokeWidth="4" /></g>;
}

function Score({ question, placedBoundaries, hoverBoundaryId, setHoverBoundaryId, toggleBoundary, feedback }) {
  const scoreHeight = question.systemTops[question.systemTops.length - 1] + LINE_GAP * 4 + 38;
  const layout = useMemo(() => calculateLayout(question), [question]);
  const beamGroups = getBeamGroups(question.items);
  const correctSet = new Set(question.correctBoundaries.map((units) => `boundary-${units}`));
  const placedSet = new Set(placedBoundaries);
  function groupForIndex(index) { return beamGroups.find((group) => index >= group.start && index <= group.end) || null; }

  return (
    <svg viewBox={`0 0 ${VIEWBOX_WIDTH} ${scoreHeight}`} className="h-auto w-full select-none overflow-hidden" aria-label="Barlines exercise">
      <rect x="0" y="0" width={VIEWBOX_WIDTH} height={scoreHeight} fill="white" />
      {question.systemTops.map((systemTop, systemIndex) => {
        const { endX } = systemMusicBounds(systemIndex);
        return <g key={systemIndex}><StaffLines systemTop={systemTop} /><TrebleClef systemTop={systemTop} />{systemIndex === 0 && <TimeSignatureGlyph signature={question.timeSignature} x={STAFF_LEFT + 54} y={systemTop + 20} />}{systemIndex === question.systemTops.length - 1 ? <FinalBarline x={endX + 8} systemTop={systemTop} /> : <line x1={endX + 8} x2={endX + 8} y1={systemTop} y2={systemTop + LINE_GAP * 4} stroke="currentColor" strokeWidth="1.4" />}</g>;
      })}
      {question.items.map((item, index) => {
        const position = layout.itemPositions[item.id];
        const systemTop = question.systemTops[position.systemIndex];
        if (item.isRest) return <Rest key={item.id} rhythm={item.rhythm} x={position.x} systemTop={systemTop} />;
        const group = groupForIndex(index);
        if (!group) return <Note key={item.id} item={item} x={position.x} systemTop={systemTop} />;
        const groupItems = question.items.slice(group.start, group.end + 1);
        const groupPositions = groupItems.map((groupItem) => layout.itemPositions[groupItem.id].x);
        const beamData = getBeamData(groupItems, groupPositions, systemTop);
        const stem = getStemData(item, position.x, systemTop, beamData.stemDown);
        return <Note key={item.id} item={item} x={position.x} systemTop={systemTop} stemDownOverride={beamData.stemDown} forcedStemEndY={getBeamLineYAtX(stem.stemX, beamData.start, beamData.end)} showFlag={false} />;
      })}
      {beamGroups.map((group, index) => {
        const groupItems = question.items.slice(group.start, group.end + 1);
        const firstPosition = layout.itemPositions[groupItems[0].id];
        const systemTop = question.systemTops[firstPosition.systemIndex];
        const groupPositions = groupItems.map((item) => layout.itemPositions[item.id].x);
        const beamData = getBeamData(groupItems, groupPositions, systemTop);
        return <Beam key={index} start={beamData.start} end={beamData.end} groupItems={groupItems} groupPositions={groupPositions} stemDown={beamData.stemDown} />;
      })}
      {layout.boundaryPositions.map((boundary) => {
        const systemTop = question.systemTops[boundary.systemIndex];
        const placed = placedSet.has(boundary.id);
        const hovered = hoverBoundaryId === boundary.id;
        const isCorrect = correctSet.has(boundary.id);
        const colour = feedback ? (placed && isCorrect ? COLOUR.green : placed && !isCorrect ? COLOUR.red : COLOUR.green) : COLOUR.black;
        const showMissingCorrect = feedback && isCorrect && !placed;
        if (!placed && !hovered && !showMissingCorrect) {
          return <rect key={boundary.id} x={boundary.x - 13} y={systemTop - 18} width="26" height={LINE_GAP * 4 + 36} fill="transparent" onMouseEnter={() => setHoverBoundaryId(boundary.id)} onMouseLeave={() => setHoverBoundaryId(null)} onClick={() => toggleBoundary(boundary.id)} />;
        }
        return <g key={boundary.id}><rect x={boundary.x - 13} y={systemTop - 18} width="26" height={LINE_GAP * 4 + 36} fill="transparent" onMouseEnter={() => setHoverBoundaryId(boundary.id)} onMouseLeave={() => setHoverBoundaryId(null)} onClick={() => toggleBoundary(boundary.id)} /><Barline x={boundary.x} systemTop={systemTop} colour={colour} opacity={placed || showMissingCorrect ? 1 : 0.35} dashed={!placed} /></g>;
      })}
    </svg>
  );
}

function getStreakMedal(streak) {
  if (streak >= 30) return { emoji: "💎", bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
  if (streak >= 20) return { emoji: "🥇", bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
  if (streak >= 15) return { emoji: "🥈", bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
  if (streak >= 10) return { emoji: "🥉", bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
  return null;
}

  const fillHeight = safeProgress == null || safeProgress <= 0 ? 0 : safeProgress;

  const isStreak = variant === "streak";

function MenuRows({ enabledTimeTypes, setEnabledTimeTypes, enabledRhythms, setEnabledRhythms, restsEnabled, setRestsEnabled, showRhythmGuide, setShowRhythmGuide, resetScore, newQuestion }) {
  const rowClass = "mb-2 flex min-h-[44px] w-full items-center justify-between rounded-xl border border-stone-200 bg-stone-50 px-[14px] py-[6px]";
  function ToggleSwitch({ active }) {
    return <span className={`flex h-6 w-11 items-center rounded-full p-1 transition ${active ? "bg-green-600" : "bg-stone-400"}`}><span className={`h-4 w-4 rounded-full bg-white transition ${active ? "translate-x-5" : "translate-x-0"}`} /></span>;
  }
  function toggleTimeType(type) {
    setEnabledTimeTypes((current) => {
      const next = { ...current, [type]: !current[type] };
      if (!next.simple && !next.compound) return current;
      window.setTimeout(() => newQuestion(next, enabledRhythms, restsEnabled), 0);
      return next;
    });
  }
  function toggleRhythm(rhythmId) {
    setEnabledRhythms((current) => {
      const activeCount = Object.values(current).filter(Boolean).length;
      if (current[rhythmId] && activeCount <= 1) return current;
      const next = { ...current, [rhythmId]: !current[rhythmId] };
      window.setTimeout(() => newQuestion(enabledTimeTypes, next, restsEnabled), 0);
      return next;
    });
  }
  return <><button type="button" onClick={() => setShowRhythmGuide((value) => !value)} className={rowClass}><span className="flex items-center gap-1 text-sm font-semibold"><span className="flex w-[46px] justify-center text-[30px] leading-none">♩</span><span>Show Rhythm Guide</span></span><ToggleSwitch active={showRhythmGuide} /></button><button type="button" onClick={() => toggleTimeType("simple")} className={rowClass}><span className="flex items-center gap-1 text-sm font-semibold"><span className="flex w-[46px] justify-center"><TimeSignatureMenuGlyph signatures={["2/4", "3/4", "4/4"]} /></span><span>Simple Time</span></span><ToggleSwitch active={enabledTimeTypes.simple} /></button><button type="button" onClick={() => toggleTimeType("compound")} className={rowClass}><span className="flex items-center gap-1 text-sm font-semibold"><span className="flex w-[46px] justify-center"><TimeSignatureMenuGlyph signatures={["6/8", "9/8", "12/8"]} /></span><span>Compound Time</span></span><ToggleSwitch active={enabledTimeTypes.compound} /></button>
      <button type="button" onClick={() => {
        setRestsEnabled((value) => {
          const next = !value;
          window.setTimeout(() => newQuestion(enabledTimeTypes, enabledRhythms, next), 0);
          return next;
        });
      }} className={rowClass}><span className="flex items-center gap-1 text-sm font-semibold"><span className="flex w-[46px] justify-center"><svg width="24" height="26" viewBox="0 0 24 26" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 4 L16 8 L10 13 L16 18 L10 23" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round" strokeLinejoin="round" /></svg></span><span>Rests</span></span><ToggleSwitch active={restsEnabled} /></button><div className="mb-2 text-sm font-semibold text-stone-800">Rhythms</div>
        <div className="space-y-1.5">
          {RHYTHM_OPTIONS.map((rhythm) => (
            <button key={rhythm.id} type="button" onClick={() => toggleRhythm(rhythm.id)} className={rowClass}>
              <span className="flex items-center gap-1 text-sm font-semibold">
                <span className="flex h-7 w-[46px] items-center justify-center overflow-hidden scale-[1.6]"><svg viewBox="0 0 70 70" className="h-7 w-12 overflow-visible"><g transform="translate(0, 17) scale(0.82)"><Note item={{ rhythm: rhythm.id, pitch: { name: "B4", step: 4 } }} x={32} systemTop={8} /></g></svg></span>
                <span>{rhythm.label}</span>
              </span>
              <ToggleSwitch active={enabledRhythms[rhythm.id]} />
            </button>
          ))}
        </div><button type="button" onClick={resetScore} className="mt-2.5 w-full rounded-xl border border-red-500 bg-white px-[18px] py-[10px] text-sm font-semibold text-red-600 hover:bg-red-50">↺ Reset score</button></>;
}

      @keyframes correctFade { 0% { transform: translateY(-18px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }

    `;
    document.head.appendChild(style);
  }, []);
}

function useClickOutside(refs, handlers) {
  useEffect(() => {
    function onPointerDown(event) {
      refs.forEach((ref, index) => {
        if (ref.current && !ref.current.contains(event.target)) handlers[index] && handlers[index]();
      });
    }
    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, [refs, handlers]);
}

function App() {
  useInjectedStyles();
  const [enabledTimeTypes, setEnabledTimeTypes] = useState({ simple: true, compound: true });
  const [enabledRhythms, setEnabledRhythms] = useState(DEFAULT_ENABLED_RHYTHMS);
  const [restsEnabled, setRestsEnabled] = useState(true);
  const [question, setQuestion] = useState(() => buildQuestion({ simple: true, compound: true }, DEFAULT_ENABLED_RHYTHMS, true));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [showRhythmGuide, setShowRhythmGuide] = useState(false);
  const [placedBoundaries, setPlacedBoundaries] = useState([]);
  const [hoverBoundaryId, setHoverBoundaryId] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);
  const customiseRef = useRef(null);
  const helpRef = useRef(null);

  useClickOutside([customiseRef, helpRef], [() => customiseOpen && setCustomiseOpen(false), () => helpOpen && setHelpOpen(false)]);

  const allPlaced = placedBoundaries.length === TOTAL_BARS - 1;
  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const streakMedal = getStreakMedal(streak);

  function resetTask(nextQuestion) {
    setQuestion(nextQuestion);
    setPlacedBoundaries([]);
    setHoverBoundaryId(null);
    setFeedback(null);
    setFeedbackFading(false);
  }

  function newQuestion(nextEnabledTimeTypes, nextEnabledRhythms, nextRestsEnabled) {
    const timeTypes = nextEnabledTimeTypes || enabledTimeTypes;
    const rhythms = nextEnabledRhythms || enabledRhythms;
    const rests = nextRestsEnabled === undefined ? restsEnabled : nextRestsEnabled;
    setQuestionVisible(false);
    window.setTimeout(() => {
      resetTask(buildQuestion(timeTypes, rhythms, rests));
      setQuestionVisible(true);
    }, 260);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion();
  }

  function clearBarlines() {
    if (!feedback) setPlacedBoundaries([]);
  }

  function toggleBoundary(boundaryId) {
    if (feedback) return;
    setPlacedBoundaries((current) => {
      if (current.includes(boundaryId)) return current.filter((id) => id !== boundaryId);
      if (current.length >= TOTAL_BARS - 1) return current;
      return [...current, boundaryId];
    });
  }

  function confirmAnswer() {
    if (!allPlaced || feedback) return;
    const correctIds = new Set(question.correctBoundaries.map((units) => `boundary-${units}`));
    const isCorrect = placedBoundaries.every((id) => correctIds.has(id));
    const nextStreak = isCorrect ? streak + 1 : 0;
    playFeedbackSound(isCorrect, false, null);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });
    if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }
    if (isCorrect) {
      setFeedbackFading(false);
      window.setTimeout(() => setFeedbackFading(true), 1700);
      window.setTimeout(() => newQuestion(), 2000);
    }
  }

  function fadeToNextQuestion() {
    if (!feedback || feedback.correct || feedbackFading) return;
    setFeedbackFading(true);
    window.setTimeout(() => newQuestion(), 280);
  }

  return (
    <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2">
      <div className="mx-auto max-w-6xl">
        <header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm">
          <div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div className="flex items-center gap-4"><AppIcon /><div><h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Barlines</h1><p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Insert barlines at the correct place in the music.</p></div></div>
            <div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end">
              <StatCard variant="score" label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${accuracy}%`} progress={accuracy} />
              <div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${streakMedal?.bg || "bg-stone-50"}`}>
                <StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${bestStreak}`} medal={streakMedal} confettiKey={confettiKey} />
                <div className="relative z-0 flex min-h-[52px] min-w-[64px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700">
                  <div className="flex items-center gap-1"><span>💎</span><span className="text-cyan-500">30</span></div>
                  <div className="mt-1">🥇 <span className="text-yellow-500">20</span></div>
                  <div className="mt-1">🥈 <span className="text-slate-500">15</span></div>
                  <div className="mt-1">🥉 <span className="text-amber-700">10</span></div>
                </div>
              </div>
            </div>
          </div>
        </header>

        <main className="relative -mt-[10px] min-h-[360px] overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-4 pt-[10px] shadow-sm md:h-auto md:min-h-0 md:overflow-visible md:px-6 md:pb-6 md:pt-[14px]" onPointerDown={() => { if (feedback && !feedback.correct) fadeToNextQuestion(); }}>
          <div className="relative z-20 mb-2.5 flex flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-2">
              <div className="relative" ref={customiseRef}><button type="button" onClick={() => setCustomiseOpen((value) => !value)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">⚙️ <span>Customise</span></button>{customiseOpen && <div className="absolute left-0 z-[60] mt-2 max-h-[70vh] w-[min(430px,calc(100vw-2rem))] overflow-y-auto rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><h2 className="mb-3 text-center text-base font-semibold">Customise</h2><MenuRows enabledTimeTypes={enabledTimeTypes} setEnabledTimeTypes={setEnabledTimeTypes} enabledRhythms={enabledRhythms} setEnabledRhythms={setEnabledRhythms} restsEnabled={restsEnabled} setRestsEnabled={setRestsEnabled} showRhythmGuide={showRhythmGuide} setShowRhythmGuide={setShowRhythmGuide} resetScore={resetScore} newQuestion={newQuestion} /></div>}</div>
              <div className="relative" ref={helpRef}><button type="button" onClick={() => setHelpOpen((value) => !value)} className="flex h-11 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">💡 <span>Help</span></button>{helpOpen && <div className="absolute left-0 top-12 z-[60] w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><HelpPanel /></div>}</div>
            </div>
            <button type="button" onClick={() => newQuestion()} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800"><span>Skip Question</span><span className="text-lg leading-none">→</span></button>
            <div className="pointer-events-none absolute inset-x-0 top-1/2 z-30 flex -translate-y-1/2 justify-center overflow-visible"><FeedbackBanner feedback={feedback} fading={feedbackFading} /></div>
          </div>

          {showRhythmGuide && <div className="relative z-[15]"><RhythmGuide /></div>}

          <div className={`relative -top-[18px] overflow-hidden rounded-xl transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}><Score question={question} placedBoundaries={placedBoundaries} hoverBoundaryId={hoverBoundaryId} setHoverBoundaryId={setHoverBoundaryId} toggleBoundary={toggleBoundary} feedback={feedback} /></div>

          <div className={`relative z-10 mt-3 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:mx-3 ${question.systemCount === 1 ? 'md:-mt-[0px]' : 'md:-mt-[10px]'}`}><div className="flex flex-wrap items-center justify-between gap-3 text-stone-900"><p className="text-base font-semibold leading-tight">Insert the missing bar lines.</p><div className="flex flex-wrap items-center justify-end gap-3"><button type="button" onClick={clearBarlines} disabled={!!feedback || placedBoundaries.length === 0} className="h-11 rounded-xl border border-stone-300 bg-white px-5 text-sm font-semibold text-stone-800 disabled:opacity-40">Clear</button><button type="button" onClick={confirmAnswer} disabled={!allPlaced || !!feedback} className={`h-11 rounded-xl px-6 font-semibold ${allPlaced && !feedback ? "bg-green-600 text-white hover:bg-green-700" : "cursor-not-allowed bg-green-600/35 text-white/70"}`}>Confirm</button></div></div></div>
        </main>
      </div>
    </div>
  );
}

const rootElement = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(rootElement).render(<App />);
else ReactDOM.render(<App />, rootElement);
  </script>
</body>
</html>
