const SIMPLE_FULL_BAR_PATTERNS = {
  "2/4": [
    ["minim"], ["crotchet", "crotchet"], ["quaver-group-2", "crotchet"], ["crotchet", "quaver-group-2"],
    ["quaver-group-2", "quaver-group-2"], ["semiquaver-group-4", "semiquaver-group-4"], ["semiquaver-group-4", "crotchet"], ["crotchet", "semiquaver-group-4"],
    ["quaver-2semiquavers", "crotchet"], ["2semiquavers-quaver", "crotchet"], ["dotted-quaver-semiquaver", "crotchet"],
    ["dotted-crotchet", "quaver"], ["quaver", "dotted-crotchet"], ["crotchet-rest", "crotchet"],

    ["semiquaver-group-4", "semiquaver-group-4", "semiquaver-group-4"], ["semiquaver-group-4", "crotchet", "crotchet"], ["crotchet", "semiquaver-group-4", "crotchet"],
    ["dotted-crotchet", "quaver", "crotchet"], ["crotchet", "dotted-crotchet", "quaver"],

    ["crotchet", "quaver-2semiquavers", "crotchet", "crotchet"], ["crotchet", "crotchet", "2semiquavers-quaver", "crotchet"],
    ["dotted-crotchet", "quaver", "minim"], ["minim", "dotted-crotchet", "quaver"], ["semibreve-rest"],

  ],

const COMPOUND_BEAT_PATTERNS = [
  { pattern: ["dotted-crotchet"], weight: 4 },
  { pattern: ["crotchet", "quaver"], weight: 4 },
  { pattern: ["quaver", "crotchet"], weight: 4 },
  { pattern: ["quaver-group-3"], weight: 1 },
  { pattern: ["dotted-crotchet-rest"], weight: 1 },
];

function randomIndex(length) { return Math.floor(Math.random() * length); }
function randomItem(items) { return items[randomIndex(items.length)]; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function rhythmInfo(rhythm) { return RHYTHM_INFO[rhythm] || RHYTHM_INFO.crotchet; }
function noteByIndex(index) { return NOTES[clamp(index, 0, NOTES.length - 1)]; }
function noteIndexByStep(step) { return NOTES.findIndex((note) => note.step === step); }
function yForStep(step, systemTop) { return systemTop + LINE_GAP * 4 - step * (LINE_GAP / 2); }
function stemGoesDown(step) { return step > 4; }
function weightedItem(items) {
  const pool = [];
  items.forEach((item) => {
    for (let i = 0; i < item.weight; i += 1) pool.push(item.pattern);
  });
  return randomItem(pool);
}

function signatureCanBeGenerated(signature, enabledRhythms, restsEnabled) {
  if (!enabledRhythms[`time-${signature.id}`]) return false;
  if (signature.type === "simple") {
    const patterns = SIMPLE_FULL_BAR_PATTERNS[signature.id] || [];
    return patterns.some((pattern) => patternAllowed(pattern, enabledRhythms, restsEnabled));
  }
  return COMPOUND_BEAT_PATTERNS.some((item) => patternAllowed(item.pattern, enabledRhythms, restsEnabled));
}

function weightedSignatureChoice(enabledTimeTypes, enabledRhythms, restsEnabled, allowedTimeSignatureIds = TIME_SIGNATURES.map((signature) => signature.id)) {
  const available = TIME_SIGNATURES.filter((signature) => allowedTimeSignatureIds.includes(signature.id) && enabledTimeTypes[signature.type] && signatureCanBeGenerated(signature, enabledRhythms, restsEnabled));
  const source = available.length ? available : TIME_SIGNATURES.filter((signature) => allowedTimeSignatureIds.includes(signature.id) && signatureCanBeGenerated(signature, enabledRhythms, restsEnabled));
  const safeSource = source.length ? source : TIME_SIGNATURES.filter((signature) => allowedTimeSignatureIds.includes(signature.id) && enabledTimeTypes[signature.type]);
  const pool = [];
  safeSource.forEach((signature) => {
    const copies = Math.max(1, Math.round((signature.weight || 1) * 10));
    for (let i = 0; i < copies; i += 1) pool.push(signature);
  });
  return randomItem(pool);
}

function nearestMelodicIndex(previousIndex, stepwise, range) {
  const minIndex = Math.max(0, noteIndexByStep(range.minStep));
  const maxIndex = Math.max(minIndex, noteIndexByStep(range.maxStep));
  if (!stepwise) return clamp(previousIndex + randomItem([-2, -1, 0, 0, 1, 2]), minIndex, maxIndex);
  if (previousIndex <= minIndex) return minIndex + 1;
  if (previousIndex >= maxIndex) return maxIndex - 1;
  return previousIndex + randomItem([-1, 1]);
}

function expandRhythmToken(token) {
  if (token === "syncopated-crotchets") return ["quaver", "tie", "crotchet", "quaver"];
  if (token === "tied-minims") return ["minim", "tie", "minim"];
  if (token === "quaver-group-2") return ["quaver", "quaver"];
  if (token === "quaver-group-3") return ["quaver", "quaver", "quaver"];
  if (token === "semiquaver-group-4") return ["semiquaver", "semiquaver", "semiquaver", "semiquaver"];
  if (token === "quaver-2semiquavers") return ["quaver", "semiquaver", "semiquaver"];
  if (token === "2semiquavers-quaver") return ["semiquaver", "semiquaver", "quaver"];
  if (token === "dotted-quaver-semiquaver") return ["dotted-quaver", "semiquaver"];
  return [token];
}

function shouldExplicitlyBeam(token) {
  return ["quaver-group-2", "quaver-group-3", "semiquaver-group-4", "quaver-2semiquavers", "2semiquavers-quaver", "dotted-quaver-semiquaver"].includes(token);
}

function rhythmAllowed(rhythm, enabledRhythms, restsEnabled) {
  if (rhythm === "tie") return !!enabledRhythms.ties;
  if (!restsEnabled && rhythmInfo(rhythm).rest) return false;
  if (rhythmInfo(rhythm).rest) return !!enabledRhythms.rests;
  if (rhythm === "semibreve-rest") return !!enabledRhythms.semibreve;
  if (rhythm === "minim-rest") return !!enabledRhythms.minim;
  if (rhythm === "dotted-crotchet-rest") return !!enabledRhythms["dotted-crotchet"];
  if (rhythm === "crotchet-rest") return !!enabledRhythms.crotchet;
  if (rhythm === "quaver-rest") return !!enabledRhythms.quaver;
  if (rhythm === "dotted-quaver") return !!enabledRhythms["dotted-quaver"];
  return !!enabledRhythms[rhythm];
}

function tokenAllowed(token, enabledRhythms, restsEnabled) {
  if (token === "syncopated-crotchets") return !!enabledRhythms.syncopation && !!enabledRhythms.ties && tokenAllowed("quaver-group-2", enabledRhythms, restsEnabled) && !!enabledRhythms.crotchet;
  if (token === "tied-minims") return !!enabledRhythms.ties && !!enabledRhythms.minim;
  return expandRhythmToken(token).every((rhythm) => rhythmAllowed(rhythm, enabledRhythms, restsEnabled));
}

function semiquaverCount(pattern) {
  return pattern.reduce((count, token) => count + expandRhythmToken(token).filter((rhythm) => rhythm === "semiquaver").length, 0);
}

function patternAllowed(pattern, enabledRhythms, restsEnabled) {
  return semiquaverCount(pattern) <= MAX_SEMIQUAVERS_PER_BAR && pattern.every((token) => tokenAllowed(token, enabledRhythms, restsEnabled));
}

function levelEnabledMap(levelKey) {
  const level = LEVELS[levelKey] || LEVELS.N3;
  const enabled = {};
  level.rhythmIds.forEach((id) => { enabled[id] = true; });
  level.timeSignatureIds.forEach((id) => { enabled[`time-${id}`] = true; });
  level.keyIds.forEach((id) => { enabled[`key-${id}`] = true; });
  return enabled;
}

function enabledMapMatchesLevel(levelKey, enabledRhythms) {
  const official = levelEnabledMap(levelKey);
  const keys = new Set([...Object.keys(official), ...Object.keys(enabledRhythms)]);
  return [...keys].every(key => Boolean(enabledRhythms[key]) === Boolean(official[key]));
}

function taskMatchesLevel(levelKey, enabledRhythms, restsEnabled) {
  const officialRests = LEVELS[levelKey].rhythmIds.includes("rests");
  return enabledMapMatchesLevel(levelKey, enabledRhythms) && restsEnabled === officialRests;
}

function levelTimeTypes(levelKey, enabledRhythms = levelEnabledMap(levelKey)) {
  const level = LEVELS[levelKey] || LEVELS.N3;
  const activeSignatures = level.timeSignatureIds.filter((id) => enabledRhythms[`time-${id}`]);
  return {
    simple: activeSignatures.some((id) => TIME_SIGNATURES.find((signature) => signature.id === id)?.type === "simple"),
    compound: activeSignatures.some((id) => TIME_SIGNATURES.find((signature) => signature.id === id)?.type === "compound"),
  };
}

function initialLevelFromUrl() {
  const requested = new URLSearchParams(window.location.search).get("level") || "N3";
  return LEVELS[requested] ? requested : "N3";
}

function chooseSimplePattern(timeSignature, enabledRhythms, restsEnabled) {
  const allPatterns = SIMPLE_FULL_BAR_PATTERNS[timeSignature.id] || SIMPLE_FULL_BAR_PATTERNS["4/4"];
  const filtered = allPatterns.filter((pattern) => patternAllowed(pattern, enabledRhythms, restsEnabled));
  return filtered.length ? randomItem(filtered) : null;
}

function buildCompoundBar(timeSignature, enabledRhythms, restsEnabled) {
  const allowed = COMPOUND_BEAT_PATTERNS.filter((item) => patternAllowed(item.pattern, enabledRhythms, restsEnabled));
  if (!allowed.length) return null;
  const groups = [];
  for (let i = 0; i < timeSignature.compoundGroups; i += 1) groups.push(weightedItem(allowed));
  return groups.flat();
}

function activeKeyIds(enabledRhythms, level) {
  return level.keyIds.filter((id) => enabledRhythms[`key-${id}`]);
}

function randomKey(level, enabledRhythms) {
  const ids = activeKeyIds(enabledRhythms, level);
  return KEYS[randomItem(ids.length ? ids : level.keyIds)] || KEYS.C;
}

function applyKeyAccidental(note, key) {
  if (key?.id === "Am" && note.letter === "G") return { ...note, writtenAccidental: 1 };
  return { ...note, writtenAccidental: null };
}

function addItemsFromRhythms(rhythms, previousIndex, options) {
  const items = [];
  let noteIndex = previousIndex;
  let beamGroupCounter = 0;
  let pendingTieFrom = null;
  rhythms.forEach((token) => {
    const expanded = expandRhythmToken(token);
    const beamed = shouldExplicitlyBeam(token) && expanded.length > 1;
    const beamGroupId = beamed ? `beam-${beamGroupCounter++}` : undefined;
    expanded.forEach((rhythm) => {
      const info = rhythmInfo(rhythm);
      if (info.tie) {
        pendingTieFrom = items.length - 1;
        return;
      }
      if (info.rest) {
        items.push({ rhythm, isRest: true, beamGroupId: null, boundaryAfter: true });
        return;
      }
      const stepwise = ["quaver", "semiquaver", "dotted-quaver"].includes(rhythm);
      noteIndex = nearestMelodicIndex(noteIndex, stepwise, options.range);
      let pitch = noteByIndex(noteIndex);
      if (options.key?.scale?.length) {
        let attempts = 0;
        while (!options.key.scale.includes(pitch.letter) && attempts < 8) {
          noteIndex = nearestMelodicIndex(noteIndex, stepwise, options.range);
          pitch = noteByIndex(noteIndex);
          attempts += 1;
        }
      }
      const item = { rhythm, pitch: applyKeyAccidental(pitch, options.key), beamGroupId: options.disableAutoBeam && !beamed ? null : beamGroupId, boundaryAfter: false, tieFromPrevious: pendingTieFrom !== null };
      if (pendingTieFrom !== null && items[pendingTieFrom]) items[pendingTieFrom].tieToNext = true;
      pendingTieFrom = null;
      items.push(item);
    });
  });
  for (let i = 0; i < items.length; i += 1) {
    const current = items[i];
    const next = items[i + 1];
    if (!current.beamGroupId || !next || current.beamGroupId !== next.beamGroupId) current.boundaryAfter = true;
  }
  return { items, nextIndex: noteIndex };
}

function buildQuestion(activeLevel, enabledTimeTypes, enabledRhythms, restsEnabled) {
  const level = LEVELS[activeLevel] || LEVELS.N3;
  const key = randomKey(level, enabledRhythms);
  const timeChangeSignatureIds = level.timeSignatureIds.filter((id) => !["9/8", "12/8"].includes(id));
  const availableTimeChangeSignatureIds = timeChangeSignatureIds.filter((id) => {
    const signature = TIME_SIGNATURES.find((item) => item.id === id);
    return signature && enabledTimeTypes[signature.type] && signatureCanBeGenerated(signature, enabledRhythms, restsEnabled);
  });
  const useTimeChange = activeLevel === "AH" && enabledRhythms["time-changes"] && availableTimeChangeSignatureIds.length >= 2 && Math.random() < 0.35;
  const allowedSignatureIds = useTimeChange ? availableTimeChangeSignatureIds : level.timeSignatureIds;
  const timeSignature = weightedSignatureChoice(enabledTimeTypes, enabledRhythms, restsEnabled, allowedSignatureIds);
  const totalBars = useTimeChange ? 8 : 4;
  const changeBarIndex = useTimeChange ? 4 : null;
  const nextTimeSignature = useTimeChange
    ? weightedSignatureChoice(enabledTimeTypes, enabledRhythms, restsEnabled, availableTimeChangeSignatureIds.filter((id) => id !== timeSignature.id))
    : null;
  const systemCount = totalBars === 8 || timeSignature.id === "9/8" || timeSignature.id === "12/8" ? 2 : 1;
  const barsPerSystem = systemCount === 2 ? totalBars / 2 : 4;
  const systemTops = systemCount === 2 ? SYSTEM_TOPS_TWO_LINES : SYSTEM_TOPS_ONE_LINE;
  const items = [];
  const correctBoundaries = [];
  const correctBoundaryTypes = {};
  const minIndex = noteIndexByStep(level.minStep);
  const maxIndex = noteIndexByStep(level.maxStep);
  let previousIndex = clamp(randomIndex(NOTES.length), minIndex, maxIndex);
  let runningUnits = 0;
  const fixedBoundaries = [];
  for (let barIndex = 0; barIndex < totalBars; barIndex += 1) {
    const barTimeSignature = useTimeChange && barIndex >= changeBarIndex ? nextTimeSignature : timeSignature;
    const pattern = barTimeSignature.type === "compound" ? buildCompoundBar(barTimeSignature, enabledRhythms, restsEnabled) : chooseSimplePattern(barTimeSignature, enabledRhythms, restsEnabled);
    if (!pattern) return buildQuestion(activeLevel, enabledTimeTypes, levelEnabledMap(activeLevel), true);
    const built = addItemsFromRhythms(pattern, previousIndex, { disableAutoBeam: barTimeSignature.type === "compound", range: level, key });
    previousIndex = built.nextIndex;
    built.items.forEach((item) => {
      runningUnits += item.rhythm === "semibreve-rest" ? barTimeSignature.unitsPerBar : rhythmInfo(item.rhythm).units;
      const safeBeamGroupId = item.beamGroupId ? `bar-${barIndex}-${item.beamGroupId}` : item.beamGroupId;
      items.push({ ...item, beamGroupId: safeBeamGroupId, id: `item-${items.length}`, cumulativeUnits: runningUnits, barIndex });
    });
    if (barIndex < totalBars - 1) {
      const boundaryId = `boundary-${runningUnits}`;
      const isSystemBreakBoundary = systemCount > 1 && (barIndex + 1) % barsPerSystem === 0;
      if (isSystemBreakBoundary) {
        // The end of a stave already implies this barline.
      } else if (useTimeChange && barIndex < changeBarIndex) fixedBoundaries.push(boundaryId);
      else {
        correctBoundaries.push(runningUnits);
        correctBoundaryTypes[boundaryId] = "single";
      }
    }
  }
  const requiresFinalDouble = activeLevel === "N3";
  if (requiresFinalDouble) correctBoundaryTypes["boundary-final"] = "double";
  if (activeLevel === "AH" && enabledRhythms.ties) {
    const candidateBoundaries = [];
    for (let barIndex = useTimeChange ? changeBarIndex : 0; barIndex < totalBars - 1; barIndex += 1) {
      const before = [...items].reverse().find((item) => item.barIndex === barIndex && !item.isRest);
      const after = items.find((item) => item.barIndex === barIndex + 1 && !item.isRest);
      if (before && after) candidateBoundaries.push({ before, after });
    }
    const boundaryTie = randomItem(candidateBoundaries);
    if (boundaryTie) {
      boundaryTie.after.pitch = { ...boundaryTie.before.pitch };
      boundaryTie.before.tieToNext = true;
      boundaryTie.after.tieFromPrevious = true;
    }
  }
  return { id: Math.random().toString(36).slice(2), activeLevel, key, timeSignature, nextTimeSignature, changeBarIndex, items, correctBoundaries, correctBoundaryTypes, fixedBoundaries, requiresFinalDouble, totalBars, systemCount, barsPerSystem, systemTops };
}

function getItemSystemIndex(question, item) {
  const barIndex = Math.min(question.totalBars - 1, item.barIndex);
  return Math.floor(barIndex / question.barsPerSystem);
}

function systemMusicBounds(systemIndex) {
  const startX = systemIndex === 0 ? STAFF_LEFT + 136 : STAFF_LEFT + 122;
  return { startX, endX: STAFF_RIGHT - 10 };
}

function timeSignatureForBar(question, barIndex) {
  return question.changeBarIndex !== null && barIndex >= question.changeBarIndex ? question.nextTimeSignature : question.timeSignature;
}

function calculateLayout(question) {
  const systemItems = question.systemTops.map((_, systemIndex) => question.items.filter((item) => getItemSystemIndex(question, item) === systemIndex));
  const itemPositions = {};
  const boundaryPositions = [];
  systemItems.forEach((items, systemIndex) => {
    const { startX, endX } = systemMusicBounds(systemIndex);
    const useCompletedBarSpacing = question.changeBarIndex !== null && systemIndex === 0;
    if (useCompletedBarSpacing) {
      const firstBar = systemIndex * question.barsPerSystem;
      const barWidth = Math.max(1, endX - startX) / question.barsPerSystem;
      for (let barOffset = 0; barOffset < question.barsPerSystem; barOffset += 1) {
        const barIndex = firstBar + barOffset;
        const barItems = items.filter((item) => item.barIndex === barIndex);
        const signature = timeSignatureForBar(question, barIndex);
        const unitsPerBar = signature?.unitsPerBar || question.timeSignature.unitsPerBar;
        const barStartX = startX + barOffset * barWidth;
        const usableWidth = barWidth * 0.82;
        const padding = barWidth * 0.1;
        let usedUnits = 0;
        barItems.forEach((item, localIndex) => {
          const duration = item.rhythm === "semibreve-rest" ? unitsPerBar : rhythmInfo(item.rhythm).units;
          const x = barStartX + padding + ((usedUnits + duration * 0.35) / unitsPerBar) * usableWidth;
          itemPositions[item.id] = { x, systemIndex, localIndex };
          usedUnits += duration;
          const isSystemBreakBoundary = question.systemCount > 1 && (barIndex + 1) % question.barsPerSystem === 0;
          const isBarEnd = Math.abs(usedUnits - unitsPerBar) < 0.001;
          if (item.boundaryAfter && isBarEnd && barIndex < question.totalBars - 1 && !isSystemBreakBoundary) {
            const boundaryId = `boundary-${item.cumulativeUnits}`;
            boundaryPositions.push({ id: boundaryId, units: item.cumulativeUnits, x: barStartX + barWidth, systemIndex, fixed: question.fixedBoundaries?.includes(boundaryId) });
          }
        });
      }
      return;
    }
    const totalSpacing = items.reduce((sum, item) => sum + rhythmInfo(item.rhythm).spacing, 0);
    const unitWidth = Math.max(1, endX - startX) / Math.max(1, totalSpacing);
    let cursor = startX + unitWidth * 0.4;
    items.forEach((item, localIndex) => {
      const x = cursor;
      itemPositions[item.id] = { x, systemIndex, localIndex };
      cursor += rhythmInfo(item.rhythm).spacing * unitWidth;
      if (item.boundaryAfter) {
        const boundaryX = x + rhythmInfo(item.rhythm).spacing * unitWidth * 0.55;
        const isSystemBreakBoundary = question.systemCount > 1 && (item.barIndex + 1) % question.barsPerSystem === 0;
        if (item.barIndex < question.totalBars - 1 && !isSystemBreakBoundary) {
          const boundaryId = `boundary-${item.cumulativeUnits}`;
          boundaryPositions.push({ id: boundaryId, units: item.cumulativeUnits, x: boundaryX, systemIndex, fixed: question.fixedBoundaries?.includes(boundaryId) });
        }
      }
    });
  });
  if (question.requiresFinalDouble) {
    boundaryPositions.push({ id: "boundary-final", units: null, x: STAFF_RIGHT, systemIndex: question.systemTops.length - 1, fixed: false, expectedType: "double" });
  }
  return { itemPositions, boundaryPositions };
}

const playFeedbackSound = (...args) => window.MLH?.playFeedbackSound?.(...args);
const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS || {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG || { drawing: {}, symbols: {} };

const TIME_SIGNATURE_SYMBOLS = {
  "2/4": { top: ["timeSig2"], bottom: ["timeSig4"], key: "timeSig24" },
  "3/4": { top: ["timeSig3"], bottom: ["timeSig4"], key: "timeSig34" },
  "4/4": { top: ["timeSig4"], bottom: ["timeSig4"], key: "timeSig44" },
  "5/4": { top: ["timeSig5"], bottom: ["timeSig4"], key: "timeSig54" },
  "6/8": { top: ["timeSig6"], bottom: ["timeSig8"], key: "timeSig68" },
  "9/8": { top: ["timeSig9"], bottom: ["timeSig8"], key: "timeSig98" },
  "12/8": { top: ["timeSig1", "timeSig2"], bottom: ["timeSig8"], key: "timeSig128" },
};

function sharedActualSymbolKey(key) {
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  return key;
}

function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols || {};
  return symbols[key] || symbols[sharedActualSymbolKey(key)] || {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}

function sharedSymbolForKey(key) {
  return SHARED_SYMBOLS[sharedActualSymbolKey(key)] || "";
}

function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", opacity = 1, lineGap = LINE_GAP, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
  return (
    <text
      className="music-symbol"
      x={adjustedX}
      y={adjustedY}
      fill={colour}
      opacity={opacity}
      fontSize={fontSize}
      textAnchor="middle"
      transform={`translate(${adjustedX} ${adjustedY}) scale(${settings.widthScale || 1} ${settings.heightScale || 1}) translate(${-adjustedX} ${-adjustedY})`}
      pointerEvents="none"
    >
      {glyph}
    </text>
  );
}

function StaffLines({ systemTop }) {
  return <g>{[0, 1, 2, 3, 4].map((line) => <line key={line} x1={STAFF_LEFT} x2={STAFF_RIGHT} y1={systemTop + line * LINE_GAP} y2={systemTop + line * LINE_GAP} stroke="currentColor" strokeWidth="1.2" />)}</g>;
}

function TrebleClef({ systemTop }) {
  return <CalibratedSymbol symbolKey="gClef" x={STAFF_LEFT + LINE_GAP * 3.2} y={yForStep(2, systemTop)} />;
}

function KeySignature({ keySignature, systemTop }) {
  return (
    <g>
      {(keySignature?.signature || []).map((item, index) => (
        <CalibratedSymbol
          key={`${item.type}-${index}`}
          symbolKey={item.type === "sharp" ? "sharpKeySignature" : "flatKeySignature"}
          x={STAFF_LEFT + 58 + index * KEY_SIGNATURE_SPACING}
          y={yForStep(item.step, systemTop)}
        />
      ))}
    </g>
  );
}

function TimeSignatureGlyph({ signature, x, systemTop, colour = "currentColor" }) {
  const definition = TIME_SIGNATURE_SYMBOLS[signature.id] || { top: [`timeSig${signature.top}`], bottom: [`timeSig${signature.bottom}`], key: `timeSig${signature.top}${signature.bottom}` };
  const settings = sharedSymbolConfig(definition.key);
  const anchorY = yForStep(5.3, systemTop);
  const adjustedX = x + LINE_GAP * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = anchorY + LINE_GAP * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = LINE_GAP * Number(settings.fontSizeScale || 3.5);
  const topText = definition.top.map((key) => sharedSymbolForKey(key)).join("");
  const bottomText = definition.bottom.map((key) => sharedSymbolForKey(key)).join("");
  return (
    <g transform={`translate(${adjustedX} ${adjustedY}) scale(${settings.widthScale || 1} ${settings.heightScale || 1}) translate(${-adjustedX} ${-adjustedY})`} fill={colour} pointerEvents="none">
      <text className="music-symbol" x={adjustedX} y={adjustedY - fontSize * 0.14} fontSize={fontSize} textAnchor="middle">{topText}</text>
      <text className="music-symbol" x={adjustedX} y={adjustedY + fontSize * 0.43} fontSize={fontSize} textAnchor="middle">{bottomText}</text>
    </g>
  );
}

function LedgerLines({ x, step, systemTop, colour }) {
  const lines = [];
  for (let ledgerStep = -2; ledgerStep >= step; ledgerStep -= 2) lines.push(yForStep(ledgerStep, systemTop));
  for (let ledgerStep = 10; ledgerStep <= step; ledgerStep += 2) lines.push(yForStep(ledgerStep, systemTop));
  const settings = sharedSymbolConfig("ledgerLines");
  const xOffset = LINE_GAP * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const yOffset = LINE_GAP * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const halfWidth = (LINE_GAP * Number(SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4) * Number(settings.widthScale || 1)) / 2;
  const thickness = Math.max(1, LINE_GAP * Number(SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11) * Number(settings.heightScale || 1));
  return <g>{lines.map((y) => <line key={y} x1={x - halfWidth + xOffset} x2={x + halfWidth + xOffset} y1={y + yOffset} y2={y + yOffset} stroke={colour || "currentColor"} strokeWidth={thickness} />)}</g>;
}

function Rest({ rhythm, x, systemTop, colour }) {
  const ink = colour || "currentColor";
  const middleY = yForStep(4, systemTop);
  const restKey = rhythm === "semibreve-rest"
    ? "wholeRest"
    : rhythm === "minim-rest"
      ? "halfRest"
      : rhythm === "quaver-rest"
        ? "eighthRest"
        : "quarterRest";
  return (
    <g>
      <CalibratedSymbol symbolKey={restKey} x={x} y={middleY} colour={ink} />
      {rhythm === "dotted-crotchet-rest" && <CalibratedSymbol symbolKey="augmentationDotSpace" x={x + LINE_GAP * 1.1} y={middleY - LINE_GAP * 0.4} colour={ink} />}
    </g>
  );
}

function Accidental({ value, x, y, colour = "currentColor" }) {
  if (!value) return null;
  return <CalibratedSymbol symbolKey={value > 0 ? "sharpInScore" : "flatInScore"} x={x} y={y} colour={colour} />;
}

function noteSymbolKey(rhythm, stemDown, beamed = false) {
  if (rhythm === "semibreve") return "wholeNote";
  if (rhythm === "minim" || rhythm === "dotted-minim") return stemDown ? "halfNoteStemDown" : "halfNoteStemUp";
  if (beamed) return stemDown ? "noteheadBlackStemDown" : "noteheadBlackStemUp";
  if (rhythm === "quaver" || rhythm === "dotted-quaver") return stemDown ? "eighthNoteStemDown" : "eighthNoteStemUp";
  if (rhythm === "semiquaver") return stemDown ? "sixteenthNoteStemDown" : "sixteenthNoteStemUp";
  return stemDown ? "quarterNoteStemDown" : "quarterNoteStemUp";
}

function getStemData(item, x, systemTop, stemDownOverride) {
  const step = item.pitch.step;
  const y = yForStep(step, systemTop);
  const stemDown = stemDownOverride === null || stemDownOverride === undefined ? stemGoesDown(step) : stemDownOverride;
  const stemX = stemDown ? x - NOTE_RX : x + NOTE_RX;
  const stemEndY = stemDown ? y + STEM_LENGTH : y - STEM_LENGTH;
  return { step, y, stemDown, stemX, stemEndY };
}

function Note({ item, x, systemTop, stemDownOverride, forcedStemEndY, showFlag, colour }) {
  const info = rhythmInfo(item.rhythm);
  const ink = colour || "currentColor";
  if (info.rest) return <Rest rhythm={item.rhythm} x={x} systemTop={systemTop} colour={ink} />;
  const stem = getStemData(item, x, systemTop, stemDownOverride);
  const beamed = showFlag === false;
  const dotKey = Math.abs(stem.step % 2) === 1 ? "augmentationDotSpace" : "augmentationDotLine";
  const dotY = Math.abs(stem.step % 2) === 1 ? stem.y : stem.y - LINE_GAP * 0.25;
  const stemEndY = forcedStemEndY === null || forcedStemEndY === undefined ? stem.stemEndY : forcedStemEndY;
  const stemThickness = Math.max(1, LINE_GAP * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12));
  return (
    <g>
      <LedgerLines x={x} step={stem.step} systemTop={systemTop} colour={ink} />
      <Accidental value={item.pitch.writtenAccidental} x={x - LINE_GAP * 2.35} y={stem.y - LINE_GAP * 0.5} colour={ink} />
      <CalibratedSymbol symbolKey={noteSymbolKey(item.rhythm, stem.stemDown, beamed)} x={x} y={stem.y} colour={ink} />
      {beamed && info.stem && <line x1={stem.stemX} x2={stem.stemX} y1={stem.y} y2={stemEndY} stroke={ink} strokeWidth={stemThickness} />}
      {info.dots === 1 && <CalibratedSymbol symbolKey={dotKey} x={x + LINE_GAP * 1.3} y={dotY} colour={ink} />}
    </g>
  );
}

function getBeamLineYAtX(x, start, end) {
  if (!start || !end || start.x === end.x) return start ? start.y : end ? end.y : 0;
  return start.y + ((x - start.x) / (end.x - start.x)) * (end.y - start.y);
}

function getBeamData(items, positions, systemTop) {
  const settings = sharedSymbolConfig("quaverBeam");
  const averageStep = items.reduce((sum, item) => sum + item.pitch.step, 0) / items.length;
  const stemDown = averageStep > 4;
  const xOffset = LINE_GAP * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const yOffset = LINE_GAP * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const stemLength = STEM_LENGTH * Number(settings.heightScale || 1);
  const beamWidthAdjust = LINE_GAP * Number(settings.widthScale || 1) - LINE_GAP;
  const firstY = yForStep(items[0].pitch.step, systemTop);
  const lastY = yForStep(items[items.length - 1].pitch.step, systemTop);
  const firstStemX = positions[0] + xOffset + (stemDown ? -NOTE_RX : NOTE_RX);
  const lastStemX = positions[positions.length - 1] + xOffset + (stemDown ? -NOTE_RX : NOTE_RX);
  return {
    stemDown,
    start: { x: firstStemX - beamWidthAdjust, y: firstY + yOffset + (stemDown ? stemLength : -stemLength) },
    end: { x: lastStemX + beamWidthAdjust, y: lastY + yOffset + (stemDown ? stemLength : -stemLength) },
  };
}

function isBeamable(item) {
  return item && !item.isRest && ["quaver", "semiquaver", "dotted-quaver"].includes(item.rhythm) && item.beamGroupId !== null && item.beamGroupId !== undefined;
}

function getBeamGroups(items) {
  const groups = [];
  let index = 0;
  while (index < items.length) {
    const item = items[index];
    if (!isBeamable(item)) { index += 1; continue; }
    const start = index;
    const id = item.beamGroupId;
    while (index < items.length && items[index].beamGroupId === id && isBeamable(items[index])) index += 1;
    const end = index - 1;
    if (end > start) groups.push({ start, end });
  }
  return groups;
}

function Beam({ start, end, groupItems, groupPositions, stemDown }) {
  const settings = sharedSymbolConfig("quaverBeam");
  const secondarySettings = sharedSymbolConfig("semiquaverBeam");
  const xOffset = LINE_GAP * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const secondaryWidthAdjust = LINE_GAP * Number(secondarySettings.widthScale || 1) - LINE_GAP;
  const secondaryOffset = (stemDown ? -1 : 1) * LINE_GAP * 0.72 * Number(secondarySettings.heightScale || 1);
  const beamThickness = Math.max(1, LINE_GAP * Number(SHARED_CONFIG.drawing?.beamThicknessScale || 0.42) * Number(settings.fontSizeScale || 1));
  const secondarySegments = [];
  let segmentStart = null;
  groupItems.forEach((item, index) => {
    const isSemi = rhythmInfo(item.rhythm).beams === 2;
    const next = groupItems[index + 1];
    const nextIsSemi = !!(next && rhythmInfo(next.rhythm).beams === 2);
    if (isSemi && segmentStart === null) segmentStart = index;
    if (segmentStart !== null && (!nextIsSemi || index === groupItems.length - 1)) {
      secondarySegments.push({ startIndex: segmentStart, endIndex: index, isHook: index === segmentStart });
      segmentStart = null;
    }
  });
  function stemXFor(index) {
    const x = groupPositions[index] + xOffset;
    return x + (stemDown ? -NOTE_RX : NOTE_RX);
  }
  function beamPolygonPoints(x1, y1, x2, y2) {
    const dx = x2 - x1;
    const dy = y2 - y1;
    const length = Math.hypot(dx, dy) || 1;
    const normalX = (-dy / length) * (beamThickness / 2);
    const normalY = (dx / length) * (beamThickness / 2);
    return [`${x1 + normalX},${y1 + normalY}`, `${x2 + normalX},${y2 + normalY}`, `${x2 - normalX},${y2 - normalY}`, `${x1 - normalX},${y1 - normalY}`].join(" ");
  }
  return <g><polygon points={beamPolygonPoints(start.x, start.y, end.x, end.y)} fill="currentColor" />{secondarySegments.map((segment, index) => { const x1 = stemXFor(segment.startIndex) - secondaryWidthAdjust; const y1 = getBeamLineYAtX(x1, start, end) + secondaryOffset; const x2 = segment.isHook ? x1 + (segment.startIndex > 0 ? -14 : 14) : stemXFor(segment.endIndex) + secondaryWidthAdjust; const y2 = getBeamLineYAtX(x2, start, end) + secondaryOffset; return <polygon key={index} points={beamPolygonPoints(x1, y1, x2, y2)} fill="currentColor" />; })}</g>;
}

function Barline({ x, systemTop, colour, opacity, dashed }) {
  return <line x1={x} x2={x} y1={systemTop} y2={systemTop + LINE_GAP * 4} stroke={colour || "currentColor"} strokeWidth="2" opacity={opacity === undefined ? 1 : opacity} strokeDasharray={dashed ? "4 4" : undefined} />;
}

function FinalBarline({ x, systemTop, colour, opacity }) {
  return <CalibratedSymbol symbolKey="barlineFinal" x={x} y={yForStep(4, systemTop)} colour={colour || "currentColor"} opacity={opacity === undefined ? 1 : opacity} />;
}

function BoundaryMarker({ type, x, systemTop, colour, opacity, dashed }) {
  if (type === "double") {
    if (!dashed) return <FinalBarline x={x} systemTop={systemTop} colour={colour} opacity={opacity} />;
    return <g opacity={opacity === undefined ? 1 : opacity}>
      <line x1={x - 4} x2={x - 4} y1={systemTop} y2={systemTop + LINE_GAP * 4} stroke={colour || "currentColor"} strokeWidth="1.6" strokeDasharray="4 4" />
      <line x1={x + 1} x2={x + 1} y1={systemTop} y2={systemTop + LINE_GAP * 4} stroke={colour || "currentColor"} strokeWidth="3.2" strokeDasharray="4 4" />
    </g>;
  }
  return <Barline x={x} systemTop={systemTop} colour={colour} opacity={opacity} dashed={dashed} />;
}

function BarlineToolGlyph({ type }) {
  return (
    <svg viewBox="0 0 56 48" className="h-10 w-14 overflow-visible" aria-hidden="true">
      <line x1="8" x2="48" y1="10" y2="10" stroke="currentColor" strokeWidth="1.5" />
      <line x1="8" x2="48" y1="17" y2="17" stroke="currentColor" strokeWidth="1.5" />
      <line x1="8" x2="48" y1="24" y2="24" stroke="currentColor" strokeWidth="1.5" />
      <line x1="8" x2="48" y1="31" y2="31" stroke="currentColor" strokeWidth="1.5" />
      <line x1="8" x2="48" y1="38" y2="38" stroke="currentColor" strokeWidth="1.5" />
      {type === "double" ? (
        <g>
          <line x1="43" x2="43" y1="10" y2="38" stroke="currentColor" strokeWidth="1.8" />
          <line x1="48" x2="48" y1="10" y2="38" stroke="currentColor" strokeWidth="3.6" />
        </g>
      ) : (
        <line x1="28" x2="28" y1="10" y2="38" stroke="currentColor" strokeWidth="2.4" />
      )}
    </svg>
  );
}

function Tie({ from, to, systemTop }) {
  if (!from || !to || from.systemIndex !== to.systemIndex) return null;
  const startY = yForStep(from.item.pitch.step, systemTop);
  const endY = yForStep(to.item.pitch.step, systemTop);
  const averageStep = (from.item.pitch.step + to.item.pitch.step) / 2;
  const tieAbove = stemGoesDown(averageStep);
  const leftX = Math.min(from.x, to.x) + NOTE_RX * 0.8;
  const rightX = Math.max(from.x, to.x) - NOTE_RX * 0.8;
  const width = Math.max(14, rightX - leftX);
  const baseY = (startY + endY) / 2 + (tieAbove ? -LINE_GAP * 1.0 : LINE_GAP * 1.0);
  const archDepth = clamp(width * 0.12, LINE_GAP * 0.55, LINE_GAP * 1.45);
  const thickness = Math.max(1.6, LINE_GAP * 0.22);
  const outerY = baseY + (tieAbove ? -archDepth : archDepth);
  const innerY = outerY + (tieAbove ? thickness : -thickness);
  const path = [
    `M ${leftX} ${baseY}`,
    `C ${leftX + width * 0.22} ${outerY}, ${rightX - width * 0.22} ${outerY}, ${rightX} ${baseY}`,
    `C ${rightX - width * 0.22} ${innerY}, ${leftX + width * 0.22} ${innerY}, ${leftX} ${baseY}`,
    "Z",
  ].join(" ");
  return <path d={path} fill="currentColor" transform={`translate(0 ${tieAbove ? -1 : 1})`} />;
}

function Score({ question, placedBoundaries, selectedBarlineType, hoverBoundaryId, setHoverBoundaryId, toggleBoundary, feedback }) {
  const scoreHeight = question.systemTops[question.systemTops.length - 1] + LINE_GAP * 4 + 38;
  const layout = useMemo(() => calculateLayout(question), [question]);
  const beamGroups = getBeamGroups(question.items);
  const correctBoundaryTypes = question.correctBoundaryTypes || Object.fromEntries(question.correctBoundaries.map((units) => [`boundary-${units}`, "single"]));
  function groupForIndex(index) { return beamGroups.find((group) => index >= group.start && index <= group.end) || null; }

  return (
    <svg viewBox={`0 0 ${VIEWBOX_WIDTH} ${scoreHeight}`} className="h-auto w-full select-none overflow-hidden" aria-label="Barlines exercise">
      <rect x="0" y="0" width={VIEWBOX_WIDTH} height={scoreHeight} fill="white" />
      {question.systemTops.map((systemTop, systemIndex) => {
        const showInitialSignature = systemIndex === 0;
        const showChangeSignature = question.changeBarIndex !== null && systemIndex === 1;
        const isLastSystem = systemIndex === question.systemTops.length - 1;
        return <g key={systemIndex}><StaffLines systemTop={systemTop} /><TrebleClef systemTop={systemTop} />{showInitialSignature && <><KeySignature keySignature={question.key} systemTop={systemTop} /><TimeSignatureGlyph signature={question.timeSignature} x={STAFF_LEFT + LINE_GAP * 12} systemTop={systemTop} /></>}{showChangeSignature && <TimeSignatureGlyph signature={question.nextTimeSignature} x={STAFF_LEFT + LINE_GAP * 10.5} systemTop={systemTop} />}{isLastSystem ? (!question.requiresFinalDouble && <FinalBarline x={STAFF_RIGHT} systemTop={systemTop} />) : <Barline x={STAFF_RIGHT} systemTop={systemTop} />}</g>;
      })}
      {question.items.map((item, index) => {
        const position = layout.itemPositions[item.id];
        const systemTop = question.systemTops[position.systemIndex];
        if (item.isRest) return <Rest key={item.id} rhythm={item.rhythm} x={position.x} systemTop={systemTop} />;
        const group = groupForIndex(index);
        if (!group) return <Note key={item.id} item={item} x={position.x} systemTop={systemTop} />;
        const groupItems = question.items.slice(group.start, group.end + 1);
        const groupPositions = groupItems.map((groupItem) => layout.itemPositions[groupItem.id].x);
        const beamData = getBeamData(groupItems, groupPositions, systemTop);
        const stem = getStemData(item, position.x, systemTop, beamData.stemDown);
        return <Note key={item.id} item={item} x={position.x} systemTop={systemTop} stemDownOverride={beamData.stemDown} forcedStemEndY={getBeamLineYAtX(stem.stemX, beamData.start, beamData.end)} showFlag={false} />;
      })}
      {beamGroups.map((group, index) => {
        const groupItems = question.items.slice(group.start, group.end + 1);
        const firstPosition = layout.itemPositions[groupItems[0].id];
        const systemTop = question.systemTops[firstPosition.systemIndex];
        const groupPositions = groupItems.map((item) => layout.itemPositions[item.id].x);
        const beamData = getBeamData(groupItems, groupPositions, systemTop);
        return <Beam key={index} start={beamData.start} end={beamData.end} groupItems={groupItems} groupPositions={groupPositions} stemDown={beamData.stemDown} />;
      })}
      {question.items.map((item, index) => {
        if (!item.tieToNext) return null;
        const next = question.items[index + 1];
        if (!next || item.isRest || next.isRest) return null;
        const fromPosition = layout.itemPositions[item.id];
        const toPosition = layout.itemPositions[next.id];
        const systemTop = question.systemTops[fromPosition.systemIndex];
        return <Tie key={`tie-${item.id}`} from={{ ...fromPosition, item }} to={{ ...toPosition, item: next }} systemTop={systemTop} />;
      })}
      {layout.boundaryPositions.map((boundary) => {
        const systemTop = question.systemTops[boundary.systemIndex];
        if (boundary.fixed) return <Barline key={boundary.id} x={boundary.x} systemTop={systemTop} />;
        const placedType = placedBoundaries[boundary.id];
        const placed = Boolean(placedType);
        const hovered = hoverBoundaryId === boundary.id;
        const expectedType = correctBoundaryTypes[boundary.id] || boundary.expectedType || null;
        const isCorrect = placedType === expectedType;
        const colour = feedback ? (placed && isCorrect ? COLOUR.green : placed && !isCorrect ? COLOUR.red : COLOUR.green) : COLOUR.black;
        const showMissingCorrect = feedback && expectedType && !placed;
        const displayType = placedType || (showMissingCorrect ? expectedType : selectedBarlineType);
        if (!placed && !hovered && !showMissingCorrect) {
          return <rect key={boundary.id} x={boundary.x - 13} y={systemTop - 18} width="26" height={LINE_GAP * 4 + 36} fill="transparent" onMouseEnter={() => setHoverBoundaryId(boundary.id)} onMouseLeave={() => setHoverBoundaryId(null)} onClick={() => toggleBoundary(boundary.id)} />;
        }
        return <g key={boundary.id}><rect x={boundary.x - 13} y={systemTop - 18} width="26" height={LINE_GAP * 4 + 36} fill="transparent" onMouseEnter={() => setHoverBoundaryId(boundary.id)} onMouseLeave={() => setHoverBoundaryId(null)} onClick={() => toggleBoundary(boundary.id)} /><BoundaryMarker type={displayType} x={boundary.x} systemTop={systemTop} colour={colour} opacity={placed || showMissingCorrect ? 1 : 0.35} dashed={!placed} /></g>;
      })}
    </svg>
  );
}

function MenuRhythmGlyph({ rhythm }) {

function MenuRestGlyph() {
  return (
    <svg viewBox="0 0 70 70" className="h-10 w-16 overflow-visible">
      <g transform="translate(0, 7) scale(1.05)">
        <Rest rhythm="crotchet-rest" x={32} systemTop={8} />
      </g>

function MenuRows({ activeLevel, enabledRhythms, setEnabledRhythms, restsEnabled, setRestsEnabled, showRhythmGuide, setShowRhythmGuide, newQuestion }) {
  const level = LEVELS[activeLevel] || LEVELS.N3;
  function toggleEnabled(id) {
    setEnabledRhythms((current) => {
      const next = { ...current, [id]: !current[id] };
      const activeRhythms = level.rhythmIds.filter((rhythmId) => next[rhythmId] && !["rests", "ties", "syncopation", "time-changes"].includes(rhythmId));
      const activeTimes = level.timeSignatureIds.filter((signatureId) => next[`time-${signatureId}`]);
      const activeKeys = level.keyIds.filter((keyId) => next[`key-${keyId}`]);
      if (!activeRhythms.length || !activeTimes.length || !activeKeys.length) return current;
      window.setTimeout(() => newQuestion(next, restsEnabled), 0);
      return next;
    });
  }
  function toggleRests() {
    setEnabledRhythms((current) => {
      const nextRestState = !restsEnabled;
      const next = { ...current, rests: nextRestState };
      setRestsEnabled(nextRestState);
      window.setTimeout(() => newQuestion(next, nextRestState), 0);
      return next;
    });
  }
  return <>
      <window.MLH.MenuSubheading>Help</window.MLH.MenuSubheading>
      <window.MLH.MenuToggleRow glyph={<span className="text-[36px] leading-none">♩</span>} label="Show Rhythm Guide" checked={showRhythmGuide} onChange={() => setShowRhythmGuide((value) => !value)} />
      <window.MLH.MenuSubheading>Time Signatures</window.MLH.MenuSubheading>
      {level.timeSignatureIds.map((signatureId) => (
        <window.MLH.MenuToggleRow key={signatureId} glyph={<TimeSignatureMenuGlyph signatures={[signatureId]} />} label={signatureId} checked={enabledRhythms[`time-${signatureId}`]} onChange={() => toggleEnabled(`time-${signatureId}`)} />
      ))}
      <window.MLH.MenuSubheading>Rhythms</window.MLH.MenuSubheading>
        <div className="space-y-1.5">
          {RHYTHM_OPTIONS.filter((rhythm) => level.rhythmIds.includes(rhythm.id) && !["ties", "syncopation", "time-changes"].includes(rhythm.id)).map((rhythm) => (
            <window.MLH.MenuToggleRow
              key={rhythm.id}
              glyph={rhythm.id === "rests" ? <MenuRestGlyph /> : <MenuRhythmGlyph rhythm={rhythm.id} />}
              label={rhythm.label}
              checked={enabledRhythms[rhythm.id]}
              onChange={() => {
                if (rhythm.id === "rests") {
                  toggleRests();
                  return;
                }
                toggleEnabled(rhythm.id);
              }}
            />
          ))}
        </div>
      </>;
}

function useInjectedStyles() {
  useEffect(() => {
    if (document.getElementById("barlines-golden-style")) return;
    const style = document.createElement("style");
    style.id = "barlines-golden-style";
    style.innerHTML = `
      button { -webkit-tap-highlight-color: transparent; user-select: none; transition: transform 0.08s ease, filter 0.08s ease, background-color 0.12s ease, box-shadow 0.12s ease; cursor: pointer; }
      button:hover { transform: translateY(-1px) scale(1.01); filter: brightness(1.08); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
      button:active { transform: scale(0.96); filter: brightness(0.92); }
      button:disabled { cursor: not-allowed; opacity: 0.5; }
      button:focus-visible { outline: 2px solid rgba(22,163,74,0.35); outline-offset: 2px; }
      @keyframes medalShine { 0%,100% { transform: scale(1) rotate(-4deg); filter: drop-shadow(0 0 0 rgba(250,204,21,0)); } 50% { transform: scale(1.16) rotate(4deg); filter: drop-shadow(0 0 10px rgba(250,204,21,.9)); } }
      @keyframes confettiDrop { 0% { transform: translateY(-12px) rotate(0deg); opacity: 0; } 12% { opacity: 1; } 100% { transform: translateY(72px) rotate(260deg); opacity: 0; } }
      @keyframes incorrectDropShake { 0% { transform: translateY(-28px); opacity: 0; } 55% { transform: translateY(0); opacity: 1; } 68% { transform: translateX(-5px); } 78% { transform: translateX(5px); } 88% { transform: translateX(-3px); } 100% { transform: translateX(0); opacity: 1; } }
      @keyframes correctFade { 0% { transform: translateY(-18px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes feedbackFadeOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-10px); } }
    `;
    document.head.appendChild(style);
  }, []);
}

const useClickOutside = window.MLH.useClickOutside;

function App() {
  useInjectedStyles();
  const initialLevel = initialLevelFromUrl();
  const [activeLevel, setActiveLevel] = useState(initialLevel);
  const [enabledRhythms, setEnabledRhythms] = useState(() => levelEnabledMap(initialLevel));
  const [restsEnabled, setRestsEnabled] = useState(() => LEVELS[initialLevel].rhythmIds.includes("rests"));
  const [question, setQuestion] = useState(() => buildQuestion(initialLevel, levelTimeTypes(initialLevel), levelEnabledMap(initialLevel), LEVELS[initialLevel].rhythmIds.includes("rests")));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [levelOpen, setLevelOpen] = useState(false);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [showRhythmGuide, setShowRhythmGuide] = useState(false);
  const [placedBoundaries, setPlacedBoundaries] = useState({});
  const [selectedBarlineType, setSelectedBarlineType] = useState("single");
  const [hoverBoundaryId, setHoverBoundaryId] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);
  const levelRef = useRef(null);
  const customiseRef = useRef(null);
  const feedbackTimersRef = useRef([]);
  const levelTaskStatusRef = useRef(null);

  useClickOutside([levelRef, customiseRef], [() => levelOpen && setLevelOpen(false), () => customiseOpen && setCustomiseOpen(false)]);

  const placedBoundaryCount = Object.keys(placedBoundaries).length;
  const expectedBoundaryTypes = question.correctBoundaryTypes || Object.fromEntries(question.correctBoundaries.map((units) => [`boundary-${units}`, "single"]));
  const expectedBoundaryCount = Object.keys(expectedBoundaryTypes).length;
  const canConfirm = placedBoundaryCount > 0;
  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const medalEligible = taskMatchesLevel(activeLevel, enabledRhythms, restsEnabled);
  const displayedLevel = medalEligible ? activeLevel : "Custom";
  const displayedLevelLabel = medalEligible ? LEVELS[activeLevel].label : "Custom";

  useEffect(() => {
    if (levelTaskStatusRef.current === null) {
      levelTaskStatusRef.current = medalEligible;
      return;
    }
    if (levelTaskStatusRef.current === medalEligible) return;
    levelTaskStatusRef.current = medalEligible;
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
  }, [medalEligible]);

  function clearFeedbackTimers() {
    feedbackTimersRef.current.forEach((timerId) => window.clearTimeout(timerId));
    feedbackTimersRef.current = [];
  }

  function scheduleFeedbackTimer(callback, delay) {
    const timerId = window.setTimeout(() => {
      feedbackTimersRef.current = feedbackTimersRef.current.filter((id) => id !== timerId);
      callback();
    }, delay);
    feedbackTimersRef.current.push(timerId);
  }

  function resetTask(nextQuestion) {
    setQuestion(nextQuestion);
    setPlacedBoundaries({});
    setSelectedBarlineType("single");
    setHoverBoundaryId(null);
    setFeedback(null);
    setFeedbackFading(false);
  }

  function newQuestion(nextEnabledRhythms, nextRestsEnabled, nextLevel = activeLevel) {
    clearFeedbackTimers();
    const rhythms = nextEnabledRhythms || enabledRhythms;
    const timeTypes = levelTimeTypes(nextLevel, rhythms);
    const rests = nextRestsEnabled === undefined ? restsEnabled : nextRestsEnabled;
    setQuestionVisible(false);
    window.setTimeout(() => {
      resetTask(buildQuestion(nextLevel, timeTypes, rhythms, rests));
      setQuestionVisible(true);
    }, 260);
  }

  function applyLevel(levelKey) {
    const nextEnabled = levelEnabledMap(levelKey);
    const nextRests = LEVELS[levelKey].rhythmIds.includes("rests");
    setActiveLevel(levelKey);
    setEnabledRhythms(nextEnabled);
    setRestsEnabled(nextRests);
    setLevelOpen(false);
    setCustomiseOpen(false);
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion(nextEnabled, nextRests, levelKey);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion();
  }

  function clearBarlines() {
    if (!feedback) setPlacedBoundaries({});
  }

  function toggleBoundary(boundaryId) {
    if (feedback) return;
    setPlacedBoundaries((current) => {
      if (current[boundaryId] === selectedBarlineType) {
        const next = { ...current };
        delete next[boundaryId];
        return next;
      }
      return { ...current, [boundaryId]: selectedBarlineType };
    });
  }

  function confirmAnswer() {
    if (!canConfirm || feedback) return;
    const isCorrect = Object.keys(placedBoundaries).length === expectedBoundaryCount && Object.entries(placedBoundaries).every(([id, type]) => expectedBoundaryTypes[id] === type);
    const nextStreak = isCorrect ? streak + 1 : 0;
    playFeedbackSound(isCorrect, false, null);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });
    if (medalEligible && isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }
    if (isCorrect) {
      setFeedbackFading(false);
      scheduleFeedbackTimer(() => setFeedbackFading(true), 1700);
      scheduleFeedbackTimer(() => newQuestion(), 2000);
    }
  }

  function fadeToNextQuestion() {
    if (!feedback || feedbackFading) return;
    clearFeedbackTimers();
    setFeedbackFading(true);
    scheduleFeedbackTimer(() => newQuestion(), 280);
  }

  const promptText = question.changeBarIndex !== null
    ? "Bars 1-4 are complete. The time signature changes on line 2; insert the missing barlines for bars 5-8."
    : question.activeLevel === "N3"
      ? "Insert the missing barlines and finish with a double barline."
      : "Insert the missing bar lines.";

  return (
    <div className={window.MLH.shell.pageShellClass}>
      <window.MLH.AppHeader icon={ASSET.appIcon} title="Barlines" subtitle="Insert barlines at the correct place in the music.">
        <window.MLH.ScoreStreakPanel assets={ASSET} correct={correct} attempted={attempted} accuracy={accuracy} streak={streak} bestStreak={bestStreak} resetScore={resetScore} confettiKey={confettiKey} medalEligible={medalEligible} />
      </window.MLH.AppHeader>

      <div className={window.MLH.shell.pageContentClass}>
        <main className={`${window.MLH.shell.mainShellClass} flex flex-col pb-5 md:pb-6`} onPointerDown={() => { if (feedback) fadeToNextQuestion(); }}>
          <window.MLH.AppToolbar
            left={
              <div className="flex items-center gap-2">
                <div className="hub-menu-anchor relative" ref={levelRef}>
                  <window.MLH.LevelButton
                    icon={<img src={ASSET.levels} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />}
                    activeLevel={displayedLevel}
                    activeLabel={displayedLevelLabel}
                    isCustom={!medalEligible}
                    onClick={() => { setCustomiseOpen(false); setLevelOpen((value) => !value); }}
                    dataMenuTrigger={true}
                  />
                  {levelOpen && <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}>
                    <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                  </window.MLH.MenuPanel>}
                </div>
                <div className="hub-menu-anchor relative" ref={customiseRef}>
                  <window.MLH.CustomiseButton
                    icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />}
                    onClick={() => { setLevelOpen(false); setCustomiseOpen((value) => !value); }}
                    dataMenuTrigger={true}
                  />
                  {customiseOpen && <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}>
                    <MenuRows activeLevel={activeLevel} enabledRhythms={enabledRhythms} setEnabledRhythms={setEnabledRhythms} restsEnabled={restsEnabled} setRestsEnabled={setRestsEnabled} showRhythmGuide={showRhythmGuide} setShowRhythmGuide={setShowRhythmGuide} newQuestion={newQuestion} />
                  </window.MLH.MenuPanel>}
                </div>
              </div>
            }
            feedback={<FeedbackBanner feedback={feedback} fading={feedbackFading} />}
            right={<window.MLH.SkipButton onClick={() => newQuestion()} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />} />}
          />

          {showRhythmGuide && <div className="relative z-[15]"><RhythmGuide /></div>}

          <div className={`relative -top-[18px] flex min-h-[270px] items-center overflow-hidden rounded-xl transition-opacity duration-300 md:min-h-[310px] ${questionVisible ? "opacity-100" : "opacity-0"}`}><Score question={question} placedBoundaries={placedBoundaries} selectedBarlineType={selectedBarlineType} hoverBoundaryId={hoverBoundaryId} setHoverBoundaryId={setHoverBoundaryId} toggleBoundary={toggleBoundary} feedback={feedback} /></div>

          <div className={`relative z-10 mt-auto overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:mx-3 ${question.systemCount === 1 ? 'md:-mt-[0px]' : 'md:-mt-[10px]'}`}><div className="flex flex-wrap items-center justify-between gap-3 text-stone-900"><div className="min-w-0"><p className="text-base font-semibold leading-tight">{promptText}</p>{question.activeLevel === "N3" && <div className="mt-3 flex flex-wrap gap-2">{BARLINE_TOOLS.map((tool) => <button key={tool.id} type="button" aria-label={tool.label} title={tool.label} onClick={() => setSelectedBarlineType(tool.id)} disabled={!!feedback} className={`flex h-14 w-20 items-center justify-center rounded-xl border ${selectedBarlineType === tool.id ? "border-black bg-black text-white" : "border-stone-300 bg-white text-stone-900"}`}><BarlineToolGlyph type={tool.id} /></button>)}</div>}</div><div className={window.MLH.ActionButtonGroupClass}><button type="button" onClick={clearBarlines} disabled={!!feedback || placedBoundaryCount === 0} className={window.MLH.ClearButtonClass}>Clear</button><window.MLH.ConfirmButton onClick={confirmAnswer} disabled={!canConfirm || !!feedback}>Confirm</window.MLH.ConfirmButton></div></div></div>
        </main>
      </div>
    </div>
  );
}

const rootElement = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(rootElement).render(<App />);
else ReactDOM.render(<App />, rootElement);
  </script>
<script src="./footer.js?v=20260629"></script>
</body>
</html>
