<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transposing Golden App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const SVG = { width: 920, height: 420 };

const STAFF = {
  left: 222,
  right: 714,
  trebleTop: 62,
  bassTop: 239,
  gap: 21,
};

const NOTE = {
  rx: 13.55,
  ry: 9.69,
  stemLength: 69,
};

const COLOUR = {
  green: "#16a34a",
  red: "#dc2626",
  preview: "#444444",
  black: "#000000",
};

const GLYPH = {
  trebleClef: String.fromCodePoint(0x1d11e),
  bassClef: String.fromCodePoint(0x1d122),
};

const TREBLE_NOTES = [
  { letter: "C", octave: 4, step: -2 },
  { letter: "D", octave: 4, step: -1 },
  { letter: "E", octave: 4, step: 0 },
  { letter: "F", octave: 4, step: 1 },
  { letter: "G", octave: 4, step: 2 },
  { letter: "A", octave: 4, step: 3 },
  { letter: "B", octave: 4, step: 4 },
  { letter: "C", octave: 5, step: 5 },
];

const BASS_ANSWERS = [
  { letter: "C", octave: 3, step: 3 },
  { letter: "D", octave: 3, step: 4 },
  { letter: "E", octave: 3, step: 5 },
  { letter: "F", octave: 3, step: 6 },
  { letter: "G", octave: 3, step: 7 },
  { letter: "A", octave: 3, step: 8 },
  { letter: "B", octave: 3, step: 9 },
  { letter: "C", octave: 4, step: 10 },
];

const RHYTHMS = [
  { id: "minim", label: "Minim", beats: 2 },
  { id: "dotted-crotchet", label: "Dotted crotchet", beats: 1.5 },
  { id: "crotchet", label: "Crotchet", beats: 1 },
  { id: "quaver", label: "Quaver", beats: 0.5 },
];

const TOOLS = [
  ...RHYTHMS,
  { id: "tie", label: "Tie", type: "tie" },
];

const RHYTHM_BEATS = Object.fromEntries(RHYTHMS.map((item) => [item.id, item.beats]));

const RHYTHM_SPACING = {
  minim: 3.4,
  "dotted-crotchet": 2.45,
  crotchet: 1.65,
  quaver: 0.95,
};

const FOUR_BEAT_PATTERNS = [
  { rhythms: ["minim", "crotchet", "crotchet"] },
  { rhythms: ["dotted-crotchet", "quaver", "crotchet", "crotchet"] },
  { rhythms: ["crotchet", "crotchet", "dotted-crotchet", "quaver"] },
  { rhythms: ["crotchet", "crotchet", "crotchet", "crotchet"] },
  { rhythms: ["dotted-crotchet", "quaver", "dotted-crotchet", "quaver"] },
  { rhythms: ["crotchet", "crotchet", "minim"] },
  { rhythms: ["minim", "minim"] },
  { rhythms: ["dotted-crotchet", "quaver", "minim"] },
  { rhythms: ["crotchet", "quaver", "quaver", "crotchet", "crotchet"], stepwise: true },
  { rhythms: ["quaver", "quaver", "quaver", "quaver", "minim"], stepwise: true },
  { rhythms: ["crotchet", "quaver", "quaver", "quaver", "quaver", "crotchet"], stepwise: true },
  { rhythms: ["minim", "quaver", "quaver", "quaver", "quaver"], stepwise: true },
  { rhythms: ["crotchet", "quaver", "quaver", "minim"], tieStart: 2 },
  { rhythms: ["crotchet", "quaver", "quaver", "crotchet", "crotchet"], tieStart: 2 },
  { rhythms: ["dotted-crotchet", "quaver", "quaver", "quaver", "crotchet"], tieStart: 1 },
].filter((pattern) => Math.abs(pattern.rhythms.reduce((sum, rhythm) => sum + RHYTHM_BEATS[rhythm], 0) - 4) < 0.001);

const NOTE_NAME_LABELS = {
  treble: {
    top: STAFF.trebleTop,
    lines: [
      { step: 0, letter: "E" },
      { step: 2, letter: "G" },
      { step: 4, letter: "B" },
      { step: 6, letter: "D" },
      { step: 8, letter: "F" },
    ],
    spaces: [
      { step: 1, letter: "F" },
      { step: 3, letter: "A" },
      { step: 5, letter: "C" },
      { step: 7, letter: "E" },
    ],
  },
  bass: {
    top: STAFF.bassTop,
    lines: [
      { step: 0, letter: "G" },
      { step: 2, letter: "B" },
      { step: 4, letter: "D" },
      { step: 6, letter: "F" },
      { step: 8, letter: "A" },
    ],
    spaces: [
      { step: 1, letter: "A" },
      { step: 3, letter: "C" },
      { step: 5, letter: "E" },
      { step: 7, letter: "G" },
    ],
  },
};

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function randomIndex(length, previous = null) {
  if (length <= 1) return 0;
  let index = Math.floor(Math.random() * length);
  while (index === previous) index = Math.floor(Math.random() * length);
  return index;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function yForStep(top, step) {
  return top + STAFF.gap * 4 - step * (STAFF.gap / 2);
}

function stepFromSvgY(y, top) {
  return clamp(Math.round((top + STAFF.gap * 4 - y) / (STAFF.gap / 2)), -2, 10);
}

function stemDown(step) {
  return step > 4;
}

function getStem(x, y, step, rhythm = "crotchet", forcedDown = null, forcedEndY = null) {
  const down = forcedDown ?? stemDown(step);
  const stemInset = rhythm === "minim" ? NOTE.rx * 0.15 : NOTE.rx;
  const stemX = down
    ? x - stemInset - (rhythm === "minim" ? 11 : -0.5)
    : x + stemInset + (rhythm === "minim" ? 11 : -0.5);
  const stemEndY = forcedEndY ?? (down ? y + NOTE.stemLength : y - NOTE.stemLength);
  return { down, stemX, stemEndY };
}

function createStepwiseIndices(count) {
  const indices = [randomIndex(TREBLE_NOTES.length)];
  for (let i = 1; i < count; i += 1) {
    const current = indices[i - 1];
    const moves = [];
    if (current > 0) moves.push(-1);
    if (current < TREBLE_NOTES.length - 1) moves.push(1);
    indices.push(current + randomItem(moves));
  }
  return indices;
}

function createPassage() {
  const pattern = randomItem(FOUR_BEAT_PATTERNS);
  const noteIndices = pattern.stepwise
    ? createStepwiseIndices(pattern.rhythms.length)
    : pattern.rhythms.map(() => randomIndex(TREBLE_NOTES.length));

  if (pattern.tieStart != null && noteIndices[pattern.tieStart + 1] != null) {
    noteIndices[pattern.tieStart + 1] = noteIndices[pattern.tieStart];
  }

  return pattern.rhythms.map((rhythm, index) => ({
    rhythm,
    noteIndex: noteIndices[index],
    tieToNext: pattern.tieStart === index,
  }));
}

function createQuestion(mode = "exam", previousSingleIndex = null) {
  return {
    id: Math.random().toString(36).slice(2),
    mode,
    singleIndex: randomIndex(TREBLE_NOTES.length, previousSingleIndex),
    passage: createPassage(),
  };
}

function getPassagePositions(passage) {
  const start = STAFF.left + 142;
  const end = STAFF.right - 52;
  const noteGap = 0.34;
  const totalUnits = passage.reduce((sum, item) => sum + (RHYTHM_SPACING[item.rhythm] ?? 1.65), 0) + Math.max(0, passage.length - 1) * noteGap;
  const unit = (end - start) / Math.max(totalUnits, 1);
  let cursor = start;

  return passage.map((item, index) => {
    const width = (RHYTHM_SPACING[item.rhythm] ?? 1.65) * unit;
    const x = index === 0 ? start + 17 : cursor + width / 2;
    cursor += width + (index < passage.length - 1 ? noteGap * unit : 0);
    return x;
  });
}

function getQuaverGroups(items) {
  const groups = [];
  let index = 0;

  while (index < items.length) {
    if (!items[index] || items[index].rhythm !== "quaver" || items[index].step == null) {
      index += 1;
      continue;
    }

    const start = index;
    while (
      index + 1 < items.length &&
      !items[index]?.tieToNext &&
      items[index + 1]?.rhythm === "quaver" &&
      items[index + 1]?.step != null
    ) {
      index += 1;
    }

    if (index > start) groups.push({ start, end: index });
    index += 1;
  }

  return groups;
}

function findGroup(groups, index) {
  return groups.find((group) => index >= group.start && index <= group.end) ?? null;
}

function getBeam(items, positions, top) {
  const averageStep = items.reduce((sum, item) => sum + item.step, 0) / items.length;
  const down = averageStep > 4;
  const firstY = yForStep(top, items[0].step);
  const lastY = yForStep(top, items.at(-1).step);
  const firstStem = getStem(positions[0], firstY, items[0].step, items[0].rhythm, down);
  const lastStem = getStem(positions.at(-1), lastY, items.at(-1).step, items.at(-1).rhythm, down);

  return {
    down,
    start: { x: firstStem.stemX, y: firstStem.stemEndY },
    end: { x: lastStem.stemX, y: lastStem.stemEndY },
  };
}

function beamYAtX(x, beam) {
  const ratio = (x - beam.start.x) / (beam.end.x - beam.start.x || 1);
  return beam.start.y + ratio * (beam.end.y - beam.start.y);
}

function playFeedbackSound(correct, celebration = false, medal = null) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;

  const context = new AudioContextClass();
  const master = context.createGain();
  const now = context.currentTime + 0.01;
  context.resume?.();
  master.gain.value = 0.18;
  master.connect(context.destination);

  function tone(freq, start, duration, type = "triangle", volume = 0.12) {
    const osc = context.createOscillator();
    const gain = context.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(master);
    osc.start(start);
    osc.stop(start + duration + 0.05);
  }

  function trumpet(freq, start, duration, volume = 0.1) {
    tone(freq, start, duration, "sawtooth", volume);
    tone(freq * 1.002, start, duration * 0.96, "square", volume * 0.32);
    tone(freq * 2, start, duration * 0.75, "triangle", volume * 0.16);
  }

  function medalPhrase(root, chord, start, beats = 4) {
    const beat = 0.6;
    const triplet = 0.13;
    const finalDuration = beats === 2 ? 0.72 : 1.95;
    chord.forEach((freq) => trumpet(freq, start, beats * beat, 0.045));
    trumpet(root, start, triplet, 0.11);
    trumpet(root, start + triplet, triplet, 0.11);
    trumpet(root, start + triplet * 2, triplet, 0.11);
    trumpet(root, start + 0.42, finalDuration, 0.13);
  }

  if (!correct) {
    tone(196, now, 0.32, "sawtooth", 0.06);
    tone(185, now + 0.04, 0.38, "triangle", 0.05);
    tone(174, now + 0.08, 0.45, "sine", 0.04);
  } else if (celebration) {
    if (medal === "bronze") medalPhrase(659.25, [329.63, 415.3, 493.88], now);
    if (medal === "silver") medalPhrase(739.99, [369.99, 466.16, 554.37], now);
    if (medal === "gold") medalPhrase(830.61, [415.3, 523.25, 622.25], now);
    if (medal === "platinum") {
      medalPhrase(739.99, [369.99, 466.16, 554.37], now, 2);
      medalPhrase(830.61, [415.3, 523.25, 622.25], now + 0.82, 2);
      medalPhrase(932.33, [466.16, 587.33, 698.46], now + 1.64, 4);
    }
  } else {
    randomItem([
      [523.25, 659.25, 783.99],
      [587.33, 739.99, 880],
      [659.25, 830.61, 987.77],
    ]).forEach((freq, index) => {
      tone(freq, now + index * 0.045, 0.42, "triangle", index === 2 ? 0.085 : 0.07);
      tone(freq * 2, now + index * 0.045, 0.24, "sine", 0.025);
    });
  }

  window.setTimeout(() => {
    try {
      context.close();
    } catch {}
  }, medal === "platinum" ? 9000 : celebration ? 3500 : 900);
}

function LedgerLines({ x, step, clef, colour = "currentColor" }) {
  const top = clef === "treble" ? STAFF.trebleTop : STAFF.bassTop;
  const lines = [];
  if (clef === "treble" && step <= -2) lines.push(yForStep(top, -2));
  if (clef === "bass" && step >= 10) lines.push(yForStep(top, 10));
  if (clef === "bass" && step <= -2) lines.push(yForStep(top, -2));

  return (
    <g pointerEvents="none">
      {lines.map((y) => (
        <line key={y} x1={x - 27} x2={x + 27} y1={y} y2={y} stroke={colour} strokeWidth="1.5" />
      ))}
    </g>
  );
}

function RhythmNote({
  x,
  y,
  step,
  rhythm = "crotchet",
  colour = "currentColor",
  opacity = 1,
  preview = false,
  showFlag = true,
  forcedDown = null,
  forcedStemEndY = null,
  scale = 1,
}) {
  const open = rhythm === "minim";
  const hasStem = ["minim", "crotchet", "dotted-crotchet", "quaver"].includes(rhythm);
  const stem = getStem(x, y, step, rhythm, forcedDown, forcedEndY);
  const flagPath = stem.down
    ? `M ${stem.stemX} ${stem.stemEndY} C ${stem.stemX + 22} ${stem.stemEndY - 8}, ${stem.stemX + 21} ${stem.stemEndY - 24}, ${stem.stemX + 4} ${stem.stemEndY - 31}`
    : `M ${stem.stemX} ${stem.stemEndY} C ${stem.stemX + 22} ${stem.stemEndY + 8}, ${stem.stemX + 21} ${stem.stemEndY + 24}, ${stem.stemX + 4} ${stem.stemEndY + 31}`;

  return (
    <g opacity={opacity} pointerEvents="none" transform={scale !== 1 ? `translate(${x} ${y}) scale(${scale}) translate(${-x} ${-y})` : undefined}>
      <ellipse
        cx={x}
        cy={y}
        rx={NOTE.rx}
        ry={NOTE.ry}
        transform={`rotate(-18 ${x} ${y})`}
        fill={open ? "none" : colour}
        stroke={colour}
        strokeWidth={preview ? 2 : 2.2}
      />
      {hasStem && <line x1={stem.stemX} x2={stem.stemX} y1={y} y2={stem.stemEndY} stroke={colour} strokeWidth="2" />}
      {rhythm === "dotted-crotchet" && <circle cx={x + 26} cy={y - 3 - (step % 2 === 0 ? 4 : 0)} r="3.4" fill={colour} />}
      {rhythm === "quaver" && showFlag && <path d={flagPath} fill="none" stroke={colour} strokeWidth="2.2" strokeLinecap="round" />}
    </g>
  );
}

function Staff({ top, clef }) {
  const isTreble = clef === "treble";

  return (
    <g>
      {[0, 1, 2, 3, 4].map((line) => (
        <line key={line} x1={STAFF.left} x2={STAFF.right} y1={top + line * STAFF.gap} y2={top + line * STAFF.gap} stroke="currentColor" strokeWidth="1.5" />
      ))}
      <line x1={STAFF.right} x2={STAFF.right} y1={top} y2={top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.5" />
      <text
        x={STAFF.left + (isTreble ? 18 : 19)}
        y={top + (isTreble ? 58 : 48)}
        fontSize={isTreble ? 189 : 119}
        fontFamily="serif"
        dominantBaseline="middle"
      >
        {isTreble ? GLYPH.trebleClef : GLYPH.bassClef}
      </text>
    </g>
  );
}

function HelpLabels({ visible }) {
  if (!visible) return null;
  const x = STAFF.left - 6;
  const lineLabelX = x - 5;
return (
    <g fontSize="14" fontFamily="system-ui, sans-serif" fontWeight="700" dominantBaseline="middle" pointerEvents="none" fill="black">
      {Object.entries(NOTE_NAME_LABELS).flatMap(([clef, data]) => [
        ...data.lines.map((note) => (
          <text key={`${clef}-line-${note.step}`} x={lineLabelX} y={yForStep(data.top, note.step) + 5} textAnchor="start">
            {note.letter}
          </text>
        )),
        ...data.spaces.map((note) => (
          <text key={`${clef}-space-${note.step}`} x={x + 22} y={yForStep(data.top, note.step) + 5} textAnchor="end">
            {note.letter}
          </text>
        )),
      ])}
    </g>
  );
}

function Tie({ x1, y1, x2, y2, step1, step2, colour = "currentColor", opacity = 1 }) {
  const midX = (x1 + x2) / 2;
  const stemsUp = !stemDown(step1) && !stemDown(step2);

  const startY = stemsUp ? y1 + 17 : y1 - 17;
  const endY = stemsUp ? y2 + 17 : y2 - 17;
  const controlY = stemsUp
    ? Math.max(startY, endY) + 18
    : Math.min(startY, endY) - 18;

  return (
    <path
      d={`M ${x1 - 2} ${startY} Q ${midX} ${controlY}, ${x2 + 2} ${endY}`}
      fill="none"
      stroke={colour}
      strokeWidth="2.8"
      strokeLinecap="round"
      opacity={opacity}
      pointerEvents="none"
    />
  );
}

function RenderPassage({ passage, top, clef, answerItems = null, feedbackDetails = null, correctOverlay = false, overlayOffset = 0, userTies = null }) {
  const positions = getPassagePositions(passage).map((x) => x + overlayOffset);
  const source = answerItems ?? passage.map((item) => ({ ...item, step: TREBLE_NOTES[item.noteIndex].step }));
  const quaverGroups = getQuaverGroups(source);
  const ties = userTies ?? passage.map((item) => Boolean(item.tieToNext));

  return (
    <g>
      {ties.map((hasTie, index) => {
        if (!hasTie || index >= source.length - 1) return null;
        const first = source[index];
        const second = source[index + 1];
        if (!first || first.step == null || !second) return null;
        const secondStep = second.step ?? first.step;
        const result = feedbackDetails?.[index]?.tieCorrect;
        if (feedbackDetails && result === true) {
          return null;
        }
        const colour = result == null ? "currentColor" : result ? COLOUR.green : COLOUR.red;
        return (
          <Tie
            key={`tie-${index}-${overlayOffset}`}
            x1={positions[index] + (result === false ? -3 : 0)}
            y1={yForStep(top, first.step)}
            x2={positions[index + 1] + (result === false ? -3 : 0)}
            y2={yForStep(top, secondStep)}
            step1={first.step}
            step2={secondStep}
            colour={colour}
          />
        );
      })}

      {source.map((item, index) => {
        if (!item || item.step == null || item.rhythm == null) return null;

        const result = feedbackDetails?.[index];
        let colour = "currentColor";
        if (result) colour = result.pitchCorrect && result.rhythmCorrect ? COLOUR.green : COLOUR.red;
        if (correctOverlay) {
          if (!result || (result.pitchCorrect && result.rhythmCorrect)) return null;
          colour = COLOUR.green;
        }

        const x = positions[index];
        const y = yForStep(top, item.step);
        const group = findGroup(quaverGroups, index);
        const groupItems = group ? source.slice(group.start, group.end + 1) : [];
        const groupPositions = group ? positions.slice(group.start, group.end + 1) : [];
        const beam = group && groupItems.every((note) => note?.step != null) ? getBeam(groupItems, groupPositions, top) : null;
        const stemX = beam ? (beam.down ? x - NOTE.rx + 1 : x + NOTE.rx - 1) : null;

        return (
          <g key={`${clef}-${index}-${overlayOffset}`}>
            <LedgerLines x={x} step={item.step} clef={clef} colour={colour} />
            <RhythmNote
              x={x}
              y={y}
              step={item.step}
              rhythm={item.rhythm}
              colour={colour}
              opacity={item.isHover ? 0.55 : 1}
              preview={item.isHover}
              showFlag={!beam}
              forcedDown={beam?.down ?? null}
              forcedStemEndY={beam && stemX ? beamYAtX(stemX, beam) : null}
            />
            {beam && group.start === index && <line x1={beam.start.x - 1} x2={beam.end.x + 1} y1={beam.start.y} y2={beam.end.y} stroke={colour} strokeWidth="6.75" />}
          </g>
        );
      })}
    </g>
  );
}

function ScoreArea({
  question,
  mode,
  showHelp,
  hoverStep,
  lockedStep,
  examSteps,
  selectedRhythms,
  selectedRhythmTool,
  userTies,
  activeSlot,
  feedback,
  feedbackDetails,
  touchPreview,
  onPointerMove,
  onPointerDown,
  onPointerUp,
  onPointerCancel,
}) {
  const singleX = 490;
  const singleTreble = TREBLE_NOTES[question.singleIndex];
  const singleAnswer = BASS_ANSWERS[question.singleIndex];
  const activeSingleStep = lockedStep ?? hoverStep;
  const positions = getPassagePositions(question.passage);

  const userPassage = question.passage.map((item, index) => ({
    noteIndex: item.noteIndex,
    rhythm: selectedRhythms[index] ?? (index === activeSlot && selectedRhythmTool !== "tie" ? selectedRhythmTool : null),
    step: examSteps[index] ?? (index === activeSlot && hoverStep != null && selectedRhythmTool !== "tie" && (selectedRhythmTool || selectedRhythms[index]) ? hoverStep : null),
    tieToNext: Boolean(userTies[index]) || Boolean(item.tieToNext),
    isHover: index === activeSlot && examSteps[index] == null && hoverStep != null,
  }));

  const correctPassage = question.passage.map((item) => ({
    noteIndex: item.noteIndex,
    rhythm: item.rhythm,
    step: BASS_ANSWERS[item.noteIndex].step,
  }));

  const hitX = mode === "exam" ? (positions[activeSlot] ?? STAFF.left + 170) - 35 : singleX - 60;

  const tiePreview =
    mode === "exam" &&
    selectedRhythmTool === "tie" &&
    touchPreview?.type === "tie" &&
    selectedRhythms[activeSlot] != null &&
    activeSlot < question.passage.length - 1
      ? {
          x1: positions[activeSlot],
          y1: yForStep(STAFF.bassTop, examSteps[activeSlot] ?? hoverStep),
          x2: positions[activeSlot + 1],
          y2: yForStep(STAFF.bassTop, examSteps[activeSlot + 1] ?? examSteps[activeSlot] ?? hoverStep),
          step1: examSteps[activeSlot] ?? hoverStep,
          step2: examSteps[activeSlot + 1] ?? examSteps[activeSlot] ?? hoverStep,
        }
      : null;

  return (
    <svg viewBox={`0 0 ${SVG.width} ${SVG.height}`} className="h-auto w-full select-none overflow-visible">
      <rect width={SVG.width} height={SVG.height} fill="white" />
      <Staff top={STAFF.trebleTop} clef="treble" />
      <Staff top={STAFF.bassTop} clef="bass" />
      <HelpLabels visible={showHelp} />

      {mode === "practice" ? (
        <>
          <LedgerLines x={singleX} step={singleTreble.step} clef="treble" />
          <RhythmNote x={singleX} y={yForStep(STAFF.trebleTop, singleTreble.step)} step={singleTreble.step} rhythm="crotchet" />

          {activeSingleStep != null && !(feedback && !feedback.correct) && (
            <>
              <LedgerLines x={singleX} step={activeSingleStep} clef="bass" />
              <RhythmNote
                x={singleX}
                y={yForStep(STAFF.bassTop, activeSingleStep)}
                step={activeSingleStep}
                rhythm="crotchet"
                colour={lockedStep == null ? COLOUR.preview : "currentColor"}
                opacity={lockedStep == null ? 0.55 : 1}
                preview={lockedStep == null}
              />
            </>
          )}

          {feedback && lockedStep != null && (
            <>
              <LedgerLines x={singleX} step={lockedStep} clef="bass" colour={feedback.correct ? COLOUR.green : COLOUR.red} />
              <RhythmNote x={singleX} y={yForStep(STAFF.bassTop, lockedStep)} step={lockedStep} rhythm="crotchet" colour={feedback.correct ? COLOUR.green : COLOUR.red} />
              {!feedback.correct && (
                <>
                  <LedgerLines x={singleX + 55} step={singleAnswer.step} clef="bass" colour={COLOUR.green} />
                  <RhythmNote x={singleX + 55} y={yForStep(STAFF.bassTop, singleAnswer.step)} step={singleAnswer.step} rhythm="crotchet" colour={COLOUR.green} />
                </>
              )}
            </>
          )}
        </>
      ) : (
        <>
          <RenderPassage passage={question.passage} top={STAFF.trebleTop} clef="treble" />
          <RenderPassage passage={question.passage} top={STAFF.bassTop} clef="bass" answerItems={userPassage} feedbackDetails={feedbackDetails} userTies={userTies} />
          {tiePreview && (
            <Tie
              x1={tiePreview.x1}
              y1={tiePreview.y1}
              x2={tiePreview.x2}
              y2={tiePreview.y2}
              step1={tiePreview.step1}
              step2={tiePreview.step2}
              colour={COLOUR.preview}
              opacity={0.55}
            />
          )}
          {feedback && !feedback.correct && (
            <RenderPassage
                passage={question.passage}
                top={STAFF.bassTop}
                clef="bass"
                answerItems={correctPassage}
                feedbackDetails={feedbackDetails}
                correctOverlay
                overlayOffset={feedbackDetails?.every((item) => item.pitchCorrect && item.rhythmCorrect) ? 0 : 28}
              />
          )}
        </>
      )}

      {mode === "exam" &&
        positions.map((x, index) => (
          <rect
            key={`slot-hit-${index}`}
            x={x - 32}
            y={STAFF.bassTop - 58}
            width="64"
            height="170"
            fill="transparent"
            pointerEvents="all"
            className="touch-none"
            style={{ touchAction: "none" }}
            onPointerDown={(event) => onPointerDown(event, index)}
            onPointerMove={(event) => onPointerMove(event, index)}
            onPointerUp={onPointerUp}
            onPointerCancel={onPointerCancel}
          />
        ))}

      {mode === "practice" && (
        <rect
          x={hitX}
          y={STAFF.bassTop - 42}
          width="120"
          height="180"
          fill="transparent"
          pointerEvents="all"
          className="touch-none"
          style={{ touchAction: "none" }}
          onPointerMove={onPointerMove}
          onPointerDown={onPointerDown}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerCancel}
        />
      )}

      {touchPreview?.active && touchPreview.type !== "tie" && touchPreview.step != null && !feedback && (
        <g pointerEvents="none">
          <line
            x1={STAFF.left - 14}
            x2={STAFF.right + 14}
            y1={yForStep(STAFF.bassTop, touchPreview.step)}
            y2={yForStep(STAFF.bassTop, touchPreview.step)}
            stroke="black"
            strokeWidth="1.5"
            strokeDasharray="5 5"
            opacity="0.55"
          />
          <LedgerLines x={touchPreview.x} step={touchPreview.step} clef="bass" colour="black" />
          <RhythmNote
            x={touchPreview.x}
            y={yForStep(STAFF.bassTop, touchPreview.step)}
            step={touchPreview.step}
            rhythm={mode === "exam" ? selectedRhythmTool ?? selectedRhythms[touchPreview.targetSlot ?? activeSlot] ?? "crotchet" : "crotchet"}
            colour="black"
            opacity={0.86}
            preview
            scale={1.65}
          />
        </g>
      )}
    </svg>
  );
}

function getStreakMedal(streak) {
  if (streak >= 30) return { emoji: "💎", bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
  if (streak >= 20) return { emoji: "🥇", bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
  if (streak >= 15) return { emoji: "🥈", bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
  if (streak >= 10) return { emoji: "🥉", bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
  return null;
}

    style.innerHTML = `

      button:hover { transform: translateY(-1px) scale(1.01); filter: brightness(1.08); box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
      button:active { transform: scale(0.96); filter: brightness(0.92); }
      button:disabled { cursor: not-allowed; opacity: 0.5; }
      button:focus-visible { outline: 2px solid rgba(22,163,74,0.35); outline-offset: 2px; }
      @keyframes medalShine { 0%,100% { transform: scale(1) rotate(-4deg); filter: drop-shadow(0 0 0 rgba(250,204,21,0)); } 50% { transform: scale(1.16) rotate(4deg); filter: drop-shadow(0 0 10px rgba(250,204,21,.9)); } }
      @keyframes confettiDrop { 0% { transform: translateY(-12px) rotate(0deg); opacity: 0; } 12% { opacity: 1; } 100% { transform: translateY(72px) rotate(260deg); opacity: 0; } }
      @keyframes incorrectDropShake { 0% { transform: translateY(-28px); opacity: 0; } 55% { transform: translateY(0); opacity: 1; } 68% { transform: translateX(-5px); } 78% { transform: translateX(5px); } 88% { transform: translateX(-3px); } 100% { transform: translateX(0); opacity: 1; } }
      @keyframes correctFade { 0% { transform: translateY(-18px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
      @keyframes feedbackFadeOut { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-10px); } }
    `;
    document.head.appendChild(style);
  }, []);
}

function useClickOutside(refs, handlers) {
  useEffect(() => {
    function onPointerDown(event) {
      refs.forEach((ref, index) => {
        if (!ref.current?.contains(event.target)) handlers[index]?.();
      });
    }
    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, [refs, handlers]);
}

function App() {
  useInjectedStyles();

  const [mode, setMode] = useState("exam");
  const [question, setQuestion] = useState(() => createQuestion("exam"));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [showHelp, setShowHelp] = useState(false);
  const [hoverStep, setHoverStep] = useState(null);
  const [lockedStep, setLockedStep] = useState(null);
  const [examSteps, setExamSteps] = useState([]);
  const [selectedRhythms, setSelectedRhythms] = useState([]);
  const [selectedRhythmTool, setSelectedRhythmTool] = useState(null);
  const [userTies, setUserTies] = useState([]);
  const [activeSlot, setActiveSlot] = useState(0);
  const [touchPreview, setTouchPreview] = useState(null);
    const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [feedbackDetails, setFeedbackDetails] = useState(null);
  const [prompt, setPrompt] = useState("");
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);

  const customiseRef = useRef(null);
  const helpRef = useRef(null);

  useClickOutside(
    [customiseRef, helpRef],
    [
      () => customiseOpen && setCustomiseOpen(false),
      () => helpOpen && setHelpOpen(false),
    ],
  );

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const examReady = mode === "exam" && question.passage.every((_, index) => examSteps[index] != null && selectedRhythms[index] != null);
  const canConfirm = mode === "practice" ? lockedStep != null && !feedback : examReady && !feedback;
  const streakMedal = getStreakMedal(streak);


  const instruction = mode === "practice"
    ? <>Transpose the note from the treble clef <strong>down one octave</strong> into the bass clef.</>
    : <>Transpose each note <strong>one octave lower</strong> into the bass clef. Choose the rhythm, then place the note.</>;

  function resetTask(nextQuestion = question) {
    setQuestion(nextQuestion);
    setHoverStep(null);
    setLockedStep(null);
    setExamSteps([]);
    setSelectedRhythms([]);
    setSelectedRhythmTool(null);
    setUserTies([]);
    setActiveSlot(0);
    setTouchPreview(null);
    setFeedback(null);
    setFeedbackFading(false);
    setFeedbackDetails(null);
    setPrompt("");
  }

  function newQuestion(nextMode = mode) {
    setQuestionVisible(false);
    window.setTimeout(() => {
      resetTask(createQuestion(nextMode, question.singleIndex));
      setQuestionVisible(true);
    }, 260);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion(mode);
  }

  function fadeToNextQuestion() {
    if (!feedback || feedback.correct || feedbackFading) return;
    setFeedbackFading(true);
    window.setTimeout(() => newQuestion(mode), 280);
  }

  function pointerToSvg(event) {
    const svg = event.currentTarget.ownerSVGElement;
    const rect = svg.getBoundingClientRect();
    return {
      x: ((event.clientX - rect.left) / rect.width) * SVG.width,
      y: ((event.clientY - rect.top) / rect.height) * SVG.height,
    };
  }

  function getPointerStep(event) {
    const pointer = pointerToSvg(event);
    const touchOffset = event.pointerType === "touch" ? 44 : 0;
    return { pointer, step: stepFromSvgY(pointer.y - touchOffset, STAFF.bassTop) };
  }

  function placeStep(step, targetSlot = activeSlot) {
    if (feedback) return;

    if (mode === "practice") {
      setLockedStep(step);
      setHoverStep(selectedRhythmTool === "tie" ? examSteps[targetSlot] : step);
      setPrompt("");
      return;
    }

    if (selectedRhythmTool === "tie") {
      const existingTieSlot = userTies[targetSlot]
        ? targetSlot
        : userTies[targetSlot - 1]
          ? targetSlot - 1
          : null;

      if (existingTieSlot != null) {
        setUserTies(Array(question.passage.length).fill(false));
        setActiveSlot(existingTieSlot);
        setHoverStep(null);
        setTouchPreview(null);
        setPrompt("");
        return;
      }

      if (targetSlot >= question.passage.length - 1) {
        return;
      }

      if (examSteps[targetSlot] == null || selectedRhythms[targetSlot] == null) {
        setPrompt("Place the note before adding a tie.");
        return;
      }

      setUserTies(() => {
        const next = Array(question.passage.length).fill(false);
        next[targetSlot] = true;
        return next;
      });

      setActiveSlot(targetSlot);
      setHoverStep(null);
      setTouchPreview(null);
      setPrompt("");
      return;
    }

    const rhythmToPlace = selectedRhythmTool ?? selectedRhythms[targetSlot];
    if (!rhythmToPlace) {
      setPrompt("Choose a rhythm first.");
      return;
    }

    const shouldRemoveExisting =
      !touchPreview?.dragged &&
      selectedRhythms[targetSlot] === rhythmToPlace &&
      examSteps[targetSlot] != null;

    setExamSteps((current) => {
      const next = [...current];
      next[targetSlot] = shouldRemoveExisting ? null : step;
      return next;
    });

    setSelectedRhythms((current) => {
      const next = [...current];
      next[targetSlot] = shouldRemoveExisting ? null : rhythmToPlace;
      return next;
    });

    if (shouldRemoveExisting) {
      setUserTies((current) => {
        const next = [...current];
        next[targetSlot] = false;
        if (targetSlot > 0) next[targetSlot - 1] = false;
        return next;
      });
    }

    setActiveSlot(targetSlot);
    setHoverStep(null);
    setPrompt("");
  }

  function handlePointerMove(event, targetSlot = activeSlot) {
    if (feedback) return;
    if (mode === "practice" && lockedStep != null && !touchPreview?.active) return;
    if (mode === "exam" && selectedRhythmTool === "tie" && examSteps[targetSlot] == null) {
      setHoverStep(null);
      setTouchPreview(null);
      return;
    }
    if (mode === "exam" && !selectedRhythmTool && !selectedRhythms[targetSlot]) return;

    const { pointer, step } = getPointerStep(event);
        setActiveSlot(targetSlot);
    setHoverStep(selectedRhythmTool === "tie" ? examSteps[targetSlot] : step);

    if (selectedRhythmTool === "tie") {
      setTouchPreview({ active: true, type: "tie", targetSlot, x: pointer.x, y: pointer.y, dragged: false });
      return;
    }

    if (touchPreview?.active) {
      setTouchPreview((current) => ({
        ...(current ?? {}),
        active: true,
        x: pointer.x,
        step,
        targetSlot,
        dragged: true,
      }));
    }
  }

  function handlePointerDown(event, targetSlot = activeSlot) {
    event.preventDefault();
    event.currentTarget.setPointerCapture?.(event.pointerId);

    if (feedback && !feedback.correct) {
      fadeToNextQuestion();
      return;
    }

    const { pointer, step } = getPointerStep(event);

    if (touchPreview?.x != null && touchPreview?.y != null) {
      const dx = pointer.x - touchPreview.x;
      const dy = pointer.y - touchPreview.y;
    }

    setActiveSlot(targetSlot);
    setHoverStep(selectedRhythmTool === "tie" ? examSteps[targetSlot] : step);
    setTouchPreview(
      selectedRhythmTool === "tie"
        ? { active: true, type: "tie", targetSlot }
        : { active: true, x: pointer.x, y: pointer.y, step, targetSlot, dragged: false }
    );
  }

  function handlePointerUp(event) {
    if (feedback) return;
    event.preventDefault();
    event.currentTarget.releasePointerCapture?.(event.pointerId);

    if (touchPreview?.type === "tie") {
      placeStep(null, touchPreview.targetSlot ?? activeSlot);
    } else if (touchPreview?.step != null) {
      placeStep(touchPreview.step, touchPreview.targetSlot ?? activeSlot);
    }

    setTouchPreview(null);
  }

  function handlePointerCancel() {
    setTouchPreview(null);
  }

  function selectRhythm(tool) {
    if (feedback || mode !== "exam") return;
    setSelectedRhythmTool(tool);
    setHoverStep(null);
    setTouchPreview(null);
        setPrompt("");
  }



  function scoreAnswer(isCorrect) {
    const nextStreak = isCorrect ? streak + 1 : 0;
    playFeedbackSound(isCorrect);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });

    if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }

    if (isCorrect) {
      setFeedbackFading(false);
      window.setTimeout(() => setFeedbackFading(true), 1700);
      window.setTimeout(() => newQuestion(mode), 2000);
    }
  }

  function confirmAnswer() {
    if (feedback) return;

    if (mode === "practice") {
      if (lockedStep == null) {
        setPrompt("Place your answer on the bass stave first.");
        return;
      }
      scoreAnswer(lockedStep === BASS_ANSWERS[question.singleIndex].step);
      return;
    }

    if (!examReady) {
      setPrompt(`Complete note ${activeSlot + 1} of ${question.passage.length}.`);
      return;
    }

    const details = question.passage.map((item, index) => ({
      pitchCorrect: examSteps[index] === BASS_ANSWERS[item.noteIndex].step,
      rhythmCorrect: selectedRhythms[index] === item.rhythm,
      tieCorrect: Boolean(userTies[index]) === Boolean(item.tieToNext),
    }));

    setFeedbackDetails(details);
    scoreAnswer(details.every((item) => item.pitchCorrect && item.rhythmCorrect && item.tieCorrect));
  }

  return (
    <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2">
      <div className="mx-auto max-w-6xl">
        <header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm">
          <div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div className="flex items-center gap-4">
              <AppIcon />
              <div>
                <h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Transposing</h1>
                <p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Transposing from treble clef down one octave into bass clef.</p>
              </div>
            </div>

            <div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end">
              <StatCard variant="score" label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${accuracy}%`} progress={accuracy} />
              <div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${streakMedal?.bg ?? "bg-stone-50"}`}>
                <StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${bestStreak}`} medal={streakMedal} confettiKey={confettiKey} />
                <div className="relative z-0 flex min-h-[52px] min-w-[64px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700">
                  <div className="flex items-center gap-1"><span>💎</span><span className="text-cyan-500">30</span></div>
                  <div className="mt-1">🥇 <span className="text-yellow-500">20</span></div>
                  <div className="mt-1">🥈 <span className="text-slate-500">15</span></div>
                  <div className="mt-1">🥉 <span className="text-amber-700">10</span></div>
                </div>
              </div>
            </div>
          </div>
        </header>

        <main
          className="relative -mt-[10px] min-h-[560px] overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-4 pt-[10px] shadow-sm md:h-auto md:min-h-0 md:overflow-visible md:px-6 md:pb-6 md:pt-[14px]"
          onPointerDown={() => {
            if (feedback && !feedback.correct) fadeToNextQuestion();
          }}
        >
          <div className="relative mb-2.5 flex flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-2">
              <div className="relative" ref={customiseRef}>
                <button type="button" onClick={() => setCustomiseOpen((value) => !value)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">⚙️ <span>Customise</span></button>
                {customiseOpen && (
                  <div className="absolute left-0 z-20 mt-2 w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg">
                    <h2 className="mb-3 text-center text-base font-semibold">Customise</h2>
                    <MenuRows mode={mode} setMode={setMode} newQuestion={newQuestion} showHelp={showHelp} setShowHelp={setShowHelp} resetScore={resetScore} />
                  </div>
                )}
              </div>

              <div className="relative" ref={helpRef}>
                <button type="button" onClick={() => setHelpOpen((value) => !value)} className="flex h-11 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">💡 <span>Help</span></button>
                {helpOpen && (
                  <div className="absolute left-0 top-12 z-20 w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg">
                    <HelpPanel />
                  </div>
                )}
              </div>
            </div>

            <button type="button" onClick={() => newQuestion(mode)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800"><span>Skip Question</span><span className="text-lg leading-none">→</span></button>
            <div className="pointer-events-none absolute inset-x-0 top-1/2 z-10 flex -translate-y-1/2 justify-center overflow-visible"><FeedbackBanner feedback={feedback} fading={feedbackFading} /></div>
          </div>

          <div className={`relative -top-[10px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <ScoreArea
              question={question}
              mode={mode}
              showHelp={showHelp}
              hoverStep={hoverStep}
              lockedStep={lockedStep}
              examSteps={examSteps}
              selectedRhythms={selectedRhythms}
              selectedRhythmTool={selectedRhythmTool}
              userTies={userTies}
              activeSlot={activeSlot}
              feedback={feedback}
              feedbackDetails={feedbackDetails}
              touchPreview={touchPreview}
              onPointerMove={handlePointerMove}
              onPointerDown={handlePointerDown}
              onPointerUp={handlePointerUp}
              onPointerCancel={handlePointerCancel}
            />
          </div>

          <div className="relative z-10 mt-3 h-[168px] rounded-xl border border-stone-200 bg-stone-50 p-4 shadow-md md:-mt-[48px] md:mx-3 overflow-hidden">
            <div className="space-y-3 text-stone-900">
              <p className="text-base font-semibold leading-tight">{instruction}</p>
              {prompt && <p className="text-sm font-medium text-red-700">{prompt}</p>}
            </div>

            <div className="mt-4 flex flex-wrap items-start justify-between gap-3 pb-[56px]">
              {mode === "exam" && !feedback && <RhythmChooser selected={selectedRhythmTool} onSelect={selectRhythm} selectedRhythms={selectedRhythms} />}

              <div className="absolute bottom-4 right-4 flex shrink-0 justify-end gap-2">


                <button type="button" disabled={!canConfirm} onClick={confirmAnswer} className="rounded-xl bg-green-600 px-[22px] py-[10px] text-sm font-bold text-white disabled:opacity-60">Confirm</button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
