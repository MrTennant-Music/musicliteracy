<html lang="en">

<body>
  <div id="root"></div>

  <script type="text/babel">
const { useRef, useState } = React;
const SHELL = window.MLH?.shell || {};
function hasTouchInput() {
  return window.MLH?.isTouchDevice?.() || ("ontouchstart" in window) || navigator.maxTouchPoints > 0;
}

const ASSET = {
  appIcon: "https://mrtennant-music.github.io/musicliteracy/transposing-icon.svg",
  levels: "https://mrtennant-music.github.io/musicliteracy/levels.svg",
  customise: "https://mrtennant-music.github.io/musicliteracy/customise.svg",
  next: "https://mrtennant-music.github.io/musicliteracy/next.svg",
  bronze: "https://mrtennant-music.github.io/musicliteracy/bronze.svg",
  silver: "https://mrtennant-music.github.io/musicliteracy/silver.svg",
  gold: "https://mrtennant-music.github.io/musicliteracy/gold.svg",
  diamond: "https://mrtennant-music.github.io/musicliteracy/diamond.svg",
};

const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS ?? {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG ?? { symbols: {}, drawing: {} };
const INITIAL_LEVEL = new URLSearchParams(window.location.search).get("level") === "AH" ? "AH" : "H";

const SVG = { width: 920, height: 500 };

const STAFF = {
  left: 222,
  right: 714,
  trebleTop: 72,
  bassTop: 229,
  gap: 21,
};

const SYSTEM_SPREAD = 15;
const SYSTEM_SPREAD_HALF = SYSTEM_SPREAD / 2;
const SOURCE_TOP = STAFF.trebleTop - SYSTEM_SPREAD_HALF;
const ANSWER_TOP = STAFF.bassTop + SYSTEM_SPREAD_HALF;
const MOBILE_BOTTOM_SYSTEM_OFFSET = 15;

function isMobileLayout() {
  return window.matchMedia?.("(max-width: 639px)")?.matches ?? false;
}

function getSystemLayout(question) {
  const swapSystems = question.sourceClef === "bass" && question.answerClef === "treble";
  const bottomOffset = isMobileLayout() ? MOBILE_BOTTOM_SYSTEM_OFFSET : 0;
  return {
    sourceTop: swapSystems ? ANSWER_TOP + bottomOffset : SOURCE_TOP,
    answerTop: swapSystems ? SOURCE_TOP : ANSWER_TOP + bottomOffset,
  };
}

const NOTE = {
  rx: 13.55,
  ry: 9.69,
  stemLength: 69,
};

const COLOUR = {
  green: "#16a34a",
  red: "#dc2626",
  preview: "#444444",
  black: "#000000",
};

const GLYPH = {
  trebleClef: String.fromCodePoint(0x1d11e),
  bassClef: String.fromCodePoint(0x1d122),
  whole: "\uE0A2",
  half: "\uE0A3",
  black: "\uE0A4",
  flagUp: "\uE240",
  flagDown: "\uE241",
  tie: "\uE1FD",
  ottavaAlta: "\uE512",
  ottavaBassa: "\uE51C",
};

function sharedActualSymbolKey(key) {
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  return key;
}

function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols ?? {};
  return symbols[key] ?? symbols[sharedActualSymbolKey(key)] ?? {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}

function sharedSymbolForKey(key) {
  return SHARED_SYMBOLS[sharedActualSymbolKey(key)] ?? "";
}

function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", opacity = 1, lineGap = STAFF.gap, filter = null, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
  const widthScale = Number(settings.widthScale || 1);
  const heightScale = Number(settings.heightScale || 1);
  return (
    <text
      className="music-symbol"
      x={adjustedX}
      y={adjustedY}
      fill={colour}
      opacity={opacity}
      fontSize={fontSize}
      textAnchor="middle"
      style={filter ? { filter } : undefined}
      transform={`translate(${adjustedX} ${adjustedY}) scale(${widthScale} ${heightScale}) translate(${-adjustedX} ${-adjustedY})`}
      pointerEvents="none"
    >
      {glyph}
    </text>
  );
}

function noteSymbolKey(rhythm, down, beamed = false) {
  if (rhythm === "semibreve") return "wholeNote";
  if (rhythm === "minim") return down ? "halfNoteStemDown" : "halfNoteStemUp";
  if (rhythm === "quaver" && beamed) return down ? "noteheadBlackStemDown" : "noteheadBlackStemUp";
  if (rhythm === "quaver") return down ? "eighthNoteStemDown" : "eighthNoteStemUp";
  return down ? "quarterNoteStemDown" : "quarterNoteStemUp";
}

const LETTER_INDEX = { C: 0, D: 1, E: 2, F: 3, G: 4, A: 5, B: 6 };
const INDEX_LETTER = ["C", "D", "E", "F", "G", "A", "B"];

function pitch(letter, octave) {
  return { letter, octave, index: octave * 7 + LETTER_INDEX[letter] };
}

function pitchFromIndex(index) {
  return { letter: INDEX_LETTER[((index % 7) + 7) % 7], octave: Math.floor(index / 7), index };
}

function transposePitch(note, octaves) {
  return pitchFromIndex(note.index + octaves * 7);
}

function stepForClef(note, clef) {
  const reference = clef === "treble" ? pitch("E", 4).index : pitch("G", 2).index;
  return note.index - reference;
}

function noteItem(note, clef, rhythm = "crotchet") {
  return { ...note, clef, rhythm, step: stepForClef(note, clef) };
}

function pitchRange(startLetter, startOctave, endLetter, endOctave) {
  const start = pitch(startLetter, startOctave).index;
  const end = pitch(endLetter, endOctave).index;
  return Array.from({ length: end - start + 1 }, (_, index) => pitchFromIndex(start + index));
}

const HIGHER_SOURCE_NOTES = pitchRange("C", 4, "C", 5);
const SAME_PITCH_NOTES = pitchRange("A", 3, "E", 4);
const BASS_OCTAVE_SOURCE_NOTES = pitchRange("C", 3, "C", 4);
const OTTAVA_SOURCE_NOTES = pitchRange("C", 4, "A", 4);
const OTTAVA_BASS_SOURCE_NOTES = pitchRange("C", 3, "C", 4);

const RHYTHMS = [
  { id: "minim", label: "Minim", beats: 2 },
  { id: "dotted-crotchet", label: "Dotted crotchet", beats: 1.5 },
  { id: "crotchet", label: "Crotchet", beats: 1 },
  { id: "quaver", label: "Quaver", beats: 0.5 },
];

const TOOLS = [...RHYTHMS, { id: "tie", label: "Tie", type: "tie" }];

const DEFAULT_QUESTION_OPTIONS = {
  ottava: true,
  samePitch: true,
  octaveHigher: true,
  octaveLower: true,
};

const RHYTHM_BEATS = Object.fromEntries(RHYTHMS.map((rhythm) => [rhythm.id, rhythm.beats]));

const RHYTHM_SPACING = {
  minim: 3.4,
  "dotted-crotchet": 2.45,
  crotchet: 1.65,
  quaver: 0.95,
};

const FOUR_BEAT_PATTERNS = [
  { rhythms: ["minim", "crotchet", "crotchet"] },
  { rhythms: ["dotted-crotchet", "quaver", "crotchet", "crotchet"] },
  { rhythms: ["crotchet", "crotchet", "dotted-crotchet", "quaver"] },
  { rhythms: ["crotchet", "crotchet", "crotchet", "crotchet"] },
  { rhythms: ["dotted-crotchet", "quaver", "dotted-crotchet", "quaver"] },
  { rhythms: ["crotchet", "crotchet", "minim"] },
  { rhythms: ["minim", "minim"] },
  { rhythms: ["dotted-crotchet", "quaver", "minim"] },
  { rhythms: ["crotchet", "quaver", "quaver", "crotchet", "crotchet"], stepwise: true },
  { rhythms: ["quaver", "quaver", "quaver", "quaver", "minim"], stepwise: true },
  { rhythms: ["crotchet", "quaver", "quaver", "quaver", "quaver", "crotchet"], stepwise: true },
  { rhythms: ["minim", "quaver", "quaver", "quaver", "quaver"], stepwise: true },
  { rhythms: ["crotchet", "quaver", "quaver", "minim"], tieStart: 2 },
  { rhythms: ["crotchet", "quaver", "quaver", "crotchet", "crotchet"], tieStart: 2 },
  { rhythms: ["dotted-crotchet", "quaver", "quaver", "quaver", "crotchet"], tieStart: 1 },
].filter((pattern) => Math.abs(pattern.rhythms.reduce((sum, rhythm) => sum + RHYTHM_BEATS[rhythm], 0) - 4) < 0.001);

const NOTE_NAME_LABELS = {
  treble: {
    top: STAFF.trebleTop,
    lines: [
      { step: 0, letter: "E" },
      { step: 2, letter: "G" },
      { step: 4, letter: "B" },
      { step: 6, letter: "D" },
      { step: 8, letter: "F" },
    ],
    spaces: [
      { step: 1, letter: "F" },
      { step: 3, letter: "A" },
      { step: 5, letter: "C" },
      { step: 7, letter: "E" },
    ],
  },
  bass: {
    top: STAFF.bassTop,
    lines: [
      { step: 0, letter: "G" },
      { step: 2, letter: "B" },
      { step: 4, letter: "D" },
      { step: 6, letter: "F" },
      { step: 8, letter: "A" },
    ],
    spaces: [
      { step: 1, letter: "A" },
      { step: 3, letter: "C" },
      { step: 5, letter: "E" },
      { step: 7, letter: "G" },
    ],
  },
};

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function randomIndex(length, previous = null) {
  if (length <= 1) return 0;
  let index = Math.floor(Math.random() * length);
  while (index === previous) index = Math.floor(Math.random() * length);
  return index;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function yForStep(top, step) {
  return top + STAFF.gap * 4 - step * (STAFF.gap / 2);
}

function stepFromSvgY(y, top) {
  return clamp(Math.round((top + STAFF.gap * 4 - y) / (STAFF.gap / 2)), -4, 12);
}

function meaningQuestion(marking) {
  const direction = marking === "8vb" ? "lower" : "higher";
  const transform = marking === "8vb" ? TRANSFORMS.ottavaBassa : TRANSFORMS.ottavaAlta;
  const passage = createPassage(transform);
  return {
    id: Math.random().toString(36).slice(2),
    type: "meaning",
    transformId: `meaning-${marking}`,
    marking,
    sourceClef: transform.sourceClef,
    answerClef: transform.answerClef,
    instruction: {
      practice: <>Give the meaning of <span className="music-symbol text-[1.35em] leading-none">{marking === "8vb" ? GLYPH.ottavaBassa : GLYPH.ottavaAlta}</span>.</>,
      exam: <>Give the meaning of <span className="music-symbol text-[1.35em] leading-none">{marking === "8vb" ? GLYPH.ottavaBassa : GLYPH.ottavaAlta}</span>.</>,
    },
    correctMeaning: direction,
    passage,
  };
}

function isCorrectMeaningAnswer(answer, direction) {
  const normalised = answer.toLowerCase().replace(/[^a-z0-9]+/g, " ").trim();
  const words = normalised.split(/\s+/).filter(Boolean);
  const hasOctave = words.includes("octave");
  const hasDirection = words.includes(direction);
  const hasCount = words.some((word) => ["an", "one", "1"].includes(word));
  const hasShortPhrase = normalised.includes(`octave ${direction}`);
  return hasOctave && hasDirection && (hasCount || hasShortPhrase);
}

function meaningCorrectionText(direction) {
  return `Played one octave ${direction} than written.`;
}

function stemDown(step) {
  return step > 4;
}

function getStem(x, y, step, rhythm = "crotchet", forcedDown = null, forcedEndY = null) {
  const down = forcedDown ?? stemDown(step);
  const openHead = rhythm === "minim";
  const stemInset = openHead ? NOTE.rx * 0.15 : NOTE.rx;
  const stemX = down ? x - stemInset - (openHead ? 10 : -2) : x + stemInset + (openHead ? 9.75 : -1.5);
  const stemStartY = down ? y + 0.5 : y - 2.5;
  const stemEndY = forcedEndY ?? (down ? y + NOTE.stemLength + 0.5 : y - NOTE.stemLength - 2.5);
  return { down, stemX, stemStartY, stemEndY };
}

function createStepwiseIndices(count, poolLength = HIGHER_SOURCE_NOTES.length) {
  const indices = [randomIndex(poolLength)];
  for (let i = 1; i < count; i += 1) {
    const current = indices[i - 1];
    const moves = [];
    if (current > 0) moves.push(-1);
    if (current < poolLength - 1) moves.push(1);
    indices.push(current + randomItem(moves));
  }
  return indices;
}

function createPassage(transform) {
  const pattern = randomItem(FOUR_BEAT_PATTERNS);
  const sourceNotes = transform.sourcePool;
  const noteIndices = pattern.stepwise
    ? createStepwiseIndices(pattern.rhythms.length, sourceNotes.length)
    : pattern.rhythms.map(() => randomIndex(sourceNotes.length));

  if (pattern.tieStart != null && noteIndices[pattern.tieStart + 1] != null) {
    noteIndices[pattern.tieStart + 1] = noteIndices[pattern.tieStart];
  }

  return pattern.rhythms.map((rhythm, index) => ({
    rhythm,
    noteIndex: noteIndices[index],
    source: noteItem(sourceNotes[noteIndices[index]], transform.sourceClef, rhythm),
    answer: noteItem(transform.answerFor(sourceNotes[noteIndices[index]]), transform.answerClef, rhythm),
    tieToNext: pattern.tieStart === index,
  }));
}

const TRANSFORMS = {
  higher: {
    id: "higher",
    sourceClef: "treble",
    answerClef: "bass",
    sourcePool: HIGHER_SOURCE_NOTES,
    answerFor: (note) => transposePitch(note, -1),
    instruction: {
      practice: <>Transpose the note from the treble clef <strong>down one octave</strong> into the bass clef.</>,
      exam: <>Transpose each note <strong>one octave lower</strong> into the bass clef. Choose the rhythm, then place the note.</>,
    },
  },
  samePitch: {
    id: "samePitch",
    sourcePool: SAME_PITCH_NOTES,
    answerFor: (note) => note,
    instruction: {
      practice: <>Rewrite the note at the <strong>same pitch</strong> in the other clef.</>,
      exam: <>Rewrite each note at the <strong>same pitch</strong> in the other clef. Choose the rhythm, then place the note.</>,
    },
  },
  bassOctaveUp: {
    id: "bassOctaveUp",
    sourceClef: "bass",
    answerClef: "treble",
    sourcePool: BASS_OCTAVE_SOURCE_NOTES,
    answerFor: (note) => transposePitch(note, 1),
    instruction: {
      practice: <>Transpose the note from the bass clef <strong>one octave higher</strong> into the treble clef.</>,
      exam: <>Transpose each note from the bass clef <strong>one octave higher</strong> into the treble clef. Choose the rhythm, then place the note.</>,
    },
  },
  ottavaAlta: {
    id: "ottavaAlta",
    sourceClef: "treble",
    answerClef: "treble",
    sourcePool: OTTAVA_SOURCE_NOTES,
    answerFor: (note) => transposePitch(note, 1),
    marking: "8va",
    instruction: {
      practice: <>Rewrite the note as it would sound.</>,
      exam: <>Rewrite the note as it would sound.</>,
    },
  },
  ottavaBassa: {
    id: "ottavaBassa",
    sourceClef: "bass",
    answerClef: "bass",
    sourcePool: OTTAVA_BASS_SOURCE_NOTES,
    answerFor: (note) => transposePitch(note, -1),
    marking: "8vb",
    instruction: {
      practice: <>Rewrite the note as it would sound.</>,
      exam: <>Rewrite the note as it would sound.</>,
    },
  },
  ottavaMeaning: {
    id: "ottavaMeaning",
    type: "meaning",
  },
};

function createTransform(level, options = DEFAULT_QUESTION_OPTIONS) {
  if (level !== "AH") return TRANSFORMS.higher;
  const pool = [
    options.octaveLower && TRANSFORMS.higher,
    options.samePitch && TRANSFORMS.samePitch,
    options.octaveHigher && TRANSFORMS.bassOctaveUp,
    options.ottava && TRANSFORMS.ottavaAlta,
    options.ottava && TRANSFORMS.ottavaBassa,
    options.ottava && TRANSFORMS.ottavaMeaning,
  ].filter(Boolean);
  const transform = randomItem(pool.length ? pool : [
    TRANSFORMS.higher,
    TRANSFORMS.samePitch,
    TRANSFORMS.bassOctaveUp,
    TRANSFORMS.ottavaAlta,
    TRANSFORMS.ottavaBassa,
    TRANSFORMS.ottavaMeaning,
  ]);

  if (transform.id !== "samePitch") return transform;
  const sourceClef = Math.random() < 0.5 ? "treble" : "bass";
  return {
    ...transform,
    sourceClef,
    answerClef: sourceClef === "treble" ? "bass" : "treble",
  };
}

function createQuestion(mode = "exam", previousSingleIndex = null, level = "H", options = DEFAULT_QUESTION_OPTIONS) {
  const transform = createTransform(level, options);
  if (transform.type === "meaning") return meaningQuestion(randomItem(["8va", "8vb"]));

  const singleIndex = randomIndex(transform.sourcePool.length, previousSingleIndex);
  const singleSource = noteItem(transform.sourcePool[singleIndex], transform.sourceClef);
  const singleAnswer = noteItem(transform.answerFor(transform.sourcePool[singleIndex]), transform.answerClef);

  return {
    id: Math.random().toString(36).slice(2),
    mode,
    level,
    transformId: transform.id,
    sourceClef: transform.sourceClef,
    answerClef: transform.answerClef,
    marking: transform.marking ?? null,
    instruction: transform.instruction,
    singleIndex,
    singleSource,
    singleAnswer,
    passage: createPassage(transform),
  };
}

function safePlayFeedbackSound(...args) {
  try {
    window.MLH?.playFeedbackSound?.(...args);
  } catch {
    // Ignore shared audio failures so feedback never blocks the app flow.
  }
}

function safeGetStreakMedal(streak) {
  try {
    return window.MLH?.getStreakMedal?.(streak) ?? null;
  } catch {
    return null;
  }
}

function getPassagePositions(passage) {
  const start = STAFF.left + 142;
  const end = STAFF.right - 52;
  const noteGap = 0.34;
  const totalUnits = passage.reduce((sum, item) => sum + (RHYTHM_SPACING[item.rhythm] ?? 1.65), 0) + Math.max(0, passage.length - 1) * noteGap;
  const unit = (end - start) / Math.max(totalUnits, 1);
  let cursor = start;

  return passage.map((item, index) => {
    const width = (RHYTHM_SPACING[item.rhythm] ?? 1.65) * unit;
    const x = index === 0 ? start + 17 : cursor + width / 2;
    cursor += width + (index < passage.length - 1 ? noteGap * unit : 0);
    return x;
  });
}

function getQuaverGroups(items) {
  const groups = [];
  let index = 0;

  while (index < items.length) {
    if (!items[index] || items[index].rhythm !== "quaver" || items[index].step == null) {
      index += 1;
      continue;
    }

    const start = index;
    while (
      index + 1 < items.length &&
      !items[index]?.tieToNext &&
      items[index + 1]?.rhythm === "quaver" &&
      items[index + 1]?.step != null
    ) {
      index += 1;
    }

    if (index > start) groups.push({ start, end: index });
    index += 1;
  }

  return groups;
}

function findGroup(groups, index) {
  return groups.find((group) => index >= group.start && index <= group.end) ?? null;
}

function groupHasDownStems(items) {
  let down = 0;
  let up = 0;
  items.forEach((item) => {
    stemDown(item.step) ? down += 1 : up += 1;
  });
  return down > up;
}

function getBeam(items, positions, top, forcedDown = null) {
  const down = forcedDown ?? groupHasDownStems(items);
  const settings = sharedSymbolConfig("quaverBeam");
  const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0);
  const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0);
  const stemLength = NOTE.stemLength * Number(settings.heightScale || 1);
  const beamWidthAdjust = STAFF.gap * 0.6 * (Number(settings.widthScale || 1) - 1);
  const firstY = yForStep(top, items[0].step);
  const lastY = yForStep(top, items.at(-1).step);
  const firstStem = getStem(positions[0] + xOffset, firstY + yOffset, items[0].step, items[0].rhythm, down, down ? firstY + yOffset + stemLength : firstY + yOffset - stemLength);
  const lastStem = getStem(positions.at(-1) + xOffset, lastY + yOffset, items.at(-1).step, items.at(-1).rhythm, down, down ? lastY + yOffset + stemLength : lastY + yOffset - stemLength);

  return {
    down,
    start: { x: firstStem.stemX - beamWidthAdjust, y: firstStem.stemEndY },
    end: { x: lastStem.stemX + beamWidthAdjust, y: lastStem.stemEndY },
  };
}

function beamYAtX(x, beam) {
  const ratio = (x - beam.start.x) / (beam.end.x - beam.start.x || 1);
  return beam.start.y + ratio * (beam.end.y - beam.start.y);
}

function beamPolygonPoints(x1, y1, x2, y2, thickness) {
  const halfThickness = thickness / 2;
  return [`${x1},${y1 - halfThickness}`, `${x2},${y2 - halfThickness}`, `${x2},${y2 + halfThickness}`, `${x1},${y1 + halfThickness}`].join(" ");
}

function BeamShape({ beam, colour = "currentColor", opacity = 1 }) {
  const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.beamThicknessScale || 0.42));
  return <polygon points={beamPolygonPoints(beam.start.x - 0.5, beam.start.y, beam.end.x + 0.5, beam.end.y, thickness)} fill={colour} opacity={opacity} />;
}

function LedgerLines({ x, step, clef, top: staffTop = null, colour = "currentColor", opacity = 1 }) {
  const top = staffTop ?? (clef === "treble" ? STAFF.trebleTop : STAFF.bassTop);
  const ledgerSteps = [];
  for (let lineStep = -2; lineStep >= step; lineStep -= 2) ledgerSteps.push(lineStep);
  for (let lineStep = 10; lineStep <= step; lineStep += 2) ledgerSteps.push(lineStep);
  const settings = sharedSymbolConfig("ledgerLines");
  const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const halfWidth = (STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4) * Number(settings.widthScale || 1)) / 2;
  const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11) * Number(settings.heightScale || 1));

  return (
    <g pointerEvents="none">
      {ledgerSteps.map((lineStep) => (
        <line key={lineStep} x1={x - halfWidth + xOffset} x2={x + halfWidth + xOffset} y1={yForStep(top, lineStep) + yOffset} y2={yForStep(top, lineStep) + yOffset} stroke={colour} strokeWidth={thickness} strokeLinecap="butt" opacity={opacity} />
      ))}
    </g>
  );
}

function RhythmNote({
  x,
  y,
  step,
  rhythm = "crotchet",
  colour = "currentColor",
  opacity = 1,
  preview = false,
  showFlag = true,
  forcedDown = null,
  forcedStemEndY = null,
  scale = 1,
}) {
  const hasStem = ["minim", "crotchet", "dotted-crotchet", "quaver"].includes(rhythm);
  const stem = getStem(x, y, step, rhythm, forcedDown, forcedStemEndY);
  const beamed = rhythm === "quaver" && !showFlag;
  const symbolKey = noteSymbolKey(rhythm, stem.down, beamed);
  const dotKey = step % 2 === 0 ? "augmentationDotLine" : "augmentationDotSpace";
  const dotY = step % 2 === 0 ? y - STAFF.gap * 0.25 : y;
  const stemThickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12));

  return (
    <g opacity={opacity} pointerEvents="none" transform={scale !== 1 ? `translate(${x} ${y}) scale(${scale}) translate(${-x} ${-y})` : undefined}>
      <CalibratedSymbol symbolKey={symbolKey} x={x} y={y} colour={colour} />
      {hasStem && beamed && <line x1={stem.stemX} x2={stem.stemX} y1={stem.stemStartY} y2={stem.stemEndY} stroke={colour} strokeWidth={stemThickness} />}
      {rhythm === "dotted-crotchet" && <CalibratedSymbol symbolKey={dotKey} x={x + STAFF.gap * 1.3} y={dotY} colour={colour} />}
    </g>
  );
}

function Staff({ top, clef }) {
  const isTreble = clef === "treble";
  const fadeId = `staff-fade-${clef}-${top}`;

  return (
    <g>
      <defs>
        <linearGradient id={fadeId} x1={STAFF.left} y1={0} x2={STAFF.right} y2={0} gradientUnits="userSpaceOnUse">
          <stop offset="0%" stopColor="white" stopOpacity="1" />
          <stop offset="78%" stopColor="white" stopOpacity="1" />
          <stop offset="100%" stopColor="white" stopOpacity="0" />
        </linearGradient>
        <mask id={`${fadeId}-mask`} maskUnits="userSpaceOnUse" x={STAFF.left} y={top - 8} width={STAFF.right - STAFF.left} height={STAFF.gap * 4 + 16}>
          <rect x={STAFF.left} y={top - 8} width={STAFF.right - STAFF.left} height={STAFF.gap * 4 + 16} fill={`url(#${fadeId})`} />
        </mask>
      </defs>
      <g mask={`url(#${fadeId}-mask)`}>
        {[0, 1, 2, 3, 4].map((line) => (
          <line key={line} x1={STAFF.left} x2={STAFF.right} y1={top + line * STAFF.gap} y2={top + line * STAFF.gap} stroke="currentColor" strokeWidth="1.5" />
        ))}
      </g>
      <CalibratedSymbol symbolKey={isTreble ? "gClef" : "fClef"} x={STAFF.left + 52} y={yForStep(top, isTreble ? 2 : 6)} />
    </g>
  );
}

function HelpLabels({ visible, sourceClef = "treble", answerClef = "bass", sourceTop, answerTop }) {
  if (!visible) return null;
  const lineLabelX = STAFF.left - 14;
  const spaceLabelX = STAFF.left + 13;
  const labelYOffset = 2;
  const systems = [
    { key: "source", clef: sourceClef, top: sourceTop },
    { key: "answer", clef: answerClef, top: answerTop },
  ];

  return (
    <g fontSize="14" fontFamily="system-ui, sans-serif" fontWeight="700" dominantBaseline="middle" pointerEvents="none" fill="black">
      {systems.flatMap(({ key, clef, top }) => {
        const data = NOTE_NAME_LABELS[clef];
        return [
          ...data.lines.map((note) => (
            <text key={`${key}-${clef}-line-${note.step}`} x={lineLabelX} y={yForStep(top, note.step) + labelYOffset} textAnchor="start">
              {note.letter}
            </text>
          )),
          ...data.spaces.map((note) => (
            <text key={`${key}-${clef}-space-${note.step}`} x={spaceLabelX} y={yForStep(top, note.step) + labelYOffset} textAnchor="end">
              {note.letter}
            </text>
          )),
        ];
      })}
    </g>
  );
}

function Tie({ x1, y1, x2, y2, step1, step2, colour = "currentColor", opacity = 1 }) {
  const midX = (x1 + x2) / 2;
  const stemsUp = !stemDown(step1) && !stemDown(step2);
  const y = stemsUp ? Math.max(y1, y2) + 6 : Math.min(y1, y2) - 5;
  const stretch = clamp(Math.abs(x2 - x1) / 22, 1.4, 5.2);
  const tieGlyph = sharedSymbolForKey("tie") || GLYPH.tie;

  return (
    <text
      className="music-symbol"
      x="0"
      y="0"
      fontSize="58"
      textAnchor="middle"
      fill={colour}
      opacity={opacity}
      pointerEvents="none"
      transform={`translate(${midX} ${y}) scale(${stretch} 1)${stemsUp ? "" : " rotate(180)"}`}
    >
      {tieGlyph}
    </text>
  );
}

function OttavaMark({ marking, top }) {
  if (!marking) return null;
  const label = marking === "8vb" ? sharedSymbolForKey("ottavaBassa") || GLYPH.ottavaBassa : sharedSymbolForKey("ottavaAlta") || GLYPH.ottavaAlta;
  const above = marking !== "8vb";
  const labelX = STAFF.left + 26;
  const labelY = top + (above ? -33 : STAFF.gap * 4 + 37);
  const lineY = labelY + (above ? -10 : 0);
  const lineX1 = STAFF.left + 70;
  const lineX2 = STAFF.right - 4;
  return (
    <g pointerEvents="none">
      <text className="music-symbol" x={labelX} y={labelY} fontSize="42" textAnchor="start" dominantBaseline="middle" fill="currentColor">
        {label}
      </text>
      <line
        x1={lineX1}
        x2={lineX2}
        y1={lineY}
        y2={lineY}
        stroke="currentColor"
        strokeWidth="1.5"
        strokeDasharray="5 5"
      />
      <line
        x1={lineX2}
        x2={lineX2}
        y1={lineY}
        y2={lineY + (above ? 12 : -12)}
        stroke="currentColor"
        strokeWidth="1.5"
      />
    </g>
  );
}

function RenderPassage({ passage, top, clef, answerItems = null, feedbackDetails = null, correctOverlay = false, overlayOffset = 0, userTies = null }) {
  const positions = getPassagePositions(passage).map((x) => x + overlayOffset);
  const source = answerItems ?? passage.map((item) => ({ ...item.source, rhythm: item.rhythm, tieToNext: item.tieToNext }));
  const quaverGroups = getQuaverGroups(source);
  const ties = userTies ?? passage.map((item) => Boolean(item.tieToNext));

  return (
    <g>
      {ties.map((hasTie, index) => {
        if (!hasTie || index >= source.length - 1) return null;
        const first = source[index];
        const second = source[index + 1];
        if (!first || first.step == null || !second) return null;

        const secondStep = second.step ?? first.step;
        const result = feedbackDetails?.[index]?.tieCorrect;
        if (correctOverlay && feedbackDetails && result === true) return null;

        const colour = result == null ? "currentColor" : result ? COLOUR.green : COLOUR.red;
        const errorOffset = result === false ? -3 : 0;

        return (
          <Tie
            key={`tie-${index}-${overlayOffset}`}
            x1={positions[index] + errorOffset}
            y1={yForStep(top, first.step)}
            x2={positions[index + 1] + errorOffset}
            y2={yForStep(top, secondStep)}
            step1={first.step}
            step2={secondStep}
            colour={colour}
          />
        );
      })}

      {source.map((item, index) => {
        if (!item || item.step == null || item.rhythm == null) return null;

        const result = feedbackDetails?.[index];
        let colour = "currentColor";
        if (result) colour = result.pitchCorrect && result.rhythmCorrect ? COLOUR.green : COLOUR.red;
        const isWrongAnswer = result && !(result.pitchCorrect && result.rhythmCorrect);
        const opacity = correctOverlay ? 1 : isWrongAnswer ? 0.55 : 1;
        if (correctOverlay) {
          if (!result || (result.pitchCorrect && result.rhythmCorrect)) return null;
          colour = COLOUR.green;
        }

        const x = positions[index];
        const y = yForStep(top, item.step);
        const group = findGroup(quaverGroups, index);
        const groupItems = group ? source.slice(group.start, group.end + 1) : [];
        const groupPositions = group ? positions.slice(group.start, group.end + 1) : [];
        const down = group ? groupHasDownStems(groupItems) : null;
        const beam = group && groupItems.every((note) => note?.step != null) ? getBeam(groupItems, groupPositions, top, down) : null;
        const stem = beam ? getStem(x, y, item.step, item.rhythm, down) : null;

        return (
          <g key={`${clef}-${index}-${overlayOffset}`}>
            <LedgerLines x={x} step={item.step} clef={clef} top={top} colour={colour} opacity={opacity} />
            <RhythmNote
              x={x}
              y={y}
              step={item.step}
              rhythm={item.rhythm}
              colour={colour}
              opacity={item.isHover ? 0.55 : opacity}
              preview={item.isHover}
              showFlag={!beam}
              forcedDown={down}
              forcedStemEndY={beam && stem ? beamYAtX(stem.stemX, beam) : null}
            />
            {beam && group.start === index && (
              <BeamShape beam={beam} colour={colour} opacity={opacity} />
            )}
          </g>
        );
      })}
    </g>
  );
}

function MeaningExampleScore({ question }) {
  const sourceTop = (SVG.height - STAFF.gap * 4) / 2 - 72;

  return (
    <svg viewBox={`0 0 ${SVG.width} ${SVG.height}`} className="transposing-score-svg h-auto w-full select-none overflow-visible">
      <Staff top={sourceTop} clef={question.sourceClef} />
      <OttavaMark marking={question.marking} top={sourceTop} />
      <RenderPassage passage={question.passage} top={sourceTop} clef={question.sourceClef} />
    </svg>
  );
}

function ScoreArea({
  question,
  mode,
  noteNamesVisible,
  hoverStep,
  lockedStep,
  examSteps,
  selectedRhythms,
  selectedRhythmTool,
  userTies,
  activeSlot,
  feedback,
  feedbackDetails,
  touchPreview,
  onPointerMove,
  onPointerDown,
  onPointerUp,
  onPointerCancel,
}) {
  const singleX = 490;
  const singleSource = question.singleSource;
  const singleAnswer = question.singleAnswer;
  const activeSingleStep = lockedStep ?? hoverStep;
  const positions = getPassagePositions(question.passage);
  const { sourceTop, answerTop } = getSystemLayout(question);

  const userPassage = question.passage.map((item, index) => ({
    rhythm: selectedRhythms[index] ?? (index === activeSlot && selectedRhythmTool !== "tie" ? selectedRhythmTool : null),
    step: examSteps[index] ?? (index === activeSlot && hoverStep != null && selectedRhythmTool !== "tie" && (selectedRhythmTool || selectedRhythms[index]) ? hoverStep : null),
    tieToNext: Boolean(userTies[index]) || Boolean(item.tieToNext),
    isHover: index === activeSlot && examSteps[index] == null && hoverStep != null,
  }));

  const correctPassage = question.passage.map((item) => ({
    rhythm: item.rhythm,
    step: item.answer.step,
  }));

  const tiePreview =
    mode === "exam" &&
    selectedRhythmTool === "tie" &&
    touchPreview?.type === "tie" &&
    selectedRhythms[activeSlot] != null &&
    activeSlot < question.passage.length - 1
      ? {
          x1: positions[activeSlot],
          y1: yForStep(answerTop, examSteps[activeSlot] ?? hoverStep),
          x2: positions[activeSlot + 1],
          y2: yForStep(answerTop, examSteps[activeSlot + 1] ?? examSteps[activeSlot] ?? hoverStep),
          step1: examSteps[activeSlot] ?? hoverStep,
          step2: examSteps[activeSlot + 1] ?? examSteps[activeSlot] ?? hoverStep,
        }
      : null;

  return (
    <svg viewBox={`0 0 ${SVG.width} ${SVG.height}`} className="transposing-score-svg h-auto w-full select-none overflow-visible">
      {mode === "practice" && <rect width={SVG.width} height={SVG.height} fill="white" />}
      <Staff top={sourceTop} clef={question.sourceClef} />
      <Staff top={answerTop} clef={question.answerClef} />
      <OttavaMark marking={question.marking} top={sourceTop} />
      <HelpLabels visible={noteNamesVisible} sourceClef={question.sourceClef} answerClef={question.answerClef} sourceTop={sourceTop} answerTop={answerTop} />

      {mode === "practice" ? (
        <>
          <LedgerLines x={singleX} step={singleSource.step} clef={question.sourceClef} top={sourceTop} />
          <RhythmNote x={singleX} y={yForStep(sourceTop, singleSource.step)} step={singleSource.step} rhythm="crotchet" />

          {activeSingleStep != null && !(feedback && !feedback.correct) && (
            <>
              <LedgerLines x={singleX} step={activeSingleStep} clef={question.answerClef} top={answerTop} />
              <RhythmNote
                x={singleX}
                y={yForStep(answerTop, activeSingleStep)}
                step={activeSingleStep}
                rhythm="crotchet"
                colour={lockedStep == null ? COLOUR.preview : "currentColor"}
                opacity={lockedStep == null ? 0.55 : 1}
                preview={lockedStep == null}
              />
            </>
          )}

          {feedback && lockedStep != null && (
            <>
              <LedgerLines x={singleX} step={lockedStep} clef={question.answerClef} top={answerTop} colour={feedback.correct ? COLOUR.green : COLOUR.red} opacity={feedback.correct ? 1 : 0.4} />
              <RhythmNote
                x={singleX}
                y={yForStep(answerTop, lockedStep)}
                step={lockedStep}
                rhythm="crotchet"
                colour={feedback.correct ? COLOUR.green : COLOUR.red}
                opacity={feedback.correct ? 1 : 0.4}
              />
              {!feedback.correct && (
                <>
                  <LedgerLines x={singleX + 55} step={singleAnswer.step} clef={question.answerClef} top={answerTop} colour={COLOUR.green} />
                  <RhythmNote x={singleX + 55} y={yForStep(answerTop, singleAnswer.step)} step={singleAnswer.step} rhythm="crotchet" colour={COLOUR.green} />
                </>
              )}
            </>
          )}
        </>
      ) : (
        <>
          <RenderPassage passage={question.passage} top={sourceTop} clef={question.sourceClef} />
          <RenderPassage passage={question.passage} top={answerTop} clef={question.answerClef} answerItems={userPassage} feedbackDetails={feedbackDetails} userTies={userTies} />
          {tiePreview && <Tie {...tiePreview} colour={COLOUR.preview} opacity={0.55} />}
          {feedback && !feedback.correct && (
            <RenderPassage
              passage={question.passage}
              top={answerTop}
              clef={question.answerClef}
              answerItems={correctPassage}
              feedbackDetails={feedbackDetails}
              correctOverlay
              overlayOffset={feedbackDetails?.every((item) => item.pitchCorrect && item.rhythmCorrect) ? 0 : 28}
            />
          )}
        </>
      )}

      {mode === "exam" &&
        positions.map((x, index) => (
          <rect
            key={`slot-hit-${index}`}
            x={x - 32}
            y={answerTop - 58}
            width="64"
            height="220"
            fill="transparent"
            pointerEvents="all"
            className="touch-none"
            style={{ touchAction: "none" }}
            onPointerDown={(event) => onPointerDown(event, index)}
            onPointerMove={(event) => onPointerMove(event, index)}
            onPointerUp={onPointerUp}
            onPointerCancel={onPointerCancel}
          />
        ))}

      {mode === "practice" && (
        <rect
          x={STAFF.left - 24}
          y={answerTop - 42}
          width={STAFF.right - STAFF.left + 48}
          height="220"
          fill="transparent"
          pointerEvents="all"
          className="touch-none"
          style={{ touchAction: "none" }}
          onPointerMove={onPointerMove}
          onPointerDown={onPointerDown}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerCancel}
        />
      )}

      {hasTouchInput() && touchPreview?.active && touchPreview.type !== "tie" && touchPreview.step != null && !feedback && (
        <g pointerEvents="none">
          <line
            x1={STAFF.left - 14}
            x2={STAFF.right + 14}
            y1={yForStep(answerTop, touchPreview.step)}
            y2={yForStep(answerTop, touchPreview.step)}
            stroke="black"
            strokeWidth="1.5"
            strokeDasharray="5 5"
            opacity="0.55"
          />
          <LedgerLines x={touchPreview.x} step={touchPreview.step} clef={question.answerClef} top={answerTop} colour="black" />
          <RhythmNote
            x={touchPreview.x}
            y={yForStep(answerTop, touchPreview.step)}
            step={touchPreview.step}
            rhythm={mode === "exam" ? selectedRhythmTool ?? selectedRhythms[touchPreview.targetSlot ?? activeSlot] ?? "crotchet" : "crotchet"}
            colour="black"
            opacity={0.86}
            preview
            scale={1.65}
          />
        </g>
      )}
    </svg>
  );
}

function MenuIcon({ type }) {
  if (type === "whole-bar") return <span className="music-symbol relative top-[9px] inline-flex h-[18px] w-[18px] items-center justify-center text-[18px] leading-none text-stone-700">{String.fromCodePoint(0x1d11a)}</span>;
  if (type === "abc") return <span className="inline-flex h-[18px] w-[22px] items-center justify-center text-[13px] font-black leading-none tracking-tight text-stone-700">ABC</span>;
  if (type === "ottava") {
    return (
      <span className="music-symbol relative top-[3px] inline-flex h-[22px] w-[22px] items-center justify-center text-[22px] leading-none text-stone-700">
        {GLYPH.ottavaAlta}
      </span>
    );
  }
  if (type === "same-pitch") return <span className="music-symbol relative top-[3px] inline-flex h-[18px] w-[18px] items-center justify-center text-[19px] leading-none text-stone-700">{GLYPH.trebleClef}</span>;
  if (type === "octave-higher") return <span className="inline-flex h-[18px] w-[18px] items-center justify-center text-[18px] font-black leading-none text-stone-700">↑</span>;
  if (type === "octave-lower") return <span className="inline-flex h-[18px] w-[18px] items-center justify-center text-[18px] font-black leading-none text-stone-700">↓</span>;
  return null;
}

function ToolGlyph({ tool, active }) {

function App() {
  const [wholeBarMode, setWholeBarMode] = useState(false);
  const [activeLevel, setActiveLevel] = useState(INITIAL_LEVEL);
  const [question, setQuestion] = useState(() => createQuestion("practice", null, INITIAL_LEVEL));
  const [questionOptions, setQuestionOptions] = useState(DEFAULT_QUESTION_OPTIONS);
  const [questionVisible, setQuestionVisible] = useState(true);
  const [levelOpen, setLevelOpen] = useState(false);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [noteNamesVisible, setNoteNamesVisible] = useState(false);
  const [hoverStep, setHoverStep] = useState(null);
  const [lockedStep, setLockedStep] = useState(null);
  const [examSteps, setExamSteps] = useState([]);
  const [selectedRhythms, setSelectedRhythms] = useState([]);
  const [selectedRhythmTool, setSelectedRhythmTool] = useState(null);
  const [userTies, setUserTies] = useState([]);
  const [activeSlot, setActiveSlot] = useState(0);
  const [touchPreview, setTouchPreview] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [feedbackDetails, setFeedbackDetails] = useState(null);
  const [prompt, setPrompt] = useState("");
  const [typedAnswer, setTypedAnswer] = useState("");
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);
  const feedbackTimerRef = useRef(null);
  const feedbackFadeTimerRef = useRef(null);

  const mode = wholeBarMode ? "exam" : "practice";
  const customiseRef = useRef(null);
  const levelRef = useRef(null);

  React.useEffect(() => window.MLH?.installPhoneLandscapeLock?.(), []);

  window.MLH.useClickOutside(
    [levelRef, customiseRef],
    [
      () => levelOpen && setLevelOpen(false),
      () => customiseOpen && setCustomiseOpen(false),
    ],
  );

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const meaningMode = question.type === "meaning";
  const meaningMarked = meaningMode && feedback;
  const examReady = wholeBarMode && !meaningMode && question.passage.every((_, index) => examSteps[index] != null && selectedRhythms[index] != null);
  const canConfirm = meaningMode ? typedAnswer.trim().length > 0 && !feedback : wholeBarMode ? examReady && !feedback : lockedStep != null && !feedback;
  const { answerTop } = getSystemLayout(question);
  const instruction = meaningMode
    ? question.instruction?.[mode]
    : wholeBarMode
      ? question.marking
        ? <>Rewrite the notes as they would sound.</>
        : question.instruction?.[mode]
      : question.instruction?.[mode] ?? <>Rewrite the note as it would sound.</>;

  function resetTask(nextQuestion = question) {
    if (feedbackTimerRef.current) {
      window.clearTimeout(feedbackTimerRef.current);
      feedbackTimerRef.current = null;
    }
    if (feedbackFadeTimerRef.current) {
      window.clearTimeout(feedbackFadeTimerRef.current);
      feedbackFadeTimerRef.current = null;
    }
    setQuestion(nextQuestion);
    setHoverStep(null);
    setLockedStep(null);
    setExamSteps([]);
    setSelectedRhythms([]);
    setSelectedRhythmTool(null);
    setUserTies([]);
    setActiveSlot(0);
    setTouchPreview(null);
    setFeedback(null);
    setFeedbackFading(false);
    setFeedbackDetails(null);
    setPrompt("");
    setTypedAnswer("");
  }

  function newQuestion(nextMode = mode, nextLevel = activeLevel, nextOptions = questionOptions) {
    if (feedbackTimerRef.current) {
      window.clearTimeout(feedbackTimerRef.current);
      feedbackTimerRef.current = null;
    }
    if (feedbackFadeTimerRef.current) {
      window.clearTimeout(feedbackFadeTimerRef.current);
      feedbackFadeTimerRef.current = null;
    }
    setQuestionVisible(false);
    window.setTimeout(() => {
      resetTask(createQuestion(nextMode, question.singleIndex, nextLevel, nextOptions));
      setQuestionVisible(true);
    }, 260);
  }

  function setQuestionOption(key) {
    const next = { ...questionOptions, [key]: !questionOptions[key] };
    setQuestionOptions(next);
    newQuestion(mode, activeLevel, next);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion(mode);
  }

  function fadeToNextQuestion() {
    if (!feedback || feedback.correct || feedbackFading || feedbackTimerRef.current) return;
    setFeedbackFading(true);
    feedbackTimerRef.current = window.setTimeout(() => newQuestion(mode), 280);
  }

  function pointerToSvg(event) {
    const svg = event.currentTarget.ownerSVGElement;
    const rect = svg.getBoundingClientRect();
    return {
      x: ((event.clientX - rect.left) / rect.width) * SVG.width,
      y: ((event.clientY - rect.top) / rect.height) * SVG.height,
    };
  }

  function getPointerStep(event) {
    const pointer = pointerToSvg(event);
    const touchOffset = event.pointerType === "touch" ? 44 : 0;
    return { pointer, step: stepFromSvgY(pointer.y - touchOffset, answerTop) };
  }

  function placeStep(step, targetSlot = activeSlot) {
    if (feedback) return;

    if (mode === "practice") {
      setLockedStep(step);
      setHoverStep(step);
      setPrompt("");
      return;
    }

    if (selectedRhythmTool === "tie") {
      const existingTieSlot = userTies[targetSlot] ? targetSlot : userTies[targetSlot - 1] ? targetSlot - 1 : null;

      if (existingTieSlot != null) {
        setUserTies(Array(question.passage.length).fill(false));
        setActiveSlot(existingTieSlot);
        setHoverStep(null);
        setTouchPreview(null);
        setPrompt("");
        return;
      }

      if (targetSlot >= question.passage.length - 1) return;
      if (examSteps[targetSlot] == null || selectedRhythms[targetSlot] == null) {
        setPrompt("Place the note before adding a tie.");
        return;
      }

      setUserTies(() => {
        const next = Array(question.passage.length).fill(false);
        next[targetSlot] = true;
        return next;
      });

      setActiveSlot(targetSlot);
      setHoverStep(null);
      setTouchPreview(null);
      setPrompt("");
      return;
    }

    const rhythmToPlace = selectedRhythmTool ?? selectedRhythms[targetSlot];
    if (!rhythmToPlace) {
      setPrompt("");
      return;
    }

    const shouldRemoveExisting = !touchPreview?.dragged && selectedRhythms[targetSlot] === rhythmToPlace && examSteps[targetSlot] != null;

    setExamSteps((current) => {
      const next = [...current];
      next[targetSlot] = shouldRemoveExisting ? null : step;
      return next;
    });

    setSelectedRhythms((current) => {
      const next = [...current];
      next[targetSlot] = shouldRemoveExisting ? null : rhythmToPlace;
      return next;
    });

    if (shouldRemoveExisting) {
      setUserTies((current) => {
        const next = [...current];
        next[targetSlot] = false;
        if (targetSlot > 0) next[targetSlot - 1] = false;
        return next;
      });
    }

    setActiveSlot(targetSlot);
    setHoverStep(null);
    setPrompt("");
  }

  function handlePointerMove(event, targetSlot = activeSlot) {
    if (feedback) return;
    if (!wholeBarMode && lockedStep != null && !touchPreview?.active) return;
    if (wholeBarMode && selectedRhythmTool === "tie" && examSteps[targetSlot] == null) {
      setHoverStep(null);
      setTouchPreview(null);
      return;
    }
    if (wholeBarMode && !selectedRhythmTool && !selectedRhythms[targetSlot]) return;

    const { pointer, step } = getPointerStep(event);
    setActiveSlot(targetSlot);
    setHoverStep(selectedRhythmTool === "tie" ? examSteps[targetSlot] : step);

    if (selectedRhythmTool === "tie") {
      setTouchPreview({ active: true, type: "tie", targetSlot, x: pointer.x, y: pointer.y, dragged: false });
      return;
    }

    if (touchPreview?.active) {
      setTouchPreview((current) => ({
        ...(current ?? {}),
        active: true,
        x: pointer.x,
        y: pointer.y,
        step,
        targetSlot,
        dragged: true,
      }));
    }
  }

  function handlePointerDown(event, targetSlot = activeSlot) {
    if (feedback) {
      event.preventDefault();
      event.stopPropagation();
      if (feedback.correct) {
        skipCorrectFeedback();
      } else {
        fadeToNextQuestion();
      }
      return;
    }

    event.preventDefault();
    event.currentTarget.setPointerCapture?.(event.pointerId);

    const { pointer, step } = getPointerStep(event);
    setActiveSlot(targetSlot);
    setHoverStep(selectedRhythmTool === "tie" ? examSteps[targetSlot] : step);
    setTouchPreview(
      selectedRhythmTool === "tie"
        ? { active: true, type: "tie", targetSlot, x: pointer.x, y: pointer.y, dragged: false }
        : { active: true, x: pointer.x, y: pointer.y, step, targetSlot, dragged: false },
    );
  }

  function handlePointerUp(event) {
    if (feedback) return;
    event.preventDefault();
    event.currentTarget.releasePointerCapture?.(event.pointerId);

    if (touchPreview?.type === "tie") {
      placeStep(null, touchPreview.targetSlot ?? activeSlot);
    } else if (touchPreview?.step != null) {
      placeStep(touchPreview.step, touchPreview.targetSlot ?? activeSlot);
    }

    setTouchPreview(null);
  }

  function handlePointerCancel() {
    setTouchPreview(null);
  }

  function selectRhythm(tool) {
    if (feedback || !wholeBarMode) return;
    setSelectedRhythmTool(tool);
    setHoverStep(null);
    setTouchPreview(null);
    setPrompt("");
  }

  function scoreAnswer(isCorrect) {
    const nextStreak = isCorrect ? streak + 1 : 0;
    safePlayFeedbackSound(isCorrect);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });

    if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = safeGetStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      if (medal?.sound) {
        window.setTimeout(() => safePlayFeedbackSound(true, true, medal.sound), 180);
      }
    }

    if (isCorrect) {
      setFeedbackFading(false);
      feedbackFadeTimerRef.current = window.setTimeout(() => setFeedbackFading(true), 1700);
      feedbackTimerRef.current = window.setTimeout(() => newQuestion(mode), 2000);
    }
  }

  function skipCorrectFeedback() {
    if (!feedback || !feedback.correct || feedbackFading) return;
    if (feedbackTimerRef.current) {
      window.clearTimeout(feedbackTimerRef.current);
      feedbackTimerRef.current = null;
    }
    if (feedbackFadeTimerRef.current) {
      window.clearTimeout(feedbackFadeTimerRef.current);
      feedbackFadeTimerRef.current = null;
    }
    setFeedbackFading(true);
    feedbackTimerRef.current = window.setTimeout(() => newQuestion(mode), 280);
  }

  function handleFeedbackAdvance() {
    if (feedback?.correct) {
      skipCorrectFeedback();
      return;
    }

    if (feedback) {
      fadeToNextQuestion();
    }
  }

  function confirmAnswer() {
    if (feedback) return;

    if (meaningMode) {
      scoreAnswer(isCorrectMeaningAnswer(typedAnswer, question.correctMeaning));
      return;
    }

    if (!wholeBarMode) {
      if (lockedStep == null) {
        setPrompt("Place your answer on the lower stave first.");
        return;
      }
      scoreAnswer(lockedStep === question.singleAnswer.step);
      return;
    }

    if (!examReady) {
      setPrompt(`Complete note ${activeSlot + 1} of ${question.passage.length}.`);
      return;
    }

    const details = question.passage.map((item, index) => ({
      pitchCorrect: examSteps[index] === item.answer.step,
      rhythmCorrect: selectedRhythms[index] === item.rhythm,
      tieCorrect: Boolean(userTies[index]) === Boolean(item.tieToNext),
    }));

    setFeedbackDetails(details);
    scoreAnswer(details.every((item) => item.pitchCorrect && item.rhythmCorrect && item.tieCorrect));
  }

  return (
    <div className={SHELL.pageShellClass}>
      <window.MLH.AppHeader icon={ASSET.appIcon} title="Transposing" subtitle="Transpose between the treble and bass clefs.">
        <window.MLH.ScoreStreakPanel
          assets={ASSET}
          correct={correct}
          attempted={attempted}
          accuracy={accuracy}
          streak={streak}
          bestStreak={bestStreak}
          resetScore={resetScore}
          confettiKey={confettiKey}
        />
      </window.MLH.AppHeader>

      <div className={SHELL.pageContentClass}>
        <main
          className={`${SHELL.mainShellClass} transposing-main ${meaningMode ? "is-meaning-mode" : ""} min-h-[560px] px-4 pb-4 md:min-h-0`}
          onPointerDown={handleFeedbackAdvance}
        >
          <div className="relative z-20 mb-2.5 grid grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2 overflow-visible">
            <div className="flex items-center gap-2 overflow-visible">
              <div className="relative" ref={levelRef}>
                <window.MLH.LevelButton
                  icon={<img src={ASSET.levels} alt="" aria-hidden="true" className="h-[21px] w-[21px] object-contain" />}
                  activeLevel={activeLevel}
                  activeLabel={activeLevel === "AH" ? "Advanced Higher" : "Higher"}
                  onClick={() => setLevelOpen((value) => !value)}
                />
                {levelOpen && (
                  <window.MLH.MenuPanel title="Level" position="left-0" variant="level">
                    <window.MLH.LevelMenu
                      activeLevel={activeLevel}
                      onSelect={(key) => {
                        if (key !== activeLevel) {
                          window.MLH.resetLevelSessionProgress({
                            setCorrect,
                            setAttempted,
                            setStreak,
                            setBestStreak,
                            setConfettiKey,
                          });
                        }
                        setActiveLevel(key);
                        setLevelOpen(false);
                        const url = new URL(window.location.href);
                        url.searchParams.set("level", key);
                        window.history.replaceState(null, "", url);
                        newQuestion(mode, key);
                      }}
                      levels={{
                        H: {
                          label: "Higher",
                          description: "Transposing from treble clef down one octave into bass clef",
                        },
                        AH: {
                          label: "Advanced Higher",
                          description:
                            "Transposing from bass clef one octave higher into treble clef · Rewriting a note at the same pitch using up to two ledger lines below or above the stave · 8va; 8vb",
                        },
                      }}
                    />
                  </window.MLH.MenuPanel>
                )}
              </div>

              <div className="relative" ref={customiseRef}>
                <window.MLH.CustomiseButton
                  icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[21px] w-[21px]" />}
                  onClick={() => setCustomiseOpen((value) => !value)}
                />
                {customiseOpen && (
                  <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise">
                    <MenuRows
                      wholeBarMode={wholeBarMode}
                      setWholeBarMode={(value) => {
                        const next = typeof value === "function" ? value(wholeBarMode) : value;
                        setWholeBarMode(next);
                        newQuestion(next ? "exam" : "practice", activeLevel);
                      }}
                      noteNamesVisible={noteNamesVisible}
                      setNoteNamesVisible={setNoteNamesVisible}
                      questionOptions={questionOptions}
                      setQuestionOption={setQuestionOption}
                      activeLevel={activeLevel}
                    />
                  </window.MLH.MenuPanel>
                )}
              </div>
            </div>

            <div className="flex h-10 items-center justify-center">
              {feedback && <window.MLH.FeedbackBadge feedback={feedback} fading={feedbackFading} animationPrefix="note" />}
            </div>

            <window.MLH.SkipButton resetStreak={() => setStreak(0)} onClick={() => newQuestion(mode)} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />} />
          </div>

          {wholeBarMode && !meaningMode && hasTouchInput() && !customiseOpen && !levelOpen && (
            <p className="relative z-20 mb-2 text-center text-[0.74rem] font-light leading-tight tracking-normal text-stone-600" style={{ opacity: 0.45 }}>
              Press and hold to drag note into place.
            </p>
          )}

          <div className={`transposing-score-wrap relative top-[0px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            {meaningMode ? (
              <MeaningExampleScore question={question} />
            ) : (
              <ScoreArea
                question={question}
                mode={mode}
                noteNamesVisible={noteNamesVisible}
                hoverStep={hoverStep}
                lockedStep={lockedStep}
                examSteps={examSteps}
                selectedRhythms={selectedRhythms}
                selectedRhythmTool={selectedRhythmTool}
                userTies={userTies}
                activeSlot={activeSlot}
                feedback={feedback}
                feedbackDetails={feedbackDetails}
                touchPreview={touchPreview}
                onPointerMove={handlePointerMove}
                onPointerDown={handlePointerDown}
                onPointerUp={handlePointerUp}
                onPointerCancel={handlePointerCancel}
              />
            )}
          </div>

          <div className={`transposing-question-panel relative z-10 mt-3 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-4 shadow-md md:mx-3 ${meaningMode ? "h-[120px] md:-mt-[123px]" : wholeBarMode ? "h-[160px] md:-mt-[123px]" : "h-[108px] md:-mt-[123px]"}`}>
            <div className="transposing-question-copy space-y-3 text-stone-900">
              <p className="text-base font-semibold leading-tight">{instruction}</p>
              {prompt && <p className="text-sm font-medium text-red-700">{prompt}</p>}
            </div>

            <div className="mt-2 flex flex-wrap items-start justify-between gap-3 pb-[30px]">
              {meaningMode ? (
                <div className="meaning-answer-row mt-1 flex w-full max-w-[760px] items-center gap-4">
                  <input
                    type="text"
                    value={typedAnswer}
                    onChange={(event) => setTypedAnswer(event.target.value)}
                    onKeyDown={(event) => {
                      if (event.key === "Enter" && typedAnswer.trim() && !feedback) confirmAnswer();
                    }}
                    placeholder="Type your answer"
                    className={`meaning-answer-input h-[48px] w-full max-w-[520px] rounded-xl border border-stone-300 bg-white px-4 text-base font-medium outline-none transition focus:border-stone-500 ${
                      meaningMarked ? (feedback.correct ? "text-green-700" : "text-red-700") : "text-stone-900"
                    }`}
                  />
                  {meaningMarked && !feedback.correct && (
                    <span className="whitespace-nowrap text-sm font-semibold text-green-700">
                      {meaningCorrectionText(question.correctMeaning)}
                    </span>
                  )}
                </div>
              ) : (
                wholeBarMode && <RhythmChooser selected={selectedRhythmTool} onSelect={selectRhythm} selectedRhythms={selectedRhythms} />
              )}

              <div className={`meaning-confirm-wrap ${meaningMode ? "absolute right-4 top-[65px]" : "absolute bottom-4 right-4"} flex shrink-0 justify-end gap-2`}>
                <window.MLH.ConfirmButton disabled={!canConfirm} onClick={confirmAnswer}>Confirm</window.MLH.ConfirmButton>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
  <script src="./footer.js?v=1.3"></script>
</body>
</html>
