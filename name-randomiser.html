  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;
const CORE = window.NAME_RANDOMISER_CORE;
const STORAGE_KEY = "mlh-name-randomiser-v1";
const MIN_SPIN_DURATION = 6000;
const FULLSCREEN_CONTROL_TIMEOUT = 3000;
const ASSET = { appIcon: "names-icon.svg", wheel: "wheel2.svg", slots: "slots.svg", customise: "customise.svg", classIcon: "class.svg", list: "list.svg", save: "save.svg", edit: "rename.svg", bin: "bin.svg", fullscreen: "full screen.svg", audio: "audio-svgrepo-com.svg?v=20260722-smaller15", tick: "tick.svg", spin: "spin.mp3" };

function uid(prefix) {
  if (window.crypto?.randomUUID) return `${prefix}-${window.crypto.randomUUID()}`;
  return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2)}`;
}

function readPersistence() {
  try { return CORE.cleanPersistence(JSON.parse(window.localStorage.getItem(STORAGE_KEY))); }
  catch { return CORE.emptyPersistence(); }
}

function polarPoint(cx, cy, radius, degrees) {
  const radians = degrees * Math.PI / 180;
  return { x: cx + radius * Math.cos(radians), y: cy + radius * Math.sin(radians) };
}

function wedgePath(start, end) {
  const centre = { x: 300, y: 300 };
  const first = polarPoint(300, 300, 260, start);
  const second = polarPoint(300, 300, 260, end);
  const large = end - start > 180 ? 1 : 0;
  return `M ${centre.x} ${centre.y} L ${first.x} ${first.y} A 260 260 0 ${large} 1 ${second.x} ${second.y} Z`;
}

function wrapName(name, maxChars) {
  const words = name.split(/\s+/).filter(Boolean);
  if (!words.length) return [];
  const lines = [];
  let line = "";
  words.forEach((word) => {
    if (!line) { line = word; return; }
    if (`${line} ${word}`.length <= maxChars) line += ` ${word}`;
    else { lines.push(line); line = word; }
  });
  if (line) lines.push(line);
  return lines;
}

function segmentTextColour(fill) {
  return fill === "#111111" ? "#fff" : "#111";
}

function spinArrowOutline(selectedColour, spinColour) {
  if (selectedColour === "#111111") return "#fff";
  return spinColour === "#111111" ? "none" : "#111";
}

function randomiserFontSize(count) {
  return Math.max(7, Math.min(28, 34 - count * 1.05));
}

function Wheel({ segments, rotation, spinning, locked, durationMs, selectedColour, onRemove, onSpin, spinDisabled }) {
  const [armedRemoveId, setArmedRemoveId] = useState(null);
  const count = segments.length;
  const slice = count ? 360 / count : 360;
  const sliceRadians = slice * Math.PI / 180;
  const textRadius = count === 1 ? 140 : (4 * 260 * Math.sin(sliceRadians / 2)) / (3 * sliceRadians);
  const textX = 300 + textRadius;
  const baseFontSize = randomiserFontSize(count);
  const maxChars = Math.max(7, Math.floor(19 - Math.min(9, count * .35)));
  const colourPalette = CORE.segmentColourPalette(selectedColour);
  const spinColour = CORE.spinControlColour(selectedColour);
  const spinButtonColour = spinColour;
  const arrowOutline = spinArrowOutline(selectedColour, spinColour);
  return <div className="names-wheel-wrap">
    <svg className="names-wheel" viewBox="0 0 600 600" role="img" aria-label={count ? `Wheel containing ${count} segments` : "Empty name wheel"}>
      <circle cx="300" cy="300" r="260" fill="#fff" stroke="#111" strokeWidth="1.25" />
      <g className="names-wheel-rotor" style={{ transform: `rotate(${rotation}deg)`, transition: spinning ? `transform ${durationMs}ms cubic-bezier(.08,.68,.12,1)` : "none" }}>
        {segments.map((segment, index) => {
          const start = index * slice;
          const end = start + slice;
          const middle = count === 1 ? 0 : start + slice / 2;
          const segmentFill = colourPalette[index % colourPalette.length];
          const textColour = segmentTextColour(segmentFill);
          const textLines = segment.names.flatMap((name) => wrapName(name, maxChars));
          const longestLine = Math.max(1, ...textLines.map((line) => line.length));
          const fontSize = Math.max(7, Math.min(baseFontSize, 190 / (longestLine * .62)));
          const lineHeight = fontSize * 1.12;
          const firstDy = -((textLines.length - 1) * lineHeight) / 2;
          const removable = !segment.preview && !locked;
          const requestRemove = (event) => {
            if (!removable) return;
            event.stopPropagation();
            if (event.pointerType === "touch") {
              if (armedRemoveId === segment.id) { setArmedRemoveId(null); onRemove(segment.id); }
              else setArmedRemoveId(segment.id);
              return;
            }
            onRemove(segment.id);
          };
          return <g key={segment.id} className={`names-wheel-segment ${segment.preview ? "is-preview" : ""} ${removable ? "is-removable" : ""} ${armedRemoveId === segment.id ? "is-remove-armed" : ""}`} role={!segment.preview ? "button" : undefined} tabIndex={removable ? 0 : -1} aria-label={!segment.preview ? `Remove ${segment.names[0]}` : undefined} aria-disabled={!segment.preview && !removable ? "true" : undefined} onPointerUp={requestRemove} onClick={(event) => { if (event.detail === 0) requestRemove(event); }} onKeyDown={(event) => { if (removable && (event.key === "Enter" || event.key === " ")) { event.preventDefault(); event.stopPropagation(); onRemove(segment.id); } }}>
            {count === 1
              ? <circle cx="300" cy="300" r="259" fill={segmentFill} />
              : <path d={wedgePath(start, end)} fill={segmentFill} stroke="#111" strokeWidth={count > 35 ? .75 : 1.25} />}
            <g transform={`rotate(${middle} 300 300)`}>
              <text className="names-segment-label" x={textX} y="300" transform={`rotate(180 ${textX} 300)`} fill={textColour} fontSize={fontSize} fontWeight="800" textAnchor="middle" dominantBaseline="middle">
                {textLines.map((line, lineIndex) => <tspan key={`${line}-${lineIndex}`} x={textX} dy={lineIndex === 0 ? firstDy : lineHeight}>{line}</tspan>)}
              </text>
            </g>
          </g>;
        })}
        {count > 0 && <g aria-hidden="true">
          <circle cx="300" cy="300" r="36" fill="#fff" stroke="#111" strokeWidth="1.25" />
          <text className="names-wheel-centre-glyph" x="300" y="300" fill="#111" textAnchor="middle" dominantBaseline="central" transform="translate(0 7)">{"\uE050"}</text>
        </g>}
      </g>
    </svg>
    {count === 0 && <div className="names-wheel-empty"><span className="names-empty-title">Welcome!</span><span className="names-empty-description">Add a name to get started.</span></div>}
    <div className="names-wheel-pointer-group">
      <button type="button" className="names-primary-button names-spin-button" style={{ backgroundColor: spinButtonColour, borderColor: "#111", color: segmentTextColour(spinButtonColour), fontSize: `${baseFontSize}px`, fontWeight: 800 }} disabled={spinDisabled} onClick={onSpin}>Spin</button>
      <svg className="names-wheel-pointer" viewBox="0 0 68 58" aria-hidden="true"><path d="M5 13 L5 45 Q5 57 15.94 52.06 L56.06 33.94 Q67 29 56.06 24.06 L15.94 5.94 Q5 1 5 13 Z" fill={spinColour} stroke={arrowOutline} strokeWidth={arrowOutline === "none" ? 0 : 1} /></svg>
    </div>
  </div>;
}

function SlotMachine({ segments, position, locked, selectedColour, onRemove, onSpin, spinDisabled }) {
  const count = segments.length;
  const spinFontSize = randomiserFontSize(count);
  const base = Math.floor(position);
  const fraction = position - base;
  const colourPalette = CORE.segmentColourPalette(selectedColour);
  const spinColour = CORE.spinControlColour(selectedColour);
  const spinButtonColour = spinColour;
  const arrowOutline = spinArrowOutline(selectedColour, spinColour);
  const visibleRows = count ? Array.from({ length: 7 }, (_, rowIndex) => {
    const offset = rowIndex - 3;
    const segmentIndex = ((base + offset) % count + count) % count;
    return { offset, segmentIndex, segment: segments[segmentIndex] };
  }) : [];

  return <div className="names-slots-wrap">
    <div className="names-slots-window" role="group" aria-label={count ? `Rows containing ${count} names` : "Empty Rows"}>
      <span className="names-slots-corner-clef is-top-left" aria-hidden="true">{"\uE050"}</span>
      <span className="names-slots-corner-clef is-top-right" aria-hidden="true">{"\uE050"}</span>
      <span className="names-slots-corner-clef is-bottom-left" aria-hidden="true">{"\uE050"}</span>
      <span className="names-slots-corner-clef is-bottom-right" aria-hidden="true">{"\uE050"}</span>
      {visibleRows.map(({ offset, segmentIndex, segment }) => {
        const distance = Math.abs(offset - fraction);
        const fontSize = Math.max(17, 36 - distance * 7);
        const scale = Math.max(.76, 1 - distance * .11);
        const removable = !segment.preview && !locked;
        const rowColour = colourPalette[segmentIndex % colourPalette.length];
        return <button key={`${offset}-${segment.id}`} type="button" className={`names-slots-row ${removable ? "is-removable" : ""}`} style={{ top: `calc(50% + ${(offset - fraction) * 92}px)`, backgroundColor: rowColour, color: segmentTextColour(rowColour), fontSize: `${fontSize}px`, opacity: Math.max(.5, 1 - distance * .16), transform: `translateY(-50%) scale(${scale})`, zIndex: distance < .55 ? 2 : 1 }} disabled={!removable} aria-label={!segment.preview ? `Remove ${segment.names.join(" and ")}` : "Name preview"} onClick={() => removable && onRemove(segment.id)}><span className="names-slots-row-content"><span className="names-slots-row-name">{segment.names.map((name, index) => <span key={`${name}-${index}`}>{name}</span>)}</span></span></button>;
      })}
      {!count && <div className="names-slots-empty"><span className="names-empty-title">Welcome!</span><span className="names-empty-description">Add a name to get started.</span></div>}
    </div>
    <div className="names-wheel-pointer-group">
      <button type="button" className="names-primary-button names-spin-button" style={{ backgroundColor: spinButtonColour, borderColor: "#111", color: segmentTextColour(spinButtonColour), fontSize: `${spinFontSize}px`, fontWeight: 800 }} disabled={spinDisabled} onClick={onSpin}>Spin</button>
      <svg className="names-wheel-pointer" viewBox="0 0 68 58" aria-hidden="true"><path d="M5 13 L5 45 Q5 57 15.94 52.06 L56.06 33.94 Q67 29 56.06 24.06 L15.94 5.94 Q5 1 5 13 Z" fill={spinColour} stroke={arrowOutline} strokeWidth={arrowOutline === "none" ? 0 : 1} /></svg>
    </div>
  </div>;
}

function Confetti({ activeKey }) {
  if (!activeKey) return null;
  const colours = ["#facc15", "#38bdf8", "#fb7185", "#4ade80", "#a78bfa", "#f97316"];
  return <div key={activeKey} className="names-confetti" aria-hidden="true">{Array.from({ length: 64 }, (_, index) => <span key={index} style={{ left: `${(index * 37) % 100}%`, backgroundColor: colours[index % colours.length], animationDelay: `${(index % 12) * .045}s`, animationDuration: `${1.35 + (index % 7) * .13}s`, "--drift": `${((index * 29) % 180) - 90}px` }} />)}</div>;
}

function WheelPopover({ title, children, actions, onClose, labelledBy = "names-wheel-popover-title" }) {
  const popoverRef = useRef(null);
  useEffect(() => {
    const previous = document.activeElement;
    popoverRef.current?.querySelector("input, textarea, button")?.focus();
    const onKeyDown = (event) => { if (event.key === "Escape") onClose?.(); };
    document.addEventListener("keydown", onKeyDown);
    return () => { document.removeEventListener("keydown", onKeyDown); previous?.focus?.(); };
  }, [title]);
  return <aside ref={popoverRef} className="names-winner-panel names-wheel-confirm-panel names-wheel-popover" role="dialog" aria-modal="true" aria-labelledby={labelledBy} data-menu-panel="true">
      <h2 id={labelledBy}>{title}</h2>
      <div className="names-wheel-popover-body">{children}</div>
      {actions && <div className="names-dialog-actions">{actions}</div>}
  </aside>;
}

function NumberedClassTextarea({ id, value, onChange, rows, autoFocus = false, placeholder, existingSegments = [] }) {
  const gutterRef = useRef(null);
  const { count, numbers } = CORE.classListNumbering(value, existingSegments);
  return <>
    <label htmlFor={id} className="names-edit-field-label">Students ({count})</label>
    <div className={`names-numbered-textarea ${rows === 20 ? "is-edit-class" : ""} ${value ? "" : "is-empty"}`}>
      <div ref={gutterRef} className="names-class-line-numbers" aria-hidden="true">{numbers.map((number, index) => <span key={index} className="names-class-line-number">{number || "\u00a0"}</span>)}</div>
      <textarea id={id} className="names-field names-class-textarea" rows={rows} wrap="off" autoFocus={autoFocus} value={value} placeholder={placeholder} onScroll={(event) => { if (gutterRef.current) gutterRef.current.scrollTop = event.currentTarget.scrollTop; }} onChange={onChange} />
    </div>
  </>;
}

function NameComposer({ draftName, setDraftName, addName, duplicateErrorKey, clearDuplicateError, disabled }) {
  const valid = Boolean(CORE.cleanName(draftName));
  return <div className="names-add-group" role="group" aria-label="Add Name">
    <div className="names-add-field-wrap">
      <input className="names-field names-toolbar-name" value={draftName} disabled={disabled} placeholder="Name" aria-label="Name" autoCapitalize="words" aria-describedby={duplicateErrorKey ? "names-duplicate-message" : undefined} onChange={(event) => { clearDuplicateError(); setDraftName(CORE.capitaliseNameInput(event.target.value)); }} onKeyDown={(event) => { if (event.key === "Enter" && valid) addName(); }} />
      {duplicateErrorKey > 0 && <p key={duplicateErrorKey} id="names-duplicate-message" className="names-duplicate-message" role="alert">Name already added!</p>}
    </div>
    <button type="button" className="names-primary-button names-toolbar-add" disabled={disabled || !valid} onClick={addName}>Add</button>
  </div>;
}

function SavedLists({ lists, activeSavedId, loadList, editList, deleteList, disabled }) {
  return <div aria-label="Saved Classes">
    <div className="names-saved-list mt-3">
      {!lists.length && <p className="names-panel-note !m-0 rounded-xl border border-dashed border-stone-300 bg-white px-3 py-5 text-center">Empty</p>}
      {lists.map((list) => <div key={list.id} className="names-saved-row">
        <button type="button" className={`names-saved-card ${list.id === activeSavedId ? "is-active" : ""}`} disabled={disabled} aria-label={`Load ${list.title}, ${list.segments.length} ${list.segments.length === 1 ? "name" : "names"}`} onClick={() => loadList(list)}>
          <span className="names-saved-name">{list.id === activeSavedId && <img src={ASSET.tick} alt="" aria-hidden="true" className="names-saved-tick" />}<span className="names-saved-title">{list.title}</span></span>
          <span className="names-saved-count">{list.segments.length} {list.segments.length === 1 ? "name" : "names"}</span>
        </button>
        <button type="button" className="names-saved-icon-button" disabled={disabled} aria-label={`Edit ${list.title}`} title={`Edit ${list.title}`} onClick={() => editList(list)}><img src={ASSET.edit} alt="" aria-hidden="true" className="names-saved-icon" /></button>
        <button type="button" className="names-saved-icon-button" disabled={disabled} aria-label={`Delete ${list.title}`} title={`Delete ${list.title}`} onClick={() => deleteList(list)}><img src={ASSET.bin} alt="" aria-hidden="true" className="names-saved-icon" /></button>
      </div>)}
    </div>
  </div>;
}

function App() {
  const initial = useMemo(readPersistence, []);
  const [segments, setSegments] = useState(initial.currentSegments);
  const [savedLists, setSavedLists] = useState(initial.savedLists);
  const [activeSavedId, setActiveSavedId] = useState(initial.activeSavedId);
  const [draftName, setDraftName] = useState(initial.draftName);
  const [soundEffects, setSoundEffects] = useState(initial.soundEffects);
  const [segmentColour, setSegmentColour] = useState(initial.segmentColour);
  const [randomiserMethod, setRandomiserMethod] = useState(initial.randomiserMethod);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [methodOpen, setMethodOpen] = useState(false);
  const [savedListsOpen, setSavedListsOpen] = useState(false);
  const [rotation, setRotation] = useState(0);
  const [slotPosition, setSlotPosition] = useState(0);
  const [spinning, setSpinning] = useState(false);
  const [spinDuration, setSpinDuration] = useState(MIN_SPIN_DURATION);
  const [winner, setWinner] = useState(null);
  const [pendingRemoval, setPendingRemoval] = useState(null);
  const [confettiKey, setConfettiKey] = useState(0);
  const [dialog, setDialog] = useState(null);
  const [status, setStatus] = useState("");
  const [duplicateErrorKey, setDuplicateErrorKey] = useState(0);
  const [isFullscreen, setIsFullscreen] = useState(false);
  const [fullscreenControlVisible, setFullscreenControlVisible] = useState(true);
  const mainRef = useRef(null);
  const customiseRef = useRef(null);
  const methodRef = useRef(null);
  const savedListsRef = useRef(null);
  const spinAudioRef = useRef(null);
  const spinTimerRef = useRef(null);
  const slotFrameRef = useRef(null);
  const fullscreenFadeTimerRef = useRef(null);
  const winnerPanelRef = useRef(null);
  const removalPanelRef = useRef(null);

  window.MLH.useClickOutside?.([customiseRef, methodRef, savedListsRef], [() => customiseOpen && setCustomiseOpen(false), () => methodOpen && setMethodOpen(false), () => savedListsOpen && setSavedListsOpen(false)]);

  useEffect(() => {
    try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: CORE.STORAGE_VERSION, currentSegments: segments, savedLists, activeSavedId, draftName, soundEffects, segmentColour, randomiserMethod })); }
    catch {}
  }, [segments, savedLists, activeSavedId, draftName, soundEffects, segmentColour, randomiserMethod]);

  useEffect(() => () => { window.clearTimeout(spinTimerRef.current); window.cancelAnimationFrame(slotFrameRef.current); }, []);

  useEffect(() => {
    const syncFullscreen = () => setIsFullscreen(document.fullscreenElement === mainRef.current);
    document.addEventListener("fullscreenchange", syncFullscreen);
    return () => document.removeEventListener("fullscreenchange", syncFullscreen);
  }, []);

  useEffect(() => {
    window.clearTimeout(fullscreenFadeTimerRef.current);
    if (!isFullscreen) {
      setFullscreenControlVisible(true);
      return undefined;
    }
    const revealControl = () => {
      setFullscreenControlVisible(true);
      window.clearTimeout(fullscreenFadeTimerRef.current);
      fullscreenFadeTimerRef.current = window.setTimeout(() => setFullscreenControlVisible(false), FULLSCREEN_CONTROL_TIMEOUT);
    };
    revealControl();
    document.addEventListener("mousemove", revealControl, { passive: true });
    document.addEventListener("touchstart", revealControl, { passive: true });
    document.addEventListener("keydown", revealControl);
    return () => {
      window.clearTimeout(fullscreenFadeTimerRef.current);
      document.removeEventListener("mousemove", revealControl);
      document.removeEventListener("touchstart", revealControl);
      document.removeEventListener("keydown", revealControl);
    };
  }, [isFullscreen]);

  useEffect(() => {
    if (randomiserMethod !== "Rows" || !segments.length || spinning) return;
    setSlotPosition((current) => segments.length * 2 + (((current % segments.length) + segments.length) % segments.length));
  }, [randomiserMethod, segments.length]);

  useEffect(() => {
    if (duplicateErrorKey > 0 && !CORE.hasName(segments, draftName)) setDuplicateErrorKey(0);
  }, [segments, draftName, duplicateErrorKey]);

  useEffect(() => { if (winner) winnerPanelRef.current?.querySelector("button")?.focus(); }, [winner]);
  useEffect(() => { if (pendingRemoval) removalPanelRef.current?.querySelector("button")?.focus(); }, [pendingRemoval]);

  useEffect(() => {
    const reducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)").matches;
    if (spinning || winner || pendingRemoval || dialog || reducedMotion) return undefined;
    const idleTimer = window.setInterval(() => {
      if (randomiserMethod === "Rows" && segments.length) setSlotPosition((current) => current + .004);
      else if (randomiserMethod === "Wheel") setRotation((current) => current + .3);
    }, 50);
    return () => window.clearInterval(idleTimer);
  }, [spinning, winner, pendingRemoval, dialog, randomiserMethod, segments.length]);

  function animateSlots(start, target, duration) {
    window.cancelAnimationFrame(slotFrameRef.current);
    const startedAt = performance.now();
    const step = (now) => {
      const progress = Math.min(1, (now - startedAt) / duration);
      const eased = 1 - Math.pow(1 - progress, 4);
      setSlotPosition(start + (target - start) * eased);
      if (progress < 1) slotFrameRef.current = window.requestAnimationFrame(step);
    };
    slotFrameRef.current = window.requestAnimationFrame(step);
  }

  function addName() {
    const clean = CORE.cleanName(CORE.capitaliseNameInput(draftName));
    if (!clean || spinning || winner || pendingRemoval) return;
    if (CORE.hasName(segments, clean)) {
      setDuplicateErrorKey((key) => key + 1);
      setStatus("Name already added!");
      return;
    }
    setSegments((current) => [...current, { id: uid("segment"), names: [clean] }]);
    setDraftName("");
    setDuplicateErrorKey(0);
    setStatus("Name added.");
  }

  function addClass() {
    const names = CORE.uniqueNewNames(dialog?.value, segments);
    if (!names.length) {
      setDialog((current) => ({ ...current, error: "No new names to add." }));
      return;
    }
    const enteredCount = String(dialog?.value ?? "").split(/\r?\n/).map(CORE.cleanName).filter(Boolean).length;
    setSegments((current) => [...current, ...names.map((name) => ({ id: uid("segment"), names: [name] }))]);
    setDraftName("");
    setDuplicateErrorKey(0);
    setDialog(null);
    const skipped = enteredCount - names.length;
    setStatus(`${names.length} ${names.length === 1 ? "name" : "names"} added${skipped > 0 ? `; ${skipped} duplicate${skipped === 1 ? "" : "s"} skipped` : ""}.`);
  }

  async function toggleFullscreen() {
    try {
      if (document.fullscreenElement) await document.exitFullscreen();
      else await mainRef.current?.requestFullscreen();
    } catch {
      setStatus("Full screen is not available in this browser.");
    }
  }

  function removeSegment(id) {
    if (spinning || winner || pendingRemoval) return;
    const selected = segments.find((segment) => segment.id === id);
    if (!selected) return;
    setPendingRemoval(selected);
    setStatus(`Confirm removal of ${selected.names.join(" and ")}.`);
  }

  function confirmRemoveSegment() {
    if (!pendingRemoval) return;
    setSegments((current) => CORE.removeSegment(current, pendingRemoval.id));
    setStatus(`${pendingRemoval.names.join(" and ")} removed.`);
    setPendingRemoval(null);
  }

  function performSpin() {
    if (spinning) return;
    const clean = CORE.cleanName(CORE.capitaliseNameInput(draftName));
    if (clean && CORE.hasName(segments, clean)) {
      setDuplicateErrorKey((key) => key + 1);
      setStatus("Name already added!");
      return;
    }
    const nextSegments = clean ? [...segments, { id: uid("segment"), names: [clean] }] : segments;
    if (nextSegments.length < 2) return;
    if (clean) {
      setSegments(nextSegments);
      setDraftName("");
      setDuplicateErrorKey(0);
    }
    setWinner(null);
    setDialog(null);
    const chosenIndex = CORE.chooseIndex(nextSegments.length);
    const slice = 360 / nextSegments.length;
    const landingFraction = .04 + Math.random() * .92;
    const target = 180 - (chosenIndex * slice + slice * landingFraction);
    const audio = spinAudioRef.current;
    let duration = spinDuration;
    if (audio && Number.isFinite(audio.duration) && audio.duration > .5) duration = Math.max(MIN_SPIN_DURATION, Math.round(audio.duration * 1000));
    setSpinDuration(duration);
    setSpinning(true);
    setStatus("Spinning…");
    if (randomiserMethod === "Rows") {
      const firstWholePosition = Math.ceil(slotPosition);
      const slotDelta = ((chosenIndex - firstWholePosition) % nextSegments.length + nextSegments.length) % nextSegments.length;
      animateSlots(slotPosition, firstWholePosition + nextSegments.length * 6 + slotDelta, duration);
    } else {
      setRotation((current) => {
        const currentMod = ((current % 360) + 360) % 360;
        const targetMod = ((target % 360) + 360) % 360;
        const delta = ((targetMod - currentMod) + 360) % 360;
        return current + 5 * 360 + delta;
      });
    }
    if (soundEffects && audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
    window.clearTimeout(spinTimerRef.current);
    spinTimerRef.current = window.setTimeout(() => {
      window.cancelAnimationFrame(slotFrameRef.current);
      if (randomiserMethod === "Rows") setSlotPosition(nextSegments.length * 2 + chosenIndex);
      setSpinning(false);
      const selected = nextSegments[chosenIndex];
      setWinner(selected);
      setConfettiKey((key) => key + 1);
      setStatus(`Selected: ${selected.names.join(" and ")}`);
      if (soundEffects) window.MLH.playFeedbackSound?.(true, true, "bronze");
    }, duration + 40);
  }

  function removeSelectedName() {
    if (!winner) return;
    setSegments((current) => CORE.removeSegment(current, winner.id));
    setStatus(`${winner.names.join(" and ")} removed.`);
    setWinner(null);
  }

  function requestSave() {
    const active = savedLists.find((list) => list.id === activeSavedId);
    if (active) {
      setSavedLists((current) => CORE.saveList(current, { ...active, segments }));
      setStatus(`${active.title} updated.`);
      return;
    }
    setDialog({ type: "save", value: "" });
  }

  function confirmSave() {
    const title = CORE.cleanName(dialog?.value);
    if (!title) return;
    const list = { id: uid("list"), title, segments };
    setSavedLists((current) => CORE.saveList(current, list));
    setActiveSavedId(list.id);
    setDialog(null);
    setStatus(`${title} saved.`);
  }

  function loadList(list) {
    const apply = () => { setSegments(CORE.copySegments(list.segments)); setActiveSavedId(list.id); setDraftName(""); setDuplicateErrorKey(0); setDialog(null); setStatus(`${list.title} loaded.`); };
    if (!segments.length) { apply(); return; }
    setDialog({ type: "load", list, confirm: apply });
  }

  function confirmEditList() {
    const title = CORE.cleanName(dialog?.listTitle);
    const names = CORE.uniqueNewNames(dialog?.value, []);
    if (!title || !names.length) {
      setDialog((current) => ({ ...current, error: !title ? "Enter a class name." : "Add at least one student." }));
      return;
    }
    const nextSegments = names.map((name) => ({ id: uid("segment"), names: [name] }));
    const nextList = { ...dialog.list, title, segments: nextSegments };
    setSavedLists((current) => current.map((list) => list.id === nextList.id ? nextList : list));
    if (activeSavedId === nextList.id) {
      setSegments(CORE.copySegments(nextSegments));
      setDraftName("");
      setDuplicateErrorKey(0);
    }
    setDialog(null);
    setStatus(`${title} updated.`);
  }

  const cleanDraftName = CORE.cleanName(draftName);
  const previewName = CORE.hasName(segments, cleanDraftName) ? "" : cleanDraftName;
  const displayedSegments = previewName ? [...segments, { id: "draft-preview", names: [previewName], preview: true }] : segments;
  const wheelOverlayOpen = Boolean(winner || pendingRemoval || dialog);
  const wheelLocked = spinning || wheelOverlayOpen;

  return <div className={`${window.MLH.shell.pageShellClass} names-page`}>
    <window.MLH.AppHeader icon={ASSET.appIcon} title="Name Randomiser" subtitle="Randomly select students to perform, participate in activities or answer questions." profileUsesSharedSettings={false} profileShowLabel={false} />
    <div className={`${window.MLH.shell.pageContentClass} !max-w-[1500px]`}>
      <main ref={mainRef} className={`${window.MLH.shell.mainShellClass} names-main !min-h-[740px]`}>
        <window.MLH.AppToolbar left={<div className="flex items-center gap-2">
          <div className="hub-menu-anchor relative" ref={customiseRef}>
            <window.MLH.CustomiseButton icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26px] w-[26px]" />} onClick={() => { if (wheelLocked) return; setMethodOpen(false); setSavedListsOpen(false); setCustomiseOpen((open) => !open); }} dataMenuTrigger={true} />
            {customiseOpen && <window.MLH.MenuPanel title="Customise" position="left-0" variant="customise" dataMenuPanel={true}>
              <div className="names-customise-section">
                <window.MLH.MenuSubheading>Options</window.MLH.MenuSubheading>
                <button type="button" className="names-primary-button names-customise-action" onClick={() => { setCustomiseOpen(false); setDialog({ type: "add-class", value: "", error: "" }); }}><img src={ASSET.classIcon} alt="" aria-hidden="true" className="names-customise-action-icon" /><span>Add Class</span></button>
              </div>
              <div className="names-customise-section">
                <window.MLH.MenuSubheading>Audio</window.MLH.MenuSubheading>
                <window.MLH.MenuToggleRow glyph={<img src={ASSET.audio} alt="" aria-hidden="true" className="h-[21px] w-[21px] scale-[1.5] object-contain" />} label="Sound Effects" checked={soundEffects} onChange={() => setSoundEffects((enabled) => !enabled)} />
              </div>
              <div className="names-customise-section">
                <window.MLH.MenuSubheading>Colour</window.MLH.MenuSubheading>
                <div className="names-colour-picker">
                  <div className="names-colour-grid">
                    {CORE.SEGMENT_COLOURS.map((colour) => <button key={colour.id} type="button" className="names-colour-swatch" style={colour.value === CORE.MULTI_SEGMENT_COLOUR ? { background: `conic-gradient(${CORE.MULTI_SEGMENT_PALETTE.join(", ")})` } : { backgroundColor: colour.value }} title={colour.label} aria-label={`${colour.label} colour`} aria-pressed={segmentColour === colour.value} disabled={wheelLocked} onClick={() => { setSegmentColour(colour.value); setStatus(`Colour changed to ${colour.label}.`); }}><span className="sr-only">{colour.label}</span></button>)}
                  </div>
                </div>
              </div>
            </window.MLH.MenuPanel>}
          </div>
          <div className="hub-menu-anchor names-method-anchor relative" ref={methodRef}>
            <button type="button" className={`${window.MLH.ToolbarButtonClass} names-method-button`} data-menu-trigger="true" disabled={wheelLocked} aria-expanded={methodOpen} onClick={() => { setCustomiseOpen(false); setSavedListsOpen(false); setMethodOpen((open) => !open); }}><img src={randomiserMethod === "Wheel" ? ASSET.wheel : ASSET.slots} alt="" aria-hidden="true" className="names-method-button-glyph" /><span>{randomiserMethod}</span></button>
            {methodOpen && <window.MLH.MenuPanel title="Randomiser" position="left-0" dataMenuPanel={true}>
              <div className="names-method-options">
                {CORE.RANDOMISER_METHODS.map((method) => {
                  const active = randomiserMethod === method;
                  return <button key={method} type="button" className="names-method-option" aria-pressed={active} onClick={() => { setRandomiserMethod(method); setMethodOpen(false); setStatus(`${method} randomiser selected.`); }}>
                    <span className="names-method-option-inner">
                      <span className="names-method-badge" aria-hidden="true"><img src={method === "Wheel" ? ASSET.wheel : ASSET.slots} alt="" className="names-method-glyph" /></span>
                      <span className="names-method-label">{method}</span>
                      {active && <img src={ASSET.tick} alt="" aria-hidden="true" className="names-method-tick" />}
                    </span>
                  </button>;
                })}
              </div>
            </window.MLH.MenuPanel>}
          </div>
        </div>} feedback={<NameComposer draftName={draftName} setDraftName={setDraftName} addName={addName} duplicateErrorKey={duplicateErrorKey} clearDuplicateError={() => setDuplicateErrorKey(0)} disabled={wheelLocked} />} right={<div className="flex items-center gap-2">
          <button type="button" className={`${window.MLH.ToolbarButtonClass} names-toolbar-clear sm:min-w-[92px]`} disabled={wheelLocked || !segments.length} onClick={() => setDialog({ type: "clear" })}>Clear</button>
        </div>} />

        <div className="names-layout">
          <section className={`names-wheel-stage ${randomiserMethod === "Rows" ? "is-rows" : "is-wheel"} ${wheelOverlayOpen ? "has-wheel-overlay" : ""}`} aria-label={`${randomiserMethod} name randomiser`}>
            {randomiserMethod === "Wheel"
              ? <Wheel segments={displayedSegments} rotation={rotation} spinning={spinning} locked={wheelLocked} durationMs={spinDuration} selectedColour={segmentColour} onRemove={removeSegment} onSpin={performSpin} spinDisabled={wheelLocked || displayedSegments.length < 2 || Boolean(cleanDraftName && !previewName)} />
              : <SlotMachine segments={displayedSegments} position={slotPosition} locked={wheelLocked} selectedColour={segmentColour} onRemove={removeSegment} onSpin={performSpin} spinDisabled={wheelLocked || displayedSegments.length < 2 || Boolean(cleanDraftName && !previewName)} />}
            <div className={`names-fullscreen-action ${isFullscreen && !fullscreenControlVisible ? "is-hidden" : ""}`}>
              <button type="button" className={`${window.MLH.ToolbarButtonClass} names-toolbar-clear gap-2`} aria-label={isFullscreen ? "Exit full screen" : "Enter full screen"} onFocus={() => setFullscreenControlVisible(true)} onClick={toggleFullscreen}><img src={ASSET.fullscreen} alt="" aria-hidden="true" className="names-fullscreen-glyph" /><span>{isFullscreen ? "Exit Full Screen" : "Full Screen"}</span></button>
            </div>
            <div className="names-saved-actions">
              <div className="hub-menu-anchor relative" ref={savedListsRef}>
                <button type="button" className={`${window.MLH.ToolbarButtonClass} gap-2 sm:min-w-[112px]`} data-menu-trigger="true" disabled={wheelLocked} aria-haspopup="menu" aria-expanded={savedListsOpen} onClick={() => { setCustomiseOpen(false); setMethodOpen(false); setSavedListsOpen((open) => !open); }}><img src={ASSET.list} alt="" aria-hidden="true" className="names-toolbar-list-glyph" /><span>Saved Classes</span></button>
                {savedListsOpen && <window.MLH.MenuPanel title="Saved Classes" position="right-0" dataMenuPanel={true}>
                  <SavedLists lists={savedLists} activeSavedId={activeSavedId} loadList={(list) => { setSavedListsOpen(false); loadList(list); }} editList={(list) => { setSavedListsOpen(false); setDialog({ type: "edit", list, listTitle: list.title, value: list.segments.flatMap((segment) => segment.names).join("\n"), error: "" }); }} deleteList={(list) => { setSavedListsOpen(false); setDialog({ type: "delete", list }); }} disabled={wheelLocked} />
                </window.MLH.MenuPanel>}
              </div>
              <button type="button" className={`${window.MLH.ToolbarButtonClass} names-toolbar-save gap-2 sm:min-w-[92px]`} disabled={wheelLocked || !segments.length} onClick={() => { setCustomiseOpen(false); setMethodOpen(false); setSavedListsOpen(false); requestSave(); }}>
                <img src={ASSET.save} alt="" aria-hidden="true" className="names-toolbar-save-glyph" />
                <span>Save</span>
              </button>
            </div>
            {dialog?.type === "add-class" && <WheelPopover title="Add Class" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" disabled={!CORE.cleanName(dialog.value)} onClick={addClass}>Add Class</button></>}><p>Paste a class list below, with one student on each line.</p><NumberedClassTextarea id="names-add-class-students" autoFocus value={dialog.value} existingSegments={segments} placeholder={'For example:\nEmma\nLewis\nSophie\nCallum\nAisha'} onChange={(event) => setDialog((current) => ({ ...current, value: event.target.value, error: "" }))} />{dialog.error && <p className="names-duplicate-message !relative !top-auto mt-2" role="alert">{dialog.error}</p>}</WheelPopover>}
            {dialog?.type === "save" && <WheelPopover title="Save Class" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" disabled={!CORE.cleanName(dialog.value)} onClick={confirmSave}>Save</button></>}><p>Save the names currently in the randomiser to a class set you can use.</p><input className="names-field mt-4" autoFocus value={dialog.value} placeholder="For example, S2 Music" aria-label="Saved list name" onChange={(event) => setDialog((current) => ({ ...current, value: event.target.value }))} onKeyDown={(event) => { if (event.key === "Enter") confirmSave(); }} /></WheelPopover>}
            {dialog?.type === "edit" && <WheelPopover title="Edit Class" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" disabled={!CORE.cleanName(dialog.listTitle) || !CORE.uniqueNewNames(dialog.value, []).length} onClick={confirmEditList}>Save</button></>}><p>Edit the class name and students below, with one student on each line.</p><label htmlFor="names-edit-class-name" className="names-edit-field-label">Class Name</label><input id="names-edit-class-name" className="names-field" autoFocus value={dialog.listTitle} placeholder="Class name" onChange={(event) => setDialog((current) => ({ ...current, listTitle: event.target.value, error: "" }))} /><NumberedClassTextarea id="names-edit-class-students" rows={20} value={dialog.value} onChange={(event) => setDialog((current) => ({ ...current, value: event.target.value, error: "" }))} />{dialog.error && <p className="names-duplicate-message !relative !top-auto mt-2" role="alert">{dialog.error}</p>}</WheelPopover>}
            {dialog?.type === "load" && <WheelPopover title="Load List" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" onClick={dialog.confirm}>Load</button></>}><p>Loading <strong>{dialog.list.title}</strong> will replace the current wheel.</p></WheelPopover>}
            {dialog?.type === "clear" && <WheelPopover title="Are you sure?" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" onClick={() => { setSegments([]); setActiveSavedId(null); setDraftName(""); setDuplicateErrorKey(0); setDialog(null); setStatus("Wheel cleared."); }}>Clear</button></>}><p>This will remove every name from the current wheel. Saved lists will not be affected.</p></WheelPopover>}
            {dialog?.type === "delete" && <WheelPopover title="Are you sure?" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" onClick={() => { setSavedLists((current) => current.filter((list) => list.id !== dialog.list.id)); if (activeSavedId === dialog.list.id) setActiveSavedId(null); setDialog(null); setStatus(`${dialog.list.title} deleted.`); }}>Delete</button></>}><p>Delete <strong>{dialog.list.title}</strong>? This cannot be undone.</p></WheelPopover>}
            {winner && <aside ref={winnerPanelRef} className="names-winner-panel" role="dialog" aria-label="Selected name">
              <div className="names-winner">{winner.names.map((name, index) => <span key={`${name}-${index}`}>{name}</span>)}</div>
              <div className="names-dialog-actions">
                <button type="button" className="names-primary-button" onClick={removeSelectedName}>Remove Name</button>
                <button type="button" className="names-secondary-button" onClick={() => setWinner(null)}>Continue</button>
              </div>
            </aside>}
            {pendingRemoval && <aside ref={removalPanelRef} className="names-winner-panel names-wheel-confirm-panel" role="dialog" aria-labelledby="names-remove-title">
              <h2 id="names-remove-title">Remove {pendingRemoval.names.join(" and ")}?</h2>
              <div className="names-dialog-actions">
                <button type="button" className="names-secondary-button" onClick={() => setPendingRemoval(null)}>Cancel</button>
                <button type="button" className="names-primary-button" onClick={confirmRemoveSegment}>Confirm</button>
              </div>
            </aside>}
            <p className="sr-only" role="status" aria-live="polite">{status}</p>
          </section>
        </div>
        <Confetti activeKey={confettiKey} />
      </main>
    </div>

    <audio ref={spinAudioRef} src={ASSET.spin} preload="auto" onLoadedMetadata={(event) => { if (event.currentTarget.duration > .5) setSpinDuration(Math.max(MIN_SPIN_DURATION, Math.round(event.currentTarget.duration * 1000))); }} />
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script src="./footer.js?v=20260629"></script>
</body>
</html>
