    .names-wheel-confirm-panel .names-dialog-actions { flex-direction: row; }

    @keyframes namesWelcomeSpin { 0% { transform: rotate(0); } 12% { transform: rotate(360deg); } 100% { transform: rotate(360deg); } }
    @keyframes namesConfettiFall { 0% { opacity: 1; transform: translate3d(0,-5vh,0) rotate(0); } 100% { opacity: 0; transform: translate3d(var(--drift),105vh,0) rotate(680deg); } }
    @media (prefers-reduced-motion: reduce) { .names-confetti { display: none; } .names-wheel-rotor { transition-duration: .01ms !important; } .names-wheel-empty { animation: none !important; } }

<body>
  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;
const CORE = window.NAME_RANDOMISER_CORE;
const STORAGE_KEY = "mlh-name-randomiser-v1";
const MIN_SPIN_DURATION = 6000;
const ASSET = { appIcon: "names-icon.svg", wheel: "wheel2.svg", slots: "slots.svg", customise: "customise.svg", save: "save.svg", audio: "audio-svgrepo-com.svg?v=20260722-smaller15", tick: "tick.svg", spin: "spin.mp3" };

function uid(prefix) {
  if (window.crypto?.randomUUID) return `${prefix}-${window.crypto.randomUUID()}`;
  return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2)}`;
}

function readPersistence() {
  try { return CORE.cleanPersistence(JSON.parse(window.localStorage.getItem(STORAGE_KEY))); }
  catch { return CORE.emptyPersistence(); }
}

function polarPoint(cx, cy, radius, degrees) {
  const radians = degrees * Math.PI / 180;
  return { x: cx + radius * Math.cos(radians), y: cy + radius * Math.sin(radians) };
}

function wedgePath(start, end) {
  const centre = { x: 300, y: 300 };
  const first = polarPoint(300, 300, 260, start);
  const second = polarPoint(300, 300, 260, end);
  const large = end - start > 180 ? 1 : 0;
  return `M ${centre.x} ${centre.y} L ${first.x} ${first.y} A 260 260 0 ${large} 1 ${second.x} ${second.y} Z`;
}

function wrapName(name, maxChars) {
  const words = name.split(/\s+/).filter(Boolean);
  if (!words.length) return [];
  const lines = [];
  let line = "";
  words.forEach((word) => {
    if (!line) { line = word; return; }
    if (`${line} ${word}`.length <= maxChars) line += ` ${word}`;
    else { lines.push(line); line = word; }
  });
  if (line) lines.push(line);
  return lines;
}

const MUSIC_BORDER_GLYPHS = [
  "\uE050", "\uE062", "\uE047", "\uE040", "\uE041", "\uE1D2", "\uE1D3", "\uE1D4",
  "\uE1D5", "\uE1D6", "\uE1D7", "\uE1D8", "\uE1D9", "\uE1DA", "\uE260", "\uE261",
  "\uE262", "\uE4A0", "\uE4A1", "\uE4A2", "\uE4A3", "\uE4E3", "\uE4E4", "\uE4E5",
  "\uE4E6", "\uE4E7", "\uE520", "\uE522", "\uE52B", "\uE52C", "\uE52D", "\uE52F",
];
function Wheel({ segments, rotation, spinning, locked, durationMs, alternateColour, showBorder, onRemove, onSpin, spinDisabled }) {
  const [armedRemoveId, setArmedRemoveId] = useState(null);
  const count = segments.length;
  const slice = count ? 360 / count : 360;
  const sliceRadians = slice * Math.PI / 180;
  const textRadius = count === 1 ? 140 : (4 * 260 * Math.sin(sliceRadians / 2)) / (3 * sliceRadians);
  const textX = 300 + textRadius;
  const baseFontSize = Math.max(7, Math.min(28, 34 - count * 1.05));
  const maxChars = Math.max(7, Math.floor(19 - Math.min(9, count * .35)));
  return <div className="names-wheel-wrap">
    <svg className="names-wheel" viewBox="0 0 600 600" role="img" aria-label={count ? `Wheel containing ${count} segments` : "Empty name wheel"}>
      <circle cx="300" cy="300" r="260" fill="#fff" stroke="#111" strokeWidth="1.25" />
      <g className="names-wheel-rotor" style={{ transform: `rotate(${rotation}deg)`, transition: spinning ? `transform ${durationMs}ms cubic-bezier(.08,.68,.12,1)` : "none" }}>
        {segments.map((segment, index) => {
          const start = index * slice;
          const end = start + slice;
          const middle = count === 1 ? 0 : start + slice / 2;
          const segmentFill = index % 2 === 0 ? "#fff" : alternateColour;
          const segmentTextColour = segmentFill === "#111111" ? "#fff" : "#111";
          const textLines = segment.names.flatMap((name) => wrapName(name, maxChars));
          const segmentSymbol = MUSIC_BORDER_GLYPHS[index % MUSIC_BORDER_GLYPHS.length];
          const longestLine = Math.max(1, ...textLines.map((line) => line.length));
          const fontSize = Math.max(7, Math.min(baseFontSize, 190 / (longestLine * .62)));
          const lineHeight = fontSize * 1.12;
          const firstDy = -((textLines.length - 1) * lineHeight) / 2;
          const removable = !segment.preview && !locked;
          const requestRemove = (event) => {
            if (!removable) return;
            event.stopPropagation();
            if (event.pointerType === "touch") {
              if (armedRemoveId === segment.id) { setArmedRemoveId(null); onRemove(segment.id); }
              else setArmedRemoveId(segment.id);
              return;
            }
            onRemove(segment.id);
          };
          return <g key={segment.id} className={`names-wheel-segment ${segment.preview ? "is-preview" : ""} ${removable ? "is-removable" : ""} ${armedRemoveId === segment.id ? "is-remove-armed" : ""}`} role={!segment.preview ? "button" : undefined} tabIndex={removable ? 0 : -1} aria-label={!segment.preview ? `Remove ${segment.names[0]}` : undefined} aria-disabled={!segment.preview && !removable ? "true" : undefined} onPointerUp={requestRemove} onClick={(event) => { if (event.detail === 0) requestRemove(event); }} onKeyDown={(event) => { if (removable && (event.key === "Enter" || event.key === " ")) { event.preventDefault(); event.stopPropagation(); onRemove(segment.id); } }}>
            {count === 1
              ? <circle cx="300" cy="300" r="259" fill={segmentFill} />
              : <path d={wedgePath(start, end)} fill={segmentFill} stroke="#111" strokeWidth={count > 35 ? .75 : 1.25} />}
            <g transform={`rotate(${middle} 300 300)`}>
              <text className="names-segment-label" x={textX} y="300" transform={`rotate(180 ${textX} 300)`} fill={segmentTextColour} fontSize={fontSize} fontWeight="800" textAnchor="middle" dominantBaseline="middle">
                {textLines.map((line, lineIndex) => <tspan key={`${line}-${lineIndex}`} x={textX} dy={lineIndex === 0 ? firstDy : lineHeight}>{line}</tspan>)}
                {showBorder && textLines.length > 0 && <tspan className="names-wheel-segment-symbol" dx={Math.max(5, fontSize * .25)} dy="0" fontSize={fontSize * .86} aria-hidden="true">{segmentSymbol}</tspan>}
              </text>
            </g>
          </g>;
        })}
      </g>
      {count > 0 && <circle cx="300" cy="300" r="10" fill="#111" />}
    </svg>
    {count === 0 && <div className="names-wheel-empty"><span className="names-empty-title">Welcome!</span><span className="names-empty-description">Add a name to get started.</span></div>}
    <div className="names-wheel-pointer-group">
      <button type="button" className="names-primary-button names-spin-button" style={{ fontSize: `${baseFontSize}px`, fontWeight: 800 }} disabled={spinDisabled} onClick={onSpin}>Spin</button>
      <svg className="names-wheel-pointer" viewBox="0 0 68 58" aria-hidden="true"><path d="M7 5 L7 53 L62 29 Z" fill="#111" /></svg>
    </div>
  </div>;
}

function SlotMachine({ segments, position, locked, alternateColour, showBorder, onRemove, onSpin, spinDisabled }) {
  const count = segments.length;
  const base = Math.floor(position);
  const fraction = position - base;
  const visibleRows = count ? Array.from({ length: 7 }, (_, rowIndex) => {
    const offset = rowIndex - 3;
    const segmentIndex = ((base + offset) % count + count) % count;
    return { offset, segmentIndex, segment: segments[segmentIndex] };
  }) : [];

  return <div className="names-slots-wrap">
    <div className="names-slots-window" role="group" aria-label={count ? `Slots containing ${count} names` : "Empty Slots"}>
      {visibleRows.map(({ offset, segmentIndex, segment }) => {
        const distance = Math.abs(offset - fraction);
        const fontSize = Math.max(17, 36 - distance * 7);
        const scale = Math.max(.76, 1 - distance * .11);
        const removable = !segment.preview && !locked;
        const rowColour = segmentIndex % 2 === 0 ? "#fff" : alternateColour;
        const rowSymbol = MUSIC_BORDER_GLYPHS[segmentIndex % MUSIC_BORDER_GLYPHS.length];
        return <button key={`${offset}-${segment.id}`} type="button" className={`names-slots-row ${removable ? "is-removable" : ""}`} style={{ top: `calc(50% + ${(offset - fraction) * 92}px)`, backgroundColor: rowColour, color: rowColour === "#111111" ? "#fff" : "#111", fontSize: `${fontSize}px`, opacity: Math.max(.5, 1 - distance * .16), transform: `translateY(-50%) scale(${scale})`, zIndex: distance < .55 ? 2 : 1 }} disabled={!removable} aria-label={!segment.preview ? `Remove ${segment.names.join(" and ")}` : "Name preview"} onClick={() => removable && onRemove(segment.id)}><span className="names-slots-row-content"><span className={`names-slots-row-symbol ${showBorder ? "" : "is-hidden"}`} aria-hidden="true">{rowSymbol}</span><span className="names-slots-row-name">{segment.names.map((name, index) => <span key={`${name}-${index}`}>{name}</span>)}</span><span className={`names-slots-row-symbol ${showBorder ? "" : "is-hidden"}`} aria-hidden="true">{rowSymbol}</span></span></button>;
      })}
      {!count && <div className="names-slots-empty"><span className="names-empty-title">Welcome!</span><span className="names-empty-description">Add a name to get started.</span></div>}
    </div>
    <div className="names-wheel-pointer-group">
      <button type="button" className="names-primary-button names-spin-button" style={{ fontSize: "28px", fontWeight: 800 }} disabled={spinDisabled} onClick={onSpin}>Spin</button>
      <svg className="names-wheel-pointer" viewBox="0 0 68 58" aria-hidden="true"><path d="M7 5 L7 53 L62 29 Z" fill="#111" /></svg>
    </div>
  </div>;
}

function Confetti({ activeKey }) {
  if (!activeKey) return null;
  const colours = ["#facc15", "#38bdf8", "#fb7185", "#4ade80", "#a78bfa", "#f97316"];
  return <div key={activeKey} className="names-confetti" aria-hidden="true">{Array.from({ length: 64 }, (_, index) => <span key={index} style={{ left: `${(index * 37) % 100}%`, backgroundColor: colours[index % colours.length], animationDelay: `${(index % 12) * .045}s`, animationDuration: `${1.35 + (index % 7) * .13}s`, "--drift": `${((index * 29) % 180) - 90}px` }} />)}</div>;
}

function Dialog({ title, children, actions, onClose, labelledBy = "names-dialog-title" }) {
  const dialogRef = useRef(null);
  useEffect(() => {
    const previous = document.activeElement;
    dialogRef.current?.querySelector("input, button")?.focus();
    const onKeyDown = (event) => { if (event.key === "Escape") onClose?.(); };
    document.addEventListener("keydown", onKeyDown);
    return () => { document.removeEventListener("keydown", onKeyDown); previous?.focus?.(); };
  }, [onClose]);
  return <div className="names-overlay" onMouseDown={(event) => { if (event.target === event.currentTarget) onClose?.(); }}>
    <div ref={dialogRef} className="names-dialog" role="dialog" aria-modal="true" aria-labelledby={labelledBy}>
      <h2 id={labelledBy}>{title}</h2>
      {children}
      <div className="names-dialog-actions">{actions}</div>
    </div>
  </div>;
}

function NameComposer({ draftName, setDraftName, addName, disabled }) {
  const valid = Boolean(CORE.cleanName(draftName));
  return <div className="names-add-group" role="group" aria-label="Add Name">
    <input className="names-field names-toolbar-name" value={draftName} disabled={disabled} placeholder="Name" aria-label="Name" autoCapitalize="words" onChange={(event) => setDraftName(CORE.capitaliseNameInput(event.target.value))} onKeyDown={(event) => { if (event.key === "Enter" && valid) addName(); }} />
    <button type="button" className="names-primary-button names-toolbar-add" disabled={disabled || !valid} onClick={addName}>Add</button>
  </div>;
}

function SavedLists({ lists, activeSavedId, loadList, renameList, deleteList, disabled }) {
  return <div aria-label="Saved Lists">
    <p className="names-panel-note text-center">Stored in this browser on this device.</p>
    <div className="names-saved-list mt-3">
      {!lists.length && <p className="names-panel-note !m-0 rounded-xl border border-dashed border-stone-300 bg-white px-3 py-5 text-center">Saved lists will appear here</p>}
      {lists.map((list) => <div key={list.id} className={`names-saved-card flex-col !items-stretch ${list.id === activeSavedId ? "border-stone-500" : ""}`}>
        <div className="min-w-0"><div className="truncate text-sm font-black text-stone-900">{list.title}</div><div className="mt-1 text-[11px] font-semibold text-stone-500">{list.segments.length} {list.segments.length === 1 ? "name" : "names"}</div></div>
        <div className="grid grid-cols-3 gap-1.5">
          <button type="button" className="names-secondary-button !min-h-[36px] px-2" disabled={disabled} onClick={() => loadList(list)}>Load</button>
          <button type="button" className="names-secondary-button !min-h-[36px] px-2" disabled={disabled} onClick={() => renameList(list)}>Rename</button>
          <button type="button" className="names-secondary-button !min-h-[36px] px-2" disabled={disabled} onClick={() => deleteList(list)}>Delete</button>
        </div>
      </div>)}
    </div>
  </div>;
}

function App() {
  const initial = useMemo(readPersistence, []);
  const [segments, setSegments] = useState(initial.currentSegments);
  const [savedLists, setSavedLists] = useState(initial.savedLists);
  const [activeSavedId, setActiveSavedId] = useState(initial.activeSavedId);
  const [draftName, setDraftName] = useState(initial.draftName);
  const [soundEffects, setSoundEffects] = useState(initial.soundEffects);
  const [borderSymbols, setBorderSymbols] = useState(initial.borderSymbols);
  const [segmentColour, setSegmentColour] = useState(initial.segmentColour);
  const [randomiserMethod, setRandomiserMethod] = useState(initial.randomiserMethod);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [methodOpen, setMethodOpen] = useState(false);
  const [savedListsOpen, setSavedListsOpen] = useState(false);
  const [rotation, setRotation] = useState(0);
  const [slotPosition, setSlotPosition] = useState(0);
  const [spinning, setSpinning] = useState(false);
  const [spinDuration, setSpinDuration] = useState(MIN_SPIN_DURATION);
  const [winner, setWinner] = useState(null);
  const [pendingRemoval, setPendingRemoval] = useState(null);
  const [confettiKey, setConfettiKey] = useState(0);
  const [dialog, setDialog] = useState(null);
  const [status, setStatus] = useState("");
  const customiseRef = useRef(null);
  const methodRef = useRef(null);
  const savedListsRef = useRef(null);
  const spinAudioRef = useRef(null);
  const spinTimerRef = useRef(null);
  const slotFrameRef = useRef(null);

  window.MLH.useClickOutside?.([customiseRef, methodRef, savedListsRef], [() => customiseOpen && setCustomiseOpen(false), () => methodOpen && setMethodOpen(false), () => savedListsOpen && setSavedListsOpen(false)]);

  useEffect(() => {
    try { window.localStorage.setItem(STORAGE_KEY, JSON.stringify({ version: CORE.STORAGE_VERSION, currentSegments: segments, savedLists, activeSavedId, draftName, soundEffects, borderSymbols, segmentColour, randomiserMethod })); }
    catch {}
  }, [segments, savedLists, activeSavedId, draftName, soundEffects, borderSymbols, segmentColour, randomiserMethod]);

  useEffect(() => () => { window.clearTimeout(spinTimerRef.current); window.cancelAnimationFrame(slotFrameRef.current); }, []);

  useEffect(() => {
    if (randomiserMethod !== "Slots" || !segments.length || spinning) return;
    setSlotPosition((current) => segments.length * 2 + (((current % segments.length) + segments.length) % segments.length));
  }, [randomiserMethod, segments.length]);

  useEffect(() => {
    const reducedMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)").matches;
    if (spinning || winner || pendingRemoval || reducedMotion) return undefined;
    const idleTimer = window.setInterval(() => {
      if (randomiserMethod === "Slots" && segments.length) setSlotPosition((current) => current + .004);
      else if (randomiserMethod === "Wheel") setRotation((current) => current + .3);
    }, 50);
    return () => window.clearInterval(idleTimer);
  }, [spinning, winner, pendingRemoval, randomiserMethod, segments.length]);

  function animateSlots(start, target, duration) {
    window.cancelAnimationFrame(slotFrameRef.current);
    const startedAt = performance.now();
    const step = (now) => {
      const progress = Math.min(1, (now - startedAt) / duration);
      const eased = 1 - Math.pow(1 - progress, 4);
      setSlotPosition(start + (target - start) * eased);
      if (progress < 1) slotFrameRef.current = window.requestAnimationFrame(step);
    };
    slotFrameRef.current = window.requestAnimationFrame(step);
  }

  function addName() {
    const clean = CORE.cleanName(CORE.capitaliseNameInput(draftName));
    if (!clean || spinning || winner || pendingRemoval) return;
    setSegments((current) => [...current, { id: uid("segment"), names: [clean] }]);
    setDraftName("");
    setStatus("Name added.");
  }

  function removeSegment(id) {
    if (spinning || winner || pendingRemoval) return;
    const selected = segments.find((segment) => segment.id === id);
    if (!selected) return;
    setPendingRemoval(selected);
    setStatus(`Confirm removal of ${selected.names.join(" and ")}.`);
  }

  function confirmRemoveSegment() {
    if (!pendingRemoval) return;
    setSegments((current) => CORE.removeSegment(current, pendingRemoval.id));
    setStatus(`${pendingRemoval.names.join(" and ")} removed.`);
    setPendingRemoval(null);
  }

  function performSpin(nextSegments = segments) {
    if (spinning || nextSegments.length < 2 || CORE.cleanName(draftName)) return;
    setWinner(null);
    setDialog(null);
    const chosenIndex = CORE.chooseIndex(nextSegments.length);
    const slice = 360 / nextSegments.length;
    const landingFraction = .04 + Math.random() * .92;
    const target = 180 - (chosenIndex * slice + slice * landingFraction);
    const audio = spinAudioRef.current;
    let duration = spinDuration;
    if (audio && Number.isFinite(audio.duration) && audio.duration > .5) duration = Math.max(MIN_SPIN_DURATION, Math.round(audio.duration * 1000));
    setSpinDuration(duration);
    setSpinning(true);
    setStatus("Spinning…");
    if (randomiserMethod === "Slots") {
      const firstWholePosition = Math.ceil(slotPosition);
      const slotDelta = ((chosenIndex - firstWholePosition) % nextSegments.length + nextSegments.length) % nextSegments.length;
      animateSlots(slotPosition, firstWholePosition + nextSegments.length * 6 + slotDelta, duration);
    } else {
      setRotation((current) => {
        const currentMod = ((current % 360) + 360) % 360;
        const targetMod = ((target % 360) + 360) % 360;
        const delta = ((targetMod - currentMod) + 360) % 360;
        return current + 5 * 360 + delta;
      });
    }
    if (soundEffects && audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
    window.clearTimeout(spinTimerRef.current);
    spinTimerRef.current = window.setTimeout(() => {
      window.cancelAnimationFrame(slotFrameRef.current);
      if (randomiserMethod === "Slots") setSlotPosition(nextSegments.length * 2 + chosenIndex);
      setSpinning(false);
      const selected = nextSegments[chosenIndex];
      setWinner(selected);
      setConfettiKey((key) => key + 1);
      setStatus(`Selected: ${selected.names.join(" and ")}`);
      if (soundEffects) window.MLH.playFeedbackSound?.(true, true, "bronze");
    }, duration + 40);
  }

  function removeSelectedName() {
    if (!winner) return;
    setSegments((current) => CORE.removeSegment(current, winner.id));
    setStatus(`${winner.names.join(" and ")} removed.`);
    setWinner(null);
  }

  function requestSave() {
    const active = savedLists.find((list) => list.id === activeSavedId);
    if (active) {
      setSavedLists((current) => CORE.saveList(current, { ...active, segments }));
      setStatus(`${active.title} updated.`);
      return;
    }
    setDialog({ type: "save", value: "" });
  }

  function confirmSave() {
    const title = CORE.cleanName(dialog?.value);
    if (!title) return;
    const list = { id: uid("list"), title, segments };
    setSavedLists((current) => CORE.saveList(current, list));
    setActiveSavedId(list.id);
    setDialog(null);
    setStatus(`${title} saved.`);
  }

  function loadList(list) {
    const apply = () => { setSegments(CORE.copySegments(list.segments)); setActiveSavedId(list.id); setDialog(null); setStatus(`${list.title} loaded.`); };
    if (!segments.length) { apply(); return; }
    setDialog({ type: "load", list, confirm: apply });
  }

  function confirmRename() {
    const title = CORE.cleanName(dialog?.value);
    if (!title) return;
    setSavedLists((current) => current.map((list) => list.id === dialog.list.id ? { ...list, title } : list));
    setDialog(null);
    setStatus("Saved list renamed.");
  }

  const previewName = CORE.cleanName(draftName);
  const displayedSegments = previewName ? [...segments, { id: "draft-preview", names: [previewName], preview: true }] : segments;
  const wheelOverlayOpen = Boolean(winner || pendingRemoval);
  const wheelLocked = spinning || wheelOverlayOpen;

  return <div className={`${window.MLH.shell.pageShellClass} names-page`}>
    <window.MLH.AppHeader icon={ASSET.appIcon} title="Name Randomiser" subtitle="Randomly select students to perform, participate in activities or answer questions." profileUsesSharedSettings={false} />
    <div className={`${window.MLH.shell.pageContentClass} !max-w-[1500px]`}>
      <main className={`${window.MLH.shell.mainShellClass} names-main !min-h-[740px]`}>
        <window.MLH.AppToolbar left={<div className="flex items-center gap-2">
          <div className="hub-menu-anchor relative" ref={customiseRef}>
            <window.MLH.CustomiseButton icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26px] w-[26px]" />} onClick={() => { setMethodOpen(false); setSavedListsOpen(false); setCustomiseOpen((open) => !open); }} dataMenuTrigger={true} />
            {customiseOpen && <window.MLH.MenuPanel title="Customise" position="left-0" variant="customise" dataMenuPanel={true}>
              <window.MLH.MenuToggleRow glyph={<img src={ASSET.audio} alt="" aria-hidden="true" className="h-[21px] w-[21px] scale-[1.5] object-contain" />} label="Sound Effects" checked={soundEffects} onChange={() => setSoundEffects((enabled) => !enabled)} />
              <window.MLH.MenuToggleRow glyph={<span className="names-border-toggle-glyph" aria-hidden="true"><span>{"\uE050"}</span></span>} label="Symbols" checked={borderSymbols} onChange={() => setBorderSymbols((visible) => !visible)} />
              <div className="names-colour-picker">
                <p className="names-colour-label">Accent Colour</p>
                <div className="names-colour-grid">
                  {CORE.SEGMENT_COLOURS.map((colour) => <button key={colour.id} type="button" className="names-colour-swatch" style={{ backgroundColor: colour.value }} title={colour.label} aria-label={`${colour.label} segment colour`} aria-pressed={segmentColour === colour.value} disabled={wheelLocked} onClick={() => { setSegmentColour(colour.value); setStatus(`Segment colour changed to ${colour.label}.`); }}><span className="sr-only">{colour.label}</span></button>)}
                </div>
              </div>
            </window.MLH.MenuPanel>}
          </div>
          <div className="hub-menu-anchor names-method-anchor relative" ref={methodRef}>
            <button type="button" className={`${window.MLH.ToolbarButtonClass} names-method-button`} data-menu-trigger="true" disabled={wheelLocked} aria-expanded={methodOpen} onClick={() => { setCustomiseOpen(false); setSavedListsOpen(false); setMethodOpen((open) => !open); }}><img src={randomiserMethod === "Wheel" ? ASSET.wheel : ASSET.slots} alt="" aria-hidden="true" className="names-method-button-glyph" /><span>{randomiserMethod}</span></button>
            {methodOpen && <window.MLH.MenuPanel title="Method" position="left-0" dataMenuPanel={true}>
              <div className="names-method-options">
                {CORE.RANDOMISER_METHODS.map((method) => {
                  const active = randomiserMethod === method;
                  return <button key={method} type="button" className="names-method-option" aria-pressed={active} onClick={() => { setRandomiserMethod(method); setMethodOpen(false); setStatus(`${method} method selected.`); }}>
                    <span className="names-method-option-inner">
                      <span className="names-method-badge" aria-hidden="true"><img src={method === "Wheel" ? ASSET.wheel : ASSET.slots} alt="" className="names-method-glyph" /></span>
                      <span className="names-method-label">{method}</span>
                      {active && <img src={ASSET.tick} alt="" aria-hidden="true" className="names-method-tick" />}
                    </span>
                  </button>;
                })}
              </div>
            </window.MLH.MenuPanel>}
          </div>
        </div>} feedback={<NameComposer draftName={draftName} setDraftName={setDraftName} addName={addName} disabled={wheelLocked} />} right={<div className="flex items-center gap-2">
          <div className="hub-menu-anchor relative" ref={savedListsRef}>
            <button type="button" className={`${window.MLH.ToolbarButtonClass} sm:min-w-[112px]`} data-menu-trigger="true" disabled={wheelLocked} aria-haspopup="menu" aria-expanded={savedListsOpen} onClick={() => { setCustomiseOpen(false); setMethodOpen(false); setSavedListsOpen((open) => !open); }}>Saved Lists</button>
            {savedListsOpen && <window.MLH.MenuPanel title="Saved Lists" position="right-0" dataMenuPanel={true}>
              <SavedLists lists={savedLists} activeSavedId={activeSavedId} loadList={(list) => { setSavedListsOpen(false); loadList(list); }} renameList={(list) => { setSavedListsOpen(false); setDialog({ type: "rename", list, value: list.title }); }} deleteList={(list) => { setSavedListsOpen(false); setDialog({ type: "delete", list }); }} disabled={wheelLocked} />
            </window.MLH.MenuPanel>}
          </div>
          <button type="button" className={`${window.MLH.ToolbarButtonClass} names-toolbar-save gap-2 sm:min-w-[92px]`} disabled={wheelLocked || !segments.length} onClick={() => { setCustomiseOpen(false); setMethodOpen(false); setSavedListsOpen(false); requestSave(); }}>
              <img src={ASSET.save} alt="" aria-hidden="true" className="names-toolbar-save-glyph" />
              <span>Save</span>
          </button>
          <button type="button" className={`${window.MLH.ToolbarButtonClass} names-toolbar-clear sm:min-w-[92px]`} disabled={wheelLocked || !segments.length} onClick={() => setDialog({ type: "clear" })}>Clear</button>
        </div>} />

        <div className="names-layout">
          <section className={`names-wheel-stage ${wheelOverlayOpen ? "has-wheel-overlay" : ""}`} aria-label={`${randomiserMethod} name randomiser`}>
            {randomiserMethod === "Wheel"
              ? <Wheel segments={displayedSegments} rotation={rotation} spinning={spinning} locked={wheelLocked} durationMs={spinDuration} alternateColour={segmentColour} showBorder={borderSymbols} onRemove={removeSegment} onSpin={() => performSpin()} spinDisabled={wheelLocked || segments.length < 2 || Boolean(previewName)} />
              : <SlotMachine segments={displayedSegments} position={slotPosition} locked={wheelLocked} alternateColour={segmentColour} showBorder={borderSymbols} onRemove={removeSegment} onSpin={() => performSpin()} spinDisabled={wheelLocked || segments.length < 2 || Boolean(previewName)} />}
            {winner && <aside className="names-winner-panel" aria-label="Selected name">
              <div className="names-winner">{winner.names.map((name, index) => <span key={`${name}-${index}`}>{name}</span>)}</div>
              <div className="names-dialog-actions">
                <button type="button" className="names-primary-button" onClick={removeSelectedName}>Remove Name</button>
                <button type="button" className="names-secondary-button" onClick={() => setWinner(null)}>Continue</button>
              </div>
            </aside>}
            {pendingRemoval && <aside className="names-winner-panel names-wheel-confirm-panel" aria-labelledby="names-remove-title">
              <h2 id="names-remove-title">Remove {pendingRemoval.names.join(" and ")}?</h2>
              <div className="names-dialog-actions">
                <button type="button" className="names-secondary-button" onClick={() => setPendingRemoval(null)}>Cancel</button>
                <button type="button" className="names-primary-button" onClick={confirmRemoveSegment}>Confirm</button>
              </div>
            </aside>}
            <p className="sr-only" role="status" aria-live="polite">{status}</p>
          </section>
        </div>
      </main>
    </div>

    <audio ref={spinAudioRef} src={ASSET.spin} preload="auto" onLoadedMetadata={(event) => { if (event.currentTarget.duration > .5) setSpinDuration(Math.max(MIN_SPIN_DURATION, Math.round(event.currentTarget.duration * 1000))); }} />
    <Confetti activeKey={confettiKey} />

    {dialog?.type === "save" && <Dialog title="Save Current List" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" disabled={!CORE.cleanName(dialog.value)} onClick={confirmSave}>Save</button></>}><p>Give this list a name so you can use it again.</p><input className="names-field mt-4" autoFocus value={dialog.value} placeholder="For example, S2 Music" aria-label="Saved list name" onChange={(event) => setDialog((current) => ({ ...current, value: event.target.value }))} onKeyDown={(event) => { if (event.key === "Enter") confirmSave(); }} /></Dialog>}

    {dialog?.type === "rename" && <Dialog title="Rename List" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" disabled={!CORE.cleanName(dialog.value)} onClick={confirmRename}>Rename</button></>}><input className="names-field mt-4" autoFocus value={dialog.value} aria-label="Saved list name" onChange={(event) => setDialog((current) => ({ ...current, value: event.target.value }))} onKeyDown={(event) => { if (event.key === "Enter") confirmRename(); }} /></Dialog>}

    {dialog?.type === "load" && <Dialog title="Load List" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-primary-button" onClick={dialog.confirm}>Load</button></>}><p>Loading <strong>{dialog.list.title}</strong> will replace the current wheel.</p></Dialog>}

    {dialog?.type === "clear" && <Dialog title="Are you sure?" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-danger-button" onClick={() => { setSegments([]); setActiveSavedId(null); setDialog(null); setStatus("Wheel cleared."); }}>Clear</button></>}><p>This will remove every name from the current wheel. Saved lists will not be affected.</p></Dialog>}

    {dialog?.type === "delete" && <Dialog title="Are you sure?" onClose={() => setDialog(null)} actions={<><button type="button" className="names-secondary-button" onClick={() => setDialog(null)}>Cancel</button><button type="button" className="names-danger-button" onClick={() => { setSavedLists((current) => current.filter((list) => list.id !== dialog.list.id)); if (activeSavedId === dialog.list.id) setActiveSavedId(null); setDialog(null); setStatus(`${dialog.list.title} deleted.`); }}>Delete</button></>}><p>Delete <strong>{dialog.list.title}</strong>? This cannot be undone.</p></Dialog>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script src="./footer.js?v=20260629"></script>
</body>
</html>
