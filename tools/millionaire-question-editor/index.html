<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Millionaire Question Editor</title>
  <link rel="stylesheet" href="/editor/editor.css">
</head>
<body>
  <header class="editor-header">
    <div>
      <h1>Question Editor</h1>
      <p class="subtitle">Who Wants to Be a Millionaire?</p>
    </div>
    <div class="header-actions">
      <a id="open-game" class="button secondary" href="/game/millionaire.html?level=N3" target="_blank" rel="noopener">Launch</a>
      <button id="stop-editor" class="button end" type="button">End</button>
    </div>
  </header>

  <main class="editor-shell">
    <aside class="question-browser" aria-label="Question selection">
      <div class="filter-grid">
        <label class="level-filter">Level
          <select id="level-filter">
            <option value="National 3">National 3</option>
            <option value="National 4">National 4</option>
            <option value="National 5">National 5</option>
            <option value="Higher">Higher</option>
            <option value="Advanced Higher">Advanced Higher</option>
          </select>
        </label>
        <label class="edit-status-filter">Edit status
          <select id="edit-status-filter">
            <option value="">All questions</option>
            <option value="edited">Edited only</option>
            <option value="unedited">Unedited only</option>
          </select>
        </label>
        <label class="pool-status-filter">Question pool
          <select id="pool-status-filter">
            <option value="">All concepts</option>
            <option value="active">All active</option>
            <option value="inactive">Has inactive questions</option>
          </select>
        </label>
        <label class="concept-filter">Concept
          <select id="concept-filter">
            <option value="">All concepts</option>
          </select>
        </label>
      </div>
      <label class="search-label">Search
        <input id="search-filter" type="search" placeholder="Search wording, answer or ID">
      </label>
      <p id="question-count" class="question-count" aria-live="polite"></p>
      <div id="question-list" class="question-list" role="listbox" aria-label="Questions"></div>
    </aside>

    <section class="question-editor" aria-labelledby="editor-heading">
      <div id="empty-state" class="empty-state">
        <h2>Select a question</h2>
        <p>Choose one from the list to begin editing.</p>
      </div>

      <form id="question-form" novalidate hidden>
        <div class="form-heading">
          <div>
            <p id="question-meta" class="question-meta"></p>
            <h2 id="editor-heading"></h2>
            <p id="question-id" class="question-id" hidden></p>
          </div>
          <div class="form-heading-actions">
            <label class="difficulty-control">Difficulty
              <select id="question-difficulty">
                <option value="Easy">Easy</option>
                <option value="Medium">Medium</option>
                <option value="Hard">Hard</option>
              </select>
            </label>
            <span id="override-badge" class="override-badge" hidden>Manually edited</span>
          </div>
        </div>

        <div class="editing-layout">
          <div class="editor-fields">
            <label>Description
              <textarea id="concept-description" rows="4" maxlength="500"></textarea>
            </label>

            <label>Question
              <input id="prompt" type="text" maxlength="200">
            </label>

            <fieldset>
              <legend>Answers</legend>
              <div id="answer-fields" class="answer-fields"></div>
            </fieldset>

            <label>Hint
              <textarea id="hint" rows="2" maxlength="240"></textarea>
            </label>

            <label>Feedback
              <textarea id="explanation" rows="3" maxlength="600"></textarea>
            </label>

            <label class="use-description-control">
              <input id="use-description-as-feedback" type="checkbox" disabled>
              Use description as feedback
            </label>

            <div id="save-message" class="save-message" role="status" aria-live="polite"></div>
            <div class="save-row">
              <p id="save-note"></p>
              <div class="save-actions">
                <button id="clear-button" class="button danger" type="button">Clear</button>
                <button id="save-button" class="button primary" type="submit" disabled>Saved</button>
              </div>
            </div>
          </div>

          <aside class="preview-column" aria-label="Live game preview">
            <div class="game-preview">
              <div class="preview-hint"><strong>Hint</strong><span id="preview-hint"></span></div>
              <div class="preview-description-wrap"><p id="preview-description" class="preview-description"></p></div>
              <div class="preview-question-rail"><div class="preview-question-bar"><h3 id="preview-prompt"></h3></div></div>
              <div class="preview-answers">
                <div class="preview-answer-row">
                  <div id="preview-answer-0" class="preview-answer"><span class="preview-diamond">◆</span><strong>A:</strong><span></span></div>
                  <div id="preview-answer-1" class="preview-answer"><span class="preview-diamond">◆</span><strong>B:</strong><span></span></div>
                </div>
                <div class="preview-answer-row">
                  <div id="preview-answer-2" class="preview-answer"><span class="preview-diamond">◆</span><strong>C:</strong><span></span></div>
                  <div id="preview-answer-3" class="preview-answer"><span class="preview-diamond">◆</span><strong>D:</strong><span></span></div>
                </div>
              </div>
              <button class="preview-final-answer" type="button" tabindex="-1">Final Answer</button>
            </div>
          </aside>
        </div>
      </form>
    </section>
  </main>

  <script src="/editor/editor.js"></script>
</body>
</html>
