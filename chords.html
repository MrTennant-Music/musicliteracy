const NOTE_POOL = [

  { letter:"E", octave:4, step:0, midi:64 }, { letter:"F", octave:4, step:1, midi:65 },

function r(items){ return items[Math.floor(Math.random()*items.length)]; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function y(step, top=SYSTEM_TOPS[0]){ return top + GAP * 4 - step * (GAP / 2); }
function rhythmInfo(id){ return RH[id] || RH.crotchet; }
function patternBeats(pattern){ return pattern.reduce((sum,id)=>sum+rhythmInfo(id).beats,0); }
function validPatternsFor(ts){ return (RHYTHM_PATTERNS[ts.id] || RHYTHM_PATTERNS["4/4"]).filter(p => patternBeats(p) === ts.beats && p.filter(x=>x==="quaver").length <= 2); }
function midiToFrequency(midi){ return 440 * Math.pow(2, (midi - 69) / 12); }
function firstSystemBarWidth(){ return (STAFF_RIGHT - MUSIC_START_X) / BARS_PER_SYSTEM; }
function secondSystemStartX(){ return TIME_SIG_X - 18; }
function secondSystemBarWidth(){ return (STAFF_RIGHT - secondSystemStartX()) / BARS_PER_SYSTEM; }

function getBarStart(barIndex){ const local = barIndex % BARS_PER_SYSTEM; return (barIndex >= 4 ? secondSystemStartX() : MUSIC_START_X) + local * barWidth(barIndex); }
function getSystemTop(barIndex){ return barIndex < 4 ? SYSTEM_TOPS[0] : SYSTEM_TOPS[1]; }
function noteByLetter(letter, preferredIndex=6){ const c = NOTE_POOL.map((n,i)=>({...n,index:i})).filter(n=>n.letter===letter); return c.reduce((best,item)=>Math.abs(item.index-preferredIndex)<Math.abs(best.index-preferredIndex)?item:best,c[0]); }
function notePoolIndex(note){ return NOTE_POOL.findIndex(n => n.letter === note.letter && n.octave === note.octave); }
function keyAccidentalForLetter(key, letter){ return key.keyAccidentals[letter] || 0; }
function chordAccidentalForLetter(chord, letter){ return chord.raised?.[letter] ?? null; }
function writtenAccidentalForMelody(key, chord, letter){ const a = chordAccidentalForLetter(chord, letter); return a !== null ? a : null; }
function pitchForChordLetter(key, chord, letter, preferredIndex=6){ const base=noteByLetter(letter, preferredIndex); const ca=chordAccidentalForLetter(chord, letter); const acc=ca!==null?ca:keyAccidentalForLetter(key, letter); return base.midi + acc; }
function effectivePitchForMelodyNote(question, bar, noteIndex){
  const note=bar.notes[noteIndex]; let active=null;
  for(let i=0;i<=noteIndex;i++){ const cur=bar.notes[i]; if(cur.letter===note.letter && cur.writtenAccidental !== null && cur.writtenAccidental !== undefined) active=cur.writtenAccidental; }
  return note.midi + keyAccidentalForLetter(question.key, note.letter) + (active ?? 0);
}
function getChordShortName(chord){ return chord?.shortName || ""; }
function normaliseAnswer(value){ return String(value||"").trim().toLowerCase().replace(/[ ]+/g,"").replace("♭","b").replace("#","♯"); }
function isAnswerCorrect(value, symbol, chord){
  const answer=normaliseAnswer(value); if(!answer) return false;
  const accepted=[symbol,chord.shortName,chord.name,chord.name.replace(" major",""),chord.name.replace(" minor","m")].map(normaliseAnswer);
  return accepted.includes(answer);
}
function displayChordNote(questionKey, option, note){
  if(questionKey.id === "F" && note === "B") return "B♭";
  if(questionKey.id === "G" && note === "F") return "F♯";
  if(questionKey.id === "Am" && option.symbol === "V" && note === "G") return "G♯";
  return note;
}
function getChordOptions(key){ return ["I","IV","V","VI"].map(symbol=>({ symbol, label:`${symbol} – ${key.chords[symbol].name}`, chord:key.chords[symbol] })); }
const N5_CHORD_OPTIONS = [
  { id:"C", label:"C major", shortName:"C", notes:[["C",4],["E",4],["G",4]] },
  { id:"G", label:"G major", shortName:"G", notes:[["G",4],["B",4],["D",5]] },
  { id:"F", label:"F major", shortName:"F", notes:[["F",4],["A",4],["C",5]] },
  { id:"Am", label:"A minor", shortName:"Am", notes:[["A",4],["C",5],["E",5]] },
];
const N5_RHYTHM_PATTERNS = [
  ["crotchet","crotchet","minim"],
  ["minim","crotchet","crotchet"],
];
function noteByPitch(letter, octave){ return NOTE_POOL.find(n=>n.letter===letter&&n.octave===octave) || noteByLetter(letter,6); }
function normaliseChordAnswer(value){ return normaliseAnswer(value).replace(/major$/,"maj").replace(/minor$/,"min"); }
function formatChordTypedAnswer(value){
  return String(value||"").replace(/\b([a-g])(?=\s|$|m|maj|major|min|minor)/gi, letter => letter.toUpperCase());
}
function isN5AnswerCorrect(value, chord){
  const answer=normaliseChordAnswer(value);
  if(!answer) return false;
  const accepted = chord.id === "Am"
    ? ["am","amin","aminor"].map(normaliseChordAnswer)
    : [chord.shortName,`${chord.shortName}maj`,`${chord.shortName}major`].map(normaliseChordAnswer);
  return accepted.includes(answer);
}
const AH_CHORD_TYPES = [
  { id:"dim7", label:"Diminished 7th", intervals:[0,3,6,9], aliases:["diminished7th","diminishedseventh","dim7","dimseventh"] },
  { id:"dom7", label:"Dominant 7th", intervals:[0,4,7,10], aliases:["dominant7th","dominantseventh","dom7","domseventh"] },
  { id:"add6", label:"Added 6th", intervals:[0,4,7,9], aliases:["added6th","addedsixth","add6","added6"] },
  { id:"aug", label:"Augmented triad", intervals:[0,4,8], aliases:["augmentedtriad","augmented","aug"] },
];
function normaliseAHChordTypeAnswer(value){ return String(value||"").trim().toLowerCase().replace(/[\s\-]+/g,"").replace(/7/g,"7th").replace(/6/g,"6th").replace(/7thth/g,"7th").replace(/6thth/g,"6th"); }
function isAHChordTypeCorrect(value, chordType){
  const answer=normaliseAHChordTypeAnswer(value);
  return chordType.aliases.map(normaliseAHChordTypeAnswer).includes(answer);
}
const AH_CHORD_SPELLINGS = {
  dim7: [["C",4,0],["E",4,-1],["G",4,-1],["A",4,0]],
  dom7: [["C",4,0],["E",4,0],["G",4,0],["B",4,-1]],
  add6: [["C",4,0],["E",4,0],["G",4,0],["A",4,0]],
  aug: [["C",4,0],["E",4,0],["G",4,1]],
};
function ahChordTone(letter, octave, accidental=0){
  const base=noteByPitch(letter,octave);
  return { letter:base.letter, octave:base.octave, step:base.step, midi:base.midi+accidental, writtenAccidental:accidental||null };
}
function makeAHChordEvent(chordType, barIndex, noteIndex, beatPosition){
  const stack=AH_CHORD_SPELLINGS[chordType.id].map(([letter,octave,accidental])=>ahChordTone(letter,octave,accidental));
  const root=stack[0];
  return { id:`ah-chord-${barIndex}-${noteIndex}`, barIndex, noteIndex, rhythm:"minim", beats:2, beatPosition, letter:root.letter, octave:root.octave, step:root.step, midi:root.midi, writtenAccidental:root.writtenAccidental, stack };
}
function makeChordProgression(key){
  const opts=["IV","V","VI"], prog=["I"];
  for(let i=1;i<BAR_COUNT-1;i++){ const available=opts.filter(s=>s!==prog[i-1]); prog.push(r(available)); }
  const final=["I","V"].filter(s=>s!==prog[prog.length-1]); prog.push(r(final));
  return prog;
}
function chooseMelodyBase({ key, chord, rhythmId, previousBase, currentIndex, strongBeat, phraseDirection, previousMove, phraseAnchorIndex, repeatedCount }){
  const previousIndex = notePoolIndex(previousBase) >= 0 ? notePoolIndex(previousBase) : currentIndex;
  const candidates=[];
  NOTE_POOL.forEach((candidate,candidateIndex)=>{
    const isChordTone=chord.notes.includes(candidate.letter);
    const distance=candidateIndex-previousIndex;
    const abs=Math.abs(distance);
    const range=Math.abs(candidateIndex-phraseAnchorIndex);
    if(range>8 || abs>4) return;
    if(strongBeat && !isChordTone) return;
    if(rhythmId==="quaver" && abs!==1) return;
    if(rhythmId==="quaver" && previousBase && candidate.letter===previousBase.letter) return;
    if(candidate.letter===previousBase?.letter && repeatedCount>=1) return;
    if(!strongBeat && !isChordTone && abs!==1) return;
    if(Math.abs(previousMove)>=3){ const recovered=abs===1 && Math.sign(distance)===-Math.sign(previousMove); if(!recovered) return; }
    let weight=1;
    if(strongBeat) weight*=10; else weight*=isChordTone?5:2.5;
    if(abs===0) weight*=1.4; if(abs===1) weight*=7; if(abs===2) weight*=3; if(abs===3) weight*=.8; if(abs===4) weight*=.35;
    if(phraseDirection>0 && distance>0) weight*=1.5; if(phraseDirection<0 && distance<0) weight*=1.5;
    if(phraseDirection>0 && candidateIndex>phraseAnchorIndex+5) weight*=.45;
    if(phraseDirection<0 && candidateIndex<phraseAnchorIndex-5) weight*=.45;
    if(candidateIndex<1 || candidateIndex>NOTE_POOL.length-2) weight*=.35;
    candidates.push({candidate,weight});
  });
  if(!candidates.length) return noteByLetter(r(chord.notes), currentIndex);
  const total=candidates.reduce((s,i)=>s+i.weight,0); let roll=Math.random()*total;
  for(const item of candidates){ roll-=item.weight; if(roll<=0) return item.candidate; }
  return candidates[candidates.length-1].candidate;
}
function makeMelodyForBar(key, chordSymbol, barIndex, previousIndex, ts){
  const chord=key.chords[chordSymbol];
  const pattern = barIndex === BAR_COUNT - 1 ? { "2/4":["minim"], "3/4":["dottedMinim"], "4/4":["semibreve"] }[ts.id] : r(validPatternsFor(ts));
  const accidentalMemory={}; let currentIndex=previousIndex, beatPosition=0, previousBase=NOTE_POOL[currentIndex] || noteByLetter(key.tonic,6), previousMove=0, repeatedCount=0;
  const phraseAnchorIndex=currentIndex, phraseDirection=barIndex<4?1:-1;
  const notes=pattern.map((rhythmId,noteIndex)=>{
    const beats=rhythmInfo(rhythmId).beats;
    const strongBeat=beatPosition===0 || (ts.id==="4/4" && beatPosition===2);
    let base=chooseMelodyBase({ key,chord,rhythmId,previousBase,currentIndex,strongBeat,phraseDirection,previousMove,phraseAnchorIndex,repeatedCount });
    if(barIndex===0 && noteIndex===0) base=noteByLetter(key.tonic,6);
    if(barIndex===BAR_COUNT-1 && noteIndex===pattern.length-1){ const finalChord=chordSymbol==="V"?key.chords.V:key.chords.I; base=noteByLetter(finalChord.notes[0],currentIndex); }
    const before=currentIndex;
    currentIndex=notePoolIndex(base)>=0?notePoolIndex(base):currentIndex;
    const accidentalValue=writtenAccidentalForMelody(key,chord,base.letter);
    const shouldShow=accidentalValue!==null && accidentalMemory[base.letter]!==accidentalValue;
    if(accidentalValue!==null) accidentalMemory[base.letter]=accidentalValue;
    const note={ id:`${barIndex}-${noteIndex}`, barIndex, noteIndex, rhythm:rhythmId, beats, beatPosition, letter:base.letter, octave:base.octave, step:base.step, midi:base.midi, writtenAccidental:shouldShow?accidentalValue:null };
    const newIndex=notePoolIndex(base);
    previousMove=newIndex>=0?newIndex-before:0;
    repeatedCount=base.letter===previousBase?.letter?repeatedCount+1:0;
    previousBase=base;
    beatPosition+=beats;
    return note;
  });
  return { notes, lastIndex:currentIndex };
}
function makeN5Question(){
  const chord = r(N5_CHORD_OPTIONS);
  const pattern = r(N5_RHYTHM_PATTERNS);
  let beatPosition = 0;
  const notes = chord.notes.map(([letter,octave],noteIndex)=>{
    const base = noteByPitch(letter,octave);
    const rhythm = pattern[noteIndex];
    const beats = rhythmInfo(rhythm).beats;
    const note = { id:`n5-${noteIndex}`, barIndex:0, noteIndex, rhythm, beats, beatPosition, letter:base.letter, octave:base.octave, step:base.step, midi:base.midi, writtenAccidental:null };
    beatPosition += beats;
    return note;
  });

    type:"n5",
    id:Math.random().toString(36).slice(2),
    key:KEYS.find(k=>k.id==="C"),
    timeSignature:TIME_SIGNATURES.find(t=>t.id==="4/4"),
    chord,
    answerMode:Math.random()<.5?"choice":"typed",
    bars:[{ barIndex:0, chordSymbol:chord.id, chord, notes }],

}
function makeHigherQuestion(){
  const majorKeys=KEYS.filter(k=>k.id!=="Am");
  const key=Math.random()<.8?r(majorKeys):KEYS.find(k=>k.id==="Am");
  const timeSignature=r(TIME_SIGNATURES);
  const progression=makeChordProgression(key);
  let previousIndex=notePoolIndex(noteByLetter(key.tonic,6));
  const bars=progression.map((symbol,barIndex)=>{ const melody=makeMelodyForBar(key,symbol,barIndex,previousIndex,timeSignature); previousIndex=melody.lastIndex; return { barIndex, chordSymbol:symbol, chord:key.chords[symbol], notes:melody.notes }; });

}
function makeAHMelodyBars(key,timeSignature){
  const symbols=["I",r(["IV","V","VI"]),r(["I","IV","V","VI"]),r(["I","V"])];
  let previousIndex=notePoolIndex(noteByLetter(key.tonic,6));
  return symbols.map((symbol,barIndex)=>{
    const melody=makeMelodyForBar(key,symbol,barIndex,previousIndex,timeSignature);
    previousIndex=melody.lastIndex;
    return { barIndex, chordSymbol:symbol, chord:key.chords[symbol], notes:melody.notes };
  });
}
function makeAHAudioChordQuestion(){
  const key=KEYS.find(k=>k.id==="C");
  const timeSignature=r(TIME_SIGNATURES);
  const chordType=r(AH_CHORD_TYPES);
  const targetBar=Math.random()<.5?2:3;
  const roots=[60,62,65,67,69];
  const triads=[[0,4,7],[0,3,7],[0,4,7],[0,3,7]];
  const bars=makeAHMelodyBars(key,timeSignature);
  bars[targetBar] = {
    ...bars[targetBar],
    notes:[
      makeAHChordEvent(chordType,targetBar,0,0),
      ...bars[targetBar].notes
        .filter(note=>note.beatPosition>=2)
        .map((note,index)=>({...note, id:`ah-fill-${targetBar}-${index}`, noteIndex:index+1}))
        .slice(0,2),
    ],
  };
  const audioBars=Array.from({length:4},(_,barIndex)=>({
    barIndex,
    rootMidi:barIndex===targetBar?60:r(roots),
    intervals:barIndex===targetBar?chordType.intervals:r(triads),
    notes:bars[barIndex].notes,
  }));
  return {
    type:"ahAudioChord",
    id:Math.random().toString(36).slice(2),
    key,
    timeSignature,
    targetBar,
    chordType,
    answerMode:Math.random()<.5?"choice":"typed",
    bars,
    audioBars,
    targetBars:[],
  };
}
function makeQuestion(level="N5"){
  if(level==="N5") return makeN5Question();
  if(level==="AH") return makeAHAudioChordQuestion();
  return makeHigherQuestion();
}
function stemDown(step){ return step > 4; }

              <div className="flex min-w-0 flex-1 items-center gap-3">
                <div className="flex h-11 min-w-0 flex-1 items-center gap-2 rounded-xl border border-stone-200 bg-white px-2.5">
                  <button onClick={()=>playQuestionAudio(0)} disabled={Boolean(feedback)} className="flex h-8 w-[86px] shrink-0 items-center justify-center gap-1.5 rounded-lg border border-stone-950 bg-stone-950 px-2.5 text-xs font-semibold text-white">
                    <span className="text-sm leading-none">{playing?"■":"▶"}</span>
                    <span>{playing?"Stop":"Play"}</span>
                  </button>
                  <div ref={playbackBarRef} className="relative ml-[5px] h-[8.8px] flex-1 cursor-pointer rounded-full bg-stone-200 touch-none" style={{touchAction:"none"}} onPointerDown={handleSeek}>
                    <div className="absolute left-0 top-0 h-2 rounded-full bg-stone-900" style={{width:`${progressPercent}%`}} />
                    <div className="absolute top-1/2 h-[18px] w-[18px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-stone-950 shadow-sm" style={{left:`${progressPercent}%`}} />
                  </div>
                  <div className="w-[72px] text-right text-xs font-semibold tabular-nums text-stone-600">{formatPlaybackTime(playbackElapsed)} / {formatPlaybackTime(displayedTotal)}</div>
                </div>
              </div>

              <div className="ml-auto flex shrink-0 items-center gap-2">
                <button disabled={Boolean(feedback)} onClick={clearAnswers} className="flex h-11 items-center justify-center rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-black hover-bg-stone-100">Clear</button>
                <window.MLH.ConfirmButton disabled={Boolean(feedback)} onClick={confirmAnswer} className="flex h-11 items-center justify-center px-4">Confirm</window.MLH.ConfirmButton>
              </div>
            </div>
          </div>
        </div>
      )}
    </main>
  </div></div>;
}

const root = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
else ReactDOM.render(<App />, root);
</script>
<script src="./footer.js?v=1.3"></script>
</body>
</html>
