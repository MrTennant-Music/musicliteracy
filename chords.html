            <window.MLH.CustomiseButton
              icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />}
              onClick={()=>{setLevelOpen(false);setCustomiseOpen(v=>!v);}}
              dataMenuTrigger={true}
            />
            {customiseOpen&&<window.MLH.MenuPanel title="Customise" position="chords-customise-panel -left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}>
              <MenuRows level={activeLevel} tempo={tempo} setTempo={setTempo} metronomeOn={metronomeOn} setMetronomeOn={setMetronomeOn} highlightPlayback={highlightPlayback} setHighlightPlayback={setHighlightPlayback} showNoteNames={showNoteNames} setShowNoteNames={setShowNoteNames} showScaleDegrees={showScaleDegrees} setShowScaleDegrees={setShowScaleDegrees} ahCustomise={ahCustomise} setAhCustomise={setAhCustomise} stopAudio={stopAudio} onCustomiseChange={handleAHCustomiseChange}/>
            </window.MLH.MenuPanel>}
          </div>
        </div>

        <div className="hub-toolbar-feedback">
          <window.MLH.FeedbackBadge feedback={feedback} fading={feedbackFading} animationPrefix="note"/>
        </div>

        <div className="hub-toolbar-right">
          <window.MLH.SkipButton resetStreak={()=>setStreak(0)} onClick={()=>newQuestion()} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />}/>
        </div>
      </div>
      <div className={`chords-score-wrap chords-score-${question.type} relative -top-[68px] transition-opacity duration-300 ${questionVisible?"opacity-100":"opacity-0"}`}>
        {question.type==="n5"
          ? <N5Score question={question} level={activeLevel} showNoteNames={showNoteNames}/>
          : question.type==="ahAudioChord"
          ? <AHListeningScore question={question} activeNoteId={highlightPlayback?activeNoteId:undefined} showNoteNames={showNoteNames}/>
          : question.type==="ahInversionBar"
          ? <AHInversionScore question={question} answers={answers} setAnswers={setAnswers} feedback={feedback} showNoteNames={showNoteNames} isMobile={isMobileView}/>
        : question.type==="ahBassLine"
          ? <AHBassLineScore question={question} answers={answers} setAnswers={setAnswers} feedback={feedback} showNoteNames={showNoteNames} isMobile={isMobileView}/>
          : <Score question={question} answers={answers} setAnswers={setAnswers} feedback={feedback} activeNoteId={highlightPlayback?activeNoteId:undefined} activeBarIndex={activeBarIndex} level={activeLevel} showNoteNames={showNoteNames}/>}
      </div>
      {question.type==="n5" ? (
        <div className="chords-question-card relative z-10 mt-3 flex min-h-[120px] flex-col justify-between overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-4 shadow-md md:-mt-[190px] md:mx-3">
          <div className="text-stone-900">
            <p className="text-base font-semibold leading-tight">Identify the chord outlined in the music above.</p>
            {promptMessage&&<p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}
          </div>
          <div className="mt-4">
            {question.answerMode==="choice"
              ? <N5ChoiceAnswers question={question} answers={answers} feedback={feedback} onSelect={selectN5Choice}/>
              : <div className="flex flex-col gap-3 md:flex-row md:items-center">
                  <div className="min-w-0 flex-1"><N5TypedAnswer question={question} answers={answers} setAnswers={setAnswers} feedback={feedback} onConfirm={confirmAnswer}/></div>
                  <window.MLH.ConfirmButton disabled={Boolean(feedback) || !hasFullAnswer()} onClick={confirmAnswer}>Confirm</window.MLH.ConfirmButton>
                </div>}
          </div>
        </div>
      ) : question.type==="ahAudioChord" ? (
        <div className="chords-question-card relative z-10 mt-3 flex min-h-[136px] flex-col justify-between overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-4 shadow-md md:-mt-[190px] md:mx-3">
          <div className="text-stone-900">
            <p className="text-base font-semibold leading-tight">Listen to the music and identify the chord.</p>
            {promptMessage&&<p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}
          </div>
          <div className="mt-2 flex flex-col gap-2">
            {question.answerMode==="choice"
              ? <div className="flex flex-col gap-3 sm:absolute sm:bottom-4 sm:left-4 sm:right-4 sm:flex-row sm:items-end sm:justify-between">
                  <AHChordChoiceAnswers question={question} answers={answers} feedback={feedback} onSelect={selectAHChordChoice}/>
                  <button onClick={()=>playQuestionAudio(0)} disabled={Boolean(feedback)} className={window.MLH.PlayButtonClass}>
                    <span className="text-lg leading-none">{playing?"■":"▶"}</span>
                    <span>{playing?"Stop":"Play"}</span>
                  </button>
                </div>
              : <div className="flex flex-col gap-3">
                  <div className="min-w-0"><AHChordTypedAnswer question={question} answers={answers} setAnswers={setAnswers} feedback={feedback} onConfirm={confirmAnswer}/></div>
                  <div className="flex flex-col items-stretch gap-2 sm:flex-row sm:items-center sm:justify-between">
                    <button onClick={()=>playQuestionAudio(0)} disabled={Boolean(feedback)} className={window.MLH.PlayButtonClass}>
                      <span className="text-lg leading-none">{playing?"■":"▶"}</span>
                      <span>{playing?"Stop":"Play"}</span>
                    </button>
                    <div className={window.MLH.ActionButtonGroupClass}>
                      <button type="button" disabled={Boolean(feedback) || !hasAnyAnswer()} onClick={clearAnswers} className={window.MLH.ClearButtonClass}>Clear</button>
                      <window.MLH.ConfirmButton disabled={Boolean(feedback) || !hasFullAnswer()} onClick={confirmAnswer} className={window.MLH.AudioConfirmButtonClass}>Confirm</window.MLH.ConfirmButton>
                    </div>
                  </div>
              </div>}
          </div>
        </div>
      ) : question.type==="ahInversionBar" ? (
        <div className="chords-question-card chords-question-ah-inversion relative z-10 mt-8 flex min-h-[88px] flex-col overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:-mt-[75px] md:mx-3">
          <div className="text-stone-900">
            <p className="text-base font-semibold leading-tight">
              Identify the chords used in this bar. You should indicate the number and, where appropriate, 1st or 2nd inversion. The first chord has been given.
            </p>
            <div className="mt-3 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <p className="text-base font-semibold leading-tight">
                The key is <strong>{question.key.displayName || question.key.name}</strong>.
              </p>
              <div className={window.MLH.ActionButtonGroupClass}>
                <button type="button" disabled={Boolean(feedback) || !hasAnyAnswer()} onClick={clearAnswers} className={window.MLH.ClearButtonClass}>Clear</button>
                <window.MLH.ConfirmButton disabled={Boolean(feedback) || !hasFullAnswer()} onClick={confirmAnswer}>Confirm</window.MLH.ConfirmButton>
              </div>
            </div>
            {promptMessage&&<p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}
          </div>
          {showScaleDegrees&&<ScaleDegreesGuide keySignature={question.key}/>}
        </div>
      ) : question.type==="ahBassLine" ? (
        <div className="chords-question-card chords-question-ah-bassline relative z-10 mt-8 flex min-h-[88px] flex-col overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:-mt-[75px] md:mx-3">
          <div className="text-stone-900">
            <p className="text-base font-semibold leading-tight">
              Using the rhythm provided and the chord information printed below the stave, complete the bass line.
            </p>
            <div className="mt-3 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <p className="text-base font-semibold leading-tight">
                The key is <strong>{question.key.displayName || question.key.name}</strong>.
              </p>
              <div className={window.MLH.ActionButtonGroupClass}>
                <button type="button" disabled={Boolean(feedback) || !hasAnyAnswer()} onClick={clearAnswers} className={window.MLH.ClearButtonClass}>Clear</button>
                <window.MLH.ConfirmButton disabled={Boolean(feedback) || !hasFullAnswer()} onClick={confirmAnswer}>Confirm</window.MLH.ConfirmButton>
              </div>
            </div>
            {promptMessage&&<p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}
          </div>
          {showScaleDegrees&&<ScaleDegreesGuide keySignature={question.key}/>}
        </div>
      ) : (
        <div className="chords-question-card chords-question-higher relative z-10 mt-3 flex min-h-[170px] flex-col justify-between overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:-mt-[190px] md:mx-3">
          <div className="text-stone-900">
            <p className="text-base font-semibold leading-tight">Name the chords played in <strong>bars 6 and 7</strong>. You may use letter names or numbers. The chord in <strong>bar 5</strong> is given.</p>
            <HigherMobileAnswerBoxes question={question} answers={answers} setAnswers={setAnswers} feedback={feedback}/>
            {promptMessage&&<p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}
          </div>
          <div className="relative mt-3 flex flex-wrap items-end justify-between gap-3">
            <div>
              <p className="mb-2 text-base font-semibold">Choose from the following:</p>
              <ChordOptions question={question}/>
              <p className="mt-3 text-base font-semibold">The key of the music is <strong>{question.key.name}</strong>.</p>
            </div>

            <div className="flex w-full flex-col items-stretch gap-2 sm:flex-row sm:items-center sm:justify-between">
              <div className="flex min-w-0 items-center">
                <button onClick={()=>playQuestionAudio(0)} disabled={Boolean(feedback)} className={window.MLH.PlayButtonClass}>
                  <span className="text-lg leading-none">{playing?"■":"▶"}</span>
                  <span>{playing?"Stop":"Play"}</span>
                </button>
              </div>

              <div className={window.MLH.ActionButtonGroupClass}>
                <button
                  disabled={Boolean(feedback) || !hasAnyAnswer()}
                  onClick={clearAnswers}
                  className={window.MLH.ClearButtonClass}
                >
                  Clear
                </button>
                <window.MLH.ConfirmButton disabled={Boolean(feedback) || !hasFullAnswer()} onClick={confirmAnswer} className={window.MLH.AudioConfirmButtonClass}>Confirm</window.MLH.ConfirmButton>
              </div>
            </div>
          </div>
        </div>
      )}
    </main>
  </div></div>;
}

const root = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
else ReactDOM.render(<App />, root);
</script>
<script src="./footer.js?v=1.3"></script>
</body>
</html>
