                  <div className="absolute top-1/2 h-[18px] w-[18px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-stone-950 shadow-sm" style={{left:`${progressPercent}%`}} />
                </div>
                <div className="w-[72px] text-right text-xs font-semibold tabular-nums text-stone-600">{formatPlaybackTime(playbackElapsed)} / {formatPlaybackTime(displayedTotal)}</div>
              </div>
            </div>

            <div className="ml-auto flex shrink-0 items-center gap-2">
              <button disabled={Boolean(feedback)} onClick={clearAnswers} className="flex h-11 items-center justify-center rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-black hover-bg-stone-100">Clear</button>
              <button disabled={Boolean(feedback)} onClick={confirmAnswer} className="flex h-11 items-center justify-center rounded-xl border border-green-700 bg-green-600 px-4 text-sm font-semibold text-white hover:bg-green-700">Confirm</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div></div>;
}

const root = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
else ReactDOM.render(<App />, root);
</script>
<script src="./footer.js?v=1.3"></script>
</body>
</html>
