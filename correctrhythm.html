<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const VIEWBOX_WIDTH = 920;
const VIEWBOX_HEIGHT = 190;
const ANSWER_OVERLAY_OFFSET = 42;
const STAFF_LEFT = 42;
const STAFF_RIGHT = 878;
const SYSTEM_TOP = 68;
const LINE_GAP = 10;
const BAR_COUNT = 4;
const NOTE_RX = 6.3;
const NOTE_RY = 4.6;
const STEM_LENGTH = 32;
const CLEF_X = STAFF_LEFT + 8;
const KEY_SIG_X = STAFF_LEFT + 52;
const TIME_SIG_X = STAFF_LEFT + 78;
const MUSIC_START_X = STAFF_LEFT + 108;
const TREBLE_CLEF = String.fromCodePoint(0x1d11e);
const BLUE = "#2563eb";
const GREEN = "#16a34a";
const RED = "#dc2626";

const QUESTION_TYPES = [
  { id: "correct", label: "Correct the Rhythm" },
  { id: "insert", label: "Insert the Rhythm" },
];

const TEMPOS = [
  { id: "slow", label: "Adagio", bpm: 56 },
  { id: "medium", label: "Andante", bpm: 72 },
  { id: "fast", label: "Allegro", bpm: 92 },
];

const KEYS = [
  { id: "C", name: "C major", tonic: "C", keyAccidentals: {} },
  { id: "F", name: "F major", tonic: "F", keyAccidentals: { B: -1 } },
  { id: "G", name: "G major", tonic: "G", keyAccidentals: { F: 1 } },
  { id: "Am", name: "A minor", tonic: "A", keyAccidentals: {}, harmonicGSharp: true },
];

const TIME_SIGNATURES = [
  { id: "2/4", top: "2", bottom: "4", beats: 2, compound: false },
  { id: "3/4", top: "3", bottom: "4", beats: 3, compound: false },
  { id: "4/4", top: "4", bottom: "4", beats: 4, compound: false },
  { id: "6/8", top: "6", bottom: "8", beats: 6, compound: true },
];

const RHYTHMS = {
  notehead: { name: "Notehead", beats: 0, open: false, stem: false, flag: false, dotted: false },
  quaver: { name: "Quaver", beats: 0.5, open: false, stem: true, flag: true, dotted: false },
  crotchet: { name: "Crotchet", beats: 1, open: false, stem: true, flag: false, dotted: false },
  dottedCrotchet: { name: "Dotted crotchet", beats: 1.5, open: false, stem: true, flag: false, dotted: true },
  minim: { name: "Minim", beats: 2, open: true, stem: true, flag: false, dotted: false },
  dottedMinim: { name: "Dotted minim", beats: 3, open: true, stem: true, flag: false, dotted: true },
  semibreve: { name: "Semibreve", beats: 4, open: true, stem: false, flag: false, dotted: false },
};

const RHYTHM_SPACING = {
  notehead: 1.55,
  quaver: 0.9,
  crotchet: 1.55,
  dottedCrotchet: 2,
  minim: 2.4,
  dottedMinim: 3.2,
  semibreve: 4.2,
};

const HELP_RHYTHMS = ["semibreve", "dottedMinim", "minim", "dottedCrotchet", "crotchet", "quaver"];

const NOTE_POOL = [
  { letter: "C", octave: 4, step: -2, midi: 60 }, { letter: "D", octave: 4, step: -1, midi: 62 },
  { letter: "E", octave: 4, step: 0, midi: 64 }, { letter: "F", octave: 4, step: 1, midi: 65 },
  { letter: "G", octave: 4, step: 2, midi: 67 }, { letter: "A", octave: 4, step: 3, midi: 69 },
  { letter: "B", octave: 4, step: 4, midi: 71 }, { letter: "C", octave: 5, step: 5, midi: 72 },
  { letter: "D", octave: 5, step: 6, midi: 74 }, { letter: "E", octave: 5, step: 7, midi: 76 },
  { letter: "F", octave: 5, step: 8, midi: 77 }, { letter: "G", octave: 5, step: 9, midi: 79 },
  { letter: "A", octave: 5, step: 10, midi: 81 },
];

const SCALE_LETTERS = {
  C: ["C", "D", "E", "F", "G", "A", "B"],
  F: ["F", "G", "A", "B", "C", "D", "E"],
  G: ["G", "A", "B", "C", "D", "E", "F"],
  Am: ["A", "B", "C", "D", "E", "F", "G"],
};

const CHORDS = {
  C: [["C", "E", "G"], ["F", "A", "C"], ["G", "B", "D"], ["C", "E", "G"]],
  F: [["F", "A", "C"], ["B", "D", "F"], ["C", "E", "G"], ["F", "A", "C"]],
  G: [["G", "B", "D"], ["C", "E", "G"], ["D", "F", "A"], ["G", "B", "D"]],
  Am: [["A", "C", "E"], ["D", "F", "A"], ["E", "G", "B"], ["A", "C", "E"]],
};

const SIMPLE_PATTERNS = {
  "2/4": [["crotchet", "crotchet"], ["quaver", "quaver", "crotchet"], ["crotchet", "quaver", "quaver"], ["quaver", "crotchet", "quaver"]],
  "3/4": [["crotchet", "crotchet", "crotchet"], ["quaver", "quaver", "crotchet", "crotchet"], ["crotchet", "quaver", "quaver", "crotchet"], ["crotchet", "crotchet", "quaver", "quaver"]],
  "4/4": [["crotchet", "crotchet", "crotchet", "crotchet"], ["quaver", "quaver", "crotchet", "crotchet", "crotchet"], ["crotchet", "quaver", "quaver", "crotchet", "crotchet"], ["quaver", "quaver", "quaver", "quaver", "crotchet", "crotchet"]],
  "6/8": [["quaver", "quaver", "quaver", "quaver", "quaver", "quaver"], ["dottedCrotchet", "dottedCrotchet"], ["quaver", "quaver", "quaver", "dottedCrotchet"], ["dottedCrotchet", "quaver", "quaver", "quaver"], ["crotchet", "quaver", "crotchet", "quaver"]],
};

function randomItem(items) { return items[Math.floor(Math.random() * items.length)]; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function rhythmInfo(id) { return RHYTHMS[id] ?? RHYTHMS.crotchet; }
function rhythmSpace(id) { return RHYTHM_SPACING[id] ?? RHYTHM_SPACING.crotchet; }
function getDisplayRhythm(note) { return note.displayRhythm ?? note.rhythm; }
function getAudioRhythm(note) { return note.audioRhythm ?? note.rhythm; }
function yForStep(step, systemTop = SYSTEM_TOP) { return systemTop + LINE_GAP * 4 - step * (LINE_GAP / 2); }
function stemGoesDown(step) { return step > 4; }
function midiToFrequency(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }
function noteIndex(note) { return NOTE_POOL.findIndex((item) => item.letter === note?.letter && item.octave === note?.octave); }

function cloneQuestion(question) { return JSON.parse(JSON.stringify(question)); }

function noteByLetter(letter, preferredIndex = 6) {

}
function keyAccidentalForLetter(key, letter) { if (key.id === "Am" && letter === "G") return 1; return key.keyAccidentals[letter] ?? 0; }
function writtenAccidentalForNote(key, note) { return key.id === "Am" && note?.letter === "G" ? 1 : null; }

function makeNote({ barIndex, noteIndex, rhythm, base, writtenAccidental = null }) {
  return { id: `${barIndex}-${noteIndex}`, barIndex, noteIndex, rhythm, displayRhythm: rhythm, audioRhythm: rhythm, answerRhythm: rhythm, letter: base.letter, octave: base.octave, step: base.step, midi: base.midi, writtenAccidental, editable: false };
}

function chooseMelodyIndex(previousIndex, key, chord, forceStep = false, direction = 0, strongBeat = false) {
  const scale = SCALE_LETTERS[key.id] ?? SCALE_LETTERS.C;
  const candidates = [];
  NOTE_POOL.forEach((note, index) => {
    if (!scale.includes(note.letter)) return;
    if (strongBeat && !chord.includes(note.letter)) return;
    const distance = index - previousIndex;
    const abs = Math.abs(distance);
    if (forceStep && abs !== 1) return;
    let weight = chord.includes(note.letter) ? 9 : 3;
    if (abs === 0) weight *= 1.2;
    if (abs === 1) weight *= 5;
    if (abs === 2) weight *= 3;
    if (abs >= 4) weight *= 0.15;
    if (abs > 7) weight = 0;
    if (direction > 0 && distance > 0) weight *= 1.3;
    if (direction < 0 && distance < 0) weight *= 1.3;
    candidates.push({ value: index, weight });

  for (const candidate of filtered) { roll -= candidate.weight; if (roll <= 0) return candidate.value; }

function makeBar(barIndex, pattern, key, previousIndex) {
  const chord = CHORDS[key.id]?.[barIndex] ?? CHORDS.C[barIndex];

  const notes = pattern.map((rhythm, index) => {
    const chosen = barIndex === 0 && index === 0 ? noteByLetter(key.tonic, 5).index : chooseMelodyIndex(current, key, chord, rhythm === "quaver", barIndex < 2 ? 1 : -1, index === 0);
    current = chosen;
    return makeNote({ barIndex, noteIndex: index, rhythm, base: NOTE_POOL[chosen], writtenAccidental: writtenAccidentalForNote(key, NOTE_POOL[chosen]) });

function choosePattern(timeSignature, barIndex, syncopationOn) {

    if (timeSignature.id === "2/4") return ["minim"];
    if (timeSignature.id === "3/4") return ["dottedMinim"];
    if (timeSignature.id === "4/4") return ["semibreve"];
    return ["dottedMinim"];

}
function applyCadence(bars, key) {

}

    const result = makeBar(barIndex, choosePattern(timeSignature, barIndex, syncopationOn), key, previous);
    bars.push(result.bar);
    previous = result.lastIndex;
  }
  applyCadence(bars, key);
  return bars;
}

function makeCorrectQuestion(base) {
  if (base.timeSignature.compound) return makeInsertQuestion(base, true);

  let candidates = [];
  base.bars.forEach((bar) => {
    if (bar.barIndex > 2) return;
    for (let i = 0; i < bar.notes.length - 1; i += 1) {
      if (bar.notes[i].rhythm === "crotchet" && bar.notes[i + 1].rhythm === "crotchet") {
        candidates.push({ barIndex: bar.barIndex, noteIndices: [i, i + 1] });
      }
    }
  });

  if (!candidates.length) {
    const barIndex = randomItem([0, 1, 2]);
    const pattern = base.timeSignature.id === "2/4" ? ["crotchet", "crotchet"] : base.timeSignature.id === "3/4" ? ["crotchet", "crotchet", "crotchet"] : ["crotchet", "crotchet", "crotchet", "crotchet"];
    base.bars[barIndex] = makeBar(barIndex, pattern, base.key, noteByLetter(base.key.tonic, 6).index).bar;
    candidates = [{ barIndex, noteIndices: [0, 1] }];
  }

  const target = randomItem(candidates);
  const [a, b] = target.noteIndices;
  const first = base.bars[target.barIndex].notes[a];
  const second = base.bars[target.barIndex].notes[b];
  const answer = randomItem(["dot-tail", "tail-dot"]);

  base.bars[target.barIndex].notes.forEach((note) => {
    note.editable = false;
    note.answerRhythm = note.rhythm;
    note.displayRhythm = note.rhythm;
    note.audioRhythm = note.rhythm;
  });

  first.editable = true;
  second.editable = true;
  first.displayRhythm = "crotchet";
  second.displayRhythm = "crotchet";
  first.answerRhythm = answer === "dot-tail" ? "dottedCrotchet" : "quaver";
  second.answerRhythm = answer === "dot-tail" ? "quaver" : "dottedCrotchet";
  first.audioRhythm = first.answerRhythm;
  second.audioRhythm = second.answerRhythm;

  return { ...base, questionType: "correct", target, prompt: `Listen to the music and correct the rhythm in <strong>bar ${target.barIndex + 1}</strong> to match what you hear.` };
}

function makeInsertQuestion(base, syncopationOn) {
  const targetBarOptions = [0, 1, 2].filter((barIndex) => !base.timeSignature.compound || !base.bars[barIndex].notes.every((note) => note.rhythm === "dottedCrotchet"));
  const targetBarIndex = randomItem(targetBarOptions.length ? targetBarOptions : [0, 1, 2]);
  const patterns = SIMPLE_PATTERNS[base.timeSignature.id].filter((pattern) => validPattern(pattern, base.timeSignature, syncopationOn) && (!base.timeSignature.compound || !pattern.every((rhythm) => rhythm === "dottedCrotchet")));
  const fallbackPatterns = base.timeSignature.compound ? SIMPLE_PATTERNS[base.timeSignature.id].filter((item) => item.some((rhythm) => rhythm !== "dottedCrotchet")) : SIMPLE_PATTERNS[base.timeSignature.id];

  const previous = targetBarIndex > 0 ? Math.max(0, noteIndex(base.bars[targetBarIndex - 1].notes.at(-1))) : noteByLetter(base.key.tonic, 6).index;
  base.bars[targetBarIndex] = makeBar(targetBarIndex, pattern, base.key, previous).bar;
  base.bars[targetBarIndex].notes = base.bars[targetBarIndex].notes.map((note, index) => {
    const isCompoundDottedCrotchet = base.timeSignature.compound && pattern[index] === "dottedCrotchet";
    return { ...note, id: `${targetBarIndex}-${index}`, noteIndex: index, editable: !isCompoundDottedCrotchet, answerRhythm: pattern[index], audioRhythm: pattern[index], displayRhythm: isCompoundDottedCrotchet ? "dottedCrotchet" : "notehead" };
  });
  return { ...base, questionType: "insert", target: { barIndex: targetBarIndex, noteIndices: pattern.map((_, index) => index) }, prompt: `Listen to the music and complete the rhythm in <strong>bar ${targetBarIndex + 1}</strong> to match what you hear.` };
}

function makeQuestion(options = {}) {
  const enabled = options.enabledQuestionTypes?.length ? options.enabledQuestionTypes : QUESTION_TYPES.map((type) => type.id);
  const key = randomItem(KEYS);
  const timeSignature = randomItem(TIME_SIGNATURES);
  const syncopationOn = options.syncopationOn ?? true;
  const bars = makeBars(timeSignature, key, syncopationOn);
  const base = { id: Math.random().toString(36).slice(2), key, timeSignature, bars, performedOrder: [0, 1, 2, 3] };
  return randomItem(enabled) === "insert" ? makeInsertQuestion(base, syncopationOn) : makeCorrectQuestion(base);

function getBarGeometry(barIndex) { const width = barWidth(); const startX = MUSIC_START_X + barIndex * width; return { barIndex, systemTop: SYSTEM_TOP, startX, endX: startX + width, barWidth: width }; }

  let s = startX - 10;

    const rhythmA = getDisplayRhythm(notes[0]);

      out[1] -= 6;

      const rhythm = getDisplayRhythm(notes[index]);
      if (rhythm !== "quaver") {
        beat += rhythmInfo(rhythm).beats;
        index += 1;
        continue;

      const start = index;
      let end = index;
      let localBeat = beat;

      while (
        end + 1 < notes.length &&
        end - start + 1 < 3 &&
        getDisplayRhythm(notes[end + 1]) === "quaver" &&
        Math.floor((localBeat + 0.5) / 3) === dottedBeat

        localBeat += 0.5;
        end += 1;
      }

  while (index < notes.length) {
    if (getDisplayRhythm(notes[index]) !== "quaver") {
      index += 1;
      continue;

function groupContaining(groups, noteIndexValue) { return groups.find((group) => noteIndexValue >= group.start && noteIndexValue <= group.end) ?? null; }

function findHoverTarget(pointer, question) {
  let closest = null;
  let best = Infinity;
  buildLayouts(question).forEach((layout) => {
    if (layout.barIndex !== question.target?.barIndex) return;
    layout.bar.notes.forEach((note, index) => {
      if (!note.editable) return;

function applyPlacement(question, target, tool) {

  const rhythm = toolToRhythm(tool);

  if (next.questionType === "correct") {
    note.displayRhythm = rhythm;
    return next;
  }

  note.displayRhythm = rhythm;
  return next;

function effectiveAccidental(question, barIndex, noteIndexValue) { const active = { ...question.key.keyAccidentals }; for (const note of question.bars[barIndex].notes) { if (note.writtenAccidental !== null && note.writtenAccidental !== undefined) active[note.letter] = note.writtenAccidental; if (note.noteIndex === noteIndexValue) return active[note.letter] ?? 0; } return 0; }

function confirmAnswer() { if (feedback) return; stopAudioPlayback(); const isCorrect = answerState(question).correct; const nextStreak = isCorrect ? streak + 1 : 0; setAttempted((value) => value + 1); setCorrect((value) => value + (isCorrect ? 1 : 0)); setStreak(nextStreak); setBestStreak((value) => Math.max(value, nextStreak)); setFeedback({ correct: isCorrect }); playFeedbackSound(isCorrect); if (isCorrect && [2, 4, 6, 10].includes(nextStreak)) { const medal = streakMedal(nextStreak); setConfettiKey((value) => value + 1); window.setTimeout(() => playFeedbackSound(true, true, medal?.sound), 180); } if (isCorrect) timerRef.current = window.setTimeout(() => newQuestion(), 2300); }
  function playOscillator(audioContext, { frequency, start, duration, volume = 0.16, type = "triangle" }) { if (!Number.isFinite(frequency) || !Number.isFinite(start) || !Number.isFinite(duration) || duration <= 0) return; const oscillator = audioContext.createOscillator(); const gain = audioContext.createGain(); oscillator.type = type; oscillator.frequency.setValueAtTime(frequency, start); gain.gain.setValueAtTime(0.0001, start); gain.gain.exponentialRampToValueAtTime(volume, start + 0.04); gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume * 0.5), start + Math.max(0.05, duration * 0.85)); gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + 0.04); oscillator.connect(gain); gain.connect(audioContext.destination); oscillator.start(start); oscillator.stop(start + duration + 0.08); }
  function playFeedbackSound(correctSound, celebration = false, medal = null) { const AudioContextClass = window.AudioContext || window.webkitAudioContext; if (!AudioContextClass) return; const context = new AudioContextClass(); const master = context.createGain(); master.gain.value = 0.16; master.connect(context.destination); function tone(freq,start,duration,type="triangle",volume=0.12){const osc=context.createOscillator(); const gain=context.createGain(); osc.type=type; osc.frequency.setValueAtTime(freq,start); gain.gain.setValueAtTime(0.0001,start); gain.gain.exponentialRampToValueAtTime(volume,start+0.02); gain.gain.exponentialRampToValueAtTime(0.0001,start+duration); osc.connect(gain); gain.connect(master); osc.start(start); osc.stop(start+duration+0.05);} function trumpet(freq,start,duration,volume=0.1){tone(freq,start,duration,"sawtooth",volume); tone(freq*1.002,start,duration*0.96,"square",volume*0.32); tone(freq*2,start,duration*0.75,"triangle",volume*0.16);} function medalPhrase(root,chord,start,beats=4){const beat=.6, triplet=.13, finalDuration=beats===2?.72:1.95; chord.forEach((freq)=>trumpet(freq,start,beats*beat,.045)); trumpet(root,start,triplet,.11); trumpet(root,start+triplet,triplet,.11); trumpet(root,start+triplet*2,triplet,.11); trumpet(root,start+.42,finalDuration,.13);} const now=context.currentTime+.01; if (!correctSound) { tone(196,now,.32,"sawtooth",.06); tone(185,now+.04,.38,"triangle",.05); tone(174,now+.08,.45,"sine",.04); } else if (celebration) { if (medal === "bronze") medalPhrase(659.25,[329.63,415.3,493.88],now); else if (medal === "silver") medalPhrase(739.99,[369.99,466.16,554.37],now); else if (medal === "gold") medalPhrase(830.61,[415.3,523.25,622.25],now); else if (medal === "platinum") { medalPhrase(739.99,[369.99,466.16,554.37],now,2); medalPhrase(830.61,[415.3,523.25,622.25],now+.82,2); medalPhrase(932.33,[466.16,587.33,698.46],now+1.64,4); } } else { randomItem([[523.25,659.25,783.99],[587.33,739.99,880],[659.25,830.61,987.77]]).forEach((freq,index)=>{tone(freq,now+index*.045,.42,"triangle",index===2?.085:.07); tone(freq*2,now+index*.045,.24,"sine",.025);}); } window.setTimeout(()=>{try{context.close();}catch{}}, medal === "platinum" ? 9000 : celebration ? 3500 : 900); }

  function playQuestionAudio() { if (isAudioPlaying) { stopAudioPlayback(); return; } const AudioContextClass = window.AudioContext || window.webkitAudioContext; if (!AudioContextClass) return setPrompt("Audio playback is not supported in this browser."); stopAudioPlayback(); const audioContext = new AudioContextClass(); audioContextRef.current = audioContext; setIsAudioPlaying(true); setPrompt(""); const beatSeconds = 60 / selectedTempo.bpm; const chords = CHORDS[question.key.id] ?? CHORDS.C; let currentTime = audioContext.currentTime + 0.08; const startTime = currentTime; question.performedOrder.forEach((barIndex) => { const bar = question.bars[barIndex]; const barStart = currentTime; const barDuration = bar.notes.reduce((sum, note) => sum + rhythmInfo(getAudioRhythm(note)).beats * beatSeconds, 0); const chord = chords[barIndex % chords.length]; if (metronomeOn) { const unit = question.timeSignature.id === "6/8" ? 1.5 : 1; for (let beat = 0; beat < barDuration / beatSeconds; beat += unit) playMetronomeHit(audioContext, barStart + beat * beatSeconds, beat === 0); } chord.forEach((tone, index) => playOscillator(audioContext, { frequency: midiToFrequency(chordToneMidi(tone, question.key, 4 + index)), start: barStart, duration: Math.max(0.08, barDuration - 0.12), volume: 0.035, type: "sine" })); bar.notes.forEach((note, index) => { const duration = Math.max(0.08, rhythmInfo(getAudioRhythm(note)).beats * beatSeconds); const startMs = Math.max(0, (currentTime - audioContext.currentTime) * 1000); highlightTimersRef.current.push(window.setTimeout(() => setActivePlaybackNoteId(note.id), startMs)); highlightTimersRef.current.push(window.setTimeout(() => setActivePlaybackNoteId(null), startMs + duration * 1000)); playOscillator(audioContext, { frequency: midiToFrequency(pitchForNote(question, barIndex, index)), start: currentTime, duration, volume: 0.15, type: "triangle" }); currentTime += duration; }); }); const total = currentTime - startTime; setPlaybackTotal(total); cons estion(); }}><div className="relative mb-2.5 flex flex-wrap items-center justify-between gap-3"><div className="flex items-center gap-2"><div className="relative" ref={customiseRef}><button type="button" onClick={() => setCustomiseOpen((v) => !v)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800 hover-bg-stone-100">⚙️ <span>Customise</span></button>{customiseOpen && <section className="absolute left-0 z-20 mt-2 w-[min(430px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><h2 className="mb-3 text-center text-base font-semibold">Customise</h2><MenuRows enabledQuestionTypes={enabledQuestionTypes} toggleQuestionType={toggleQuestionType} tempo={tempo} setTempo={setTempo} stopAudioPlayback={stopAudioPlayback} metronomeOn={metronomeOn} setMetronomeOn={setMetronomeOn} syncopationOn={syncopationOn} setSyncopationOn={setSyncopationOn} followPlayback={followPlayback} setFollowPlayback={setFollowPlayback} resetScore={resetScore}/></section>}</div></div><button type="button" onClick={() => newQuestion()} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800 hover-bg-stone-100"><span>Skip Question</span><span className="text-lg leading-none">→</span></button><div className="pointer-events-none absolute inset-x-0 top-1/2 z-10 flex -translate-y-1/2 justify-center overflow-visible">{feedback && <Feedback feedback={feedback}/>}</div></div><div className={`relative -top-[2px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}><Score question={question} selectedToolId={selectedToolId} hoverTarget={hoverTarget} feedback={feedback} activePlaybackNoteId={activePlaybackNoteId} followPlayback={followPlayback} onPointerMove={handlePointerMove} onPointerLeave={() => setHoverTarget(null)} onLockPlacement={handleLockPlacement}/><
