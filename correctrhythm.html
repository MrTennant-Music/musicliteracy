    bandpass.Q.value = 0.75;
    highpass.type = "highpass";
    highpass.frequency.value = 430;
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(0.28, start + 0.004);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + hitDuration);
    body.type = "triangle";
    body.frequency.setValueAtTime(185, start);
    body.frequency.exponentialRampToValueAtTime(115, start + hitDuration);
    bodyGain.gain.setValueAtTime(0.0001, start);
    bodyGain.gain.exponentialRampToValueAtTime(0.055, start + 0.004);
    bodyGain.gain.exponentialRampToValueAtTime(0.0001, start + hitDuration * 0.75);
    noise.connect(bandpass);
    bandpass.connect(highpass);
    highpass.connect(gain);
    gain.connect(audioContext.destination);
    body.connect(bodyGain);
    bodyGain.connect(audioContext.destination);
    noise.start(start);
    noise.stop(start + hitDuration + 0.02);
    body.start(start);
    body.stop(start + hitDuration + 0.02);
  }
  function playQuestionAudio() {
    if (isAudioPlaying) {
      stopAudioPlayback();
      return;
    }

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) {
      setPrompt("Audio playback is not supported in this browser.");
      return;
    }

    stopAudioPlayback();
    const audioContext = new AudioContextClass();
    audioContextRef.current = audioContext;
    setIsAudioPlaying(true);
    setPrompt("");

    const beatSeconds = 60 / selectedTempo.bpm;
    const isIdentifyQuestion = question.questionType === "identify";
    const isPercussionQuestion = isIdentifyQuestion || question.questionType === "longInsert";
    const playbackBars = isIdentifyQuestion ? question.options[question.answerIndex].bars : question.bars;
    const chords = isIdentifyQuestion ? (IDENTIFY_CHORDS[question.key.id] ?? IDENTIFY_CHORDS.C) : (CHORDS[question.key.id] ?? CHORDS.C);
    const audioStartTime = audioContext.currentTime + 0.08;
    let relativeCursor = 0;

    question.performedOrder.forEach((barIndex) => {
      const bar = playbackBars[barIndex];
      const barStart = audioStartTime + relativeCursor;
      const barDuration = bar.notes.reduce((sum, note) => sum + rhythmInfo(getAudioRhythm(note)).beats * beatSeconds, 0);
      const chord = chords[barIndex % chords.length];
      const pulseUnit = question.timeSignature.id === "6/8" ? 1.5 : 1;

      if (metronomeOn) {
        for (let beat = 0; beat < barDuration / beatSeconds; beat += pulseUnit) {
          playMetronomeHit(audioContext, barStart + beat * beatSeconds, beat === 0);
        }
      }

      let noteOffset = 0;
      bar.notes.forEach((note, index) => {
        const rhythm = getAudioRhythm(note);
        const baseDuration = Math.max(0.08, rhythmInfo(rhythm).beats * beatSeconds);
        const nextNote = bar.notes[index + 1];
        const tiedDuration = note.audioTieAfter && nextNote ? Math.max(0.08, rhythmInfo(getAudioRhythm(nextNote)).beats * beatSeconds) : 0;
        const duration = baseDuration + tiedDuration;
        const noteStart = barStart + noteOffset;
        const startMs = Math.max(0, (noteStart - audioContext.currentTime) * 1000);
        const pitch = isPercussionQuestion ? 72 : pitchForNote(question, barIndex, index);

        if (!note.silentAudio && !rhythmInfo(rhythm).rest) {
          highlightTimersRef.current.push(window.setTimeout(() => setActivePlaybackNoteId(note.id), startMs));
          highlightTimersRef.current.push(window.setTimeout(() => setActivePlaybackNoteId(null), startMs + duration * 1000));
          audioSlicesForRhythm(rhythm, duration).forEach((slice) => {
            if (isPercussionQuestion) playSnareHit(audioContext, noteStart + slice.offset, slice.duration);
            else {
              playOscillator(audioContext, { frequency: midiToFrequency(pitch + 12), start: noteStart + slice.offset, duration: slice.duration * 0.82, volume: 0.05, type: "sine" });
              playOscillator(audioContext, { frequency: midiToFrequency(pitch + 24), start: noteStart + slice.offset, duration: slice.duration * 0.5, volume: 0.012, type: "sine" });
            }
          });
        }

        noteOffset += baseDuration;
      });

      if (isPercussionQuestion) {
        const chordStarts = question.timeSignature.id === "6/8" ? [0, barDuration / 2] : [0];
        const chordDuration = barDuration / chordStarts.length;
        chordStarts.forEach((offset) => {
          chord.forEach((tone, index) => {
            const frequency = midiToFrequency(chordToneMidi(tone, question.key, 3 + index));
            playOscillator(audioContext, { frequency, start: barStart + offset, duration: chordDuration * 0.9, volume: 0.014, type: "triangle" });
          });
        });
      } else {
        chord.forEach((tone, index) => {
          const frequency = midiToFrequency(chordToneMidi(tone, question.key, 3 + index));
          if (barIndex === BAR_COUNT - 1) {
            playOscillator(audioContext, { frequency, start: barStart, duration: barDuration * 0.95, volume: 0.035, type: "triangle" });
          } else {
            for (let beat = 0; beat < barDuration / beatSeconds; beat += pulseUnit) {
              playOscillator(audioContext, { frequency, start: barStart + beat * beatSeconds, duration: pulseUnit * beatSeconds * 0.9, volume: beat === 0 ? 0.032 : 0.026, type: "triangle" });
            }
          }
          playOscillator(audioContext, { frequency: frequency * 0.5, start: barStart, duration: barDuration * 0.95, volume: 0.015, type: "sine" });
        });
      }

      relativeCursor += barDuration;
    });

    const total = relativeCursor;
    setPlaybackTotal(total);
    const playbackStartTime = audioContext.currentTime;
    const tick = () => {
      if (!audioContextRef.current) return;
      const elapsed = Math.min(total, Math.max(0, audioContext.currentTime - playbackStartTime));
      setPlaybackElapsed(elapsed);
      if (elapsed < total) playbackFrameRef.current = window.requestAnimationFrame(tick);
    };

    playbackFrameRef.current = window.requestAnimationFrame(tick);
    audioStopTimerRef.current = window.setTimeout(() => {
      setIsAudioPlaying(false);
      setActivePlaybackNoteId(null);
      setPlaybackElapsed(0);
      setPlaybackTotal(0);
      audioContextRef.current = null;
      try { audioContext.close(); } catch {}
    }, Math.max(0, total * 1000) + 150);
  }

  const answerSelectionMissing = (question.questionType === "identify" && question.selectedOptionIndex === null) || (question.questionType === "scotch" && !question.selectedSnap);
  const insertTargetNotes = question.questionType === "insert" ? question.target.noteIndices.map((index) => question.bars[question.target.barIndex].notes[index]).filter((note) => note.editable) : [];
  const insertHasAnyPlacement = insertTargetNotes.some((note) => getDisplayRhythm(note) !== "notehead");
  const insertAllPlaced = insertTargetNotes.length > 0 && insertTargetNotes.every((note) => getDisplayRhythm(note) !== "notehead");
  const longInsertHasPlacement = question.questionType === "longInsert" && longInsertHasAnyPlacement(question);
  const longInsertComplete = question.questionType === "longInsert" && longInsertAllComplete(question);
  const correctTargetNotes = question.questionType === "correct" ? question.target.noteIndices.map((index) => question.bars[question.target.barIndex].notes[index]).filter((note) => note.editable) : [];
  const correctHasAnyPlacement = correctTargetNotes.some((note) => getDisplayRhythm(note) !== "crotchet");
  const correctAllPlaced = correctTargetNotes.length > 0 && correctTargetNotes.every((note) => getDisplayRhythm(note) !== "crotchet");
  const tieTargetNotes = question.questionType === "tie" ? question.target.noteIndices.map((index) => question.bars[question.target.barIndex].notes[index]).filter((note) => note.editable) : [];
  const tieHasPlacement = tieTargetNotes.some((note) => note.tieAfter);
  const clearButtonDisabled = Boolean(feedback) || answerSelectionMissing || (question.questionType === "insert" && !insertHasAnyPlacement) || (question.questionType === "longInsert" && !longInsertHasPlacement) || (question.questionType === "correct" && !correctHasAnyPlacement) || (question.questionType === "tie" && !tieHasPlacement);
  const confirmButtonDisabled = Boolean(feedback) || answerSelectionMissing || (question.questionType === "insert" && !insertAllPlaced) || (question.questionType === "longInsert" && !longInsertComplete) || (question.questionType === "correct" && !correctAllPlaced) || (question.questionType === "tie" && !tieHasPlacement);

  return (
    <div className={window.MLH.shell.pageShellClass}>
      <window.MLH.AppHeader icon={ASSET.appIcon} title="Rhythmic Dictation" subtitle="Identify, insert and correct rhythms.">
        <window.MLH.ScoreStreakPanel
          assets={ASSET}
          correct={correct}
          attempted={attempted}
          accuracy={accuracy}
          streak={streak}
          bestStreak={bestStreak}
          resetScore={resetScore}
          confettiKey={confettiKey}
          medalEligible={medalEligible}
          medalThresholdValues={[2, 4, 6, 10]}
        />
      </window.MLH.AppHeader>

      <div className={window.MLH.shell.pageContentClass}>
        <main className={`${window.MLH.shell.mainShellClass} flex flex-col pb-5 md:pb-6`} onPointerDown={handleFeedbackAdvance}>
          <window.MLH.AppToolbar
            left={
              <div className="flex items-center gap-2">
                <div className="hub-menu-anchor relative" ref={levelRef}>
                  <window.MLH.LevelButton
                    icon={<img src={ASSET.levels} alt="" aria-hidden="true" className="h-[26.6px] w-[26.6px] object-contain" />}
                    activeLevel={medalEligible ? LEVELS[activeLevel].shortLabel : "Custom"}
                    activeLabel={medalEligible ? LEVELS[activeLevel].label : "Custom"}
                    isCustom={!medalEligible}
                    onClick={() => {
                      setCustomiseOpen(false);
                      setLevelOpen((value) => !value);
                    }}
                    dataMenuTrigger={true}
                  />
                  {levelOpen && (
                    <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}>
                      <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                    </window.MLH.MenuPanel>
                  )}
                </div>
                <div className="hub-menu-anchor relative" ref={customiseRef}>
                  <window.MLH.CustomiseButton
                    icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26.6px] w-[26.6px] object-contain" />}
                    onClick={() => {
                      setLevelOpen(false);
                      setCustomiseOpen((value) => !value);
                    }}
                    dataMenuTrigger={true}
                  />
                  {customiseOpen && (
                    <window.MLH.MenuPanel title="Customise" position="chords-customise-panel -left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}>
                      <MenuRows activeLevel={activeLevel} enabledQuestionTypes={enabledQuestionTypes} toggleQuestionType={toggleQuestionType} tempo={tempo} setTempo={setTempo} stopAudioPlayback={stopAudioPlayback} metronomeOn={metronomeOn} setMetronomeOn={setMetronomeOn} syncopationOn={syncopationOn} setSyncopationOn={setSyncopationOn} followPlayback={followPlayback} setFollowPlayback={setFollowPlayback} resetScore={resetScore} />
                    </window.MLH.MenuPanel>
                  )}
                </div>
              </div>
            }
            feedback={feedback && <Feedback feedback={feedback} fading={feedbackFading} />}
            right={<window.MLH.SkipButton resetStreak={() => setStreak(0)} onClick={() => newQuestion()} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />} />}
          />

          <div className={`relative z-10 mt-4 transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <Score question={question} selectedToolId={selectedToolId} hoverTarget={hoverTarget} feedback={feedback} activePlaybackNoteId={activePlaybackNoteId} followPlayback={followPlayback} onPointerMove={handlePointerMove} onPointerLeave={() => setHoverTarget(null)} onLockPlacement={handleLockPlacement} onSelectOption={selectIdentifyOption} onSelectScotchSnap={selectScotchSnap} />
          </div>

          <section className="relative z-10 mt-3 rounded-xl border border-stone-200 bg-stone-50 p-4 shadow-md md:mx-3">
            <div className={question.questionType === "scotch" ? "flex flex-col gap-3 text-stone-900 lg:flex-row lg:items-center lg:justify-between" : "space-y-3 text-stone-900"}>
              <div className="space-y-3">
                <p className="text-base font-semibold leading-tight" dangerouslySetInnerHTML={{ __html: question.prompt }} />
                {prompt && <p className="text-sm font-medium text-red-700">{prompt}</p>}
              </div>
              {question.questionType === "scotch" && (
                <div className="grid grid-cols-2 gap-2">
                  <button type="button" disabled={clearButtonDisabled} onClick={clearPlacements} className={window.MLH.ClearButtonClass}>Clear</button>
                  <window.MLH.ConfirmButton onClick={confirmAnswer} disabled={confirmButtonDisabled}>Confirm</window.MLH.ConfirmButton>
                </div>
              )}
            </div>
            {question.questionType !== "scotch" && (
              <>
                {tools.length > 0 && (
                  <div className="mt-5 flex shrink-0 flex-wrap items-center justify-start gap-2 lg:w-auto">
                    {tools.map((tool) => (
                      <ToolButton key={tool.id} tool={tool} selectedToolId={selectedToolId} feedback={feedback} question={question} onSelect={(id) => { setSelectedToolId(id); setPrompt(""); }} />
                    ))}
                  </div>
                )}
                <div className="mt-3 flex flex-col gap-3 lg:flex-row lg:items-end lg:justify-between">
                  <button type="button" onClick={playQuestionAudio} className={window.MLH.PlayButtonClass}>
                    <span className="text-lg leading-none">{isAudioPlaying ? "■" : "▶"}</span>
                    <span>{isAudioPlaying ? "Stop" : "Play"}</span>
                  </button>
                  <div className={window.MLH.ActionButtonGroupClass}>
                    <button type="button" disabled={clearButtonDisabled} onClick={clearPlacements} className={window.MLH.ClearButtonClass}>Clear</button>
                    <window.MLH.ConfirmButton onClick={confirmAnswer} disabled={confirmButtonDisabled} className={window.MLH.AudioConfirmButtonClass}>Confirm</window.MLH.ConfirmButton>
                  </div>
                </div>
              </>
            )}
          </section>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
