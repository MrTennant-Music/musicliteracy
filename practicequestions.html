    function shuffleItems(items) {
      const next = [...items];
      for (let index = next.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [next[index], next[swapIndex]] = [next[swapIndex], next[index]];
      }
      return next;
    }

    function avoidCorrectOptionFirst(options) {
      if (options[0]?.correct && options.length > 1) {
        const swapIndex = 1 + Math.floor(Math.random() * (options.length - 1));
        [options[0], options[swapIndex]] = [options[swapIndex], options[0]];
      }
      return options;
    }

    function cloneBarsForOption(bars, optionId) {
      const totalBars = bars.length;
      return bars.map((bar, barIndex) => ({
        ...bar,
        barIndex,
        totalBars,
        notes: bar.notes.map((note, noteIndex) => ({
          ...note,
          id: `${optionId}-${barIndex}-${noteIndex}`,
          barIndex,
          noteIndex,
        })),
      }));
    }

    function mutateNotePitch(note, key, direction = 0) {
      if (note?.rest) return note;
      const currentIndex = noteBaseIndex(note);
      const offsets = direction ? [direction] : shuffleItems([-1, 1]);
      for (const offset of offsets) {
        const base = NOTE_POOL[currentIndex + offset];
        if (!base) continue;
        return {
          ...note,
          ...base,
          writtenAccidental: melodicAccidentalForLetter(key, base.letter),
        };
      }
      return note;
    }

    function canUseForMelodyVariant(bars, bar, note, noteIndex) {
      if (!note) return false;
      const isFirstNote = bar.barIndex === 0 && noteIndex === 0;
      const isFinalNote = bar.barIndex === bars.length - 1 && noteIndex === bar.notes.length - 1;
      return !note.rest && !note.tieToNext && !note.tiedFromPrevious && !isFirstNote && !isFinalNote;
    }

    function makeMelodyVariantCell(bars, candidates) {
      const cells = [];
      candidates.forEach(({ bar, noteIndex }) => {
        const cell = [{ bar, noteIndex }];
        let nextIndex = noteIndex + 1;
        while (cell.length < 3 && canUseForMelodyVariant(bars, bar, bar.notes[nextIndex], nextIndex)) {
          cell.push({ bar, noteIndex: nextIndex });
          nextIndex += 1;
        }
        if (cell.length >= 2) cells.push(cell);
      });
      return randomItem(cells) ?? null;
    }

    function reshapeMelodyVariantCell(cell, key) {
      if (!cell || cell.length < 2) return false;
      const first = cell[0].bar.notes[cell[0].noteIndex];
      const firstIndex = noteBaseIndex(first);
      if (firstIndex < 0) return false;
      const second = cell[1].bar.notes[cell[1].noteIndex];
      const originalDirection = Math.sign(noteBaseIndex(second) - firstIndex);
      const possibleDirections = [-1, 1].filter((direction) => {
        const endIndex = firstIndex + direction * (cell.length - 1);
        return endIndex >= 0 && endIndex < NOTE_POOL.length;
      });
      const oppositeDirection = originalDirection ? -originalDirection : 0;
      const direction = oppositeDirection && possibleDirections.includes(oppositeDirection) && Math.random() < 0.72
        ? oppositeDirection
        : randomItem(possibleDirections.length ? possibleDirections : [-1, 1]);
      let previousIndex = firstIndex;
      let changed = false;

      cell.slice(1).forEach(({ bar, noteIndex }, index) => {
        const current = bar.notes[noteIndex];
        const currentIndex = noteBaseIndex(current);
        const stepSize = index === 0 && Math.random() < 0.68 ? 2 : 1;
        const targetIndex = clamp(previousIndex + direction * stepSize, 0, NOTE_POOL.length - 1);
        const base = NOTE_POOL[targetIndex];
        if (!base) return;
        if (targetIndex !== currentIndex) changed = true;
        bar.notes[noteIndex] = {
          ...current,
          ...base,
          writtenAccidental: melodicAccidentalForLetter(key, base.letter),
        };
        previousIndex = targetIndex;
      });

      return changed;
    }

    function transposeMelodyVariantCell(cell, key) {
      if (!cell || cell.length < 2) return false;
      const intervals = [-2, -2, -2, 2, 2, -3, 3, -4, 4];
      const interval = randomItem(intervals);
      const replacements = [];

      for (const { bar, noteIndex } of cell) {
        const current = bar.notes[noteIndex];
        const currentIndex = noteBaseIndex(current);
        const targetIndex = currentIndex + interval;
        if (currentIndex < 0 || targetIndex < 0 || targetIndex >= NOTE_POOL.length) return false;

      replacements.forEach(({ bar, noteIndex, current, base }) => {
        bar.notes[noteIndex] = {

          ...base,
          writtenAccidental: melodicAccidentalForLetter(key, base.letter),

      const targetChanges = Math.min(candidates.length, Math.random() < 0.5 ? 3 : 4);

        .filter(({ bar, noteIndex }) => !used.has(`${bar.barIndex}:${noteIndex}`))
        .slice(0, Math.max(0, targetChanges - used.size))
        .forEach(({ bar, noteIndex }, index) => {

          bar.notes[noteIndex] = mutateNotePitch(bar.notes[noteIndex], key, direction);

      return bars;

    function balanceRestOptions(options, key) {
      const restOptionCount = options.filter((option) => barsHaveRest(option.bars)).length;

    function canTieAcrossBeat(first, second, timeSignature) {
      if (first?.rhythm !== "quaver") return false;

      const beatUnit = timeSignature?.id === "6/8" ? 1.5 : 1;

      const crossesBeatGroup = Math.abs(tiePoint / beatUnit - Math.round(tiePoint / beatUnit)) < 0.001;

      const second = bar.notes[noteIndex + 1];

      bar.notes[noteIndex + 1] = {
        ...second,
        ...NOTE_POOL[noteBaseIndex(first)],
        ...tiedContinuationPitch(first),
        tiedFromPrevious: true,

    function barsSignature(bars) {

    function makeIdentifyMelodyQuestion(level = "AH") {

      const base = makeCompletionQuestion(level, 0, useShortExtract);
      const clef = Math.random() < 0.28 ? "bass" : "treble";
      const sourceBars = useShortExtract ? base.bars.slice(0, 2) : base.bars;
      const correctBars = cloneBarsForOption(sourceBars, "correct");
      if (Math.random() < 0.28) addTieToAhBars(correctBars, base.key, base.timeSignature);
      if (clef === "bass") {
        correctBars.forEach((bar) => {

            if (note.rest) return note;
            const lower = NOTE_POOL[clamp(noteBaseIndex(note) - 7, 0, NOTE_POOL.length - 1)];
            return { ...note, ...lower, writtenAccidental: melodicAccidentalForLetter(base.key, lower.letter) };
          });
        });
      }
      fitBarsToClefRange(correctBars, clef, base.key);
      const options = [{ id: "correct", bars: correctBars, correct: true }];
      const seen = new Set([barsSignature(correctBars)]);

      let attempts = 0;
      while (options.length < 3 && attempts < 40) {
        attempts += 1;
        const variantBars = makeMelodyVariantBars(correctBars, base.key, `variant-${options.length}-${attempts}`);
        fitBarsToClefRange(variantBars, clef, base.key);
        const signature = barsSignature(variantBars);
        if (seen.has(signature)) continue;
        seen.add(signature);
        options.push({ id: `variant-${options.length}`, bars: variantBars, correct: false });
      }

      while (options.length < 3) {
        const fallbackBars = makeMelodyVariantBars(correctBars, base.key, `fallback-${options.length}`);
        options.push({ id: `variant-${options.length}`, bars: fallbackBars, correct: false });
      }

      balanceRestOptions(options, base.key);
      const shuffledOptions = avoidCorrectOptionFirst(shuffleItems(options));
      return {
        ...base,
        questionType: "identifyMelody",
        clef,
        targetBar: null,
        bars: correctBars,
        options: shuffledOptions,
        selectedOptionIndex: null,
        answerIndex: shuffledOptions.findIndex((option) => option.correct),
        prompt: "Listen to the music and select the melody that matches what you hear.",
      };
    }

    function cleanAnswer(value) {
      return String(value ?? "")
        .trim()
        .toLowerCase()
        .replace(/[♯#]/g, " sharp")
        .replace(/[♭]/g, " flat")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function acceptedAnswers(...answers) {
      return answers.flatMap((answer) => {
        const clean = cleanAnswer(answer);
        return [clean, clean.replace(/\s+/g, "")].filter(Boolean);
      });
    }

    function formatTextAnswer(value) {
      const text = String(value ?? "");
      return text.replace(/^(\s*)([a-z])/, (_, space, letter) => `${space}${letter.toUpperCase()}`);
    }

    function chordAnswerForQuestion(question, chordSymbol) {
      return CHORD_ANSWERS[question.key.id]?.[chordSymbol] ?? chordSymbol;
    }

    function higherChordShortName(question, chordSymbol) {
      const answer = chordAnswerForQuestion(question, chordSymbol);
      return answer
        .replace(" major", "")
        .replace(" minor", "m")

    function higherChordOptionPairs(question) {

    function normaliseHigherChordAnswer(value) {

        .replace(/♭/g, "b")
        .replace(/♯/g, "#")
        .replace(/sharp/g, "#")
        .replace(/\./g, "")

        .replace(/[^ivafgcdebmIVAFGCDEBM7♭#♯]/g, "")
        .split("")

          if (char === "7") return `${out}7`;
          if (char === "#" || char === "♯") return `${out}#`;
          if (char === "♭") return out ? `${out}♭` : "B";
          if (lower === "b") return /[A-G]$/.test(out) ? `${out}♭` : `${out}B`;

    function advancedHigherInversionLabel(inversion) {

function advancedHigherGuideInversionLabel(inversion) {

function advancedHigherInversionAnswerLabel(inversion) {

    function normaliseAdvancedHigherInversionAnswer(value) {

        .trim()

    function higherChordAnswerCorrect(value, question, barIndex) {

      const chordName = chordAnswerForQuestion(question, bar.chordSymbol);
      const shortName = higherChordShortName(question, bar.chordSymbol);

        shortName,
        chordName,

    function advancedHigherChordTypeAnswerAccepts(chordType) {

    function advancedHigherChordTypeTone(question, [letter, octave, accidental = 0]) {

    function scaleDegreeToneSpelling(question, degree, { octave = 4, alteration = 0, leadingTone = false } = {}) {

      const octaveOffset = Math.floor((degree - 1) / 7);
      const majorIntervals = [0, 2, 4, 5, 7, 9, 11];
      const minorIntervals = [0, 2, 3, 5, 7, 8, 10];

      const toneOctave = Math.floor(absoluteIndex / 7);
      const tonicBase = noteBaseForLetterOctave(question.key.tonic, octave);
      const tonicAccidental = keyAccidentalForLetter(question.key, question.key.tonic);
      const interval = (leadingTone && normalisedDegree === 7 ? 11 : scaleIntervals[normalisedDegree - 1])

        + octaveOffset * 12;
      const targetMidi = tonicBase.midi + tonicAccidental + interval;
      const base = noteBaseForLetterOctave(letter, toneOctave);

    function advancedHigherScaleDegreeSpelling(question, chordTypeId) {

          scaleDegreeToneSpelling(question, 4),
          scaleDegreeToneSpelling(question, 6, { alteration: flatSixAlteration }),
          scaleDegreeToneSpelling(question, 7, { leadingTone: true }),

    function advancedHigherAugmentedTriadSpelling(question) {

    function advancedHigherAugmentedTriadSpellings(question) {
      const spelling = advancedHigherAugmentedTriadSpelling(question);
      return spelling ? [spelling] : [];
    }

    function absoluteAccidentalForChordTone(key, chordSymbol, letter) {
      const chordAccidental = chordAccidentalForLetter(key, chordSymbol, letter);
      return chordAccidental ?? keyAccidentalForLetter(key, letter);

    function augmentedTriadSpellingForBar(question, barIndex, spelling = null) {
      if (!question.bars?.[barIndex - 1] || !question.bars?.[barIndex + 1]) return null;

    function advancedHigherChordTypeFixedBar(question, chordTypeId) {
      if (chordTypeId === "add6") return question.bars.length - 1;

      return null;

    function advancedHigherChordTypeCandidateBars(question, chordTypeId, protectedBars) {
      const fixedBar = advancedHigherChordTypeFixedBar(question, chordTypeId);
      if (Number.isInteger(fixedBar)) {
        if (!question.bars?.[fixedBar] || protectedBars.has(fixedBar)) return [];
        if ((chordTypeId === "dom7" || chordTypeId === "dim7") && (!question.bars?.[fixedBar + 1] || protectedBars.has(fixedBar + 1))) return [];
        return [fixedBar];

      return question.bars
        .map((bar) => bar.barIndex)
        .filter((barIndex) => (
          barIndex >= 4
          && barIndex < question.bars.length - 1
          && !protectedBars.has(barIndex)
          && (chordTypeId !== "aug" || (
            !protectedBars.has(barIndex - 1)
            && !protectedBars.has(barIndex + 1)
            && Boolean(augmentedTriadSpellingForBar(question, barIndex))

    function advancedHigherChordTypeSpellingsForQuestion(question, chordTypeId) {
      if (chordTypeId === "aug") return advancedHigherAugmentedTriadSpellings(question);
      const spelling = advancedHigherScaleDegreeSpelling(question, chordTypeId);
      return spelling ? [spelling] : [];
    }

    function makeAdvancedHigherChordTypeNote(question, barIndex, spelling, chordType, rhythm = finalRhythmForSignature(question.timeSignature)) {
      const stack = makeAdvancedHigherChordTypeStack(question, spelling);
      const root = stack[0];
      return {
        ...root,
        id: `ah-chord-type-${barIndex}`,
        barIndex,
        noteIndex: 0,
        rhythm,
        displayRhythm: "minim",
        beats: rhythmInfo(rhythm).beats,
        beat: 0,
        beatPosition: 0,
        stack,
        chordTypeId: chordType.id,
      };

    function setBarToChordTypeStack(question, barIndex, spelling, chordType, chordSymbol = spelling?.chordSymbol ?? "I") {
      if (!question.bars?.[barIndex] || !spelling) return;
      const rhythm = finalRhythmForSignature(question.timeSignature);
      const chordNote = makeAdvancedHigherChordTypeNote(question, barIndex, spelling, chordType, rhythm);
      question.bars[barIndex] = {
        ...question.bars[barIndex],
        chordSymbol,
        notes: [chordNote],
        pattern: [rhythm],

    function setSoundingNoteToScaleDegree(question, barIndex, degree, options = {}) {
      const bar = question.bars?.[barIndex];
      if (!bar) return;
      const target = options.target ?? "first";
      const noteIndex = target === "last"
        ? bar.notes.reduce((lastIndex, note, index) => note.rest ? lastIndex : index, -1)
        : bar.notes.findIndex((note) => !note.rest);
      if (noteIndex < 0) return;
      const spelling = scaleDegreeToneSpelling(question, degree, { ...options, target: undefined });
      if (!spelling) return;
      const [letter, octave, accidental] = spelling;
      const base = noteBaseForLetterOctave(letter, octave);
      bar.notes[noteIndex] = {
        ...bar.notes[noteIndex],
        ...base,

      const placeableSpellings = ADVANCED_HIGHER_CHORD_TYPES
        .flatMap((chordType) => advancedHigherChordTypeSpellingsForQuestion(question, chordType.id).map((spelling) => ({

        .map((item) => {

        .filter((item) => item.candidateBars.length);

      if (!selected) return null;

      const barIndex = randomItem(selected.candidateBars);
      if (!Number.isInteger(barIndex)) return null;
      const spelling = chordType.id === "aug"
        ? augmentedTriadSpellingForBar(question, barIndex, selected.spelling) ?? selected.spelling

    const ADVANCED_HIGHER_CHORD_IDENTIFY_BAR = 12;

    function advancedHigherChordSlotTimings(timeSignature) {
      const id = timeSignature?.id;

        { beat: 0, beats: 1, rhythm: "crotchet" },
        { beat: 1, beats: 1, rhythm: "crotchet" },
      ];
      if (id === "3/4") return [
        { beat: 0, beats: 2, rhythm: "minim" },
        { beat: 2, beats: 1, rhythm: "crotchet" },
      ];
      if (id === "4/4") return [
        { beat: 0, beats: 2, rhythm: "minim" },
        { beat: 2, beats: 2, rhythm: "minim" },
      ];
      if (id === "6/8") return [
        { beat: 0, beats: 1.5, rhythm: "dottedCrotchet" },
        { beat: 1.5, beats: 1.5, rhythm: "dottedCrotchet" },

        { beat: 0, beats: 3, rhythm: "dottedMinim" },
        { beat: 3, beats: 1.5, rhythm: "dottedCrotchet" },
      ];
      if (id === "12/8") return [
        { beat: 0, beats: 3, rhythm: "dottedMinim" },
        { beat: 3, beats: 3, rhythm: "dottedMinim" },

        { beat: 0, beats: 2, rhythm: "minim" },

    function advancedHigherChordSymbolsForKey(key) {
      const preferred = isMinorKey(key) ? ["I", "IV", "V", "VI", "V7"] : ["I", "II", "IV", "V", "VI", "V7"];
      return preferred.filter((symbol) => key?.chords?.[symbol]?.length);
    }

    function noteForAdvancedHigherChordTone(question, chordSymbol, letter, octave, clef = "treble") {
      const chordAccidental = chordAccidentalForLetter(question.key, chordSymbol, letter);
      const note = noteBaseForLetterOctave(letter, octave);
      return {
        ...note,
        writtenAccidental: chordAccidental ?? null,
      };
    }

    function advancedHigherChordInversionOptions(chordSymbol) {
      if (chordSymbol === "II") return [0, 1];

    const ADVANCED_HIGHER_CHORD_INVERSION_WEIGHTS = {

    function advancedHigherChordPositionKey(chordSymbol, inversion) {

    function weightedAdvancedHigherChordCandidate(candidates) {
      return weightedRandomItem(candidates.map((candidate) => ({

        weight: ADVANCED_HIGHER_CHORD_INVERSION_WEIGHTS[candidate.inversion] ?? 1,
      })));
    }

    function makeAdvancedHigherChordVoicing(question, chordSymbol, inversion, idPrefix, timing = null) {
      const chordLetters = question.key.chords[chordSymbol] ?? question.key.chords.I ?? ["C", "E", "G"];
      const bassIndex = clamp(inversion, 0, Math.max(0, chordLetters.length - 1));
      const bassLetter = chordLetters[bassIndex] ?? chordLetters[0];
      const remaining = chordLetters.filter((_, index) => index !== bassIndex);
      const trebleLetters = chordLetters.length > 3 ? remaining : [remaining[0], remaining[1], bassLetter].filter(Boolean);
      const bassOctaveOptions = [2, 3, 4];
      const bassCandidates = bassOctaveOptions
        .map((octave) => noteForAdvancedHigherChordTone(question, chordSymbol, bassLetter, octave, "bass"))
        .filter((note) => note.midi >= ADVANCED_HIGHER_TRANSPOSITION_BASS_MIN.midi && note.midi <= ADVANCED_HIGHER_TRANSPOSITION_BASS_MAX.midi);

      const trebleStack = trebleLetters.map((letter) => {
        const octave = letter === "C" || letter === "D" ? 5 : 4;
        return noteForAdvancedHigherChordTone(question, chordSymbol, letter, octave, "treble");
      }).sort((a, b) => displayStep(a, "treble") - displayStep(b, "treble"));
      let guard = 0;
      while (trebleStack.length > 1 && displayStep(trebleStack.at(-1), "treble") - displayStep(trebleStack[0], "treble") > 7 && guard < 4) {
        const highest = trebleStack.at(-1);
        const lowered = noteForAdvancedHigherChordTone(question, chordSymbol, highest.letter, highest.octave - 1, "treble");
        trebleStack[trebleStack.length - 1] = lowered;
        trebleStack.sort((a, b) => displayStep(a, "treble") - displayStep(b, "treble"));
        guard += 1;
      }
      const bassNote = {
        ...bassBase,
        id: `${idPrefix}-bass`,
        rhythm: timing?.rhythm ?? "crotchet",
        beats: timing?.beats ?? 1,
        beat: timing?.beat ?? 0,
        stack: [bassBase],
        feedbackStack: bassCandidates.length ? bassCandidates : [bassBase],

      const trebleNote = {
        ...(trebleStack[0] ?? noteForAdvancedHigherChordTone(question, chordSymbol, question.key.tonic ?? "C", 4, "treble")),
        id: `${idPrefix}-treble`,
        rhythm: timing?.rhythm ?? "crotchet",
        beats: timing?.beats ?? 1,
        beat: timing?.beat ?? 0,
        stack: trebleStack,
      };
      return { bassNote, trebleNote };
    }

    function makeAdvancedHigherChordSlot(question, barIndex, slotIndex, usedChordPositions = new Set()) {
      const timing = advancedHigherChordSlotTimings(question.timeSignature)[slotIndex] ?? advancedHigherChordSlotTimings(question.timeSignature)[0];
      const symbols = advancedHigherChordSymbolsForKey(question.key);
      const candidates = symbols.flatMap((symbol) => advancedHigherChordInversionOptions(symbol).map((inversion) => ({
        symbol,
        inversion,
      })));
      const availableCandidates = candidates.filter((candidate) => !usedChordPositions.has(advancedHigherChordPositionKey(candidate.symbol, candidate.inversion)));
      const candidatePool = availableCandidates.length ? availableCandidates : candidates;
      const v7Candidates = candidatePool.filter((candidate) => candidate.symbol === "V7");
      const commonCandidates = candidatePool.filter((candidate) => candidate.symbol !== "V7");
      const selectedCandidate = v7Candidates.length && commonCandidates.length
        ? Math.random() < 0.1 ? weightedAdvancedHigherChordCandidate(v7Candidates) : weightedAdvancedHigherChordCandidate(commonCandidates)
        : weightedAdvancedHigherChordCandidate(candidatePool);
      const chordSymbol = selectedCandidate?.symbol ?? "V";
      const inversion = selectedCandidate?.inversion ?? 0;
      const voicing = makeAdvancedHigherChordVoicing(question, chordSymbol, inversion, `ah-chord-${barIndex}-${slotIndex}`, timing);
      return {
        id: `${barIndex}-${slotIndex}`,
        barIndex,
        slotIndex,
        beat: timing?.beat ?? 0,
        beats: timing?.beats ?? 1,
        rhythm: timing?.rhythm ?? "crotchet",
        beatRatio: (timing?.beat ?? 0) / Math.max(1, question.timeSignature?.beats ?? 4),
        chordSymbol,
        inversion,
        answer: chordAnswerForQuestion(question, chordSymbol),
        ...voicing,
      };
    }

    function makeAdvancedHigherChordTarget(question) {
      if (!question?.bars?.[ADVANCED_HIGHER_CHORD_IDENTIFY_BAR] || !question?.bars?.[ADVANCED_HIGHER_CHORD_BASS_BAR]) return null;
      const usedChordPositions = new Set();
      const identifySlots = [0, 1].map((slotIndex) => {
        const slot = makeAdvancedHigherChordSlot(question, ADVANCED_HIGHER_CHORD_IDENTIFY_BAR, slotIndex, usedChordPositions);
        usedChordPositions.add(advancedHigherChordPositionKey(slot.chordSymbol, slot.inversion));
        return slot;
      });
      const bassLineSlots = [0, 1].map((slotIndex) => {
        const slot = makeAdvancedHigherChordSlot(question, ADVANCED_HIGHER_CHORD_BASS_BAR, slotIndex, usedChordPositions);
        usedChordPositions.add(advancedHigherChordPositionKey(slot.chordSymbol, slot.inversion));
        return slot;
      });
      return {
        identifyBar: ADVANCED_HIGHER_CHORD_IDENTIFY_BAR,
        bassLineBar: ADVANCED_HIGHER_CHORD_BASS_BAR,
        identifySlots,
        bassLineSlots,
      };
    }

    function advancedHigherChordSlotsForBar(question, barIndex, target = question?.advancedHigherChordTarget) {
      if (!target) return [];
      if (target.identifyBar === barIndex) return target.identifySlots ?? [];
      if (target.bassLineBar === barIndex) return target.bassLineSlots ?? [];
      return [];
    }

    function melodyChordToneForSlot(question, bar, note, slot) {
      const chordLetters = question.key.chords?.[slot.chordSymbol] ?? [];
      if (!chordLetters.length || note.rest || note.tiedFromPrevious) return note;
      const sourceIndex = noteBaseIndex(note);
      const candidates = NOTE_POOL
        .filter((candidate) => chordLetters.includes(candidate.letter))
        .filter((candidate) => noteAllowedForLevel("AH", candidate))
        .filter((candidate) => noteInClefRange(candidate, question.clef ?? "treble"))
        .sort((a, b) => Math.abs(noteBaseIndex(a) - sourceIndex) - Math.abs(noteBaseIndex(b) - sourceIndex));
      const fitted = candidates[0];
      if (!fitted) return note;
      return {
        ...note,
        ...fitted,
        writtenAccidental: chordAccidentalForLetter(question.key, slot.chordSymbol, fitted.letter)
          ?? melodicAccidentalForLetter(question.key, fitted.letter),
      };
    }

    function alignAdvancedHigherChordMelodyToSlots(question, target, includeBassLineBar = false) {
      if (!question?.bars || !target) return question;
      [
        { barIndex: target.identifyBar, slots: target.identifySlots ?? [] },
        ...(includeBassLineBar ? [{ barIndex: target.bassLineBar, slots: target.bassLineSlots ?? [] }] : []),
      ].forEach(({ barIndex, slots }) => {
        const bar = question.bars[barIndex];
        if (!bar || !slots.length) return;
        bar.notes = bar.notes.map((note) => {
          const slot = slots.find((item) => Math.abs((note.beat ?? 0) - item.beat) < 0.001);
          return slot ? melodyChordToneForSlot(question, bar, note, slot) : note;
        });
      });

    function advancedHigherChordAnswerCorrect(value, slot) {
      if (!slot) return false;

        slot.chordSymbol,
        slot.answer,
        slot.answer?.replace(" major", ""),
        slot.answer?.replace(" minor", "m"),
        slot.answer?.replace(" diminished", " dim."),
      ].some((accepted) => normaliseHigherChordAnswer(accepted) === answer);
      const positionAnswer = normaliseAdvancedHigherInversionAnswer(advancedHigherInversionAnswerValue(value));
      const positionCorrect = advancedHigherAcceptedInversionAnswers(slot.inversion)
        .map(normaliseAdvancedHigherInversionAnswer)
        .includes(positionAnswer);

    function transpositionNoteAnswerCorrect(actual, expected, answerClef) {
      if (!actual || !expected) return false;

        ? actual.letter === expected.letter

    function outlineChordInBar(question, barIndex) {
      const bar = question.bars[barIndex];
      const chordLetters = question.key.chords[bar?.chordSymbol] ?? [];
      if (!bar || chordLetters.length < 3) return question;
      const outlinedNotes = bar.notes.map((note, noteIndex) => {
        if (note.rest) return note;
        const letter = chordLetters[noteIndex % chordLetters.length];
        const base = noteByLetter(letter, 5 + noteIndex);
        const fitted = fitNoteToClefRange(base, question.clef ?? "treble", question.key);
        return {
          ...note,
          ...fitted,
          writtenAccidental: chordAccidentalForLetter(question.key, bar.chordSymbol, letter) ?? melodicAccidentalForLetter(question.key, letter),

    function chooseChordQuestionBar(question, usedQuestionBars = new Set()) {

    function choosePracticeCadenceId(level = "N5") {

    function dynamicAnswerIsAccepted(selectedId, answerId) {
      if (!selectedId || !answerId) return false;

    function noteNameAccidental(question, note) {
      if (!note || note.rest) return 0;
      if (note.writtenAccidental === 1 || note.writtenAccidental === -1) return note.writtenAccidental;

    function noteAnswerAccepts(question, note) {
      const noteAccidental = noteNameAccidental(question, note);
      const accidental = noteAccidental === 1 ? ["sharp", "#"] : noteAccidental === -1 ? ["flat", "b"] : [""];
      const letter = note.letter;
      return accidental.flatMap((item) => item

    function noteDisplayName(question, note) {
      const noteAccidental = noteNameAccidental(question, note);
      if (noteAccidental === 1) return `${note.letter} sharp`;
      if (noteAccidental === -1) return `${note.letter} flat`;

    function chooseNoteIdentificationTarget(question, excludedBars = []) {
      const excluded = new Set(excludedBars);
      const candidates = question.bars
        .flatMap((bar) => (bar.notes ?? []).map((note, noteIndex) => ({ bar, note, noteIndex })))
        .filter(({ bar, note }) => bar.barIndex !== question.targetBar && !excluded.has(bar.barIndex) && !note.rest);
      if (candidates.length) return randomItem(candidates);
      const bar = question.bars.find((item) => item.barIndex !== question.targetBar && !excluded.has(item.barIndex) && item.notes?.some((note) => !note.rest)) ?? question.bars[0];
      const noteIndex = Math.max(0, bar.notes.findIndex((note) => !note.rest));
      const note = { ...bar.notes[noteIndex], ...noteByLetter("G", 5), writtenAccidental: 1 };
      bar.notes[noteIndex] = note;
      return { bar, note, noteIndex };
    }

    function isOctaveInterval(first, second) {
      return first.letter === second.letter && Math.abs(second.step - first.step) === 7;
    }

    function intervalTargetAllowedForType(first, second, intervalType) {
      if (intervalType !== "octave") return true;
      return first?.rhythm !== "quaver" && second?.rhythm !== "quaver";
    }

    function nearestPlacedNote(notes, startIndex, direction) {
      for (let noteIndex = startIndex; noteIndex >= 0 && noteIndex < notes.length; noteIndex += direction) {
        const note = notes[noteIndex];
        if (note && !note.rest) return note;
      }
      return null;
    }

    function intervalPitchPairScore(pair, bar, firstIndex, secondIndex) {
      const [firstPitch, secondPitch] = pair;
      const originalFirst = bar.notes[firstIndex];
      const originalSecond = bar.notes[secondIndex];
      const previousNote = nearestPlacedNote(bar.notes, firstIndex - 1, -1);
      const nextNote = nearestPlacedNote(bar.notes, secondIndex + 1, 1);
      let score = 0;

      if (originalFirst) score += Math.abs(firstPitch.step - originalFirst.step) * 2;
      if (originalSecond) score += Math.abs(secondPitch.step - originalSecond.step) * 2;
      if (previousNote) score += Math.abs(firstPitch.step - previousNote.step) * 3;
      if (nextNote) score += Math.abs(nextNote.step - secondPitch.step) * 3;
      if (Math.max(firstPitch.step, secondPitch.step) >= 9) score += 4;
      if (Math.min(firstPitch.step, secondPitch.step) <= -2) score += 2;
      return score;
    }

    function chooseSmoothIntervalPitchPair(pitchPairs, bar, firstIndex, secondIndex) {
      const scoredPairs = pitchPairs
        .map((pair) => ({ pair, score: intervalPitchPairScore(pair, bar, firstIndex, secondIndex) }))
        .sort((a, b) => a.score - b.score);
      const bestScore = scoredPairs[0]?.score ?? 0;
      const bestPairs = scoredPairs
        .filter((item) => item.score <= bestScore + 1)
        .map((item) => item.pair);
      return randomItem(bestPairs.length ? bestPairs : pitchPairs);
    }

    function exactIntervalAnswerVariants(intervalNumber, semitoneDistance) {
      const qualityBySemitones = {
        2: { 1: "minor", 2: "major" },
        3: { 3: "minor", 4: "major" },
        4: { 5: "perfect" },
        5: { 7: "perfect" },
        6: { 8: "minor", 9: "major" },
        7: { 10: "minor", 11: "major" },
        8: { 12: "perfect" },
      };
      const quality = qualityBySemitones[intervalNumber]?.[semitoneDistance];
      if (!quality) return [];
      const names = {
        2: ["2nd", "second"],
        3: ["3rd", "third"],
        4: ["4th", "fourth"],
        5: ["5th", "fifth"],
        6: ["6th", "sixth"],
        7: ["7th", "seventh"],
        8: ["octave", "8th"],
      }[intervalNumber] ?? [];
      const qualityAliases = quality === "major" ? ["major", "maj"] : [quality];
      return qualityAliases.flatMap((alias) => names.map((name) => `${alias} ${name}`));
    }

    function advancedHigherChromaticIntervalAnswer(intervalNumber, semitoneDistance, preferredLabel = null) {
      const tritoneAccepts = ["tritone", "tri-tone", "tri tone", "try tone"];
      if (preferredLabel === "Tritone" && semitoneDistance === 6) {
        return {
          label: "Tritone",
          feedback: "Tritone",
          accepts: acceptedAnswers(...tritoneAccepts, "augmented 4th", "augmented fourth", "aug 4", "aug 4th", "diminished 5th", "diminished fifth", "dim 5", "dim 5th"),
        };
      }
      if (intervalNumber === 4 && semitoneDistance === 6) {
        return {
          label: "Augmented 4th",
          feedback: "Tritone or augmented 4th",
          accepts: acceptedAnswers(...tritoneAccepts, "augmented 4th", "augmented fourth", "aug 4", "aug 4th"),
        };
      }
      if (intervalNumber === 5 && semitoneDistance === 6) {
        return {
          label: "Diminished 5th",
          feedback: "Tritone or diminished 5th",
          accepts: acceptedAnswers(...tritoneAccepts, "diminished 5th", "diminished fifth", "dim 5", "dim 5th"),
        };
      }
      return null;
    }

    function intervalAnswerForTarget(question, target) {
      const semitoneDistance = Math.abs(effectiveMidiForNote(question, target.bar, target.second) - effectiveMidiForNote(question, target.bar, target.first));
      if (isOctaveInterval(target.first, target.second)) return { label: "Octave", feedback: "Octave", accepts: acceptedAnswers("octave", "octave leap", "8", "8ve", "8th", ...exactIntervalAnswerVariants(8, semitoneDistance)) };
      if (question.level === "H") {
        const stepDistance = Math.abs(target.second.step - target.first.step);
        const intervalNumber = stepDistance + 1;
        const chromaticAnswer = advancedHigherChromaticIntervalAnswer(intervalNumber, semitoneDistance, target.advancedHigherIntervalLabel);
        if (question.practiceLevel === "AH" && chromaticAnswer) return chromaticAnswer;
        const labels = {
          2: ["2nd", "second"],
          3: ["3rd", "third"],
          4: ["4th", "fourth"],
          5: ["5th", "fifth"],
          6: ["6th", "sixth"],
          7: ["7th", "seventh"],
        };
        if (labels[intervalNumber]) {
          const baseAccepts = labels[intervalNumber];
          if (intervalNumber === 2) {
            const toneType = semitoneDistance === 1 ? "Semitone" : "Tone";
            return { label: "2nd", feedback: `2nd or ${toneType.toLowerCase()}`, accepts: acceptedAnswers(...baseAccepts, toneType, ...exactIntervalAnswerVariants(intervalNumber, semitoneDistance)) };
          }
          return { label: baseAccepts[0], feedback: baseAccepts[0], accepts: acceptedAnswers(...baseAccepts, String(intervalNumber), ...exactIntervalAnswerVariants(intervalNumber, semitoneDistance)) };
        }
      }
      const toneType = semitoneDistance === 1 ? "Semitone" : "Tone";
      return { label: toneType, feedback: `2nd or ${toneType.toLowerCase()}`, accepts: acceptedAnswers("2", "2nd", "second", toneType, ...exactIntervalAnswerVariants(2, semitoneDistance)) };
    }

    function national3IntervalAnswerForTarget(target) {
      return Math.abs(target.second.step - target.first.step) <= 1 ? "Step" : "Leap";

    function national3IntervalPitchPairs(type) {
      const allowed = NOTE_POOL.filter((note) => noteAllowedForLevel("N3", note));
      return allowed.flatMap((first) => allowed
        .filter((second) => {
          const distance = Math.abs(second.step - first.step);
          return type === "step" ? distance === 1 : distance >= 2 && distance <= 4;
        })
        .map((second) => [first, second]));

    function intervalPitchPairsForType(type, level) {
      if (type === "octave") {
        return NOTE_POOL.flatMap((first) => {
          const second = NOTE_POOL.find((note) => note.letter === first.letter && note.step === first.step + 7);
          return second && noteAllowedForLevel(level, first) && noteAllowedForLevel(level, second)
            ? [[first, second], [second, first]]
            : [];
        });
      }
      const higherDistances = { second: 1, third: 2, fourth: 3, fifth: 4, sixth: 5, seventh: 6 };
      const targetDistance = higherDistances[type] ?? 1;
      return NOTE_POOL.flatMap((first) => NOTE_POOL
        .filter((second) => Math.abs(second.step - first.step) === targetDistance && noteAllowedForLevel(level, first) && noteAllowedForLevel(level, second))
        .map((second) => [first, second]));

    function applyIntervalPitch(note, pitch, key, chordSymbol) {
      return {
        ...note,
        ...pitch,
        writtenAccidental: pitch.writtenAccidental ?? melodicAccidentalForLetter(key, pitch.letter) ?? chordAccidentalForLetter(key, chordSymbol, pitch.letter),

    const ADVANCED_HIGHER_CHROMATIC_INTERVAL_SPELLINGS = [
      { label: "Tritone", first: { letter: "F", accidental: 0 }, second: { letter: "B", accidental: 0 } },
      { label: "Augmented 4th", first: { letter: "C", accidental: 0 }, second: { letter: "F", accidental: 1 } },
      { label: "Augmented 4th", first: { letter: "G", accidental: 0 }, second: { letter: "C", accidental: 1 } },
      { label: "Diminished 5th", first: { letter: "B", accidental: 0 }, second: { letter: "F", accidental: 0 } },
      { label: "Diminished 5th", first: { letter: "E", accidental: 0 }, second: { letter: "B", accidental: -1 } },

    function spelledIntervalPitch(spelling, octave, key) {
      const base = noteBaseForLetterOctave(spelling.letter, octave);
      const keyAccidental = keyAccidentalForLetter(key, spelling.letter);
      return {
        ...base,
        writtenAccidental: spelling.accidental === keyAccidental ? null : spelling.accidental - keyAccidental,

    function notePitchClassInKey(key, letter) {
      return (NATURAL_MIDI_CLASSES[letter] + keyAccidentalForLetter(key, letter) + 12) % 12;

    function advancedHigherDiatonicTritoneSpellingsForKey(key) {
      const pairs = [];
      NOTE_LETTERS.forEach((firstLetter, firstLetterIndex) => {
        NOTE_LETTERS.forEach((secondLetter, secondLetterIndex) => {
          const ascendingLetterDistance = (secondLetterIndex - firstLetterIndex + 7) % 7;
          if (ascendingLetterDistance !== 3 && ascendingLetterDistance !== 4) return;
          const semitoneDistance = (notePitchClassInKey(key, secondLetter) - notePitchClassInKey(key, firstLetter) + 12) % 12;
          if (semitoneDistance !== 6) return;
          pairs.push({
            label: ascendingLetterDistance === 3 ? "Augmented 4th" : "Diminished 5th",
            first: { letter: firstLetter, accidental: keyAccidentalForLetter(key, firstLetter) },
            second: { letter: secondLetter, accidental: keyAccidentalForLetter(key, secondLetter) },
          });
        });
      });
      return pairs;
    }

    function advancedHigherChromaticIntervalPitchPairs(question) {
      return ADVANCED_HIGHER_CHROMATIC_INTERVAL_SPELLINGS.flatMap((interval) => {
        const firstLetterIndex = NOTE_LETTERS.indexOf(interval.first.letter);
        const secondLetterIndex = NOTE_LETTERS.indexOf(interval.second.letter);
        const octaveOffset = secondLetterIndex < firstLetterIndex ? 1 : 0;
        const pairs = [];
        for (let octave = 3; octave <= 5; octave += 1) {
          const first = spelledIntervalPitch(interval.first, octave, question.key);
          const second = spelledIntervalPitch(interval.second, octave + octaveOffset, question.key);
          if (noteAllowedForLevel("AH", first) && noteAllowedForLevel("AH", second)) {
            pairs.push({ label: interval.label, pair: [first, second] });
            pairs.push({ label: interval.label, pair: [second, first] });
          }
        }
        return pairs;
      });
    }

    function advancedHigherDiatonicTritonePitchPairs(question) {
      return advancedHigherDiatonicTritoneSpellingsForKey(question.key).flatMap((interval) => {
        const firstLetterIndex = NOTE_LETTERS.indexOf(interval.first.letter);
        const secondLetterIndex = NOTE_LETTERS.indexOf(interval.second.letter);
        const octaveOffset = secondLetterIndex < firstLetterIndex ? 1 : 0;
        const pairs = [];
        for (let octave = 3; octave <= 5; octave += 1) {
          const first = spelledIntervalPitch(interval.first, octave, question.key);
          const second = spelledIntervalPitch(interval.second, octave + octaveOffset, question.key);
          if (noteAllowedForLevel("AH", first) && noteAllowedForLevel("AH", second)) {

            pairs.push({ label: interval.label, pair: [second, first] });

    function hasRareIntervalSpelling(pair) {
      return pair.some((pitch) => RARE_INTERVAL_SPELLINGS.has(`${pitch.letter}:${pitch.displayAccidental}`));

    function chooseAdvancedHigherIntervalPairPool(pitchPairs) {
      const rarePairs = pitchPairs.filter((item) => hasRareIntervalSpelling(item.pair));
      const regularPairs = pitchPairs.filter((item) => !hasRareIntervalSpelling(item.pair));
      if (!rarePairs.length || !regularPairs.length) return pitchPairs;
      return Math.random() < RARE_INTERVAL_CHANCE ? rarePairs : regularPairs;

    const HIGHER_INTERVAL_TYPE_WEIGHTS = [
      { type: "third", number: 3, weight: 1 },
      { type: "fourth", number: 4, weight: 3 },
      { type: "fifth", number: 5, weight: 3 },
      { type: "sixth", number: 6, weight: 4 },
      { type: "seventh", number: 7, weight: 2 },

    function higherIntervalTypeOrder() {
      const intervalTypes = HIGHER_INTERVAL_TYPE_WEIGHTS.map((item) => item.type);
      const preferredType = weightedRandomItem(HIGHER_INTERVAL_TYPE_WEIGHTS).type;
      return [

    function higherIntervalNumber() {

    function intervalPromptName(intervalNumber) {
      if (intervalNumber === 8) return "octave";
      return `${intervalNumber}${["", "st", "nd", "rd"][intervalNumber] ?? "th"}`;

    function plantIntervalTarget(question, excludedBars = [], allowedBars = null) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const allowed = Array.isArray(allowedBars) ? new Set(allowedBars) : null;
      const targets = question.bars.flatMap((bar) => {
        if (excluded.has(bar.barIndex) || (allowed && !allowed.has(bar.barIndex))) return [];
        return (bar.notes ?? []).slice(0, -1).flatMap((note, noteIndex) => {
          const second = bar.notes[noteIndex + 1];
          return !note.rest && second && !second.rest
            ? [{ bar, firstIndex: noteIndex, secondIndex: noteIndex + 1 }]
            : [];
        });
      });
      if (!targets.length) return null;

      const tryPlantAdvancedHigherChromaticInterval = (preferDiatonicTritone = false) => {
        const diatonicTritonePairs = preferDiatonicTritone ? advancedHigherDiatonicTritonePitchPairs(question) : [];
        const chromaticPairs = advancedHigherChromaticIntervalPitchPairs(question);
        const pitchPairs = chooseAdvancedHigherIntervalPairPool(diatonicTritonePairs.length ? diatonicTritonePairs : chromaticPairs);
        if (!pitchPairs.length) return null;
        const target = randomItem(targets);
        if (!target) return null;
        const selected = randomItem(pitchPairs);
        const [firstPitch, secondPitch] = chooseSmoothIntervalPitchPair(
          pitchPairs.map((item) => item.pair),
          target.bar,
          target.firstIndex,
          target.secondIndex

    const IDENTIFY_ARTICULATION_OPTIONS = [...ARTICULATION_OPTIONS, PHRASE_MARKING_OPTION];

    function articulationPerformanceText(markingId) {
      return markingId === "slur" ? "slurred" : markingId === "accent" ? "accented" : "staccato";
    }

    function notesHaveRepeatedLetter(notes) {
      const letters = notes.map((note) => note?.letter).filter(Boolean);
      return new Set(letters).size !== letters.length;
    }

    function slurNoteIndicesForBar(bar) {
      const noteIndices = (bar.notes ?? [])
        .map((note, noteIndex) => note?.rest ? null : noteIndex)
        .filter((noteIndex) => noteIndex !== null);
      const candidates = [];
      [2].forEach((span) => {
        if (span > noteIndices.length) return;
        for (let start = 0; start <= noteIndices.length - span; start += 1) {
          const slice = noteIndices.slice(start, start + span);
          const notes = slice.map((noteIndex) => bar.notes[noteIndex]);
          if (!notesHaveRepeatedLetter(notes)) candidates.push(slice);
        }
      });
      return randomItem(candidates);
    }

    function makeArticulationTarget(question, excludedBars = []) {
      const excluded = new Set([...excludedBars, question.targetBar, question.bars.length - 1]);
      const barCandidates = question.bars
        .filter((bar) => !excluded.has(bar.barIndex))
        .map((bar) => ({
          bar,
          noteIndices: (bar.notes ?? []).map((note, noteIndex) => note.rest ? null : noteIndex).filter((noteIndex) => noteIndex !== null),
          slurNoteIndices: slurNoteIndicesForBar(bar),
        }))
        .filter(({ noteIndices }) => noteIndices.length >= 2);
      const target = randomItem(barCandidates);
      if (!target) return null;
      const variant = randomItem(["identify", "applyArticulation"]);
      if (variant === "applyArticulation") {
        const marking = randomItem(ARTICULATION_OPTIONS);
        return {
          variant,
          barIndex: target.bar.barIndex,
          noteIndices: target.noteIndices,
          marking,
          answer: marking.label,
        };
      }
      const phraseLineCandidates = Array.from({ length: Math.ceil(question.bars.length / BARS_PER_SYSTEM) }, (_, systemIndex) => {
        const startBarIndex = systemIndex * BARS_PER_SYSTEM;
        const lineBars = question.bars.slice(startBarIndex, startBarIndex + BARS_PER_SYSTEM);
        if (lineBars.length < 2 || lineBars.some((bar) => excluded.has(bar.barIndex))) return null;
        const firstBar = lineBars[0];
        const lastBar = lineBars.at(-1);
        const firstNoteIndex = (firstBar.notes ?? []).findIndex((note) => note && !note.rest);
        const lastNoteIndex = (lastBar.notes ?? []).map((note, noteIndex) => ({ note, noteIndex })).reverse().find(({ note }) => note && !note.rest)?.noteIndex;
        if (firstNoteIndex < 0 || !Number.isInteger(lastNoteIndex)) return null;
        return {
          barIndex: firstBar.barIndex,
          noteIndex: firstNoteIndex,
          noteIndices: [firstNoteIndex],
          endBarIndex: lastBar.barIndex,
          endNoteIndex: lastNoteIndex,
        };
      }).filter(Boolean);
      const markingOptions = IDENTIFY_ARTICULATION_OPTIONS
        .filter((marking) => marking.id !== "slur" || target.slurNoteIndices?.length)
        .filter((marking) => marking.id !== "phrase" || phraseLineCandidates.length);
      const marking = randomItem(markingOptions);
      if (marking.id === "phrase") {
        const phraseTarget = randomItem(phraseLineCandidates);
        return {
          variant,
          ...phraseTarget,
          marking,
          answer: marking.label,
        };
      }
      const noteIndices = marking.id === "slur" ? target.slurNoteIndices : target.noteIndices;
      return {
        variant,
        barIndex: target.bar.barIndex,
        noteIndex: noteIndices[0],
        noteIndices,
        marking,
        answer: marking.label,
      };
    }

    function transposedByOctaves(note, barIndex, noteIndex, octaveOffset = 0, idPrefix = "transposition") {
      if (!note || note.rest) return null;
      const base = NOTE_POOL[noteBaseIndex(note) + octaveOffset * 7];
      if (!base) return null;
      return {
        ...note,
        ...base,
        id: `${idPrefix}-${barIndex}-${noteIndex}`,
        barIndex,
        noteIndex,
        writtenAccidental: note.writtenAccidental,
      };
    }

    const transposedOneOctaveLower = (note, barIndex, noteIndex) => transposedByOctaves(note, barIndex, noteIndex, -1);

    const TRANSPOSITION_MEANING_OPTIONS = {
      "8va": {
        symbol: "8va",
        prompt: "What does 8va mean?",
        answer: "Played one octave higher than written.",
        accepts: acceptedAnswers("one octave higher", "octave higher", "played one octave higher than written", "play one octave higher", "sounds one octave higher"),
      },
      "8vb": {
        symbol: "8vb",
        prompt: "What does 8vb mean?",
        answer: "Played one octave lower than written.",
        accepts: acceptedAnswers("one octave lower", "octave lower", "played one octave lower than written", "play one octave lower", "sounds one octave lower"),
      },
    };

    const HIGHER_TRANSPOSITION_VARIANTS = [
      {
        id: "trebleOctaveDown",
        sourceClef: "treble",
        answerClef: "bass",
        answerOctavesFromMain: -1,
        sourceOctavesFromMain: 0,
        prompt: (barNumber) => `Transpose the notes in bar ${barNumber} one octave lower into the bass clef.`,
      },
    ];

    const ADVANCED_HIGHER_TRANSPOSITION_VARIANTS = [
      ...HIGHER_TRANSPOSITION_VARIANTS,
      {
        id: "trebleSamePitch",
        sourceClef: "treble",
        answerClef: "bass",
        answerOctavesFromMain: 0,
        sourceOctavesFromMain: 0,
        prompt: (barNumber) => `Transpose the notes in bar ${barNumber} at the same pitch into the bass clef.`,
      },
      {
        id: "bassSamePitch",
        sourceClef: "bass",
        answerClef: "treble",
        answerOctavesFromMain: 0,
        sourceOctavesFromMain: 0,
        prompt: (barNumber) => `Transpose the notes in bar ${barNumber} at the same pitch into the treble clef.`,
      },
      {
        id: "bassOctaveUp",
        sourceClef: "bass",
        answerClef: "treble",
        answerOctavesFromMain: 0,
        sourceOctavesFromMain: -1,
        prompt: (barNumber) => `Transpose the notes in bar ${barNumber} one octave higher into the treble clef.`,
      },
    ];

    function transpositionQuestionPrompt(target) {
      if (target?.type === "meaning") return target.prompt;
      return target?.prompt ?? `Transpose the notes in bar ${target?.barIndex + 1} one octave lower into the bass clef.`;
    }

    function transpositionNoteFitsClefForQuestion(note, clef, question) {
      if (!note || !noteInClefRange(note, clef)) return false;
      if (question.practiceLevel !== "AH") {
        return clef !== "bass" || noteInHigherTranspositionBassRange(note);
      }
      if (clef === "bass") return noteInAdvancedHigherTranspositionBassRange(note);
      return noteAllowedForLevel("AH", note);
    }

    function transpositionVariantNotesForBar(bar, variant) {
      const answerNotes = bar.notes.map((note, noteIndex) => transposedByOctaves(note, bar.barIndex, noteIndex, variant.answerOctavesFromMain, "transposition-answer"));
      const sourceNotes = bar.notes.map((note, noteIndex) => transposedByOctaves(note, bar.barIndex, noteIndex, variant.sourceOctavesFromMain, "transposition-source"));
      return { answerNotes, sourceNotes };
    }

    function transpositionFallbackPatternForSignature(timeSignature) {
      const patterns = {
        "2/4": ["quaver", "quaver", "crotchet"],
        "3/4": ["crotchet", "quaver", "quaver", "crotchet"],
        "4/4": ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
        "5/4": ["crotchet", "quaver", "quaver", "crotchet", "crotchet", "crotchet"],
        "6/8": ["quaver", "quaver", "quaver", "dottedCrotchet"],
        "9/8": ["quaver", "quaver", "quaver", "dottedCrotchet", "dottedCrotchet"],
      };
      return patterns[timeSignature.id] ?? patterns["4/4"];
    }

    function plantTranspositionFallbackBar(question, excluded, variant = HIGHER_TRANSPOSITION_VARIANTS[0]) {
      const bar = question.bars.find((item) => item.barIndex < 8 && !excluded.has(item.barIndex));
      if (!bar) return null;
      const pattern = transpositionFallbackPatternForSignature(question.timeSignature);
      let beat = 0;
      const safeSteps = variant.sourceClef === "bass"
        ? [-9, -8, -7, -6, -7, -8]
        : variant.answerClef === "bass" && variant.answerOctavesFromMain === 0
          ? [-4, -3, -2, -3, -4, -2]
          : [0, 1, 2, 3, 2, 1];
      const notes = pattern.map((rhythm, noteIndex) => {
        const base = noteBaseForStep(safeSteps[noteIndex % safeSteps.length]);
        const note = makeNote(base, rhythm, bar.barIndex, noteIndex, beat, question.key, bar.chordSymbol);
        beat += rhythmInfo(rhythm).beats;
        return note;
      });
      const chordSymbol = chordForStrongBeatNotes(question.key, notes, bar.chordSymbol, question.timeSignature) ?? bar.chordSymbol;
      question.bars[bar.barIndex] = {
        ...bar,
        chordSymbol,
        notes: notes.map((note) => makeNote(note, note.rhythm, bar.barIndex, note.noteIndex, note.beat, question.key, chordSymbol)),
        pattern,
      };
      return question.bars[bar.barIndex];
    }

    function makeTranspositionTarget(question, excludedBars = [], transpositionQuestionTypeId = null) {
      const allowedVariantIds = TRANSPOSITION_VARIANT_IDS_BY_QUESTION_TYPE[transpositionQuestionTypeId] ?? null;
      const meaningOnly = allowedVariantIds?.length === 1 && allowedVariantIds[0] === "meaning";
      const canUseMeaning = question.practiceLevel === "AH" && (!allowedVariantIds || allowedVariantIds.includes("meaning"));
      if (canUseMeaning && (meaningOnly || Math.random() < 0.2)) {
        const excluded = new Set(excludedBars);
        const availableBars = question.bars
          .filter((bar) => bar.barIndex < 8 && !excluded.has(bar.barIndex))
          .map((bar) => bar.barIndex);
        const barIndex = randomItem(availableBars.length ? availableBars : [2]);
        const meaning = TRANSPOSITION_MEANING_OPTIONS[randomItem(["8va", "8vb"])];
        const barNumber = barIndex + 1;
        return {
          type: "meaning",
          barIndex,
          symbol: meaning.symbol,
          prompt: `What does the marking ${meaning.symbol} mean in bar ${barNumber}?`,
          answer: meaning.answer,
          accepts: meaning.accepts,
        };
      }
      const excluded = new Set([...excludedBars]);
      const availableVariants = question.practiceLevel === "AH" ? ADVANCED_HIGHER_TRANSPOSITION_VARIANTS : HIGHER_TRANSPOSITION_VARIANTS;
      const variants = allowedVariantIds
        ? availableVariants.filter((variant) => allowedVariantIds.includes(variant.id))
        : availableVariants;
      if (!variants.length) return null;
      const variant = randomItem(variants);
      const eligibleBars = question.bars
        .filter((bar) => bar.barIndex < 8)
        .filter((bar) => (bar.notes ?? []).length >= 3 && (bar.notes ?? []).every((note) => !note.rest))
        .filter((bar) => bar.notes.every((note, noteIndex) => {
          const answer = transposedByOctaves(note, bar.barIndex, noteIndex, variant.answerOctavesFromMain, "transposition-answer");
          const source = transposedByOctaves(note, bar.barIndex, noteIndex, variant.sourceOctavesFromMain, "transposition-source");
          return transpositionNoteFitsClefForQuestion(answer, variant.answerClef, question)
            && transpositionNoteFitsClefForQuestion(source, variant.sourceClef, question);
        }));
      const candidates = eligibleBars
        .filter((bar) => !excluded.has(bar.barIndex));
      const bar = randomItem(candidates) ?? plantTranspositionFallbackBar(question, excluded, variant);
      if (!bar) return null;
      const { answerNotes, sourceNotes } = transpositionVariantNotesForBar(bar, variant);
      const notesFitSelectedClefs = answerNotes.every((note) => transpositionNoteFitsClefForQuestion(note, variant.answerClef, question))
        && sourceNotes.every((note) => transpositionNoteFitsClefForQuestion(note, variant.sourceClef, question));
      if (!notesFitSelectedClefs) return null;
      return {
        type: "notes",
        variantId: variant.id,
        barIndex: bar.barIndex,
        sourceClef: variant.sourceClef,
        answerClef: variant.answerClef,
        answerOnMain: variant.answerClef === (question.clef ?? "treble"),
        sourceNotes,
        answerNotes,
        rhythms: Object.fromEntries(bar.notes.map((note, noteIndex) => [noteIndex, note.rhythm])),
        prompt: variant.prompt(bar.barIndex + 1),
      };
    }

    function makeEnharmonicTarget(question, excludedBars = []) {
      const clef = question.clef ?? "treble";
      const excluded = new Set(excludedBars);
      const previousBarOnSameSystemIsExcluded = (barIndex) => (
        barIndex % BARS_PER_SYSTEM !== 0
        && excluded.has(barIndex - 1)
      );
      const keyMappedCandidates = keyMappedEnharmonicCandidatesForClef(question.key, clef);
      if (!keyMappedCandidates.length) return null;
      const candidates = question.bars.flatMap((bar) =>
        (bar.notes ?? []).flatMap((note, noteIndex) => {
          if (
            excluded.has(bar.barIndex)
            || previousBarOnSameSystemIsExcluded(bar.barIndex)
            || (bar.barIndex === 0 && noteIndex === 0)
            || noteIndex !== 0
            || !note
            || note.rest
            || note.tieToNext
            || note.tiedFromPrevious
            || displayStep(note, clef) < MIN_DISPLAY_STEP
            || displayStep(note, clef) > MAX_DISPLAY_STEP
          ) {
            return [];
          }
          return keyMappedCandidates.map((candidate, candidateIndex) => ({
            bar,
            note,
            noteIndex,
            candidate,
            candidateIndex,
          }));
        })
      );
      if (!candidates.length) return null;
      const chosen = randomItem(candidates);
      const candidate = chosen.candidate;
      const sourceNote = {
        ...makeEnharmonicNote(candidate.source, candidate.source.octave, clef, chosen.note),
        writtenAccidental: candidate.source.accidental - keyAccidentalForLetter(question.key, candidate.source.letter),
        displayAccidental: candidate.source.accidental,
      };
      const targetOctave = closestEnharmonicTargetOctave(sourceNote, candidate.target, clef);
      const answerNote = {
        ...makeEnharmonicNote(candidate.target, targetOctave, clef, chosen.note),
        id: `enharmonic-answer-${chosen.bar.barIndex}-${chosen.noteIndex}`,
        barIndex: chosen.bar.barIndex,
        noteIndex: chosen.noteIndex,
      };
      chosen.bar.notes[chosen.noteIndex] = {
        ...sourceNote,
        id: chosen.note.id,
        barIndex: chosen.bar.barIndex,
        noteIndex: chosen.noteIndex,
      };
      return {
        barIndex: chosen.bar.barIndex,
        noteIndex: chosen.noteIndex,
        clef,
        sourceNote: chosen.bar.notes[chosen.noteIndex],
        answerNote,
      };
    }

    function makeIntervalInsertTarget(question, excludedBars = [], allowedBars = null) {
      const excluded = new Set([...excludedBars, question.targetBar, question.bars.length - 1]);
      const allowed = Array.isArray(allowedBars) ? new Set(allowedBars) : null;
      const intervalNumber = question.level === "H" ? higherIntervalNumber() : randomItem([2, 3, 4, 5, 6, 7, 8]);
      const direction = "higher";
      const stepOffset = (intervalNumber - 1) * (direction === "higher" ? 1 : -1);
      const candidates = question.bars
        .flatMap((bar) => (bar.notes ?? []).slice(0, -1).map((note, noteIndex) => ({ bar, note, noteIndex })))
        .filter(({ bar, note }) => !excluded.has(bar.barIndex) && (!allowed || allowed.has(bar.barIndex)) && !note.rest)
        .filter(({ note }) => {
          const answerBase = NOTE_POOL[noteBaseIndex(note) + stepOffset];
          return answerBase && (question.level !== "H" || noteInHigherTrebleRange(answerBase));
        });
      const target = randomItem(candidates);
      if (!target) return null;
      const answerIndex = target.noteIndex + 1;
      const answerBase = NOTE_POOL[noteBaseIndex(target.note) + stepOffset];
      const existing = target.bar.notes[answerIndex];
      const answerNote = makeNote(answerBase, existing?.rhythm ?? "crotchet", target.bar.barIndex, answerIndex, existing?.beat ?? target.note.beat + target.note.beats, question.key, target.bar.chordSymbol);
      target.bar.notes[answerIndex] = answerNote;
      return {
        barIndex: target.bar.barIndex,
        firstIndex: target.noteIndex,
        answerIndex,
        intervalNumber,
        direction,
        intervalPhrase: `${intervalPromptName(intervalNumber)} ${direction}`,
        answerNote,
      };
    }

    function accidentalPlacementKey(placement) {
      return placement ? `${placement.symbolId}:${placement.barIndex}:${placement.noteIndex}` : "";
    }

    function noteAnswerKey(barIndex, noteIndex) {
      return `${barIndex}:${noteIndex}`;
    }

    function userNoteAt(userNotes, barIndex, noteIndex) {
      return userNotes?.[noteAnswerKey(barIndex, noteIndex)] ?? userNotes?.[noteIndex] ?? null;
    }

    function articulationPlacementKey(selection) {
      return selection ? `${selection.barIndex}:${selection.noteIndex}` : "";
    }

    function tripletPlacementKey(selection) {
      return selection ? `${selection.barIndex}:${selection.startIndex ?? selection.noteIndex}` : "";
    }

    function makePlacementAnswer(current, defaults = {}) {
      return typeof current === "object" && current !== null ? current : defaults;
    }

    function repeatPlaceKey(placement) {
      if (!placement) return "";
      return `${placement.symbolId}:${placement.barIndex}:${placement.anchor}`;
    }

    function repeatPlaybackBars(question) {
      if (question.questionType !== "practicePaper" || !question.repeatTarget) {
        return question.bars;
      }
      if (question.repeatTarget.symbolId === "repeat-pair") {
        const repeatedBars = (question.repeatTarget.repeatedBars ?? [])
          .map((barIndex) => question.bars[barIndex])
          .filter(Boolean);
        const startBarIndex = question.repeatTarget.placements?.find((placement) => placement.symbolId === "start-repeat")?.barIndex ?? 0;
        const endBarIndex = question.repeatTarget.placements?.find((placement) => placement.symbolId === "end-repeat")?.barIndex ?? question.bars.length - 1;
        const beforeRepeat = question.bars.filter((bar) => bar.barIndex < startBarIndex);
        const afterRepeat = question.bars.filter((bar) => bar.barIndex > endBarIndex);
        return [...beforeRepeat, ...repeatedBars, ...repeatedBars, ...afterRepeat];
      }
      if (question.repeatTarget.symbolId === "first-time") {
        const firstTimeStart = question.repeatTarget.barIndex;
        const firstPass = question.bars.filter((bar) => bar.barIndex <= 6);
        const repeatedLeadIn = question.bars.filter((bar) => bar.barIndex < firstTimeStart);
        const secondTimeBar = question.bars[7] ? [question.bars[7]] : [];
        return [...firstPass, ...repeatedLeadIn, ...secondTimeBar];
      }
      if (question.repeatTarget.symbolId === "start-repeat") {
        const repeatedBars = (question.repeatTarget.repeatedBars ?? [])
          .map((barIndex) => question.bars[barIndex])
          .filter(Boolean);
        if (!repeatedBars.length) return question.bars;
        return [...question.bars, ...repeatedBars];
      }
      if (question.repeatTarget.symbolId === "dc") {
        const dcBarIndex = question.repeatTarget.barIndex ?? question.bars.length - 1;
        const firstPass = question.bars.filter((bar) => bar.barIndex <= dcBarIndex);
        return [...firstPass, ...question.bars];
      }
      if (question.repeatTarget.symbolId === "ds-fine") {
        const performedBars = question.repeatTarget.performedBars ?? [];
        const playbackBars = performedBars
          .map((barIndex) => question.bars[barIndex])
          .filter(Boolean);
        return playbackBars.length ? playbackBars : question.bars;
      }
      if (question.repeatTarget.symbolId !== "end-repeat") return question.bars;

      const repeatedBars = (question.repeatTarget.repeatedBars ?? [])
        .map((barIndex) => question.bars[barIndex])
        .filter(Boolean);
      if (!repeatedBars.length) return question.bars;

      const endBarIndex = question.repeatTarget.barIndex;
      const beforeAndThroughRepeat = question.bars.filter((bar) => bar.barIndex <= endBarIndex);
      const afterRepeat = question.bars.filter((bar) => bar.barIndex > endBarIndex);
      return [...beforeAndThroughRepeat, ...repeatedBars, ...afterRepeat];
    }

    function combinations(items, size, start = 0, prefix = [], output = []) {
      if (prefix.length === size) {
        output.push(prefix);
        return output;
      }
      for (let index = start; index <= items.length - (size - prefix.length); index += 1) {
        combinations(items, size, index + 1, [...prefix, items[index]], output);
      }
      return output;
    }

    function hasQuestionTypeConflict(ids, level = null) {
      if (level === "AH") return false;
      const idSet = new Set(ids);
      return QUESTION_TYPE_CONFLICT_PAIRS.some(([first, second]) => idSet.has(first) && idSet.has(second));
    }

    function higherWeightedQuestionCandidate(options, selected, enabledQuestionTypes, honourEnabled = true, level = "H") {
      const availableIds = new Set(practiceQuestionTypesForLevel(level).map((type) => type.id));
      const candidates = options.filter((option) => (
        availableIds.has(option.id)
        &&
        !(level === "AH" && option.id === "chord")
        &&
        (!honourEnabled || enabledQuestionTypes[option.id] !== false)
        && !selected.includes(option.id)
        && !hasQuestionTypeConflict([...selected, option.id], level)
      ));
      return candidates.length ? weightedRandomItem(candidates).id : null;
    }

    function selectedHigherPracticeQuestionTypeIds(enabledQuestionTypes, level = "H") {
      const exactCustomOptions = customPracticeQuestionSelectionOptions(enabledQuestionTypes, level);
      const enabledIds = practiceQuestionTypesForLevel(level).filter((type) => enabledQuestionTypes[type.id]).map((type) => type.id);
      if (enabledIds.length === PRACTICE_QUESTION_COUNT && exactCustomOptions.length) return randomItem(exactCustomOptions);
      const selected = [...HIGHER_STANDARD_FIXED_QUESTION_TYPES];
      const transpositionTypeId = selectedTranspositionQuestionTypeId(enabledQuestionTypes, level);
      if (transpositionTypeId) selected.push(transpositionTypeId);
      const standardHarmony = higherWeightedQuestionCandidate(HIGHER_STANDARD_HARMONY_ALTERNATES, selected, enabledQuestionTypes, true, level);
      if (standardHarmony) selected.push(standardHarmony);

      const standardAudio = higherWeightedQuestionCandidate(HIGHER_STANDARD_AUDIO_ALTERNATES, selected, enabledQuestionTypes, true, level);
      if (standardAudio) selected.push(standardAudio);

      const audio = higherWeightedQuestionCandidate(HIGHER_RANDOM_AUDIO_QUESTION_OPTIONS, selected, enabledQuestionTypes, true, level);
      if (audio) selected.push(audio);

      const nonAudio = higherWeightedQuestionCandidate(HIGHER_RANDOM_NON_AUDIO_QUESTION_OPTIONS, selected, enabledQuestionTypes, true, level);
      if (nonAudio) selected.push(nonAudio);

      if (selected.length >= PRACTICE_QUESTION_COUNT) return selected.slice(0, PRACTICE_QUESTION_COUNT);

      const fallbackOptions = practiceQuestionTypesForLevel(level)
        .map((type) => ({ id: type.id, weight: 1 }))
        .filter((option) => enabledQuestionTypes[option.id] !== false || HIGHER_STANDARD_FIXED_QUESTION_TYPES.includes(option.id));
      while (selected.length < PRACTICE_QUESTION_COUNT) {
        const next = higherWeightedQuestionCandidate(fallbackOptions, selected, enabledQuestionTypes, true, level);
        if (!next) break;
        selected.push(next);
      }
      return selected;
    }

    function practiceQuestionSelectionOptions(enabledQuestionTypes, level = "N5") {
      const enabledIds = practiceQuestionTypesForLevel(level)
        .filter((type) => enabledQuestionTypes[type.id])
        .map((type) => type.id);
      const audioIds = enabledIds.filter((id) => AUDIO_PRACTICE_QUESTION_TYPE_IDS.has(id));
      const nonAudioIds = enabledIds.filter((id) => !AUDIO_PRACTICE_QUESTION_TYPE_IDS.has(id));
      const minimumAudioQuestions = level === "N3" ? 2 : 3;
      const minimumNonAudioQuestions = PRACTICE_QUESTION_COUNT - minimumAudioQuestions;
      if (audioIds.length < minimumAudioQuestions || nonAudioIds.length < minimumNonAudioQuestions) return [];
      if (level === "N3") {
        return combinations(enabledIds, PRACTICE_QUESTION_COUNT)
          .filter((selection) => selection.filter((id) => AUDIO_PRACTICE_QUESTION_TYPE_IDS.has(id)).length >= minimumAudioQuestions)
          .filter((selection) => !hasQuestionTypeConflict(selection, level));
      }
      return combinations(audioIds, minimumAudioQuestions).flatMap((audioSelection) =>
        combinations(nonAudioIds, minimumNonAudioQuestions)
          .map((nonAudioSelection) => [...audioSelection, ...nonAudioSelection])
          .filter((selection) => !hasQuestionTypeConflict(selection, level))
      );
    }

    function customPracticeQuestionSelectionOptions(enabledQuestionTypes, level = "N5") {
      const enabledIds = practiceQuestionTypesForLevel(level)
        .filter((type) => enabledQuestionTypes[type.id])
        .map((type) => type.id);
      if (enabledIds.length < PRACTICE_QUESTION_COUNT) return [];
      const options = combinations(enabledIds, PRACTICE_QUESTION_COUNT);
      const conflictFreeOptions = options.filter((selection) => !hasQuestionTypeConflict(selection, level));
      return conflictFreeOptions.length ? conflictFreeOptions : options;
    }

    function hasConflictFreePracticeQuestionSelection(enabledQuestionTypes, level = "N5") {
      const enabledIds = practiceQuestionTypesForLevel(level)
        .filter((type) => enabledQuestionTypes[type.id])
        .map((type) => type.id);
      if (enabledIds.length < PRACTICE_QUESTION_COUNT) return false;

        if (sourceId === "ahChord") return ADVANCED_HIGHER_CHORD_IDENTIFY_BAR + 0.5;
        if (sourceId === "ahBassLine") return ADVANCED_HIGHER_CHORD_BASS_BAR + 0.5;
        if (sourceId === "ahChordTypes") return (advancedHigherChordTypeTarget?.barIndex ?? 99) + 0.5;
        return 99 + fallbackIndex / 100;
      };
      const orderedCandidates = selectedSubquestions
        .map((part, index) => ({ part, index }))
        .sort((first, second) => {
          const orderDifference = subquestionMusicOrder(first.part, first.index) - subquestionMusicOrder(second.part, second.index);
          return orderDifference || first.index - second.index;
        })
        .map(({ part }) => part);
      const protectedAhSourceIds = selectedAdvancedHigherChordIds.length
        ? new Set(selectedAdvancedHigherChordIds)
        : new Set();
      const orderedSubquestions = orderedCandidates.length <= 6
        ? orderedCandidates
        : [
          ...orderedCandidates.filter((part) => protectedAhSourceIds.has(part.sourceId)),
          ...orderedCandidates.filter((part) => !protectedAhSourceIds.has(part.sourceId)),
        ].slice(0, 6).sort((first, second) => subquestionMusicOrder(first, 0) - subquestionMusicOrder(second, 0));
      const finalSubquestionOrder = [...orderedSubquestions];
      const subquestions = finalSubquestionOrder.map((part, index) => ({
        ...part,
        id: index === 0 || !finalSubquestionOrder.slice(0, index).some((previous) => previous.sourceId === part.sourceId) ? part.sourceId : `${part.sourceId}-${index}`,
        label: String.fromCharCode(97 + index),
      }));

      if (!validateRhythmBars(question) && canRetryQualityPracticeQuestion) {
        return retryPracticeQuestion();
      }

      return {
        ...question,
        level,
        questionType: "practicePaper",
        cadenceId,
        cadenceAnswer: `${cadenceId.replace(/\b\w/g, (letter) => letter.toUpperCase())} cadence`,
        chordBar,
        advancedHigherChordTarget,
        higherChordTargets: level === "H" && needsChord ? higherChordAnswers.map((item) => item.barIndex) : [],
        dynamicBar,
        dynamicQuestionType,
        dynamic,
        startingDynamic,
        dynamicHairpin,
        tempoQuestion,
        tempoBpm,
        accompanimentPattern,
        intervalTarget: intervalTarget ? {
          barIndex: intervalTarget.bar.barIndex,
          firstIndex: intervalTarget.firstIndex,
          secondIndex: intervalTarget.secondIndex,
          advancedHigherIntervalLabel: intervalTarget.advancedHigherIntervalLabel ?? null,
        } : null,
        intervalInsertTarget,
        noteTarget: noteTarget ? {
          barIndex: noteTarget.bar.barIndex,
          noteIndex: noteTarget.noteIndex,
        } : null,
        noteValueCircleTarget,
        repeatTarget,
        givenRepeatPlacements,
        barlineTargets,
        hiddenBarNumbers: displayHiddenBarNumbers,
        rhythmTargetBar,
        rhythmTargetPattern,
        rhythmFixTarget: rhythmFixTarget ?? restTarget,
        rhythmIdentificationTarget,
        scaleDegreeTarget,
        tripletTarget,
        givenTriplets,
        accidentalTarget,
        articulationTarget,
        transpositionTarget,
        enharmonicTarget,
        advancedHigherChordTypeTarget,
        answerTargets: {
          key: "a",
          time: "b",
          missing: "c",
          chord: "d",
          cadence: "e",
          dynamic: "f",
        },
        subquestions,
      };
    }

    function makeQuestion(level = "N5", attempt = 0, enabledQuestionTypes = DEFAULT_PRACTICE_QUESTION_TYPES) {
      if (level === "N3") return makePracticePaperQuestion(level, 0, enabledQuestionTypes);
      if (level === "N4") return makePracticePaperQuestion(level, 0, enabledQuestionTypes);
      if (level === "N5") return makePracticePaperQuestion(level, 0, enabledQuestionTypes);
      if (level === "H") return makePracticePaperQuestion(level, 0, enabledQuestionTypes);
      if (level === "AH") return makePracticePaperQuestion("H", 0, enabledQuestionTypes, "AH");
      if ((level === "N3" || level === "N4" || level === "N5") && Math.random() < 0.5) {
        return makeEightBarRepetitionQuestion(level);
      }
      return makeCompletionQuestion(level, attempt);
    }

    function barStart(barIndex, displayBarCount = BARS_PER_SYSTEM) {
      const topSystem = barIndex < 4;
      const musicStart = topSystem ? STAFF.left + 122 : STAFF.left + 74;
      const width = (STAFF.right - musicStart) / displayBarCount;
      return musicStart + (barIndex % BARS_PER_SYSTEM) * width;
    }

    function barWidth(barIndex, displayBarCount = BARS_PER_SYSTEM) {
      const musicStart = barIndex < 4 ? STAFF.left + 122 : STAFF.left + 74;
      return (STAFF.right - musicStart) / displayBarCount;
    }

    function systemTop(barIndex) {
      return STAFF.topA + Math.floor(barIndex / BARS_PER_SYSTEM) * (STAFF.topB - STAFF.topA + EXTRA_SYSTEM_SPACING);
    }

    function positionSpacingForNote(notes, index) {
      const rhythm = notes[index]?.rhythm;
      const previousRhythm = notes[index - 1]?.rhythm;
      const nextRhythm = notes[index + 1]?.rhythm;
      const pairsWithDottedQuaver = (rhythm === "dottedQuaver" && (previousRhythm === "semiquaver" || nextRhythm === "semiquaver"))
        || (rhythm === "semiquaver" && (previousRhythm === "dottedQuaver" || nextRhythm === "dottedQuaver"));
      return pairsWithDottedQuaver ? rhythmInfo("quaver").spacing : rhythmInfo(rhythm).spacing;
    }

    function barPositions(bar, displayBarCount = BARS_PER_SYSTEM) {
      const start = barStart(bar.barIndex, displayBarCount);
      const end = start + barWidth(bar.barIndex, displayBarCount);
      const scoreStart = start + (bar.barIndex === 0 ? 4 : bar.timeChangeQuestion ? 58 : 15);
      const scoreEnd = bar.barIndex === (bar.totalBars ?? BAR_COUNT) - 1 ? end - 24 : end - 4;
      const units = bar.notes.reduce((sum, _, index) => sum + positionSpacingForNote(bar.notes, index), 0);
      const unit = Math.max(1, scoreEnd - scoreStart) / Math.max(1, units);
      let cursor = scoreStart + unit * 0.38;
      return bar.notes.map((_, index) => {
        const x = cursor;
        cursor += positionSpacingForNote(bar.notes, index) * unit;
        return x;
      });
    }

    function barlinePlacementId(placement) {
      return `${placement.barIndex}:${placement.slot ?? "end"}:${Math.round(placement.x ?? 0)}`;
    }

    function isBeamableRhythm(rhythm) {
      return rhythm === "quaver" || rhythm === "tripletQuaver" || rhythm === "dottedQuaver" || rhythm === "semiquaver";
    }

    function displayRhythmForNote(note) {
      return note?.displayRhythm ?? note?.rhythm;
    }

    function internalGroupingBoundaries(timeSignature) {
      const starts = groupStartBeatsForTimeSignature(timeSignature);
      const barBeats = timeSignature?.beats ?? 0;
      return starts.filter((beat) => beat > 0 && beat < barBeats);
    }

    function beatGroupIndexForBeat(beat, timeSignature) {
      const starts = groupStartBeatsForTimeSignature(timeSignature);
      let groupIndex = 0;
      starts.forEach((start, index) => {
        if (beat + 0.001 >= start) groupIndex = index;
      });
      return groupIndex;
    }

    function noteCrossesInternalBoundary(note, timeSignature) {
      if (!note) return false;
      const start = note.beat ?? 0;
      const end = start + (note.beats ?? rhythmInfo(displayRhythmForNote(note)).beats);
      return internalGroupingBoundaries(timeSignature).some((boundary) => start + 0.001 < boundary && end > boundary + 0.001);
    }

    function notesShareBeamGroup(first, second, timeSignature) {
      if (!timeSignature) return true;
      if (timeSignature.id === "5/4") {
        if (noteCrossesInternalBoundary(first, timeSignature) || noteCrossesInternalBoundary(second, timeSignature)) return false;
        return beatGroupIndexForBeat(first.beat ?? 0, timeSignature) === beatGroupIndexForBeat(second.beat ?? 0, timeSignature);
      }
      if (timeSignature.id === "6/8") {
        return beatGroupIndexForBeat(first.beat ?? 0, timeSignature) === beatGroupIndexForBeat(second.beat ?? 0, timeSignature);
      }
      return true;
    }

    function getQuaverGroups(notes, timeSignature = null) {
      const groups = [];
      let index = 0;
      while (index < notes.length) {
        if (!isBeamableRhythm(displayRhythmForNote(notes[index]))) {
          index += 1;
          continue;
        }
        const start = index;
        while (isBeamableRhythm(displayRhythmForNote(notes[index + 1]))) {
          if (!notesShareBeamGroup(notes[index], notes[index + 1], timeSignature)) break;
          index += 1;
        }
        let groupStart = start;
        while (groupStart <= index) {
          const remaining = index - groupStart + 1;
          const groupSize = timeSignature?.id === "5/4" ? remaining : remaining === 5 ? 3 : remaining >= 4 ? 4 : remaining;
          const groupEnd = groupStart + groupSize - 1;
          if (groupEnd > groupStart) groups.push({ start: groupStart, end: groupEnd });
          groupStart = groupEnd + 1;
        }
        index += 1;
      }
      return groups;
    }

    function groupContaining(groups, index) {
      return groups.find((group) => index >= group.start && index <= group.end) ?? null;
    }

    function secondaryBeamSegments(groupNotes) {
      const segments = [];
      let segmentStart = null;
      groupNotes.forEach((note, index) => {
        const isSemiquaver = note?.rhythm === "semiquaver";
        const nextIsSemiquaver = groupNotes[index + 1]?.rhythm === "semiquaver";
        if (isSemiquaver && segmentStart === null) segmentStart = index;
        if (segmentStart !== null && (!nextIsSemiquaver || index === groupNotes.length - 1)) {
          segments.push({ startIndex: segmentStart, endIndex: index, isHook: index === segmentStart });
          segmentStart = null;
        }
      });
      return segments;
    }

    function getStem(x, y, step, down, forcedEndY = null, visualScale = 1) {
      const stemLength = STAFF.gap * 3.1 * visualScale;
      const stemXOffset = STAFF.gap * 0.6 * visualScale;
      return {
        down,
        stemX: x + (down ? -stemXOffset : stemXOffset),
        startY: y + (down ? 0.5 : -0.5),
        endY: forcedEndY ?? (down ? y + stemLength : y - stemLength),
      };
    }

    function groupHasDownStems(notes, clef = "treble") {
      let down = 0;
      let up = 0;
      notes.forEach((note) => stemDown(displayStep(note, clef)) ? down += 1 : up += 1);
