            style={{
              position: "absolute",
              left: `${((x - SVG.x) / SVG.width) * 100}%`,
              top: `${((y + scoreOffsetY) / scoreHeight) * 100}%`,
              width: `${(overlayWidth / SVG.width) * 100}%`,
              height: `${(answerBoxHeight / scoreHeight) * 100}%`,
              pointerEvents: "auto",
              zIndex: 20,
            }}
            onPointerDown={(event) => event.stopPropagation()}
            onMouseDown={(event) => event.stopPropagation()}
            onClick={(event) => event.stopPropagation()}
          >
            <input
              type="text"
              value={chordValue}
              disabled={disabled}
              autoComplete="off"
              onFocus={selectChordQuestion}
              onPointerDown={(event) => {
                event.stopPropagation();
                selectChordQuestion();
                event.currentTarget.focus();
              }}
              onClick={(event) => {
                event.stopPropagation();
                selectChordQuestion();
              }}
              onKeyDown={(event) => event.stopPropagation()}
              onChange={(event) => {
                const nextValue = formatHigherChordAnswer(event.target.value);
                updateAhChordAnswer("chord", nextValue);
              }}
              style={{
                ...inputBaseStyle,
                height: `${chordRowHeight}px`,
                fontSize: "14px",
              }}
            />
            <input
              type="text"
              value={inversionValue}
              disabled={disabled}
              autoComplete="off"
              maxLength={13}
              onFocus={selectChordQuestion}
              onPointerDown={(event) => {
                event.stopPropagation();
                selectChordQuestion();
                event.currentTarget.focus();
              }}
              onClick={(event) => {
                event.stopPropagation();
                selectChordQuestion();
              }}
              onKeyDown={(event) => event.stopPropagation()}
              onChange={(event) => updateAhChordAnswer("inversion", formatTextAnswer(event.target.value).slice(0, 13))}
              style={{
                ...inputBaseStyle,
                height: `${inversionRowHeight}px`,
                borderTop: "none",
                fontSize: inversionInputFontSize,
              }}
            />
            {feedbackResult && correct === false && (
              <>
                <span
                  style={{
                    position: "absolute",
                    left: 0,
                    bottom: `${answerBoxHeight - 1}px`,
                    width: `${inputWidth}px`,
                    color: COLOUR.green,
                    fontSize: "11px",
                    fontWeight: 700,
                    lineHeight: "12px",
                    textAlign: "center",
                    whiteSpace: "nowrap",
                    pointerEvents: "none",
                  }}
                >
                  {`${higherChordShortName(question, slot.chordSymbol)} or ${slot.chordSymbol}`}
                </span>
                <span
                  style={{
                    position: "absolute",
                    left: 0,
                    top: `${answerBoxHeight + 2}px`,
                    width: `${inputWidth}px`,
                    color: COLOUR.green,
                    fontSize: "11px",
                    fontWeight: 700,
                    lineHeight: "12px",
                    textAlign: "center",
                    whiteSpace: "nowrap",
                    pointerEvents: "none",
                  }}
                >
                  {advancedHigherInversionAnswerLabel(slot.inversion)}
                </span>
              </>
            )}
          </div>
        );
      }

      function labelledBoxText(sourceId, label) {
        const part = findPartBySource(sourceId);
        return part?.label ? `(${part.label}) ${label}` : label;
      }

      function repeatPlacementPosition(placement) {
        const top = scoreSystemTop(placement.barIndex);
        const start = barStart(placement.barIndex);
        const width = barWidth(placement.barIndex);
        const end = start + width;
        if (placement.anchor === "above") return { top, start, end, width, x: start + 10, y: top - 38 };
        if (placement.anchor === "start") return { top, start, end, width, x: start - 4, y: top };
        return { top, start, end, width, x: end + (placement.barIndex === BAR_COUNT - 1 ? 6 : 4), y: top };
      }

      function StartRepeatGlyph({ placement, colour = "currentColor", opacity = 1 }) {
        const pos = repeatPlacementPosition(placement);
        return <CalibratedSymbol symbolKey="repeatLeft" x={pos.x + STAFF.gap * 1.1 - 8} y={pos.top + STAFF.gap * 2.9} colour={colour} opacity={opacity} />;
      }

      function EndRepeatGlyph({ placement, colour = "currentColor", opacity = 1 }) {
        const pos = repeatPlacementPosition(placement);
        return <CalibratedSymbol symbolKey="repeatRight" x={pos.x - STAFF.gap * 1.1 + 3} y={pos.top + STAFF.gap * 2.9} colour={colour} opacity={opacity} />;
      }

      function TimeBarGlyph({ placement, label = "1.", colour = "currentColor", opacity = 1 }) {
        const pos = repeatPlacementPosition(placement);
        const spansBarsSixAndSeven = placement.symbolId === "first-time" && placement.barIndex === 5;
        const bracketEnd = spansBarsSixAndSeven ? barStart(6) + barWidth(6) - 4 : pos.start + Math.min(92, pos.width - 22);
        const width = bracketEnd - (pos.start + 9);
        const xOffset = placement.symbolId === "first-time" || placement.symbolId === "second-time" ? -10 : 0;
        return (
          <g opacity={opacity} stroke={colour} fill="none" strokeWidth="2" strokeLinecap="square" transform={`translate(${xOffset} 0)`}>
            <path d={`M ${pos.start + 9} ${pos.top - 24} L ${pos.start + 9} ${pos.top - 35} L ${pos.start + 9 + width} ${pos.top - 35}`} />
            <text x={pos.start + 17} y={pos.top - 38} fill={colour} stroke="none" fontFamily="serif" fontSize="18" fontWeight="400">{label}</text>
          </g>
        );
      }

      function RepeatMarker({ placement, colour = "currentColor", opacity = 1 }) {
        if (placement.symbolId === "start-repeat") return <StartRepeatGlyph placement={placement} colour={colour} opacity={opacity} />;
        if (placement.symbolId === "dc") {
          const pos = repeatPlacementPosition(placement);
          return <text x={pos.start + pos.width - 20} y={pos.top - 30} fill={colour} opacity={opacity} fontFamily="serif" fontSize="22" fontWeight="700" textAnchor="middle">D.C.</text>;
        }
        if (placement.symbolId === "ds") {
          const pos = repeatPlacementPosition(placement);
          return <text x={pos.start + pos.width - 48} y={pos.top - 20} fill={colour} opacity={opacity} fontFamily="Georgia, serif" fontSize="15" fontStyle="italic" fontWeight="700" textAnchor="middle" style={{ paintOrder: "stroke", stroke: "white", strokeWidth: 6, strokeLinejoin: "round" }}>D.S. al Fine</text>;
        }
        if (placement.symbolId === "fine") {
          const pos = repeatPlacementPosition(placement);
          return <text x={pos.start + pos.width - 28} y={pos.top - 30} fill={colour} opacity={opacity} fontFamily="Georgia, serif" fontSize="18" fontStyle="italic" fontWeight="700" textAnchor="middle" style={{ paintOrder: "stroke", stroke: "white", strokeWidth: 6, strokeLinejoin: "round" }}>Fine</text>;
        }
        if (placement.symbolId === "segno") {
          const pos = repeatPlacementPosition(placement);
          return <CalibratedSymbol symbolKey="segno" x={pos.start + 18} y={pos.top - 24} colour={colour} opacity={opacity} settingOverrides={{ fontSizeScale: 2.6 }} />;
        }
        if (placement.symbolId === "first-time") return <TimeBarGlyph placement={placement} label="1." colour={colour} opacity={opacity} />;
        if (placement.symbolId === "second-time") return <TimeBarGlyph placement={placement} label="2." colour={colour} opacity={opacity} />;
        return <EndRepeatGlyph placement={placement} colour={colour} opacity={opacity} />;
      }

      function PlacedAccidental({ placement, positions, bar, top, colour = "currentColor", opacity = 1, feedbackPosition = false }) {
        const note = bar.notes[placement.noteIndex];
        if (!note) return null;
        const option = ACCIDENTAL_PLACEMENT_OPTIONS.find((item) => item.id === placement.symbolId);
        if (!option) return null;
        const accidentalX = feedbackPosition
          ? positions[placement.noteIndex]
          : positions[placement.noteIndex] - STAFF.gap * 1.75;
        const accidentalY = feedbackPosition
          ? top + STAFF.gap * 5.45
          : yForStep(displayStep(note, question.clef), top);
        return (
          <Accidental
            value={option.value}
            x={accidentalX}
            y={accidentalY}
            colour={colour}
            opacity={opacity}
            letter={note.letter}
            flatOffsetX={feedbackPosition ? 0 : -2}
          />
        );
      }

      function articulationSymbolKey(id, down) {
        if (id === "staccato") return down ? "staccatoBelow" : "staccatoAbove";
        if (id === "accent") return down ? "accentBelow" : "accentAbove";
        return null;
      }

      function articulationYOffsetTowardNote(symbolKey) {
        if (symbolKey === "staccatoAbove") return -6;
        if (symbolKey === "staccatoBelow") return 2;
        if (symbolKey === "accentAbove") return -5;
        if (symbolKey === "accentBelow") return 1;
        return 0;
      }

      function articulationStemDownForNote(bar, positions, noteIndex, top) {
        const note = bar.notes[noteIndex];
        const noteStep = displayStep(note, question.clef);
        const group = groupContaining(getQuaverGroups(bar.notes, timeSignatureForBar(question, bar)), noteIndex);
        if (!group) return stemDown(noteStep);
        const groupNotes = bar.notes.slice(group.start, group.end + 1);
        const groupPositions = positions.slice(group.start, group.end + 1);
        if (!groupNotes.every(Boolean)) return stemDown(noteStep);
        return getBeam(groupNotes, groupPositions, top, null, question.clef).down;
      }

      function ArticulationMarker({ markingId, selection, positions, bar, top, colour = "currentColor", opacity = 1 }) {
        const note = bar.notes[selection.noteIndex];
        if (!note) return null;
        const x = positions[selection.noteIndex];
        const noteStep = displayStep(note, question.clef);
        const noteY = yForStep(noteStep, top);
        const down = articulationStemDownForNote(bar, positions, selection.noteIndex, top);
        if (markingId === "staccato" || markingId === "accent") {
          const symbolKey = articulationSymbolKey(markingId, down);
          return (
            <CalibratedSymbol
              symbolKey={symbolKey}
              x={x}
              y={noteY}
              colour={colour}
              opacity={opacity}
              settingOverrides={{ opticalYOffset: articulationYOffsetTowardNote(symbolKey) }}
            />
          );
        }
        const endBar = Number.isInteger(selection.endBarIndex) ? question.bars[selection.endBarIndex] : bar;
        const endPositions = endBar === bar ? positions : displayPositionsForBar(endBar);
        const nextIndex = Number.isInteger(selection.endNoteIndex)
          ? selection.endNoteIndex
          : Math.min(bar.notes.length - 1, selection.noteIndex + 1);
        const nextNote = endBar?.notes?.[nextIndex] ?? note;
        const nextX = endPositions?.[nextIndex] ?? x + 34;
        const nextY = yForStep(displayStep(nextNote, question.clef), top);
        const phrase = markingId === "phrase";
        const settings = sharedSymbolConfig(phrase ? "phraseMarking" : (down ? "slurStemDown" : "slurStemUp"));
        const direction = down ? -1 : 1;
        const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
        const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
        const fontScale = Number(settings.fontSizeScale || 5);
        const widthScale = Number(settings.widthScale || 1);
        const heightScale = Number(settings.heightScale || 1);
        const sizeRatio = clamp(fontScale / 5.3, 0.55, 1.8);
        const endpointGap = STAFF.gap * (phrase ? 1.4 : 1.05) * sizeRatio;
        const x1 = x + xOffset;
        const x2 = nextX + xOffset;
        const y1 = noteY + direction * endpointGap + yOffset;
        const y2 = nextY + direction * endpointGap + yOffset;
        const span = Math.max(STAFF.gap * 1.4, Math.abs(x2 - x1));
        const handleWidth = span * 0.28 * clamp(widthScale, 0.35, 2.5);
        const depth = direction * STAFF.gap * (phrase ? 2.1 : 1.75) * clamp(heightScale, 0.35, 2.5) * sizeRatio;
        const strokeWidth = Math.max(1.1, STAFF.gap * 0.13 * sizeRatio);
        return (
          <path
            d={`M${x1} ${y1} C${x1 + handleWidth} ${y1 + depth}, ${x2 - handleWidth} ${y2 + depth}, ${x2} ${y2}`}
            fill="none"
            stroke={colour}
            strokeWidth={strokeWidth}
            strokeLinecap="round"
            opacity={opacity}
          />
        );
      }

      function BarlineMarker({ placement, colour = "currentColor", opacity = 1, dashed = false }) {
        const top = scoreSystemTop(placement.barIndex);
        const x = placement.x ?? (barStart(placement.barIndex) + barWidth(placement.barIndex));
        return <line x1={x} x2={x} y1={top} y2={top + STAFF.gap * 4} stroke={colour} strokeWidth="2" opacity={opacity} strokeDasharray={dashed ? "4 4" : undefined} />;
      }

      function OctaveMeaningMarker({ target, start, end, top }) {
        if (!target?.symbol) return null;
        const isBelow = target.symbol === "8vb";
        const label = isBelow ? sharedSymbolForKey("ottavaBassa") || "\uE51C" : sharedSymbolForKey("ottavaAlta") || "\uE512";
        const y = isBelow ? top + STAFF.gap * 6.25 + 20 : top - STAFF.gap * 2.45 - 5;
        const lineStart = start + 54;
        const lineEnd = end - 16;
        const hook = STAFF.gap * 0.85;
        return (
          <g pointerEvents="none" fill="none" stroke="currentColor" strokeWidth="1.45" strokeLinecap="round">
            <text
              className="music-symbol"
              x={start + 8}
              y={y + (isBelow ? 3 : 0)}
              fill="currentColor"
              stroke="none"
              fontSize="36"
              textAnchor="start"
              dominantBaseline="middle"
            >
              {label}
            </text>
            <line x1={lineStart} x2={lineEnd} y1={y} y2={y} strokeDasharray="4 4" />
            <line x1={lineEnd} x2={lineEnd} y1={y} y2={isBelow ? y - hook : y + hook} />
          </g>
        );
      }

      function TripletMarker({ placement, positions, colour = "currentColor", opacity = 1, dashed = false }) {
        const startIndex = placement.startIndex ?? placement.noteIndex;
        const x1 = positions[startIndex] - 10;
        const x2 = positions[startIndex + 2] + 10;
        if (!Number.isFinite(x1) || !Number.isFinite(x2)) return null;
        const top = scoreSystemTop(placement.barIndex);
        if (placement.tripletKind === "quaverTriplet") {
          const bar = question.bars[placement.barIndex];
          const groupNotes = bar?.notes?.slice(startIndex, startIndex + 3) ?? [];
          const groupPositions = positions.slice(startIndex, startIndex + 3);
          const beam = groupNotes.length === 3 ? getBeam(groupNotes, groupPositions, top, null, question.clef) : null;
          const centreX = positions[startIndex + 1];
          const beamY = beam ? beamYAtX(centreX, beam) : top - STAFF.gap * 2.1;
          const x = centreX + (beam?.down ? -5 : 3);
          const y = beamY - STAFF.gap * 0.85 + (beam?.down ? 23 : 0);
          return (
            <text
              x={x}
              y={y}
              fill={colour}
              opacity={opacity}
              fontFamily="serif"
              fontSize="18"
              fontWeight="900"
              textAnchor="middle"
              dominantBaseline="middle"
            >
              3
            </text>
          );
        }
        const y = top - STAFF.gap * 2.1;
        const tick = STAFF.gap * 0.7;
        const centre = (x1 + x2) / 2;
        const gap = 14;
        return (
          <g opacity={opacity} stroke={colour} fill="none" strokeWidth="1.7" strokeLinecap="round" strokeDasharray={dashed ? "4 4" : undefined}>
            <path d={`M ${x1} ${y + tick} L ${x1} ${y} L ${centre - gap} ${y}`} />
            <path d={`M ${centre + gap} ${y} L ${x2} ${y} L ${x2} ${y + tick}`} />
            <text x={centre} y={y + 1} fill={colour} stroke="none" fontFamily="serif" fontSize="18" fontWeight="700" textAnchor="middle" dominantBaseline="middle">3</text>
          </g>
        );
      }

      return (
        <div className={`relative ${question.questionType === "practicePaper" && question.bars.length > 8 ? "w-[764px] max-w-none shrink-0" : "w-[84%]"}`}>
        <svg viewBox={`${SVG.x} 0 ${SVG.width} ${scoreHeight}`} className="block h-auto w-full select-none overflow-visible">
          <rect x={SVG.x} width={SVG.width} height={scoreHeight} fill="white" />
          <g transform={scoreOffsetY ? `translate(0 ${scoreOffsetY})` : undefined}>
          {systems.map((top, systemIndex) => <Staff key={systemIndex} top={top} systemIndex={systemIndex} question={question} showTimeSignature={showWrittenTimeSignature} />)}
          {question.questionType === "practicePaper" && (
            <>
              {selectedTimeSignature && (
                <TimeSignature
                  signature={selectedTimeSignature}
                  top={asksTimeChange ? scoreSystemTop(question.timeChangeTarget.barIndex) : systems[0] ?? STAFF.topA}
                  colour={timeSignatureColour}
                  xOverride={asksTimeChange ? barStart(question.timeChangeTarget.barIndex) + 28 : null}
                />
              )}
              {tempoQuestionRevealed && question.tempoQuestion && (
                <text
                  x={STAFF.left + 54}
                  y={(systems[0] ?? STAFF.topA) - 35}
                  fill={COLOUR.green}
                  fontSize="18"
                  fontStyle="italic"
                  fontWeight="700"
                  textAnchor="start"
                >
                  {question.tempoQuestion.label}
                </text>
              )}
            </>
          )}
          {question.bars.map((bar) => {
            const top = scoreSystemTop(bar.barIndex);
            const start = barStart(bar.barIndex);
            const end = start + barWidth(bar.barIndex);
            const positions = displayPositionsForBar(bar);
            const barTimeSignature = timeSignatureForBar(question, bar);
            const isTarget = bar.barIndex === question.targetBar;
            const missingNotesPart = question.subquestions?.find((part) => part.type === "notes");
            const intervalInsertPart = question.subquestions?.find((part) => part.type === "intervalInsert");
            const isIntervalInsertTarget = Boolean(intervalInsertPart && question.intervalInsertTarget?.barIndex === bar.barIndex);
            const isMissingTarget = Boolean((missingNotesPart && isTarget) || isIntervalInsertTarget);
            const missingNoteIndices = missingNotesPart && isTarget ? missingNoteIndicesForQuestion(question) : [];
            const missingFeedback = sourceIsRevealed("missing");
            const intervalInsertFeedback = sourceIsRevealed("interval");
            const targetUserNotes = isIntervalInsertTarget
              ? bar.notes.map((note, index) => index === question.intervalInsertTarget.answerIndex ? userNoteAt(userNotes, bar.barIndex, index) ?? null : { ...note, colour: "currentColor" })
              : bar.notes.map((note, index) => missingNoteIndices.includes(index) ? userNoteAt(userNotes, bar.barIndex, index) : { ...note, colour: "currentColor" });
            const isPracticePaper = question.questionType === "practicePaper";
            const dynamicNoteX = (positions[0] ?? start + 30) + 8;
            const dynamicNoteY = top + DYNAMIC_STAVE_OFFSET;
            const dynamicSymbolY = dynamicNoteY + DYNAMIC_SYMBOL_Y_OFFSET;
            const sharedBoxY = top - 42 - BOX_LABEL_BAND_HEIGHT + MARKING_BOX_Y_OFFSET;
            const missingNoteRange = missingNoteRangeForLevel(question.level);
            const missingInputTop = yForStep(missingNoteRange.max.step, top) - STAFF.gap * 3;
            const missingInputBottom = yForStep(missingNoteRange.min.step, top) + STAFF.gap * 7;
            const intervalInsertFirstIndex = isIntervalInsertTarget ? question.intervalInsertTarget.firstIndex : null;
            const intervalInsertAnswerIndex = isIntervalInsertTarget ? question.intervalInsertTarget.answerIndex : null;
            const intervalInsertLeftX = isIntervalInsertTarget
              ? Math.min(positions[intervalInsertFirstIndex] ?? start, positions[intervalInsertAnswerIndex] ?? start)
              : 0;
            const intervalInsertRightX = isIntervalInsertTarget
              ? Math.max(positions[intervalInsertFirstIndex] ?? start, positions[intervalInsertAnswerIndex] ?? start)
              : 0;
            const intervalInsertBoxX = Math.max(start + 4, intervalInsertLeftX - 18);
            const intervalInsertBoxRight = Math.min(end - 4, intervalInsertRightX + 18);
            const missingNoteXs = missingNoteIndices.map((index) => positions[index]).filter((x) => Number.isFinite(x));
            const missingNoteBoxLeft = missingNoteXs.length ? Math.max(start + 4, Math.min(...missingNoteXs) - 18) : start + 4;
            const missingNoteBoxRight = missingNoteXs.length ? Math.min(end - 4, Math.max(...missingNoteXs) + 18) : end - 4;
            const missingNoteBoxWidth = Math.max(58, missingNoteBoxRight - missingNoteBoxLeft);
            const missingNoteBoxCentre = (missingNoteBoxLeft + missingNoteBoxRight) / 2;
            const missingNoteBoxX = missingNoteXs.length
              ? clamp(missingNoteBoxCentre - missingNoteBoxWidth / 2, start + 4, Math.max(start + 4, end - 4 - missingNoteBoxWidth))
              : start + 4;
            const missingBoxX = isIntervalInsertTarget ? intervalInsertBoxX : missingNoteBoxX;
            const missingBoxY = sharedBoxY - 15;
            const missingBoxHeight = MARKING_BOX_HEIGHT + 15;
            const missingBoxWidth = isIntervalInsertTarget
              ? Math.max(58, intervalInsertBoxRight - intervalInsertBoxX)

            const slots = question.advancedHigherChordTarget?.identifySlots ?? [];
            const top = scoreSystemTop(slot.barIndex);
            const start = barStart(slot.barIndex);
            const end = start + barWidth(slot.barIndex);
            const chordBoxGroupX = start + 4;
            const chordBoxGroupWidth = Math.max(58, end - chordBoxGroupX - 4);
            const chordBoxWidth = Math.min(74, chordBoxGroupWidth / 2);
            const sortedSlots = [...slots].sort((first, second) => (first.slotIndex ?? 0) - (second.slotIndex ?? 0));
            const slotPosition = Math.max(0, sortedSlots.findIndex((item) => item.slotIndex === slot.slotIndex));
            const chordBoxGap = Math.min(12, Math.max(0, chordBoxGroupWidth - chordBoxWidth * sortedSlots.length));
            const totalBoxWidth = chordBoxWidth * sortedSlots.length + chordBoxGap * Math.max(0, sortedSlots.length - 1);
            const lockedGroupLeft = chordBoxGroupX + Math.max(0, chordBoxGroupWidth - totalBoxWidth) * 0.68 - 10;
            const x = sortedSlots.length === 2
              ? lockedGroupLeft + slotPosition * (chordBoxWidth + chordBoxGap)
              : chordBoxGroupX + (chordBoxGroupWidth - chordBoxWidth) / 2;

                      lineHeight: "30px",

                  y,
                  width: chordBoxWidth,
                  value,
                  disabled: Boolean(feedback),
                  feedbackResult: feedback?.results?.[part.id],

    function PracticeQuestionPanel({ question, activeIndex, setActiveIndex, practiceAnswers, setPracticeAnswers, userNotes, setUserNotes, feedback, prompt, canConfirm, isPlaying, playsRemaining, limitPlays, showAudioQuestionGlyphs, onPlayClick, onConfirm, onPlaceDynamic, onNextQuestion }) {
      const [viewAllQuestions, setViewAllQuestions] = useState(false);
      const [carousel, setCarousel] = useState({ fromIndex: null, toIndex: activeIndex, direction: "next", key: 0 });
      const [focusedTextAnswerId, setFocusedTextAnswerId] = useState(null);
      const previousActiveIndexRef = useRef(activeIndex);
      const previousQuestionIdRef = useRef(question.id);
      const questionRefs = useRef({});
      const results = feedback?.results ?? {};
      const activePart = question.subquestions[activeIndex] ?? question.subquestions[0];
      const displayedPart = question.subquestions[carousel.toIndex] ?? activePart;
      const exitingPart = carousel.fromIndex !== null ? question.subquestions[carousel.fromIndex] : null;
      const totalParts = question.subquestions.length;
      const playsAvailable = !limitPlays || playsRemaining > 0 || isPlaying;

      useEffect(() => {
        if (feedback) setViewAllQuestions(true);
      }, [feedback]);

      useEffect(() => {
        const id = feedback?.revealingPartId;
        if (!id) return;
        const element = questionRefs.current[id];
        element?.scrollIntoView?.({ behavior: "smooth", block: "center" });
      }, [feedback?.revealingPartId]);

      useEffect(() => {
        if (previousQuestionIdRef.current !== question.id) {
          previousQuestionIdRef.current = question.id;
          previousActiveIndexRef.current = activeIndex;
          setViewAllQuestions(false);
          setCarousel({ fromIndex: null, toIndex: activeIndex, direction: "next", key: 0 });
          return undefined;
        }

        const previousIndex = previousActiveIndexRef.current;
        if (previousIndex === activeIndex) return undefined;

        const previousPart = question.subquestions[previousIndex];
        if ((previousPart?.sourceId ?? previousPart?.id) === "repeatSigns") {
          setPracticeAnswers((current) => {
            const answer = makePlacementAnswer(current[previousPart.id], { selectedSymbolId: null, placements: [] });
            if (answer.selectedSymbolId !== "dc") return current;
            return {
              ...current,
              [previousPart.id]: {
                ...answer,
                selectedSymbolId: null,
              },
            };
          });
        }

        const direction = activeIndex > previousIndex ? "next" : "previous";
        previousActiveIndexRef.current = activeIndex;
        setCarousel((current) => ({
          fromIndex: viewAllQuestions ? null : previousIndex,
          toIndex: activeIndex,
          direction,
          key: current.key + 1,
        }));

        const timer = window.setTimeout(() => {
          setCarousel((current) => ({ ...current, fromIndex: null }));
        }, 230);
        return () => window.clearTimeout(timer);
      }, [activeIndex, question.id]);

      function questionFeedbackIcon(id) {
        const partResult = results[id];
        if (!partResult) return null;
        const correct = Boolean(partResult.correct);
        const src = correct ? ASSET.tick : ASSET.cross;
        return (
          <span
            aria-label={correct ? "Correct" : "Incorrect"}
            className={`ml-[11px] inline-block ${correct ? "h-6 w-6 align-[-4px] bg-green-700" : "h-7 w-7 align-[-7px] bg-red-700"}`}
            style={{
              WebkitMask: `url(${src}) center / contain no-repeat`,
              mask: `url(${src}) center / contain no-repeat`,
            }}
          />
        );
      }

      function inputState(id) {
        const partResult = results[id];
        if (!partResult) return null;
        return { correct: Boolean(partResult.correct) };
      }

      function textAnswerWithMusicAccidentals(value) {
        const text = String(value ?? "");
        if (!/[A-Ga-g]b/.test(text)) return null;
        const flatGlyph = SHARED_SYMBOLS.flat ?? "♭";
        const parts = [];
        let lastIndex = 0;
        text.replace(/([A-Ga-g])b/g, (match, letter, offset) => {
          if (offset > lastIndex) parts.push(text.slice(lastIndex, offset));
          parts.push(letter.toUpperCase());
          parts.push(
            <span key={`flat-${offset}`} className="music-symbol inline-block align-baseline leading-none" style={{ transform: "translateY(-0.16em)" }} aria-hidden="true">
              {flatGlyph}
            </span>
          );
          lastIndex = offset + match.length;
          return match;
        });
        if (lastIndex < text.length) parts.push(text.slice(lastIndex));
        return parts;
      }

      function textAnswerOverlayColour(id) {
        const state = inputState(id);
        if (!state) return "#1c1917";
        return state.correct ? COLOUR.green : COLOUR.red;
      }

      function renderTextAnswerInput(part, partIndex) {
        const value = practiceAnswers[part.id] ?? "";
        const formattedValue = focusedTextAnswerId === part.id ? null : textAnswerWithMusicAccidentals(value);
        return (
          <span className={`relative inline-block max-w-full ${ANSWER_TEXTBOX_SIZE_CLASS}`}>
            <input
              value={value}
              disabled={Boolean(feedback)}
              onFocus={() => {
                setActiveIndex(partIndex);
                setFocusedTextAnswerId(part.id);
              }}
              onBlur={() => setFocusedTextAnswerId((current) => current === part.id ? null : current)}
              onChange={(event) => setPracticeAnswers((current) => ({ ...current, [part.id]: formatTextAnswer(event.target.value) }))}
              placeholder="Type your answer"
              className={window.MLH.typedAnswerClass(inputState(part.id), ANSWER_TEXTBOX_SIZE_CLASS)}
              style={formattedValue ? { color: "transparent", caretColor: "#1c1917" } : null}
            />
            {formattedValue && (
              <span
                aria-hidden="true"
                className="pointer-events-none absolute left-4 top-1/2 text-base font-semibold leading-none"
                style={{ color: textAnswerOverlayColour(part.id), whiteSpace: "pre", transform: "translateY(calc(-50% + 2px))" }}
              >
                {formattedValue}
              </span>
            )}
          </span>
        );
      }

      function finalFeedbackNextQuestionButton(part, index) {
        return null;
      }

      function clearSubquestion(part) {
        if (feedback) return;
        const sourceId = part.sourceId ?? part.id;
        if (sourceId === "missing") {
          setUserNotes((current) => Object.fromEntries(Object.entries(current).filter(([key]) => !key.startsWith(`${question.targetBar}:`))));
          return;
        }
        if (part.type === "intervalInsert") {
          setUserNotes((current) => {
            const key = noteAnswerKey(question.intervalInsertTarget?.barIndex, question.intervalInsertTarget?.answerIndex);
            const next = { ...current };
            delete next[key];
            return next;
          });
          return;
        }
        if (part.type === "higherChord") {
          setPracticeAnswers((current) => ({ ...current, [part.id]: null }));
          return;
        }
        if (sourceId === "dynamic" && part.type === "dynamic") {
          setPracticeAnswers((current) => ({ ...current, [part.id]: "" }));
          onPlaceDynamic(null);
          return;
        }
        if (["repeatSigns", "barlines", "rhythmicDictation", "rhythmIdentification", "accidentals", "enharmonics", "articulation", "transposition", "ahChord", "ahBassLine"].includes(sourceId) || part.type === "scotchSnap" || part.type === "rhythmFix") {
          setPracticeAnswers((current) => ({ ...current, [part.id]: null }));
          return;
        }
        setPracticeAnswers((current) => ({ ...current, [part.id]: "" }));
      }

      function clearAllQuestions() {
        if (feedback) return;
        setUserNotes({});
        setPracticeAnswers({});
        onPlaceDynamic(null);
      }

      function activePartHasAnswer() {
        if (activePart.type === "notes") return Boolean(missingNoteIndicesForQuestion(question).some((index) => userNoteAt(userNotes, question.targetBar, index)));
        if (activePart.type === "intervalInsert") return Boolean(userNoteAt(userNotes, question.intervalInsertTarget?.barIndex, question.intervalInsertTarget?.answerIndex));
        if (activePart.type === "dynamic") return Boolean(question.placedDynamic || practiceAnswers[activePart.id]);
        if (activePart.type === "repeat") return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { placements: [] }).placements?.length);
        if (activePart.type === "barlines") return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { placements: [] }).placements?.length);
        if (activePart.type === "rhythm" || activePart.type === "rhythmFix") return Boolean(Object.keys(makePlacementAnswer(practiceAnswers[activePart.id], { placements: {} }).placements ?? {}).length);
        if (activePart.type === "scotchSnap") return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { selected: null }).selected);
        if (activePart.type === "accidentalPlacement") return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { placements: [] }).placements?.length);
        if (activePart.type === "articulationPlacement") return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { placements: [] }).placements?.length);
        if (activePart.type === "transposition") {
          const value = makePlacementAnswer(practiceAnswers[activePart.id], { notes: {} });
          return Object.keys(value.notes ?? {}).length > 0;
        }
        if (activePart.type === "enharmonic") {
          return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { note: null }).note);
        }
        if (activePart.type === "higherChord") {
          const answers = makePlacementAnswer(practiceAnswers[activePart.id], { answers: {} }).answers ?? {};
          return (question.higherChordTargets ?? []).some((barIndex) => String(answers[barIndex] ?? "").trim());
        }
        if (activePart.type === "ahChord") {
          const answers = makePlacementAnswer(practiceAnswers[activePart.id], { chordAnswers: {} }).chordAnswers ?? {};
          return Object.values(answers).some((answer) => String(advancedHigherChordAnswerValue(answer)).trim() || String(advancedHigherInversionAnswerValue(answer)).trim());
        }
        if (activePart.type === "ahBassLine") {
          return Boolean(Object.keys(makePlacementAnswer(practiceAnswers[activePart.id], { bassNotes: {} }).bassNotes ?? {}).length);
        }
        return Boolean(String(practiceAnswers[activePart.id] ?? "").trim());
      }

      function hasAnyAnswer() {
        return Object.keys(userNotes).length > 0
          || Boolean(question.placedDynamic)
          || Object.values(practiceAnswers).some((value) => typeof value === "object" ? Boolean(value && JSON.stringify(value) !== "{}") : String(value ?? "").trim());
      }

      function timeSignatureButtonClass(signature, selected, part) {
        const revealed = Boolean(results[part.id]);
        const isCorrect = revealed && signature.id === part.answer;
        const isWrong = revealed && selected && !isCorrect;
        if (isCorrect) return "border-green-700 bg-green-600 text-white";
        if (isWrong) return "border-red-700 bg-red-600 text-white";
        if (revealed) return "border-stone-300 bg-white text-stone-900 opacity-60";
        if (selected) return "border-stone-950 bg-stone-950 text-white";
        return "border-stone-300 bg-white text-stone-900 hover:bg-stone-50";
      }

      function choiceButtonClass(option, selected, part) {
        const revealed = Boolean(results[part.id]);
        const isCorrect = revealed && option === part.answer;
        const isWrong = revealed && selected && !isCorrect;
        if (isCorrect) return "border-green-700 bg-green-600 text-white";
        if (isWrong) return "border-red-700 bg-red-600 text-white";
        if (revealed) return "border-stone-300 bg-white text-stone-900 opacity-60";
        if (selected) return "border-stone-950 bg-stone-950 text-white";
        return "border-stone-300 bg-white text-stone-900 hover:bg-stone-50";
      }

      function answerButtonPress(event, action) {
        if (feedback) return;
        if (event?.type === "pointerdown") {
          if (event.button !== undefined && event.button !== 0) return;
          event.preventDefault();
        }
        action();
      }

      function answerButtonKeyboardClick(event, action) {
        if (event.detail !== 0) return;
        answerButtonPress(event, action);
      }

      function TimeSignatureChoiceButton({ signature, part, partIndex }) {
        const selected = practiceAnswers[part.id] === signature.id;
        const topGlyph = String(signature.top).split("").map((digit) => sharedSymbolForKey(`timeSig${digit}`)).join("");
        const bottomGlyph = sharedSymbolForKey(`timeSig${signature.bottom}`);
        const topFontSize = signature.top === 12 ? 52 : signature.top >= 10 ? 48 : 56;
        const chooseSignature = () => {
          setActiveIndex(partIndex);
          setPracticeAnswers((current) => ({ ...current, [part.id]: signature.id }));
        };
        return (
          <button
            type="button"
            disabled={Boolean(feedback)}
            onPointerDown={(event) => answerButtonPress(event, chooseSignature)}
            onClick={(event) => answerButtonKeyboardClick(event, chooseSignature)}
            className={`answer-choice-button flex h-[74px] w-[108px] shrink-0 items-center justify-center rounded-xl border px-2 text-sm transition ${timeSignatureButtonClass(signature, selected, part)}`}
            aria-label={signature.id}
          >
            <svg viewBox="0 0 76 84" className="h-16 w-14 overflow-visible" aria-hidden="true">
              <text className="music-symbol" x="38" y="24" textAnchor="middle" fontSize={topFontSize} fontWeight="400" fill="currentColor">{topGlyph}</text>
              <text className="music-symbol" x="38" y="63" textAnchor="middle" fontSize="56" fontWeight="400" fill="currentColor">{bottomGlyph}</text>
            </svg>
          </button>
        );
      }

      function DynamicChoiceGlyph({ dynamic, backdrop = true }) {
        const glyph = sharedSymbolForKey(dynamic.symbolKey);
        const x = dynamic.symbolKey === "forte" ? 53 : 50;
        return (
          <svg viewBox="0 0 100 54" className="h-[58px] w-24 overflow-visible" aria-hidden="true">
            {backdrop && <text
              className="music-symbol"
              x={x}
              y="33"
              fill="white"
              stroke="white"
              strokeWidth="5"
              strokeLinejoin="round"
              fontSize="52"
              textAnchor="middle"
              dominantBaseline="middle"
              pointerEvents="none"
            >
              {glyph}
            </text>}
            <text
              className="music-symbol"
              x={x}
              y="33"
              fill="currentColor"
              fontSize="52"
              textAnchor="middle"
              dominantBaseline="middle"
              pointerEvents="none"
            >
              {glyph}
            </text>
          </svg>
        );
      }

      function RepeatChoiceGlyph({ symbolId = "end-repeat" }) {
        return (
          <svg viewBox="0 0 100 54" className="h-full w-full overflow-visible" aria-hidden="true">
            {symbolId === "start-repeat" && <g transform="translate(0 -4)"><CalibratedSymbol symbolKey="repeatLeft" x={50} y={8 + STAFF.gap * 2.9} /></g>}
            {symbolId === "end-repeat" && <g transform="translate(0 -4)"><CalibratedSymbol symbolKey="repeatRight" x={50} y={8 + STAFF.gap * 2.9} /></g>}
            {symbolId === "first-time" && (
              <g transform="translate(1 20)" stroke="currentColor" fill="none" strokeWidth="2">
                <path d="M 20 18 L 20 4 L 76 4" />
                <text x="28" y="-3" fill="currentColor" stroke="none" fontFamily="serif" fontSize="17" fontWeight="400">1.</text>
              </g>
            )}
            {symbolId === "second-time" && (
              <g transform="translate(1 20)" stroke="currentColor" fill="none" strokeWidth="2">
                <path d="M 20 18 L 20 4 L 76 4" />
                <text x="28" y="-3" fill="currentColor" stroke="none" fontFamily="serif" fontSize="17" fontWeight="400">2.</text>
              </g>
            )}
            {symbolId === "dc" && (
              <text x="50" y="29" fill="currentColor" fontFamily="serif" fontSize="23" fontWeight="700" textAnchor="middle" dominantBaseline="middle">D.C.</text>
            )}
            {symbolId === "ds" && (
              <text x="50" y="31" fill="currentColor" fontFamily="Georgia, serif" fontSize="17" fontStyle="italic" fontWeight="800" textAnchor="middle">D.S. al Fine</text>
            )}
            {symbolId === "fine" && (
              <text x="50" y="31" fill="currentColor" fontFamily="Georgia, serif" fontSize="22" fontStyle="italic" fontWeight="700" textAnchor="middle">Fine</text>
            )}
            {symbolId === "segno" && (
              <CalibratedSymbol symbolKey="segno" x={50} y={37} settingOverrides={{ fontSizeScale: 2.9 }} />
            )}
          </svg>
        );
      }

      function CircleChoiceGlyph() {
        return (
          <svg viewBox="0 0 56 48" className="h-12 w-16 overflow-visible" aria-hidden="true">
            <circle cx="28" cy="24" r="17" fill="none" stroke="currentColor" strokeWidth="1.8" />
          </svg>
        );
      }

      function RhythmChoiceGlyph({ rhythm }) {
        if (rhythm === "tie") {
          const tieGlyph = sharedSymbolForKey("tie") || "\uE1FD";
          return (
            <svg viewBox="0 0 90 70" className="h-14 w-20 overflow-visible" aria-hidden="true">
              <text className="music-symbol" x="45" y="39" fontSize="54" textAnchor="middle" fill="currentColor">{tieGlyph}</text>
            </svg>
          );
        }
        if (rhythm === "tripletQuavers" || rhythm === "tripletCrotchets") {
          return <TripletChoiceGlyph tripletKind={rhythm === "tripletCrotchets" ? "crotchetTriplet" : "quaverTriplet"} />;
        }
        if (isRestRhythm(rhythm)) return <RestChoiceGlyph rhythm={rhythm} />;
        const sampleNote = { ...noteByLetter("B", 5), rhythm, beats: rhythmInfo(rhythm).beats, writtenAccidental: null };
        return (
          <svg viewBox="0 0 90 70" className="h-14 w-20 overflow-visible" aria-hidden="true">
            <Note note={sampleNote} x={45} top={25} />
          </svg>
        );
      }

      function restGlyphRhythmId(rhythm) {
        return {
          semibreveRest: "semibreve-rest",
          minimRest: "minim-rest",
          dottedCrotchetRest: "dotted-crotchet-rest",
          crotchetRest: "crotchet-rest",
          quaverRest: "quaver-rest",
        }[rhythm] ?? rhythm;
      }

      function RestChoiceSymbol({ rhythm, x, y, fontSize = 30, colour = "currentColor" }) {
        const restRhythm = restGlyphRhythmId(rhythm);
        const lineGap = 10;
        const glyph = restRhythm === "semibreve-rest" ? "\uE4F4" : restRhythm === "minim-rest" ? "\uE4F5" : null;
        if (glyph) {
          return <text className="music-symbol" x={x} y={y} fontSize={fontSize} fill={colour} textAnchor="middle" dominantBaseline="middle">{glyph}</text>;
        }
        const yOffset = ["crotchet-rest", "dotted-crotchet-rest", "quaver-rest"].includes(restRhythm) ? 30 : 0;
        const systemTop = y + yOffset - lineGap * 4;
        const middleY = systemTop + lineGap * 2;
        const restKey = restRhythm === "quaver-rest" ? "eighthRest" : "quarterRest";
        return (
          <g transform={`translate(${x} ${y + yOffset}) scale(${fontSize / 30}) translate(${-x} ${-(y + yOffset)})`}>
            <CalibratedSymbol symbolKey={restKey} x={x} y={middleY} colour={colour} lineGap={lineGap} />
            {restRhythm === "dotted-crotchet-rest" && <CalibratedSymbol symbolKey="augmentationDotSpace" x={x + lineGap * 1.1} y={middleY - lineGap * 0.4} colour={colour} lineGap={lineGap} />}
          </g>
        );
      }

      function RestChoiceGlyph({ rhythm, compact = false }) {
        const restRhythm = restGlyphRhythmId(rhythm);
        const y = {
          "semibreve-rest": 41,
          "minim-rest": 49,
          "dotted-crotchet-rest": 46,
          "crotchet-rest": 46,
          "quaver-rest": 46,
        }[restRhythm] ?? 49;
        const x = {
          "semibreve-rest": 45,
          "minim-rest": 45,
          "dotted-crotchet-rest": 43,
          "crotchet-rest": 43,
          "quaver-rest": 44,
        }[restRhythm] ?? 45;
        const fontSize = compact ? 50 : 40;
        return (
          <svg viewBox="0 0 90 90" className="h-14 w-20 overflow-visible" aria-hidden="true">
            <RestChoiceSymbol rhythm={restRhythm} x={x} y={y} fontSize={fontSize} colour="currentColor" />
          </svg>
        );
      }

      function AccidentalChoiceGlyph({ symbolId }) {
        const option = [...ACCIDENTAL_PLACEMENT_OPTIONS, ...ENHARMONIC_ACCIDENTAL_OPTIONS].find((item) => item.id === symbolId);
        const y = symbolId === "sharp" ? 32 : symbolId === "natural" ? 35 : 38;
        return (
          <svg viewBox="0 0 90 70" className="h-14 w-16 overflow-visible" aria-hidden="true">
            <Accidental value={option?.value ?? 1} x={45} y={y} visualScale={1.6} />
          </svg>
        );
      }

      function EnharmonicAccidentalChoiceGlyph({ symbolId }) {
        const option = ENHARMONIC_ACCIDENTAL_OPTIONS.find((item) => item.id === symbolId);
        const y = symbolId === "sharp" ? 32 : symbolId === "natural" ? 35 : 38;
        return (
          <svg viewBox="0 0 110 70" className="h-14 w-20 overflow-visible" aria-hidden="true">
            <Accidental value={option?.value ?? 1} x={38} y={y} visualScale={1.6} />
            <CalibratedSymbol symbolKey="noteheadBlack" x={72} y={36} colour="#9ca3af" opacity={0.55} lineGap={15} settingOverrides={{ fontSizeScale: 4.4 }} />
          </svg>
        );
      }

      function ArticulationButtonNote({ x, top, colour = "currentColor" }) {
        const lineGap = 10;
        const step = 2;
        const noteY = top + lineGap * 4 - step * (lineGap / 2);
        return <CalibratedSymbol symbolKey="quarterNoteStemUp" x={x} y={noteY} colour={colour} lineGap={lineGap} />;
      }

      function ArticulationChoiceGlyph({ markingId }) {
        if (markingId === "phrase") {
          return (
            <svg viewBox="0 0 120 58" className="h-10 w-16 overflow-visible">
              <g transform="translate(0,5)">
                {[0, 1, 2, 3, 4].map((line) => <line key={line} x1="8" x2="112" y1={12 + line * 4} y2={12 + line * 4} stroke="currentColor" strokeWidth="1" />)}
                {[16, 36, 56, 76, 96].map((x, index) => <circle key={x} cx={x} cy={24 + (index % 2 ? -4 : 3)} r="2.8" fill="currentColor" />)}
                <path d="M10 39 Q60 54 110 39" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
              </g>
            </svg>
          );
        }
        if (markingId === "slur") {
          return (
            <svg viewBox="0 0 90 58" className="h-10 w-16 overflow-visible">
              <g fill="currentColor" stroke="currentColor">
                <ellipse cx="25" cy="34" rx="6.3" ry="4.6" transform="rotate(-18 25 34)" fill="currentColor" stroke="currentColor" strokeWidth="1.7" />
                <line x1="31.3" y1="34" x2="31.3" y2="8" stroke="currentColor" strokeWidth="1.5" />
                <ellipse cx="64" cy="41" rx="6.3" ry="4.6" transform="rotate(-18 64 41)" fill="currentColor" stroke="currentColor" strokeWidth="1.7" />
                <line x1="70.3" y1="41" x2="70.3" y2="15" stroke="currentColor" strokeWidth="1.5" />
                <path d="M25 48 C38 56, 52 56, 64 50" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" transform="rotate(10 44 49)" />
              </g>
            </svg>
          );
        }
        if (markingId === "staccato" || markingId === "accent") {
          const noteX = 42;
          const noteTop = 12;
          return (
            <svg viewBox="0 0 90 58" className="h-10 w-16 overflow-visible">
              <ArticulationButtonNote x={noteX} top={noteTop} colour="currentColor" />
              <CalibratedSymbol
                symbolKey={markingId === "staccato" ? "staccatoBelow" : "accentBelow"}
                x={noteX}
                y={markingId === "staccato" ? 52 : 54}
                colour="currentColor"
                lineGap={10}
                settingOverrides={{
                  xOffsetScale: 0,
                  yOffsetScale: 0,
                  fontSizeScale: markingId === "staccato" ? 2.5 : 2.75,
                  widthScale: 1,
                  heightScale: 1,
                  opticalXOffset: 0,
                  opticalYOffset: 0,
                }}
              />
            </svg>
          );
        }
        return (
          <svg viewBox="0 0 90 58" className="h-10 w-16 overflow-visible">
            <ArticulationButtonNote x={42} top={22} colour="currentColor" />
          </svg>
        );
      }

      function TripletChoiceGlyph({ tripletKind }) {
        const type = {
          id: tripletKind === "quaverTriplet" ? "quaver-triplet" : "crotchet-triplet",
          usesBracket: tripletKind === "crotchetTriplet",
        };
        return (
          <svg viewBox="0 -8 150 78" className="h-14 w-24 overflow-visible" aria-hidden="true">
            <g transform="translate(-8,1) scale(1.25)">
              {[35, 62, 89].map((x) => (
                <g key={x}>
                  <ellipse cx={x} cy="38" rx="6.3" ry="4.6" transform={`rotate(-18 ${x} 38)`} fill="currentColor" />
                  <line x1={x + 5.3} x2={x + 5.3} y1="38" y2="12" stroke="currentColor" strokeWidth="1.5" />
                </g>
              ))}
              {type.id === "quaver-triplet" && <line x1="40.3" x2="94.3" y1="12" y2="12" stroke="currentColor" strokeWidth="4" />}
              {type.usesBracket && (
                <g stroke="currentColor" strokeWidth="1.6" fill="none" strokeLinecap="round">
                  <path d="M 40 9 L 40 0 L 56 0" />
                  <path d="M 80 0 L 96 0 L 96 9" />
                </g>
              )}
              <text x="67" y={type.usesBracket ? "7" : "8"} textAnchor="middle" fontFamily="serif" fontWeight="900" fontSize="20" fill="currentColor">3</text>
            </g>
          </svg>
        );
      }

      function placementButtonState(active) {
        return active ? "border-black bg-black text-white" : "border-stone-300 bg-white text-black hover:bg-stone-50";
      }

      function ScoreApplyHint({ children = "Select the button first, then apply to the score.", className = "", style = null } = {}) {
        return <p className={`text-sm font-medium italic text-stone-500 ${className}`} style={style}>{children}</p>;
      }

      function answerControl(part, partIndex) {
        if (part.type === "notes") {
          return null;
        }
        if (part.type === "intervalInsert") {
          return null;
        }
        if (part.type === "timeChoice") {
          return (
            <div className="flex max-w-full flex-nowrap gap-2 overflow-x-auto pb-1">
              {part.options.map((signature) => <TimeSignatureChoiceButton key={signature.id} signature={signature} part={part} partIndex={partIndex} />)}
            </div>
          );
        }
        if (part.type === "choice") {
          return (
            <div className="flex flex-wrap gap-2">
              {part.options.map((option) => {
                const selected = practiceAnswers[part.id] === option;
                const chooseOption = () => {
                  setActiveIndex(partIndex);
                  setPracticeAnswers((current) => ({ ...current, [part.id]: option }));
                };
                return (
                  <button
                    type="button"
                    key={option}
                    disabled={Boolean(feedback)}
                    onPointerDown={(event) => answerButtonPress(event, chooseOption)}
                    onClick={(event) => answerButtonKeyboardClick(event, chooseOption)}
                    className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 text-lg font-black transition ${choiceButtonClass(option, selected, part)}`}
                    aria-label={option}
                  >
                    {option}
                  </button>
                );
              })}
            </div>
          );
        }
        if (part.type === "dynamic") {
          const revealed = Boolean(results[part.id]);
          const options = part.options?.length ? part.options : PRACTICE_DYNAMIC_OPTIONS;
          return (
            <div className="flex flex-wrap gap-2">
              {options.map((dynamic) => {
                const selected = question.placedDynamic?.id === dynamic.id || practiceAnswers[part.id] === dynamic.id;
                const chooseDynamic = () => {
                  setActiveIndex(partIndex);
                  setPracticeAnswers((current) => ({ ...current, [part.id]: dynamic.id }));
                  onPlaceDynamic(dynamic);
                };
                const state = revealed && dynamicAnswerIsAccepted(dynamic.id, question.dynamic.id)
                  ? "border-green-600 bg-green-600 text-white"
                  : revealed && selected
                    ? "border-red-600 bg-red-600 text-white"
                    : selected
                      ? "border-black bg-black text-white"
                      : "border-stone-300 bg-white text-black hover:bg-stone-50";
                return (
                  <button
                    type="button"
                    key={dynamic.id}
                    disabled={Boolean(feedback)}
                    onPointerDown={(event) => answerButtonPress(event, chooseDynamic)}
                    onClick={(event) => answerButtonKeyboardClick(event, chooseDynamic)}
                    className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${state}`}
                    aria-label={dynamic.name}
                  >
                    <DynamicChoiceGlyph dynamic={dynamic} backdrop={!revealed && !selected} />
                  </button>
                );
              })}
            </div>
          );
        }
        if (part.type === "repeat") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedSymbolId: null, placements: [] });
          const options = part.options?.length ? part.options : PRACTICE_REPEAT_SYMBOLS;
          return (
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex flex-wrap gap-2">
                {options.map((symbol) => {
                  const chooseRepeat = () => {
                    setActiveIndex(partIndex);
                    setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedSymbolId: symbol.id } }));
                  };
                  return (
                    <button
                      type="button"
                      key={symbol.id}
                      disabled={Boolean(feedback)}
                      onPointerDown={(event) => answerButtonPress(event, chooseRepeat)}
                      onClick={(event) => answerButtonKeyboardClick(event, chooseRepeat)}
                      className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.selectedSymbolId === symbol.id)}`}
                      aria-label={symbol.label}
                    >
                      <RepeatChoiceGlyph symbolId={symbol.id} />
                    </button>
                  );
                })}
              </div>
              <ScoreApplyHint />
            </div>
          );
        }
        if (part.type === "barlines") {
          return null;
        }
        if (part.type === "tripletPlacement") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedTripletKind: null, placements: [] });
          const options = part.options?.length ? part.options : TRIPLET_MARKING_OPTIONS;
          return (
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex flex-wrap gap-2">
                {options.map((option) => {
                  const chooseTriplet = () => {
                    setActiveIndex(partIndex);
                    setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedTripletKind: option.id } }));
                  };
                  return (
                    <button
                      type="button"
                      key={option.id}
                      disabled={Boolean(feedback)}
                      onPointerDown={(event) => answerButtonPress(event, chooseTriplet)}
                      onClick={(event) => answerButtonKeyboardClick(event, chooseTriplet)}
                      className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.selectedTripletKind === option.id)}`}
                      aria-label={option.label}
                    >
                      <TripletChoiceGlyph tripletKind={option.id} />
                    </button>
                  );
                })}
              </div>
              <ScoreApplyHint />
            </div>
          );
        }
        if (part.type === "rhythm" || part.type === "rhythmFix") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedRhythm: null, placements: {} });
          const rhythmOptions = part.rhythmOptions?.length ? part.rhythmOptions : ["quaver", "crotchet"];
          const isRestsQuestion = (part.sourceId ?? part.id) === "rests";
          const isTieQuestion = part.type === "rhythmFix" && question.rhythmFixTarget?.variant === "ahTie";
          const rhythmButtonSizeClass = `${ANSWER_BUTTON_SIZE_CLASS} px-3`;
          const rhythmAnswerLayoutClass = isRestsQuestion ? "flex flex-nowrap items-center gap-3" : "flex flex-wrap items-center gap-3";
          const rhythmOptionsLayoutClass = isRestsQuestion ? "flex shrink-0 flex-nowrap gap-2" : "flex flex-wrap gap-2";
          return (
            <div className={rhythmAnswerLayoutClass}>
              <div className={rhythmOptionsLayoutClass}>
                {rhythmOptions.map((rhythm) => {
                  const chooseRhythm = () => {
                    setActiveIndex(partIndex);
                    setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedRhythm: rhythm } }));
                  };
                  return (
                    <button
                      type="button"
                      key={rhythm}
                      disabled={Boolean(feedback)}
                      onPointerDown={(event) => answerButtonPress(event, chooseRhythm)}
                      onClick={(event) => answerButtonKeyboardClick(event, chooseRhythm)}
                      className={`answer-choice-button flex ${rhythmButtonSizeClass} items-center justify-center rounded-xl border transition ${placementButtonState(value.selectedRhythm === rhythm)}`}
                      aria-label={rhythm === "tie" ? "tie" : rhythmInfo(rhythm).label}
                    >
                      {isRestsQuestion && isRestRhythm(rhythm) ? <RestChoiceGlyph rhythm={rhythm} compact /> : <RhythmChoiceGlyph rhythm={rhythm} />}
                    </button>
                  );
                })}
              </div>
              <ScoreApplyHint
                className={isRestsQuestion ? "min-w-[96px] shrink whitespace-nowrap leading-tight" : ""}
                style={isRestsQuestion ? { fontSize: "clamp(11px, 0.7vw, 12px)" } : null}
              >
                {isTieQuestion ? "Select the tie first, then apply it to the score." : "Select a rhythm first, then apply to the score."}
              </ScoreApplyHint>
            </div>
          );
        }
        if (part.type === "scotchSnap") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { circleSelected: false, selected: null });
          const chooseCircle = () => {
            setActiveIndex(partIndex);
            setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, circleSelected: true } }));
          };
          return (
            <div className="flex flex-wrap items-center gap-3">
              <button
                type="button"
                disabled={Boolean(feedback)}
                onPointerDown={(event) => answerButtonPress(event, chooseCircle)}
                onClick={(event) => answerButtonKeyboardClick(event, chooseCircle)}
                className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} flex-col items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.circleSelected)}`}
                aria-label="Circle"
              >
                <CircleChoiceGlyph />
                <span className="mt-1 text-sm font-bold leading-none">Circle</span>
              </button>
              <ScoreApplyHint />
            </div>
          );
        }
        if (part.type === "accidentalPlacement") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedSymbolId: null, placements: [] });
          return (
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex flex-wrap gap-2">
                {ACCIDENTAL_PLACEMENT_OPTIONS.map((option) => {
                  const chooseAccidental = () => {
                    setActiveIndex(partIndex);
                    setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedSymbolId: option.id } }));
                  };
                  return (
                    <button
                      type="button"
                      key={option.id}
                      disabled={Boolean(feedback)}
                      onPointerDown={(event) => answerButtonPress(event, chooseAccidental)}
                      onClick={(event) => answerButtonKeyboardClick(event, chooseAccidental)}
                      className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.selectedSymbolId === option.id)}`}
                      aria-label={option.label}
                    >
                      <AccidentalChoiceGlyph symbolId={option.id} />
                    </button>
                  );
                })}
              </div>
              <ScoreApplyHint />
            </div>
          );
        }
        if (part.type === "articulationPlacement") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedMarkingId: null, placements: [] });
          const options = ARTICULATION_OPTIONS;
          return (
            <div className="flex flex-wrap items-center gap-3">
              <div className="grid w-full grid-cols-2 gap-2 md:flex md:w-auto md:flex-wrap md:justify-start">
                {options.map((marking) => {
                  const chooseMarking = () => {
                    setActiveIndex(partIndex);
                    setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedMarkingId: marking.id, placements: [] } }));
                  };
                  return (
                    <button
                      type="button"
                      key={marking.id}
                      disabled={Boolean(feedback)}
                      onPointerDown={(event) => answerButtonPress(event, chooseMarking)}
                      onClick={(event) => answerButtonKeyboardClick(event, chooseMarking)}
                      className={`answer-choice-button relative flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 font-bold transition ${placementButtonState(value.selectedMarkingId === marking.id)}`}
                      aria-label={marking.label}
                    >
                      <span className="flex h-full w-full items-center justify-center">
                        <ArticulationChoiceGlyph markingId={marking.id} />
                      </span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        }
        if (part.type === "transposition") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedRhythm: null, notes: {}, ties: {} });
          if (question.practiceLevel === "AH") {
            return <ScoreApplyHint>Use the score above to enter your answer.</ScoreApplyHint>;
          }
          const options = TRANSPOSITION_RHYTHM_OPTIONS;
          return (
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex flex-wrap gap-2">
                {options.map((rhythm) => {
                  const chooseTranspositionRhythm = () => {
                    setActiveIndex(partIndex);
                    setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedRhythm: rhythm } }));
                  };
                  return (
                    <button
                      type="button"
                      key={rhythm}
                      disabled={Boolean(feedback)}
                      onPointerDown={(event) => answerButtonPress(event, chooseTranspositionRhythm)}
                      onClick={(event) => answerButtonKeyboardClick(event, chooseTranspositionRhythm)}
                      className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.selectedRhythm === rhythm)}`}
                      style={{ width: 120, height: 74 }}
                      aria-label={rhythmInfo(rhythm).label}
                    >
                      <RhythmChoiceGlyph rhythm={rhythm} />
                    </button>
                  );
                })}
              </div>
              <ScoreApplyHint>Select a rhythm first, then apply to the score.</ScoreApplyHint>
            </div>
          );
        }
        if (part.type === "enharmonic") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedAccidental: null, note: null });
          return (
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex flex-wrap gap-2">
                {ENHARMONIC_ACCIDENTAL_OPTIONS.map((option) => {
                  const chooseEnharmonicAccidental = () => {
                    setActiveIndex(partIndex);
                    setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedAccidental: option.value } }));
                  };
                  return (
                    <button
                      type="button"
                      key={option.id}
                      disabled={Boolean(feedback)}
                      onPointerDown={(event) => answerButtonPress(event, chooseEnharmonicAccidental)}
                      onClick={(event) => answerButtonKeyboardClick(event, chooseEnharmonicAccidental)}
                      className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.selectedAccidental === option.value)}`}
                      aria-label={option.label}
                    >
                      <EnharmonicAccidentalChoiceGlyph symbolId={option.id} />
                    </button>
                  );
                })}
              </div>
              <ScoreApplyHint>Select an accidental first, then apply to the score.</ScoreApplyHint>
            </div>
          );
        }
        if (part.type === "higherChord") {
          return null;
        }
        if (part.type === "ahChord") {
          return null;
        }
        if (part.type === "ahBassLine") {
          return null;
        }
        return renderTextAnswerInput(part, partIndex);
      }

      function ChevronIcon({ expanded }) {
        return (
          <span className="practice-view-chevron">
            <svg viewBox="0 0 24 24" aria-hidden="true" className="h-3.5 w-3.5">
              <path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </span>
        );
      }

      function keyNameWithMusicAccidentals(keyName) {
        const parts = String(keyName).split(/\b(flat)\b/i);
        const flatGlyph = SHARED_SYMBOLS.flat ?? "♭";
        return parts.map((part, index) => (
          /^flat$/i.test(part)
            ? <span key={`flat-${index}`} className="music-symbol inline-block align-baseline leading-none" style={{ transform: "translateY(-0.16em)" }} aria-label="flat">{flatGlyph}</span>
            : part
        ));
      }

      function transpositionMeaningPromptGlyph(symbol) {
        const glyph = symbol === "8vb"
          ? sharedSymbolForKey("ottavaBassa") || "\uE51C"
          : sharedSymbolForKey("ottavaAlta") || "\uE512";
        return (
          <span
            className="music-symbol inline-block align-baseline leading-none"
            style={{ fontSize: "1.24em", fontWeight: 400, transform: "translateY(calc(0.06em - 3px))" }}
            aria-label={symbol}
          >
            {glyph}
          </span>
        );
      }

      function questionPrompt(part) {
        const sourceId = part.sourceId ?? part.id;
        if (part.type === "timeChoice" && question.timeChangeTarget) {
          return <>Identify the time change in <strong>bar {question.timeChangeTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "missing") {
          return <>Insert the missing notes in <strong>{missingNotePromptLocation(question)}</strong>. The rhythm is given.</>;
        }
        if (sourceId === "chord") {
          if (question.level === "H") {
            const answerBars = question.higherChordTargets ?? [];
            const answerBarText = answerBars.map((barIndex) => barIndex + 1).join(" and ");
            return <>Name the chords played in <strong>bars {answerBarText}</strong>. You may use letter names or numbers. The chord in <strong>bar {question.chordBar + 1}</strong> is given.</>;
          }
          return <>Name the chord outlined in <strong>bar {question.chordBar + 1}</strong>.</>;
        }
        if (sourceId === "ahChord") {
          const keyName = KEY_ANSWERS[question.key.id]?.label ?? question.key.id;
          const hasKeySignatureQuestion = question.subquestions?.some((item) => (item.sourceId ?? item.id) === "key");
          return <>Identify the boxed chords used in <strong>bar {question.advancedHigherChordTarget?.identifyBar + 1}</strong>. You should indicate the chord name or number and, where appropriate, 1st or 2nd inversion.{!hasKeySignatureQuestion && <> The key is <strong>{keyNameWithMusicAccidentals(keyName)}</strong>.</>}</>;
        }
        if (sourceId === "ahBassLine") {
          const keyName = KEY_ANSWERS[question.key.id]?.label ?? question.key.id;
          const hasKeySignatureQuestion = question.subquestions?.some((item) => (item.sourceId ?? item.id) === "key");
          return <>Using the rhythm provided and the chord information below the stave, insert the bass notes in <strong>bar {question.advancedHigherChordTarget?.bassLineBar + 1}</strong>.</>;
        }
        if (sourceId === "ahChordTypes") {
          return <>Identify the type of chord shown in <strong>bar {question.advancedHigherChordTypeTarget?.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "dynamic") {
          if (question.dynamicQuestionType === "hairpinName") {
            const verb = question.dynamicHairpin?.type === "diminuendo" ? "softer" : "louder";
            return <>The piece gradually gets {verb} in <strong>bar {question.dynamicHairpin.barIndex + 1}</strong>. Identify the name of the symbol used.</>;
          }
          if (question.dynamicQuestionType === "dynamicName") {
            return <>Describe the meaning of the dynamic marking shown below <strong>bar {question.dynamicBar + 1}</strong>.</>;
          }
          return <>Identify the appropriate dynamic marking that should be inserted below <strong>bar {question.dynamicBar + 1}</strong>.</>;
        }
        if (sourceId === "interval") {
          if (part.type === "intervalInsert") {
            return <>In <strong>bar {question.intervalInsertTarget.barIndex + 1}</strong>, insert a note a <strong>{question.intervalInsertTarget.intervalPhrase}</strong> than the previous note. The rhythm is given above the stave.</>;
          }
          return <>Describe the interval formed by the two notes in the box in <strong>bar {question.intervalTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "noteIdentification") {
          if (part.type === "scotchSnap" && question.noteValueCircleTarget) {
            return <>Place a circle around a <strong>{rhythmInfo(question.noteValueCircleTarget.targetRhythm).label}</strong>.</>;
          }
          return <>Name the note marked 'X' in <strong>bar {question.noteTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "barlines") {
          const { firstBar, lastBar } = barlineQuestionBoundaryBars(question.barlineTargets?.[0]);
          return <>Insert the missing barline between <strong>bars {firstBar} and {lastBar}</strong>.</>;
        }
        if (sourceId === "rhythmicDictation") {
          if (part.type === "rhythmFix") {
            if (question.rhythmFixTarget?.variant === "ahLongInsert") return <>Listen to the music and complete the rhythm of one missing bar.</>;
            if (question.rhythmFixTarget?.variant === "ahTie") return <>Listen to the music and correct the rhythm you see in <strong>bar {question.rhythmFixTarget.barIndex + 1}</strong> by using a <strong>tie</strong>.</>;
            if (question.rhythmFixTarget?.variant === "ahTripletInsert") return <>Listen to the music and insert the triplet rhythm in <strong>bar {question.rhythmFixTarget.barIndex + 1}</strong> to match what you hear.</>;
            return <>Correct the rhythm in the box in <strong>bar {question.rhythmFixTarget.barIndex + 1}</strong> to match what you hear.</>;
          }
          return <>Complete the rhythm for the notes in <strong>bar {question.rhythmTargetBar + 1}</strong>.</>;
        }
        if (sourceId === "rests") {
          return <>Insert the missing rest(s) in <strong>bar {question.rhythmFixTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "accidentals") {
          return <>Insert the accidental missing from <strong>bar {question.accidentalTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "scaleDegrees") {
          return <>Apply a circle around the <strong>{SCALE_DEGREE_DETAILS[question.scaleDegreeTarget.degree].label}</strong> note of the key in <strong>bar {question.scaleDegreeTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "triplets") {
          return <>Insert the triplet marking in the correct place between bars <strong>{tripletAnswerBoxRangeLabel(question, question.tripletTarget.barIndex)}</strong> to fix the rhythm.</>;
        }
        if (sourceId === "articulation") {
          if (question.articulationTarget?.variant === "identify") {
            if (question.articulationTarget.marking.id === "phrase") {
              return <>Identify the name of articulation marking used on the notes on <strong>line {scoreLineNumberForBar(question.articulationTarget.barIndex)}</strong>.</>;
            }
            return <>Identify the name of articulation marking used on the notes in <strong>bar {question.articulationTarget.barIndex + 1}</strong>.</>;
          }
          return <>The notes in <strong>bar {question.articulationTarget.barIndex + 1}</strong> are played <strong>{articulationPerformanceText(question.articulationTarget.marking.id)}</strong>. Select the correct articulation marking to apply it to the full bar.</>;
        }
        if (sourceId === "transposition") {
          const target = question.transpositionTarget;
          const barNumber = target?.barIndex + 1;
          if (target?.type === "meaning") {
            return <>What does the marking {transpositionMeaningPromptGlyph(target.symbol)} mean in <strong>bar {barNumber}</strong>?</>;
          }
          if (target?.variantId === "trebleSamePitch") {
            return <>Transpose the notes in <strong>bar {barNumber}</strong> at the same pitch into the bass clef.</>;
          }
          if (target?.variantId === "bassSamePitch") {
            return <>Transpose the notes in <strong>bar {barNumber}</strong> at the same pitch into the treble clef.</>;
          }
          if (target?.variantId === "bassOctaveUp") {
            return <>Transpose the notes in <strong>bar {barNumber}</strong> one octave higher into the treble clef.</>;
          }
          return <>Transpose the notes in <strong>bar {barNumber}</strong> one octave lower into the bass clef.</>;
        }
        if (sourceId === "enharmonics" && question.enharmonicTarget) {
          return <>Identify the enharmonic equivalent of the boxed note in <strong>bar {question.enharmonicTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "rhythmIdentification" && part.type === "text") {
          if (question.rhythmIdentificationTarget?.variant === "noteValueTotal") {
            if (question.rhythmIdentificationTarget.tied) {
              return <>Give the total value of the tied notes in <strong>bars {question.rhythmIdentificationTarget.barIndex + 1} and {question.rhythmIdentificationTarget.endBarIndex + 1}</strong>.</>;
            }
            return <>What is the total value of the two notes in the box in <strong>bar {question.rhythmIdentificationTarget.barIndex + 1}</strong>?</>;
          }
          if (question.rhythmIdentificationTarget?.variant === "noteValue") {
            if (question.rhythmIdentificationTarget.questionStyle === "beats") {
              return <>Identify the number of beats for the note marked in <strong>bar {question.rhythmIdentificationTarget.barIndex + 1}</strong>.</>;
            }
            if (question.rhythmIdentificationTarget.questionStyle === "name") {
              const beatDescription = rhythmBeatDescription(question.rhythmIdentificationTarget.targetRhythm);
              return <>What is the name given to this <strong>{beatDescription}</strong> note in <strong>bar {question.rhythmIdentificationTarget.barIndex + 1}</strong>?</>;
            }
            return part.prompt;
          }
