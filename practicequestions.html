      "5/4": [["tripletQuavers", "crotchet", "crotchet", "crotchet", "crotchet"], ["crotchet", "tripletQuavers", "crotchet", "crotchet", "crotchet"], ["crotchet", "crotchet", "tripletQuavers", "crotchet", "crotchet"], ["tripletCrotchets", "crotchet", "crotchet", "crotchet"], ["crotchet", "tripletCrotchets", "crotchet", "crotchet"]],
    };
    const ADVANCED_HIGHER_RHYTHM_DICTATION_PATTERNS = {
      "2/4": [
        ["crotchet", "crotchet"],
        ["dottedCrotchet", "quaver"],
        ["quaver", "dottedCrotchet"],
        ["quaver", "quaver", "crotchet"],
        ["crotchet", "quaver", "quaver"],
      ],
      "3/4": [
        ["dottedCrotchet", "quaver", "crotchet"],
        ["crotchet", "dottedCrotchet", "quaver"],
        ["crotchet", "crotchet", "crotchet"],
        ["quaver", "quaver", "crotchet", "crotchet"],
      ],
      "4/4": [
        ["crotchet", "crotchet", "crotchet", "crotchet"],
        ["dottedCrotchet", "quaver", "crotchet", "crotchet"],
        ["crotchet", "dottedCrotchet", "quaver", "crotchet"],
        ["crotchet", "crotchet", "dottedCrotchet", "quaver"],
        ["quaver", "quaver", "crotchet", "crotchet", "crotchet"],
        ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
      ],
      "5/4": [
        ["crotchet", "crotchet", "crotchet", "crotchet", "crotchet"],
        ["dottedCrotchet", "quaver", "crotchet", "crotchet", "crotchet"],
        ["crotchet", "dottedCrotchet", "quaver", "crotchet", "crotchet"],
        ["quaver", "quaver", "crotchet", "crotchet", "crotchet", "crotchet"],
        ["crotchet", "quaver", "quaver", "crotchet", "crotchet", "crotchet"],
      ],
    };

    const RHYTHM_IDENTIFICATION_PATTERNS = {
      dottedCrotchet: {
        "2/4": [["dottedCrotchet", "quaver"]],
        "3/4": [["dottedCrotchet", "quaver", "crotchet"], ["crotchet", "dottedCrotchet", "quaver"]],
        "4/4": [["dottedCrotchet", "quaver", "crotchet", "crotchet"], ["crotchet", "dottedCrotchet", "quaver", "crotchet"]],
        "6/8": [["dottedCrotchet", "dottedCrotchet"], ["dottedCrotchet", "quaver", "quaver", "quaver"]],
      },
      dottedCrotchetQuaverFix: {
        "2/4": [{ display: ["crotchet", "crotchet"], answer: ["dottedCrotchet", "quaver"], startIndex: 0 }],
        "3/4": [
          { display: ["crotchet", "crotchet", "crotchet"], answer: ["dottedCrotchet", "quaver", "crotchet"], startIndex: 0 },
          { display: ["crotchet", "crotchet", "crotchet"], answer: ["crotchet", "dottedCrotchet", "quaver"], startIndex: 1 },
        ],
        "4/4": [
          { display: ["crotchet", "crotchet", "crotchet", "crotchet"], answer: ["dottedCrotchet", "quaver", "crotchet", "crotchet"], startIndex: 0 },
          { display: ["crotchet", "crotchet", "crotchet", "crotchet"], answer: ["crotchet", "dottedCrotchet", "quaver", "crotchet"], startIndex: 1 },
        ],
        "5/4": [
          { display: ["crotchet", "crotchet", "crotchet", "crotchet", "crotchet"], answer: ["dottedCrotchet", "quaver", "crotchet", "crotchet", "crotchet"], startIndex: 0 },
          { display: ["crotchet", "crotchet", "crotchet", "crotchet", "crotchet"], answer: ["crotchet", "dottedCrotchet", "quaver", "crotchet", "crotchet"], startIndex: 1 },
        ],
      },
      scotchSnap: {
        "2/4": [["semiquaver", "dottedQuaver", "crotchet"], ["crotchet", "semiquaver", "dottedQuaver"]],
        "3/4": [["semiquaver", "dottedQuaver", "crotchet", "crotchet"], ["crotchet", "semiquaver", "dottedQuaver", "crotchet"]],
        "4/4": [["crotchet", "semiquaver", "dottedQuaver", "crotchet", "crotchet"], ["crotchet", "crotchet", "semiquaver", "dottedQuaver", "crotchet"]],
        "6/8": [["semiquaver", "dottedQuaver", "quaver", "quaver", "quaver", "quaver"], ["quaver", "quaver", "semiquaver", "dottedQuaver", "quaver", "quaver"]],
      },
    };

    const DOTTED_RHYTHM_DISTRACTOR_PATTERNS = {
      reverseScotchSnap: {
        "2/4": [["dottedQuaver", "semiquaver", "crotchet"], ["crotchet", "dottedQuaver", "semiquaver"]],
        "3/4": [["dottedQuaver", "semiquaver", "crotchet", "crotchet"], ["crotchet", "dottedQuaver", "semiquaver", "crotchet"]],
        "4/4": [["crotchet", "dottedQuaver", "semiquaver", "crotchet", "crotchet"], ["crotchet", "crotchet", "dottedQuaver", "semiquaver", "crotchet"]],
        "6/8": [["dottedQuaver", "semiquaver", "quaver", "quaver", "quaver", "quaver"], ["quaver", "quaver", "dottedQuaver", "semiquaver", "quaver", "quaver"]],
      },
      dottedCrotchet: RHYTHM_IDENTIFICATION_PATTERNS.dottedCrotchet,
    };

    function applyRhythmDictationPattern(question, barIndex) {
      const pattern = randomItem(RHYTHM_DICTATION_PATTERNS[question.timeSignature.id] ?? RHYTHM_DICTATION_PATTERNS["4/4"]);
      const previousBar = question.bars[barIndex - 1];
      const previous = [...(previousBar?.notes ?? [])].reverse().find((note) => !note.rest) ?? tonicStartNoteForLevel("N5", question.key);
      const targetStep = question.bars[barIndex]?.notes?.find((note) => !note.rest)?.step ?? previous.step;
      const chordSymbol = question.bars[barIndex]?.chordSymbol ?? "I";
      question.bars[barIndex] = buildNational5PhraseBar({
        key: question.key,
        chordSymbol,
        pattern,
        barIndex,
        previous,
        totalBars: question.bars.length,
        timeSignature: question.timeSignature,
        targetStep,
      });
      return pattern;
    }

    function rhythmFixTargetBars(target) {
      if (target?.variant === "ahLongInsert") return target.missingBars ?? [];
      return Number.isInteger(target?.barIndex) ? [target.barIndex] : [];
    }

    function rhythmPlacementKeyForTarget(target, barIndex, noteIndex) {
      return target?.variant === "ahLongInsert" ? `${barIndex}:${noteIndex}` : String(noteIndex);
    }

    function isAdvancedHigherTripletTool(rhythm) {
      return rhythm === "tripletQuavers" || rhythm === "tripletCrotchets";
    }

    function advancedHigherTripletMemberRhythm(rhythm) {
      if (rhythm === "tripletCrotchets") return "tripletCrotchet";
      if (rhythm === "tripletQuavers") return "tripletQuaver";
      return rhythm;
    }

    function expandAdvancedHigherTripletPattern(pattern) {
      const expanded = [];
      pattern.forEach((rhythm, sourceIndex) => {
        if (!isAdvancedHigherTripletTool(rhythm)) {
          expanded.push({ rhythm, sourceIndex, tripletGroupId: null, tripletTool: null });
          return;
        }
        const tripletGroupId = `triplet-${sourceIndex}`;
        const memberRhythm = advancedHigherTripletMemberRhythm(rhythm);
        [0, 1, 2].forEach(() => {
          expanded.push({ rhythm: memberRhythm, sourceIndex, tripletGroupId, tripletTool: rhythm });
        });
      });
      return expanded;
    }

    function advancedHigherTripletPlacementRange(question, target, selectedRhythm) {
      if (!isAdvancedHigherTripletTool(selectedRhythm)) return null;
      const notes = question.bars[target?.barIndex]?.notes ?? [];
      const memberRhythm = advancedHigherTripletMemberRhythm(selectedRhythm);
      const starts = [target.noteIndex, target.noteIndex - 1, target.noteIndex - 2]
        .filter((start) => start >= 0 && start + 2 < notes.length);
      const candidates = starts
        .map((start) => ({ start, indices: [start, start + 1, start + 2] }))
        .filter((candidate) => candidate.indices.every((index) => notes[index]?.rhythmAnswerEditable !== false));
      const answerMatch = candidates.find((candidate) => {
        const groupId = notes[candidate.start]?.answerTripletGroupId;
        return groupId && candidate.indices.every((index) => (
          notes[index]?.answerTripletGroupId === groupId
          && notes[index]?.answerRhythm === memberRhythm
        ));
      });
      if (answerMatch) return answerMatch.indices;
      return candidates.sort((a, b) => Math.abs(a.start + 1 - target.noteIndex) - Math.abs(b.start + 1 - target.noteIndex))[0]?.indices ?? null;
    }

    function plantAdvancedHigherRhythmDictationTarget(question) {
      const signatureOptions = TIME_SIGNATURES
        .filter((signature) => ADVANCED_HIGHER_RHYTHM_DICTATION_TIME_SIGNATURE_IDS.includes(signature.id))
        .filter((signature) => signature.id !== question.timeChangeTarget?.signature?.id);
      const timeSignature = withFiveFourGrouping(weightedRandomItem(signatureOptions));
      const patterns = ADVANCED_HIGHER_RHYTHM_DICTATION_PATTERNS[timeSignature.id] ?? ADVANCED_HIGHER_RHYTHM_DICTATION_PATTERNS["4/4"];
      const barsBeforeTimeChange = question.timeChangeTarget?.barIndex ?? question.bars.length;
      const barPatterns = Array.from({ length: barsBeforeTimeChange }, () => [...randomItem(patterns)]);
      const phraseStarts = [0, 1, 2, 3, 4, 5];
      const hiddenPhraseStart = randomItem(phraseStarts);
      const visiblePhraseStart = randomItem(phraseStarts.filter((start) => Math.abs(start - hiddenPhraseStart) >= 2));
      barPatterns[hiddenPhraseStart] = [...barPatterns[visiblePhraseStart]];
      question.timeSignature = timeSignature;
      barPatterns.forEach((pattern, barIndex) => applyPracticeRhythmPattern(question, barIndex, pattern));
      const missingBars = [hiddenPhraseStart];
      const noteIndicesByBar = {};
      const targetRhythms = {};
      missingBars.forEach((barIndex) => {
        noteIndicesByBar[barIndex] = question.bars[barIndex].notes.map((_, noteIndex) => noteIndex);
        question.bars[barIndex].notes.forEach((note, noteIndex) => {
          targetRhythms[rhythmPlacementKeyForTarget({ variant: "ahLongInsert" }, barIndex, noteIndex)] = note.rhythm;
        });
      });
      return {
        variant: "ahLongInsert",
        missingBars,
        noteIndicesByBar,
        targetRhythms,
        displayPatternByBar: Object.fromEntries(missingBars.map((barIndex) => [barIndex, question.bars[barIndex].notes.map(() => "notehead")])),
        targetPatternByBar: Object.fromEntries(missingBars.map((barIndex) => [barIndex, question.bars[barIndex].notes.map((note) => note.rhythm)])),
      };
    }

    function plantAdvancedHigherRhythmTieTarget(question) {
      const timeSignature = ["3/4", "4/4", "5/4"].includes(question.timeSignature?.id) ? question.timeSignature : null;
      if (!timeSignature) return null;
      const targetBarIndex = randomItem([0, 1, 2]);
      const useQuaverToCrotchetTie = timeSignature.id === "4/4" && Math.random() < 0.5;
      const quaverCount = Math.max(4, timeSignature.beats * 2);
      const pattern = useQuaverToCrotchetTie
        ? ["quaver", "quaver", "crotchet", "quaver", "quaver", "crotchet"]
        : Array.from({ length: quaverCount }, () => "quaver");
      const offBeatCandidateStarts = Array.from({ length: Math.max(0, quaverCount - 2) }, (_, index) => index + 1).filter((index) => index % 2 === 1);
      // Tie candidates cross crotchet beats while preserving the larger 3+2 grouping in 5/4.
      const candidateStarts = useQuaverToCrotchetTie
        ? [1, 4]
        : offBeatCandidateStarts;
      const answerIndex = randomItem(useQuaverToCrotchetTie ? candidateStarts : offBeatCandidateStarts);
      applyPracticeRhythmPattern(question, targetBarIndex, pattern);
      const tieNotes = question.bars[targetBarIndex].notes;
      const pitchParent = tieNotes.map((_, index) => index);
      const findPitchParent = (index) => {
        while (pitchParent[index] !== index) index = pitchParent[index];
        return index;
      };
      const linkPitch = (left, right) => {
        const leftRoot = findPitchParent(left);
        const rightRoot = findPitchParent(right);
        if (leftRoot !== rightRoot) pitchParent[rightRoot] = leftRoot;
      };
      candidateStarts.forEach((startIndex) => linkPitch(startIndex, startIndex + 1));
      const repeatedPitchByIndex = new Map();
      tieNotes.forEach((note, index) => {
        const source = tieNotes[findPitchParent(index)];
        if (source && source !== note) repeatedPitchByIndex.set(index, { ...source });
      });
      question.bars[targetBarIndex].notes = tieNotes.map((note, index) => {
        const repeatedPitch = repeatedPitchByIndex.get(index);
        return {
          ...note,
          ...(repeatedPitch ? tiedContinuationPitch(repeatedPitch) : {}),
          id: `${targetBarIndex}-${index}`,
          noteIndex: index,
          audioTieToNext: index === answerIndex,
          silentAudio: index === answerIndex + 1,
        };
      });
      return {
        variant: "ahTie",
        barIndex: targetBarIndex,
        noteIndices: candidateStarts,
        answerIndex,
        targetRhythms: {
          [rhythmPlacementKeyForTarget({ variant: "ahTie" }, targetBarIndex, answerIndex)]: "tie",
        },
      };
    }

    function plantAdvancedHigherRhythmTripletTarget(question) {
      const timeSignature = ["2/4", "3/4", "4/4", "5/4"].includes(question.timeSignature?.id) ? question.timeSignature : null;
      if (!timeSignature) return null;
      const patternPool = ADVANCED_HIGHER_RHYTHM_TRIPLET_PATTERNS[timeSignature.id] ?? ADVANCED_HIGHER_RHYTHM_TRIPLET_PATTERNS["4/4"];
      const pattern = [...randomItem(patternPool)];
      const expandedPattern = expandAdvancedHigherTripletPattern(pattern);
      const targetBarIndex = randomItem([0, 1, 2]);
      const previousBar = question.bars[targetBarIndex - 1];
      const previous = [...(previousBar?.notes ?? [])].reverse().find((note) => !note.rest) ?? tonicStartNoteForLevel("N5", question.key);
      const built = buildNotesFromPattern({
        key: question.key,
        chordSymbol: question.bars[targetBarIndex].chordSymbol,
        pattern: expandedPattern.map((item) => item.rhythm),
        barIndex: targetBarIndex,
        previousIndex: noteBaseIndex(previous),
        level: question.level,
        mode: "free",
        previousNotes: melodyNotes(question.bars.slice(0, targetBarIndex)),
      });
      const noteIndices = [];
      const targetRhythms = {};
      question.bars[targetBarIndex] = {
        ...question.bars[targetBarIndex],
        notes: built.notes.map((note, noteIndex) => {
          const item = expandedPattern[noteIndex];
          noteIndices.push(noteIndex);
          targetRhythms[rhythmPlacementKeyForTarget({ variant: "ahTripletInsert" }, targetBarIndex, noteIndex)] = item.rhythm;
          return {
            ...note,
            id: `${targetBarIndex}-${noteIndex}`,
            noteIndex,
            rhythm: item.rhythm,
            beats: rhythmInfo(item.rhythm).beats,
            answerRhythm: item.rhythm,
            answerTripletGroupId: item.tripletGroupId,
            rhythmAnswerEditable: true,
          };
        }),
        pattern: expandedPattern.map((item) => item.rhythm),
        timeSignature,
      };
      return {
        variant: "ahTripletInsert",
        barIndex: targetBarIndex,
        noteIndices,
        targetRhythms,
      };
    }

    function applyPracticeRhythmPattern(question, barIndex, pattern) {
      const previousBar = question.bars[barIndex - 1];
      const previous = [...(previousBar?.notes ?? [])].reverse().find((note) => !note.rest) ?? tonicStartNoteForLevel("N5", question.key);
      const targetStep = question.bars[barIndex]?.notes?.find((note) => !note.rest)?.step ?? previous.step;
      const chordSymbol = question.bars[barIndex]?.chordSymbol ?? "I";
      question.bars[barIndex] = buildNational5PhraseBar({
        key: question.key,
        chordSymbol,
        pattern,
        barIndex,
        previous,
        totalBars: question.bars.length,
        timeSignature: question.timeSignature,
        targetStep,
      });
      return question.bars[barIndex];
    }

    function applyPlaybackRhythmPattern(bar, playbackPattern) {
      if (!bar || !playbackPattern?.length || bar.notes.length !== playbackPattern.length) return bar;
      let beat = 0;
      bar.notes = bar.notes.map((note, index) => {
        const rhythm = playbackPattern[index] ?? note.rhythm;
        const beats = rhythmInfo(rhythm).beats;
        const next = { ...note, beat, beats };
        beat += beats;
        return next;
      });
      return bar;
    }

    function findAdjacentRhythmTotalTarget(question, barCandidates) {
      const candidates = barCandidates.flatMap((barIndex) => {
        const bar = question.bars[barIndex];
        if (!bar?.notes?.length) return [];
        return bar.notes.slice(0, -1).flatMap((note, noteIndex) => {
          const next = bar.notes[noteIndex + 1];
          if (!note || !next || note.rest || next.rest || note.rhythm === next.rhythm) return [];
          const totalBeats = rhythmInfo(note.rhythm).beats + rhythmInfo(next.rhythm).beats;
          return [{
            variant: "noteValueTotal",
            barIndex,
            noteIndex,
            startIndex: noteIndex,
            noteIndices: [noteIndex, noteIndex + 1],
            targetRhythms: [note.rhythm, next.rhythm],
            totalBeats,
          }];
        });
      });
      return randomItem(candidates);
    }

    function plantHigherRhythmTotalTarget(question, excludedBars = []) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const barCandidates = question.bars
        .filter((bar) => !excluded.has(bar.barIndex) && bar.barIndex !== question.targetBar)
        .map((bar) => bar.barIndex);
      if (!barCandidates.length) return null;

      const existingTarget = findAdjacentRhythmTotalTarget(question, barCandidates);
      if (existingTarget) return existingTarget;

      const barIndex = randomItem(barCandidates);
      const patterns = barPatternsForSignature(question.timeSignature, "H").filter((pattern) => (
        pattern.some((rhythm, index) => index < pattern.length - 1 && rhythm !== pattern[index + 1])
      ));
      if (!patterns.length) return null;
      const bar = applyPracticeRhythmPattern(question, barIndex, randomBarPatternForSignature(patterns, question.timeSignature));
      return findAdjacentRhythmTotalTarget(question, [bar.barIndex]);
    }

    function advancedHigherTiedRhythmTotalTemplate(timeSignature) {
      const templates = {
        "2/4": { first: ["minim"], second: ["crotchet", "crotchet"], firstIndex: 0, secondIndex: 0 },
        "3/4": { first: ["dottedMinim"], second: ["crotchet", "minim"], firstIndex: 0, secondIndex: 0 },
        "4/4": { first: ["semibreve"], second: ["crotchet", "dottedMinim"], firstIndex: 0, secondIndex: 0 },
        "5/4": { first: ["dottedMinim", "minim"], second: ["crotchet", "minim", "minim"], firstIndex: 1, secondIndex: 0 },
        "6/8": { first: ["dottedMinim"], second: ["dottedCrotchet", "dottedCrotchet"], firstIndex: 0, secondIndex: 0 },
        "9/8": { first: ["dottedMinim", "dottedCrotchet"], second: ["dottedCrotchet", "dottedMinim"], firstIndex: 1, secondIndex: 0 },
        "12/8": { first: ["dottedMinim", "dottedMinim"], second: ["dottedCrotchet", "dottedMinim", "dottedCrotchet"], firstIndex: 1, secondIndex: 0 },
      };
      return templates[timeSignature?.id] ?? templates["4/4"];
    }

    function plantAdvancedHigherRhythmTotalTarget(question, excludedBars = []) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const barCandidates = question.bars
        .filter((bar) => {
          const nextBar = question.bars[bar.barIndex + 1];
          if (!nextBar) return false;
          if (excluded.has(bar.barIndex) || excluded.has(nextBar.barIndex)) return false;
          if (bar.barIndex === question.targetBar || nextBar.barIndex === question.targetBar) return false;
          return Math.floor(bar.barIndex / BARS_PER_SYSTEM) === Math.floor(nextBar.barIndex / BARS_PER_SYSTEM);
        })
        .map((bar) => bar.barIndex);
      if (!barCandidates.length) return null;

      const startBarIndex = randomItem(barCandidates);
      const endBarIndex = startBarIndex + 1;
      const template = advancedHigherTiedRhythmTotalTemplate(question.timeSignature);
      const firstBar = applyPracticeRhythmPattern(question, startBarIndex, template.first);
      const secondBar = applyPracticeRhythmPattern(question, endBarIndex, template.second);
      const first = firstBar.notes[template.firstIndex];
      const second = secondBar.notes[template.secondIndex];
      if (!first || !second || first.rest || second.rest) return null;

      firstBar.notes[template.firstIndex] = { ...first, tieToNext: true };
      secondBar.notes[template.secondIndex] = {
        ...second,
        ...NOTE_POOL[noteBaseIndex(first)],
        ...tiedContinuationPitch(first),
        tiedFromPrevious: true,
      };

      return {
        variant: "noteValueTotal",
        tied: true,
        barIndex: startBarIndex,
        endBarIndex,
        noteIndex: template.firstIndex,
        endNoteIndex: template.secondIndex,
        noteIndices: [template.firstIndex, template.secondIndex],
        targetRhythms: [first.rhythm, second.rhythm],
        totalBeats: rhythmInfo(first.rhythm).beats + rhythmInfo(second.rhythm).beats,
      };
    }

    function plantRhythmIdentificationTarget(question, excludedBars = []) {
      if (question.practiceLevel === "AH") return plantAdvancedHigherRhythmTotalTarget(question, excludedBars);
      if (question.level === "H") return plantHigherRhythmTotalTarget(question, excludedBars);
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const barCandidates = question.bars
        .filter((bar) => !excluded.has(bar.barIndex) && bar.barIndex !== question.targetBar)
        .map((bar) => bar.barIndex);
      if (!barCandidates.length) return null;

      const variantPool = ["dottedCrotchet"];
      const preferredVariant = randomItem(variantPool);
      const variants = [
        preferredVariant,
        ...variantPool.filter((variant) => variant !== preferredVariant),
      ];
      for (const variant of variants) {
        const patterns = RHYTHM_IDENTIFICATION_PATTERNS[variant]?.[question.timeSignature.id] ?? RHYTHM_IDENTIFICATION_PATTERNS[variant]?.["4/4"];
        if (!patterns?.length) continue;
        const barIndex = randomItem(barCandidates);
        const pattern = randomItem(patterns);
        const bar = applyPracticeRhythmPattern(question, barIndex, pattern);
        if (variant === "dottedCrotchet") {
          const noteCandidates = bar.notes
            .map((note, noteIndex) => ({ note, noteIndex }))
            .filter(({ note }) => note.rhythm === "dottedCrotchet" || note.rhythm === "quaver");
          const target = randomItem(noteCandidates);
          if (target) return { variant, barIndex, noteIndex: target.noteIndex, targetRhythm: target.note.rhythm };
        }
        if (variant === "scotchSnap") {
          const startIndex = bar.notes.findIndex((note, index) => note.rhythm === "semiquaver" && bar.notes[index + 1]?.rhythm === "dottedQuaver");
          if (startIndex >= 0) return { variant, barIndex, startIndex, noteIndices: [startIndex, startIndex + 1] };
        }
      }
      return null;
    }

    function plantRhythmFixTarget(question, excludedBars = []) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const barCandidates = question.bars
        .filter((bar) => !excluded.has(bar.barIndex) && bar.barIndex !== question.targetBar)
        .map((bar) => bar.barIndex);
      if (!barCandidates.length) return null;

      const patterns = RHYTHM_IDENTIFICATION_PATTERNS.dottedCrotchetQuaverFix?.[question.timeSignature.id]
        ?? RHYTHM_IDENTIFICATION_PATTERNS.dottedCrotchetQuaverFix?.["4/4"];
      if (!patterns?.length) return null;

      const barIndex = randomItem(barCandidates);
      const pattern = randomItem(patterns);
      const bar = applyPracticeRhythmPattern(question, barIndex, pattern.display);
      applyPlaybackRhythmPattern(bar, pattern.answer);
      return {
        variant: "dottedCrotchetQuaverFix",
        barIndex,
        startIndex: pattern.startIndex,
        noteIndices: [pattern.startIndex, pattern.startIndex + 1],
        displayPattern: pattern.display,
        targetPattern: pattern.answer,
        targetRhythms: {
          [pattern.startIndex]: pattern.answer[pattern.startIndex],
          [pattern.startIndex + 1]: pattern.answer[pattern.startIndex + 1],
        },
        barNoteCount: bar.notes.length,
      };
    }

    function restPatternForSignature(timeSignature) {
      const restTemplateBeats = (template) => [...(template.before ?? []), ...(template.rests ?? []), ...(template.after ?? [])]
        .reduce((total, rhythm) => total + rhythmInfo(rhythm).beats, 0);
      const validRestTemplates = (templates) => templates.filter((template) => Math.abs(restTemplateBeats(template) - timeSignature.beats) < 0.001);
      const simpleBySignature = {
        "2/4": [
          { rests: ["crotchetRest"], before: [], after: ["crotchet"] },
          { rests: ["quaverRest"], before: ["quaver"], after: ["crotchet"] },
          { rests: ["crotchetRest", "quaverRest"], before: [], after: ["quaver"] },
        ],
        "3/4": [
          { rests: ["dottedCrotchetRest"], before: [], after: ["dottedCrotchet"] },
          { rests: ["crotchetRest"], before: ["crotchet"], after: ["crotchet"] },
          { rests: ["quaverRest"], before: ["quaver", "quaver", "quaver"], after: ["crotchet"], ties: [1] },
          { rests: ["crotchetRest", "quaverRest"], before: [], after: ["quaver", "crotchet"] },
        ],
        "4/4": [
          { rests: ["dottedCrotchetRest"], before: ["crotchet"], after: ["dottedCrotchet"] },
          { rests: ["crotchetRest"], before: ["minim"], after: ["crotchet"] },
          { rests: ["quaverRest"], before: ["quaver", "crotchet"], after: ["minim"] },
          { rests: ["crotchetRest", "quaverRest"], before: ["crotchet"], after: ["quaver", "crotchet"] },
          { rests: ["quaverRest", "crotchetRest"], before: ["crotchet"], after: ["quaver", "crotchet"] },
        ],
        "5/4": [
          { rests: ["crotchetRest"], before: ["minim"], after: ["crotchet", "crotchet"] },
          { rests: ["quaverRest"], before: ["minim"], after: ["quaver", "crotchet", "crotchet"] },
          { rests: ["crotchetRest", "quaverRest"], before: ["minim"], after: ["quaver", "crotchet"] },
        ],
      };
      const regular = validRestTemplates(simpleBySignature[timeSignature.id] ?? simpleBySignature["4/4"]);
      const groupCount = Math.max(1, Math.round((timeSignature.beats ?? 3) / 1.5));
      const compoundTail = Array.from({ length: Math.max(0, groupCount - 1) }, () => "dottedCrotchet");
      const compound = [
        { rests: ["dottedCrotchetRest"], before: [], after: compoundTail },
        { rests: ["crotchetRest", "quaverRest"], before: [], after: compoundTail },
        { rests: ["quaverRest"], before: ["quaver", "quaver"], after: compoundTail },
      ];
      if (timeSignature.bottom === 8) return randomItem(validRestTemplates(compound));
      return randomItem(regular);
    }

    function plantRestTarget(question, excludedBars = [], allowedBars = null) {
      const excluded = new Set([...excludedBars, 0, question.bars.length - 1]);
      const barOptions = Array.isArray(allowedBars) ? allowedBars : [1, 2, 4, 5, 6];
      const candidates = barOptions.filter((index) => !excluded.has(index) && question.bars[index]);
      const fallbackCandidates = Array.isArray(allowedBars) ? candidates : (candidates.length ? candidates : [2]);
      const barIndex = randomItem(fallbackCandidates);
      const bar = question.bars[barIndex];
      if (!bar) return null;
      const template = restPatternForSignature(question.timeSignature);
      if (!template) return null;
      const rhythms = [...(template.before ?? []), ...(template.rests ?? []), ...(template.after ?? [])];
      if (!rhythms.some((rhythm) => !isRestRhythm(rhythm))) return null;
      let beat = 0;
      let previousIndex = noteBaseIndex(tonicStartNoteForLevel(question.level, question.key));
      const restIndices = [];
      const notes = rhythms.map((rhythm, noteIndex) => {
        const info = rhythmInfo(rhythm);
        let note;
        if (isRestRhythm(rhythm)) {
          note = makeNote(null, rhythm, barIndex, noteIndex, beat, question.key, bar.chordSymbol);
          if (template.fullBar) note.beats = question.timeSignature.beats;
          restIndices.push(noteIndex);
        } else {
          const base = NOTE_POOL[clamp(previousIndex + randomItem([-1, 0, 1]), 0, NOTE_POOL.length - 1)] ?? tonicStartNoteForLevel(question.level, question.key);
          note = makeNote(base, rhythm, barIndex, noteIndex, beat, question.key, bar.chordSymbol);
          previousIndex = noteBaseIndex(note);
        }
        beat += template.fullBar ? question.timeSignature.beats : info.beats;
        return note;
      });
      (template.ties ?? []).forEach((noteIndex) => {
        const first = notes[noteIndex];
        const second = notes[noteIndex + 1];
        if (!first || !second || first.rest || second.rest) return;
        notes[noteIndex] = { ...first, tieToNext: true };
        notes[noteIndex + 1] = {
          ...second,
          ...NOTE_POOL[noteBaseIndex(first)],
          ...tiedContinuationPitch(first),
          tiedFromPrevious: true,
        };
      });
      question.bars[barIndex] = { ...bar, notes, pattern: rhythms };
      return {
        variant: "rests",
        barIndex,
        noteIndices: restIndices,
        targetRhythms: Object.fromEntries(restIndices.map((index) => [index, notes[index].rhythm])),
      };
    }

    function rhythmValueAcceptedAnswers(rhythm) {
      if (rhythm === "quaver") {
        return {
          answer: "0.5 beats",
          accepts: acceptedAnswers("0.5", "half", "a half", "half a beat", "halve", "a halve", "halve a beat", "1/2", "0.50"),
        };
      }
      return {
        answer: "1.5 beats",
        accepts: acceptedAnswers("1.5", "1.5 beats", "1 1/2", "1 1/2 beats", "1 and a half", "1 and a half beats", "one and a half", "one and a half beats", "one point 5", "one point 5 beats", "1 1 2", "1 1 2 beats", "one and half", "one and half beats"),
      };
    }

    function rhythmNameAcceptedAnswers(rhythm) {
      const labels = {
        semibreve: ["semibreve", "whole note"],
        dottedMinim: ["dotted minim", "dotted half note"],
        minim: ["minim", "half note"],
        crotchet: ["crotchet", "quarter note"],
      };
      const accepts = labels[rhythm] ?? [rhythmInfo(rhythm).label];
      return {
        answer: rhythmInfo(rhythm).label.replace(/\b\w/g, (letter) => letter.toUpperCase()),
        accepts: acceptedAnswers(...accepts),
      };
    }

    function rhythmBeatDescription(rhythm) {
      const beats = rhythmInfo(rhythm).beats;
      if (beats === 0.5) return "half beat";
      return `${beats} beat`;
    }

    function rhythmBeatAcceptedAnswers(rhythm) {
      const beats = rhythmInfo(rhythm).beats;
      const wordAnswers = {
        0.25: ["quarter", "quarter beat", "quarter of a beat", "a quarter beat", "a quarter of a beat"],
        0.5: ["half", "half beat", "half a beat", "a half beat"],
        1: ["one", "one beat"],
        2: ["two", "two beats"],
        3: ["three", "three beats"],
        4: ["four", "four beats"],
      }[beats] ?? [];
      return {
        answer: `${beats} ${beats === 1 ? "beat" : "beats"}`,
        accepts: acceptedAnswers(String(beats), `${beats} ${beats === 1 ? "beat" : "beats"}`, ...wordAnswers),
      };
    }

    function rhythmTotalAcceptedAnswers(beats) {
      const whole = Math.floor(beats);
      const hasHalf = Math.abs(beats - whole - 0.5) < 0.001;
      const numberWords = {
        0: "zero",
        1: "one",
        2: "two",
        3: "three",
        4: "four",
        5: "five",
        6: "six",
      };
      const decimal = Number.isInteger(beats) ? String(beats) : String(beats).replace(/\.0$/, "");
      const beatLabel = beats === 1 ? "beat" : "beats";
      const wordAnswers = Number.isInteger(beats)
        ? [numberWords[beats], `${numberWords[beats]} ${beatLabel}`].filter(Boolean)
        : hasHalf
          ? [
            `${whole} 1/2`,
            `${whole} 1/2 beats`,
            `${whole} and a half`,
            `${whole} and a half beats`,
            `${numberWords[whole]} and a half`,
            `${numberWords[whole]} and a half beats`,
          ].filter(Boolean)
          : [];
      return {
        answer: `${decimal} ${beatLabel}`,
        accepts: acceptedAnswers(decimal, `${decimal} ${beatLabel}`, ...wordAnswers),
      };
    }

    function plantDottedRhythmDistractors(question, excludedBars = [], preferredTypes = ["reverseScotchSnap", "dottedCrotchet"]) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const barCandidates = question.bars
        .filter((bar) => !excluded.has(bar.barIndex))
        .map((bar) => bar.barIndex);
      const selectedBars = shuffleItems(barCandidates).slice(0, Math.min(2, barCandidates.length));
      selectedBars.forEach((barIndex, index) => {
        const type = preferredTypes[index % preferredTypes.length];
        const patterns = DOTTED_RHYTHM_DISTRACTOR_PATTERNS[type]?.[question.timeSignature.id] ?? DOTTED_RHYTHM_DISTRACTOR_PATTERNS[type]?.["4/4"];
        if (!patterns?.length) return;
        applyPracticeRhythmPattern(question, barIndex, randomItem(patterns));
      });
    }

    function sameScotchSelection(first, second) {
      if (second?.variant === "circleNoteValue") {
        return Boolean(first && second && first.variant === second.variant && first.targetRhythm === second.targetRhythm);
      }
      return Boolean(first && second && first.barIndex === second.barIndex && first.startIndex === second.startIndex);
    }

    function scaleDegreeAnswerBoxBars(question, targetBarIndex) {
      const systemStart = Math.floor(targetBarIndex / BARS_PER_SYSTEM) * BARS_PER_SYSTEM;
      const systemEnd = Math.min(question.bars.length - 1, systemStart + BARS_PER_SYSTEM - 1);
      const startBar = targetBarIndex === systemEnd ? Math.max(systemStart, targetBarIndex - 1) : targetBarIndex;
      const endBar = Math.min(systemEnd, startBar + 1);
      return {
        startBar,
        endBar,
        bars: Array.from({ length: endBar - startBar + 1 }, (_, index) => startBar + index),
      };
    }

    function scaleDegreeSelectionCorrect(question, selection) {
      const target = question.scaleDegreeTarget;
      if (!selection || target?.variant !== "scaleDegree") return false;
      const answerBars = scaleDegreeAnswerBoxBars(question, target.barIndex).bars;
      if (!answerBars.includes(selection.barIndex)) return false;
      const selectedNote = question.bars?.[selection.barIndex]?.notes?.[selection.startIndex];
      if (!selectedNote || selectedNote.rest) return false;
      return selectedNote.letter === scaleDegreeLetterForKey(question.key, target.degree);
    }

    function resetNational5PhraseMemory() {
      buildNational5PhraseBar.allNotes = [];
    }

    function applyMelodicAccidentals(notes, key) {
      return notes.map((note) => {
        const accidental = melodicAccidentalForLetter(key, note.letter);
        return accidental === null ? note : { ...note, writtenAccidental: accidental };
      });
    }

    function raisedMelodicAccidentalEntries(key) {
      return Object.entries(key?.melodicAccidentals ?? {});
    }

    function hasVisibleRequiredMelodicAccidental(question, excludedBars = []) {
      const required = raisedMelodicAccidentalEntries(question.key);
      if (!required.length) return true;
      const excluded = new Set(excludedBars);
      return question.bars.some((bar) => {
        if (excluded.has(bar.barIndex)) return false;
        const shownAccidentals = new Set();
        return (bar.notes ?? []).some((note) => {
          if (!note || note.rest) return false;
          const accidentalKey = `${note.letter}:${note.writtenAccidental}`;
          const showAccidental = Boolean(note.writtenAccidental) && !shownAccidentals.has(accidentalKey);
          if (note.writtenAccidental) shownAccidentals.add(accidentalKey);
          return required.some(([letter, accidental]) => note.letter === letter && note.writtenAccidental === accidental && showAccidental);
        });
      });
    }

    function ensureRequiredMelodicAccidental(question, excludedBars = [], allowExcludedFallback = true) {
      const required = raisedMelodicAccidentalEntries(question.key);
      if (!required.length || hasVisibleRequiredMelodicAccidental(question, excludedBars)) return question;
      const [requiredLetter, requiredAccidental] = required[0];
      const excluded = new Set(excludedBars);
      const allCandidates = question.bars.flatMap((bar) =>
        (bar.notes ?? []).map((note, noteIndex) => ({ bar, note, noteIndex }))
      ).filter(({ note }) => !note.rest && !note.tieToNext);
      const candidates = allCandidates.filter(({ bar }) => !excluded.has(bar.barIndex));
      const target = candidates[0] ?? (allowExcludedFallback ? allCandidates[0] : null);
      if (!target) return question;

      const replacement = NOTE_POOL
        .filter((note) => note.letter === requiredLetter)
        .reduce((best, note) => Math.abs(note.midi - target.note.midi) < Math.abs(best.midi - target.note.midi) ? note : best, noteByLetter(requiredLetter, 6));

      target.bar.notes[target.noteIndex] = {
        ...target.note,
        ...replacement,
        writtenAccidental: requiredAccidental,
      };
      return question;
    }

    function targetMovesWithinInterval(bars, targetBar, maximumInterval) {
      const target = bars[targetBar];
      const notes = (target?.notes ?? []).filter((note) => !note.rest);
      if (!notes.length) return false;
      for (let index = 1; index < notes.length; index += 1) {
        if (Math.abs(notes[index].step - notes[index - 1].step) > maximumInterval) return false;
      }
      return true;
    }

    function melodyHasOctaveLeap(bars) {
      const notes = bars.flatMap((bar) => bar.notes ?? []).filter((note) => !note.rest);
      return notes.some((note, index) => index > 0 && Math.abs(note.step - notes[index - 1].step) >= 7);
    }

    function hasEnoughPitchVariety(bars, minimum = 3) {
      const pitches = new Set(bars.flatMap((bar) => bar.notes ?? []).filter((note) => !note.rest).map((note) => `${note.letter}${note.octave}`));
      return pitches.size >= minimum;
    }

    function melodyNotes(bars) {
      return bars.flatMap((bar) => bar.notes ?? []).filter((note) => !note.rest);
    }

    function dominantLetterForKey(key) {
      return key?.chords?.V?.[0] ?? "G";
    }

    function levelMaximumInterval(level) {
      if (level === "N3" || level === "N4") return 2;
      if (isHigherLevel(level)) return 4;
      if (level === "N5") return 3;
      return 3;
    }

    function levelMaximumRange(level) {
      if (level === "N3" || level === "N4") return 5;
      if (level === "N5" || isHigherLevel(level)) return 7;
      return 7;
    }

    function longestRepeatedPitchRun(notes) {
      let longest = 1;
      let current = 1;
      for (let index = 1; index < notes.length; index += 1) {
        if (notes[index].step === notes[index - 1].step) {
          current += 1;
          longest = Math.max(longest, current);
        } else {
          current = 1;
        }
      }
      return longest;
    }

    function hasAwkwardBarlineLeap(bars, level) {
      const maximum = levelMaximumInterval(level);
      return bars.some((bar, index) => {
        const nextBar = bars[index + 1];
        const barNotes = (bar?.notes ?? []).filter((note) => !note.rest);
        const nextNotes = (nextBar?.notes ?? []).filter((note) => !note.rest);
        if (!barNotes.length || !nextNotes.length) return false;
        return Math.abs(nextNotes[0].step - barNotes.at(-1).step) > maximum;
      });
    }

    function hasBalancedContour(notes) {
      let rises = 0;
      let falls = 0;
      for (let index = 1; index < notes.length; index += 1) {
        const interval = notes[index].step - notes[index - 1].step;
        if (interval > 0) rises += 1;
        if (interval < 0) falls += 1;
      }
      return rises > 0 && falls > 0;
    }

    function leapsRecoverByStep(notes, level) {
      const recoveryLimit = 1;
      const leapThreshold = isHigherLevel(level) ? 3 : 2;
      for (let index = 1; index < notes.length - 1; index += 1) {
        const leap = notes[index].step - notes[index - 1].step;
        if (Math.abs(leap) < leapThreshold) continue;
        const recovery = notes[index + 1].step - notes[index].step;
        if (recovery === 0) continue;
        if (Math.sign(recovery) === Math.sign(leap) || Math.abs(recovery) > recoveryLimit) return false;
      }
      return true;
    }

    function melodyPassesQualityRules(question) {
      const notes = melodyNotes(question.bars);
      if (notes.length < 2) return false;
      const intervals = notes.slice(1).map((note, index) => Math.abs(note.step - notes[index].step));
      const range = Math.max(...notes.map((note) => note.step)) - Math.min(...notes.map((note) => note.step));
      const first = notes[0];
      const last = notes.at(-1);
      const tonic = question.key.tonic;
      const maximumRepeatedRun = 2;
      const finalChordLetters = question.key.chords?.[question.bars.at(-1)?.chordSymbol] ?? question.key.chords.I;
      const hasValidEnding = (question.level === "N5" || question.level === "H") && ["imperfect", "interrupted"].includes(question.cadenceId)
        ? finalChordLetters.includes(last.letter)
        : last.letter === tonic;

      if (first.letter !== tonic) return false;
      if (!hasValidEnding) return false;
      if (range > levelMaximumRange(question.level)) return false;
      if (Math.max(...intervals) > levelMaximumInterval(question.level)) return false;
      if (hasAwkwardBarlineLeap(question.bars, question.level)) return false;
      if (!hasBalancedContour(notes)) return false;
      if (!leapsRecoverByStep(notes, question.level)) return false;
      if (longestRepeatedPitchRun(notes) > maximumRepeatedRun) return false;
      return true;
    }

    function makeChordProgression() {
      const bar2 = randomItem(["I", "IV", "V", "VI"]);
      const bar3 = randomItem(["IV", "V"]);
      return ["I", bar2, bar3, "I"];
    }

    function makeEightBarRepetitionProgression() {
      const bar2 = randomItem(["I", "IV", "V", "VI"]);
      const bar3 = randomItem(["I", "IV", "V", "VI"]);
      const bar6 = randomItem(["I", "IV", "V", "VI"]);

    function makeNational3PracticeProgression() {
      const bar2 = randomItem(["IV", "VI"]);
      const bar3 = randomItem(["I", bar2 === "IV" ? "VI" : "IV"]);

    // Higher 16-bar melodies are built as four related 4-bar phrases, so they sound planned rather than assembled bar by bar.

        ["crotchetRest", "quaver", "quaver", "crotchet"],
        ["quaverRest", "quaver", "crotchet", "crotchet"],
        ["crotchet", "quaver", "quaver", "crotchet"],
        ["dottedCrotchet", "quaver", "crotchet"],
        ["crotchet", "crotchet", "crotchet"],

        ["crotchetRest", "quaver", "quaver", "crotchet", "quaver", "quaver", "crotchet"],
        ["quaverRest", "quaver", "crotchet", "crotchet", "dottedCrotchet", "quaver"],
        ["crotchet", "quaver", "quaver", "crotchet", "crotchet", "crotchet"],
        ["dottedCrotchet", "quaver", "crotchet", "quaver", "quaver", "crotchet"],
        ["minim", "quaver", "quaver", "dottedCrotchet", "quaver"],
      ],
      "6/8": [

        ["dottedCrotchet", "quaver", "quaver", "quaver", "dottedCrotchet"],
        ["dottedCrotchet", "dottedCrotchet", "quaver", "quaver", "quaver"],

      ],
    };

    function higherCadenceEnding(cadenceId, key) {
      return {
        perfect: [Math.random() < 0.28 ? "V7" : "V", "I"],
        imperfect: [randomItem(["I", "IV", "VI"]), "V"],
        plagal: ["IV", "I"],
        interrupted: ["V", "VI"],
      }[cadenceId] ?? ["V", "I"];
    }

    function generateChordProgression16(cadenceId, key) {
      const finalCadence = higherCadenceEnding(cadenceId, key);
      const bar13 = randomItem(["I", "IV", "VI"]);
      const bar14Options = ["IV", "V", "VI"].filter((symbol) => symbol !== bar13);
      const progression = [
        "I", randomItem(["IV", "VI"]), randomItem(["IV", "V"]), randomItem(["V", "I"]),
        "I", randomItem(["IV", "VI"]), randomItem(["IV", "V"]), randomItem(["V", "I"]),
        randomItem(["VI", "IV"]), randomItem(["IV", "V"]), randomItem(["VI", "IV"]), randomItem(["V", "IV"]),
        bar13, randomItem(bar14Options), finalCadence[0], finalCadence[1],
      ];
      if (progression[12] === progression[13]) {
        progression[13] = randomItem(["I", "IV", "V", "VI"].filter((symbol) => symbol !== progression[12]));
      }
      return progression;
    }

    function higherPhrasePatterns(timeSignature) {
      return HIGHER_PHRASE_RHYTHMS[timeSignature.id] ?? HIGHER_PHRASE_RHYTHMS["4/4"];
    }

    function randomHigherPhrasePattern(patterns) {
      return weightedRandomItem(patterns.map((pattern) => ({
        pattern,
        weight: pattern.some(isRestRhythm) ? 0.18 : 1,
      }))).pattern;
    }

    function patternWithMostNotes(patterns) {
      return [...patterns].sort((a, b) => b.filter((rhythm) => !isRestRhythm(rhythm)).length - a.filter((rhythm) => !isRestRhythm(rhythm)).length)[0] ?? patterns[0];
    }

    function higherFinalPatternForSignature(timeSignature) {
      return finalPatternForSignature(timeSignature);
    }

    let higherPhraseGenerationLevel = "H";

    function higherTonicStartNote(key) {
      const preferredOctave = { C: 5, F: 4, G: 4, A: 4 }[key.tonic] ?? 4;
      return NOTE_POOL.find((note) => note.letter === key.tonic && note.octave === preferredOctave && noteAllowedForLevel(higherPhraseGenerationLevel, note))
        ?? tonicStartNoteForLevel(higherPhraseGenerationLevel, key);
    }

    function higherMelodyRange(key) {
      const anchor = higherTonicStartNote(key);
      const levelRange = stepRangeForLevel(higherPhraseGenerationLevel);
      return {
        min: Math.max(levelRange.min, anchor.step - 3),
        max: Math.min(levelRange.max, anchor.step + 4),
      };
    }

    function generateMotif(key) {
      const start = higherTonicStartNote(key);
      const range = higherMelodyRange(key);
      const motifLength = randomItem([3, 4, 4, 5]);
      const steps = [start.step];
      const intervals = shuffleItems([1, 1, -1, 2, -2, 1, -1]);
      while (steps.length < motifLength) {
        const next = steps.at(-1) + (intervals.shift() ?? randomItem([-1, 1]));
        const candidate = noteBaseForStep(next);
        if (noteAllowedForLevel(higherPhraseGenerationLevel, candidate) && candidate.step >= range.min && candidate.step <= range.max) steps.push(next);
      }
      return steps.map((step) => noteBaseForStep(step));
    }

    function higherContourTargetStep(key, barIndex) {
      const tonic = higherTonicStartNote(key).step;
      const range = higherMelodyRange(key);
      const contour = [
        0, 1, 2, 1,
        0, 2, 3, 1,
        2, 3, 5, 4,
        3, 2, 1, 0,
      ];
      return clamp(tonic + contour[barIndex], range.min, range.max);
    }

    function chooseHigherPhrasePitch({ key, chordSymbol, previous, allNotes, rhythm, beat, barIndex, motif, motifIndex, cadenceLetter = null, timeSignature = null }) {
      const chordLetters = key.chords[chordSymbol] ?? key.chords.I;
      const previousStep = previous?.step ?? tonicStartNoteForLevel(higherPhraseGenerationLevel, key).step;
      const range = higherMelodyRange(key);
      const previousInterval = allNotes.length > 1 ? previousStep - allNotes.at(-2).step : 0;
      const recoveringLeap = Math.abs(previousInterval) > 2;
      const repeatedRun = currentRepeatedPitchRun(allNotes);
      const strongBeat = timeSignature?.id === "5/4"
        ? groupStartBeatsForTimeSignature(timeSignature).some((groupBeat) => Math.abs(beat - groupBeat) < 0.001)
        : beat === 0 || beat === 2 || beat === 3 || beat === 1.5;
      const targetStep = higherContourTargetStep(key, barIndex);
      const motifStep = motif?.[motifIndex % motif.length]?.step ?? targetStep;

      const candidates = NOTE_POOL.filter((candidate) => {
        if (!noteAllowedForLevel(higherPhraseGenerationLevel, candidate)) return false;
        if (candidate.step < range.min || candidate.step > range.max) return false;
        if (cadenceLetter && candidate.letter !== cadenceLetter) return false;
        const distance = candidate.step - previousStep;
        const absDistance = Math.abs(distance);
        if (absDistance > 4) return false;
        if (strongBeat && !chordLetters.includes(candidate.letter)) return false;
        if (rhythm === "quaver" && absDistance > 2) return false;
        if (repeatedRun >= 2 && distance === 0) return false;
        if (recoveringLeap && distance !== 0 && Math.sign(distance) === Math.sign(previousInterval)) return false;
        if (recoveringLeap && absDistance > 1) return false;
        return true;
      });

      const weighted = candidates.map((candidate) => {
        const distance = Math.abs(candidate.step - previousStep);
        const chordTone = chordLetters.includes(candidate.letter);
        let weight = chordTone ? 7 : 2;
        if (strongBeat && chordTone) weight *= 3;
        if (distance === 0) weight *= 0.35;
        if (distance === 1) weight *= 9;
        if (distance === 2) weight *= 3;
        if (distance === 3) weight *= 1.1;
        if (distance === 4) weight *= 0.35;
        if (rhythm === "quaver" && distance === 0) weight *= 0.25;
        weight *= 1 / (1 + Math.abs(candidate.step - targetStep) * 0.6);
        weight *= 1 / (1 + Math.abs(candidate.step - motifStep) * 0.35);
        if (barIndex >= 10 && barIndex <= 13 && candidate.step >= targetStep) weight *= 1.45;
        if (barIndex >= 13 && candidate.step > targetStep + 1) weight *= 0.45;
        if (melodicAccidentalForLetter(key, candidate.letter) !== null) weight *= 0.85;
        return { candidate, weight };
      });

      return weightedRandomItem(weighted.length ? weighted : [{ candidate: previous ?? higherTonicStartNote(key), weight: 1 }]).candidate;
    }

    function buildHigherPhraseBar({ key, chordSymbol, pattern, barIndex, previous, totalBars, timeSignature, motif, phraseOffset = 0, cadenceLetter = null }) {
      let beat = 0;
      const notes = [];
      const allNotes = buildHigherPhraseBar.allNotes ?? [];
      const lastSoundingIndex = pattern.map((rhythm, index) => isRestRhythm(rhythm) ? null : index).filter((index) => index !== null).at(-1);
      pattern.forEach((rhythm, noteIndex) => {
        if (isRestRhythm(rhythm)) {
          const rest = makeNote(null, rhythm, barIndex, noteIndex, beat, key, chordSymbol);
          notes.push(rest);
          beat += rhythmInfo(rhythm).beats;
          return;
        }
        const isLastSound = noteIndex === lastSoundingIndex;
        let base = chooseHigherPhrasePitch({
          key,
          chordSymbol,
          previous,
          allNotes,
          rhythm,
          beat,
          barIndex,
          motif,
          motifIndex: noteIndex + phraseOffset,
          cadenceLetter: isLastSound ? cadenceLetter : null,
          timeSignature,
        });
        if (barIndex === 0 && noteIndex === 0) base = higherTonicStartNote(key);
        const note = makeNote(base, rhythm, barIndex, noteIndex, beat, key, chordSymbol);
        notes.push(note);
        allNotes.push(note);
        previous = base;
        beat += rhythmInfo(rhythm).beats;
      });
      buildHigherPhraseBar.allNotes = allNotes;
      return { barIndex, chordSymbol, notes, totalBars, pattern, timeSignature };
    }

    function resetHigherPhraseMemory() {
      buildHigherPhraseBar.allNotes = [];
    }

    function cadenceLetterForHigherBar(barIndex, progression, key, cadenceId) {
      if (barIndex === 3 || barIndex === 7) return ["V", "V7"].includes(progression[barIndex]) ? dominantLetterForKey(key) : key.tonic;
      if (barIndex === 11) return ["V", "V7"].includes(progression[barIndex]) ? dominantLetterForKey(key) : (key.chords?.[progression[barIndex]] ?? [key.tonic])[0];
      if (barIndex === 15) {
        if (cadenceId === "imperfect") return dominantLetterForKey(key);
        if (cadenceId === "interrupted") return (key.chords?.VI ?? [key.tonic])[0];
        return key.tonic;
      }
      return null;
    }

    function forceHigherCadenceNotes(bars, key, cadenceId) {
      const progression = bars.map((bar) => bar.chordSymbol);
      const range = higherMelodyRange(key);
      [3, 7, 11, 15].forEach((barIndex) => {
        const bar = bars[barIndex];
        const cadenceLetter = cadenceLetterForHigherBar(barIndex, progression, key, cadenceId);
        if (!bar || !cadenceLetter) return;
        const noteIndex = [...bar.notes].map((note, index) => ({ note, index })).reverse().find((item) => !item.note.rest)?.index;
        if (!Number.isInteger(noteIndex)) return;
        const previousNote = melodyNotes(bars.slice(0, barIndex + 1)).filter((note) => !(note.barIndex === barIndex && note.noteIndex >= noteIndex)).at(-1);
        const candidates = NOTE_POOL
          .filter((note) => note.letter === cadenceLetter && noteAllowedForLevel(higherPhraseGenerationLevel, note) && note.step >= range.min && note.step <= range.max)
          .filter((note) => !previousNote || Math.abs(note.step - previousNote.step) <= levelMaximumInterval("H"));
        const fallbackCandidates = candidates.length ? candidates : NOTE_POOL.filter((note) => note.letter === cadenceLetter && noteAllowedForLevel(higherPhraseGenerationLevel, note));
        const original = bar.notes[noteIndex];
        const selected = fallbackCandidates.reduce((best, note) => {
          const targetStep = higherContourTargetStep(key, barIndex);
          return Math.abs(note.step - targetStep) < Math.abs(best.step - targetStep) ? note : best;
        }, fallbackCandidates[0] ?? original);
        bar.notes[noteIndex] = makeNote(selected, original.rhythm, barIndex, noteIndex, original.beat, key, bar.chordSymbol);
      });
      return bars;
    }

    function barRhythmTotalBeats(bar) {
      if (bar.notes?.length) {
        return bar.notes.reduce((sum, note) => sum + (Number.isFinite(note.beats) ? note.beats : rhythmInfo(note.rhythm).beats), 0);
      }
      return (bar.pattern ?? []).reduce((sum, rhythm) => sum + rhythmInfo(rhythm).beats, 0);
    }

    function validateRhythmBars(question) {
      return question.bars.every((bar) => {
        const timeSignature = timeSignatureForBar(question, bar);
        const finalPatternBeats = finalPatternForSignature(timeSignature)
          .reduce((total, rhythm) => total + rhythmInfo(rhythm).beats, 0);
        const expectedBeats = bar.barIndex === question.bars.length - 1
          ? Math.min(timeSignature.beats, finalPatternBeats)
          : timeSignature.beats;
        if (Math.abs(barRhythmTotalBeats(bar) - expectedBeats) >= 0.001) return false;
        return timeSignature.id !== "5/4"
          || !(bar.notes ?? []).some((note) => noteCrossesInternalBoundary(note, timeSignature));
      });
    }

    function finalSoundingNote(bar) {
      return [...(bar?.notes ?? [])].reverse().find((note) => !note.rest) ?? null;
    }

    function hasPerfectAuthenticCadence(question) {
      if (question.cadenceId !== "perfect") return true;
      const penultimateChord = question.bars.at(-2)?.chordSymbol;
      const finalChord = question.bars.at(-1)?.chordSymbol;
      const finalNote = finalSoundingNote(question.bars.at(-1));
      return ["V", "V7"].includes(penultimateChord)
        && finalChord === "I"
        && finalNote?.letter === question.key.tonic;
    }

    function validateCadences(question) {
      if (!hasPerfectAuthenticCadence(question)) return false;
      const expected = [3, 7, 11, 15];
      return expected.every((barIndex) => {
        const note = finalSoundingNote(question.bars[barIndex]);
        if (!note) return false;
        const cadenceLetter = cadenceLetterForHigherBar(barIndex, question.bars.map((bar) => bar.chordSymbol), question.key, question.cadenceId);
        return !cadenceLetter || note.letter === cadenceLetter;
      });
    }

    function validateIntervals(question) {
      const notes = melodyNotes(question.bars);
      const intervals = notes.slice(1).map((note, index) => note.step - notes[index].step);
      const leapCount = intervals.filter((interval) => Math.abs(interval) >= 3).length;
      if (leapCount > Math.ceil(intervals.length * 0.18)) return false;
      return leapsRecoverByStep(notes, question.level);
    }

    function validateMelodyStructure(question) {
      const notes = melodyNotes(question.bars);
      if (!notes.length) return false;
      const highestStep = Math.max(...notes.map((note) => note.step));
      const highestBars = notes.filter((note) => note.step === highestStep).map((note) => note.barIndex ?? 0);
      if (!highestBars.some((barIndex) => barIndex >= 8)) return false;
      if (!validateRhythmBars(question)) return false;
      if (!validateCadences(question)) return false;
      if (!validateIntervals(question)) return false;
      if (!melodyPassesQualityRules(question)) return false;
      return true;
    }

    function generateHigherPhraseQuestion(attempt = 0, cadenceId = "perfect", requireMissingCopy = true, requireSimpleTime = false, timeSignatureLevel = "H", allowedTimeSignatureIds = null, allowRests = true) {
      higherPhraseGenerationLevel = timeSignatureLevel === "AH" ? "AH" : "H";
      const activeBarCount = 16;
      const timeSignatureOptions = requireSimpleTime ? simpleTimeSignaturesForLevel(timeSignatureLevel) : timeSignaturesForLevel(timeSignatureLevel);
      const filteredTimeSignatureOptions = Array.isArray(allowedTimeSignatureIds)
        ? timeSignatureOptions.filter((signature) => allowedTimeSignatureIds.includes(signature.id))
        : timeSignatureOptions;
      const timeSignature = withFiveFourGrouping(weightedRandomItem(filteredTimeSignatureOptions.length ? filteredTimeSignatureOptions : timeSignatureOptions));
      const canRetryPhrase = canRetryQualityRules("H", attempt, timeSignatureLevel);
      const key = randomPracticeKey(timeSignatureLevel);
      const progression = generateChordProgression16(cadenceId, key);
      const targetBarCandidates = [1, 2, 4, 5, 6, 8, 9, 10, 12, 13, 14];
      const targetBar = randomItem(targetBarCandidates);
      const phrasePatterns = higherPhrasePatterns(timeSignature);
      const patternsWithoutRests = phrasePatterns.filter((pattern) => !patternUsesRestRhythm(pattern));
      const patterns = timeSignatureLevel === "AH" && !allowRests && patternsWithoutRests.length ? patternsWithoutRests : phrasePatterns;
      const motif = generateMotif(key);
      const phraseA = Array.from({ length: 4 }, () => randomHigherPhrasePattern(patterns));
      const phraseAVariation = phraseA.map((pattern, index) => index === 3 ? randomHigherPhrasePattern(patterns) : pattern);
      const phraseB = Array.from({ length: 4 }, (_, index) => index % 2 ? randomHigherPhrasePattern(patterns) : patternWithMostNotes(patterns));
      const phraseC = phraseA.map((pattern, index) => index === 3 ? higherFinalPatternForSignature(timeSignature) : pattern);
      const barPatterns = [...phraseA, ...phraseAVariation, ...phraseB, ...phraseC];
      const bars = [];
      let previous = higherTonicStartNote(key);
      resetHigherPhraseMemory();

      for (let barIndex = 0; barIndex < activeBarCount; barIndex += 1) {
        const cadenceLetter = cadenceLetterForHigherBar(barIndex, progression, key, cadenceId);
        const bar = buildHigherPhraseBar({
          key,
          chordSymbol: progression[barIndex],
          pattern: barPatterns[barIndex],
          barIndex,
          previous,
          totalBars: activeBarCount,
          timeSignature,
          motif,
          phraseOffset: Math.floor(barIndex / 4),
          cadenceLetter,
        });
        bars.push(bar);
        previous = [...bar.notes].reverse().find((note) => !note.rest) ?? previous;
      }
      forceHigherCadenceNotes(bars, key, cadenceId);

      const question = {
        id: Math.random().toString(36).slice(2),
        key,
        timeSignature,
        bars,
        targetBar,
        level: "H",
        mode: "phrase",
        cadenceId,
        missingSourceBar: null,
        questionType: "eightBarRepetition",
        barCount: activeBarCount,
        useShortPrompt: true,
      };
      if (requireMissingCopy && !makePreviousBarStepVariation(question) && canRetryPhrase) {
        return generateHigherPhraseQuestion(attempt + 1, cadenceId, requireMissingCopy, requireSimpleTime, timeSignatureLevel, allowedTimeSignatureIds, allowRests);
      }
      Object.assign(question, chooseMissingNoteScope(question));
      if (!strongBeatsUseChordTones(question) && canRetryPhrase) return generateHigherPhraseQuestion(attempt + 1, cadenceId, requireMissingCopy, requireSimpleTime, timeSignatureLevel, allowedTimeSignatureIds, allowRests);
      if (!validateMelodyStructure(question) && canRetryPhrase) return generateHigherPhraseQuestion(attempt + 1, cadenceId, requireMissingCopy, requireSimpleTime, timeSignatureLevel, allowedTimeSignatureIds, allowRests);
      return question;
    }

    function copyNational3QuestionPhraseToAnswer(bars, key) {
      [[0, 4], [1, 5]].forEach(([sourceIndex, targetIndex]) => {
        const source = bars[sourceIndex];
        const target = bars[targetIndex];
        if (!source || !target) return;
        bars[targetIndex] = {
          ...target,
          notes: source.notes.map((note, noteIndex) => makeNote(
            note.rest ? null : note,
            note.rhythm,
            targetIndex,
            noteIndex,
            note.beat,
            key,
            target.chordSymbol,
          )),
          pattern: source.notes.map((note) => note.rhythm),
        };
      });
      return bars;
    }

    function makeNational5PracticeProgression(cadenceId = "perfect", barCount = BAR_COUNT) {
      const progression = Array.from({ length: barCount }, () => randomItem(["I", "IV", "V", "VI"]));
      const bar2 = randomItem(["I", "IV", "V", "VI"]);
      const bar3 = randomItem(["I", "IV", "V", "VI"]);
      const bar6 = randomItem(["I", "IV", "V", "VI"]);
      const ending = {
        perfect: ["V", "I"],
        imperfect: [randomItem(["I", "IV", "VI"]), "V"],
        plagal: ["IV", "I"],
        interrupted: ["V", "VI"],
      }[cadenceId] ?? ["V", "I"];
      progression[0] = "I";
      progression[1] = bar2;
      progression[2] = bar3;
      progression[3] = "V";
      progression[4] = "I";
      progression[5] = bar6;
      progression[barCount - 2] = ending[0];
      progression[barCount - 1] = ending[1];
      if (barCount >= 16) {
        if (progression[12] === progression[13]) {
          progression[12] = randomItem(["I", "IV", "V", "VI"].filter((symbol) => symbol !== progression[13]));
        }
        if (progression[11] === progression[12]) {
          progression[11] = randomItem(["I", "IV", "V", "VI"].filter((symbol) => symbol !== progression[12]));
        }
      }
      return progression;
    }

    function allowedChordsForBar(barIndex) {
      if (barIndex === 0 || barIndex === 3) return ["I"];
      if (barIndex === 1) return ["I", "IV", "V", "VI"];
      return ["IV", "V"];
    }

    function chordFitScore(key, bar, chordSymbol) {
      const chordLetters = key.chords[chordSymbol] ?? [];
      return (bar.notes ?? []).reduce((score, note) => {
        if (note.rest) return score;
        const isChordTone = chordLetters.includes(note.letter);
        const durationWeight = Math.max(1, note.beats ?? rhythmInfo(note.rhythm).beats);
        const weight = (note.beat === 0 || note.beat === 2 ? 3 : 1) * durationWeight;
        return score + (isChordTone ? weight : -weight);
      }, 0);
    }

    function noteIsOnStrongBeat(note, timeSignature = null) {
      if (!note || note.rest) return false;
      if (timeSignature?.id === "5/4") {
        return groupStartBeatsForTimeSignature(timeSignature).some((beat) => Math.abs((note.beat ?? 0) - beat) < 0.001);
      }
      return note.beat === 0 || note.beat === 2 || note.beat === 3 || (note.beat === 1.5 && rhythmInfo(note.rhythm).beats >= 1);
    }

    function pitchFitsStrongBeatChord(question, bar, note, pitch) {
      if (!noteIsOnStrongBeat(note, timeSignatureForBar(question, bar))) return true;
      const chordLetters = question.key?.chords?.[bar.chordSymbol] ?? [];
      return chordLetters.includes(pitch.letter);
    }

    function chordForStrongBeatNotes(key, notes, fallbackSymbol = "I", timeSignature = null) {
      const strongBeatLetters = (notes ?? [])
        .filter((note) => noteIsOnStrongBeat(note, timeSignature))
        .map((note) => note.letter);
      const chordSymbols = Object.keys(key?.chords ?? {});
      const fallbackLetters = key?.chords?.[fallbackSymbol] ?? [];
      if (strongBeatLetters.every((letter) => fallbackLetters.includes(letter))) return fallbackSymbol;
      return chordSymbols.find((symbol) => {
        const chordLetters = key.chords[symbol] ?? [];
        return strongBeatLetters.every((letter) => chordLetters.includes(letter));
      }) ?? null;
    }

    function chordLettersForStrongBeatCheck(question, bar, note, advancedHigherChordTarget = null) {
      const ahSlot = advancedHigherChordSlotsForBar(question, bar.barIndex, advancedHigherChordTarget)
        .find((slot) => Math.abs((note.beat ?? 0) - slot.beat) < 0.001);
      if (ahSlot) return question.key?.chords?.[ahSlot.chordSymbol] ?? [];
      const chordTypeNote = bar.notes?.find((item) => item?.chordTypeId && item.stack?.length);
      if (chordTypeNote) return chordTypeNote.stack.map((tone) => tone.letter);
      return question.key?.chords?.[bar.chordSymbol] ?? [];
    }

    function strongBeatsUseChordTones(question, advancedHigherChordTarget = null) {
      return question.bars.every((bar) => {
        return (bar.notes ?? []).every((note) => {
          if (!noteIsOnStrongBeat(note, timeSignatureForBar(question, bar))) return true;
          return chordLettersForStrongBeatCheck(question, bar, note, advancedHigherChordTarget).includes(note.letter);
        });
      });
    }

    function fitChordsToMelody(key, bars) {
      return bars.map((bar) => {
        const allowed = allowedChordsForBar(bar.barIndex);
        const bestChord = allowed.reduce((best, chordSymbol) => (
          chordFitScore(key, bar, chordSymbol) > chordFitScore(key, bar, best) ? chordSymbol : best
        ), allowed[0]);
        return { ...bar, chordSymbol: bestChord };
      });
    }

    function refitQuestionChordsToMelody(question, protectedBars = []) {
      const protectedSet = new Set(protectedBars.filter((barIndex) => Number.isInteger(barIndex)));
      const availableChords = Object.keys(question.key?.chords ?? {});
      if (!availableChords.length) return question;
      question.bars = question.bars.map((bar) => {
        if (protectedSet.has(bar.barIndex)) return bar;
        const bestChord = availableChords.reduce((best, chordSymbol) => (
          chordFitScore(question.key, bar, chordSymbol) > chordFitScore(question.key, bar, best) ? chordSymbol : best
        ), bar.chordSymbol && availableChords.includes(bar.chordSymbol) ? bar.chordSymbol : availableChords[0]);
        return {
          ...bar,
          chordSymbol: bestChord,
          notes: (bar.notes ?? []).map((note) => note.rest ? note : makeNote(note, note.rhythm, bar.barIndex, note.noteIndex, note.beat, question.key, bestChord)),
        };
      });
      return question;
    }

    function sequenceSourceCandidates(bars, targetBar, level) {
      if (level !== "N4") return bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length);
      return bars.filter((bar) => bar.barIndex === targetBar - 1 && bar.notes?.length);
    }

    function retryLimitForLevel(level) {
      return level === "N3" ? 8 : 160;
    }

    function canRetryForLevel(level, attempt) {
      return attempt < retryLimitForLevel(level);
    }

    function canRetryQualityRules(level, attempt, timeSignatureLevel = level) {
      if (timeSignatureLevel === "AH") return attempt < 3;
      return canRetryForLevel(level, attempt);
    }

    const MIN_MISSING_NOTES_PER_TASK = 2;
    const MAX_MISSING_NOTES_PER_TASK = 5;
    function missingTaskPatternFits(pattern) {
      const noteCount = (pattern ?? []).filter((rhythm) => !isRestRhythm(rhythm)).length;
      return noteCount >= MIN_MISSING_NOTES_PER_TASK && noteCount <= MAX_MISSING_NOTES_PER_TASK;
    }

    function missingTaskNoteCount(bars, targetBar) {
      return (bars?.[targetBar]?.notes ?? []).filter((note) => !note.rest).length;
    }

    function missingNoteIndicesForQuestion(question) {
      const bar = question.bars?.[question.targetBar];
      const allIndices = (bar?.notes ?? []).map((_, index) => index);
      return question.missingNoteIndices?.length ? question.missingNoteIndices : allIndices;
    }

    function chooseMissingNoteScope(question) {
      const bar = question.bars?.[question.targetBar];
      const notes = bar?.notes ?? [];
      const allIndices = notes.map((_, index) => index);
      if (question.missingNoteIndices?.length) {
        return {
          missingNoteScope: "bar",
          missingNoteIndices: question.missingNoteIndices,
        };
      }
      if (question.level === "H") {
        return {
          missingNoteScope: "bar",
          missingNoteIndices: allIndices,
        };
      }
      const midpoint = (question.timeSignature?.beats ?? 4) / 2;
      const firstHalf = notes
        .map((note, index) => note.beat < midpoint ? index : null)
        .filter((index) => index !== null);
      const secondHalf = notes
        .map((note, index) => note.beat >= midpoint ? index : null)
        .filter((index) => index !== null);
      const candidates = [
        { scope: "bar", indices: allIndices, weight: 2 },
        ...(firstHalf.length && firstHalf.length < allIndices.length ? [{ scope: "firstHalf", indices: firstHalf, weight: 1 }] : []),
        ...(secondHalf.length && secondHalf.length < allIndices.length ? [{ scope: "secondHalf", indices: secondHalf, weight: 1 }] : []),
      ];
      const selected = weightedRandomItem(candidates);
      return {
        missingNoteScope: selected.scope,
        missingNoteIndices: selected.indices,
      };
    }

    function missingNotePromptLocation(question) {
      if (question.missingNoteScope === "firstHalf") return `the first half of bar ${question.targetBar + 1}`;
      if (question.missingNoteScope === "secondHalf") return `the second half of bar ${question.targetBar + 1}`;
      return `bar ${question.targetBar + 1}`;
    }

    function makeCompletionQuestion(level = "N5", attempt = 0, allowDenseAhPatterns = false) {
      const activeBarCount = barCountForLevel(level);
      const timeSignature = withFiveFourGrouping(weightedRandomItem(timeSignaturesForLevel(level)));
      const key = level === "N3" || level === "N4"
        ? KEYS.find((item) => item.id === "C")
        : randomPracticeKey(level);
      const progression = makeChordProgression();

      const targetBar = level === "N4" || level === "N5" || isHigherLevel(level)
        ? randomItem([1, 2])
        : randomItem(Array.from({ length: activeBarCount }, (_, index) => index));
      const bars = [];
      let previousIndex = noteBaseIndex(tonicStartNoteForLevel(level, key));
      const mode = levelMode(level);

      for (let barIndex = 0; barIndex < activeBarCount; barIndex += 1) {
        const chordSymbol = progression[barIndex];
        let bar;
        if (barIndex === activeBarCount - 1) {
          bar = buildFinalBar({ key, chordSymbol, barIndex, timeSignature, previousIndex, totalBars: activeBarCount, level });
          previousIndex = noteBaseIndex(bar.notes[0]);
        } else {
          const availablePatterns = level === "AH" ? ahBarPatternsForSignature(timeSignature, allowDenseAhPatterns, false) : barPatternsForSignature(timeSignature, level);
          const missingSafePatterns = barIndex === targetBar && level !== "H" ? availablePatterns.filter(missingTaskPatternFits) : availablePatterns;
          const pattern = randomBarPatternForSignature(missingSafePatterns.length ? missingSafePatterns : availablePatterns);
          const built = buildNotesFromPattern({ key, chordSymbol, pattern, barIndex, previousIndex, level, mode, previousNotes: melodyNotes(bars) });
          previousIndex = built.lastIndex;
          bar = { barIndex, chordSymbol, notes: built.notes, totalBars: activeBarCount, pattern };
        }
        bars.push(bar);
      }

      if (bars[targetBar]?.notes?.length) {
        if (mode === "repetition") {
          let repetitionCandidates = bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length);
          const repetitionSource = randomItem(repetitionCandidates.length ? repetitionCandidates : bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length));
          bars[targetBar] = { ...bars[targetBar], notes: cloneNotesForBar(repetitionSource.notes, targetBar) };
        } else if (mode === "sequence") {
          let possibleSources = sequenceSourceCandidates(bars, targetBar, level);
          const sequenceOptions = possibleSources.flatMap((source) => [-1, 1]
            .filter((offset) => canTransposeBarByStep(source, offset, level))
            .map((offset) => ({ source, offset })));
          const selectedSequence = randomItem(sequenceOptions);
          if (selectedSequence) {

          : bars.filter((bar) => (

            && bar.barIndex !== activeBarCount - 1
            && (level !== "N5" || (bar.notes ?? []).filter((note) => !note.rest).length >= 3)
            && (level === "H" || (bar.notes ?? []).filter((note) => !note.rest).length <= MAX_MISSING_NOTES_PER_TASK)
            && (bar.notes ?? []).some((note) => !note.rest)
          ));
        const source = level === "N3" ? sourceBars[0] : randomItem(sourceBars);
        if (!source && canRetryForLevel(level, attempt)) return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy, requireSimpleTime, timeSignatureLevel, allowedTimeSignatureIds, allowRests);
        if (source) {
          bars[targetBar] = {
            ...bars[targetBar],
            chordSymbol: source.chordSymbol,
            notes: applyMelodicAccidentals(cloneNotesForBar(source.notes, targetBar), key),
            pattern: source.notes.map((note) => note.rhythm),
          };
          missingSourceBar = source.barIndex;
        }
      }

      const question = {
        id: Math.random().toString(36).slice(2),
        key,
        timeSignature,
        bars,
        targetBar,
        level,
        mode,
        cadenceId,
        missingSourceBar,
        questionType: "eightBarRepetition",
        barCount: activeBarCount,

      const usesPreviousBarStepVariation = level === "H" && requireMissingCopy;
      if (usesPreviousBarStepVariation && !makePreviousBarStepVariation(question) && canRetryForLevel(level, attempt)) {

      }
      Object.assign(question, chooseMissingNoteScope(question));

      const targetMaximumInterval = level === "N5" ? national5MelodicLeapLimit() : maxStepForLevel(level, mode);
      if (!targetMovesWithinInterval(bars, targetBar, targetMaximumInterval) && canRetryForLevel(level, attempt)) {

      }

      if ((level === "N3" || level === "N4") && !hasEnoughPitchVariety(bars) && canRetryForLevel(level, attempt)) {

      if (level === "N5" && requireMissingCopy && ((bars[targetBar]?.notes ?? []).filter((note) => !note.rest).length) < 3 && canRetryForLevel(level, attempt)) {

        && ((question.missingNoteIndices?.length ?? missingTaskNoteCount(bars, targetBar)) < MIN_MISSING_NOTES_PER_TASK || (question.missingNoteIndices?.length ?? missingTaskNoteCount(bars, targetBar)) > MAX_MISSING_NOTES_PER_TASK)
        && canRetryForLevel(level, attempt)

        return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy, requireSimpleTime, timeSignatureLevel, allowedTimeSignatureIds, allowRests);
      }

      if (!usesPreviousBarStepVariation && requiresExactMissingCopy(level, requireMissingCopy) && !targetHasSourcePattern(bars, targetBar, hasExactBarCopy) && canRetryForLevel(level, attempt)) {
