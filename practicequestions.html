            <img src={ASSET.next} alt="" aria-hidden="true" className="h-[24px] w-[24px] object-contain brightness-0 invert" />
          </button>
        );
      }

      function finalFeedbackNextQuestionButton(part, index) {
        if (!feedback || feedback.revealing || index !== totalParts - 1 || !results[part.id]) return null;
        return (
          <div
            className="ml-auto shrink-0 self-end"
            style={{ animation: "feedbackNextButtonIn .6s ease-out .55s both" }}
          >
            {feedbackNextQuestionButton()}
          </div>
        );
      }

      function clearSubquestion(part) {
        if (feedback) return;
        const sourceId = part.sourceId ?? part.id;
        if (sourceId === "missing") {
          setUserNotes({});
          return;
        }
        if (sourceId === "dynamic" && part.type === "dynamic") {
          setPracticeAnswers((current) => ({ ...current, [part.id]: "" }));
          onPlaceDynamic(null);
          return;
        }
        if (["repeatSigns", "barlines", "rhythmicDictation", "rhythmIdentification"].includes(sourceId) || part.type === "scotchSnap" || part.type === "rhythmFix") {
          setPracticeAnswers((current) => ({ ...current, [part.id]: null }));
          return;
        }
        setPracticeAnswers((current) => ({ ...current, [part.id]: "" }));
      }

      function clearAllQuestions() {
        if (feedback) return;
        setUserNotes({});
        setPracticeAnswers({});
        onPlaceDynamic(null);
      }

      function activePartHasAnswer() {
        if (activePart.type === "notes") return Object.keys(userNotes).length > 0;
        if (activePart.type === "dynamic") return Boolean(question.placedDynamic || practiceAnswers[activePart.id]);
        if (activePart.type === "repeat") return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { placements: [] }).placements?.length);
        if (activePart.type === "barlines") return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { placements: [] }).placements?.length);
        if (activePart.type === "rhythm" || activePart.type === "rhythmFix") return Boolean(Object.keys(makePlacementAnswer(practiceAnswers[activePart.id], { placements: {} }).placements ?? {}).length);
        if (activePart.type === "scotchSnap") return Boolean(makePlacementAnswer(practiceAnswers[activePart.id], { selected: null }).selected);
        return Boolean(String(practiceAnswers[activePart.id] ?? "").trim());
      }

      function hasAnyAnswer() {
        return Object.keys(userNotes).length > 0
          || Boolean(question.placedDynamic)
          || Object.values(practiceAnswers).some((value) => typeof value === "object" ? Boolean(value && JSON.stringify(value) !== "{}") : String(value ?? "").trim());
      }

      function timeSignatureButtonClass(signature, selected, part) {
        const revealed = Boolean(results[part.id]);
        const isCorrect = revealed && signature.id === part.answer;
        const isWrong = revealed && selected && !isCorrect;
        if (isCorrect) return "border-green-700 bg-green-600 text-white";
        if (isWrong) return "border-red-700 bg-red-600 text-white";
        if (revealed) return "border-stone-300 bg-white text-stone-900 opacity-60";
        if (selected) return "border-stone-950 bg-stone-950 text-white";
        return "border-stone-300 bg-white text-stone-900 hover:bg-stone-50";
      }

      function choiceButtonClass(option, selected, part) {
        const revealed = Boolean(results[part.id]);
        const isCorrect = revealed && option === part.answer;
        const isWrong = revealed && selected && !isCorrect;
        if (isCorrect) return "border-green-700 bg-green-600 text-white";
        if (isWrong) return "border-red-700 bg-red-600 text-white";
        if (revealed) return "border-stone-300 bg-white text-stone-900 opacity-60";
        if (selected) return "border-stone-950 bg-stone-950 text-white";
        return "border-stone-300 bg-white text-stone-900 hover:bg-stone-50";
      }

      function TimeSignatureChoiceButton({ signature, part, partIndex }) {
        const selected = practiceAnswers[part.id] === signature.id;
        const topGlyph = sharedSymbolForKey(`timeSig${signature.top}`);
        const bottomGlyph = sharedSymbolForKey(`timeSig${signature.bottom}`);
        return (
          <button
            type="button"
            disabled={Boolean(feedback)}
            onClick={() => {
              setActiveIndex(partIndex);
              setPracticeAnswers((current) => ({ ...current, [part.id]: signature.id }));
            }}
            className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 text-sm transition ${timeSignatureButtonClass(signature, selected, part)}`}
            aria-label={signature.id}
          >
            <svg viewBox="0 0 76 84" className="h-16 w-14 overflow-visible" aria-hidden="true">
              <text className="music-symbol" x="38" y="24" textAnchor="middle" fontSize="56" fontWeight="400" fill="currentColor">{topGlyph}</text>
              <text className="music-symbol" x="38" y="63" textAnchor="middle" fontSize="56" fontWeight="400" fill="currentColor">{bottomGlyph}</text>
            </svg>
          </button>
        );
      }

      function DynamicChoiceGlyph({ dynamic, backdrop = true }) {
        const glyph = sharedSymbolForKey(dynamic.symbolKey);
        const x = dynamic.symbolKey === "forte" ? 53 : 50;
        return (
          <svg viewBox="0 0 100 54" className="h-[58px] w-24 overflow-visible" aria-hidden="true">
            {backdrop && <text
              className="music-symbol"
              x={x}
              y="33"
              fill="white"
              stroke="white"
              strokeWidth="5"
              strokeLinejoin="round"
              fontSize="52"
              textAnchor="middle"
              dominantBaseline="middle"
              pointerEvents="none"
            >
              {glyph}
            </text>}
            <text
              className="music-symbol"
              x={x}
              y="33"
              fill="currentColor"
              fontSize="52"
              textAnchor="middle"
              dominantBaseline="middle"
              pointerEvents="none"
            >
              {glyph}
            </text>
          </svg>
        );
      }

      function RepeatChoiceGlyph({ symbolId = "end-repeat" }) {
        return (
          <svg viewBox="0 0 100 54" className="h-full w-full overflow-visible" aria-hidden="true">
            {symbolId === "start-repeat" && <g transform="translate(0 -4)"><CalibratedSymbol symbolKey="repeatLeft" x={50} y={8 + STAFF.gap * 2.9} /></g>}
            {symbolId === "end-repeat" && <g transform="translate(0 -4)"><CalibratedSymbol symbolKey="repeatRight" x={50} y={8 + STAFF.gap * 2.9} /></g>}
            {symbolId === "first-time" && (
              <g transform="translate(1 20)" stroke="currentColor" fill="none" strokeWidth="2">
                <path d="M 20 18 L 20 4 L 76 4" />
                <text x="28" y="-3" fill="currentColor" stroke="none" fontFamily="serif" fontSize="17" fontWeight="400">1.</text>
              </g>
            )}
            {symbolId === "second-time" && (
              <g transform="translate(1 20)" stroke="currentColor" fill="none" strokeWidth="2">
                <path d="M 20 18 L 20 4 L 76 4" />
                <text x="28" y="-3" fill="currentColor" stroke="none" fontFamily="serif" fontSize="17" fontWeight="400">2.</text>
              </g>
            )}
          </svg>
        );
      }

      function CircleChoiceGlyph() {
        return (
          <svg viewBox="0 0 56 48" className="h-12 w-16 overflow-visible" aria-hidden="true">
            <circle cx="28" cy="24" r="17" fill="none" stroke="currentColor" strokeWidth="1.8" />
          </svg>
        );
      }

      function RhythmChoiceGlyph({ rhythm }) {
        const sampleNote = { ...noteByLetter("B", 5), rhythm, beats: rhythmInfo(rhythm).beats, writtenAccidental: null };
        return (
          <svg viewBox="0 0 90 70" className="h-14 w-20 overflow-visible" aria-hidden="true">
            <Note note={sampleNote} x={45} top={25} />
          </svg>
        );
      }

      function placementButtonState(active) {
        return active ? "border-black bg-black text-white" : "border-stone-300 bg-white text-black hover:bg-stone-50";
      }

      function ScoreApplyHint() {
        return <p className="text-sm font-medium italic text-stone-500">Select the button first, then apply to the score.</p>;
      }

      function answerControl(part, partIndex) {
        if (part.type === "notes") {
          return null;
        }
        if (part.type === "timeChoice") {
          return (
            <div className="flex flex-wrap gap-2">
              {part.options.map((signature) => <TimeSignatureChoiceButton key={signature.id} signature={signature} part={part} partIndex={partIndex} />)}
            </div>
          );
        }
        if (part.type === "choice") {
          return (
            <div className="flex flex-wrap gap-2">
              {part.options.map((option) => {
                const selected = practiceAnswers[part.id] === option;
                return (
                  <button
                    type="button"
                    key={option}
                    disabled={Boolean(feedback)}
                    onClick={() => {
                      setActiveIndex(partIndex);
                      setPracticeAnswers((current) => ({ ...current, [part.id]: option }));
                    }}
                    className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 text-lg font-black transition ${choiceButtonClass(option, selected, part)}`}
                    aria-label={option}
                  >
                    {option}
                  </button>
                );
              })}
            </div>
          );
        }
        if (part.type === "dynamic") {
          const revealed = Boolean(results[part.id]);
          const options = part.options?.length ? part.options : PRACTICE_DYNAMIC_OPTIONS;
          return (
            <div className="flex flex-wrap gap-2">
              {options.map((dynamic) => {
                const selected = question.placedDynamic?.id === dynamic.id || practiceAnswers[part.id] === dynamic.id;
                const state = revealed && dynamicAnswerIsAccepted(dynamic.id, question.dynamic.id)
                  ? "border-green-600 bg-green-600 text-white"
                  : revealed && selected
                    ? "border-red-600 bg-red-600 text-white"
                    : selected
                      ? "border-black bg-black text-white"
                      : "border-stone-300 bg-white text-black hover:bg-stone-50";
                return (
                  <button
                    type="button"
                    key={dynamic.id}
                    disabled={Boolean(feedback)}
                    onClick={() => {
                      setActiveIndex(partIndex);
                      setPracticeAnswers((current) => ({ ...current, [part.id]: dynamic.id }));
                      onPlaceDynamic(dynamic);
                    }}
                    className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${state}`}
                    aria-label={dynamic.name}
                  >
                    <DynamicChoiceGlyph dynamic={dynamic} backdrop={!revealed && !selected} />
                  </button>
                );
              })}
            </div>
          );
        }
        if (part.type === "repeat") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedSymbolId: null, placements: [] });
          const options = part.options?.length ? part.options : PRACTICE_REPEAT_SYMBOLS;
          return (
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex flex-wrap gap-2">
                {options.map((symbol) => (
                  <button
                    type="button"
                    key={symbol.id}
                    disabled={Boolean(feedback)}
                    onClick={() => {
                      setActiveIndex(partIndex);
                      setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedSymbolId: symbol.id } }));
                    }}
                    className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.selectedSymbolId === symbol.id)}`}
                    aria-label={symbol.label}
                  >
                    <RepeatChoiceGlyph symbolId={symbol.id} />
                  </button>
                ))}
              </div>
              <ScoreApplyHint />
            </div>
          );
        }
        if (part.type === "barlines") {
          return null;
        }
        if (part.type === "rhythm" || part.type === "rhythmFix") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { selectedRhythm: null, placements: {} });
          const rhythmOptions = part.rhythmOptions?.length ? part.rhythmOptions : ["quaver", "crotchet"];
          return (
            <div className="flex flex-wrap items-center gap-3">
              <div className="flex flex-wrap gap-2">
                {rhythmOptions.map((rhythm) => (
                  <button
                    type="button"
                    key={rhythm}
                    disabled={Boolean(feedback)}
                    onClick={() => {
                      setActiveIndex(partIndex);
                      setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, selectedRhythm: rhythm } }));
                    }}
                    className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.selectedRhythm === rhythm)}`}
                    aria-label={rhythmInfo(rhythm).label}
                  >
                    <RhythmChoiceGlyph rhythm={rhythm} />
                  </button>
                ))}
              </div>
              <ScoreApplyHint />
            </div>
          );
        }
        if (part.type === "scotchSnap") {
          const value = makePlacementAnswer(practiceAnswers[part.id], { circleSelected: false, selected: null });
          return (
            <div className="flex flex-wrap items-center gap-3">
              <button
                type="button"
                disabled={Boolean(feedback)}
                onClick={() => {
                  setActiveIndex(partIndex);
                  setPracticeAnswers((current) => ({ ...current, [part.id]: { ...value, circleSelected: true } }));
                }}
                className={`answer-choice-button flex ${ANSWER_BUTTON_SIZE_CLASS} flex-col items-center justify-center rounded-xl border px-3 transition ${placementButtonState(value.circleSelected)}`}
                aria-label="Circle"
              >
                <CircleChoiceGlyph />
                <span className="mt-1 text-sm font-bold leading-none">Circle</span>
              </button>
              <ScoreApplyHint />
            </div>
          );
        }
        return (
          <input
            value={practiceAnswers[part.id] ?? ""}
            disabled={Boolean(feedback)}
            onFocus={() => setActiveIndex(partIndex)}
            onChange={(event) => setPracticeAnswers((current) => ({ ...current, [part.id]: formatTextAnswer(event.target.value) }))}
            placeholder="Type your answer"
            className={window.MLH.typedAnswerClass(inputState(part.id), ANSWER_TEXTBOX_SIZE_CLASS)}
          />
        );
      }

      function ChevronIcon({ expanded }) {
        return (
          <span className="practice-view-chevron">
            <svg viewBox="0 0 24 24" aria-hidden="true" className="h-3.5 w-3.5">
              <path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round" />
            </svg>
          </span>
        );
      }

      function questionPrompt(part) {
        const sourceId = part.sourceId ?? part.id;
        if (sourceId === "missing") {
          return <>Insert the missing notes in <strong>bar {question.targetBar + 1}</strong>.</>;
        }
        if (sourceId === "chord") {
          return <>Name the chord outlined in <strong>bar {question.chordBar + 1}</strong>.</>;
        }
        if (sourceId === "dynamic") {
          if (question.dynamicQuestionType === "hairpinName") {
            const verb = question.dynamicHairpin?.type === "diminuendo" ? "softer" : "louder";
            return <>The piece gradually gets {verb} in <strong>bar {question.dynamicHairpin.barIndex + 1}</strong>. Identify the name of the symbol used.</>;
          }
          if (question.dynamicQuestionType === "dynamicName") {
            return <>Describe the meaning of the dynamic marking shown below <strong>bar {question.dynamicBar + 1}</strong>.</>;
          }
          return <>Identify the appropriate dynamic marking that should be inserted below <strong>bar {question.dynamicBar + 1}</strong>.</>;
        }
        if (sourceId === "interval") {
          return <>Name the interval between the two notes in <strong>bar {question.intervalTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "noteIdentification") {
          if (part.type === "scotchSnap" && question.noteValueCircleTarget) {
            return <>Place a circle around a <strong>{rhythmInfo(question.noteValueCircleTarget.targetRhythm).label}</strong>.</>;
          }
          return <>Name the note marked 'X' in <strong>bar {question.noteTarget.barIndex + 1}</strong>.</>;
        }
        if (sourceId === "barlines") {
          const { firstBar, lastBar } = barlineQuestionBoundaryBars(question.barlineTargets?.[0]);
          return <>Insert the missing barline between <strong>bars {firstBar} and {lastBar}</strong>.</>;
        }
        if (sourceId === "rhythmicDictation") {
          if (part.type === "rhythmFix") {
            return <>Correct the rhythm in <strong>bar {question.rhythmFixTarget.barIndex + 1}</strong>.</>;
          }
          return <>Complete the rhythm for the notes in <strong>bar {question.rhythmTargetBar + 1}</strong>.</>;
        }
        if (sourceId === "rhythmIdentification" && part.type === "text") {
          if (question.rhythmIdentificationTarget?.variant === "noteValue") {
            if (question.rhythmIdentificationTarget.questionStyle === "beats") {
              return <>Identify the number of beats for the note marked in <strong>bar {question.rhythmIdentificationTarget.barIndex + 1}</strong>.</>;
            }
            if (question.rhythmIdentificationTarget.questionStyle === "name") {
              const beatDescription = rhythmBeatDescription(question.rhythmIdentificationTarget.targetRhythm);
              return <>What is the name given to this <strong>{beatDescription}</strong> note in <strong>bar {question.rhythmIdentificationTarget.barIndex + 1}</strong>?</>;
            }
            return part.prompt;
          }
          return <>Identify the number of beats for the note marked in <strong>bar {question.rhythmIdentificationTarget.barIndex + 1}</strong>.</>;
        }
        return part.prompt;
      }

      function questionAudioGlyph(part) {
        const sourceId = part.sourceId ?? part.id;
        if (!showAudioQuestionGlyphs || !AUDIO_PRACTICE_QUESTION_TYPE_IDS.has(sourceId)) return null;
        return <AudioQuestionGlyph />;
      }

      function questionBlock(part, index, compact = false) {
        const partResult = results[part.id];
        const revealed = Boolean(partResult);
        const feedbackColour = revealed ? (partResult.correct ? "text-green-700" : "text-red-700") : "text-stone-950";
        const answer = answerControl(part, index);
        const nextQuestionButton = finalFeedbackNextQuestionButton(part, index);
        const scoreDirectAnswerHint = !answer && !feedback
          ? <p className="text-sm font-medium italic text-stone-500">Use the score above to enter your answer.</p>
          : null;
        const content = (
          <>
            <p className={`mb-3 grid grid-cols-[36px_1fr] items-baseline gap-x-3 text-base font-semibold leading-tight ${feedbackColour}`}>
              <span>({part.label})</span>
              <span className="relative top-px flex min-w-0 flex-wrap items-center gap-x-3 gap-y-2">
                <span>{questionPrompt(part)}{questionAudioGlyph(part)}{questionFeedbackIcon(part.id)}</span>
                {!answer && nextQuestionButton}
              </span>
            </p>
            {scoreDirectAnswerHint && <div className="ml-[48px]">{scoreDirectAnswerHint}</div>}
            <div className="ml-[48px] flex flex-col gap-2 sm:flex-row sm:items-end">
              <div className="min-w-0">{answer}</div>
              {revealed && part.type === "text" && !partResult.correct && (
                <p className="text-base font-semibold text-green-700 sm:self-center sm:whitespace-nowrap">{part.feedbackAnswer ?? part.answer}</p>
              )}
              {answer && nextQuestionButton}
            </div>
          </>
        );

        if (!compact) return <div key={part.id} ref={(node) => { if (node) questionRefs.current[part.id] = node; }}>{content}</div>;

        return (
          <div key={part.id} ref={(node) => { if (node) questionRefs.current[part.id] = node; }} className="pb-2 last:pb-0 transition-colors">
            {content}
          </div>
        );
      }

      function goToPrevious() {
        setActiveIndex((current) => Math.max(0, current - 1));
      }

      function goToNext() {
        setActiveIndex((current) => Math.min(totalParts - 1, current + 1));
      }

      return (
        <section className="relative z-10 mt-[6px] rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md md:mx-3">
          <div className="relative mb-3 flex flex-wrap items-center justify-between gap-3 border-b border-stone-200 px-1 pb-3 md:flex-nowrap">
            <div className={`flex flex-wrap items-center gap-3 ${playsAvailable ? "" : "opacity-45 grayscale"}`}>
              <button
                type="button"
                disabled={!playsAvailable}
                onClick={onPlayClick}
                className={window.MLH.PlayButtonClass}
                aria-label={isPlaying ? "Stop audio" : "Play audio"}
              >
                <span className="text-lg leading-none">{isPlaying ? "■" : "▶"}</span>
                <span>{isPlaying ? "Stop" : "Play"}</span>
              </button>
              {limitPlays && <div className="text-[11px] font-semibold leading-none text-stone-500 sm:text-[12px]">Remaining: {playsRemaining}</div>}
            </div>
            <div className="flex items-center justify-center gap-2 md:absolute md:left-1/2 md:top-1/2 md:-mt-[5px] md:-translate-x-1/2 md:-translate-y-1/2">
              <button
                type="button"
                onClick={goToPrevious}
                disabled={viewAllQuestions || activeIndex === 0}
                className={`${window.MLH.shell.toolbarButtonClass} !w-[65px] shrink-0 justify-center p-0 disabled:opacity-35`}
                aria-label="Previous question"
              >
                <img src={ASSET.next} alt="" aria-hidden="true" className="h-[24px] w-[24px] rotate-180 object-contain" />
              </button>
              <button
                type="button"
                onClick={() => setViewAllQuestions((current) => !current)}
                className={`${window.MLH.shell.toolbarButtonClass} practice-view-toggle ${viewAllQuestions ? "open" : ""} gap-1 px-3`}
                aria-expanded={viewAllQuestions}
                aria-label={viewAllQuestions ? "Show one question" : "View all questions"}
              >
                <span className="practice-view-toggle-label">{viewAllQuestions ? "All Questions" : `Question ${activeIndex + 1} of ${totalParts}`}</span>
                <ChevronIcon expanded={viewAllQuestions} />
              </button>
              <button
                type="button"
                onClick={goToNext}
                disabled={viewAllQuestions || activeIndex === totalParts - 1}
                className={`${window.MLH.shell.toolbarButtonClass} !w-[65px] shrink-0 justify-center p-0 disabled:opacity-35`}
                aria-label="Next question"
              >
                <img src={ASSET.next} alt="" aria-hidden="true" className="h-[24px] w-[24px] object-contain" />
              </button>
            </div>
            <div className={`${window.MLH.ActionButtonGroupClass} md:ml-auto`}>
              <button type="button" disabled={Boolean(feedback) || (viewAllQuestions ? !hasAnyAnswer() : !activePartHasAnswer())} onClick={() => viewAllQuestions ? clearAllQuestions() : clearSubquestion(activePart)} className={window.MLH.ClearButtonClass}>
                Clear
              </button>
              <window.MLH.ConfirmButton disabled={Boolean(feedback) || !canConfirm} onClick={onConfirm} className={window.MLH.AudioConfirmButtonClass}>
                Confirm
              </window.MLH.ConfirmButton>
            </div>
          </div>
          <div className={`overflow-hidden p-3 transition-[max-height,opacity,transform] duration-[180ms] ease-[ease] ${viewAllQuestions ? "min-h-[132px] max-h-[760px]" : "min-h-[112px] max-h-[170px]"}`}>
            {viewAllQuestions ? (
              <div
                key="all-questions"
                style={{ animation: "questionViewExpandIn .18s ease-out" }}
              >
                <div className="space-y-2">
                  {question.subquestions.map((part, index) => questionBlock(part, index, true))}
                </div>
              </div>
            ) : (
              <div className="relative min-h-[112px]">
                {exitingPart && (
                  <div
                    key={`from-${carousel.key}-${exitingPart.id}`}
                    className="pointer-events-none absolute inset-x-0 top-0"
                    style={{ animation: `${carousel.direction === "next" ? "questionSlideOutToLeft" : "questionSlideOutToRight"} .22s ease forwards` }}
                  >
                    {questionBlock(exitingPart, carousel.fromIndex)}
                  </div>
                )}
                <div
                  key={`to-${carousel.key}-${displayedPart.id}`}
                  className={exitingPart ? "absolute inset-x-0 top-0" : ""}
                  style={{ animation: exitingPart ? `${carousel.direction === "next" ? "questionSlideInFromRight" : "questionSlideInFromLeft"} .22s ease forwards` : "questionViewCollapseIn .18s ease-out" }}
                >
                  {questionBlock(displayedPart, carousel.toIndex)}
                </div>
              </div>
            )}
          </div>
          {prompt && <p className="mt-3 text-sm font-medium text-red-700">{prompt}</p>}
        </section>
      );
    }

    function App() {
      useStyles();
      const initialLevel = useMemo(() => {
        const requested = new URLSearchParams(window.location.search).get("level");
        return LEVELS[requested] ? requested : "N5";
      }, []);
      const [activeLevel, setActiveLevel] = useState(initialLevel);
      const [tempo, setTempo] = useState("medium");
      const [metronomeOn, setMetronomeOn] = useState(false);
      const [followPlayback, setFollowPlayback] = useState(false);
      const [enabledQuestionTypes, setEnabledQuestionTypes] = useState(() => defaultPracticeQuestionTypesForLevel(initialLevel));
      const [question, setQuestion] = useState(() => makeQuestion(initialLevel, 0, defaultPracticeQuestionTypesForLevel(initialLevel)));
      const [userNotes, setUserNotes] = useState({});
      const [practiceAnswers, setPracticeAnswers] = useState({});
      const [activePracticePart, setActivePracticePart] = useState(0);
      const [hoverNote, setHoverNote] = useState(null);
      const [feedback, setFeedback] = useState(null);
      const [feedbackFading, setFeedbackFading] = useState(false);
      const [visible, setVisible] = useState(true);
      const [score, setScore] = useState({ correct: 0, attempted: 0 });
      const [confettiKey, setConfettiKey] = useState(0);
      const [timerResetKey, setTimerResetKey] = useState(0);
      const [secondsRemaining, setSecondsRemaining] = useState(PRACTICE_TIMER_SECONDS);
      const [playsRemaining, setPlaysRemaining] = useState(PRACTICE_PLAYS_PER_QUESTION);
      const [limitPlays, setLimitPlays] = useState(true);
      const [timerEnabled, setTimerEnabled] = useState(true);
      const [showAudioQuestionGlyphs, setShowAudioQuestionGlyphs] = useState(false);
      const [timerPaused, setTimerPaused] = useState(false);
      const [newQuestionConfirmOpen, setNewQuestionConfirmOpen] = useState(false);
      const [menu, setMenu] = useState(null);
      const [prompt, setPrompt] = useState("");
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeNoteId, setActiveNoteId] = useState(null);
      const audioRef = useRef(null);
      const timersRef = useRef([]);
      const nextTimer = useRef(null);
      const fadeTimer = useRef(null);
      const pianoBufferCacheRef = useRef(new Map());
      const menuRef = useRef(null);

      useEffect(() => {
        const onPointerDown = (event) => {
          if (menuRef.current?.contains(event.target)) return;
          if (event.target.closest("[data-menu-panel],[data-menu-trigger]")) return;
          setMenu(null);
        };
        document.addEventListener("pointerdown", onPointerDown, true);
        return () => document.removeEventListener("pointerdown", onPointerDown, true);
      }, []);

      const selectedTempo = question.questionType === "practicePaper" && question.tempoQuestion
        ? {
          id: question.tempoQuestion.id,
          label: question.tempoQuestion.label,
          bpm: question.tempoBpm ?? question.tempoQuestion.bpm,
        }
        : TEMPOS.find((item) => item.id === (activeLevel === "AH" ? "slow" : tempo)) ?? TEMPOS[0];
      const beatSeconds = 60 / selectedTempo.bpm;
      const barSeconds = beatSeconds * question.timeSignature.beats;
      const playbackBars = repeatPlaybackBars(question);
      const totalDuration = playbackBars.length * barSeconds;
      const practiceReviewMode = question.questionType === "practicePaper" && Boolean(feedback);
      useEffect(() => {
        setSecondsRemaining(PRACTICE_TIMER_SECONDS);
        setTimerPaused(false);
      }, [timerResetKey]);

      useEffect(() => {
        if (!timerEnabled || timerPaused || practiceReviewMode) return undefined;
        const timer = window.setInterval(() => {
          setSecondsRemaining((current) => Math.max(0, current - 1));
        }, 1000);
        return () => window.clearInterval(timer);
      }, [timerEnabled, timerPaused, practiceReviewMode]);

      useEffect(() => {
        if (!timerEnabled || timerPaused || practiceReviewMode || secondsRemaining > 0) return;
        submitPracticeQuestion({ requireComplete: false });
      }, [secondsRemaining, timerEnabled, timerPaused, practiceReviewMode]);

      useEffect(() => {
        if (!timerEnabled) setTimerPaused(false);
      }, [timerEnabled]);

      function clearTimers() {
        timersRef.current.forEach((timer) => window.clearTimeout(timer));
        timersRef.current = [];
        window.clearTimeout(nextTimer.current);
        window.clearTimeout(fadeTimer.current);
      }

      function clearFeedbackTimers() {
        window.clearTimeout(nextTimer.current);
        window.clearTimeout(fadeTimer.current);
      }

      function stopAudio(resetElapsed = true) {
        clearTimers();
        if (audioRef.current) {
          try { audioRef.current.close(); } catch {}
        }
        audioRef.current = null;
        setIsPlaying(false);
        setActiveNoteId(null);
      }

      function newQuestion(level = activeLevel, questionTypes = enabledQuestionTypes) {
        stopAudio();
        setVisible(false);
        window.setTimeout(() => {
          setQuestion(makeQuestion(level, 0, questionTypes));
          setUserNotes({});
          setPracticeAnswers({});
          setActivePracticePart(0);
          setHoverNote(null);
          setFeedback(null);
          setFeedbackFading(false);
          setPrompt("");
          setPlaysRemaining(PRACTICE_PLAYS_PER_QUESTION);
          setVisible(true);
        }, 220);
      }

      function startFreshQuestion() {
        setScore({ correct: 0, attempted: 0 });
        setTimerResetKey((value) => value + 1);
        setPlaysRemaining(PRACTICE_PLAYS_PER_QUESTION);
        newQuestion();
      }

      function startFreshQuestionFromFeedback() {
        window.scrollTo({ top: 0, behavior: "smooth" });
        startFreshQuestion();
      }

      function hasQuestionProgress() {
        const hasTypedOrSelectedAnswer = Object.values(practiceAnswers).some((value) => String(value ?? "").trim());
        const hasPlacedNotes = Object.keys(userNotes).length > 0;
        const hasPlacedDynamic = Boolean(question.placedDynamic);
        const hasSelectedMelody = question.selectedOptionIndex !== null && question.selectedOptionIndex !== undefined;
        return hasTypedOrSelectedAnswer || hasPlacedNotes || hasPlacedDynamic || hasSelectedMelody;
      }

      function advanceAfterFeedback() {
        if (!feedback) return;
        clearFeedbackTimers();
        setFeedbackFading(true);
        nextTimer.current = window.setTimeout(() => newQuestion(), 180);
      }

      function applyLevel(level) {
        setMenu(null);
        if (level === activeLevel) return;
        const nextQuestionTypes = defaultPracticeQuestionTypesForLevel(level);
        setActiveLevel(level);
        setEnabledQuestionTypes(nextQuestionTypes);
        setScore({ correct: 0, attempted: 0 });
        setTimerResetKey((value) => value + 1);
        const url = new URL(window.location.href);
        url.searchParams.set("level", level);
        window.history.replaceState(null, "", url.toString());
        newQuestion(level, nextQuestionTypes);
      }

      function toggleQuestionType(typeId) {
        setEnabledQuestionTypes((current) => {
          const enabledCount = Object.values(current).filter(Boolean).length;
          if (current[typeId] && enabledCount <= 6) return current;
          const next = { ...current, [typeId]: !current[typeId] };
          if (!canBuildPracticeQuestionSelection(next, activeLevel)) return current;
          stopAudio();
          setScore({ correct: 0, attempted: 0 });
          setTimerResetKey((value) => value + 1);
          setPlaysRemaining(PRACTICE_PLAYS_PER_QUESTION);
          setQuestion(makeQuestion(activeLevel, 0, next));
          setUserNotes({});
          setPracticeAnswers({});
          setActivePracticePart(0);
          setHoverNote(null);
          setFeedback(null);
          setFeedbackFading(false);
          setPrompt("");
          return next;
        });
      }

      function clearUserNotes() {
        if (feedback) return;
        if (question.questionType === "practicePaper") {
          setUserNotes({});
          setPracticeAnswers({});
          setQuestion((current) => ({ ...current, placedDynamic: null }));
          return;
        }
        if (question.questionType === "identifyMelody") {
          setQuestion((current) => ({ ...current, selectedOptionIndex: null }));
          setPrompt("");
          return;
        }
        setUserNotes({});
      }

      function textAnswerCorrect(value, accepts = []) {
        const answer = cleanAnswer(value);
        const compact = answer.replace(/\s+/g, "");
        return accepts.some((accepted) => {
          const cleanAccepted = cleanAnswer(accepted);
          return answer === cleanAccepted || compact === cleanAccepted.replace(/\s+/g, "");
        });
      }

      function practiceQuestionComplete() {
        const target = question.bars[question.targetBar];
        const requiresMissing = question.subquestions.some((part) => part.type === "notes");
        const requiresDynamic = question.subquestions.some((part) => part.type === "dynamic");
        const missingComplete = !requiresMissing || (Boolean(target?.notes?.length) && target.notes.every((_, index) => Boolean(userNotes[index])));
        const textComplete = question.subquestions
          .filter((part) => part.type === "text")
          .every((part) => String(practiceAnswers[part.id] ?? "").trim());
        const choicesComplete = question.subquestions
          .filter((part) => part.type === "timeChoice" || part.type === "choice")
          .every((part) => String(practiceAnswers[part.id] ?? "").trim());
        const dynamicComplete = !requiresDynamic || question.subquestions
          .filter((part) => part.type === "dynamic")
          .every((part) => Boolean(question.placedDynamic || practiceAnswers[part.id]));
        const repeatComplete = question.subquestions
          .filter((part) => part.type === "repeat")
          .every((part) => (makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements?.length ?? 0) >= 1);
        const barlineComplete = question.subquestions
          .filter((part) => part.type === "barlines")
          .every((part) => makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements?.length >= (question.barlineTargets?.length ?? 0));
        const rhythmComplete = question.subquestions
          .filter((part) => part.type === "rhythm")
          .every((part) => Object.keys(makePlacementAnswer(practiceAnswers[part.id], { placements: {} }).placements ?? {}).length >= (question.rhythmTargetPattern?.length ?? 0));
        const rhythmFixComplete = question.subquestions
          .filter((part) => part.type === "rhythmFix")
          .every((part) => {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: {} }).placements ?? {};
            return (question.rhythmFixTarget?.noteIndices ?? []).every((index) => placements[index]);
          });
        const scotchSnapComplete = question.subquestions
          .filter((part) => part.type === "scotchSnap")
          .every((part) => Boolean(makePlacementAnswer(practiceAnswers[part.id], { selected: null }).selected));
        return missingComplete && textComplete && choicesComplete && dynamicComplete && repeatComplete && barlineComplete && rhythmComplete && rhythmFixComplete && scotchSnapComplete;
      }

      function submitPracticeQuestion({ requireComplete = true } = {}) {
        if (feedback || question.questionType !== "practicePaper") return;
        if (requireComplete && !practiceQuestionComplete()) {
          return;
        }

        stopAudio();
        const target = question.bars[question.targetBar];
        const results = {};
        question.subquestions.forEach((part) => {
          if (part.type === "text") {
            results[part.id] = { correct: textAnswerCorrect(practiceAnswers[part.id], part.accepts) };
            return;
          }
          if (part.type === "timeChoice") {
            results[part.id] = { correct: practiceAnswers[part.id] === part.answer };
            return;
          }
          if (part.type === "choice") {
            results[part.id] = { correct: practiceAnswers[part.id] === part.answer };
            return;
          }
          if (part.type === "notes") {
            results[part.id] = { correct: target.notes.every((note, index) => userNotes[index]?.step === note.step) };
            return;
          }
          if (part.type === "dynamic") {
            const selectedDynamicId = question.placedDynamic?.id ?? practiceAnswers[part.id];
            results[part.id] = { correct: dynamicAnswerIsAccepted(selectedDynamicId, question.dynamic.id) };
            return;
          }
          if (part.type === "repeat") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements ?? [];
            const expected = (question.repeatTarget?.placements ?? [question.repeatTarget]).map(repeatPlaceKey).sort().join(",");
            const actual = placements.map(repeatPlaceKey).sort().join(",");
            results[part.id] = { correct: expected === actual };
            return;
          }
          if (part.type === "barlines") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements ?? [];
            const expected = question.barlineTargets?.map((item) => `${item.barIndex}:end`).sort().join(",");
            const actual = placements.map((item) => `${item.barIndex}:${item.slot ?? "end"}`).sort().join(",");
            results[part.id] = { correct: expected === actual };
            return;
          }
          if (part.type === "rhythm") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: {} }).placements ?? {};
            results[part.id] = { correct: (question.rhythmTargetPattern ?? []).every((rhythm, index) => placements[index] === rhythm) };
            return;
          }
          if (part.type === "rhythmFix") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: {} }).placements ?? {};
            const expected = question.rhythmFixTarget?.targetRhythms ?? {};
            results[part.id] = { correct: Object.entries(expected).every(([index, rhythm]) => placements[index] === rhythm) };
            return;
          }
          if (part.type === "scotchSnap") {
            const selected = makePlacementAnswer(practiceAnswers[part.id], { selected: null }).selected;
            const sourceId = part.sourceId ?? part.id;
            const circleTarget = sourceId === "noteIdentification"
              ? question.noteValueCircleTarget
              : question.rhythmIdentificationTarget;
            results[part.id] = { correct: sameScotchSelection(selected, circleTarget) };
          }
        });
        const totalCorrect = Object.values(results).filter((result) => result.correct).length;
        const revealDelayMs = 500;
        const allCorrect = totalCorrect === question.subquestions.length;
        setScore({ correct: 0, attempted: 0 });
        setFeedback({ correct: allCorrect, results: {}, totalCorrect, revealing: true, revealingPartId: null });
        setFeedbackFading(false);
        setPrompt("");
        setActivePracticePart(0);

        question.subquestions.forEach((part, index) => {
          const revealTimer = window.setTimeout(() => {
            const partResult = results[part.id] ?? { correct: false };
            const isFinalReveal = index === question.subquestions.length - 1;

            playSound(Boolean(partResult.correct));

            setScore((current) => ({
              correct: current.correct + (partResult.correct ? 1 : 0),
              attempted: Math.min(question.subquestions.length, current.attempted + 1),
            }));
            setFeedback((current) => {
              if (!current) return current;
              return {
                ...current,
                results: { ...current.results, [part.id]: partResult },
                revealing: !isFinalReveal,
                revealingPartId: part.id,
              };
            });

            if (isFinalReveal && allCorrect) {
              setConfettiKey((value) => value + 1);
              const fanfareTimer = window.setTimeout(() => playSound(true, true, "bronze"), 260);
              timersRef.current.push(fanfareTimer);
            }
          }, index * revealDelayMs);
          timersRef.current.push(revealTimer);
        });
      }

      function confirmPracticeQuestion() {
        submitPracticeQuestion({ requireComplete: true });
      }

      function confirmAnswer() {
        if (feedback) return;
        if (question.questionType === "practicePaper") {
          confirmPracticeQuestion();
          return;
        }
        if (question.questionType === "identifyMelody") {
          if (question.selectedOptionIndex === null) {
            setPrompt("Select one melody first.");
            return;
          }
          stopAudio();
          const correct = question.selectedOptionIndex === question.answerIndex;
          setScore((current) => {
            return {
              correct: current.correct + (correct ? 1 : 0),
              attempted: current.attempted + 1,
            };
          });
          playSound(correct);
          setFeedback({ correct });
          setFeedbackFading(false);
          setPrompt("");
          if (correct) {
            fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
            nextTimer.current = window.setTimeout(() => newQuestion(), 2050);
          }
          return;
        }
        const target = question.bars[question.targetBar];
        if (target.notes.some((_, index) => !userNotes[index])) {
          return;
        }
        stopAudio();
        const correct = target.notes.every((note, index) => userNotes[index]?.step === note.step);
        setScore((current) => {
          return {
            correct: current.correct + (correct ? 1 : 0),
            attempted: current.attempted + 1,
          };
        });
        playSound(correct);
        setFeedback({ correct });
        setFeedbackFading(false);
        setPrompt("");
        if (correct) {
          fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
          nextTimer.current = window.setTimeout(() => newQuestion(), 2050);
        }
      }

      function selectMelodyOption(index) {
        if (feedback) return;
        setQuestion((current) => current.questionType === "identifyMelody" ? { ...current, selectedOptionIndex: index } : current);
        setPrompt("");
      }

      function placeDynamic(dynamic) {
        if (feedback) return;
        setQuestion((current) => current.questionType === "practicePaper" ? { ...current, placedDynamic: dynamic } : current);
        setPrompt("");
      }

      function oscillator(ctx, gainNode, frequency, start, duration, volume = 0.035, type = "sine", release = 0.08) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(volume, start + 0.03);
        gain.gain.setValueAtTime(volume * 0.92, start + Math.max(0.04, duration));
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + release);
        osc.connect(gain);
        gain.connect(gainNode);
        osc.start(start);
        osc.stop(start + duration + release + 0.02);
      }

      const PIANO_SAMPLE_BASE_PATH = "./piano%20audio/";

      function choosePianoLayer(midi, velocity = 96) {
        const layers = window.MLH_PIANO_SAMPLE_MAP?.notes?.[String(Math.round(midi))] ?? [];
        if (!layers.length) return null;
        const exactLayer = layers.find((layer) => velocity >= layer.loVel && velocity <= layer.hiVel);
        if (exactLayer) return exactLayer;
        return [...layers].sort((a, b) => {
          const aCentre = (a.loVel + a.hiVel) / 2;
          const bCentre = (b.loVel + b.hiVel) / 2;
          return Math.abs(velocity - aCentre) - Math.abs(velocity - bCentre);
        })[0];
      }

      async function loadPianoSample(ctx, sample) {
        const cache = pianoBufferCacheRef.current;
        if (cache.has(sample)) return cache.get(sample);
        const request = fetch(`${PIANO_SAMPLE_BASE_PATH}${encodeURIComponent(sample)}`)
          .then((response) => {
            if (!response.ok) throw new Error(`Could not load ${sample}`);
            return response.arrayBuffer();
          })
          .then((arrayBuffer) => ctx.decodeAudioData(arrayBuffer));
        cache.set(sample, request);
        try {
          const buffer = await request;
          cache.set(sample, buffer);
          return buffer;
        } catch (error) {
          cache.delete(sample);
          throw error;
        }
      }

      async function preloadPianoSamples(ctx, layers) {
        const uniqueSamples = [...new Set(layers.map((layer) => layer?.sample).filter(Boolean))];
        if (!uniqueSamples.length) return false;
        try {
          await Promise.all(uniqueSamples.map((sample) => loadPianoSample(ctx, sample)));
          return true;
        } catch {
          return false;
        }
      }

      function playPianoMidi(ctx, gainNode, midi, start, duration, velocity = 96, volume = 0.078, dynamicGain = 1, fallbackType = "triangle", fallbackRelease = 0.1) {
        const layer = choosePianoLayer(midi, velocity);
        const cached = layer ? pianoBufferCacheRef.current.get(layer.sample) : null;
        if (!cached || typeof cached.duration !== "number") {
          oscillator(ctx, gainNode, midiToFrequency(midi), start, duration, volume * dynamicGain, fallbackType, fallbackRelease);
          return;
        }
        const source = ctx.createBufferSource();
        const gain = ctx.createGain();
        const sampleGain = clamp(volume * 4 * dynamicGain * (layer.gain ?? 1), 0.0001, 0.55);
        source.buffer = cached;
        source.playbackRate.setValueAtTime(layer.rate ?? 1, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(sampleGain, start + 0.012);
        gain.gain.setValueAtTime(sampleGain * 0.94, start + Math.max(0.04, duration));
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + 0.12);
        source.connect(gain);
        gain.connect(gainNode);
        source.start(start);
        source.stop(start + duration + 0.18);
      }

      function playMetronome(ctx, gainNode, start, accented) {
        window.MLH?.playMetronomeClick?.(ctx, gainNode, start, accented);
      }

      function dynamicGainForBar(question, barIndex) {
        if (question.questionType !== "practicePaper" || !question.dynamic || !question.startingDynamic) return 1;
        const dynamicId = barIndex >= question.dynamicBar ? question.dynamic.id : question.startingDynamic.id;
        return DYNAMIC_AUDIO_GAIN[dynamicId] ?? 1;
      }

      function dynamicGainForPoint(question, barIndex, beat = 0) {
        if (question.questionType !== "practicePaper" || !question.dynamic || !question.startingDynamic) return 1;
        if (question.dynamicHairpin?.barIndex !== barIndex) return dynamicGainForBar(question, barIndex);
        const startGain = DYNAMIC_AUDIO_GAIN[question.startingDynamic.id] ?? 1;
        const endGain = DYNAMIC_AUDIO_GAIN[question.dynamic.id] ?? 1;
        const progress = clamp(beat / Math.max(1, question.timeSignature.beats), 0, 1);
        return startGain + (endGain - startGain) * progress;
      }

      function dynamicVelocityForBar(question, barIndex) {
        if (question.questionType !== "practicePaper" || !question.dynamic || !question.startingDynamic) return 96;
        const dynamicId = barIndex >= question.dynamicBar ? question.dynamic.id : question.startingDynamic.id;
        return DYNAMIC_SAMPLE_VELOCITY[dynamicId] ?? 96;
      }

      function accompanimentVelocityForBar(question, barIndex) {
        return dynamicVelocityForBar(question, barIndex);
      }

      function playTempoAccompanimentPattern(ctx, gainNode, question, bar, barStart, offset, startTime, dynamicGain = 1, dynamicVelocity = 96) {
        const chordLetters = question.key.chords[bar.chordSymbol] ?? [];
        if (!chordLetters.length) return;

        const chord = chordLetters.map((letter, index) => pitchForChordLetter(question, bar, letter, 3 + index));
        const bass = pitchForChordLetter(question, bar, chordLetters[0], 3) - 12;
        const beatsInBar = question.timeSignature.beats;
        const accompanimentVelocity = dynamicVelocity;
        const scheduleTone = (midi, beatOffset, beatDuration, volume, type, release, velocity = accompanimentVelocity) => {
          if (beatOffset >= beatsInBar) return;
          const durationBeats = Math.min(beatDuration, beatsInBar - beatOffset);
          const eventStart = barStart + beatOffset * beatSeconds;
          const eventDuration = Math.max(0.04, durationBeats * beatSeconds);
          if (eventStart + eventDuration <= offset) return;
          const audibleStart = Math.max(eventStart, offset);
          const audibleDuration = Math.max(0.04, eventStart + eventDuration - audibleStart);
          const eventDynamicGain = question.dynamicHairpin?.barIndex === bar.barIndex
            ? dynamicGainForPoint(question, bar.barIndex, beatOffset)
            : dynamicGain;
          playPianoMidi(ctx, gainNode, midi, startTime + audibleStart, audibleDuration, velocity, volume, eventDynamicGain, type, release);
        };
        const playBass = (beatOffset, duration = 0.82, volume = 0.028) => {
          scheduleTone(bass, beatOffset, duration, volume, "sine", 0.1);
        };
        const playChord = (beatOffset, duration = 0.72, volume = 0.014) => {
          chord.forEach((midi) => scheduleTone(midi, beatOffset, duration, volume, "triangle", 0.08));
        };

        if (beatsInBar === 3) {
          playBass(0, 0.82, 0.028);
          playChord(1, 0.72, 0.014);
          playChord(2, 0.72, 0.014);
          return;
        }

        switch (question.accompanimentPattern) {
          case "bassTwoChords":
            playBass(0);
            [1, 3].forEach((beat) => playChord(beat, 0.72, 0.015));
            break;
          case "bassChordBassChord":
            playBass(0, 0.76, 0.026);
            playChord(1, 0.68, 0.013);
            playBass(2, 0.76, 0.024);
            playChord(3, 0.68, 0.013);
            break;
          case "offbeatChords":
            playBass(0, 0.9, 0.027);
            [0.5, 1.5, 2.5].forEach((beat) => playChord(beat, 0.5, 0.012));
            break;
          case "lightPulse":
            playBass(0, 0.7, 0.024);
            [1, 2, 3].forEach((beat) => playChord(beat, 0.38, 0.011));
            break;
          default:
            playBass(0);
            [1, 2, 3].forEach((beat) => playChord(beat));
            break;
        }
      }

      function playAccompaniment(ctx, gainNode, question, bar, barStart, offset, startTime, dynamicGain = 1, dynamicVelocity = 96) {
        if (barStart + barSeconds <= offset) return;
        const chordLetters = question.key.chords[bar.chordSymbol] ?? [];
        if (!chordLetters.length) return;
        const accompanimentVelocity = dynamicVelocity;

        if (bar.barIndex === question.bars.length - 1 && question.questionType === "identifyMelody" && question.bars.length === 2) {
          const finalNote = [...bar.notes].reverse().find((note) => !note.rest);
          if (!finalNote) return;
          const chordStart = barStart + finalNote.beat * beatSeconds;
          const chordDuration = Math.max(0.04, Math.min(finalNote.beats * beatSeconds * 0.72, beatSeconds * 0.72));
          if (chordStart + chordDuration <= offset) return;
          const audibleStart = Math.max(chordStart, offset);
          const audibleDuration = Math.max(0.04, chordStart + chordDuration - audibleStart);
          const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, finalNote.beat);
          chordLetters.forEach((letter, index) => {
            const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
            playPianoMidi(ctx, gainNode, chordMidi, startTime + audibleStart, audibleDuration, accompanimentVelocity, 0.026, eventDynamicGain, "triangle", 0.08);
            if (index === 0) playPianoMidi(ctx, gainNode, chordMidi - 12, startTime + audibleStart, audibleDuration, accompanimentVelocity, 0.02, eventDynamicGain, "sine", 0.08);
          });
          return;
        }

        if (bar.barIndex === question.bars.length - 1) {
          const chordStart = Math.max(barStart, offset);
          const chordDuration = Math.max(0.04, barStart + barSeconds * 0.96 - chordStart);
          const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, 0);
          chordLetters.forEach((letter, index) => {
            const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
            playPianoMidi(ctx, gainNode, chordMidi, startTime + chordStart, chordDuration, accompanimentVelocity, 0.026, eventDynamicGain, "triangle", 0.08);
            if (index === 0) playPianoMidi(ctx, gainNode, chordMidi - 12, startTime + chordStart, chordDuration, accompanimentVelocity, 0.02, eventDynamicGain, "sine", 0.08);
          });
          return;
        }

        if (question.questionType === "practicePaper" && question.accompanimentPattern) {
          playTempoAccompanimentPattern(ctx, gainNode, question, bar, barStart, offset, startTime, dynamicGain, dynamicVelocity);
          return;
        }

        const bassMidi = pitchForChordLetter(question, bar, chordLetters[0], 2) - 12;
        const bassStart = Math.max(barStart, offset);
        const bassDuration = Math.max(0.04, barStart + beatSeconds * 0.88 - bassStart);
        playPianoMidi(ctx, gainNode, bassMidi, startTime + bassStart, bassDuration, accompanimentVelocity, 0.024, dynamicGainForPoint(question, bar.barIndex, 0), "sine", 0.06);

        if (question.timeSignature.id === "4/4") {
          const events = [
            { beat: 1, type: "chord" },
            { beat: 2, type: "bass5" },
            { beat: 3, type: "chord" },
          ];
          events.forEach((event) => {
            const pulseStart = barStart + event.beat * beatSeconds;
            const pulseDuration = beatSeconds * 0.42;
            if (pulseStart + pulseDuration <= offset) return;
            const audibleStart = Math.max(pulseStart, offset);
            const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
            const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, event.beat);
            if (event.type === "bass5") {
              const fifthMidi = pitchForChordLetter(question, bar, chordLetters[1] ?? chordLetters[0], 2) - 12;
              playPianoMidi(ctx, gainNode, fifthMidi, startTime + audibleStart, audibleDuration, accompanimentVelocity, 0.024, eventDynamicGain, "sine", 0.06);
              return;
            }
            chordLetters.forEach((letter, index) => {
              const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
              playPianoMidi(ctx, gainNode, chordMidi, startTime + audibleStart, audibleDuration, accompanimentVelocity, 0.018, eventDynamicGain, "triangle", 0.05);
            });
          });
          return;
        }

        const pulseBeats = question.timeSignature.id === "6/8"
          ? [1.5]
          : Array.from({ length: Math.max(0, question.timeSignature.beats - 1) }, (_, beat) => beat + 1);
        pulseBeats.forEach((beat) => {
          const pulseStart = barStart + beat * beatSeconds;
          const pulseDuration = beatSeconds * (question.timeSignature.id === "6/8" ? 0.72 : 0.42);
          if (pulseStart + pulseDuration <= offset) return;
          const audibleStart = Math.max(pulseStart, offset);
          const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
          const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, beat);
          chordLetters.forEach((letter, index) => {
            const chordMidi = pitchForChordLetter(question, bar, letter, 3 + index);
            playPianoMidi(ctx, gainNode, chordMidi, startTime + audibleStart, audibleDuration, accompanimentVelocity, 0.018, eventDynamicGain, "triangle", 0.05);
          });
        });
      }

      function playMelodyNote(ctx, gainNode, midi, start, duration, dynamicGain = 1, dynamicVelocity = 96) {
        playPianoMidi(ctx, gainNode, midi, start, duration, dynamicVelocity, 0.078, dynamicGain, "triangle", 0.1);
      }

      function pianoLayersForPlayback(question, playbackBars) {
        const layers = [];
        const addMidi = (midi, velocity = 96) => {
          const layer = choosePianoLayer(midi, velocity);
          if (layer) layers.push(layer);
        };
        playbackBars.forEach((bar) => {
          const melodyVelocity = dynamicVelocityForBar(question, bar.barIndex);
          const accompanimentVelocity = accompanimentVelocityForBar(question, bar.barIndex);
          bar.notes.forEach((note) => {
            if (!note.rest && !note.tiedFromPrevious) addMidi(effectiveMidiForNote(question, bar, note), melodyVelocity);
          });
          const chordLetters = question.key.chords[bar.chordSymbol] ?? [];
          if (!chordLetters.length) return;
          addMidi(pitchForChordLetter(question, bar, chordLetters[0], 2) - 12, accompanimentVelocity);
          addMidi(pitchForChordLetter(question, bar, chordLetters[1] ?? chordLetters[0], 2) - 12, accompanimentVelocity);
          chordLetters.forEach((letter, index) => {
            addMidi(pitchForChordLetter(question, bar, letter, 3 + index), accompanimentVelocity);
          });
        });
        return layers;
      }

      async function playQuestionAudio(startAt = 0, restart = false) {
        if (isPlaying && !restart) {
          stopAudio();
          return;
        }
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          setPrompt("Audio playback is not supported in this browser.");
          return;
        }
        const offset = clamp(Number(startAt) || 0, 0, totalDuration);
        stopAudio(false);
        if (offset >= totalDuration) {
          return;
        }
        const ctx = new AudioContextClass();
        const master = ctx.createGain();
        master.gain.setValueAtTime(1.25, ctx.currentTime);
        master.connect(ctx.destination);
        audioRef.current = ctx;
        setIsPlaying(true);
        setPrompt("");
        await preloadPianoSamples(ctx, pianoLayersForPlayback(question, playbackBars));
        if (audioRef.current !== ctx) return;
        const startTime = ctx.currentTime + 0.12 - offset;

        playbackBars.forEach((bar, playbackIndex) => {
          const barStart = playbackIndex * barSeconds;
          const dynamicGain = dynamicGainForBar(question, bar.barIndex);
          const dynamicVelocity = dynamicVelocityForBar(question, bar.barIndex);
          if (metronomeOn) {
            for (let beat = 0; beat < question.timeSignature.beats; beat += 1) {
              const beatStart = barStart + beat * beatSeconds;
              if (beatStart >= offset) playMetronome(ctx, master, startTime + beatStart, beat === 0);
            }
          }
          playAccompaniment(ctx, master, question, bar, barStart, offset, startTime, dynamicGain, dynamicVelocity);
          bar.notes.forEach((note, noteIndex) => {
            if (note.rest || note.tiedFromPrevious) return;
            const noteStart = barStart + note.beat * beatSeconds;
            const nextTiedNote = note.tieToNext && !bar.notes[noteIndex + 1]?.rest ? bar.notes[noteIndex + 1] : null;
            const duration = (note.beats + (nextTiedNote?.beats ?? 0)) * beatSeconds * 0.96;
            if (noteStart + duration <= offset) return;
            const audibleStart = Math.max(noteStart, offset);
            const audibleDuration = Math.max(0.04, noteStart + duration - audibleStart);
            const noteDynamicGain = dynamicGainForPoint(question, bar.barIndex, note.beat);
            playMelodyNote(ctx, master, effectiveMidiForNote(question, bar, note), startTime + audibleStart, audibleDuration, noteDynamicGain, dynamicVelocity);
            if (followPlayback) {
              const highlightTimer = window.setTimeout(() => {
                setActiveNoteId(note.id);
              }, Math.max(0, (startTime + audibleStart - ctx.currentTime) * 1000));
              const clearTimer = window.setTimeout(() => setActiveNoteId(null), Math.max(0, (startTime + audibleStart - ctx.currentTime + audibleDuration) * 1000));
              timersRef.current.push(highlightTimer, clearTimer);
            }
          });
        });

        const stopTimer = window.setTimeout(() => {
          stopAudio();
        }, Math.max(0, (totalDuration - offset) * 1000) + 260);
        timersRef.current.push(stopTimer);
      }

      function handlePlayClick() {
        if (isPlaying) {
          stopAudio();
          return;
        }
        if (limitPlays && !practiceReviewMode && playsRemaining <= 0) {
          setPrompt("No plays remaining for this question.");
          return;
        }
        if (limitPlays && !practiceReviewMode) setPlaysRemaining((current) => Math.max(0, current - 1));
        playQuestionAudio();
      }

      useEffect(() => () => stopAudio(), []);

      const isIdentifyMelody = question.questionType === "identifyMelody";
      const targetBar = isIdentifyMelody ? null : question.bars[question.targetBar];
      const allRequiredNotesPlaced = isIdentifyMelody
        ? question.selectedOptionIndex !== null
        : Boolean(targetBar?.notes?.length) && targetBar.notes.every((_, index) => Boolean(userNotes[index]));
      const clearDisabled = Boolean(feedback) || (isIdentifyMelody ? question.selectedOptionIndex === null : !Object.keys(userNotes).length);

      return (
        <div className="overflow-x-hidden bg-stone-50 pb-10 text-black md:pb-12">
          <window.MLH.AppHeader icon={ASSET.appIcon} title="Practice Questions" subtitle="Complete exam-style questions combining multiple music literacy concepts.">
            <PracticeScoreTimerPanel
              correct={score.correct}
              attempted={score.attempted}
              secondsRemaining={secondsRemaining}
              timerEnabled={timerEnabled}
              timerPaused={timerPaused}
              timerLocked={practiceReviewMode}
              confettiKey={confettiKey}
              onPauseTimer={() => {
                stopAudio();
                setTimerPaused(true);
              }}
            />
          </window.MLH.AppHeader>

          {timerPaused && <TimerPauseOverlay onResume={() => setTimerPaused(false)} />}
          {newQuestionConfirmOpen && (
            <NewQuestionConfirmOverlay
              onCancel={() => setNewQuestionConfirmOpen(false)}
              onConfirm={() => {
                setNewQuestionConfirmOpen(false);
                startFreshQuestion();
              }}
            />
          )}
          <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
            <main
              className="relative flex flex-col overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-3 pt-[10px] shadow-sm sm:px-4 md:px-6 md:pb-6 md:pt-[14px]"
              onPointerDown={(event) => {
                if (!feedback) return;
                if (question.questionType === "practicePaper") return;
                const button = event.target.closest("button");
                if (button && !button.closest("[data-feedback-continue]")) return;
                if (event.target.closest("[data-menu-trigger],[data-menu-panel]")) return;
                advanceAfterFeedback();
              }}
            >
              <div className="relative z-[90] mb-2.5 grid w-full grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2">
                <div className="relative flex items-center gap-2" ref={menuRef}>
                  <div className="hub-menu-anchor relative">
                    <window.MLH.LevelButton
                      icon={<img src={ASSET.level} alt="" aria-hidden="true" className="h-[26px] w-[28px] object-contain" />}
                      activeLevel={activeLevel}
                      activeLabel={LEVELS[activeLevel].label}
                      onClick={() => setMenu(menu === "level" ? null : "level")}
                      dataMenuTrigger
                    />
                    {menu === "level" && (
                      <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel>
                        <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                      </window.MLH.MenuPanel>
                    )}
                  </div>
                  <div className="hub-menu-anchor relative">
                    <window.MLH.CustomiseButton
                      icon={<img src={ASSET.customise} alt="" className="h-[21px] w-[21px]" />}
                      onClick={() => setMenu(menu === "customise" ? null : "customise")}
                      dataMenuTrigger
                    />
                  {menu === "customise" && (
                    <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel>
                      <CustomiseMenu
                        activeLevel={activeLevel}
                        limitPlays={limitPlays}
                        setLimitPlays={setLimitPlays}
                        timerEnabled={timerEnabled}
                        setTimerEnabled={setTimerEnabled}
                        followPlayback={followPlayback}
                        setFollowPlayback={setFollowPlayback}
                        showAudioQuestionGlyphs={showAudioQuestionGlyphs}
                        setShowAudioQuestionGlyphs={setShowAudioQuestionGlyphs}
                        enabledQuestionTypes={enabledQuestionTypes}
                        onToggleQuestionType={toggleQuestionType}
                      />
                    </window.MLH.MenuPanel>
                  )}
                  </div>
                </div>
                <div className="flex h-10 min-w-[112px] items-center justify-center sm:min-w-[140px]">
                  <Feedback feedback={question.questionType === "practicePaper" ? null : feedback} fading={feedbackFading} />
                </div>
                <div className="flex justify-end">
                  {!feedback && (
                    <window.MLH.SkipButton
                      onClick={() => {
                        if (hasQuestionProgress()) {
                          setNewQuestionConfirmOpen(true);
                          return;
                        }
                        startFreshQuestion();
                      }}
                      icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />}
                    />
                  )}
                </div>
              </div>

              <div className={`relative -mt-[35px] mx-auto flex w-full items-center justify-center transition-opacity duration-300 ${visible ? "opacity-100" : "opacity-0"}`}>
                <Score question={question} userNotes={userNotes} setUserNotes={setUserNotes} practiceAnswers={practiceAnswers} setPracticeAnswers={setPracticeAnswers} feedback={feedback} activeIndex={activePracticePart} activeNoteId={activeNoteId} hoverNote={hoverNote} setHoverNote={setHoverNote} onSelectOption={selectMelodyOption} />
              </div>

              {question.questionType === "practicePaper" ? (
                <PracticeQuestionPanel
                  question={question}
                  activeIndex={activePracticePart}
                  setActiveIndex={setActivePracticePart}
                  practiceAnswers={practiceAnswers}
                  setPracticeAnswers={setPracticeAnswers}
                  userNotes={userNotes}
                  setUserNotes={setUserNotes}
                  feedback={feedback}
                  prompt={prompt}
                  canConfirm={practiceQuestionComplete()}
                  isPlaying={isPlaying}
                  playsRemaining={playsRemaining}
                  limitPlays={limitPlays && !practiceReviewMode}
                  showAudioQuestionGlyphs={showAudioQuestionGlyphs}
                  onPlayClick={handlePlayClick}
                  onConfirm={confirmAnswer}
                  onPlaceDynamic={placeDynamic}
                  onNextQuestion={startFreshQuestionFromFeedback}
                />
              ) : (
                <section className={`relative z-10 rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md md:mx-3 ${isIdentifyMelody ? "mt-4" : "mt-auto md:-mt-[42px]"}`}>
                  <p className="text-base font-semibold leading-tight">
                    {isIdentifyMelody
                      ? question.prompt
                      : question.useShortPrompt
                        ? <>Listen to the music and insert the missing notes in <strong>bar {question.targetBar + 1}</strong>.</>
                        : <>Listen to the music and insert the missing notes in <strong>bar {question.targetBar + 1}</strong>. The rhythm is given above the stave.</>}
                  </p>
                  {prompt && <p className="mt-2 text-sm font-medium text-red-700">{prompt}</p>}
                  <div className={`${window.MLH.PlayClearConfirmRowClass} justify-between`}>
                    <div className={`flex flex-col items-start ${(!limitPlays || playsRemaining > 0 || isPlaying) ? "" : "opacity-45 grayscale"}`}>
                      <button
                        type="button"
                        disabled={limitPlays && playsRemaining <= 0 && !isPlaying}
                        onClick={handlePlayClick}
                        className={window.MLH.PlayButtonClass}
                        aria-label={isPlaying ? "Stop audio" : "Play audio"}
                      >
                        <span className="text-lg leading-none">{isPlaying ? "■" : "▶"}</span>
                        <span>{isPlaying ? "Stop" : "Play"}</span>
                      </button>
                      {limitPlays && <div className="mt-[3px] text-[10px] font-medium leading-none text-stone-500 sm:text-[11px]">Remaining: {playsRemaining}</div>}
                    </div>
                    <div className={window.MLH.ActionButtonGroupClass}>
                      <button type="button" disabled={clearDisabled} onClick={clearUserNotes} className={window.MLH.ClearButtonClass}>
                        Clear
                      </button>
                      <window.MLH.ConfirmButton disabled={Boolean(feedback) || !allRequiredNotesPlaced} onClick={confirmAnswer} className={window.MLH.AudioConfirmButtonClass}>
                        Confirm
                      </window.MLH.ConfirmButton>
                    </div>
                  </div>
                </section>
              )}
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script src="./footer.js?v=1.3"></script>
</body>
</html>
