    function applyRhythmDictationPattern(question, barIndex) {
      const pattern = randomItem(RHYTHM_DICTATION_PATTERNS[question.timeSignature.id] ?? RHYTHM_DICTATION_PATTERNS["4/4"]);
      const previousBar = question.bars[barIndex - 1];

      const targetStep = question.bars[barIndex]?.notes?.find((note) => !note.rest)?.step ?? previous.step;

      question.bars[barIndex] = buildNational5PhraseBar({

    function applyPracticeRhythmPattern(question, barIndex, pattern) {
      const previousBar = question.bars[barIndex - 1];
      const previous = [...(previousBar?.notes ?? [])].reverse().find((note) => !note.rest) ?? tonicStartNoteForLevel("N5", question.key);
      const targetStep = question.bars[barIndex]?.notes?.find((note) => !note.rest)?.step ?? previous.step;
      const chordSymbol = question.bars[barIndex]?.chordSymbol ?? "I";
      question.bars[barIndex] = buildNational5PhraseBar({

    function applyPlaybackRhythmPattern(bar, playbackPattern) {
      if (!bar || !playbackPattern?.length || bar.notes.length !== playbackPattern.length) return bar;
      let beat = 0;
      bar.notes = bar.notes.map((note, index) => {
        const rhythm = playbackPattern[index] ?? note.rhythm;
        const beats = rhythmInfo(rhythm).beats;
        const next = { ...note, beat, beats };

      return bar;

    function plantRhythmIdentificationTarget(question, excludedBars = []) {

        .filter((bar) => !excluded.has(bar.barIndex) && bar.barIndex !== question.targetBar)
        .map((bar) => bar.barIndex);

      const variants = [
        preferredVariant,

        if (!patterns?.length) continue;

            .filter(({ note }) => note.rhythm === "dottedCrotchet" || note.rhythm === "quaver");

      for (let index = 1; index < notes.length; index += 1) {

      const notes = bars.flatMap((bar) => bar.notes ?? []).filter((note) => !note.rest);

    function hasEnoughPitchVariety(bars, minimum = 3) {

      return 3;

    function levelMaximumRange(level) {
      if (level === "N3" || level === "N4") return 5;
      if (level === "N5" || isHigherLevel(level)) return 7;
      return 7;
    }

    function longestRepeatedPitchRun(notes) {
      let longest = 1;
      let current = 1;
      for (let index = 1; index < notes.length; index += 1) {
        if (notes[index].step === notes[index - 1].step) {
          current += 1;
          longest = Math.max(longest, current);
        } else {
          current = 1;
        }
      }
      return longest;
    }

    function hasAwkwardBarlineLeap(bars, level) {
      const maximum = levelMaximumInterval(level);
      return bars.some((bar, index) => {
        const nextBar = bars[index + 1];
        const barNotes = (bar?.notes ?? []).filter((note) => !note.rest);
        const nextNotes = (nextBar?.notes ?? []).filter((note) => !note.rest);
        if (!barNotes.length || !nextNotes.length) return false;
        return Math.abs(nextNotes[0].step - barNotes.at(-1).step) > maximum;

    function hasBalancedContour(notes) {
      let rises = 0;
      let falls = 0;
      for (let index = 1; index < notes.length; index += 1) {
        const interval = notes[index].step - notes[index - 1].step;
        if (interval > 0) rises += 1;
        if (interval < 0) falls += 1;
      }
      return rises > 0 && falls > 0;
    }

    function leapsRecoverByStep(notes, level) {
      const recoveryLimit = 1;
      const leapThreshold = isHigherLevel(level) ? 3 : 2;
      for (let index = 1; index < notes.length - 1; index += 1) {
        const leap = notes[index].step - notes[index - 1].step;
        if (Math.abs(leap) < leapThreshold) continue;
        const recovery = notes[index + 1].step - notes[index].step;
        if (recovery === 0) continue;
        if (Math.sign(recovery) === Math.sign(leap) || Math.abs(recovery) > recoveryLimit) return false;
      }
      return true;
    }

    function melodyPassesQualityRules(question) {
      const notes = melodyNotes(question.bars);
      if (notes.length < 2) return false;
      const intervals = notes.slice(1).map((note, index) => Math.abs(note.step - notes[index].step));
      const range = Math.max(...notes.map((note) => note.step)) - Math.min(...notes.map((note) => note.step));
      const first = notes[0];
      const last = notes.at(-1);
      const tonic = question.key.tonic;
      const maximumRepeatedRun = 2;
      const finalChordLetters = question.key.chords?.[question.bars.at(-1)?.chordSymbol] ?? question.key.chords.I;
      const hasValidEnding = question.level === "N5" && question.cadenceId === "imperfect"
        ? finalChordLetters.includes(last.letter)
        : last.letter === tonic;

      if (first.letter !== tonic) return false;
      if (!hasValidEnding) return false;
      if (range > levelMaximumRange(question.level)) return false;
      if (Math.max(...intervals) > levelMaximumInterval(question.level)) return false;
      if (hasAwkwardBarlineLeap(question.bars, question.level)) return false;
      if (!hasBalancedContour(notes)) return false;
      if (!leapsRecoverByStep(notes, question.level)) return false;
      if (longestRepeatedPitchRun(notes) > maximumRepeatedRun) return false;
      return true;
    }

    function makeChordProgression() {

    function copyNational3QuestionPhraseToAnswer(bars, key) {
      [[0, 4], [1, 5]].forEach(([sourceIndex, targetIndex]) => {
        const source = bars[sourceIndex];

        if (!source || !target) return;
        bars[targetIndex] = {

            note.rhythm,
            targetIndex,
            noteIndex,
            note.beat,

          )),

    function makeNational5PracticeProgression(cadenceId = "perfect") {
      const bar2 = randomItem(["I", "IV", "V", "VI"]);
      const bar3 = randomItem(["I", "IV", "V", "VI"]);

      const bar8 = cadenceId === "perfect" ? "I" : "V";

    function allowedChordsForBar(barIndex) {
      if (barIndex === 0 || barIndex === 3) return ["I"];
      if (barIndex === 1) return ["I", "IV", "V", "VI"];

    }

    function chordFitScore(key, bar, chordSymbol) {
      const chordLetters = key.chords[chordSymbol] ?? [];
      return (bar.notes ?? []).reduce((score, note) => {
        if (note.rest) return score;
        const isChordTone = chordLetters.includes(note.letter);
        const durationWeight = Math.max(1, note.beats ?? rhythmInfo(note.rhythm).beats);
        const weight = (note.beat === 0 || note.beat === 2 ? 3 : 1) * durationWeight;
        return score + (isChordTone ? weight : -weight);
      }, 0);
    }

    function noteIsOnStrongBeat(note) {
      if (!note || note.rest) return false;
      return note.beat === 0 || note.beat === 2 || note.beat === 3 || (note.beat === 1.5 && rhythmInfo(note.rhythm).beats >= 1);
    }

    function pitchFitsStrongBeatChord(question, bar, note, pitch) {
      if (!noteIsOnStrongBeat(note)) return true;
      const chordLetters = question.key?.chords?.[bar.chordSymbol] ?? [];
      return chordLetters.includes(pitch.letter);
    }

    function chordForStrongBeatNotes(key, notes, fallbackSymbol = "I") {
      const strongBeatLetters = (notes ?? [])
        .filter(noteIsOnStrongBeat)
        .map((note) => note.letter);
      const chordSymbols = Object.keys(key?.chords ?? {});
      const fallbackLetters = key?.chords?.[fallbackSymbol] ?? [];
      if (strongBeatLetters.every((letter) => fallbackLetters.includes(letter))) return fallbackSymbol;
      return chordSymbols.find((symbol) => {
        const chordLetters = key.chords[symbol] ?? [];
        return strongBeatLetters.every((letter) => chordLetters.includes(letter));
      }) ?? null;
    }

    function strongBeatsUseChordTones(question) {
      return question.bars.every((bar) => {
        const chordLetters = question.key?.chords?.[bar.chordSymbol] ?? [];
        return (bar.notes ?? []).every((note) => !noteIsOnStrongBeat(note) || chordLetters.includes(note.letter));
      });
    }

    function fitChordsToMelody(key, bars) {
      return bars.map((bar) => {
        const allowed = allowedChordsForBar(bar.barIndex);
        const bestChord = allowed.reduce((best, chordSymbol) => (
          chordFitScore(key, bar, chordSymbol) > chordFitScore(key, bar, best) ? chordSymbol : best
        ), allowed[0]);
        return { ...bar, chordSymbol: bestChord };
      });
    }

    function refitQuestionChordsToMelody(question, protectedBars = []) {
      const protectedSet = new Set(protectedBars.filter((barIndex) => Number.isInteger(barIndex)));
      const availableChords = Object.keys(question.key?.chords ?? {});
      if (!availableChords.length) return question;
      question.bars = question.bars.map((bar) => {
        if (protectedSet.has(bar.barIndex)) return bar;
        const bestChord = availableChords.reduce((best, chordSymbol) => (
          chordFitScore(question.key, bar, chordSymbol) > chordFitScore(question.key, bar, best) ? chordSymbol : best
        ), bar.chordSymbol && availableChords.includes(bar.chordSymbol) ? bar.chordSymbol : availableChords[0]);
        return {
          ...bar,
          chordSymbol: bestChord,
          notes: (bar.notes ?? []).map((note) => note.rest ? note : makeNote(note, note.rhythm, bar.barIndex, note.noteIndex, note.beat, question.key, bestChord)),
        };
      });
      return question;
    }

    function sequenceSourceCandidates(bars, targetBar, level) {
      if (level !== "N4") return bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length);
      return bars.filter((bar) => bar.barIndex === targetBar - 1 && bar.notes?.length);
    }

    function retryLimitForLevel(level) {
      return level === "N3" ? 8 : 160;
    }

    function canRetryForLevel(level, attempt) {
      return attempt < retryLimitForLevel(level);
    }

    function makeCompletionQuestion(level = "N5", attempt = 0, allowDenseAhPatterns = false) {
      const activeBarCount = barCountForLevel(level);
      const timeSignature = randomItem(timeSignaturesForLevel(level));
      const majorKeys = KEYS.filter((key) => key.id !== "Am");
      const key = level === "N3" || level === "N4"
        ? KEYS.find((item) => item.id === "C")
        : Math.random() < 0.82 ? randomItem(majorKeys) : KEYS.find((item) => item.id === "Am");
      const progression = makeChordProgression();

      const targetBar = level === "N4" || level === "N5" || isHigherLevel(level)
        ? randomItem([1, 2])
        : randomItem(Array.from({ length: activeBarCount }, (_, index) => index));
      const bars = [];
      let previousIndex = noteBaseIndex(tonicStartNoteForLevel(level, key));
      const mode = levelMode(level);

      for (let barIndex = 0; barIndex < activeBarCount; barIndex += 1) {
        const chordSymbol = progression[barIndex];
        let bar;
        if (barIndex === activeBarCount - 1) {
          bar = buildFinalBar({ key, chordSymbol, barIndex, timeSignature, previousIndex, totalBars: activeBarCount, level });
          previousIndex = noteBaseIndex(bar.notes[0]);
        } else {
          const availablePatterns = level === "AH" ? ahBarPatternsForSignature(timeSignature, allowDenseAhPatterns) : barPatternsForSignature(timeSignature, level);
          const pattern = randomItem(availablePatterns);
          const built = buildNotesFromPattern({ key, chordSymbol, pattern, barIndex, previousIndex, level, mode, previousNotes: melodyNotes(bars) });
          previousIndex = built.lastIndex;
          bar = { barIndex, chordSymbol, notes: built.notes, totalBars: activeBarCount, pattern };
        }
        bars.push(bar);
      }

      if (bars[targetBar]?.notes?.length) {
        if (mode === "repetition") {
          let repetitionCandidates = bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length);
          const repetitionSource = randomItem(repetitionCandidates.length ? repetitionCandidates : bars.filter((bar) => bar.barIndex !== targetBar && bar.notes?.length));
          bars[targetBar] = { ...bars[targetBar], notes: cloneNotesForBar(repetitionSource.notes, targetBar) };
        } else if (mode === "sequence") {
          let possibleSources = sequenceSourceCandidates(bars, targetBar, level);
          const sequenceOptions = possibleSources.flatMap((source) => [-1, 1]
            .filter((offset) => canTransposeBarByStep(source, offset, level))
            .map((offset) => ({ source, offset })));
          const selectedSequence = randomItem(sequenceOptions);
          if (selectedSequence) {
            bars[targetBar] = { ...bars[targetBar], notes: transposeNotesForBar(selectedSequence.source.notes, targetBar, selectedSequence.offset) };
          }
        }
        bars[targetBar] = { ...bars[targetBar], notes: applyMelodicAccidentals(bars[targetBar].notes, key), pattern: bars[targetBar].notes.map((note) => note.rhythm) };
      }

      forceFirstNoteToTonic(bars, level, key);
      const fittedBars = fitChordsToMelody(key, bars);

      const question = {
        id: Math.random().toString(36).slice(2),
        key,
        timeSignature,
        bars: fittedBars,
        targetBar,
        level,
        mode,
        barCount: activeBarCount,
      };

      const targetMaximumInterval = isHigherLevel(level) && mode === "free" ? 1 : maxStepForLevel(level, mode);

      if ((level === "N3" || level === "N4" || level === "N5" || isHigherLevel(level)) && !targetMovesWithinInterval(bars, targetBar, targetMaximumInterval) && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      if ((level === "N3" || level === "N4") && !hasEnoughPitchVariety(bars) && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      if ((level === "N5" || isHigherLevel(level)) && ((bars[targetBar]?.notes ?? []).filter((note) => !note.rest).length) < 3 && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      if (level === "N3" && melodyHasOctaveLeap(bars) && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      if (level === "N4" && !targetHasSourcePattern(bars, targetBar, mode === "repetition" ? hasSamePitchPattern : hasSequencePitchPattern) && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      if (level === "N5" && !targetHasSourcePattern(bars, targetBar, hasExactBarCopy) && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      if (isHigherLevel(level) && mode !== "free" && !targetHasSourcePattern(bars, targetBar, mode === "repetition" ? hasSamePitchPattern : hasSequencePitchPattern) && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      if (isHigherLevel(level) && mode === "free" && targetHasAnySourcePattern(bars, targetBar) && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      if (!melodyPassesQualityRules(question) && canRetryForLevel(level, attempt)) {
        return makeCompletionQuestion(level, attempt + 1, allowDenseAhPatterns);
      }

      return question;
    }

    function makeEightBarRepetitionQuestion(level = "N5", attempt = 0, cadenceId = "perfect", requireMissingCopy = true) {
      const activeBarCount = BAR_COUNT;
      const timeSignature = randomItem(timeSignaturesForLevel(level));
      const majorKeys = KEYS.filter((key) => key.id !== "Am");
      const key = level === "N3" || level === "N4"
        ? KEYS.find((item) => item.id === "C")
        : Math.random() < 0.82 ? randomItem(majorKeys) : KEYS.find((item) => item.id === "Am");
      const progression = level === "N3" || level === "N4" ? makeNational3PracticeProgression() : level === "N5" ? makeNational5PracticeProgression(cadenceId) : makeEightBarRepetitionProgression();
      const targetBar = level === "N5"
        ? randomItem([1, 2, 4, 5, 6])
        : level === "N4" && requireMissingCopy
          ? 4
          : randomItem([4, 5]);
      const bars = [];
      let missingSourceBar = null;
      let previousIndex = noteBaseIndex(tonicStartNoteForLevel(level, key));
      const mode = "repetition";
      const availablePatterns = level === "AH" ? ahBarPatternsForSignature(timeSignature, false) : barPatternsForSignature(timeSignature, level);
      resetNational5PhraseMemory();
      const tonicStep = tonicStartNoteForLevel(level, key).step;
      const contourTargets = [tonicStep, tonicStep + 2, tonicStep + 1, tonicStep + 2, tonicStep + 2, tonicStep + 4, tonicStep + 5, tonicStep];

      for (let barIndex = 0; barIndex < activeBarCount; barIndex += 1) {
        const chordSymbol = progression[barIndex];
        let bar;
        if (barIndex === 3) {
          bar = buildCadenceBar({
            key,
            chordSymbol,
            targetLetter: dominantLetterForKey(key),
            barIndex,
            timeSignature,
            previousIndex,
            totalBars: activeBarCount,
            level,
          });
        } else if (barIndex === activeBarCount - 1) {
          if (level === "N5" && cadenceId === "imperfect") {
            bar = buildCadenceBar({
              key,
              chordSymbol,
              targetLetter: dominantLetterForKey(key),
              barIndex,
              timeSignature,
              previousIndex,
              totalBars: activeBarCount,
              level,
            });
          } else if (level === "N3" || level === "N4") {
            bar = buildNational3FinalBar({ key, chordSymbol, barIndex, timeSignature, previousIndex, totalBars: activeBarCount });
          } else {
            bar = buildFinalBar({ key, chordSymbol, barIndex, timeSignature, previousIndex, totalBars: activeBarCount, level });
          }
        } else {
          const pattern = level === "N5"
            ? randomItem(national5PatternsForBar(timeSignature, barIndex))
            : randomItem(availablePatterns);
          if (level === "N5") {
            bar = buildNational5PhraseBar({
              key,
              chordSymbol,
              pattern,
              barIndex,
              previous: NOTE_POOL[previousIndex] ?? tonicStartNoteForLevel(level, key),
              totalBars: activeBarCount,
              timeSignature,
              targetStep: contourTargets[barIndex],
            });
            previousIndex = noteBaseIndex([...bar.notes].reverse().find((note) => !note.rest));
          } else {
            const built = buildNotesFromPattern({ key, chordSymbol, pattern, barIndex, previousIndex, level, mode, previousNotes: melodyNotes(bars) });
            previousIndex = built.lastIndex;
            bar = { barIndex, chordSymbol, notes: built.notes, totalBars: activeBarCount, pattern };
          }
        }
        bars.push(bar);
        const lastNote = [...bar.notes].reverse().find((note) => !note.rest);
        if (lastNote) previousIndex = noteBaseIndex(lastNote);
      }

      forceFirstNoteToTonic(bars, level, key);
      if (level === "N3" || level === "N4") copyNational3QuestionPhraseToAnswer(bars, key);
      if (level === "N3" || level === "N4") forceNational3BarSevenApproach(bars, key);
      if (level === "N4" && requireMissingCopy) {
        const source = bars[targetBar - 1];
        const sequenceOptions = shuffleItems([-1, 1])
          .filter((offset) => canTransposeBarByStep(source, offset, level))
          .map((offset) => {
            const notes = sequenceBarByStep(source, targetBar, offset, key, bars[targetBar]?.chordSymbol);
            const chordSymbol = chordForStrongBeatNotes(key, notes, bars[targetBar]?.chordSymbol);
            return notes && chordSymbol ? { notes, chordSymbol } : null;
          })
          .filter(Boolean);
        const selectedSequence = sequenceOptions[0];
        if (!selectedSequence && canRetryForLevel(level, attempt)) return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
        if (selectedSequence) {
          bars[targetBar] = {
            ...bars[targetBar],
            chordSymbol: selectedSequence.chordSymbol,
            notes: selectedSequence.notes.map((note) => ({ ...note, chordSymbol: selectedSequence.chordSymbol })),
            pattern: source.notes.map((note) => note.rhythm),
          };
          missingSourceBar = source.barIndex;
        }
      }
      if (requiresExactMissingCopy(level, requireMissingCopy)) {
        const sourceBars = level === "N3"
          ? [bars[targetBar === 4 ? 0 : 1]].filter(Boolean)
          : bars.filter((bar) => (
            bar.barIndex !== targetBar
            && bar.barIndex !== activeBarCount - 1
            && (level !== "N5" || (bar.notes ?? []).filter((note) => !note.rest).length >= 3)
            && (bar.notes ?? []).some((note) => !note.rest)
          ));
        const source = level === "N3" ? sourceBars[0] : randomItem(sourceBars);
        if (!source && canRetryForLevel(level, attempt)) return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
        if (source) {
          bars[targetBar] = {
            ...bars[targetBar],
            chordSymbol: source.chordSymbol,
            notes: applyMelodicAccidentals(cloneNotesForBar(source.notes, targetBar), key),
            pattern: source.notes.map((note) => note.rhythm),
          };
          missingSourceBar = source.barIndex;
        }
      }

      const question = {
        id: Math.random().toString(36).slice(2),
        key,
        timeSignature,
        bars,
        targetBar,
        level,
        mode,
        cadenceId,
        missingSourceBar,
        questionType: "eightBarRepetition",
        barCount: activeBarCount,
        useShortPrompt: true,
      };

      const targetMaximumInterval = level === "N5" ? national5MelodicLeapLimit() : maxStepForLevel(level, mode);
      if (!targetMovesWithinInterval(bars, targetBar, targetMaximumInterval) && canRetryForLevel(level, attempt)) {
        return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
      }

      if ((level === "N3" || level === "N4") && !hasEnoughPitchVariety(bars) && canRetryForLevel(level, attempt)) {
        return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
      }

      if (level === "N5" && requireMissingCopy && ((bars[targetBar]?.notes ?? []).filter((note) => !note.rest).length) < 3 && canRetryForLevel(level, attempt)) {
        return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
      }

      if (requiresExactMissingCopy(level, requireMissingCopy) && !targetHasSourcePattern(bars, targetBar, hasExactBarCopy) && canRetryForLevel(level, attempt)) {
        return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
      }

      if (!strongBeatsUseChordTones(question) && canRetryForLevel(level, attempt)) {
        return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
      }

      if ((level === "N3" || level === "N4") && melodyHasOctaveLeap(bars) && canRetryForLevel(level, attempt)) {
        return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
      }

      if ((level === "N5" || isHigherLevel(level)) && !melodyPassesQualityRules(question) && canRetryForLevel(level, attempt)) {
        return makeEightBarRepetitionQuestion(level, attempt + 1, cadenceId, requireMissingCopy);
      }

      return question;
    }

    function shuffleItems(items) {
      const next = [...items];
      for (let index = next.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(Math.random() * (index + 1));
        [next[index], next[swapIndex]] = [next[swapIndex], next[index]];
      }
      return next;
    }

    function avoidCorrectOptionFirst(options) {
      if (options[0]?.correct && options.length > 1) {
        const swapIndex = 1 + Math.floor(Math.random() * (options.length - 1));
        [options[0], options[swapIndex]] = [options[swapIndex], options[0]];
      }
      return options;
    }

    function cloneBarsForOption(bars, optionId) {
      const totalBars = bars.length;
      return bars.map((bar, barIndex) => ({
        ...bar,
        barIndex,
        totalBars,
        notes: bar.notes.map((note, noteIndex) => ({
          ...note,
          id: `${optionId}-${barIndex}-${noteIndex}`,
          barIndex,
          noteIndex,
        })),
      }));
    }

    function mutateNotePitch(note, key, direction = 0) {
      if (note?.rest) return note;
      const currentIndex = noteBaseIndex(note);
      const offsets = direction ? [direction] : shuffleItems([-1, 1]);
      for (const offset of offsets) {
        const base = NOTE_POOL[currentIndex + offset];
        if (!base) continue;
        return {
          ...note,
          ...base,
          writtenAccidental: melodicAccidentalForLetter(key, base.letter),
        };
      }
      return note;
    }

    function canUseForMelodyVariant(bars, bar, note, noteIndex) {
      if (!note) return false;
      const isFirstNote = bar.barIndex === 0 && noteIndex === 0;
      const isFinalNote = bar.barIndex === bars.length - 1 && noteIndex === bar.notes.length - 1;
      return !note.rest && !note.tieToNext && !note.tiedFromPrevious && !isFirstNote && !isFinalNote;
    }

    function makeMelodyVariantCell(bars, candidates) {
      const cells = [];
      candidates.forEach(({ bar, noteIndex }) => {
        const cell = [{ bar, noteIndex }];
        let nextIndex = noteIndex + 1;
        while (cell.length < 3 && canUseForMelodyVariant(bars, bar, bar.notes[nextIndex], nextIndex)) {
          cell.push({ bar, noteIndex: nextIndex });
          nextIndex += 1;
        }
        if (cell.length >= 2) cells.push(cell);
      });
      return randomItem(cells) ?? null;
    }

    function reshapeMelodyVariantCell(cell, key) {
      if (!cell || cell.length < 2) return false;
      const first = cell[0].bar.notes[cell[0].noteIndex];
      const firstIndex = noteBaseIndex(first);
      if (firstIndex < 0) return false;
      const second = cell[1].bar.notes[cell[1].noteIndex];
      const originalDirection = Math.sign(noteBaseIndex(second) - firstIndex);
      const possibleDirections = [-1, 1].filter((direction) => {
        const endIndex = firstIndex + direction * (cell.length - 1);
        return endIndex >= 0 && endIndex < NOTE_POOL.length;
      });
      const oppositeDirection = originalDirection ? -originalDirection : 0;
      const direction = oppositeDirection && possibleDirections.includes(oppositeDirection) && Math.random() < 0.72
        ? oppositeDirection
        : randomItem(possibleDirections.length ? possibleDirections : [-1, 1]);
      let previousIndex = firstIndex;
      let changed = false;

      cell.slice(1).forEach(({ bar, noteIndex }, index) => {
        const current = bar.notes[noteIndex];
        const currentIndex = noteBaseIndex(current);
        const stepSize = index === 0 && Math.random() < 0.68 ? 2 : 1;
        const targetIndex = clamp(previousIndex + direction * stepSize, 0, NOTE_POOL.length - 1);
        const base = NOTE_POOL[targetIndex];
        if (!base) return;
        if (targetIndex !== currentIndex) changed = true;
        bar.notes[noteIndex] = {
          ...current,
          ...base,
          writtenAccidental: melodicAccidentalForLetter(key, base.letter),
        };
        previousIndex = targetIndex;
      });

      return changed;
    }

    function transposeMelodyVariantCell(cell, key) {
      if (!cell || cell.length < 2) return false;
      const intervals = [-2, -2, -2, 2, 2, -3, 3, -4, 4];
      const interval = randomItem(intervals);
      const replacements = [];

      for (const { bar, noteIndex } of cell) {
        const current = bar.notes[noteIndex];
        const currentIndex = noteBaseIndex(current);
        const targetIndex = currentIndex + interval;
        if (currentIndex < 0 || targetIndex < 0 || targetIndex >= NOTE_POOL.length) return false;
        replacements.push({ bar, noteIndex, current, base: NOTE_POOL[targetIndex] });
      }

      replacements.forEach(({ bar, noteIndex, current, base }) => {
        bar.notes[noteIndex] = {
          ...current,
          ...base,
          writtenAccidental: melodicAccidentalForLetter(key, base.letter),
        };
      });

      return true;
    }

    function makeMelodyVariantBars(correctBars, key, variantId) {
      const bars = cloneBarsForOption(correctBars, variantId);
      const candidates = [];
      bars.forEach((bar) => {
        bar.notes.forEach((note, noteIndex) => {
          if (canUseForMelodyVariant(bars, bar, note, noteIndex)) candidates.push({ bar, noteIndex });
        });
      });

      const used = new Set();
      const variantCell = Math.random() < 0.9 ? makeMelodyVariantCell(bars, candidates) : null;
      if (variantCell) {
        const transposed = Math.random() < 0.62 && transposeMelodyVariantCell(variantCell, key);
        const reshaped = !transposed && Math.random() < 0.82 && reshapeMelodyVariantCell(variantCell, key);
        if (!transposed && !reshaped) {
          const direction = randomItem([-1, 1]);
          variantCell.forEach(({ bar, noteIndex }) => {
            bar.notes[noteIndex] = mutateNotePitch(bar.notes[noteIndex], key, direction);
          });
        }
        variantCell.forEach(({ bar, noteIndex }) => used.add(`${bar.barIndex}:${noteIndex}`));
      }

      const targetChanges = Math.min(candidates.length, Math.random() < 0.5 ? 3 : 4);
      shuffleItems(candidates)
        .filter(({ bar, noteIndex }) => !used.has(`${bar.barIndex}:${noteIndex}`))
        .slice(0, Math.max(0, targetChanges - used.size))
        .forEach(({ bar, noteIndex }, index) => {
          const direction = index % 2 === 0 ? randomItem([-1, 1]) : 0;
          bar.notes[noteIndex] = mutateNotePitch(bar.notes[noteIndex], key, direction);
        });

      return bars;
    }

    function balanceRestOptions(options, key) {
      const restOptionCount = options.filter((option) => barsHaveRest(option.bars)).length;
      if (restOptionCount !== 1) return options;

      const source = options.find((option) => barsHaveRest(option.bars));
      const targetIndex = options.findIndex((option) => !option.correct && !barsHaveRest(option.bars));
      if (!source || targetIndex < 0) return options;

      const balancedBars = makeMelodyVariantBars(source.bars, key, `${options[targetIndex].id}-rest-balanced`);
      options[targetIndex] = { ...options[targetIndex], bars: balancedBars };
      return options;
    }

    function canTieAcrossBeat(first, second, timeSignature) {
      if (first?.rhythm !== "quaver") return false;
      if (!["crotchet", "minim", "dottedCrotchet"].includes(second?.rhythm)) return false;
      const beatUnit = timeSignature?.id === "6/8" ? 1.5 : 1;
      const tiePoint = first.beat + first.beats;
      const startsNextExactly = Math.abs(second.beat - tiePoint) < 0.001;
      const crossesBeatGroup = Math.abs(tiePoint / beatUnit - Math.round(tiePoint / beatUnit)) < 0.001;
      return startsNextExactly && crossesBeatGroup;
    }

    function addTieToAhBars(bars, key, timeSignature) {
      const candidates = [];
      bars.forEach((bar) => {
        bar.notes.forEach((note, noteIndex) => {
          const next = bar.notes[noteIndex + 1];
          if (note?.rest || next?.rest || !next) return;
          if (!canTieAcrossBeat(note, next, timeSignature)) return;
          candidates.push({ bar, noteIndex });
        });
      });
      if (!candidates.length) return bars;
      const { bar, noteIndex } = randomItem(candidates);
      const first = bar.notes[noteIndex];
      const second = bar.notes[noteIndex + 1];
      bar.notes[noteIndex] = { ...first, tieToNext: true };
      bar.notes[noteIndex + 1] = {
        ...second,
        ...NOTE_POOL[noteBaseIndex(first)],
        writtenAccidental: melodicAccidentalForLetter(key, first.letter),
        tiedFromPrevious: true,
      };
      return bars;
    }

    function barsSignature(bars) {
      return bars.map((bar) => bar.notes.map((note) => `${note.rest ? "R" : note.step}:${note.rhythm}:${note.tieToNext ? "tie" : ""}`).join(",")).join("|");
    }

    function makeIdentifyMelodyQuestion(level = "AH") {
      const useShortExtract = Math.random() < 0.28;
      const base = makeCompletionQuestion(level, 0, useShortExtract);
      const clef = Math.random() < 0.28 ? "bass" : "treble";
      const sourceBars = useShortExtract ? base.bars.slice(0, 2) : base.bars;
      const correctBars = cloneBarsForOption(sourceBars, "correct");
      if (Math.random() < 0.28) addTieToAhBars(correctBars, base.key, base.timeSignature);
      if (clef === "bass") {
        correctBars.forEach((bar) => {
          bar.notes = bar.notes.map((note) => {
            if (note.rest) return note;
            const lower = NOTE_POOL[clamp(noteBaseIndex(note) - 7, 0, NOTE_POOL.length - 1)];
            return { ...note, ...lower, writtenAccidental: melodicAccidentalForLetter(base.key, lower.letter) };
          });
        });
      }
      fitBarsToClefRange(correctBars, clef, base.key);
      const options = [{ id: "correct", bars: correctBars, correct: true }];
      const seen = new Set([barsSignature(correctBars)]);

      let attempts = 0;
      while (options.length < 3 && attempts < 40) {
        attempts += 1;
        const variantBars = makeMelodyVariantBars(correctBars, base.key, `variant-${options.length}-${attempts}`);
        fitBarsToClefRange(variantBars, clef, base.key);
        const signature = barsSignature(variantBars);
        if (seen.has(signature)) continue;
        seen.add(signature);
        options.push({ id: `variant-${options.length}`, bars: variantBars, correct: false });
      }

      while (options.length < 3) {
        const fallbackBars = makeMelodyVariantBars(correctBars, base.key, `fallback-${options.length}`);
        options.push({ id: `variant-${options.length}`, bars: fallbackBars, correct: false });
      }

      balanceRestOptions(options, base.key);
      const shuffledOptions = avoidCorrectOptionFirst(shuffleItems(options));
      return {
        ...base,
        questionType: "identifyMelody",
        clef,
        targetBar: null,
        bars: correctBars,
        options: shuffledOptions,
        selectedOptionIndex: null,
        answerIndex: shuffledOptions.findIndex((option) => option.correct),
        prompt: "Listen to the music and select the melody that matches what you hear.",
      };
    }

    function cleanAnswer(value) {
      return String(value ?? "")
        .trim()
        .toLowerCase()
        .replace(/[♯#]/g, " sharp")
        .replace(/[♭]/g, " flat")
        .replace(/[^a-z0-9]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function acceptedAnswers(...answers) {
      return answers.flatMap((answer) => {
        const clean = cleanAnswer(answer);
        return [clean, clean.replace(/\s+/g, "")].filter(Boolean);
      });

    function formatTextAnswer(value) {
      const text = String(value ?? "");

    function chordAnswerForQuestion(question, chordSymbol) {
      return CHORD_ANSWERS[question.key.id]?.[chordSymbol] ?? chordSymbol;

    function outlineChordInBar(question, barIndex) {
      const bar = question.bars[barIndex];
      const chordLetters = question.key.chords[bar?.chordSymbol] ?? [];
      if (!bar || chordLetters.length < 3) return question;
      const outlinedNotes = bar.notes.map((note, noteIndex) => {
        if (note.rest) return note;
        const letter = chordLetters[noteIndex % chordLetters.length];
        const base = noteByLetter(letter, 5 + noteIndex);
        const fitted = fitNoteToClefRange(base, question.clef ?? "treble", question.key);
        return {
          ...note,
          ...fitted,
          writtenAccidental: chordAccidentalForLetter(question.key, bar.chordSymbol, letter) ?? melodicAccidentalForLetter(question.key, letter),
        };
      });
      question.bars[barIndex] = { ...bar, notes: outlinedNotes };
      return question;
    }

    function chooseChordQuestionBar(question, usedQuestionBars = new Set()) {
      const finalBarIndex = question.bars.length - 1;
      const isAllowedChordQuestionBar = (bar) => PRACTICE_CHORD_ANSWERS.has(chordAnswerForQuestion(question, bar.chordSymbol));
      const canShowFullChord = (bar) => {
        const chordLetters = question.key.chords[bar?.chordSymbol] ?? [];
        const soundingNotes = (bar?.notes ?? []).filter((note) => !note.rest);
        return chordLetters.length >= 3 && soundingNotes.length >= 3;
      };
      const candidates = question.bars
        .filter((bar) => bar.barIndex !== question.targetBar && bar.barIndex !== finalBarIndex && !usedQuestionBars.has(bar.barIndex))
        .filter(isAllowedChordQuestionBar)
        .filter(canShowFullChord);
      return randomItem(candidates)?.barIndex ?? null;

    function choosePracticeCadenceId() {

        cadenceId = options.find((option) => option !== lastPracticeCadenceId);

      practiceCadenceRepeatCount = cadenceId === lastPracticeCadenceId ? practiceCadenceRepeatCount + 1 : 0;
      lastPracticeCadenceId = cadenceId;

      if (dynamic.id === "pp" || dynamic.id === "p" || dynamic.id === "mp") return { type: "diminuendo", barIndex: dynamicBar - 1 };

    function dynamicNameAnswers(dynamicId) {
      const answers = {

        p: { answer: "Quiet", accepts: acceptedAnswers("quiet", "soft", "quite", "gently") },
        mp: { answer: "Moderately quiet", accepts: acceptedAnswers("moderately quiet", "medium soft", "medium quiet", "moderate quiet", "moderately soft", "moderate soft", "kinda soft", "kinda quiet", "kinda quite", "moderately quite", "quite soft", "quite quiet") },
        mf: { answer: "Moderately loud", accepts: acceptedAnswers("moderately loud", "medium loud", "moderate loud", "kinda loud", "quite loud") },
        f: { answer: "Loud", accepts: acceptedAnswers("loud", "strong") },

    function dynamicAnswerIsAccepted(selectedId, answerId) {
      if (!selectedId || !answerId) return false;
      const quiet = ["pp", "p", "mp"];
      const loud = ["mf", "f", "ff"];
      if (quiet.includes(answerId)) return quiet.includes(selectedId);
      if (loud.includes(answerId)) return loud.includes(selectedId);
      return selectedId === answerId;
    }

    function noteNameAccidental(question, note) {
      if (!note || note.rest) return 0;
      if (note.writtenAccidental === 1 || note.writtenAccidental === -1) return note.writtenAccidental;
      return keyAccidentalForLetter(question.key, note.letter);
    }

    function noteAnswerAccepts(question, note) {
      const noteAccidental = noteNameAccidental(question, note);
      const accidental = noteAccidental === 1 ? ["sharp", "#"] : noteAccidental === -1 ? ["flat", "b"] : [""];
      const letter = note.letter;
      return accidental.flatMap((item) => item
        ? [`${letter} ${item}`, `${letter}${item}`]
        : [letter]
      );
    }

    function noteDisplayName(question, note) {
      const noteAccidental = noteNameAccidental(question, note);
      if (noteAccidental === 1) return `${note.letter} sharp`;
      if (noteAccidental === -1) return `${note.letter} flat`;
      return note.letter;
    }

    function chooseNoteIdentificationTarget(question, excludedBars = []) {
      const excluded = new Set(excludedBars);
      const candidates = question.bars
        .flatMap((bar) => (bar.notes ?? []).map((note, noteIndex) => ({ bar, note, noteIndex })))
        .filter(({ bar, note }) => bar.barIndex !== question.targetBar && !excluded.has(bar.barIndex) && !note.rest);
      if (candidates.length) return randomItem(candidates);
      const bar = question.bars.find((item) => item.barIndex !== question.targetBar && !excluded.has(item.barIndex) && item.notes?.some((note) => !note.rest)) ?? question.bars[0];
      const noteIndex = Math.max(0, bar.notes.findIndex((note) => !note.rest));
      const note = { ...bar.notes[noteIndex], ...noteByLetter("G", 5), writtenAccidental: 1 };
      bar.notes[noteIndex] = note;
      return { bar, note, noteIndex };
    }

    function isOctaveInterval(first, second) {
      return first.letter === second.letter && Math.abs(second.step - first.step) === 7;
    }

    function intervalTargetAllowedForType(first, second, intervalType) {
      if (intervalType !== "octave") return true;
      return first?.rhythm !== "quaver" && second?.rhythm !== "quaver";
    }

    function nearestPlacedNote(notes, startIndex, direction) {
      for (let noteIndex = startIndex; noteIndex >= 0 && noteIndex < notes.length; noteIndex += direction) {
        const note = notes[noteIndex];
        if (note && !note.rest) return note;
      }
      return null;
    }

    function intervalPitchPairScore(pair, bar, firstIndex, secondIndex) {
      const [firstPitch, secondPitch] = pair;
      const originalFirst = bar.notes[firstIndex];
      const originalSecond = bar.notes[secondIndex];
      const previousNote = nearestPlacedNote(bar.notes, firstIndex - 1, -1);
      const nextNote = nearestPlacedNote(bar.notes, secondIndex + 1, 1);
      let score = 0;

      if (originalFirst) score += Math.abs(firstPitch.step - originalFirst.step) * 2;
      if (originalSecond) score += Math.abs(secondPitch.step - originalSecond.step) * 2;
      if (previousNote) score += Math.abs(firstPitch.step - previousNote.step) * 3;
      if (nextNote) score += Math.abs(nextNote.step - secondPitch.step) * 3;
      if (Math.max(firstPitch.step, secondPitch.step) >= 9) score += 4;
      if (Math.min(firstPitch.step, secondPitch.step) <= -2) score += 2;
      return score;
    }

    function chooseSmoothIntervalPitchPair(pitchPairs, bar, firstIndex, secondIndex) {
      const scoredPairs = pitchPairs
        .map((pair) => ({ pair, score: intervalPitchPairScore(pair, bar, firstIndex, secondIndex) }))
        .sort((a, b) => a.score - b.score);
      const bestScore = scoredPairs[0]?.score ?? 0;
      const bestPairs = scoredPairs
        .filter((item) => item.score <= bestScore + 1)
        .map((item) => item.pair);
      return randomItem(bestPairs.length ? bestPairs : pitchPairs);
    }

    function intervalAnswerForTarget(question, target) {
      if (isOctaveInterval(target.first, target.second)) return { label: "Octave", feedback: "Octave", accepts: acceptedAnswers("octave", "octave leap", "8", "8ve", "8th") };
      const semitoneDistance = Math.abs(effectiveMidiForNote(question, target.bar, target.second) - effectiveMidiForNote(question, target.bar, target.first));
      const toneType = semitoneDistance === 1 ? "Semitone" : "Tone";
      return { label: toneType, feedback: `2nd or ${toneType.toLowerCase()}`, accepts: acceptedAnswers("2", "2nd", "second", toneType) };
    }

    function national3IntervalAnswerForTarget(target) {
      return Math.abs(target.second.step - target.first.step) <= 1 ? "Step" : "Leap";
    }

    function national3IntervalPitchPairs(type) {
      const allowed = NOTE_POOL.filter((note) => noteAllowedForLevel("N3", note));
      return allowed.flatMap((first) => allowed
        .filter((second) => {
          const distance = Math.abs(second.step - first.step);
          return type === "step" ? distance === 1 : distance >= 2 && distance <= 4;
        })
        .map((second) => [first, second]));
    }

    function intervalPitchPairsForType(type, level) {
      if (type === "octave") {
        return NOTE_POOL.flatMap((first) => {
          const second = NOTE_POOL.find((note) => note.letter === first.letter && note.step === first.step + 7);
          return second && noteAllowedForLevel(level, first) && noteAllowedForLevel(level, second)
            ? [[first, second], [second, first]]
            : [];
        });
      }
      return NOTE_POOL.flatMap((first) => NOTE_POOL
        .filter((second) => Math.abs(second.step - first.step) === 1 && noteAllowedForLevel(level, first) && noteAllowedForLevel(level, second))
        .map((second) => [first, second]));
    }

    function applyIntervalPitch(note, pitch, key, chordSymbol) {
      return {
        ...note,
        ...pitch,
        writtenAccidental: melodicAccidentalForLetter(key, pitch.letter) ?? chordAccidentalForLetter(key, chordSymbol, pitch.letter),
      };
    }

    function plantIntervalTarget(question, excludedBars = []) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const targets = question.bars.flatMap((bar) => {
        if (excluded.has(bar.barIndex)) return [];
        return (bar.notes ?? []).slice(0, -1).flatMap((note, noteIndex) => {
          const second = bar.notes[noteIndex + 1];
          return !note.rest && second && !second.rest
            ? [{ bar, firstIndex: noteIndex, secondIndex: noteIndex + 1 }]
            : [];
        });
      });
      if (!targets.length) return null;

      const preferredType = randomItem(["second", "octave"]);
      const intervalTypes = preferredType === "octave" ? ["octave", "second"] : ["second", "octave"];
      for (const intervalType of intervalTypes) {
        const pitchPairs = intervalPitchPairsForType(intervalType, question.level);
        if (!pitchPairs.length) continue;
        const allowedTargets = targets.filter(({ bar, firstIndex, secondIndex }) => intervalTargetAllowedForType(bar.notes[firstIndex], bar.notes[secondIndex], intervalType));
        if (!allowedTargets.length) continue;
        const target = randomItem(allowedTargets);
        const chordCompatiblePitchPairs = pitchPairs.filter(([firstPitch, secondPitch]) => (
          pitchFitsStrongBeatChord(question, target.bar, target.bar.notes[target.firstIndex], firstPitch)
          && pitchFitsStrongBeatChord(question, target.bar, target.bar.notes[target.secondIndex], secondPitch)
        ));
        if (!chordCompatiblePitchPairs.length) continue;
        const [firstPitch, secondPitch] = chooseSmoothIntervalPitchPair(chordCompatiblePitchPairs, target.bar, target.firstIndex, target.secondIndex);
        const first = applyIntervalPitch(target.bar.notes[target.firstIndex], firstPitch, question.key, target.bar.chordSymbol);
        const second = applyIntervalPitch(target.bar.notes[target.secondIndex], secondPitch, question.key, target.bar.chordSymbol);
        target.bar.notes[target.firstIndex] = first;
        target.bar.notes[target.secondIndex] = second;
        return {
          bar: target.bar,
          first,
          second,
          firstIndex: target.firstIndex,
          secondIndex: target.secondIndex,
        };
      }

      return null;
    }

    function plantNational3IntervalTarget(question, excludedBars = []) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const targets = question.bars.flatMap((bar) => {
        if (excluded.has(bar.barIndex)) return [];
        return (bar.notes ?? []).slice(0, -1).flatMap((note, noteIndex) => {
          const second = bar.notes[noteIndex + 1];
          return !note.rest && second && !second.rest
            ? [{ bar, firstIndex: noteIndex, secondIndex: noteIndex + 1 }]
            : [];
        });
      });

      const preferredType = randomItem(["step", "leap"]);
      const intervalTypes = [preferredType, ...["step", "leap"].filter((type) => type !== preferredType)];
      for (const intervalType of intervalTypes) {
        const pitchPairs = national3IntervalPitchPairs(intervalType);

        const target = randomItem(targets);
        if (!target) continue;
        const chordCompatiblePitchPairs = pitchPairs.filter(([firstPitch, secondPitch]) => (
          pitchFitsStrongBeatChord(question, target.bar, target.bar.notes[target.firstIndex], firstPitch)
          && pitchFitsStrongBeatChord(question, target.bar, target.bar.notes[target.secondIndex], secondPitch)
        ));
        if (!chordCompatiblePitchPairs.length) continue;
        const [firstPitch, secondPitch] = chooseSmoothIntervalPitchPair(chordCompatiblePitchPairs, target.bar, target.firstIndex, target.secondIndex);
        const first = applyIntervalPitch(target.bar.notes[target.firstIndex], firstPitch, question.key, target.bar.chordSymbol);
        const second = applyIntervalPitch(target.bar.notes[target.secondIndex], secondPitch, question.key, target.bar.chordSymbol);
        target.bar.notes[target.firstIndex] = first;
        target.bar.notes[target.secondIndex] = second;
        return {
          bar: target.bar,
          first,
          second,
          firstIndex: target.firstIndex,
          secondIndex: target.secondIndex,

      const fallbackBar = question.bars.find((bar) => !excluded.has(bar.barIndex) && bar.barIndex !== question.targetBar);
      const fallbackPairs = national3IntervalPitchPairs(preferredType);
      if (fallbackBar && fallbackPairs.length) {

          "3/4": ["crotchet", "crotchet", "crotchet"],
          "4/4": ["crotchet", "crotchet", "minim"],

        let beat = 0;
        fallbackBar.notes = pattern.map((rhythm, noteIndex) => {
          const pitch = noteIndex === 0 ? firstPitch : secondPitch;
          const note = makeNote(pitch, rhythm, fallbackBar.barIndex, noteIndex, beat, question.key, fallbackBar.chordSymbol);
          beat += rhythmInfo(rhythm).beats;
          return note;
        });
        fallbackBar.pattern = pattern;
        return {
          bar: fallbackBar,
          first: fallbackBar.notes[0],
          second: fallbackBar.notes[1],
          firstIndex: 0,
          secondIndex: 1,
        };
      }

      return null;
    }

    function plantLevelRhythmIdentificationTarget(question, level, excludedBars = []) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const allowedRhythms = allowedRhythmsForLevel(level);
      const candidates = question.bars
        .flatMap((bar) => (bar.notes ?? []).map((note, noteIndex) => ({ bar, note, noteIndex })))
        .filter(({ bar, note }) => !excluded.has(bar.barIndex) && bar.barIndex !== question.targetBar && !note.rest && allowedRhythms.has(note.rhythm));
      const questionStyle = randomItem(["beats", "name"]);
      const rhythmTypes = [...new Set(candidates.map(({ note }) => note.rhythm))];
      const targetRhythm = randomItem(rhythmTypes);
      const rhythmCandidates = candidates.filter(({ note }) => note.rhythm === targetRhythm);
      const target = randomItem(rhythmCandidates.length ? rhythmCandidates : candidates);
      if (!target) return null;
      return {

        barIndex: target.bar.barIndex,
        noteIndex: target.noteIndex,

    function plantNational3RhythmIdentificationTarget(question, excludedBars = []) {

    function isLedgerLineNote(note, clef = "treble") {
      const step = displayStep(note, clef);

    function chooseCircleNoteValueTarget(question, level, excludedBars = []) {
      const excluded = new Set([...excludedBars, question.bars.length - 1]);
      const allowedRhythms = allowedRhythmsForLevel(level);
      const candidates = question.bars
        .flatMap((bar) => (bar.notes ?? []).map((note, noteIndex) => ({ bar, note, noteIndex })))
        .filter(({ bar, note }) => !excluded.has(bar.barIndex) && bar.barIndex !== question.targetBar && !note.rest && allowedRhythms.has(note.rhythm));
      const preferredCandidates = level === "N4"
        ? candidates.filter(({ note }) => isLedgerLineNote(note, question.clef))
        : [];
      const target = randomItem(preferredCandidates.length ? preferredCandidates : candidates);
      if (!target) return null;
      return {

    function chooseNational3CircleNoteValueTarget(question, excludedBars = []) {

    function makePlacementAnswer(current, defaults = {}) {
      return typeof current === "object" && current !== null ? current : defaults;
    }

    function repeatPlaceKey(placement) {
      if (!placement) return "";
      return `${placement.symbolId}:${placement.barIndex}:${placement.anchor}`;
    }

    function repeatPlaybackBars(question) {
      if (question.questionType !== "practicePaper" || !question.repeatTarget) {
        return question.bars;
      }
      if (question.repeatTarget.symbolId === "repeat-pair") {
        const repeatedBars = (question.repeatTarget.repeatedBars ?? [])
          .map((barIndex) => question.bars[barIndex])
          .filter(Boolean);
        const startBarIndex = question.repeatTarget.placements?.find((placement) => placement.symbolId === "start-repeat")?.barIndex ?? 0;
        const endBarIndex = question.repeatTarget.placements?.find((placement) => placement.symbolId === "end-repeat")?.barIndex ?? question.bars.length - 1;
        const beforeRepeat = question.bars.filter((bar) => bar.barIndex < startBarIndex);
        const afterRepeat = question.bars.filter((bar) => bar.barIndex > endBarIndex);
        return [...beforeRepeat, ...repeatedBars, ...repeatedBars, ...afterRepeat];
      }
      if (question.repeatTarget.symbolId === "first-time") {
        const firstTimeStart = question.repeatTarget.barIndex;
        const firstPass = question.bars.filter((bar) => bar.barIndex <= 6);
        const repeatedLeadIn = question.bars.filter((bar) => bar.barIndex < firstTimeStart);
        const secondTimeBar = question.bars[7] ? [question.bars[7]] : [];
        return [...firstPass, ...repeatedLeadIn, ...secondTimeBar];
      }
      if (question.repeatTarget.symbolId === "start-repeat") {
        const repeatedBars = (question.repeatTarget.repeatedBars ?? [])
          .map((barIndex) => question.bars[barIndex])
          .filter(Boolean);
        if (!repeatedBars.length) return question.bars;
        return [...question.bars, ...repeatedBars];
      }
      if (question.repeatTarget.symbolId !== "end-repeat") return question.bars;

      const repeatedBars = (question.repeatTarget.repeatedBars ?? [])
        .map((barIndex) => question.bars[barIndex])
        .filter(Boolean);
      if (!repeatedBars.length) return question.bars;

      const endBarIndex = question.repeatTarget.barIndex;
      const beforeAndThroughRepeat = question.bars.filter((bar) => bar.barIndex <= endBarIndex);
      const afterRepeat = question.bars.filter((bar) => bar.barIndex > endBarIndex);
      return [...beforeAndThroughRepeat, ...repeatedBars, ...afterRepeat];
    }

    function combinations(items, size, start = 0, prefix = [], output = []) {
      if (prefix.length === size) {
        output.push(prefix);
        return output;
      }
      for (let index = start; index <= items.length - (size - prefix.length); index += 1) {
        combinations(items, size, index + 1, [...prefix, items[index]], output);
      }
      return output;
    }

    function hasQuestionTypeConflict(ids, level = null) {
      const idSet = new Set(ids);
      return QUESTION_TYPE_CONFLICT_PAIRS.some(([first, second]) => idSet.has(first) && idSet.has(second));
    }

    function practiceQuestionSelectionOptions(enabledQuestionTypes, level = "N5") {
      const enabledIds = practiceQuestionTypesForLevel(level)
        .filter((type) => enabledQuestionTypes[type.id])
        .map((type) => type.id);
      const audioIds = enabledIds.filter((id) => AUDIO_PRACTICE_QUESTION_TYPE_IDS.has(id));
      const nonAudioIds = enabledIds.filter((id) => !AUDIO_PRACTICE_QUESTION_TYPE_IDS.has(id));
      const minimumAudioQuestions = level === "N3" ? 2 : 3;
      const minimumNonAudioQuestions = PRACTICE_QUESTION_COUNT - minimumAudioQuestions;
      if (audioIds.length < minimumAudioQuestions || nonAudioIds.length < minimumNonAudioQuestions) return [];
      if (level === "N3") {
        return combinations(enabledIds, PRACTICE_QUESTION_COUNT)
          .filter((selection) => selection.filter((id) => AUDIO_PRACTICE_QUESTION_TYPE_IDS.has(id)).length >= minimumAudioQuestions)
          .filter((selection) => !hasQuestionTypeConflict(selection, level));
      }
      return combinations(audioIds, minimumAudioQuestions).flatMap((audioSelection) =>
        combinations(nonAudioIds, minimumNonAudioQuestions)
          .map((nonAudioSelection) => [...audioSelection, ...nonAudioSelection])
          .filter((selection) => !hasQuestionTypeConflict(selection, level))
      );
    }

    function customPracticeQuestionSelectionOptions(enabledQuestionTypes, level = "N5") {
      const enabledIds = practiceQuestionTypesForLevel(level)
        .filter((type) => enabledQuestionTypes[type.id])
        .map((type) => type.id);
      if (enabledIds.length < PRACTICE_QUESTION_COUNT) return [];
      const options = combinations(enabledIds, PRACTICE_QUESTION_COUNT);
      const conflictFreeOptions = options.filter((selection) => !hasQuestionTypeConflict(selection, level));
      return conflictFreeOptions.length ? conflictFreeOptions : options;
    }

    function hasConflictFreePracticeQuestionSelection(enabledQuestionTypes, level = "N5") {
      const enabledIds = practiceQuestionTypesForLevel(level)
        .filter((type) => enabledQuestionTypes[type.id])
        .map((type) => type.id);
      if (enabledIds.length < PRACTICE_QUESTION_COUNT) return false;
      return combinations(enabledIds, PRACTICE_QUESTION_COUNT).some((selection) => !hasQuestionTypeConflict(selection, level));
    }

    function canBuildPracticeQuestionSelection(enabledQuestionTypes, level = "N5") {
      return customPracticeQuestionSelectionOptions(enabledQuestionTypes, level).length > 0;
    }

    function selectedPracticeQuestionTypeIds(enabledQuestionTypes, level = "N5") {
      const balancedOptions = practiceQuestionSelectionOptions(enabledQuestionTypes, level);
      if (balancedOptions.length) return randomItem(balancedOptions);
      const options = customPracticeQuestionSelectionOptions(enabledQuestionTypes, level);
      if (options.length) return randomItem(options);
      return practiceQuestionSelectionOptions(defaultPracticeQuestionTypesForLevel(level), level)[0]
        ?? practiceQuestionTypesForLevel(level).slice(0, PRACTICE_QUESTION_COUNT).map((type) => type.id);
    }

    function chooseBarlineTarget(usedQuestionBars = new Set()) {
      const candidates = [4, 5, 6].filter((barIndex) => !usedQuestionBars.has(barIndex) && !usedQuestionBars.has(barIndex + 1));
      const barIndex = randomItem(candidates.length ? candidates : [4, 5, 6]);
      return { barIndex, slot: "end", type: "single", hiddenBarNumbers: [barIndex, barIndex + 1] };
    }

    function barlineQuestionBoundaryBars(target) {
      const windowBars = target?.hiddenBarNumbers ?? [target?.barIndex ?? 4];
      const firstBar = (windowBars[0] ?? 4) + 1;
      const lastBar = Math.min(BAR_COUNT, (windowBars.at(-1) ?? windowBars[0] ?? 4) + 1);
      return { firstBar, lastBar };
    }

    function barlineQuestionPromptText(target) {
      const { firstBar, lastBar } = barlineQuestionBoundaryBars(target);
      return `Insert the missing barline between bars ${firstBar} and ${lastBar}.`;
    }

    function makePracticePaperQuestion(level = "N5", attempt = 0, enabledQuestionTypes = DEFAULT_PRACTICE_QUESTION_TYPES) {
      const selectedSourceIds = new Set(selectedPracticeQuestionTypeIds(enabledQuestionTypes, level));
      if (hasQuestionTypeConflict([...selectedSourceIds], level) && hasConflictFreePracticeQuestionSelection(enabledQuestionTypes, level) && canRetryForLevel(level, attempt)) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      const needsMissing = selectedSourceIds.has("missing");
      const needsChord = selectedSourceIds.has("chord");
      const needsCadence = selectedSourceIds.has("cadence");
      const needsDynamic = selectedSourceIds.has("dynamic");
      const needsInterval = selectedSourceIds.has("interval");
      const needsNoteIdentification = selectedSourceIds.has("noteIdentification");
      const needsBarlines = selectedSourceIds.has("barlines");
      const needsRhythmicDictation = selectedSourceIds.has("rhythmicDictation");
      const needsRhythmIdentification = selectedSourceIds.has("rhythmIdentification");
      const needsTempoQuestion = selectedSourceIds.has("tempoQuestion");
      const needsRepeatSigns = selectedSourceIds.has("repeatSigns");
      const cadenceId = choosePracticeCadenceId();
      const question = makeEightBarRepetitionQuestion(level, 0, cadenceId, needsMissing);
      const finalBarIndex = question.bars.length - 1;
      const usedQuestionBars = new Set();
      const reserveQuestionBar = (barIndex) => {
        if (Number.isInteger(barIndex)) usedQuestionBars.add(barIndex);
      };
      const unusedQuestionBars = (barIndexes) => barIndexes.filter((barIndex) => !usedQuestionBars.has(barIndex));
      if (needsMissing) reserveQuestionBar(question.targetBar);
      if (needsMissing) reserveQuestionBar(question.missingSourceBar);
      if (needsCadence) [6, 7].forEach(reserveQuestionBar);

      const chordBar = needsChord ? chooseChordQuestionBar(question, usedQuestionBars) : null;
      if (needsChord && chordBar === null) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      if (needsChord) reserveQuestionBar(chordBar);
      if (needsChord) outlineChordInBar(question, chordBar);
      if (needsMissing && requiresExactMissingCopy(level, true)) syncMissingTargetWithSource(question);
      forceFirstNoteToTonic(question.bars, level, question.key);
      const barlineTargets = needsBarlines ? [chooseBarlineTarget(usedQuestionBars)] : [];
      const hiddenBarNumbers = needsBarlines ? barlineTargets.flatMap((target) => target.hiddenBarNumbers ?? []) : [];
      const displayHiddenBarNumbers = needsBarlines
        ? hiddenBarNumbers.filter((barIndex) => !barlineTargets.some((target) => (target.hiddenBarNumbers ?? [target.barIndex])[0] === barIndex))
        : [];
      if (needsBarlines) hiddenBarNumbers.forEach((barIndex) => reserveQuestionBar(barIndex));
      const dynamicQuestionType = needsDynamic
        ? level === "N3"
          ? randomItem(["marking", "dynamicName", "hairpinName"])
          : level === "N4"
            ? randomItem(["marking", "dynamicName", "hairpinName"])

            : "marking"
        : "marking";
      const hairpinDetails = dynamicQuestionType === "hairpinName" ? national3HairpinDynamicDetails(randomItem(["crescendo", "diminuendo"])) : null;
      const dynamicMeaningOptions = level === "N5" ? NATIONAL5_DYNAMIC_MEANING_OPTIONS : dynamicOptionsForLevel(level);
      const dynamic = needsDynamic ? hairpinDetails?.dynamic ?? randomItem(dynamicQuestionType === "dynamicName" ? dynamicMeaningOptions : dynamicOptionsForLevel(level)) : null;
      const dynamicNameAnswer = dynamicQuestionType === "dynamicName" ? dynamicNameAnswers(dynamic?.id) : null;
      const startingDynamic = dynamic ? hairpinDetails?.startingDynamic ?? choosePracticeStartingDynamic(dynamic, level) : null;
      const dynamicBarOptions = [2, 3, 4, 5, 6];
      const hairpinBarOptions = [2, 3, 4, 5];
      const dynamicBarCandidates = dynamicQuestionType === "hairpinName"
        ? hairpinBarOptions.filter((barIndex) => !usedQuestionBars.has(barIndex) && !usedQuestionBars.has(barIndex + 1))
        : unusedQuestionBars(dynamicBarOptions);
      const selectedDynamicBar = dynamic ? randomItem(dynamicBarCandidates.length ? dynamicBarCandidates : (dynamicQuestionType === "hairpinName" ? hairpinBarOptions : dynamicBarOptions)) : null;
      const dynamicBar = dynamicQuestionType === "hairpinName" && Number.isInteger(selectedDynamicBar) ? selectedDynamicBar + 1 : selectedDynamicBar;
      const dynamicHairpinBar = dynamicQuestionType === "hairpinName" ? selectedDynamicBar : null;
      if (needsDynamic) reserveQuestionBar(dynamicBar);

      const dynamicHairpin = dynamic

      const tempoQuestion = needsTempoQuestion ? TEMPO_TERMS[randomItem(tempoTermIdsForLevel(level))] : null;

      const repeatTargetOptions = [

        { symbolId: "start-repeat", barIndex: 6, anchor: "start", repeatedBars: [6, 7] },

      ];
      const national4RepeatTargets = [
        { startBarIndex: 0, endBarIndex: 3 },

      const repeatTargetFitsUsedBars = (target) => (target.placements ?? [target]).every((placement) => !usedQuestionBars.has(placement.barIndex));
      const unusedNational4RepeatTargets = national4RepeatTargets.filter(repeatTargetFitsUsedBars);
      const unusedRepeatTargetOptions = repeatTargetOptions.filter((target) => !usedQuestionBars.has(target.barIndex));
      const repeatTarget = needsRepeatSigns

      if (needsRepeatSigns) (repeatTarget.placements ?? [repeatTarget]).forEach((placement) => reserveQuestionBar(placement.barIndex));

      if (needsMissing) excludedBars.push(question.targetBar, question.missingSourceBar);
      if (needsChord) excludedBars.push(chordBar);

      if (needsMissing && requiresExactMissingCopy(level, true)) syncMissingTargetWithSource(question);
      forceFirstNoteToTonic(question.bars, level, question.key);
      const intervalTarget = needsInterval
        ? level === "N3" || level === "N4" ? plantNational3IntervalTarget(question, excludedBars) : plantIntervalTarget(question, excludedBars)

      if (needsInterval) ensureAminorHasGSharp(question, [...excludedBars, intervalTarget.bar.barIndex]);
      const intervalAnswer = intervalTarget ? intervalAnswerForTarget(question, intervalTarget) : null;
      const wantsNoteValueCircle = needsNoteIdentification && (level === "N3" || level === "N4") && Math.random() < 0.5;

      const noteTarget = needsNoteIdentification && !noteValueCircleTarget ? chooseNoteIdentificationTarget(question, [...usedQuestionBars]) : null;
      if (needsNoteIdentification && !noteValueCircleTarget && !noteTarget && canRetryForLevel(level, attempt)) return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      if (needsNoteIdentification) reserveQuestionBar(noteValueCircleTarget?.barIndex ?? noteTarget.bar.barIndex);
      const rhythmIdentificationTarget = needsRhythmIdentification
        ? level === "N3" || level === "N4" ? plantLevelRhythmIdentificationTarget(question, level, [...usedQuestionBars]) : plantRhythmIdentificationTarget(question, [...usedQuestionBars])
        : null;
      if (needsRhythmIdentification && !rhythmIdentificationTarget && canRetryForLevel(level, attempt)) return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      if (needsRhythmIdentification) reserveQuestionBar(rhythmIdentificationTarget.barIndex);
      const preferRhythmFix = needsRhythmicDictation && Math.random() < 0.5;
      const rhythmFixTarget = preferRhythmFix ? plantRhythmFixTarget(question, [...usedQuestionBars]) : null;
      if (rhythmFixTarget) reserveQuestionBar(rhythmFixTarget.barIndex);
      const rhythmCandidates = [0, 1, 2, 4, 5, 6].filter((barIndex) =>
        !usedQuestionBars.has(barIndex)
      );
      if (needsRhythmicDictation && !rhythmFixTarget && !rhythmCandidates.length && canRetryForLevel(level, attempt)) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      const rhythmTargetBar = needsRhythmicDictation && !rhythmFixTarget
        ? randomItem(rhythmCandidates.length ? rhythmCandidates : unusedQuestionBars([0, 1, 2, 4, 5, 6]))
        : null;
      if (Number.isInteger(rhythmTargetBar)) reserveQuestionBar(rhythmTargetBar);
      const barQuestionTargets = [
        ...(needsMissing ? [question.targetBar] : []),
        ...(needsChord ? [chordBar] : []),
        ...(needsCadence ? [6, 7] : []),
        ...(needsDynamic ? [dynamicBar] : []),
        ...(needsRepeatSigns ? (repeatTarget.placements ?? [repeatTarget]).map((placement) => placement.barIndex) : []),
        ...(needsRepeatSigns ? givenRepeatPlacements.map((placement) => placement.barIndex) : []),
        ...(needsBarlines ? hiddenBarNumbers : []),
        ...(needsInterval ? [intervalTarget.bar.barIndex] : []),
        ...(needsNoteIdentification ? [noteValueCircleTarget?.barIndex ?? noteTarget.bar.barIndex] : []),
        ...(needsRhythmIdentification ? [rhythmIdentificationTarget.barIndex] : []),
        ...(rhythmFixTarget ? [rhythmFixTarget.barIndex] : []),
        ...(Number.isInteger(rhythmTargetBar) ? [rhythmTargetBar] : []),
      ].filter((barIndex) => Number.isInteger(barIndex));
      if (new Set(barQuestionTargets).size !== barQuestionTargets.length && canRetryForLevel(level, attempt)) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      const rhythmTargetPattern = Number.isInteger(rhythmTargetBar) ? applyRhythmDictationPattern(question, rhythmTargetBar) : null;
      if (needsRhythmIdentification && level !== "N3" && level !== "N4") {
        plantDottedRhythmDistractors(
          question,
          [...usedQuestionBars, ...(needsMissing ? [question.missingSourceBar] : [])],
          rhythmIdentificationTarget.variant === "scotchSnap"
            ? ["reverseScotchSnap", "dottedCrotchet"]
            : ["reverseScotchSnap"]
        );
      }
      const chordRefitProtectedBars = [
        0,
        3,
        finalBarIndex,
        ...(level === "N5" ? [6, 7] : []),
        ...(needsChord ? [chordBar] : []),
        ...(needsCadence ? [6, 7] : []),
        ...(needsInterval && level !== "N3" && level !== "N4" ? [intervalTarget.bar.barIndex] : []),
      ];
      if (level !== "N3" && level !== "N4") refitQuestionChordsToMelody(question, chordRefitProtectedBars);
      if (needsMissing && requiresExactMissingCopy(level, true) && !targetMatchesSelectedSource(question) && canRetryForLevel(level, attempt)) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      if (needsMissing && level === "N4" && !targetIsOneStepSequenceFromPrevious(question) && canRetryForLevel(level, attempt)) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      if (!strongBeatsUseChordTones(question) && canRetryForLevel(level, attempt)) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      if ((level === "N5" || isHigherLevel(level)) && !melodyPassesQualityRules(question) && canRetryForLevel(level, attempt)) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      const protectedPitchBars = [
        0,
        finalBarIndex,
        ...(needsMissing ? [question.targetBar, question.missingSourceBar] : []),
        ...(needsChord ? [chordBar] : []),
        ...(needsCadence ? [6, 7] : []),
        ...(needsInterval ? [intervalTarget.bar.barIndex] : []),
        ...(needsNoteIdentification ? [noteValueCircleTarget?.barIndex ?? noteTarget.bar.barIndex] : []),
      ].filter((barIndex) => Number.isInteger(barIndex));
      ensureAminorHasGSharp(question, protectedPitchBars, false);
      if (question.key.id === "Am" && !hasVisibleGSharp(question, protectedPitchBars) && canRetryForLevel(level, attempt)) {
        return makePracticePaperQuestion(level, attempt + 1, enabledQuestionTypes);
      }
      const keyAnswer = KEY_ANSWERS[question.key.id] ?? KEY_ANSWERS.C;
      const timeAnswer = question.timeSignature.id;
      const chordAnswer = needsChord ? chordAnswerForQuestion(question, question.bars[chordBar].chordSymbol) : null;
      const rhythmIdentificationValueAnswer = needsRhythmIdentification && rhythmIdentificationTarget.variant === "dottedCrotchet"
        ? rhythmValueAcceptedAnswers(rhythmIdentificationTarget.targetRhythm ?? "dottedCrotchet")
        : null;
      const rhythmIdentificationNameAnswer = needsRhythmIdentification && rhythmIdentificationTarget.variant === "noteValue"
        ? rhythmNameAcceptedAnswers(rhythmIdentificationTarget.targetRhythm)
        : null;
      const rhythmIdentificationBeatAnswer = needsRhythmIdentification && rhythmIdentificationTarget.variant === "noteValue"
        ? rhythmBeatAcceptedAnswers(rhythmIdentificationTarget.targetRhythm)
        : null;
      const baseSubquestions = [
        {
          id: "key",
          sourceId: "key",
          prompt: "Name the key of this excerpt.",
          answer: keyAnswer.label,
          accepts: keyAnswer.accepted,
          type: "text",
        },
        {

          sourceId: "time",
          prompt: "Identify the time signature.",
          answer: timeAnswer,
          options: TIME_SIGNATURES.filter((signature) => ["2/4", "3/4", "4/4"].includes(signature.id)),
          type: "timeChoice",
        },
        {
          id: "missing",
          sourceId: "missing",
          prompt: `Insert the missing notes in bar ${question.targetBar + 1}.`,
          answer: "Missing notes completed correctly",
          type: "notes",
        },
        ...(needsChord ? [{
          id: "chord",
          sourceId: "chord",
          prompt: `Name the chord outlined in bar ${chordBar + 1}.`,
          answer: chordAnswer,
          accepts: acceptedAnswers(chordAnswer, chordAnswer.replace(" major", ""), chordAnswer.replace(" minor", "m")),
          type: "text",
        }] : []),
        {
          id: "cadence",
          sourceId: "cadence",
          prompt: "Name the cadence at the end of the excerpt.",
          answer: cadenceId === "perfect" ? "Perfect" : "Imperfect",
          accepts: acceptedAnswers(cadenceId, `${cadenceId} cadence`),
          type: "text",
        },
        ...(needsDynamic ? [{
          id: "dynamic",
          sourceId: "dynamic",
          prompt: dynamicQuestionType === "hairpinName"
            ? `The piece gradually gets ${hairpinDetails.promptVerb} in bar ${dynamicHairpinBar + 1}. Identify the name of the symbol used.`
            : dynamicQuestionType === "dynamicName"
              ? `Describe the meaning of the dynamic marking shown below bar ${dynamicBar + 1}.`
            : `Identify the appropriate dynamic marking that should be inserted below bar ${dynamicBar + 1}.`,
          answer: dynamicQuestionType === "hairpinName" ? hairpinDetails.answer : dynamicQuestionType === "dynamicName" ? dynamicNameAnswer.answer : dynamic.label,
          accepts: dynamicQuestionType === "hairpinName" ? hairpinDetails.accepts : dynamicQuestionType === "dynamicName" ? dynamicNameAnswer.accepts : null,
          options: dynamicQuestionType === "marking" ? dynamicOptionsForLevel(level) : null,
          type: dynamicQuestionType === "marking" ? "dynamic" : "text",
        }] : []),
        ...(needsInterval ? [{
          id: "interval",
          sourceId: "interval",
          prompt: `Name the interval between the two notes in bar ${intervalTarget.bar.barIndex + 1}.`,
          answer: level === "N3" || level === "N4" ? national3IntervalAnswerForTarget(intervalTarget) : intervalAnswer.label,
          feedbackAnswer: level === "N3" || level === "N4" ? national3IntervalAnswerForTarget(intervalTarget) : intervalAnswer.feedback,
          accepts: level === "N3" || level === "N4" ? acceptedAnswers(national3IntervalAnswerForTarget(intervalTarget)) : intervalAnswer.accepts,
          options: level === "N3" || level === "N4" ? ["Step", "Leap"] : null,

        }] : []),
        ...(needsNoteIdentification && noteTarget ? [{

        }] : []),

        ...(needsBarlines ? [{
