      let fillIndex = 0;
      while (selectedSubquestions.length < 6) {
        selectedSubquestions.push({ ...fallbackFillSubquestions[fillIndex % fallbackFillSubquestions.length] });
        fillIndex += 1;
      }

      const noteQuestionBeat = (barIndex, noteIndex) => question.bars[barIndex]?.notes?.[noteIndex]?.beat ?? 0;
      const subquestionMusicOrder = (part, fallbackIndex) => {
        const sourceId = part.sourceId ?? part.id;
        if (sourceId === "key") return -0.3;
        if (sourceId === "time") return -0.2;
        if (sourceId === "tempoQuestion") return -0.1;
        if (sourceId === "missing" && level === "N4") return -0.4;
        if (sourceId === "missing") return question.targetBar + 0.05;
        if (sourceId === "chord") return chordBar + 0.2;
        if (sourceId === "cadence") return 6.75;
        if (sourceId === "dynamic") return (dynamicQuestionType === "hairpinName" ? dynamicHairpinBar : dynamicBar) + 0.45;
        if (sourceId === "interval") return intervalTarget.bar.barIndex + noteQuestionBeat(intervalTarget.bar.barIndex, intervalTarget.firstIndex) / 10;
        if (sourceId === "noteIdentification") {
          const target = noteValueCircleTarget ?? { barIndex: noteTarget.bar.barIndex, noteIndex: noteTarget.noteIndex };
          return target.barIndex + noteQuestionBeat(target.barIndex, target.noteIndex) / 10;
        }
        if (sourceId === "barlines") return (barlineTargets[0]?.barIndex ?? 4) + 0.95;
        if (sourceId === "rhythmicDictation") return (rhythmFixTarget?.barIndex ?? rhythmTargetBar) + 0.05;
        if (sourceId === "rhythmIdentification") {
          const target = rhythmIdentificationTarget;
          const targetNoteIndex = target.noteIndex ?? target.startIndex ?? target.noteIndices?.[0] ?? 0;
          return target.barIndex + noteQuestionBeat(target.barIndex, targetNoteIndex) / 10;
        }
        if (sourceId === "repeatSigns") {
          if (repeatTarget.symbolId === "repeat-pair") return 4.45;
          const anchorOffset = repeatTarget.anchor === "end" ? 0.95 : repeatTarget.anchor === "above" ? 0.25 : 0;
          return repeatTarget.barIndex + anchorOffset;
        }
        return 99 + fallbackIndex / 100;
      };
      const orderedSubquestions = selectedSubquestions
        .slice(0, 6)
        .map((part, index) => ({ part, index }))
        .sort((first, second) => {
          const orderDifference = subquestionMusicOrder(first.part, first.index) - subquestionMusicOrder(second.part, second.index);
          return orderDifference || first.index - second.index;
        })
        .map(({ part }) => part);
      const scotchSnapIndex = orderedSubquestions.findIndex((part) => part.type === "scotchSnap");
      const finalSubquestionOrder = [...orderedSubquestions];
      if (scotchSnapIndex >= 0) {
        const [scotchSnapQuestion] = finalSubquestionOrder.splice(scotchSnapIndex, 1);
        finalSubquestionOrder.splice(Math.floor(Math.random() * 6), 0, scotchSnapQuestion);
      }
      const subquestions = finalSubquestionOrder.map((part, index) => ({
        ...part,
        id: index === 0 || !finalSubquestionOrder.slice(0, index).some((previous) => previous.sourceId === part.sourceId) ? part.sourceId : `${part.sourceId}-${index}`,
        label: String.fromCharCode(97 + index),
      }));

      return {
        ...question,
        level,
        questionType: "practicePaper",
        cadenceId,
        cadenceAnswer: cadenceId === "perfect" ? "Perfect cadence" : "Imperfect cadence",
        chordBar,
        dynamicBar,
        dynamicQuestionType,
        dynamic,
        startingDynamic,
        dynamicHairpin,
        tempoQuestion,
        tempoBpm,
        accompanimentPattern,
        intervalTarget: intervalTarget ? {
          barIndex: intervalTarget.bar.barIndex,
          firstIndex: intervalTarget.firstIndex,
          secondIndex: intervalTarget.secondIndex,
        } : null,
        noteTarget: noteTarget ? {
          barIndex: noteTarget.bar.barIndex,
          noteIndex: noteTarget.noteIndex,
        } : null,
        noteValueCircleTarget,
        repeatTarget,
        givenRepeatPlacements,
        barlineTargets,
        hiddenBarNumbers: displayHiddenBarNumbers,
        rhythmTargetBar,
        rhythmTargetPattern,
        rhythmFixTarget,
        rhythmIdentificationTarget,
        answerTargets: {
          key: "a",
          time: "b",
          missing: "c",
          chord: "d",
          cadence: "e",
          dynamic: "f",
        },
        subquestions,
      };
    }

    function makeQuestion(level = "N5", attempt = 0, enabledQuestionTypes = DEFAULT_PRACTICE_QUESTION_TYPES) {
      if (level === "N3") return makePracticePaperQuestion(level, 0, enabledQuestionTypes);
      if (level === "N4") return makePracticePaperQuestion(level, 0, enabledQuestionTypes);
      if (level === "N5") return makePracticePaperQuestion(level, 0, enabledQuestionTypes);
      if (level === "AH") return makeIdentifyMelodyQuestion(level);
      if ((level === "N3" || level === "N4" || level === "N5") && Math.random() < 0.5) {
        return makeEightBarRepetitionQuestion(level);
      }
      return makeCompletionQuestion(level, attempt);
    }

    function barStart(barIndex, displayBarCount = BARS_PER_SYSTEM) {
      const topSystem = barIndex < 4;
      const musicStart = topSystem ? STAFF.left + 122 : STAFF.left + 74;
      const width = (STAFF.right - musicStart) / displayBarCount;
      return musicStart + (barIndex % BARS_PER_SYSTEM) * width;
    }

    function barWidth(barIndex, displayBarCount = BARS_PER_SYSTEM) {
      const musicStart = barIndex < 4 ? STAFF.left + 122 : STAFF.left + 74;
      return (STAFF.right - musicStart) / displayBarCount;
    }

    function systemTop(barIndex) {
      return barIndex < 4 ? STAFF.topA : STAFF.topB;
    }

    function positionSpacingForNote(notes, index) {
      const rhythm = notes[index]?.rhythm;
      const previousRhythm = notes[index - 1]?.rhythm;
      const nextRhythm = notes[index + 1]?.rhythm;
      const pairsWithDottedQuaver = (rhythm === "dottedQuaver" && (previousRhythm === "semiquaver" || nextRhythm === "semiquaver"))
        || (rhythm === "semiquaver" && (previousRhythm === "dottedQuaver" || nextRhythm === "dottedQuaver"));
      return pairsWithDottedQuaver ? rhythmInfo("quaver").spacing : rhythmInfo(rhythm).spacing;
    }

    function barPositions(bar, displayBarCount = BARS_PER_SYSTEM) {
      const start = barStart(bar.barIndex, displayBarCount);
      const end = start + barWidth(bar.barIndex, displayBarCount);
      const scoreStart = start + (bar.barIndex === 0 ? 4 : 15);
      const scoreEnd = bar.barIndex === (bar.totalBars ?? BAR_COUNT) - 1 ? end - 24 : end - 4;
      const units = bar.notes.reduce((sum, _, index) => sum + positionSpacingForNote(bar.notes, index), 0);
      const unit = Math.max(1, scoreEnd - scoreStart) / Math.max(1, units);
      let cursor = scoreStart + unit * 0.38;
      return bar.notes.map((_, index) => {
        const x = cursor;
        cursor += positionSpacingForNote(bar.notes, index) * unit;
        return x;
      });
    }

    function barlinePlacementId(placement) {
      return `${placement.barIndex}:${placement.slot ?? "end"}:${Math.round(placement.x ?? 0)}`;
    }

    function isBeamableRhythm(rhythm) {
      return rhythm === "quaver" || rhythm === "dottedQuaver" || rhythm === "semiquaver";
    }

    function displayRhythmForNote(note) {
      return note?.displayRhythm ?? note?.rhythm;
    }

    function getQuaverGroups(notes, timeSignature = null) {
      const groups = [];
      let index = 0;
      while (index < notes.length) {
        if (!isBeamableRhythm(displayRhythmForNote(notes[index]))) {
          index += 1;
          continue;
        }
        const start = index;
        while (isBeamableRhythm(displayRhythmForNote(notes[index + 1]))) {
          if (timeSignature?.id === "6/8") {
            const currentGroup = Math.floor((notes[index].beat + 0.001) / 1.5);
            const nextGroup = Math.floor((notes[index + 1].beat + 0.001) / 1.5);
            if (currentGroup !== nextGroup) break;
          }
          index += 1;
        }
        let groupStart = start;
        while (groupStart <= index) {
          const remaining = index - groupStart + 1;
          const groupSize = remaining === 5 ? 3 : remaining >= 4 ? 4 : remaining;
          const groupEnd = groupStart + groupSize - 1;
          if (groupEnd > groupStart) groups.push({ start: groupStart, end: groupEnd });
          groupStart = groupEnd + 1;
        }
        index += 1;
      }
      return groups;
    }

    function groupContaining(groups, index) {
      return groups.find((group) => index >= group.start && index <= group.end) ?? null;
    }

    function secondaryBeamSegments(groupNotes) {
      const segments = [];
      let segmentStart = null;
      groupNotes.forEach((note, index) => {
        const isSemiquaver = note?.rhythm === "semiquaver";
        const nextIsSemiquaver = groupNotes[index + 1]?.rhythm === "semiquaver";
        if (isSemiquaver && segmentStart === null) segmentStart = index;
        if (segmentStart !== null && (!nextIsSemiquaver || index === groupNotes.length - 1)) {
          segments.push({ startIndex: segmentStart, endIndex: index, isHook: index === segmentStart });
          segmentStart = null;
        }
      });
      return segments;
    }

    function getStem(x, y, step, down, forcedEndY = null, visualScale = 1) {
      const stemLength = STAFF.gap * 3.1 * visualScale;
      const stemXOffset = STAFF.gap * 0.6 * visualScale;
      return {
        down,
        stemX: x + (down ? -stemXOffset : stemXOffset),
        startY: y + (down ? 0.5 : -0.5),
        endY: forcedEndY ?? (down ? y + stemLength : y - stemLength),
      };
    }

    function groupHasDownStems(notes, clef = "treble") {
      let down = 0;
      let up = 0;
      notes.forEach((note) => stemDown(displayStep(note, clef)) ? down += 1 : up += 1);
      return down > up;
    }

    function getBeam(notes, positions, top, forcedDown = null, clef = "treble", visualScale = 1) {
      const down = forcedDown ?? groupHasDownStems(notes, clef);
      const settings = sharedSymbolConfig("quaverBeam");
      const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0);
      const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0);
      const stemLength = STAFF.gap * 3.1 * Number(settings.heightScale || 1) * visualScale;
      const firstStep = displayStep(notes[0], clef);
      const lastStep = displayStep(notes.at(-1), clef);
      const firstY = yForStep(firstStep, top);
      const lastY = yForStep(lastStep, top);
      const firstStem = getStem(positions[0] + xOffset, firstY + yOffset, firstStep, down, down ? firstY + yOffset + stemLength : firstY + yOffset - stemLength, visualScale);
      const lastStem = getStem(positions.at(-1) + xOffset, lastY + yOffset, lastStep, down, down ? lastY + yOffset + stemLength : lastY + yOffset - stemLength, visualScale);
      let startY = firstStem.endY;
      let endY = lastStem.endY;
      const beamPoints = notes.map((note, index) => ({
        x: positions[index],
        y: yForStep(displayStep(note, clef), top),
      }));

      if (notes.length > 2 && notes.some((note) => note.rhythm === "semiquaver")) {
        const steps = beamPoints.map((point) => point.y);
        const spread = Math.max(...steps) - Math.min(...steps);

        if (spread >= STAFF.gap * 0.75) {
          const xMean = beamPoints.reduce((sum, point) => sum + point.x, 0) / beamPoints.length;
          const yMean = beamPoints.reduce((sum, point) => sum + point.y, 0) / beamPoints.length;
          const xVariance = beamPoints.reduce((sum, point) => sum + ((point.x - xMean) ** 2), 0);
          const covariance = beamPoints.reduce((sum, point) => sum + ((point.x - xMean) * (point.y - yMean)), 0);
          let slope = xVariance ? covariance / xVariance : 0;
          const maxSlope = 0.11;
          slope = clamp(slope, -maxSlope, maxSlope);

          if (Math.abs(slope) < 0.035) {
            const firstNoteY = beamPoints[0].y;
            const lastNoteY = beamPoints.at(-1).y;
            slope = lastNoteY <= firstNoteY ? -0.045 : 0.045;
          }

          const centreX = (firstStem.stemX + lastStem.stemX) / 2;
          const centreY = (firstStem.endY + lastStem.endY) / 2;
          startY = centreY + slope * (firstStem.stemX - centreX);
          endY = centreY + slope * (lastStem.stemX - centreX);
        }
      }

      const minStemLength = STAFF.gap * 2.45 * visualScale;
      let beamShift = 0;
      beamPoints.forEach((point, index) => {
        const noteStep = displayStep(notes[index], clef);
        const stemX = getStem(positions[index], point.y, noteStep, down, null, visualScale).stemX;
        const projectedY = startY + ((stemX - firstStem.stemX) / ((lastStem.stemX - firstStem.stemX) || 1)) * (endY - startY);
        if (down) {
          beamShift = Math.max(beamShift, (point.y + minStemLength) - projectedY);
        } else {
          beamShift = Math.min(beamShift, (point.y - minStemLength) - projectedY);
        }
      });
      startY += beamShift;
      endY += beamShift;

      return {
        down,
        start: { x: firstStem.stemX, y: startY },
        end: { x: lastStem.stemX, y: endY },
      };
    }

    function beamYAtX(x, beam) {
      const progress = (x - beam.start.x) / (beam.end.x - beam.start.x || 1);
      return beam.start.y + progress * (beam.end.y - beam.start.y);
    }

    function secondaryBeamForSegment(beam, segment, groupNotes, groupPositions, top, clef, visualScale = 1) {
      const secondaryOffset = (beam.down ? -STAFF.gap * 0.85 : STAFF.gap * 0.85) * visualScale;
      const hookLength = (STAFF.gap * 0.9 + 2) * visualScale;
      function stemXFor(index) {
        const noteStep = displayStep(groupNotes[index], clef);
        const y = yForStep(noteStep, top);
        return getStem(groupPositions[index], y, noteStep, beam.down, null, visualScale).stemX;
      }
      const x1 = stemXFor(segment.startIndex);
      const x2 = segment.isHook
        ? x1 + (segment.startIndex > 0 ? -hookLength : hookLength)
        : stemXFor(segment.endIndex);
      return {
        down: beam.down,
        start: { x: x1, y: beamYAtX(x1, beam) + secondaryOffset },
        end: { x: x2, y: beamYAtX(x2, beam) + secondaryOffset },
      };
    }

    function beamPolygonPoints(x1, y1, x2, y2, thickness) {
      const halfThickness = thickness / 2;
      return [`${x1},${y1 - halfThickness}`, `${x2},${y2 - halfThickness}`, `${x2},${y2 + halfThickness}`, `${x1},${y1 + halfThickness}`].join(" ");
    }

    function BeamShape({ beam, colour = "currentColor", opacity = 1, visualScale = 1 }) {
      const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.beamThicknessScale || 0.42) * visualScale);
      return <polygon points={beamPolygonPoints(beam.start.x - 0.5, beam.start.y, beam.end.x + 0.5, beam.end.y, thickness)} fill={colour} opacity={opacity} />;
    }

    function TieShape({ firstNote, secondNote, firstX, secondX, top, clef = "treble", colour = "currentColor" }) {
      if (!firstNote || !secondNote) return null;
      const firstStep = displayStep(firstNote, clef);
      const secondStep = displayStep(secondNote, clef);
      const firstY = yForStep(firstStep, top);
      const secondY = yForStep(secondStep, top);
      const averageStep = (firstStep + secondStep) / 2;
      const tieAbove = stemDown(averageStep);
      const leftX = Math.min(firstX, secondX) + STAFF.gap * 0.08;
      const rightX = Math.max(firstX, secondX) - STAFF.gap * 0.08;
      const width = Math.max(STAFF.gap * 1.4, rightX - leftX);
      const baseY = (firstY + secondY) / 2 + (tieAbove ? -STAFF.gap * 1.0 : STAFF.gap * 1.0);
      const archDepth = clamp(width * 0.12, STAFF.gap * 0.55, STAFF.gap * 1.45);
      const thickness = Math.max(1.6, STAFF.gap * 0.22);
      const outerY = baseY + (tieAbove ? -archDepth : archDepth);
      const innerY = outerY + (tieAbove ? thickness : -thickness);
      const path = [
        `M ${leftX} ${baseY}`,
        `C ${leftX + width * 0.22} ${outerY}, ${rightX - width * 0.22} ${outerY}, ${rightX} ${baseY}`,
        `C ${rightX - width * 0.22} ${innerY}, ${leftX + width * 0.22} ${innerY}, ${leftX} ${baseY}`,
        "Z",
      ].join(" ");
      return <path d={path} fill={colour} transform={`translate(0 ${tieAbove ? -1 : 1})`} pointerEvents="none" />;
    }

    function LedgerLines({ x, step, top, colour = "currentColor", opacity = 1 }) {
      const ledgerSteps = [];
      for (let ledgerStep = -2; ledgerStep >= step; ledgerStep -= 2) ledgerSteps.push(ledgerStep);
      for (let ledgerStep = 10; ledgerStep <= step; ledgerStep += 2) ledgerSteps.push(ledgerStep);
      const settings = sharedSymbolConfig("ledgerLines");
      const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
      const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
      const halfWidth = (STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4) * Number(settings.widthScale || 1)) / 2;
      const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11) * Number(settings.heightScale || 1));
      return <g>{ledgerSteps.map((ledgerStep) => <line key={ledgerStep} x1={x - halfWidth + xOffset} x2={x + halfWidth + xOffset} y1={yForStep(ledgerStep, top) + yOffset} y2={yForStep(ledgerStep, top) + yOffset} stroke={colour} strokeWidth={thickness} strokeLinecap="butt" opacity={opacity} />)}</g>;
    }

        function Accidental({ value, x, y, colour = "currentColor", visualScale = 1, letter = null }) {
            if (!value) return null;
            const sharpOffsetX = value === 1 ? (letter === "G" ? -4 : -2) : 0;
            const symbolKey = value === 1 ? "sharpInScore" : "flatInScore";
            return <CalibratedSymbol symbolKey={symbolKey} x={x + sharpOffsetX} y={y} colour={colour} settingOverrides={scaledSymbolOverrides(symbolKey, visualScale)} />;
        }

    function Note({ note, x, top, colour = "currentColor", opacity = 1, active = false, faint = false, showFlag = true, forcedDown = null, forcedEndY = null, scale = 1, visualScale = 1, clef = "treble" }) {
      if (!note) return null;
      const step = displayStep(note, clef);
      const y = note.rest ? yForStep(4, top) : yForStep(step, top);
      const down = forcedDown ?? stemDown(step);
      const visualRhythm = note.displayRhythm ?? note.rhythm;
      const beamed = isBeamableRhythm(visualRhythm) && !showFlag;
      const stem = getStem(x, y, step, down, forcedEndY, visualScale);
      const dotKey = step % 2 === 0 ? "augmentationDotLine" : "augmentationDotSpace";
      const dotY = step % 2 === 0 ? y - STAFF.gap * 0.25 : y;
      const noteColour = active ? COLOUR.blue : colour;
      const stemThickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12) * visualScale);
      const symbolKey = noteSymbolKey(visualRhythm, down, beamed);
      return (
        <g pointerEvents="none" opacity={faint ? 0.32 : opacity} transform={scale !== 1 ? `translate(${x} ${y}) scale(${scale}) translate(${-x} ${-y})` : undefined}>
          {!note.rest && <LedgerLines x={x} step={step} top={top} colour={noteColour} />}
          <Accidental value={note.writtenAccidental} x={x - STAFF.gap * 1.75 * visualScale} y={y} colour={noteColour} visualScale={visualScale} letter={note.letter} />
          <CalibratedSymbol symbolKey={symbolKey} x={x} y={y} colour={noteColour} settingOverrides={scaledSymbolOverrides(symbolKey, visualScale)} />
          {(visualRhythm === "dottedMinim" || visualRhythm === "dottedCrotchet" || visualRhythm === "dottedQuaver") && <CalibratedSymbol symbolKey={dotKey} x={x + STAFF.gap * 1.3 * visualScale} y={dotY} colour={noteColour} settingOverrides={scaledSymbolOverrides(dotKey, visualScale)} />}
          {beamed && <line x1={stem.stemX} x2={stem.stemX} y1={stem.startY} y2={stem.endY} stroke={noteColour} strokeWidth={stemThickness} />}
        </g>
      );
    }

    function Staff({ top, systemIndex, question, displayBarCount = BARS_PER_SYSTEM, colour = "currentColor", showTimeSignature = false }) {
      const finalBar = Math.min(systemIndex * BARS_PER_SYSTEM + BARS_PER_SYSTEM - 1, question.bars.length - 1);
      const staffEnd = barStart(finalBar, displayBarCount) + barWidth(finalBar, displayBarCount);
      const clef = question.clef ?? "treble";
      const shouldShowTimeSignature = showTimeSignature || question.questionType !== "practicePaper";
      return (
        <g>
          {[0, 1, 2, 3, 4].map((line) => <line key={line} x1={STAFF.left} x2={staffEnd} y1={top + line * STAFF.gap} y2={top + line * STAFF.gap} stroke="currentColor" strokeWidth="1.25" />)}
          <CalibratedSymbol symbolKey={clef === "bass" ? "fClef" : "gClef"} x={STAFF.left + 32} y={clef === "bass" ? yForStep(6, top) : yForStep(2, top)} colour={colour} />
          <KeySignature keySignature={question.key} top={top} clef={clef} colour={colour} />
          {systemIndex === 0 && shouldShowTimeSignature && <TimeSignature signature={question.timeSignature} top={top} colour={colour} />}
        </g>
      );
    }

    function KeySignature({ keySignature, top, clef = "treble", colour = "currentColor" }) {
      return <g>{keySignature.signature.map((item, index) => {
        const clefStep = clef === "bass" ? item.step - 2 : item.step;
        return <CalibratedSymbol key={`${item.type}-${index}`} symbolKey={item.type === "sharp" ? "sharpKeySignature" : "flatKeySignature"} x={STAFF.left + 54 + index * KEY_SIGNATURE_SPACING} y={yForStep(clefStep, top)} colour={colour} />;
      })}</g>;
    }

    function TimeSignature({ signature, top, colour = "currentColor" }) {
      const key = `timeSig${signature.top}${signature.bottom}`;
      const settings = sharedSymbolConfig(key);
      const topGlyph = sharedSymbolForKey(`timeSig${signature.top}`);
      const bottomGlyph = sharedSymbolForKey(`timeSig${signature.bottom}`);
      const x = calibrationAnchorX(key) + STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
      const y = calibrationAnchorY(key, top) + STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
      const fontSize = STAFF.gap * Number(settings.fontSizeScale || 3.4);
      return <g pointerEvents="none"><text className="music-symbol" x={x} y={y - fontSize * 0.14} fill={colour} fontSize={fontSize} textAnchor="middle">{topGlyph}</text><text className="music-symbol" x={x} y={y + fontSize * 0.43} fill={colour} fontSize={fontSize} textAnchor="middle">{bottomGlyph}</text></g>;
    }

    function BarNotes({ bar, notes, positions, top, colour = "currentColor", feedback = null, hidden = false, activeNoteId = null, forceStemUp = false, timeSignature = null, clef = "treble", visualScale = 1 }) {
      const groups = getQuaverGroups(hidden ? bar.notes : notes, timeSignature);
      const shownAccidentals = new Set();
      return (
        <g>
          {notes.map((note, index) => {
            if (!note) return null;
            const accidentalKey = `${note.letter}:${note.writtenAccidental}`;
            const showAccidental = Boolean(note.writtenAccidental) && !shownAccidentals.has(accidentalKey);
            if (note.writtenAccidental) shownAccidentals.add(accidentalKey);
            const displayNote = showAccidental ? note : { ...note, writtenAccidental: null };
            const group = groupContaining(groups, index);
            const groupNotes = group ? notes.slice(group.start, group.end + 1) : [];
            const groupPositions = group ? positions.slice(group.start, group.end + 1) : [];
            const beam = group && groupNotes.every(Boolean) ? getBeam(groupNotes, groupPositions, top, forceStemUp ? false : null, clef, visualScale) : null;
            const noteStemDown = forceStemUp ? false : beam?.down ?? null;
            const noteStep = displayStep(note, clef);
            const stem = beam ? getStem(positions[index], yForStep(noteStep, top), noteStep, beam.down, null, visualScale) : null;
            const forcedEndY = beam && stem ? beamYAtX(stem.stemX, beam) : null;
            const expected = bar.notes[index];
            const resultColour = feedback && hidden ? (note.step === expected?.step ? COLOUR.green : COLOUR.red) : colour;
            return <Note key={note.id ?? `${bar.barIndex}-${index}`} note={displayNote} x={positions[index]} top={top} colour={resultColour} active={activeNoteId === note.id} showFlag={!beam} forcedDown={noteStemDown} forcedEndY={forcedEndY} opacity={feedback && hidden && note.step !== expected?.step ? 0.58 : 1} clef={clef} visualScale={visualScale} />;
          })}
          {groups.map((group, index) => {
            const groupNotes = notes.slice(group.start, group.end + 1);
            if (!groupNotes.every(Boolean)) return null;
            const beam = getBeam(groupNotes, positions.slice(group.start, group.end + 1), top, forceStemUp ? false : null, clef, visualScale);
            const groupCorrect = groupNotes.every((note, noteIndex) => note?.step === bar.notes[group.start + noteIndex]?.step);
            const beamColour = feedback && hidden ? (groupCorrect ? COLOUR.green : COLOUR.red) : colour;
            return (
              <g key={`beam-${bar.barIndex}-${index}`}>
                <BeamShape beam={beam} colour={beamColour} visualScale={visualScale} />
                {secondaryBeamSegments(groupNotes).map((segment, segmentIndex) => (
                  <BeamShape
                    key={`secondary-${segmentIndex}`}
                    beam={secondaryBeamForSegment(beam, segment, groupNotes, positions.slice(group.start, group.end + 1), top, clef, visualScale)}
                    colour={beamColour}
                    visualScale={visualScale}
                  />
                ))}
              </g>
            );
          })}
          {notes.map((note, index) => {
            if (!note?.tieToNext || !notes[index + 1]) return null;
            const expected = bar.notes[index];
            const nextExpected = bar.notes[index + 1];
            const tieCorrect = note.step === expected?.step && notes[index + 1]?.step === nextExpected?.step;
            const tieColour = feedback && hidden ? (tieCorrect ? COLOUR.green : COLOUR.red) : colour;
            return <TieShape key={`tie-${bar.barIndex}-${index}`} firstNote={note} secondNote={notes[index + 1]} firstX={positions[index]} secondX={positions[index + 1]} top={top} clef={clef} colour={tieColour} />;
          })}
        </g>
      );
    }

    function RhythmGuide({ bar, positions, top, activeNoteId, timeSignature, clef = "treble" }) {
      const guideTop = top - 40;
      const guideNotes = bar.notes.map((note) => ({ ...note, step: 5, writtenAccidental: null }));
      return <g opacity="0.72"><BarNotes bar={{ ...bar, notes: guideNotes }} notes={guideNotes} positions={positions} top={guideTop} colour={COLOUR.guide} activeNoteId={activeNoteId} forceStemUp timeSignature={timeSignature} clef={clef} visualScale={0.64} /></g>;
    }

    function CorrectionLayer({ bar, userNotes, positions, top, timeSignature, clef = "treble" }) {
      const correctionNotes = bar.notes.map((note, index) => userNotes[index]?.step === note.step ? null : { ...note, id: `correct-${index}` });
      return <BarNotes bar={bar} notes={correctionNotes} positions={positions} top={top} colour={COLOUR.green} timeSignature={timeSignature} clef={clef} />;
    }

    function MelodyOptionNotation({ option, question, colour = "currentColor" }) {
      const top = STAFF.topA;
      const optionQuestion = { ...question, bars: option.bars };
      const finalBar = option.bars.length - 1;
      const displayBarCount = option.bars.length === 2 ? 2 : BARS_PER_SYSTEM;
      return (
        <svg viewBox="0 0 920 130" className="h-auto w-full overflow-visible" aria-hidden="true">
          <rect width="920" height="130" fill="transparent" />
          <g transform="translate(0 -36)" color={colour}>
            <Staff top={top} systemIndex={0} question={optionQuestion} displayBarCount={displayBarCount} colour={colour} />
            {option.bars.map((bar) => {
              const start = barStart(bar.barIndex, displayBarCount);
              const end = start + barWidth(bar.barIndex, displayBarCount);
              const positions = barPositions(bar, displayBarCount);
              return (
                <g key={bar.barIndex}>
                  <text x={bar.barIndex === 0 ? start - 15 : start + 5} y={top - 17} fill={colour} fontSize="13" fontStyle="italic" fontWeight="400">{bar.barIndex + 1}</text>
                  <BarNotes bar={bar} notes={bar.notes} positions={positions} top={top} colour={colour} timeSignature={question.timeSignature} clef={question.clef} />
                  {bar.barIndex === finalBar ? (
                    <g>
                      <line x1={end - 5} x2={end - 5} y1={top - 0.5} y2={top + STAFF.gap * 4 + 0.5} stroke={colour} strokeWidth="1.4" />
                      <line x1={end} x2={end} y1={top - 0.5} y2={top + STAFF.gap * 4 + 0.5} stroke={colour} strokeWidth="4" />
                    </g>
                  ) : (
                    <line x1={end} x2={end} y1={top} y2={top + STAFF.gap * 4} stroke={colour} strokeWidth="1.35" />
                  )}
                </g>
              );
            })}
          </g>
        </svg>
      );
    }

    function IdentifyMelodyScore({ question, feedback, onSelectOption }) {
      return (
        <div className="w-full space-y-2 md:mx-3">
          {question.options.map((option, index) => {
            const selected = question.selectedOptionIndex === index;
            const isCorrect = index === question.answerIndex;
            const showCorrect = feedback && isCorrect;
            const showWrong = feedback && selected && !isCorrect;
            const lineColour = showCorrect ? COLOUR.green : showWrong ? COLOUR.red : "currentColor";
            const stateClass = showCorrect ? "border-green-500 bg-green-50" : showWrong ? "border-red-500 bg-red-50" : selected ? "border-stone-950 bg-stone-50" : "border-stone-200 bg-white hover:bg-stone-50";
            return (
              <button
                type="button"
                key={option.id}
                aria-disabled={Boolean(feedback)}
                data-feedback-continue={feedback ? "true" : undefined}
                onClick={(event) => {
                  if (feedback) return;
                  onSelectOption(index);
                }}
                className={`relative flex w-full items-center rounded-xl border px-3 py-1.5 text-left shadow-sm ${stateClass}`}
              >
                <span className="min-w-0 flex-1 text-stone-950">
                  <MelodyOptionNotation option={option} question={question} colour={lineColour} />
                </span>
                <span className={`ml-3 mr-[25px] flex h-8 w-8 shrink-0 items-center justify-center rounded-lg border text-lg font-black ${showCorrect ? "border-green-600 bg-green-600 text-white" : showWrong ? "border-red-600 bg-red-600 text-white" : selected ? "border-stone-950 bg-stone-950 text-white" : "border-black/20 bg-white text-transparent"}`}>
                  ✓
                </span>
              </button>
            );
          })}
        </div>
      );
    }

    function Score(props) {
      if (props.question.questionType === "identifyMelody") {
        return <IdentifyMelodyScore question={props.question} feedback={props.feedback} onSelectOption={props.onSelectOption} />;
      }
      return <MissingNotesScore {...props} />;
    }

    function ScoreBarNumber({ label, x, y, colour = "currentColor", backdrop = false }) {
      return (
        <g pointerEvents="none">
          {backdrop && <ellipse cx={x} cy={y - 4} rx="7" ry="9" fill="white" />}
          <text x={x} y={y} fill={colour} textAnchor="middle" fontSize="13" fontStyle="italic" fontWeight="400">{label}</text>
        </g>
      );
    }

    function DynamicHairpin({ type, start, end, y, colour = "currentColor" }) {
      const x1 = start + 28;
      const x2 = end - 28;
      if (type === "crescendo") {
        return (
          <g pointerEvents="none" stroke={colour} fill="none" strokeWidth="1.5" strokeLinecap="round">
            <path d={`M ${x1} ${y} L ${x2} ${y - 7}`} />
            <path d={`M ${x1} ${y} L ${x2} ${y + 7}`} />
          </g>
        );
      }
      if (type === "diminuendo") {
        return (
          <g pointerEvents="none" stroke={colour} fill="none" strokeWidth="1.5" strokeLinecap="round">
            <path d={`M ${x1} ${y - 7} L ${x2} ${y}`} />
            <path d={`M ${x1} ${y + 7} L ${x2} ${y}`} />
          </g>
        );
      }
      return null;
    }

    function MissingNotesScore({ question, userNotes, setUserNotes, practiceAnswers = {}, setPracticeAnswers, feedback, activeIndex = 0, activeNoteId, hoverNote, setHoverNote }) {
      const [draggingNote, setDraggingNote] = useState(null);
      const [hoverBarlineSlot, setHoverBarlineSlot] = useState(null);
      const [hoverRhythmTarget, setHoverRhythmTarget] = useState(null);
      const [hoverRepeatPlacement, setHoverRepeatPlacement] = useState(null);
      const [hoverScotchSnap, setHoverScotchSnap] = useState(null);
      const targetInputRef = useRef(null);
      const isOneSystem = question.bars.length <= BARS_PER_SYSTEM;
      const systems = isOneSystem ? [STAFF.topA] : [STAFF.topA, STAFF.topB];
      const scoreHeight = isOneSystem ? 154 : SVG.height;
      const scoreOffsetY = isOneSystem ? -30 : 0;
      const timeSignaturePart = question.subquestions?.find((part) => part.type === "timeChoice");
      const tempoQuestionPart = question.subquestions?.find((part) => part.sourceId === "tempoQuestion");
      const asksTimeSignature = Boolean(timeSignaturePart);
      const selectedTimeAnswer = asksTimeSignature && practiceAnswers[timeSignaturePart.id] ? timeSignaturePart.id : "time";
      const selectedTimeSignature = question.questionType === "practicePaper" && asksTimeSignature
        ? TIME_SIGNATURES.find((signature) => signature.id === practiceAnswers[selectedTimeAnswer])
        : null;
      const showWrittenTimeSignature = question.questionType === "practicePaper" && !asksTimeSignature;
      const timeSignatureRevealed = Boolean(timeSignaturePart && feedback?.results?.[timeSignaturePart.id]);
      const tempoQuestionRevealed = Boolean(tempoQuestionPart && feedback?.results?.[tempoQuestionPart.id]);
      const timeSignatureColour = timeSignatureRevealed && selectedTimeSignature
        ? (selectedTimeSignature.id === question.timeSignature.id ? COLOUR.green : COLOUR.red)
        : "currentColor";

      function barlineTargetForBar(barIndex) {
        return question.barlineTargets?.find((target) => (target.hiddenBarNumbers ?? [target.barIndex]).includes(barIndex)) ?? null;
      }

      function displayPositionsForBar(bar) {
        const hasBarlineQuestion = question.subquestions?.some((part) => part.type === "barlines");
        if (!hasBarlineQuestion) return barPositions(bar);
        const target = barlineTargetForBar(bar.barIndex);
        const windowBars = target?.hiddenBarNumbers ?? [];
        if (!target || windowBars.length < 2) return barPositions(bar);

        const start = barStart(bar.barIndex);
        const end = start + barWidth(bar.barIndex);
        const noteCount = bar.notes.length;
        if (!noteCount) return [];
        const naturalPositions = barPositions(bar);

        const isFirstWindowBar = bar.barIndex === windowBars[0];
        const isLastWindowBar = bar.barIndex === windowBars[windowBars.length - 1];
        const isSystemStart = bar.barIndex % BARS_PER_SYSTEM === 0;
        const isFinalBar = bar.barIndex === question.bars.length - 1;
        const leftMargin = isFirstWindowBar ? (isSystemStart ? 34 : 18) : 12;
        const rightMargin = isLastWindowBar ? (isFinalBar ? 42 : 34) : 12;
        const left = start + leftMargin;
        const right = end - rightMargin;
        const blend = 0.5;
        if (noteCount === 1) {
          const evenX = (left + right) / 2;
          return [naturalPositions[0] + (evenX - naturalPositions[0]) * blend];
        }
        const step = (right - left) / (noteCount - 1);
        return bar.notes.map((_, index) => {
          const evenX = left + step * index;
          return naturalPositions[index] + (evenX - naturalPositions[index]) * blend;
        });
      }

      function missingNoteRangeForLevel(level) {
        if (level === "N3") {
          return {
            min: NOTE_POOL.find((note) => note.letter === "E" && note.octave === 4) ?? NOTE_POOL[0],
            max: NOTE_POOL.find((note) => note.letter === "F" && note.octave === 5) ?? NOTE_POOL.at(-1),
          };
        }
        if (level === "N4" || level === "N5") {
          return {
            min: NOTE_POOL.find((note) => note.letter === "C" && note.octave === 4) ?? NOTE_POOL[0],
            max: NOTE_POOL.find((note) => note.letter === "A" && note.octave === 5) ?? NOTE_POOL.at(-1),
          };
        }
        return { min: NOTE_POOL[0], max: NOTE_POOL.at(-1) };
      }

      useEffect(() => {
        const element = targetInputRef.current;
        if (!element) return;
        const blockScroll = (event) => {
          event.preventDefault();
          event.stopPropagation();
        };
        element.addEventListener("touchstart", blockScroll, { passive: false });
        element.addEventListener("touchmove", blockScroll, { passive: false });
        return () => {
          element.removeEventListener("touchstart", blockScroll);
          element.removeEventListener("touchmove", blockScroll);
        };
      }, [question.id, question.targetBar]);

      useEffect(() => {
        setHoverRhythmTarget(null);
      }, [question.id, feedback]);

      function pointerToSvg(event) {
        const matrix = event.currentTarget.getScreenCTM?.();
        if (matrix) {
          const point = event.currentTarget.ownerSVGElement.createSVGPoint();
          point.x = event.clientX;
          point.y = event.clientY;
          const local = point.matrixTransform(matrix.inverse());
          return { x: local.x, y: local.y };
        }
        const svg = event.currentTarget.ownerSVGElement ?? event.currentTarget;
        const rect = svg.getBoundingClientRect();
        return {
          x: ((event.clientX - rect.left) / rect.width) * SVG.width,
          y: (((event.clientY - rect.top) / rect.height) * scoreHeight) - scoreOffsetY,
        };
      }

      function noteFromPointer(event, lockedIndex = null) {
        const targetBar = question.bars[question.targetBar];
        if (!targetBar) return null;
        const pointer = pointerToSvg(event);
        const top = systemTop(targetBar.barIndex);
        const positions = barPositions(targetBar);
        const noteIndex = lockedIndex ?? positions.reduce((best, x, index) => Math.abs(pointer.x - x) < Math.abs(pointer.x - positions[best]) ? index : best, 0);
        const targetNote = targetBar.notes[noteIndex];
        if (!targetNote) return null;
        const effectiveY = pointer.y;
        const noteRange = missingNoteRangeForLevel(question.level);
        const rangeTop = yForStep(noteRange.max.step, top) - STAFF.gap * 2.5;
        const rangeBottom = yForStep(noteRange.min.step, top) + STAFF.gap * 2.5;
        if (lockedIndex === null && (Math.abs(pointer.x - positions[noteIndex]) > 48 || effectiveY < rangeTop || effectiveY > rangeBottom)) return null;
        const step = clamp(Math.round((top + STAFF.gap * 4 - effectiveY) / (STAFF.gap / 2)), noteRange.min.step, noteRange.max.step);
        const base = NOTE_POOL.find((note) => note.step === step) ?? NOTE_POOL[0];
        const writtenAccidental = melodicAccidentalForLetter(question.key, base.letter);
        return { ...base, id: `user-${noteIndex}`, rhythm: targetNote.rhythm, beats: targetNote.beats, barIndex: targetBar.barIndex, noteIndex, writtenAccidental };
      }

      function handleMove(event) {
        if (feedback) return;
        if (draggingNote) {
          event.preventDefault();
          const nextNote = noteFromPointer(event, draggingNote.noteIndex);
          if (nextNote) {
            setDraggingNote(nextNote);
            setHoverNote(nextNote);
          }
          return;
        }
        setHoverNote(noteFromPointer(event));
      }

      function handlePointerDown(event) {
        if (feedback) return;
        const nextNote = noteFromPointer(event);
        if (!nextNote) return;
        event.preventDefault();
        event.currentTarget.setPointerCapture?.(event.pointerId);
        setDraggingNote(nextNote);
        setHoverNote(nextNote);
      }

      function handlePointerUp(event) {
        if (feedback || !draggingNote) return;
        event.preventDefault();
        event.currentTarget.releasePointerCapture?.(event.pointerId);
        const finalNote = noteFromPointer(event, draggingNote.noteIndex) ?? draggingNote;
        setUserNotes((current) => ({ ...current, [finalNote.noteIndex]: finalNote }));
        setHoverNote(null);
        setDraggingNote(null);
      }

      function findPartBySource(sourceId) {
        return question.subquestions?.find((part) => (part.sourceId ?? part.id) === sourceId);
      }

      function sourceIsRevealed(sourceId) {
        const part = findPartBySource(sourceId);
        return Boolean(part && feedback?.results?.[part.id]);
      }

      function placementValue(part, defaults) {
        if (!part) return defaults;
        return makePlacementAnswer(practiceAnswers[part.id], defaults);
      }

      function repeatPlacementForBar(barIndex) {
        const part = findPartBySource("repeatSigns");
        if (!part) return null;
        const current = placementValue(part, { selectedSymbolId: null, placements: [] });
        if (!current.selectedSymbolId) return null;
        return {
          symbolId: current.selectedSymbolId,
          barIndex,
          anchor: current.selectedSymbolId === "first-time" || current.selectedSymbolId === "second-time"
            ? "above"
            : current.selectedSymbolId === "start-repeat" ? "start" : "end",
        };
      }

      function toggleRepeatPlacement(barIndex) {
        if (feedback) return;
        const part = findPartBySource("repeatSigns");
        const placement = repeatPlacementForBar(barIndex);
        if (!part || !placement) return;
        const current = placementValue(part, { selectedSymbolId: null, placements: [] });
        const expectedPlacements = question.repeatTarget?.placements ?? [question.repeatTarget];
        if (question.repeatTarget?.symbolId === "repeat-pair") {
          const selectedKey = repeatPlaceKey(placement);
          const sameSymbolRemoved = (current.placements ?? []).filter((item) => item.symbolId !== placement.symbolId);
          const hasPlacement = (current.placements ?? []).some((item) => repeatPlaceKey(item) === selectedKey);
          const placements = hasPlacement ? sameSymbolRemoved : [...sameSymbolRemoved, placement]
            .filter((item) => expectedPlacements.some((expected) => item.symbolId === expected.symbolId));
          setPracticeAnswers((answers) => ({ ...answers, [part.id]: { ...current, placements } }));
          return;
        }
        setPracticeAnswers((answers) => ({ ...answers, [part.id]: { ...current, placements: [placement] } }));
      }

      function toggleBarlinePlacement(placement) {
        const part = findPartBySource("barlines");
        if (!part || feedback) return;
        const current = placementValue(part, { placements: [] });
        const allowedBars = new Set(question.barlineTargets?.flatMap((target) => target.hiddenBarNumbers ?? [target.barIndex]) ?? []);
        if (!allowedBars.has(placement.barIndex)) return;
        const placementId = barlinePlacementId(placement);
        const hasPlacement = current.placements?.some((item) => barlinePlacementId(item) === placementId);
        const placements = hasPlacement ? [] : [{ ...placement, type: "single" }];
        setPracticeAnswers((answers) => ({ ...answers, [part.id]: { ...current, placements } }));
      }

      function rhythmTargetFromPointer(event, bar, positions, top) {
        const pointer = pointerToSvg(event);
        let closest = null;
        let closestDistance = Infinity;
        positions.forEach((x, index) => {
          const note = bar.notes[index];
          if (!note) return;
          const noteY = yForStep(displayStep(note, question.clef), top);
          const distance = Math.hypot(pointer.x - x, pointer.y - noteY);
          if (distance < closestDistance && distance < 34) {
            closestDistance = distance;
            closest = { barIndex: bar.barIndex, noteIndex: index };
          }
        });
        return closest;
      }

      function activeRhythmPlacementPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "rhythm" || activePart?.type === "rhythmFix") return activePart;
        return question.subquestions?.find((part) => part.type === "rhythm" || part.type === "rhythmFix") ?? null;
      }

      function placeRhythm(noteIndex) {
        const part = activeRhythmPlacementPart();
        if (!part || feedback) return;
        const current = placementValue(part, { selectedRhythm: null, placements: {} });
        if (!current.selectedRhythm) return;
        if (part.type === "rhythmFix" && !question.rhythmFixTarget?.noteIndices?.includes(noteIndex)) return;
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: {
            ...current,
            placements: { ...(current.placements ?? {}), [noteIndex]: current.selectedRhythm },
          },
        }));
      }

      function activeCirclePart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "scotchSnap") return activePart;
        return null;
      }

      function circleTargetForPart(part) {
        const sourceId = part?.sourceId ?? part?.id;
        if (sourceId === "noteIdentification") return question.noteValueCircleTarget;
        if (sourceId === "rhythmIdentification") return question.rhythmIdentificationTarget;
        return null;
      }

      function selectScotchSnapCandidate(candidate) {
        const part = activeCirclePart();
        if (!part || part.type !== "scotchSnap" || feedback) return;
        const current = placementValue(part, { circleSelected: false, selected: null });
        if (!current.circleSelected) return;
        setPracticeAnswers((answers) => ({ ...answers, [part.id]: { ...current, circleSelected: false, selected: candidate } }));
      }

      function scotchSelectionBounds(positions, startIndex, top, target = null) {
        const singleNoteCircle = target?.variant === "circleNoteValue";
        const left = singleNoteCircle
          ? positions[startIndex] - 24
          : Math.min(positions[startIndex], positions[startIndex + 1]) - 24;
        const right = singleNoteCircle
          ? positions[startIndex] + 24
          : Math.max(positions[startIndex], positions[startIndex + 1]) + 24;
        return {
          cx: (left + right) / 2,
          cy: top + STAFF.gap * 2,
          rx: (right - left) / 2,
          ry: STAFF.gap * 3.8,
          x: left,
          y: top - 34,
          width: right - left,
          height: STAFF.gap * 8.2,
        };
      }

      function BoxLabel({ label, x, y, width = 64, colour = "currentColor" }) {
        return (
          <text
            x={x}
            y={y + 15}
            fill={colour}
            fontSize="15"
            fontWeight="800"
            textAnchor="start"
            dominantBaseline="auto"
            pointerEvents="none"
          >
            {label}
          </text>
        );
      }

      function MarkingBox({ x, y, width, height = MARKING_BOX_HEIGHT, labelSourceId, label, layer = "full" }) {
        const boxTop = y + BOX_LABEL_BAND_HEIGHT;
        const boxHeight = Math.max(1, height - BOX_LABEL_BAND_HEIGHT);
        return (
          <g pointerEvents="none">
            {layer !== "box" && <BoxLabel label={labelledBoxText(labelSourceId, label)} x={x} y={y} width={width} />}
            {layer !== "label" && (
              <rect
                x={x}
                y={boxTop}
                width={width}
                height={boxHeight}
                fill="none"
                stroke="currentColor"
                opacity="0.6"
                strokeWidth="1.15"
                rx="0"
                shapeRendering="crispEdges"
              />
            )}
          </g>
        );
      }

      function labelledBoxText(sourceId, label) {
        const part = findPartBySource(sourceId);
        return part?.label ? `(${part.label}) ${label}` : label;
      }

      function repeatPlacementPosition(placement) {
        const top = systemTop(placement.barIndex);
        const start = barStart(placement.barIndex);
        const width = barWidth(placement.barIndex);
        const end = start + width;
        if (placement.anchor === "above") return { top, start, end, width, x: start + 10, y: top - 38 };
        if (placement.anchor === "start") return { top, start, end, width, x: start - 4, y: top };
        return { top, start, end, width, x: end + (placement.barIndex === BAR_COUNT - 1 ? 6 : 4), y: top };
      }

      function StartRepeatGlyph({ placement, colour = "currentColor", opacity = 1 }) {
        const pos = repeatPlacementPosition(placement);
        return <CalibratedSymbol symbolKey="repeatLeft" x={pos.x + STAFF.gap * 1.1 - 8} y={pos.top + STAFF.gap * 2.9} colour={colour} opacity={opacity} />;
      }

      function EndRepeatGlyph({ placement, colour = "currentColor", opacity = 1 }) {
        const pos = repeatPlacementPosition(placement);
        return <CalibratedSymbol symbolKey="repeatRight" x={pos.x - STAFF.gap * 1.1 + 3} y={pos.top + STAFF.gap * 2.9} colour={colour} opacity={opacity} />;
      }

      function TimeBarGlyph({ placement, label = "1.", colour = "currentColor", opacity = 1 }) {
        const pos = repeatPlacementPosition(placement);
        const spansBarsSixAndSeven = placement.symbolId === "first-time" && placement.barIndex === 5;
        const bracketEnd = spansBarsSixAndSeven ? barStart(6) + barWidth(6) - 4 : pos.start + Math.min(92, pos.width - 22);
        const width = bracketEnd - (pos.start + 9);
        const xOffset = placement.symbolId === "first-time" || placement.symbolId === "second-time" ? -10 : 0;
        return (
          <g opacity={opacity} stroke={colour} fill="none" strokeWidth="2" strokeLinecap="square" transform={`translate(${xOffset} 0)`}>
            <path d={`M ${pos.start + 9} ${pos.top - 24} L ${pos.start + 9} ${pos.top - 35} L ${pos.start + 9 + width} ${pos.top - 35}`} />
            <text x={pos.start + 17} y={pos.top - 38} fill={colour} stroke="none" fontFamily="serif" fontSize="18" fontWeight="400">{label}</text>
          </g>
        );
      }

      function RepeatMarker({ placement, colour = "currentColor", opacity = 1 }) {
        if (placement.symbolId === "start-repeat") return <StartRepeatGlyph placement={placement} colour={colour} opacity={opacity} />;
        if (placement.symbolId === "first-time") return <TimeBarGlyph placement={placement} label="1." colour={colour} opacity={opacity} />;
        if (placement.symbolId === "second-time") return <TimeBarGlyph placement={placement} label="2." colour={colour} opacity={opacity} />;
        return <EndRepeatGlyph placement={placement} colour={colour} opacity={opacity} />;
      }

      function BarlineMarker({ placement, colour = "currentColor", opacity = 1, dashed = false }) {

            const repeatAnswer = placementValue(repeatPart, { placements: [] });

            const barlinePart = findPartBySource("barlines");

            const isRhythmTarget = Boolean(

            const chordBoxUsesTriple = chordTripleStart >= 0;
            const chordBoxX = chordTarget

            const chordBoxRight = chordTarget
              ? chordBoxUsesTriple

              : 0;
            const chordBoxWidth = Math.max(58, chordBoxRight - chordBoxX);
            const chordBoxY = sharedBoxY;
            const rhythmBoxX = start + 4;
            const rhythmBoxY = sharedBoxY;
            const rhythmBoxWidth = Math.max(58, end - start - 8);
            const rhythmBoxSourceId = "rhythmicDictation";
            const showCadenceBox = cadencePart && bar.barIndex === 6;

            const cadenceBoxRight = showCadenceBox ? barStart(7) + barWidth(7) + 11 : 0;
            const cadenceBoxY = systemTop(6) - 42 - BOX_LABEL_BAND_HEIGHT + MARKING_BOX_Y_OFFSET;
            const intervalTarget = question.intervalTarget?.barIndex === bar.barIndex ? question.intervalTarget : null;
            const intervalFirstNote = intervalTarget ? bar.notes[intervalTarget.firstIndex] : null;

            const intervalFirstX = intervalTarget ? positions[intervalTarget.firstIndex] : 0;

            const intervalLeftNote = intervalFirstX <= intervalSecondX ? intervalFirstNote : intervalSecondNote;

            const intervalLeftPaddingX = intervalLeftNote?.writtenAccidental ? 26 : 14;
            const intervalRightHasDot = intervalRightNote && ["dottedCrotchet", "dottedMinim"].includes(intervalRightNote.rhythm);
            const intervalRightPaddingX = intervalRightNote?.rhythm === "quaver" ? 20 : intervalRightHasDot ? 24 : 14;
            const intervalBoxTop = sharedBoxY;
            const intervalBoxX = Math.min(intervalFirstX, intervalSecondX) - intervalLeftPaddingX;

            const barNumberX = ((bar.barIndex === 0 || bar.barIndex === 4) ? start - 15 : start + 5) + 4;
            const barNumberY = top - 17;
            const valueTargetNote = rhythmIdentificationTarget && ["dottedCrotchet", "noteValue"].includes(rhythmIdentificationTarget.variant) ? bar.notes[rhythmIdentificationTarget.noteIndex] : null;

            const markingBoxes = [

              chordTarget ? { x: chordBoxX, y: chordBoxY, width: chordBoxWidth, height: MARKING_BOX_HEIGHT } : null,
              valueTargetNote ? { x: valueBoxX, y: valueBoxY, width: valueBoxWidth, height: MARKING_BOX_HEIGHT } : null,
            ].filter(Boolean);
            const barNumberNeedsBackdrop = markingBoxes.some((box) => {
              const boxTop = box.y + BOX_LABEL_BAND_HEIGHT;
              const boxBottom = box.y + box.height;
              const boxRight = box.x + box.width;
              const numberTop = barNumberY - 13;
              const numberBottom = barNumberY + 2;
              const numberLeft = barNumberX - 4;
              const numberRight = barNumberX + 4;
              const verticalLineHits = (Math.abs(box.x - barNumberX) <= 4 || Math.abs(boxRight - barNumberX) <= 4)
                && boxTop <= numberBottom
                && boxBottom >= numberTop;
              const horizontalLineHits = (Math.abs(boxTop - (barNumberY - 4)) <= 4 || Math.abs(boxBottom - (barNumberY - 4)) <= 4)
                && box.x <= numberRight
                && boxRight >= numberLeft;
              return verticalLineHits || horizontalLineHits;
            });
            return (
              <g key={bar.barIndex}>
                {isMissingTarget && <rect ref={targetInputRef} x={start} y={missingInputTop} width={end - start} height={missingInputBottom - missingInputTop} fill="transparent" pointerEvents="all" className="touch-none" style={{ touchAction: "none", WebkitUserSelect: "none", userSelect: "none", overscrollBehavior: "contain" }} onPointerMove={handleMove} onPointerLeave={() => { if (!draggingNote) setHoverNote(null); }} onPointerDown={handlePointerDown} onPointerUp={handlePointerUp} onPointerCancel={() => { setDraggingNote(null); setHoverNote(null); }} />}

                {isRhythmTarget && <MarkingBox x={rhythmBoxX} y={rhythmBoxY} width={rhythmBoxWidth} labelSourceId={rhythmBoxSourceId} label="Rhythm" layer="box" />}
                {barlineBoxTarget && <MarkingBox x={barlineBoxX} y={barlineBoxY} width={barlineBoxRight - barlineBoxX} labelSourceId="barlines" label="Barline" layer="box" />}
                {intervalTarget && <MarkingBox x={intervalBoxX} y={intervalBoxTop} width={intervalBoxWidth} labelSourceId="interval" label="Interval" layer="box" />}
                {showCadenceBox && (

                    y={cadenceBoxY}

                    layer="box"

                    layer="box"
                  />

                {isMissingTarget && <RhythmGuide bar={bar} positions={positions} top={top} activeNoteId={activeNoteId} timeSignature={question.timeSignature} clef={question.clef} />}
                {isMissingTarget
                  ? <BarNotes bar={bar} notes={targetUserNotes} positions={positions} top={top} hidden feedback={missingFeedback} timeSignature={question.timeSignature} clef={question.clef} />
                  : <BarNotes bar={bar} notes={rhythmDisplayNotes} positions={positions} top={top} activeNoteId={activeNoteId} timeSignature={question.timeSignature} clef={question.clef} />}

                  <text x={positions[question.noteTarget.noteIndex] + 1} y={top - 25} textAnchor="middle" fontSize="24" fontWeight="300" fill="currentColor">X</text>
                )}
                {isMissingTarget && <MarkingBox x={missingBoxX} y={missingBoxY} width={missingBoxWidth} height={missingBoxHeight} labelSourceId="missing" label="Missing Notes" layer="label" />}
                {isRhythmTarget && <MarkingBox x={rhythmBoxX} y={rhythmBoxY} width={rhythmBoxWidth} labelSourceId={rhythmBoxSourceId} label="Rhythm" layer="label" />}
                {barlineBoxTarget && <MarkingBox x={barlineBoxX} y={barlineBoxY} width={barlineBoxRight - barlineBoxX} labelSourceId="barlines" label="Barline" layer="label" />}

                    key={`barline-hit-${barlinePlacementId(slot)}`}
                    x={slot.x - 13}
                    y={top - 18}
                    width="26"
                    height={STAFF.gap * 4 + 36}
                    fill="transparent"
                    pointerEvents="all"
                    onMouseEnter={() => setHoverBarlineSlot(barlinePlacementId(slot))}
                    onMouseLeave={() => setHoverBarlineSlot(null)}
                    onClick={() => toggleBarlinePlacement(slot)}
                  />
                ))}
                {isRhythmTarget && positions.map((x, index) => {
                  if (isRhythmFixTargetBar && !rhythmFixNoteIndices.includes(index)) return null;
                  return (
                    <rect
                      key={`rhythm-hit-top-${index}`}
                      x={x - 22}
                      y={top - 24}
                      width="44"
                      height="92"
                      fill="transparent"
                      pointerEvents={rhythmCanInteract ? "all" : "none"}
                      onPointerMove={(event) => {
                        if (!rhythmCanInteract || !rhythmAnswer.selectedRhythm) {
                          setHoverRhythmTarget(null);
                          return;
                        }
                        setHoverRhythmTarget(rhythmTargetFromPointer(event, bar, positions, top));
                      }}
                      onPointerLeave={() => setHoverRhythmTarget(null)}
                      onPointerDown={(event) => {
                        if (!rhythmCanInteract || !rhythmAnswer.selectedRhythm) return;
                        const target = rhythmTargetFromPointer(event, bar, positions, top);
                        if (!target) return;
                        event.preventDefault();
                        setHoverRhythmTarget(target);
                        placeRhythm(target.noteIndex);
                      }}
                    />
                  );
                })}
                {circleSelectionIndexes.map((index) => {
                  const bounds = scotchSelectionBounds(positions, index, top, circleTarget);
                  return (
                    <rect
                      key={`scotch-snap-hit-${bar.barIndex}-${index}`}
                      x={bounds.x}
                      y={bounds.y}
                      width={bounds.width}
                      height={bounds.height}
                      fill="transparent"
                      pointerEvents={scotchSnapCanInteract ? "all" : "none"}
                      className={feedback || !scotchSnapCanInteract ? "" : "cursor-pointer"}
                      onPointerEnter={() => {
                        if (!scotchSnapCanInteract) return;
                        setHoverScotchSnap({ variant: circleTarget?.variant, barIndex: bar.barIndex, noteIndex: index, startIndex: index, targetRhythm: bar.notes[index]?.rhythm });
                      }}
                      onPointerLeave={() => setHoverScotchSnap(null)}
                      onPointerDown={(event) => {
                        if (!scotchSnapCanInteract) return;
                        event.preventDefault();
                        setHoverScotchSnap(null);
                        selectScotchSnapCandidate({ variant: circleTarget?.variant, barIndex: bar.barIndex, noteIndex: index, startIndex: index, targetRhythm: bar.notes[index]?.rhythm });
                      }}
                    />
                  );
                })}
              </g>
            );
          })}
          </g>
        </svg>
      );

    function PracticeQuestionPanel({ question, activeIndex, setActiveIndex, practiceAnswers, setPracticeAnswers, userNotes, setUserNotes, feedback, prompt, canConfirm, isPlaying, playsRemaining, limitPlays, showAudioQuestionGlyphs, onPlayClick, onConfirm, onPlaceDynamic, onNextQuestion }) {
      const [viewAllQuestions, setViewAllQuestions] = useState(false);
      const [carousel, setCarousel] = useState({ fromIndex: null, toIndex: activeIndex, direction: "next", key: 0 });
      const previousActiveIndexRef = useRef(activeIndex);
      const previousQuestionIdRef = useRef(question.id);
      const questionRefs = useRef({});
      const results = feedback?.results ?? {};
      const activePart = question.subquestions[activeIndex] ?? question.subquestions[0];
      const displayedPart = question.subquestions[carousel.toIndex] ?? activePart;
      const exitingPart = carousel.fromIndex !== null ? question.subquestions[carousel.fromIndex] : null;
      const totalParts = question.subquestions.length;
      const playsAvailable = !limitPlays || playsRemaining > 0 || isPlaying;

      useEffect(() => {
        if (feedback) setViewAllQuestions(true);
      }, [feedback]);

      useEffect(() => {
        const id = feedback?.revealingPartId;
        if (!id) return;
        const element = questionRefs.current[id];
        element?.scrollIntoView?.({ behavior: "smooth", block: "center" });
      }, [feedback?.revealingPartId]);

      useEffect(() => {
        if (previousQuestionIdRef.current !== question.id) {
          previousQuestionIdRef.current = question.id;
          previousActiveIndexRef.current = activeIndex;
          setViewAllQuestions(false);
          setCarousel({ fromIndex: null, toIndex: activeIndex, direction: "next", key: 0 });
          return undefined;
        }

        const previousIndex = previousActiveIndexRef.current;
        if (previousIndex === activeIndex) return undefined;

        const direction = activeIndex > previousIndex ? "next" : "previous";
        previousActiveIndexRef.current = activeIndex;
        setCarousel((current) => ({
          fromIndex: viewAllQuestions ? null : previousIndex,
          toIndex: activeIndex,
          direction,
          key: current.key + 1,
        }));

        const timer = window.setTimeout(() => {
          setCarousel((current) => ({ ...current, fromIndex: null }));
        }, 230);
        return () => window.clearTimeout(timer);
      }, [activeIndex, question.id]);

      function questionFeedbackIcon(id) {
        const partResult = results[id];
        if (!partResult) return null;
        const correct = Boolean(partResult.correct);
        const src = correct ? ASSET.tick : ASSET.cross;
        return (
          <span
            aria-label={correct ? "Correct" : "Incorrect"}
            className={`ml-[11px] inline-block ${correct ? "h-6 w-6 align-[-4px] bg-green-700" : "h-7 w-7 align-[-7px] bg-red-700"}`}
            style={{
              WebkitMask: `url(${src}) center / contain no-repeat`,
              mask: `url(${src}) center / contain no-repeat`,
            }}
          />
        );
      }

      function inputState(id) {
        const partResult = results[id];
        if (!partResult) return null;
        return { correct: Boolean(partResult.correct) };
      }

      function feedbackNextQuestionButton() {
        return (
          <button
            type="button"
            onClick={onNextQuestion}

          >
