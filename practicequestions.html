              <div className={`relative mt-0 mx-auto w-full transition-opacity duration-300 ${hasScrollablePracticeScore ? "grid grid-cols-[65px_auto_65px] justify-center gap-2" : "flex items-center justify-center overflow-visible"} ${visible ? "opacity-100" : "opacity-0"}`}>
                {hasScrollablePracticeScore ? (
                  <>
                    <div aria-hidden="true" />
                    <div className="relative flex flex-col items-center">
                      <div className={`practice-score-fade top ${scoreScrollFade.top ? "visible" : ""}`} aria-hidden="true" />
                      <div
                        ref={scoreScrollRef}
                        className="practice-score-scroll max-h-[365px] max-w-none items-start overflow-x-hidden overflow-y-scroll rounded-xl border border-stone-200 bg-white p-2 md:w-fit"
                        onScroll={updateScoreScrollFade}
                      >
                        <Score question={question} userNotes={userNotes} setUserNotes={setUserNotes} practiceAnswers={practiceAnswers} setPracticeAnswers={setPracticeAnswers} feedback={feedback} activeIndex={activePracticePart} setActiveIndex={setActivePracticePart} activeNoteId={activeNoteId} hoverNote={hoverNote} setHoverNote={setHoverNote} onSelectOption={selectMelodyOption} />
                      </div>
                      <div className={`practice-score-fade bottom ${scoreScrollFade.bottom ? "visible" : ""}`} aria-hidden="true" />
                    </div>
                    <div className="flex h-[365px] shrink-0 flex-col justify-center gap-2">
                      <button
                        type="button"
                        onClick={() => scrollPracticeScore("top")}
                        className={`${window.MLH.shell.toolbarButtonClass} !w-[65px] shrink-0 justify-center p-0`}
                        aria-label="Scroll sheet music to top"
                      >
                        <img src={ASSET.next} alt="" aria-hidden="true" className="h-[24px] w-[24px] -rotate-90 object-contain" />
                      </button>
                      <button
                        type="button"
                        onClick={() => scrollPracticeScore("bottom")}
                        className={`${window.MLH.shell.toolbarButtonClass} !w-[65px] shrink-0 justify-center p-0`}
                        aria-label="Scroll sheet music to bottom"
                      >
                        <img src={ASSET.next} alt="" aria-hidden="true" className="h-[24px] w-[24px] rotate-90 object-contain" />
                      </button>
                    </div>
                  </>
                ) : (
                  <Score question={question} userNotes={userNotes} setUserNotes={setUserNotes} practiceAnswers={practiceAnswers} setPracticeAnswers={setPracticeAnswers} feedback={feedback} activeIndex={activePracticePart} setActiveIndex={setActivePracticePart} activeNoteId={activeNoteId} hoverNote={hoverNote} setHoverNote={setHoverNote} onSelectOption={selectMelodyOption} />
                )}
              </div>

              <div className={`transition-opacity duration-300 ${visible ? "opacity-100" : "opacity-0"}`}>
                {question.questionType === "practicePaper" ? (
                  <PracticeQuestionPanel
                    question={question}
                    activeIndex={activePracticePart}
                    setActiveIndex={setActivePracticePart}
                    practiceAnswers={practiceAnswers}
                    setPracticeAnswers={setPracticeAnswers}
                    userNotes={userNotes}
                    setUserNotes={setUserNotes}
                    feedback={feedback}
                    prompt={prompt}
                    canConfirm={question.level === "H" || practiceQuestionComplete()}
                    isPlaying={isPlaying}
                    playsRemaining={playsRemaining}
                    limitPlays={limitPlays && !practiceReviewMode}
                    showAudioQuestionGlyphs={showAudioQuestionGlyphs}
                    onPlayClick={handlePlayClick}
                    onConfirm={confirmAnswer}
                    onPlaceDynamic={placeDynamic}
                    onNextQuestion={startFreshQuestionFromFeedback}
                  />
                ) : (
                  <section className={`relative z-10 rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md md:mx-3 ${isIdentifyMelody ? "mt-4" : "mt-auto md:-mt-[42px]"}`}>
                    <p className="text-base font-semibold leading-tight">
                      {isIdentifyMelody
                        ? question.prompt
                        : question.useShortPrompt
                          ? <>Listen to the music and insert the missing notes in <strong>{missingNotePromptLocation(question)}</strong>.</>
                          : <>Listen to the music and insert the missing notes in <strong>{missingNotePromptLocation(question)}</strong>. The rhythm is given above the stave.</>}
                    </p>
                    {prompt && <p className="mt-2 text-sm font-medium text-red-700">{prompt}</p>}
                    <div className={`${window.MLH.PlayClearConfirmRowClass} justify-between`}>
                      <div className={`flex flex-col items-start ${(!limitPlays || playsRemaining > 0 || isPlaying) ? "" : "opacity-45 grayscale"}`}>
                        <button
                          type="button"
                          disabled={limitPlays && playsRemaining <= 0 && !isPlaying}
                          onClick={handlePlayClick}
                          className={window.MLH.PlayButtonClass}
                          aria-label={isPlaying ? "Stop audio" : "Play audio"}
                        >
                          <span className="text-lg leading-none">{isPlaying ? "■" : "▶"}</span>
                          <span>{isPlaying ? "Stop" : "Play"}</span>
                        </button>
                        {limitPlays && <div className="mt-[3px] text-[10px] font-medium leading-none text-stone-500 sm:text-[11px]">Remaining: {playsRemaining}</div>}
                      </div>
                      <div className={window.MLH.ActionButtonGroupClass}>
                        <button type="button" disabled={clearDisabled} onClick={clearUserNotes} className={window.MLH.ClearButtonClass}>
                          Clear
                        </button>
                        <window.MLH.ConfirmButton disabled={Boolean(feedback) || !allRequiredNotesPlaced} onClick={confirmAnswer} className={window.MLH.AudioConfirmButtonClass}>
                          Confirm
                        </window.MLH.ConfirmButton>
                      </div>
                    </div>
                  </section>
                )}
              </div>
            </main>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

  <script src="./footer.js?v=1.3"></script>
</body>
</html>
