      return down > up;
    }

    function getBeam(notes, positions, top, forcedDown = null, clef = "treble", visualScale = 1) {
      const down = forcedDown ?? groupHasDownStems(notes, clef);
      const settings = sharedSymbolConfig("quaverBeam");
      const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0);
      const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0);
      const stemLength = STAFF.gap * 3.1 * Number(settings.heightScale || 1) * visualScale;
      const firstStep = displayStep(notes[0], clef);
      const lastStep = displayStep(notes.at(-1), clef);
      const firstY = yForStep(firstStep, top);
      const lastY = yForStep(lastStep, top);
      const firstStem = getStem(positions[0] + xOffset, firstY + yOffset, firstStep, down, down ? firstY + yOffset + stemLength : firstY + yOffset - stemLength, visualScale);
      const lastStem = getStem(positions.at(-1) + xOffset, lastY + yOffset, lastStep, down, down ? lastY + yOffset + stemLength : lastY + yOffset - stemLength, visualScale);
      let startY = firstStem.endY;
      let endY = lastStem.endY;
      const beamPoints = notes.map((note, index) => ({
        x: positions[index],
        y: yForStep(displayStep(note, clef), top),
      }));

      if (notes.length > 2 && notes.some((note) => note.rhythm === "semiquaver")) {
        const steps = beamPoints.map((point) => point.y);
        const spread = Math.max(...steps) - Math.min(...steps);

        if (spread >= STAFF.gap * 0.75) {
          const xMean = beamPoints.reduce((sum, point) => sum + point.x, 0) / beamPoints.length;
          const yMean = beamPoints.reduce((sum, point) => sum + point.y, 0) / beamPoints.length;
          const xVariance = beamPoints.reduce((sum, point) => sum + ((point.x - xMean) ** 2), 0);
          const covariance = beamPoints.reduce((sum, point) => sum + ((point.x - xMean) * (point.y - yMean)), 0);
          let slope = xVariance ? covariance / xVariance : 0;
          const maxSlope = 0.11;
          slope = clamp(slope, -maxSlope, maxSlope);

          if (Math.abs(slope) < 0.035) {
            const firstNoteY = beamPoints[0].y;
            const lastNoteY = beamPoints.at(-1).y;
            slope = lastNoteY <= firstNoteY ? -0.045 : 0.045;
          }

          const centreX = (firstStem.stemX + lastStem.stemX) / 2;
          const centreY = (firstStem.endY + lastStem.endY) / 2;
          startY = centreY + slope * (firstStem.stemX - centreX);
          endY = centreY + slope * (lastStem.stemX - centreX);
        }
      }

      const minStemLength = STAFF.gap * 2.45 * visualScale;
      let beamShift = 0;
      beamPoints.forEach((point, index) => {
        const noteStep = displayStep(notes[index], clef);
        const stemX = getStem(positions[index], point.y, noteStep, down, null, visualScale).stemX;
        const projectedY = startY + ((stemX - firstStem.stemX) / ((lastStem.stemX - firstStem.stemX) || 1)) * (endY - startY);
        if (down) {
          beamShift = Math.max(beamShift, (point.y + minStemLength) - projectedY);
        } else {
          beamShift = Math.min(beamShift, (point.y - minStemLength) - projectedY);
        }
      });
      startY += beamShift;
      endY += beamShift;

      return {
        down,
        start: { x: firstStem.stemX, y: startY },
        end: { x: lastStem.stemX, y: endY },
      };
    }

    function beamYAtX(x, beam) {
      const progress = (x - beam.start.x) / (beam.end.x - beam.start.x || 1);
      return beam.start.y + progress * (beam.end.y - beam.start.y);
    }

    function secondaryBeamForSegment(beam, segment, groupNotes, groupPositions, top, clef, visualScale = 1) {
      const secondaryOffset = (beam.down ? -STAFF.gap * 0.85 : STAFF.gap * 0.85) * visualScale;
      const secondaryBeamLift = 2 * visualScale;
      const hookLength = (STAFF.gap * 0.9 + 2) * visualScale;
      function stemXFor(index) {
        const noteStep = displayStep(groupNotes[index], clef);
        const y = yForStep(noteStep, top);
        return getStem(groupPositions[index], y, noteStep, beam.down, null, visualScale).stemX;
      }
      const x1 = stemXFor(segment.startIndex);
      const x2 = segment.isHook
        ? x1 + (segment.startIndex > 0 ? -hookLength : hookLength)
        : stemXFor(segment.endIndex);
      return {
        down: beam.down,
        start: { x: x1, y: beamYAtX(x1, beam) + secondaryOffset + (beam.down ? secondaryBeamLift : -secondaryBeamLift) },
        end: { x: x2, y: beamYAtX(x2, beam) + secondaryOffset + (beam.down ? secondaryBeamLift : -secondaryBeamLift) },
      };
    }

    function beamPolygonPoints(x1, y1, x2, y2, thickness) {
      const halfThickness = thickness / 2;
      return [`${x1},${y1 - halfThickness}`, `${x2},${y2 - halfThickness}`, `${x2},${y2 + halfThickness}`, `${x1},${y1 + halfThickness}`].join(" ");
    }

    function BeamShape({ beam, colour = "currentColor", opacity = 1, visualScale = 1 }) {
      const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.beamThicknessScale || 0.42) * visualScale);
      return <polygon points={beamPolygonPoints(beam.start.x - 0.5, beam.start.y, beam.end.x + 0.5, beam.end.y, thickness)} fill={colour} opacity={opacity} />;
    }

    function TieShape({ firstNote, secondNote, firstX, secondX, top, clef = "treble", colour = "currentColor", widthScale = 1 }) {
      if (!firstNote || !secondNote) return null;
      const firstStep = displayStep(firstNote, clef);
      const secondStep = displayStep(secondNote, clef);
      const firstY = yForStep(firstStep, top);
      const secondY = yForStep(secondStep, top);
      const midX = (firstX + secondX) / 2;
      const stemsUp = !stemDown(firstStep) && !stemDown(secondStep);
      const tieOffset = STAFF.gap * 0.28;
      const y = stemsUp ? Math.max(firstY, secondY) + tieOffset : Math.min(firstY, secondY) - tieOffset;
      const stretch = clamp((Math.abs(secondX - firstX) / (STAFF.gap * 2)) * widthScale, 1.4, 7.2);
      const tieGlyph = sharedSymbolForKey("tie") || "\uE1FD";

      return (
        <text
          className="music-symbol"
          x="0"
          y="0"
          fontSize="58"
          textAnchor="middle"
          fill={colour}
          pointerEvents="none"
          transform={`translate(${midX} ${y}) scale(${stretch} 1)${stemsUp ? "" : " rotate(180)"}`}
        >
          {tieGlyph}
        </text>
      );
    }

    function LedgerLines({ x, step, top, colour = "currentColor", opacity = 1 }) {
      const ledgerSteps = [];
      for (let ledgerStep = -2; ledgerStep >= step; ledgerStep -= 2) ledgerSteps.push(ledgerStep);
      for (let ledgerStep = 10; ledgerStep <= step; ledgerStep += 2) ledgerSteps.push(ledgerStep);
      const settings = sharedSymbolConfig("ledgerLines");
      const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
      const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
      const halfWidth = (STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4) * Number(settings.widthScale || 1)) / 2;
      const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11) * Number(settings.heightScale || 1));
      return <g>{ledgerSteps.map((ledgerStep) => <line key={ledgerStep} x1={x - halfWidth + xOffset} x2={x + halfWidth + xOffset} y1={yForStep(ledgerStep, top) + yOffset} y2={yForStep(ledgerStep, top) + yOffset} stroke={colour} strokeWidth={thickness} strokeLinecap="butt" opacity={opacity} />)}</g>;
    }

        function Accidental({ value, x, y, colour = "currentColor", opacity = 1, visualScale = 1, letter = null, flatOffsetX = 0 }) {
            if (value === null || value === undefined) return null;
            const sharpOffsetX = value === 1 ? (letter === "G" ? -4 : -2) : 0;
            const naturalOffsetX = value === 0 ? -2 : 0;
            const accidentalOffsetX = value === -1 ? flatOffsetX : value === 1 ? sharpOffsetX : naturalOffsetX;
            const symbolKey = value === 1 ? "sharpInScore" : value === -1 ? "flatInScore" : "naturalInScore";
            return <CalibratedSymbol symbolKey={symbolKey} x={x + accidentalOffsetX} y={y} colour={colour} opacity={opacity} settingOverrides={scaledSymbolOverrides(symbolKey, visualScale)} />;
        }

    function Note({ note, x, top, colour = "currentColor", opacity = 1, active = false, faint = false, showFlag = true, forcedDown = null, forcedEndY = null, scale = 1, visualScale = 1, clef = "treble" }) {
      if (!note) return null;
      if (note.invisible) return null;
      const step = displayStep(note, clef);
      const y = note.rest ? yForStep(4, top) : yForStep(step, top);
      const down = forcedDown ?? stemDown(step);
      const visualRhythm = note.displayRhythm ?? note.rhythm;
      const beamed = isBeamableRhythm(visualRhythm) && !showFlag;
      const stem = getStem(x, y, step, down, forcedEndY, visualScale);
      const dotKey = step % 2 === 0 ? "augmentationDotLine" : "augmentationDotSpace";
      const dotY = step % 2 === 0 ? y - STAFF.gap * 0.25 : y;
      const noteColour = active ? COLOUR.blue : colour;
      const stemThickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12) * visualScale);
      const symbolKey = noteSymbolKey(visualRhythm, down, beamed);
      const accidentalValue = Object.prototype.hasOwnProperty.call(note, "displayAccidental") ? note.displayAccidental : note.writtenAccidental;
      return (
        <g pointerEvents="none" opacity={faint ? 0.32 : opacity} transform={scale !== 1 ? `translate(${x} ${y}) scale(${scale}) translate(${-x} ${-y})` : undefined}>
          {!note.rest && <LedgerLines x={x} step={step} top={top} colour={noteColour} />}
          <Accidental value={accidentalValue} x={x - STAFF.gap * 1.75 * visualScale - (isLedgerLineNote(note, clef) ? 2 : 0)} y={y} colour={noteColour} visualScale={visualScale} letter={note.letter} flatOffsetX={-2} />
          <CalibratedSymbol symbolKey={symbolKey} x={x} y={y} colour={noteColour} settingOverrides={scaledSymbolOverrides(symbolKey, visualScale)} />
          {(visualRhythm === "dottedMinim" || visualRhythm === "dottedCrotchet" || visualRhythm === "dottedQuaver" || visualRhythm === "dottedCrotchetRest") && <CalibratedSymbol symbolKey={dotKey} x={x + STAFF.gap * 1.3 * visualScale} y={dotY} colour={noteColour} settingOverrides={scaledSymbolOverrides(dotKey, visualScale)} />}
          {visualRhythm === "dottedQuaverRest" && <CalibratedSymbol symbolKey={dotKey} x={x + STAFF.gap * 1.18 * visualScale} y={dotY} colour={noteColour} settingOverrides={scaledSymbolOverrides(dotKey, visualScale)} />}
          {beamed && <line x1={stem.stemX} x2={stem.stemX} y1={stem.startY} y2={stem.endY} stroke={noteColour} strokeWidth={stemThickness} />}
        </g>
      );
    }

    function ChordStack({ note, x, top, colour = "currentColor", clef = "treble", forceStemUp = false }) {
      if (!note?.stack?.length) return null;
      const tones = [...note.stack].sort((a, b) => displayStep(a, clef) - displayStep(b, clef));
      const stemDownValue = forceStemUp ? false : !tones.some((tone) => displayStep(tone, clef) < 4);
      const visualRhythm = note.displayRhythm ?? note.rhythm;
      const isOpenChordRhythm = ["semibreve", "minim", "dottedMinim"].includes(visualRhythm);
      const adjacentNoteOffset = stemDownValue ? -9 : 12.5;
      const adjacentOffsets = (() => {
        const offsets = new Map();
        let cluster = [];
        const flush = () => {
          if (!cluster.length) return;
          cluster.forEach((item, index) => offsets.set(item.index, cluster.length > 1 && index % 2 === 1 ? adjacentNoteOffset : 0));
          cluster = [];
        };
        tones.forEach((tone, index) => {
          if (cluster.length && displayStep(tone, clef) - displayStep(cluster.at(-1).tone, clef) !== 1) flush();
          cluster.push({ tone, index });
        });
        flush();
        return offsets;
      })();
      const accidentalOffsets = (() => {
        const offsets = new Map();
        let closeGroup = [];
        const flush = () => {
          closeGroup.forEach((item, groupIndex) => offsets.set(item.toneIndex, groupIndex * 12));
          closeGroup = [];
        };
        tones
          .map((tone, toneIndex) => ({ tone, toneIndex, step: displayStep(tone, clef) }))
          .filter((item) => item.tone.writtenAccidental)
          .forEach((item) => {
            if (closeGroup.length && item.step - closeGroup.at(-1).step >= 4) flush();
            closeGroup.push(item);
          });
        flush();
        return offsets;
      })();
      const accidentalOffset = (index) => accidentalOffsets.get(index) ?? 0;
      return (
        <g pointerEvents="none" opacity="0.98">
          {tones.map((tone, index) => {
            const step = displayStep(tone, clef);
            const toneY = yForStep(step, top);
            const dotKey = step % 2 === 0 ? "augmentationDotLine" : "augmentationDotSpace";
            const dotY = step % 2 === 0 ? toneY - STAFF.gap * 0.25 : toneY;
            const sideOffset = adjacentOffsets.get(index) || 0;
            const noteHeadX = x + sideOffset;
            const symbolKey = sideOffset
              ? ["minim", "dottedMinim"].includes(visualRhythm)
                ? "noteheadHalf"
                : isOpenChordRhythm ? "wholeNote" : "noteheadBlack"
              : noteSymbolKey(visualRhythm, stemDownValue);
            return (
              <g key={`${note.id}-tone-${index}`}>
                <LedgerLines x={noteHeadX} step={step} top={top} colour={colour} />
                <Accidental value={tone.writtenAccidental} x={x - STAFF.gap * 2.1 - accidentalOffset(index)} y={toneY} colour={colour} letter={tone.letter} flatOffsetX={-2} />
                <CalibratedSymbol symbolKey={symbolKey} x={noteHeadX} y={toneY} colour={colour} />
                {step % 2 === 0 && <line x1={noteHeadX - 8} x2={noteHeadX + 12} y1={toneY} y2={toneY} stroke={colour} strokeWidth="1.2" />}
                {["dottedMinim", "dottedCrotchet"].includes(visualRhythm) && <CalibratedSymbol symbolKey={dotKey} x={noteHeadX + STAFF.gap * 1.3} y={dotY} colour={colour} />}
              </g>
            );
          })}
        </g>
      );
    }

    function Staff({ top, systemIndex, question, displayBarCount = BARS_PER_SYSTEM, colour = "currentColor", showTimeSignature = false }) {
      const finalBar = Math.min(systemIndex * BARS_PER_SYSTEM + BARS_PER_SYSTEM - 1, question.bars.length - 1);
      const staffEnd = barStart(finalBar, displayBarCount) + barWidth(finalBar, displayBarCount);
      const clef = question.clef ?? "treble";
      const shouldShowTimeSignature = showTimeSignature || question.questionType !== "practicePaper";
      return (
        <g>
          {[0, 1, 2, 3, 4].map((line) => <line key={line} x1={STAFF.left} x2={staffEnd} y1={top + line * STAFF.gap} y2={top + line * STAFF.gap} stroke="currentColor" strokeWidth="1.25" />)}
          <CalibratedSymbol symbolKey={clef === "bass" ? "fClef" : "gClef"} x={STAFF.left + 32} y={clef === "bass" ? yForStep(6, top) : yForStep(2, top)} colour={colour} />
          <KeySignature keySignature={question.key} top={top} clef={clef} colour={colour} />
          {systemIndex === 0 && shouldShowTimeSignature && <TimeSignature signature={question.timeSignature} top={top} colour={colour} />}
        </g>
      );
    }

    function KeySignature({ keySignature, top, clef = "treble", colour = "currentColor" }) {
      return <g>{keySignature.signature.map((item, index) => {
        const clefStep = clef === "bass" ? item.step - 2 : item.step;
        return <CalibratedSymbol key={`${item.type}-${index}`} symbolKey={item.type === "sharp" ? "sharpKeySignature" : "flatKeySignature"} x={STAFF.left + 54 + index * KEY_SIGNATURE_SPACING} y={yForStep(clefStep, top)} colour={colour} />;
      })}</g>;
    }

    function TimeSignature({ signature, top, colour = "currentColor", xOverride = null }) {
      const key = `timeSig${signature.top}${signature.bottom}`;
      const settings = sharedSymbolConfig(key);
      const topGlyph = String(signature.top).split("").map((digit) => sharedSymbolForKey(`timeSig${digit}`)).join("");
      const bottomGlyph = sharedSymbolForKey(`timeSig${signature.bottom}`);
      const x = xOverride ?? (calibrationAnchorX(key) + STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0));
      const y = calibrationAnchorY(key, top) + STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
      const fontSize = STAFF.gap * Number(settings.fontSizeScale || 3.4);
      return <g pointerEvents="none"><text className="music-symbol" x={x} y={y - fontSize * 0.14} fill={colour} fontSize={fontSize} textAnchor="middle">{topGlyph}</text><text className="music-symbol" x={x} y={y + fontSize * 0.43} fill={colour} fontSize={fontSize} textAnchor="middle">{bottomGlyph}</text></g>;
    }

    function BarNotes({ bar, notes, positions, top, colour = "currentColor", feedback = null, hidden = false, activeNoteId = null, forceStemUp = false, timeSignature = null, clef = "treble", visualScale = 1 }) {
      const groups = getQuaverGroups(hidden ? bar.notes : notes, timeSignature);
      const shownAccidentals = new Set();
      return (
        <g>
          {notes.map((note, index) => {
            if (!note) return null;
            const accidentalKey = `${note.letter}:${note.writtenAccidental}`;
            const showAccidental = Boolean(note.writtenAccidental) && !shownAccidentals.has(accidentalKey);
            if (note.writtenAccidental) shownAccidentals.add(accidentalKey);
            const displayNote = showAccidental ? note : { ...note, writtenAccidental: null };
            const group = groupContaining(groups, index);
            const groupNotes = group ? notes.slice(group.start, group.end + 1) : [];
            const groupPositions = group ? positions.slice(group.start, group.end + 1) : [];
            const beam = group && groupNotes.every(Boolean) ? getBeam(groupNotes, groupPositions, top, forceStemUp ? false : null, clef, visualScale) : null;
            const noteStemDown = forceStemUp ? false : beam?.down ?? null;
            const noteStep = displayStep(note, clef);
            const stem = beam ? getStem(positions[index], yForStep(noteStep, top), noteStep, beam.down, null, visualScale) : null;
            const forcedEndY = beam && stem ? beamYAtX(stem.stemX, beam) : null;
            const expected = bar.notes[index];
            const resultColour = note.colour ?? (feedback && hidden ? (note.step === expected?.step ? COLOUR.green : COLOUR.red) : colour);
            if (displayNote.stack?.length) {
              return <ChordStack key={note.id ?? `${bar.barIndex}-${index}`} note={displayNote} x={positions[index]} top={top} colour={resultColour} clef={clef} forceStemUp={forceStemUp} />;
            }
            return <Note key={note.id ?? `${bar.barIndex}-${index}`} note={displayNote} x={positions[index]} top={top} colour={resultColour} active={activeNoteId === note.id} showFlag={!beam} forcedDown={noteStemDown} forcedEndY={forcedEndY} opacity={feedback && hidden && note.step !== expected?.step ? 0.58 : 1} clef={clef} visualScale={visualScale} />;
          })}
          {groups.map((group, index) => {
            const groupNotes = notes.slice(group.start, group.end + 1);
            if (!groupNotes.every(Boolean)) return null;
            const beam = getBeam(groupNotes, positions.slice(group.start, group.end + 1), top, forceStemUp ? false : null, clef, visualScale);
            const groupCorrect = groupNotes.every((note, noteIndex) => note?.step === bar.notes[group.start + noteIndex]?.step);
            const groupExplicitColour = groupNotes.some((note) => note?.colour === COLOUR.red)
              ? COLOUR.red
              : groupNotes.find((note) => note?.colour)?.colour;
            const beamColour = groupExplicitColour ?? (feedback && hidden ? (groupCorrect ? COLOUR.green : COLOUR.red) : colour);
            return (
              <g key={`beam-${bar.barIndex}-${index}`}>
                <BeamShape beam={beam} colour={beamColour} visualScale={visualScale} />
                {secondaryBeamSegments(groupNotes).map((segment, segmentIndex) => (
                  <BeamShape
                    key={`secondary-${segmentIndex}`}
                    beam={secondaryBeamForSegment(beam, segment, groupNotes, positions.slice(group.start, group.end + 1), top, clef, visualScale)}
                    colour={beamColour}
                    visualScale={visualScale}
                  />
                ))}
              </g>
            );
          })}
          {notes.map((note, index) => {
            if (!note?.tieToNext || !notes[index + 1]) return null;
            const expected = bar.notes[index];
            const nextExpected = bar.notes[index + 1];
            const tieCorrect = note.step === expected?.step && notes[index + 1]?.step === nextExpected?.step;
            const tieColour = feedback && hidden ? (tieCorrect ? COLOUR.green : COLOUR.red) : colour;
            return <TieShape key={`tie-${bar.barIndex}-${index}`} firstNote={note} secondNote={notes[index + 1]} firstX={positions[index]} secondX={positions[index + 1]} top={top} clef={clef} colour={tieColour} />;
          })}
        </g>
      );
    }

    function RhythmGuide({ bar, positions, top, activeNoteId, timeSignature, clef = "treble", guideNoteIndices = null }) {
      const guideTop = top - 40;
      const visibleIndices = guideNoteIndices ? new Set(guideNoteIndices) : null;
      const guideNotes = bar.notes.map((note, index) => visibleIndices && !visibleIndices.has(index) ? null : ({ ...note, step: 5, writtenAccidental: null }));
      return <g opacity="0.72"><BarNotes bar={{ ...bar, notes: guideNotes }} notes={guideNotes} positions={positions} top={guideTop} colour={COLOUR.guide} activeNoteId={activeNoteId} forceStemUp timeSignature={timeSignature} clef={clef} visualScale={0.64} /></g>;
    }

    function CorrectionLayer({ bar, userNotes, positions, top, timeSignature, clef = "treble", noteIndices = null }) {
      const allowedIndices = noteIndices ? new Set(noteIndices) : null;
      const correctionNotes = bar.notes.map((note, index) => {
        if (allowedIndices && !allowedIndices.has(index)) return null;
        return userNoteAt(userNotes, bar.barIndex, index)?.step === note.step ? null : { ...note, id: `correct-${index}` };
      });
      return <BarNotes bar={bar} notes={correctionNotes} positions={positions} top={top} colour={COLOUR.green} timeSignature={timeSignature} clef={clef} />;
    }

    function MelodyOptionNotation({ option, question, colour = "currentColor" }) {
      const top = STAFF.topA;
      const optionQuestion = { ...question, bars: option.bars };
      const finalBar = option.bars.length - 1;
      const displayBarCount = option.bars.length === 2 ? 2 : BARS_PER_SYSTEM;
      return (
        <svg viewBox="0 0 920 130" className="h-auto w-full overflow-visible" aria-hidden="true">
          <rect width="920" height="130" fill="transparent" />
          <g transform="translate(0 -36)" color={colour}>
            <Staff top={top} systemIndex={0} question={optionQuestion} displayBarCount={displayBarCount} colour={colour} />
            {option.bars.map((bar) => {
              const start = barStart(bar.barIndex, displayBarCount);
              const end = start + barWidth(bar.barIndex, displayBarCount);
              const positions = barPositions(bar, displayBarCount);
              return (
                <g key={bar.barIndex}>
                  <text x={bar.barIndex === 0 ? start - 15 : start + 5} y={top - 17} fill={colour} fontSize="13" fontStyle="italic" fontWeight="400">{bar.barIndex + 1}</text>
                  <BarNotes bar={bar} notes={bar.notes} positions={positions} top={top} colour={colour} timeSignature={question.timeSignature} clef={question.clef} />
                  {bar.barIndex === finalBar ? (
                    <g>
                      <line x1={end - 5} x2={end - 5} y1={top - 0.5} y2={top + STAFF.gap * 4 + 0.5} stroke={colour} strokeWidth="1.4" />
                      <line x1={end} x2={end} y1={top - 0.5} y2={top + STAFF.gap * 4 + 0.5} stroke={colour} strokeWidth="4" />
                    </g>
                  ) : (
                    <line x1={end} x2={end} y1={top} y2={top + STAFF.gap * 4} stroke={colour} strokeWidth="1.35" />
                  )}
                </g>
              );
            })}
          </g>
        </svg>
      );
    }

    function IdentifyMelodyScore({ question, feedback, onSelectOption }) {
      function selectOptionOnPress(event, index) {
        if (feedback) return;
        if (event?.type === "pointerdown") {
          if (event.button !== undefined && event.button !== 0) return;
          event.preventDefault();
        }
        onSelectOption(index);
      }

      function selectOptionOnKeyboardClick(event, index) {
        if (event.detail !== 0) return;
        selectOptionOnPress(event, index);
      }

      return (
        <div className="w-full space-y-2 md:mx-3">
          {question.options.map((option, index) => {
            const selected = question.selectedOptionIndex === index;
            const isCorrect = index === question.answerIndex;
            const showCorrect = feedback && isCorrect;
            const showWrong = feedback && selected && !isCorrect;
            const lineColour = showCorrect ? COLOUR.green : showWrong ? COLOUR.red : "currentColor";
            const stateClass = showCorrect ? "border-green-500 bg-green-50" : showWrong ? "border-red-500 bg-red-50" : selected ? "border-stone-950 bg-stone-50" : "border-stone-200 bg-white hover:bg-stone-50";
            return (
              <button
                type="button"
                key={option.id}
                aria-disabled={Boolean(feedback)}
                data-feedback-continue={feedback ? "true" : undefined}
                onPointerDown={(event) => selectOptionOnPress(event, index)}
                onClick={(event) => selectOptionOnKeyboardClick(event, index)}
                className={`relative flex w-full items-center rounded-xl border px-3 py-1.5 text-left shadow-sm ${stateClass}`}
              >
                <span className="min-w-0 flex-1 text-stone-950">
                  <MelodyOptionNotation option={option} question={question} colour={lineColour} />
                </span>
                <span className={`ml-3 mr-[25px] flex h-8 w-8 shrink-0 items-center justify-center rounded-lg border text-lg font-black ${showCorrect ? "border-green-600 bg-green-600 text-white" : showWrong ? "border-red-600 bg-red-600 text-white" : selected ? "border-stone-950 bg-stone-950 text-white" : "border-black/20 bg-white text-transparent"}`}>
                  ✓
                </span>
              </button>
            );
          })}
        </div>
      );
    }

    function Score(props) {
      if (props.question.questionType === "identifyMelody") {
        return <IdentifyMelodyScore question={props.question} feedback={props.feedback} onSelectOption={props.onSelectOption} />;
      }
      return <MissingNotesScore {...props} />;
    }

    function ScoreBarNumber({ label, x, y, colour = "currentColor", backdrop = false }) {
      const labelLength = String(label).length;
      const backdropRx = labelLength > 1 ? 9.2 : 5.8;
      return (
        <g pointerEvents="none">
          {backdrop && <ellipse cx={x} cy={y - 4} rx={backdropRx} ry="6.8" fill="white" />}
          <text x={x} y={y} fill={colour} textAnchor="middle" fontSize="13" fontStyle="italic" fontWeight="400">{label}</text>
        </g>
      );
    }

    function DynamicHairpin({ type, start, end, y, colour = "currentColor" }) {
      const x1 = start + 28;
      const x2 = end - 28;
      if (type === "crescendo") {
        return (
          <g pointerEvents="none" stroke={colour} fill="none" strokeWidth="1.5" strokeLinecap="round">
            <path d={`M ${x1} ${y} L ${x2} ${y - 7}`} />
            <path d={`M ${x1} ${y} L ${x2} ${y + 7}`} />
          </g>
        );
      }
      if (type === "diminuendo") {
        return (
          <g pointerEvents="none" stroke={colour} fill="none" strokeWidth="1.5" strokeLinecap="round">
            <path d={`M ${x1} ${y - 7} L ${x2} ${y}`} />
            <path d={`M ${x1} ${y + 7} L ${x2} ${y}`} />
          </g>
        );
      }
      return null;
    }

    function MissingNotesScore({ question, userNotes, setUserNotes, practiceAnswers = {}, setPracticeAnswers, feedback, activeIndex = 0, setActiveIndex = () => {}, activeNoteId, hoverNote, setHoverNote }) {
      const [draggingNote, setDraggingNote] = useState(null);
      const [hoverBarlineSlot, setHoverBarlineSlot] = useState(null);
      const [hoverRhythmTarget, setHoverRhythmTarget] = useState(null);
      const [hoverRepeatPlacement, setHoverRepeatPlacement] = useState(null);
      const [hoverScotchSnap, setHoverScotchSnap] = useState(null);
      const [hoverAccidentalPlacement, setHoverAccidentalPlacement] = useState(null);
      const [hoverArticulationSelection, setHoverArticulationSelection] = useState(null);
      const [hoverTripletPlacement, setHoverTripletPlacement] = useState(null);
      const [hoverTranspositionNote, setHoverTranspositionNote] = useState(null);
      const [draggingTranspositionNote, setDraggingTranspositionNote] = useState(null);
      const [hoverEnharmonicNote, setHoverEnharmonicNote] = useState(null);
      const [draggingEnharmonicNote, setDraggingEnharmonicNote] = useState(null);
      const [hoverAhChordBassNote, setHoverAhChordBassNote] = useState(null);
      const targetInputRef = useRef(null);
      const isOneSystem = question.bars.length <= BARS_PER_SYSTEM;
      const systemCount = Math.max(1, Math.ceil(question.bars.length / BARS_PER_SYSTEM));
      const lastSystemIndex = systemCount - 1;
      const transpositionSystemIndex = Number.isInteger(question.transpositionTarget?.barIndex)
        ? Math.floor(question.transpositionTarget.barIndex / BARS_PER_SYSTEM)
        : -1;
      const enharmonicSystemIndex = Number.isInteger(question.enharmonicTarget?.barIndex)
        ? Math.floor(question.enharmonicTarget.barIndex / BARS_PER_SYSTEM)
        : -1;
      const ahChordSystemIndex = Number.isInteger(question.advancedHigherChordTarget?.bassLineBar)
        ? Math.floor(question.advancedHigherChordTarget.bassLineBar / BARS_PER_SYSTEM)
        : -1;
      const extraSpacingAfterSystem = Array.from({ length: systemCount }, () => 0);
      const reserveExtraSpacingAfterSystem = (systemIndex, spacing) => {
        if (systemIndex < 0 || systemIndex >= systemCount) return;
        extraSpacingAfterSystem[systemIndex] = Math.max(extraSpacingAfterSystem[systemIndex], spacing);
      };
      reserveExtraSpacingAfterSystem(transpositionSystemIndex, question.transpositionTarget?.type === "meaning" ? 0 : 65);
      reserveExtraSpacingAfterSystem(enharmonicSystemIndex, 90);
      reserveExtraSpacingAfterSystem(ahChordSystemIndex, 80);
      const cumulativeSpacingBeforeSystem = extraSpacingAfterSystem.map((_, index) => (
        extraSpacingAfterSystem.slice(0, index).reduce((sum, spacing) => sum + spacing, 0)
      ));
      const systems = Array.from({ length: systemCount }, (_, index) => (
        STAFF.topA + index * (STAFF.topB - STAFF.topA + EXTRA_SYSTEM_SPACING) + cumulativeSpacingBeforeSystem[index]
      ));
      const standardBottomPadding = STAFF.topA + STAFF.gap * 4 - 20;
      const lastSystemNeedsExtraSpacing = extraSpacingAfterSystem[lastSystemIndex] > 0;
      const bottomPadding = ahChordSystemIndex === lastSystemIndex ? 400 : lastSystemNeedsExtraSpacing ? 160 : standardBottomPadding;
      const scrollBottomPadding = ahChordSystemIndex === lastSystemIndex ? 15 : 0;
      const scoreHeight = isOneSystem ? 154 : systems.at(-1) + bottomPadding + scrollBottomPadding;
      const scoreOffsetY = isOneSystem ? -30 : 0;
      useEffect(() => {
        setHoverBarlineSlot(null);
        setHoverRhythmTarget(null);
        setHoverRepeatPlacement(null);
        setHoverScotchSnap(null);
        setHoverAccidentalPlacement(null);
        setHoverArticulationSelection(null);
        setHoverTripletPlacement(null);
        setHoverTranspositionNote(null);
        setHoverAhChordBassNote(null);
      }, [activeIndex, question.id]);
      const timeSignaturePart = question.subquestions?.find((part) => part.type === "timeChoice");
      const tempoQuestionPart = question.subquestions?.find((part) => part.sourceId === "tempoQuestion");
      const asksTimeSignature = Boolean(timeSignaturePart);
      const asksTimeChange = Boolean(timeSignaturePart && question.timeChangeTarget);
      const selectedTimeAnswer = asksTimeSignature && practiceAnswers[timeSignaturePart.id] ? timeSignaturePart.id : "time";
      const selectedTimeSignature = question.questionType === "practicePaper" && asksTimeSignature
        ? TIME_SIGNATURES.find((signature) => signature.id === practiceAnswers[selectedTimeAnswer])
        : null;
      const showWrittenTimeSignature = question.questionType === "practicePaper" && (!asksTimeSignature || asksTimeChange);
      const timeSignatureRevealed = Boolean(timeSignaturePart && feedback?.results?.[timeSignaturePart.id]);
      const tempoQuestionRevealed = Boolean(tempoQuestionPart && feedback?.results?.[tempoQuestionPart.id]);
      const timeSignatureColour = timeSignatureRevealed && selectedTimeSignature
        ? (selectedTimeSignature.id === timeSignaturePart.answer ? COLOUR.green : COLOUR.red)
        : "currentColor";

      function scoreSystemTop(barIndex) {
        const systemIndex = Math.floor(barIndex / BARS_PER_SYSTEM);
        return systems[systemIndex] ?? systemTop(barIndex);
      }

      function barlineTargetForBar(barIndex) {
        return question.barlineTargets?.find((target) => (target.hiddenBarNumbers ?? [target.barIndex]).includes(barIndex)) ?? null;
      }

      function displayPositionsForBar(bar) {
        const hasBarlineQuestion = question.subquestions?.some((part) => part.type === "barlines");
        if (!hasBarlineQuestion) return barPositions(bar);
        const target = barlineTargetForBar(bar.barIndex);
        const windowBars = target?.hiddenBarNumbers ?? [];
        if (!target || windowBars.length < 2) return barPositions(bar);

        const start = barStart(bar.barIndex);
        const end = start + barWidth(bar.barIndex);
        const noteCount = bar.notes.length;
        if (!noteCount) return [];
        const naturalPositions = barPositions(bar);

        const isFirstWindowBar = bar.barIndex === windowBars[0];
        const isLastWindowBar = bar.barIndex === windowBars[windowBars.length - 1];
        const isSystemStart = bar.barIndex % BARS_PER_SYSTEM === 0;
        const isFinalBar = bar.barIndex === question.bars.length - 1;
        const leftMargin = isFirstWindowBar ? (isSystemStart ? 34 : 18) : 12;
        const rightMargin = isLastWindowBar ? (isFinalBar ? 42 : 34) : 12;
        const left = start + leftMargin;
        const right = end - rightMargin;
        const blend = 0.5;
        if (noteCount === 1) {
          const evenX = (left + right) / 2;
          return [naturalPositions[0] + (evenX - naturalPositions[0]) * blend];
        }
        const step = (right - left) / (noteCount - 1);
        return bar.notes.map((_, index) => {
          const evenX = left + step * index;
          return naturalPositions[index] + (evenX - naturalPositions[index]) * blend;
        });
      }

      function missingNoteRangeForLevel(level) {
        if (level === "N3") {
          return {
            min: NOTE_POOL.find((note) => note.letter === "E" && note.octave === 4) ?? NOTE_POOL[0],
            max: NOTE_POOL.find((note) => note.letter === "F" && note.octave === 5) ?? NOTE_POOL.at(-1),
          };
        }
        if (level === "N4" || level === "N5" || level === "H") {
          return {
            min: NOTE_POOL.find((note) => note.letter === "C" && note.octave === 4) ?? NOTE_POOL[0],
            max: NOTE_POOL.find((note) => note.letter === "A" && note.octave === 5) ?? NOTE_POOL.at(-1),
          };
        }
        return { min: NOTE_POOL[0], max: NOTE_POOL.at(-1) };
      }

      useEffect(() => {
        const element = targetInputRef.current;
        if (!element) return;
        const blockScroll = (event) => {
          event.preventDefault();
          event.stopPropagation();
        };
        element.addEventListener("touchstart", blockScroll, { passive: false });
        element.addEventListener("touchmove", blockScroll, { passive: false });
        return () => {
          element.removeEventListener("touchstart", blockScroll);
          element.removeEventListener("touchmove", blockScroll);
        };
      }, [question.id, question.targetBar]);

      useEffect(() => {
        setHoverRhythmTarget(null);
      }, [question.id, feedback]);

      useEffect(() => {
        setDraggingNote(null);
        setHoverNote(null);
        setDraggingTranspositionNote(null);
        setHoverTranspositionNote(null);
        setDraggingEnharmonicNote(null);
        setHoverEnharmonicNote(null);
      }, [activeIndex, question.id]);

      function pointerToSvg(event) {
        const matrix = event.currentTarget.getScreenCTM?.();
        if (matrix) {
          const point = event.currentTarget.ownerSVGElement.createSVGPoint();
          point.x = event.clientX;
          point.y = event.clientY;
          const local = point.matrixTransform(matrix.inverse());
          return { x: local.x, y: local.y };
        }
        const svg = event.currentTarget.ownerSVGElement ?? event.currentTarget;
        const rect = svg.getBoundingClientRect();
        return {
          x: SVG.x + ((event.clientX - rect.left) / rect.width) * SVG.width,
          y: (((event.clientY - rect.top) / rect.height) * scoreHeight) - scoreOffsetY,
        };
      }

      function notePlacementPartForBar(barIndex) {
        const intervalPart = question.subquestions?.find((part) => part.type === "intervalInsert");
        if (intervalPart && question.intervalInsertTarget?.barIndex === barIndex) return intervalPart;
        const missingPart = question.subquestions?.find((part) => part.type === "notes");
        if (missingPart && question.targetBar === barIndex) return missingPart;
        return null;
      }

      function notePlacementBarIndexForPart(part) {
        if (part?.type === "intervalInsert") return question.intervalInsertTarget?.barIndex ?? question.targetBar;
        return question.targetBar;
      }

      function noteFromPointer(event, lockedIndex = null, placementPartOverride = null) {
        const placementPart = placementPartOverride ?? activeNotePlacementPart();
        if (!placementPart) return null;
        const targetBarIndex = notePlacementBarIndexForPart(placementPart);
        const targetBar = question.bars[targetBarIndex];
        if (!targetBar) return null;
        const pointer = pointerToSvg(event);
        const top = scoreSystemTop(targetBar.barIndex);
        const positions = barPositions(targetBar);
        const intervalAnswerIndex = placementPart?.type === "intervalInsert" ? question.intervalInsertTarget?.answerIndex : null;
        const allowedNoteIndices = placementPart?.type === "notes" ? missingNoteIndicesForQuestion(question) : null;
        const selectableIndices = allowedNoteIndices?.length ? allowedNoteIndices : positions.map((_, index) => index);
        const noteIndex = lockedIndex ?? intervalAnswerIndex ?? selectableIndices.reduce((best, index) => Math.abs(pointer.x - positions[index]) < Math.abs(pointer.x - positions[best]) ? index : best, selectableIndices[0] ?? 0);
        if (allowedNoteIndices && !allowedNoteIndices.includes(noteIndex)) return null;
        const targetNote = targetBar.notes[noteIndex];
        if (!targetNote) return null;
        const effectiveY = pointer.y;
        const noteRange = missingNoteRangeForLevel(question.level);
        const rangeTop = yForStep(noteRange.max.step, top) - STAFF.gap * 2.5;
        const rangeBottom = yForStep(noteRange.min.step, top) + STAFF.gap * 2.5;
        if (lockedIndex === null && (Math.abs(pointer.x - positions[noteIndex]) > 48 || effectiveY < rangeTop || effectiveY > rangeBottom)) return null;
        const step = clamp(Math.round((top + STAFF.gap * 4 - effectiveY) / (STAFF.gap / 2)), noteRange.min.step, noteRange.max.step);
        const base = NOTE_POOL.find((note) => note.step === step) ?? NOTE_POOL[0];
        const writtenAccidental = melodicAccidentalForLetter(question.key, base.letter);
        return { ...base, id: `user-${noteIndex}`, rhythm: targetNote.rhythm, beats: targetNote.beats, barIndex: targetBar.barIndex, noteIndex, writtenAccidental };
      }

      function activeNotePlacementPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "notes" || activePart?.type === "intervalInsert") return activePart;
        return null;
      }

      function partIndexForSourceId(sourceId) {
        if (!sourceId) return -1;
        return question.subquestions?.findIndex((part) => (part.sourceId ?? part.id) === sourceId) ?? -1;
      }

      function selectQuestionBox(sourceId) {
        const partIndex = partIndexForSourceId(sourceId);
        if (partIndex >= 0) setActiveIndex(partIndex);
      }

      function handleMove(event, placementPart = null) {
        if (feedback) return;
        if (draggingNote) {
          event.preventDefault();
          const nextNote = noteFromPointer(event, draggingNote.noteIndex, placementPart);
          if (nextNote) {
            setDraggingNote(nextNote);
            setHoverNote(nextNote);
          }
          return;
        }
        setHoverNote(noteFromPointer(event, null, placementPart));
      }

      function handlePointerDown(event, placementPart = null) {
        if (feedback) return;
        const nextNote = noteFromPointer(event, null, placementPart);
        if (!nextNote) return;
        event.preventDefault();
        event.currentTarget.setPointerCapture?.(event.pointerId);
        setDraggingNote(nextNote);
        setHoverNote(nextNote);
      }

      function handlePointerUp(event) {
        if (feedback || !draggingNote) return;
        event.preventDefault();
        event.currentTarget.releasePointerCapture?.(event.pointerId);
        const finalNote = noteFromPointer(event, draggingNote.noteIndex, notePlacementPartForBar(draggingNote.barIndex)) ?? draggingNote;
        setUserNotes((current) => ({ ...current, [noteAnswerKey(finalNote.barIndex, finalNote.noteIndex)]: finalNote }));
        setHoverNote(null);
        setDraggingNote(null);
      }

      function findPartBySource(sourceId) {
        return question.subquestions?.find((part) => (part.sourceId ?? part.id) === sourceId);
      }

      function sourceIsRevealed(sourceId) {
        const part = findPartBySource(sourceId);
        return Boolean(part && feedback?.results?.[part.id]);
      }

      function placementValue(part, defaults) {
        if (!part) return defaults;
        return makePlacementAnswer(practiceAnswers[part.id], defaults);
      }

      function repeatPlacementForBar(barIndex) {
        const part = findPartBySource("repeatSigns");
        if (!part) return null;
        const current = placementValue(part, { selectedSymbolId: null, placements: [] });
        if (!current.selectedSymbolId) return null;
        return {
          symbolId: current.selectedSymbolId,
          barIndex,
          anchor: current.selectedSymbolId === "first-time" || current.selectedSymbolId === "second-time"
            ? "above"
            : ["dc", "ds", "fine", "segno"].includes(current.selectedSymbolId)
              ? "above"
              : current.selectedSymbolId === "start-repeat" ? "start" : "end",
        };
      }

      function toggleRepeatPlacement(barIndex) {
        if (feedback) return;
        const part = findPartBySource("repeatSigns");
        const placement = repeatPlacementForBar(barIndex);
        if (!part || !placement) return;
        const current = placementValue(part, { selectedSymbolId: null, placements: [] });
        const expectedPlacements = question.repeatTarget?.placements ?? [question.repeatTarget];
        if (question.repeatTarget?.symbolId === "repeat-pair") {
          const selectedKey = repeatPlaceKey(placement);
          const sameSymbolRemoved = (current.placements ?? []).filter((item) => item.symbolId !== placement.symbolId);
          const hasPlacement = (current.placements ?? []).some((item) => repeatPlaceKey(item) === selectedKey);
          const placements = hasPlacement ? sameSymbolRemoved : [...sameSymbolRemoved, placement]
            .filter((item) => expectedPlacements.some((expected) => item.symbolId === expected.symbolId));
          setPracticeAnswers((answers) => ({ ...answers, [part.id]: { ...current, placements } }));
          return;
        }
        if (question.repeatTarget?.symbolId === "ds-fine") {
          const selectedKey = repeatPlaceKey(placement);
          const sameSymbolRemoved = (current.placements ?? []).filter((item) => item.symbolId !== placement.symbolId);
          const hasPlacement = (current.placements ?? []).some((item) => repeatPlaceKey(item) === selectedKey);
          const placements = hasPlacement ? sameSymbolRemoved : [...sameSymbolRemoved, placement]
            .filter((item) => expectedPlacements.some((expected) => item.symbolId === expected.symbolId));
          setPracticeAnswers((answers) => ({ ...answers, [part.id]: { ...current, placements } }));
          return;
        }
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: {
            ...current,
            selectedSymbolId: ["dc", "ds", "fine", "segno"].includes(placement.symbolId) ? null : current.selectedSymbolId,
            placements: [placement],
          },
        }));
      }

      function toggleBarlinePlacement(placement) {
        const part = findPartBySource("barlines");
        if (!part || feedback) return;
        const current = placementValue(part, { placements: [] });
        const allowedBars = new Set(question.barlineTargets?.flatMap((target) => target.hiddenBarNumbers ?? [target.barIndex]) ?? []);
        if (!allowedBars.has(placement.barIndex)) return;
        const placementId = barlinePlacementId(placement);
        const hasPlacement = current.placements?.some((item) => barlinePlacementId(item) === placementId);
        const placements = hasPlacement ? [] : [{ ...placement, type: "single" }];
        setPracticeAnswers((answers) => ({ ...answers, [part.id]: { ...current, placements } }));
      }

      function rhythmTargetFromPointer(event, bar, positions, top, allowedIndices = null) {
        const pointer = pointerToSvg(event);
        const allowed = allowedIndices ? new Set(allowedIndices) : null;
        let closest = null;
        let closestDistance = Infinity;
        positions.forEach((x, index) => {
          if (allowed && !allowed.has(index)) return;
          const note = bar.notes[index];
          if (!note) return;
          const noteY = yForStep(displayStep(note, question.clef), top);
          const distance = Math.hypot(pointer.x - x, pointer.y - noteY);
          if (distance < closestDistance && distance < 34) {
            closestDistance = distance;
            closest = { barIndex: bar.barIndex, noteIndex: index };
          }
        });
        return closest;
      }

      function activeRhythmPlacementPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "rhythm" || activePart?.type === "rhythmFix") return activePart;
        return question.subquestions?.find((part) => part.type === "rhythm" || part.type === "rhythmFix") ?? null;
      }

      function placeRhythm(target) {
        const part = activeRhythmPlacementPart();
        if (!part || feedback) return;
        const current = placementValue(part, { selectedRhythm: null, placements: {} });
        if (!current.selectedRhythm) return;
        const barIndex = target?.barIndex;
        const noteIndex = target?.noteIndex;
        const targetKey = part.type === "rhythmFix"
          ? rhythmPlacementKeyForTarget(question.rhythmFixTarget, barIndex, noteIndex)
          : String(noteIndex);
        if (part.type === "rhythmFix" && !Object.prototype.hasOwnProperty.call(question.rhythmFixTarget?.targetRhythms ?? {}, targetKey)) return;
        if (question.rhythmFixTarget?.variant === "ahTripletInsert" && isAdvancedHigherTripletTool(current.selectedRhythm)) {
          const tripletRange = advancedHigherTripletPlacementRange(question, target, current.selectedRhythm);
          if (!tripletRange) return;
          const memberRhythm = advancedHigherTripletMemberRhythm(current.selectedRhythm);
          const nextPlacements = { ...(current.placements ?? {}) };
          tripletRange.forEach((index) => {
            nextPlacements[rhythmPlacementKeyForTarget(question.rhythmFixTarget, barIndex, index)] = memberRhythm;
          });
          setPracticeAnswers((answers) => ({
            ...answers,
            [part.id]: {
              ...current,
              placements: nextPlacements,
            },
          }));
          return;
        }
        const nextPlacements = question.rhythmFixTarget?.variant === "ahTie" && current.selectedRhythm === "tie"
          ? { [targetKey]: current.selectedRhythm }
          : { ...(current.placements ?? {}), [targetKey]: current.selectedRhythm };
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: {
            ...current,
            placements: nextPlacements,
          },
        }));
      }

      function activeCirclePart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "scotchSnap") return activePart;
        return null;
      }

      function activeAccidentalPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "accidentalPlacement") return activePart;
        return null;
      }

      function activeArticulationPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "articulationPlacement") return activePart;
        return null;
      }

      function activeTripletPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "tripletPlacement") return activePart;
        return null;
      }

      function activeTranspositionPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "transposition") return activePart;
        return findPartBySource("transposition");
      }

      function circleTargetForPart(part) {
        const sourceId = part?.sourceId ?? part?.id;
        if (sourceId === "noteIdentification") return question.noteValueCircleTarget;
        if (sourceId === "rhythmIdentification") return question.rhythmIdentificationTarget;
        if (sourceId === "scaleDegrees") return question.scaleDegreeTarget;
        if (sourceId === "triplets") return question.tripletTarget;
        return null;
      }

      function circleSelectionCorrect(part, selection, target) {
        const sourceId = part?.sourceId ?? part?.id;
        if (sourceId === "scaleDegrees") return scaleDegreeSelectionCorrect(question, selection);
        return sameScotchSelection(selection, target);
      }

      function selectScotchSnapCandidate(candidate) {
        const part = activeCirclePart();
        if (!part || part.type !== "scotchSnap" || feedback) return;
        const current = placementValue(part, { circleSelected: false, selected: null });
        if (!current.circleSelected) return;
        setPracticeAnswers((answers) => ({ ...answers, [part.id]: { ...current, circleSelected: false, selected: candidate } }));
      }

      function accidentalTargetFromPointer(event, bar, positions, top) {
        const pointer = pointerToSvg(event);
        let closest = null;
        let closestDistance = Infinity;
        positions.forEach((x, noteIndex) => {
          const note = bar.notes[noteIndex];
          if (!note || note.rest) return;
          const noteY = yForStep(displayStep(note, question.clef), top);
          const distance = Math.hypot(pointer.x - x, pointer.y - noteY);
          if (distance < closestDistance && distance < 34) {
            closestDistance = distance;
            closest = { barIndex: bar.barIndex, noteIndex };
          }
        });
        return closest;
      }

      function placeAccidental(target) {
        const part = activeAccidentalPart();
        if (!part || feedback || !target) return;
        const current = placementValue(part, { selectedSymbolId: null, placements: [] });
        if (!current.selectedSymbolId) return;
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: { ...current, placements: [{ ...target, symbolId: current.selectedSymbolId }] },
        }));
      }

      function articulationTargetFromPointer(event, bar, positions, top) {
        const pointer = pointerToSvg(event);
        let closest = null;
        let closestDistance = Infinity;
        positions.forEach((x, noteIndex) => {
          const note = bar.notes[noteIndex];
          if (!note || note.rest) return;
          const noteY = yForStep(displayStep(note, question.clef), top);
          const distance = Math.hypot(pointer.x - x, pointer.y - noteY);
          if (distance < closestDistance && distance < 36) {
            closestDistance = distance;
            closest = { barIndex: bar.barIndex, noteIndex };
          }
        });
        return closest;
      }

      function placeArticulation(target) {
        const part = activeArticulationPart();
        if (!part || feedback || !target) return;
        const current = placementValue(part, { selectedMarkingId: null, placements: [] });
        if (!current.selectedMarkingId) return;
        const existing = current.placements ?? [];
        const targetKey = articulationPlacementKey(target);
        const placements = existing.some((placement) => articulationPlacementKey(placement) === targetKey)
          ? existing.filter((placement) => articulationPlacementKey(placement) !== targetKey)
          : [...existing, { ...target, markingId: current.selectedMarkingId }];
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: { ...current, placements },
        }));
      }

      function tripletTargetFromPointer(event, bar, positions, top) {
        const part = activeTripletPart();
        const current = placementValue(part, { selectedTripletKind: null, placements: [] });
        const selectedOption = TRIPLET_MARKING_OPTIONS.find((option) => option.id === current.selectedTripletKind);
        if (!part || !selectedOption || !question.tripletTarget) return null;
        if (!tripletAnswerBoxBars(question, question.tripletTarget.barIndex).bars.includes(bar.barIndex)) return null;
        const pointer = pointerToSvg(event);
        let closest = null;
        let closestDistance = Infinity;
        positions.slice(0, -2).forEach((x, startIndex) => {
          const notes = bar.notes.slice(startIndex, startIndex + 3);
          if (notes.length !== 3 || notes.some((note) => !note || note.rest)) return;
          const groupCentreX = (x + positions[startIndex + 2]) / 2;
          const distance = Math.hypot(pointer.x - groupCentreX, pointer.y - (top - STAFF.gap * 1.8));
          if (distance < closestDistance && distance < 70) {
            closestDistance = distance;
            closest = { barIndex: bar.barIndex, startIndex, tripletKind: selectedOption.id };
          }
        });
        return closest;
      }

      function placeTriplet(target) {
        const part = activeTripletPart();
        if (!part || feedback || !target) return;
        const current = placementValue(part, { selectedTripletKind: null, placements: [] });
        if (!current.selectedTripletKind) return;
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: {
            ...current,
            placements: [{ ...target, tripletKind: current.selectedTripletKind }],
          },
        }));
      }

      function transpositionNoteFromPointer(event, bar, positions, answerTop, targetDetails = null) {
        const pointer = pointerToSvg(event);
        const touchOffset = event.pointerType === "touch" ? 44 : 0;
        let closestIndex = 0;
        let closestDistance = Infinity;
        positions.forEach((x, noteIndex) => {
          const distance = Math.abs(pointer.x - x);
          if (distance < closestDistance) {
            closestDistance = distance;
            closestIndex = noteIndex;
          }
        });
        if (closestDistance > 34) return null;
        const sourceNote = bar.notes[closestIndex];
        if (!sourceNote || sourceNote.rest) return null;
        const answerClef = targetDetails?.answerClef ?? "bass";
        const pointerTarget = noteBaseForDisplayStep(stepFromSvgY(pointer.y - touchOffset, answerTop), answerClef);
        const target = answerClef === "bass"
          ? question.practiceLevel === "AH"
            ? clampNoteToAdvancedHigherTranspositionBassRange(pointerTarget)
            : clampNoteToHigherTranspositionBassRange(pointerTarget)
          : pointerTarget;
        return {
          ...target,
          id: `user-transposition-${bar.barIndex}-${closestIndex}`,
          rhythm: sourceNote.rhythm,
          beats: sourceNote.beats,
          beat: sourceNote.beat,
          barIndex: bar.barIndex,
          noteIndex: closestIndex,
          writtenAccidental: sourceNote.writtenAccidental,
        };
      }

      function placeTranspositionNote(note) {
        const part = activeTranspositionPart();
        if (!part || feedback || !note) return;
        const current = placementValue(part, { selectedRhythm: null, notes: {}, ties: {} });
        const automaticRhythm = question.practiceLevel === "AH";
        if (!automaticRhythm && !current.selectedRhythm) return;
        setPracticeAnswers((answers) => {
          const nextNotes = {
            ...(current.notes ?? {}),
            [note.noteIndex]: automaticRhythm
              ? note
              : { ...note, rhythm: current.selectedRhythm, beats: rhythmInfo(current.selectedRhythm).beats },
          };
          const nextTies = automaticRhythm
            ? Object.fromEntries((question.bars?.[note.barIndex]?.notes ?? [])
              .map((barNote, index) => [index, Boolean(barNote.tieToNext && nextNotes[index] && nextNotes[index + 1])])
              .filter(([, active]) => active))
            : current.ties;
          return {
            ...answers,
            [part.id]: {
              ...current,
              notes: nextNotes,
              ties: nextTies,
            },
          };
        });
      }

      function activeEnharmonicPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "enharmonic") return activePart;
        return findPartBySource("enharmonics");
      }

      function enharmonicNoteFromPointer(event, target, answerX, answerTop) {
        const part = activeEnharmonicPart();
        if (!part || !target) return null;
        const answer = placementValue(part, { selectedAccidental: null, note: null });
        if (answer.selectedAccidental === null || answer.selectedAccidental === undefined) return null;
        const pointer = pointerToSvg(event);
        if (Math.abs(pointer.x - answerX) > 42) return null;
        const step = stepFromSvgY(pointer.y, answerTop);
        const base = noteBaseForDisplayStep(step, target.clef);
        return {
          ...base,
          id: `user-enharmonic-${target.barIndex}-${target.noteIndex}`,
          rhythm: target.sourceNote?.rhythm ?? "crotchet",
          beats: rhythmInfo(target.sourceNote?.rhythm ?? "crotchet").beats,
          beat: target.sourceNote?.beat ?? 0,
          barIndex: target.barIndex,
          noteIndex: target.noteIndex,
          writtenAccidental: answer.selectedAccidental,
        };
      }

      function placeEnharmonicNote(note) {
        const part = activeEnharmonicPart();
        if (!part || feedback || !note) return;
        const current = placementValue(part, { selectedAccidental: null, note: null });
        if (current.selectedAccidental === null || current.selectedAccidental === undefined) return;
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: {
            ...current,
            note,
          },
        }));
      }

      function activeAhChordPart() {
        const activePart = question.subquestions?.[activeIndex];
        if (activePart?.type === "ahBassLine") return activePart;
        return findPartBySource("ahBassLine");
      }

      function ahChordSlotX(bar, slot, start, end) {
        const positions = displayPositionsForBar(bar);
        if (!bar?.notes?.length || positions.length !== bar.notes.length) {
          const ratio = slot.beatRatio ?? slot.slotIndex / 2;
          const usableLeft = start + 38;
          const usableRight = end - 38;
          return usableLeft + (usableRight - usableLeft) * clamp(ratio, 0, 0.95);
        }
        const beatStarts = [];
        let cursor = 0;
        bar.notes.forEach((note) => {
          const beat = Number.isFinite(note.beat) ? note.beat : cursor;
          beatStarts.push(beat);
          cursor = beat + (note.beats ?? rhythmInfo(note.rhythm).beats);
        });
        const targetBeat = slot.beat ?? (slot.beatRatio ?? 0) * Math.max(1, question.timeSignature?.beats ?? 4);
        if (targetBeat <= beatStarts[0]) return positions[0];
        for (let index = 0; index < beatStarts.length - 1; index += 1) {
          const currentBeat = beatStarts[index];
          const nextBeat = beatStarts[index + 1];
          if (targetBeat <= nextBeat + 0.001) {
            const span = Math.max(0.001, nextBeat - currentBeat);
            const ratio = clamp((targetBeat - currentBeat) / span, 0, 1);
            return positions[index] + (positions[index + 1] - positions[index]) * ratio;
          }
        }
        return positions.at(-1);
      }

      function ahChordJoinedBoxCenterX(bar, slots, slot, start, end, boxWidth = 74) {
        if (!Array.isArray(slots) || slots.length !== 2 || !slot) return ahChordSlotX(bar, slot, start, end);
        const sortedSlots = [...slots].sort((a, b) => (a.slotIndex ?? 0) - (b.slotIndex ?? 0));
        const leftSlot = sortedSlots[0];
        const rightSlot = sortedSlots[1];
        const pairMidpoint = (ahChordSlotX(bar, leftSlot, start, end) + ahChordSlotX(bar, rightSlot, start, end)) / 2;
        return pairMidpoint + (slot.slotIndex === leftSlot.slotIndex ? -boxWidth / 2 : boxWidth / 2);
      }

      function ahChordBassNoteFromPointer(event, slot, x, answerTop) {
        const part = activeAhChordPart();
        if (!part || !slot) return null;
        const pointer = pointerToSvg(event);
        const touchOffset = event.pointerType === "touch" ? 44 : 0;
        if (Math.abs(pointer.x - x) > 42) return null;
        const pointerTarget = noteBaseForDisplayStep(stepFromSvgY(pointer.y - touchOffset, answerTop), "bass");
        const target = clampNoteToAdvancedHigherTranspositionBassRange(pointerTarget);
        return {
          ...target,
          id: `user-ah-chord-bass-${slot.slotIndex}`,
          rhythm: slot.rhythm ?? "crotchet",
          beats: slot.beats ?? 1,
          beat: slot.beat ?? 0,
          barIndex: slot.barIndex,
          slotIndex: slot.slotIndex,
          writtenAccidental: null,
        };
      }

      function placeAhChordBassNote(note) {
        const part = activeAhChordPart();
        if (!part || feedback || !note) return;
        const current = placementValue(part, { chordAnswers: {}, bassNotes: {} });
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: {
            ...current,
            bassNotes: { ...(current.bassNotes ?? {}), [note.slotIndex]: note },
          },
        }));
      }

      function toggleTranspositionTie(noteIndex) {
        const part = activeTranspositionPart();
        if (!part || feedback) return;
        const current = placementValue(part, { selectedRhythm: null, notes: {}, ties: {} });
        if (current.selectedRhythm !== "tie") return;
        const key = String(noteIndex);
        setPracticeAnswers((answers) => ({
          ...answers,
          [part.id]: {
            ...current,
            ties: { ...(current.ties ?? {}), [key]: !current.ties?.[key] },
          },
        }));
      }

      function scotchSelectionBounds(positions, startIndex, top, target = null) {
        const singleNoteCircle = target?.variant === "circleNoteValue" || target?.variant === "scaleDegree";
        const span = target?.variant === "triplet" ? 2 : 1;
        const left = singleNoteCircle
          ? positions[startIndex] - 24
          : Math.min(positions[startIndex], positions[startIndex + 1]) - 24;
        const right = singleNoteCircle
          ? positions[startIndex] + 24
          : Math.max(positions[startIndex], positions[startIndex + span]) + 24;
        return {
          cx: (left + right) / 2,
          cy: top + STAFF.gap * 2,
          rx: (right - left) / 2,
          ry: STAFF.gap * 3.8,
          x: left,
          y: top - 34,
          width: right - left,
          height: STAFF.gap * 8.2,
        };
      }

      function BoxLabel({ label, x, y, width = 64, colour = "currentColor" }) {
        return (
          <text
            x={x}
            y={y + 15}
            fill={colour}
            fontSize="15"
            fontWeight="800"
            textAnchor="start"
            dominantBaseline="auto"
            pointerEvents="none"
          >
            {label}
          </text>
        );
      }

      function MarkingBox({ x, y, width, height = MARKING_BOX_HEIGHT, labelSourceId, label, layer = "full" }) {
        const boxTop = y + BOX_LABEL_BAND_HEIGHT;
        const boxHeight = Math.max(1, height - BOX_LABEL_BAND_HEIGHT);
        const targetPartIndex = partIndexForSourceId(labelSourceId);
        const canSelectBox = layer !== "label" && targetPartIndex >= 0 && targetPartIndex !== activeIndex;
        return (
          <g data-score-question-source={labelSourceId}>
            {layer !== "box" && <BoxLabel label={labelledBoxText(labelSourceId, label)} x={x} y={y} width={width} />}
            {layer !== "label" && (
              <rect
                x={x}
                y={boxTop}
                width={width}
                height={boxHeight}
                fill={canSelectBox ? "transparent" : "none"}
                stroke="currentColor"
                opacity="0.6"
                strokeWidth="1.15"
                rx="0"
                shapeRendering="crispEdges"
                pointerEvents={canSelectBox ? "all" : "none"}
                className={canSelectBox ? "cursor-pointer" : ""}
                onPointerDown={(event) => {
                  if (!canSelectBox) return;
                  event.preventDefault();
                  event.stopPropagation();
                  selectQuestionBox(labelSourceId);
                }}
              />
            )}
          </g>
        );
      }

      function HigherChordGivenBox({ x, y, question, bar, size = 30 }) {
        const textY = y + size / 2 + 5;
        return (
          <g pointerEvents="none">
            <rect x={x} y={y} width={size} height={size} fill="white" stroke="#444" strokeWidth="1.5" />
            <rect x={x} y={y + size} width={size} height={size} fill="white" stroke="#444" strokeWidth="1.5" />
            <text x={x + size / 2} y={textY} textAnchor="middle" fontSize="17" fontWeight="600" fill="#111">
              {higherChordShortName(question, bar.chordSymbol)}
            </text>
            <text x={x + size / 2} y={textY + size} textAnchor="middle" fontSize="17" fontWeight="600" fill="#111">
              {bar.chordSymbol}
            </text>
          </g>
        );
      }

      function renderHigherChordAnswerInput({ part, barIndex, x, y, question, value, disabled, feedbackResult }) {
        const correct = feedbackResult ? higherChordAnswerCorrect(value, question, barIndex) : null;
        const border = correct === true ? COLOUR.green : correct === false ? COLOUR.red : "#444";
        const background = correct === true ? "#dcfce7" : correct === false ? "#fee2e2" : "white";
        const bar = question.bars?.[barIndex];
        const overlayWidth = 180;
        const selectChordQuestion = () => selectQuestionBox(part.sourceId ?? part.id);
        return (
          <div
            key={`higher-chord-answer-input-${barIndex}`}
            style={{
              position: "absolute",
              left: `${((x - SVG.x) / SVG.width) * 100}%`,

          >

      function renderAhChordAnswerInput({ part, slot, x, y, width = 74, value, disabled, feedbackResult }) {
        const correct = feedbackResult ? advancedHigherChordAnswerCorrect(value, slot) : null;
        const border = correct === true ? COLOUR.green : correct === false ? COLOUR.red : "#444";
        const background = correct === true ? "#dcfce7" : correct === false ? "#fee2e2" : "white";
        const overlayWidth = width;
        const inputWidth = width;
        const chordRowHeight = 30;
        const inversionRowHeight = 30;
        const answerBoxHeight = chordRowHeight + inversionRowHeight;
        const chordValue = advancedHigherChordAnswerValue(value);
        const inversionValue = advancedHigherInversionAnswerValue(value);
        const inversionInputFontSize = `${clamp(14 - Math.max(0, inversionValue.length - 9) * 0.9, 10, 14)}px`;
        const selectChordQuestion = () => selectQuestionBox(part.sourceId ?? part.id);
        const updateAhChordAnswer = (field, nextValue) => {
          setPracticeAnswers((current) => {
            const currentAnswer = makePlacementAnswer(current[part.id], { chordAnswers: {}, bassNotes: {} });
            const currentSlotAnswer = currentAnswer.chordAnswers?.[slot.slotIndex] ?? {};
            const nextSlotAnswer = {
              chord: advancedHigherChordAnswerValue(currentSlotAnswer),
              inversion: advancedHigherInversionAnswerValue(currentSlotAnswer),
              [field]: nextValue,
            };
            return {
              ...current,
              [part.id]: {
                ...currentAnswer,
                chordAnswers: {
                  ...(currentAnswer.chordAnswers ?? {}),
                  [slot.slotIndex]: nextSlotAnswer,
                },
              },
            };
          });

        const inputBaseStyle = {
          display: "block",
          width: `${(inputWidth / overlayWidth) * 100}%`,
          boxSizing: "border-box",

          background,
          textAlign: "center",
          fontWeight: 600,
          outline: "none",
          padding: 0,

        return (
          <div
