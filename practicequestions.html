          return <>Identify the number of beats for the note marked in <strong>bar {question.rhythmIdentificationTarget.barIndex + 1}</strong>.</>;
        }
        return part.prompt;
      }

      function questionAudioGlyph(part) {
        const sourceId = part.sourceId ?? part.id;
        if (!showAudioQuestionGlyphs || !AUDIO_PRACTICE_QUESTION_TYPE_IDS.has(sourceId)) return null;
        return <AudioQuestionGlyph />;
      }

      function HigherChordQuestionGuide({ part }) {
        if (part.type === "ahChord") {
          return null;
        }
        if (part.type !== "higherChord" || question.level !== "H") return null;
        const keyName = KEY_ANSWERS[question.key.id]?.label ?? question.key.id;
        const partResult = results[part.id];
        const guideColour = partResult ? (partResult.correct ? "text-green-700" : "text-red-700") : "text-black";
        return (
          <div className={`ml-[48px] mt-1 max-w-none ${guideColour}`}>
            <div className="flex items-start gap-6">
              <div className="grid w-fit grid-cols-[52px_92px] gap-x-1 gap-y-0 text-base font-semibold leading-[0.84]">
                {higherChordOptionPairs(question).map((option) => (
                  <React.Fragment key={option.symbol}>
                    <span>{option.shortName}</span>
                    <span>Chord {option.symbol}</span>
                  </React.Fragment>
                ))}
              </div>
            </div>
            <div className="mt-1 flex flex-nowrap items-baseline gap-x-6">
              <p className="shrink-0 text-base font-semibold leading-tight">The key of the music is <strong>{keyNameWithMusicAccidentals(keyName)}</strong>.</p>
              <p className="whitespace-nowrap text-sm font-medium italic text-stone-500">Insert your answers in the boxes provided in the score.</p>
            </div>
          </div>
        );
      }

      function questionBlock(part, index, compact = false) {
        const partResult = results[part.id];
        const revealed = Boolean(partResult);
        const feedbackColour = revealed ? (partResult.correct ? "text-green-700" : "text-red-700") : "text-stone-950";
        const answer = answerControl(part, index);
        const nextQuestionButton = finalFeedbackNextQuestionButton(part, index);
        const scoreDirectAnswerHint = !answer && !feedback && part.type !== "higherChord"
          ? <p className="text-sm font-medium italic text-stone-500">Use the score above to enter your answer.</p>
          : null;
        const content = (
          <>
            <p className={`${part.type === "higherChord" ? "mb-1" : "mb-3"} grid grid-cols-[36px_1fr] items-baseline gap-x-3 text-base font-semibold leading-tight ${feedbackColour}`}>
              <span>({part.label})</span>
              <span className="relative top-px flex min-w-0 flex-wrap items-center gap-x-3 gap-y-2">
                <span>{questionPrompt(part)}{questionAudioGlyph(part)}{questionFeedbackIcon(part.id)}</span>
                {!answer && nextQuestionButton}
              </span>
            </p>
            <HigherChordQuestionGuide part={part} />
            {scoreDirectAnswerHint && <div className="ml-[48px]">{scoreDirectAnswerHint}</div>}
            <div className="ml-[48px] flex flex-col gap-2 sm:flex-row sm:items-end">
              <div className="min-w-0">{answer}</div>
              {revealed && part.type === "text" && !partResult.correct && (
                <p className="text-base font-semibold text-green-700 sm:self-center sm:whitespace-nowrap">{part.feedbackAnswer ?? part.answer}</p>
              )}
              {answer && nextQuestionButton}
            </div>
          </>
        );

        if (!compact) return <div key={part.id} ref={(node) => { if (node) questionRefs.current[part.id] = node; }}>{content}</div>;

        return (
          <div key={part.id} ref={(node) => { if (node) questionRefs.current[part.id] = node; }} className="pb-2 last:pb-0 transition-colors">
            {content}
          </div>
        );
      }

      function goToPrevious() {
        setActiveIndex((current) => Math.max(0, current - 1));
      }

      function goToNext() {
        setActiveIndex((current) => Math.min(totalParts - 1, current + 1));
      }

      return (
        <section className="relative z-10 mt-[10px] rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md md:mx-3">
          <div className="relative mb-3 flex flex-wrap items-center justify-between gap-3 border-b border-stone-200 px-1 pb-3 md:flex-nowrap">
            <div className={`flex flex-wrap items-center gap-3 ${playsAvailable ? "" : "opacity-45 grayscale"}`}>
              <button
                type="button"
                disabled={!playsAvailable}
                onClick={onPlayClick}
                className={window.MLH.PlayButtonClass}
                aria-label={isPlaying ? "Stop audio" : "Play audio"}
              >
                <span className="text-lg leading-none">{isPlaying ? "■" : "▶"}</span>
                <span>{isPlaying ? "Stop" : "Play"}</span>
              </button>
              {limitPlays && <div className="text-[11px] font-semibold leading-none text-stone-500 sm:text-[12px]">Remaining: {playsRemaining}</div>}
            </div>
            <div className="flex items-center justify-center gap-2 md:absolute md:left-1/2 md:top-1/2 md:-mt-[5px] md:-translate-x-1/2 md:-translate-y-1/2">
              <button
                type="button"
                onClick={goToPrevious}
                disabled={viewAllQuestions || activeIndex === 0}
                className={`${window.MLH.shell.toolbarButtonClass} !w-[65px] shrink-0 justify-center p-0 disabled:opacity-35`}
                aria-label="Previous question"
              >
                <img src={ASSET.next} alt="" aria-hidden="true" className="h-[24px] w-[24px] rotate-180 object-contain" />
              </button>
              <button
                type="button"
                onClick={() => setViewAllQuestions((current) => !current)}
                className={`${window.MLH.shell.toolbarButtonClass} practice-view-toggle ${viewAllQuestions ? "open" : ""} gap-1 px-3`}
                aria-expanded={viewAllQuestions}
                aria-label={viewAllQuestions ? "Show one question" : "View all questions"}
              >
                <span className="practice-view-toggle-label">{viewAllQuestions ? "All Questions" : `Question ${activeIndex + 1} of ${totalParts}`}</span>
                <ChevronIcon expanded={viewAllQuestions} />
              </button>
              <button
                type="button"
                onClick={goToNext}
                disabled={viewAllQuestions || activeIndex === totalParts - 1}
                className={`${window.MLH.shell.toolbarButtonClass} !w-[65px] shrink-0 justify-center p-0 disabled:opacity-35`}
                aria-label="Next question"
              >
                <img src={ASSET.next} alt="" aria-hidden="true" className="h-[24px] w-[24px] object-contain" />
              </button>
            </div>
            <div className={`${window.MLH.ActionButtonGroupClass} md:ml-auto`}>
              <button type="button" disabled={Boolean(feedback) || (viewAllQuestions ? !hasAnyAnswer() : !activePartHasAnswer())} onClick={() => viewAllQuestions ? clearAllQuestions() : clearSubquestion(activePart)} className={window.MLH.ClearButtonClass}>
                Clear
              </button>
              <window.MLH.ConfirmButton disabled={Boolean(feedback) || !canConfirm} onClick={onConfirm} className={window.MLH.AudioConfirmButtonClass}>
                Confirm
              </window.MLH.ConfirmButton>
            </div>
          </div>
          <div className={`overflow-hidden p-3 transition-[max-height,opacity,transform] duration-[180ms] ease-[ease] ${viewAllQuestions ? "min-h-[132px] max-h-[760px]" : "min-h-[112px] max-h-[170px]"}`}>
            {viewAllQuestions ? (
              <div
                key="all-questions"
                style={{ animation: "questionViewExpandIn .18s ease-out" }}
              >
                <div className="space-y-2">
                  {question.subquestions.map((part, index) => questionBlock(part, index, true))}
                </div>
              </div>
            ) : (
              <div className="relative min-h-[112px]">
                {exitingPart && (
                  <div
                    key={`from-${carousel.key}-${exitingPart.id}`}
                    className="pointer-events-none absolute inset-x-0 top-0"
                    style={{ animation: `${carousel.direction === "next" ? "questionSlideOutToLeft" : "questionSlideOutToRight"} .22s ease forwards` }}
                  >
                    {questionBlock(exitingPart, carousel.fromIndex)}
                  </div>
                )}
                <div
                  key={`to-${carousel.key}-${displayedPart.id}`}
                  className={exitingPart ? "absolute inset-x-0 top-0" : ""}
                  style={{ animation: exitingPart ? `${carousel.direction === "next" ? "questionSlideInFromRight" : "questionSlideInFromLeft"} .22s ease forwards` : "questionViewCollapseIn .18s ease-out" }}
                >
                  {questionBlock(displayedPart, carousel.toIndex)}
                </div>
              </div>
            )}
          </div>
          {prompt && <p className="mt-3 text-sm font-medium text-red-700">{prompt}</p>}
        </section>
      );
    }

    function App() {
      useStyles();
      const initialLevel = useMemo(() => {
        const requested = new URLSearchParams(window.location.search).get("level");
        return LEVELS[requested] ? requested : "AH";
      }, []);
      const [activeLevel, setActiveLevel] = useState(initialLevel);
      const [tempo, setTempo] = useState("medium");
      const [metronomeOn, setMetronomeOn] = useState(false);
      const [followPlayback, setFollowPlayback] = useState(false);
      const [enabledQuestionTypes, setEnabledQuestionTypes] = useState(() => defaultPracticeQuestionTypesForLevel(initialLevel));
      const [question, setQuestion] = useState(() => makeQuestion(initialLevel, 0, defaultPracticeQuestionTypesForLevel(initialLevel)));
      const [userNotes, setUserNotes] = useState({});
      const [practiceAnswers, setPracticeAnswers] = useState({});
      const [activePracticePart, setActivePracticePart] = useState(0);
      const [hoverNote, setHoverNote] = useState(null);
      const [feedback, setFeedback] = useState(null);
      const [feedbackFading, setFeedbackFading] = useState(false);
      const [visible, setVisible] = useState(true);
      const [showQuestionLoader, setShowQuestionLoader] = useState(false);
      const [score, setScore] = useState({ correct: 0, attempted: 0 });
      const [confettiKey, setConfettiKey] = useState(0);
      const [timerResetKey, setTimerResetKey] = useState(0);
      const [secondsRemaining, setSecondsRemaining] = useState(PRACTICE_TIMER_SECONDS);
      const [playsRemaining, setPlaysRemaining] = useState(PRACTICE_PLAYS_PER_QUESTION);
      const [limitPlays, setLimitPlays] = useState(true);
      const [timerEnabled, setTimerEnabled] = useState(true);
      const [showAudioQuestionGlyphs, setShowAudioQuestionGlyphs] = useState(false);
      const [timerPaused, setTimerPaused] = useState(false);
      const [newQuestionConfirmOpen, setNewQuestionConfirmOpen] = useState(false);
      const [incompleteSubmitConfirmOpen, setIncompleteSubmitConfirmOpen] = useState(false);
      const [menu, setMenu] = useState(null);
      const [prompt, setPrompt] = useState("");
      const [isPlaying, setIsPlaying] = useState(false);
      const [activeNoteId, setActiveNoteId] = useState(null);
      const audioRef = useRef(null);
      const timersRef = useRef([]);
      const nextTimer = useRef(null);
      const fadeTimer = useRef(null);
      const questionLoaderTimer = useRef(null);
      const pianoBufferCacheRef = useRef(new Map());
      const menuRef = useRef(null);
      const mainContainerRef = useRef(null);
      const scoreScrollRef = useRef(null);
      const previousScoreFocusRef = useRef(null);
      const [mainMinHeight, setMainMinHeight] = useState(null);
      const [scoreScrollFade, setScoreScrollFade] = useState({ top: false, bottom: false });

      useEffect(() => {
        const onPointerDown = (event) => {
          if (menuRef.current?.contains(event.target)) return;
          if (event.target.closest("[data-menu-panel],[data-menu-trigger]")) return;
          setMenu(null);
        };
        document.addEventListener("pointerdown", onPointerDown, true);
        return () => document.removeEventListener("pointerdown", onPointerDown, true);
      }, []);

      const selectedTempo = question.questionType === "practicePaper" && question.tempoQuestion
        ? {
          id: question.tempoQuestion.id,
          label: question.tempoQuestion.label,
          bpm: question.tempoBpm ?? question.tempoQuestion.bpm,
        }
        : question.questionType === "practicePaper" && question.tempoBpm
          ? {
            id: "practice-random",
            label: "Practice tempo",
            bpm: question.tempoBpm,
          }
        : TEMPOS.find((item) => item.id === (activeLevel === "AH" ? "slow" : tempo)) ?? TEMPOS[0];
      const beatSeconds = 60 / selectedTempo.bpm;
      const playbackBars = repeatPlaybackBars(question);
      const playbackTimeline = playbackBars.reduce((items, bar) => {
        const start = items.at(-1)?.end ?? 0;
        const duration = beatSeconds * timeSignatureForBar(question, bar).beats;
        return [...items, { start, end: start + duration, duration }];
      }, []);
      const totalDuration = playbackTimeline.at(-1)?.end ?? 0;
      const practiceReviewMode = question.questionType === "practicePaper" && Boolean(feedback);
      useEffect(() => {
        setSecondsRemaining(PRACTICE_TIMER_SECONDS);
        setTimerPaused(false);
      }, [timerResetKey]);

      useEffect(() => {
        if (!timerEnabled || timerPaused || practiceReviewMode) return undefined;
        const timer = window.setInterval(() => {
          setSecondsRemaining((current) => Math.max(0, current - 1));
        }, 1000);
        return () => window.clearInterval(timer);
      }, [timerEnabled, timerPaused, practiceReviewMode]);

      useEffect(() => {
        if (!timerEnabled || timerPaused || practiceReviewMode || secondsRemaining > 0) return;
        submitPracticeQuestion({ requireComplete: false });
      }, [secondsRemaining, timerEnabled, timerPaused, practiceReviewMode]);

      useEffect(() => {
        if (!timerEnabled) setTimerPaused(false);
      }, [timerEnabled]);

      function clearTimers() {
        timersRef.current.forEach((timer) => window.clearTimeout(timer));
        timersRef.current = [];
        window.clearTimeout(nextTimer.current);
        window.clearTimeout(fadeTimer.current);
        window.clearTimeout(questionLoaderTimer.current);
      }

      function clearFeedbackTimers() {
        window.clearTimeout(nextTimer.current);
        window.clearTimeout(fadeTimer.current);
      }

      function stopAudio(resetElapsed = true) {
        clearTimers();
        if (audioRef.current) {
          try { audioRef.current.close(); } catch {}
        }
        audioRef.current = null;
        setIsPlaying(false);
        setActiveNoteId(null);
      }

      function newQuestion(level = activeLevel, questionTypes = enabledQuestionTypes) {
        stopAudio();
        let nextQuestion;
        try {
          nextQuestion = makeQuestion(level, 0, questionTypes);
        } catch (error) {
          console.error(error);
          setPrompt("A question could not be generated. Press Skip to try again.");
          return;
        }
        scrollPracticeScore("top", "auto");
        const currentMainHeight = mainContainerRef.current?.getBoundingClientRect().height;
        if (currentMainHeight) setMainMinHeight(currentMainHeight);
        setVisible(false);
        setShowQuestionLoader(false);
        window.clearTimeout(questionLoaderTimer.current);
        questionLoaderTimer.current = window.setTimeout(() => setShowQuestionLoader(true), 120);
        setIncompleteSubmitConfirmOpen(false);
        window.setTimeout(() => {
          window.clearTimeout(questionLoaderTimer.current);
          setShowQuestionLoader(false);
          setQuestion(nextQuestion);
          setUserNotes({});
          setPracticeAnswers({});
          setActivePracticePart(0);
          setHoverNote(null);
          setFeedback(null);
          setFeedbackFading(false);
          setPrompt("");
          setPlaysRemaining(PRACTICE_PLAYS_PER_QUESTION);
          setVisible(true);
          window.requestAnimationFrame(() => scrollPracticeScore("top", "auto"));
          window.setTimeout(() => setMainMinHeight(null), 320);
        }, 220);
      }

      function startFreshQuestion() {
        setScore({ correct: 0, attempted: 0 });
        setTimerResetKey((value) => value + 1);
        setPlaysRemaining(PRACTICE_PLAYS_PER_QUESTION);
        newQuestion();
      }

      function startFreshQuestionFromFeedback() {
        window.scrollTo({ top: 0, behavior: "smooth" });
        startFreshQuestion();
      }

      function hasQuestionProgress() {
        const hasTypedOrSelectedAnswer = Object.values(practiceAnswers).some((value) => String(value ?? "").trim());
        const hasPlacedNotes = Object.keys(userNotes).length > 0;
        const hasPlacedDynamic = Boolean(question.placedDynamic);
        const hasSelectedMelody = question.selectedOptionIndex !== null && question.selectedOptionIndex !== undefined;
        return hasTypedOrSelectedAnswer || hasPlacedNotes || hasPlacedDynamic || hasSelectedMelody;
      }

      function advanceAfterFeedback() {
        if (!feedback) return;
        clearFeedbackTimers();
        setFeedbackFading(true);
        nextTimer.current = window.setTimeout(() => newQuestion(), 180);
      }

      function applyLevel(level) {
        setMenu(null);
        if (level === activeLevel) return;
        const nextQuestionTypes = defaultPracticeQuestionTypesForLevel(level);
        setActiveLevel(level);
        setEnabledQuestionTypes(nextQuestionTypes);
        setScore({ correct: 0, attempted: 0 });
        setTimerResetKey((value) => value + 1);
        const url = new URL(window.location.href);
        url.searchParams.set("level", level);
        window.history.replaceState(null, "", url.toString());
        newQuestion(level, nextQuestionTypes);
      }

      function toggleQuestionType(typeId) {
        setEnabledQuestionTypes((current) => {
          const enabledCount = Object.values(current).filter(Boolean).length;
          if (current[typeId] && enabledCount <= 6) return current;
          const next = { ...current, [typeId]: !current[typeId] };
          if (!canBuildPracticeQuestionSelection(next, activeLevel)) return current;
          stopAudio();
          setScore({ correct: 0, attempted: 0 });
          setTimerResetKey((value) => value + 1);
          setPlaysRemaining(PRACTICE_PLAYS_PER_QUESTION);
          setQuestion(makeQuestion(activeLevel, 0, next));
          setUserNotes({});
          setPracticeAnswers({});
          setActivePracticePart(0);
          setHoverNote(null);
          setFeedback(null);
          setFeedbackFading(false);
          setPrompt("");
          return next;
        });
      }

      function clearUserNotes() {
        if (feedback) return;
        if (question.questionType === "practicePaper") {
          setUserNotes({});
          setPracticeAnswers({});
          setQuestion((current) => ({ ...current, placedDynamic: null }));
          return;
        }
        if (question.questionType === "identifyMelody") {
          setQuestion((current) => ({ ...current, selectedOptionIndex: null }));
          setPrompt("");
          return;
        }
        setUserNotes({});
      }

      function textAnswerCorrect(value, accepts = []) {
        const answer = cleanAnswer(value);
        const compact = answer.replace(/\s+/g, "");
        return accepts.some((accepted) => {
          const cleanAccepted = cleanAnswer(accepted);
          return answer === cleanAccepted || compact === cleanAccepted.replace(/\s+/g, "");
        });
      }

      function rhythmFixExactAnswerCorrect(placements, target = question.rhythmFixTarget) {
        const expected = target?.targetRhythms ?? {};
        return Object.entries(expected).every(([index, rhythm]) => placements[index] === rhythm);
      }

      function rhythmFixAcceptsSingleDottedRest(placements, target = question.rhythmFixTarget) {
        if (target?.variant !== "rests") return false;
        const noteIndices = target.noteIndices ?? [];
        if (noteIndices.length !== 2) return false;
        const expectedRhythms = noteIndices.map((index) => target.targetRhythms?.[index]);
        const expectedBeats = expectedRhythms.reduce((total, rhythm) => total + (rhythm ? rhythmInfo(rhythm).beats : 0), 0);
        if (Math.abs(expectedBeats - rhythmInfo("dottedCrotchetRest").beats) > 0.001) return false;
        const placedEntries = Object.entries(placements).filter(([, rhythm]) => rhythm);
        return placedEntries.length === 1
          && noteIndices.includes(Number(placedEntries[0][0]))
          && placedEntries[0][1] === "dottedCrotchetRest";
      }

      function rhythmFixAnswerComplete(placements, target = question.rhythmFixTarget) {
        return rhythmFixExactAnswerCorrect(placements, target) || rhythmFixAcceptsSingleDottedRest(placements, target);
      }

      function practiceQuestionComplete() {
        const target = question.bars[question.targetBar];
        const requiresMissing = question.subquestions.some((part) => part.type === "notes");
        const requiresIntervalInsert = question.subquestions.some((part) => part.type === "intervalInsert");
        const requiresDynamic = question.subquestions.some((part) => part.type === "dynamic");
        const missingNoteIndices = missingNoteIndicesForQuestion(question);
        const missingComplete = !requiresMissing || (Boolean(target?.notes?.length) && missingNoteIndices.every((index) => Boolean(userNoteAt(userNotes, question.targetBar, index))));
        const intervalInsertComplete = !requiresIntervalInsert || Boolean(userNoteAt(userNotes, question.intervalInsertTarget?.barIndex, question.intervalInsertTarget?.answerIndex));
        const textComplete = question.subquestions
          .filter((part) => part.type === "text")
          .every((part) => String(practiceAnswers[part.id] ?? "").trim());
        const choicesComplete = question.subquestions
          .filter((part) => part.type === "timeChoice" || part.type === "choice")
          .every((part) => String(practiceAnswers[part.id] ?? "").trim());
        const dynamicComplete = !requiresDynamic || question.subquestions
          .filter((part) => part.type === "dynamic")
          .every((part) => Boolean(question.placedDynamic || practiceAnswers[part.id]));
        const repeatComplete = question.subquestions
          .filter((part) => part.type === "repeat")
          .every((part) => (makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements?.length ?? 0) >= 1);
        const barlineComplete = question.subquestions
          .filter((part) => part.type === "barlines")
          .every((part) => makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements?.length >= (question.barlineTargets?.length ?? 0));
        const rhythmComplete = question.subquestions
          .filter((part) => part.type === "rhythm")
          .every((part) => Object.keys(makePlacementAnswer(practiceAnswers[part.id], { placements: {} }).placements ?? {}).length >= (question.rhythmTargetPattern?.length ?? 0));
        const rhythmFixComplete = question.subquestions
          .filter((part) => part.type === "rhythmFix")
          .every((part) => {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: {} }).placements ?? {};
            if (question.rhythmFixTarget?.variant === "ahLongInsert") {
              return Object.keys(question.rhythmFixTarget.targetRhythms ?? {}).every((key) => placements[key]);
            }
            if (question.rhythmFixTarget?.variant === "ahTripletInsert") {
              return Object.keys(question.rhythmFixTarget.targetRhythms ?? {}).every((key) => placements[key]);
            }
            if (question.rhythmFixTarget?.variant === "ahTie") {
              return Object.values(placements).some((value) => value === "tie");
            }
            return rhythmFixAnswerComplete(placements);
          });
        const scotchSnapComplete = question.subquestions
          .filter((part) => part.type === "scotchSnap")
          .every((part) => Boolean(makePlacementAnswer(practiceAnswers[part.id], { selected: null }).selected));
        const accidentalComplete = question.subquestions
          .filter((part) => part.type === "accidentalPlacement")
          .every((part) => Boolean(makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements?.length));
        const articulationComplete = question.subquestions
          .filter((part) => part.type === "articulationPlacement")
          .every((part) => Boolean(makePlacementAnswer(practiceAnswers[part.id], { selectedMarkingId: null }).selectedMarkingId));
        const tripletComplete = question.subquestions
          .filter((part) => part.type === "tripletPlacement")
          .every((part) => Boolean(makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements?.length));
        const transpositionComplete = question.subquestions
          .filter((part) => part.type === "transposition")
          .every((part) => {
            const notes = makePlacementAnswer(practiceAnswers[part.id], { notes: {} }).notes ?? {};
            return (question.transpositionTarget?.answerNotes ?? []).every((note, index) => !note || note.rest || notes[index]);
          });
        const enharmonicComplete = question.subquestions
          .filter((part) => part.type === "enharmonic")
          .every((part) => Boolean(makePlacementAnswer(practiceAnswers[part.id], { note: null }).note));
        const advancedHigherChordComplete = question.subquestions
          .filter((part) => part.type === "ahChord")
          .every((part) => {
            const answer = makePlacementAnswer(practiceAnswers[part.id], { chordAnswers: {} });
            const identifySlots = question.advancedHigherChordTarget?.identifySlots ?? [];
            return identifySlots.every((slot) => {
              const slotAnswer = answer.chordAnswers?.[slot.slotIndex];
              return String(advancedHigherChordAnswerValue(slotAnswer)).trim()
                && String(advancedHigherInversionAnswerValue(slotAnswer)).trim();
            });
          });
        const advancedHigherBassLineComplete = question.subquestions
          .filter((part) => part.type === "ahBassLine")
          .every((part) => {
            const answer = makePlacementAnswer(practiceAnswers[part.id], { bassNotes: {} });
            const bassLineSlots = question.advancedHigherChordTarget?.bassLineSlots ?? [];
            return bassLineSlots.every((slot) => answer.bassNotes?.[slot.slotIndex]);
          });
        const higherChordComplete = question.subquestions
          .filter((part) => part.type === "higherChord")
          .every((part) => {
            const answers = makePlacementAnswer(practiceAnswers[part.id], { answers: {} }).answers ?? {};
            return (question.higherChordTargets ?? []).every((barIndex) => String(answers[barIndex] ?? "").trim());
          });
        return missingComplete && intervalInsertComplete && textComplete && choicesComplete && dynamicComplete && repeatComplete && barlineComplete && rhythmComplete && rhythmFixComplete && scotchSnapComplete && accidentalComplete && articulationComplete && tripletComplete && transpositionComplete && enharmonicComplete && advancedHigherChordComplete && advancedHigherBassLineComplete && higherChordComplete;
      }

      function submitPracticeQuestion({ requireComplete = true } = {}) {
        if (feedback || question.questionType !== "practicePaper") return;
        if (requireComplete && !practiceQuestionComplete()) {
          return;
        }

        setIncompleteSubmitConfirmOpen(false);
        stopAudio();
        const target = question.bars[question.targetBar];
        const results = {};
        question.subquestions.forEach((part) => {
          if (part.type === "text") {
            results[part.id] = { correct: textAnswerCorrect(practiceAnswers[part.id], part.accepts) };
            return;
          }
          if (part.type === "timeChoice") {
            results[part.id] = { correct: practiceAnswers[part.id] === part.answer };
            return;
          }
          if (part.type === "choice") {
            results[part.id] = { correct: practiceAnswers[part.id] === part.answer };
            return;
          }
          if (part.type === "notes") {
            const missingNoteIndices = missingNoteIndicesForQuestion(question);
            results[part.id] = { correct: missingNoteIndices.every((index) => userNoteAt(userNotes, question.targetBar, index)?.step === target.notes[index]?.step) };
            return;
          }
          if (part.type === "intervalInsert") {
            const answerIndex = question.intervalInsertTarget?.answerIndex;
            results[part.id] = { correct: userNoteAt(userNotes, question.intervalInsertTarget?.barIndex, answerIndex)?.step === question.intervalInsertTarget?.answerNote?.step };
            return;
          }
          if (part.type === "dynamic") {
            const selectedDynamicId = question.placedDynamic?.id ?? practiceAnswers[part.id];
            results[part.id] = { correct: dynamicAnswerIsAccepted(selectedDynamicId, question.dynamic.id) };
            return;
          }
          if (part.type === "repeat") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements ?? [];
            const expected = (question.repeatTarget?.placements ?? [question.repeatTarget]).map(repeatPlaceKey).sort().join(",");
            const actual = placements.map(repeatPlaceKey).sort().join(",");
            results[part.id] = { correct: expected === actual };
            return;
          }
          if (part.type === "barlines") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements ?? [];
            const expected = question.barlineTargets?.map((item) => `${item.barIndex}:end`).sort().join(",");
            const actual = placements.map((item) => `${item.barIndex}:${item.slot ?? "end"}`).sort().join(",");
            results[part.id] = { correct: expected === actual };
            return;
          }
          if (part.type === "tripletPlacement") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements ?? [];
            const expected = question.tripletTarget;
            results[part.id] = {
              correct: placements.some((placement) => (
                expected
                && tripletPlacementKey(placement) === tripletPlacementKey(expected)
                && placement.tripletKind === expected.tripletKind
              )),
            };
            return;
          }
          if (part.type === "rhythm") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: {} }).placements ?? {};
            results[part.id] = { correct: (question.rhythmTargetPattern ?? []).every((rhythm, index) => placements[index] === rhythm) };
            return;
          }
          if (part.type === "rhythmFix") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: {} }).placements ?? {};
            results[part.id] = { correct: rhythmFixAnswerComplete(placements) };
            return;
          }
          if (part.type === "scotchSnap") {
            const selected = makePlacementAnswer(practiceAnswers[part.id], { selected: null }).selected;
            const sourceId = part.sourceId ?? part.id;
            const circleTarget = sourceId === "noteIdentification"
              ? question.noteValueCircleTarget
              : sourceId === "scaleDegrees"
                ? question.scaleDegreeTarget
                : sourceId === "triplets"
                  ? question.tripletTarget
                  : question.rhythmIdentificationTarget;
            results[part.id] = {
              correct: sourceId === "scaleDegrees"
                ? scaleDegreeSelectionCorrect(question, selected)
                : sameScotchSelection(selected, circleTarget),
            };
            return;
          }
          if (part.type === "accidentalPlacement") {
            const placements = makePlacementAnswer(practiceAnswers[part.id], { placements: [] }).placements ?? [];
            const expected = accidentalPlacementKey({
              symbolId: question.accidentalTarget?.symbolId,
              barIndex: question.accidentalTarget?.barIndex,
              noteIndex: question.accidentalTarget?.noteIndex,
            });
            results[part.id] = { correct: placements.some((placement) => accidentalPlacementKey(placement) === expected) };
            return;
          }
          if (part.type === "articulationPlacement") {
            const answer = makePlacementAnswer(practiceAnswers[part.id], { selectedMarkingId: null });
            results[part.id] = { correct: answer.selectedMarkingId === question.articulationTarget?.marking?.id };
            return;
          }
          if (part.type === "transposition") {
            const answer = makePlacementAnswer(practiceAnswers[part.id], { notes: {}, ties: {} });
            const answerClef = question.transpositionTarget?.answerClef ?? "bass";
            const correctNotes = (question.transpositionTarget?.answerNotes ?? []).every((expected, index) => {
              if (!expected) return true;
              const actual = answer.notes?.[index];
              return transpositionNoteAnswerCorrect(actual, expected, answerClef);
            });
            const expectedTies = Object.fromEntries((question.bars[question.transpositionTarget?.barIndex]?.notes ?? []).map((note, index) => [index, Boolean(note.tieToNext)]));
            const correctTies = Object.entries(expectedTies).every(([index, expected]) => Boolean(answer.ties?.[index]) === expected);
            results[part.id] = { correct: correctNotes && correctTies };
            return;
          }
          if (part.type === "enharmonic") {
            const actual = makePlacementAnswer(practiceAnswers[part.id], { note: null }).note;
            const expected = question.enharmonicTarget?.answerNote;
            results[part.id] = {
              correct: Boolean(actual && expected && actual.step === expected.step && actual.writtenAccidental === expected.writtenAccidental),
            };
            return;
          }
          if (part.type === "ahChord") {
            const answer = makePlacementAnswer(practiceAnswers[part.id], { chordAnswers: {} });
            const identifyCorrect = (question.advancedHigherChordTarget?.identifySlots ?? []).every((slot) => (
              advancedHigherChordAnswerCorrect(answer.chordAnswers?.[slot.slotIndex], slot)
            ));
            results[part.id] = { correct: identifyCorrect };
            return;
          }
          if (part.type === "ahBassLine") {
            const answer = makePlacementAnswer(practiceAnswers[part.id], { bassNotes: {} });
            const bassCorrect = (question.advancedHigherChordTarget?.bassLineSlots ?? []).every((slot) => {
              const actual = answer.bassNotes?.[slot.slotIndex];
              return Boolean(actual && actual.letter === slot.bassNote.letter);
            });
            results[part.id] = { correct: bassCorrect };
            return;
          }
          if (part.type === "higherChord") {
            const answers = makePlacementAnswer(practiceAnswers[part.id], { answers: {} }).answers ?? {};
            results[part.id] = {
              correct: (question.higherChordTargets ?? []).every((barIndex) => higherChordAnswerCorrect(answers[barIndex], question, barIndex)),
            };
          }
        });
        const totalCorrect = Object.values(results).filter((result) => result.correct).length;
        const revealDelayMs = 500;
        const allCorrect = totalCorrect === question.subquestions.length;
        setScore({ correct: 0, attempted: 0 });
        setFeedback({ correct: allCorrect, results: {}, totalCorrect, revealing: true, revealingPartId: null });
        setFeedbackFading(false);
        setPrompt("");
        setActivePracticePart(0);

        question.subquestions.forEach((part, index) => {
          const revealTimer = window.setTimeout(() => {
            const partResult = results[part.id] ?? { correct: false };
            const isFinalReveal = index === question.subquestions.length - 1;

            playSound(Boolean(partResult.correct));

            setScore((current) => ({
              correct: current.correct + (partResult.correct ? 1 : 0),
              attempted: Math.min(question.subquestions.length, current.attempted + 1),
            }));
            setFeedback((current) => {
              if (!current) return current;
              return {
                ...current,
                results: { ...current.results, [part.id]: partResult },
                revealing: !isFinalReveal,
                revealingPartId: part.id,
              };
            });

            if (isFinalReveal && allCorrect) {
              setConfettiKey((value) => value + 1);
              const fanfareTimer = window.setTimeout(() => playSound(true, true, "bronze"), 260);
              timersRef.current.push(fanfareTimer);
            }
          }, index * revealDelayMs);
          timersRef.current.push(revealTimer);
        });
      }

      function confirmPracticeQuestion() {
        if (question.level === "H" && !practiceQuestionComplete()) {
          setIncompleteSubmitConfirmOpen(true);
          return;
        }
        submitPracticeQuestion({ requireComplete: true });
      }

      function confirmAnswer() {
        if (feedback) return;
        if (question.questionType === "practicePaper") {
          confirmPracticeQuestion();
          return;
        }
        if (question.questionType === "identifyMelody") {
          if (question.selectedOptionIndex === null) {
            setPrompt("Select one melody first.");
            return;
          }
          stopAudio();
          const correct = question.selectedOptionIndex === question.answerIndex;
          setScore((current) => {
            return {
              correct: current.correct + (correct ? 1 : 0),
              attempted: current.attempted + 1,
            };
          });
          playSound(correct);
          setFeedback({ correct });
          setFeedbackFading(false);
          setPrompt("");
          if (correct) {
            fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
            nextTimer.current = window.setTimeout(() => newQuestion(), 2050);
          }
          return;
        }
        const target = question.bars[question.targetBar];
        const missingNoteIndices = missingNoteIndicesForQuestion(question);
        if (missingNoteIndices.some((index) => !userNoteAt(userNotes, question.targetBar, index))) {
          return;
        }
        stopAudio();
        const correct = missingNoteIndices.every((index) => userNoteAt(userNotes, question.targetBar, index)?.step === target.notes[index]?.step);
        setScore((current) => {
          return {
            correct: current.correct + (correct ? 1 : 0),
            attempted: current.attempted + 1,
          };
        });
        playSound(correct);
        setFeedback({ correct });
        setFeedbackFading(false);
        setPrompt("");
        if (correct) {
          fadeTimer.current = window.setTimeout(() => setFeedbackFading(true), 1700);
          nextTimer.current = window.setTimeout(() => newQuestion(), 2050);
        }
      }

      function selectMelodyOption(index) {
        if (feedback) return;
        setQuestion((current) => current.questionType === "identifyMelody" ? { ...current, selectedOptionIndex: index } : current);
        setPrompt("");
      }

      function placeDynamic(dynamic) {
        if (feedback) return;
        setQuestion((current) => current.questionType === "practicePaper" ? { ...current, placedDynamic: dynamic } : current);
        setPrompt("");
      }

      function oscillator(ctx, gainNode, frequency, start, duration, volume = 0.035, type = "sine", release = 0.08) {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(frequency, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(volume, start + 0.03);
        gain.gain.setValueAtTime(volume * 0.92, start + Math.max(0.04, duration));
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + release);
        osc.connect(gain);
        gain.connect(gainNode);
        osc.start(start);
        osc.stop(start + duration + release + 0.02);
      }

      const PIANO_SAMPLE_BASE_PATH = "./piano%20audio/";

      function choosePianoLayer(midi, velocity = 96) {
        const layers = window.MLH_PIANO_SAMPLE_MAP?.notes?.[String(Math.round(midi))] ?? [];
        if (!layers.length) return null;
        const exactLayer = layers.find((layer) => velocity >= layer.loVel && velocity <= layer.hiVel);
        if (exactLayer) return exactLayer;
        return [...layers].sort((a, b) => {
          const aCentre = (a.loVel + a.hiVel) / 2;
          const bCentre = (b.loVel + b.hiVel) / 2;
          return Math.abs(velocity - aCentre) - Math.abs(velocity - bCentre);
        })[0];
      }

      async function loadPianoSample(ctx, sample) {
        const cache = pianoBufferCacheRef.current;
        if (cache.has(sample)) return cache.get(sample);
        const request = fetch(`${PIANO_SAMPLE_BASE_PATH}${encodeURIComponent(sample)}`)
          .then((response) => {
            if (!response.ok) throw new Error(`Could not load ${sample}`);
            return response.arrayBuffer();
          })
          .then((arrayBuffer) => ctx.decodeAudioData(arrayBuffer));
        cache.set(sample, request);
        try {
          const buffer = await request;
          cache.set(sample, buffer);
          return buffer;
        } catch (error) {
          cache.delete(sample);
          throw error;
        }
      }

      async function preloadPianoSamples(ctx, layers) {
        const uniqueSamples = [...new Set(layers.map((layer) => layer?.sample).filter(Boolean))];
        if (!uniqueSamples.length) return false;
        try {
          await Promise.all(uniqueSamples.map((sample) => loadPianoSample(ctx, sample)));
          return true;
        } catch {
          return false;
        }
      }

      function playPianoMidi(ctx, gainNode, midi, start, duration, velocity = 96, volume = 0.078, dynamicGain = 1, fallbackType = "triangle", fallbackRelease = 0.1) {
        const layer = choosePianoLayer(midi, velocity);
        const velocityGain = clamp(Math.pow(clamp(velocity, 1, 127) / 96, 1.35), 0.58, 1.34);
        const cached = layer ? pianoBufferCacheRef.current.get(layer.sample) : null;
        if (!cached || typeof cached.duration !== "number") {
          oscillator(ctx, gainNode, midiToFrequency(midi), start, duration, volume * dynamicGain * velocityGain, fallbackType, fallbackRelease);
          return;
        }
        const source = ctx.createBufferSource();
        const gain = ctx.createGain();
        const sampleGain = clamp(volume * 4 * dynamicGain * velocityGain * (layer.gain ?? 1), 0.0001, 0.55);
        source.buffer = cached;
        source.playbackRate.setValueAtTime(layer.rate ?? 1, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(sampleGain, start + 0.012);
        gain.gain.setValueAtTime(sampleGain * 0.94, start + Math.max(0.04, duration));
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration + fallbackRelease);
        source.connect(gain);
        gain.connect(gainNode);
        source.start(start);
        source.stop(start + duration + fallbackRelease + 0.06);
      }

      function playMetronome(ctx, gainNode, start, accented) {
        window.MLH?.playMetronomeClick?.(ctx, gainNode, start, accented);
      }

      function dynamicGainForBar(question, barIndex) {
        if (question.questionType !== "practicePaper" || !question.dynamic || !question.startingDynamic) return 1;
        const dynamicId = barIndex >= question.dynamicBar ? question.dynamic.id : question.startingDynamic.id;
        return DYNAMIC_AUDIO_GAIN[dynamicId] ?? 1;
      }

      function dynamicGainForPoint(question, barIndex, beat = 0) {
        if (question.questionType !== "practicePaper" || !question.dynamic || !question.startingDynamic) return 1;
        if (question.dynamicHairpin?.barIndex !== barIndex) return dynamicGainForBar(question, barIndex);
        const startGain = DYNAMIC_AUDIO_GAIN[question.startingDynamic.id] ?? 1;
        const endGain = DYNAMIC_AUDIO_GAIN[question.dynamic.id] ?? 1;
        const progress = clamp(beat / Math.max(1, timeSignatureForBar(question, barIndex).beats), 0, 1);
        return startGain + (endGain - startGain) * progress;
      }

      function dynamicVelocityForBar(question, barIndex) {
        if (question.questionType !== "practicePaper" || !question.dynamic || !question.startingDynamic) return 96;
        const dynamicId = barIndex >= question.dynamicBar ? question.dynamic.id : question.startingDynamic.id;
        return DYNAMIC_SAMPLE_VELOCITY[dynamicId] ?? 96;
      }

      function accompanimentVelocityForBar(question, barIndex) {
        return dynamicVelocityForBar(question, barIndex);
      }

      const ACCOMPANIMENT_MAX_MIDI = 72; // C5

      function lowerAccompanimentMidi(midi) {
        let adjusted = midi;
        while (adjusted > ACCOMPANIMENT_MAX_MIDI) adjusted -= 12;
        return adjusted;
      }

      function lowerAccompanimentMidiValues(midiOrValues) {
        return (Array.isArray(midiOrValues) ? midiOrValues.flat(Infinity) : [midiOrValues])
          .map(lowerAccompanimentMidi);
      }

      function accompanimentChordMidisForBar(question, bar) {
        const chordTypeNote = bar.notes?.find((note) => note?.chordTypeId && note.stack?.length);
        if (chordTypeNote) {
          return chordTypeNote.stack.map((tone) => effectiveMidiForStackTone(question, bar, tone));
        }
        const chordLetters = question.key.chords[bar.chordSymbol] ?? [];
        return chordLetters.map((letter, index) => pitchForChordLetter(question, bar, letter, 3 + index));
      }

      function playTempoAccompanimentPattern(ctx, gainNode, question, bar, barStart, offset, startTime, dynamicGain = 1, dynamicVelocity = 96) {
        const chordMidi = accompanimentChordMidisForBar(question, bar);
        if (!chordMidi.length) return;

        const meterInfo = classifyMeter(timeSignatureForBar(question, bar));
        const pattern = getPatternVariant(question.accompanimentPattern, meterInfo);
        const safePattern = validateAccompanimentPattern(pattern, meterInfo)
          ? pattern
          : getPatternVariant("bassChord", meterInfo);
        const accompanimentIsAccent = isAccentArticulationBar(question, bar);
        const accompanimentVelocity = dynamicVelocity + (accompanimentIsAccent ? ARTICULATION_ACCENT_VELOCITY_BOOST : 0);
        const accompanimentGainScale = accompanimentIsAccent ? ARTICULATION_ACCENT_GAIN_SCALE : 1;
        const rootMidi = chordMidi[0];
        const thirdMidi = chordMidi[1] ?? rootMidi;
        const fifthMidi = chordMidi[2] ?? rootMidi;
        const seventhMidi = chordMidi[3] ?? null;
        const tokenMidi = (token) => {
          const map = {
            lowRoot: rootMidi - 12,
            lowThird: thirdMidi - 12,
            lowFifth: fifthMidi - 12,
            root: rootMidi,
            third: thirdMidi,
            fifth: fifthMidi,
            seventh: seventhMidi ?? fifthMidi,
            octaveRoot: rootMidi + 12,
          };
          if (token === "chord") return chordMidi;
          if (token === "shell") return [rootMidi, thirdMidi, seventhMidi ?? fifthMidi];
          if (token === "power") return [rootMidi, fifthMidi];
          return map[token] ?? rootMidi;
        };
        const scheduleTone = (midi, beatOffset, beatDuration, volume, hand, velocity = accompanimentVelocity) => {
          if (beatOffset >= meterInfo.beatsPerBar) return;
          const durationBeats = Math.min(beatDuration, meterInfo.beatsPerBar - beatOffset);
          const eventStart = barStart + beatOffset * beatSeconds;
          const eventDuration = Math.max(0.04, durationBeats * beatSeconds);
          if (eventStart + eventDuration <= offset) return;
          const audibleStart = Math.max(eventStart, offset);
          const audibleDuration = Math.max(0.04, eventStart + eventDuration - audibleStart);
          const eventDynamicGain = (question.dynamicHairpin?.barIndex === bar.barIndex
            ? dynamicGainForPoint(question, bar.barIndex, beatOffset)
            : dynamicGain) * accompanimentGainScale;
          const fallbackType = hand === "LH" ? "sine" : "triangle";
          const release = hand === "LH" ? 0.08 : 0.06;
          playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi), startTime + audibleStart, audibleDuration, velocity, accompanimentVolume(volume), eventDynamicGain, fallbackType, release);
        };

        safePattern.forEach((event) => {
          const duration = accompanimentDurationBeats(event.duration, meterInfo);
          const eventVelocity = Math.round(((event.velocity ?? dynamicVelocity) + (accompanimentIsAccent ? ARTICULATION_ACCENT_VELOCITY_BOOST : 0)) * (meterInfo.groupStartBeats.some((beat) => Math.abs(event.time - beat) < 0.001) ? 1.04 : 1));
          lowerAccompanimentMidiValues(event.notes.flatMap(tokenMidi)).forEach((midi) => scheduleTone(midi, event.time, duration, event.volume ?? 0.016, event.hand, eventVelocity));
        });
      }

      function playAccompaniment(ctx, gainNode, question, bar, barStart, offset, startTime, dynamicGain = 1, dynamicVelocity = 96, finalPlaybackBar = false) {
        const barTimeSignature = timeSignatureForBar(question, bar);
        const currentBarSeconds = beatSeconds * barTimeSignature.beats;
        if (barStart + currentBarSeconds <= offset) return;
        const chordMidi = accompanimentChordMidisForBar(question, bar);
        if (!chordMidi.length) return;
        if (bar.barIndex !== question.bars.length - 1 && question.questionType === "practicePaper" && question.accompanimentPattern) {
          playTempoAccompanimentPattern(ctx, gainNode, question, bar, barStart, offset, startTime, dynamicGain, dynamicVelocity);
          return;
        }
        const accompanimentIsAccent = isAccentArticulationBar(question, bar);
        const accompanimentVelocity = dynamicVelocity + (accompanimentIsAccent ? ARTICULATION_ACCENT_VELOCITY_BOOST : 0);
        const accompanimentGainScale = accompanimentIsAccent ? ARTICULATION_ACCENT_GAIN_SCALE : 1;

        if (bar.barIndex === question.bars.length - 1 && question.questionType === "identifyMelody" && question.bars.length === 2) {
          const finalNote = [...bar.notes].reverse().find((note) => !note.rest);
          if (!finalNote) return;
          const chordStart = barStart + finalNote.beat * beatSeconds;
          const chordDuration = Math.max(0.04, Math.min(finalNote.beats * beatSeconds * 0.72, beatSeconds * 0.72));
          if (chordStart + chordDuration <= offset) return;
          const audibleStart = Math.max(chordStart, offset);
          const audibleDuration = Math.max(0.04, chordStart + chordDuration - audibleStart);
          const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, finalNote.beat) * accompanimentGainScale;
          chordMidi.forEach((midi, index) => {
            playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi), startTime + audibleStart, audibleDuration, accompanimentVelocity, accompanimentVolume(0.026), eventDynamicGain, "triangle", finalPlaybackBar ? 0.38 : 0.08);
            if (index === 0) playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi - 12), startTime + audibleStart, audibleDuration, accompanimentVelocity, accompanimentVolume(0.02), eventDynamicGain, "sine", finalPlaybackBar ? 0.38 : 0.08);
          });
          return;
        }

        if (bar.barIndex === question.bars.length - 1) {
          const chordStart = Math.max(barStart, offset);
          const chordDuration = Math.max(0.04, barStart + currentBarSeconds * 0.96 - chordStart);
          const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, 0) * accompanimentGainScale;
          chordMidi.forEach((midi, index) => {
            playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi), startTime + chordStart, chordDuration, accompanimentVelocity, accompanimentVolume(0.026), eventDynamicGain, "triangle", finalPlaybackBar ? 0.38 : 0.08);
            if (index === 0) playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi - 12), startTime + chordStart, chordDuration, accompanimentVelocity, accompanimentVolume(0.02), eventDynamicGain, "sine", finalPlaybackBar ? 0.38 : 0.08);
          });
          return;
        }

        const advancedHigherChordSlots = question.questionType === "practicePaper" && question.advancedHigherChordTarget
          ? bar.barIndex === question.advancedHigherChordTarget.identifyBar
            ? question.advancedHigherChordTarget.identifySlots ?? []
            : bar.barIndex === question.advancedHigherChordTarget.bassLineBar
              ? question.advancedHigherChordTarget.bassLineSlots ?? []
              : []
          : [];
        if (advancedHigherChordSlots.length) {
          advancedHigherChordSlots.forEach((slot) => {
            const slotStart = barStart + (slot.beat ?? 0) * beatSeconds;
            const slotDuration = Math.max(0.04, (slot.beats ?? 1) * beatSeconds * 0.88);
            if (slotStart + slotDuration <= offset) return;
            const audibleStart = Math.max(slotStart, offset);
            const audibleDuration = Math.max(0.04, slotStart + slotDuration - audibleStart);
            const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, slot.beat ?? 0) * accompanimentGainScale;
            const trebleMidis = (slot.trebleNote?.stack ?? []).map((tone) => effectiveMidiForNote(question, bar, tone));
            const bassMidis = (slot.bassNote?.stack ?? []).map((tone) => effectiveMidiForNote(question, bar, tone));
            [...trebleMidis, ...bassMidis].forEach((midi, index) => {
              const hand = index >= trebleMidis.length ? "sine" : "triangle";
              const volume = index >= trebleMidis.length ? 0.022 : 0.018;
              playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi), startTime + audibleStart, audibleDuration, accompanimentVelocity, accompanimentVolume(volume), eventDynamicGain, hand, 0.08);
            });
          });
          return;
        }

        const bassMidi = chordMidi[0] - 12;
        const bassStart = Math.max(barStart, offset);
        const bassDuration = Math.max(0.04, barStart + beatSeconds * 0.88 - bassStart);
        playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(bassMidi), startTime + bassStart, bassDuration, accompanimentVelocity, accompanimentVolume(0.024), dynamicGainForPoint(question, bar.barIndex, 0) * accompanimentGainScale, "sine", 0.06);

        if (barTimeSignature.id === "5/4") {
          [
            { beat: 1, type: "chord" },
            { beat: 2, type: "chord" },
            { beat: 3, type: "bass" },
            { beat: 4, type: "chord" },
          ].forEach((event) => {
            const pulseStart = barStart + event.beat * beatSeconds;
            const pulseDuration = beatSeconds * (event.type === "bass" ? 0.88 : 0.42);
            if (pulseStart + pulseDuration <= offset) return;
            const audibleStart = Math.max(pulseStart, offset);
            const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
            const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, event.beat) * accompanimentGainScale;
            if (event.type === "bass") {
              playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(bassMidi), startTime + audibleStart, audibleDuration, accompanimentVelocity, accompanimentVolume(0.024), eventDynamicGain, "sine", 0.06);
              return;
            }
            chordMidi.forEach((midi) => {
              playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi), startTime + audibleStart, audibleDuration, accompanimentVelocity, accompanimentVolume(0.018), eventDynamicGain, "triangle", 0.05);
            });
          });
          return;
        }

        if (barTimeSignature.id === "4/4") {
          const events = [
            { beat: 1, type: "chord" },
            { beat: 2, type: "bass5" },
            { beat: 3, type: "chord" },
          ];
          events.forEach((event) => {
            const pulseStart = barStart + event.beat * beatSeconds;
            const pulseDuration = beatSeconds * 0.42;
            if (pulseStart + pulseDuration <= offset) return;
            const audibleStart = Math.max(pulseStart, offset);
            const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
            const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, event.beat) * accompanimentGainScale;
            if (event.type === "bass5") {
              const fifthMidi = (chordMidi[1] ?? chordMidi[0]) - 12;
              playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(fifthMidi), startTime + audibleStart, audibleDuration, accompanimentVelocity, accompanimentVolume(0.024), eventDynamicGain, "sine", 0.06);
              return;
            }
            chordMidi.forEach((midi) => {
              playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi), startTime + audibleStart, audibleDuration, accompanimentVelocity, accompanimentVolume(0.018), eventDynamicGain, "triangle", 0.05);
            });
          });
          return;
        }

        const pulseBeats = barTimeSignature.id === "6/8"
          ? [1.5]
          : Array.from({ length: Math.max(0, barTimeSignature.beats - 1) }, (_, beat) => beat + 1);
        pulseBeats.forEach((beat) => {
          const pulseStart = barStart + beat * beatSeconds;
          const pulseDuration = beatSeconds * (barTimeSignature.id === "6/8" ? 0.72 : 0.42);
          if (pulseStart + pulseDuration <= offset) return;
          const audibleStart = Math.max(pulseStart, offset);
          const audibleDuration = Math.max(0.04, pulseStart + pulseDuration - audibleStart);
          const eventDynamicGain = dynamicGainForPoint(question, bar.barIndex, beat) * accompanimentGainScale;
          chordMidi.forEach((midi) => {
            playPianoMidi(ctx, gainNode, lowerAccompanimentMidi(midi), startTime + audibleStart, audibleDuration, accompanimentVelocity, accompanimentVolume(0.018), eventDynamicGain, "triangle", 0.05);
          });
        });
      }

      function playMelodyNote(ctx, gainNode, midi, start, duration, dynamicGain = 1, dynamicVelocity = 96, release = 0.1) {
        playPianoMidi(ctx, gainNode, midi, start, duration, dynamicVelocity, 0.078, dynamicGain, "triangle", release);
      }

      function shouldSkipMelodyPlaybackNote(bar, note, noteIndex) {
        const previousNote = bar.notes?.[noteIndex - 1];
        return Boolean(
          note.rest
          || note.tiedFromPrevious
          || note.silentAudio
          || previousNote?.tieToNext
          || previousNote?.audioTieToNext
        );
      }

      function pianoLayersForPlayback(question, playbackBars) {
        const layers = [];
        const addMidi = (midi, velocity = 96) => {
          const layer = choosePianoLayer(midi, velocity);
          if (layer) layers.push(layer);
        };
        playbackBars.forEach((bar) => {
          const accompanimentVelocity = accompanimentVelocityForBar(question, bar.barIndex) + (isAccentArticulationBar(question, bar) ? ARTICULATION_ACCENT_VELOCITY_BOOST : 0);
          bar.notes.forEach((note, noteIndex) => {
            const articulationTargetMarking = articulationMarkingForPlayback(question, bar, noteIndex);
            const playbackVelocity = articulationTargetMarking === "accent" ? MELODY_SAMPLE_VELOCITY_V12 : MELODY_SAMPLE_VELOCITY_V8;
            if (!shouldSkipMelodyPlaybackNote(bar, note, noteIndex)) {
              const playbackMidis = note.stack?.length
                ? note.stack.map((tone) => effectivePlaybackMidiForStackTone(question, bar, tone))
                : [effectivePlaybackMidiForNote(question, bar, note, noteIndex)];
              playbackMidis.forEach((midi) => addMidi(midi, playbackVelocity));
            }
          });
          const chordMidi = accompanimentChordMidisForBar(question, bar);
          if (!chordMidi.length) return;
          addMidi(lowerAccompanimentMidi(chordMidi[0] - 12), accompanimentVelocity);
          addMidi(lowerAccompanimentMidi((chordMidi[1] ?? chordMidi[0]) - 12), accompanimentVelocity);
          chordMidi.forEach((midi) => {
            addMidi(lowerAccompanimentMidi(midi), accompanimentVelocity);
          });
          if (question.questionType === "practicePaper" && question.accompanimentPattern) {
            const advancedHigherChordSlots = question.advancedHigherChordTarget
              ? bar.barIndex === question.advancedHigherChordTarget.identifyBar
                ? question.advancedHigherChordTarget.identifySlots ?? []
                : bar.barIndex === question.advancedHigherChordTarget.bassLineBar
                  ? question.advancedHigherChordTarget.bassLineSlots ?? []
                  : []
              : [];
            advancedHigherChordSlots.forEach((slot) => {
              (slot.trebleNote?.stack ?? []).forEach((tone) => addMidi(lowerAccompanimentMidi(effectiveMidiForNote(question, bar, tone)), accompanimentVelocity));
              (slot.bassNote?.stack ?? []).forEach((tone) => addMidi(lowerAccompanimentMidi(effectiveMidiForNote(question, bar, tone)), accompanimentVelocity));
            });
            const meterInfo = classifyMeter(timeSignatureForBar(question, bar));
            const pattern = getPatternVariant(question.accompanimentPattern, meterInfo);
            const safePattern = validateAccompanimentPattern(pattern, meterInfo)
              ? pattern
              : getPatternVariant("bassChord", meterInfo);
            const rootMidi = chordMidi[0];
            const thirdMidi = chordMidi[1] ?? rootMidi;
            const fifthMidi = chordMidi[2] ?? rootMidi;
            const seventhMidi = chordMidi[3] ?? null;
            const tokenMidi = (token) => {
              const map = {
                lowRoot: rootMidi - 12,
                lowThird: thirdMidi - 12,
                lowFifth: fifthMidi - 12,
                root: rootMidi,
                third: thirdMidi,
                fifth: fifthMidi,
                seventh: seventhMidi ?? fifthMidi,
                octaveRoot: rootMidi + 12,
              };
              if (token === "chord") return chordMidi;
              if (token === "shell") return [rootMidi, thirdMidi, seventhMidi ?? fifthMidi];
              if (token === "power") return [rootMidi, fifthMidi];
              return map[token] ?? rootMidi;
            };
            safePattern.forEach((event) => {
              const eventVelocity = Math.round((event.velocity ?? accompanimentVelocityForBar(question, bar.barIndex)) + (isAccentArticulationBar(question, bar) ? ARTICULATION_ACCENT_VELOCITY_BOOST : 0));
              lowerAccompanimentMidiValues(event.notes.flatMap(tokenMidi)).forEach((midi) => addMidi(midi, eventVelocity));
            });
          }
        });
        return layers;
      }

      async function playQuestionAudio(startAt = 0, restart = false) {
        if (isPlaying && !restart) {
          stopAudio();
          return;
        }
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          setPrompt("Audio playback is not supported in this browser.");
          return;
        }
        const offset = clamp(Number(startAt) || 0, 0, totalDuration);
        stopAudio(false);
        if (offset >= totalDuration) {
          return;
        }
        const ctx = new AudioContextClass();
        const master = ctx.createGain();
        master.gain.setValueAtTime(1.25, ctx.currentTime);
        master.connect(ctx.destination);
        audioRef.current = ctx;
        setIsPlaying(true);
        setPrompt("");
        await preloadPianoSamples(ctx, pianoLayersForPlayback(question, playbackBars));
        if (audioRef.current !== ctx) return;
        const startTime = ctx.currentTime + 0.12 - offset;

        playbackBars.forEach((bar, playbackIndex) => {
          const barStart = playbackTimeline[playbackIndex]?.start ?? 0;
          const barTimeSignature = timeSignatureForBar(question, bar);
          const dynamicGain = dynamicGainForBar(question, bar.barIndex);
          const dynamicVelocity = dynamicVelocityForBar(question, bar.barIndex);
          if (metronomeOn) {
            for (let beat = 0; beat < barTimeSignature.beats; beat += 1) {
              const beatStart = barStart + beat * beatSeconds;
              if (beatStart >= offset) playMetronome(ctx, master, startTime + beatStart, beat === 0);
            }
          }
          const finalPlaybackBar = playbackIndex === playbackBars.length - 1;
          const finalSoundingNoteIndex = finalPlaybackBar ? bar.notes.map((note, index) => ({ note, index })).reverse().find(({ note }) => note && !note.rest)?.index : null;
          playAccompaniment(ctx, master, question, bar, barStart, offset, startTime, dynamicGain, dynamicVelocity, finalPlaybackBar);
          bar.notes.forEach((note, noteIndex) => {
            if (shouldSkipMelodyPlaybackNote(bar, note, noteIndex)) return;
            const noteStart = barStart + note.beat * beatSeconds;
            const nextTiedNote = (note.tieToNext || note.audioTieToNext) && !bar.notes[noteIndex + 1]?.rest ? bar.notes[noteIndex + 1] : null;
            const articulationTargetMarking = articulationMarkingForPlayback(question, bar, noteIndex);
            const writtenDuration = (note.beats + (nextTiedNote?.beats ?? 0)) * beatSeconds;
            const duration = articulationTargetMarking === "staccato"
              ? staccatoSoundSeconds(note, writtenDuration)
              : writtenDuration * 0.96;
            if (noteStart + duration <= offset) return;
            const audibleStart = Math.max(noteStart, offset);
            const audibleDuration = Math.max(0.04, noteStart + duration - audibleStart);
            const noteDynamicGain = dynamicGainForPoint(question, bar.barIndex, note.beat);
            const playbackVelocity = articulationTargetMarking === "accent" ? MELODY_SAMPLE_VELOCITY_V12 : MELODY_SAMPLE_VELOCITY_V8;
            const playbackRelease = articulationTargetMarking === "staccato" ? STACCATO_RELEASE_SECONDS : noteIndex === finalSoundingNoteIndex ? 0.42 : 0.1;
            const playbackMidis = note.stack?.length
              ? note.stack.map((tone) => effectivePlaybackMidiForStackTone(question, bar, tone))
              : [effectivePlaybackMidiForNote(question, bar, note, noteIndex)];
            playbackMidis.forEach((midi) => {
              playMelodyNote(ctx, master, midi, startTime + audibleStart, audibleDuration, articulationTargetMarking === "accent" ? noteDynamicGain * ARTICULATION_ACCENT_GAIN_SCALE : noteDynamicGain, playbackVelocity, playbackRelease);
            });
            if (followPlayback) {
              const highlightTimer = window.setTimeout(() => {
                setActiveNoteId(note.id);
              }, Math.max(0, (startTime + audibleStart - ctx.currentTime) * 1000));
              const clearTimer = window.setTimeout(() => setActiveNoteId(null), Math.max(0, (startTime + audibleStart - ctx.currentTime + audibleDuration) * 1000));
              timersRef.current.push(highlightTimer, clearTimer);
            }
          });
        });

        const stopTimer = window.setTimeout(() => {
          stopAudio();
        }, Math.max(0, (totalDuration - offset) * 1000) + 620);
        timersRef.current.push(stopTimer);
      }

      function handlePlayClick() {
        if (isPlaying) {
          stopAudio();
          return;
        }
        if (limitPlays && !practiceReviewMode && playsRemaining <= 0) {
          setPrompt("No plays remaining for this question.");
          return;
        }
        if (limitPlays && !practiceReviewMode) setPlaysRemaining((current) => Math.max(0, current - 1));
        if (hasScrollablePracticeScore) scrollPracticeScore("top");
        playQuestionAudio();
      }

      useEffect(() => () => stopAudio(), []);

      const isIdentifyMelody = question.questionType === "identifyMelody";
      const targetBar = isIdentifyMelody ? null : question.bars[question.targetBar];
      const allRequiredNotesPlaced = isIdentifyMelody
        ? question.selectedOptionIndex !== null
        : Boolean(targetBar?.notes?.length) && missingNoteIndicesForQuestion(question).every((index) => Boolean(userNoteAt(userNotes, question.targetBar, index)));
      const clearDisabled = Boolean(feedback) || (isIdentifyMelody ? question.selectedOptionIndex === null : !Object.keys(userNotes).length);
      const hasScrollablePracticeScore = question.questionType === "practicePaper" && question.bars.length > 8;

      function updateScoreScrollFade() {
        const element = scoreScrollRef.current;
        if (!element || !hasScrollablePracticeScore) {
          setScoreScrollFade({ top: false, bottom: false });
          return;
        }
        const maxScrollTop = Math.max(0, element.scrollHeight - element.clientHeight);
        setScoreScrollFade({
          top: element.scrollTop > 2,
          bottom: element.scrollTop < maxScrollTop - 2,
        });
      }

      useEffect(() => {
        updateScoreScrollFade();
        if (!hasScrollablePracticeScore) return undefined;
        const update = () => updateScoreScrollFade();
        window.addEventListener("resize", update);
        const animationFrame = window.requestAnimationFrame(update);
        return () => {
          window.removeEventListener("resize", update);
          window.cancelAnimationFrame(animationFrame);
        };
      }, [hasScrollablePracticeScore, question.id, feedback, visible]);

      function scrollPracticeScore(position, behavior = "smooth") {
        const element = scoreScrollRef.current;
        if (!element) return;
        element.scrollTo({
          top: position === "bottom" ? element.scrollHeight : 0,
          behavior,
        });
        window.requestAnimationFrame(updateScoreScrollFade);
      }

      function scrollPracticeScoreToSource(sourceId, behavior = "smooth") {
        const element = scoreScrollRef.current;
        if (!element || !sourceId) return;
        const target = [...element.querySelectorAll("[data-score-question-source]")]
          .find((node) => node.dataset.scoreQuestionSource === sourceId);
        if (!target) return;
        const elementBounds = element.getBoundingClientRect();
        const targetBounds = target.getBoundingClientRect();
        const targetMiddle = element.scrollTop + targetBounds.top - elementBounds.top + targetBounds.height / 2;
        const maxScrollTop = Math.max(0, element.scrollHeight - element.clientHeight);
        element.scrollTo({
          top: clamp(targetMiddle - element.clientHeight / 2, 0, maxScrollTop),
          behavior,
        });
        window.requestAnimationFrame(updateScoreScrollFade);
      }

      useEffect(() => {
        if (!hasScrollablePracticeScore || !visible || question.questionType !== "practicePaper") return undefined;
        const previousFocus = previousScoreFocusRef.current;
        previousScoreFocusRef.current = { questionId: question.id, activePracticePart };
        if (!previousFocus || previousFocus.questionId !== question.id) {
          const animationFrame = window.requestAnimationFrame(() => {
            scrollPracticeScore("top", "auto");
          });
          return () => window.cancelAnimationFrame(animationFrame);
        }
        if (previousFocus.activePracticePart === activePracticePart) return undefined;
        const activePart = question.subquestions?.[activePracticePart];
        const sourceId = activePart?.sourceId ?? activePart?.id;
        if (!sourceId) return undefined;
        const animationFrame = window.requestAnimationFrame(() => {
          scrollPracticeScoreToSource(sourceId);
        });
        return () => window.cancelAnimationFrame(animationFrame);
      }, [activePracticePart, hasScrollablePracticeScore, question.id, visible]);

      return (
        <div className="overflow-x-hidden bg-stone-50 pb-10 text-black md:pb-12">
          <window.MLH.AppHeader icon={ASSET.appIcon} title="Practice Questions" subtitle="Complete exam-style questions combining multiple music literacy concepts.">
            <PracticeScoreTimerPanel
              correct={score.correct}
              attempted={score.attempted}
              secondsRemaining={secondsRemaining}
              timerEnabled={timerEnabled}
              timerPaused={timerPaused}
              timerLocked={practiceReviewMode}
              confettiKey={confettiKey}
              onPauseTimer={() => {
                stopAudio();
                setTimerPaused(true);
              }}
            />
          </window.MLH.AppHeader>

          {timerPaused && <TimerPauseOverlay onResume={() => setTimerPaused(false)} />}
          {newQuestionConfirmOpen && (
            <NewQuestionConfirmOverlay
              onCancel={() => setNewQuestionConfirmOpen(false)}
              onConfirm={() => {
                setNewQuestionConfirmOpen(false);
                startFreshQuestion();
              }}
            />
          )}
          {incompleteSubmitConfirmOpen && (
            <IncompleteSubmitConfirmOverlay
              onCancel={() => setIncompleteSubmitConfirmOpen(false)}
              onConfirm={() => {
                setIncompleteSubmitConfirmOpen(false);
                submitPracticeQuestion({ requireComplete: false });
              }}
            />
          )}
          <div className="mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 sm:pt-[154px] md:px-8 md:pt-[104px]">
            <main
              ref={mainContainerRef}
              className="relative flex flex-col overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-3 pt-[10px] shadow-sm sm:px-4 md:px-6 md:pb-6 md:pt-[14px]"
              style={mainMinHeight ? { minHeight: `${mainMinHeight}px` } : undefined}
              onPointerDown={(event) => {
                if (!feedback) return;
                if (question.questionType === "practicePaper") return;
                const button = event.target.closest("button");
                if (button && !button.closest("[data-feedback-continue]")) return;
                if (event.target.closest("[data-menu-trigger],[data-menu-panel]")) return;
                advanceAfterFeedback();
              }}
            >
              <div className="relative z-[90] mb-[10px] grid w-full grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2">
                <div className="relative flex items-center gap-2" ref={menuRef}>
                  <div className="hub-menu-anchor relative">
                    <window.MLH.LevelButton
                      icon={<img src={ASSET.level} alt="" aria-hidden="true" className="h-[26px] w-[28px] object-contain" />}
                      activeLevel={activeLevel}
                      activeLabel={LEVELS[activeLevel].label}
                      onClick={() => setMenu(menu === "level" ? null : "level")}
                      dataMenuTrigger
                    />
                    {menu === "level" && (
                      <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel>
                        <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                      </window.MLH.MenuPanel>
                    )}
                  </div>
                  <div className="hub-menu-anchor relative">
                    <window.MLH.CustomiseButton
                      icon={<img src={ASSET.customise} alt="" className="h-[21px] w-[21px]" />}
                      onClick={() => setMenu(menu === "customise" ? null : "customise")}
                      dataMenuTrigger
                    />
                  {menu === "customise" && (
                    <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel>
                      <CustomiseMenu
                        activeLevel={activeLevel}
                        limitPlays={limitPlays}
                        setLimitPlays={setLimitPlays}
                        timerEnabled={timerEnabled}
                        setTimerEnabled={setTimerEnabled}
                        followPlayback={followPlayback}
                        setFollowPlayback={setFollowPlayback}
                        showAudioQuestionGlyphs={showAudioQuestionGlyphs}
                        setShowAudioQuestionGlyphs={setShowAudioQuestionGlyphs}
                        enabledQuestionTypes={enabledQuestionTypes}
                        onToggleQuestionType={toggleQuestionType}
                      />
                    </window.MLH.MenuPanel>
                  )}
                  </div>
                </div>
                <div className="flex h-10 min-w-[112px] items-center justify-center sm:min-w-[140px]">
                  <Feedback feedback={question.questionType === "practicePaper" ? null : feedback} fading={feedbackFading} />
                </div>
                <div className="flex justify-end">
                  {!feedback ? (
                    <window.MLH.SkipButton
                      onClick={() => {
                        if (hasQuestionProgress()) {
                          setNewQuestionConfirmOpen(true);
                          return;
                        }
                        startFreshQuestion();
                      }}
                      icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />}
                    />
                  ) : !feedback.revealing ? (
                    <PracticeNextQuestionButton onClick={startFreshQuestionFromFeedback} />
                  ) : null}
                </div>
              </div>

              {showQuestionLoader && (
                <div className="pointer-events-none absolute inset-x-0 bottom-[72px] top-[72px] z-[80] flex items-center justify-center" aria-live="polite" aria-busy="true">
                  <img src={ASSET.loading} alt="Loading" className="question-loading-logo h-20 w-20 object-contain" />
                </div>
              )}
