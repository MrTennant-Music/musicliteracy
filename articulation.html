  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useRef, useState } = React;

const VIEWBOX_WIDTH = 920;
const VIEWBOX_HEIGHT = 430;
const STAFF_LEFT = 24;
const STAFF_RIGHT = 896;
const SYSTEM_TOPS = [62, 187];
const AURAL_SYSTEM_TOPS = [122];
const LINE_GAP = 10;
const NOTE_RX = 6.3;
const NOTE_RY = 4.6;
const STEM_LENGTH = 32;
const BAR_COUNT = 8;
const AURAL_BAR_COUNT = 4;
const BARS_PER_SYSTEM = 4;
const CLEF_X = STAFF_LEFT + 8;
const TIME_SIG_X = STAFF_LEFT + 58;
const MUSIC_START_X = STAFF_LEFT + 101;
const TREBLE_CLEF = String.fromCodePoint(0x1d11e);

const COLOUR = { green: "#16a34a", red: "#dc2626", blue: "#2563eb", black: "#000000" };

const MARKINGS = [
  { id: "staccato", label: "Staccato", plural: "staccato markings", performance: "Short and detached", accepted: ["staccato", "staccato marking", "staccato markings", "staccato dots", "dots"] },
  { id: "slur", label: "Slur", plural: "slur markings", performance: "Smoothly and connected", accepted: ["slur", "slurs", "slurred", "slur marking", "slur markings", "legato", "legato marking", "legato markings"] },
  { id: "phrase", label: "Phrase", plural: "phrase markings", performance: "With musical shape", accepted: ["phrase", "phrase mark", "phrase marks", "phrase marking", "phrase markings", "phrasing"] },
  { id: "accent", label: "Accent", plural: "accents", performance: "With extra emphasis", accepted: ["accent", "accents", "accented", "accent marking", "accent markings"] },
];

const QUESTION_TYPES = ["identify-choice", "identify-text", "apply", "performance", "aural-articulation"];
const QUESTION_LABELS = {
  "identify-choice": "Multiple Choice",
  "identify-text": "Type Answer",
  apply: "Apply to Score",
  performance: "Give the Definition",
  "aural-articulation": "Audio",
};

const NOTES = [
  { name: "C4", step: -2, freq: 261.63 }, { name: "D4", step: -1, freq: 293.66 },
  { name: "E4", step: 0, freq: 329.63 }, { name: "F4", step: 1, freq: 349.23 },
  { name: "G4", step: 2, freq: 392 }, { name: "A4", step: 3, freq: 440 },
  { name: "B4", step: 4, freq: 493.88 }, { name: "C5", step: 5, freq: 523.25 },
  { name: "D5", step: 6, freq: 587.33 }, { name: "E5", step: 7, freq: 659.25 },
  { name: "F5", step: 8, freq: 698.46 }, { name: "G5", step: 9, freq: 783.99 },
  { name: "A5", step: 10, freq: 880 },
];

const TIME_SIGNATURES = [
  { id: "3/4", top: "3", bottom: "4", beatsPerBar: 3 },
  { id: "4/4", top: "4", bottom: "4", beatsPerBar: 4 },
];

const RHYTHMS = {
  minim: { beats: 2, spacing: 4, open: true, stem: true },
  crotchet: { beats: 1, spacing: 2.2, open: false, stem: true },
  quaver: { beats: 0.5, spacing: 1.15, open: false, stem: true, flag: true },
};

const RHYTHM_PATTERNS = {
  3: [
    ["crotchet", "crotchet", "crotchet"], ["minim", "crotchet"], ["crotchet", "minim"],
    ["quaver", "quaver", "crotchet", "crotchet"], ["crotchet", "quaver", "quaver", "crotchet"],
    ["crotchet", "crotchet", "quaver", "quaver"],
  ],
  4: [
    ["crotchet", "crotchet", "crotchet", "crotchet"], ["minim", "minim"],
    ["minim", "crotchet", "crotchet"], ["crotchet", "crotchet", "minim"],
    ["quaver", "quaver", "crotchet", "crotchet", "crotchet"],
    ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
    ["crotchet", "crotchet", "quaver", "quaver", "crotchet"],
  ],
};

function randomItem(items) { return items[Math.floor(Math.random() * items.length)]; }
function randomIndex(length) { return Math.floor(Math.random() * length); }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function rhythmInfo(rhythm) { return RHYTHMS[rhythm] || RHYTHMS.crotchet; }
function noteByIndex(index) { return NOTES[clamp(index, 0, NOTES.length - 1)]; }
function markingById(id) { return MARKINGS.find((marking) => marking.id === id); }
function yForStep(step, systemTop) { return systemTop + LINE_GAP * 4 - step * (LINE_GAP / 2); }
function stemGoesDown(step) { return step > 4; }
function noteLetter(step) { const note = NOTES.find((item) => item.step === step); return note ? note.name[0] : ""; }
function pitchFrequency(step) { const note = NOTES.find((item) => item.step === step); return note ? note.freq : 440; }
function cleanAnswer(value) { return value.trim().toLowerCase().replaceAll(".", "").replaceAll(",", "").replaceAll("!", "").replaceAll("?", "").split(" ").filter(Boolean).join(" "); }
function sameSet(a, b) { if (a.length !== b.length) return false; const set = new Set(a); return b.every((item) => set.has(item)); }

function runSmokeTests() {
  console.assert(MARKINGS.length === 4, "Expected four markings");
  console.assert(Boolean(markingById("slur")), "Slur marking missing");
  console.assert(RHYTHM_PATTERNS[3].length > 0 && RHYTHM_PATTERNS[4].length > 0, "Rhythm patterns missing");
  const sample = makeQuestion();
  console.assert(sample.bars.length === sample.barCount, "Question bar count mismatch");
  console.assert(sample.target.noteIds.length > 0, "Question target has no notes");
  console.assert(cleanAnswer(" Slur! ") === "slur", "Answer cleaning failed");
}

function playFeedbackSound(correct, celebration = false, medal = null) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;
  const context = new AudioContextClass();
  const master = context.createGain();
  const now = context.currentTime + 0.01;
  if (context.resume) context.resume();
  master.gain.value = 0.18;
  master.connect(context.destination);
  function tone(freq, start, duration, type = "triangle", volume = 0.12) {
    const osc = context.createOscillator();
    const gain = context.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);
    osc.connect(gain);
    gain.connect(master);
    osc.start(start);
    osc.stop(start + duration + 0.05);
  }
  function trumpet(freq, start, duration, volume = 0.1) {
    tone(freq, start, duration, "sawtooth", volume);
    tone(freq * 1.002, start, duration * 0.96, "square", volume * 0.32);
    tone(freq * 2, start, duration * 0.75, "triangle", volume * 0.16);
  }
  function medalPhrase(root, chord, start, beats = 4) {
    const beat = 0.6;
    const triplet = 0.13;
    const finalDuration = beats === 2 ? 0.72 : 1.95;
    chord.forEach((freq) => trumpet(freq, start, beats * beat, 0.045));
    trumpet(root, start, triplet, 0.11);
    trumpet(root, start + triplet, triplet, 0.11);
    trumpet(root, start + triplet * 2, triplet, 0.11);
    trumpet(root, start + 0.42, finalDuration, 0.13);
  }
  if (!correct) {
    tone(196, now, 0.32, "sawtooth", 0.06);
    tone(185, now + 0.04, 0.38, "triangle", 0.05);
    tone(174, now + 0.08, 0.45, "sine", 0.04);
  } else if (celebration) {
    if (medal === "bronze") medalPhrase(659.25, [329.63, 415.3, 493.88], now);
    if (medal === "silver") medalPhrase(739.99, [369.99, 466.16, 554.37], now);
    if (medal === "gold") medalPhrase(830.61, [415.3, 523.25, 622.25], now);
    if (medal === "platinum") {
      medalPhrase(739.99, [369.99, 466.16, 554.37], now, 2);
      medalPhrase(830.61, [415.3, 523.25, 622.25], now + 0.82, 2);
      medalPhrase(932.33, [466.16, 587.33, 698.46], now + 1.64, 4);
    }
  } else {
    randomItem([[523.25, 659.25, 783.99], [587.33, 739.99, 880], [659.25, 830.61, 987.77]]).forEach((freq, index) => {
      tone(freq, now + index * 0.045, 0.42, "triangle", index === 2 ? 0.085 : 0.07);
      tone(freq * 2, now + index * 0.045, 0.24, "sine", 0.025);
    });
  }
  window.setTimeout(() => { try { context.close(); } catch {} }, medal === "platinum" ? 9000 : celebration ? 3500 : 900);
}

function nearestMelodicIndex(previousIndex) {
  let moves = [-2, -1, 0, 1, 2];
  if (previousIndex >= NOTES.length - 2) moves = [-2, -1, -1, 0];
  if (previousIndex <= 1) moves = [0, 1, 1, 2];
  return clamp(previousIndex + randomItem(moves), 0, NOTES.length - 1);
}

function hasSameLetter(notes) {
  for (let index = 1; index < notes.length; index += 1) {
    if (noteLetter(notes[index - 1].pitch.step) === noteLetter(notes[index].pitch.step)) return true;
  }
  return false;
}

function makeBar(timeSignature, previousIndex, barIndex) {
  const pattern = randomItem(RHYTHM_PATTERNS[timeSignature.beatsPerBar]);
  const notes = [];
  let currentIndex = previousIndex;
  let beamGroupCounter = 0;
  let activeBeamGroup = null;
  pattern.forEach((rhythm, noteIndex) => {
    let candidateIndex;
    let candidate;
    let tries = 0;
    do {
      candidateIndex = nearestMelodicIndex(currentIndex);
      candidate = { id: `${barIndex}-${noteIndex}`, rhythm, pitch: noteByIndex(candidateIndex), beamGroupId: null };
      tries += 1;
    } while (tries < 20 && rhythm === "quaver" && notes.length && notes[notes.length - 1].rhythm === "quaver" && noteLetter(notes[notes.length - 1].pitch.step) === noteLetter(candidate.pitch.step));
    if (rhythm === "quaver") {
      if (!notes.length || notes[notes.length - 1].rhythm !== "quaver") {
        activeBeamGroup = `beam-${beamGroupCounter}`;
        beamGroupCounter += 1;
      }
      candidate.beamGroupId = activeBeamGroup;
    } else {
      activeBeamGroup = null;
    }
    currentIndex = candidateIndex;
    notes.push(candidate);
  });
  return { notes, nextIndex: currentIndex };
}

function makeBars(timeSignature, count) {
  const bars = [];
  let previousIndex = randomItem([2, 3, 4, 5, 6]);
  for (let index = 0; index < count; index += 1) {
    const bar = makeBar(timeSignature, previousIndex, index);
    bars.push({ barIndex: index, notes: bar.notes });
    previousIndex = bar.nextIndex;
  }
  return bars;
}

function phraseTarget(bars) {
  const systemStart = randomItem([0, 4]);
  const startBar = systemStart + randomIndex(3);
  const endBar = Math.min(startBar + randomItem([1, 2]), systemStart + 3);
  const noteIds = [];
  for (let barIndex = startBar; barIndex <= endBar; barIndex += 1) bars[barIndex].notes.forEach((note) => noteIds.push(note.id));
  return { startBar, endBar, noteIds };
}

function applyTarget(markingId, bars) {
  if (markingId === "phrase") {
    const target = phraseTarget(bars);
    return { ...target, prompt: <>Apply <strong>phrase markings</strong> to <strong>bars {target.startBar + 1}–{target.endBar + 1}</strong>. Select the first note and the last note to apply the phrase marking.</> };
  }
  const validBars = bars.filter((bar) => markingId !== "slur" || !hasSameLetter(bar.notes));
  const bar = randomItem(validBars.length ? validBars : bars);
  return { barIndex: bar.barIndex, noteIds: bar.notes.map((note) => note.id), prompt: <>Apply <strong>{markingById(markingId).plural}</strong> to every note in <strong>bar {bar.barIndex + 1}</strong>.</> };
}

function identifyTarget(markingId, bars) {
  if (markingId === "phrase") return phraseTarget(bars);
  const eligibleBars = markingId === "slur" ? bars.filter((bar) => bar.notes.length >= 2 && !hasSameLetter(bar.notes)) : bars;
  const sourceBars = eligibleBars.length ? eligibleBars : bars;
  const bar = randomItem(sourceBars);
  const barIndex = bar.barIndex;
  const notes = bar.notes;
  const spans = markingId === "slur" ? [2, 3, 4].filter((span) => span <= notes.length) : [1, 2].filter((span) => span <= notes.length);
  const choices = [];
  spans.forEach((span) => {
    for (let start = 0; start <= notes.length - span; start += 1) {
      const slice = notes.slice(start, start + span);
      if (markingId === "slur") {
        if (slice.length < 2) continue;
        if (hasSameLetter(slice)) continue;
      }
      choices.push({ start, span, slice });
    }
  });
  const chosen = choices.length ? randomItem(choices) : { start: 0, span: Math.min(2, notes.length), slice: notes.slice(0, Math.min(2, notes.length)) };
  return { barIndex, start: chosen.start, end: chosen.start + chosen.span - 1, noteIds: chosen.slice.map((note) => note.id) };
}

function makeQuestion(enabledQuestionTypes = QUESTION_TYPES, enabledMarkings = MARKINGS.map((marking) => marking.id)) {
  const type = randomItem(enabledQuestionTypes.length ? enabledQuestionTypes : QUESTION_TYPES);
  const isAural = type === "aural-articulation";
  const timeSignature = randomItem(TIME_SIGNATURES);
  const barCount = isAural ? AURAL_BAR_COUNT : BAR_COUNT;
  const bars = makeBars(timeSignature, barCount);
  if (isAural) {
    const anchorStep = randomItem([-2, 5]);
    bars[0].notes[0].pitch = NOTES.find((note) => note.step === anchorStep);
    const lastBar = bars[bars.length - 1];
    lastBar.notes[lastBar.notes.length - 1].pitch = NOTES.find((note) => note.step === anchorStep);
  }
  const markingPool = MARKINGS.filter((marking) => enabledMarkings.includes(marking.id));
  const auralPool = ["staccato", "slur"].filter((id) => enabledMarkings.includes(id));
  const marking = Math.random() < 0.33
    ? markingById("accent")
    : type === "aural-articulation"
    ? markingById(randomItem(auralPool.length ? auralPool : ["staccato", "slur"]))
    : randomItem(markingPool.length ? markingPool : MARKINGS);
  const allAuralNoteIds = bars.flatMap((bar) => bar.notes.map((note) => note.id));
  const target = marking.id === "accent" && type === "aural-articulation"
    ? { barIndex: 0, noteIds: [randomItem(allAuralNoteIds)] }
    : type === "aural-articulation"
    ? { barIndex: 0, noteIds: allAuralNoteIds }
    : type === "apply"
    ? applyTarget(marking.id, bars)
    : identifyTarget(marking.id, bars);
  let prompt = null;
  if (type === "identify-choice") prompt = <>Identify the marking used on the notes in <span className="text-blue-600">blue</span>.</>;
  if (type === "identify-text") prompt = <>Type the name of the marking used on the notes in <span className="text-blue-600">blue</span>.</>;
  if (type === "apply") prompt = target.prompt;
  if (type === "performance") {
    const location = target.barIndex !== undefined ? `${target.barIndex + 1}` : `${target.startBar + 1}–${target.endBar + 1}`;
    prompt = <>How should the <span className="text-blue-600">blue</span> notes in <strong>bar {location}</strong> be performed?</>;
  }
  if (type === "aural-articulation") prompt = <>Listen to the excerpt and identify which articulation marking has been applied to the notes.</>;
  if (type === "aural-articulation" && marking.id === "accent") prompt = <>Listen to the excerpt and apply an <strong>accent</strong> to the note where it occurs.</>;
  return { id: Math.random().toString(36).slice(2), timeSignature, bars, type, marking, target, prompt, barCount };
}
