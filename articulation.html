<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Articulation Markings Golden App</title>
  <link rel="icon" type="image/svg+xml" href="https://mrtennant-music.github.io/musicliteracy/articulation-markings-icon.svg" />
  <link rel="apple-touch-icon" href="https://mrtennant-music.github.io/musicliteracy/articulation-markings-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useRef, useState } = React;

const W = 920, H = 430;
const STAFF_LEFT = 24, STAFF_RIGHT = 896, MUSIC_START = 125;
const SYSTEM_TOPS = [62, 187], AURAL_TOPS = [122];
const GAP = 10, NOTE_RX = 6.3, NOTE_RY = 4.6, STEM = 32;
const BAR_COUNT = 8, AURAL_BAR_COUNT = 4, BARS_PER_SYSTEM = 4;
const TREBLE = String.fromCodePoint(0x1d11e);
const COLOUR = { blue:"#2563eb", green:"#16a34a", red:"#dc2626", black:"#000" };

const MARKINGS = [
  { id:"staccato", label:"Staccato", plural:"staccato markings", performance:"Short and detached", accepted:["staccato","staccato marking","staccato markings","staccato dots","dots"] },
  { id:"slur", label:"Slur", plural:"slur markings", performance:"Smoothly and connected", accepted:["slur","slurs","slurred","slur marking","slur markings","legato","legato marking","legato markings"] },
  { id:"phrase", label:"Phrase", plural:"phrase markings", performance:"With musical shape", accepted:["phrase","phrase mark","phrase marks","phrase marking","phrase markings","phrasing"] },
  { id:"accent", label:"Accent", plural:"accents", performance:"With extra emphasis", accepted:["accent","accents","accented","accent marking","accent markings"] },
];

const QUESTION_TYPES = ["identify-choice","identify-text","apply","performance","aural-articulation"];
const QUESTION_LABELS = {
  "identify-choice":"Multiple Choice",
  "identify-text":"Type Answer",
  apply:"Apply to Score",
  performance:"Give the Definition",
  "aural-articulation":"Audio",
};

const NOTES = [
  ["C4",-2,261.63],["D4",-1,293.66],["E4",0,329.63],["F4",1,349.23],["G4",2,392],
  ["A4",3,440],["B4",4,493.88],["C5",5,523.25],["D5",6,587.33],["E5",7,659.25],
  ["F5",8,698.46],["G5",9,783.99],["A5",10,880],
].map(([name,step,freq]) => ({ name, step, freq }));

const TIME_SIGNATURES = [
  { id:"3/4", top:"3", bottom:"4", beats:3 },
  { id:"4/4", top:"4", bottom:"4", beats:4 },
];

const RH = {
  minim:{ beats:2, spacing:4, open:true, stem:true },
  crotchet:{ beats:1, spacing:2.2, open:false, stem:true },
  quaver:{ beats:.5, spacing:1.15, open:false, stem:true, flag:true },
};

const PATTERNS = {
  3: [["crotchet","crotchet","crotchet"],["minim","crotchet"],["crotchet","minim"],["quaver","quaver","crotchet","crotchet"],["crotchet","quaver","quaver","crotchet"],["crotchet","crotchet","quaver","quaver"]],
  4: [["crotchet","crotchet","crotchet","crotchet"],["minim","minim"],["minim","crotchet","crotchet"],["crotchet","crotchet","minim"],["quaver","quaver","crotchet","crotchet","crotchet"],["crotchet","quaver","quaver","crotchet","crotchet"],["crotchet","crotchet","quaver","quaver","crotchet"]],
};

function r(items){ return items[Math.floor(Math.random() * items.length)]; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function m(id){ return MARKINGS.find(x => x.id === id); }
function y(step, top){ return top + GAP * 4 - step * (GAP / 2); }
function freq(step){ return (NOTES.find(n => n.step === step) || NOTES[5]).freq; }
function clean(v){ return v.trim().toLowerCase().replace(/[.,!?]/g,"").split(/\s+/).filter(Boolean).join(" "); }
function sameSet(a,b){ return a.length === b.length && b.every(x => new Set(a).has(x)); }
function letter(step){ return (NOTES.find(n => n.step === step) || NOTES[5]).name[0]; }
function stemDown(step){ return step > 4; }
function nextIndex(prev){
  let moves = [-2,-1,0,1,2];
  if (prev >= NOTES.length - 2) moves = [-2,-1,-1,0];
  if (prev <= 1) moves = [0,1,1,2];
  return clamp(prev + r(moves), 0, NOTES.length - 1);
}
function hasSameLetter(notes){
  for(let i=1;i<notes.length;i++) if(letter(notes[i-1].pitch.step) === letter(notes[i].pitch.step)) return true;
  return false;
}

function makeBar(ts, prev, barIndex){
  const pattern = r(PATTERNS[ts.beats]);
  const notes = [];
  let idx = prev, beam = 0, active = null;
  pattern.forEach((rhythm, noteIndex) => {
    let tries = 0, candidateIndex, note;
    do {
      candidateIndex = nextIndex(idx);
      note = { id:`${barIndex}-${noteIndex}`, rhythm, pitch:NOTES[candidateIndex], beamGroupId:null };
      tries++;
    } while(tries < 20 && rhythm === "quaver" && notes.length && notes[notes.length - 1].rhythm === "quaver" && letter(notes[notes.length - 1].pitch.step) === letter(note.pitch.step));
    if(rhythm === "quaver"){
      if(!notes.length || notes[notes.length - 1].rhythm !== "quaver") active = `beam-${beam++}`;
      note.beamGroupId = active;
    } else active = null;
    idx = candidateIndex;
    notes.push(note);
  });
  return { notes, next:idx };
}

function makeBars(ts, count){
  let prev = r([2,3,4,5,6]);
  const bars = [];
  for(let i=0;i<count;i++){
    const bar = makeBar(ts, prev, i);
    bars.push({ barIndex:i, notes:bar.notes });
    prev = bar.next;
  }
  return bars;
}

function phraseTarget(bars){
  const systemStart = r([0,4]);
  const startBar = systemStart + Math.floor(Math.random() * 3);
  const endBar = Math.min(startBar + r([1,2]), systemStart + 3);
  const noteIds = [];
  for(let b=startBar;b<=endBar;b++) bars[b].notes.forEach(n => noteIds.push(n.id));
  return { startBar, endBar, noteIds };
}

function applyTarget(id, bars){
  if(id === "phrase"){
    const t = phraseTarget(bars);
    return { ...t, prompt: <>Apply <strong>phrase markings</strong> to <strong>bars {t.startBar + 1}–{t.endBar + 1}</strong>. Select the first note and the last note to apply the phrase marking.</> };
  }
  const valid = bars.filter(bar => id !== "slur" || !hasSameLetter(bar.notes));
  const bar = r(valid.length ? valid : bars);
  return { barIndex:bar.barIndex, noteIds:bar.notes.map(n => n.id), prompt: <>Apply <strong>{m(id).plural}</strong> to every note in <strong>bar {bar.barIndex + 1}</strong>.</> };
}

function identifyTarget(id, bars){
  if(id === "phrase") return phraseTarget(bars);
  const eligible = id === "slur" ? bars.filter(bar => bar.notes.length >= 2 && !hasSameLetter(bar.notes)) : bars;
  const bar = r(eligible.length ? eligible : bars);
  const spans = id === "slur" ? [2,3,4].filter(s => s <= bar.notes.length) : [1,2].filter(s => s <= bar.notes.length);
  const choices = [];
  spans.forEach(span => {
    for(let start=0; start<=bar.notes.length-span; start++){
      const slice = bar.notes.slice(start, start + span);
      if(id === "slur" && (slice.length < 2 || hasSameLetter(slice))) continue;
      choices.push({ start, span, slice });
    }
  });
  const chosen = choices.length ? r(choices) : { start:0, span:Math.min(2, bar.notes.length), slice:bar.notes.slice(0, Math.min(2, bar.notes.length)) };
  return { barIndex:bar.barIndex, start:chosen.start, end:chosen.start+chosen.span-1, noteIds:chosen.slice.map(n => n.id) };
}

function makeQuestion(enabledTypes=QUESTION_TYPES, enabledMarkings=MARKINGS.map(x => x.id)){
  const type = r(enabledTypes.length ? enabledTypes : QUESTION_TYPES);
  const isAural = type === "aural-articulation";
  const ts = r(TIME_SIGNATURES);
  const barCount = isAural ? AURAL_BAR_COUNT : BAR_COUNT;
  const bars = makeBars(ts, barCount);

  if(isAural){
    const anchor = r([-2,5]);
    bars[0].notes[0].pitch = NOTES.find(n => n.step === anchor);
    bars[bars.length - 1].notes[notes.length - 1].pitch = NOTES.find(n => n.step === anchor);
  }

  const markingPool = MARKINGS.filter(x => enabledMarkings.includes(x.id));
  const auralPool = ["staccato","slur"].filter(id => enabledMarkings.includes(id));
  const marking = isAural
    ? (Math.random() < .33 ? m("accent") : m(r(auralPool.length ? auralPool : ["staccato","slur"])))
    : r(markingPool.length ? markingPool : MARKINGS);

  const allAuralIds = bars.flatMap(bar => bar.notes.map(n => n.id));
  const target = marking.id === "accent" && isAural
    ? { barIndex:0, noteIds:[r(allAuralIds)] }
    : isAural
    ? { barIndex:0, noteIds:allAuralIds }
    : type === "apply"
    ? applyTarget(marking.id, bars)
    : identifyTarget(marking.id, bars);

  let prompt = null;
  if(type === "identify-choice") prompt = <>Identify the marking used on the notes in <span className="text-blue-600">blue</span>.</>;
  if(type === "identify-text") prompt = <>Type the name of the marking used on the notes in <span className="text-blue-600">blue</span>.</>;
  if(type === "apply") prompt = target.prompt;
  if(type === "performance"){
    const loc = target.barIndex !== undefined ? `${target.barIndex + 1}` : `${target.startBar + 1}–${target.endBar + 1}`;
    prompt = <>How should the <span className="text-blue-600">blue</span> notes in <strong>bar {loc}</strong> be performed?</>;
  }
  if(type === "aural-articulation") prompt = <>Listen to the excerpt and identify which articulation marking has been applied to the notes.</>;
  if(type === "aural-articulation" && marking.id === "accent") prompt = <>Listen to the excerpt and apply an <strong>accent</strong> to the note where it occurs.</>;

  return { id:Math.random().toString(36).slice(2), timeSignature:ts, bars, type, marking, target, prompt, barCount };
}

function StaffLines({top}){ return <g>{[0,1,2,3,4].map(i => <line key={i} x1={STAFF_LEFT} x2={STAFF_RIGHT} y1={top+i*GAP} y2={top+i*GAP} stroke="currentColor" strokeWidth="1.2" />)}</g>; }
function Ledger({x, step, top, colour}){ const lines=[]; if(step<=-2) lines.push(y(-2,top)); if(step>=10) lines.push(y(10,top)); return <g>{lines.map(yy => <line key={yy} x1={x-10.5} x2={x+10.5} y1={yy} y2={yy} stroke={colour} strokeWidth="1.2" />)}</g>; }
function Flag({stemX, stemEndY, down, colour}){ const d = down ? `M ${stemX} ${stemEndY} C ${stemX+10} ${stemEndY-4}, ${stemX+10} ${stemEndY-12}, ${stemX+2} ${stemEndY-16}` : `M ${stemX} ${stemEndY} C ${stemX+10} ${stemEndY+4}, ${stemX+10} ${stemEndY+12}, ${stemX+2} ${stemEndY+16}`; return <path d={d} fill="none" stroke={colour} strokeWidth="1.7" strokeLinecap="round" />; }
function stemData(note, x, top, override=null){ const step=note.pitch.step, yy=y(step,top), down=override===null?stemDown(step):override, sx=down?x-NOTE_RX:x+NOTE_RX, ey=down?yy+STEM:yy-STEM; return { step, y:yy, down, sx, ey }; }
function Note({note, x, top, colour="currentColor", override=null, forced=null, showFlag=true, onClick=null}){
  const info = RH[note.rhythm] || RH.crotchet;
  const st = stemData(note,x,top,override);
  const ey = forced === null ? st.ey : forced;
  return <g onClick={onClick} className={onClick ? "cursor-pointer" : ""}>
    <circle cx={x} cy={st.y} r="18" fill="transparent" />
    <Ledger x={x} step={st.step} top={top} colour={colour} />
    <ellipse cx={x} cy={st.y} rx={NOTE_RX} ry={NOTE_RY} transform={`rotate(-18 ${x} ${st.y})`} fill={info.open ? "transparent" : colour} stroke={colour} strokeWidth="1.7" />
    {info.stem && <line x1={st.sx} x2={st.sx} y1={st.y} y2={ey} stroke={colour} strokeWidth="1.5" />}
    {info.flag && showFlag && <Flag stemX={st.sx} stemEndY={ey} down={st.down} colour={colour} />}
  </g>;
}
function positions(notes,start,end){ const inner=start+10, units=notes.reduce((s,n)=>s+(RH[n.rhythm]?.spacing||2.2),0), unit=Math.max(1,end-inner)/Math.max(1,units); let c=inner+unit*.35; return notes.map(n => { const x=c; c += (RH[n.rhythm]?.spacing||2.2)*unit; return x; }); }
function groups(notes){ const out=[]; let i=0; while(i<notes.length){ if(notes[i].rhythm !== "quaver" || notes[i].beamGroupId === null){ i++; continue; } const s=i,id=notes[i].beamGroupId; while(i<notes.length && notes[i].rhythm==="quaver" && notes[i].beamGroupId===id) i++; if(i-1>s) out.push({start:s,end:i-1}); } return out; }
function groupFor(gs,i){ return gs.find(g => i>=g.start && i<=g.end) || null; }
function beamY(x,a,b){ if(!a || !b || a.x===b.x) return a ? a.y : 0; const p=(x-a.x)/(b.x-a.x); return a.y+p*(b.y-a.y); }
function beamData(notes,xs,top){ const avg=notes.reduce((s,n)=>s+n.pitch.step,0)/notes.length, down=avg>4, a=stemData(notes[0],xs[0],top,down), b=stemData(notes[notes.length - 1],xs[xs.length - 1],top,down); return {down,start:{x:a.sx,y:a.ey},end:{x:b.sx,y:b.ey}}; }
function layouts(question){ const tops = question.type === "aural-articulation" ? AURAL_TOPS : SYSTEM_TOPS; const out=[]; tops.forEach((top,si)=>{ const bw=(STAFF_RIGHT-MUSIC_START)/BARS_PER_SYSTEM; for(let li=0; li<BARS_PER_SYSTEM; li++){ const bi=si*BARS_PER_SYSTEM+li; if(bi>=question.barCount) continue; const start=MUSIC_START+li*bw, end=MUSIC_START+(li+1)*bw, bar=question.bars[bi]; out.push({barIndex:bi,bar,top,start,end,pos:positions(bar.notes,start+7,end-8)}); } }); return out; }
function posOf(ls,id){ for(const l of ls){ const i=l.bar.notes.findIndex(n=>n.id===id); if(i>=0){ const note=l.bar.notes[i]; return {layout:l,index:i,note,x:l.pos[i],y:y(note.pitch.step,l.top)}; } } return null; }
function actualDown(p){ const g=groupFor(groups(p.layout.bar.notes),p.index); if(!g) return stemDown(p.note.pitch.step); return beamData(p.layout.bar.notes.slice(g.start,g.end+1),p.layout.pos.slice(g.start,g.end+1),p.layout.top).down; }

function Mark({id,noteIds,ls,colour=COLOUR.blue}){
  const ps = noteIds.map(n => posOf(ls,n)).filter(Boolean);
  if(!ps.length) return null;
  if(id==="staccato") return <g>{ps.map(p => <circle key={p.note.id} cx={p.x} cy={p.y+(actualDown(p)?-13:13)} r="2.4" fill={colour} />)}</g>;
  if(id==="accent") return <g>{ps.map(p => { const d=actualDown(p), y1=p.y+(d?-19:19), y2=p.y+(d?-14:14), y3=p.y+(d?-9:9); return <path key={p.note.id} d={`M${p.x-8.1} ${y1} L${p.x+8.1} ${y2} L${p.x-8.1} ${y3}`} fill="none" stroke={colour} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" />; })}</g>;
  const first=ps[0], last=ps[ps.length - 1], down=actualDown(first), phrase=id==="phrase";
  const off=phrase?(down?-19:19):(down?-9:9), dep=phrase?36:12;
  const x1=first.x-1, x2=last.x+1, y1=first.y+off, y2=last.y+off, c1=x1+(x2-x1)*.28, c2=x1+(x2-x1)*.72;
  return <path d={`M${x1} ${y1} C${c1} ${y1+(down?-dep:dep)}, ${c2} ${y2+(down?-dep:dep)}, ${x2} ${y2}`} fill="none" stroke={colour} strokeWidth="2" strokeLinecap="round" />;
}

function Bar({layout,question,selectedNotes,selectedMarking,feedback,onNoteClick}){
  const gs = groups(layout.bar.notes);
  const showTarget = question.type !== "apply" && question.type !== "aural-articulation";
  return <g>
    {layout.bar.notes.map((note,i) => {
      const g=groupFor(gs,i); let over=null, forced=null;
      if(g){ const ns=layout.bar.notes.slice(g.start,g.end+1), xs=layout.pos.slice(g.start,g.end+1), bd=beamData(ns,xs,layout.top), st=stemData(note,layout.pos[i],layout.top,bd.down); over=bd.down; forced=beamY(st.sx,bd.start,bd.end); }
      const selected=selectedNotes.includes(note.id);
      const target=question.target.noteIds.includes(note.id) && question.type !== "aural-articulation";
      const colour=selected ? COLOUR.blue : showTarget && target ? COLOUR.blue : COLOUR.black;
      const clickable=((question.type==="apply" && selectedMarking) || (question.type==="aural-articulation" && question.marking.id==="accent")) && !feedback;
      return <Note key={note.id} note={note} x={layout.pos[i]} top={layout.top} colour={colour} override={over} forced={forced} showFlag={!g} onClick={clickable ? () => onNoteClick(note.id) : null} />;
    })}
    {gs.map((g,i) => { const ns=layout.bar.notes.slice(g.start,g.end+1), xs=layout.pos.slice(g.start,g.end+1), bd=beamData(ns,xs,layout.top), ids=ns.map(n=>n.id), hi=question.type==="aural-articulation"?false:ids.every(id=>selectedNotes.includes(id)||(showTarget&&question.target.noteIds.includes(id))); return <line key={i} x1={bd.start.x-.5} y1={bd.start.y} x2={bd.end.x+.5} y2={bd.end.y} stroke={hi?COLOUR.blue:COLOUR.black} strokeWidth="4" strokeLinecap="butt" />; })}
    {layout.barIndex === question.barCount-1 ? <g><line x1={layout.end-5} x2={layout.end-5} y1={layout.top} y2={layout.top+GAP*4} stroke="currentColor" strokeWidth="1.4" /><line x1={layout.end} x2={layout.end} y1={layout.top-.75} y2={layout.top+GAP*4+.75} stroke="currentColor" strokeWidth="4" /></g> : <line x1={layout.end} x2={layout.end} y1={layout.top} y2={layout.top+GAP*4} stroke="currentColor" strokeWidth="1.4" />}
    <g style={{pointerEvents:"none"}}><rect x={layout.start-8} y={layout.top-31} width="22" height="18" fill="white" /><text x={layout.start+4} y={layout.top-18} fontSize="13" fontWeight={(question.target.barIndex===layout.barIndex || (question.target.startBar!==undefined && layout.barIndex>=question.target.startBar && layout.barIndex<=question.target.endBar)) ? 700 : 400}>{layout.barIndex+1}</text></g>
  </g>;
}

function Score({question,selectedNotes,selectedMarking,feedback,onNoteClick}){
  const ls=layouts(question), tops=question.type==="aural-articulation"?AURAL_TOPS:SYSTEM_TOPS, isAudioAccent=question.type==="aural-articulation"&&question.marking.id==="accent";
  const showCorrect=(question.type!=="apply" && question.type!=="aural-articulation") || (feedback && (question.type==="apply" || isAudioAccent));
  return <svg viewBox={`0 0 ${W} ${H}`} className="h-auto w-full select-none overflow-visible">
    <rect width={W} height={H} fill="transparent" />
    {tops.map((top,i)=><g key={i}><StaffLines top={top}/><text x={STAFF_LEFT+8} y={top+28} fontSize="92" fontFamily="serif" dominantBaseline="middle">{TREBLE}</text>{i===0&&<g fontFamily="serif" fontWeight="900" fontSize="30" textAnchor="middle"><text x={STAFF_LEFT+58} y={top+20}>{question.timeSignature.top}</text><text x={STAFF_LEFT+58} y={top+40.6}>{question.timeSignature.bottom}</text></g>}</g>)}
    {ls.map(l => <Bar key={l.barIndex} layout={l} question={question} selectedNotes={selectedNotes} selectedMarking={selectedMarking} feedback={feedback} onNoteClick={onNoteClick} />)}
    {showCorrect && <Mark id={question.marking.id} noteIds={question.target.noteIds} ls={ls} colour={COLOUR.blue}/>}
    {question.type==="apply" && selectedMarking && selectedNotes.length>0 && !feedback && <Mark id={selectedMarking} noteIds={selectedNotes} ls={ls} colour={COLOUR.blue}/>}
    {isAudioAccent && selectedNotes.length>0 && !feedback && <Mark id="accent" noteIds={selectedNotes} ls={ls} colour={COLOUR.blue}/>}
    {question.type==="apply" && feedback && !feedback.correct && <><Mark id={question.marking.id} noteIds={question.target.noteIds} ls={ls} colour={COLOUR.green}/><Mark id={selectedMarking} noteIds={selectedNotes} ls={ls} colour={COLOUR.red}/></>}
    {isAudioAccent && feedback && !feedback.correct && <><Mark id="accent" noteIds={question.target.noteIds} ls={ls} colour={COLOUR.green}/><Mark id="accent" noteIds={selectedNotes} ls={ls} colour={COLOUR.red}/></>}
  </svg>;
}

function ArticulationGlyph({id}){
  if(id==="phrase") return <svg viewBox="0 0 120 58" className="h-10 w-16 overflow-visible"><g transform="translate(0,5)">{[0,1,2,3,4].map(line=><line key={line} x1="8" x2="112" y1={12+line*4} y2={12+line*4} stroke="currentColor" strokeWidth="1"/>)}{[16,36,56,76,96].map((x,i)=><circle key={x} cx={x} cy={24+(i%2?-4:3)} r="2.8" fill="currentColor"/>)}<path d="M10 39 Q60 54 110 39" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></g></svg>;
  if(id==="slur") return <svg viewBox="0 0 90 58" className="h-10 w-16 overflow-visible translate-y-[5px]"><g fill="currentColor" stroke="currentColor"><ellipse cx="25" cy="34" rx="6.3" ry="4.6" transform="rotate(-18 25 34)" fill="currentColor" stroke="currentColor" strokeWidth="1.7"/><line x1="31.3" y1="34" x2="31.3" y2="8" stroke="currentColor" strokeWidth="1.5"/><ellipse cx="64" cy="41" rx="6.3" ry="4.6" transform="rotate(-18 64 41)" fill="currentColor" stroke="currentColor" strokeWidth="1.7"/><line x1="70.3" y1="41" x2="70.3" y2="15" stroke="currentColor" strokeWidth="1.5"/><path d="M25 48 C38 56, 52 56, 64 50" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" transform="rotate(10 44 49)"/></g></svg>;
  const fake=[{id:"a",rhythm:"crotchet",pitch:{step:2}}], l={barIndex:0,top:22,start:0,end:90,pos:[42],bar:{notes:fake}};
  return <svg viewBox="0 0 90 58" className="h-10 w-16 overflow-visible"><Note note={fake[0]} x={42} top={22} colour="currentColor"/><Mark id={id} noteIds={["a"]} ls={[l]} colour="currentColor"/></svg>;
}

function MenuRows({enabledMarkings,setEnabledMarkings,enabledTypes,setEnabledTypes,resetScore,newQuestion}){
  const row="mb-2 flex h-[44px] w-full items-center justify-between gap-3 rounded-xl border border-stone-200 bg-stone-50 px-[14px] py-[7px]";
  function toggleMarking(id){
    setEnabledMarkings(cur=>{
      if(cur.includes(id)&&cur.length===1) return cur;

      setEnabledTypes(types=>!next.includes("staccato")&&!next.includes("slur")?types.filter(t=>t!=="aural-articulation"):types);

  function toggleType(id){

}

function getStreakMedal(s){ if(s>=30)return{emoji:"💎",bg:"bg-cyan-400/25",text:"text-cyan-500",sound:"platinum"}; if(s>=20)return{emoji:"🥇",bg:"bg-yellow-400/25",text:"text-yellow-500",sound:"gold"}; if(s>=15)return{emoji:"🥈",bg:"bg-slate-300/30",text:"text-slate-500",sound:"silver"}; if(s>=10)return{emoji:"🥉",bg:"bg-amber-700/20",text:"text-amber-700",sound:"bronze"}; return null; }
function StatCard({label,value,footer,progress=null,medal=null,variant="default"}){
  const isStreak=variant==="streak", safe=progress===null?null:clamp(progress,0,100), fill=safe===null||safe<=0?0:safe, fillColour=safe===null?"transparent":safe<50?"rgba(220,38,38,.38)":safe<70?"rgba(255,120,0,.42)":"rgba(22,163,74,.38)";
  return <div className={isStreak?"relative overflow-visible bg-transparent p-3":`relative overflow-hidden rounded-xl border border-stone-200 p-3 shadow-sm ${medal?medal.bg:"bg-stone-50"}`}>{safe!==null&&<div className="absolute bottom-0 left-0 right-0 transition-all duration-700" style={{height:`${fill}%`,background:fillColour}}/>}<div className="relative z-10 text-center"><div className="text-xs uppercase tracking-wide text-stone-500">{label}</div><div className={`text-xl font-semibold leading-tight ${isStreak&&medal?medal.text:""}`}>{value}</div>{footer&&<div className="mt-1 text-[13px] leading-none text-stone-500">{footer}</div>}</div>{isStreak&&<div className="pointer-events-none absolute -right-[12px] top-[12px] z-[999] select-none text-3xl leading-none" style={medal&&medal.emoji?{animation:"medalShine 1.4s ease-in-out infinite"}:{opacity:.16,filter:"grayscale(1) brightness(.7)"}}>{medal&&medal.emoji?medal.emoji:"🥉"}</div>}</div>;
}
function FeedbackBanner({feedback,fading=false}){ if(!feedback)return null; return <div className="relative flex w-full items-center justify-center text-center"><div className={`flex w-[300px] flex-col items-center justify-center whitespace-nowrap text-xl font-bold ${feedback.correct?"text-green-600":"text-red-600"}`} style={{animation:fading?"feedbackFadeOut .28s ease-out forwards":feedback.correct?"correctFade .55s ease-out forwards":"incorrectDropShake .55s ease-out forwards"}}><span>{feedback.correct?"Correct":"Incorrect"}</span>{!feedback.correct&&<span className="mt-2 text-sm font-semibold text-black">Click or tap anywhere to continue</span>}</div></div>; }
function MultipleChoice({question,selected,feedback,onSelect}){ const options=question.type==="aural-articulation"?["staccato","slur"]:MARKINGS.map(x=>x.id); const labels=question.type==="performance"?MARKINGS.map(x=>({id:x.id,label:x.performance})):options.map(id=>({id,label:m(id).label})); return <div className={question.type==="aural-articulation"?"flex flex-wrap justify-start gap-2":`grid gap-2 ${question.type==="performance"?"grid-cols-1 md:grid-cols-2":"grid-cols-2 md:grid-cols-4"}`}>{labels.map(o=>{ const correct=feedback&&o.id===question.marking.id, wrong=feedback&&selected===o.id&&o.id!==question.marking.id; let cls="border-stone-300 bg-white text-stone-900"; if(correct)cls="border-green-700 bg-green-600 text-white"; else if(wrong)cls="border-red-700 bg-red-600 text-white"; else if(feedback)cls="border-stone-300 bg-white text-stone-900 opacity-60"; return <button key={o.id} disabled={Boolean(feedback)} onClick={()=>onSelect(o.id)} className={`${question.type==="aural-articulation"?"w-[150px] flex-none":""} min-h-[48px] rounded-xl border px-3 py-2 text-sm font-bold transition ${cls}`}>{o.label}</button>; })}</div>; }
function ApplyAnswers({selectedMarking,setSelectedMarking,setSelectedNotes,feedback}){ return <div className="flex flex-wrap justify-start gap-2">{MARKINGS.map(mark=><button key={mark.id} disabled={Boolean(feedback)} onClick={()=>{setSelectedMarking(mark.id);setSelectedNotes([]);}} className={`relative flex h-[58px] w-[120px] items-center justify-center rounded-xl border px-2 py-2 font-bold transition ${selectedMarking===mark.id?"border-stone-950 bg-stone-950 text-white":"border-stone-300 bg-white text-stone-900"}`}>{selectedMarking===mark.id&&(mark.id==="slur"||mark.id==="phrase")&&<div className="absolute -top-9 left-1/2 z-20 -translate-x-1/2 whitespace-nowrap rounded-lg bg-stone-950 px-3 py-1 text-xs font-semibold text-white shadow-lg">{mark.id==="slur"?"Slur":"Phrase marking"}</div>}<span className={mark.id==="phrase"?"":mark.id==="accent"?"-translate-y-[12px]":mark.id==="slur"?"-translate-y-[8px]":"-translate-y-[10px]"}><ArticulationGlyph id={mark.id}/></span></button>)}</div>; }

function useStyles(){ useEffect(()=>{ if(document.getElementById("golden-style"))return; const s=document.createElement("style"); s.id="golden-style"; s.innerHTML=`button{-webkit-tap-highlight-color:transparent;user-select:none;transition:transform .08s ease,filter .08s ease,background-color .12s ease,box-shadow .12s ease;cursor:pointer}button:hover{transform:translateY(-1px) scale(1.01);filter:brightness(1.08);box-shadow:0 6px 18px rgba(0,0,0,.08)}button:active{transform:scale(.96);filter:brightness(.92)}button:disabled{cursor:not-allowed;opacity:.5}@keyframes medalShine{0%,100%{transform:scale(1) rotate(-4deg);filter:drop-shadow(0 0 0 rgba(250,204,21,0))}50%{transform:scale(1.16) rotate(4deg);filter:drop-shadow(0 0 10px rgba(250,204,21,.9))}}@keyframes incorrectDropShake{0%{transform:translateY(-28px);opacity:0}55%{transform:translateY(0);opacity:1}68%{transform:translateX(-5px)}78%{transform:translateX(5px)}88%{transform:translateX(-3px)}100%{transform:translateX(0);opacity:1}}@keyframes correctFade{0%{transform:translateY(-18px);opacity:0}100%{transform:translateY(0);opacity:1}}@keyframes feedbackFadeOut{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-10px)}}`; document.head.appendChild(s); },[]); }
function useClickOutside(refs, handlers){ useEffect(()=>{ function on(e){ refs.forEach((ref,i)=>{ if(ref.current && !ref.current.contains(e.target)) handlers[i]?.(); }); } document.addEventListener("pointerdown",on,true); return()=>document.removeEventListener("pointerdown",on,true); },[refs,handlers]); }

function App(){
  useStyles();
  const [enabledMarkings,setEnabledMarkings]=useState(MARKINGS.map(x=>x.id));
  const [enabledTypes,setEnabledTypes]=useState(QUESTION_TYPES);
  const [question,setQuestion]=useState(()=>makeQuestion());
  const [questionVisible,setQuestionVisible]=useState(true);
  const [customiseOpen,setCustomiseOpen]=useState(false);
  const [helpOpen,setHelpOpen]=useState(false);
  const [selectedAnswer,setSelectedAnswer]=useState(null);
  const [typedAnswer,setTypedAnswer]=useState("");
  const [selectedMarking,setSelectedMarking]=useState(null);
  const [selectedNotes,setSelectedNotes]=useState([]);
  const [promptMessage,setPromptMessage]=useState("");
  const [feedback,setFeedback]=useState(null);
  const [feedbackFading,setFeedbackFading]=useState(false);
  const [correct,setCorrect]=useState(0);
  const [attempted,setAttempted]=useState(0);
  const [streak,setStreak]=useState(0);
  const [best,setBest]=useState(0);
  const [playing,setPlaying]=useState(false);
  const customiseRef=useRef(null), helpRef=useRef(null), audioRef=useRef(null), timerRef=useRef(null), masterRef=useRef(null);
  useClickOutside([customiseRef,helpRef],[()=>customiseOpen&&setCustomiseOpen(false),()=>helpOpen&&setHelpOpen(false)]);
  const acc=attempted===0?0:Math.round(correct/attempted*100), medal=getStreakMedal(streak);
  const showMC=["identify-choice","performance"].includes(question.type)||(question.type==="aural-articulation"&&question.marking.id!=="accent");

  function stopAudio(fade=false){
    clearTimeout(timerRef.current); timerRef.current=null;
    const ctx=audioRef.current;
    if(!ctx){ setPlaying(false); return; }
    if(fade && masterRef.current){
      const now=ctx.currentTime;
      try{ masterRef.current.gain.cancelScheduledValues(now); masterRef.current.gain.setValueAtTime(masterRef.current.gain.value,now); masterRef.current.gain.exponentialRampToValueAtTime(.0001,now+.18); }catch{}
      setTimeout(()=>{try{ctx.close()}catch{}},220);
    } else try{ctx.close()}catch{}
    audioRef.current=null; setPlaying(false);
  }
  function resetTask(q){ stopAudio(); setQuestion(q); setSelectedAnswer(null); setTypedAnswer(""); setSelectedMarking(null); setSelectedNotes([]); setPromptMessage(""); setFeedback(null); setFeedbackFading(false); }
  function newQuestion(types=enabledTypes, marks=enabledMarkings){ setQuestionVisible(false); setTimeout(()=>{ resetTask(makeQuestion(types,marks)); setQuestionVisible(true); },260); }
  function resetScore(){ setCorrect(0); setAttempted(0); setStreak(0); setBest(0); newQuestion(); }
  function fadeToNext(){ if(!feedback||feedback.correct||feedbackFading)return; setFeedbackFading(true); setTimeout(()=>newQuestion(),280); }
  function score(ok){ const ns=ok?streak+1:0; playFeedbackSound(ok); setAttempted(v=>v+1); setCorrect(v=>v+(ok?1:0)); setStreak(ns); setBest(v=>Math.max(v,ns)); setFeedback({correct:ok}); if(ok){ setTimeout(()=>setFeedbackFading(true),1700); setTimeout(()=>newQuestion(),2000); } }
  function selectAnswer(id){ if(feedback)return; stopAudio(true); setSelectedAnswer(id); score(id===question.marking.id); }
  function confirmAnswer(){
    if(feedback)return; stopAudio(true);
    if(question.type==="identify-text"){ const ans=clean(typedAnswer); if(!ans){setPromptMessage("Type an answer before pressing Confirm.");return;} score(question.marking.accepted.includes(ans)); return; }
    if(question.type==="apply"){ if(!selectedMarking){setPromptMessage("Choose a marking first.");return;} if(!selectedNotes.length){setPromptMessage("Select the notes in the score before pressing Confirm.");return;} score(selectedMarking===question.marking.id && sameSet(selectedNotes,question.target.noteIds)); return; }
    if(question.type==="aural-articulation"&&question.marking.id==="accent"){ if(!selectedNotes.length){setPromptMessage("Select the accented note before pressing Confirm.");return;} score(sameSet(selectedNotes,question.target.noteIds)); }
  }
  function onNoteClick(id){
    if(question.type==="aural-articulation"&&question.marking.id==="accent"){ if(!feedback)setSelectedNotes([id]); return; }
    if(question.type!=="apply"||feedback||!selectedMarking)return;
    if(selectedMarking==="slur"||selectedMarking==="phrase"){ const all=question.bars.flatMap(b=>b.notes.map(n=>n.id)); if(!selectedNotes.length){setSelectedNotes([id]);return;} const a=all.indexOf(selectedNotes[0]), b=all.indexOf(id); setSelectedNotes(all.slice(Math.min(a,b),Math.max(a,b)+1)); return; }
    setSelectedNotes(cur=>cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]);
  }
  function playAural(){
    if(question.type!=="aural-articulation"||playing)return;
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC){setPromptMessage("Audio playback is not supported in this browser.");return;}
    stopAudio();
    const ctx=new AC(); audioRef.current=ctx; setPlaying(true);
    const master=ctx.createGain(); master.gain.value=1; master.connect(ctx.destination); masterRef.current=master;
    const beat=.6, articulation=question.marking.id==="accent"?"slur":question.marking.id;
    let t=ctx.currentTime+.08;
    question.bars.forEach(bar=>bar.notes.forEach(note=>{
      const dur=(RH[note.rhythm]?.beats||1)*beat, sound=articulation==="staccato"?dur*.42:dur*.96;
      const o=ctx.createOscillator(), g=ctx.createGain(), o2=ctx.createOscillator(), g2=ctx.createGain();
      o.type="triangle"; o.frequency.setValueAtTime(freq(note.pitch.step),t);
      o2.type="sine"; o2.frequency.setValueAtTime(freq(note.pitch.step)*2,t);
      g2.gain.setValueAtTime(.12,t);
      g.gain.setValueAtTime(.0001,t);
      const isAccent=question.marking.id==="accent"&&question.target.noteIds.includes(note.id);
      const peak=question.marking.id==="accent" ? (isAccent ? 0.52 : 0.045) : 0.22;
      g.gain.exponentialRampToValueAtTime(peak,t+.015);
      g.gain.exponentialRampToValueAtTime(articulation==="staccato"?.001:.08,t+sound);
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.connect(g); o2.connect(g2); g2.connect(g); g.connect(master);
      o.start(t); o2.start(t); o.stop(t+dur); o2.stop(t+dur); t+=dur;
    }));
    timerRef.current=setTimeout(()=>{setPlaying(false);audioRef.current=null;try{ctx.close()}catch{}},Math.max(0,(t-ctx.currentTime)*1000)+120);
  }

  return <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2"><div className="mx-auto max-w-6xl">
    <header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm"><div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between"><div className="flex items-center gap-4"><AppIcon/><div><h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Articulation Markings</h1><p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Identify and apply staccatos, slurs, accents and phrase markings.</p></div></div><div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end"><StatCard label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${acc}%`} progress={acc}/><div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${medal?medal.bg:"bg-stone-50"}`}><StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${best}`} medal={medal}/><div className="relative z-0 flex min-h-[52px] min-w-[30px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700"><div>💎 <span className="text-cyan-500">30</span></div><div className="mt-1">🥇 <span className="text-yellow-500">20</span></div><div className="mt-1">🥈 <span className="text-slate-500">15</span></div><div className="mt-1">🥉 <span className="text-amber-700">10</span></div></div></div></div></div></header>
    <main className="relative -mt-[10px] overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-8 pt-[10px] shadow-sm md:h-auto md:overflow-visible md:px-6 md:pb-10 md:pt-[14px]" onPointerDown={()=>{if(feedback&&!feedback.correct)fadeToNext();}}>
      <div className="relative z-20 mb-2.5 flex flex-wrap items-center justify-between gap-3"><div className="flex items-center gap-2"><div className="relative" ref={customiseRef}><button onClick={()=>setCustomiseOpen(v=>!v)} className="flex h-11 min-w-[30px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">⚙️ <span>Customise</span></button>{customiseOpen&&<div className="absolute left-0 z-[100] mt-2 max-h-[72vh] w-[min(400px,calc(100vw-2rem))] overflow-y-auto rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><h2 className="mb-3 text-center text-base font-semibold">Customise</h2><MenuRows enabledMarkings={enabledMarkings} setEnabledMarkings={setEnabledMarkings} enabledTypes={enabledTypes} setEnabledTypes={setEnabledTypes} resetScore={resetScore} newQuestion={newQuestion}/></div>}</div><div className="relative" ref={helpRef}><button onClick={()=>setHelpOpen(v=>!v)} className="flex h-11 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">💡 <span>Help</span></button>{helpOpen&&<div className="absolute left-0 top-12 z-[100] w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><HelpPanel/></div>}</div></div><button onClick={()=>newQuestion()} className="flex h-11 min-w-[30px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800"><span>Skip Question</span><span className="text-lg leading-none">→</span></button><div className="pointer-events-none absolute inset-x-0 top-1/2 z-30 flex -translate-y-1/2 justify-center overflow-visible"><FeedbackBanner feedback={feedback} fading={feedbackFading}/></div></div>
      <div className={`relative -top-[18px] transition-opacity duration-300 ${questionVisible?"opacity-100":"opacity-0"}`}><Score question={question} selectedNotes={selectedNotes} selectedMarking={selectedMarking} feedback={feedback} onNoteClick={onNoteClick}/></div>
      <div className={`relative z-10 mt-3 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:-mt-[190px] md:mx-3 ${question.type==="identify-choice"?"min-h-[138px] flex flex-col justify-between":question.type==="identify-text"?"min-h-[132px] flex flex-col justify-between":question.type==="aural-articulation"?"min-h-[138px] flex flex-col justify-between":question.type==="apply"?"min-h-[92px]":"min-h-[142px]"}`}>
        <div className="text-stone-900"><p className="text-base font-semibold leading-tight">{question.prompt}</p>{promptMessage&&<p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}{feedback&&!feedback.correct&&question.type==="identify-text"&&<p className="mt-2 text-sm font-bold text-green-700">Correct answer: {question.marking.label}</p>}</div>
        <div className={`${question.type==="aural-articulation"?"mt-4":"mt-3"} flex flex-wrap items-end justify-between gap-3 pb-[0px]`}>
          {showMC&&<div className={question.type==="aural-articulation"?"flex flex-wrap gap-2":"w-full"}><MultipleChoice question={question} selected={selectedAnswer} feedback={feedback} onSelect={selectAnswer}/></div>}
          {question.type==="aural-articulation"&&<div className={question.marking.id==="accent"?"mt-3 flex w-full items-center justify-between gap-2":"ml-auto flex items-center gap-2"}><button onClick={playAural} disabled={playing||Boolean(feedback)} className="flex h-11 w-[150px] shrink-0 items-center justify-center gap-2 rounded-xl border border-stone-950 bg-stone-950 px-4 text-sm font-semibold text-white"><span className="text-lg leading-none">▶</span><span>Play</span></button>{question.marking.id==="accent"&&<button disabled={Boolean(feedback)} onClick={confirmAnswer} className="flex h-11 items-center justify-center rounded-xl border border-green-700 bg-green-600 px-4 text-sm font-semibold text-white hover:bg-green-700">Confirm</button>}</div>}
          {question.type==="identify-text"&&<div className="mt-auto flex w-full items-end justify-between gap-3"><input className="min-h-[48px] w-full max-w-[520px] rounded-xl border border-stone-300 bg-white px-3 py-2 text-base" value={typedAnswer} disabled={Boolean(feedback)} placeholder="Type answer" onChange={e=>setTypedAnswer(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")confirmAnswer();}}/><button disabled={Boolean(feedback)} onClick={confirmAnswer} className="ml-auto flex h-11 items-center justify-center rounded-xl border border-green-700 bg-green-600 px-4 text-sm font-semibold text-white hover:bg-green-700">Confirm</button></div>}
          {question.type==="apply"&&<div className="mt-auto flex w-full items-end justify-between gap-3"><ApplyAnswers selectedMarking={selectedMarking} setSelectedMarking={setSelectedMarking} setSelectedNotes={setSelectedNotes} feedback={feedback}/><div className="flex items-center gap-2"><button disabled={Boolean(feedback)} onClick={()=>setSelectedNotes([])} className="flex h-11 items-center justify-center rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-black hover:bg-stone-100">Clear</button><button disabled={Boolean(feedback)} onClick={confirmAnswer} className="flex h-11 items-center justify-center rounded-xl border border-green-700 bg-green-600 px-4 text-sm font-semibold text-white hover:bg-green-700">Confirm</button></div></div>}
        </div>
      </div>
    </main>
  </div></div>;
}

const root = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
else ReactDOM.render(<App />, root);
  </script>
</body>
</html>
