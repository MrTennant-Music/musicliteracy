function confirm(){if(S.fb)return;stopAudio();if(S.q.type==='identify-text'){let a=clean(S.text);if(!a){S.prompt='Type an answer before pressing Confirm.';render();return}result(S.q.mark.accepted.includes(a));return}if(S.q.type==='apply'){if(!S.mark){S.prompt='Choose a marking first.';render();return}if(!S.notes.length){S.prompt='Select the notes in the score before pressing Confirm.';render();return}result(S.mark===S.q.mark.id&&same(S.notes,S.q.target.noteIds))}}
function toggleMarking(id){if(S.enMarks.includes(id)&&S.enMarks.length===1)return;S.enMarks=S.enMarks.includes(id)?S.enMarks.filter(x=>x!==id):[...S.enMarks,id];if(!S.enMarks.includes('staccato')&&!S.enMarks.includes('legato'))S.enQ=S.enQ.filter(x=>x!=='aural-articulation');nextQ()}
function toggleQ(id){if(S.enQ.includes(id)&&S.enQ.length===1)return;let on=!S.enQ.includes(id);S.enQ=on?[...S.enQ,id]:S.enQ.filter(x=>x!==id);if(id==='aural-articulation'&&on){S.enMarks=Array.from(new Set([...S.enMarks,'staccato','legato']))}nextQ()}
function render(){let acc=S.att?Math.round(S.correct/S.att*100):0;document.getElementById('app').innerHTML=`<header class="card top"><div><h1>Articulation Markings</h1><p>Read the music below and answer the questions that follow.</p></div><div class="stats"><div class="stat"><small>Score</small><b>${S.correct}/${S.att}</b></div><div class="stat"><small>Accuracy</small><b>${acc}%</b></div><div class="stat"><small>Streak</small><b>${S.streak}</b></div></div></header><main class="card" style="margin-top:18px"><div class="toolbar"><div class="custom"><button class="btn" id="customBtn">⚙️ Customise</button>${S.custom?`<section class="panel"><h3>Customise</h3><h4>Articulations</h4>${MARKINGS.map(m=>`<div class="row" data-mark="${m.id}"><span style="display:flex;align-items:center;gap:10px"><span>${glyph(m.id)}</span><b>${m.label}</b></span><span class="switch ${S.enMarks.includes(m.id)?'on':''}"><span></span></span></div>`).join('')}<h4>Question types</h4>${QTS.map(q=>`<div class="row" data-qt="${q}"><b>${QTL[q]}</b><span class="switch ${S.enQ.includes(q)?'on':''}"><span></span></span></div>`).join('')}</section>`:''}</div><div class="rightBtns"><button class="btn" id="helpBtn" title="Help">?</button><button class="btn reset" id="resetBtn">Reset score</button></div></div>${S.help?`<section class="help"><h3>Articulation is how a note is played or performed.</h3><div class="helpgrid">${MARKINGS.map(m=>`<div class="helpitem"><div class="glyphbox">${glyph(m.id)}</div><div><b>${m.label}</b><br><small>Played ${m.performance.charAt(0).toLowerCase()+m.performance.slice(1)}</small></div></div>`).join('')}</div></section>`:''}<div class="scorebox">${score()}</div><section class="question"><div class="qhead"><div><b>${S.q.prompt}</b>${S.prompt?`<p class="red">${S.prompt}</p>`:''}</div>${S.q.type==='aural-articulation'?`<button class="play" id="playBtn" ${S.playing?'disabled':''}>▶</button>`:''}</div><div id="answers"></div></section><div class="bottom"><div class="feedback ${S.fb?(S.fb.correct?'green':'red'):''}">${S.fb?(S.fb.correct?'✓ Correct':'✖ Incorrect'):''}</div><div>${S.q.type==='apply'?`<button class="btn clear" id="clearBtn">Clear</button>`:''}${(S.q.type==='identify-text'||S.q.type==='apply')?` <button class="btn confirm" id="confirmBtn">Confirm</button>`:''}</div></div><p>Best streak: ${S.best}</p></main>`;let ans=document.getElementById('answers');if(S.q.type==='identify-choice')ans.innerHTML=`<div class="answers">${MARKINGS.map(m=>`<button class="ans ${S.fb&&m.id===S.q.mark.id?'correct':S.fb&&S.sel===m.id&&m.id!==S.q.mark.id?'wrong':''}" data-answer="${m.id}">${m.label}</button>`).join('')}</div>`;if(S.q.type==='performance')ans.innerHTML=`<div class="answers two">${[...MARKINGS].sort(()=>.5-Math.random()).map(m=>`<button class="ans ${S.fb&&m.id===S.q.mark.id?'correct':S.fb&&S.sel===m.id&&m.id!==S.q.mark.id?'wrong':''}" data-answer="${m.id}">${m.performance}</button>`).join('')}</div>`;if(S.q.type==='aural-articulation')ans.innerHTML=`<div class="answers two">${['staccato','legato'].map(id=>`<button class="ans ${S.fb&&id===S.q.mark.id?'correct':S.fb&&S.sel===id&&id!==S.q.mark.id?'wrong':''}" data-answer="${id}">${M(id).label}</button>`).join('')}</div>`;if(S.q.type==='identify-text')ans.innerHTML=`<input class="input" id="textInput" value="${S.text}" placeholder="Type answer"> ${S.fb&&!S.fb.correct?`<span class="green"><b>Correct answer: ${S.q.mark.label}</b></span>`:''}`;if(S.q.type==='apply')ans.innerHTML=`<div class="answers">${['staccato','accent','legato','phrase'].map(id=>`<button class="ans ${S.mark===id?'correct':''}" data-pick="${id}">${glyph(id)}</button>`).join('')}</div><p>Choose the symbol, then click the exact notes in the score.</p>`;bind()}
function bind(){document.getElementById('customBtn').onclick=()=>{S.custom=!S.custom;render()};document.getElementById('helpBtn').onclick=()=>{S.help=!S.help;render()};document.getElementById('resetBtn').onclick=()=>{S.correct=0;S.att=0;S.streak=0;S.best=0;nextQ()};document.getElementById('playBtn')?.addEventListener('click',play);document.getElementById('confirmBtn')?.addEventListener('click',confirm);document.getElementById('clearBtn')?.addEventListener('click',()=>{S.notes=[];render()});document.querySelectorAll('[data-answer]').forEach(b=>b.onclick=()=>answer(b.dataset.answer));document.querySelectorAll('[data-pick]').forEach(b=>b.onclick=()=>{S.mark=b.dataset.pick;S.notes=[];render()});document.querySelectorAll('[data-note]').forEach(g=>g.onclick=()=>{if(S.q.type!=='apply'||S.fb||!S.mark)return;let id=g.dataset.note;if(S.mark==='legato'||S.mark==='phrase'){let ids=S.q.bars.flatMap(b=>b.notes.map(n=>n.id));if(!S.notes.length)S.notes=[id];else{let a=ids.indexOf(S.notes[0]),b=ids.indexOf(id);S.notes=ids.slice(Math.min(a,b),Math.max(a,b)+1)}}else S.notes=S.notes.includes(id)?S.notes.filter(x=>x!==id):[...S.notes,id];render()});document.querySelectorAll('[data-mark]').forEach(r=>r.onclick=()=>toggleMarking(r.dataset.mark));document.querySelectorAll('[data-qt]').forEach(r=>r.onclick=()=>toggleQ(r.dataset.qt));let inp=document.getElementById('textInput');if(inp){inp.oninput=e=>S.text=e.target.value;inp.onkeydown=e=>{if(e.key==='Enter')confirm()}}document.addEventListener('pointerdown',e=>{if(S.custom&&!e.target.closest('.custom')){S.custom=false;render()}},{once:true})}
S.q=makeQ();render();
</script>
</body>
</html>
