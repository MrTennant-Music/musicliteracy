<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useRef, useState } = React;

const W = 920, H = 430;
const STAFF_LEFT = 24, STAFF_RIGHT = 896, MUSIC_START = 125;
const SYSTEM_TOPS = [62, 187], AURAL_TOPS = [122];
const GAP = 10, NOTE_RX = 6.3, STEM = 32;
const BAR_COUNT = 8, AURAL_BAR_COUNT = 4, BARS_PER_SYSTEM = 4;
const MAX_MELODIC_LEAP_STEPS = 7;
const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS || {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG || { drawing: {}, symbols: {} };
const COLOUR = { yellow:"#facc15", green:"#16a34a", red:"#dc2626", black:"#000" };
const HIGHLIGHT_TEXT_STYLE = { textShadow:"0 0 3px #facc15, 0 0 6px #eab308" };

const MARKINGS = [
  { id:"staccato", label:"Staccato", plural:"staccato markings", performance:"Short and detached", accepted:["staccato","staccato marking","staccato markings","staccato dots","dots"] },
  { id:"slur", label:"Slur", plural:"slur markings", performance:"Smoothly and connected", accepted:["slur","slurs","slurred","slur marking","slur markings","legato","legato marking","legato markings"] },
  { id:"phrase", label:"Phrase", plural:"phrase markings", performance:"With musical shape", accepted:["phrase","phrase mark","phrase marks","phrase marking","phrase markings","phrasing"] },
  { id:"accent", label:"Accent", plural:"accents", performance:"With extra emphasis", accepted:["accent","accents","accented","accent marking","accent markings"] },
];

const LEVELS = {
  H: { label:"Higher", description:"Accents • Slurs • Staccato • Phrase mark" },
};

const ASSET = {
  appIcon:"https://mrtennant-music.github.io/musicliteracy/articulation-markings-icon.svg",
  customise:"https://mrtennant-music.github.io/musicliteracy/customise.svg",
  levels:"https://mrtennant-music.github.io/musicliteracy/levels.svg",
  next:"https://mrtennant-music.github.io/musicliteracy/next.svg",
  eye:"./eye.svg",
  metronome:"./metronome.svg",
  tempo:"./tempo.svg",
  hand:"./hand.svg",
  audio:"./audio-svgrepo-com.svg",
  bronze:"https://mrtennant-music.github.io/musicliteracy/bronze.svg",
  silver:"https://mrtennant-music.github.io/musicliteracy/silver.svg",
  gold:"https://mrtennant-music.github.io/musicliteracy/gold.svg",
  diamond:"https://mrtennant-music.github.io/musicliteracy/diamond.svg",
};

const QUESTION_TYPES = ["identify-choice","identify-text","apply","aural-articulation"];
const DEFAULT_MARKINGS = MARKINGS.map(mark => mark.id);
const QUESTION_LABELS = {
  "identify-choice":"Multiple Choice",
  "identify-text":"Definition",
  apply:"Apply to Score",
  "aural-articulation":"Audio Question",
};
const MENU_MARKING_LABELS = {
  staccato:"Staccato",
  slur:"Slurs",
  phrase:"Phrase mark",
  accent:"Accents",
};
const ANSWER_MARKING_LABELS = {
  slur:"Slurs",
  phrase:"Phrase mark",
};

const NOTES = [
  ["C4",-2,261.63],["D4",-1,293.66],["E4",0,329.63],["F4",1,349.23],["G4",2,392],
  ["A4",3,440],["B4",4,493.88],["C5",5,523.25],["D5",6,587.33],["E5",7,659.25],
  ["F5",8,698.46],["G5",9,783.99],["A5",10,880],
].map(([name,step,freq]) => ({ name, step, freq }));

const TIME_SIGNATURES = [
  { id:"3/4", top:"3", bottom:"4", beats:3 },
  { id:"4/4", top:"4", bottom:"4", beats:4 },
];

const RH = {
  minim:{ beats:2, spacing:4, open:true, stem:true },
  crotchet:{ beats:1, spacing:2.2, open:false, stem:true },
  quaver:{ beats:.5, spacing:1.15, open:false, stem:true, flag:true },
};

const PATTERNS = {
  3: [["crotchet","crotchet","crotchet"],["minim","crotchet"],["crotchet","minim"],["quaver","quaver","crotchet","crotchet"],["crotchet","quaver","quaver","crotchet"],["crotchet","crotchet","quaver","quaver"]],
  4: [["crotchet","crotchet","crotchet","crotchet"],["minim","minim"],["minim","crotchet","crotchet"],["crotchet","crotchet","minim"],["quaver","quaver","crotchet","crotchet","crotchet"],["crotchet","quaver","quaver","crotchet","crotchet"],["crotchet","crotchet","quaver","quaver","crotchet"]],
};

function r(items){ return items[Math.floor(Math.random() * items.length)]; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function m(id){ return MARKINGS.find(x => x.id === id); }
function y(step, top){ return top + GAP * 4 - step * (GAP / 2); }
function freq(step){ return (NOTES.find(n => n.step === step) || NOTES[5]).freq; }
function clean(v){ return v.trim().toLowerCase().replace(/[.,!?]/g,"").split(/\s+/).filter(Boolean).join(" "); }
function sameSet(a,b){ return a.length === b.length && b.every(x => new Set(a).has(x)); }
function letter(step){ return (NOTES.find(n => n.step === step) || NOTES[5]).name[0]; }
function stemDown(step){ return step > 4; }
function levelFromUrl() {
  const raw = new URLSearchParams(window.location.search).get("level") || "H";
  return LEVELS[raw] ? raw : "H";
}
function sharedActualSymbolKey(key) {
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  return key;
}
function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols || {};
  return symbols[key] || symbols[sharedActualSymbolKey(key)] || {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}
function sharedSymbolForKey(key) { return SHARED_SYMBOLS[sharedActualSymbolKey(key)] || ""; }
function CalibratedSymbol({ symbolKey, x, y: yy, colour = "currentColor", opacity = 1, lineGap = GAP, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = yy + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
  const widthScale = Number(settings.widthScale || 1);
  const heightScale = Number(settings.heightScale || 1);
  return <text className="music-symbol" x={adjustedX} y={adjustedY} fill={colour} opacity={opacity} fontSize={fontSize} textAnchor="middle" transform={`translate(${adjustedX} ${adjustedY}) scale(${widthScale} ${heightScale}) translate(${-adjustedX} ${-adjustedY})`} pointerEvents="none">{glyph}</text>;
}
function noteSymbolKey(rhythmId, down, beamed = false) {
  if (rhythmId === "minim") return down ? "halfNoteStemDown" : "halfNoteStemUp";
  if (rhythmId === "quaver" && beamed) return down ? "noteheadBlackStemDown" : "noteheadBlackStemUp";
  if (rhythmId === "quaver") return down ? "eighthNoteStemDown" : "eighthNoteStemUp";
  return down ? "quarterNoteStemDown" : "quarterNoteStemUp";
}
function calibrationAnchorX(symbolKey) {
  if (symbolKey?.startsWith("timeSig")) return STAFF_LEFT + 12 * GAP;
  return STAFF_LEFT;
}
function calibrationAnchorY(symbolKey, top) {
  if (symbolKey?.startsWith("timeSig")) return y(5.3, top);
  return top;
}
function hasSameLetter(notes){
  for(let i=1;i<notes.length;i++) if(letter(notes[i-1].pitch.step) === letter(notes[i].pitch.step)) return true;
  return false;
}

function weighted(items) {
  const total = items.reduce((sum, item) => sum + item.weight, 0);
  let roll = Math.random() * total;
  for (const item of items) {
    roll -= item.weight;
    if (roll <= 0) return item.value;
  }
  return items.at(-1)?.value;
}
function noteIndexFromStep(step){ return NOTES.findIndex(n => n.step === step); }
function nearestTonicIndex(previousIndex){
  const tonicIndexes = NOTES.map((note,index) => ({note,index})).filter(item => item.note.name.startsWith("C"));
  return tonicIndexes.reduce((best,item) => Math.abs(item.index - previousIndex) < Math.abs(best.index - previousIndex) ? item : best, tonicIndexes[0]).index;
}
function chooseNextIndex({ previousIndex, rhythm, beat, forceDirection = 0 }) {
  const strongBeat = beat === 0 || beat === 2;
  const chordLetters = strongBeat ? ["C","E","G"] : ["C","D","E","F","G","A","B"];
  const candidates = NOTES.map((note,index) => {
    const distance = index - previousIndex;
    const absDistance = Math.abs(distance);
    if (absDistance > 3) return null;
    if (rhythm === "quaver" && absDistance > 1) return null;
    if (forceDirection > 0 && distance < 0) return null;
    if (forceDirection < 0 && distance > 0) return null;
    const isChordTone = chordLetters.includes(note.name[0]);
    let weight = isChordTone ? 6 : 2;
    if (strongBeat && isChordTone) weight *= 2.2;
    if (absDistance === 0) weight *= 0.35;
    if (absDistance === 1) weight *= 5;
    if (absDistance === 2) weight *= 2;
    if (absDistance === 3) weight *= 0.45;
    if (index < 1 || index > NOTES.length - 2) weight *= 0.35;
    return { value:index, weight };
  }).filter(Boolean);
  return weighted(candidates.length ? candidates : [{ value:previousIndex, weight:1 }]);
}
function makeBar(ts, prev, barIndex){
  const pattern = r(PATTERNS[ts.beats]);
  const notes = [];
  let idx = prev, beam = 0, active = null;
  const forceDirection = Math.random() < 0.55 ? r([-1,1]) : 0;
  let beat = 0;
  pattern.forEach((rhythm, noteIndex) => {
    let tries = 0, candidateIndex, note;
    do {
      candidateIndex = chooseNextIndex({ previousIndex:idx, rhythm, beat, forceDirection });
      note = { id:`${barIndex}-${noteIndex}`, rhythm, pitch:NOTES[candidateIndex], beat, beamGroupId:null };
      tries++;
    } while(tries < 20 && rhythm === "quaver" && notes.length && notes[notes.length - 1].rhythm === "quaver" && letter(notes[notes.length - 1].pitch.step) === letter(note.pitch.step));
    if(rhythm === "quaver"){
      if(!notes.length || notes[notes.length - 1].rhythm !== "quaver") active = `beam-${beam++}`;
      note.beamGroupId = active;
    } else active = null;
    idx = candidateIndex;
    notes.push(note);
    beat += RH[rhythm]?.beats || 1;
  });
  return { notes, next:idx };
}

function melodyNotes(bars){ return bars.flatMap(bar => bar.notes ?? []).map(note => note.pitch); }
function longestRepeatedPitchRun(notes){
  let longest = 1, current = 1;
  for(let i=1;i<notes.length;i++){
    if(notes[i].step === notes[i-1].step){ current++; longest = Math.max(longest,current); }
    else current = 1;
  }
  return longest;
}
function hasBalancedContour(notes){
  let rises = 0, falls = 0;
  for(let i=1;i<notes.length;i++){
    const interval = notes[i].step - notes[i-1].step;
    if(interval > 0) rises++;
    if(interval < 0) falls++;
  }
  return rises > 0 && falls > 0;
}
function hasAwkwardBarlineLeap(bars){
  return bars.some((bar,index) => {
    const nextBar = bars[index + 1];
    if(!bar?.notes?.length || !nextBar?.notes?.length) return false;
    return Math.abs(nextBar.notes[0].pitch.step - bar.notes.at(-1).pitch.step) > 3;
  });
}
function leapsRecoverByStep(notes){
  for(let i=1;i<notes.length-1;i++){
    const leap = notes[i].step - notes[i-1].step;
    if(Math.abs(leap) < 2) continue;
    const recovery = notes[i+1].step - notes[i].step;
    if(recovery === 0) continue;
    if(Math.sign(recovery) === Math.sign(leap) || Math.abs(recovery) > 1) return false;
  }
  return true;
}
function melodyPassesQualityRules(bars){
  const notes = melodyNotes(bars);
  if(notes.length < 2) return false;
  const intervals = notes.slice(1).map((note,index) => Math.abs(note.step - notes[index].step));
  const range = Math.max(...notes.map(note => note.step)) - Math.min(...notes.map(note => note.step));
  const pitchVariety = new Set(notes.map(note => note.name)).size;
  if(!notes[0].name.startsWith("C")) return false;
  if(!notes.at(-1).name.startsWith("C")) return false;
  if(range > 7) return false;
  if(intervals.some(interval => interval > MAX_MELODIC_LEAP_STEPS)) return false;
  if(Math.max(...intervals) > 3) return false;
  if(hasAwkwardBarlineLeap(bars)) return false;
  if(!hasBalancedContour(notes)) return false;
  if(!leapsRecoverByStep(notes)) return false;
  if(longestRepeatedPitchRun(notes) > 2) return false;
  if(pitchVariety < 3) return false;
  return true;
}
function hasOversizedLeap(bars){
  const notes = melodyNotes(bars);
  return notes.slice(1).some((note,index) => Math.abs(note.step - notes[index].step) > MAX_MELODIC_LEAP_STEPS);
}
function makeBars(ts, count, attempt = 0, tonicStep = 5){
  let prev = noteIndexFromStep(tonicStep);
  const bars = [];
  for(let i=0;i<count;i++){
    const bar = makeBar(ts, prev, i);
    if(i === 0 && bar.notes[0]){
      bar.notes[0].pitch = NOTES[noteIndexFromStep(tonicStep)];
    }
    if(i === count - 1 && bar.notes.length){
      const finalIndex = noteIndexFromStep(tonicStep);
      bar.notes[bar.notes.length - 1].pitch = NOTES[finalIndex];
      bar.next = finalIndex;
    }
    bars.push({ barIndex:i, notes:bar.notes });
    prev = bar.next;
  }
  const mustRegenerate = hasOversizedLeap(bars) || !melodyPassesQualityRules(bars);
  if(mustRegenerate && attempt < 320) return makeBars(ts, count, attempt + 1, tonicStep);
  return bars;
}

function phraseTarget(bars){
  const systemStart = r([0,4]);
  const startBar = systemStart + Math.floor(Math.random() * 3);
  const endBar = Math.min(startBar + r([1,2]), systemStart + 3);
  const noteIds = [];
  for(let b=startBar;b<=endBar;b++) bars[b].notes.forEach(n => noteIds.push(n.id));
  return { startBar, endBar, noteIds };
}

function applyTarget(id, bars){
  if(id === "phrase"){
    const t = phraseTarget(bars);
    return { ...t, prompt: <>Apply <strong>phrase markings</strong> to <strong>bars {t.startBar + 1}–{t.endBar + 1}</strong>. Select the first note and the last note to apply the phrase marking.</> };
  }
  const valid = bars.filter(bar => id !== "slur" || !hasSameLetter(bar.notes));
  const bar = r(valid.length ? valid : bars);
  return { barIndex:bar.barIndex, noteIds:bar.notes.map(n => n.id), prompt: <>Apply <strong>{m(id).plural}</strong> to every note in <strong>bar {bar.barIndex + 1}</strong>.</> };
}

function identifyTarget(id, bars){
  if(id === "phrase") return phraseTarget(bars);
  const eligible = id === "slur" ? bars.filter(bar => bar.notes.length >= 2 && !hasSameLetter(bar.notes)) : bars;
  const bar = r(eligible.length ? eligible : bars);
  const spans = id === "slur" ? [2,3,4].filter(s => s <= bar.notes.length) : [1,2].filter(s => s <= bar.notes.length);
  const choices = [];
  spans.forEach(span => {
    for(let start=0; start<=bar.notes.length-span; start++){
      const slice = bar.notes.slice(start, start + span);
      if(id === "slur" && (slice.length < 2 || hasSameLetter(slice))) continue;
      choices.push({ start, span, slice });
    }
  });
  const chosen = choices.length ? r(choices) : { start:0, span:Math.min(2, bar.notes.length), slice:bar.notes.slice(0, Math.min(2, bar.notes.length)) };
  return { barIndex:bar.barIndex, start:chosen.start, end:chosen.start+chosen.span-1, noteIds:chosen.slice.map(n => n.id) };
}

function makeQuestion(enabledTypes=QUESTION_TYPES, enabledMarkings=MARKINGS.map(x => x.id)){
  const type = r(enabledTypes.length ? enabledTypes : QUESTION_TYPES);
  const choiceMode = type === "identify-choice" && Math.random() < 0.5 ? "performance" : "name";
  const isAural = type === "aural-articulation";
  const ts = r(TIME_SIGNATURES);
  const barCount = isAural ? AURAL_BAR_COUNT : BAR_COUNT;
  const bars = makeBars(ts, barCount, 0, isAural ? r([-2,5]) : 5);

  const markingPool = MARKINGS.filter(x => enabledMarkings.includes(x.id));
  const auralPool = ["staccato","slur"].filter(id => enabledMarkings.includes(id));
  const marking = isAural
    ? (Math.random() < .33 ? m("accent") : m(r(auralPool.length ? auralPool : ["staccato","slur"])))
    : r(markingPool.length ? markingPool : MARKINGS);

  const allAuralIds = bars.flatMap(bar => bar.notes.map(n => n.id));
  const target = marking.id === "accent" && isAural
    ? { barIndex:0, noteIds:[r(allAuralIds)] }
    : isAural
    ? { barIndex:0, noteIds:allAuralIds }
    : type === "apply"
    ? applyTarget(marking.id, bars)
    : identifyTarget(marking.id, bars);

  let prompt = null;
  if(type === "identify-choice" && choiceMode === "performance"){
    const loc = target.barIndex !== undefined ? `${target.barIndex + 1}` : `${target.startBar + 1}–${target.endBar + 1}`;
    prompt = <>How should the <strong><span style={HIGHLIGHT_TEXT_STYLE}>highlighted</span></strong> notes in <strong>bar {loc}</strong> be performed?</>;
  } else if(type === "identify-choice") prompt = <>Identify the marking used on the <strong><span style={HIGHLIGHT_TEXT_STYLE}>highlighted</span></strong> notes.</>;
  if(type === "identify-text") prompt = <>Type the name of the marking used on the <strong><span style={HIGHLIGHT_TEXT_STYLE}>highlighted</span></strong> notes.</>;
  if(type === "apply") prompt = target.prompt;
  if(type === "aural-articulation") prompt = <>Listen to the excerpt and identify which articulation marking has been applied to the notes.</>;
  if(type === "aural-articulation" && marking.id === "accent") prompt = <>Listen to the excerpt and apply an <strong>accent</strong> to the note where it occurs.</>;

  return { id:Math.random().toString(36).slice(2), timeSignature:ts, bars, type, choiceMode, marking, target, prompt, barCount };
}

function StaffLines({top}){ return <g>{[0,1,2,3,4].map(i => <line key={i} x1={STAFF_LEFT} x2={STAFF_RIGHT} y1={top+i*GAP} y2={top+i*GAP} stroke="currentColor" strokeWidth="1.2" />)}</g>; }
function Ledger({x, step, top, colour}){ const lines=[]; if(step<=-2) lines.push(y(-2,top)); if(step>=10) lines.push(y(10,top)); const width = GAP * (SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4); const thickness = GAP * (SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11); return <g>{lines.map(yy => <line key={yy} x1={x-width/2} x2={x+width/2} y1={yy} y2={yy} stroke={colour} strokeWidth={thickness} />)}</g>; }
function stemData(note, x, top, override=null){ const step=note.pitch.step, yy=y(step,top), down=override===null?stemDown(step):override, sx=down?x-NOTE_RX:x+NOTE_RX, ey=down?yy+STEM:yy-STEM; return { step, y:yy, down, sx, ey }; }
function OpenNoteGlow({ x, y: yy, inner = false }) {
  return <ellipse cx={x} cy={yy} rx={inner ? NOTE_RX - 2.4 : NOTE_RX + 2.2} ry={inner ? 2.6 : 6.4} transform={`rotate(-18 ${x} ${yy})`} fill={COLOUR.yellow} opacity={inner ? "0.24" : "0.22"} />;
}
function Note({note, x, top, colour="currentColor", override=null, forced=null, beamed=false, onClick=null, highlight=false}){
  const info = RH[note.rhythm] || RH.crotchet;
  const st = stemData(note,x,top,override);
  const ey = forced === null ? st.ey : forced;
  const stemThickness = Math.max(1, GAP * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12));
  return <g onClick={onClick} className={onClick ? "cursor-pointer" : ""}>
    <circle cx={x} cy={st.y} r="18" fill="transparent" />
    <g filter={highlight ? "url(#noteGlowPulse)" : undefined}>
      <Ledger x={x} step={st.step} top={top} colour={colour} />
      {highlight && info.open && <OpenNoteGlow x={x} y={st.y} />}
      <CalibratedSymbol symbolKey={noteSymbolKey(note.rhythm, st.down, beamed)} x={x} y={st.y} colour={colour} />
      {beamed && info.stem && <line x1={st.sx} x2={st.sx} y1={st.y} y2={ey} stroke={colour} strokeWidth={stemThickness} />}
      {highlight && info.open && <OpenNoteGlow x={x} y={st.y} inner />}
    </g>
  </g>;
}
function positions(notes,start,end){ const inner=start+10, units=notes.reduce((s,n)=>s+(RH[n.rhythm]?.spacing||2.2),0), unit=Math.max(1,end-inner)/Math.max(1,units); let c=inner+unit*.35; return notes.map(n => { const x=c; c += (RH[n.rhythm]?.spacing||2.2)*unit; return x; }); }
function groups(notes){ const out=[]; let i=0; while(i<notes.length){ if(notes[i].rhythm !== "quaver" || notes[i].beamGroupId === null){ i++; continue; } const s=i,id=notes[i].beamGroupId; while(i<notes.length && notes[i].rhythm==="quaver" && notes[i].beamGroupId===id) i++; if(i-1>s) out.push({start:s,end:i-1}); } return out; }
function groupFor(gs,i){ return gs.find(g => i>=g.start && i<=g.end) || null; }
function beamY(x,a,b){ if(!a || !b || a.x===b.x) return a ? a.y : 0; const p=(x-a.x)/(b.x-a.x); return a.y+p*(b.y-a.y); }
function beamData(notes,xs,top){
  const avg=notes.reduce((s,n)=>s+n.pitch.step,0)/notes.length;
  const down=avg>4;
  const settings = sharedSymbolConfig("quaverBeam");
  const xOffset = GAP * Number(settings.xOffsetScale || 0);
  const yOffset = GAP * Number(settings.yOffsetScale || 0);
  const stemLength = STEM * Number(settings.heightScale || 1);

  useClickOutside([levelRef,customiseRef],[()=>levelOpen&&setLevelOpen(false),()=>customiseOpen&&setCustomiseOpen(false)]);
  const acc=attempted===0?0:Math.round(correct/attempted*100);
  const medalEligible=taskMatchesLevel(enabledMarkings,enabledTypes);
  const displayedLevel=medalEligible?activeLevel:"Custom";
  const displayedLevelLabel=medalEligible?LEVELS[activeLevel].label:"Custom";
  const showMC=question.type==="identify-choice"||(question.type==="aural-articulation"&&question.marking.id!=="accent");
  const textCanConfirm=clean(typedAnswer).length>0;
  const applyNeedsRange=selectedMarking==="slur"||selectedMarking==="phrase";
  const applyCanConfirm=Boolean(selectedMarking)&&(applyNeedsRange?selectedNotes.length>=2:selectedNotes.length>0);
  const auralAccentCanConfirm=question.type==="aural-articulation"&&question.marking.id==="accent"&&selectedNotes.length>0;
  const canClearApply=selectedNotes.length>0;
  function stopAudio(fade=false){
    clearTimeout(timerRef.current); timerRef.current=null;
    highlightTimersRef.current.forEach(id=>clearTimeout(id)); highlightTimersRef.current=[]; setActiveNoteId(null);
    const ctx=audioRef.current;
    if(!ctx){ setPlaying(false); return; }
    if(fade && masterRef.current){
      const now=ctx.currentTime;
      try{ masterRef.current.gain.cancelScheduledValues(now); masterRef.current.gain.setValueAtTime(masterRef.current.gain.value,now); masterRef.current.gain.exponentialRampToValueAtTime(.0001,now+.18); }catch{}
      setTimeout(()=>{try{ctx.close()}catch{}},220);
    } else try{ctx.close()}catch{}
    audioRef.current=null; setPlaying(false);
  }
  useEffect(()=>{
    if(levelTaskStatusRef.current===null){ levelTaskStatusRef.current=medalEligible; return; }
    if(levelTaskStatusRef.current===medalEligible) return;
    levelTaskStatusRef.current=medalEligible;
    window.MLH.resetLevelSessionProgress?.({ setCorrect, setAttempted, setStreak, setBest });
    setConfettiKey(0);
  },[medalEligible]);
  function clearFeedbackTimers(){ feedbackTimersRef.current.forEach(id=>clearTimeout(id)); feedbackTimersRef.current=[]; }
  function resetTask(q){ stopAudio(); clearFeedbackTimers(); setQuestion(q); setSelectedAnswer(null); setTypedAnswer(""); setSelectedMarking(null); setSelectedNotes([]); setPromptMessage(""); setFeedback(null); setFeedbackFading(false); }
  function newQuestion(types=enabledTypes, marks=enabledMarkings){ setQuestionVisible(false); setTimeout(()=>{ resetTask(makeQuestion(types,marks)); setQuestionVisible(true); },260); }
  function resetScore(){ setCorrect(0); setAttempted(0); setStreak(0); setBest(0); setConfettiKey(0); newQuestion(); }
  function applyLevel(level){
    if(!LEVELS[level]) return;
    setActiveLevel(level);
    setLevelOpen(false);
    setCustomiseOpen(false);
    const url=new URL(window.location.href);
    url.searchParams.set("level",level);
    window.history.replaceState({},"",url);
    window.MLH.resetLevelSessionProgress?.({ setCorrect, setAttempted, setStreak, setBest });
    setConfettiKey(0);
    newQuestion();
  }
  function fadeToNext(){ if(!feedback||feedbackFading)return; clearFeedbackTimers(); setFeedbackFading(true); feedbackTimersRef.current.push(setTimeout(()=>newQuestion(),280)); }
  function score(ok){ clearFeedbackTimers(); const ns=ok?streak+1:0; const medalBefore=getStreakMedal(streak); const medalAfter=getStreakMedal(ns); playFeedbackSound(ok); if(medalEligible&&ok&&medalAfter&&(!medalBefore||medalBefore.sound!==medalAfter.sound)){ setConfettiKey(v=>v+1); setTimeout(()=>playFeedbackSound(true,true,medalAfter.sound),420); } setAttempted(v=>v+1); setCorrect(v=>v+(ok?1:0)); setStreak(ns); setBest(v=>Math.max(v,ns)); setFeedback({correct:ok}); if(ok){ feedbackTimersRef.current.push(setTimeout(()=>setFeedbackFading(true),1700)); feedbackTimersRef.current.push(setTimeout(()=>newQuestion(),2000)); } }
  function selectAnswer(id){ if(feedback)return; stopAudio(true); setSelectedAnswer(id); score(id===question.marking.id); }
  function confirmAnswer(){
    if(feedback)return;
    if(question.type==="identify-text"){ const ans=clean(typedAnswer); if(!ans)return; stopAudio(true); score(question.marking.accepted.includes(ans)); return; }
    if(question.type==="apply"){ if(!applyCanConfirm)return; stopAudio(true); score(selectedMarking===question.marking.id && sameSet(selectedNotes,question.target.noteIds)); return; }
    if(question.type==="aural-articulation"&&question.marking.id==="accent"){ if(!auralAccentCanConfirm)return; stopAudio(true); score(sameSet(selectedNotes,question.target.noteIds)); }
  }
  function onNoteClick(id){
    if(question.type==="aural-articulation"&&question.marking.id==="accent"){ if(!feedback)setSelectedNotes([id]); return; }
    if(question.type!=="apply"||feedback||!selectedMarking)return;
    if(selectedMarking==="slur"||selectedMarking==="phrase"){ const all=question.bars.flatMap(b=>b.notes.map(n=>n.id)); if(!selectedNotes.length){setSelectedNotes([id]);return;} const a=all.indexOf(selectedNotes[0]), b=all.indexOf(id); setSelectedNotes(all.slice(Math.min(a,b),Math.max(a,b)+1)); return; }
    setSelectedNotes(cur=>cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]);
  }
  function playAural(){
    if(question.type!=="aural-articulation"||playing)return;
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC){setPromptMessage("Audio playback is not supported in this browser.");return;}
    stopAudio();
    const ctx=new AC(); audioRef.current=ctx; setPlaying(true);
    const master=ctx.createGain(); master.gain.value=1; master.connect(ctx.destination); masterRef.current=master;
    const tempoBpm = tempo === "adagio" ? 66 : tempo === "allegro" ? 120 : 88;
    const beat = 60 / tempoBpm, articulation=question.marking.id==="accent"?"slur":question.marking.id;
    let t=ctx.currentTime+.08;
    question.bars.forEach(bar=>{
      if(metronomeEnabled){
        const barBeats = question.timeSignature?.beats || 4;
        for(let beatIndex=0; beatIndex<barBeats; beatIndex++){
          const clickTime=t+beatIndex*beat;
          const osc=ctx.createOscillator(), gain=ctx.createGain();
          osc.type="square"; osc.frequency.setValueAtTime(beatIndex===0?1400:1000,clickTime);
          gain.gain.setValueAtTime(.0001,clickTime);
          gain.gain.exponentialRampToValueAtTime(.09,clickTime+.002);
          gain.gain.exponentialRampToValueAtTime(.0001,clickTime+.06);
          osc.connect(gain); gain.connect(master); osc.start(clickTime); osc.stop(clickTime+.07);
        }
      }
      bar.notes.forEach(note=>{
      const dur=(RH[note.rhythm]?.beats||1)*beat, sound=articulation==="staccato"?dur*.42:dur*.96;
      if(followPlayback){
        const startMs=Math.max(0,(t-ctx.currentTime)*1000);
        highlightTimersRef.current.push(setTimeout(()=>setActiveNoteId(note.id),startMs));
        highlightTimersRef.current.push(setTimeout(()=>setActiveNoteId(null),startMs+dur*1000));
      }
      const o=ctx.createOscillator(), g=ctx.createGain(), o2=ctx.createOscillator(), g2=ctx.createGain();
      o.type="triangle"; o.frequency.setValueAtTime(freq(note.pitch.step),t);
      o2.type="sine"; o2.frequency.setValueAtTime(freq(note.pitch.step)*2,t);
      g2.gain.setValueAtTime(.12,t);
      g.gain.setValueAtTime(.0001,t);
      const isAccent=question.marking.id==="accent"&&question.target.noteIds.includes(note.id);
      const peak=question.marking.id==="accent" ? (isAccent ? 0.52 : 0.045) : 0.22;
      g.gain.exponentialRampToValueAtTime(peak,t+.015);
      g.gain.exponentialRampToValueAtTime(articulation==="staccato"?.001:.08,t+sound);
      g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.connect(g); o2.connect(g2); g2.connect(g); g.connect(master);
      o.start(t); o2.start(t); o.stop(t+dur); o2.stop(t+dur); t+=dur;
      });
    });
    timerRef.current=setTimeout(()=>{setPlaying(false);audioRef.current=null;try{ctx.close()}catch{}},Math.max(0,(t-ctx.currentTime)*1000)+120);
  }

  return <div className={window.MLH.shell.pageShellClass}>
    <window.MLH.AppHeader icon={ASSET.appIcon} title="Articulation Markings" subtitle="Identify and apply staccatos, slurs, accents and phrase markings.">
      <window.MLH.ScoreStreakPanel
        assets={ASSET}
        correct={correct}
        attempted={attempted}
        accuracy={acc}
        streak={streak}
        bestStreak={best}
        resetScore={resetScore}
        medalEligible={medalEligible}
        confettiKey={confettiKey}
      />
    </window.MLH.AppHeader>

    <div className={window.MLH.shell.pageContentClass}>
    <main className="relative overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-8 pt-[10px] shadow-sm md:h-auto md:overflow-visible md:px-6 md:pb-10 md:pt-[14px]" onPointerDown={()=>{if(feedback)fadeToNext();}}>
      <window.MLH.AppToolbar
        left={<><div className="hub-menu-anchor relative" ref={levelRef}><window.MLH.LevelButton icon={<img src={ASSET.levels} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />} activeLevel={displayedLevel} activeLabel={displayedLevelLabel} isCustom={!medalEligible} onClick={()=>{setCustomiseOpen(false);setLevelOpen(v=>!v);}} dataMenuTrigger={true}/>{levelOpen&&<window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}><window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS}/></window.MLH.MenuPanel>}</div><div className="hub-menu-anchor relative" ref={customiseRef}><window.MLH.CustomiseButton icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />} onClick={()=>{setLevelOpen(false);setCustomiseOpen(v=>!v);}} dataMenuTrigger={true}/>{customiseOpen&&<window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}><MenuRows enabledMarkings={enabledMarkings} setEnabledMarkings={setEnabledMarkings} enabledTypes={enabledTypes} setEnabledTypes={setEnabledTypes} newQuestion={newQuestion} followPlayback={followPlayback} setFollowPlayback={setFollowPlayback} tempo={tempo} setTempo={setTempo} metronomeEnabled={metronomeEnabled} setMetronomeEnabled={setMetronomeEnabled} stopAudio={stopAudio}/></window.MLH.MenuPanel>}</div></>}
        feedback={<FeedbackBanner feedback={feedback} fading={feedbackFading}/>}
        right={<window.MLH.SkipButton resetStreak={()=>setStreak(0)} onClick={()=>newQuestion()} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />}/>}
      />
      <div className={`relative top-[18px] transition-opacity duration-300 md:-top-[18px] ${questionVisible?"opacity-100":"opacity-0"}`}><Score question={question} selectedNotes={selectedNotes} selectedMarking={selectedMarking} feedback={feedback} onNoteClick={onNoteClick} activeNoteId={followPlayback ? activeNoteId : null}/></div>
      <div className={`relative z-10 mt-3 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:-mt-[190px] md:mx-3 ${question.type==="identify-choice"?"min-h-[138px] flex flex-col justify-between":question.type==="identify-text"?"min-h-[132px] flex flex-col justify-between":question.type==="aural-articulation"?"flex flex-col justify-between md:min-h-[138px]":question.type==="apply"?"min-h-[92px]":"min-h-[142px]"}`}>
        <div className="text-stone-900"><p className="text-base font-semibold leading-tight">{question.prompt}</p>{promptMessage&&<p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}{feedback&&!feedback.correct&&question.type==="identify-text"&&<p className="mt-2 text-sm font-bold text-green-700">Correct answer: {question.marking.label}</p>}</div>
        <div className={`${question.type==="aural-articulation"?"mt-4":"mt-3"} flex flex-wrap items-end justify-between gap-3 pb-[0px]`}>
          {showMC&&<div className="w-full"><MultipleChoice question={question} selected={selectedAnswer} feedback={feedback} onSelect={selectAnswer}/></div>}
          {question.type==="aural-articulation"&&<div className={question.marking.id==="accent"?"flex w-full flex-col items-stretch gap-2 md:mt-3 md:flex-row md:items-center md:justify-between":"flex w-full items-center gap-2 md:mt-3"}><button onClick={playAural} disabled={playing||Boolean(feedback)} className={window.MLH.PlayButtonClass}><span className="text-lg leading-none">▶</span><span>Play</span></button>{question.marking.id==="accent"&&<window.MLH.ConfirmButton disabled={Boolean(feedback)||!auralAccentCanConfirm} onClick={confirmAnswer} className={window.MLH.AudioConfirmButtonClass}>Confirm</window.MLH.ConfirmButton>}</div>}
          {question.type==="identify-text"&&<div className="mt-auto flex w-full flex-col items-stretch justify-between gap-3 md:flex-row md:items-end"><input className={window.MLH.typedAnswerClass(feedback, "min-h-[48px] md:max-w-[520px]")} value={typedAnswer} disabled={Boolean(feedback)} placeholder="Type your answer" onChange={e=>setTypedAnswer(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")confirmAnswer();}}/><window.MLH.ConfirmButton disabled={Boolean(feedback)||!textCanConfirm} onClick={confirmAnswer} className="md:ml-auto">Confirm</window.MLH.ConfirmButton></div>}
          {question.type==="apply"&&<div className="mt-auto flex w-full flex-col gap-3 md:flex-row md:items-end md:justify-between"><ApplyAnswers selectedMarking={selectedMarking} setSelectedMarking={setSelectedMarking} setSelectedNotes={setSelectedNotes} feedback={feedback}/><div className={window.MLH.ActionButtonGroupClass}><button disabled={Boolean(feedback)||!canClearApply} onClick={()=>setSelectedNotes([])} className={window.MLH.ClearButtonClass}>Clear</button><window.MLH.ConfirmButton disabled={Boolean(feedback)||!applyCanConfirm} onClick={confirmAnswer}>Confirm</window.MLH.ConfirmButton></div></div>}
        </div>
      </div>
    </main>
  </div></div>;
}

const root = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
else ReactDOM.render(<App />, root);
  </script>
<script src="./footer.js?v=1.3"></script>
</body>
</html>
