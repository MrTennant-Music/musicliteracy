<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Repeat Signs Golden App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const W = 920;
const H = 430;
const STAFF_LEFT = 24;
const STAFF_RIGHT = 896;
const MUSIC_START = 125;
const SYSTEM_TOPS = [62, 187];
const GAP = 10;
const NOTE_RX = 6.3;
const NOTE_RY = 4.6;
const STEM = 32;
const BAR_COUNT = 8;
const BARS_PER_SYSTEM = 4;
const TREBLE = String.fromCodePoint(0x1d11e);
const TICK = String.fromCodePoint(0x2714);
const CROSS = String.fromCodePoint(0x2716);

const COLOUR = {
  blue: "#2563eb",
  green: "#16a34a",
  red: "#dc2626",
  black: "#000000",
};

const SYMBOLS = [
  { id: "start-repeat", label: "Start Repeat" },
  { id: "end-repeat", label: "End Repeat" },
  { id: "first-time", label: "1st Time Bar" },
  { id: "second-time", label: "2nd Time Bar" },
  { id: "dc", label: "Da Capo" },
];

const QUESTION_TYPES = ["dc", "straight-repeat", "first-second"];
const QUESTION_LABELS = {
  dc: "Da Capo",
  "straight-repeat": "Repeat Signs",
  "first-second": "1st and 2nd Time Bars",
};

const TIME_SIGNATURES = [
  { id: "2/4", top: "2", bottom: "4", beats: 2, compound: false },
  { id: "3/4", top: "3", bottom: "4", beats: 3, compound: false },
  { id: "4/4", top: "4", bottom: "4", beats: 4, compound: false },
  { id: "6/8", top: "6", bottom: "8", beats: 6, compound: true },
];

const NOTES = [
  ["C4", -2, 261.63], ["D4", -1, 293.66], ["E4", 0, 329.63], ["F4", 1, 349.23],
  ["G4", 2, 392], ["A4", 3, 440], ["B4", 4, 493.88], ["C5", 5, 523.25],
  ["D5", 6, 587.33], ["E5", 7, 659.25], ["F5", 8, 698.46], ["G5", 9, 783.99], ["A5", 10, 880],
].map(([name, step, freq]) => ({ name, step, freq }));

const RH = {
  semibreve: { beats: 4, spacing: 4.4, open: true, stem: false, flag: false },
  dottedMinim: { beats: 3, spacing: 3.4, open: true, stem: true, flag: false, dotted: true },
  minim: { beats: 2, spacing: 2.6, open: true, stem: true, flag: false },
  dottedCrotchet: { beats: 1.5, spacing: 2.15, open: false, stem: true, flag: false, dotted: true },
  crotchet: { beats: 1, spacing: 1.65, open: false, stem: true, flag: false },
  quaver: { beats: 0.5, spacing: 0.95, open: false, stem: true, flag: true },
};

const SIMPLE_PATTERNS = {
  2: [["crotchet", "crotchet"], ["minim"], ["quaver", "quaver", "crotchet"], ["crotchet", "quaver", "quaver"], ["quaver", "quaver", "quaver", "quaver"]],
  3: [["crotchet", "crotchet", "crotchet"], ["minim", "crotchet"], ["crotchet", "minim"], ["quaver", "quaver", "crotchet", "crotchet"], ["crotchet", "quaver", "quaver", "crotchet"], ["crotchet", "crotchet", "quaver", "quaver"]],
  4: [["crotchet", "crotchet", "crotchet", "crotchet"], ["minim", "minim"], ["minim", "crotchet", "crotchet"], ["crotchet", "crotchet", "minim"], ["quaver", "quaver", "crotchet", "crotchet", "crotchet"], ["crotchet", "quaver", "quaver", "crotchet", "crotchet"], ["quaver", "quaver", "quaver", "quaver", "crotchet", "crotchet"]],
};

const SIX_EIGHT_PATTERNS = [
  ["dottedCrotchet", "dottedCrotchet"],
  ["quaver", "quaver", "quaver", "quaver", "quaver", "quaver"],
  ["dottedCrotchet", "quaver", "quaver", "quaver"],
  ["quaver", "quaver", "quaver", "dottedCrotchet"],
  ["crotchet", "quaver", "crotchet", "quaver"],
  ["crotchet", "quaver", "dottedCrotchet"],
  ["dottedCrotchet", "crotchet", "quaver"],
];

const CHORDS = {
  C: ["C", "E", "G"],
  F: ["F", "A", "C"],
  G: ["G", "B", "D"],
  Am: ["A", "C", "E"],
  Dm: ["D", "F", "A"],
};

const PROGRESSIONS = [
  ["C", "F", "Am", "G", "C", "F", "G", "C"],
  ["C", "Am", "F", "G", "C", "F", "G", "C"],
  ["C", "Dm", "F", "G", "Am", "F", "G", "C"],
  ["C", "F", "C", "G", "Am", "F", "G", "C"],
];

function r(items) { return items[Math.floor(Math.random() * items.length)]; }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function rhythm(id) { return RH[id] || RH.crotchet; }
function y(step, top) { return top + GAP * 4 - step * (GAP / 2); }
function stemDown(step) { return step > 4; }
function freqForStep(step) { return (NOTES.find(n => n.step === step) || NOTES[5]).freq; }
function barWidth() { return (STAFF_RIGHT - MUSIC_START) / BARS_PER_SYSTEM; }
function placeKey(p) { return `${p.symbolId}:${p.barIndex}:${p.anchor}`; }

function noteIndexFromLetter(letter, preferred = 7) {
  const candidates = NOTES.map((note, index) => ({ ...note, index })).filter(note => note.name[0] === letter);
  return candidates.reduce((best, item) => Math.abs(item.index - preferred) < Math.abs(best.index - preferred) ? item : best, candidates[0]).index;
}

function weighted(items) {
  const total = items.reduce((sum, item) => sum + item.weight, 0);
  let roll = Math.random() * total;
  for (const item of items) {
    roll -= item.weight;
    if (roll <= 0) return item.value;
  }
  return items[items.length - 1].value;
}

function beatPositions(pattern) {
  let beat = 0;
  return pattern.map(id => {
    const start = beat;
    beat += rhythm(id).beats;
    return start;
  });
}

function strongBeat(startBeat, ts) {
  return startBeat === 0 || (ts.id === "4/4" && startBeat === 2) || (ts.id === "6/8" && startBeat === 3);
}

function canPassing(pattern, i) {
  return pattern[i] === "quaver" && pattern[i - 1] === "quaver";
}

function choosePattern(ts, barIndex, motifs) {
  if (barIndex === 7) {
    return { "2/4": ["minim"], "3/4": ["dottedMinim"], "4/4": ["semibreve"], "6/8": ["dottedMinim"] }[ts.id];
  }
  const source = ts.compound ? SIX_EIGHT_PATTERNS : SIMPLE_PATTERNS[ts.beats];
  if (barIndex === 1 && motifs[0] && Math.random() < 0.65) return motifs[0];
  if (barIndex === 3 && motifs[0] && Math.random() < 0.45) return motifs[0];
  if (barIndex === 5 && motifs[4] && Math.random() < 0.55) return motifs[4];
  if (barIndex === 6 && Math.random() < 0.45) {
    if (ts.id === "2/4") return ["crotchet", "crotchet"];
    if (ts.id === "3/4") return ["minim", "crotchet"];
    if (ts.id === "4/4") return ["minim", "crotchet", "crotchet"];
    if (ts.id === "6/8") return ["dottedCrotchet", "crotchet", "quaver"];
  }
  return r(source);
}

function chooseNoteIndex({ previousIndex, previousMove, chordLetters, isStrong, allowPassing, forceStepwise, barIndex, noteIndex, noteCount }) {
  if (barIndex === 0 && noteIndex === 0) return r([noteIndexFromLetter("C", 0), noteIndexFromLetter("C", 7)]);
  if (barIndex === 7 && noteIndex === noteCount - 1) return r([noteIndexFromLetter("C", 0), noteIndexFromLetter("C", 7)]);

  const contour = barIndex < 3 ? 1 : barIndex > 3 ? -1 : 0;
  const finalPhrase = barIndex >= 6;
  const candidates = [];

  NOTES.forEach((note, index) => {
    const letter = note.name[0];
    const isChordTone = chordLetters.includes(letter);
    if (!isChordTone && !allowPassing) return;

    const distance = index - previousIndex;
    const abs = Math.abs(distance);
    if (forceStepwise && abs !== 1) return;

    let weight = 1;
    weight *= isStrong ? (isChordTone ? 10 : 0) : (isChordTone ? 4 : 2.5);
    if (abs === 0) weight *= 2.1;
    if (abs === 1) weight *= 5.5;
    if (abs === 2) weight *= 3.1;
    if (abs === 3) weight *= 1.1;
    if (abs >= 4) weight *= 0.15;
    if (previousMove >= 3 && distance < 0 && abs <= 2) weight *= 4;
    if (previousMove <= -3 && distance > 0 && abs <= 2) weight *= 4;
    if (Math.abs(previousMove) >= 3 && Math.sign(distance) === Math.sign(previousMove)) weight *= 0.2;
    if (contour > 0 && distance > 0) weight *= 1.7;
    if (contour < 0 && distance < 0) weight *= 1.7;
    if (finalPhrase && ["G", "D", "B", "C", "E"].includes(letter)) weight *= 1.6;
    if (barIndex === 7 && ["C", "E", "G"].includes(letter)) weight *= 3;
    if (index < 1 || index > NOTES.length - 2) weight *= 0.35;
    candidates.push({ value: index, weight });
  });

  return weighted(candidates.length ? candidates : [{ value: previousIndex, weight: 1 }]);
}

function makeBars(ts) {
  const bars = [];
  const motifs = {};
  const progression = [...r(PROGRESSIONS)];
  progression[2] = progression[2] === "G" ? "F" : progression[2];
  progression[3] = "G";

  let previousIndex = noteIndexFromLetter("C", 7);
  let previousMove = 0;

  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex++) {
    const pattern = choosePattern(ts, barIndex, motifs);
    motifs[barIndex] = pattern;
    const starts = beatPositions(pattern);
    const chord = progression[barIndex] || "C";
    const chordLetters = CHORDS[chord] || CHORDS.C;

    const notes = pattern.map((rhythmId, noteIndex) => {
      const next = chooseNoteIndex({
        previousIndex,
        previousMove,
        chordLetters,
        isStrong: strongBeat(starts[noteIndex], ts),
        allowPassing: canPassing(pattern, noteIndex),
        forceStepwise: rhythmId === "quaver",
        barIndex,
        noteIndex,
        noteCount: pattern.length,
      });
      const note = { id: `${barIndex}-${noteIndex}`, barIndex, noteIndex, rhythm: rhythmId, step: NOTES[next].step, chord };
      previousMove = next - previousIndex;
      previousIndex = next;
      return note;
    });

    bars.push({ barIndex, notes, chord });
  }

  const bar7Last = bars[6]?.notes?.[bars[6].notes.length - 1];
  const bar8First = bars[7]?.notes?.[0];
  const bar8FirstIndex = NOTES.findIndex(note => note.step === bar8First?.step);
  if (bar7Last && bar8FirstIndex >= 0) {
    const candidates = [bar8FirstIndex - 1, bar8FirstIndex + 1].filter(i => i >= 0 && i < NOTES.length);
    bar7Last.step = NOTES[r(candidates)].step;
  }

  return bars;
}

function makeQuestion(enabledTypes = QUESTION_TYPES) {
  const active = enabledTypes.length ? enabledTypes : QUESTION_TYPES;
  const type = r(active);
  const ts = r(TIME_SIGNATURES);
  const bars = makeBars(ts);
  let performedOrder = [];
  let required = [];

  if (type === "dc") {
    performedOrder = [0,1,2,3,4,5,6,7,0,1,2,3,4,5,6,7];
    required = [{ symbolId: "dc", barIndex: 7, anchor: "above" }];
  }

  if (type === "straight-repeat") {
    const repeat = r([{ start: 0, end: 3 }, { start: 4, end: 7 }]);
    performedOrder = [
      ...Array.from({ length: repeat.end + 1 }, (_, i) => i),
      ...Array.from({ length: repeat.end - repeat.start + 1 }, (_, i) => repeat.start + i),
      ...Array.from({ length: BAR_COUNT - repeat.end - 1 }, (_, i) => repeat.end + 1 + i),
    ];
    required = [
      { symbolId: "start-repeat", barIndex: repeat.start, anchor: "start", optional: repeat.start === 0 },
      { symbolId: "end-repeat", barIndex: repeat.end, anchor: "end" },
    ];
  }

  if (type === "first-second") {
    performedOrder = [0,1,2,3,4,5,6,4,5,7];
    required = [
      { symbolId: "start-repeat", barIndex: 4, anchor: "start" },
      { symbolId: "end-repeat", barIndex: 6, anchor: "end" },
      { symbolId: "first-time", barIndex: 6, anchor: "above" },
      { symbolId: "second-time", barIndex: 7, anchor: "above" },
    ];
  }

  return {
    id: Math.random().toString(36).slice(2),
    type,
    timeSignature: ts,
    bars,
    performedOrder,
    required,
    prompt: "Listen to the music and insert the appropriate repeat symbol(s) so that the written music matches what you hear.",
  };
}

function barGeo(barIndex) {
  const systemIndex = Math.floor(barIndex / BARS_PER_SYSTEM);
  const local = barIndex % BARS_PER_SYSTEM;
  const top = SYSTEM_TOPS[systemIndex];
  const bw = barWidth();
  const start = MUSIC_START + local * bw;
  const end = start + bw;
  return { barIndex, systemIndex, local, top, start, end, bw };
}

function notePositions(notes, start, end) {
  const innerStart = start + 12;
  const innerEnd = end - 12;
  const units = notes.reduce((sum, note) => sum + rhythm(note.rhythm).spacing, 0);
  const unit = Math.max(1, innerEnd - innerStart) / Math.max(1, units);
  let cursor = innerStart + unit * 0.38;
  return notes.map(note => {
    const x = cursor;
    cursor += rhythm(note.rhythm).spacing * unit;
    return x;
  });
}

function buildLayouts(question) {
  return question.bars.map(bar => {
    const geo = barGeo(bar.barIndex);
    return { ...geo, bar, pos: notePositions(bar.notes, geo.start, geo.end) };
  });
}

function stemData(note, x, top, override = null) {
  const yy = y(note.step, top);
  const down = override === null ? stemDown(note.step) : override;
  const sx = down ? x - NOTE_RX : x + NOTE_RX;
  const ey = down ? yy + STEM : yy - STEM;
  return { y: yy, down, sx, ey };
}

function quaverGroups(notes, ts) {
  const out = [];
  let i = 0;
  while (i < notes.length) {
    if (notes[i].rhythm !== "quaver") { i++; continue; }
    const start = i;
    while (i < notes.length && notes[i].rhythm === "quaver") i++;
    const end = i - 1;
    if (end > start) {
      if (ts.id === "6/8") {
        for (let groupStart = start; groupStart <= end; groupStart += 3) {
          const groupEnd = Math.min(groupStart + 2, end);
          if (groupEnd > groupStart) out.push({ start: groupStart, end: groupEnd });
        }
      } else out.push({ start, end });
    }
  }
  return out;
}

function groupFor(groups, i) { return groups.find(g => i >= g.start && i <= g.end) || null; }
function beamY(x, a, b) {
  if (!a || !b || a.x === b.x) return a ? a.y : 0;
  const p = (x - a.x) / (b.x - a.x);
  return a.y + p * (b.y - a.y);
}
function beamData(notes, xs, top) {
  const avg = notes.reduce((sum, note) => sum + note.step, 0) / notes.length;
  const down = avg > 4;
  const first = stemData(notes[0], xs[0], top, down);
  const last = stemData(notes[notes.length - 1], xs[xs.length - 1], top, down);
  return { down, start: { x: first.sx, y: first.ey }, end: { x: last.sx, y: last.ey } };
}

function placementPos(placement) {
  const geo = barGeo(placement.barIndex);
  if (placement.anchor === "start") {
    const extra = placement.barIndex === 0 || placement.barIndex === 4 ? 6 : 0;
    return { x: geo.start - 3 - extra, y: geo.top, ...geo };
  }
  if (placement.anchor === "end") return { x: geo.end + (placement.barIndex === BAR_COUNT - 1 ? 6 : 4), y: geo.top, ...geo };
  if (placement.anchor === "below") return { x: geo.end - 30, y: geo.top + 74, ...geo };
  if (placement.symbolId === "dc") return { x: geo.end - 30, y: geo.top - 35, ...geo };
  return { x: geo.start + 10, y: geo.top - 38, ...geo };
}

function requiredMatches(required, placements) {
  return required.filter(item => !item.optional).every(item => placements.some(p => placeKey(p) === placeKey(item)));
}

function placementsMatch(question, placements) {
  if (question.type === "dc") {
    const hasDc = placements.some(p => p.symbolId === "dc" && p.barIndex === 7 && p.anchor === "above");
    const hasEndRepeat = placements.some(p => p.symbolId === "end-repeat" && p.barIndex === 7 && p.anchor === "end");
    const badDcBelow = placements.some(p => p.symbolId === "dc" && p.anchor === "below");
    return (hasDc || hasEndRepeat) && !badDcBelow;
  }

  if (question.type === "straight-repeat") {
    const optionalStart = question.required.some(item => item.symbolId === "start-repeat" && item.optional);
    const endTarget = question.required.find(item => item.symbolId === "end-repeat");

    if (optionalStart && endTarget) {
      const hasEndRepeat = placements.some(p => p.symbolId === "end-repeat" && p.barIndex === endTarget.barIndex && p.anchor === "end");
      const hasDc = placements.some(p => p.symbolId === "dc" && p.barIndex === endTarget.barIndex && p.anchor === "above");
      const badDcBelow = placements.some(p => p.symbolId === "dc" && p.anchor === "below");
      return (hasEndRepeat || hasDc) && !badDcBelow;
    }
  }

  return requiredMatches(question.required, placements);
}

function missingRequired(question, placements) {
  if (question.type === "dc") return placementsMatch(question, placements) ? [] : question.required;
  if (question.type === "straight-repeat" && placementsMatch(question, placements)) return [];
  return question.required.filter(item => !item.optional && !placements.some(p => placeKey(p) === placeKey(item)));
}

function wrongPlacements(question, placements) {
  if (question.type === "dc") {
    const accepted = placements.some(p => p.symbolId === "dc" && p.barIndex === 7 && p.anchor === "above") || placements.some(p => p.symbolId === "end-repeat" && p.barIndex === 7 && p.anchor === "end");
    if (accepted) {
      return placements.filter(p =>
        !(p.symbolId === "dc" && p.barIndex === 7 && p.anchor === "above") &&
        !(p.symbolId === "end-repeat" && p.barIndex === 7 && p.anchor === "end") &&
        !(p.symbolId === "start-repeat" && p.barIndex === 0 && p.anchor === "start")
      );
    }
  }

  if (question.type === "straight-repeat") {
    const optionalStart = question.required.some(item => item.symbolId === "start-repeat" && item.optional);
    const endTarget = question.required.find(item => item.symbolId === "end-repeat");

    if (optionalStart && endTarget) {
      const accepted = placements.some(p => p.symbolId === "end-repeat" && p.barIndex === endTarget.barIndex && p.anchor === "end") ||
        placements.some(p => p.symbolId === "dc" && p.barIndex === endTarget.barIndex && p.anchor === "above");

      if (accepted) {
        return placements.filter(p =>
          !(p.symbolId === "end-repeat" && p.barIndex === endTarget.barIndex && p.anchor === "end") &&
          !(p.symbolId === "dc" && p.barIndex === endTarget.barIndex && p.anchor === "above") &&
          !(p.symbolId === "start-repeat" && p.barIndex === 0 && p.anchor === "start")
        );
      }
    }
  }

  return placements.filter(p => {
    if (question.required.some(item => placeKey(item) === placeKey(p))) return false;
    return !(p.symbolId === "start-repeat" && p.barIndex === 0 && question.required.some(item => item.symbolId === "start-repeat" && item.optional));
  });
}

function snap(pointer, selectedSymbolId) {
  if (!selectedSymbolId) return null;
  const systemIndex = pointer.y < (SYSTEM_TOPS[0] + SYSTEM_TOPS[1]) / 2 ? 0 : 1;
  const top = SYSTEM_TOPS[systemIndex];
  const local = clamp(Math.floor((pointer.x - MUSIC_START) / barWidth()), 0, BARS_PER_SYSTEM - 1);
  const barIndex = systemIndex * BARS_PER_SYSTEM + local;

  if (selectedSymbolId === "start-repeat") return { symbolId: selectedSymbolId, barIndex, anchor: "start" };
  if (selectedSymbolId === "end-repeat") return { symbolId: selectedSymbolId, barIndex, anchor: "end" };
  if (selectedSymbolId === "first-time" || selectedSymbolId === "second-time") return { symbolId: selectedSymbolId, barIndex, anchor: "above" };
  if (selectedSymbolId === "dc") return { symbolId: selectedSymbolId, barIndex, anchor: pointer.y > top + GAP * 4 + 18 ? "below" : "above" };
  return null;
}

function Ledger({ x, step, top, colour }) {
  const lines = [];
  if (step <= -2) lines.push(y(-2, top));
  if (step >= 10) lines.push(y(10, top));
  return <g>{lines.map(yy => <line key={yy} x1={x - 12} x2={x + 12} y1={yy} y2={yy} stroke={colour} strokeWidth="1.2" />)}</g>;
}

function Flag({ stemX, stemEndY, down, colour }) {
  const d = down
    ? `M ${stemX} ${stemEndY} C ${stemX + 10} ${stemEndY - 4}, ${stemX + 10} ${stemEndY - 12}, ${stemX + 2} ${stemEndY - 16}`
    : `M ${stemX} ${stemEndY} C ${stemX + 10} ${stemEndY + 4}, ${stemX + 10} ${stemEndY + 12}, ${stemX + 2} ${stemEndY + 16}`;
  return <path d={d} fill="none" stroke={colour} strokeWidth="1.7" strokeLinecap="round" />;
}

function Note({ note, x, top, colour = "currentColor", override = null, forced = null, showFlag = true }) {
  const info = rhythm(note.rhythm);
  const st = stemData(note, x, top, override);
  const ey = forced === null ? st.ey : forced;
  const isLineNote = note.step % 2 === 0;
  const dotOffset = note.step % 2 !== 0 ? 0 : -4;

  return <g>
    <Ledger x={x} step={note.step} top={top} colour={colour} />
    <ellipse cx={x} cy={st.y} rx={NOTE_RX} ry={NOTE_RY} transform={`rotate(-18 ${x} ${st.y})`} fill={info.open ? "white" : colour} stroke={colour} strokeWidth="1.7" />
    {info.dotted && <circle cx={x + 12} cy={st.y + dotOffset} r="1.7" fill={colour} />}
    {isLineNote && <line x1={x - 8} x2={x + 8} y1={st.y} y2={st.y} stroke={colour} strokeWidth="1.2" />}
    {info.stem && <line x1={st.sx} x2={st.sx} y1={st.y} y2={ey} stroke={colour} strokeWidth="1.5" />}
    {info.flag && showFlag && <Flag stemX={st.sx} stemEndY={ey} down={st.down} colour={colour} />}
  </g>;
}

function StartRepeatGlyph({ x, y, colour = "currentColor", opacity = 1 }) {
  return <g opacity={opacity} stroke={colour} fill={colour}>
    <line x1={x + 5} x2={x + 5} y1={y} y2={y + GAP * 4} strokeWidth="4" />
    <line x1={x + 11} x2={x + 11} y1={y} y2={y + GAP * 4} strokeWidth="1.5" />
    <circle cx={x + 18} cy={y + 15} r="2.55" />
    <circle cx={x + 18} cy={y + 25} r="2.55" />
  </g>;
}

function EndRepeatGlyph({ x, y, colour = "currentColor", opacity = 1 }) {
  return <g opacity={opacity} stroke={colour} fill={colour}>
    <line x1={x - 11} x2={x - 11} y1={y} y2={y + GAP * 4} strokeWidth="1.5" />
    <line x1={x - 5} x2={x - 5} y1={y} y2={y + GAP * 4} strokeWidth="4" />

  const [followPlayback, setFollowPlayback] = useState(false);
  const [tempo, setTempo] = useState("andante");

  useEffect(() => () => stopAudio(), []);

  const acc = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);

  function stopAudio(fade = false) {
    clearTimeout(endTimerRef.current);

    highlightTimersRef.current = [];
    const ctx = audioRef.current;
    if (!ctx) { setPlaying(false); setActiveNoteId(null); return; }
    if (fade && masterRef.current) {
      const now = ctx.currentTime;
      try {
        masterRef.current.gain.cancelScheduledValues(now);
        masterRef.current.gain.setValueAtTime(Math.max(masterRef.current.gain.value, 0.0001), now);
        masterRef.current.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      } catch {}
      setTimeout(() => { try { ctx.close(); } catch {} }, 220);
    } else {
      try { ctx.close(); } catch {}
    }
    audioRef.current = null;
    setPlaying(false);
    setActiveNoteId(null);

    setFeedback(null);
    setFeedbackFading(false);
    setWrong([]);
    setMissing([]);
  }

  function newQuestion(types = enabledTypes) {
    setQuestionVisible(false);
    setTimeout(() => {
      resetTask(makeQuestion(types));
      setQuestionVisible(true);
    }, 260);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBest(0);
    newQuestion();
  }

  function fadeToNext() {
    if (!feedback || feedback.correct || feedbackFading) return;
    setFeedbackFading(true);
    setTimeout(() => newQuestion(), 280);
  }

  function score(ok) {
    const ns = ok ? streak + 1 : 0;
    playFeedbackSound(ok);
    setAttempted(v => v + 1);
    setCorrect(v => v + (ok ? 1 : 0));
    setStreak(ns);
    setBest(v => Math.max(v, ns));
    setFeedback({ correct: ok });
    if (ok) {
      setTimeout(() => setFeedbackFading(true), 1700);
      setTimeout(() => newQuestion(), 2000);
    }
  }

  function pointerToSvg(event) {
    const rect = event.currentTarget.getBoundingClientRect();
    return { x: ((event.clientX - rect.left) / rect.width) * W, y: ((event.clientY - rect.top) / rect.height) * H };
  }

  function handlePointerMove(event) {
    if (!selectedSymbolId || feedback) { setHoverPlacement(null); return; }
    setHoverPlacement(snap(pointerToSvg(event), selectedSymbolId));
  }

  function handleLockPlacement(event) {
    if (!selectedSymbolId || feedback || !hoverPlacement) return;
    event.preventDefault();
    const newPlacement = { ...hoverPlacement, localId: Math.random().toString(36).slice(2) };
    setPlacements(current => {
      const isTimeBar = newPlacement.symbolId === "first-time" || newPlacement.symbolId === "second-time";
      const isDc = newPlacement.symbolId === "dc";
      return [
        ...current.filter(p => {
          if (placeKey(p) === placeKey(newPlacement)) return false;
          if (p.symbolId === newPlacement.symbolId) return false;
          if (isTimeBar && (p.symbolId === "first-time" || p.symbolId === "second-time") && p.barIndex === newPlacement.barIndex && p.anchor === newPlacement.anchor) return false;
          if (isDc && p.symbolId === "dc") return false;
          return true;
        }),
        newPlacement,
      ];
    });
    setPromptMessage("");
  }

  function clearPlacements() {
    if (feedback) return;
    setPlacements([]);
    setHoverPlacement(null);
    setPromptMessage("");
  }

  function confirmAnswer() {
    if (feedback) return;
    stopAudio(true);
    if (!placements.length) { setPromptMessage("Place at least one symbol on the score before pressing Confirm."); return; }

    const miss = missingRequired(question, placements);
    const wrongs = wrongPlacements(question, placements);
    setMissing(miss);
    setWrong(wrongs);

    if (question.type === "first-second") {
      const hasFirst = placements.some(p => p.symbolId === "first-time");
      const hasSecond = placements.some(p => p.symbolId === "second-time");
      if (hasFirst && !hasSecond) setPromptMessage("A 1st time bar also needs a 2nd time bar.");
      if (!hasFirst && hasSecond) setPromptMessage("A 2nd time bar needs a matching 1st time bar.");
    }
    if (question.type === "dc" && placements.some(p => p.symbolId === "dc" && p.anchor === "below")) setPromptMessage("D.C. must be placed above the stave.");

    score(placementsMatch(question, placements) && wrongs.length === 0 && miss.length === 0);
  }

  function playExcerpt() {
    if (playing) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { setPromptMessage("Audio playback is not supported in this browser."); return; }
    stopAudio();

    const ctx = new AC();
    audioRef.current = ctx;
    setPlaying(true);
    const master = ctx.createGain();
    master.gain.value = 1;
    master.connect(ctx.destination);
    masterRef.current = master;

    const tempoBpm = tempo === "adagio" ? 66 : tempo === "allegro" ? 120 : 88;
    const beatSeconds = 60 / tempoBpm;
    let t = ctx.currentTime + 0.08;

    question.performedOrder.forEach(barIndex => {
      if (metronomeEnabled) {
        const beatsInBar = question.timeSignature.beats;

        for (let beat = 0; beat < beatsInBar; beat += 1) {
          const clickTime = t + beat * beatSeconds;

          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = "square";
          osc.frequency.setValueAtTime(beat === 0 ? 1400 : 1000, clickTime);

          gain.gain.setValueAtTime(0.0001, clickTime);
          gain.gain.exponentialRampToValueAtTime(0.09, clickTime + 0.002);
          gain.gain.exponentialRampToValueAtTime(0.0001, clickTime + 0.06);

          osc.connect(gain);
          gain.connect(master);

          osc.start(clickTime);
          osc.stop(clickTime + 0.07);
        }
      }
      const bar = question.bars[barIndex];
      const chordStart = t;
      const chordDur = barDuration(bar, beatSeconds);

      chordFrequencies(bar.chord).forEach(f => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        o.type = "sine";
        o.frequency.setValueAtTime(f, chordStart);
        filter.type = "lowpass";
        filter.frequency.setValueAtTime(700, chordStart);
        g.gain.setValueAtTime(0.0001, chordStart);
        g.gain.exponentialRampToValueAtTime(0.047, chordStart + 0.03);
        g.gain.exponentialRampToValueAtTime(0.034, chordStart + chordDur * 0.9);
        g.gain.exponentialRampToValueAtTime(0.0001, chordStart + chordDur);
        o.connect(filter); filter.connect(g); g.connect(master);
        o.start(chordStart); o.stop(chordStart + chordDur);
      });

      bar.notes.forEach(note => {
        const dur = rhythm(note.rhythm).beats * beatSeconds;
        const startMs = Math.max(0, (t - ctx.currentTime) * 1000);
        highlightTimersRef.current.push(setTimeout(() => setActiveNoteId(note.id), startMs));
        highlightTimersRef.current.push(setTimeout(() => setActiveNoteId(null), startMs + dur * 1000));

        const o = ctx.createOscillator();
        const o2 = ctx.createOscillator();
        const g = ctx.createGain();
        const g2 = ctx.createGain();
        o.type = "triangle";
        o.frequency.setValueAtTime(freqForStep(note.step), t);
        o2.type = "sine";
        o2.frequency.setValueAtTime(freqForStep(note.step) * 2, t);
        g2.gain.setValueAtTime(0.08, t);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(0.22, t + 0.015);
        g.gain.exponentialRampToValueAtTime(0.08, t + dur * 0.86);
        g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
        o.connect(g); o2.connect(g2); g2.connect(g); g.connect(master);
        o.start(t); o2.start(t); o.stop(t + dur); o2.stop(t + dur);
        t += dur;
      });
    });

    endTimerRef.current = setTimeout(() => {
      setPlaying(false);
      setActiveNoteId(null);
      highlightTimersRef.current = [];
      audioRef.current = null;
      try { ctx.close(); } catch {}
    }, Math.max(0, (t - ctx.currentTime) * 1000) + 120);
  }

  return <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2"><div className="mx-auto max-w-6xl">
    <header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm"><div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between"><div className="flex items-center gap-4"><AppIcon/><div><h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Repeat Signs</h1><p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Identify and apply repeat signs, 1st and 2nd time bars, and da capo (D.C.).</p></div></div><div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end"><StatCard label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${acc}%`} progress={acc}/><div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${medal ? medal.bg : "bg-stone-50"}`}><StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${best}`} medal={medal}/><div className="relative z-0 flex min-h-[52px] min-w-[30px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700"><div>💎 <span className="text-cyan-500">30</span></div><div className="mt-1">🥇 <span className="text-yellow-500">20</span></div><div className="mt-1">🥈 <span className="text-slate-500">15</span></div><div className="mt-1">🥉 <span className="text-amber-700">10</span></div></div></div></div></div></header>

    <main className="relative -mt-[10px] overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-8 pt-[10px] shadow-sm md:h-auto md:overflow-visible md:px-6 md:pb-10 md:pt-[14px]" onPointerDown={() => { if (feedback && !feedback.correct) fadeToNext(); }}>
      <div className="relative z-20 mb-2.5 flex flex-wrap items-center justify-between gap-3">
        <div className="flex items-center gap-2">
          <div className="relative" ref={customiseRef}><button onClick={() => setCustomiseOpen(v => !v)} className="flex h-11 min-w-[30px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">⚙️ <span>Customise</span></button>{customiseOpen && <div className="absolute left-0 z-[100] mt-2 max-h-[72vh] w-[min(400px,calc(100vw-2rem))] overflow-y-auto rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><h2 className="mb-3 text-center text-base font-semibold">Customise</h2><MenuRows enabledTypes={enabledTypes} setEnabledTypes={setEnabledTypes} resetScore={resetScore} newQuestion={newQuestion} followPlayback={followPlayback} setFollowPlayback={setFollowPlayback} tempo={tempo} setTempo={setTempo} metronomeEnabled={metronomeEnabled} setMetronomeEnabled={setMetronomeEnabled}/></div>}</div>
          <div className="relative" ref={helpRef}><button onClick={() => setHelpOpen(v => !v)} className="flex h-11 items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">💡 <span>Help</span></button>{helpOpen && <div className="absolute left-0 top-12 z-[100] w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><HelpPanel/></div>}</div>
        </div>
        <button onClick={() => newQuestion()} className="flex h-11 min-w-[30px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800"><span>Skip Question</span><span className="text-lg leading-none">→</span></button>
        <div className="pointer-events-none absolute inset-x-0 top-1/2 z-30 flex -translate-y-1/2 justify-center overflow-visible"><FeedbackBanner feedback={feedback} fading={feedbackFading}/></div>
      </div>

      <div className={`relative -top-[18px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>
        <Score question={question} selectedSymbolId={selectedSymbolId} placements={placements} hoverPlacement={hoverPlacement} feedback={feedback} wrong={wrong} missing={missing} activeNoteId={followPlayback ? activeNoteId : null} onPointerMove={handlePointerMove} onPointerLeave={() => setHoverPlacement(null)} onLockPlacement={handleLockPlacement}/>
      </div>

      <div className="relative z-10 mt-3 min-h-[184px] overflow-visible rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:-mt-[190px] md:mx-3">
        <div className="pr-[140px] text-stone-900"><p className="text-base font-semibold leading-tight whitespace-nowrap">{question.prompt}</p>{promptMessage && <p className="mt-2 text-sm font-bold text-red-600">{promptMessage}</p>}</div>

        <button onClick={() => playing ? stopAudio(true) : playExcerpt()} disabled={Boolean(feedback)} className={`absolute right-4 top-3 flex h-11 w-[120px] shrink-0 items-center justify-center gap-2 rounded-xl border px-4 text-sm font-semibold ${Boolean(feedback) ? "border-stone-300 bg-stone-200 text-stone-500" : "border-stone-950 bg-stone-950 text-white"}`}><span className="text-lg leading-none">{playing ? "■" : "▶"}</span><span>{playing ? "Stop" : "Play"}</span></button>

        <div className="mt-4 flex flex-nowrap items-center justify-start gap-3 overflow-visible pb-[2px] pr-0">
          <RepeatAnswers selectedSymbolId={selectedSymbolId} setSelectedSymbolId={(id) => { setSelectedSymbolId(id); setPromptMessage(""); }} feedback={feedback}/>
        </div>

        <p className="absolute bottom-3 left-4 max-w-[calc(100%-250px)] text-sm text-stone-700">Choose a symbol, hover over the score to preview it, then click or tap to lock it in place.</p>

        <div className="absolute bottom-4 right-4 flex items-center gap-2">
          <button disabled={Boolean(feedback) || placements.length === 0} onClick={clearPlacements} className={`flex h-11 items-center justify-center rounded-xl border px-4 text-sm font-semibold ${Boolean(feedback) || placements.length === 0 ? "border-stone-300 bg-stone-200 text-stone-500" : "border-stone-300 bg-white text-black "}`}>Clear</button>
          <button disabled={Boolean(feedback) || placements.length === 0} onClick={confirmAnswer} className={`flex h-11 items-center justify-center rounded-xl border px-4 text-sm font-semibold ${Boolean(feedback) || placements.length === 0 ? "border-stone-300 bg-stone-200 text-stone-500" : "border-green-700 bg-green-600 text-white hover:bg-green-700"}`}>Confirm</button>
        </div>
      </div>
    </main>
  </div></div>;
}

const root = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App />);
else ReactDOM.render(<App />, root);
</script>
</body>
</html>
