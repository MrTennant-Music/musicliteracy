const STAFF = {

const BAR_COUNT = 4;
const CLEF_X = STAFF.left + 16;
const KEY_SIG_X = STAFF.left + 63;
const TIME_SIG_X = STAFF.left + 90;
const MUSIC_START_X = STAFF.left + 112;

const NOTE = {
  rx: 8.2,
  ry: 5.1,
  stemLength: 34,
  headFont: 48.45,
  flagFont: 38,
  accidentalFont: 26,
};

const COLOUR = {

  red: "#dc2626",
  black: "#000000",
};

const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS ?? {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG ?? { symbols: {}, drawing: {} };

const TIME_SIGNATURE_SYMBOLS = {
  "4/4": { top: ["timeSig4"], bottom: ["timeSig4"], key: "timeSig44" },
};

function sharedActualSymbolKey(key) {
  if (key === "flatInScore" || key === "flatKeySignature") return "flat";
  if (key === "sharpInScore" || key === "sharpKeySignature") return "sharp";
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  return key;
}

function sharedSettingsKey(key) {
  if (key === "flatInScore" || key === "sharpInScore") return key;
  return key;
}

function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols ?? {};
  const settingsKey = sharedSettingsKey(key);
  return symbols[settingsKey] ?? symbols[sharedActualSymbolKey(settingsKey)] ?? {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}

function sharedSymbolForKey(key) {
  return SHARED_SYMBOLS[sharedActualSymbolKey(key)] ?? "";
}

function noteSymbolKey(rhythm, down, beamed = false) {
  if (rhythm === "semibreve") return "wholeNote";
  if (beamed && rhythm === "quaver") return down ? "noteheadBlackStemDown" : "noteheadBlackStemUp";
  if (rhythm === "minim") return down ? "halfNoteStemDown" : "halfNoteStemUp";
  if (rhythm === "quaver") return down ? "eighthNoteStemDown" : "eighthNoteStemUp";
  return down ? "quarterNoteStemDown" : "quarterNoteStemUp";
}

const ASSET = {
  appIcon: "https://mrtennant-music.github.io/musicliteracy/scale-degrees-icon.svg",
  level: "https://mrtennant-music.github.io/musicliteracy/levels.svg",
  customise: "https://mrtennant-music.github.io/musicliteracy/customise.svg",
  next: "https://mrtennant-music.github.io/musicliteracy/next.svg",
  bronze: "https://mrtennant-music.github.io/musicliteracy/bronze.svg",
  silver: "https://mrtennant-music.github.io/musicliteracy/silver.svg",
  gold: "https://mrtennant-music.github.io/musicliteracy/gold.svg",
  diamond: "https://mrtennant-music.github.io/musicliteracy/diamond.svg",
};

const LEVELS = {
  H: {
    label: "Higher",
    description: "Identifying tonic, subdominant and dominant notes in the keys of C, G and F major and A minor",
  },
};

const NOTE_STEPS = {
  C4: -2,
  D4: -1,
  E4: 0,
  F4: 1,
  G4: 2,
  A4: 3,
  B4: 4,
  C5: 5,
  D5: 6,
  E5: 7,
  F5: 8,
  G5: 9,
  A5: 10,
};

const KEYS = [
  {
    id: "c-major",
    label: "C major",
    signature: "none",
    scale: ["C", "D", "E", "F", "G", "A", "B"],
    tonic: "C",
    subdominant: "F",
    dominant: "G",
    tonicStart: "C5",
    pool: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  },
  {
    id: "g-major",
    label: "G major",
    signature: "sharp",
    scale: ["G", "A", "B", "C", "D", "E", "F#"],
    tonic: "G",
    subdominant: "C",
    dominant: "D",
    tonicStart: "D5",
    pool: ["C4", "D4", "E4", "F#4", "G4", "A4", "B4", "C5", "D5", "E5", "F#5", "G5", "A5"],
  },
  {
    id: "f-major",
    label: "F major",
    signature: "flat",
    scale: ["F", "G", "A", "Bb", "C", "D", "E"],
    tonic: "F",
    subdominant: "Bb",
    dominant: "C",
    tonicStart: "C5",
    pool: ["C4", "D4", "E4", "F4", "G4", "A4", "Bb4", "C5", "D5", "E5", "F5", "G5", "A5"],
  },
  {
    id: "a-minor",
    label: "A minor",
    signature: "none",
    scale: ["A", "B", "C", "D", "E", "F", "G#"],
    tonic: "A",
    subdominant: "D",
    dominant: "E",
    tonicStart: "E5",
    pool: ["C4", "D4", "E4", "F4", "G#4", "A4", "B4", "C5", "D5", "E5", "F5", "G#5", "A5"],
  },
];

const QUESTION_TYPES = [
  { id: "tonic", label: "tonic" },
  { id: "subdominant", label: "subdominant" },
  { id: "dominant", label: "dominant" },
];

const SCALE_DEGREE_LABELS = ["I", "II", "III", "IV", "V", "VI", "VII"];

const QUESTION_TYPE_GLYPHS = {
  tonic: "Tonic",
  subdominant: "Subdominant",
  dominant: "Dominant",
};

const QUESTION_TYPE_MENU_GLYPHS = {
  tonic: "I",
  subdominant: "IV",
  dominant: "V",
};

const RHYTHMS = {
  semibreve: { beats: 4, spacing: 8, open: true, stem: false, dots: 0, flag: false },
  minim: { beats: 2, spacing: 4, open: true, stem: true, dots: 0, flag: false },
  "dotted-crotchet": { beats: 1.5, spacing: 3.1, open: false, stem: true, dots: 1, flag: false },
  crotchet: { beats: 1, spacing: 2.25, open: false, stem: true, dots: 0, flag: false },
  quaver: { beats: 0.5, spacing: 1.45, open: false, stem: true, dots: 0, flag: true },
};

const BAR_PATTERNS = [
  ["minim", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "minim"],
  ["minim", "minim"],
  ["crotchet", "crotchet", "crotchet", "crotchet"],
  ["dotted-crotchet", "quaver", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
  ["quaver", "quaver", "quaver", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "quaver", "quaver", "crotchet"],
  ["minim", "quaver", "quaver", "quaver", "quaver"],
];

const FINAL_BAR_PATTERNS = [...BAR_PATTERNS, ["semibreve"]];

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function stripAccidental(pitch) {
  return pitch.replace(/[b#]/g, "");
}

function pitchName(pitch) {
  return pitch.replace(/[0-9]/g, "");
}

function pitchLetter(pitch) {
  return pitchName(pitch).replace(/[b#]/g, "");
}

function staffStep(pitch) {
  return NOTE_STEPS[stripAccidental(pitch)] ?? NOTE_STEPS.C5;
}

function yForStep(step) {
  return STAFF.top + STAFF.gap * 4 - step * (STAFF.gap / 2);
}

function stemGoesDown(step) {
  return step > 4;
}

function rhythmInfo(rhythm) {
  return RHYTHMS[rhythm] ?? RHYTHMS.crotchet;
}

function makeBarPattern(barIndex) {
  return randomItem(barIndex === BAR_COUNT - 1 ? FINAL_BAR_PATTERNS : BAR_PATTERNS);
}

function nearestPoolIndex(pool, pitch) {
  const exact = pool.findIndex((item) => item === pitch);
  if (exact >= 0) return exact;
  const matchingName = pool.findIndex((item) => pitchName(item) === pitchName(pitch));
  return matchingName >= 0 ? matchingName : Math.floor(pool.length / 2);
}

function pitchMidi(pitch) {
  const name = pitchName(pitch);
  const octave = Number(pitch.replace(/[^0-9]/g, "")) || 4;
  const semitones = { C: 0, "C#": 1, Db: 1, D: 2, "D#": 3, Eb: 3, E: 4, F: 5, "F#": 6, Gb: 6, G: 7, "G#": 8, Ab: 8, A: 9, "A#": 10, Bb: 10, B: 11 };
  return 12 * (octave + 1) + (semitones[name] ?? 0);
}

function chordLettersForKey(key, chordSymbol) {
  const scale = key.scale;
  const degrees = {
    I: [0, 2, 4],
    IV: [3, 5, 0],
    V: [4, 6, 1],
    VI: [5, 0, 2],
  };
  return (degrees[chordSymbol] ?? degrees.I).map((index) => scale[index]);
}

function makeChordProgression() {
  const bar2 = randomItem(["I", "IV", "V", "VI"]);
  const bar3 = randomItem(["IV", "V"]);
  return ["I", bar2, bar3, "I"];
}

function chooseNextMelodicPitch({ key, chordSymbol, previousPitch, beat, rhythm }) {
  const previousIndex = nearestPoolIndex(key.pool, previousPitch);
  const previousMidi = pitchMidi(previousPitch);
  const chordLetters = chordLettersForKey(key, chordSymbol);
  const strongBeat = beat === 0 || beat === 2;
  const maxLeap = rhythm === "quaver" ? 1 : 4;
  const candidates = [];

  key.pool.forEach((pitch, index) => {
    const distance = index - previousIndex;
    const absDistance = Math.abs(distance);
    const isChordTone = chordLetters.includes(pitchName(pitch));
    const pitchDistance = Math.abs(pitchMidi(pitch) - previousMidi);

    if (absDistance > maxLeap) return;
    if (pitchDistance > 12) return;
    if (strongBeat && !isChordTone) return;
    if (rhythm === "quaver" && absDistance === 0) return;

    let weight = isChordTone ? 8 : 2;
    if (strongBeat) weight *= 2.8;
    if (absDistance === 0) weight *= 0.55;
    if (absDistance === 1) weight *= 5;
    if (absDistance === 2) weight *= 0.9;
    if (absDistance >= 3) weight *= 0.25;
    if (index === 0 || index === key.pool.length - 1) weight *= 0.35;
    candidates.push({ pitch, weight });
  });

  if (!candidates.length) {
    const fallback = key.pool.filter((pitch) => Math.abs(staffStep(pitch) - staffStep(previousPitch)) <= 1 && pitchName(pitch) !== pitchName(previousPitch));
    return randomItem(fallback.length ? fallback : [previousPitch]);
  }

  let roll = Math.random() * candidates.reduce((sum, item) => sum + item.weight, 0);
  for (const item of candidates) {
    roll -= item.weight;
    if (roll <= 0) return item.pitch;
  }
  return candidates.at(-1).pitch;
}

function nearestTargetPitch(key, target, previousPitch) {
  const options = key.pool.filter((pitch) => pitchName(pitch) === target);
  return options.reduce((best, pitch) => Math.abs(pitchMidi(pitch) - pitchMidi(previousPitch)) < Math.abs(pitchMidi(best) - pitchMidi(previousPitch)) ? pitch : best, options[0] ?? `${target}4`);
}

function makeMelodicDictationBar({ key, chordSymbol, pattern, barIndex, previousPitch }) {
  let beat = 0;
  let currentPitch = previousPitch;
  const bar = pattern.map((rhythm, noteIndex) => {
    const pitch = barIndex === 0 && noteIndex === 0
      ? key.tonicStart
      : chooseNextMelodicPitch({ key, chordSymbol, previousPitch: currentPitch, beat, rhythm });
    const note = { id: `note-${barIndex}-${noteIndex}`, pitch, rhythm, barIndex, noteIndex, beat };
    currentPitch = pitch;
    beat += rhythmInfo(rhythm).beats;
    return note;
  });
  return { bar, lastPitch: currentPitch };
}

function makeFinalTonicBar({ key, barIndex, previousPitch }) {
  const pitch = nearestTargetPitch(key, key.tonic, previousPitch);
  return {
    bar: [{ id: `note-${barIndex}-0`, pitch, rhythm: "semibreve", barIndex, noteIndex: 0, beat: 0 }],
    lastPitch: pitch,
  };
}

function allMelodyNotes(bars) {
  return bars.flat();
}

function longestRepeatedPitchRun(notes) {
  let longest = 1;
  let current = 1;
  for (let index = 1; index < notes.length; index += 1) {
    if (pitchName(notes[index].pitch) === pitchName(notes[index - 1].pitch)) {
      current += 1;
      longest = Math.max(longest, current);
    } else {
      current = 1;
    }
  }
  return longest;
}

function hasBalancedContour(notes) {
  let rises = 0;
  let falls = 0;
  for (let index = 1; index < notes.length; index += 1) {
    const interval = staffStep(notes[index].pitch) - staffStep(notes[index - 1].pitch);
    if (interval > 0) rises += 1;
    if (interval < 0) falls += 1;
  }
  return rises > 0 && falls > 0;
}

function hasAwkwardBarlineLeap(bars) {
  return bars.some((bar, index) => {
    const nextBar = bars[index + 1];
    if (!nextBar?.length) return false;
    return Math.abs(staffStep(nextBar[0].pitch) - staffStep(bar.at(-1).pitch)) > 4;
  });
}

function melodyPassesQualityRules(question) {
  const notes = allMelodyNotes(question.bars);
  if (notes.length < 2) return false;
  const steps = notes.map((note) => staffStep(note.pitch));
  const range = Math.max(...steps) - Math.min(...steps);
  const intervals = steps.slice(1).map((step, index) => Math.abs(step - steps[index]));

  if (pitchName(notes[0].pitch) !== question.key.tonic) return false;
  if (pitchName(notes.at(-1).pitch) !== question.key.tonic) return false;
  if (range > 7) return false;
  if (Math.max(...intervals) > 4) return false;
  if (hasAwkwardBarlineLeap(question.bars)) return false;
  if (!hasBalancedContour(notes)) return false;
  if (longestRepeatedPitchRun(notes) > 2) return false;
  return true;
}

function targetFor(questionType, key) {
  if (questionType.id === "tonic") return key.tonic;
  if (questionType.id === "subdominant") return key.subdominant;
  return key.dominant;
}

function forceTargetIntoQuestion(bars, target, key) {
  const nonQuavers = [];

  bars.forEach((bar, barIndex) => {
    bar.forEach((note, noteIndex) => {
      if (barIndex === 0 && noteIndex === 0) return;
      if (barIndex === BAR_COUNT - 1) return;
      if (note.rhythm !== "quaver") nonQuavers.push({ barIndex, noteIndex });
    });
  });

  if (nonQuavers.length === 0) return;

  const chosen = randomItem(nonQuavers);
  const currentPitch = bars[chosen.barIndex][chosen.noteIndex].pitch;
  bars[chosen.barIndex][chosen.noteIndex] = {
    ...bars[chosen.barIndex][chosen.noteIndex],
    pitch: nearestTargetPitch(key, target, currentPitch),
  };
}

function makeQuestion(enabledQuestionTypeIds = QUESTION_TYPES.map((type) => type.id), attempt = 0) {
  const key = randomItem(KEYS);
  const availableQuestionTypes = QUESTION_TYPES.filter((type) => enabledQuestionTypeIds.includes(type.id));
  const questionType = randomItem(availableQuestionTypes.length > 0 ? availableQuestionTypes : QUESTION_TYPES);
  const bars = [];
  const progression = makeChordProgression();
  let previousPitch = key.tonicStart;

  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    const built = barIndex === BAR_COUNT - 1
      ? makeFinalTonicBar({ key, barIndex, previousPitch })
      : makeMelodicDictationBar({ key, chordSymbol: progression[barIndex], pattern: makeBarPattern(barIndex), barIndex, previousPitch });
    bars.push(built.bar);
    previousPitch = built.lastPitch;
  }

  const target = targetFor(questionType, key);
  const hasTarget = bars.some((bar) => bar.some((note) => pitchName(note.pitch) === target));
  if (!hasTarget) forceTargetIntoQuestion(bars, target, key);

  const finalQuestion = {
    id: Math.random().toString(36).slice(2),
    key,
    questionType,
    bars,
    progression,
  };

  if (!melodyPassesQualityRules(finalQuestion) && attempt < 80) {
    return makeQuestion(enabledQuestionTypeIds, attempt + 1);
  }

  return finalQuestion;
}

function isTargetNote(question, note) {
  return pitchName(note.pitch) === targetFor(question.questionType, question.key);
}

function allNotes(question) {
  return question.bars.flat();
}

function accidentalIsInKeySignature(key, pitch) {
  const name = pitchName(pitch);
  return (key.id === "g-major" && name === "F#") || (key.id === "f-major" && name === "Bb");
}

function shouldShowAccidental(key, pitch, accidentalState) {
  if (!(pitch.includes("#") || pitch.includes("b"))) return false;
  if (accidentalIsInKeySignature(key, pitch)) return false;

  const accidentalId = `${pitchLetter(pitch)}:${pitchName(pitch)}`;
  if (accidentalState.has(accidentalId)) return false;

  accidentalState.add(accidentalId);
  return true;
}

function calculateBarPositions(bar, startX, endX) {
  const totalSpacing = bar.reduce((sum, note, index) => {
    const isGroupedQuaver = note.rhythm === "quaver" && (bar[index - 1]?.rhythm === "quaver" || bar[index + 1]?.rhythm === "quaver");
    const boost = isGroupedQuaver ? 1.15 : 1;
    const accidentalSpace = note.pitch.includes("#") || note.pitch.includes("b") ? 0.45 : 0;
    return sum + rhythmInfo(note.rhythm).spacing * boost + accidentalSpace;
  }, 0);

  const unit = Math.max(1, endX - startX - 18) / Math.max(1, totalSpacing);
  let cursor = startX + 12;

  return bar.map((note, index) => {
    if (note.pitch.includes("#") || note.pitch.includes("b")) cursor += unit * 0.45;
    const x = cursor;
    const isGroupedQuaver = note.rhythm === "quaver" && (bar[index - 1]?.rhythm === "quaver" || bar[index + 1]?.rhythm === "quaver");
    const boost = isGroupedQuaver ? 1.15 : 1;
    cursor += rhythmInfo(note.rhythm).spacing * unit * boost;
    return x;
  });
}

function getLayout(question) {
  const barWidth = (STAFF.right - MUSIC_START_X) / BAR_COUNT;
  const positions = {};

  question.bars.forEach((bar, barIndex) => {
    const startX = MUSIC_START_X + barIndex * barWidth + 10;
    const endX = MUSIC_START_X + (barIndex + 1) * barWidth - 7;
    const xs = calculateBarPositions(bar, startX, endX);

    bar.forEach((note, noteIndex) => {
      const step = staffStep(note.pitch);
      positions[note.id] = { x: xs[noteIndex], y: yForStep(step), step };
    });
  });

  return { positions, barWidth };
}

function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", opacity = 1, lineGap = STAFF.gap, filter = null, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
  const widthScale = Number(settings.widthScale || 1);
  const heightScale = Number(settings.heightScale || 1);
  return (
    <text
      className="music-symbol"
      x={adjustedX}
      y={adjustedY}
      fill={colour}
      opacity={opacity}
      filter={filter || undefined}
      fontSize={fontSize}
      textAnchor="middle"
      transform={`translate(${adjustedX} ${adjustedY}) scale(${widthScale} ${heightScale}) translate(${-adjustedX} ${-adjustedY})`}
      pointerEvents="none"
    >
      {glyph}
    </text>
  );
}

function CalibratedTimeSignature({ signature = "4/4", x = TIME_SIG_X, y = STAFF.top + STAFF.gap * 2 }) {
  const definition = TIME_SIGNATURE_SYMBOLS[signature] ?? TIME_SIGNATURE_SYMBOLS["4/4"];
  const settings = sharedSymbolConfig(definition.key);
  const adjustedX = x + STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = y + STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = STAFF.gap * Number(settings.fontSizeScale || 3.5);
  const widthScale = Number(settings.widthScale || 1);
  const heightScale = Number(settings.heightScale || 1);
  const topText = definition.top.map((key) => sharedSymbolForKey(key)).join("");
  const bottomText = definition.bottom.map((key) => sharedSymbolForKey(key)).join("");
  return (
    <g transform={`translate(${adjustedX} ${adjustedY}) scale(${widthScale} ${heightScale}) translate(${-adjustedX} ${-adjustedY})`} fill="currentColor">
      <text className="music-symbol" x={adjustedX} y={adjustedY - fontSize * 0.14} fontSize={fontSize} textAnchor="middle">{topText}</text>
      <text className="music-symbol" x={adjustedX} y={adjustedY + fontSize * 0.43} fontSize={fontSize} textAnchor="middle">{bottomText}</text>
    </g>
  );
}

function StaffLines() {
  return (
    <g>
      {[0, 1, 2, 3, 4].map((line) => (
        <line
          key={line}
          x1={STAFF.left}
          x2={STAFF.right}
          y1={STAFF.top + line * STAFF.gap}
          y2={STAFF.top + line * STAFF.gap}
          stroke="currentColor"
          strokeWidth="1.2"
        />
      ))}
    </g>
  );
}

function TrebleClef() {
  return <CalibratedSymbol symbolKey="gClef" x={STAFF.left + 32} y={yForStep(2)} />;
}

function KeySignature({ signature }) {
  if (signature === "sharp") {
    return <CalibratedSymbol symbolKey="sharpKeySignature" x={KEY_SIG_X} y={yForStep(8)} />;
  }

  if (signature === "flat") {
    return <CalibratedSymbol symbolKey="flatKeySignature" x={KEY_SIG_X - 6} y={yForStep(4)} />;
  }

  return null;
}

function TimeSignature() {
  return <CalibratedTimeSignature signature="4/4" x={TIME_SIG_X + STAFF.gap * 2.7} y={STAFF.top + 14.8} />;
}

function LedgerLines({ x, step, colour = "currentColor" }) {
  const lines = [];
  const settings = sharedSymbolConfig("ledgerLines");
  const xOffset = STAFF.gap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const yOffset = STAFF.gap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const halfWidth = (STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineWidthScale || 2.4) * Number(settings.widthScale || 1)) / 2;
  const thickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.ledgerLineThicknessScale || 0.11) * Number(settings.heightScale || 1));
  if (step <= -2) lines.push(yForStep(-2) + yOffset);
  if (step >= 10) lines.push(yForStep(10) + yOffset);

  return (
    <g>
      {lines.map((lineY) => (
        <line key={lineY} x1={x - halfWidth + xOffset} x2={x + halfWidth + xOffset} y1={lineY} y2={lineY} stroke={colour} strokeWidth={thickness} />
      ))}
    </g>
  );
}

function stemData(note, x, y, stemDownOverride = null, forcedStemEndY = null) {
  const step = staffStep(note.pitch);
  const stemDown = stemDownOverride ?? stemGoesDown(step);
  const isDownQuaver = stemDown && note.rhythm === "quaver";
  let stemX = stemDown ? x - NOTE.rx + 2 : x + NOTE.rx;

  if (stemDown) {
    stemX += 1.25;
    if (note.rhythm === "minim") stemX -= 1;
    else if (note.rhythm === "quaver") stemX -= 2;
    else if (note.rhythm === "crotchet" || note.rhythm === "dotted-crotchet") stemX -= 1;
  } else {
    stemX -= 1.65;
  }

  const naturalStemEndY = stemDown ? y + NOTE.stemLength : y - NOTE.stemLength;
  const adjustedStemEndY = forcedStemEndY ?? naturalStemEndY;
  return {
    step,
    stemDown,
    stemX: isDownQuaver ? stemX + 1 : stemX,
    stemEndY: stemDown ? adjustedStemEndY + (isDownQuaver ? 8 : 6) : adjustedStemEndY - 4,
  };
}

function NoteGlyph({ note, x, y, selected, hovered, correct, incorrect, showAccidental, forcedStemEndY = null, stemDownOverride = null, showFlag = true, onHover, onLeave, onClick }) {
  const info = rhythmInfo(note.rhythm);
  const headY = y - 1;
  const stem = stemData(note, x, headY, stemDownOverride, forcedStemEndY);
  const highlighted = selected || hovered;
  const colour = incorrect ? COLOUR.red : correct ? COLOUR.green : "currentColor";
  const accidental = note.pitch.includes("#") ? "sharpInScore" : note.pitch.includes("b") ? "flatInScore" : null;
  const isGSharpAccidental = pitchName(note.pitch) === "G#";
  const dotKey = Math.abs(stem.step % 2) === 1 ? "augmentationDotSpace" : "augmentationDotLine";
  const dotY = Math.abs(stem.step % 2) === 1 ? headY : headY - STAFF.gap * 0.25;
  const symbolKey = noteSymbolKey(note.rhythm, stem.stemDown, !showFlag && note.rhythm === "quaver");
  const stemThickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12));
  const accidentalX = accidental === "sharpInScore" ? x - 31 : x - 28;
  const accidentalY = headY + (isGSharpAccidental ? 2 : 2);

  return (
    <g filter={highlighted && !incorrect ? "url(#noteGlowPulse)" : undefined} onMouseEnter={onHover} onMouseLeave={onLeave} onPointerDown={onClick} style={{ cursor: "pointer" }}>
      <rect x={x - 19} y={STAFF.top - 38} width="38" height="116" fill="transparent" />
      {showAccidental && accidental && (
        <CalibratedSymbol
          symbolKey={accidental}
          x={accidentalX}
          y={accidentalY}
          colour={colour}
        />
      )}
      <LedgerLines x={x} step={stem.step} colour={colour} />
      <CalibratedSymbol symbolKey={symbolKey} x={x} y={headY + 1} colour={colour} />
      {info.stem && forcedStemEndY !== null && <line x1={stem.stemX} x2={stem.stemX} y1={headY} y2={stem.stemEndY} stroke={colour} strokeWidth={stemThickness} />}
      {info.dots === 1 && <CalibratedSymbol symbolKey={dotKey} x={x + 15} y={dotY} colour={colour} />}
    </g>
  );
}

function getQuaverGroup(bar, noteIndex) {
  if (bar[noteIndex]?.rhythm !== "quaver") return null;

  let start = noteIndex;
  let end = noteIndex;

  while (start > 0 && bar[start - 1]?.rhythm === "quaver") start -= 1;
  while (end < bar.length - 1 && bar[end + 1]?.rhythm === "quaver") end += 1;

  return end > start ? { start, end } : null;
}

function getBeamLineYAtX(x, start, end) {
  if (!start || !end || start.x === end.x) return start?.y ?? end?.y ?? 0;
  return start.y + ((x - start.x) / (end.x - start.x)) * (end.y - start.y);
}

function getBeamData(bar, group, positions, layout) {
  const notes = bar.slice(group.start, group.end + 1);
  const xs = positions.slice(group.start, group.end + 1);
  const steps = notes.map((note) => staffStep(note.pitch));
  const averageStep = steps.reduce((sum, step) => sum + step, 0) / steps.length;
  const stemDown = averageStep > 4;
  const stems = notes.map((note, index) => stemData(note, xs[index], layout.positions[note.id].y, stemDown));
  const directions = steps.slice(1).map((step, index) => Math.sign(step - steps[index])).filter((direction) => direction !== 0);
  const changesDirection = directions.some((direction, index) => index > 0 && direction !== directions[index - 1]);
  const isStepwise = steps.every((step, index) => index === 0 || Math.abs(step - steps[index - 1]) <= 2);
  const extend = 0.5;

  if (changesDirection || !isStepwise) {
    const anchorY = stems.reduce((sum, stem) => sum + stem.stemEndY, 0) / stems.length;
    return {
      stemDown,
      start: { x: stems[0].stemX - extend, y: anchorY },
      end: { x: stems[stems.length - 1].stemX + extend, y: anchorY },
    };
  }

  const sortedSteps = [...steps].sort((a, b) => a - b);
  const anchorStep = sortedSteps[Math.floor(sortedSteps.length / 2)];
  const anchorIndex = steps.findIndex((step) => step === anchorStep);
  const anchorStem = stems[anchorIndex];
  const firstStem = stems[0];
  const lastStem = stems[stems.length - 1];
  const slope = clamp((steps[steps.length - 1] - steps[0]) * -1.2, -4, 4);
  const slopePerX = slope / Math.max(1, lastStem.stemX - firstStem.stemX);

  return {
    stemDown,
    start: {
      x: firstStem.stemX - extend,
      y: anchorStem.stemEndY - slopePerX * (anchorStem.stemX - firstStem.stemX),
    },
    end: {
      x: lastStem.stemX + extend,
      y: anchorStem.stemEndY + slopePerX * (lastStem.stemX - anchorStem.stemX),
    },
  };
}

function ScoreArea({ question, selectedId, hoveredId, feedback, onSelect, onHover, onLeave }) {
  const layout = useMemo(() => getLayout(question), [question]);
  const targetIds = new Set(allNotes(question).filter((note) => isTargetNote(question, note)).map((note) => note.id));
  const selectedCorrect = selectedId ? targetIds.has(selectedId) : false;
  const zoomOffsetX = (SVG.width * (1 - SCORE_FRAME.zoom)) / 2;
  const zoomOffsetY = (SVG.height * (1 - SCORE_FRAME.zoom)) / 2;

  return (
    <svg
      viewBox={`${SCORE_FRAME.x} ${SCORE_FRAME.y} ${SCORE_FRAME.width} ${SCORE_FRAME.height}`}
      preserveAspectRatio="xMidYMid meet"
      className="block h-auto w-full select-none touch-none overflow-hidden"
      aria-label="Tonic, subdominant and dominant exercise"
    >
      <defs>
        <filter id="noteGlowPulse" x="-150%" y="-150%" width="400%" height="400%">
          <feDropShadow dx="0" dy="0" stdDeviation="3.6" floodColor="#facc15" floodOpacity="1">
            <animate attributeName="stdDeviation" values="3.6;5.8;3.6" dur="1.55s" repeatCount="indefinite" />
            <animate attributeName="flood-opacity" values="1;1;1" dur="1.55s" repeatCount="indefinite" />
          </feDropShadow>
          <feDropShadow dx="0" dy="0" stdDeviation="7.5" floodColor="#eab308" floodOpacity="0.9">
            <animate attributeName="stdDeviation" values="7.5;11.5;7.5" dur="1.55s" repeatCount="indefinite" />
            <animate attributeName="flood-opacity" values="0.9;1;0.9" dur="1.55s" repeatCount="indefinite" />
          </feDropShadow>
        </filter>
      </defs>
      <g transform={`translate(${zoomOffsetX} ${zoomOffsetY}) scale(${SCORE_FRAME.zoom})`}>
        <rect width={SVG.width} height={SVG.height} fill="white" />
        <StaffLines />
        <TrebleClef />
        <KeySignature signature={question.key.signature} />
        <TimeSignature />

        {Array.from({ length: BAR_COUNT }, (_, index) => {
          const x = MUSIC_START_X + layout.barWidth * (index + 1);
          const isFinal = index === BAR_COUNT - 1;

          if (isFinal) {
            return (
              <g key={index}>
                <line x1={x - 5} x2={x - 5} y1={STAFF.top - 0.5} y2={STAFF.top + STAFF.gap * 4 + 0.5} stroke="currentColor" strokeWidth="1.4" />
                <line x1={x} x2={x} y1={STAFF.top - 0.5} y2={STAFF.top + STAFF.gap * 4 + 0.5} stroke="currentColor" strokeWidth="4" />
              </g>
            );
          }

          return <line key={index} x1={x} x2={x} y1={STAFF.top} y2={STAFF.top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.2" />;
        })}

        {question.bars.map((bar, barIndex) => {
          const positions = bar.map((note) => layout.positions[note.id].x);
          const accidentalState = new Set();
          const renderedBeams = new Set();

          return bar.map((note, noteIndex) => {
            const position = layout.positions[note.id];
            const group = getQuaverGroup(bar, noteIndex);
            const showAccidental = shouldShowAccidental(question.key, note.pitch, accidentalState);
            let forcedStemEndY = null;
            let stemDownOverride = null;
            let beam = null;

            if (group) {
              beam = getBeamData(bar, group, positions, layout);
              stemDownOverride = beam.stemDown;

              const stem = stemData(note, position.x, position.y, beam.stemDown);
              forcedStemEndY = getBeamLineYAtX(stem.stemX, beam.start, beam.end);
              const stemLength = Math.abs(forcedStemEndY - position.y);

              if (stemLength > 42) forcedStemEndY = stem.stemDown ? position.y + 42 : position.y - 42;
              if (stemLength < 22) forcedStemEndY = stem.stemDown ? position.y + 22 : position.y - 22;
            }

            const selected = selectedId === note.id && !feedback;
            const hovered = hoveredId === note.id && !feedback;
            const correct = Boolean(feedback && targetIds.has(note.id));
            const incorrect = Boolean(feedback && selectedId === note.id && !selectedCorrect);

            return (
              <React.Fragment key={note.id}>
                <NoteGlyph
                  note={note}
                  x={position.x}
                  y={position.y}
                  selected={selected}
                  hovered={hovered}
                  correct={correct}
                  incorrect={incorrect}
                  showAccidental={showAccidental}
                  forcedStemEndY={forcedStemEndY}
                  stemDownOverride={stemDownOverride}
                  showFlag={!group}
                  onHover={() => !feedback && onHover(note.id)}
                  onLeave={onLeave}
                  onClick={(event) => {
                    event.stopPropagation();
                    if (!feedback) onSelect(note.id);
                  }}
                />

                {group && group.start === noteIndex && !renderedBeams.has(`${barIndex}-${group.start}`) && (() => {
                  renderedBeams.add(`${barIndex}-${group.start}`);

                  const data = beam ?? getBeamData(bar, group, positions, layout);
                  const beamIsTarget = bar.slice(group.start, group.end + 1).some((groupNote) => feedback && targetIds.has(groupNote.id));
                  const beamIsIncorrect = feedback && bar.slice(group.start, group.end + 1).some((groupNote) => groupNote.id === selectedId && !selectedCorrect);
                  const beamColour = beamIsIncorrect ? COLOUR.red : beamIsTarget ? COLOUR.green : "currentColor";

                  const beamShift = data.stemDown ? -1 : 1;
                  const beamYOffset = data.stemDown ? 5.5 : -1.5;
                  const beamStartX = data.stemDown ? data.start.x + beamShift + 1 : data.start.x + beamShift - 1;
                  const beamEndX = data.stemDown ? data.end.x + beamShift + 1 : data.end.x + beamShift - 1;
                  const beamSettings = sharedSymbolConfig("quaverBeam");
                  const beamThickness = Math.max(1, STAFF.gap * Number(SHARED_CONFIG.drawing?.beamThicknessScale || 0.42) * Number(beamSettings.fontSizeScale || 1));
                  return <line x1={beamStartX} y1={data.start.y + beamYOffset} x2={beamEndX} y2={data.end.y + beamYOffset} stroke={beamColour} strokeWidth={beamThickness} strokeLinecap="butt" />;
                })()}
              </React.Fragment>
            );
          });
        })}
      </g>
    </svg>
  );
}

function ScaleDegreesGuide({ keySignature }) {
  return (
    <div className="mt-2 w-fit max-w-full overflow-x-auto rounded-xl border border-stone-200 bg-white/70 px-3 py-2 text-stone-950">
      <div className="grid grid-cols-7 gap-x-2 gap-y-1 text-center text-[11px] leading-tight">
        {SCALE_DEGREE_LABELS.map((degree) => (
          <div key={degree} className={degree === "I" || degree === "IV" || degree === "V" ? "font-black" : "font-semibold"}>{degree}</div>
        ))}
        {keySignature.scale.map((note, index) => (
          <div key={`${note}-${index}`} className={index === 0 || index === 3 || index === 4 ? "font-black" : "font-semibold opacity-70"}>{note}</div>
        ))}
      </div>
    </div>
  );
}

function App() {
  const defaultQuestionTypeOptions = QUESTION_TYPES.reduce((options, type) => {
    options[type.id] = true;
    return options;
  }, {});
  const enabledQuestionTypeIds = (options) => QUESTION_TYPES.filter((type) => options[type.id]).map((type) => type.id);
  const taskMatchesLevel = (options) => QUESTION_TYPES.every((type) => Boolean(options[type.id]));

  const [activeLevel, setActiveLevel] = useState(() => {
    const level = new URLSearchParams(window.location.search).get("level");
    return LEVELS[level] ? level : "H";
  });
  const [questionTypeOptions, setQuestionTypeOptions] = useState(defaultQuestionTypeOptions);
  const [question, setQuestion] = useState(() => makeQuestion(enabledQuestionTypeIds(defaultQuestionTypeOptions)));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [levelMenuOpen, setLevelMenuOpen] = useState(false);
  const [customiseMenuOpen, setCustomiseMenuOpen] = useState(false);
  const [revealKey, setRevealKey] = useState(true);
  const [showScaleDegrees, setShowScaleDegrees] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [prompt, setPrompt] = useState("");
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);

  const levelRef = useRef(null);
  const customiseRef = useRef(null);
  const renderTimerRef = useRef(null);
  const incorrectAdvanceTimerRef = useRef(null);
  const medalSoundTimerRef = useRef(null);
  const correctFadeTimerRef = useRef(null);
  const correctAdvanceTimerRef = useRef(null);
  const levelTaskStatusRef = useRef(null);

  React.useEffect(() => window.MLH?.installPhoneLandscapeLock?.(), []);

  useClickOutside([levelRef, customiseRef], [
    () => levelMenuOpen && setLevelMenuOpen(false),
    () => customiseMenuOpen && setCustomiseMenuOpen(false),
  ]);

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const medalEligible = taskMatchesLevel(questionTypeOptions);
  const displayedLevel = medalEligible ? activeLevel : "Custom";
  const displayedLevelLabel = medalEligible ? LEVELS[activeLevel].label : "Custom";
  const canConfirm = selectedId !== null && !feedback;
  const customisePanelStyle = typeof window !== "undefined" && window.innerWidth < 640 && customiseRef.current
    ? { left: `${24 - customiseRef.current.getBoundingClientRect().left}px` }
    : null;

  function clearQueuedTimers() {
    [renderTimerRef, incorrectAdvanceTimerRef, medalSoundTimerRef, correctFadeTimerRef, correctAdvanceTimerRef].forEach((ref) => {
      if (ref.current) {
        window.clearTimeout(ref.current);
        ref.current = null;
      }
    });
  }

  function resetTask(nextQuestion) {
    setQuestion(nextQuestion);
    setSelectedId(null);
    setHoveredId(null);
    setFeedback(null);
    setFeedbackFading(false);
    setPrompt("");
  }

  function newQuestion() {
    clearQueuedTimers();
    setQuestionVisible(false);

    renderTimerRef.current = window.setTimeout(() => {
      resetTask(makeQuestion(enabledQuestionTypeIds(questionTypeOptions)));
      setQuestionVisible(true);
      renderTimerRef.current = null;
    }, 260);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion();
  }

  React.useEffect(() => {
    if (levelTaskStatusRef.current === null) {
      levelTaskStatusRef.current = medalEligible;
      return;
    }
    if (levelTaskStatusRef.current === medalEligible) return;
    levelTaskStatusRef.current = medalEligible;
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
  }, [medalEligible]);

  function fadeToNextQuestion() {
    if (!feedback || feedback === "correct" || feedbackFading) return;

    setFeedbackFading(true);
    incorrectAdvanceTimerRef.current = window.setTimeout(() => {
      incorrectAdvanceTimerRef.current = null;
      newQuestion();
    }, 280);
  }

  function handleLevelSelect(level) {
    setLevelMenuOpen(false);
    if (level === activeLevel) return;
    setActiveLevel(level);
    const url = new URL(window.location.href);
    url.searchParams.set("level", level);
    window.history.replaceState({}, "", url.toString());
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    resetTask(makeQuestion(enabledQuestionTypeIds(questionTypeOptions)));
  }

  function handleQuestionTypeToggle(typeId) {
    setQuestionTypeOptions((current) => {
      const next = { ...current, [typeId]: !current[typeId] };
      if (Object.values(next).every((value) => !value)) return current;

      clearQueuedTimers();
      setStreak(0);
      resetTask(makeQuestion(enabledQuestionTypeIds(next)));
      setQuestionVisible(true);
      return next;
    });
  }

  function handleRevealKeyToggle() {
    clearQueuedTimers();
    setStreak(0);
    setRevealKey((value) => !value);
  }

  function scoreAnswer(feedbackType) {
    const isCorrect = feedbackType === "correct";
    const nextStreak = isCorrect ? streak + 1 : 0;

    playFeedbackSound(isCorrect);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback(feedbackType);

    if (medalEligible && isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      medalSoundTimerRef.current = window.setTimeout(() => {
        playFeedbackSound(true, true, medal.sound);
        medalSoundTimerRef.current = null;
      }, 180);
    }

    if (isCorrect) {
      setFeedbackFading(false);
      correctFadeTimerRef.current = window.setTimeout(() => {
        setFeedbackFading(true);
        correctFadeTimerRef.current = null;
      }, 1700);
      correctAdvanceTimerRef.current = window.setTimeout(() => {
        correctAdvanceTimerRef.current = null;
        newQuestion();
      }, 2000);
    }
  }

  function confirmAnswer() {
    if (feedback) return;

    if (!selectedId) {
      setPrompt("Select a note before pressing Confirm.");
      return;
    }

    const selectedNote = allNotes(question).find((note) => note.id === selectedId);
    const isCorrect = Boolean(selectedNote && isTargetNote(question, selectedNote));

    setPrompt("");
    scoreAnswer(isCorrect ? "correct" : "incorrect");
  }

  return (
    <div className={`min-h-screen ${SHELL.pageShellClass || "overflow-x-hidden bg-stone-50 pb-10 text-black"}`}>
      <div className={SHELL.pageContentClass || "mx-auto max-w-6xl px-3 pt-[154px] sm:px-4 md:px-8 md:pt-[104px]"}>
        <AppHeader
          icon={ASSET.appIcon}
          title="Scale Degrees"
          subtitle="Identify tonic, subdominant and dominant notes."
        >
          <ScoreStreakPanel
            assets={ASSET}
            correct={correct}
            attempted={attempted}
            accuracy={accuracy}
            streak={streak}
            bestStreak={bestStreak}
            resetScore={resetScore}
            confettiKey={confettiKey}
            medalEligible={medalEligible}
          />
        </AppHeader>

        <main
          className={`tonic-main ${SHELL.mainShellClass || "relative z-0 min-h-[520px] overflow-visible rounded-2xl border border-stone-200 bg-white px-3 pb-6 pt-[10px] shadow-sm sm:min-h-[390px] sm:px-4 md:h-auto md:min-h-0 md:px-6 md:pb-6 md:pt-[14px]"} min-h-0 md:overflow-hidden`}
          onPointerDown={() => {
            const advanced = advanceFeedbackPointerDown?.({
              feedback: feedback ? { correct: feedback === "correct" } : null,
              onCorrect: newQuestion,
              onIncorrect: fadeToNextQuestion,
            });
            if (!advanced && feedback && feedback !== "correct") fadeToNextQuestion();
          }}
        >
          <div className="hub-toolbar relative z-20">
            <div className="hub-toolbar-left">
              <div className="hub-menu-anchor relative" ref={levelRef}>
                <LevelButton
                  icon={<img src={ASSET.level} alt="" aria-hidden="true" className="h-[26px] w-[28px] object-contain" />}
                  activeLevel={displayedLevel}
                  activeLabel={displayedLevelLabel}
                  isCustom={!medalEligible}
                  onClick={() => setLevelMenuOpen((value) => !value)}
                  dataMenuTrigger={true}
                />
                {levelMenuOpen && (
                  <window.MLH.MenuPanel title="Level" dataMenuPanel={true}>
                    <LevelMenu activeLevel={activeLevel} onSelect={handleLevelSelect} levels={LEVELS} />
                  </window.MLH.MenuPanel>
                )}
              </div>

              <div className="hub-menu-anchor relative" ref={customiseRef}>
                <CustomiseButton
                  icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />}
                  onClick={() => setCustomiseMenuOpen((value) => !value)}
                  dataMenuTrigger={true}
                />
                {customiseMenuOpen && (
                  <div className="tonic-customise-panel hub-menu-panel hub-menu-panel-level left-0" style={customisePanelStyle || undefined} data-menu-panel={true}>
                    <div className="hub-menu-title">
                      <div className="hub-menu-title-text">Customise</div>
                    </div>
                    <div className="tonic-customise-options flex flex-col gap-1">
                      <div className="tonic-menu-heading">Help</div>
                      <MenuToggleRow
                        glyph={<span className="inline-flex h-[22px] min-w-[28px] items-center justify-center text-[12px] font-black leading-none text-black">123</span>}
                        label="Show Scale Degrees"
                        checked={showScaleDegrees}
                        onChange={() => setShowScaleDegrees((value) => !value)}
                      />

                      <div className="tonic-menu-heading">Scale Degrees</div>
                      {QUESTION_TYPES.map((type) => {
                        const enabledCount = Object.values(questionTypeOptions).filter(Boolean).length;
                        return (
                          <MenuToggleRow
                            key={type.id}
                            glyph={<span className="inline-flex h-[22px] min-w-[28px] items-center justify-center text-[12px] font-black leading-none text-black">{QUESTION_TYPE_MENU_GLYPHS[type.id]}</span>}
                            label={QUESTION_TYPE_GLYPHS[type.id]}
                            checked={questionTypeOptions[type.id]}
                            disabled={questionTypeOptions[type.id] && enabledCount === 1}
                            onChange={() => handleQuestionTypeToggle(type.id)}
                          />
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            </div>

            <div className="hub-toolbar-feedback">
              <FeedbackBadge feedback={feedback ? { correct: feedback === "correct" } : null} fading={feedbackFading} animationPrefix="note" />
            </div>

            <div className="hub-toolbar-right">
              <SkipButton
                onClick={newQuestion}
                resetStreak={() => setStreak(0)}
                icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[26px] w-[26px] object-contain" />}
              />
            </div>
          </div>

          <div className={`relative mt-4 transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <ScoreArea
              question={question}
              selectedId={selectedId}
              hoveredId={hoveredId}
              feedback={feedback}
              onSelect={setSelectedId}
              onHover={setHoveredId}
              onLeave={() => setHoveredId(null)}
            />
          </div>

          <div className={`relative z-10 mt-3 overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-2 shadow-md md:mx-3 ${showScaleDegrees ? "md:h-[112px]" : "md:h-[68px]"}`}>
            <div className={`flex h-full flex-col gap-3 px-2 sm:gap-4 md:flex-row md:justify-between ${showScaleDegrees ? "md:items-end" : "md:items-center"}`}>
              <div className={`flex min-w-0 flex-1 text-stone-900 ${showScaleDegrees ? "h-full items-stretch" : "items-center"}`}>
                <div className={showScaleDegrees ? "flex h-full flex-col justify-between py-1" : ""}>
                  <p className="text-[15px] font-semibold leading-tight">
                    Identify an example of a <strong>{question.questionType.label}</strong> note.{revealKey ? <> The key is <strong>{question.key.label}</strong>.</> : null}
                  </p>
                  {showScaleDegrees && <ScaleDegreesGuide keySignature={question.key} />}
                  {prompt && <p className="mt-1 text-sm font-medium text-red-700">{prompt}</p>}
                </div>
              </div>

              <div className={`flex shrink-0 items-center justify-end pt-1 md:pt-0 ${showScaleDegrees ? "md:h-full md:items-end md:pb-1" : ""}`}>
                <window.MLH.ConfirmButton disabled={!canConfirm} onClick={confirmAnswer}>
                  Confirm
                </window.MLH.ConfirmButton>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

const rootElement = document.getElementById("root");
if (!rootElement) throw new Error("Root element not found.");
ReactDOM.render(<App />, rootElement);
  </script>
<script src="./footer.js?v=1.3"></script>
</body>
</html>
