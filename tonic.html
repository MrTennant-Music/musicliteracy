<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tonic, Subdominant and Dominant Notes Golden App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const SVG = { width: 920, height: 420 };

const STAFF = {
  left: 24,
  right: 896,
  top: 146,
  gap: 11.2,
};

const BAR_COUNT = 4;
const CLEF_X = STAFF.left + 8;
const KEY_SIG_X = STAFF.left + 46;
const TIME_SIG_X = STAFF.left + 82;
const MUSIC_START_X = STAFF.left + 112;

const NOTE = {
  rx: 6.6,
  ry: 4.7,
  stemLength: 34,
};

const COLOUR = {
  green: "#16a34a",
  red: "#dc2626",
  black: "#000000",
};

const GLYPH = {
  trebleClef: String.fromCodePoint(0x1d11e),
};

const NOTE_STEPS = {
  C4: -2,
  D4: -1,
  E4: 0,
  F4: 1,
  G4: 2,
  A4: 3,
  B4: 4,
  C5: 5,
  D5: 6,
  E5: 7,
  F5: 8,
  G5: 9,
  A5: 10,
};

const KEYS = [
  {
    id: "c-major",
    label: "C major",
    signature: "none",
    scale: ["C", "D", "E", "F", "G", "A", "B"],
    tonic: "C",
    subdominant: "F",
    dominant: "G",
    tonicStart: "C5",
    pool: ["C4", "D4", "E4", "F4", "G4", "A4", "B4", "C5", "D5", "E5", "F5", "G5", "A5"],
  },
  {
    id: "g-major",
    label: "G major",
    signature: "sharp",
    scale: ["G", "A", "B", "C", "D", "E", "F#"],
    tonic: "G",
    subdominant: "C",
    dominant: "D",
    tonicStart: "D5",
    pool: ["C4", "D4", "E4", "F#4", "G4", "A4", "B4", "C5", "D5", "E5", "F#5", "G5", "A5"],
  },
  {
    id: "f-major",
    label: "F major",
    signature: "flat",
    scale: ["F", "G", "A", "Bb", "C", "D", "E"],
    tonic: "F",
    subdominant: "Bb",
    dominant: "C",
    tonicStart: "C5",
    pool: ["C4", "D4", "E4", "F4", "G4", "A4", "Bb4", "C5", "D5", "E5", "F5", "G5", "A5"],
  },
  {
    id: "a-minor",
    label: "A minor",
    signature: "none",
    scale: ["A", "B", "C", "D", "E", "F", "G#"],
    tonic: "A",
    subdominant: "D",
    dominant: "E",
    tonicStart: "E5",
    pool: ["C4", "D4", "E4", "F4", "G#4", "A4", "B4", "C5", "D5", "E5", "F5", "G#5", "A5"],
  },
];

const QUESTION_TYPES = [
  { id: "tonic", label: "tonic" },
  { id: "subdominant", label: "subdominant" },
  { id: "dominant", label: "dominant" },
];

const RHYTHMS = {
  semibreve: { beats: 4, spacing: 8, open: true, stem: false, dots: 0, flag: false },
  minim: { beats: 2, spacing: 4, open: true, stem: true, dots: 0, flag: false },
  "dotted-crotchet": { beats: 1.5, spacing: 3.1, open: false, stem: true, dots: 1, flag: false },
  crotchet: { beats: 1, spacing: 2.25, open: false, stem: true, dots: 0, flag: false },
  quaver: { beats: 0.5, spacing: 1.45, open: false, stem: true, dots: 0, flag: true },
};

const BAR_PATTERNS = [
  ["minim", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "minim"],
  ["minim", "minim"],
  ["crotchet", "crotchet", "crotchet", "crotchet"],
  ["dotted-crotchet", "quaver", "crotchet", "crotchet"],
  ["crotchet", "crotchet", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "dotted-crotchet", "quaver"],
  ["dotted-crotchet", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "crotchet", "crotchet"],
  ["quaver", "quaver", "quaver", "quaver", "minim"],
  ["crotchet", "quaver", "quaver", "quaver", "quaver", "crotchet"],
  ["minim", "quaver", "quaver", "quaver", "quaver"],
];

const FINAL_BAR_PATTERNS = [...BAR_PATTERNS, ["semibreve"]];

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function stripAccidental(pitch) {
  return pitch.replace(/[b#]/g, "");
}

function pitchName(pitch) {
  return pitch.replace(/[0-9]/g, "");
}

function pitchLetter(pitch) {
  return pitchName(pitch).replace(/[b#]/g, "");
}

function staffStep(pitch) {
  return NOTE_STEPS[stripAccidental(pitch)] ?? NOTE_STEPS.C5;
}

function yForStep(step) {
  return STAFF.top + STAFF.gap * 4 - step * (STAFF.gap / 2);
}

function stemGoesDown(step) {
  return step > 4;
}

function rhythmInfo(rhythm) {
  return RHYTHMS[rhythm] ?? RHYTHMS.crotchet;
}

function nearestPoolIndex(pool, previousPitch) {
  const previous = pitchName(previousPitch);
  const exact = pool.findIndex((pitch) => pitchName(pitch) === previous);
  return exact >= 0 ? exact : Math.floor(pool.length / 2);
}

function chooseNextPitch(pool, previousPitch, isQuaverGroupNote = false, avoidRepeat = false) {
  const index = nearestPoolIndex(pool, previousPitch);

  if (isQuaverGroupNote) {
    const stepCandidates = [-1, 1]
      .map((move) => pool[index + move])
      .filter(Boolean)
      .filter((pitch) => pitchName(pitch) !== pitchName(previousPitch))
      .filter((pitch) => Math.abs(staffStep(pitch) - staffStep(previousPitch)) <= 1);

    return stepCandidates.length > 0 ? randomItem(stepCandidates) : previousPitch;
  }

  let candidates = [-3, -2, -1, 0, 0, 1, 2, 3]
    .map((move) => pool[clamp(index + move, 0, pool.length - 1)])
    .filter(Boolean);

  if (avoidRepeat) {
    candidates = candidates.filter((pitch) => pitchName(pitch) !== pitchName(previousPitch));
  }

  if (candidates.length === 0) {
    const nonRepeats = pool.filter((pitch) => pitchName(pitch) !== pitchName(previousPitch));
    return nonRepeats.length > 0 ? randomItem(nonRepeats) : previousPitch;
  }

  const weightedCandidates = candidates.flatMap((pitch) => {
    const step = staffStep(pitch);
    if (step >= 8) return [pitch, pitch, pitch, pitch];
    if (step >= 5) return [pitch, pitch, pitch];
    if (step >= 2) return [pitch, pitch];
    return [pitch];
  });

  return randomItem(weightedCandidates);
}

function enforceAllQuaverGroupsStepwise(bar, key) {
  const fixedBar = [...bar];
  let index = 0;

  while (index < fixedBar.length) {
    if (fixedBar[index].rhythm !== "quaver") {
      index += 1;
      continue;
    }

    const start = index;
    while (index < fixedBar.length && fixedBar[index].rhythm === "quaver") index += 1;
    const end = index - 1;
    if (end <= start) continue;

    for (let noteIndex = start + 1; noteIndex <= end; noteIndex += 1) {
      const previousPitch = fixedBar[noteIndex - 1].pitch;
      const previousIndex = nearestPoolIndex(key.pool, previousPitch);
      const candidates = [-1, 1]
        .map((move) => key.pool[previousIndex + move])
        .filter(Boolean)
        .filter((pitch) => pitchName(pitch) !== pitchName(previousPitch))
        .filter((pitch) => Math.abs(staffStep(pitch) - staffStep(previousPitch)) <= 1);

      if (candidates.length > 0) {
        fixedBar[noteIndex] = { ...fixedBar[noteIndex], pitch: randomItem(candidates) };
      }
    }
  }

  return fixedBar;
}

function barPassesQuaverRules(bar) {
  for (let index = 0; index < bar.length - 1; index += 1) {
    const current = bar[index];
    const next = bar[index + 1];

    if (current.rhythm === "quaver" && next.rhythm === "quaver") {
      if (pitchName(current.pitch) === pitchName(next.pitch)) return false;
      if (Math.abs(staffStep(current.pitch) - staffStep(next.pitch)) > 1) return false;
    }
  }
  return true;
}

function questionPassesQuaverRules(question) {
  return question.bars.every((bar) => barPassesQuaverRules(bar));
}

function makeBarPattern(barIndex) {
  return randomItem(barIndex === BAR_COUNT - 1 ? FINAL_BAR_PATTERNS : BAR_PATTERNS);
}

function targetFor(questionType, key) {
  if (questionType.id === "tonic") return key.tonic;
  if (questionType.id === "subdominant") return key.subdominant;
  return key.dominant;
}

function forceTargetIntoQuestion(bars, target) {
  const nonQuavers = [];

  bars.forEach((bar, barIndex) => {
    bar.forEach((note, noteIndex) => {
      if (note.rhythm !== "quaver") nonQuavers.push({ barIndex, noteIndex });
    });
  });

  if (nonQuavers.length === 0) return;

  const chosen = randomItem(nonQuavers);
  const currentPitch = bars[chosen.barIndex][chosen.noteIndex].pitch;
  const octave = currentPitch.replace(/[^0-9]/g, "") || "4";
  bars[chosen.barIndex][chosen.noteIndex] = {
    ...bars[chosen.barIndex][chosen.noteIndex],
    pitch: `${target}${octave}`,
  };
}

function ensureAMinorHasGSharp(bars, key) {
  if (key.id !== "a-minor") return;

  const hasGSharp = bars.some((bar) => bar.some((note) => note.pitch.includes("G#")));
  if (hasGSharp) return;

  const nonQuavers = [];
  bars.forEach((bar, barIndex) => {
    bar.forEach((note, noteIndex) => {
      if (note.rhythm !== "quaver") nonQuavers.push({ barIndex, noteIndex });
    });
  });

  if (nonQuavers.length === 0) return;
  const chosen = randomItem(nonQuavers);
  bars[chosen.barIndex][chosen.noteIndex] = {
    ...bars[chosen.barIndex][chosen.noteIndex],
    pitch: "G#5",
  };
}

function makeQuestion(attempt = 0) {
  const key = randomItem(KEYS);
  const questionType = randomItem(QUESTION_TYPES);
  const bars = [];
  let previousPitch = key.tonicStart;

  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    const pattern = makeBarPattern(barIndex);
    const bar = pattern.map((rhythm, noteIndex) => {
      const previousRhythm = noteIndex > 0 ? pattern[noteIndex - 1] : null;
      const nextRhythm = noteIndex < pattern.length - 1 ? pattern[noteIndex + 1] : null;
      const inQuaverGroup = rhythm === "quaver" && (previousRhythm === "quaver" || nextRhythm === "quaver");
      const avoidRepeat = rhythm === "quaver" && previousRhythm === "quaver";
      const pitch = barIndex === 0 && noteIndex === 0
        ? key.tonicStart
        : chooseNextPitch(key.pool, previousPitch, inQuaverGroup, avoidRepeat);

      previousPitch = pitch;

      return {
        id: `note-${barIndex}-${noteIndex}`,
        pitch,
        rhythm,
        barIndex,
        noteIndex,
      };
    });

    bars.push(enforceAllQuaverGroupsStepwise(bar, key));
  }

  ensureAMinorHasGSharp(bars, key);

  const target = targetFor(questionType, key);
  const hasTarget = bars.some((bar) => bar.some((note) => pitchName(note.pitch) === target));
  if (!hasTarget) forceTargetIntoQuestion(bars, target);

  const finalQuestion = {
    id: Math.random().toString(36).slice(2),
    key,
    questionType,
    bars: bars.map((bar) => enforceAllQuaverGroupsStepwise(bar, key)),
  };

  if (!questionPassesQuaverRules(finalQuestion) && attempt < 20) {
    return makeQuestion(attempt + 1);
  }

  return finalQuestion;
}

function isTargetNote(question, note) {
  return pitchName(note.pitch) === targetFor(question.questionType, question.key);
}

function allNotes(question) {
  return question.bars.flat();
}

function accidentalIsInKeySignature(key, pitch) {
  const name = pitchName(pitch);
  return (key.id === "g-major" && name === "F#") || (key.id === "f-major" && name === "Bb");
}

function shouldShowAccidental(key, pitch, accidentalState) {
  if (!(pitch.includes("#") || pitch.includes("b"))) return false;
  if (accidentalIsInKeySignature(key, pitch)) return false;

  const accidentalId = `${pitchLetter(pitch)}:${pitchName(pitch)}`;
  if (accidentalState.has(accidentalId)) return false;

  accidentalState.add(accidentalId);
  return true;
}

function calculateBarPositions(bar, startX, endX) {
  const totalSpacing = bar.reduce((sum, note, index) => {
    const isGroupedQuaver = note.rhythm === "quaver" && (bar[index - 1]?.rhythm === "quaver" || bar[index + 1]?.rhythm === "quaver");
    const boost = isGroupedQuaver ? 1.15 : 1;
    const accidentalSpace = note.pitch.includes("#") || note.pitch.includes("b") ? 0.45 : 0;
    return sum + rhythmInfo(note.rhythm).spacing * boost + accidentalSpace;
  }, 0);

  const unit = Math.max(1, endX - startX - 18) / Math.max(1, totalSpacing);
  let cursor = startX + 12;

  return bar.map((note, index) => {
    if (note.pitch.includes("#") || note.pitch.includes("b")) cursor += unit * 0.45;
    const x = cursor;
    const isGroupedQuaver = note.rhythm === "quaver" && (bar[index - 1]?.rhythm === "quaver" || bar[index + 1]?.rhythm === "quaver");
    const boost = isGroupedQuaver ? 1.15 : 1;
    cursor += rhythmInfo(note.rhythm).spacing * unit * boost;
    return x;
  });
}

function getLayout(question) {
  const barWidth = (STAFF.right - MUSIC_START_X) / BAR_COUNT;
  const positions = {};

  question.bars.forEach((bar, barIndex) => {
    const startX = MUSIC_START_X + barIndex * barWidth + 10;
    const endX = MUSIC_START_X + (barIndex + 1) * barWidth - 7;
    const xs = calculateBarPositions(bar, startX, endX);

    bar.forEach((note, noteIndex) => {
      const step = staffStep(note.pitch);
      positions[note.id] = { x: xs[noteIndex], y: yForStep(step), step };
    });
  });

  return { positions, barWidth };
}

function getStreakMedal(streak) {
  if (streak >= 30) return { emoji: "💎", bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
  if (streak >= 20) return { emoji: "🥇", bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
  if (streak >= 15) return { emoji: "🥈", bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
  if (streak >= 10) return { emoji: "🥉", bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
  return null;
}

function playFeedbackSound(correct, celebration = false, medal = null) {
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) return;

  const context = new AudioContextClass();
  const master = context.createGain();
  const now = context.currentTime + 0.01;

  context.resume?.();
  master.gain.value = 0.18;
  master.connect(context.destination);

  function tone(freq, start, duration, type = "triangle", volume = 0.12) {
    const osc = context.createOscillator();
    const gain = context.createGain();

    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);
    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(volume, start + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

    osc.connect(gain);
    gain.connect(master);
    osc.start(start);
    osc.stop(start + duration + 0.05);
  }

  function trumpet(freq, start, duration, volume = 0.1) {
    tone(freq, start, duration, "sawtooth", volume);
    tone(freq * 1.002, start, duration * 0.96, "square", volume * 0.32);
    tone(freq * 2, start, duration * 0.75, "triangle", volume * 0.16);
  }

  function medalPhrase(root, chord, start, beats = 4) {
    const beat = 0.6;
    const triplet = 0.13;
    const finalDuration = beats === 2 ? 0.72 : 1.95;

    chord.forEach((freq) => trumpet(freq, start, beats * beat, 0.045));
    trumpet(root, start, triplet, 0.11);
    trumpet(root, start + triplet, triplet, 0.11);
    trumpet(root, start + triplet * 2, triplet, 0.11);
    trumpet(root, start + 0.42, finalDuration, 0.13);
  }

  if (!correct) {
    tone(196, now, 0.32, "sawtooth", 0.06);
    tone(185, now + 0.04, 0.38, "triangle", 0.05);
    tone(174, now + 0.08, 0.45, "sine", 0.04);
  } else if (celebration) {
    if (medal === "bronze") medalPhrase(659.25, [329.63, 415.3, 493.88], now);
    if (medal === "silver") medalPhrase(739.99, [369.99, 466.16, 554.37], now);
    if (medal === "gold") medalPhrase(830.61, [415.3, 523.25, 622.25], now);
    if (medal === "platinum") {
      medalPhrase(739.99, [369.99, 466.16, 554.37], now, 2);
      medalPhrase(830.61, [415.3, 523.25, 622.25], now + 0.82, 2);
      medalPhrase(932.33, [466.16, 587.33, 698.46], now + 1.64, 4);
    }
  } else {
    randomItem([[523.25, 659.25, 783.99], [587.33, 739.99, 880], [659.25, 830.61, 987.77]]).forEach((freq, index) => {
      tone(freq, now + index * 0.045, 0.42, "triangle", index === 2 ? 0.085 : 0.07);
      tone(freq * 2, now + index * 0.045, 0.24, "sine", 0.025);
    });
  }

  window.setTimeout(() => {
    try {
      context.close();
    } catch {}
  }, medal === "platinum" ? 9000 : celebration ? 3500 : 900);
}

function StaffLines() {
  return (
    <g>
      {[0, 1, 2, 3, 4].map((line) => (
        <line
          key={line}
          x1={STAFF.left}
          x2={STAFF.right}
          y1={STAFF.top + line * STAFF.gap}
          y2={STAFF.top + line * STAFF.gap}
          stroke="currentColor"
          strokeWidth="1.2"
        />
      ))}
    </g>
  );
}

function TrebleClef() {
  return <text x={CLEF_X} y={STAFF.top + 31} fontSize="99" fontFamily="serif" dominantBaseline="middle">{GLYPH.trebleClef}</text>;
}

function KeySignature({ signature }) {
  if (signature === "sharp") {
    return <text x={KEY_SIG_X} y={yForStep(8) + 7} fontSize="23" fontFamily="serif" fontWeight="900">♯</text>;
  }

  if (signature === "flat") {
    return <text x={KEY_SIG_X - 6} y={yForStep(4) + 5} fontSize="23" fontFamily="serif" fontWeight="900">♭</text>;
  }

  return null;
}

function TimeSignature() {
  return (
    <g fontFamily="serif" fontWeight="900" fontSize="36" textAnchor="middle">
      <text x={TIME_SIG_X} y={STAFF.top + 24}>4</text>
      <text x={TIME_SIG_X} y={STAFF.top + 44}>4</text>
    </g>
  );
}

function LedgerLines({ x, step, colour = "currentColor" }) {
  const lines = [];
  if (step <= -2) lines.push(yForStep(-2));
  if (step >= 10) lines.push(yForStep(10));

  return (
    <g>
      {lines.map((lineY) => (
        <line key={lineY} x1={x - 12} x2={x + 12} y1={lineY} y2={lineY} stroke={colour} strokeWidth="1.2" />
      ))}
    </g>
  );
}

function Flag({ stemX, stemEndY, stemDown, colour = "currentColor" }) {
  const path = stemDown
    ? `M ${stemX} ${stemEndY} C ${stemX + 10} ${stemEndY - 5}, ${stemX + 9} ${stemEndY - 12}, ${stemX + 2} ${stemEndY - 15}`
    : `M ${stemX} ${stemEndY} C ${stemX + 10} ${stemEndY + 5}, ${stemX + 9} ${stemEndY + 12}, ${stemX + 2} ${stemEndY + 15}`;

  return <path d={path} fill="none" stroke={colour} strokeWidth="1.6" strokeLinecap="round" />;
}

function stemData(note, x, y, stemDownOverride = null, forcedStemEndY = null) {
  const step = staffStep(note.pitch);
  const stemDown = stemDownOverride ?? stemGoesDown(step);
  let stemX = stemDown ? x - NOTE.rx + 2 : x + NOTE.rx;

  if (stemDown) {
    stemX -= 1;
    if (note.rhythm === "minim") stemX -= 1;
    else if (note.rhythm === "quaver") stemX -= 2;
    else if (note.rhythm === "crotchet" || note.rhythm === "dotted-crotchet") stemX -= 1;
  }

  const naturalStemEndY = stemDown ? y + NOTE.stemLength : y - NOTE.stemLength;
  return { step, stemDown, stemX, stemEndY: forcedStemEndY ?? naturalStemEndY };
}

function NoteGlyph({ note, x, y, selected, hovered, correct, incorrect, showAccidental, forcedStemEndY = null, stemDownOverride = null, showFlag = true, onHover, onLeave, onClick }) {
  const info = rhythmInfo(note.rhythm);
  const stem = stemData(note, x, y, stemDownOverride, forcedStemEndY);
  const colour = incorrect ? COLOUR.red : correct || selected || hovered ? COLOUR.green : "currentColor";
  const accidental = note.pitch.includes("#") ? "♯" : note.pitch.includes("b") ? "♭" : null;
  const dotY = Math.abs(stem.step % 2) === 1 ? y : y - 5;

  return (
    <g onMouseEnter={onHover} onMouseLeave={onLeave} onPointerDown={onClick} style={{ cursor: "pointer" }}>
      <rect x={x - 19} y={STAFF.top - 38} width="38" height="116" fill="transparent" />
      {showAccidental && accidental && <text x={x - 21} y={y + 7} fontSize="22" fontFamily="serif" fontWeight="700" fill={colour}>{accidental}</text>}
      <LedgerLines x={x} step={stem.step} colour={colour} />
      <ellipse cx={x} cy={y} rx={NOTE.rx} ry={NOTE.ry} transform={`rotate(-18 ${x} ${y})`} fill={info.open ? "transparent" : colour} stroke={colour} strokeWidth="1.8" />
      {info.stem && <line x1={stem.stemX} x2={stem.stemX} y1={y} y2={stem.stemEndY} stroke={colour} strokeWidth="1.6" />}
      {info.dots === 1 && <circle cx={x + 15} cy={dotY} r="2.2" fill={colour} />}
      {info.flag && showFlag && <Flag stemX={stem.stemX} stemEndY={stem.stemEndY} stemDown={stem.stemDown} colour={colour} />}
    </g>
  );
}

function getQuaverGroup(bar, noteIndex) {
  if (bar[noteIndex]?.rhythm !== "quaver") return null;

  let start = noteIndex;
  let end = noteIndex;

  while (start > 0 && bar[start - 1]?.rhythm === "quaver") start -= 1;
  while (end < bar.length - 1 && bar[end + 1]?.rhythm === "quaver") end += 1;

  return end > start ? { start, end } : null;
}

function getBeamLineYAtX(x, start, end) {
  if (!start || !end || start.x === end.x) return start?.y ?? end?.y ?? 0;
  return start.y + ((x - start.x) / (end.x - start.x)) * (end.y - start.y);
}

function getBeamData(bar, group, positions, layout) {
  const notes = bar.slice(group.start, group.end + 1);
  const xs = positions.slice(group.start, group.end + 1);
  const steps = notes.map((note) => staffStep(note.pitch));
  const averageStep = steps.reduce((sum, step) => sum + step, 0) / steps.length;
  const stemDown = averageStep > 4;
  const stems = notes.map((note, index) => stemData(note, xs[index], layout.positions[note.id].y, stemDown));
  const directions = steps.slice(1).map((step, index) => Math.sign(step - steps[index])).filter((direction) => direction !== 0);
  const changesDirection = directions.some((direction, index) => index > 0 && direction !== directions[index - 1]);
  const isStepwise = steps.every((step, index) => index === 0 || Math.abs(step - steps[index - 1]) <= 2);
  const extend = 0.5;

  if (changesDirection || !isStepwise) {
    const anchorY = stems.reduce((sum, stem) => sum + stem.stemEndY, 0) / stems.length;
    return {
      stemDown,
      start: { x: stems[0].stemX - extend, y: anchorY },
      end: { x: stems[stems.length - 1].stemX + extend, y: anchorY },
    };
  }

  const sortedSteps = [...steps].sort((a, b) => a - b);
  const anchorStep = sortedSteps[Math.floor(sortedSteps.length / 2)];
  const anchorIndex = steps.findIndex((step) => step === anchorStep);
  const anchorStem = stems[anchorIndex];
  const firstStem = stems[0];
  const lastStem = stems[stems.length - 1];
  const slope = clamp((steps[steps.length - 1] - steps[0]) * -1.2, -4, 4);
  const slopePerX = slope / Math.max(1, lastStem.stemX - firstStem.stemX);

  return {
    stemDown,
    start: {
      x: firstStem.stemX - extend,
      y: anchorStem.stemEndY - slopePerX * (anchorStem.stemX - firstStem.stemX),
    },
    end: {
      x: lastStem.stemX + extend,
      y: anchorStem.stemEndY + slopePerX * (lastStem.stemX - anchorStem.stemX),
    },
  };
}

function ScoreArea({ question, selectedId, hoveredId, feedback, onSelect, onHover, onLeave }) {
  const layout = useMemo(() => getLayout(question), [question]);
  const targetIds = new Set(allNotes(question).filter((note) => isTargetNote(question, note)).map((note) => note.id));
  const selectedCorrect = selectedId ? targetIds.has(selectedId) : false;

  return (
    <svg viewBox={`0 0 ${SVG.width} ${SVG.height}`} className="h-auto w-full select-none touch-none overflow-visible" aria-label="Tonic, subdominant and dominant exercise">
      <rect width={SVG.width} height={SVG.height} fill="white" />
      <StaffLines />
      <TrebleClef />
      <KeySignature signature={question.key.signature} />
      <TimeSignature />

      {Array.from({ length: BAR_COUNT }, (_, index) => {
        const x = MUSIC_START_X + layout.barWidth * (index + 1);
        const isFinal = index === BAR_COUNT - 1;

        if (isFinal) {
          return (
            <g key={index}>
              <line x1={x - 5} x2={x - 5} y1={STAFF.top - 0.5} y2={STAFF.top + STAFF.gap * 4 + 0.5} stroke="currentColor" strokeWidth="1.4" />
              <line x1={x} x2={x} y1={STAFF.top - 0.5} y2={STAFF.top + STAFF.gap * 4 + 0.5} stroke="currentColor" strokeWidth="4" />
            </g>
          );
        }

        return <line key={index} x1={x} x2={x} y1={STAFF.top} y2={STAFF.top + STAFF.gap * 4} stroke="currentColor" strokeWidth="1.2" />;
      })}

      {question.bars.map((bar, barIndex) => {
        const positions = bar.map((note) => layout.positions[note.id].x);
        const accidentalState = new Set();
        const renderedBeams = new Set();

        return bar.map((note, noteIndex) => {
          const position = layout.positions[note.id];
          const group = getQuaverGroup(bar, noteIndex);
          const showAccidental = shouldShowAccidental(question.key, note.pitch, accidentalState);
          let forcedStemEndY = null;
          let stemDownOverride = null;
          let beam = null;

          if (group) {
            beam = getBeamData(bar, group, positions, layout);
            stemDownOverride = beam.stemDown;

            const stem = stemData(note, position.x, position.y, beam.stemDown);
            forcedStemEndY = getBeamLineYAtX(stem.stemX, beam.start, beam.end);
            const stemLength = Math.abs(forcedStemEndY - position.y);

            if (stemLength > 42) forcedStemEndY = stem.stemDown ? position.y + 42 : position.y - 42;
            if (stemLength < 22) forcedStemEndY = stem.stemDown ? position.y + 22 : position.y - 22;
          }

          const selected = selectedId === note.id && !feedback;
          const hovered = hoveredId === note.id && !feedback;
          const correct = Boolean(feedback && targetIds.has(note.id));
          const incorrect = Boolean(feedback && selectedId === note.id && !selectedCorrect);

          return (
            <React.Fragment key={note.id}>
              <NoteGlyph
                note={note}
                x={position.x}
                y={position.y}
                selected={selected}
                hovered={hovered}
                correct={correct}
                incorrect={incorrect}
                showAccidental={showAccidental}
                forcedStemEndY={forcedStemEndY}
                stemDownOverride={stemDownOverride}
                showFlag={!group}
                onHover={() => !feedback && onHover(note.id)}
                onLeave={onLeave}
                onClick={(event) => {
                  event.stopPropagation();
                  if (!feedback) onSelect(note.id);
                }}
              />

              {group && group.start === noteIndex && !renderedBeams.has(`${barIndex}-${group.start}`) && (() => {
                renderedBeams.add(`${barIndex}-${group.start}`);

                const data = beam ?? getBeamData(bar, group, positions, layout);
                const beamIsTarget = bar.slice(group.start, group.end + 1).some((groupNote) => feedback && targetIds.has(groupNote.id));
                const beamIsIncorrect = feedback && bar.slice(group.start, group.end + 1).some((groupNote) => groupNote.id === selectedId && !selectedCorrect);
                const beamColour = beamIsIncorrect ? COLOUR.red : beamIsTarget ? COLOUR.green : "currentColor";

                return <line x1={data.start.x} y1={data.start.y} x2={data.end.x} y2={data.end.y} stroke={beamColour} strokeWidth="5" strokeLinecap="butt" />;
              })()}
            </React.Fragment>
          );
        });
      })}
    </svg>
  );
}

function StatCard({ label, value, footer, progress = null, medal = null, variant = "default", confettiKey = 0 }) {
  const safeProgress = progress === null ? null : clamp(progress, 0, 100);
  const fillHeight = safeProgress === null || safeProgress <= 0 ? 0 : safeProgress;
  const fillColour = safeProgress === null
    ? "transparent"
    : safeProgress < 50
    ? "rgba(220, 38, 38, 0.38)"
    : safeProgress < 70
    ? "rgba(255, 120, 0, 0.42)"
    : "rgba(22, 163, 74, 0.38)";
  const isStreak = variant === "streak";

  return (
    <div className={isStreak ? "relative overflow-visible bg-transparent p-3" : `relative overflow-hidden rounded-xl border border-stone-200 p-3 shadow-sm ${medal ? medal.bg : "bg-stone-50"}`}>
      {isStreak && confettiKey > 0 && (
        <div key={confettiKey} className="pointer-events-none absolute inset-0 z-20 overflow-visible">
          {Array.from({ length: 18 }).map((_, index) => (
            <span
              key={index}
              className="absolute block h-1.5 w-1 rounded-sm"
              style={{
                left: `${8 + ((index * 19) % 84)}%`,
                top: "-8px",
                backgroundColor: ["#facc15", "#38bdf8", "#fb7185", "#4ade80", "#a78bfa"][index % 5],
                animation: `confettiDrop ${0.85 + (index % 5) * 0.12}s ease-out forwards`,
                animationDelay: `${(index % 6) * 0.035}s`,
              }}
            />
          ))}
        </div>
      )}

      {safeProgress !== null && (
        <div className="absolute bottom-0 left-0 right-0 transition-all duration-700" style={{ height: `${fillHeight}%`, background: fillColour }} />
      )}

      <div className="relative z-10 text-center">
        <div className="text-xs uppercase tracking-wide text-stone-500">{label}</div>
        <div className={`text-xl font-semibold leading-tight ${isStreak && medal ? medal.text : ""}`}>{value}</div>
        {footer && <div className="mt-1 text-[13px] leading-none text-stone-500">{footer}</div>}
      </div>

      {isStreak && (
        <div className="pointer-events-none absolute -right-[12px] top-[12px] z-[999] select-none text-3xl leading-none" style={medal?.emoji ? { animation: "medalShine 1.4s ease-in-out infinite" } : { opacity: 0.16, filter: "grayscale(1) brightness(0.7)" }}>
          {medal?.emoji || "🥉"}
        </div>
      )}
    </div>
  );
}

        -webkit-tap-highlight-color: transparent;
        user-select: none;
        transition: transform 0.08s ease, filter 0.08s ease, background-color 0.12s ease, box-shadow 0.12s ease;

      }

}

function useClickOutside(refs, handlers) {
  useEffect(() => {
    function onPointerDown(event) {
      refs.forEach((ref, index) => {
        if (ref.current && !ref.current.contains(event.target)) {
          handlers[index]?.();
        }
      });
    }

    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, [refs, handlers]);
}

function App() {
  useInjectedStyles();

  const [question, setQuestion] = useState(() => makeQuestion());
  const [questionVisible, setQuestionVisible] = useState(true);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [helpOpen, setHelpOpen] = useState(false);
  const [selectedId, setSelectedId] = useState(null);
  const [hoveredId, setHoveredId] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [prompt, setPrompt] = useState("");
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);

  const customiseRef = useRef(null);
  const helpRef = useRef(null);

  useClickOutside(
    [customiseRef, helpRef],
    [
      () => customiseOpen && setCustomiseOpen(false),
      () => helpOpen && setHelpOpen(false),
    ],
  );

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const canConfirm = selectedId !== null && !feedback;
  const streakMedal = getStreakMedal(streak);

  function resetTask(nextQuestion) {
    setQuestion(nextQuestion);
    setSelectedId(null);
    setHoveredId(null);
    setFeedback(null);
    setFeedbackFading(false);
    setPrompt("");
  }

  function newQuestion() {
    setQuestionVisible(false);

    window.setTimeout(() => {
      resetTask(makeQuestion());
      setQuestionVisible(true);
    }, 260);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion();
  }

  function fadeToNextQuestion() {
    if (!feedback || feedback === "correct" || feedbackFading) return;

    setFeedbackFading(true);
    window.setTimeout(newQuestion, 280);
  }

  function scoreAnswer(feedbackType) {
    const isCorrect = feedbackType === "correct";
    const nextStreak = isCorrect ? streak + 1 : 0;

    playFeedbackSound(isCorrect);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback(feedbackType);

    if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }

    if (isCorrect) {
      setFeedbackFading(false);
      window.setTimeout(() => setFeedbackFading(true), 1700);
      window.setTimeout(newQuestion, 2000);
    }
  }

  function confirmAnswer() {
    if (feedback) return;

    if (!selectedId) {
      setPrompt("Select a note before pressing Confirm.");
      return;
    }

    const selectedNote = allNotes(question).find((note) => note.id === selectedId);
    const isCorrect = Boolean(selectedNote && isTargetNote(question, selectedNote));

    setPrompt("");
    scoreAnswer(isCorrect ? "correct" : "incorrect");
  }

  return (
    <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2">
      <div className="mx-auto max-w-6xl">
        <header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm">
          <div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div className="flex items-center gap-4">
              <AppIcon />
              <div>
                <h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Tonic, Subdominant and Dominant Notes</h1>
                <p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">
                  Identifying tonic, subdominant and dominant notes in the keys of C, G and F major and A minor.
                </p>
              </div>
            </div>

            <div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end">
              <StatCard variant="score" label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${accuracy}%`} progress={accuracy} />

              <div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${streakMedal?.bg || "bg-stone-50"}`}>
                <StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${bestStreak}`} medal={streakMedal} confettiKey={confettiKey} />
                <div className="relative z-0 flex min-h-[52px] min-w-[64px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700">
                  <div className="flex items-center gap-1"><span>💎</span><span className="text-cyan-500">30</span></div>
                  <div className="mt-1">🥇 <span className="text-yellow-500">20</span></div>
                  <div className="mt-1">🥈 <span className="text-slate-500">15</span></div>
                  <div className="mt-1">🥉 <span className="text-amber-700">10</span></div>
                </div>
              </div>
            </div>
          </div>
        </header>

        <main
          className="relative -mt-[10px] min-h-[560px] overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-4 pt-[10px] shadow-sm md:h-auto md:min-h-0 md:overflow-hidden md:px-6 md:pb-6 md:pt-[14px]"
          onPointerDown={() => {
            if (feedback && feedback !== "correct") fadeToNextQuestion();
          }}

              <div className="relative" ref={customiseRef}>
                <button type="button" onClick={() => setCustomiseOpen((value) => !value)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">

          <div className={`relative -top-[88px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>

          <div className="relative z-10 mt-1 h-[68px] overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-2 shadow-md md:-mt-[293px] md:mx-3">
            <div className="flex h-full items-center justify-between gap-4 px-2">
              <div className="flex min-w-0 flex-1 items-center text-stone-900">
                <div>
                  <p className="text-[15px] font-semibold leading-tight">

                  </p>
                  {prompt && <p className="mt-1 text-sm font-medium text-red-700">{prompt}</p>}
                </div>
              </div>

              <div className="flex shrink-0 items-center justify-end">
                <button type="button" disabled={!canConfirm} onClick={confirmAnswer} className="rounded-xl bg-green-600 px-[20px] py-[8px] text-sm font-bold text-white disabled:opacity-60">
                  Confirm
                </button>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

const rootElement = document.getElementById("root");
if (!rootElement) throw new Error("Root element not found.");
ReactDOM.render(<App />, rootElement);
  </script>
</body>
</html>
