<div id="root"></div>
<script type="text/babel">

const CORE = window.READING_RHYTHMS_CORE;
const SYMBOLS = window.BRAVURA_SYMBOLS || {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG || {};
const ACTIVITY_STATES = Object.freeze({ READY: "ready", COUNTING: "countingIn", PERFORMING: "performing", CALCULATING: "calculating", RESULTS: "results", REFERENCE: "playingReference" });
const ASSET = { appIcon: "readingrhythm-icon.svg", levels: "levels.svg", customise: "customise.svg", next: "next.svg", bronze: "bronze.svg", silver: "silver.svg", gold: "gold.svg", diamond: "diamond.svg", tempo: "tempo.svg", tap: "tap.svg", spacebar: "spacebar.svg", mouse: "mouse.svg" };

    <div className="flex flex-wrap items-center justify-between gap-2"><h2 className="text-xl font-black">{result.passed ? "Accurate performance" : "Keep practising"}</h2><div className={`rounded-full px-3 py-1 text-lg font-black text-white ${result.passed ? "bg-green-600" : "bg-red-600"}`}>{result.percentage}%</div></div>

function App() {

  const [activeLevel, setActiveLevel] = useState(startLevel);
  const [tempo, setTempo] = useState(90);
  const [rhythm, setRhythm] = useState(() => CORE.generateRhythm(startLevel));
  const [activityState, setActivityState] = useState(ACTIVITY_STATES.READY);
  const [countInNumber, setCountInNumber] = useState(null);
  const [result, setResult] = useState(null);
  const [tapPulse, setTapPulse] = useState(0);

  const [levelOpen, setLevelOpen] = useState(false), [customiseOpen, setCustomiseOpen] = useState(false);
  const levelRef = useRef(null), customiseRef = useRef(null), tapAreaRef = useRef(null), audioRef = useRef(null), stateRef = useRef(activityState), performanceStartRef = useRef(0), tapsRef = useRef([]), timersRef = useRef([]), lastPointerTimeRef = useRef(-Infinity), resultsCalculatedRef = useRef(false);

  function applyLevel(level) { cancelAudioAndTimers(); setActiveLevel(level); setRhythm(CORE.generateRhythm(level)); setLevelOpen(false); setCustomiseOpen(false); setCorrect(0); setAttempted(0); setStreak(0); setBestStreak(0); setConfettiKey(0); setResult(null); transition(ACTIVITY_STATES.READY); setStatus(`${CORE.LEVELS[level].label} rhythm ready.`); }

  return <div className={window.MLH.shell.pageShellClass}>
    <window.MLH.AppHeader icon={ASSET.appIcon} title="Reading Rhythms" subtitle="Perform rhythms in time with the music by reading notation.">

    </window.MLH.AppHeader>
    <div className={window.MLH.shell.pageContentClass}>
      <main ref={tapAreaRef} tabIndex="0" role="region" aria-label="Reading Rhythms performance area" className={`${window.MLH.shell.mainShellClass} reading-tap-area flex min-h-[620px] flex-col gap-4 pb-5 md:min-h-[520px]`} onPointerDown={handlePointer}>
        <window.MLH.AppToolbar left={<div className={`flex items-center gap-2 ${activeAttempt ? "opacity-50" : ""}`}><div className="hub-menu-anchor relative" ref={levelRef}><window.MLH.LevelButton icon={<img src={ASSET.levels} alt="" className="h-[26px] w-[26px]" />} activeLevel={activeLevel} activeLabel={CORE.LEVELS[activeLevel].label} onClick={() => { if (activeAttempt) return; setCustomiseOpen(false); setLevelOpen((open) => !open); }} dataMenuTrigger={true} />{levelOpen && <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}><window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} /></window.MLH.MenuPanel>}</div><div className="hub-menu-anchor relative" ref={customiseRef}><window.MLH.CustomiseButton icon={<img src={ASSET.customise} alt="" className="h-[26px] w-[26px]" />} onClick={() => { if (activeAttempt) return; setLevelOpen(false); setCustomiseOpen((open) => !open); }} dataMenuTrigger={true} />{customiseOpen && <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}><TempoMenu tempo={tempo} setTempo={setTempo} disabled={activeAttempt} /></window.MLH.MenuPanel>}</div></div>} feedback={null} right={<window.MLH.SkipButton disabled={activeAttempt} resetStreak={() => setStreak(0)} onClick={() => makeNewRhythm()} icon={<img src={ASSET.next} alt="" className="h-[27px] w-[27px]" />} />} />
        <div className="flex min-h-[62px] flex-col items-center gap-3 px-1 sm:grid sm:grid-cols-[1fr_auto_1fr] sm:items-start sm:px-3">
          <div className="flex flex-col gap-1 justify-self-start" aria-label="Two-bar count-in">
            <span className="text-xs font-black uppercase tracking-wider text-stone-500">Count in</span>
            <div className="grid grid-flow-col auto-cols-[26px] gap-1 sm:auto-cols-[30px]">{Array.from({ length: countBoxes }, (_, index) => { const reached = countInNumber !== null && index < countInNumber; const current = countInNumber === index + 1; return <span key={index} className={`flex h-[28px] items-center justify-center rounded border text-sm font-black sm:h-[30px] ${current ? "border-black bg-black text-white" : reached ? "border-stone-500 bg-stone-300 text-black" : "border-stone-300 bg-white text-stone-400"}`}>{reached ? index % rhythm.timeSignature.pulsesPerBar + 1 : ""}</span>; })}</div>
          </div>
          <div className="flex items-center justify-center gap-4 self-center" aria-label="Tap, press the spacebar, or click in time with the notes">
            {[{ icon: ASSET.tap, label: "Tap" }, { icon: ASSET.spacebar, label: "Spacebar" }, { icon: ASSET.mouse, label: "Click" }].map((item) => <div key={item.label} className="flex flex-col items-center gap-1 text-xs font-bold"><img src={item.icon} alt="" className="h-7 w-7 object-contain" /><span>{item.label}</span></div>)}
          </div>
          <div />
        </div>
        <div className="relative flex min-h-[220px] flex-1 items-center justify-center px-1 sm:px-3">
          <RhythmScore rhythm={rhythm} tempo={tempo} results={activityState === ACTIVITY_STATES.RESULTS || activityState === ACTIVITY_STATES.REFERENCE ? result : null} />
          {activityState === ACTIVITY_STATES.PERFORMING && <div className="pointer-events-none absolute right-5 top-5"><span key={tapPulse} className="reading-tap-pulse block h-5 w-5 rounded-full bg-blue-600"></span></div>}
        </div>
        <div aria-live="polite" className="sr-only">{status}</div>
        <section className="mx-1 rounded-xl border border-stone-200 bg-stone-50 p-4 shadow-md sm:mx-3">
          <p className="mb-4 text-center text-base font-bold">Tap, click, or press the spacebar in time with each written note.</p>
          {activityState === ACTIVITY_STATES.READY && <button type="button" onClick={startAttempt} className="mx-auto flex h-14 w-full max-w-[260px] items-center justify-center rounded-xl bg-black px-6 text-lg font-black text-white shadow-md">Start</button>}
          {activityState === ACTIVITY_STATES.COUNTING && <div className="text-center text-xl font-black" aria-hidden="true">Count in</div>}
          {activityState === ACTIVITY_STATES.PERFORMING && <div className="text-center text-xl font-black" aria-hidden="true">Perform now</div>}
          {(activityState === ACTIVITY_STATES.RESULTS || activityState === ACTIVITY_STATES.REFERENCE) && <><ResultsSummary result={result} /><div className="mt-3 grid gap-2 sm:grid-cols-3"><button type="button" disabled={activityState === ACTIVITY_STATES.REFERENCE} onClick={playReference} className="h-12 rounded-xl border border-black bg-black px-4 font-black text-white disabled:opacity-50">Hear Correct Rhythm</button><button type="button" disabled={activityState === ACTIVITY_STATES.REFERENCE} onClick={() => { resetAttempt(); setStatus("Same rhythm ready to try again."); }} className="h-12 rounded-xl border border-stone-300 bg-white px-4 font-black disabled:opacity-50">Try Again</button><button type="button" disabled={activityState === ACTIVITY_STATES.REFERENCE} onClick={() => makeNewRhythm()} className="h-12 rounded-xl border border-stone-300 bg-white px-4 font-black disabled:opacity-50">New Rhythm</button></div></>}
        </section>
      </main>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
<script src="./footer.js?v=20260629"></script>
</body>
</html>
