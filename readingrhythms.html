<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reading Rhythms</title>
  <link rel="icon" type="image/svg+xml" href="./readingrhythm-icon.svg" />
  <link rel="apple-touch-icon" href="./readingrhythm-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./hub-ui.css?v=1.6" />
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="./bravura-symbols.js?v=20260629"></script>
  <script src="./shared-notation-config.js?v=20260629"></script>
  <script src="./hub-mobile.js?v=20260629"></script>
  <script src="./hub-audio.js?v=20260712-metronome-samples"></script>
  <script src="./hub-shell.js?v=20260712-profile-sharing"></script>
  <script src="./hub-menu.js?v=20260712-profile-sharing"></script>
  <script src="./reading-rhythms-core.js?v=20260712"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
  <style>
    @font-face { font-family: "Bravura"; src: url("./Bravura.otf") format("opentype"); font-display: block; }
    .music-symbol { font-family: "Bravura", serif; font-weight: 400; dominant-baseline: alphabetic; text-rendering: geometricPrecision; }
    .reading-tap-area { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .reading-tap-area:focus-visible { outline: 3px solid #2563eb; outline-offset: 3px; }
    .reading-score-scroll { scrollbar-width: thin; scrollbar-color: #94a3b8 transparent; }
    .reading-score-svg { min-width: 720px; }
    @keyframes readingTapPulse { 0% { transform: scale(.55); opacity: .9; } 100% { transform: scale(1.7); opacity: 0; } }
    .reading-tap-pulse { animation: readingTapPulse .28s ease-out forwards; }
    @media (prefers-reduced-motion: reduce) { .reading-tap-pulse { animation: none; opacity: .55; } }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;
const CORE = window.READING_RHYTHMS_CORE;
const SYMBOLS = window.BRAVURA_SYMBOLS || {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG || {};
const ACTIVITY_STATES = Object.freeze({ READY: "ready", COUNTING: "countingIn", PERFORMING: "performing", CALCULATING: "calculating", RESULTS: "results", REFERENCE: "playingReference" });
const ASSET = { appIcon: "readingrhythm-icon.svg", levels: "levels.svg", customise: "customise.svg", next: "next.svg", restart: "restart.svg", bronze: "bronze.svg", silver: "silver.svg", gold: "gold.svg", diamond: "diamond.svg", tempo: "tempo.svg", tap: "tap.svg", spacebar: "spacebar.svg", mouse: "mouse.svg" };
const LEVELS = Object.fromEntries(Object.entries(CORE.LEVELS).map(([key, level]) => [key, { ...level, shortLabel: key, description: level === CORE.LEVELS.N3 ? "Crotchet • Minim • Dotted minim • Semibreve" : level === CORE.LEVELS.N4 ? "Paired quavers • Grouped semiquavers" : level === CORE.LEVELS.N5 ? "Dotted rhythms • Scotch snap" : key === "H" ? "Compound time • Rests • Triplets" : "5/4 • Ties • Syncopation" }]));
const NEUTRAL_CLEF = "\uE069";
const SCORE = { width: 920, height: 180, lineY: 88, musicLeft: 145, right: 880, barWidth: (880 - 145) / 2 };
const RESULT_STYLE = { perfect: { colour: "#16a34a", label: "Perfect", mark: "✓" }, acceptable: { colour: "#16a34a", label: "Acceptable", mark: "✓" }, early: { colour: "#dc2626", label: "Early", mark: "E" }, late: { colour: "#dc2626", label: "Late", mark: "L" }, missed: { colour: "#dc2626", label: "Missed", mark: "×" } };
const RHYTHM_OPTIONS = [
  { id: "crotchet", label: "Crotchet", symbol: "quarterNoteStemUp" },
  { id: "minim", label: "Minim", symbol: "halfNoteStemUp" },
  { id: "dotted-minim", label: "Dotted minim", symbol: "halfNoteStemUp", dotted: true },
  { id: "semibreve", label: "Semibreve", symbol: "wholeNote" },
  { id: "quaver", label: "Quaver", symbol: "eighthNoteStemUp" },
  { id: "semiquaver", label: "Semiquaver", symbol: "sixteenthNoteStemUp" },
  { id: "dotted-crotchet", label: "Dotted crotchet", symbol: "quarterNoteStemUp", dotted: true },
  { id: "dotted-quaver", label: "Dotted quaver", symbol: "eighthNoteStemUp", dotted: true },
];

function initialLevel() { const requested = new URLSearchParams(window.location.search).get("level")?.toUpperCase(); return CORE.LEVELS[requested] ? requested : "N3"; }
function glyph(key, fallback = "") { return SYMBOLS[key] || fallback; }
function timeDigit(value) { return String(value).split("").map((digit) => glyph(`timeSig${digit}`, digit)).join(""); }
function eventX(bar, event) { return SCORE.musicLeft + bar.barIndex * SCORE.barWidth + 22 + (event.startBeats / bar.durationBeats) * (SCORE.barWidth - 44); }
function eventMap(rhythm) { const result = new Map(); rhythm.bars.forEach((bar) => bar.events.forEach((event) => result.set(event.id, { bar, event, x: eventX(bar, event) }))); return result; }

function symbolConfig(key) {
  const alias = key === "augmentationDotLine" || key === "augmentationDotSpace" ? "augmentationDot" : key;
  return SHARED_CONFIG.symbols?.[key] || SHARED_CONFIG.symbols?.[alias] || {};
}
function CalibratedSymbol({ symbolKey, x, y, fontSize = 40, settingOverrides = {} }) {
  const config = { ...symbolConfig(symbolKey), ...settingOverrides };
  const alias = symbolKey === "augmentationDotLine" || symbolKey === "augmentationDotSpace" ? "augmentationDot" : symbolKey;
  const adjustedX = x + Number(config.xOffsetScale || 0) * 10 + Number(config.opticalXOffset || 0);
  const adjustedY = y + Number(config.yOffsetScale || 0) * 10 + Number(config.opticalYOffset || 0);
  const size = config.fontSizeScale ? Number(config.fontSizeScale) * 10 : fontSize;
  return <text className="music-symbol" x={adjustedX} y={adjustedY} fill="currentColor" fontSize={size} textAnchor="middle" transform={`translate(${adjustedX} ${adjustedY}) scale(${config.widthScale || 1} ${config.heightScale || 1}) translate(${-adjustedX} ${-adjustedY})`}>{glyph(alias)}</text>;
}

function RestGlyph({ event, x, colour = "currentColor" }) {
  const info = CORE.RHYTHMS[event.rhythm];
  const base = info.restBase;
  const symbolKey = base === "minim" ? "halfRest" : base === "quaver" ? "eighthRest" : "quarterRest";
  return <g style={{ color: colour }}><CalibratedSymbol symbolKey={symbolKey} x={x} y={SCORE.lineY} />{info.dotted && <CalibratedSymbol symbolKey="augmentationDotLine" x={x + 13} y={SCORE.lineY - 2.5} fontSize={25} />}</g>;
}

function NoteGlyph({ event, x, beamed, colour = "currentColor" }) {
  const info = CORE.RHYTHMS[event.rhythm];
  if (event.type === "rest") return <RestGlyph event={event} x={x} colour={colour} />;
  if (beamed) return <g style={{ color: colour }}><CalibratedSymbol symbolKey="noteheadBlack" x={x} y={SCORE.lineY} fontSize={34} /><line x1={x + 4.5} x2={x + 4.5} y1={SCORE.lineY - .5} y2={SCORE.lineY - 34} stroke="currentColor" strokeWidth={Math.max(1, 10 * Number(SHARED_CONFIG.drawing?.stemThicknessScale || .12))} />{info.dotted && <CalibratedSymbol symbolKey="augmentationDotLine" x={x + 13} y={SCORE.lineY - 2.5} fontSize={24} />}</g>;
  const symbolKey = event.rhythm === "semibreve" ? "wholeNote" : ["minim", "dotted-minim"].includes(event.rhythm) ? "halfNoteStemUp" : event.rhythm === "semiquaver" ? "sixteenthNoteStemUp" : ["quaver", "dotted-quaver", "triplet-quaver"].includes(event.rhythm) ? "eighthNoteStemUp" : "quarterNoteStemUp";
  return <g style={{ color: colour }}><CalibratedSymbol symbolKey={symbolKey} x={x} y={SCORE.lineY} />{info.dotted && <CalibratedSymbol symbolKey="augmentationDotLine" x={x + 14} y={SCORE.lineY - 2.5} fontSize={24} />}</g>;
}

function secondaryBeamSegments(events) {
  const segments = []; let start = null;
  events.forEach((event, index) => {
    const hasSecondBeam = CORE.RHYTHMS[event.rhythm].beams === 2;
    const nextHasSecondBeam = CORE.RHYTHMS[events[index + 1]?.rhythm]?.beams === 2;
    if (hasSecondBeam && start === null) start = index;
    if (start !== null && (!nextHasSecondBeam || index === events.length - 1)) { segments.push({ start, end: index, hook: start === index }); start = null; }
  });
  return segments;
}

function TripletMark({ group, positions }) {
  if (!group?.triplet || group.events.length !== 3) return null;
  const centreX = positions.get(group.events[1].id).x;
  if (group.events[0].rhythm === "triplet-quaver") {
    return <text x={centreX + 4} y={SCORE.lineY - 40} textAnchor="middle" fontFamily="serif" fontWeight="900" fontSize="20" fill="currentColor">3</text>;
  }
  const x1 = positions.get(group.events[0].id).x - 4;
  const x2 = positions.get(group.events[2].id).x + 4;
  const y = SCORE.lineY - 40;
  return <g transform="translate(4 0)" stroke="currentColor" fill="currentColor"><g stroke="currentColor" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d={`M ${x1} ${y + 6} L ${x1} ${y} L ${centreX - 10} ${y}`} /><path d={`M ${centreX + 10} ${y} L ${x2} ${y} L ${x2} ${y + 6}`} /></g><text x={centreX} y={y + 5} textAnchor="middle" fontFamily="serif" fontWeight="900" fontSize="20">3</text></g>;
}

function TimingFeedback({ rhythm, results, positions, tempo }) {
  if (!results) return null;
  const lineY = 146;
  const pixelsPerSecond = ((SCORE.barWidth - 44) / rhythm.timeSignature.quarterBeatsPerBar) * rhythm.timeSignature.pulseQuarterBeats * tempo / 60;
  const toleranceWidth = Math.max(7, Math.min(24, results.thresholds.acceptableMs / 1000 * pixelsPerSecond));
  const timingXs = results.results.map((item) => positions.get(item.eventId)?.x).filter(Number.isFinite);
  function xForTime(time) {
    const beat = time * rhythm.timeSignature.pulseQuarterBeats * tempo / 60;
    const barIndex = Math.max(0, Math.min(1, Math.floor(beat / rhythm.timeSignature.quarterBeatsPerBar)));
    const beatInBar = beat - barIndex * rhythm.timeSignature.quarterBeatsPerBar;
    return SCORE.musicLeft + barIndex * SCORE.barWidth + 22 + (beatInBar / rhythm.timeSignature.quarterBeatsPerBar) * (SCORE.barWidth - 44);
  }
  return <g aria-label="Timing tolerance and pupil inputs">
    {timingXs.length > 1 && <>
      <g opacity="0.35" stroke="#78716c" strokeWidth="1.4">
        <line x1="38" x2={SCORE.right} y1={lineY} y2={lineY} />
        <line x1="38" x2="38" y1={lineY - 5} y2={lineY + 5} />
        <line x1={SCORE.right} x2={SCORE.right} y1={lineY - 5} y2={lineY + 5} />
      </g>
      <line x1={SCORE.musicLeft + SCORE.barWidth} x2={SCORE.musicLeft + SCORE.barWidth} y1={lineY - 22} y2={lineY + 22} stroke="#000" strokeWidth="1.4" />
    </>}
    {results.results.map((item) => {
      const position = positions.get(item.eventId); if (!position) return null;
      const accurate = item.category === "perfect" || item.category === "acceptable";
      const inputX = Number.isFinite(item.errorMs) ? position.x + item.errorMs / 1000 * pixelsPerSecond : null;
      return <g key={`timing-${item.eventId}`}><g><line x1={position.x - toleranceWidth} x2={position.x - toleranceWidth} y1={lineY - 4} y2={lineY + 4} stroke="#000" strokeWidth="1.4" /><circle cx={position.x} cy={lineY} r="5" fill="#000" /><line x1={position.x + toleranceWidth} x2={position.x + toleranceWidth} y1={lineY - 4} y2={lineY + 4} stroke="#000" strokeWidth="1.4" /></g>{inputX !== null && <circle cx={inputX} cy={lineY} r="2.5" fill={accurate ? "#16a34a" : "#dc2626"} />}</g>;
    })}
    {results.extras.map((item, index) => <circle key={`extra-${index}`} cx={xForTime(item.time)} cy={lineY} r="2.5" fill="#dc2626" />)}
  </g>;
}

function RhythmScore({ rhythm, results, tempo, activePlaybackEventId = null }) {
  const positions = useMemo(() => eventMap(rhythm), [rhythm]);
  const resultByEventId = new Map((results?.results || []).map((item) => [item.eventId, item]));
  const groups = [];
  rhythm.bars.forEach((bar) => {
    const ids = [...new Set(bar.events.map((event) => event.groupId).filter(Boolean))];
    ids.forEach((id) => {
      const events = bar.events.filter((event) => event.groupId === id);
      const beamEvents = events.filter((event) => CORE.RHYTHMS[event.rhythm].beams);
      if (beamEvents.length >= 2) groups.push({ id, events, beamEvents, triplet: events.some((event) => CORE.RHYTHMS[event.rhythm].triplet) });
      else if (events.some((event) => CORE.RHYTHMS[event.rhythm].triplet)) groups.push({ id, events, beamEvents: [], triplet: true });
    });
  });
  const beamedIds = new Set(groups.flatMap((group) => group.beamEvents.map((event) => event.id)));
  return <div className="reading-score-scroll w-full overflow-x-auto" tabIndex="0" aria-label="Two-bar rhythm notation. Scroll horizontally if needed.">
    <svg viewBox={`0 0 ${SCORE.width} ${SCORE.height}`} className="reading-score-svg block h-auto w-full select-none" role="img" aria-label={`Two bars in ${rhythm.timeSignature.id}`}>
      <line x1="38" x2={SCORE.right} y1={SCORE.lineY} y2={SCORE.lineY} stroke="currentColor" strokeWidth="1.4" />
      <text className="music-symbol" x="68" y={SCORE.lineY} textAnchor="middle" fontSize="44" fill="currentColor">{NEUTRAL_CLEF}</text>
      <text className="music-symbol" x="108" y={SCORE.lineY - 12} textAnchor="middle" fontSize="34" fill="currentColor">{timeDigit(rhythm.timeSignature.numerator)}</text>
      <text className="music-symbol" x="108" y={SCORE.lineY + 11} textAnchor="middle" fontSize="34" fill="currentColor">{timeDigit(rhythm.timeSignature.denominator)}</text>
      <g transform={`translate(${rhythm.timeSignature.compound ? 5 : 0} -22)`}><g transform="translate(150 42) scale(.65) translate(-150 -42)"><text className="music-symbol" x="150" y="42" textAnchor="middle" fontSize="40" fontWeight="400" fill="currentColor">{glyph("quarterNoteStemUp")}</text>{rhythm.timeSignature.compound && <text className="music-symbol" x="163" y="39.5" textAnchor="middle" fontSize="52" fontWeight="400" fill="currentColor">{glyph("augmentationDot")}</text>}</g></g>
      <text x={rhythm.timeSignature.compound ? 174 : 164} y="22" fontSize="16" fontWeight="700" fill="currentColor">= {tempo}</text>
      {rhythm.bars.map((bar) => <React.Fragment key={bar.barIndex}>
        {bar.events.map((event) => { const eventResult = resultByEventId.get(event.id); const colour = activePlaybackEventId === event.id ? "#2563eb" : eventResult ? RESULT_STYLE[eventResult.category].colour : "currentColor"; return <NoteGlyph key={event.id} event={event} x={positions.get(event.id).x} beamed={beamedIds.has(event.id)} colour={colour} />; })}
{bar.events.map((event, index) => event.tiedToNext && bar.events[index + 1] ? <text key={`tie-${event.id}`} className="music-symbol" x="0" y="0" fontSize="58" textAnchor="middle" fill={activePlaybackEventId === event.id || activePlaybackEventId === bar.events[index + 1].id ? "#2563eb" : resultByEventId.has(event.id) ? (RESULT_STYLE[resultByEventId.get(event.id).category].colour) : "currentColor"} transform={`translate(${(positions.get(event.id).x + positions.get(bar.events[index + 1].id).x) / 2} ${SCORE.lineY - 1}) scale(${Math.max(1.4, Math.min(7.2, Math.abs(positions.get(bar.events[index + 1].id).x - positions.get(event.id).x) / 20))} 1)`}>{glyph("tie", "\uE1FD")}</text> : null)}
      </React.Fragment>)}
      {groups.map((group) => {
        const first = group.beamEvents[0], last = group.beamEvents[group.beamEvents.length - 1];
        const firstX = first ? positions.get(first.id).x + 4.5 : positions.get(group.events[0].id).x;
        const lastX = last ? positions.get(last.id).x + 4.5 : positions.get(group.events[group.events.length - 1].id).x;
        const segments = secondaryBeamSegments(group.beamEvents);
        const groupResults = group.events.map((event) => resultByEventId.get(event.id)).filter(Boolean);
        const groupColour = group.events.some((event) => event.id === activePlaybackEventId) ? "#2563eb" : groupResults.length ? (groupResults.every((item) => item.category === "perfect" || item.category === "acceptable") ? "#16a34a" : "#dc2626") : "currentColor";
        return <g key={group.id} style={{ color: groupColour }}>{first && <line x1={firstX - .5} x2={lastX + .5} y1={SCORE.lineY - 34} y2={SCORE.lineY - 34} stroke="currentColor" strokeWidth="5" />}{segments.map((segment, index) => { const x1 = positions.get(group.beamEvents[segment.start].id).x + 4.5; const x2 = segment.hook ? x1 + (segment.start > 0 ? -12 : 12) : positions.get(group.beamEvents[segment.end].id).x + 4.5; return <line key={index} x1={x1} x2={x2} y1={SCORE.lineY - 26} y2={SCORE.lineY - 26} stroke="currentColor" strokeWidth="4" />; })}<TripletMark group={group} positions={positions} /></g>;
      })}
      <line x1={SCORE.musicLeft + SCORE.barWidth} x2={SCORE.musicLeft + SCORE.barWidth} y1={SCORE.lineY - 22} y2={SCORE.lineY + 22} stroke="currentColor" strokeWidth="1.4" />
      <line x1={SCORE.right - 6} x2={SCORE.right - 6} y1={SCORE.lineY - 22} y2={SCORE.lineY + 22} stroke="currentColor" strokeWidth="1.4" />
      <line x1={SCORE.right} x2={SCORE.right} y1={SCORE.lineY - 22} y2={SCORE.lineY + 22} stroke="currentColor" strokeWidth="4" />
      <TimingFeedback rhythm={rhythm} results={results} positions={positions} tempo={tempo} />
    </svg>
  </div>;
}

function playPerformanceHit(ctx, destination, start, duration = .18, volume = .095) {
  window.MLH.playPianoFrequency?.(ctx, destination, 261.6256, start, duration, volume, 96);
}

function RhythmMenuGlyph({ option }) {
  const dotAdjust = option.id === "dotted-quaver" ? 10 : option.id === "dotted-crotchet" ? 4 : 0;
  return <svg viewBox="0 0 70 70" className="relative -left-[11px] h-12 w-20 overflow-visible" aria-hidden="true"><g transform="translate(0, 12) scale(1.05)"><CalibratedSymbol symbolKey={option.symbol} x={32} y={28} /></g>{option.dotted && <g transform={`translate(${dotAdjust}, 12) scale(1.05)`}><CalibratedSymbol symbolKey="augmentationDotLine" x={45} y={25.5} fontSize={24} /></g>}</svg>;
}

function CompactToggleButton({ label, glyph: glyphContent, checked, onChange, disabled, visibleLabel = "", tall = true, glyphShiftX = 15, glyphShiftY = 3 }) {
  useEffect(() => {
    const restored = window.MLH.profileSettings?.getToggle(label);
    if (typeof restored !== "boolean" || restored === checked) return undefined;
    const timer = window.setTimeout(onChange, restored ? 0 : 70);
    return () => window.clearTimeout(timer);
  }, [label, checked, onChange]);
  return <button type="button" disabled={disabled} onClick={() => { window.MLH.profileSettings?.setToggle(label, !checked); onChange(); }} aria-label={`Toggle ${label}`} title={label} aria-pressed={checked} data-profile-toggle={label} className="hub-toggle-row" style={{ height: tall ? "56px" : "44px", minHeight: tall ? "56px" : "44px", padding: tall ? "7px 64px 7px 10px" : "10px 64px 10px 14px", overflow: "visible", position: "relative" }}><span className="flex h-full items-center justify-center"><span className={visibleLabel ? "absolute flex h-9 w-9 items-center justify-center" : "relative flex h-full items-center justify-center"} style={visibleLabel ? { left: `${12 + glyphShiftX}px`, top: "50%", transform: `translateY(calc(-50% + ${glyphShiftY}px))` } : { left: `${glyphShiftX}px`, top: `${glyphShiftY}px` }}>{glyphContent}</span>{visibleLabel && <span className="absolute left-[46px] top-1/2 -translate-y-1/2 whitespace-nowrap text-sm font-semibold leading-none">{visibleLabel}</span>}</span><span className={`hub-toggle-track shrink-0 ${checked ? "is-on" : ""}`} style={{ position: "absolute", right: "10px", top: "50%", transform: "translateY(-50%)" }}><span className="hub-toggle-thumb" /></span></button>;
}

function RhythmToggleButton({ option, checked, onChange, disabled }) { return <CompactToggleButton label={option.label} glyph={<RhythmMenuGlyph option={option} />} checked={checked} onChange={onChange} disabled={disabled} />; }

function TimeSignatureMenuGlyph({ signatureId }) {
  const [top, bottom] = signatureId.split("/");
  const topGlyph = top.split("").map((digit) => glyph(`timeSig${digit}`, digit)).join("");
  return <span className="inline-flex h-[42px] w-[56px] shrink-0 items-center justify-center leading-none"><svg viewBox="0 0 24 34" className="relative -top-[6px] h-[48px] w-[20px] text-stone-800" aria-hidden="true"><text className="music-symbol" x="12" y="14" textAnchor="middle" fontSize="32" fill="currentColor" style={{ transform: "translateY(-2px)" }}>{topGlyph}</text><text className="music-symbol" x="12" y="28" textAnchor="middle" fontSize="32" fill="currentColor" style={{ transform: "translateY(2px)" }}>{glyph(`timeSig${bottom}`, bottom)}</text></svg></span>;
}

function OptionMenuGlyph({ type }) {
  if (type === "ties") return <span className="music-symbol relative -left-[5px] -top-[6px] inline-flex h-9 w-9 items-center justify-center text-[34px] leading-none">{glyph("tie", "\uE1FD")}</span>;
  return <svg viewBox="0 0 70 70" className="relative -left-[3px] -top-px h-9 w-9 overflow-visible" aria-hidden="true"><g transform="translate(0, 7) scale(1.05)"><CalibratedSymbol symbolKey="quarterRest" x={32} y={28} /></g></svg>;
}

function CustomiseMenu({ activeLevel, enabledRhythms, enabledTimeSignatures, restsEnabled, tiesEnabled, toggleRhythm, toggleTimeSignature, toggleRests, toggleTies, tempo, setTempo, disabled }) {
  const options = RHYTHM_OPTIONS.filter((option) => CORE.LEVELS[activeLevel].rhythmIds.includes(option.id));
  const signatureIds = CORE.LEVELS[activeLevel].timeSignatureIds;
  return <>
    <window.MLH.MenuSubheading>Tempo</window.MLH.MenuSubheading>
    <div className="hub-toggle-row flex-col !items-stretch gap-2 px-3 py-3"><div className="flex items-center justify-between gap-4"><span className="hub-toggle-label"><span className="hub-toggle-glyph"><img src={ASSET.tempo} alt="" className="h-5 w-5" /></span><span>Tempo</span></span><strong>{tempo} bpm</strong></div><input type="range" min="60" max="120" step="5" value={tempo} disabled={disabled} aria-label="Tempo in beats per minute" onChange={(event) => setTempo(Number(event.target.value))} className="w-full accent-black disabled:opacity-50" /></div>
    <window.MLH.MenuSubheading>Time Signatures</window.MLH.MenuSubheading>
    <div className="grid grid-cols-2 gap-2"><div className="space-y-2">{signatureIds.filter((id) => !CORE.TIME_SIGNATURES[id].compound).map((id) => <CompactToggleButton key={id} label={id} glyph={<TimeSignatureMenuGlyph signatureId={id} />} checked={Boolean(enabledTimeSignatures[id])} disabled={disabled} onChange={() => toggleTimeSignature(id)} />)}</div><div className="space-y-2">{signatureIds.filter((id) => CORE.TIME_SIGNATURES[id].compound).map((id) => <CompactToggleButton key={id} label={id} glyph={<TimeSignatureMenuGlyph signatureId={id} />} checked={Boolean(enabledTimeSignatures[id])} disabled={disabled} onChange={() => toggleTimeSignature(id)} />)}</div></div>
    <window.MLH.MenuSubheading>Rhythms</window.MLH.MenuSubheading>
    <div className="grid grid-cols-2 gap-2">{options.map((option) => <RhythmToggleButton key={option.id} option={option} checked={Boolean(enabledRhythms[option.id])} disabled={disabled} onChange={() => toggleRhythm(option.id)} />)}</div>
