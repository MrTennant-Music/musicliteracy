    @keyframes conceptAnswerShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-7px); } 40% { transform: translateX(6px); } 60% { transform: translateX(-4px); } 80% { transform: translateX(3px); } }

      .concept-styles-cell:nth-last-child(-n + 3) { border-bottom: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }

<body>
<div id="root"></div>
<script>
  (() => {
    const root = document.getElementById("root");
    let ready = false;
    function showLoadingError() {
      if (ready || !root || root.childElementCount > 0) return;
      root.innerHTML = '<section class="concept-load-error" role="alert" aria-labelledby="concept-load-error-title"><img src="./concept-recall-icon.svg" alt=""><h1 id="concept-load-error-title">Concept Recall could not load</h1><p>Reload the page to try again. If the problem continues, check your internet connection.</p><button type="button" id="concept-load-retry">Reload</button></section>';
      document.getElementById("concept-load-retry")?.addEventListener("click", () => window.location.reload());
    }
    window.addEventListener("concept-recall-ready", () => { ready = true; });
    window.addEventListener("error", () => window.setTimeout(showLoadingError, 1500));
    window.setTimeout(showLoadingError, 8000);
  })();
</script>
<script type="text/babel">
const { useEffect, useLayoutEffect, useMemo, useRef, useState } = React;
const CORE = window.CONCEPT_RECALL_CORE;
const DATA = window.CONCEPT_RECALL_DATA;
const ASSET = {
  appIcon: "concept-recall-icon.svg",
  levels: "levels.svg",
  customise: "customise.svg",
  hint: "guide.svg",
  chime: "chime.mp3",
  bronze: "bronze.svg",
  silver: "silver.svg",
  gold: "gold.svg",
  diamond: "diamond.svg",
};
const MEDALS = {
  bronze: { label: "Bronze", icon: ASSET.bronze, sound: "bronze", colour: "#b45309", background: "rgba(180,83,9,.2)" },
  silver: { label: "Silver", icon: ASSET.silver, sound: "silver", colour: "#64748b", background: "rgba(203,213,225,.3)" },
  gold: { label: "Gold", icon: ASSET.gold, sound: "gold", colour: "#ca8a04", background: "rgba(250,204,21,.25)" },
  diamond: { label: "Diamond", icon: ASSET.diamond, sound: "platinum", colour: "#0891b2", background: "rgba(34,211,238,.25)" },
};
const PLAYABLE_LEVELS = ["N5", "H", "AH"];
const CUSTOMISE_STORAGE_KEY = "mlh-concept-recall-customise-v1";
const DEFAULT_OFF_CATEGORIES = {
  N5: ["National 5 Styles"],
  H: ["Higher Styles", "Orchestral families"],
  AH: ["Advanced Higher Styles", "Bass lines", "Concerto grosso", "Orchestral families"],
};
const STYLE_CATEGORY_BY_LEVEL = {
  N5: "National 5 Styles",
  H: "Higher Styles",
  AH: "Advanced Higher Styles",
};
const STYLE_CATEGORIES = new Set(Object.values(STYLE_CATEGORY_BY_LEVEL));

function isStylesCategory(category) {
  return STYLE_CATEGORIES.has(category);
}

function requestedLevel() {
  const requested = new URLSearchParams(window.location.search).get("level")?.toUpperCase();
  return PLAYABLE_LEVELS.includes(requested) ? requested : "N5";
}

function formatElapsed(milliseconds) {
  const totalSeconds = Math.max(0, Math.round(milliseconds / 1000));
  return `${Math.floor(totalSeconds / 60)}:${String(totalSeconds % 60).padStart(2, "0")}`;
}

function playCompletionChime() {
  try {
    const audio = new Audio(ASSET.chime);
    audio.volume = 0.7;
    audio.play().catch(() => {});
  } catch {}
}

function allCategoriesAtLevel(level) {
  return CORE.categoriesForQuestions(CORE.questionsForLevel(DATA.QUESTIONS, level));
}

function standardCategoriesAtLevel(level) {
  const defaultOff = new Set(DEFAULT_OFF_CATEGORIES[level] || []);
  return allCategoriesAtLevel(level).filter((category) => !defaultOff.has(category));
}

function standardQuestionsAtLevel(level) {
  return questionsForSelectedCategories(level, standardCategoriesAtLevel(level));
}

function customisableCategoriesAtLevel(level) {
  const levelCategories = allCategoriesAtLevel(level);
  const combinedCategories = level === "N5"
    ? levelCategories
    : [...new Set([...levelCategories, ...allCategoriesAtLevel("N5")])];
  return combinedCategories
    .filter((category) => !isStylesCategory(category) || category === STYLE_CATEGORY_BY_LEVEL[level])
    .sort((a, b) => {
      const aStyles = isStylesCategory(a);
      const bStyles = isStylesCategory(b);
      if (aStyles !== bStyles) return aStyles ? 1 : -1;
      return a.localeCompare(b, "en-GB");
    });
}

function questionsForSelectedCategories(level, selectedCategories) {
  const selected = new Set(selectedCategories);
  const standardQuestions = CORE.questionsForLevel(DATA.QUESTIONS, level);
  const standardCategories = new Set(CORE.categoriesForQuestions(standardQuestions));
  const supplementaryQuestions = level === "N5" ? [] : CORE.questionsForLevel(DATA.QUESTIONS, "N5")
    .filter((question) => selected.has(question.category) && !standardCategories.has(question.category));
  return [...standardQuestions, ...supplementaryQuestions].filter((question) => selected.has(question.category));
}

function loadCustomisePreferences(storage) {
  try {
    const saved = JSON.parse(storage?.getItem(CUSTOMISE_STORAGE_KEY) || "null");
    return {
      showHints: Boolean(saved?.showHints),
      categoriesByLevel: saved?.categoriesByLevel && typeof saved.categoriesByLevel === "object" ? saved.categoriesByLevel : {},
    };
  } catch {
    return { showHints: false, categoriesByLevel: {} };
  }
}

function savedCategoriesAtLevel(preferences, level) {
  const available = new Set(customisableCategoriesAtLevel(level));
  const saved = Array.isArray(preferences?.categoriesByLevel?.[level]) ? preferences.categoriesByLevel[level] : [];
  const valid = [...new Set(saved.filter((category) => typeof category === "string" && available.has(category)))];
  return valid.length ? valid : standardCategoriesAtLevel(level);
}

function saveCustomisePreferences(storage, preferences) {
  try { storage?.setItem(CUSTOMISE_STORAGE_KEY, JSON.stringify(preferences)); } catch {}
}

function HeaderControls({ score, total, elapsedMs, warning, activeLevel, medalEligible, bestTime, bestScore, earnedMedal }) {
  const [medalsOpen, setMedalsOpen] = useState(false);
  const [autoMedalPopover, setAutoMedalPopover] = useState(false);
  const timerRef = useRef(null);
  const limits = CORE.medalTimeLimits(activeLevel);
  const thresholds = [
    { key: "bronze", label: "Bronze", value: limits.bronze, className: "text-amber-700" },
    { key: "silver", label: "Silver", value: limits.silver, className: "text-slate-500" },
    { key: "gold", label: "Gold", value: limits.gold, className: "text-yellow-500" },
    { key: "diamond", label: "Diamond", value: limits.diamond, className: "text-cyan-500" },
  ];

  useEffect(() => {
    const onPointerDown = (event) => {
      if (timerRef.current && !timerRef.current.contains(event.target)) setMedalsOpen(false);
    };
    document.addEventListener("pointerdown", onPointerDown, true);
    return () => document.removeEventListener("pointerdown", onPointerDown, true);
  }, []);

  useEffect(() => {
    setMedalsOpen(false);
    setAutoMedalPopover(false);
  }, [activeLevel, medalEligible]);

  useEffect(() => {
    if (!earnedMedal || !medalEligible) return undefined;
    setMedalsOpen(true);
    setAutoMedalPopover(true);
    const closeTimer = window.setTimeout(() => {
      setMedalsOpen(false);
      setAutoMedalPopover(false);
    }, 2600);
    return () => window.clearTimeout(closeTimer);
  }, [earnedMedal, medalEligible]);

  function toggleMedals() {
    if (!medalEligible) return;
    setAutoMedalPopover(false);
    setMedalsOpen((open) => !open);
  }

  const scoreProgress = total > 0 ? Math.min(100, Math.max(0, (score / total) * 100)) : 0;
  const earnedMedalDetails = earnedMedal && MEDALS[earnedMedal] ? MEDALS[earnedMedal] : null;
  const earnedMedalStyle = earnedMedalDetails ? { color: earnedMedalDetails.colour } : undefined;

  return <div className="concept-header-controls">
    <section
      ref={timerRef}
      role="button"
      tabIndex={medalEligible ? 0 : -1}
      aria-disabled={!medalEligible}
      aria-expanded={medalEligible ? medalsOpen : undefined}

function groupRowsByCategory(rows) {
  const groups = [];
  const categoryGroups = new Map();
  rows.forEach((question) => {
    if (!categoryGroups.has(question.category)) {
      const group = { category: question.category, questions: [] };
      categoryGroups.set(question.category, group);
      groups.push(group);
    }
    categoryGroups.get(question.category).questions.push(question);
  });
  groups.forEach((group) => group.questions.sort((a, b) => a.answer.localeCompare(b.answer, "en-GB", { numeric: true })));
  return groups;
}

function titleCaseCategory(category) {
  if (category === "Serial music") return "Serial";
  return category.split(" ").map((word) => word.charAt(0).toLocaleUpperCase("en-GB") + word.slice(1)).join(" ");
}

function customiseCategoryLabel(category) {
  return isStylesCategory(category) ? "Styles" : titleCaseCategory(category);
}

function ConceptCategoryTables({ rows, answeredIds, complete, showHints }) {
  const groups = useMemo(() => groupRowsByCategory(rows), [rows]);
  const randomCategoryOrder = useMemo(() => new Map(groups.map((group) => [group.category, Math.random()])), [groups]);
  const [movedCategories, setMovedCategories] = useState(new Set());
  const cardRefs = useRef(new Map());
  const previousPositions = useRef(new Map());
  const previousMovedCategories = useRef(new Set());
  const completedCategories = useMemo(() => new Set(groups
    .filter((group) => group.questions.every((question) => answeredIds.has(question.id)))
    .map((group) => group.category)), [groups, answeredIds]);
  const orderedGroups = useMemo(() => [...groups].sort((a, b) => {
    const aStyles = isStylesCategory(a.category);
    const bStyles = isStylesCategory(b.category);
    if (aStyles !== bStyles) return aStyles ? 1 : -1;
    const aMoved = completedCategories.has(a.category) && movedCategories.has(a.category);
    const bMoved = completedCategories.has(b.category) && movedCategories.has(b.category);
    if (aMoved !== bMoved) return aMoved ? 1 : -1;
    return (randomCategoryOrder.get(a.category) ?? 0) - (randomCategoryOrder.get(b.category) ?? 0);
  }), [groups, completedCategories, movedCategories, randomCategoryOrder]);

  useEffect(() => {
    if (answeredIds.size === 0) {
      setMovedCategories((current) => current.size ? new Set() : current);
      return undefined;
    }
    const waitingCategories = [...completedCategories].filter((category) => !movedCategories.has(category));
    if (!waitingCategories.length) return undefined;
    const timer = window.setTimeout(() => setMovedCategories((current) => {
      const next = new Set(current);
      waitingCategories.forEach((category) => next.add(category));
      return next;
    }), 520);
    return () => window.clearTimeout(timer);
  }, [answeredIds, completedCategories, movedCategories]);

  useLayoutEffect(() => {
    const reduceMotion = window.matchMedia?.("(prefers-reduced-motion: reduce)").matches;
    const shouldAnimateReorder = [...movedCategories].some((category) => !previousMovedCategories.current.has(category));
    const nextPositions = new Map();
    cardRefs.current.forEach((element, category) => {
      if (!element) return;
      const nextPosition = element.getBoundingClientRect();
      nextPositions.set(category, nextPosition);
      const previousPosition = previousPositions.current.get(category);
      if (!previousPosition || reduceMotion || !shouldAnimateReorder) return;
      const x = previousPosition.left - nextPosition.left;
      const y = previousPosition.top - nextPosition.top;
      if (Math.abs(x) < 1 && Math.abs(y) < 1) return;
      element.animate?.([
        { transform: `translate(${x}px, ${y}px)`, zIndex: 2 },
        { transform: "translate(0, 0)", zIndex: 2 },
      ], { duration: 650, easing: "cubic-bezier(.22,1,.36,1)" });
    });
    previousPositions.current = nextPositions;
    previousMovedCategories.current = new Set(movedCategories);
  }, [orderedGroups, movedCategories]);

  return <div className="concept-category-groups">
    {orderedGroups.map((group, groupIndex) => {
      const headingId = `concept-category-${groupIndex}`;
      const celebrating = completedCategories.has(group.category) && !movedCategories.has(group.category);
      const stylesCategory = isStylesCategory(group.category);
      const groupShowsHints = showHints || stylesCategory;
      return <section
        key={group.category}
        ref={(element) => { if (element) cardRefs.current.set(group.category, element); else cardRefs.current.delete(group.category); }}
        className={`concept-category-card${stylesCategory ? " is-styles" : ""}${celebrating ? " is-celebrating" : ""}`}
        aria-labelledby={headingId}
      >
        <h2 id={headingId} className="concept-category-title">
          <CategoryIcon category={group.category} />
          <span className="concept-category-name">{titleCaseCategory(group.category)}</span>
        </h2>
        {stylesCategory ? <div className="concept-styles-grid" role="list" aria-label={`${group.category} concept answers and hints`}>
          {group.questions.map((question) => {
            const correct = answeredIds.has(question.id);
            const missed = complete && !correct;
            return <div key={question.id} role="listitem" className={`concept-styles-cell ${correct ? "is-correct" : missed ? "is-missed" : ""}`}>
              <div className="concept-answer-cell">
                {correct && <span className="flex items-center gap-2 text-black"><span className="concept-status-mark concept-status-correct" aria-hidden="true">✓</span><span>{question.answer}</span><span className="sr-only">Correct</span></span>}
                {missed && <span className="flex items-center gap-2 text-red-700" aria-label={`Incorrect answer: ${question.answer}`}><span className="concept-status-mark concept-status-missed" aria-hidden="true">×</span><span aria-hidden="true">{question.answer}</span></span>}
                {!correct && !missed && <span aria-label="Unanswered">&nbsp;</span>}
              </div>
              {groupShowsHints && <div className="concept-hint-cell">{question.hint.replaceAll(".", "")}</div>}
            </div>;
          })}
        </div> : <table className="concept-table" data-hints={groupShowsHints ? "on" : "off"}>
          <caption className="sr-only">{group.category} concept answers{groupShowsHints ? " and hints" : ""}</caption>
          <tbody>
          {group.questions.map((question) => {
            const correct = answeredIds.has(question.id);
            const missed = complete && !correct;
            return <tr key={question.id} className={correct ? "is-correct" : missed ? "is-missed" : ""}>
              <td className="concept-answer-cell">
                {correct && <span className="flex items-center gap-2 text-black"><span className="concept-status-mark concept-status-correct" aria-hidden="true">✓</span><span>{question.answer}</span><span className="sr-only">Correct</span></span>}
                {missed && <span className="flex items-center gap-2 text-red-700" aria-label={`Incorrect answer: ${question.answer}`}><span className="concept-status-mark concept-status-missed" aria-hidden="true">×</span><span aria-hidden="true">{question.answer}</span></span>}
                {!correct && !missed && <span aria-label="Unanswered">&nbsp;</span>}
              </td>
              {groupShowsHints && <td className="concept-hint-cell">{question.hint.replaceAll(".", "")}</td>}
            </tr>;
          })}
          </tbody>
        </table>}
      </section>;
    })}
  </div>;
}

function App() {
  const initialLevel = requestedLevel();
  const saved = useMemo(() => CORE.loadPersistence(window.localStorage), []);
  const savedCustomise = useMemo(() => loadCustomisePreferences(window.localStorage), []);
  const initialCategories = savedCategoriesAtLevel(savedCustomise, initialLevel);
  const [activeLevel, setActiveLevel] = useState(initialLevel);
  const [selectedCategories, setSelectedCategories] = useState(() => initialCategories);
  const [showHints, setShowHints] = useState(() => savedCustomise.showHints);
  const [persistence, setPersistence] = useState(saved);
  const [gameState, setGameState] = useState("ready");
  const [activeQuestions, setActiveQuestions] = useState(() => questionsForSelectedCategories(initialLevel, initialCategories));
  const [rows, setRows] = useState(() => questionsForSelectedCategories(initialLevel, initialCategories));
  const [answeredIds, setAnsweredIds] = useState(new Set());
  const [answerInput, setAnswerInput] = useState("");
  const [answerShake, setAnswerShake] = useState(false);
  const [result, setResult] = useState(null);
  const [resultsOpen, setResultsOpen] = useState(false);
  const [pendingSettingChange, setPendingSettingChange] = useState(null);
  const [levelOpen, setLevelOpen] = useState(false);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [now, setNow] = useState(Date.now());
  const [timer, setTimer] = useState({ durationMs: 0, accumulatedMs: 0, startedAt: null, running: false });
  const [timerAnnouncement, setTimerAnnouncement] = useState("");
  const inputRef = useRef(null);
  const levelRef = useRef(null);
  const customiseRef = useRef(null);
  const resultsPanelRef = useRef(null);
  const answeredRef = useRef(new Set());
  const timerRef = useRef(timer);
  const finishLockRef = useRef(false);
  const warningAnnouncedRef = useRef(false);
  const shakeTimerRef = useRef(null);
  const customisePreferencesRef = useRef(savedCustomise);

  window.MLH.useClickOutside([levelRef, customiseRef], [() => setLevelOpen(false), () => setCustomiseOpen(false)]);

  useEffect(() => {
    const nextPreferences = {
      showHints,
      categoriesByLevel: {
        ...customisePreferencesRef.current.categoriesByLevel,
        [activeLevel]: selectedCategories,
      },
    };
    customisePreferencesRef.current = nextPreferences;
    saveCustomisePreferences(window.localStorage, nextPreferences);
  }, [activeLevel, selectedCategories, showHints]);

  const standardCategories = useMemo(() => standardCategoriesAtLevel(activeLevel), [activeLevel]);
  const availableCategories = useMemo(() => customisableCategoriesAtLevel(activeLevel), [activeLevel]);
  const configuredQuestions = useMemo(() => questionsForSelectedCategories(activeLevel, selectedCategories), [activeLevel, selectedCategories]);
  const standardGame = selectedCategories.length === standardCategories.length && standardCategories.every((category) => selectedCategories.includes(category));
  const medalEligible = standardGame && !showHints;
  const standardQuestions = standardQuestionsAtLevel(activeLevel);
  const levelRecord = standardGame ? persistence.records[activeLevel] : null;
  const bestTime = levelRecord?.fastestCompletionMs ?? null;
  const bestScore = levelRecord?.bestScore > 0 ? levelRecord.bestScore : null;
  const elapsedMs = gameState === "ready" ? 0 : CORE.elapsedMilliseconds(timer, now);
  const timerWarning = false;
  const hintsVisible = showHints;

  function commitTimer(nextTimer) {
    timerRef.current = nextTimer;
    setTimer(nextTimer);
  }

  function resetAttempt(questions = configuredQuestions, level = activeLevel) {
    const emptyAnswers = new Set();
    const resetAt = Date.now();
    window.clearTimeout(shakeTimerRef.current);
    answeredRef.current = emptyAnswers;
    setAnsweredIds(emptyAnswers);
    setActiveQuestions(questions);
    setRows([...questions]);
    setAnswerInput("");
    setAnswerShake(false);
    setResult(null);
    setResultsOpen(false);
    finishLockRef.current = false;
    warningAnnouncedRef.current = false;
    setTimerAnnouncement("");
    commitTimer({
      durationMs: 0,
      accumulatedMs: 0,
      startedAt: null,
      running: false,
    });
    setNow(resetAt);
    setGameState("ready");
  }

  function applyLevel(level) {
    const categories = standardCategoriesAtLevel(level);
    const questions = questionsForSelectedCategories(level, categories);
    setActiveLevel(level);
    setSelectedCategories(categories);
    resetAttempt(questions, level);
    setLevelOpen(false);
    setCustomiseOpen(false);
    const url = new URL(window.location.href);
    url.searchParams.set("level", level);
    window.history.replaceState(null, "", url.toString());
  }

  function toggleCategory(category) {
    if (selectedCategories.includes(category) && selectedCategories.length === 1) return;
    const nextCategories = selectedCategories.includes(category)
      ? selectedCategories.filter((name) => name !== category)
      : [...selectedCategories, category];
    const questions = questionsForSelectedCategories(activeLevel, nextCategories);
    setSelectedCategories(nextCategories);
    resetAttempt(questions, activeLevel);
  }

  function applySettingChange(change, resetCurrentAttempt = false) {
    if (change.type === "level") applyLevel(change.value);
    if (change.type === "category") toggleCategory(change.value);
    if (change.type === "reset") {
      const categories = standardCategoriesAtLevel(activeLevel);
      const questions = questionsForSelectedCategories(activeLevel, categories);
      setSelectedCategories(categories);
      setShowHints(false);
      resetAttempt(questions, activeLevel);
    }
    if (change.type === "hints") {
      setShowHints((visible) => !visible);
      if (resetCurrentAttempt) resetAttempt();
    }
  }

  function requestSettingChange(change) {
    if (gameState !== "playing") {
      applySettingChange(change);
      return;
    }
    pauseGame();
    setPendingSettingChange(change);
    setLevelOpen(false);
    setCustomiseOpen(false);
  }

  function cancelSettingChange() {
    setPendingSettingChange(null);
    resumeGame();
  }

  function confirmSettingChange() {
    const change = pendingSettingChange;
    setPendingSettingChange(null);
    if (change) applySettingChange(change, true);
  }

  function startGame() {
    const questions = configuredQuestions;
    const nextRows = [...questions];
    const startedAt = Date.now();
    const emptyAnswers = new Set();
    window.clearTimeout(shakeTimerRef.current);
    answeredRef.current = emptyAnswers;
    setAnsweredIds(emptyAnswers);
    setActiveQuestions(questions);
    setRows(nextRows);
    setAnswerInput("");
    setAnswerShake(false);
    setResult(null);
    setResultsOpen(false);
    finishLockRef.current = false;
    warningAnnouncedRef.current = false;
    setTimerAnnouncement("");
    commitTimer({ durationMs: 0, accumulatedMs: 0, startedAt, running: true });
    setNow(startedAt);
    setGameState("playing");
  }

  function resetGame() {
    resetAttempt();
  }

  function endGame() {
    finishGame(answeredRef.current, Date.now());
  }

  function finishGame(finalAnsweredIds = answeredRef.current, finishedAt = Date.now()) {
    if (finishLockRef.current) return;
    finishLockRef.current = true;
    const elapsedMs = CORE.elapsedMilliseconds(timerRef.current, finishedAt);
    const finishedTimer = { ...timerRef.current, accumulatedMs: elapsedMs, startedAt: null, running: false };
    const finalResult = CORE.createResult({ level: activeLevel, questions: activeQuestions, answeredIds: finalAnsweredIds, elapsedMs, durationMs: timerRef.current.durationMs, standardGame, medalEligible, completedAt: finishedAt });
    commitTimer(finishedTimer);
    setResult(finalResult);
    setGameState("complete");
    setResultsOpen(true);
    setAnswerInput("");
    setPersistence((current) => CORE.savePersistence(window.localStorage, CORE.updatePersistence(current, finalResult)));
    if (finalResult.completed) playCompletionChime();
    if (finalResult.medal) window.setTimeout(() => window.MLH.playFeedbackSound?.(true, true, MEDALS[finalResult.medal].sound), 900);
  }

  function pauseGame() {
    if (gameState !== "playing") return;
    const pausedAt = Date.now();
    const accumulatedMs = CORE.elapsedMilliseconds(timerRef.current, pausedAt);
    commitTimer({ ...timerRef.current, accumulatedMs, startedAt: null, running: false });
    setNow(pausedAt);
    setGameState("paused");
  }

  function resumeGame() {
    if (gameState !== "paused") return;
    const resumedAt = Date.now();
    commitTimer({ ...timerRef.current, startedAt: resumedAt, running: true });
    setNow(resumedAt);
    setGameState("playing");
  }

  function acceptTypedAnswer(value) {
    setAnswerInput(value);
    if (gameState !== "playing") return;
    const matches = CORE.recognizeAnswers(value, activeQuestions, answeredRef.current);
    if (!matches.length) return;
    const nextAnswered = new Set(answeredRef.current);
    matches.forEach((match) => nextAnswered.add(match.id));
    answeredRef.current = nextAnswered;
    setAnsweredIds(nextAnswered);
    setAnswerInput("");
    window.clearTimeout(shakeTimerRef.current);
    setAnswerShake(false);
    const completed = nextAnswered.size === activeQuestions.length;
    if (!completed) window.MLH.playFeedbackSound?.(true, false, null);
    if (completed) window.setTimeout(() => finishGame(nextAnswered, Date.now()), 0);
  }

  function handleAnswerKeyDown(event) {
    if (event.key !== "Enter" || gameState !== "playing") return;
    event.preventDefault();
    if (CORE.recognizeAnswers(answerInput, activeQuestions, answeredRef.current).length || !answerInput.trim()) return;
    window.clearTimeout(shakeTimerRef.current);
    setAnswerShake(false);
    shakeTimerRef.current = window.setTimeout(() => {
      setAnswerShake(true);
      shakeTimerRef.current = window.setTimeout(() => setAnswerShake(false), 360);
    }, 0);
    window.MLH.playFeedbackSound?.(false, false, null);
  }

  useEffect(() => {
    if (gameState !== "playing") return undefined;
    inputRef.current?.focus({ preventScroll: true });
    const interval = window.setInterval(() => {
      setNow(Date.now());
    }, 200);
    return () => window.clearInterval(interval);
  }, [gameState, activeQuestions, activeLevel, standardGame, medalEligible]);

  useEffect(() => {
    if (gameState === "playing") inputRef.current?.focus({ preventScroll: true });
  }, [gameState, answeredIds]);

  useEffect(() => {
    if (gameState !== "ready") return;
    setActiveQuestions(configuredQuestions);
    setRows(configuredQuestions);
    setAnsweredIds(new Set());
    answeredRef.current = new Set();
  }, [configuredQuestions, gameState]);

  useEffect(() => {
    if (resultsOpen) window.setTimeout(() => resultsPanelRef.current?.focus(), 0);
  }, [resultsOpen]);

  useEffect(() => () => {
    window.clearTimeout(shakeTimerRef.current);
    if (timerRef.current.running) timerRef.current = { ...timerRef.current, running: false, startedAt: null };
  }, []);

  const resultComplete = gameState === "complete";
  const displayedTotal = gameState === "ready" ? configuredQuestions.length : activeQuestions.length;
  const levelOptions = Object.fromEntries(PLAYABLE_LEVELS.map((key) => {
    const level = CORE.LEVELS[key];
    const levelQuestions = standardQuestionsAtLevel(key);
    const categoryCount = CORE.categoriesForQuestions(levelQuestions).length;
    return [key, { ...level, description: `${categoryCount} categories • ${levelQuestions.length} concepts` }];
  }));
  const toolbarButtonLabel = gameState === "complete" ? "Restart" : gameState === "ready" ? "Start" : "Pause";
  const toolbarButtonAction = gameState === "complete" ? resetGame : gameState === "ready" ? startGame : pauseGame;
  const controlsActive = gameState === "playing" || gameState === "paused";
  const remainingConcepts = Math.max(0, displayedTotal - answeredIds.size);
  const showRemainingPrompt = controlsActive && remainingConcepts > 0 && remainingConcepts <= 3;

  return <div className={window.MLH.shell.pageShellClass} style={{ overflowX: "clip" }}>
    <window.MLH.AppHeader
      icon={ASSET.appIcon}
      title="Concept Recall"
      subtitle="Name as many musical concepts as you can under each category before time runs out."
      profileLabel={standardGame ? CORE.LEVELS[activeLevel].label : "Custom"}
      profileUsesSharedSettings={false}
      worksheetConfig={() => ({
        version: 1,
        activityId: "concept-recall",
        sourceUrl: window.location.href,
        settings: {
          level: activeLevel,
          categories: selectedCategories,
          concepts: configuredQuestions.map(({ id, category, answer, hint }) => ({ id, category, answer, hint })),
        },
      })}
    >
      <HeaderControls score={answeredIds.size} total={displayedTotal} elapsedMs={elapsedMs} warning={timerWarning} activeLevel={activeLevel} medalEligible={medalEligible} bestTime={bestTime} bestScore={bestScore} earnedMedal={resultsOpen ? result?.medal : null} />
    </window.MLH.AppHeader>
    <div className={window.MLH.shell.pageContentClass}>
      <main className={`${window.MLH.shell.mainShellClass} !min-h-[620px] pb-5`}>
        <window.MLH.AppToolbar
          className="!mb-[10px] md:!mb-[14px]"
          left={<div className="flex items-center gap-2">
            <div className="hub-menu-anchor relative" ref={levelRef}>
              <window.MLH.LevelButton icon={<img src={ASSET.levels} alt="" className="h-[26px] w-[26px]" />} activeLevel={activeLevel} activeLabel={standardGame ? CORE.LEVELS[activeLevel].label : "Custom"} isCustom={!standardGame} onClick={() => { setCustomiseOpen(false); setLevelOpen((open) => !open); }} dataMenuTrigger={true} />
              {levelOpen && <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}><window.MLH.LevelMenu activeLevel={activeLevel} onSelect={(level) => {
                if (level === activeLevel && standardGame) { setLevelOpen(false); return; }
                requestSettingChange({ type: "level", value: level });
              }} levels={levelOptions} /></window.MLH.MenuPanel>}
            </div>
            <div className="hub-menu-anchor relative" ref={customiseRef}>
              <window.MLH.CustomiseButton icon={<img src={ASSET.customise} alt="" className="h-[26px] w-[26px]" />} onClick={() => { setLevelOpen(false); setCustomiseOpen((open) => !open); }} dataMenuTrigger={true} />
              {customiseOpen && <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}><CustomiseMenu categories={availableCategories} selectedCategories={selectedCategories} toggleCategory={(category) => requestSettingChange({ type: "category", value: category })} showHints={showHints} toggleHints={() => requestSettingChange({ type: "hints" })} resetCustomise={() => requestSettingChange({ type: "reset" })} disabled={false} /></window.MLH.MenuPanel>}
            </div>
            {showRemainingPrompt && <div role="status" aria-live="polite" aria-atomic="true" className="flex min-h-11 items-center justify-center rounded-xl border border-green-600 bg-green-600 px-3 text-sm font-bold text-white shadow-sm">
              {remainingConcepts} remaining
            </div>}
          </div>}
          feedback={null}
          right={null}
        />
        <div className={`concept-game-controls-sticky ${controlsActive ? "is-active" : "is-idle"}`} aria-label="Game controls">
          <div className={controlsActive ? "concept-game-controls-inner" : "concept-game-controls-idle"}>
            <button
              type="button"
              aria-label={toolbarButtonLabel}
              onClick={toolbarButtonAction}
              disabled={gameState === "paused"}
              className="flex min-h-11 w-[88px] items-center justify-center gap-2 rounded-xl border border-black bg-black px-3 text-sm font-bold text-white shadow-sm transition hover:bg-stone-800 sm:w-[120px]"
            >
              {gameState === "playing" && <svg className="h-4 w-4" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><rect x="6" y="5" width="4" height="14" rx="1" fill="currentColor" /><rect x="14" y="5" width="4" height="14" rx="1" fill="currentColor" /></svg>}
              <span>{toolbarButtonLabel}</span>
            </button>
            {controlsActive && <div className="concept-answer-reveal"><AnswerInput input={answerInput} setInput={acceptTypedAnswer} inputRef={inputRef} playing={gameState === "playing"} onKeyDown={handleAnswerKeyDown} shake={answerShake} /></div>}
          </div>
        </div>

        <ResultsPanel result={result} open={resultsOpen} panelRef={resultsPanelRef} />

        <p id="concept-input-help" className="sr-only">Correct answers are recognised automatically. Press Enter only to check an unrecognised entry.</p>
        <div aria-live="polite" aria-atomic="true" className="sr-only">Score {answeredIds.size} out of {displayedTotal}.</div>
        <div aria-live="assertive" aria-atomic="true" className="sr-only">{timerAnnouncement}</div>

        <ConceptCategoryTables rows={rows} answeredIds={answeredIds} complete={resultComplete} showHints={hintsVisible} />
      </main>
    </div>

    <Confetti active={Boolean(resultsOpen && result?.medal)} />
    {gameState === "paused" && !pendingSettingChange && <TimerPauseOverlay onResume={resumeGame} onEnd={endGame} />}
    {pendingSettingChange && <SettingsChangeDialog onCancel={cancelSettingChange} onConfirm={confirmSettingChange} />}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
window.dispatchEvent(new Event("concept-recall-ready"));
</script>
<script src="./footer.js?v=20260629"></script>
</body>
