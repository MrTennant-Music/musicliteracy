<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tempo</title>
  <link rel="icon" type="image/svg+xml" href="./tempo-icon.svg" />
  <link rel="apple-touch-icon" href="./tempo-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./hub-ui.css?v=1.6" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="./hub-mobile.js?v=1.3"></script>
  <script src="./hub-audio.js?v=1.4"></script>

    @font-face { font-family: "Bravura"; src: url("./Bravura.otf") format("opentype"); font-display: block; }
    .music-symbol { font-family: "Bravura", serif; text-rendering: geometricPrecision; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;
const useClickOutside = window.MLH.useClickOutside;
const W = 920, H = 430, GAP = 10, BAR_COUNT = 8, BARS_PER_SYSTEM = 4;
const STAFF_LEFT = 58, STAFF_RIGHT = 870, MUSIC_START = 142, SYSTEM_TOPS = [82, 214];
const COLOUR = { green: "#16a34a", red: "#dc2626", blue: "#2563eb", black: "#000" };
const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS || {};
const MEDAL_THRESHOLDS = [2, 4, 6, 10];
const ASSET = { appIcon: "./tempo-icon.svg", level: "https://mrtennant-music.github.io/musicliteracy/levels.svg", customise: "https://mrtennant-music.github.io/musicliteracy/customise.svg", next: "https://mrtennant-music.github.io/musicliteracy/next.svg", eye: "./eye.svg", metronome: "./metronome.svg", tempo: "./tempo.svg", bronze: "https://mrtennant-music.github.io/musicliteracy/bronze.svg", silver: "https://mrtennant-music.github.io/musicliteracy/silver.svg", gold: "https://mrtennant-music.github.io/musicliteracy/gold.svg", diamond: "https://mrtennant-music.github.io/musicliteracy/diamond.svg" };
function r(items) { return items[Math.floor(Math.random() * items.length)]; }
function shuffle(items) { const a = [...items]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }
function midiToFrequency(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }
function yForStep(step, top) { return top + GAP * 4 - step * (GAP / 2); }
function barWidth() { return (STAFF_RIGHT - MUSIC_START) / BARS_PER_SYSTEM; }
function getSystemTop(barIndex) { return barIndex < 4 ? SYSTEM_TOPS[0] : SYSTEM_TOPS[1]; }
function getBarStart(barIndex) { return MUSIC_START + (barIndex % 4) * barWidth(); }
function medalSoundForStreak(streak) { if (streak >= 10) return "platinum"; if (streak >= 6) return "gold"; if (streak >= 4) return "silver"; if (streak >= 2) return "bronze"; return null; }
function playFeedbackSound(correct, celebration = false, medal = null) { window.MLH?.playFeedbackSound?.(correct, celebration, medal); }
function oscillator(ctx, frequency, start, duration, volume = 0.045, type = "triangle", destination = null) { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = type; osc.frequency.value = frequency; gain.gain.setValueAtTime(0.0001, start); gain.gain.exponentialRampToValueAtTime(volume, start + 0.018); gain.gain.setValueAtTime(volume, Math.max(start + 0.02, start + duration - 0.06)); gain.gain.exponentialRampToValueAtTime(0.0001, start + duration); osc.connect(gain); gain.connect(destination || ctx.destination); osc.start(start); osc.stop(start + duration + 0.03); }
function playClick(ctx, start, accented, destination) { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = "square"; osc.frequency.value = accented ? 1400 : 950; gain.gain.setValueAtTime(accented ? 0.04 : 0.026, start); gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.045); osc.connect(gain); gain.connect(destination || ctx.destination); osc.start(start); osc.stop(start + 0.05); }
function TrebleClef({ top }) { return <text className="music-symbol" x="76" y={top + 58} fontSize="86" textAnchor="middle">{SHARED_SYMBOLS.gClef || "𝄞"}</text>; }
function TimeSignature({ top }) { return <g className="music-symbol" fontSize="32" textAnchor="middle" fontWeight="900"><text x="126" y={top + 18}>4</text><text x="126" y={top + 45}>4</text></g>; }
function Staff({ top }) { return <g>{[0,1,2,3,4].map(i => <line key={i} x1="58" x2="870" y1={top + i * GAP} y2={top + i * GAP} stroke="currentColor" strokeWidth="1.4"/> )}<TrebleClef top={top}/><TimeSignature top={top}/>{[0,1,2,3,4].map(i => <line key={i} x1={MUSIC_START + i * barWidth()} x2={MUSIC_START + i * barWidth()} y1={top} y2={top + GAP * 4} stroke="currentColor" strokeWidth={i === 4 ? 2.3 : 1.4}/> )}</g>; }
function Note({ note, active=false }) { const yy = yForStep(note.step, getSystemTop(note.bar)); const stemDown = note.step > 4; const stemX = note.x + (stemDown ? -6 : 6); const stemEnd = yy + (stemDown ? 30 : -30); return <g opacity={active ? 1 : 0.98}><ellipse cx={note.x} cy={yy} rx="6.4" ry="4.5" fill={note.open ? "white" : active ? COLOUR.blue : "black"} stroke="black" strokeWidth="2" transform={`rotate(-18 ${note.x} ${yy})`}/>{!note.whole && <line x1={stemX} x2={stemX} y1={yy} y2={stemEnd} stroke="black" strokeWidth="1.8"/>}</g>; }
function Score({ question, activeNoteId=null, placement=null, hoverPlacement=null, onPointerMove, onPointerLeave, onPointerDown }) { return <svg viewBox={`0 0 ${W} ${H}`} className="h-auto w-full select-none overflow-visible touch-none" onPointerMove={onPointerMove} onPointerLeave={onPointerLeave} onPointerDown={onPointerDown}><rect width={W} height={H} fill="transparent"/>{SYSTEM_TOPS.map((top, i) => <Staff key={i} top={top}/> )}{question.notes.map(note => <Note key={note.id} note={note} active={activeNoteId === note.id}/> )}<text x="154" y="70" fontSize="16" fontWeight="800">1</text><text x="336" y="70" fontSize="16" fontWeight="800">2</text><text x="518" y="70" fontSize="16" fontWeight="800">3</text><text x="700" y="70" fontSize="16" fontWeight="800">4</text><text x="154" y="202" fontSize="16" fontWeight="800">5</text><text x="336" y="202" fontSize="16" fontWeight="800">6</text><text x="518" y="202" fontSize="16" fontWeight="800">7</text><text x="700" y="202" fontSize="16" fontWeight="800">8</text>{hoverPlacement && <TempoMark placement={hoverPlacement} opacity="0.45"/>}{placement && <TempoMark placement={placement}/>}</svg>; }
function TempoMark({ placement, opacity = 1 }) { if (!placement?.term) return null; const x = getBarStart(placement.barIndex) + barWidth() / 2; const y = getSystemTop(placement.barIndex) - 22; return <text x={x} y={y} opacity={opacity} fill="black" fontFamily="Georgia, serif" fontSize="21" fontStyle="italic" fontWeight="800" textAnchor="middle" style={{ paintOrder: "stroke", stroke: "white", strokeWidth: 5, strokeLinejoin: "round" }}>{placement.term.label}</text>; }

const LEVELS = { N3:{label:"National 3", description:"Allegro and Adagio"}, N4:{label:"National 4", description:"Andante"}, N5:{label:"National 5", description:"Moderato"} };
const TERMS = { adagio:{label:"Adagio", bpm:60, levels:["N3","N4","N5"], group:"slow", aliases:["adagio","slow"]}, allegro:{label:"Allegro", bpm:130, levels:["N3","N4","N5"], group:"fast", aliases:["allegro","fast"]}, andante:{label:"Andante", bpm:90, levels:["N4","N5"], group:"middle", aliases:["andante","moderato","walkingpace","moderate"]}, moderato:{label:"Moderato", bpm:90, levels:["N5"], group:"middle", aliases:["moderato","andante","moderate"]} };
const LEVEL_TERMS = { N3:["adagio","allegro"], N4:["adagio","allegro","andante"], N5:["adagio","allegro","andante","moderato"] };
const NOTE_STEPS = { C:-2, D:-1, E:0, F:1, G:2, A:3, B:4 };
const NOTE_MIDI = { C:60, D:62, E:64, F:65, G:67, A:69, B:71 };
const PATTERNS = [["C","D","E","G"],["G","E","D","C"],["E","G","A","G"],["C","E","G","E"]];
function levelFromUrl(){ const raw = new URLSearchParams(location.search).get("level") || "N3"; return LEVELS[raw] ? raw : "N3"; }
function equivalent(a,b){ return TERMS[a]?.group === TERMS[b]?.group; }
function termIdsForLevel(level){ return LEVEL_TERMS[level] || LEVEL_TERMS.N3; }
function safeEnabled(ids, level){ const available=termIdsForLevel(level); const filtered=ids.filter(id=>available.includes(id)); return level === "N3" ? available : filtered.length >= 2 ? filtered : available; }
function normalize(value){ return String(value||"").toLowerCase().replace(/[\s\-]+/g,""); }
function isCorrectText(value, id){ const answer=normalize(value); return TERMS[id].aliases.map(normalize).includes(answer); }
function makeNote(id, bar, beat, letter, beats=1, open=false){ return { id, bar, beat, letter, step:NOTE_STEPS[letter], midi:NOTE_MIDI[letter], x:getBarStart(bar) + 28 + beat * (barWidth()/4), open, whole: beats >= 4, beats }; }
function buildQuestion(level, enabled){ const answerId=r(safeEnabled(enabled,level)); const notes=[]; for(let bar=0;bar<BAR_COUNT;bar++){ const pattern=PATTERNS[bar%PATTERNS.length]; pattern.forEach((letter,i)=>notes.push(makeNote(`${bar}-${i}`,bar,i,letter,i===3?1:1,false))); } return { id:Date.now()+Math.random(), level, answerId, answer:TERMS[answerId], mode:r(["choice","text","place"]), notes }; }
function TempoMenuRows({ level, enabled, setEnabled, metronome, setMetronome, follow, setFollow }){ const available=termIdsForLevel(level); function toggle(id){ if(level==="N3") return; const checked=enabled.includes(id); const next=checked?enabled.filter(x=>x!==id):[...enabled,id]; if(next.length<2)return; setEnabled(safeEnabled(next,level)); } return <><div className="px-2 pb-1 text-xs font-black uppercase tracking-[0.16em] text-stone-400">Audio</div><window.MLH.MenuToggleRow glyph={<img src={ASSET.metronome} alt="" className="h-6 w-6"/>} label="Metronome" checked={metronome} onChange={()=>setMetronome(v=>!v)}/><window.MLH.MenuToggleRow glyph={<img src={ASSET.eye} alt="" className="h-6 w-6"/>} label="Follow Playback" checked={follow} onChange={()=>setFollow(v=>!v)}/>{level!=="N3"&&<><div className="px-2 pb-1 pt-4 text-xs font-black uppercase tracking-[0.16em] text-stone-400">Tempos</div>{available.map(id=><window.MLH.MenuToggleRow key={id} glyph={<span className="text-sm font-black">{TERMS[id].label[0]}</span>} label={TERMS[id].label} checked={enabled.includes(id)} disabled={enabled.includes(id)&&enabled.length<=2} onChange={()=>toggle(id)}/>)}</>}</>; }
function pointerToPlacement(event, term){ const rect=event.currentTarget.getBoundingClientRect(); const x=((event.clientX-rect.left)/rect.width)*W; const y=((event.clientY-rect.top)/rect.height)*H; const system=y < (SYSTEM_TOPS[0]+SYSTEM_TOPS[1])/2 ? 0 : 1; const barIndex=system*4+clamp(Math.floor((x-MUSIC_START)/barWidth()),0,3); return { barIndex, term }; }
function App(){ const [activeLevel,setActiveLevel]=useState(levelFromUrl()); const [enabled,setEnabled]=useState(()=>termIdsForLevel(levelFromUrl())); const [question,setQuestion]=useState(()=>buildQuestion(levelFromUrl(),termIdsForLevel(levelFromUrl()))); const [selected,setSelected]=useState(null), [typed,setTyped]=useState(""), [placement,setPlacement]=useState(null), [hover,setHover]=useState(null); const [feedback,setFeedback]=useState(null), [feedbackFading,setFeedbackFading]=useState(false), [prompt,setPrompt]=useState(""); const [correct,setCorrect]=useState(0), [attempted,setAttempted]=useState(0), [streak,setStreak]=useState(0), [best,setBest]=useState(0), [confetti,setConfetti]=useState(0), [autoShowMedals,setAutoShowMedals]=useState(false); const [levelOpen,setLevelOpen]=useState(false), [customiseOpen,setCustomiseOpen]=useState(false), [metronome,setMetronome]=useState(false), [follow,setFollow]=useState(false), [playing,setPlaying]=useState(false), [activeNoteId,setActiveNoteId]=useState(null); const levelRef=useRef(null), customiseRef=useRef(null), audioRef=useRef(null), timers=useRef([]); useClickOutside([levelRef,customiseRef],[()=>setLevelOpen(false),()=>setCustomiseOpen(false)]); useEffect(()=>()=>stopAudio(),[]); function clearTimers(){timers.current.forEach(clearTimeout);timers.current=[];} function stopAudio(){clearTimers(); if(audioRef.current){try{audioRef.current.close();}catch{}} audioRef.current=null; setPlaying(false); setActiveNoteId(null);} function newQuestion(level=activeLevel, ids=enabled){stopAudio(); setQuestion(buildQuestion(level,safeEnabled(ids,level))); setSelected(null); setTyped(""); setPlacement(null); setHover(null); setFeedback(null); setFeedbackFading(false); setPrompt("");} function applyLevel(level){setActiveLevel(level); const ids=termIdsForLevel(level); setEnabled(ids); const url=new URL(location.href); url.searchParams.set("level",level); history.replaceState(null,"",url.toString()); newQuestion(level,ids); setLevelOpen(false);} function score(ok){ const ns=ok?streak+1:0; playFeedbackSound(ok); setAttempted(v=>v+1); setCorrect(v=>v+(ok?1:0)); setStreak(ns); setBest(v=>Math.max(v,ns)); setFeedback({correct:ok}); if(ok){const medal=medalSoundForStreak(ns); if(medal&&MEDAL_THRESHOLDS.includes(ns)){setConfetti(v=>v+1); setAutoShowMedals(true); timers.current.push(setTimeout(()=>setAutoShowMedals(false),2000)); timers.current.push(setTimeout(()=>playFeedbackSound(true,true,medal),180));} timers.current.push(setTimeout(()=>setFeedbackFading(true),1700)); timers.current.push(setTimeout(()=>newQuestion(),2000));}} function confirm(){ if(feedback)return; let ok=false; if(question.mode==="choice"){ if(!selected){setPrompt("Select one tempo first.");return;} ok=equivalent(selected,question.answerId); } else if(question.mode==="text"){ if(!typed.trim()){setPrompt("Type your answer first.");return;} ok=isCorrectText(typed,question.answerId); } else { if(!placement){setPrompt("Select a tempo and place it above the music.");return;} ok=placement.barIndex===0 && equivalent(placement.term.id,question.answerId); } score(ok); } function play(){ if(playing){stopAudio();return;} const AC=window.AudioContext||window.webkitAudioContext; if(!AC){setPrompt("Audio playback is not supported in this browser.");return;} stopAudio(); const ctx=new AC(); audioRef.current=ctx; const master=ctx.createGain(); master.gain.value=0.9; master.connect(ctx.destination); const beat=60/question.answer.bpm; const start=ctx.currentTime+0.08; setPlaying(true); question.notes.forEach(note=>{ const t=start+(note.bar*4+note.beat)*beat; const dur=beat*.82; timers.current.push(setTimeout(()=>setActiveNoteId(note.id),Math.max(0,(t-ctx.currentTime)*1000))); timers.current.push(setTimeout(()=>setActiveNoteId(null),Math.max(0,(t-ctx.currentTime+dur)*1000))); oscillator(ctx,midiToFrequency(note.midi),t,dur,0.05,"triangle",master); }); if(metronome){ for(let b=0;b<32;b++) playClick(ctx,start+b*beat,b%4===0,master); } timers.current.push(setTimeout(stopAudio,32*beat*1000+300)); } const acc=attempted?Math.round(correct/attempted*100):0; const disabledConfirm=feedback || (question.mode==="choice"?!selected:question.mode==="text"?!typed.trim():!placement); const termButtons=safeEnabled(enabled,activeLevel); return <div className={window.MLH.shell.pageShellClass}><window.MLH.AppHeader icon={ASSET.appIcon} title="Tempo" subtitle="Identify tempo markings by listening and notation."><window.MLH.ScoreStreakPanel assets={ASSET} correct={correct} attempted={attempted} accuracy={acc} streak={streak} bestStreak={best} resetScore={()=>{setCorrect(0);setAttempted(0);setStreak(0);setBest(0);setConfetti(0);}} confettiKey={confetti} autoShowMedals={autoShowMedals} medalEligible={true} medalThresholdValues={MEDAL_THRESHOLDS}/></window.MLH.AppHeader><div className={window.MLH.shell.pageContentClass}><main className={window.MLH.shell.mainShellClass} onPointerDown={e=>{if(feedback&&!e.target.closest("button,input,[data-menu-trigger],[data-menu-panel]"))newQuestion();}}><div className="hub-toolbar relative z-20"><div className="hub-toolbar-left"><div className="hub-menu-anchor relative" ref={levelRef}><window.MLH.LevelButton icon={<img src={ASSET.level} alt="" className="h-[26px] w-[28px]"/>} activeLevel={activeLevel} activeLabel={LEVELS[activeLevel].label} onClick={()=>{setCustomiseOpen(false);setLevelOpen(v=>!v);}} dataMenuTrigger={true}/>{levelOpen&&<window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}><window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS}/></window.MLH.MenuPanel>}</div><div className="hub-menu-anchor relative" ref={customiseRef}><window.MLH.CustomiseButton icon={<img src={ASSET.customise} alt="" className="h-[26px] w-[26px]"/>} onClick={()=>{setLevelOpen(false);setCustomiseOpen(v=>!v);}} dataMenuTrigger={true}/>{customiseOpen&&<window.MLH.MenuPanel title="Customise" position="chords-customise-panel -left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}><TempoMenuRows level={activeLevel} enabled={enabled} setEnabled={(ids)=>{setEnabled(ids);newQuestion(activeLevel,ids);}} metronome={metronome} setMetronome={setMetronome} follow={follow} setFollow={setFollow}/></window.MLH.MenuPanel>}</div></div><div className="hub-toolbar-feedback"><window.MLH.FeedbackBadge feedback={feedback} fading={feedbackFading} animationPrefix="note"/></div><div className="hub-toolbar-right"><window.MLH.SkipButton resetStreak={()=>setStreak(0)} onClick={()=>newQuestion()} icon={<img src={ASSET.next} alt="" className="h-[27.8px] w-[27.8px]"/>}/></div></div><div className="relative -top-[45px]"><Score question={question} activeNoteId={follow?activeNoteId:null} placement={placement} hoverPlacement={hover} onPointerMove={e=>{ if(question.mode==="place"&&selected&&!feedback) setHover(pointerToPlacement(e,TERMS[selected])); }} onPointerLeave={()=>setHover(null)} onPointerDown={e=>{ if(question.mode==="place"&&selected&&!feedback) setPlacement(pointerToPlacement(e,TERMS[selected])); }}/></div><div className="chords-question-card relative z-10 -mt-[72px] flex min-h-[142px] flex-col justify-between rounded-xl border border-stone-200 bg-stone-50 px-4 py-4 shadow-md md:mx-3"><div><p className="text-base font-semibold leading-tight">{question.mode==="place"?"Select the tempo and place it above bar 1 of the music.":"Listen to the music and identify the tempo."}</p>{prompt&&<p className="mt-2 text-sm font-bold text-red-600">{prompt}</p>}</div><div className="mt-4 flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between"><div className="flex min-w-0 flex-1 flex-col gap-3">{question.mode==="text"?<input value={typed} disabled={Boolean(feedback)} onChange={e=>setTyped(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!disabledConfirm){e.preventDefault();confirm();}}} placeholder="Type the tempo" className={window.MLH.typedAnswerClass(feedback?{correct:isCorrectText(typed,question.answerId)}:null,"w-full")}/>:<div className="grid grid-cols-2 gap-2 sm:grid-cols-4">{termButtons.map(id=><button key={id} disabled={Boolean(feedback)} onClick={()=>setSelected(id)} className={`min-h-12 rounded-xl border px-3 py-2 text-sm font-bold ${selected===id?"border-black bg-black text-white":"border-stone-300 bg-white text-black"}`}>{TERMS[id].label}</button>)}</div>} {feedback&&!feedback.correct&&<div className="text-base font-bold text-green-600">{question.answer.group==="middle"?"Andante or Moderato":question.answer.label}</div>}</div><div className="flex items-center gap-3"><button onClick={play} disabled={Boolean(feedback)} className={window.MLH.PlayButtonClass}><span>{playing?"■":"▶"}</span><span>{playing?"Stop":"Play"}</span></button><window.MLH.ConfirmButton disabled={disabledConfirm} onClick={confirm}>Confirm</window.MLH.ConfirmButton></div></div></div></main></div></div>; }
const root=document.getElementById("root"); if(ReactDOM.createRoot) ReactDOM.createRoot(root).render(<App/>); else ReactDOM.render(<App/>,root);

</script>
