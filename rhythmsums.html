<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm Sums</title>
  <link rel="icon" type="image/svg+xml" href="https://mrtennant-music.github.io/musicliteracy/rhythm-sums-icon.svg" />
  <link rel="apple-touch-icon" href="https://mrtennant-music.github.io/musicliteracy/rhythm-sums-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./hub-ui.css?v=1.6" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="./bravura-symbols.js?v=20260629"></script>
  <script src="./shared-notation-config.js?v=20260629"></script>
  <script src="./hub-mobile.js?v=20260629"></script>
  <script src="./hub-audio.js?v=20260712-metronome-samples"></script>
  <script src="./hub-shell.js?v=20260712-profile-sharing"></script>
  <script src="./hub-menu.js?v=20260712-profile-sharing"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
  <style>
    @font-face {
      font-family: "Bravura";
      src: url("./Bravura.otf") format("opentype");
      font-display: block;
    }

    .music-symbol {
      font-family: "Bravura", serif;
      font-weight: 400;
      dominant-baseline: alphabetic;
      text-rendering: geometricPrecision;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useEffect, useMemo, useRef, useState } = React;

const NOTE_RX = 7;
const NOTE_RY = 5;
const STEM_LENGTH = 34;
const LINE_GAP = 10;

const COLOUR = {
  green: "#16a34a",
  red: "#dc2626",
  black: "#000000",
};

const ASSET = {
  appIcon: "rhythm-sums-icon.svg",
  levels: "levels.svg",
  customise: "customise.svg",
  next: "next.svg",
  bronze: "bronze.svg",
  silver: "silver.svg",
  gold: "gold.svg",
  diamond: "diamond.svg",
};

const OPERATORS = ["+", "−", "×", "÷"];

const OPERATOR_LABELS = {
  "+": "Add",
  "−": "Subtract",
  "×": "Multiply",
  "÷": "Divide",
};

const LEVELS = {
  N3: {
    label: "National 3",
    shortLabel: "N3",
    description: "Crotchet • Minim • Dotted minim • Semibreve",
    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve"],
    beamedIds: [],
    includeRests: false,
  },
  N4: {
    label: "National 4",
    shortLabel: "N4",
    description: "Quaver • Semiquaver • Grouped semiquavers • Paired quavers",
    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve", "quaver", "semiquaver"],
    beamedIds: ["two-quavers", "four-semiquavers"],
    includeRests: false,
  },
  N5: {
    label: "National 5",
    shortLabel: "N5",
    description: "Dotted crotchet • Dotted quaver • Scotch snap",
    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve", "quaver", "semiquaver", "dotted-crotchet", "dotted-quaver"],
    beamedIds: ["two-quavers", "four-semiquavers", "dotted-quaver-semiquaver", "scotch-snap"],
    includeRests: false,
  },
  H: {
    label: "Higher",
    shortLabel: "H",
    description: "Triplet quavers, triplet crotchets • Rests",
    rhythmIds: ["crotchet", "minim", "dotted-minim", "semibreve", "quaver", "semiquaver", "dotted-crotchet", "dotted-quaver"],
    beamedIds: ["two-quavers", "four-semiquavers", "dotted-quaver-semiquaver", "scotch-snap", "triplet-quavers", "triplet-crotchets"],
    includeRests: true,
  },
};

const RHYTHMS = {
  semibreve: { label: "Semibreve", beats: 4, open: true, stem: false, dots: 0, rest: "semibreve-rest" },
  "dotted-minim": { label: "Dotted minim", beats: 3, open: true, stem: true, dots: 1, rest: "dotted-minim-rest" },
  minim: { label: "Minim", beats: 2, open: true, stem: true, dots: 0, rest: "minim-rest" },
  "dotted-crotchet": { label: "Dotted crotchet", beats: 1.5, open: false, stem: true, dots: 1, rest: "dotted-crotchet-rest" },
  crotchet: { label: "Crotchet", beats: 1, open: false, stem: true, dots: 0, rest: "crotchet-rest" },
  "dotted-quaver": { label: "Dotted quaver", beats: 0.75, open: false, stem: true, dots: 1, flag: true, beams: 1, rest: "dotted-quaver-rest" },
  quaver: { label: "Quaver", beats: 0.5, open: false, stem: true, dots: 0, flag: true, beams: 1, rest: "quaver-rest" },
  semiquaver: { label: "Semiquaver", beats: 0.25, open: false, stem: true, dots: 0, flag: true, beams: 2, rest: "semiquaver-rest" },
};

const BASE_RHYTHMS = [
  "semibreve",
  "dotted-minim",
  "minim",
  "dotted-crotchet",
  "crotchet",
  "dotted-quaver",
  "quaver",
  "semiquaver",
].map((id) => ({ id, kind: "single", label: RHYTHMS[id].label, beats: RHYTHMS[id].beats }));

const REST_ELIGIBLE_RHYTHMS = new Set([
  "semibreve",
  "dotted-minim",
  "minim",
  "dotted-crotchet",
  "crotchet",
  "dotted-quaver",
  "quaver",
]);

const BEAMED_RHYTHMS = [
  { id: "two-quavers", label: "Two quavers", beats: 1, kind: "beamed", rhythms: ["quaver", "quaver"] },
  { id: "four-semiquavers", label: "Four semiquavers", beats: 1, kind: "beamed", rhythms: ["semiquaver", "semiquaver", "semiquaver", "semiquaver"] },
  { id: "quaver-two-semiquavers", label: "Quaver + two semiquavers", beats: 1, kind: "beamed", rhythms: ["quaver", "semiquaver", "semiquaver"] },
  { id: "two-semiquavers-quaver", label: "Two semiquavers + quaver", beats: 1, kind: "beamed", rhythms: ["semiquaver", "semiquaver", "quaver"] },
  { id: "dotted-quaver-semiquaver", label: "Dotted quaver + semiquaver", beats: 1, kind: "beamed", rhythms: ["dotted-quaver", "semiquaver"] },
  { id: "scotch-snap", label: "Scotch snap", beats: 1, kind: "beamed", rhythms: ["semiquaver", "dotted-quaver"] },
  { id: "triplet-quavers", label: "Triplet quavers", beats: 1, kind: "triplet", rhythms: ["quaver", "quaver", "quaver"] },
  { id: "triplet-crotchets", label: "Triplet crotchets", beats: 2, kind: "triplet", rhythms: ["crotchet", "crotchet", "crotchet"] },
];

const DEFAULT_SETTINGS = {
  enabledItems: LEVELS.N3.rhythmIds,
  enabledBeamedItems: LEVELS.N3.beamedIds,
  enabledOperators: ["+", "−"],
  includeRests: false,
  includeBeamedGroups: false,
};

function initialLevelFromUrl() {
  const requested = new URLSearchParams(window.location.search).get("level") || "N3";
  return LEVELS[requested] ? requested : "N3";
}

function settingsForLevel(levelKey, current = DEFAULT_SETTINGS) {
  const level = LEVELS[levelKey] || LEVELS.N3;
  return {
    ...current,
    enabledItems: level.rhythmIds,
    enabledBeamedItems: level.beamedIds,
    enabledOperators: DEFAULT_SETTINGS.enabledOperators,
    includeRests: level.includeRests,
    includeBeamedGroups: level.beamedIds.length > 0,
  };
}

function sameEnabledSet(current, defaults) {
  return current.length === defaults.length && defaults.every(item => current.includes(item));
}

function taskMatchesLevel(levelKey, settings) {
  const official = settingsForLevel(levelKey, DEFAULT_SETTINGS);
  return sameEnabledSet(settings.enabledItems, official.enabledItems)
    && sameEnabledSet(settings.enabledBeamedItems, official.enabledBeamedItems)
    && sameEnabledSet(settings.enabledOperators, official.enabledOperators)
    && settings.includeRests === official.includeRests
    && settings.includeBeamedGroups === official.includeBeamedGroups;
}

function randomItem(items) {
  return items[Math.floor(Math.random() * items.length)];
}

function isQuarterBeat(value) {
  return Number.isFinite(value) && value >= 0 && Math.abs(value * 4 - Math.round(value * 4)) < 0.0001;
}

function formatBeat(value) {
  const rounded = Math.round(value * 100) / 100;
  return Number.isInteger(rounded) ? String(rounded) : String(rounded).replace(/0+$/, "").replace(/\.$/, "");
}

function calculate(left, operator, right) {
  if (operator === "+") return left + right;
  if (operator === "−") return left - right;
  if (operator === "×") return left * right;
  return left / right;
}

function loadSettings(levelKey = initialLevelFromUrl()) {
  try {
    const level = LEVELS[levelKey] || LEVELS.N3;
    const saved = window.localStorage.getItem("rhythms-golden-settings");
    if (!saved) return settingsForLevel(levelKey);
    const parsed = JSON.parse(saved);

    return {
      enabledItems: Array.isArray(parsed.enabledItems) ? parsed.enabledItems.filter((id) => level.rhythmIds.includes(id)) : level.rhythmIds,
      enabledBeamedItems: level.beamedIds,
      enabledOperators: Array.isArray(parsed.enabledOperators) ? parsed.enabledOperators.filter((operator) => OPERATORS.includes(operator)) : DEFAULT_SETTINGS.enabledOperators,
      includeRests: level.includeRests && typeof parsed.includeRests === "boolean" ? parsed.includeRests : level.includeRests,
      includeBeamedGroups: level.beamedIds.length > 0 && typeof parsed.includeBeamedGroups === "boolean" ? parsed.includeBeamedGroups : level.beamedIds.length > 0,
    };
  } catch {
    return settingsForLevel(levelKey);
  }
}

function saveSettings(settings) {
  try {
    window.localStorage.setItem("rhythms-golden-settings", JSON.stringify(settings));
  } catch {}
}

function beamedPoolFromSettings(settings) {
  if (!settings.includeBeamedGroups) return [];
  const enabledBeamedItems = Array.isArray(settings.enabledBeamedItems) ? settings.enabledBeamedItems : [];
  return BEAMED_RHYTHMS.filter((item) => enabledBeamedItems.includes(item.id));
}

function itemPoolFromSettings(settings) {
  const baseItems = BASE_RHYTHMS.filter((item) => settings.enabledItems.includes(item.id));
  return [...baseItems, ...beamedPoolFromSettings(settings)];
}

function makeDisplayItem(item, settings = DEFAULT_SETTINGS) {
  if (item.kind === "beamed") return { ...item, displayType: "beamed" };
  if (item.kind === "triplet") return { ...item, displayType: "triplet" };

  const useRest = settings.includeRests && REST_ELIGIBLE_RHYTHMS.has(item.id) && Math.random() < 0.5;
  const rhythm = useRest ? RHYTHMS[item.id].rest : item.id;

  return {
    ...item,
    rhythm,
    displayType: useRest ? "rest" : "note",
  };
}

function makeQuestion(settings = DEFAULT_SETTINGS) {
  for (let attempt = 0; attempt < 400; attempt += 1) {
    const itemPool = itemPoolFromSettings(settings);
    const operatorPool = OPERATORS.filter((operator) => settings.enabledOperators.includes(operator));

    if (itemPool.length < 2 || operatorPool.length < 1) break;

    let left = randomItem(itemPool);
    let right = randomItem(itemPool);
    const operator = randomItem(operatorPool);

    if (operator === "−" && left.beats < right.beats) [left, right] = [right, left];

    const answer = calculate(left.beats, operator, right.beats);
    if (!isQuarterBeat(answer)) continue;

    return {
      id: Math.random().toString(36).slice(2),
      left: makeDisplayItem(left, settings),
      right: makeDisplayItem(right, settings),
      operator,
      answer,
      prompt: "Calculate the total number of beats.",
    };
  }

  return {
    id: Math.random().toString(36).slice(2),
    left: makeDisplayItem(BASE_RHYTHMS.find((item) => item.id === "crotchet"), settings),
    right: makeDisplayItem(BASE_RHYTHMS.find((item) => item.id === "quaver"), settings),
    operator: "+",
    answer: 1.5,
    prompt: "Calculate the total number of beats.",
  };
}

const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS || {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG || { drawing: {}, symbols: {} };
const BEAMED_STEM_X_OFFSET = -2;
const BEAMED_STEM_Y_OFFSET = -11;
const BEAMED_STEM_DOWN_EXTENSION = 9;
const SEMIQUAVER_BEAM_TRIM = 4;
const SEMIQUAVER_BEAM_Y_OFFSET = 0;

function sharedActualSymbolKey(key) {
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  return key;
}

function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols || {};
  return symbols[key] || symbols[sharedActualSymbolKey(key)] || {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}

function sharedSymbolForKey(key) {
  return SHARED_SYMBOLS[sharedActualSymbolKey(key)] || "";
}

function calibratedPoint(symbolKey, x, y, lineGap = LINE_GAP, settingOverrides = {}) {
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  return {
    x: x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0),
    y: y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0),
    settings,
  };
}

function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", opacity = 1, lineGap = LINE_GAP, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const { x: adjustedX, y: adjustedY, settings } = calibratedPoint(symbolKey, x, y, lineGap, settingOverrides);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);

  return (
    <text
      className="music-symbol"
      x={adjustedX}
      y={adjustedY}
      fill={colour}
      opacity={opacity}
      fontSize={fontSize}
      textAnchor="middle"
      transform={`translate(${adjustedX} ${adjustedY}) scale(${settings.widthScale || 1} ${settings.heightScale || 1}) translate(${-adjustedX} ${-adjustedY})`}
      pointerEvents="none"
    >
      {glyph}
    </text>
  );
}

function rhythmInfo(rhythm) {
  return RHYTHMS[rhythm] || {};
}

function noteSymbolKey(rhythm, beamed = false) {
  if (rhythm === "semibreve") return "wholeNote";
  if (rhythm === "minim" || rhythm === "dotted-minim") return "halfNoteStemUp";
  if (beamed) return "noteheadBlackStemUp";
  if (rhythm === "quaver" || rhythm === "dotted-quaver") return "eighthNoteStemUp";
  if (rhythm === "semiquaver") return "sixteenthNoteStemUp";
  return "quarterNoteStemUp";
}

function restSymbolKey(rhythm) {
  if (rhythm === "semibreve-rest") return "wholeRest";
  if (rhythm === "minim-rest" || rhythm === "dotted-minim-rest") return "halfRest";
  if (rhythm === "quaver-rest" || rhythm === "dotted-quaver-rest") return "eighthRest";
  if (rhythm === "semiquaver-rest") return "sixteenthRest";
  return "quarterRest";
}

function needsDot(rhythm) {
  return rhythm?.startsWith("dotted-");
}

function symbolY(systemTop) {
  return systemTop + LINE_GAP * 2;
}

function Rest({ rhythm, x = 42, systemTop = 12, colour = "currentColor" }) {
  const y = symbolY(systemTop) - (rhythm === "crotchet-rest" || rhythm === "dotted-crotchet-rest" ? 5 : 0);
  const specialRestGlyph = rhythm === "semibreve-rest" ? "\uE4F4" : rhythm === "minim-rest" || rhythm === "dotted-minim-rest" ? "\uE4F5" : "";
  return (
    <g>
      {specialRestGlyph ? (
        <text className="music-symbol" x={x} y={y} fill={colour} fontSize={LINE_GAP * 3.4} textAnchor="middle" dominantBaseline="middle" pointerEvents="none">{specialRestGlyph}</text>
      ) : (
        <CalibratedSymbol symbolKey={restSymbolKey(rhythm)} x={x} y={y} colour={colour} />
      )}
      {needsDot(rhythm) && <CalibratedSymbol symbolKey="augmentationDotSpace" x={x + LINE_GAP * 1.1} y={y - LINE_GAP * 0.35} colour={colour} />}
    </g>
  );
}

function Note({ rhythm, x = 42, systemTop = 12, colour = "currentColor", beamed = false, stemEndY = null, dotXOffset = null }) {
  const info = rhythmInfo(rhythm);
  const y = symbolY(systemTop);
  const symbolKey = noteSymbolKey(rhythm, beamed);
  const symbolPoint = calibratedPoint(symbolKey, x, y);
  const stemX = beamed ? symbolPoint.x + NOTE_RX + BEAMED_STEM_X_OFFSET : x + NOTE_RX;
  const stemStartY = beamed ? symbolPoint.y + BEAMED_STEM_Y_OFFSET + BEAMED_STEM_DOWN_EXTENSION : y;
  const dotY = y - LINE_GAP * 0.25;
  const stemThickness = Math.max(1, LINE_GAP * Number(SHARED_CONFIG.drawing?.stemThicknessScale || 0.12));

  return (
    <g>
      <CalibratedSymbol symbolKey={symbolKey} x={x} y={y} colour={colour} />
      {beamed && info.stem && <line x1={stemX} x2={stemX} y1={stemStartY} y2={stemEndY} stroke={colour} strokeWidth={stemThickness} strokeLinecap="butt" />}
      {info.dots === 1 && <CalibratedSymbol symbolKey="augmentationDotLine" x={x + LINE_GAP * 1.3 + (dotXOffset ?? (rhythm === "dotted-quaver" ? 8 : 0))} y={dotY} colour={colour} />}
    </g>
  );
}

function beamedStemX(rhythm, x, systemTop) {
  const y = symbolY(systemTop);
  return calibratedPoint(noteSymbolKey(rhythm, true), x, y).x + NOTE_RX + BEAMED_STEM_X_OFFSET;
}

function getBeamLineYAtX(x, start, end) {
  if (start.x === end.x) return start.y;
  return start.y + ((x - start.x) / (end.x - start.x)) * (end.y - start.y);
}

function beamPolygonPoints(x1, y1, x2, y2, thickness) {
  const dx = x2 - x1;
  const dy = y2 - y1;
  const length = Math.hypot(dx, dy) || 1;
  const normalX = (-dy / length) * thickness;
  const normalY = (dx / length) * thickness;
  return `${x1},${y1} ${x2},${y2} ${x2 + normalX},${y2 + normalY} ${x1 + normalX},${y1 + normalY}`;
}

function Beam({ start, end, colour = "currentColor", yOffset = 0, widthScale = 1, thicknessScale = 1, trim = 0 }) {
  const thickness = LINE_GAP * Number(SHARED_CONFIG.drawing?.beamThicknessScale || 0.42) * thicknessScale;
  const midX = (start.x + end.x) / 2;
  const halfWidth = Math.max(1, ((end.x - start.x) * widthScale) / 2 - trim / 2);
  const x1 = midX - halfWidth;
  const x2 = midX + halfWidth;
  const startY = getBeamLineYAtX(x1, start, end) + yOffset;
  const endY = getBeamLineYAtX(x2, start, end) + yOffset;

  return (
    <polygon
      points={beamPolygonPoints(x1, startY, x2, endY, thickness)}
      fill={colour}
      pointerEvents="none"
    />
  );
}

function BeamedNotes({ rhythms, colour = "currentColor", scale = 1, beamTrimExtra = 0, showTripletNumber = false }) {
  const systemTop = 12;
  const isDottedPair = rhythms.length === 2 && rhythms[0] === "dotted-quaver" && rhythms[1] === "semiquaver";
  const isScotchSnap = rhythms.length === 2 && rhythms[0] === "semiquaver" && rhythms[1] === "dotted-quaver";
  const spacing = isDottedPair ? 30 : rhythms.length >= 4 ? 24 : 26;
  const positions = rhythms.map((_, index) => 22 + index * spacing);
  const stemXs = positions.map((x, index) => beamedStemX(rhythms[index], x, systemTop));
  const hasSemi = rhythms.some((rhythm) => rhythmInfo(rhythm).beams === 2);
  const beamY = systemTop + LINE_GAP * 0.1 + BEAMED_STEM_Y_OFFSET + (hasSemi ? SEMIQUAVER_BEAM_Y_OFFSET : 0);
  const start = { x: stemXs[0], y: beamY };
  const end = { x: stemXs[stemXs.length - 1], y: beamY - LINE_GAP * 0.08 * Math.max(0, rhythms.length - 2) };
  const primaryBeamConfig = sharedSymbolConfig("quaverBeam");
  const secondBeamConfig = sharedSymbolConfig("semiquaverBeam");
  const secondarySegments = [];
  let segmentStart = null;

  rhythms.forEach((rhythm, index) => {
    const isSemi = rhythmInfo(rhythm).beams === 2;
    const nextIsSemi = rhythms[index + 1] && rhythmInfo(rhythms[index + 1]).beams === 2;
    if (isSemi && segmentStart === null) segmentStart = index;
    if (segmentStart !== null && (!nextIsSemi || index === rhythms.length - 1)) {
      secondarySegments.push({ startIndex: segmentStart, endIndex: index, isHook: index === segmentStart });
      segmentStart = null;
    }
  });

  return (
    <svg viewBox="0 0 118 92" className="h-28 w-40 overflow-visible">
      <g transform={`translate(58 72) scale(${scale}) translate(-54 -50)`}>
        {rhythms.map((rhythm, index) => {
          const x = positions[index];
          const stemX = stemXs[index];
          const stemEndY = getBeamLineYAtX(stemX, start, end);
          const dotXOffset = rhythm === "dotted-quaver"
              ? isDottedPair
                ? 3
                : isScotchSnap
                  ? 2
                  : null
              : null;
          return <Note key={`${rhythm}-${index}`} rhythm={rhythm} x={x} systemTop={systemTop} colour={colour} beamed stemEndY={stemEndY} dotXOffset={dotXOffset} />;
        })}

        <Beam start={start} end={end} colour={colour} widthScale={Number(primaryBeamConfig.widthScale || 1)} thicknessScale={Number(primaryBeamConfig.heightScale || 1)} trim={(hasSemi ? SEMIQUAVER_BEAM_TRIM - (isDottedPair || isScotchSnap ? 1 : 0) : 0) + beamTrimExtra} />
        {showTripletNumber ? (
          <text
            x={(stemXs[0] + stemXs[stemXs.length - 1]) / 2}
            y={beamY - 8}
            textAnchor="middle"
            fontFamily="serif"
            fontWeight="900"
            fontSize="18"
            fill={colour}
          >
            3
          </text>
        ) : null}

        {secondarySegments.map((segment, index) => {
          const segmentStartX = stemXs[segment.startIndex];
          const hookLength = isDottedPair ? 14 : 14;
          const segmentEndX = segment.isHook
            ? segmentStartX + (segment.startIndex > 0 ? -hookLength : hookLength)
            : stemXs[segment.endIndex];
          const rawSecondStartX = segmentStartX + (isDottedPair ? 4 : 0) - (isScotchSnap ? 1 : 0);
          const rawSecondEndX = segmentEndX - (isScotchSnap ? 1 : 0);
          const secondBeamShiftX = isDottedPair ? -1 : 0;
          const secondBeamWidthReduction = isDottedPair ? 3 : 0;
          const secondBeamLeftX = Math.min(rawSecondStartX, rawSecondEndX) + secondBeamShiftX + secondBeamWidthReduction / 2;
          const secondBeamRightX = Math.max(rawSecondStartX, rawSecondEndX) + secondBeamShiftX - secondBeamWidthReduction / 2;
          const secondStart = {
            x: secondBeamLeftX,
            y: getBeamLineYAtX(secondBeamLeftX, start, end) + LINE_GAP * 0.58,
          };
          const secondEnd = {
            x: secondBeamRightX,
            y: getBeamLineYAtX(secondBeamRightX, start, end) + LINE_GAP * 0.58,
          };
          return (
            <Beam
              key={index}
              start={secondStart}
              end={secondEnd}
              colour={colour}
              widthScale={Number(secondBeamConfig.widthScale || 1)}
              thicknessScale={Number(secondBeamConfig.heightScale || 1)}
              trim={SEMIQUAVER_BEAM_TRIM}
            />
          );
        })}
      </g>
    </svg>
  );
}

function TripletNotes({ rhythms, colour = "currentColor", scale = 1 }) {
  const systemTop = 12;
  const isCrotchetTriplet = rhythms.every((rhythm) => rhythm === "crotchet");
  const isQuaverTriplet = rhythms.every((rhythm) => rhythm === "quaver");

  if (!isCrotchetTriplet) {
    return <BeamedNotes rhythms={rhythms} colour={colour} scale={scale} beamTrimExtra={isQuaverTriplet ? 2 : -1} showTripletNumber={isQuaverTriplet} />;
  }

  return (
    <svg viewBox="0 0 150 92" className="h-28 w-44 overflow-visible">
      <g transform={`translate(75 72) scale(${scale}) translate(-75 -50)`}>
        {[42, 75, 108].map((x, index) => (
          <Note key={index} rhythm="crotchet" x={x} systemTop={systemTop} colour={colour} />
        ))}
          <g stroke={colour} fill={colour} transform="translate(80.5 -8) scale(0.85) translate(-75 -8)">
          <g stroke={colour} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round">
            <path d="M 32 16 L 32 8 L 63 8" />
            <path d="M 87 8 L 118 8 L 118 16" />
          </g>
          <text x="75" y="14" textAnchor="middle" fontFamily="serif" fontWeight="900" fontSize="24">3</text>
        </g>
      </g>
    </svg>
  );
}

function rhythmVisualOffset(item) {
  if (item.displayType === "beamed" || item.displayType === "triplet") return 0;
  if (item.rhythm === "semibreve-rest") return -10;
  if (item.rhythm === "minim-rest" || item.rhythm === "dotted-minim-rest") return -4;
  return 0;
}

function RhythmGlyph({ item, colour = "currentColor", scale = 1 }) {
  const yOffset = rhythmVisualOffset(item);

  if (item.displayType === "beamed") {
    return (
      <div style={{ transform: `translateY(${yOffset}px)` }}>
        <BeamedNotes rhythms={item.rhythms} colour={colour} scale={scale} />
      </div>
    );
  }

  if (item.displayType === "triplet") {
    return (
      <div style={{ transform: `translateY(${yOffset}px)` }}>
        <TripletNotes rhythms={item.rhythms} colour={colour} scale={scale} />
      </div>
    );
  }

  return (
    <svg viewBox="0 0 90 90" className="h-28 w-32 overflow-visible" style={{ transform: `translateY(${yOffset}px)` }}>
      <g transform={`translate(45 70) scale(${scale}) translate(-42 -50)`}>
        {item.displayType === "rest" ? <Rest rhythm={item.rhythm} x={42} systemTop={12} colour={colour} /> : <Note rhythm={item.rhythm} x={42} systemTop={12} colour={colour} />}
      </g>
    </svg>
  );
}

function RhythmSlot({ children, className = "" }) {
  return <div className={`flex h-32 w-44 items-center justify-center overflow-visible ${className}`}>{children}</div>;
}

const playFeedbackSound = (...args) => window.MLH?.playFeedbackSound?.(...args);

function medalNameForStreak(streak) {
  if (streak === 10) return "bronze";
  if (streak === 15) return "silver";
  if (streak === 20) return "gold";
  if (streak === 30) return "platinum";
  return null;
}

function FeedbackBanner({ feedback, fading = false, warning = "" }) {
  if (!feedback && warning) {
    return (
      <div className="relative flex w-full items-center justify-center text-center">
        <div className="rounded-2xl bg-amber-100 px-5 py-3 text-base font-bold text-amber-800 shadow-sm">{warning}</div>
      </div>
    );
  }

  if (!feedback) return null;

  return (
    <div className="relative flex w-full items-center justify-center text-center">
      <div
        className={`flex h-10 min-w-[92px] items-center justify-center rounded-xl border px-4 text-[18px] font-black text-white ${
          feedback.correct ? "border-[#16a34a] bg-[#16a34a]" : "border-[#dc2626] bg-[#dc2626]"
        }`}
        style={{
          animation: fading
            ? "feedbackFadeOut .28s ease-out forwards"
            : feedback.correct
              ? "correctFade .55s ease-out forwards"
              : "incorrectDropShake .55s ease-out forwards",
        }}
      >
        {feedback.correct ? "Correct" : "Incorrect"}
      </div>
    </div>
  );
}

function NoteLegendSymbol({ rhythm, standalone = false }) {
  return (
    <svg viewBox="0 0 70 70" className={`${standalone ? "h-11 w-16" : "h-11 w-12"} overflow-visible`}>
      <g transform="translate(0 11) scale(1.15)">
        <Note rhythm={rhythm} x={standalone ? 32 : 38} systemTop={8} />
      </g>
    </svg>
  );
}

function GuideRestSymbol({ rhythm }) {
  if (rhythm === "semibreve-rest" || rhythm === "minim-rest") {
    const glyph = rhythm === "semibreve-rest" ? "\uE4F4" : "\uE4F5";
    return (
      <svg viewBox="0 0 70 70" className="h-11 w-9 overflow-visible">
        <text className="music-symbol" x="22" y={rhythm === "minim-rest" ? 40 : 36} fontSize="44" textAnchor="middle" dominantBaseline="middle">{glyph}</text>
      </svg>
    );
  }

  return (
    <svg viewBox="0 0 70 70" className="h-11 w-9 overflow-visible">
      <g transform="translate(-12, 7) scale(1.15)">
        <Rest rhythm={rhythm} x={34} systemTop={8} />
      </g>
    </svg>
  );
}

function RhythmGuide() {
  const legend = [
    { rhythm: "semibreve", rest: "semibreve-rest", label: "4" },
    { rhythm: "dotted-minim", rest: null, label: "3" },
    { rhythm: "minim", rest: "minim-rest", label: "2" },
    { rhythm: "dotted-crotchet", rest: "dotted-crotchet-rest", label: "1.5" },
    { rhythm: "crotchet", rest: "crotchet-rest", label: "1" },
    { rhythm: "quaver", rest: "quaver-rest", label: "0.5" },
    { rhythm: "semiquaver", rest: null, label: "0.25" },
  ];

  return (
    <div className="mb-3 rounded-xl border border-stone-200 bg-stone-50 p-3">
      <div className="grid grid-cols-2 gap-2 text-sm md:grid-cols-7">
        {legend.map((item) => (
          <div key={item.rhythm} className="flex flex-col items-center justify-center rounded-lg border border-stone-200/70 bg-white px-2 py-2 text-center">
            <div className="flex items-center justify-center gap-0">
              <NoteLegendSymbol rhythm={item.rhythm} standalone={!item.rest} />
              {item.rest && <GuideRestSymbol rhythm={item.rest} />}
            </div>
            <span className="block w-full text-center font-semibold">{item.label}</span>
          </div>
        ))}
      </div>
    </div>

}

function CustomiseGlyphSlot({ children }) {
  return (
    <span className="flex h-14 w-14 items-center justify-center overflow-visible">
      {children}
    </span>
  );
}

function RhythmMenuGlyph({ item }) {
  return (
    <CustomiseGlyphSlot>
      <svg viewBox="0 0 90 80" className="h-[56px] w-[66px] overflow-visible text-stone-800">
        <g transform="translate(2 15) scale(1.08)">
          <Note rhythm={item.id} x={42} systemTop={12} />
        </g>
      </svg>
    </CustomiseGlyphSlot>
  );
}

function RestMenuGlyph() {
  return (
    <CustomiseGlyphSlot>
      <svg viewBox="0 0 90 80" className="h-[56px] w-[66px] overflow-visible text-stone-800">
        <g transform="translate(5 11) scale(1.08)">
          <Rest rhythm="crotchet-rest" x={42} systemTop={12} />
        </g>
      </svg>
    </CustomiseGlyphSlot>

}

function BeamedMenuGlyph({ rhythms = ["quaver", "quaver"], isTriplet = false }) {
  return (
    <CustomiseGlyphSlot>
      <div className="flex h-[48px] w-[62px] translate-x-[16px] -translate-y-[13px] items-center justify-center overflow-visible text-stone-800">
        {isTriplet ? <TripletNotes rhythms={rhythms} scale={0.42} /> : <BeamedNotes rhythms={rhythms} scale={0.5} />}

function OperationMenuGlyph({ operator }) {
  return (
    <CustomiseGlyphSlot>
      <span className="flex h-full w-full translate-x-[10px] -translate-y-[2px] items-center justify-center text-[26px] font-bold leading-none text-stone-900">{operator}</span>
    </CustomiseGlyphSlot>
  );
}

function GlyphToggleButton({ label, active, disabled = false, onClick, glyph, showLabel = false, compact = false }) {
  const padding = showLabel ? "7px 46px 7px 6px" : compact ? "7px 32px 7px 2px" : "7px 48px 7px 6px";
  const glyphWidth = showLabel ? "w-[34px]" : compact ? "w-[26px]" : "w-[42px]";
  const trackScale = compact ? 0.72 : 0.84;
  const trackRight = compact ? "4px" : "8px";
  return (
    <button
      type="button"
      disabled={disabled}
      onClick={onClick}
      className="hub-toggle-row"
      style={{ marginBottom: 0, minHeight: "48px", padding, overflow: "visible", position: "relative", justifyContent: "flex-start" }}
      aria-label={`Toggle ${label}`}
      title={label}
    >
      <span className={`flex h-full ${glyphWidth} items-center justify-center overflow-visible`}>
        {glyph}
      </span>
      {showLabel && <span className="ml-1 min-w-0 flex-1 truncate text-left text-sm font-semibold leading-none text-stone-900">{label}</span>}
      <span className={`hub-toggle-track shrink-0 ${active ? "is-on" : ""}`} style={{ position: "absolute", right: trackRight, top: "50%", transform: `translateY(-50%) scale(${trackScale})`, transformOrigin: "center" }}>
        <span className="hub-toggle-thumb" />
      </span>
    </button>
  );
}

function MenuRows({ activeLevel, settings, updateSettings, newQuestion, showRhythmGuide, setShowRhythmGuide }) {
  const level = LEVELS[activeLevel] || LEVELS.N3;
  const levelRhythms = BASE_RHYTHMS.filter((item) => level.rhythmIds.includes(item.id));
  const levelGroups = BEAMED_RHYTHMS.filter((item) => level.beamedIds.includes(item.id));

  function commit(next) {
    const includeBeamedGroups = level.beamedIds.length > 0 && next.includeBeamedGroups;
    const enabledBeamedItems = includeBeamedGroups ? level.beamedIds : [];
    const clean = {
      ...next,
      enabledItems: next.enabledItems.filter((id) => level.rhythmIds.includes(id)),
      enabledBeamedItems,
      includeRests: level.includeRests && next.includeRests,
      includeBeamedGroups,
    };
    updateSettings(clean);
    setTimeout(() => newQuestion(clean), 0);
  }

  function toggleItem(id) {
    const enabled = settings.enabledItems.includes(id);
    if (enabled && settings.enabledItems.length === 2) return;
    const enabledItems = enabled ? settings.enabledItems.filter((itemId) => itemId !== id) : [...settings.enabledItems, id];
    commit({ ...settings, enabledItems });
  }

  function toggleOperator(operator) {
    const enabled = settings.enabledOperators.includes(operator);
    if (enabled && settings.enabledOperators.length === 1) return;
    const enabledOperators = enabled ? settings.enabledOperators.filter((item) => item !== operator) : [...settings.enabledOperators, operator];
    commit({ ...settings, enabledOperators });
  }

  return (
    <div style={{ width: "min(360px, calc(100vw - 4.5rem))" }}>
      <window.MLH.MenuSubheading>Help</window.MLH.MenuSubheading>
      <window.MLH.MenuToggleRow glyph={<img src="guide.svg" alt="" aria-hidden="true" className="relative -top-px h-9 w-9 object-contain" />} label="Show Rhythm Guide" checked={showRhythmGuide} onChange={() => setShowRhythmGuide((value) => !value)} />

      <window.MLH.MenuSubheading>Operations</window.MLH.MenuSubheading>
      <div className="grid grid-cols-4 gap-2">
        {OPERATORS.map((operator) => (
          <GlyphToggleButton
            key={operator}
            label={OPERATOR_LABELS[operator]}
            active={settings.enabledOperators.includes(operator)}
            onClick={() => toggleOperator(operator)}
            glyph={<OperationMenuGlyph operator={operator} />}
            compact
          />
        ))}
      </div>

      <window.MLH.MenuSubheading>Rhythms</window.MLH.MenuSubheading>
          <div className="grid grid-cols-4 gap-2">
            {levelRhythms.map((item) => (
              <GlyphToggleButton
                key={item.id}
                label={item.label}
                active={settings.enabledItems.includes(item.id)}
                onClick={() => toggleItem(item.id)}
                glyph={<RhythmMenuGlyph item={item} />}
                compact
              />
            ))}
          </div>

      {(levelGroups.length > 0 || level.includeRests) && (
        <>
          <window.MLH.MenuSubheading>Options</window.MLH.MenuSubheading>
          <div className="grid grid-cols-2 gap-2">
            {levelGroups.length > 0 && (
              <div className={level.includeRests ? "" : "col-span-2"}>
                <GlyphToggleButton
                  label="Groups"
                  active={settings.includeBeamedGroups}
                  onClick={() => commit({ ...settings, includeBeamedGroups: !settings.includeBeamedGroups })}
                  glyph={<BeamedMenuGlyph rhythms={["quaver", "quaver"]} />}
                  showLabel
                />
              </div>
            )}
            {level.includeRests && (
              <div className={levelGroups.length > 0 ? "" : "col-span-2"}>
              <GlyphToggleButton
                label="Rests"
                active={settings.includeRests}
                onClick={() => commit({ ...settings, includeRests: !settings.includeRests })}
                glyph={<RestMenuGlyph />}
                showLabel
              />
              </div>
            )}
          </div>
        </>
      )}

    </div>
  );
}


function useInjectedStyles() {
  useEffect(() => {
    if (document.getElementById("rhythms-golden-style")) return;
    const style = document.createElement("style");
    style.id = "rhythms-golden-style";
    style.innerHTML = `button{-webkit-tap-highlight-color:transparent;user-select:none;transition:transform .08s ease,filter .08s ease,background-color .12s ease,box-shadow .12s ease;cursor:pointer}button:hover{transform:translateY(-1px) scale(1.01);filter:brightness(1.08);box-shadow:0 6px 18px rgba(0,0,0,.08)}button:active{transform:scale(.96);filter:brightness(.92)}button:disabled{cursor:not-allowed;opacity:.5}@keyframes medalShine{0%,100%{transform:scale(1) rotate(-4deg)}50%{transform:scale(1.16) rotate(4deg);filter:drop-shadow(0 0 10px rgba(250,204,21,.9))}}@keyframes incorrectDropShake{0%{transform:translateY(-28px);opacity:0}55%{transform:translateY(0);opacity:1}68%{transform:translateX(-5px)}78%{transform:translateX(5px)}88%{transform:translateX(-3px)}100%{transform:translateX(0);opacity:1}}@keyframes correctFade{0%{transform:translateY(-18px);opacity:0}100%{transform:translateY(0);opacity:1}}@keyframes feedbackFadeOut{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-10px)}}`;
    document.head.appendChild(style);
  }, []);
}

const useClickOutside = window.MLH.useClickOutside;

function RhythmSumsGoldenApp() {
  useInjectedStyles();

  const initialLevel = initialLevelFromUrl();
  const [activeLevel, setActiveLevel] = useState(initialLevel);
  const [settings, setSettings] = useState(() => loadSettings(initialLevel));
  const [question, setQuestion] = useState(() => makeQuestion(loadSettings(initialLevel)));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [levelOpen, setLevelOpen] = useState(false);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [showRhythmGuide, setShowRhythmGuide] = useState(false);
  const [answerText, setAnswerText] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [warning, setWarning] = useState("");
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);

  const levelRef = useRef(null);
  const customiseRef = useRef(null);
  const warningTimer = useRef(null);
  const nextTimer = useRef(null);
  const fadeTimer = useRef(null);
  const levelTaskStatusRef = useRef(null);

  useClickOutside(
    [levelRef, customiseRef],
    [
      () => levelOpen && setLevelOpen(false),
      () => customiseOpen && setCustomiseOpen(false),
    ],
  );

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const medalEligible = taskMatchesLevel(activeLevel, settings);
  const displayedLevel = medalEligible ? activeLevel : "Custom";
  const displayedLevelLabel = medalEligible ? LEVELS[activeLevel].label : "Custom";
  const hasAnswer = answerText.trim().length > 0;

  function updateSettings(nextSettings) {
    saveSettings(nextSettings);
    setSettings(nextSettings);
  }

  function applyLevel(levelKey) {
    const nextSettings = settingsForLevel(levelKey, settings);
    setActiveLevel(levelKey);
    updateSettings(nextSettings);
    setLevelOpen(false);
    setCustomiseOpen(false);
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion(nextSettings);
  }

  function resetTask(nextQuestion = question) {
    if (nextTimer.current) clearTimeout(nextTimer.current);
    if (fadeTimer.current) clearTimeout(fadeTimer.current);
    setQuestion(nextQuestion);
    setAnswerText("");
    setFeedback(null);
    setFeedbackFading(false);
    setWarning("");
  }

  function newQuestion(nextSettings = settings) {
    setQuestionVisible(false);
    setTimeout(() => {
      resetTask(makeQuestion(nextSettings));
      setQuestionVisible(true);
    }, 260);
  }

  function resetScore() {
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    newQuestion();
  }

  useEffect(() => {
    if (levelTaskStatusRef.current === null) {
      levelTaskStatusRef.current = medalEligible;
      return;
    }
    if (levelTaskStatusRef.current === medalEligible) return;
    levelTaskStatusRef.current = medalEligible;
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
  }, [medalEligible]);

  function showWarning(message) {
    setWarning(message);
    if (warningTimer.current) clearTimeout(warningTimer.current);
    warningTimer.current = setTimeout(() => setWarning(""), 1800);
  }

  function handleInput(event) {
    if (feedback) return;
    const value = event.target.value;
    if (/^\d*\.?\d*$/.test(value)) setAnswerText(value);
  }

  function clearAnswer() {
    if (feedback) return;
    setAnswerText("");
  }

  function scoreAnswer(ok) {
    if (nextTimer.current) clearTimeout(nextTimer.current);
    if (fadeTimer.current) clearTimeout(fadeTimer.current);

    const nextStreak = ok ? streak + 1 : 0;
    const earnedMedal = ok && medalEligible ? medalNameForStreak(nextStreak) : null;
    playFeedbackSound(ok, Boolean(earnedMedal), earnedMedal);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (ok ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedbackFading(false);
    setFeedback({ correct: ok });
    if (earnedMedal) setConfettiKey((value) => value + 1);

    if (ok) {
      fadeTimer.current = setTimeout(() => setFeedbackFading(true), 1700);
      nextTimer.current = setTimeout(() => newQuestion(), 2000);
    }
  }

  function confirmAnswer() {
    if (!hasAnswer || feedback) return showWarning("Enter an answer before pressing Confirm.");
    const userAnswer = Number(answerText);
    scoreAnswer(Math.abs(userAnswer - question.answer) < 0.0001);
  }

  function fadeToNextQuestion() {
    if (!feedback || feedbackFading) return;
    if (nextTimer.current) clearTimeout(nextTimer.current);
    if (fadeTimer.current) clearTimeout(fadeTimer.current);
    setFeedbackFading(true);
    fadeTimer.current = setTimeout(() => newQuestion(), 280);
  }

  return (
    <div className={window.MLH.shell.pageShellClass}>
      <window.MLH.AppHeader icon={ASSET.appIcon} title="Rhythm Sums" subtitle="Calculate rhythm values." worksheetConfig={() => ({ version: 1, activityId: "rhythmsums", sourceUrl: window.location.href, settings: { level: activeLevel, ...settings } })}>
        <window.MLH.ScoreStreakPanel assets={ASSET} correct={correct} attempted={attempted} accuracy={accuracy} streak={streak} bestStreak={bestStreak} resetScore={resetScore} confettiKey={confettiKey} medalEligible={medalEligible} />
      </window.MLH.AppHeader>

      <div className={window.MLH.shell.pageContentClass}>
        <main className={`${window.MLH.shell.mainShellClass} flex flex-col pb-5 md:pb-6`} onPointerDownCapture={() => { if (feedback) fadeToNextQuestion(); }}>
          <window.MLH.AppToolbar
            left={
              <div className="flex items-center gap-2">
                <div className="hub-menu-anchor relative" ref={levelRef}>
                  <window.MLH.LevelButton
                    icon={<img src={ASSET.levels} alt="" aria-hidden="true" className="h-[26.6px] w-[26.6px] object-contain" />}
                    activeLevel={displayedLevel}
                    activeLabel={displayedLevelLabel}
                    isCustom={!medalEligible}
                    onClick={() => {
                      setCustomiseOpen(false);
                      setLevelOpen((value) => !value);
                    }}
                    dataMenuTrigger={true}
                  />
                  {levelOpen && (
                    <window.MLH.MenuPanel title="Level" position="left-0" dataMenuPanel={true}>
                      <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                    </window.MLH.MenuPanel>
                  )}
                </div>
                <div className="hub-menu-anchor relative" ref={customiseRef}>
                  <window.MLH.CustomiseButton
                    icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[26.6px] w-[26.6px] object-contain" />}
                    onClick={() => {
                      setLevelOpen(false);
                      setCustomiseOpen((value) => !value);
                    }}
                    dataMenuTrigger={true}
                  />
                  {customiseOpen && (
                    <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise" dataMenuPanel={true}>
                      <MenuRows
                        activeLevel={activeLevel}
                        settings={settings}
                        updateSettings={updateSettings}
                        newQuestion={newQuestion}
                        showRhythmGuide={showRhythmGuide}
                        setShowRhythmGuide={setShowRhythmGuide}
                      />
                    </window.MLH.MenuPanel>
                  )}
                </div>
              </div>
            }
            feedback={<FeedbackBanner feedback={feedback} fading={feedbackFading} warning={warning} />}
            right={<window.MLH.SkipButton resetStreak={() => setStreak(0)} onClick={() => newQuestion()} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />} />}
          />

          {showRhythmGuide && (
            <div className="relative z-10 md:mx-3">
              <RhythmGuide />
            </div>
          )}

          <div className={`relative z-10 mt-4 transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <div className="flex flex-wrap items-center justify-center gap-5 overflow-visible py-7 text-4xl font-medium" style={{ transform: "scale(1.14)", transformOrigin: "center" }}>
              <RhythmSlot>
                <div className="flex flex-col items-center">
                  <RhythmGlyph item={question.left} scale={1.14} />
                </div>
              </RhythmSlot>

              <span className="min-w-[44px] text-center leading-none">{question.operator}</span>

              <RhythmSlot>
                <div className="flex flex-col items-center">
                  <RhythmGlyph item={question.right} scale={1.14} />
                </div>
              </RhythmSlot>
            </div>
          </div>

          <div className="relative z-10 mt-auto rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:mx-3">
            <div className="text-stone-900">
              <p className="text-base font-semibold leading-tight">{question.prompt}</p>
              <div className="mt-6 flex flex-wrap items-end justify-between gap-3">
                <div className="flex min-w-0 items-center gap-2">
                  <input
                    value={answerText}
                    onChange={handleInput}
                    onKeyDown={(event) => { if (event.key === "Enter") confirmAnswer(); }}
                    inputMode="decimal"
                    disabled={Boolean(feedback)}
                    aria-label="Answer"
                    placeholder="Type your answer"
                    className={window.MLH.typedAnswerClass(feedback, "w-[260px] max-w-full shrink-0 font-normal")}
                  />
                  {feedback && !feedback.correct && <span className="shrink-0 min-w-[2.4rem] text-left text-lg font-semibold text-green-700">{formatBeat(question.answer)}</span>}
                </div>
                <div className={window.MLH.ActionButtonGroupClass}>
                  <button type="button" onClick={clearAnswer} disabled={Boolean(feedback) || !hasAnswer} className={window.MLH.ClearButtonClass}>Clear</button>
                  <window.MLH.ConfirmButton onClick={confirmAnswer} disabled={Boolean(feedback) || !hasAnswer}>Confirm</window.MLH.ConfirmButton>
                </div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RhythmSumsGoldenApp />);
  </script>

</body>
