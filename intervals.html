<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intervals</title>
  <link rel="icon" type="image/svg+xml" href="https://mrtennant-music.github.io/musicliteracy/intervals-icon.svg" />
  <link rel="apple-touch-icon" href="https://mrtennant-music.github.io/musicliteracy/intervals-icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./hub-ui.css?v=1.4" />
  <script src="./hub-mobile.js?v=1.2"></script>
  <script src="./hub-audio.js?v=1.1"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="./hub-shell.js?v=1.1"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="./hub-menu.js?v=1.6"></script>
  <style>
    @font-face { font-family: "Bravura"; src: url("./Bravura.otf") format("opentype"); font-display: block; }
    .music-symbol { font-family: "Bravura", serif; dominant-baseline: alphabetic; text-rendering: geometricPrecision; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
const { useMemo, useRef, useState } = React;
const SHELL = window.MLH?.shell || {};
const isTouchDevice = window.MLH?.isTouchDevice?.() || ("ontouchstart" in window) || navigator.maxTouchPoints > 0;

const ASSET = {
  appIcon: "https://mrtennant-music.github.io/musicliteracy/intervals-icon.svg",
  level: "https://mrtennant-music.github.io/musicliteracy/levels.svg",
  customise: "https://mrtennant-music.github.io/musicliteracy/customise.svg",
  next: "https://mrtennant-music.github.io/musicliteracy/next.svg",
  sharp: "https://mrtennant-music.github.io/musicliteracy/sharp.svg?v=1.1",
  flat: "https://mrtennant-music.github.io/musicliteracy/flat.svg?v=1.1",
  bronze: "https://mrtennant-music.github.io/musicliteracy/bronze.svg",
  silver: "https://mrtennant-music.github.io/musicliteracy/silver.svg",
  gold: "https://mrtennant-music.github.io/musicliteracy/gold.svg",
  diamond: "https://mrtennant-music.github.io/musicliteracy/diamond.svg",
};

const LEVELS = {
  N5: {
    label: "National 5",
    description: "Tones, semitones, accidentals — flats, sharps and naturals · Leaps",
  },
  H: {
    label: "Higher",
    description: "Naming diatonic intervals: 2nd, 3rd, 4th, 5th, 6th, 7th, octave · Writing diatonic intervals above a given note in treble clef",
  },
  AH: {
    label: "Advanced Higher",
    description: "Tritone · Augmented 4th · Diminished 5th",
  },
};

const SVG = { width: 920, height: 420 };

const STAFF = {
  left: 222,
  right: 684,
  trebleTop: 132,
  gap: 21,
};

const NOTE = {
  rx: 13.55,
  ry: 9.69,
  stemLength: 69,
};

const COLOUR = {
  green: "#16a34a",
  red: "#dc2626",
  preview: "#444444",
  black: "#000000",
};

const GLYPH = {
  trebleClef: "\uE050",
  bassClef: String.fromCodePoint(0x1d122),
  noteheadBlack: "\uE0A4",
};

const NOTES = [
  { name: "C4", letter: "C", octave: 4, step: -2 },
  { name: "D4", letter: "D", octave: 4, step: -1 },
  { name: "E4", letter: "E", octave: 4, step: 0 },
  { name: "F4", letter: "F", octave: 4, step: 1 },
  { name: "G4", letter: "G", octave: 4, step: 2 },
  { name: "A4", letter: "A", octave: 4, step: 3 },
  { name: "B4", letter: "B", octave: 4, step: 4 },
  { name: "C5", letter: "C", octave: 5, step: 5 },
  { name: "D5", letter: "D", octave: 5, step: 6 },
  { name: "E5", letter: "E", octave: 5, step: 7 },
  { name: "F5", letter: "F", octave: 5, step: 8 },
  { name: "G5", letter: "G", octave: 5, step: 9 },
  { name: "A5", letter: "A", octave: 5, step: 10 },
];

const INTERVALS = [
  { size: 2, label: "2nd" },
  { size: 3, label: "3rd" },
  { size: 4, label: "4th" },
  { size: 5, label: "5th" },
  { size: 6, label: "6th" },
  { size: 7, label: "7th" },
  { size: 8, label: "Octave" },
];

const LEVEL_INTERVALS = {
  N5: [2, 8],
  H: [2, 3, 4, 5, 6, 7, 8],
  AH: [2, 3, 4, 5, 6, 7, 8, "tritone", "augmented-4th", "diminished-5th"],
};

const KEY_SIGNATURES = {
  C: { label: "C major", accidentals: [] },
  G: { label: "G major", accidentals: [{ type: "sharp", step: 8, letter: "F" }] },
  F: { label: "F major", accidentals: [{ type: "flat", step: 4, letter: "B" }] },
  D: { label: "D major", accidentals: [{ type: "sharp", step: 8, letter: "F" }, { type: "sharp", step: 5, letter: "C" }] },
  Bb: { label: "B flat major", accidentals: [{ type: "flat", step: 4, letter: "B" }, { type: "flat", step: 7, letter: "E" }] },
};

const CHROMATIC_INTERVALS = [
  { id: "tritone-f-b", startIndex: 3, endIndex: 6, key: "C" },
  { id: "augmented-4th-c-fsharp", startIndex: 0, endIndex: 3, key: "C", targetAccidental: "sharp" },
  { id: "augmented-4th-g-csharp", startIndex: 4, endIndex: 7, key: "D" },
  { id: "diminished-5th-b-f", startIndex: 6, endIndex: 10, key: "C" },
  { id: "diminished-5th-e-bflat", startIndex: 2, endIndex: 6, key: "F" },
  { id: "diminished-5th-a-eflat", startIndex: 5, endIndex: 9, key: "Bb" },
];

const CHROMATIC_INTERVAL_WEIGHTS = CHROMATIC_INTERVALS.flatMap((interval) =>
  interval.id.startsWith("tritone") ? [interval, interval, null] : [interval, interval]
);

const NOTE_NAME_LABELS = {
  treble: {
    top: STAFF.trebleTop,
    lines: [
      { step: 0, letter: "E" },
      { step: 2, letter: "G" },
      { step: 4, letter: "B" },
      { step: 6, letter: "D" },
      { step: 8, letter: "F" },
    ],
    spaces: [
      { step: 1, letter: "F" },
      { step: 3, letter: "A" },
      { step: 5, letter: "C" },
      { step: 7, letter: "E" },
    ],
  },
};

function randomIndex(length) {
  return Math.floor(Math.random() * length);
}

function randomItem(items) {
  return items[randomIndex(items.length)];
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function noteByIndex(index) {
  return NOTES[clamp(index, 0, NOTES.length - 1)];
}

const NATURAL_SEMITONES = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };

function accidentalOffset(type) {
  if (type === "sharp") return 1;
  if (type === "flat") return -1;
  return 0;
}

function keySignatureAccidental(note, keySignature = []) {
  return keySignature.find((item) => item.letter === note.letter)?.type || null;
}

function writtenPitch(note, keySignature = [], explicitAccidental = null) {
  const accidental = explicitAccidental || keySignatureAccidental(note, keySignature);
  return note.octave * 12 + NATURAL_SEMITONES[note.letter] + accidentalOffset(accidental);
}

function semitoneDistance(startIndex, endIndex, keySignature = [], targetAccidental = null) {
  const startNote = noteByIndex(startIndex);
  const endNote = noteByIndex(endIndex);
  return Math.abs(writtenPitch(endNote, keySignature, targetAccidental) - writtenPitch(startNote, keySignature));
}

function intervalNameFromHalfSteps(startIndex, endIndex, keySignature = [], targetAccidental = null) {
  const diatonicSize = Math.abs(endIndex - startIndex) + 1;
  const halfSteps = semitoneDistance(startIndex, endIndex, keySignature, targetAccidental);

  if (halfSteps === 4 && diatonicSize === 4) return "Diminished 4th";
  if (halfSteps === 6 && diatonicSize === 4) return "Augmented 4th";
  if (halfSteps === 6 && diatonicSize === 5) return "Diminished 5th";
  if (halfSteps === 8 && diatonicSize === 5) return "Augmented 5th";
  if (halfSteps === 6) return "Tritone";

  return intervalLabel(diatonicSize);
}

function chromaticQuestionAnswer(interval, keySignature) {
  const halfSteps = semitoneDistance(interval.startIndex, interval.endIndex, keySignature, interval.targetAccidental);
  if (interval.id.startsWith("tritone") && halfSteps === 6) return "Tritone";
  return intervalNameFromHalfSteps(interval.startIndex, interval.endIndex, keySignature, interval.targetAccidental);
}

function normalizeText(value) {
  return String(value || "").toLowerCase().replace(/[-\s]/g, "");
}

function answerMatchesLabel(raw, label, allowTritone = false) {
  const compact = normalizeText(raw);
  const target = normalizeText(label);
  const accepted = new Set([target]);

  if (allowTritone) accepted.add("tritone");

  if (target === "augmented4th") {
    accepted.add("aug4");
    accepted.add("augmentedforth");
    accepted.add("aug4th");
  }

  if (target === "diminished4th") {
    accepted.add("dim4");
    accepted.add("diminishedfourth");
    accepted.add("dimished4th");
    accepted.add("dimishedfourth");
  }

  if (target === "diminished5th") {
    accepted.add("dim5");
    accepted.add("diminishedfifth");
    accepted.add("dimished5th");
    accepted.add("dimishedfifth");
  }

  if (target === "augmented5th") {
    accepted.add("aug5");
    accepted.add("augmentedfifth");
    accepted.add("aug5th");
  }

  return accepted.has(compact);
}

function typedFeedbackLabel(question) {
  if (!question.chromatic) return question.answer;
  if (question.answer === "Augmented 4th" || question.answer === "Diminished 5th") {
    return `Tritone or ${question.answer}`;
  }
  return question.answer;
}

function intervalAnswerMatches(raw, label) {
  if (answerMatchesLabel(raw, label)) return true;

  const compact = normalizeText(raw);
  const target = normalizeText(label);
  const simpleAliases = {
    "2nd": ["2", "second"],
    "3rd": ["3", "third"],
    "4th": ["4", "fourth"],
    "5th": ["5", "fifth"],
    "6th": ["6", "sixth"],
    "7th": ["7", "seventh"],
    octave: ["8", "8th"],
  };

  return simpleAliases[target]?.includes(compact) || false;
}

function intervalLabel(size) {
  if (typeof size === "string") return CHROMATIC_INTERVALS.find((interval) => interval.id === size)?.label ?? size;
  return INTERVALS.find((interval) => interval.size === size)?.label ?? `${size}th`;
}

function intervalsForLevel(level) {
  const allowed = LEVEL_INTERVALS[level] || LEVEL_INTERVALS.N5;
  return allowed
    .filter((item) => typeof item === "number")
    .map((size) => INTERVALS.find((interval) => interval.size === size))
    .filter(Boolean);
}

function answerOptionsForQuestion(question, level) {
  if (question.typedMode) return [];
  return intervalsForLevel(level).map((interval) => ({ id: interval.size, label: interval.label }));
}

function yForStep(top, step) {
  return top + STAFF.gap * 4 - step * (STAFF.gap / 2);
}

function stepFromSvgY(y, top) {
  return clamp(Math.round((top + STAFF.gap * 4 - y) / (STAFF.gap / 2)), NOTES[0].step, NOTES.at(-1).step);
}

function indexFromStep(step) {
  return NOTES.findIndex((note) => note.step === step);
}

function stemDown(step) {
  return step > 4;
}

function getStem(x, y, step, forcedDown = null) {
  const down = forcedDown ?? stemDown(step);
  const stemX = down ? x - NOTE.rx + 2.5 : x + NOTE.rx - 2.5;
  const stemEndY = down ? y + NOTE.stemLength : y - NOTE.stemLength;
  return { down, stemX, stemEndY };
}

function isPlainIntervalQuestion(startIndex, endIndex) {
  const label = intervalNameFromHalfSteps(startIndex, endIndex);
  return !label.startsWith("Augmented") && !label.startsWith("Diminished") && label !== "Tritone";
}

function makeIdentifyQuestion(level = "N5") {
  if (level === "AH" && Math.random() < 0.4) {
    const weightedInterval = randomItem(CHROMATIC_INTERVAL_WEIGHTS);
    const interval = weightedInterval || CHROMATIC_INTERVALS.find((item) => item.id.startsWith("tritone"));
    const keySignature = KEY_SIGNATURES[interval.key].accidentals;
    const answer = chromaticQuestionAnswer(interval, keySignature);

    return {
      id: Math.random().toString(36).slice(2),
      type: "identify",
      chromatic: true,
      typedMode: true,
      startIndex: interval.startIndex,
      endIndex: interval.endIndex,
      intervalSize: answer,
      answer,
      direction: "higher",
      targetAccidental: interval.targetAccidental || null,
      keySignature,
    };
  }

  const interval = randomItem(intervalsForLevel(level));
  const distance = interval.size - 1;
  const direction = Math.random() < 0.5 ? "higher" : "lower";
  const possibleStarts = NOTES.map((_, index) => index).filter((index) => {
    const endIndex = direction === "higher" ? index + distance : index - distance;
    return endIndex >= 0 && endIndex < NOTES.length && isPlainIntervalQuestion(index, endIndex);
  });
  const startIndex = randomItem(possibleStarts);
  const endIndex = direction === "higher" ? startIndex + distance : startIndex - distance;

  return {
    id: Math.random().toString(36).slice(2),
    type: "identify",
    typedMode: Math.random() < 0.35,
    startIndex,
    endIndex,
    intervalSize: interval.size,
    direction,
    answer: interval.label,
  };
}

function makeCreateQuestion(level = "N5") {
  const validQuestions = [];

  intervalsForLevel(level).forEach((interval) => {
    const distance = interval.size - 1;
    NOTES.forEach((_, startIndex) => {
      if (startIndex + distance < NOTES.length) {
        validQuestions.push({ type: "create", startIndex, targetIndex: startIndex + distance, intervalSize: interval.size, direction: "higher" });
      }
      if (startIndex - distance >= 0) {
        validQuestions.push({ type: "create", startIndex, targetIndex: startIndex - distance, intervalSize: interval.size, direction: "lower" });
      }
    });
  });

  return { id: Math.random().toString(36).slice(2), ...randomItem(validQuestions) };
}

function createQuestion(mode = "identify", level = "N5") {
  return mode === "create" ? makeCreateQuestion(level) : makeIdentifyQuestion(level);
}

function pickQuestionMode(enabledModes) {
  const availableModes = [];
  if (enabledModes.identify) availableModes.push("identify");
  if (enabledModes.create) availableModes.push("create");
  return randomItem(availableModes.length ? availableModes : ["identify", "create"]);
}

function playFeedbackSound(correct, celebration = false, medal = null) {
  window.MLH?.playFeedbackSound?.(correct, celebration, medal);
}

function LedgerLines({ x, step, colour = "currentColor" }) {
  const lines = [];
  if (step <= -2) lines.push(yForStep(STAFF.trebleTop, -2));
  if (step >= 10) lines.push(yForStep(STAFF.trebleTop, 10));

  return (
    <g pointerEvents="none">
      {lines.map((y) => (
        <line key={y} x1={x - 22} x2={x + 22} y1={y} y2={y} stroke={colour} strokeWidth="1.5" />
      ))}
    </g>
  );
}

function RhythmNote({ x, y, step, colour = "currentColor", opacity = 1, preview = false, scale = 1 }) {
  const stem = getStem(x, y, step);

  return (
    <g opacity={opacity} pointerEvents="none" transform={scale !== 1 ? `translate(${x} ${y}) scale(${scale}) translate(${-x} ${-y})` : undefined}>
      <text className="music-symbol" x={x} y={y} fontSize="82" textAnchor="middle" fill={colour}>{GLYPH.noteheadBlack}</text>
      <line x1={stem.stemX} x2={stem.stemX} y1={y} y2={stem.stemEndY} stroke={colour} strokeWidth="2" />
    </g>
  );
}

function Staff({ gradientId = "intervalStaffFade" }) {
  return (
    <g>
      <defs>
        <linearGradient id={gradientId} x1={STAFF.left} y1="0" x2={STAFF.right} y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stopColor="#000" stopOpacity="1" />
          <stop offset="86%" stopColor="#000" stopOpacity="1" />
          <stop offset="100%" stopColor="#000" stopOpacity="0" />
        </linearGradient>
      </defs>
      {[0, 1, 2, 3, 4].map((line) => (
        <line key={line} x1={STAFF.left} x2={STAFF.right} y1={STAFF.trebleTop + line * STAFF.gap} y2={STAFF.trebleTop + line * STAFF.gap} stroke={`url(#${gradientId})`} strokeWidth="1.5" />
      ))}
      <text className="music-symbol" x={STAFF.left + 45} y={STAFF.trebleTop + 63} fontSize="83.232" textAnchor="middle" fill="currentColor">{GLYPH.trebleClef}</text>
    </g>
  );
}

function accidentalSize(type) {
  return type === "sharp" ? { width: 28, height: 54 } : { width: 28, height: 49 };
}

function accidentalY(type, step) {
  return yForStep(STAFF.trebleTop, step) + (type === "sharp" ? -27 : -35);
}

function KeySignature({ signature = [] }) {
  return (
    <g pointerEvents="none">
      {signature.map((item, index) => {
        const size = accidentalSize(item.type);
        const x = STAFF.left + 92 + index * 30;
        return (
          <image
            key={`${item.type}-${item.step}-${index}`}
            href={item.type === "sharp" ? ASSET.sharp : ASSET.flat}
            x={x}
            y={accidentalY(item.type, item.step)}
            {...size}
            preserveAspectRatio="xMidYMid meet"
          />
        );
      })}
    </g>
  );
}

function HelpLabels({ visible }) {
  if (!visible) return null;
  const lineLabelX = STAFF.left - 11;
  const spaceLabelX = STAFF.left + 16;
  const data = NOTE_NAME_LABELS.treble;

  return (
    <g fontSize="14" fontFamily="system-ui, sans-serif" fontWeight="700" dominantBaseline="middle" pointerEvents="none" fill="black">
      {data.lines.map((note) => (
        <text key={`line-${note.step}`} x={lineLabelX} y={yForStep(data.top, note.step) + 5} textAnchor="start">{note.letter}</text>
      ))}
      {data.spaces.map((note) => (
        <text key={`space-${note.step}`} x={spaceLabelX} y={yForStep(data.top, note.step) + 5} textAnchor="end">{note.letter}</text>
      ))}
    </g>
  );
}

function IntervalHelpNumbers({ question, startX, secondX }) {
  if (question.chromatic) return null;
  const endIndex = question.type === "identify" ? question.endIndex : question.targetIndex;
  const noteCount = Math.abs(endIndex - question.startIndex) + 1;
  const direction = endIndex >= question.startIndex ? 1 : -1;
  const totalDistance = Math.max(1, Math.abs(endIndex - question.startIndex));

  return (
    <g fontSize="22" fontWeight="500" fill="black" opacity="0.25" pointerEvents="none">
      {Array.from({ length: noteCount }, (_, countIndex) => {
        const noteIndex = question.startIndex + countIndex * direction;
        const note = noteByIndex(noteIndex);
        const x = startX + ((secondX - startX) * countIndex) / totalDistance;
        return <text key={`${note.name}-${countIndex}`} x={x + 26} y={yForStep(STAFF.trebleTop, note.step) + 7} textAnchor="middle">{countIndex + 1}</text>;
      })}
    </g>
  );
}

function Note({ x, note, colour = "currentColor", opacity = 1, preview = false, scale = 1, accidental = null }) {
  const y = yForStep(STAFF.trebleTop, note.step);
  return (
    <g>
      <LedgerLines x={x} step={note.step} colour={colour} />
      {accidental && <image href={accidental === "sharp" ? ASSET.sharp : ASSET.flat} x={x - 42} y={accidentalY(accidental, note.step)} {...accidentalSize(accidental)} preserveAspectRatio="xMidYMid meet" pointerEvents="none" />}
      <RhythmNote x={x} y={y} step={note.step} colour={colour} opacity={opacity} preview={preview} scale={scale} />
    </g>
  );
}

function ScoreArea({ question, mode, showHelp, hoverIndex, selectedIndex, feedback, selectedAnswer, touchPreview, activeLevel, mobileZoom = false, onPointerMove, onPointerDown, onPointerUp, onPointerCancel }) {
  const startX = mode === "identify" ? 392 : 382;
  const secondX = mode === "identify" ? 536 : 536;
  const startNote = noteByIndex(question.startIndex);
  const targetIndex = mode === "identify" ? question.endIndex : question.targetIndex;
  const targetNote = noteByIndex(targetIndex);
  const workingIndex = selectedIndex ?? hoverIndex;
  const workingNote = mode === "create" && workingIndex != null ? noteByIndex(workingIndex) : null;
  const selectedNote = mode === "create" && selectedIndex != null ? noteByIndex(selectedIndex) : null;
  const correctIdentifyAnswer = question.answer ?? question.intervalSize;
  const identifyCorrect = feedback && mode === "identify" && selectedAnswer === correctIdentifyAnswer && activeLevel !== "N5";
  const identifyIncorrect = feedback && mode === "identify" && selectedAnswer !== correctIdentifyAnswer;
  const createCorrect = feedback && mode === "create" && selectedIndex === question.targetIndex;
  const createIncorrect = feedback && mode === "create" && selectedIndex !== question.targetIndex;

  const viewBox = mobileZoom ? { x: 195, y: 112, width: SVG.width / 1.806, height: SVG.height / 1.806 } : { x: 0, y: 0, width: SVG.width, height: SVG.height };

  return (
    <svg viewBox={`${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`} className="h-auto w-full select-none overflow-visible">
      <rect width={SVG.width} height={SVG.height} fill="white" />
      <Staff gradientId={mobileZoom ? "intervalStaffFadeMobile" : "intervalStaffFadeDesktop"} />
      <KeySignature signature={question.keySignature} />

      <Note x={startX} note={startNote} />

      {mode === "identify" && (
        <>
          <Note
            x={secondX}
            note={targetNote}
            accidental={question.targetAccidental}
            colour="currentColor"
          />
          {showHelp && <IntervalHelpNumbers question={question} startX={startX} secondX={secondX} />}
        </>
      )}

      {mode === "create" && !feedback && workingNote && (
        <Note x={secondX} note={workingNote} colour={selectedIndex == null ? COLOUR.preview : "currentColor"} opacity={selectedIndex == null ? 0.55 : 1} preview={selectedIndex == null} />
      )}

      {mode === "create" && createCorrect && selectedNote && <Note x={secondX} note={selectedNote} colour={COLOUR.green} />}

      {mode === "create" && createIncorrect && selectedNote && (
        <>
          <Note x={secondX - 34} note={selectedNote} colour={COLOUR.red} opacity={0.45} />
          <Note x={secondX + 34} note={targetNote} colour={COLOUR.green} />
        </>
      )}

      {mode === "create" && showHelp && !feedback && workingIndex != null && workingNote && (
        <IntervalHelpNumbers
          question={{ ...question, type: "create", targetIndex: workingIndex }}
          startX={startX}
          secondX={secondX}
        />
      )}

      {mode === "create" && (
        <rect
          x={secondX - 60}
          y={STAFF.trebleTop - 72}
          width="120"
          height="220"
          fill="transparent"
          pointerEvents="all"
          className="touch-none"
          style={{ touchAction: "none" }}
          onPointerDown={onPointerDown}
          onPointerMove={onPointerMove}
          onPointerUp={onPointerUp}
          onPointerCancel={onPointerCancel}
        />
      )}

      {touchPreview?.active && touchPreview.step != null && !feedback && mode === "create" && (
        <g pointerEvents="none">
          <line x1={STAFF.left - 14} x2={STAFF.right + 14} y1={yForStep(STAFF.trebleTop, touchPreview.step)} y2={yForStep(STAFF.trebleTop, touchPreview.step)} stroke="black" strokeWidth="1.5" strokeDasharray="5 5" opacity="0.55" />
          <Note x={touchPreview.x} note={noteByIndex(indexFromStep(touchPreview.step))} colour="black" opacity={0.86} preview scale={1.65} />
        </g>
      )}
    </svg>
  );
}

function getStreakMedal(streak) {
  if (streak >= 30) return { emoji: "💎", bg: "bg-cyan-400/25", text: "text-cyan-500", sound: "platinum" };
  if (streak >= 20) return { emoji: "🥇", bg: "bg-yellow-400/25", text: "text-yellow-500", sound: "gold" };
  if (streak >= 15) return { emoji: "🥈", bg: "bg-slate-300/30", text: "text-slate-500", sound: "silver" };
  if (streak >= 10) return { emoji: "🥉", bg: "bg-amber-700/20", text: "text-amber-700", sound: "bronze" };
  return null;
}

function ScorePanel({ correct, attempted, accuracy, streak, bestStreak, confettiKey, resetScore }) {
  return (
    <window.MLH.ScoreStreakPanel
      assets={ASSET}
      correct={correct}
      attempted={attempted}
      accuracy={accuracy}
      streak={streak}
      bestStreak={bestStreak}
      resetScore={resetScore}
      confettiKey={confettiKey}
    />
  );
}

function MenuRows({ enabledModes, setEnabledModes, newQuestion, showHelp, setShowHelp }) {
  function toggleMode(modeId) {
    setEnabledModes((current) => {
      const next = { ...current, [modeId]: !current[modeId] };
      const hasAtLeastOne = next.identify || next.create;
      if (!hasAtLeastOne) return current;
      window.setTimeout(() => newQuestion(next), 0);
      return next;
    });
  }

  return (
    <>
      <window.MLH.MenuToggleRow
        glyph={
          <span className="inline-flex h-[24px] w-[34px] shrink-0 items-center justify-center bg-transparent">
            <img src="https://mrtennant-music.github.io/musicliteracy/trebleclef.svg?v=1.1" alt="" aria-hidden="true" className="h-[24px] w-[24px] object-contain" />
          </span>
        }
        label="Identify"
        checked={enabledModes.identify}
        onChange={() => toggleMode("identify")}
      />
      <window.MLH.MenuToggleRow
        glyph={<span className="inline-flex h-[24px] w-[34px] shrink-0 items-center justify-center"><img src="https://mrtennant-music.github.io/musicliteracy/crotchet.svg?v=1.1" alt="" aria-hidden="true" className="h-[24px] w-[24px] object-contain" /></span>}
        label="Create"
        checked={enabledModes.create}
        onChange={() => toggleMode("create")}
      />
      <window.MLH.MenuToggleRow
        glyph={<span className="inline-flex h-[24px] w-[34px] shrink-0 items-center justify-center text-[10px] font-black leading-none text-stone-700">123</span>}
        label="Show Step Counter"
        checked={showHelp}
        onChange={() => setShowHelp((value) => !value)}
      />
    </>
  );
}

function IntervalOptions({ selectedAnswer, disabled, onSelect, feedback, question, level }) {
  const options = answerOptionsForQuestion(question, level);
  const correctAnswer = question.intervalSize;
  return (
    <div className="flex flex-wrap gap-2">
      {options.map((option) => {
        const isSelected = selectedAnswer === option.id;
        const isCorrect = correctAnswer === option.id;
        let buttonClass = "border-stone-300 bg-white text-stone-900";

        if (feedback) {
          if (isCorrect) {
            buttonClass = "border-green-700 bg-green-600 text-white";
          } else if (isSelected && !isCorrect) {
            buttonClass = "border-red-700 bg-red-600 text-white";
          } else {
            buttonClass = "border-stone-300 bg-white text-stone-900 opacity-60";
          }
        } else if (isSelected) {
          buttonClass = "border-stone-950 bg-stone-950 text-white";
        }

        return (
          <button
            key={option.id}
            type="button"
            disabled={disabled}
            onClick={() => onSelect(option.id)}
            className={`flex h-[48px] min-w-[68px] items-center justify-center rounded-xl border px-3 text-sm font-bold transition ${buttonClass}`}
          >
            {option.label}
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const initialLevel = useMemo(() => {
    const requested = new URLSearchParams(window.location.search).get("level");
    return LEVELS[requested] ? requested : "N5";
  }, []);
  const initialQuestionMode = useMemo(() => initialLevel === "N5" ? "identify" : pickQuestionMode({ identify: true, create: true }), [initialLevel]);
  const [activeLevel, setActiveLevel] = useState(initialLevel);
  const [enabledModes, setEnabledModes] = useState({ identify: true, create: true });
  const [mode, setMode] = useState(initialQuestionMode);
  const [question, setQuestion] = useState(() => createQuestion(initialQuestionMode, initialLevel));
  const [questionVisible, setQuestionVisible] = useState(true);
  const [customiseOpen, setCustomiseOpen] = useState(false);
  const [levelOpen, setLevelOpen] = useState(false);
  const [showHelp, setShowHelp] = useState(false);
  const [hoverIndex, setHoverIndex] = useState(null);
  const [selectedIndex, setSelectedIndex] = useState(null);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [typedAnswer, setTypedAnswer] = useState("");
  const [typedResult, setTypedResult] = useState(null);
  const [touchPreview, setTouchPreview] = useState(null);
  const [feedback, setFeedback] = useState(null);
  const [feedbackFading, setFeedbackFading] = useState(false);
  const [prompt, setPrompt] = useState("");
  const [correct, setCorrect] = useState(0);
  const [attempted, setAttempted] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [confettiKey, setConfettiKey] = useState(0);

  const customiseRef = useRef(null);
  const levelRef = useRef(null);
  const feedbackFadeTimerRef = useRef(null);
  const feedbackNextTimerRef = useRef(null);
  const questionTimerRef = useRef(null);
  const keyboard = window.MLH.useKeyboardReset();

  React.useEffect(() => window.MLH?.installPhoneLandscapeLock?.(), []);

  window.MLH.useClickOutside(
    [customiseRef, levelRef],
    [() => customiseOpen && setCustomiseOpen(false), () => levelOpen && setLevelOpen(false)],
  );

  const accuracy = attempted === 0 ? 0 : Math.round((correct / attempted) * 100);
  const canConfirm = mode === "create" ? selectedIndex != null && !feedback : false;
  const instruction = mode === "identify"
    ? <>Name the <strong>interval</strong>.</>
    : <>Create an interval <strong>{intervalLabel(question.intervalSize).toLowerCase()}</strong> <strong>{question.direction}</strong> than the note given.</>;

  function resetTask(nextQuestion = question) {
    setQuestion(nextQuestion);
    setHoverIndex(null);
    setSelectedIndex(null);
    setSelectedAnswer(null);
    setTypedAnswer("");
    setTypedResult(null);
    setTouchPreview(null);
    setFeedback(null);
    setFeedbackFading(false);
    setPrompt("");
  }

  function clearFeedbackTimers() {
    if (feedbackFadeTimerRef.current) {
      window.clearTimeout(feedbackFadeTimerRef.current);
      feedbackFadeTimerRef.current = null;
    }
    if (feedbackNextTimerRef.current) {
      window.clearTimeout(feedbackNextTimerRef.current);
      feedbackNextTimerRef.current = null;
    }
    if (questionTimerRef.current) {
      window.clearTimeout(questionTimerRef.current);
      questionTimerRef.current = null;
    }
  }

  function newQuestion(nextEnabledModes = enabledModes, nextLevel = activeLevel) {
    clearFeedbackTimers();
    setQuestionVisible(false);
    questionTimerRef.current = window.setTimeout(() => {
      const nextMode = nextLevel === "N5" ? "identify" : pickQuestionMode(nextEnabledModes);
      setMode(nextMode);
      resetTask(createQuestion(nextMode, nextLevel));
      setQuestionVisible(true);
      questionTimerRef.current = null;
    }, 260);
  }

  function resetScore() {
    clearFeedbackTimers();
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    setTypedAnswer("");
    setTypedResult(null);
    newQuestion(enabledModes);
  }

  function applyLevel(levelKey) {
    clearFeedbackTimers();
    setActiveLevel(levelKey);
    setLevelOpen(false);
    setCorrect(0);
    setAttempted(0);
    setStreak(0);
    setBestStreak(0);
    setConfettiKey(0);
    setTypedAnswer("");
    setTypedResult(null);
    setQuestionVisible(false);
    window.setTimeout(() => {
      const nextMode = levelKey === "N5" ? "identify" : pickQuestionMode(enabledModes);
      setMode(nextMode);
      resetTask(createQuestion(nextMode, levelKey));
      setQuestionVisible(true);
    }, 260);
  }

  function fadeToNextQuestion() {
    if (!feedback || feedback.correct || feedbackFading) return;
    clearFeedbackTimers();
    setFeedbackFading(true);
    feedbackNextTimerRef.current = window.setTimeout(() => {
      newQuestion(enabledModes, activeLevel);
      feedbackNextTimerRef.current = null;
    }, 280);
  }

  function skipCorrectFeedback() {
    if (!feedback || !feedback.correct) return;
    clearFeedbackTimers();
    newQuestion(enabledModes, activeLevel);
  }

  function scoreAnswer(isCorrect) {
    const nextStreak = isCorrect ? streak + 1 : 0;
    playFeedbackSound(isCorrect);
    setAttempted((value) => value + 1);
    setCorrect((value) => value + (isCorrect ? 1 : 0));
    setStreak(nextStreak);
    setBestStreak((value) => Math.max(value, nextStreak));
    setFeedback({ correct: isCorrect });

    if (isCorrect && [10, 15, 20, 30].includes(nextStreak)) {
      const medal = getStreakMedal(nextStreak);
      setConfettiKey((value) => value + 1);
      window.setTimeout(() => playFeedbackSound(true, true, medal.sound), 180);
    }

    if (isCorrect) {
      clearFeedbackTimers();
      setFeedbackFading(false);
      feedbackFadeTimerRef.current = window.setTimeout(() => {
        setFeedbackFading(true);
        feedbackFadeTimerRef.current = null;
      }, 1700);
      feedbackNextTimerRef.current = window.setTimeout(() => {
        newQuestion(enabledModes, activeLevel);
        feedbackNextTimerRef.current = null;
      }, 2000);
    }
  }

  function selectInterval(intervalSize) {
    if (feedback || mode !== "identify") return;
    setSelectedAnswer(intervalSize);
    scoreAnswer(intervalSize === question.intervalSize);
  }

  function submitTypedAnswer() {
    if (feedback || mode !== "identify" || !question.typedMode) return;
    const correct = question.chromatic ? answerMatchesLabel(typedAnswer, question.answer, true) : intervalAnswerMatches(typedAnswer, question.answer);
    setTypedResult(correct ? null : typedFeedbackLabel(question));
    scoreAnswer(correct);
  }

  function confirmAnswer() {
    if (feedback || mode !== "create") return;
    if (selectedIndex == null) {
      setPrompt("Place the second note first.");
      return;
    }
    scoreAnswer(selectedIndex === question.targetIndex);
  }

  function pointerToSvg(event) {
    const svg = event.currentTarget.ownerSVGElement;
    const rect = svg.getBoundingClientRect();
    const viewBox = svg.viewBox.baseVal;
    return {
      x: viewBox.x + ((event.clientX - rect.left) / rect.width) * viewBox.width,
      y: viewBox.y + ((event.clientY - rect.top) / rect.height) * viewBox.height,
    };
  }

  function getPointerIndex(event) {
    const pointer = pointerToSvg(event);
    const touchOffset = event.pointerType === "touch" ? 64 : 0;
    const step = stepFromSvgY(pointer.y - touchOffset, STAFF.trebleTop);
    const index = indexFromStep(step);
    return { pointer, step, index: index === -1 ? null : index };
  }

  function handlePointerMove(event) {
    if (feedback || mode !== "create") return;
    const { pointer, step, index } = getPointerIndex(event);
    if (index == null) return;
    setHoverIndex(index);

    if (touchPreview?.active) {
      setTouchPreview((current) => ({ ...(current ?? {}), active: true, x: pointer.x, y: pointer.y, step, index, dragged: true }));
    }
  }

  function handlePointerDown(event) {
    event.preventDefault();
    event.currentTarget.setPointerCapture?.(event.pointerId);

    if (feedback && !feedback.correct) {
      fadeToNextQuestion();
      return;
    }

    if (mode !== "create") return;
    const { pointer, step, index } = getPointerIndex(event);
    if (index == null) return;
    setHoverIndex(index);
    setTouchPreview({ active: true, x: pointer.x, y: pointer.y, step, index, dragged: false });
  }

  function handlePointerUp(event) {
    if (feedback || mode !== "create") return;
    event.preventDefault();
    event.currentTarget.releasePointerCapture?.(event.pointerId);

    if (touchPreview?.index != null) {
      setSelectedIndex(touchPreview.index);
      setHoverIndex(touchPreview.index);
      setPrompt("");
    }

    setTouchPreview(null);
  }

  function handlePointerCancel() {
    setTouchPreview(null);
  }

  function moveSelected(direction) {
    if (feedback || mode !== "create") return;
    const current = selectedIndex ?? hoverIndex ?? question.startIndex;
    const next = clamp(current + direction, 0, NOTES.length - 1);
    setSelectedIndex(next);
    setHoverIndex(next);
    setPrompt("");
  }

  React.useEffect(() => () => clearFeedbackTimers(), []);

  return (
    <div className={SHELL.pageShellClass}>
      <window.MLH.AppHeader icon={ASSET.appIcon} title="Intervals" subtitle="Identify and create intervals.">
        <ScorePanel correct={correct} attempted={attempted} accuracy={accuracy} streak={streak} bestStreak={bestStreak} confettiKey={confettiKey} resetScore={resetScore} />
      </window.MLH.AppHeader>

      <div className={SHELL.pageContentClass}>
        <main className={SHELL.mainShellClass} onPointerDown={() => {
          if (feedback && feedback.correct) {
            skipCorrectFeedback();
            return;
          }
          if (feedback && !feedback.correct) fadeToNextQuestion();
        }}>
          <div className="relative z-20 mb-2.5 grid grid-cols-[auto_minmax(0,1fr)_auto] items-center gap-2 overflow-visible">
            <div className="flex items-center gap-2 overflow-visible">
              <div className="relative" ref={levelRef}>
                <window.MLH.LevelButton
                  icon={<img src={ASSET.level} alt="" aria-hidden="true" className="h-[26px] w-[28px] object-contain scale-[1.06]" />}
                  activeLabel={LEVELS[activeLevel]?.label || activeLevel}
                  activeLevel={activeLevel}
                  onClick={() => {
                    setCustomiseOpen(false);
                    setLevelOpen((value) => !value);
                  }}
                />
                {levelOpen && (
                  <window.MLH.MenuPanel title="Level" position="left-0">
                    <window.MLH.LevelMenu activeLevel={activeLevel} onSelect={applyLevel} levels={LEVELS} />
                  </window.MLH.MenuPanel>
                )}
              </div>

              <div className="relative" ref={customiseRef}>
                <window.MLH.CustomiseButton
                  icon={<img src={ASSET.customise} alt="" aria-hidden="true" className="h-[21px] w-[21px]" />}
                  onClick={() => {
                    setLevelOpen(false);
                    setCustomiseOpen((value) => !value);
                  }}
                />
                {customiseOpen && (
                  <window.MLH.MenuPanel title="Customise" position="-left-[66px] sm:left-0" variant="customise">
                    <MenuRows enabledModes={enabledModes} setEnabledModes={setEnabledModes} newQuestion={(nextModes) => newQuestion(nextModes, activeLevel)} showHelp={showHelp} setShowHelp={setShowHelp} />
                  </window.MLH.MenuPanel>
                )}
              </div>
            </div>

            <div className="flex h-10 items-center justify-center">
              {feedback && <window.MLH.FeedbackBadge feedback={feedback} fading={feedbackFading} animationPrefix="note" />}
            </div>

            <window.MLH.SkipButton resetStreak={() => setStreak(0)} onClick={() => newQuestion(enabledModes, activeLevel)} icon={<img src={ASSET.next} alt="" aria-hidden="true" className="h-[27.8px] w-[27.8px] object-contain" />} />
          </div>

          {mode === "create" && isTouchDevice && !customiseOpen && !levelOpen && (
            <p className="relative z-20 mb-2 text-center text-[0.74rem] font-light leading-tight tracking-normal text-stone-600" style={{ opacity: 0.45 }}>
              Press and hold to drag note into place.
            </p>
          )}

          <div className={`absolute inset-x-3 top-[92px] flex items-center justify-center overflow-hidden transition-opacity duration-300 sm:relative sm:inset-auto sm:-top-[55px] sm:block sm:overflow-visible ${mode === "identify" && question.typedMode ? "bottom-[206px]" : "bottom-[136px]"} ${questionVisible ? "opacity-100" : "opacity-0"}`}>
            <div className="w-full sm:hidden">
              <ScoreArea
                question={question}
                mode={mode}
                showHelp={showHelp}
                hoverIndex={hoverIndex}
                selectedIndex={selectedIndex}
                selectedAnswer={selectedAnswer}
                feedback={feedback}
                touchPreview={touchPreview}
                activeLevel={activeLevel}
                mobileZoom
                onPointerMove={handlePointerMove}
                onPointerDown={handlePointerDown}
                onPointerUp={handlePointerUp}
                onPointerCancel={handlePointerCancel}
              />
            </div>
            <div className="hidden w-full sm:block">
              <ScoreArea
                question={question}
                mode={mode}
                showHelp={showHelp}
                hoverIndex={hoverIndex}
                selectedIndex={selectedIndex}
                selectedAnswer={selectedAnswer}
                feedback={feedback}
                touchPreview={touchPreview}
                activeLevel={activeLevel}
                onPointerMove={handlePointerMove}
                onPointerDown={handlePointerDown}
                onPointerUp={handlePointerUp}
                onPointerCancel={handlePointerCancel}
              />
            </div>
          </div>



          <div className={`absolute bottom-[12px] left-3 right-3 z-10 flex flex-col overflow-hidden rounded-xl border border-stone-200 bg-stone-50 p-3 shadow-md sm:relative sm:bottom-auto sm:left-auto sm:right-auto sm:mt-3 sm:p-4 md:-mt-[168px] md:mx-3 ${mode === "identify" && question.typedMode ? "min-h-0 max-sm:pb-[17px]" : "min-h-[112px]"}`}>
            <div className="space-y-3 text-stone-900">
              <p className={`text-base font-semibold leading-tight ${activeLevel === "AH" ? "relative -top-[4px]" : ""}`}>{instruction}</p>
              {prompt && <p className="text-sm font-medium text-red-700">{prompt}</p>}
            </div>

            <div className={mode === "identify" && question.typedMode ? "w-full" : "mt-auto w-full"}>
              {mode === "identify" && !question.typedMode && <IntervalOptions selectedAnswer={selectedAnswer} disabled={Boolean(feedback)} onSelect={selectInterval} feedback={feedback} question={question} level={activeLevel} />}

              {mode === "identify" && question.typedMode && (
                <div className="relative flex w-full flex-col gap-3 max-sm:top-[5px]">
                  <div className="relative flex min-w-0 w-full flex-col gap-2 max-sm:top-[6px] sm:flex-row sm:items-center">
                    <input
                      type="text"
                      value={typedAnswer}
                      onFocus={keyboard.onFocus}
                      onBlur={keyboard.onBlur}
                      onChange={(event) => setTypedAnswer(event.target.value)}
                      onKeyDown={(event) => {
                        if (event.key === "Enter") {
                          event.preventDefault();
                          submitTypedAnswer();
                        }
                      }}
                      placeholder="Type your answer"
                      className={`min-w-0 w-full rounded-xl border border-stone-300 bg-white px-4 py-3 text-[1.05rem] font-normal outline-none ${feedback ? feedback.correct ? "text-green-600" : "text-red-600" : "text-stone-900"}`}
                      disabled={Boolean(feedback)}
                    />
                    {typedResult && <div className="shrink-0 whitespace-nowrap text-[1.05rem] font-semibold text-green-600 sm:ml-3">{typedResult}</div>}
                  </div>
                  <div className="flex w-full justify-end pt-1">
                    <button type="button" onClick={submitTypedAnswer} disabled={Boolean(feedback) || !typedAnswer.trim()} className="w-full rounded-xl border border-black bg-black px-[22px] py-[10px] text-sm font-bold text-white disabled:opacity-60 sm:w-auto">Confirm</button>
                  </div>
                </div>
              )}

              <div className="absolute bottom-4 right-4 flex shrink-0 justify-end gap-2">
                {mode === "create" && <button type="button" disabled={!canConfirm} onClick={confirmAnswer} className="rounded-xl border border-black bg-black px-[22px] py-[10px] text-sm font-bold text-white disabled:opacity-60">Confirm</button>}
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script src="./footer.js?v=1.3"></script>
</body>
</html>
