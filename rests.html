  "3/4": [["minim", "crotchet"], ["crotchet", "minim"], ["crotchet", "crotchet", "crotchet"], ["quaver-group-2", "crotchet", "crotchet"], ["crotchet", "quaver-group-2", "crotchet"], ["crotchet", "crotchet", "quaver-group-2"], ["semiquaver-group-4", "crotchet", "crotchet"], ["crotchet", "semiquaver-group-4", "crotchet"], ["crotchet", "crotchet", "semiquaver-group-4"], ["quaver-2semiquavers", "crotchet", "crotchet"], ["crotchet", "2semiquavers-quaver", "crotchet"], ["crotchet", "crotchet", "dotted-quaver-semiquaver"], ["dotted-crotchet", "quaver", "crotchet"], ["crotchet", "dotted-crotchet", "quaver"]],
  "4/4": [["minim", "minim"], ["minim", "crotchet", "crotchet"], ["crotchet", "crotchet", "minim"], ["crotchet", "crotchet", "crotchet", "crotchet"], ["quaver-group-2", "crotchet", "crotchet", "crotchet"], ["crotchet", "quaver-group-2", "crotchet", "crotchet"], ["crotchet", "crotchet", "quaver-group-2", "crotchet"], ["crotchet", "crotchet", "crotchet", "quaver-group-2"], ["quaver-group-2", "quaver-group-2", "minim"], ["minim", "quaver-group-2", "quaver-group-2"], ["semiquaver-group-4", "crotchet", "crotchet", "crotchet"], ["crotchet", "quaver-2semiquavers", "crotchet", "crotchet"], ["crotchet", "crotchet", "2semiquavers-quaver", "crotchet"], ["crotchet", "crotchet", "crotchet", "dotted-quaver-semiquaver"], ["dotted-crotchet", "quaver", "minim"], ["quaver", "dotted-crotchet", "minim"], ["minim", "dotted-crotchet", "quaver"], ["minim", "quaver", "dotted-crotchet"], ["crotchet", "dotted-crotchet", "quaver", "crotchet"]],

const COMPOUND_BEAT_PATTERNS = [
  { pattern: ["dotted-crotchet"], weight: 4 },
  { pattern: ["crotchet", "quaver"], weight: 4 },
  { pattern: ["quaver", "crotchet"], weight: 4 },

function randomIndex(length) { return Math.floor(Math.random() * length); }
function randomItem(items) { return items[randomIndex(items.length)]; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function rhythmInfo(rhythm) { return RHYTHM_INFO[rhythm] ?? RHYTHM_INFO.crotchet; }
function noteByIndex(index) { return NOTES[clamp(index, 0, NOTES.length - 1)]; }
function yForStep(step, systemTop) { return systemTop + LINE_GAP * 4 - step * (LINE_GAP / 2); }
function stemGoesDown(step) { return step > 4; }
function weightedItem(items) { return randomItem(items.flatMap((item) => Array.from({ length: item.weight }, () => item.pattern))); }
function initialLevelFromUrl() {
  const requested = new URLSearchParams(window.location.search).get("level") || "H";
  return LEVELS[requested] ? requested : "H";
}
function levelTimeTypes(levelKey) {
  const ids = LEVELS[levelKey]?.timeSignatureIds || LEVELS.H.timeSignatureIds;
  return {
    simple: ids.some((id) => TIME_SIGNATURES.find((signature) => signature.id === id)?.type === "simple"),
    compound: ids.some((id) => TIME_SIGNATURES.find((signature) => signature.id === id)?.type === "compound"),
  };
}
function defaultEnabledOptions(levelKey) {
  const level = LEVELS[levelKey] || LEVELS.H;
  return Object.fromEntries([
    ...level.timeSignatureIds.map((id) => [`time-${id}`, true]),
    ...REST_OPTION_IDS.map((id) => [`rest-${id}`, true]),
  ]);
}
function taskMatchesLevel(levelKey, enabledOptions) {
  const official = defaultEnabledOptions(levelKey);
  const keys = new Set([...Object.keys(official), ...Object.keys(enabledOptions)]);
  return [...keys].every((key) => Boolean(enabledOptions[key]) === Boolean(official[key]));
}
function enabledTimeSignatureIds(levelKey, enabledOptions) {
  const level = LEVELS[levelKey] || LEVELS.H;
  const ids = level.timeSignatureIds.filter((id) => enabledOptions?.[`time-${id}`]);
  return ids.length ? ids : level.timeSignatureIds;
}
function enabledRestIds(enabledOptions) {
  const ids = REST_OPTION_IDS.filter((id) => enabledOptions?.[`rest-${id}`]);
  return ids.length ? ids : REST_OPTION_IDS;
}
function templateAnswers(template) {
  return template.answers || [template.answer];
}
function weightedSignatureChoice(enabledTimeTypes = { simple: true, compound: true }, allowedTimeSignatureIds = TIME_SIGNATURES.map((signature) => signature.id)) {
  const pool = [];
  TIME_SIGNATURES.filter((signature) => allowedTimeSignatureIds.includes(signature.id) && enabledTimeTypes[signature.type]).forEach((signature) => {
    const copies = Math.max(1, Math.round((signature.weight ?? 1) * 10));
    for (let i = 0; i < copies; i += 1) pool.push(signature);
  });
  const fallback = TIME_SIGNATURES.filter((signature) => allowedTimeSignatureIds.includes(signature.id));
  return randomItem(pool.length ? pool : fallback.length ? fallback : TIME_SIGNATURES);
}

function nearestMelodicIndex(previousIndex, stepwise = false) {
  if (!stepwise) return clamp(previousIndex + randomItem([-2, -1, 0, 0, 1, 2]), 0, NOTES.length - 1);
  if (previousIndex <= 0) return 1;
  if (previousIndex >= NOTES.length - 1) return NOTES.length - 2;
  return previousIndex + randomItem([-1, 1]);
}

function expandRhythmToken(token) {
  if (token === "quaver-group-2") return ["quaver", "quaver"];
  if (token === "quaver-group-3") return ["quaver", "quaver", "quaver"];
  if (token === "semiquaver-group-4") return ["semiquaver", "semiquaver", "semiquaver", "semiquaver"];
  if (token === "quaver-2semiquavers") return ["quaver", "semiquaver", "semiquaver"];
  if (token === "2semiquavers-quaver") return ["semiquaver", "semiquaver", "quaver"];
  if (token === "dotted-quaver-semiquaver") return ["dotted-quaver", "semiquaver"];
  return [token];
}
function shouldExplicitlyBeam(token) { return ["quaver-group-2", "quaver-group-3", "semiquaver-group-4", "quaver-2semiquavers", "2semiquavers-quaver", "dotted-quaver-semiquaver"].includes(token); }

function addNotesFromRhythms(rhythms, previousIndex, options = {}) {
  const notes = [];
  let noteIndex = previousIndex;
  let beamGroupCounter = 0;
  rhythms.forEach((token) => {
    const expanded = expandRhythmToken(token);
    const beamed = shouldExplicitlyBeam(token) && expanded.length > 1;
    const beamGroupId = beamed ? `beam-${beamGroupCounter++}` : undefined;
    expanded.forEach((rhythm) => {
      const stepwise = ["quaver", "semiquaver", "dotted-quaver"].includes(rhythm);
      noteIndex = nearestMelodicIndex(noteIndex, stepwise);
      notes.push({ rhythm, pitch: noteByIndex(noteIndex), beamGroupId: options.disableAutoBeam && !beamed ? null : beamGroupId });
    });
  });
  return { notes, nextIndex: noteIndex };
}

function buildCompoundBar(timeSignature, allowFinalFullNote = false) {
  if (allowFinalFullNote && timeSignature.id === "6/8" && Math.random() < 0.35) return ["dotted-minim"];
  const groups = [];
  for (let i = 0; i < timeSignature.compoundGroups; i += 1) {
    let choice = weightedItem(COMPOUND_BEAT_PATTERNS);
    if (groups.length > 0) {
      const previousGroup = groups[groups.length - 1];
      if (previousGroup[previousGroup.length - 1] === "crotchet" && choice[0] === "crotchet") choice = randomItem([["dotted-crotchet"], ["quaver", "crotchet"]]);
    }
    groups.push(choice);
  }
  return groups.flat();
}

function compoundQuestionForGroup(groupIndex, groupCount) {
  const beforeGroups = Array.from({ length: groupIndex }, () => weightedItem(COMPOUND_BEAT_PATTERNS)).flat();
  const afterGroups = Array.from({ length: groupCount - groupIndex - 1 }, () => weightedItem(COMPOUND_BEAT_PATTERNS)).flat();
  const choices = [
    { answer: "dotted-crotchet-rest", before: [], after: [] },
    { answers: ["crotchet-rest", "quaver-rest"], before: [], after: [] },
    { answer: "crotchet-rest", before: [], after: ["quaver"] },
    { answer: "crotchet-rest", before: ["quaver"], after: [] },
    { answer: "quaver-rest", before: [], after: ["quaver-group-2"] },
    { answer: "quaver-rest", before: ["quaver-group-2"], after: [] },
  ];
  const chosen = randomItem(choices);
  return { answer: chosen.answer, before: [...beforeGroups, ...chosen.before], after: [...chosen.after, ...afterGroups] };
}

function getValidQuestions(timeSignature) {
  if (timeSignature.type === "compound") {
    const result = [{ answer: "semibreve-rest", before: [], after: [], isFullBar: true }];
    for (let groupIndex = 0; groupIndex < timeSignature.compoundGroups; groupIndex += 1) result.push(compoundQuestionForGroup(groupIndex, timeSignature.compoundGroups));
    return result;
  }
  if (timeSignature.id === "2/4") return [
    { answer: "semibreve-rest", before: [], after: [], isFullBar: true }, { answer: "crotchet-rest", before: [], after: ["crotchet"] }, { answer: "crotchet-rest", before: ["crotchet"], after: [] },
    { answers: ["crotchet-rest", "quaver-rest"], before: [], after: ["quaver"] }, { answers: ["quaver-rest", "crotchet-rest"], before: ["quaver"], after: [] },
    { answer: "crotchet-rest", before: [], after: ["quaver-group-2"] }, { answer: "crotchet-rest", before: ["quaver-group-2"], after: [] },
    { answer: "quaver-rest", before: [], after: ["quaver", "crotchet"] }, { answer: "quaver-rest", before: ["quaver"], after: ["crotchet"] }, { answer: "quaver-rest", before: ["crotchet"], after: ["quaver"] }, { answer: "quaver-rest", before: ["crotchet", "quaver"], after: [] },
  ];
  if (timeSignature.id === "3/4") return [
    { answer: "semibreve-rest", before: [], after: [], isFullBar: true }, { answer: "crotchet-rest", before: [], after: ["crotchet", "crotchet"] }, { answer: "crotchet-rest", before: ["crotchet"], after: ["crotchet"] },
    { answer: "crotchet-rest", before: ["crotchet", "crotchet"], after: [] }, { answer: "crotchet-rest", before: ["quaver-group-2"], after: ["crotchet"] }, { answer: "crotchet-rest", before: ["crotchet"], after: ["quaver-group-2"] },
    { answers: ["crotchet-rest", "quaver-rest"], before: ["crotchet"], after: ["quaver"] }, { answers: ["quaver-rest", "crotchet-rest"], before: ["quaver"], after: ["crotchet"] },
    { answer: "quaver-rest", before: [], after: ["quaver", "crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["quaver"], after: ["crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet"], after: ["quaver", "crotchet"] },
    { answer: "quaver-rest", before: ["crotchet", "quaver"], after: ["crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet"], after: ["quaver"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet", "quaver"], after: [] },
  ];
  return [
    { answer: "semibreve-rest", before: [], after: [], isFullBar: true }, { answer: "minim-rest", before: [], after: ["minim"] }, { answer: "minim-rest", before: ["minim"], after: [] },
    { answer: "minim-rest", before: [], after: ["crotchet", "crotchet"] }, { answer: "minim-rest", before: ["crotchet", "crotchet"], after: [] },
    { answer: "crotchet-rest", before: [], after: ["crotchet", "crotchet", "crotchet"] }, { answer: "crotchet-rest", before: ["crotchet"], after: ["crotchet", "crotchet"] }, { answer: "crotchet-rest", before: ["crotchet", "crotchet"], after: ["crotchet"] }, { answer: "crotchet-rest", before: ["crotchet", "crotchet", "crotchet"], after: [] },
    { answers: ["crotchet-rest", "quaver-rest"], before: ["crotchet"], after: ["quaver", "crotchet"] }, { answers: ["quaver-rest", "crotchet-rest"], before: ["quaver", "crotchet"], after: ["crotchet"] },
    { answer: "crotchet-rest", before: ["quaver-group-2"], after: ["crotchet", "crotchet"] }, { answer: "crotchet-rest", before: ["crotchet", "quaver-group-2"], after: ["crotchet"] }, { answer: "crotchet-rest", before: ["crotchet", "crotchet"], after: ["quaver-group-2"] },
    { answer: "quaver-rest", before: [], after: ["quaver", "crotchet", "crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["quaver"], after: ["crotchet", "crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet"], after: ["quaver", "crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "quaver"], after: ["crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet"], after: ["quaver", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet", "quaver"], after: ["crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet", "crotchet"], after: ["quaver"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet", "crotchet", "quaver"], after: [] },
  ];
}

function hasValidQuestionCombination(activeLevel, enabledOptions) {
  const timeIds = enabledTimeSignatureIds(activeLevel, enabledOptions);
  const restIds = enabledRestIds(enabledOptions);
  return TIME_SIGNATURES
    .filter((signature) => timeIds.includes(signature.id))
    .some((signature) => getValidQuestions(signature).some((template) => templateAnswers(template).every((answer) => restIds.includes(answer))));
}

function makeQuestion(activeLevel = "H", enabledOptions = defaultEnabledOptions("H")) {
  const level = LEVELS[activeLevel] || LEVELS.H;
  const allowedTimeSignatureIds = enabledTimeSignatureIds(activeLevel, enabledOptions);
  const enabledTimeTypes = {
    simple: allowedTimeSignatureIds.some((id) => TIME_SIGNATURES.find((signature) => signature.id === id)?.type === "simple"),
    compound: allowedTimeSignatureIds.some((id) => TIME_SIGNATURES.find((signature) => signature.id === id)?.type === "compound"),
  };
  const timeSignature = weightedSignatureChoice(enabledTimeTypes, allowedTimeSignatureIds);
  const restIds = enabledRestIds(enabledOptions);
  const filteredQuestions = getValidQuestions(timeSignature).filter((template) => templateAnswers(template).every((answer) => restIds.includes(answer)));
  const validQuestions = filteredQuestions.length ? filteredQuestions : getValidQuestions(timeSignature);
  const wholeBarQuestions = validQuestions.filter((template) => template.isFullBar);
  const regularQuestions = validQuestions.filter((template) => !template.isFullBar);
  const multiRestQuestions = regularQuestions.filter((template) => templateAnswers(template).length > 1);
  let previousIndex = randomIndex(NOTES.length);
  const template = wholeBarQuestions.length && Math.random() < 1 / 15
    ? randomItem(wholeBarQuestions)
    : multiRestQuestions.length && Math.random() < 0.4
      ? randomItem(multiRestQuestions)
      : randomItem(regularQuestions.length ? regularQuestions : validQuestions);
  const options = { disableAutoBeam: timeSignature.type === "compound" };
  const before = addNotesFromRhythms(template.before, previousIndex, options);
  previousIndex = before.nextIndex;
  const answers = templateAnswers(template);
  const boxes = answers.map((answer, index) => {
    const units = template.isFullBar ? timeSignature.unitsPerBar : rhythmInfo(answer).units;
    return { id: `missing-${index}`, barIndex: 0, answer, units, isFullBar: Boolean(template.isFullBar) };
  });
  const after = addNotesFromRhythms(template.after, previousIndex, options);
  const missingNotes = boxes.map((box) => ({ rhythm: "missing", units: box.units, missingBoxId: box.id, isFullBar: box.isFullBar }));
  const bars = [{ notes: [...before.notes, ...missingNotes, ...after.notes] }];
  return { id: Math.random().toString(36).slice(2), activeLevel, timeSignature, bars, missingBoxes: boxes };
}

const playFeedbackSound = (...args) => window.MLH?.playFeedbackSound?.(...args);
const SHARED_SYMBOLS = window.BRAVURA_SYMBOLS || {};
const SHARED_CONFIG = window.SHARED_NOTATION_CONFIG || { drawing: {}, symbols: {} };

const TIME_SIGNATURE_SYMBOLS = {
  "2/4": { top: ["timeSig2"], bottom: ["timeSig4"], key: "timeSig24" },
  "3/4": { top: ["timeSig3"], bottom: ["timeSig4"], key: "timeSig34" },
  "4/4": { top: ["timeSig4"], bottom: ["timeSig4"], key: "timeSig44" },
  "6/8": { top: ["timeSig6"], bottom: ["timeSig8"], key: "timeSig68" },
  "9/8": { top: ["timeSig9"], bottom: ["timeSig8"], key: "timeSig98" },
  "12/8": { top: ["timeSig1", "timeSig2"], bottom: ["timeSig8"], key: "timeSig128" },
};

function sharedActualSymbolKey(key) {
  if (key === "noteheadBlackStemUp" || key === "noteheadBlackStemDown") return "noteheadBlack";
  if (key === "augmentationDotLine" || key === "augmentationDotSpace") return "augmentationDot";
  return key;
}

function sharedSymbolConfig(key) {
  const symbols = SHARED_CONFIG.symbols || {};
  return symbols[key] || symbols[sharedActualSymbolKey(key)] || {
    fontSizeScale: 3.4,
    xOffsetScale: 0,
    yOffsetScale: 0,
    widthScale: 1,
    heightScale: 1,
    opticalXOffset: 0,
    opticalYOffset: 0,
  };
}

function sharedSymbolForKey(key) {
  return SHARED_SYMBOLS[sharedActualSymbolKey(key)] || "";
}

function CalibratedSymbol({ symbolKey, x, y, colour = "currentColor", opacity = 1, lineGap = LINE_GAP, settingOverrides = {} }) {
  const glyph = sharedSymbolForKey(symbolKey);
  if (!glyph) return null;
  const settings = { ...sharedSymbolConfig(symbolKey), ...settingOverrides };
  const adjustedX = x + lineGap * Number(settings.xOffsetScale || 0) + Number(settings.opticalXOffset || 0);
  const adjustedY = y + lineGap * Number(settings.yOffsetScale || 0) + Number(settings.opticalYOffset || 0);
  const fontSize = lineGap * Number(settings.fontSizeScale || 3.4);
  return (
    <text
      className="music-symbol"
      x={adjustedX}
      y={adjustedY}
      fill={colour}
      opacity={opacity}
      fontSize={fontSize}

function Bar({ bar, barIndex, systemTop, startX, endX, staffStartX = startX, isFinalBar, selectedRest, placedAnswers, onPlace, missingBoxesById, feedback, onMissingSelection }) {

        const staffInset = isSingleBar ? (STAFF_RIGHT - STAFF_LEFT) * 0.15 : 0;
        const staffStartX = STAFF_LEFT + staffInset;
        const systemEndX = STAFF_RIGHT - staffInset;

            <StaffLines systemTop={systemTop} startX={staffStartX} endX={isSingleBar ? barEndX : systemEndX} />
            <TrebleClef systemTop={systemTop} xOffset={staffInset} />
            {systemIndex === 0 && <TimeSignatureGlyph signature={question.timeSignature} x={TIME_SIG_X + LINE_GAP * 5.2 + staffInset} systemTop={systemTop} colour="#000" />}
            {Array.from({ length: barsOnSystem }, (_, localBarIndex) => {

              const endX = systemStartX + (localBarIndex + 1) * barWidth;

    </svg>
  );
}

            </div>
          </div>
          <div className="relative z-20 mt-2 min-h-[28px] px-4 text-center text-sm font-normal leading-snug text-black opacity-65">
            {warning}
          </div>

          <div className="relative z-10 mt-4 min-h-[142px] overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:mx-3">
            <div className="space-y-3 text-stone-900">
              <p className="text-base font-semibold leading-tight">Select the missing rests and place them in the outlined spaces.</p>
            </div>
            <div className="mt-6 flex flex-wrap items-end justify-between gap-3 pb-[0px]">
              <RestOptions selectedRest={selectedRest} disabled={Boolean(feedback)} onSelect={setSelectedRest} />
              <div className={`ml-auto ${window.MLH.ActionButtonGroupClass}`}>
                <button type="button" onClick={clearAnswers} disabled={Boolean(feedback) || Object.keys(placedAnswers).length === 0} className={window.MLH.ClearButtonClass}>Clear</button>
                <window.MLH.ConfirmButton onClick={confirmAnswers} disabled={!allBoxesAnswered || Boolean(feedback)}>Confirm</window.MLH.ConfirmButton>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  );
}

const rootElement = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(rootElement).render(<RestsApp />);
else ReactDOM.render(<RestsApp />, rootElement);
  </script>

</body>
