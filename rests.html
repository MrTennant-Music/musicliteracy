<body>
  <div id="root"></div>

  <script type="text/babel">
const { useEffect, useRef, useState } = React;

const VIEWBOX_WIDTH = 920;
const VIEWBOX_HEIGHT = 430;
const STAFF_LEFT = 24;
const STAFF_RIGHT = 896;
const SYSTEM_TOPS = [62, 187];
const LINE_GAP = 10;
const NOTE_RX = 6.3;
const NOTE_RY = 4.6;
const STEM_LENGTH = 32;
const BAR_COUNT = 8;
const BARS_PER_SYSTEM = 4;
const CLEF_X = STAFF_LEFT + 8;
const TIME_SIG_X = STAFF_LEFT + 54;
const FIRST_SYSTEM_MUSIC_START_X = STAFF_LEFT + 86;
const OTHER_SYSTEM_MUSIC_START_X = STAFF_LEFT + 70;
const TREBLE_CLEF = String.fromCodePoint(0x1d11e);

const NOTES = [
  { name: "C4", step: -2 }, { name: "D4", step: -1 }, { name: "E4", step: 0 },
  { name: "F4", step: 1 }, { name: "G4", step: 2 }, { name: "A4", step: 3 },
  { name: "B4", step: 4 }, { name: "C5", step: 5 }, { name: "D5", step: 6 },
  { name: "E5", step: 7 }, { name: "F5", step: 8 }, { name: "G5", step: 9 },
  { name: "A5", step: 10 },
];

const TIME_SIGNATURES = [
  { id: "2/4", top: "2", bottom: "4", unitsPerBar: 8, type: "simple", weight: 1 },
  { id: "3/4", top: "3", bottom: "4", unitsPerBar: 12, type: "simple", weight: 1 },
  { id: "4/4", top: "4", bottom: "4", unitsPerBar: 16, type: "simple", weight: 1 },
  { id: "6/8", top: "6", bottom: "8", unitsPerBar: 12, type: "compound", compoundGroups: 2, weight: 1 },
  { id: "9/8", top: "9", bottom: "8", unitsPerBar: 18, type: "compound", compoundGroups: 3, weight: 1 },
  { id: "12/8", top: "12", bottom: "8", unitsPerBar: 24, type: "compound", compoundGroups: 4, weight: 0.4 },
];

const REST_OPTIONS = [
  { rhythm: "semibreve-rest", label: "Semibreve rest", beats: "full bar", units: 999 },
  { rhythm: "minim-rest", label: "Minim rest", beats: "2 beats", units: 8 },
  { rhythm: "dotted-crotchet-rest", label: "Dotted crotchet rest", beats: "1.5 beats", units: 6 },
  { rhythm: "crotchet-rest", label: "Crotchet rest", beats: "1 beat", units: 4 },
  { rhythm: "quaver-rest", label: "Quaver rest", beats: "0.5 beats", units: 2 },
];

const RHYTHM_INFO = {
  semibreve: { units: 16, spacing: 8, open: true, stem: false, dots: 0 },
  minim: { units: 8, spacing: 4, open: true, stem: true, dots: 0 },
  "dotted-minim": { units: 12, spacing: 6, open: true, stem: true, dots: 1 },
  crotchet: { units: 4, spacing: 2.2, open: false, stem: true, dots: 0 },
  "dotted-crotchet": { units: 6, spacing: 3, open: false, stem: true, dots: 1 },
  quaver: { units: 2, spacing: 1.15, open: false, stem: true, dots: 0, flag: true, beams: 1 },
  "dotted-quaver": { units: 3, spacing: 1.5, open: false, stem: true, dots: 1, flag: true, beams: 1 },
  semiquaver: { units: 1, spacing: 0.72, open: false, stem: true, dots: 0, flag: true, beams: 2 },
  "semibreve-rest": { units: 999, rest: true },
  "minim-rest": { units: 8, rest: true },
  "dotted-crotchet-rest": { units: 6, rest: true },
  "crotchet-rest": { units: 4, rest: true },
  "quaver-rest": { units: 2, rest: true },
  "semiquaver-rest": { units: 1, rest: true },
};

const SIMPLE_FULL_BAR_PATTERNS = {
  "2/4": [["minim"], ["crotchet", "crotchet"], ["quaver-group-2", "crotchet"], ["crotchet", "quaver-group-2"], ["quaver-group-2", "quaver-group-2"], ["semiquaver-group-4", "crotchet"], ["crotchet", "semiquaver-group-4"], ["quaver-2semiquavers", "crotchet"], ["2semiquavers-quaver", "crotchet"], ["dotted-quaver-semiquaver", "crotchet"], ["dotted-crotchet", "quaver"], ["quaver", "dotted-crotchet"]],
  "3/4": [["minim", "crotchet"], ["crotchet", "minim"], ["crotchet", "crotchet", "crotchet"], ["quaver-group-2", "crotchet", "crotchet"], ["crotchet", "quaver-group-2", "crotchet"], ["crotchet", "crotchet", "quaver-group-2"], ["semiquaver-group-4", "crotchet", "crotchet"], ["crotchet", "semiquaver-group-4", "crotchet"], ["crotchet", "crotchet", "semiquaver-group-4"], ["quaver-2semiquavers", "crotchet", "crotchet"], ["crotchet", "2semiquavers-quaver", "crotchet"], ["crotchet", "crotchet", "dotted-quaver-semiquaver"], ["dotted-crotchet", "quaver", "crotchet"], ["crotchet", "dotted-crotchet", "quaver"]],
  "4/4": [["minim", "minim"], ["minim", "crotchet", "crotchet"], ["crotchet", "crotchet", "minim"], ["crotchet", "crotchet", "crotchet", "crotchet"], ["quaver-group-2", "crotchet", "crotchet", "crotchet"], ["crotchet", "quaver-group-2", "crotchet", "crotchet"], ["crotchet", "crotchet", "quaver-group-2", "crotchet"], ["crotchet", "crotchet", "crotchet", "quaver-group-2"], ["quaver-group-2", "quaver-group-2", "minim"], ["minim", "quaver-group-2", "quaver-group-2"], ["semiquaver-group-4", "crotchet", "crotchet", "crotchet"], ["crotchet", "quaver-2semiquavers", "crotchet", "crotchet"], ["crotchet", "crotchet", "2semiquavers-quaver", "crotchet"], ["crotchet", "crotchet", "crotchet", "dotted-quaver-semiquaver"], ["dotted-crotchet", "quaver", "minim"], ["quaver", "dotted-crotchet", "minim"], ["minim", "dotted-crotchet", "quaver"], ["minim", "quaver", "dotted-crotchet"], ["crotchet", "dotted-crotchet", "quaver", "crotchet"]],
};

const COMPOUND_BEAT_PATTERNS = [
  { pattern: ["dotted-crotchet"], weight: 4 },
  { pattern: ["crotchet", "quaver"], weight: 4 },
  { pattern: ["quaver", "crotchet"], weight: 4 },
  { pattern: ["quaver-group-3"], weight: 1 },
];

function randomIndex(length) { return Math.floor(Math.random() * length); }
function randomItem(items) { return items[randomIndex(items.length)]; }
function clamp(value, min, max) { return Math.max(min, Math.min(max, value)); }
function rhythmInfo(rhythm) { return RHYTHM_INFO[rhythm] ?? RHYTHM_INFO.crotchet; }
function noteByIndex(index) { return NOTES[clamp(index, 0, NOTES.length - 1)]; }
function yForStep(step, systemTop) { return systemTop + LINE_GAP * 4 - step * (LINE_GAP / 2); }
function stemGoesDown(step) { return step > 4; }
function weightedItem(items) { return randomItem(items.flatMap((item) => Array.from({ length: item.weight }, () => item.pattern))); }
function weightedSignatureChoice(enabledTimeTypes = { simple: true, compound: true }) {
  const pool = [];
  TIME_SIGNATURES.filter((signature) => enabledTimeTypes[signature.type]).forEach((signature) => {
    const copies = Math.max(1, Math.round((signature.weight ?? 1) * 10));
    for (let i = 0; i < copies; i += 1) pool.push(signature);
  });
  return randomItem(pool.length ? pool : TIME_SIGNATURES);
}

function nearestMelodicIndex(previousIndex, stepwise = false) {
  if (!stepwise) return clamp(previousIndex + randomItem([-2, -1, 0, 0, 1, 2]), 0, NOTES.length - 1);
  if (previousIndex <= 0) return 1;
  if (previousIndex >= NOTES.length - 1) return NOTES.length - 2;
  return previousIndex + randomItem([-1, 1]);
}

function expandRhythmToken(token) {
  if (token === "quaver-group-2") return ["quaver", "quaver"];
  if (token === "quaver-group-3") return ["quaver", "quaver", "quaver"];
  if (token === "semiquaver-group-4") return ["semiquaver", "semiquaver", "semiquaver", "semiquaver"];
  if (token === "quaver-2semiquavers") return ["quaver", "semiquaver", "semiquaver"];
  if (token === "2semiquavers-quaver") return ["semiquaver", "semiquaver", "quaver"];
  if (token === "dotted-quaver-semiquaver") return ["dotted-quaver", "semiquaver"];
  return [token];
}
function shouldExplicitlyBeam(token) { return ["quaver-group-2", "quaver-group-3", "semiquaver-group-4", "quaver-2semiquavers", "2semiquavers-quaver", "dotted-quaver-semiquaver"].includes(token); }

function addNotesFromRhythms(rhythms, previousIndex, options = {}) {
  const notes = [];
  let noteIndex = previousIndex;
  let beamGroupCounter = 0;
  rhythms.forEach((token) => {
    const expanded = expandRhythmToken(token);
    const beamed = shouldExplicitlyBeam(token) && expanded.length > 1;
    const beamGroupId = beamed ? `beam-${beamGroupCounter++}` : undefined;
    expanded.forEach((rhythm) => {
      const stepwise = ["quaver", "semiquaver", "dotted-quaver"].includes(rhythm);
      noteIndex = nearestMelodicIndex(noteIndex, stepwise);
      notes.push({ rhythm, pitch: noteByIndex(noteIndex), beamGroupId: options.disableAutoBeam && !beamed ? null : beamGroupId });
    });
  });
  return { notes, nextIndex: noteIndex };
}

function buildCompoundBar(timeSignature, allowFinalFullNote = false) {
  if (allowFinalFullNote && timeSignature.id === "6/8" && Math.random() < 0.35) return ["dotted-minim"];
  const groups = [];
  for (let i = 0; i < timeSignature.compoundGroups; i += 1) {
    let choice = weightedItem(COMPOUND_BEAT_PATTERNS);
    if (groups.length > 0) {
      const previousGroup = groups[groups.length - 1];
      if (previousGroup[previousGroup.length - 1] === "crotchet" && choice[0] === "crotchet") choice = randomItem([["dotted-crotchet"], ["quaver", "crotchet"]]);
    }
    groups.push(choice);
  }
  return groups.flat();
}

function compoundQuestionForGroup(groupIndex, groupCount) {
  const beforeGroups = Array.from({ length: groupIndex }, () => weightedItem(COMPOUND_BEAT_PATTERNS)).flat();
  const afterGroups = Array.from({ length: groupCount - groupIndex - 1 }, () => weightedItem(COMPOUND_BEAT_PATTERNS)).flat();
  const choices = [
    { answer: "dotted-crotchet-rest", before: [], after: [] },
    { answer: "crotchet-rest", before: [], after: ["quaver"] },
    { answer: "crotchet-rest", before: ["quaver"], after: [] },
    { answer: "quaver-rest", before: [], after: ["quaver-group-2"] },
    { answer: "quaver-rest", before: ["quaver-group-2"], after: [] },
  ];
  const chosen = randomItem(choices);
  return { answer: chosen.answer, before: [...beforeGroups, ...chosen.before], after: [...chosen.after, ...afterGroups] };
}

function getValidQuestions(timeSignature) {
  if (timeSignature.type === "compound") {
    const result = [{ answer: "semibreve-rest", before: [], after: [], isFullBar: true }];
    for (let groupIndex = 0; groupIndex < timeSignature.compoundGroups; groupIndex += 1) result.push(compoundQuestionForGroup(groupIndex, timeSignature.compoundGroups));
    return result;
  }
  if (timeSignature.id === "2/4") return [
    { answer: "semibreve-rest", before: [], after: [], isFullBar: true }, { answer: "crotchet-rest", before: [], after: ["crotchet"] }, { answer: "crotchet-rest", before: ["crotchet"], after: [] },
    { answer: "crotchet-rest", before: [], after: ["quaver-group-2"] }, { answer: "crotchet-rest", before: ["quaver-group-2"], after: [] },
    { answer: "quaver-rest", before: [], after: ["quaver", "crotchet"] }, { answer: "quaver-rest", before: ["quaver"], after: ["crotchet"] }, { answer: "quaver-rest", before: ["crotchet"], after: ["quaver"] }, { answer: "quaver-rest", before: ["crotchet", "quaver"], after: [] },
  ];
  if (timeSignature.id === "3/4") return [
    { answer: "semibreve-rest", before: [], after: [], isFullBar: true }, { answer: "crotchet-rest", before: [], after: ["crotchet", "crotchet"] }, { answer: "crotchet-rest", before: ["crotchet"], after: ["crotchet"] },
    { answer: "crotchet-rest", before: ["crotchet", "crotchet"], after: [] }, { answer: "crotchet-rest", before: ["quaver-group-2"], after: ["crotchet"] }, { answer: "crotchet-rest", before: ["crotchet"], after: ["quaver-group-2"] },
    { answer: "quaver-rest", before: [], after: ["quaver", "crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["quaver"], after: ["crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet"], after: ["quaver", "crotchet"] },
    { answer: "quaver-rest", before: ["crotchet", "quaver"], after: ["crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet"], after: ["quaver"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet", "quaver"], after: [] },
  ];
  return [
    { answer: "semibreve-rest", before: [], after: [], isFullBar: true }, { answer: "minim-rest", before: [], after: ["minim"] }, { answer: "minim-rest", before: ["minim"], after: [] },
    { answer: "minim-rest", before: [], after: ["crotchet", "crotchet"] }, { answer: "minim-rest", before: ["crotchet", "crotchet"], after: [] },
    { answer: "crotchet-rest", before: [], after: ["crotchet", "crotchet", "crotchet"] }, { answer: "crotchet-rest", before: ["crotchet"], after: ["crotchet", "crotchet"] }, { answer: "crotchet-rest", before: ["crotchet", "crotchet"], after: ["crotchet"] }, { answer: "crotchet-rest", before: ["crotchet", "crotchet", "crotchet"], after: [] },
    { answer: "crotchet-rest", before: ["quaver-group-2"], after: ["crotchet", "crotchet"] }, { answer: "crotchet-rest", before: ["crotchet", "quaver-group-2"], after: ["crotchet"] }, { answer: "crotchet-rest", before: ["crotchet", "crotchet"], after: ["quaver-group-2"] },
    { answer: "quaver-rest", before: [], after: ["quaver", "crotchet", "crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["quaver"], after: ["crotchet", "crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet"], after: ["quaver", "crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "quaver"], after: ["crotchet", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet"], after: ["quaver", "crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet", "quaver"], after: ["crotchet"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet", "crotchet"], after: ["quaver"] }, { answer: "quaver-rest", before: ["crotchet", "crotchet", "crotchet", "quaver"], after: [] },
  ];
}

function makeQuestion(enabledTimeTypes = { simple: true, compound: true }) {
  const timeSignature = weightedSignatureChoice(enabledTimeTypes);
  const validQuestions = getValidQuestions(timeSignature);
  const missingBars = new Set();
  while (missingBars.size < 3) missingBars.add(randomIndex(BAR_COUNT));
  const bars = [];
  const missingBoxes = [];
  let previousIndex = randomIndex(NOTES.length);
  for (let barIndex = 0; barIndex < BAR_COUNT; barIndex += 1) {
    if (missingBars.has(barIndex)) {
      const template = randomItem(validQuestions);
      const options = { disableAutoBeam: timeSignature.type === "compound" };
      const before = addNotesFromRhythms(template.before, previousIndex, options);
      previousIndex = before.nextIndex;
      const units = template.isFullBar ? timeSignature.unitsPerBar : rhythmInfo(template.answer).units;
      const box = { id: `missing-${barIndex}`, barIndex, answer: template.answer, units, isFullBar: Boolean(template.isFullBar) };
      missingBoxes.push(box);
      const after = addNotesFromRhythms(template.after, previousIndex, options);
      previousIndex = after.nextIndex;
      bars.push({ notes: [...before.notes, { rhythm: "missing", units: box.units, missingBoxId: box.id, isFullBar: box.isFullBar }, ...after.notes] });
    } else {
      const pattern = timeSignature.type === "compound" ? buildCompoundBar(timeSignature, barIndex === BAR_COUNT - 1) : randomItem(SIMPLE_FULL_BAR_PATTERNS[timeSignature.id]);
      const built = addNotesFromRhythms(pattern, previousIndex, { disableAutoBeam: timeSignature.type === "compound" });
      previousIndex = built.nextIndex;
      bars.push({ notes: built.notes });
    }
  }
  return { id: Math.random().toString(36).slice(2), timeSignature, bars, missingBoxes };
}

const playFeedbackSound = (...args) => window.MLH?.playFeedbackSound?.(...args);

function StaffLines({ systemTop }) {
  return <g>{[0, 1, 2, 3, 4].map((index) => <line key={index} x1={STAFF_LEFT} x2={STAFF_RIGHT} y1={systemTop + index * LINE_GAP} y2={systemTop + index * LINE_GAP} stroke="currentColor" strokeWidth="1.2" />)}</g>;
}
function TrebleClef({ systemTop }) { return <text x={CLEF_X} y={systemTop + 28} fontSize="92" fontFamily="serif" dominantBaseline="middle">{TREBLE_CLEF}</text>; }
function TimeSignatureGlyph({ signature, x, y, colour = "currentColor", fontSize = 30 }) { return <g fontFamily="serif" fontWeight="900" fontSize={fontSize} textAnchor="middle" fill={colour}><text x={x} y={y}>{signature.top}</text><text x={x} y={y + fontSize * 0.62 + 2}>{signature.bottom}</text></g>; }
function LedgerLines({ x, step, systemTop, colour = "currentColor" }) {
  const lines = [];
  if (step <= -2) lines.push(yForStep(-2, systemTop));
  if (step >= 10) lines.push(yForStep(10, systemTop));
  return <g>{lines.map((lineY) => <line key={lineY} x1={x - 10.5} x2={x + 10.5} y1={lineY} y2={lineY} stroke={colour} strokeWidth="1.2" />)}</g>;
}
function Rest({ rhythm, x, systemTop, colour = "currentColor", opacity = 1 }) {
  const middleY = systemTop + LINE_GAP * 2;
  if (rhythm === "semibreve-rest") return <g opacity={opacity}><line x1={x - 9} x2={x + 9} y1={systemTop + LINE_GAP} y2={systemTop + LINE_GAP} stroke={colour} strokeWidth="1.2" /><rect x={x - 7} y={systemTop + LINE_GAP} width="14" height="5" fill={colour} /></g>;
  if (rhythm === "minim-rest") return <g opacity={opacity}><line x1={x - 9} x2={x + 9} y1={systemTop + LINE_GAP * 2} y2={systemTop + LINE_GAP * 2} stroke={colour} strokeWidth="1.2" /><rect x={x - 7} y={systemTop + LINE_GAP * 2 - 5} width="14" height="5" fill={colour} /></g>;
  if (rhythm === "crotchet-rest" || rhythm === "dotted-crotchet-rest") {
    const pathData = `M ${x} ${middleY - 14} L ${x + 4} ${middleY - 9} L ${x - 2} ${middleY - 3} L ${x + 4} ${middleY + 3} L ${x - 2} ${middleY + 11}`;
    return <g opacity={opacity}><path d={pathData} fill="none" stroke={colour} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />{rhythm === "dotted-crotchet-rest" && <circle cx={x + 10} cy={middleY - 4} r="2" fill={colour} />}</g>;
  }
  const topY = middleY - 6;
  const bottomY = middleY + 10;
  if (rhythm === "semiquaver-rest") return <g stroke={colour} strokeWidth="2" strokeLinecap="round" fill="none" opacity={opacity}><line x1={x - 3} y1={topY} x2={x + 3} y2={topY} /><line x1={x + 3} y1={topY} x2={x - 1} y2={bottomY} /><circle cx={x - 5} cy={topY - 1} r="2" fill={colour} stroke="none" /><line x1={x - 2} y1={topY + 8} x2={x + 2} y2={topY + 8} /><circle cx={x - 4} cy={topY + 7} r="1.8" fill={colour} stroke="none" /></g>;
  return <g stroke={colour} strokeWidth="1.8" strokeLinecap="round" fill="none" opacity={opacity}><line x1={x - 3} y1={topY} x2={x + 2} y2={topY} /><line x1={x + 2} y1={topY} x2={x - 1} y2={bottomY} /><circle cx={x - 4} cy={topY - 1} r="1.8" fill={colour} stroke="none" /></g>;
}
function Flag({ stemX, stemEndY, stemDown, colour = "currentColor", beams = 1 }) {
  const primaryPath = stemDown ? `M ${stemX} ${stemEndY} C ${stemX + 10} ${stemEndY - 4}, ${stemX + 10} ${stemEndY - 12}, ${stemX + 2} ${stemEndY - 16}` : `M ${stemX} ${stemEndY} C ${stemX + 10} ${stemEndY + 4}, ${stemX + 10} ${stemEndY + 12}, ${stemX + 2} ${stemEndY + 16}`;
  const secondaryStartY = stemDown ? stemEndY + 21 : stemEndY + 5;
  const secondaryPath = stemDown ? `M ${stemX} ${secondaryStartY} C ${stemX + 9} ${secondaryStartY - 4}, ${stemX + 9} ${secondaryStartY - 10}, ${stemX + 2} ${secondaryStartY - 14}` : `M ${stemX} ${secondaryStartY} C ${stemX + 9} ${secondaryStartY + 4}, ${stemX + 9} ${secondaryStartY + 10}, ${stemX + 2} ${secondaryStartY + 14}`;
  return <g><path d={primaryPath} fill="none" stroke={colour} strokeWidth="1.7" strokeLinecap="round" />{beams === 2 && <path d={secondaryPath} fill="none" stroke={colour} strokeWidth="1.7" strokeLinecap="round" />}</g>;
}
function getStemData(item, x, systemTop, stemDownOverride = null) {
  const step = item.pitch.step;
  const y = yForStep(step, systemTop);
  const stemDown = stemDownOverride ?? stemGoesDown(step);
  const stemX = stemDown ? x - NOTE_RX : x + NOTE_RX;
  const stemEndY = stemDown ? y + STEM_LENGTH : y - STEM_LENGTH;
  return { step, y, stemDown, stemX, stemEndY };
}
function Note({ item, x, systemTop, colour = "currentColor", stemDownOverride = null, forcedStemEndY = null, showFlag = true }) {
  const info = rhythmInfo(item.rhythm);
  const stem = getStemData(item, x, systemTop, stemDownOverride);
  const stemEndY = forcedStemEndY ?? stem.stemEndY;
  const dotY = Math.abs(stem.step % 2) === 1 ? stem.y : stem.y - 5;
  return <g><LedgerLines x={x} step={stem.step} systemTop={systemTop} colour={colour} /><ellipse cx={x} cy={stem.y} rx={NOTE_RX} ry={NOTE_RY} transform={`rotate(-18 ${x} ${stem.y})`} fill={info.open ? "transparent" : colour} stroke={colour} strokeWidth="1.7" />{info.stem && <line x1={stem.stemX} x2={stem.stemX} y1={stem.y} y2={stemEndY} stroke={colour} strokeWidth="1.5" />}{info.dots === 1 && <circle cx={x + 12} cy={dotY} r="2.1" fill={colour} />}{info.flag && showFlag && <Flag stemX={stem.stemX} stemEndY={stemEndY} stemDown={stem.stemDown} colour={colour} beams={info.beams ?? 1} />}</g>;
}
function getBarNotePositions(notes, startX, endX) {
  const totalSpacing = notes.reduce((sum, note) => sum + (note.rhythm === "missing" ? Math.max(1.15, note.units / 2) : rhythmInfo(note.rhythm).spacing), 0);
  const unitWidth = Math.max(1, endX - startX) / Math.max(1, totalSpacing);
  let cursor = startX + unitWidth * 0.35;
  return notes.map((note) => {
    const x = cursor;
    cursor += (note.rhythm === "missing" ? Math.max(1.15, note.units / 2) : rhythmInfo(note.rhythm).spacing) * unitWidth;
    return x;
  });
}

    scoreAnswer(allCorrect);
  }
  return <div className="min-h-screen bg-stone-50 px-4 pb-4 pt-1 text-stone-950 md:px-8 md:pb-8 md:pt-2"><div className="mx-auto max-w-6xl"><header className="mb-5 rounded-2xl border border-stone-200 bg-white px-5 py-3 shadow-sm"><div className="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between"><div className="flex items-center gap-4"><AppIcon /><div><h1 className="text-2xl font-semibold tracking-tight md:text-3xl">Rests</h1><p className="mt-0.5 max-w-2xl whitespace-normal break-words text-[clamp(0.72rem,1.2vw,1rem)] leading-tight text-stone-600 xl:whitespace-nowrap">Identify and apply rests.</p></div></div><div className="flex w-full flex-wrap items-stretch justify-start gap-2 lg:ml-auto lg:w-auto lg:flex-nowrap lg:justify-end"><StatCard variant="score" label="Score" value={`${correct}/${attempted}`} footer={`Accuracy: ${accuracy}%`} progress={accuracy} /><div className={`relative flex overflow-visible rounded-xl border border-stone-200 shadow-sm ${streakMedal?.bg ?? "bg-stone-50"}`}><StatCard variant="streak" label="Streak" value={streak} footer={`Best streak: ${bestStreak}`} medal={streakMedal} /><div className="relative z-0 flex min-h-[52px] min-w-[64px] shrink-0 flex-col items-start justify-center px-[14px] py-[10px] text-[13px] leading-[1.15] text-stone-700"><div className="flex items-center gap-1"><span>💎</span><span className="text-cyan-500">30</span></div><div className="mt-1">🥇 <span className="text-yellow-500">20</span></div><div className="mt-1">🥈 <span className="text-slate-500">15</span></div><div className="mt-1">🥉 <span className="text-amber-700">10</span></div></div></div></div></div></header><main className="relative -mt-[10px] min-h-[640px] overflow-visible rounded-2xl border border-stone-200 bg-white px-4 pb-4 pt-[10px] shadow-sm md:h-auto md:min-h-0 md:overflow-visible md:px-6 md:pb-6 md:pt-[14px]" onPointerDown={() => { if (feedback && !feedback.correct) fadeToNextQuestion(); }}><div className="relative z-20 mb-2.5 flex flex-wrap items-center justify-between gap-3"><div className="flex items-center gap-2"><div className="relative" ref={customiseRef}><button type="button" onClick={() => setCustomiseOpen((value) => !value)} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800">⚙️ <span>Customise</span></button>{customiseOpen && <div className="absolute left-0 z-[60] mt-2 w-[min(400px,calc(100vw-2rem))] rounded-2xl border border-stone-200 bg-white p-4 shadow-lg"><h2 className="mb-3 text-center text-base font-semibold">Customise</h2><MenuRows enabledTimeTypes={enabledTimeTypes} setEnabledTimeTypes={setEnabledTimeTypes} showRhythmGuide={showRhythmGuide} setShowRhythmGuide={setShowRhythmGuide} resetScore={resetScore} newQuestion={newQuestion} /></div>}</div></div><button type="button" onClick={() => newQuestion()} className="flex h-11 min-w-[132px] items-center justify-center gap-2 rounded-xl border border-stone-300 bg-white px-4 text-sm font-semibold text-stone-800"><span>Skip Question</span><span className="text-lg leading-none">→</span></button><div className="pointer-events-none absolute inset-x-0 top-1/2 z-30 flex -translate-y-1/2 justify-center overflow-visible"><FeedbackBanner feedback={feedback} fading={feedbackFading} warning={warning} /></div></div>{showRhythmGuide && <div className="relative z-[15]"><RhythmGuide /></div>}<div className={`relative -top-[18px] transition-opacity duration-300 ${questionVisible ? "opacity-100" : "opacity-0"}`}><Score question={question} selectedRest={selectedRest} placedAnswers={placedAnswers} onPlace={placeRest} feedback={feedback} onMissingSelection={showSelectRestWarning} /></div><div className="relative z-10 mt-3 min-h-[142px] overflow-hidden rounded-xl border border-stone-200 bg-stone-50 px-4 py-3 shadow-md md:-mt-[175px] md:mx-3"><div className="space-y-3 text-stone-900"><p className="text-base font-semibold leading-tight">Select the missing rests and place them in the score at points marked with an asterisk (*).</p></div><div className="mt-6 flex flex-wrap items-end justify-between gap-3 pb-[0px]"><RestOptions selectedRest={selectedRest} disabled={Boolean(feedback)} onSelect={setSelectedRest} /><button type="button" disabled={!allBoxesAnswered || Boolean(feedback)} onClick={confirmAnswers} className="ml-auto rounded-xl bg-green-600 px-[22px] py-[10px] text-sm font-bold text-white disabled:opacity-60">Confirm</button></div></div></main></div></div>;
}

const rootElement = document.getElementById("root");
if (ReactDOM.createRoot) ReactDOM.createRoot(rootElement).render(<App />);
else ReactDOM.render(<App />, rootElement);
  </script>
<script src="./footer.js?v=1.3"></script>
